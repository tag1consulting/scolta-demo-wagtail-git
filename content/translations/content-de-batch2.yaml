        <p>Der <code>git write-tree</code>-Befehl erstellt ein Tree-Objekt aus dem aktuellen Index und gibt seinen SHA aus. Es ist der Plumbing-Schritt zwischen "der Index ist bereit zum Committen" und "wir haben einen Tree zum Verweisen". <code>git commit</code> ruft es intern auf.</p>
        <p>Im täglichen Einsatz integriert sich <code>git write-tree</code> eng mit Shell-Aliasen, Editor-Plugins und Continuous Integration. Power-User fügen oft Aliase hinzu, die Flags kombinieren, die sie immer übergeben, oder wickeln den Befehl in Skripte, die Teamkonventionen durchsetzen. Die Ausgabeformatierung kann über Git-Config angepasst werden — Pretty-Formate, Farbschemata und Pager-Verhalten sind alle einstellbar. Wenn etwas schiefgeht, ist der erste Diagnoseschritt üblicherweise, den Befehl erneut mit <code>GIT_TRACE=1</code> in der Umgebung auszuführen, was die zugrunde liegenden Plumbing-Aufrufe offenlegt. Für ungewöhnliche Situationen öffnet die <code>--help</code>-Ausgabe (<code>git write-tree --help</code>) die vollständige Manpage mit Details zu jeder Option, einschließlich solcher, die in alltäglichen Workflows selten verwendet werden, aber für Debugging oder Skripting im großen Maßstab essentiell sind.</p>
        <p>Zu verstehen, wie <code>git write-tree</code> mit dem Rest von Gits Datenmodell interagiert — der Objektdatenbank, dem Index, Refs und dem Working Tree — zahlt sich aus. Jeder Befehl operiert auf einer Teilmenge dieser Stücke, und zu wissen, welche er berührt, hilft Ergebnisse vorherzusagen und sich von Fehlern zu erholen. Das Lesen der offiziellen Git-Dokumentation neben praktischer Übung in einem Wegwerf-Repository ist der schnellste Weg, die Nuancen zu verinnerlichen. Die meisten Produktionsprobleme mit Git rühren von einer von drei Ursachen: überraschendem Standardverhalten, partiellen Netzwerkoperationen oder dem Umschreiben bereits geteilter Historie. Ein funktionierendes mentales Modell der Nebenwirkungen von <code>git write-tree</code> hilft, alle drei zu vermeiden.</p>
        <h2>Häufige Optionen</h2>
        <table><thead><tr><th>Option</th><th>Beschreibung</th></tr></thead><tbody><tr><td><code>--missing-ok</code></td><td>Akzeptiert fehlende Objekte stillschweigend.</td></tr><tr><td><code>--prefix=&lt;prefix&gt;</code></td><td>Schreibt Tree für Index-Einträge unter dem Präfix.</td></tr></tbody></table>
        <h2>Beispiele</h2>
        <pre><code>git write-tree
        # Den Tree-SHA des aktuellen Index ausgeben

        TREE=$(git write-tree)
        PARENT=$(git rev-parse HEAD)
        COMMIT=$(echo "msg" | git commit-tree $TREE -p $PARENT)
        git update-ref HEAD $COMMIT
        # Einen Commit komplett aus Plumbing bauen</code></pre>
        <h2>Häufige Fehler</h2>
        <p>Den ausgegebenen Tree-SHA als irgendwo gespeichert anzunehmen ist falsch — er existiert in der Objektdatenbank, aber kein Ref zeigt darauf, bis Sie einen Commit erstellen, der ihn referenziert.</p>
        <h2>Verwandte Befehle</h2>
        <p><code>git read-tree</code>, <code>git commit-tree</code>, <code>git mktree</code>, <code>git ls-tree</code></p>
- source_title: git commit-tree — Create a new commit object
