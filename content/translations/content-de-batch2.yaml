        <p>Zu verstehen, wie <code>git count-objects</code> mit dem Rest von Gits Datenmodell interagiert — der Objektdatenbank, dem Index, Refs und dem Working Tree — zahlt sich aus. Jeder Befehl operiert auf einer Teilmenge dieser Stücke, und zu wissen, welche er berührt, hilft Ergebnisse vorherzusagen und sich von Fehlern zu erholen. Das Lesen der offiziellen Git-Dokumentation neben praktischer Übung in einem Wegwerf-Repository ist der schnellste Weg, die Nuancen zu verinnerlichen. Die meisten Produktionsprobleme mit Git rühren von einer von drei Ursachen: überraschendem Standardverhalten, partiellen Netzwerkoperationen oder dem Umschreiben bereits geteilter Historie. Ein funktionierendes mentales Modell der Nebenwirkungen von <code>git count-objects</code> hilft, alle drei zu vermeiden.</p>
        <h2>Häufige Optionen</h2>
        <table><thead><tr><th>Option</th><th>Beschreibung</th></tr></thead><tbody><tr><td><code>-v</code></td><td>Verbose-Aufschlüsselung.</td></tr><tr><td><code>-H</code>, <code>--human-readable</code></td><td>Größen in KiB/MiB/GiB.</td></tr></tbody></table>
        <h2>Beispiele</h2>
        <pre><code>git count-objects
        # Schnell: Anzahl lose Objekte und ihre Größe

        git count-objects -vH
        # Vollständige Aufschlüsselung mit menschenlesbaren Größen
        # count: 235 (loose objects)
        # size: 5.2 MiB
        # in-pack: 18234
        # packs: 3
        # size-pack: 142.6 MiB
        # prune-packable: 12
        # garbage: 0</code></pre>
        <h2>Häufige Fehler</h2>
        <p>"garbage" falsch zu lesen — das sind korrupte Objekte, nicht nur unerreichbare. Eine Garbage-Anzahl ungleich Null rechtfertigt Untersuchung. <code>prune-packable</code> zeigt Objekte an, die sowohl lose als auch in Packs vorhanden sind; ein <code>git gc</code> löst sie auf.</p>
        <h2>Verwandte Befehle</h2>
        <p><code>git gc</code>, <code>git fsck</code>, <code>git repack</code>, <code>git verify-pack</code></p>
- source_title: git gc — Cleanup unnecessary files and optimize the local repository
  title: git gc — Unnötige Dateien aufräumen und das lokale Repository optimieren
  langcode: de
  body: |-
    <h2>Übersicht</h2>
        <pre><code>git gc [--auto] [--aggressive] [--prune=&lt;date&gt;]</code></pre>
        <h2>Beschreibung</h2>
        <p>Der <code>git gc</code>-Befehl führt Wartungsaufgaben aus: Er packt lose Objekte, entfernt unerreichbare Objekte über das Prune-Fenster hinaus, packt Refs und aktualisiert Hilfsdateien. Git führt automatisch <code>gc --auto</code> nach Operationen aus, die viele lose Objekte erzeugen (wie ein großes Fetch), sodass die meisten Nutzer <code>gc</code> nie manuell aufrufen. Manuelles Aufrufen ist nützlich nach dem Umschreiben von Historie, dem Löschen vieler Branches oder zur sofortigen Speicherrückgewinnung.</p>
        <p>Das <code>--aggressive</code>-Flag macht zusätzliche Arbeit — es berechnet Deltas neu — ist aber selten die Zeit wert. Modernes Gits Standardverhalten ist gut abgestimmt. Das <code>--prune</code>-Argument steuert, wie alt unerreichbare Objekte sein müssen, bevor sie gelöscht werden; der Standard ist zwei Wochen.</p>
        <p>Im täglichen Einsatz integriert sich <code>git gc</code> eng mit Shell-Aliasen, Editor-Plugins und Continuous Integration. Power-User fügen oft Aliase hinzu, die Flags kombinieren, die sie immer übergeben, oder wickeln den Befehl in Skripte, die Teamkonventionen durchsetzen. Die Ausgabeformatierung kann über Git-Config angepasst werden — Pretty-Formate, Farbschemata und Pager-Verhalten sind alle einstellbar. Wenn etwas schiefgeht, ist der erste Diagnoseschritt üblicherweise, den Befehl erneut mit <code>GIT_TRACE=1</code> in der Umgebung auszuführen, was die zugrunde liegenden Plumbing-Aufrufe offenlegt. Für ungewöhnliche Situationen öffnet die <code>--help</code>-Ausgabe (<code>git gc --help</code>) die vollständige Manpage mit Details zu jeder Option, einschließlich solcher, die in alltäglichen Workflows selten verwendet werden, aber für Debugging oder Skripting im großen Maßstab essentiell sind.</p>
        <p>Zu verstehen, wie <code>git gc</code> mit dem Rest von Gits Datenmodell interagiert — der Objektdatenbank, dem Index, Refs und dem Working Tree — zahlt sich aus. Jeder Befehl operiert auf einer Teilmenge dieser Stücke, und zu wissen, welche er berührt, hilft Ergebnisse vorherzusagen und sich von Fehlern zu erholen. Das Lesen der offiziellen Git-Dokumentation neben praktischer Übung in einem Wegwerf-Repository ist der schnellste Weg, die Nuancen zu verinnerlichen. Die meisten Produktionsprobleme mit Git rühren von einer von drei Ursachen: überraschendem Standardverhalten, partiellen Netzwerkoperationen oder dem Umschreiben bereits geteilter Historie. Ein funktionierendes mentales Modell der Nebenwirkungen von <code>git gc</code> hilft, alle drei zu vermeiden.</p>
        <h2>Häufige Optionen</h2>
        <table><thead><tr><th>Option</th><th>Beschreibung</th></tr></thead><tbody><tr><td><code>--auto</code></td><td>Läuft nur, wenn Gits Heuristiken sagen, dass Wartung nötig ist.</td></tr><tr><td><code>--aggressive</code></td><td>Verbringt mehr Zeit damit, optimale Deltas zu finden.</td></tr><tr><td><code>--prune=&lt;date&gt;</code></td><td>Prunet unerreichbare Objekte, die älter als das sind.</td></tr><tr><td><code>--no-prune</code></td><td>Überspringt das Prunen loser Objekte.</td></tr><tr><td><code>--quiet</code></td><td>Unterdrückt Fortschrittsausgabe.</td></tr><tr><td><code>--force</code></td><td>Läuft, auch wenn ein anderes gc läuft.</td></tr></tbody></table>
        <h2>Beispiele</h2>
        <pre><code>git gc
        # Routine-Wartung

        git gc --auto
        # Was Git im Hintergrund ausführt; kann manuell aufgerufen werden

        git gc --prune=now
        # Aggressiv Platz zurückgewinnen; löscht jüngste Unerreichbare (mit Vorsicht verwenden)

        git gc --aggressive
        # Langsames, erschöpfendes Repacking — selten lohnend</code></pre>
        <h2>Häufige Fehler</h2>
        <p><code>--prune=now</code> löscht sofort unerreichbare Objekte, möglicherweise einschließlich solcher, die noch von Reflog oder Stash referenziert werden. Verwenden Sie es nicht leichtfertig. Auto-gc auf einem großen Repo zu deaktivieren lässt lose Objekte sich anhäufen; konfigurieren Sie stattdessen <code>maintenance</code> für neueres Git.</p>
        <h2>Verwandte Befehle</h2>
        <p><code>git maintenance</code>, <code>git repack</code>, <code>git prune</code>, <code>git fsck</code></p>
- source_title: git fsck — Verify the connectivity and validity of objects
  title: git fsck — Konnektivität und Gültigkeit von Objekten verifizieren
  langcode: de
  body: |-
    <h2>Übersicht</h2>
        <pre><code>git fsck [--full] [--unreachable] [--dangling] [--lost-found]</code></pre>
        <h2>Beschreibung</h2>
        <p>Der <code>git fsck</code>-Befehl validiert die Integrität der Objektdatenbank: Jeder Commit, Tree, Blob und Tag wird auf korrekten Hash, gültiges Format und intakte Referenzen geprüft. Er identifiziert dangling Objekte (keine Ref zeigt auf sie, aber sie sind nicht aus einem Reflog unerreichbar) und unerreichbare Objekte (wirklich verwaist).</p>
        <p>Das ist das bevorzugte Werkzeug zur Diagnose von Repository-Korruption (oft nach einem Festplatten-Ausfall oder einer unterbrochenen Operation) und zum Finden "verlorener" Commits in der dangling-Kategorie, die wiederherstellbar sein könnten.</p>
        <p>Im täglichen Einsatz integriert sich <code>git fsck</code> eng mit Shell-Aliasen, Editor-Plugins und Continuous Integration. Power-User fügen oft Aliase hinzu, die Flags kombinieren, die sie immer übergeben, oder wickeln den Befehl in Skripte, die Teamkonventionen durchsetzen. Die Ausgabeformatierung kann über Git-Config angepasst werden — Pretty-Formate, Farbschemata und Pager-Verhalten sind alle einstellbar. Wenn etwas schiefgeht, ist der erste Diagnoseschritt üblicherweise, den Befehl erneut mit <code>GIT_TRACE=1</code> in der Umgebung auszuführen, was die zugrunde liegenden Plumbing-Aufrufe offenlegt. Für ungewöhnliche Situationen öffnet die <code>--help</code>-Ausgabe (<code>git fsck --help</code>) die vollständige Manpage mit Details zu jeder Option, einschließlich solcher, die in alltäglichen Workflows selten verwendet werden, aber für Debugging oder Skripting im großen Maßstab essentiell sind.</p>
        <p>Zu verstehen, wie <code>git fsck</code> mit dem Rest von Gits Datenmodell interagiert — der Objektdatenbank, dem Index, Refs und dem Working Tree — zahlt sich aus. Jeder Befehl operiert auf einer Teilmenge dieser Stücke, und zu wissen, welche er berührt, hilft Ergebnisse vorherzusagen und sich von Fehlern zu erholen. Das Lesen der offiziellen Git-Dokumentation neben praktischer Übung in einem Wegwerf-Repository ist der schnellste Weg, die Nuancen zu verinnerlichen. Die meisten Produktionsprobleme mit Git rühren von einer von drei Ursachen: überraschendem Standardverhalten, partiellen Netzwerkoperationen oder dem Umschreiben bereits geteilter Historie. Ein funktionierendes mentales Modell der Nebenwirkungen von <code>git fsck</code> hilft, alle drei zu vermeiden.</p>
        <h2>Häufige Optionen</h2>
        <table><thead><tr><th>Option</th><th>Beschreibung</th></tr></thead><tbody><tr><td><code>--full</code></td><td>Prüft jedes Objekt, einschließlich erreichbarer.</td></tr><tr><td><code>--unreachable</code></td><td>Meldet unerreichbare Objekte.</td></tr><tr><td><code>--dangling</code></td><td>Meldet dangling Objekte (Standard).</td></tr><tr><td><code>--no-dangling</code></td><td>Unterdrückt dangling-Auflistung.</td></tr><tr><td><code>--lost-found</code></td><td>Schreibt dangling Objekte nach <code>.git/lost-found/</code>.</td></tr><tr><td><code>--connectivity-only</code></td><td>Überspringt Blob-Inhalts-Verifikation.</td></tr><tr><td><code>--strict</code></td><td>Meldet zusätzliche Warnungen.</td></tr></tbody></table>
        <h2>Beispiele</h2>
        <pre><code>git fsck --full
        # Umfassende Prüfung

        git fsck --lost-found
        # Materialisiert dangling Commits/Blobs in wiederherstellbare Dateien

        git fsck --unreachable --no-reflogs
        # Wirklich verwaiste Objekte finden (Reflog-Schutz ignoriert)

        git fsck --connectivity-only
        # Schnellere Prüfung, die Inhalts-Hashing überspringt</code></pre>
        <h2>Häufige Fehler</h2>
        <p>Auf "unreachable"-Warnungen zu reagieren, ohne den Reflog-Schutz zu berücksichtigen, kann wiederherstellbare Arbeit verlieren. <code>fsck</code> ist nur lesend; es löscht selbst nichts. Von <code>fsck</code> gefundene Fehler werden oft durch <code>git gc</code> oder durch erneutes Klonen einer frischen Kopie behoben.</p>
        <h2>Verwandte Befehle</h2>
        <p><code>git gc</code>, <code>git reflog</code>, <code>git verify-pack</code>, <code>git prune</code></p>
- source_title: git prune — Prune all unreachable objects from the object database
  title: git prune — Alle unerreichbaren Objekte aus der Objektdatenbank entfernen
  langcode: de
  body: |-
    <h2>Übersicht</h2>
        <pre><code>git prune [-n] [--expire=&lt;date&gt;]</code></pre>
        <h2>Beschreibung</h2>
        <p>Der <code>git prune</code>-Befehl löscht lose Objekte, die von keiner Ref aus erreichbar sind. Er wird normalerweise indirekt von <code>git gc</code> aufgerufen; ihn direkt auszuführen umgeht einige Sicherheitsprüfungen von <code>gc</code>. Die <code>--expire</code>-Gnadenfrist (Standard 2 Wochen) verhindert das Löschen kürzlich erstellter Objekte, die zu laufenden Operationen gehören könnten.</p>
        <p>Im täglichen Einsatz integriert sich <code>git prune</code> eng mit Shell-Aliasen, Editor-Plugins und Continuous Integration. Power-User fügen oft Aliase hinzu, die Flags kombinieren, die sie immer übergeben, oder wickeln den Befehl in Skripte, die Teamkonventionen durchsetzen. Die Ausgabeformatierung kann über Git-Config angepasst werden — Pretty-Formate, Farbschemata und Pager-Verhalten sind alle einstellbar. Wenn etwas schiefgeht, ist der erste Diagnoseschritt üblicherweise, den Befehl erneut mit <code>GIT_TRACE=1</code> in der Umgebung auszuführen, was die zugrunde liegenden Plumbing-Aufrufe offenlegt. Für ungewöhnliche Situationen öffnet die <code>--help</code>-Ausgabe (<code>git prune --help</code>) die vollständige Manpage mit Details zu jeder Option, einschließlich solcher, die in alltäglichen Workflows selten verwendet werden, aber für Debugging oder Skripting im großen Maßstab essentiell sind.</p>
        <p>Zu verstehen, wie <code>git prune</code> mit dem Rest von Gits Datenmodell interagiert — der Objektdatenbank, dem Index, Refs und dem Working Tree — zahlt sich aus. Jeder Befehl operiert auf einer Teilmenge dieser Stücke, und zu wissen, welche er berührt, hilft Ergebnisse vorherzusagen und sich von Fehlern zu erholen. Das Lesen der offiziellen Git-Dokumentation neben praktischer Übung in einem Wegwerf-Repository ist der schnellste Weg, die Nuancen zu verinnerlichen. Die meisten Produktionsprobleme mit Git rühren von einer von drei Ursachen: überraschendem Standardverhalten, partiellen Netzwerkoperationen oder dem Umschreiben bereits geteilter Historie. Ein funktionierendes mentales Modell der Nebenwirkungen von <code>git prune</code> hilft, alle drei zu vermeiden.</p>
        <h2>Häufige Optionen</h2>
        <table><thead><tr><th>Option</th><th>Beschreibung</th></tr></thead><tbody><tr><td><code>-n</code>, <code>--dry-run</code></td><td>Zeigt, was gelöscht würde, ohne zu löschen.</td></tr><tr><td><code>--expire=&lt;date&gt;</code></td><td>Prunet nur Objekte, die älter als das sind.</td></tr><tr><td><code>--progress</code></td><td>Zeigt Fortschritt.</td></tr><tr><td><code>--verbose</code></td><td>Detailliert jedes geprunte Objekt.</td></tr></tbody></table>
        <h2>Beispiele</h2>
        <pre><code>git prune -n
        # Vorschau auf das Pruning

        git prune --expire=now
        # Aggressiv: alle Unerreichbaren sofort löschen

        git prune --expire=2.weeks.ago
        # Standardverhalten: jüngste Unerreichbare behalten</code></pre>
        <h2>Häufige Fehler</h2>
        <p><code>git prune --expire=now</code> kann Objekte löschen, die noch im Reflog oder Stash sind, falls Sie diese kürzlich abgelaufen sind. Führen Sie immer zuerst <code>git fsck</code> aus, um zu verstehen, was auf dem Spiel steht. Auf einem ausgelasteten Repo kann das Prunen während eines Fetches oder Rebases Probleme verursachen.</p>
        <h2>Verwandte Befehle</h2>
        <p><code>git gc</code>, <code>git fsck</code>, <code>git reflog expire</code>, <code>git repack</code></p>
- source_title: git repack — Pack unpacked objects in a repository
  title: git repack — Ungepackte Objekte in einem Repository packen
  langcode: de
  body: |-
    <h2>Übersicht</h2>
        <pre><code>git repack [-a] [-d] [-l] [--depth=&lt;n&gt;] [--window=&lt;n&gt;]</code></pre>
        <h2>Beschreibung</h2>
        <p>Der <code>git repack</code>-Befehl packt die Objekte des Repositories neu, kombiniert mehrere Packs zu einem und bewegt optional lose Objekte in Packs. Es ist die primäre Methode, mit der Git kompakt bleibt. <code>git gc</code> ruft <code>repack</code> als Teil seiner Arbeit auf; manuelles <code>repack</code> bietet feinere Kontrolle über Delta-Such-Parameter.</p>
        <p>Im täglichen Einsatz integriert sich <code>git repack</code> eng mit Shell-Aliasen, Editor-Plugins und Continuous Integration. Power-User fügen oft Aliase hinzu, die Flags kombinieren, die sie immer übergeben, oder wickeln den Befehl in Skripte, die Teamkonventionen durchsetzen. Die Ausgabeformatierung kann über Git-Config angepasst werden — Pretty-Formate, Farbschemata und Pager-Verhalten sind alle einstellbar. Wenn etwas schiefgeht, ist der erste Diagnoseschritt üblicherweise, den Befehl erneut mit <code>GIT_TRACE=1</code> in der Umgebung auszuführen, was die zugrunde liegenden Plumbing-Aufrufe offenlegt. Für ungewöhnliche Situationen öffnet die <code>--help</code>-Ausgabe (<code>git repack --help</code>) die vollständige Manpage mit Details zu jeder Option, einschließlich solcher, die in alltäglichen Workflows selten verwendet werden, aber für Debugging oder Skripting im großen Maßstab essentiell sind.</p>
        <p>Zu verstehen, wie <code>git repack</code> mit dem Rest von Gits Datenmodell interagiert — der Objektdatenbank, dem Index, Refs und dem Working Tree — zahlt sich aus. Jeder Befehl operiert auf einer Teilmenge dieser Stücke, und zu wissen, welche er berührt, hilft Ergebnisse vorherzusagen und sich von Fehlern zu erholen. Das Lesen der offiziellen Git-Dokumentation neben praktischer Übung in einem Wegwerf-Repository ist der schnellste Weg, die Nuancen zu verinnerlichen. Die meisten Produktionsprobleme mit Git rühren von einer von drei Ursachen: überraschendem Standardverhalten, partiellen Netzwerkoperationen oder dem Umschreiben bereits geteilter Historie. Ein funktionierendes mentales Modell der Nebenwirkungen von <code>git repack</code> hilft, alle drei zu vermeiden.</p>
        <h2>Häufige Optionen</h2>
        <table><thead><tr><th>Option</th><th>Beschreibung</th></tr></thead><tbody><tr><td><code>-a</code></td><td>Packt alles Erreichbare in ein einzelnes Pack.</td></tr><tr><td><code>-A</code></td><td>Wie <code>-a</code>, aber behält Unerreichbare lose.</td></tr><tr><td><code>-d</code></td><td>Löscht überflüssige Packs nach dem Repacking.</td></tr><tr><td><code>-l</code></td><td>Übergibt <code>--local</code> an <code>pack-objects</code>.</td></tr><tr><td><code>--depth=&lt;n&gt;</code></td><td>Maximale Delta-Ketten-Tiefe.</td></tr><tr><td><code>--window=&lt;n&gt;</code></td><td>Fenstergröße für Delta-Auswahl.</td></tr><tr><td><code>-k</code>, <code>--keep-pack=&lt;name&gt;</code></td><td>Lässt das benannte Pack unberührt.</td></tr></tbody></table>
        <h2>Beispiele</h2>
        <pre><code>git repack -ad
        # Einzelnes Pack, überflüssige verwerfen

        git repack -a -d --depth=50 --window=250
        # Engere Packung für Speicherersparnis (langsamer)

        git repack -A -d
        # Unerreichbare zur Sicherheit lose belassen</code></pre>
        <h2>Häufige Fehler</h2>
        <p>Aggressive Parameter verbrauchen RAM und CPU im Verhältnis zum gesparten Platz unverhältnismäßig. Standardwerte sind vernünftig abgestimmt. Das Vergessen von <code>-d</code> nach <code>-a</code> hinterlässt doppelte Packs.</p>
        <h2>Verwandte Befehle</h2>
        <p><code>git gc</code>, <code>git pack-objects</code>, <code>git verify-pack</code>, <code>git prune</code></p>
- source_title: git maintenance — Run tasks to optimize Git repository data
  title: git maintenance — Aufgaben zur Optimierung von Git-Repository-Daten ausführen
  langcode: de
  body: |-
    <h2>Übersicht</h2>
        <pre><code>git maintenance start
    git maintenance run [--task=&lt;task&gt;]
    git maintenance stop</code></pre>
        <h2>Beschreibung</h2>
        <p>Der <code>git maintenance</code>-Befehl, eingeführt in Git 2.29, ersetzt und erweitert <code>git gc --auto</code> mit geplanten, feingranularen Wartungsaufgaben: Prefetch, Commit-Graph-Erzeugung, Lose-Objekt-Packing, inkrementelles Repack und pack-refs. Das Ausführen von <code>git maintenance start</code> registriert einen wiederkehrenden Zeitplan via cron, launchd, systemd oder Task Scheduler je nach Plattform.</p>
        <p>Für serverseitige oder langlebige Klone großer Repositories verbessert das Aktivieren von Maintenance die tägliche Reaktionsfähigkeit dramatisch. Operationen wie <code>git status</code> und <code>git log</code> werden schneller, da die Commit-Graph- und Reachable-Bitmap-Daten aktuell gehalten werden.</p>
        <p>Im täglichen Einsatz integriert sich <code>git maintenance</code> eng mit Shell-Aliasen, Editor-Plugins und Continuous Integration. Power-User fügen oft Aliase hinzu, die Flags kombinieren, die sie immer übergeben, oder wickeln den Befehl in Skripte, die Teamkonventionen durchsetzen. Die Ausgabeformatierung kann über Git-Config angepasst werden — Pretty-Formate, Farbschemata und Pager-Verhalten sind alle einstellbar. Wenn etwas schiefgeht, ist der erste Diagnoseschritt üblicherweise, den Befehl erneut mit <code>GIT_TRACE=1</code> in der Umgebung auszuführen, was die zugrunde liegenden Plumbing-Aufrufe offenlegt. Für ungewöhnliche Situationen öffnet die <code>--help</code>-Ausgabe (<code>git maintenance --help</code>) die vollständige Manpage mit Details zu jeder Option, einschließlich solcher, die in alltäglichen Workflows selten verwendet werden, aber für Debugging oder Skripting im großen Maßstab essentiell sind.</p>
        <p>Zu verstehen, wie <code>git maintenance</code> mit dem Rest von Gits Datenmodell interagiert — der Objektdatenbank, dem Index, Refs und dem Working Tree — zahlt sich aus. Jeder Befehl operiert auf einer Teilmenge dieser Stücke, und zu wissen, welche er berührt, hilft Ergebnisse vorherzusagen und sich von Fehlern zu erholen. Das Lesen der offiziellen Git-Dokumentation neben praktischer Übung in einem Wegwerf-Repository ist der schnellste Weg, die Nuancen zu verinnerlichen. Die meisten Produktionsprobleme mit Git rühren von einer von drei Ursachen: überraschendem Standardverhalten, partiellen Netzwerkoperationen oder dem Umschreiben bereits geteilter Historie. Ein funktionierendes mentales Modell der Nebenwirkungen von <code>git maintenance</code> hilft, alle drei zu vermeiden.</p>
        <h2>Häufige Optionen</h2>
        <table><thead><tr><th>Unterbefehl / Option</th><th>Beschreibung</th></tr></thead><tbody><tr><td><code>start</code></td><td>Registriert einen Hintergrund-Zeitplan.</td></tr><tr><td><code>stop</code></td><td>Hebt den Zeitplan auf.</td></tr><tr><td><code>run</code></td><td>Führt Aufgaben sofort aus.</td></tr><tr><td><code>--task=&lt;task&gt;</code></td><td>Führt nur diese Aufgabe aus (commit-graph, prefetch usw.).</td></tr><tr><td><code>register</code> / <code>unregister</code></td><td>Fügt Repo zum Maintenance-Set hinzu oder entfernt es.</td></tr><tr><td><code>--schedule=&lt;freq&gt;</code></td><td>Frequenz: hourly, daily, weekly.</td></tr></tbody></table>
        <h2>Beispiele</h2>
        <pre><code>git maintenance start
        # Hintergrund-Maintenance für dieses Repo einrichten

        git maintenance run --task=commit-graph
        # Den commit-graph auf Anforderung aktualisieren

        git maintenance run --task=prefetch
        # Upstream-Objekte fetchen, ohne Refs zu aktualisieren

        git maintenance unregister
        # Geplante Maintenance für dieses Repo stoppen</code></pre>
        <h2>Häufige Fehler</h2>
        <p>Vergessen, dass <code>start</code> eine systemweite geplante Aufgabe registriert. Auf gemeinsamen Maschinen ist das vielleicht nicht erwünscht; verwenden Sie stattdessen <code>register</code> in einer Konfigurationsdatei. Auto-gc zu deaktivieren, ohne Maintenance zu aktivieren, lässt das Repo ungezügelt wachsen.</p>
        <h2>Verwandte Befehle</h2>
        <p><code>git gc</code>, <code>git commit-graph</code>, <code>git fetch --prefetch</code>, <code>git repack</code></p>
- source_title: git pack-refs — Pack heads and tags for efficient repository access
  title: git pack-refs — Heads und Tags für effizienten Repository-Zugriff packen
  langcode: de
  body: |-
    <h2>Übersicht</h2>
        <pre><code>git pack-refs [--all] [--no-prune]</code></pre>
        <h2>Beschreibung</h2>
        <p>Der <code>git pack-refs</code>-Befehl konsolidiert viele einzelne Ref-Dateien (eine pro Branch/Tag in <code>.git/refs/</code>) in eine einzige <code>.git/packed-refs</code>-Datei. Das ist schneller auf Dateisystemen, in denen das Öffnen vieler kleiner Dateien langsam ist (älteres Windows, Netzwerk-Dateisysteme), und reduziert die Dateisystem-Last für Repos mit Tausenden von Refs.</p>
        <p>Im täglichen Einsatz integriert sich <code>git pack-refs</code> eng mit Shell-Aliasen, Editor-Plugins und Continuous Integration. Power-User fügen oft Aliase hinzu, die Flags kombinieren, die sie immer übergeben, oder wickeln den Befehl in Skripte, die Teamkonventionen durchsetzen. Die Ausgabeformatierung kann über Git-Config angepasst werden — Pretty-Formate, Farbschemata und Pager-Verhalten sind alle einstellbar. Wenn etwas schiefgeht, ist der erste Diagnoseschritt üblicherweise, den Befehl erneut mit <code>GIT_TRACE=1</code> in der Umgebung auszuführen, was die zugrunde liegenden Plumbing-Aufrufe offenlegt. Für ungewöhnliche Situationen öffnet die <code>--help</code>-Ausgabe (<code>git pack-refs --help</code>) die vollständige Manpage mit Details zu jeder Option, einschließlich solcher, die in alltäglichen Workflows selten verwendet werden, aber für Debugging oder Skripting im großen Maßstab essentiell sind.</p>
        <p>Zu verstehen, wie <code>git pack-refs</code> mit dem Rest von Gits Datenmodell interagiert — der Objektdatenbank, dem Index, Refs und dem Working Tree — zahlt sich aus. Jeder Befehl operiert auf einer Teilmenge dieser Stücke, und zu wissen, welche er berührt, hilft Ergebnisse vorherzusagen und sich von Fehlern zu erholen. Das Lesen der offiziellen Git-Dokumentation neben praktischer Übung in einem Wegwerf-Repository ist der schnellste Weg, die Nuancen zu verinnerlichen. Die meisten Produktionsprobleme mit Git rühren von einer von drei Ursachen: überraschendem Standardverhalten, partiellen Netzwerkoperationen oder dem Umschreiben bereits geteilter Historie. Ein funktionierendes mentales Modell der Nebenwirkungen von <code>git pack-refs</code> hilft, alle drei zu vermeiden.</p>
        <h2>Häufige Optionen</h2>
        <table><thead><tr><th>Option</th><th>Beschreibung</th></tr></thead><tbody><tr><td><code>--all</code></td><td>Packt alle Refs (Standard packt nur Branches und Tags).</td></tr><tr><td><code>--no-prune</code></td><td>Entfernt einzelne Ref-Dateien nach dem Packen nicht.</td></tr></tbody></table>
        <h2>Beispiele</h2>
        <pre><code>git pack-refs --all
        # Jede Ref in packed-refs packen

        ls .git/refs/heads/ | wc -l
        # Nach dem Packen sind einzelne Dateien entfernt

        git pack-refs
        # Standard: Branches und Tags packen</code></pre>
        <h2>Häufige Fehler</h2>
        <p><code>packed-refs</code> von Hand zu bearbeiten kann das Repository korrumpieren — verwenden Sie <code>git update-ref</code>. Nach <code>pack-refs</code> schlagen Skripte fehl, die nach einzelnen Dateien in <code>.git/refs/heads/</code> suchen. Verwenden Sie <code>git for-each-ref</code> für eine portable Suche.</p>
        <h2>Verwandte Befehle</h2>
        <p><code>git gc</code>, <code>git update-ref</code>, <code>git for-each-ref</code>, <code>git maintenance</code></p>
- source_title: git am — Apply a series of patches from a mailbox
  title: git am — Eine Folge von Patches aus einer Mailbox anwenden
  langcode: de
  body: |-
    <h2>Übersicht</h2>
        <pre><code>git am [--3way] [--abort] [--continue] [--skip] &lt;mbox&gt;...</code></pre>
        <h2>Beschreibung</h2>
        <p>Der <code>git am</code>-Befehl wendet Patches aus einer Mailbox-Datei an — der Art, die von <code>git format-patch</code> erzeugt oder durch das Mailen eines Diffs generiert wird. Anders als <code>git apply</code>, das nur den Diff-Inhalt anwendet, erstellt <code>git am</code> jeden Patch als Commit neu und bewahrt den Autor, das Datum, die Nachricht und andere in der E-Mail eingebettete Metadaten.</p>
        <p>Das ist die Grundlage des E-Mail-basierten Beitrags-Workflows, der vom Linux-Kernel und anderen Projekten verwendet wird: Maintainer empfangen Patches per E-Mail, speichern sie in einer Mailbox und wenden sie mit <code>git am</code> an. Das Ergebnis ist genau dieselbe Reihe von Commits, die der Autor erstellt hat.</p>
        <p>Im täglichen Einsatz integriert sich <code>git am</code> eng mit Shell-Aliasen, Editor-Plugins und Continuous Integration. Power-User fügen oft Aliase hinzu, die Flags kombinieren, die sie immer übergeben, oder wickeln den Befehl in Skripte, die Teamkonventionen durchsetzen. Die Ausgabeformatierung kann über Git-Config angepasst werden — Pretty-Formate, Farbschemata und Pager-Verhalten sind alle einstellbar. Wenn etwas schiefgeht, ist der erste Diagnoseschritt üblicherweise, den Befehl erneut mit <code>GIT_TRACE=1</code> in der Umgebung auszuführen, was die zugrunde liegenden Plumbing-Aufrufe offenlegt. Für ungewöhnliche Situationen öffnet die <code>--help</code>-Ausgabe (<code>git am --help</code>) die vollständige Manpage mit Details zu jeder Option, einschließlich solcher, die in alltäglichen Workflows selten verwendet werden, aber für Debugging oder Skripting im großen Maßstab essentiell sind.</p>
        <p>Zu verstehen, wie <code>git am</code> mit dem Rest von Gits Datenmodell interagiert — der Objektdatenbank, dem Index, Refs und dem Working Tree — zahlt sich aus. Jeder Befehl operiert auf einer Teilmenge dieser Stücke, und zu wissen, welche er berührt, hilft Ergebnisse vorherzusagen und sich von Fehlern zu erholen. Das Lesen der offiziellen Git-Dokumentation neben praktischer Übung in einem Wegwerf-Repository ist der schnellste Weg, die Nuancen zu verinnerlichen. Die meisten Produktionsprobleme mit Git rühren von einer von drei Ursachen: überraschendem Standardverhalten, partiellen Netzwerkoperationen oder dem Umschreiben bereits geteilter Historie. Ein funktionierendes mentales Modell der Nebenwirkungen von <code>git am</code> hilft, alle drei zu vermeiden.</p>
        <h2>Häufige Optionen</h2>
        <table><thead><tr><th>Option</th><th>Beschreibung</th></tr></thead><tbody><tr><td><code>--3way</code></td><td>Fällt auf Three-Way-Merge zurück, falls der Patch nicht sauber anwendbar ist.</td></tr><tr><td><code>--abort</code></td><td>Bricht ein laufendes am ab.</td></tr><tr><td><code>--continue</code> / <code>--resolved</code></td><td>Setzt nach Konfliktauflösung fort.</td></tr><tr><td><code>--skip</code></td><td>Überspringt den aktuellen Patch.</td></tr><tr><td><code>-s</code>, <code>--signoff</code></td><td>Fügt Signed-off-by-Trailer hinzu.</td></tr><tr><td><code>-k</code></td><td>Übergibt <code>-k</code> an <code>mailinfo</code> (Betreff behalten).</td></tr><tr><td><code>--whitespace=&lt;action&gt;</code></td><td>Behandlung von Whitespace-Fehlern.</td></tr></tbody></table>
        <h2>Beispiele</h2>
        <pre><code>git am patches/*.patch
        # Eine Reihe von format-patch-Ausgaben anwenden

        git am --3way --signoff incoming.mbox
        # Three-Way-Merge-Fallback, Sign-Off-Zeilen hinzufügen

        git am --abort
        # Nach hoffnungslosem Konflikt abbrechen

        curl -L https://lore.kernel.org/.../t.mbox.gz | gunzip | git am --3way
        # Patches von einer öffentlichen Liste herunterladen und anwenden</code></pre>
        <h2>Häufige Fehler</h2>
        <p>Vergessen, <code>--3way</code> zu verwenden, wenn Patches gegen eine leicht andere Basis erzeugt wurden, führt oft zu Fehlern, die <code>--3way</code> behandeln würde. Nach dem Lösen eines Konflikts führen Sie <code>git am --continue</code> aus, NICHT <code>git commit</code>. Einfaches <code>commit</code> erzeugt einen fehlerhaften Zustand.</p>
        <h2>Verwandte Befehle</h2>
        <p><code>git apply</code>, <code>git format-patch</code>, <code>git send-email</code>, <code>git mailinfo</code></p>
- source_title: git format-patch — Prepare patches for email submission
  title: git format-patch — Patches für den E-Mail-Versand vorbereiten
  langcode: de
  body: |-
    <h2>Übersicht</h2>
        <pre><code>git format-patch [&lt;options&gt;] &lt;range&gt;
    git format-patch -1 &lt;commit&gt;</code></pre>
        <h2>Beschreibung</h2>
        <p>Der <code>git format-patch</code>-Befehl erzeugt eine Mailbox-formatierte Patch-Datei pro Commit in einem Bereich, bereit zum Anwenden mit <code>git am</code> oder zum Versenden mit <code>git send-email</code>. Jeder Patch enthält die Commit-Nachricht, den Autor, das Datum und den Diff. Patches sind nummeriert (<code>0001-...</code>, <code>0002-...</code>), sodass sie der Reihe nach angewendet werden.</p>
        <p>Das ist das Format, das der Linux-Kernel und viele Open-Source-Projekte für Code-Review auf Mailinglisten verwenden. Selbst Projekte, die Pull Requests verwenden, akzeptieren manchmal Patches per E-Mail, und <code>format-patch</code> ist der Standard-Erzeuger.</p>
        <p>Im täglichen Einsatz integriert sich <code>git format-patch</code> eng mit Shell-Aliasen, Editor-Plugins und Continuous Integration. Power-User fügen oft Aliase hinzu, die Flags kombinieren, die sie immer übergeben, oder wickeln den Befehl in Skripte, die Teamkonventionen durchsetzen. Die Ausgabeformatierung kann über Git-Config angepasst werden — Pretty-Formate, Farbschemata und Pager-Verhalten sind alle einstellbar. Wenn etwas schiefgeht, ist der erste Diagnoseschritt üblicherweise, den Befehl erneut mit <code>GIT_TRACE=1</code> in der Umgebung auszuführen, was die zugrunde liegenden Plumbing-Aufrufe offenlegt. Für ungewöhnliche Situationen öffnet die <code>--help</code>-Ausgabe (<code>git format-patch --help</code>) die vollständige Manpage mit Details zu jeder Option, einschließlich solcher, die in alltäglichen Workflows selten verwendet werden, aber für Debugging oder Skripting im großen Maßstab essentiell sind.</p>
        <p>Zu verstehen, wie <code>git format-patch</code> mit dem Rest von Gits Datenmodell interagiert — der Objektdatenbank, dem Index, Refs und dem Working Tree — zahlt sich aus. Jeder Befehl operiert auf einer Teilmenge dieser Stücke, und zu wissen, welche er berührt, hilft Ergebnisse vorherzusagen und sich von Fehlern zu erholen. Das Lesen der offiziellen Git-Dokumentation neben praktischer Übung in einem Wegwerf-Repository ist der schnellste Weg, die Nuancen zu verinnerlichen. Die meisten Produktionsprobleme mit Git rühren von einer von drei Ursachen: überraschendem Standardverhalten, partiellen Netzwerkoperationen oder dem Umschreiben bereits geteilter Historie. Ein funktionierendes mentales Modell der Nebenwirkungen von <code>git format-patch</code> hilft, alle drei zu vermeiden.</p>
        <h2>Häufige Optionen</h2>
        <table><thead><tr><th>Option</th><th>Beschreibung</th></tr></thead><tbody><tr><td><code>-&lt;n&gt;</code></td><td>Erzeugt Patches für die letzten <code>n</code> Commits.</td></tr><tr><td><code>-o &lt;dir&gt;</code></td><td>Schreibt Patches in ein Verzeichnis.</td></tr><tr><td><code>--cover-letter</code></td><td>Erzeugt einen 0000-Begleitbrief für die Serie.</td></tr><tr><td><code>-v &lt;n&gt;</code>, <code>--reroll-count=&lt;n&gt;</code></td><td>Markiert Patches als n-te Iteration.</td></tr><tr><td><code>--subject-prefix=&lt;prefix&gt;</code></td><td>Eigenes Betreff-Präfix (Standard <code>PATCH</code>).</td></tr><tr><td><code>--to=&lt;addr&gt;</code> / <code>--cc=&lt;addr&gt;</code></td><td>Empfänger in Headern hinzufügen.</td></tr><tr><td><code>--thread</code></td><td>Fügt In-Reply-To-Header hinzu.</td></tr></tbody></table>
        <h2>Beispiele</h2>
        <pre><code>git format-patch -3
        # Patches für die letzten 3 Commits, im aktuellen Verzeichnis

        git format-patch -o ../patches main..feature
        # Patches von main bis feature, nach ../patches/

        git format-patch --cover-letter -v2 origin/main
        # Versionierte Serie mit Begleitbrief

        git format-patch --subject-prefix="PATCH myproj" -1 HEAD
        # Eigener Betreff für eine projektspezifische Liste</code></pre>
        <h2>Häufige Fehler</h2>
        <p>Patches gegen die falsche Basis zu erzeugen produziert Apply-Fehler für Reviewer — wählen Sie den richtigen Upstream. Ohne <code>--cover-letter</code> hat eine Multi-Patch-Serie keine Einleitung; Reviewer schätzen eine. Reroll ohne <code>-v</code> erzeugt Mehrdeutigkeit, welche Version reviewt wird.</p>
        <h2>Verwandte Befehle</h2>
        <p><code>git am</code>, <code>git send-email</code>, <code>git request-pull</code>, <code>git range-diff</code></p>
- source_title: git request-pull — Generate a summary of pending changes
  title: git request-pull — Eine Zusammenfassung ausstehender Änderungen erzeugen
  langcode: de
  body: |-
    <h2>Übersicht</h2>
        <pre><code>git request-pull [-p] &lt;start&gt; &lt;url&gt; [&lt;end&gt;]</code></pre>
        <h2>Beschreibung</h2>
        <p>Der <code>git request-pull</code>-Befehl erzeugt eine textuelle Zusammenfassung, die einen Upstream-Maintainer bittet, Änderungen aus Ihrem Repository zu pullen. Die Ausgabe enthält eine Liste von Commits im Bereich, ein Diffstat, die URL und Ref zum Pullen und (falls zutreffend) den SHA der getaggten Version. Es ist die Standardmethode, einen Pull Request per E-Mail auf von Mailinglisten getriebenen Projekten zu senden.</p>
        <p>Das ist nicht verwandt mit GitHub/GitLab Pull Requests — es ist älter. Die Ausgabe ist dazu gedacht, in eine E-Mail an den Upstream-Maintainer eingefügt zu werden.</p>
        <p>Im täglichen Einsatz integriert sich <code>git request-pull</code> eng mit Shell-Aliasen, Editor-Plugins und Continuous Integration. Power-User fügen oft Aliase hinzu, die Flags kombinieren, die sie immer übergeben, oder wickeln den Befehl in Skripte, die Teamkonventionen durchsetzen. Die Ausgabeformatierung kann über Git-Config angepasst werden — Pretty-Formate, Farbschemata und Pager-Verhalten sind alle einstellbar. Wenn etwas schiefgeht, ist der erste Diagnoseschritt üblicherweise, den Befehl erneut mit <code>GIT_TRACE=1</code> in der Umgebung auszuführen, was die zugrunde liegenden Plumbing-Aufrufe offenlegt. Für ungewöhnliche Situationen öffnet die <code>--help</code>-Ausgabe (<code>git request-pull --help</code>) die vollständige Manpage mit Details zu jeder Option, einschließlich solcher, die in alltäglichen Workflows selten verwendet werden, aber für Debugging oder Skripting im großen Maßstab essentiell sind.</p>
        <p>Zu verstehen, wie <code>git request-pull</code> mit dem Rest von Gits Datenmodell interagiert — der Objektdatenbank, dem Index, Refs und dem Working Tree — zahlt sich aus. Jeder Befehl operiert auf einer Teilmenge dieser Stücke, und zu wissen, welche er berührt, hilft Ergebnisse vorherzusagen und sich von Fehlern zu erholen. Das Lesen der offiziellen Git-Dokumentation neben praktischer Übung in einem Wegwerf-Repository ist der schnellste Weg, die Nuancen zu verinnerlichen. Die meisten Produktionsprobleme mit Git rühren von einer von drei Ursachen: überraschendem Standardverhalten, partiellen Netzwerkoperationen oder dem Umschreiben bereits geteilter Historie. Ein funktionierendes mentales Modell der Nebenwirkungen von <code>git request-pull</code> hilft, alle drei zu vermeiden.</p>
        <h2>Häufige Optionen</h2>
        <table><thead><tr><th>Option</th><th>Beschreibung</th></tr></thead><tbody><tr><td><code>-p</code></td><td>Bezieht den vollen Patch in die Ausgabe ein.</td></tr></tbody></table>
        <h2>Beispiele</h2>
        <pre><code>git request-pull v1.0 https://github.com/me/proj.git my-feature
        # Zusammenfassung mit der Bitte, my-feature von meinem Fork zu pullen

        git request-pull origin/main https://example.com/me/proj.git HEAD
        # Pull Request basierend auf dem, was vor Upstream main ist

        git request-pull -p v2.0 git@my.server:proj.git release-2.1 | mail -s "Pull request" maintainer@example.com
        # Einen Pull Request mit vollem Patch mailen</code></pre>
        <h2>Häufige Fehler</h2>
        <p>Den falschen Startpunkt anzugeben macht den Diff-Bereich sinnlos. Führen Sie zuerst <code>git log</code> aus, um den Bereich zu bestätigen. Die Remote-URL muss für den Maintainer zugänglich sein; private URLs erzeugen nutzlose Anfragen.</p>
        <h2>Verwandte Befehle</h2>
        <p><code>git format-patch</code>, <code>git send-email</code>, <code>git tag</code>, <code>git log</code></p>
- source_title: git send-email — Send a collection of patches as emails
  title: git send-email — Eine Sammlung von Patches als E-Mails versenden
  langcode: de
  body: |-
    <h2>Übersicht</h2>
        <pre><code>git send-email [--to &lt;addr&gt;] [--cc &lt;addr&gt;] [--cover-letter] &lt;patch-or-dir&gt;...</code></pre>
        <h2>Beschreibung</h2>
        <p>Der <code>git send-email</code>-Befehl sendet einen oder mehrere Patches per SMTP, jeden als ordentlich verthreadete E-Mail. Es ist das kanonische Werkzeug zum Einreichen von Patches bei mailinglisten-getriebenen Projekten (Linux-Kernel, Git selbst, U-Boot usw.). Es kann SMTP-Credentials aus Ihrer Git-Konfiguration lesen, interaktiv abfragen oder Authentifizierungsdateien verwenden.</p>
        <p>Patches werden der Reihe nach gesendet, mit <code>In-Reply-To</code>-Headern, die sie zu einem einzelnen Thread verbinden. Der Begleitbrief (falls vorhanden) wird zuerst als Eltern des Threads gesendet.</p>
        <p>Im täglichen Einsatz integriert sich <code>git send-email</code> eng mit Shell-Aliasen, Editor-Plugins und Continuous Integration. Power-User fügen oft Aliase hinzu, die Flags kombinieren, die sie immer übergeben, oder wickeln den Befehl in Skripte, die Teamkonventionen durchsetzen. Die Ausgabeformatierung kann über Git-Config angepasst werden — Pretty-Formate, Farbschemata und Pager-Verhalten sind alle einstellbar. Wenn etwas schiefgeht, ist der erste Diagnoseschritt üblicherweise, den Befehl erneut mit <code>GIT_TRACE=1</code> in der Umgebung auszuführen, was die zugrunde liegenden Plumbing-Aufrufe offenlegt. Für ungewöhnliche Situationen öffnet die <code>--help</code>-Ausgabe (<code>git send-email --help</code>) die vollständige Manpage mit Details zu jeder Option, einschließlich solcher, die in alltäglichen Workflows selten verwendet werden, aber für Debugging oder Skripting im großen Maßstab essentiell sind.</p>
        <p>Zu verstehen, wie <code>git send-email</code> mit dem Rest von Gits Datenmodell interagiert — der Objektdatenbank, dem Index, Refs und dem Working Tree — zahlt sich aus. Jeder Befehl operiert auf einer Teilmenge dieser Stücke, und zu wissen, welche er berührt, hilft Ergebnisse vorherzusagen und sich von Fehlern zu erholen. Das Lesen der offiziellen Git-Dokumentation neben praktischer Übung in einem Wegwerf-Repository ist der schnellste Weg, die Nuancen zu verinnerlichen. Die meisten Produktionsprobleme mit Git rühren von einer von drei Ursachen: überraschendem Standardverhalten, partiellen Netzwerkoperationen oder dem Umschreiben bereits geteilter Historie. Ein funktionierendes mentales Modell der Nebenwirkungen von <code>git send-email</code> hilft, alle drei zu vermeiden.</p>
        <h2>Häufige Optionen</h2>
        <table><thead><tr><th>Option</th><th>Beschreibung</th></tr></thead><tbody><tr><td><code>--to=&lt;addr&gt;</code></td><td>Hauptempfänger.</td></tr><tr><td><code>--cc=&lt;addr&gt;</code></td><td>Carbon Copy.</td></tr><tr><td><code>--smtp-server=&lt;host&gt;</code></td><td>SMTP-Server (oder sendmail-Pfad).</td></tr><tr><td><code>--smtp-user=&lt;user&gt;</code></td><td>SMTP-Benutzername.</td></tr><tr><td><code>--annotate</code></td><td>Erlaubt das Bearbeiten jedes Patches vor dem Senden.</td></tr><tr><td><code>--dry-run</code></td><td>Zeigt, was gesendet würde.</td></tr><tr><td><code>--in-reply-to=&lt;message-id&gt;</code></td><td>Threadet unter eine bestehende Nachricht.</td></tr><tr><td><code>--confirm=&lt;mode&gt;</code></td><td>Bestätigungs-Verhalten (always, never, cc).</td></tr></tbody></table>
        <h2>Beispiele</h2>
        <pre><code>git send-email --to=devs@example.org *.patch
        # Alle Patches im aktuellen Verzeichnis an eine Liste senden

        git send-email --cover-letter --to=git@vger.kernel.org \
          --cc=maintainer@example.com 0001-*.patch
        # Serie mit Begleitbrief, Hauptempfänger + cc

        git send-email --dry-run --annotate -1 HEAD
        # Vorschau eines einzelnen Patches ohne Senden

        git config --global sendemail.smtpServer smtp.gmail.com
        git config --global sendemail.smtpServerPort 587
        git config --global sendemail.smtpEncryption tls
        # Einmalige SMTP-Konfiguration</code></pre>
        <h2>Häufige Fehler</h2>
        <p>Viele Unternehmens-SMTP-Server blockieren reines SMTP — verwenden Sie TLS oder app-spezifische Passwörter. Vergessen, <code>--cover-letter</code> beim Senden einer Multi-Patch-Serie hinzuzufügen, lässt Reviewer ohne Kontext. Eine Re-Roll ohne <code>--in-reply-to</code> auf den ursprünglichen Begleitbrief fragmentiert die Diskussion.</p>
        <h2>Verwandte Befehle</h2>
        <p><code>git format-patch</code>, <code>git am</code>, <code>git request-pull</code>, <code>git config</code></p>
