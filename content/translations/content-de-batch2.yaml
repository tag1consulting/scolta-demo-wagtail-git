        <table><thead><tr><th>Option</th><th>Beschreibung</th></tr></thead><tbody><tr><td><code>--count</code></td><td>Gibt nur die Anzahl der Commits aus.</td></tr><tr><td><code>--max-count=&lt;n&gt;</code></td><td>Begrenzt die Anzahl aufzulistender Commits.</td></tr><tr><td><code>--reverse</code></td><td>Älteste zuerst ausgeben.</td></tr><tr><td><code>--no-merges</code></td><td>Schließt Merge-Commits aus.</td></tr><tr><td><code>--first-parent</code></td><td>Folgt nur dem ersten Elternteil jedes Merges.</td></tr><tr><td><code>--ancestry-path</code></td><td>Beschränkt auf Commits zwischen zwei Endpunkten.</td></tr><tr><td><code>--all</code></td><td>Bezieht jede Ref als Startpunkt ein.</td></tr></tbody></table>
        <h2>Beispiele</h2>
        <pre><code>git rev-list --count HEAD
        # Gesamtzahl der von HEAD aus erreichbaren Commits

        git rev-list main..feature
        # SHAs, die nur auf feature liegen

        git rev-list --no-merges --since="1 month ago" main
        # Nicht-Merge-Commits im letzten Monat

        git rev-list --max-parents=0 HEAD
        # Wurzel-Commits finden (keine Eltern)</code></pre>
        <h2>Häufige Fehler</h2>
        <p>Vergessen, dass Bereiche mit zwei Punkten von der linken Seite aus erreichbare Commits ausschließen. <code>--first-parent</code> ändert die Bedeutung von "Vorfahrenschaft" erheblich. Auf riesigen Repos kann unbegrenztes rev-list langsam sein — paaren Sie mit <code>--max-count</code> oder Pfadfiltern.</p>
