        <h2>Häufige Optionen</h2>
        <table><thead><tr><th>Option</th><th>Beschreibung</th></tr></thead><tbody><tr><td><code>-p &lt;parent&gt;</code></td><td>Eltern-Commit (kann mehrfach für Merges sein).</td></tr><tr><td><code>-m &lt;msg&gt;</code></td><td>Commit-Nachricht.</td></tr><tr><td><code>-F &lt;file&gt;</code></td><td>Liest Nachricht aus Datei.</td></tr><tr><td><code>-S</code></td><td>GPG-signiert den Commit.</td></tr><tr><td><code>--no-gpg-sign</code></td><td>Überspringt Signierung.</td></tr></tbody></table>
        <h2>Beispiele</h2>
        <pre><code>echo "Initial" | git commit-tree $(git write-tree)
        # Einen Wurzel-Commit ohne Eltern erzeugen

        git commit-tree $TREE -p $PARENT -m "msg"
        # Standard-Commit mit einem Elternteil

        git commit-tree $TREE -p $P1 -p $P2 -m "merge"
        # Merge-Commit mit zwei Eltern</code></pre>
