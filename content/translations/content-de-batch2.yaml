        <h2>Häufige Optionen</h2>
        <table><thead><tr><th>Option</th><th>Beschreibung</th></tr></thead><tbody><tr><td><code>--httpd=&lt;daemon&gt;</code></td><td>Zu verwendender Webserver.</td></tr><tr><td><code>--port=&lt;n&gt;</code></td><td>Port zum Lauschen (Standard 1234).</td></tr><tr><td><code>--start</code></td><td>Startet den Server.</td></tr><tr><td><code>--stop</code></td><td>Stoppt den Server.</td></tr><tr><td><code>--restart</code></td><td>Startet ihn neu.</td></tr><tr><td><code>--browser=&lt;cmd&gt;</code></td><td>Zu öffnender Browser.</td></tr></tbody></table>
        <h2>Beispiele</h2>
        <pre><code>git instaweb --httpd=webrick
        # gitweb mit Rubys WEBrick als Backend starten

        git instaweb --port=8080 --start
        # Auf einem eigenen Port

        git instaweb --stop
        # Abbauen

        git config --global instaweb.httpd webrick
        # Standard für künftige Aufrufe speichern</code></pre>
        <h2>Häufige Fehler</h2>
        <p>Fehlende Abhängigkeiten (Perl-Module für gitweb, der gewählte httpd) verursachen kryptische Fehler. Manche Distros liefern gitweb in einem separaten Paket. Für moderne Bedürfnisse ziehen Sie <code>cgit</code> oder gehostete Dienste in Betracht.</p>
