        <p><code>gitweb</code>, <code>git daemon</code>, <code>git http-backend</code>, <code>git config</code></p>
- source_title: git add -p — Interactive patch staging
  title: git add -p — Interaktives Patch-Staging
  langcode: de
  body: |-
    <h2>Übersicht</h2>
        <pre><code>git add -p [&lt;path&gt;...]
    git add --patch [&lt;path&gt;...]</code></pre>
        <h2>Beschreibung</h2>
        <p>Der <code>git add -p</code>-Befehl startet eine interaktive Oberfläche, die durch jeden "Hunk" von Änderungen in Ihrem Working Tree geht und Sie für jeden bittet zu entscheiden: stagen, überspringen, splitten, bearbeiten usw. Das ist die Geheimwaffe zum Erstellen sauberer, atomarer Commits, wenn Ihr Working Tree eine Mischung verwandter und unzusammenhängender Änderungen enthält.</p>
        <p>Die interaktive Eingabeaufforderung akzeptiert Einzelbuchstaben-Befehle: <code>y</code> (ja, diesen Hunk stagen), <code>n</code> (nein, überspringen), <code>s</code> (in kleinere Hunks splitten), <code>e</code> (Hunk manuell bearbeiten), <code>q</code> (beenden), <code>?</code> (Hilfe) und mehrere andere. <code>add -p</code> zu meistern ist eine der hochwertigsten Fähigkeiten zur Erzeugung reviewbarer Historie.</p>
        <p>Im täglichen Einsatz integriert sich <code>git add -p</code> eng mit Shell-Aliasen, Editor-Plugins und Continuous Integration. Power-User fügen oft Aliase hinzu, die Flags kombinieren, die sie immer übergeben, oder wickeln den Befehl in Skripte, die Teamkonventionen durchsetzen. Die Ausgabeformatierung kann über Git-Config angepasst werden — Pretty-Formate, Farbschemata und Pager-Verhalten sind alle einstellbar. Wenn etwas schiefgeht, ist der erste Diagnoseschritt üblicherweise, den Befehl erneut mit <code>GIT_TRACE=1</code> in der Umgebung auszuführen, was die zugrunde liegenden Plumbing-Aufrufe offenlegt. Für ungewöhnliche Situationen öffnet die <code>--help</code>-Ausgabe (<code>git add -p --help</code>) die vollständige Manpage mit Details zu jeder Option, einschließlich solcher, die in alltäglichen Workflows selten verwendet werden, aber für Debugging oder Skripting im großen Maßstab essentiell sind.</p>
        <p>Zu verstehen, wie <code>git add -p</code> mit dem Rest von Gits Datenmodell interagiert — der Objektdatenbank, dem Index, Refs und dem Working Tree — zahlt sich aus. Jeder Befehl operiert auf einer Teilmenge dieser Stücke, und zu wissen, welche er berührt, hilft Ergebnisse vorherzusagen und sich von Fehlern zu erholen. Das Lesen der offiziellen Git-Dokumentation neben praktischer Übung in einem Wegwerf-Repository ist der schnellste Weg, die Nuancen zu verinnerlichen. Die meisten Produktionsprobleme mit Git rühren von einer von drei Ursachen: überraschendem Standardverhalten, partiellen Netzwerkoperationen oder dem Umschreiben bereits geteilter Historie. Ein funktionierendes mentales Modell der Nebenwirkungen von <code>git add -p</code> hilft, alle drei zu vermeiden.</p>
        <h2>Häufige Optionen</h2>
        <table><thead><tr><th>Interaktiver Befehl</th><th>Beschreibung</th></tr></thead><tbody><tr><td><code>y</code></td><td>Diesen Hunk stagen.</td></tr><tr><td><code>n</code></td><td>Diesen Hunk nicht stagen.</td></tr><tr><td><code>s</code></td><td>In kleinere Hunks splitten.</td></tr><tr><td><code>e</code></td><td>Den Hunk manuell bearbeiten.</td></tr><tr><td><code>a</code></td><td>Diesen und alle verbleibenden Hunks in dieser Datei stagen.</td></tr><tr><td><code>d</code></td><td>Diesen und alle verbleibenden Hunks in dieser Datei überspringen.</td></tr><tr><td><code>q</code></td><td>Beenden; keine weiteren Hunks stagen.</td></tr><tr><td><code>?</code></td><td>Hilfe anzeigen.</td></tr></tbody></table>
        <h2>Beispiele</h2>
        <pre><code>git add -p
        # Durch die Hunks jeder geänderten Datei gehen

        git add -p src/auth.go
        # Auf eine Datei beschränken

        # In der Eingabeaufforderung:
        # 's' drücken, um einen großen Hunk in kleinere zu splitten
        # 'e' drücken, um den Hunk-Text manuell zu bearbeiten
        # 'y' oder 'n' drücken, um zu akzeptieren oder zu überspringen

        git diff --cached
        # Überprüfen, was jetzt gestaged ist</code></pre>
        <h2>Häufige Fehler</h2>
        <p>Einen Hunk mit <code>e</code> zu bearbeiten erfordert das Verständnis des Unified-Diff-Formats — eine Zeile hinzufügen bedeutet, die neue Datei hat sie, eine Kontextzeile entfernen bedeutet, die neue Datei hat sie nicht. Fehler hier können verwirrenden Index-Zustand erzeugen. Verifizieren Sie immer mit <code>git diff --cached</code> danach.</p>
        <h2>Verwandte Befehle</h2>
        <p><code>git add</code>, <code>git stash -p</code>, <code>git restore -p</code>, <code>git checkout -p</code></p>
- source_title: git update-index — Register file contents in the working tree to the index
  title: git update-index — Dateiinhalte aus dem Working Tree im Index registrieren
  langcode: de
  body: |-
    <h2>Übersicht</h2>
        <pre><code>git update-index [--add] [--remove] [--refresh] [--assume-unchanged] &lt;file&gt;...</code></pre>
        <h2>Beschreibung</h2>
        <p>Der <code>git update-index</code>-Befehl ist das Plumbing hinter <code>git add</code>. Er zeichnet Dateiinhalte im Index per SHA auf, verwaltet Flags wie <code>assume-unchanged</code> und <code>skip-worktree</code> und aktualisiert Index-Zeitstempel. Die meisten Porcelain-Operationen rufen ihn auf.</p>
        <p>Im täglichen Einsatz integriert sich <code>git update-index</code> eng mit Shell-Aliasen, Editor-Plugins und Continuous Integration. Power-User fügen oft Aliase hinzu, die Flags kombinieren, die sie immer übergeben, oder wickeln den Befehl in Skripte, die Teamkonventionen durchsetzen. Die Ausgabeformatierung kann über Git-Config angepasst werden — Pretty-Formate, Farbschemata und Pager-Verhalten sind alle einstellbar. Wenn etwas schiefgeht, ist der erste Diagnoseschritt üblicherweise, den Befehl erneut mit <code>GIT_TRACE=1</code> in der Umgebung auszuführen, was die zugrunde liegenden Plumbing-Aufrufe offenlegt. Für ungewöhnliche Situationen öffnet die <code>--help</code>-Ausgabe (<code>git update-index --help</code>) die vollständige Manpage mit Details zu jeder Option, einschließlich solcher, die in alltäglichen Workflows selten verwendet werden, aber für Debugging oder Skripting im großen Maßstab essentiell sind.</p>
        <p>Zu verstehen, wie <code>git update-index</code> mit dem Rest von Gits Datenmodell interagiert — der Objektdatenbank, dem Index, Refs und dem Working Tree — zahlt sich aus. Jeder Befehl operiert auf einer Teilmenge dieser Stücke, und zu wissen, welche er berührt, hilft Ergebnisse vorherzusagen und sich von Fehlern zu erholen. Das Lesen der offiziellen Git-Dokumentation neben praktischer Übung in einem Wegwerf-Repository ist der schnellste Weg, die Nuancen zu verinnerlichen. Die meisten Produktionsprobleme mit Git rühren von einer von drei Ursachen: überraschendem Standardverhalten, partiellen Netzwerkoperationen oder dem Umschreiben bereits geteilter Historie. Ein funktionierendes mentales Modell der Nebenwirkungen von <code>git update-index</code> hilft, alle drei zu vermeiden.</p>
        <h2>Häufige Optionen</h2>
        <table><thead><tr><th>Option</th><th>Beschreibung</th></tr></thead><tbody><tr><td><code>--add</code></td><td>Fügt Dateien hinzu, die noch nicht im Index sind.</td></tr><tr><td><code>--remove</code></td><td>Entfernt Dateien aus dem Index.</td></tr><tr><td><code>--refresh</code></td><td>Frischt Stat-Info ohne Änderung des Inhalts auf.</td></tr><tr><td><code>--assume-unchanged</code></td><td>Sagt Git, diese Datei nicht auf Änderungen zu prüfen.</td></tr><tr><td><code>--no-assume-unchanged</code></td><td>Kehrt das Flag um.</td></tr><tr><td><code>--skip-worktree</code></td><td>Lässt Git Working-Tree-Änderungen ignorieren.</td></tr><tr><td><code>--chmod=(+|-)x</code></td><td>Ändert Executable-Bit.</td></tr><tr><td><code>--cacheinfo &lt;mode&gt; &lt;sha&gt; &lt;path&gt;</code></td><td>Fügt einen Eintrag manuell in den Index ein.</td></tr></tbody></table>
        <h2>Beispiele</h2>
        <pre><code>git update-index --assume-unchanged config/local.yml
        # Tracking lokaler Bearbeitungen einer Konfigurationsdatei stoppen

        git update-index --no-assume-unchanged config/local.yml
        # Normales Tracking fortsetzen

        git update-index --chmod=+x scripts/run.sh
        # Eine Datei ohne Inhaltänderung ausführbar machen

        git ls-files --debug
        # Index-Einträge mit ihren Flags anzeigen</code></pre>
        <h2>Häufige Fehler</h2>
        <p><code>--assume-unchanged</code> ist ein Performance-Hinweis und keine Sicherheitsmaßnahme — Git kann Änderungen trotzdem bemerken. Für Dateien, die Sie wirklich nie verfolgen wollen, ziehen Sie eine andere Lösung in Betracht (gitignore + Vorlagen-Datei).</p>
        <h2>Verwandte Befehle</h2>
        <p><code>git add</code>, <code>git rm</code>, <code>git ls-files</code>, <code>git read-tree</code></p>
- source_title: git read-tree — Read tree information into the index
  title: git read-tree — Tree-Informationen in den Index einlesen
  langcode: de
  body: |-
    <h2>Übersicht</h2>
        <pre><code>git read-tree [-m | -u | --reset] &lt;tree-ish&gt;...</code></pre>
        <h2>Beschreibung</h2>
        <p>Der <code>git read-tree</code>-Befehl liest einen oder mehrere Trees in den Index ein. Er ist eines der grundlegenden Plumbing-Bausteine und das Werkzeug, das hinter <code>git checkout</code> und <code>git merge</code> die Index-Updates handhabt.</p>
        <p>Im täglichen Einsatz integriert sich <code>git read-tree</code> eng mit Shell-Aliasen, Editor-Plugins und Continuous Integration. Power-User fügen oft Aliase hinzu, die Flags kombinieren, die sie immer übergeben, oder wickeln den Befehl in Skripte, die Teamkonventionen durchsetzen. Die Ausgabeformatierung kann über Git-Config angepasst werden — Pretty-Formate, Farbschemata und Pager-Verhalten sind alle einstellbar. Wenn etwas schiefgeht, ist der erste Diagnoseschritt üblicherweise, den Befehl erneut mit <code>GIT_TRACE=1</code> in der Umgebung auszuführen, was die zugrunde liegenden Plumbing-Aufrufe offenlegt. Für ungewöhnliche Situationen öffnet die <code>--help</code>-Ausgabe (<code>git read-tree --help</code>) die vollständige Manpage mit Details zu jeder Option, einschließlich solcher, die in alltäglichen Workflows selten verwendet werden, aber für Debugging oder Skripting im großen Maßstab essentiell sind.</p>
        <p>Zu verstehen, wie <code>git read-tree</code> mit dem Rest von Gits Datenmodell interagiert — der Objektdatenbank, dem Index, Refs und dem Working Tree — zahlt sich aus. Jeder Befehl operiert auf einer Teilmenge dieser Stücke, und zu wissen, welche er berührt, hilft Ergebnisse vorherzusagen und sich von Fehlern zu erholen. Das Lesen der offiziellen Git-Dokumentation neben praktischer Übung in einem Wegwerf-Repository ist der schnellste Weg, die Nuancen zu verinnerlichen. Die meisten Produktionsprobleme mit Git rühren von einer von drei Ursachen: überraschendem Standardverhalten, partiellen Netzwerkoperationen oder dem Umschreiben bereits geteilter Historie. Ein funktionierendes mentales Modell der Nebenwirkungen von <code>git read-tree</code> hilft, alle drei zu vermeiden.</p>
        <h2>Häufige Optionen</h2>
        <table><thead><tr><th>Option</th><th>Beschreibung</th></tr></thead><tbody><tr><td><code>--reset</code></td><td>Setzt Index aus dem Tree zurück, einschließlich Löschungen.</td></tr><tr><td><code>-u</code></td><td>Aktualisiert Working-Tree-Dateien, um zum neuen Index zu passen.</td></tr><tr><td><code>-m</code></td><td>Drei-Wege-Merge zwischen Trees.</td></tr><tr><td><code>-i</code></td><td>Lädt nur in den Index (kein Working Tree).</td></tr><tr><td><code>--prefix=&lt;prefix&gt;</code></td><td>Liest Tree unter Pfad-Präfix in Index ein.</td></tr><tr><td><code>--empty</code></td><td>Leert den Index.</td></tr></tbody></table>
        <h2>Beispiele</h2>
        <pre><code>git read-tree HEAD
        # Index neu zum HEAD-Tree füllen

        git read-tree --reset -u HEAD
        # Index UND Working Tree auf HEAD zurücksetzen

        git read-tree --prefix=docs/ doc-branch:docs
        # Tree von doc-branch:docs unter docs/ in Index laden

        git read-tree --empty
        # Index leeren</code></pre>
        <h2>Häufige Fehler</h2>
        <p>Direkt mit dem Index zu hantieren kann verwirrende Zustände erzeugen, die Porcelain nicht versteht. Verwenden Sie wenn möglich höhere Befehle. Vergessen, <code>-u</code> zu übergeben, lässt Working-Tree und Index inkonsistent.</p>
        <h2>Verwandte Befehle</h2>
        <p><code>git write-tree</code>, <code>git update-index</code>, <code>git checkout</code>, <code>git merge</code></p>
