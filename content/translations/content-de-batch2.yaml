        <p>Obwohl es ein Befehl im Kern-Git ist, ist gitweb selbst ältere Perl-basierte Software und nicht immer standardmäßig auf modernen Distros installiert. Viele Nutzer bevorzugen jetzt eine lokale Instanz von cgit, gitea oder einfach das Browsen auf einer gehosteten Forge.</p>
