        <p><code>git log</code>, <code>git rev-parse</code>, <code>git merge-base</code>, <code>git bisect</code></p>
- source_title: git for-each-ref — Output information on each ref
  title: git for-each-ref — Informationen zu jeder Ref ausgeben
  langcode: de
  body: |-
    <h2>Übersicht</h2>
        <pre><code>git for-each-ref [--format=&lt;fmt&gt;] [--sort=&lt;key&gt;] [&lt;pattern&gt;...]</code></pre>
        <h2>Beschreibung</h2>
        <p>Der <code>git for-each-ref</code>-Befehl iteriert über jede Ref (Branches, Tags, Remotes, Notes, Stash) und wendet ein anpassbares Format an. Er ist weit mächtiger als das Parsen der Ausgaben von <code>git branch</code> oder <code>git tag</code>: Sie können nach Version, nach Datum oder nach beliebigem Feld sortieren und stabile maschinenlesbare Ausgabe erzeugen.</p>
        <p>Im täglichen Einsatz integriert sich <code>git for-each-ref</code> eng mit Shell-Aliasen, Editor-Plugins und Continuous Integration. Power-User fügen oft Aliase hinzu, die Flags kombinieren, die sie immer übergeben, oder wickeln den Befehl in Skripte, die Teamkonventionen durchsetzen. Die Ausgabeformatierung kann über Git-Config angepasst werden — Pretty-Formate, Farbschemata und Pager-Verhalten sind alle einstellbar. Wenn etwas schiefgeht, ist der erste Diagnoseschritt üblicherweise, den Befehl erneut mit <code>GIT_TRACE=1</code> in der Umgebung auszuführen, was die zugrunde liegenden Plumbing-Aufrufe offenlegt. Für ungewöhnliche Situationen öffnet die <code>--help</code>-Ausgabe (<code>git for-each-ref --help</code>) die vollständige Manpage mit Details zu jeder Option, einschließlich solcher, die in alltäglichen Workflows selten verwendet werden, aber für Debugging oder Skripting im großen Maßstab essentiell sind.</p>
        <p>Zu verstehen, wie <code>git for-each-ref</code> mit dem Rest von Gits Datenmodell interagiert — der Objektdatenbank, dem Index, Refs und dem Working Tree — zahlt sich aus. Jeder Befehl operiert auf einer Teilmenge dieser Stücke, und zu wissen, welche er berührt, hilft Ergebnisse vorherzusagen und sich von Fehlern zu erholen. Das Lesen der offiziellen Git-Dokumentation neben praktischer Übung in einem Wegwerf-Repository ist der schnellste Weg, die Nuancen zu verinnerlichen. Die meisten Produktionsprobleme mit Git rühren von einer von drei Ursachen: überraschendem Standardverhalten, partiellen Netzwerkoperationen oder dem Umschreiben bereits geteilter Historie. Ein funktionierendes mentales Modell der Nebenwirkungen von <code>git for-each-ref</code> hilft, alle drei zu vermeiden.</p>
        <h2>Häufige Optionen</h2>
        <table><thead><tr><th>Option</th><th>Beschreibung</th></tr></thead><tbody><tr><td><code>--format=&lt;fmt&gt;</code></td><td>Format-String mit Feld-Platzhaltern.</td></tr><tr><td><code>--sort=&lt;key&gt;</code></td><td>Sortiert nach Feld (Präfix <code>-</code> für absteigend).</td></tr><tr><td><code>--count=&lt;n&gt;</code></td><td>Begrenzt die Anzahl der Einträge.</td></tr><tr><td><code>--contains &lt;commit&gt;</code></td><td>Refs, die den gegebenen Commit enthalten.</td></tr><tr><td><code>--merged &lt;commit&gt;</code></td><td>Refs, die in den gegebenen Commit gemerged sind.</td></tr><tr><td><code>--points-at &lt;commit&gt;</code></td><td>Refs, die direkt auf einen Commit zeigen.</td></tr></tbody></table>
        <h2>Beispiele</h2>
        <pre><code>git for-each-ref --format='%(refname:short) %(objectname:short)' refs/heads/
        # Lokale Branch-Namen mit abgekürzten SHAs

        git for-each-ref --sort=-committerdate --count=10 \
          --format='%(committerdate:short) %(refname:short)' refs/heads/
        # Top 10 zuletzt aktualisierte Branches

        git for-each-ref --sort=-v:refname --format='%(refname:short)' refs/tags/ | head -5
        # Fünf höchste Semver-Tags</code></pre>
        <h2>Häufige Fehler</h2>
        <p>Den abschließenden <code>/</code> bei <code>refs/heads/</code>-Mustern zu vergessen kann unbeabsichtigte Refs matchen. Format-Strings können knifflig sein — quoten Sie Feldnamen mit Klammern. <code>--sort=v:refname</code> funktioniert nur auf Tags, die wie Versionen aussehen.</p>
        <h2>Verwandte Befehle</h2>
        <p><code>git branch</code>, <code>git tag</code>, <code>git ls-remote</code>, <code>git rev-parse</code></p>
- source_title: git update-ref — Update the object name stored in a ref safely
  title: git update-ref — Den in einer Ref gespeicherten Objektnamen sicher aktualisieren
  langcode: de
  body: |-
    <h2>Übersicht</h2>
        <pre><code>git update-ref [-d] [--create-reflog] &lt;ref&gt; &lt;newvalue&gt; [&lt;oldvalue&gt;]</code></pre>
        <h2>Beschreibung</h2>
        <p>Der <code>git update-ref</code>-Befehl schreibt einen neuen SHA atomar in eine Ref. Mit einem optionalen erwarteten Altwert bietet er Compare-and-Swap-Semantik für Sicherheit. Das ist es, was Porcelain-Befehle wie <code>git commit</code> und <code>git branch</code> unter der Haube verwenden, und was Skripte, die Refs direkt manipulieren, statt Dateien in <code>.git/refs/</code> zu bearbeiten, verwenden sollten.</p>
        <p>Im täglichen Einsatz integriert sich <code>git update-ref</code> eng mit Shell-Aliasen, Editor-Plugins und Continuous Integration. Power-User fügen oft Aliase hinzu, die Flags kombinieren, die sie immer übergeben, oder wickeln den Befehl in Skripte, die Teamkonventionen durchsetzen. Die Ausgabeformatierung kann über Git-Config angepasst werden — Pretty-Formate, Farbschemata und Pager-Verhalten sind alle einstellbar. Wenn etwas schiefgeht, ist der erste Diagnoseschritt üblicherweise, den Befehl erneut mit <code>GIT_TRACE=1</code> in der Umgebung auszuführen, was die zugrunde liegenden Plumbing-Aufrufe offenlegt. Für ungewöhnliche Situationen öffnet die <code>--help</code>-Ausgabe (<code>git update-ref --help</code>) die vollständige Manpage mit Details zu jeder Option, einschließlich solcher, die in alltäglichen Workflows selten verwendet werden, aber für Debugging oder Skripting im großen Maßstab essentiell sind.</p>
        <p>Zu verstehen, wie <code>git update-ref</code> mit dem Rest von Gits Datenmodell interagiert — der Objektdatenbank, dem Index, Refs und dem Working Tree — zahlt sich aus. Jeder Befehl operiert auf einer Teilmenge dieser Stücke, und zu wissen, welche er berührt, hilft Ergebnisse vorherzusagen und sich von Fehlern zu erholen. Das Lesen der offiziellen Git-Dokumentation neben praktischer Übung in einem Wegwerf-Repository ist der schnellste Weg, die Nuancen zu verinnerlichen. Die meisten Produktionsprobleme mit Git rühren von einer von drei Ursachen: überraschendem Standardverhalten, partiellen Netzwerkoperationen oder dem Umschreiben bereits geteilter Historie. Ein funktionierendes mentales Modell der Nebenwirkungen von <code>git update-ref</code> hilft, alle drei zu vermeiden.</p>
        <h2>Häufige Optionen</h2>
        <table><thead><tr><th>Option</th><th>Beschreibung</th></tr></thead><tbody><tr><td><code>-d &lt;ref&gt; [&lt;oldvalue&gt;]</code></td><td>Löscht eine Ref (optional Compare-and-Swap).</td></tr><tr><td><code>--no-deref</code></td><td>Folgt nicht symbolischen Refs.</td></tr><tr><td><code>--create-reflog</code></td><td>Erstellt ein Reflog, falls fehlend.</td></tr><tr><td><code>-m &lt;reason&gt;</code></td><td>Reflog-Grund für dieses Update.</td></tr><tr><td><code>--stdin</code></td><td>Liest Updates von stdin (atomarer Batch).</td></tr></tbody></table>
        <h2>Beispiele</h2>
        <pre><code>git update-ref refs/heads/feature abc123
        # feature-Branch auf Commit abc123 bewegen

        git update-ref -d refs/heads/old-experiment
        # Eine Branch-Ref direkt löschen

        git update-ref refs/notes/ci HEAD def456
        # Eine eigene Notes-Ref atomar bewegen

        # Atomares Multi-Ref-Update via stdin:
        printf 'update refs/heads/main %s\nupdate refs/heads/dev %s\n' "$NEW1" "$NEW2" | \
          git update-ref --stdin</code></pre>
        <h2>Häufige Fehler</h2>
        <p>Sicherheit zu umgehen, indem Sie <code>.git/refs/</code>-Dateien direkt bearbeiten, kann Packed Refs korrumpieren oder Reflog-Einträge überspringen. Verwenden Sie immer <code>update-ref</code>. Das Vergessen, <code>&lt;oldvalue&gt;</code> zu liefern, vereitelt den Compare-and-Swap-Schutz — liefern Sie ihn, wann immer möglich.</p>
        <h2>Verwandte Befehle</h2>
        <p><code>git symbolic-ref</code>, <code>git pack-refs</code>, <code>git for-each-ref</code>, <code>git branch</code></p>
- source_title: git symbolic-ref — Read, modify, and delete symbolic refs
  title: git symbolic-ref — Symbolische Refs lesen, ändern und löschen
  langcode: de
  body: |-
    <h2>Übersicht</h2>
        <pre><code>git symbolic-ref [--short] &lt;name&gt; [&lt;ref&gt;]
    git symbolic-ref --delete &lt;name&gt;</code></pre>
        <h2>Beschreibung</h2>
        <p>Der <code>git symbolic-ref</code>-Befehl manipuliert symbolische Refs — Refs, die auf eine andere Ref statt auf einen Commit zeigen. Das vertrauteste Beispiel ist HEAD: Wenn Sie auf Branch <code>main</code> sind, ist HEAD eine symbolische Ref, die auf <code>refs/heads/main</code> zeigt. Andere Beispiele sind der Standard-Branch-Indikator auf Remotes (<code>refs/remotes/origin/HEAD</code>).</p>
        <p>Im täglichen Einsatz integriert sich <code>git symbolic-ref</code> eng mit Shell-Aliasen, Editor-Plugins und Continuous Integration. Power-User fügen oft Aliase hinzu, die Flags kombinieren, die sie immer übergeben, oder wickeln den Befehl in Skripte, die Teamkonventionen durchsetzen. Die Ausgabeformatierung kann über Git-Config angepasst werden — Pretty-Formate, Farbschemata und Pager-Verhalten sind alle einstellbar. Wenn etwas schiefgeht, ist der erste Diagnoseschritt üblicherweise, den Befehl erneut mit <code>GIT_TRACE=1</code> in der Umgebung auszuführen, was die zugrunde liegenden Plumbing-Aufrufe offenlegt. Für ungewöhnliche Situationen öffnet die <code>--help</code>-Ausgabe (<code>git symbolic-ref --help</code>) die vollständige Manpage mit Details zu jeder Option, einschließlich solcher, die in alltäglichen Workflows selten verwendet werden, aber für Debugging oder Skripting im großen Maßstab essentiell sind.</p>
        <p>Zu verstehen, wie <code>git symbolic-ref</code> mit dem Rest von Gits Datenmodell interagiert — der Objektdatenbank, dem Index, Refs und dem Working Tree — zahlt sich aus. Jeder Befehl operiert auf einer Teilmenge dieser Stücke, und zu wissen, welche er berührt, hilft Ergebnisse vorherzusagen und sich von Fehlern zu erholen. Das Lesen der offiziellen Git-Dokumentation neben praktischer Übung in einem Wegwerf-Repository ist der schnellste Weg, die Nuancen zu verinnerlichen. Die meisten Produktionsprobleme mit Git rühren von einer von drei Ursachen: überraschendem Standardverhalten, partiellen Netzwerkoperationen oder dem Umschreiben bereits geteilter Historie. Ein funktionierendes mentales Modell der Nebenwirkungen von <code>git symbolic-ref</code> hilft, alle drei zu vermeiden.</p>
        <h2>Häufige Optionen</h2>
        <table><thead><tr><th>Option</th><th>Beschreibung</th></tr></thead><tbody><tr><td><code>--short</code></td><td>Gibt den Kurznamen aus (z. B. <code>main</code>).</td></tr><tr><td><code>--delete</code></td><td>Löscht die symbolische Ref.</td></tr><tr><td><code>--quiet</code></td><td>Gibt keinen Fehler aus, falls Ref fehlt.</td></tr><tr><td><code>-m &lt;reason&gt;</code></td><td>Reflog-Grund für Änderungen.</td></tr></tbody></table>
        <h2>Beispiele</h2>
        <pre><code>git symbolic-ref HEAD
        # refs/heads/main

        git symbolic-ref --short HEAD
        # main

        git symbolic-ref refs/remotes/origin/HEAD refs/remotes/origin/main
        # Den Standard-Branch-Indikator auf origin setzen

        git symbolic-ref HEAD refs/heads/develop
        # HEAD wechseln, ohne den Working Tree zu berühren (fortgeschritten!)</code></pre>
        <h2>Häufige Fehler</h2>
        <p>HEAD via <code>symbolic-ref</code> zu wechseln aktualisiert den Working Tree nicht — Dateien ändern sich nicht. Verwenden Sie <code>git switch</code> für den Alltag. <code>origin/HEAD</code> falsch zu setzen verwirrt Tools, die den Standard-Branch nachschlagen.</p>
        <h2>Verwandte Befehle</h2>
        <p><code>git update-ref</code>, <code>git switch</code>, <code>git rev-parse</code>, <code>git remote set-head</code></p>
- source_title: git pack-objects — Create a packed archive of objects
  title: git pack-objects — Ein gepacktes Archiv von Objekten erstellen
  langcode: de
  body: |-
    <h2>Übersicht</h2>
        <pre><code>git pack-objects [--stdout] [--all] &lt;base-name&gt; &lt; &lt;object-list&gt;</code></pre>
        <h2>Beschreibung</h2>
        <p>Der <code>git pack-objects</code>-Befehl komprimiert eine Menge von Objekten in eine einzige Pack-Datei und wendet Delta-Kompression auf ähnliche Objekte an. Packs sind die Art, wie Git Objekte effizient auf der Festplatte und über das Netzwerk speichert — jeder Fetch und Push überträgt Packs.</p>
        <p>Im täglichen Einsatz integriert sich <code>git pack-objects</code> eng mit Shell-Aliasen, Editor-Plugins und Continuous Integration. Power-User fügen oft Aliase hinzu, die Flags kombinieren, die sie immer übergeben, oder wickeln den Befehl in Skripte, die Teamkonventionen durchsetzen. Die Ausgabeformatierung kann über Git-Config angepasst werden — Pretty-Formate, Farbschemata und Pager-Verhalten sind alle einstellbar. Wenn etwas schiefgeht, ist der erste Diagnoseschritt üblicherweise, den Befehl erneut mit <code>GIT_TRACE=1</code> in der Umgebung auszuführen, was die zugrunde liegenden Plumbing-Aufrufe offenlegt. Für ungewöhnliche Situationen öffnet die <code>--help</code>-Ausgabe (<code>git pack-objects --help</code>) die vollständige Manpage mit Details zu jeder Option, einschließlich solcher, die in alltäglichen Workflows selten verwendet werden, aber für Debugging oder Skripting im großen Maßstab essentiell sind.</p>
        <p>Zu verstehen, wie <code>git pack-objects</code> mit dem Rest von Gits Datenmodell interagiert — der Objektdatenbank, dem Index, Refs und dem Working Tree — zahlt sich aus. Jeder Befehl operiert auf einer Teilmenge dieser Stücke, und zu wissen, welche er berührt, hilft Ergebnisse vorherzusagen und sich von Fehlern zu erholen. Das Lesen der offiziellen Git-Dokumentation neben praktischer Übung in einem Wegwerf-Repository ist der schnellste Weg, die Nuancen zu verinnerlichen. Die meisten Produktionsprobleme mit Git rühren von einer von drei Ursachen: überraschendem Standardverhalten, partiellen Netzwerkoperationen oder dem Umschreiben bereits geteilter Historie. Ein funktionierendes mentales Modell der Nebenwirkungen von <code>git pack-objects</code> hilft, alle drei zu vermeiden.</p>
        <h2>Häufige Optionen</h2>
        <table><thead><tr><th>Option</th><th>Beschreibung</th></tr></thead><tbody><tr><td><code>--stdout</code></td><td>Schreibt das Pack nach stdout statt in Dateien.</td></tr><tr><td><code>--all</code></td><td>Packt alles, was von einer Ref erreichbar ist.</td></tr><tr><td><code>--revs</code></td><td>Liest Revisionen von stdin statt Objekt-SHAs.</td></tr><tr><td><code>--depth=&lt;n&gt;</code></td><td>Maximale Delta-Ketten-Tiefe.</td></tr><tr><td><code>--window=&lt;n&gt;</code></td><td>Fenstergröße für die Delta-Suche.</td></tr><tr><td><code>--thin</code></td><td>Erlaubt dünne Packs (Deltas gegen externe Objekte).</td></tr><tr><td><code>--no-reuse-delta</code></td><td>Berechnet Deltas neu, statt vorhandene wiederzuverwenden.</td></tr></tbody></table>
        <h2>Beispiele</h2>
        <pre><code>git rev-list --objects --all | git pack-objects --stdout &gt; everything.pack
        # Ein einzelnes Pack jedes erreichbaren Objekts erstellen

        git rev-list --objects HEAD ^origin/main | \
          git pack-objects --thin --stdout &gt; ahead.pack
        # Ein dünnes Pack nur der Commits, die vor origin/main sind

        git pack-objects --all .git/objects/pack/extra
        # Alle erreichbaren Objekte in ein neues Pack namens "extra" repacken</code></pre>
        <h2>Häufige Fehler</h2>
        <p>Große Packs mit zu hoch gesetzten <code>--depth</code> und <code>--window</code> zu bauen verbraucht viel Speicher und CPU. Die Standardwerte von <code>git gc</code> sind für die meisten Repos sinnvoll. Dünne Packs ohne Kontext (ein bestehendes Repo, auf das sie angewendet werden) zu erzeugen ist nutzlos.</p>
        <h2>Verwandte Befehle</h2>
        <p><code>git unpack-objects</code>, <code>git verify-pack</code>, <code>git gc</code>, <code>git repack</code></p>
- source_title: git unpack-objects — Unpack objects from a packed archive
  title: git unpack-objects — Objekte aus einem gepackten Archiv entpacken
  langcode: de
  body: |-
    <h2>Übersicht</h2>
        <pre><code>git unpack-objects [-r] [-q] &lt; &lt;pack-file&gt;</code></pre>
        <h2>Beschreibung</h2>
        <p>Der <code>git unpack-objects</code>-Befehl liest eine Pack-Datei von stdin und schreibt deren Inhalt als einzelne lose Objekte in die Objektdatenbank. Das ist die Umkehrung von <code>git pack-objects</code>.</p>
        <p>Im täglichen Einsatz integriert sich <code>git unpack-objects</code> eng mit Shell-Aliasen, Editor-Plugins und Continuous Integration. Power-User fügen oft Aliase hinzu, die Flags kombinieren, die sie immer übergeben, oder wickeln den Befehl in Skripte, die Teamkonventionen durchsetzen. Die Ausgabeformatierung kann über Git-Config angepasst werden — Pretty-Formate, Farbschemata und Pager-Verhalten sind alle einstellbar. Wenn etwas schiefgeht, ist der erste Diagnoseschritt üblicherweise, den Befehl erneut mit <code>GIT_TRACE=1</code> in der Umgebung auszuführen, was die zugrunde liegenden Plumbing-Aufrufe offenlegt. Für ungewöhnliche Situationen öffnet die <code>--help</code>-Ausgabe (<code>git unpack-objects --help</code>) die vollständige Manpage mit Details zu jeder Option, einschließlich solcher, die in alltäglichen Workflows selten verwendet werden, aber für Debugging oder Skripting im großen Maßstab essentiell sind.</p>
        <p>Zu verstehen, wie <code>git unpack-objects</code> mit dem Rest von Gits Datenmodell interagiert — der Objektdatenbank, dem Index, Refs und dem Working Tree — zahlt sich aus. Jeder Befehl operiert auf einer Teilmenge dieser Stücke, und zu wissen, welche er berührt, hilft Ergebnisse vorherzusagen und sich von Fehlern zu erholen. Das Lesen der offiziellen Git-Dokumentation neben praktischer Übung in einem Wegwerf-Repository ist der schnellste Weg, die Nuancen zu verinnerlichen. Die meisten Produktionsprobleme mit Git rühren von einer von drei Ursachen: überraschendem Standardverhalten, partiellen Netzwerkoperationen oder dem Umschreiben bereits geteilter Historie. Ein funktionierendes mentales Modell der Nebenwirkungen von <code>git unpack-objects</code> hilft, alle drei zu vermeiden.</p>
        <h2>Häufige Optionen</h2>
        <table><thead><tr><th>Option</th><th>Beschreibung</th></tr></thead><tbody><tr><td><code>-n</code></td><td>Dry-run: zeigt, was entpackt würde.</td></tr><tr><td><code>-q</code></td><td>Leise, kein Fortschritt.</td></tr><tr><td><code>-r</code></td><td>Stellt aus einem beschädigten Pack wieder her, was möglich ist.</td></tr><tr><td><code>--strict</code></td><td>Verweigert das Schreiben von Objekten mit kaputten Verknüpfungen.</td></tr></tbody></table>
        <h2>Beispiele</h2>
        <pre><code>git unpack-objects &lt; pack-abc.pack
        # Pack in lose Objekte aufsplitten

        git unpack-objects -r &lt; broken.pack
        # Aus einem beschädigten Pack retten, was wir können

        git unpack-objects -n &lt; somepack.pack
        # Nur Vorschau, was entpackt würde</code></pre>
        <h2>Häufige Fehler</h2>
        <p>Ein riesiges Pack zu entpacken erzeugt viele winzige Dateien und verlangsamt das Dateisystem. Fast jedes operative Szenario bevorzugt das Pack intakt zu lassen. Paaren Sie das mit <code>git fsck</code> beim Troubleshooten von Korruption.</p>
        <h2>Verwandte Befehle</h2>
        <p><code>git pack-objects</code>, <code>git verify-pack</code>, <code>git fsck</code>, <code>git gc</code></p>
- source_title: git verify-pack — Validate packed Git archive files
  title: git verify-pack — Gepackte Git-Archivdateien validieren
  langcode: de
  body: |-
    <h2>Übersicht</h2>
        <pre><code>git verify-pack [-v] [--stat-only] &lt;pack&gt;.idx</code></pre>
        <h2>Beschreibung</h2>
        <p>Der <code>git verify-pack</code>-Befehl prüft die Integrität einer Pack-Datei und ihres Index, verifiziert SHA-1-Prüfsummen und Delta-Ketten-Konsistenz. Mit <code>-v</code> gibt er die Liste der Objekte im Pack zusammen mit Typ, Größe und (für Deltas) Basis-Information aus.</p>
        <p>Im täglichen Einsatz integriert sich <code>git verify-pack</code> eng mit Shell-Aliasen, Editor-Plugins und Continuous Integration. Power-User fügen oft Aliase hinzu, die Flags kombinieren, die sie immer übergeben, oder wickeln den Befehl in Skripte, die Teamkonventionen durchsetzen. Die Ausgabeformatierung kann über Git-Config angepasst werden — Pretty-Formate, Farbschemata und Pager-Verhalten sind alle einstellbar. Wenn etwas schiefgeht, ist der erste Diagnoseschritt üblicherweise, den Befehl erneut mit <code>GIT_TRACE=1</code> in der Umgebung auszuführen, was die zugrunde liegenden Plumbing-Aufrufe offenlegt. Für ungewöhnliche Situationen öffnet die <code>--help</code>-Ausgabe (<code>git verify-pack --help</code>) die vollständige Manpage mit Details zu jeder Option, einschließlich solcher, die in alltäglichen Workflows selten verwendet werden, aber für Debugging oder Skripting im großen Maßstab essentiell sind.</p>
        <p>Zu verstehen, wie <code>git verify-pack</code> mit dem Rest von Gits Datenmodell interagiert — der Objektdatenbank, dem Index, Refs und dem Working Tree — zahlt sich aus. Jeder Befehl operiert auf einer Teilmenge dieser Stücke, und zu wissen, welche er berührt, hilft Ergebnisse vorherzusagen und sich von Fehlern zu erholen. Das Lesen der offiziellen Git-Dokumentation neben praktischer Übung in einem Wegwerf-Repository ist der schnellste Weg, die Nuancen zu verinnerlichen. Die meisten Produktionsprobleme mit Git rühren von einer von drei Ursachen: überraschendem Standardverhalten, partiellen Netzwerkoperationen oder dem Umschreiben bereits geteilter Historie. Ein funktionierendes mentales Modell der Nebenwirkungen von <code>git verify-pack</code> hilft, alle drei zu vermeiden.</p>
        <h2>Häufige Optionen</h2>
        <table><thead><tr><th>Option</th><th>Beschreibung</th></tr></thead><tbody><tr><td><code>-v</code></td><td>Verbose: jedes Objekt auflisten.</td></tr><tr><td><code>--stat-only</code></td><td>Zeigt nur Übersichts-Statistiken.</td></tr><tr><td><code>-O &lt;file&gt;</code></td><td>Liest Pack-Liste aus Datei.</td></tr></tbody></table>
        <h2>Beispiele</h2>
        <pre><code>git verify-pack -v .git/objects/pack/pack-*.idx
        # Detaillierte Auflistung der Objekte in jedem Pack

        # Die größten Blobs im Repository finden:
        git verify-pack -v .git/objects/pack/*.idx | \
          sort -k 3 -n | tail -20

        git verify-pack --stat-only .git/objects/pack/pack-*.idx
        # Übersichts-Statistiken pro Pack</code></pre>
        <h2>Häufige Fehler</h2>
        <p>Auf eine <code>.pack</code> statt <code>.idx</code> zu zeigen schlägt fehl — übergeben Sie immer den Index. Die verify-pack-Ausgabe zu sortieren, um große Dateien zu finden, funktioniert, aber vergessen Sie nicht, auch lose Objekte mit <code>git count-objects -v</code> zu untersuchen.</p>
        <h2>Verwandte Befehle</h2>
        <p><code>git fsck</code>, <code>git gc</code>, <code>git repack</code>, <code>git count-objects</code></p>
