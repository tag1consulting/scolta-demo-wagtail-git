        <p><code>git write-tree</code>, <code>git update-ref</code>, <code>git cat-file</code>, <code>git commit</code></p>
- source_title: git diff-index — Compare a tree to the index or working tree
  title: git diff-index — Einen Tree mit dem Index oder Working Tree vergleichen
  langcode: de
  body: |-
    <h2>Übersicht</h2>
        <pre><code>git diff-index [--cached] [-p] &lt;tree-ish&gt; [&lt;path&gt;...]</code></pre>
        <h2>Beschreibung</h2>
        <p>Der <code>git diff-index</code>-Befehl vergleicht ein gegebenes Tree-Objekt mit dem Index oder dem Working Tree. Er ist eines der Plumbing-Werkzeuge unter <code>git diff</code> und <code>git status</code>. Die Ausgabe ist im Roh-Format mit jedem geänderten Pfad und seinen alten/neuen Modi und SHAs.</p>
        <p>Im täglichen Einsatz integriert sich <code>git diff-index</code> eng mit Shell-Aliasen, Editor-Plugins und Continuous Integration. Power-User fügen oft Aliase hinzu, die Flags kombinieren, die sie immer übergeben, oder wickeln den Befehl in Skripte, die Teamkonventionen durchsetzen. Die Ausgabeformatierung kann über Git-Config angepasst werden — Pretty-Formate, Farbschemata und Pager-Verhalten sind alle einstellbar. Wenn etwas schiefgeht, ist der erste Diagnoseschritt üblicherweise, den Befehl erneut mit <code>GIT_TRACE=1</code> in der Umgebung auszuführen, was die zugrunde liegenden Plumbing-Aufrufe offenlegt. Für ungewöhnliche Situationen öffnet die <code>--help</code>-Ausgabe (<code>git diff-index --help</code>) die vollständige Manpage mit Details zu jeder Option, einschließlich solcher, die in alltäglichen Workflows selten verwendet werden, aber für Debugging oder Skripting im großen Maßstab essentiell sind.</p>
        <p>Zu verstehen, wie <code>git diff-index</code> mit dem Rest von Gits Datenmodell interagiert — der Objektdatenbank, dem Index, Refs und dem Working Tree — zahlt sich aus. Jeder Befehl operiert auf einer Teilmenge dieser Stücke, und zu wissen, welche er berührt, hilft Ergebnisse vorherzusagen und sich von Fehlern zu erholen. Das Lesen der offiziellen Git-Dokumentation neben praktischer Übung in einem Wegwerf-Repository ist der schnellste Weg, die Nuancen zu verinnerlichen. Die meisten Produktionsprobleme mit Git rühren von einer von drei Ursachen: überraschendem Standardverhalten, partiellen Netzwerkoperationen oder dem Umschreiben bereits geteilter Historie. Ein funktionierendes mentales Modell der Nebenwirkungen von <code>git diff-index</code> hilft, alle drei zu vermeiden.</p>
        <h2>Häufige Optionen</h2>
        <table><thead><tr><th>Option</th><th>Beschreibung</th></tr></thead><tbody><tr><td><code>--cached</code></td><td>Vergleicht Tree mit Index statt mit Working Tree.</td></tr><tr><td><code>--name-only</code></td><td>Listet nur Dateinamen auf.</td></tr><tr><td><code>--name-status</code></td><td>Listet Dateinamen mit Status-Codes auf.</td></tr><tr><td><code>-z</code></td><td>NUL-terminierte Ausgabe.</td></tr><tr><td><code>-r</code></td><td>Rekurriert in Subtrees.</td></tr><tr><td><code>-M</code></td><td>Erkennt Umbenennungen.</td></tr></tbody></table>
        <h2>Beispiele</h2>
        <pre><code>git diff-index HEAD
        # Working Tree vs HEAD

        git diff-index --cached HEAD
        # Index vs HEAD (entspricht git diff --staged)

        git diff-index --name-status -r HEAD -- src/
        # Status pro Datei unter src/

        git diff-index HEAD &gt; /dev/null || echo "dirty tree"
        # Schnell prüfen, ob es Änderungen relativ zu HEAD gibt</code></pre>
        <h2>Häufige Fehler</h2>
        <p>Roh-Ausgabe in Skripten zu verlassen kann an Format-Updates über Versionen brechen — verwenden Sie <code>--name-status</code> oder <code>-z</code> für stabilere Ausgabe. Vergessen Sie <code>--cached</code> nicht, wenn Sie wirklich Index vs HEAD wollen.</p>
        <h2>Verwandte Befehle</h2>
        <p><code>git diff</code>, <code>git diff-tree</code>, <code>git ls-files</code>, <code>git status</code></p>
- source_title: git checkout-index — Copy files from the index to the working tree
  title: git checkout-index — Dateien aus dem Index in den Working Tree kopieren
  langcode: de
  body: |-
    <h2>Übersicht</h2>
        <pre><code>git checkout-index [-a] [-f] [-u] [--prefix=&lt;dir&gt;] [&lt;file&gt;...]</code></pre>
        <h2>Beschreibung</h2>
        <p>Der <code>git checkout-index</code>-Befehl extrahiert Dateien aus dem Index in den Working Tree. Er ist das Plumbing hinter <code>git checkout &lt;path&gt;</code> und <code>git restore</code>. Anders als seine Porcelain-Pendants ist er sehr gezielt: nur das Schreiben von Dateien aus dem Index, keine Branch-Wechsel oder Kontext-Operationen.</p>
        <p>Im täglichen Einsatz integriert sich <code>git checkout-index</code> eng mit Shell-Aliasen, Editor-Plugins und Continuous Integration. Power-User fügen oft Aliase hinzu, die Flags kombinieren, die sie immer übergeben, oder wickeln den Befehl in Skripte, die Teamkonventionen durchsetzen. Die Ausgabeformatierung kann über Git-Config angepasst werden — Pretty-Formate, Farbschemata und Pager-Verhalten sind alle einstellbar. Wenn etwas schiefgeht, ist der erste Diagnoseschritt üblicherweise, den Befehl erneut mit <code>GIT_TRACE=1</code> in der Umgebung auszuführen, was die zugrunde liegenden Plumbing-Aufrufe offenlegt. Für ungewöhnliche Situationen öffnet die <code>--help</code>-Ausgabe (<code>git checkout-index --help</code>) die vollständige Manpage mit Details zu jeder Option, einschließlich solcher, die in alltäglichen Workflows selten verwendet werden, aber für Debugging oder Skripting im großen Maßstab essentiell sind.</p>
        <p>Zu verstehen, wie <code>git checkout-index</code> mit dem Rest von Gits Datenmodell interagiert — der Objektdatenbank, dem Index, Refs und dem Working Tree — zahlt sich aus. Jeder Befehl operiert auf einer Teilmenge dieser Stücke, und zu wissen, welche er berührt, hilft Ergebnisse vorherzusagen und sich von Fehlern zu erholen. Das Lesen der offiziellen Git-Dokumentation neben praktischer Übung in einem Wegwerf-Repository ist der schnellste Weg, die Nuancen zu verinnerlichen. Die meisten Produktionsprobleme mit Git rühren von einer von drei Ursachen: überraschendem Standardverhalten, partiellen Netzwerkoperationen oder dem Umschreiben bereits geteilter Historie. Ein funktionierendes mentales Modell der Nebenwirkungen von <code>git checkout-index</code> hilft, alle drei zu vermeiden.</p>
        <h2>Häufige Optionen</h2>
        <table><thead><tr><th>Option</th><th>Beschreibung</th></tr></thead><tbody><tr><td><code>-a</code></td><td>Bezieht alle Index-Einträge ein.</td></tr><tr><td><code>-f</code></td><td>Erzwingt Überschreiben vorhandener Working-Tree-Dateien.</td></tr><tr><td><code>-u</code></td><td>Aktualisiert Stat-Info im Index nach dem Auschecken.</td></tr><tr><td><code>--prefix=&lt;prefix&gt;</code></td><td>Stellt einen Pfad-Präfix beim Auschecken voran.</td></tr><tr><td><code>--stage=&lt;n&gt;</code></td><td>Checkt einen bestimmten Stage (1=base, 2=ours, 3=theirs).</td></tr><tr><td><code>--temp</code></td><td>Schreibt in temporäre Dateien.</td></tr></tbody></table>
        <h2>Beispiele</h2>
        <pre><code>git checkout-index -a -f
        # Jede Index-Datei in den Working Tree extrahieren

        git checkout-index --prefix=/tmp/snapshot/ -a
        # Alle Index-Inhalte unter /tmp/snapshot/ extrahieren

        git checkout-index --stage=2 -- conflicted.txt
        # Die "ours"-Version einer konfliktbehafteten Datei holen

        git checkout-index --temp -- src/main.c
        # In eine temporäre Datei extrahieren, gibt deren Pfad aus</code></pre>
        <h2>Häufige Fehler</h2>
        <p>Vergessen Sie <code>-f</code> beim Überschreiben modifizierter Dateien — sonst verweigert checkout-index. Der <code>--prefix</code>-Wert muss mit einem Schrägstrich enden, damit das Setzen des Pfades wie erwartet funktioniert.</p>
        <h2>Verwandte Befehle</h2>
        <p><code>git restore</code>, <code>git checkout</code>, <code>git read-tree</code>, <code>git ls-files</code></p>
