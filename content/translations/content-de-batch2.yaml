# Importziel: Drupal 11

- source_title: git init — Create a new Git repository
  title: git init — Ein neues Git-Repository erstellen
  langcode: de
  body: |-
    <h2>Übersicht</h2>
        <pre><code>git init [--bare] [--initial-branch=&lt;name&gt;] [--template=&lt;dir&gt;] [directory]</code></pre>
        <h2>Beschreibung</h2>
        <p>Der <code>git init</code>-Befehl erstellt ein neues, leeres Git-Repository oder reinitialisiert ein bestehendes. Es ist üblicherweise der erste Befehl, den Sie ausführen, wenn Sie ein Projekt mit Git zu verfolgen beginnen wollen. Der Befehl erstellt ein verstecktes <code>.git</code>-Verzeichnis, das alle Metadaten enthält, die Git braucht: die Objektdatenbank, Referenzen, Konfiguration, Hooks und den Index. Ohne dieses Verzeichnis hat Git keinen Ort, um Historie zu speichern.</p>
        <p>Das Ausführen von <code>git init</code> in einem bestehenden Repository ist sicher — es überschreibt keine vorhandenen Objekte oder Refs. Stattdessen reinitialisiert es Templates und stellt sicher, dass die Verzeichnisstruktur intakt ist. Standardmäßig erstellt modernes Git ein Repository mit dem durch <code>init.defaultBranch</code> konfigurierten Branch-Namen, üblicherweise <code>main</code> auf neuen Installationen.</p>
        <p>Über das Standardverhalten hinaus respektiert <code>git init</code> die Einstellung <code>core.hooksPath</code>, falls Sie ein zentrales Hooks-Verzeichnis pflegen, sowie die <code>init.templateDir</code>-Konfiguration, um eigene Hooks und Exclude-Dateien in jedes neue Repository zu kopieren. Auf Dateisystemen, bei denen Groß-/Kleinschreibung zählt, wird <code>core.ignoreCase</code> automatisch auf Basis der Erkennung zur Init-Zeit gesetzt. Teams, die häufig neue Services bootstrappen, scripten oft die Schritte nach dem Init: Standard-Branch setzen, Lizenzdatei hinzufügen, gitignore-Template konfigurieren und einen Remote einrichten — alles unmittelbar nach dem Ausführen von <code>git init</code>. Zu verstehen, welche Dateien <code>.git/</code> enthält (HEAD, config, objects/, refs/, hooks/), entmystifiziert spätere Operationen und macht die Wiederherstellung nach Unfällen viel einfacher.</p>
        <p>Im täglichen Einsatz integriert sich <code>git init</code> eng mit Shell-Aliasen, Editor-Plugins und Continuous Integration. Power-User fügen oft Aliase hinzu, die Flags kombinieren, die sie immer übergeben, oder wickeln den Befehl in Skripte, die Teamkonventionen durchsetzen. Die Ausgabeformatierung kann über Git-Config angepasst werden — Pretty-Formate, Farbschemata und Pager-Verhalten sind alle einstellbar. Wenn etwas schiefgeht, ist der erste Diagnoseschritt üblicherweise, den Befehl erneut mit <code>GIT_TRACE=1</code> in der Umgebung auszuführen, was die zugrunde liegenden Plumbing-Aufrufe offenlegt. Für ungewöhnliche Situationen öffnet die <code>--help</code>-Ausgabe (<code>git init --help</code>) die vollständige Manpage mit Details zu jeder Option, einschließlich solcher, die in alltäglichen Workflows selten verwendet werden, aber für Debugging oder Skripting im großen Maßstab essentiell sind.</p>
        <p>Zu verstehen, wie <code>git init</code> mit dem Rest von Gits Datenmodell interagiert — der Objektdatenbank, dem Index, Refs und dem Working Tree — zahlt sich aus. Jeder Befehl operiert auf einer Teilmenge dieser Stücke, und zu wissen, welche er berührt, hilft Ergebnisse vorherzusagen und sich von Fehlern zu erholen. Das Lesen der offiziellen Git-Dokumentation neben praktischer Übung in einem Wegwerf-Repository ist der schnellste Weg, die Nuancen zu verinnerlichen. Die meisten Produktionsprobleme mit Git rühren von einer von drei Ursachen: überraschendem Standardverhalten, partiellen Netzwerkoperationen oder dem Umschreiben bereits geteilter Historie. Ein funktionierendes mentales Modell der Nebenwirkungen von <code>git init</code> hilft, alle drei zu vermeiden.</p>
        <h2>Häufige Optionen</h2>
        <table><thead><tr><th>Option</th><th>Beschreibung</th></tr></thead><tbody><tr><td><code>--bare</code></td><td>Erstellt ein Bare-Repository ohne Working Tree, geeignet zum Hosten auf einem Server.</td></tr><tr><td><code>--initial-branch=&lt;name&gt;</code> / <code>-b</code></td><td>Setzt den Namen des initialen Branches (Standard <code>main</code>).</td></tr><tr><td><code>--template=&lt;dir&gt;</code></td><td>Verwendet ein benutzerdefiniertes Template-Verzeichnis für Hooks und Konfiguration.</td></tr><tr><td><code>--shared[=&lt;perms&gt;]</code></td><td>Erlaubt es, dass das Repository von einer Unix-Gruppe geteilt wird.</td></tr><tr><td><code>--separate-git-dir=&lt;dir&gt;</code></td><td>Speichert die tatsächlichen Git-Daten in einem separaten Verzeichnis und hinterlässt eine <code>.git</code>-Datei, die darauf zeigt.</td></tr><tr><td><code>-q</code>, <code>--quiet</code></td><td>Unterdrückt informative Ausgabe.</td></tr></tbody></table>
        <h2>Beispiele</h2>
        <pre><code>git init
        # Initialisiert ein Repository im aktuellen Verzeichnis

        git init my-project
        # Erstellt ein neues Verzeichnis und initialisiert ein Repo darin

        git init --bare /srv/git/myproject.git
        # Erstellt ein Bare-Repository für das Hosten auf einem Server

        git init -b trunk
        # Initialisiert mit dem initialen Branch-Namen "trunk" statt "main"</code></pre>
        <h2>Häufige Fehler</h2>
        <p>Ein häufiger Fehler ist das versehentliche Ausführen von <code>git init</code> in Ihrem Home-Verzeichnis, was Ihren gesamten Home-Ordner in ein Repository verwandelt. Prüfen Sie immer Ihr aktuelles Verzeichnis, bevor Sie es ausführen. Eine weitere Falle ist das Initialisieren eines Repos im Working Tree eines bestehenden Repos — das erzeugt verschachtelte Repositories, die Tools und Menschen gleichermaßen verwirren können. Falls Sie versehentlich ein unerwünschtes Repo erstellt haben, entfernen Sie einfach das <code>.git</code>-Verzeichnis, um es rückgängig zu machen.</p>
        <h2>Verwandte Befehle</h2>
        <p><code>git clone</code>, <code>git config</code>, <code>git remote</code></p>
- source_title: git clone — Copy a repository from a remote source
  title: git clone — Ein Repository von einer Remote-Quelle kopieren
  langcode: de
  body: |-
    <h2>Übersicht</h2>
        <pre><code>git clone [--branch &lt;name&gt;] [--depth &lt;n&gt;] [--recurse-submodules] &lt;url&gt; [directory]</code></pre>
        <h2>Beschreibung</h2>
        <p>Der <code>git clone</code>-Befehl kopiert ein bestehendes Repository (typischerweise von einem Remote-Server) in ein neues lokales Verzeichnis. Er führt drei Aktionen durch: Er erstellt ein neues Verzeichnis, führt <code>git init</code> darin aus und holt dann alle Branches und die Historie vom Remote. Nach dem Klonen ist der Remote automatisch als <code>origin</code> konfiguriert, und der Standard-Branch wird in den Working Tree ausgecheckt.</p>
        <p>Klonen unterstützt mehrere Protokolle: HTTPS (am üblichsten, am einfachsten mit Credential-Helpern), SSH (bevorzugt für Schreibzugriff mit schlüsselbasierter Authentifizierung) und das ältere <code>git://</code>-Protokoll. Für sehr große Repositories können Partial Clones, Shallow Clones und Sparse Checkouts die übertragene Datenmenge dramatisch reduzieren.</p>
        <p>Authentifizierung ist eine der häufigsten Stolperfallen. Mit HTTPS verwendet modernes Git Credential-Helper (Keychain auf macOS, Credential Manager auf Windows, libsecret auf Linux), um Tokens oder Passwörter sicher zu cachen. Mit SSH liefert Ihr lokaler SSH-Agent den Schlüssel — stellen Sie sicher, dass <code>ssh-add</code> ihn geladen hat. Nach dem Klonen bestätigt <code>git config --get remote.origin.url</code>, was tatsächlich konfiguriert wurde. Für Monorepo- oder Supercomputer-große Repositories erlauben Partial Clones (<code>--filter=blob:none</code>) kombiniert mit Sparse Checkout (<code>git sparse-checkout init --cone</code>), nur an einem Ausschnitt des Projekts zu arbeiten und sowohl die Klonzeit als auch den Festplatten-Footprint dramatisch zu reduzieren. CI-Pipelines profitieren weiterhin von <code>--depth=1</code> und <code>--no-tags</code>, wenn sie keine Historie brauchen.</p>
        <p>Im täglichen Einsatz integriert sich <code>git clone</code> eng mit Shell-Aliasen, Editor-Plugins und Continuous Integration. Power-User fügen oft Aliase hinzu, die Flags kombinieren, die sie immer übergeben, oder wickeln den Befehl in Skripte, die Teamkonventionen durchsetzen. Die Ausgabeformatierung kann über Git-Config angepasst werden — Pretty-Formate, Farbschemata und Pager-Verhalten sind alle einstellbar. Wenn etwas schiefgeht, ist der erste Diagnoseschritt üblicherweise, den Befehl erneut mit <code>GIT_TRACE=1</code> in der Umgebung auszuführen, was die zugrunde liegenden Plumbing-Aufrufe offenlegt. Für ungewöhnliche Situationen öffnet die <code>--help</code>-Ausgabe (<code>git clone --help</code>) die vollständige Manpage mit Details zu jeder Option, einschließlich solcher, die in alltäglichen Workflows selten verwendet werden, aber für Debugging oder Skripting im großen Maßstab essentiell sind.</p>
        <p>Zu verstehen, wie <code>git clone</code> mit dem Rest von Gits Datenmodell interagiert — der Objektdatenbank, dem Index, Refs und dem Working Tree — zahlt sich aus. Jeder Befehl operiert auf einer Teilmenge dieser Stücke, und zu wissen, welche er berührt, hilft Ergebnisse vorherzusagen und sich von Fehlern zu erholen. Das Lesen der offiziellen Git-Dokumentation neben praktischer Übung in einem Wegwerf-Repository ist der schnellste Weg, die Nuancen zu verinnerlichen. Die meisten Produktionsprobleme mit Git rühren von einer von drei Ursachen: überraschendem Standardverhalten, partiellen Netzwerkoperationen oder dem Umschreiben bereits geteilter Historie. Ein funktionierendes mentales Modell der Nebenwirkungen von <code>git clone</code> hilft, alle drei zu vermeiden.</p>
        <h2>Häufige Optionen</h2>
        <table><thead><tr><th>Option</th><th>Beschreibung</th></tr></thead><tbody><tr><td><code>--branch &lt;name&gt;</code> / <code>-b</code></td><td>Checkt den benannten Branch oder Tag statt des Standards aus.</td></tr><tr><td><code>--depth &lt;n&gt;</code></td><td>Erstellt einen Shallow Clone mit gekürzter Historie.</td></tr><tr><td><code>--single-branch</code></td><td>Klont nur die Historie eines einzelnen Branches.</td></tr><tr><td><code>--recurse-submodules</code></td><td>Initialisiert und klont Submodules unmittelbar nach dem Hauptklon.</td></tr><tr><td><code>--filter=blob:none</code></td><td>Erstellt einen Partial Clone ohne Blob-Inhalte (lazy bei Bedarf gefetcht).</td></tr><tr><td><code>--bare</code></td><td>Erstellt einen Bare-Klon ohne Working Tree.</td></tr><tr><td><code>--mirror</code></td><td>Richtet einen Mirror mit allen Refs ein, geeignet für Backups.</td></tr></tbody></table>
        <h2>Beispiele</h2>
        <pre><code>git clone https://github.com/user/project.git
        # Standard-Klon über HTTPS

        git clone git@github.com:user/project.git my-fork
        # Klonen via SSH in ein bestimmtes Verzeichnis

        git clone --depth 1 --branch v2.0 https://github.com/user/project.git
        # Shallow Clone eines bestimmten Tags, nützlich für CI

        git clone --filter=blob:none https://github.com/torvalds/linux.git
        # Partial Clone für riesige Repos — Blobs werden bei Bedarf gefetcht</code></pre>
        <h2>Häufige Fehler</h2>
        <p>Ein riesiges Repository ohne Filter zu klonen kann Minuten oder Stunden dauern und Gigabyte verbrauchen. Bevorzugen Sie für Erkundung oder CI-Builds <code>--depth 1</code>. Ein weiterer Fehler ist das Klonen über HTTPS, wenn Sie Änderungen pushen wollen — ohne Credential-Setup fragt jeder Push nach einem Passwort. Verwenden Sie SSH oder einen Credential-Helper für Schreibzugriff. Schließlich: Beachten Sie, dass <code>--single-branch</code>-Klone nicht ohne Weiteres auf andere Branches zugreifen können, ohne den Remote neu zu konfigurieren.</p>
        <h2>Verwandte Befehle</h2>
        <p><code>git init</code>, <code>git fetch</code>, <code>git remote</code>, <code>git submodule</code></p>
- source_title: git add — Stage changes for the next commit
  title: git add — Änderungen für den nächsten Commit stagen
  langcode: de
  body: |-
    <h2>Übersicht</h2>
        <pre><code>git add [-p] [-A] [-u] [--] [&lt;pathspec&gt;...]</code></pre>
        <h2>Beschreibung</h2>
        <p>Der <code>git add</code>-Befehl bewegt Änderungen aus Ihrem Working Tree in die Staging Area (auch Index genannt). Die Staging Area ist ein Snapshot dessen, was in den nächsten Commit fließen wird. Indem Sie Änderungen explizit stagen, lässt Git Sie Commits zusammenstellen, die genau die Arbeit enthalten, die Sie aufzeichnen wollen — auch wenn Ihr Working Tree andere unzusammenhängende laufende Bearbeitungen hat.</p>
        <p><code>git add</code> kann ganze Dateien, Teile von Dateien (mit <code>-p</code>) oder Verzeichnisse stagen. Es committet nichts; es aktualisiert nur den Index. Der häufigste Workflow ist: bearbeiten, <code>git status</code>, <code>git add</code>, <code>git commit</code>. <code>git add</code> zu meistern, besonders seine interaktiven Modi, ist eine der besten Möglichkeiten, Ihre Commit-Historie lesbar und leicht reviewbar zu machen.</p>
        <p>Im täglichen Einsatz integriert sich <code>git add</code> eng mit Shell-Aliasen, Editor-Plugins und Continuous Integration. Power-User fügen oft Aliase hinzu, die Flags kombinieren, die sie immer übergeben, oder wickeln den Befehl in Skripte, die Teamkonventionen durchsetzen. Die Ausgabeformatierung kann über Git-Config angepasst werden — Pretty-Formate, Farbschemata und Pager-Verhalten sind alle einstellbar. Wenn etwas schiefgeht, ist der erste Diagnoseschritt üblicherweise, den Befehl erneut mit <code>GIT_TRACE=1</code> in der Umgebung auszuführen, was die zugrunde liegenden Plumbing-Aufrufe offenlegt. Für ungewöhnliche Situationen öffnet die <code>--help</code>-Ausgabe (<code>git add --help</code>) die vollständige Manpage mit Details zu jeder Option, einschließlich solcher, die in alltäglichen Workflows selten verwendet werden, aber für Debugging oder Skripting im großen Maßstab essentiell sind.</p>
        <p>Zu verstehen, wie <code>git add</code> mit dem Rest von Gits Datenmodell interagiert — der Objektdatenbank, dem Index, Refs und dem Working Tree — zahlt sich aus. Jeder Befehl operiert auf einer Teilmenge dieser Stücke, und zu wissen, welche er berührt, hilft Ergebnisse vorherzusagen und sich von Fehlern zu erholen. Das Lesen der offiziellen Git-Dokumentation neben praktischer Übung in einem Wegwerf-Repository ist der schnellste Weg, die Nuancen zu verinnerlichen. Die meisten Produktionsprobleme mit Git rühren von einer von drei Ursachen: überraschendem Standardverhalten, partiellen Netzwerkoperationen oder dem Umschreiben bereits geteilter Historie. Ein funktionierendes mentales Modell der Nebenwirkungen von <code>git add</code> hilft, alle drei zu vermeiden.</p>
        <h2>Häufige Optionen</h2>
        <table><thead><tr><th>Option</th><th>Beschreibung</th></tr></thead><tbody><tr><td><code>-A</code>, <code>--all</code></td><td>Staged alle Änderungen im Working Tree, einschließlich Löschungen und neuer Dateien.</td></tr><tr><td><code>-u</code>, <code>--update</code></td><td>Staged nur Modifikationen und Löschungen verfolgter Dateien — ignoriert neue Dateien.</td></tr><tr><td><code>-p</code>, <code>--patch</code></td><td>Wählt interaktiv Hunks von Änderungen zum Stagen aus.</td></tr><tr><td><code>-n</code>, <code>--dry-run</code></td><td>Zeigt, was gestaged würde, ohne tatsächlich zu stagen.</td></tr><tr><td><code>-f</code>, <code>--force</code></td><td>Fügt Dateien hinzu, auch wenn sie auf <code>.gitignore</code> passen.</td></tr><tr><td><code>-i</code>, <code>--interactive</code></td><td>Öffnet eine menügesteuerte Oberfläche zum Stagen.</td></tr><tr><td><code>--intent-to-add</code> / <code>-N</code></td><td>Zeichnet die Absicht auf, eine Datei hinzuzufügen, sodass deren Diff erscheint.</td></tr></tbody></table>
        <h2>Beispiele</h2>
        <pre><code>git add README.md src/main.c
        # Zwei bestimmte Dateien stagen

        git add -A
        # Alles stagen: neue, geänderte und gelöschte Dateien

        git add -p
        # Stücke interaktiv überprüfen und Stück für Stück stagen

        git add 'src/**/*.js'
        # Alle JavaScript-Dateien unter src per Pathspec stagen</code></pre>
        <h2>Häufige Fehler</h2>
        <p>Blindes <code>git add .</code> staget oft Dateien, die Sie nicht beabsichtigt haben — Logdateien, Build-Artefakte, geheime Schlüssel. Verwenden Sie zuerst <code>git status</code> und ziehen Sie <code>-p</code> für sensible Änderungen in Betracht. Eine weitere häufige Verwirrung: <code>git add -u</code> erfasst keine neuen Dateien, während <code>git add .</code> dies tut. Wenn Sie eine Datei nach dem Stagen erneut ändern, sind diese folgenden Bearbeitungen nicht gestaged, bis Sie <code>git add</code> erneut ausführen.</p>
        <h2>Verwandte Befehle</h2>
        <p><code>git commit</code>, <code>git status</code>, <code>git restore</code>, <code>git reset</code></p>
- source_title: git commit — Record staged changes to the repository
  title: git commit — Gestagte Änderungen ins Repository aufzeichnen
  langcode: de
  body: |-
    <h2>Übersicht</h2>
        <pre><code>git commit [-m &lt;msg&gt;] [-a] [--amend] [--no-verify] [-S]</code></pre>
        <h2>Beschreibung</h2>
        <p>Der <code>git commit</code>-Befehl nimmt alles, was sich aktuell in der Staging Area befindet, und erstellt ein neues Commit-Objekt im Repository. Ein Commit ist ein unveränderlicher Snapshot, der einen Tree (die Dateiinhalte), Eltern-Zeiger, Autor- und Committer-Metadaten sowie eine Nachricht enthält. Commits sind die Einheit der Historie in Git: Branches sind Zeiger auf Commits, Merges erzeugen Commits mit mehreren Eltern, und Tags markieren bestimmte Commits.</p>
        <p>Eine gute Commit-Nachricht hat eine kurze Betreffzeile (unter 50 Zeichen), eine Leerzeile und einen optionalen Body, der das Warum erklärt. Viele Teams verwenden Conventional Commits oder andere Präfixsysteme. Die Option <code>--amend</code> modifiziert den jüngsten Commit, nützlich zum Korrigieren von Tippfehlern in der Nachricht oder wenn Sie vergessen haben, eine Datei zu stagen — aber ändern Sie niemals einen Commit, der bereits gepusht und geteilt wurde.</p>
        <p>Im täglichen Einsatz integriert sich <code>git commit</code> eng mit Shell-Aliasen, Editor-Plugins und Continuous Integration. Power-User fügen oft Aliase hinzu, die Flags kombinieren, die sie immer übergeben, oder wickeln den Befehl in Skripte, die Teamkonventionen durchsetzen. Die Ausgabeformatierung kann über Git-Config angepasst werden — Pretty-Formate, Farbschemata und Pager-Verhalten sind alle einstellbar. Wenn etwas schiefgeht, ist der erste Diagnoseschritt üblicherweise, den Befehl erneut mit <code>GIT_TRACE=1</code> in der Umgebung auszuführen, was die zugrunde liegenden Plumbing-Aufrufe offenlegt. Für ungewöhnliche Situationen öffnet die <code>--help</code>-Ausgabe (<code>git commit --help</code>) die vollständige Manpage mit Details zu jeder Option, einschließlich solcher, die in alltäglichen Workflows selten verwendet werden, aber für Debugging oder Skripting im großen Maßstab essentiell sind.</p>
        <p>Zu verstehen, wie <code>git commit</code> mit dem Rest von Gits Datenmodell interagiert — der Objektdatenbank, dem Index, Refs und dem Working Tree — zahlt sich aus. Jeder Befehl operiert auf einer Teilmenge dieser Stücke, und zu wissen, welche er berührt, hilft Ergebnisse vorherzusagen und sich von Fehlern zu erholen. Das Lesen der offiziellen Git-Dokumentation neben praktischer Übung in einem Wegwerf-Repository ist der schnellste Weg, die Nuancen zu verinnerlichen. Die meisten Produktionsprobleme mit Git rühren von einer von drei Ursachen: überraschendem Standardverhalten, partiellen Netzwerkoperationen oder dem Umschreiben bereits geteilter Historie. Ein funktionierendes mentales Modell der Nebenwirkungen von <code>git commit</code> hilft, alle drei zu vermeiden.</p>
        <h2>Häufige Optionen</h2>
        <table><thead><tr><th>Option</th><th>Beschreibung</th></tr></thead><tbody><tr><td><code>-m &lt;msg&gt;</code></td><td>Verwendet die angegebene Nachricht statt einen Editor zu öffnen.</td></tr><tr><td><code>-a</code>, <code>--all</code></td><td>Staged automatisch Modifikationen und Löschungen verfolgter Dateien vor dem Committen.</td></tr><tr><td><code>--amend</code></td><td>Ersetzt den jüngsten Commit durch einen neuen.</td></tr><tr><td><code>--no-verify</code></td><td>Überspringt pre-commit- und commit-msg-Hooks.</td></tr><tr><td><code>-S</code>, <code>--gpg-sign</code></td><td>Signiert den Commit per GPG.</td></tr><tr><td><code>--allow-empty</code></td><td>Erlaubt einen Commit ohne Änderungen.</td></tr><tr><td><code>--fixup=&lt;commit&gt;</code></td><td>Erstellt einen Fixup-Commit für die Verwendung mit Autosquash-Rebase.</td></tr><tr><td><code>-v</code>, <code>--verbose</code></td><td>Zeigt den Diff im Editor für die Commit-Nachricht.</td></tr></tbody></table>
        <h2>Beispiele</h2>
        <pre><code>git commit -m "Fix off-by-one error in pagination"
        # Schneller Commit mit einzeiliger Nachricht

        git commit -am "Update README"
        # Verfolgte Änderungen stagen und in einem Schritt committen

        git commit --amend -m "Better message"
        # Die Nachricht des jüngsten Commits umschreiben

        git commit --fixup=abc123
        # Fixup-Commit erstellen, der beim Rebase gesquasht wird</code></pre>
        <h2>Häufige Fehler</h2>
        <p>Einen veröffentlichten Commit zu ändern und dann force-zu-pushen schreibt Historie um, auf der andere Arbeit aufgebaut haben können, was zu Verwirrung führt. Ändern Sie nur lokale, nicht geteilte Commits. Ein weiterer Fehler ist das Committen mit <code>-a</code>, wenn auch untracked Dateien einbezogen werden sollten — <code>-a</code> ignoriert neue Dateien. Schließlich: Verwenden Sie <code>--no-verify</code> niemals nur, um fehlgeschlagene Tests zu umgehen; reparieren Sie stattdessen den Test oder den Code.</p>
        <h2>Verwandte Befehle</h2>
        <p><code>git add</code>, <code>git status</code>, <code>git log</code>, <code>git revert</code></p>
- source_title: git status — Show the working tree status
  title: git status — Den Status des Working Trees anzeigen
  langcode: de
  body: |-
    <h2>Übersicht</h2>
        <pre><code>git status [-s] [-b] [--porcelain[=&lt;version&gt;]] [--ignored]</code></pre>
        <h2>Beschreibung</h2>
        <p>Der <code>git status</code>-Befehl zeigt den Zustand des Working Trees und der Staging Area. Er zeigt, welche Dateien für den nächsten Commit gestaged sind, welche modifiziert, aber nicht gestaged sind, und welche untracked sind. Er meldet auch den aktuellen Branch, ob er voraus oder zurück gegenüber dem Upstream ist, und alle laufenden Operationen wie Merges oder Rebases.</p>
        <p><code>git status</code> ist der am häufigsten ausgeführte Git-Befehl — er ist sicher, schnell und informativ. Verwenden Sie ihn ständig, um zu bestätigen, in welchem Zustand sich Ihr Repository befindet, bevor Sie Entscheidungen treffen. Die Standardausgabe ist menschenfreundlich mit Farben und Hinweisen; die <code>--porcelain</code>-Ausgabe ist stabil, maschinenlesbar und für Skripte gedacht.</p>
        <p>Im täglichen Einsatz integriert sich <code>git status</code> eng mit Shell-Aliasen, Editor-Plugins und Continuous Integration. Power-User fügen oft Aliase hinzu, die Flags kombinieren, die sie immer übergeben, oder wickeln den Befehl in Skripte, die Teamkonventionen durchsetzen. Die Ausgabeformatierung kann über Git-Config angepasst werden — Pretty-Formate, Farbschemata und Pager-Verhalten sind alle einstellbar. Wenn etwas schiefgeht, ist der erste Diagnoseschritt üblicherweise, den Befehl erneut mit <code>GIT_TRACE=1</code> in der Umgebung auszuführen, was die zugrunde liegenden Plumbing-Aufrufe offenlegt. Für ungewöhnliche Situationen öffnet die <code>--help</code>-Ausgabe (<code>git status --help</code>) die vollständige Manpage mit Details zu jeder Option, einschließlich solcher, die in alltäglichen Workflows selten verwendet werden, aber für Debugging oder Skripting im großen Maßstab essentiell sind.</p>
        <p>Zu verstehen, wie <code>git status</code> mit dem Rest von Gits Datenmodell interagiert — der Objektdatenbank, dem Index, Refs und dem Working Tree — zahlt sich aus. Jeder Befehl operiert auf einer Teilmenge dieser Stücke, und zu wissen, welche er berührt, hilft Ergebnisse vorherzusagen und sich von Fehlern zu erholen. Das Lesen der offiziellen Git-Dokumentation neben praktischer Übung in einem Wegwerf-Repository ist der schnellste Weg, die Nuancen zu verinnerlichen. Die meisten Produktionsprobleme mit Git rühren von einer von drei Ursachen: überraschendem Standardverhalten, partiellen Netzwerkoperationen oder dem Umschreiben bereits geteilter Historie. Ein funktionierendes mentales Modell der Nebenwirkungen von <code>git status</code> hilft, alle drei zu vermeiden.</p>
        <h2>Häufige Optionen</h2>
        <table><thead><tr><th>Option</th><th>Beschreibung</th></tr></thead><tbody><tr><td><code>-s</code>, <code>--short</code></td><td>Anzeige im Kurzformat mit zweistelligen Statuscodes.</td></tr><tr><td><code>-b</code>, <code>--branch</code></td><td>Zeigt Branch- und Tracking-Info auch im Kurzformat.</td></tr><tr><td><code>--porcelain</code></td><td>Stabile maschinenlesbare Ausgabe für Skripte.</td></tr><tr><td><code>--ignored</code></td><td>Zeigt auch ignorierte Dateien an.</td></tr><tr><td><code>-u &lt;mode&gt;</code></td><td>Steuert, wie untracked Dateien gemeldet werden (<code>no</code>, <code>normal</code>, <code>all</code>).</td></tr><tr><td><code>--ahead-behind</code></td><td>Berechnet voraus/zurück-Zählungen gegenüber dem Upstream.</td></tr></tbody></table>
        <h2>Beispiele</h2>
        <pre><code>git status
        # Vollständiger menschenlesbarer Status

        git status -sb
        # Kompaktes Format mit Branch-Info

        git status --porcelain=v2 --branch
        # Stabile Ausgabe für Shell-Skripte und Editoren

        git status --ignored
        # Auch von .gitignore erfasste Dateien einbeziehen</code></pre>
        <h2>Häufige Fehler</h2>
        <p>Anfänger geraten manchmal in Panik, wenn <code>git status</code> viele untracked Dateien in einem frisch geklonten Repo mit Build-Artefakten zeigt. Fügen Sie eine ordentliche <code>.gitignore</code> hinzu, um sie herauszufiltern. Eine weitere Falle ist das Parsen der Standardausgabe in Skripten — das Format kann zwischen Versionen und Übersetzungen variieren. Verwenden Sie für Automatisierung immer <code>--porcelain</code>. Schließlich: Große untracked Verzeichnisse können Status erheblich verlangsamen; verwenden Sie <code>-uno</code>, um sie zu überspringen.</p>
        <h2>Verwandte Befehle</h2>
        <p><code>git diff</code>, <code>git log</code>, <code>git add</code>, <code>git stash</code></p>
- source_title: git diff — Show changes between commits, trees, or the working tree
  title: git diff — Änderungen zwischen Commits, Trees oder dem Working Tree anzeigen
  langcode: de
  body: |-
    <h2>Übersicht</h2>
        <pre><code>git diff [&lt;options&gt;] [&lt;commit&gt;] [--] [&lt;path&gt;...]</code></pre>
        <h2>Beschreibung</h2>
        <p>Der <code>git diff</code>-Befehl zeigt Unterschiede zwischen zwei Mengen von Dateiinhalten. Ohne Argumente vergleicht er den Working Tree mit der Staging Area und zeigt, was nicht gestaged ist. Mit <code>--cached</code> (oder <code>--staged</code>) vergleicht er die Staging Area mit dem jüngsten Commit. Mit einem oder zwei Commit-Argumenten vergleicht er diese Commits.</p>
        <p>Diffs sind zentral für Code-Review, Debugging und das Verständnis von Historie. Git erzeugt standardmäßig Unified Diffs, kann aber auch wortbasierte Diffs, Color-Moved-Hervorhebung und Statistiken ausgeben. Für Binärdateien wird nur eine "Differs"-Zeile angezeigt, es sei denn, ein Binär-Diff-Driver ist konfiguriert.</p>
        <p>Im täglichen Einsatz integriert sich <code>git diff</code> eng mit Shell-Aliasen, Editor-Plugins und Continuous Integration. Power-User fügen oft Aliase hinzu, die Flags kombinieren, die sie immer übergeben, oder wickeln den Befehl in Skripte, die Teamkonventionen durchsetzen. Die Ausgabeformatierung kann über Git-Config angepasst werden — Pretty-Formate, Farbschemata und Pager-Verhalten sind alle einstellbar. Wenn etwas schiefgeht, ist der erste Diagnoseschritt üblicherweise, den Befehl erneut mit <code>GIT_TRACE=1</code> in der Umgebung auszuführen, was die zugrunde liegenden Plumbing-Aufrufe offenlegt. Für ungewöhnliche Situationen öffnet die <code>--help</code>-Ausgabe (<code>git diff --help</code>) die vollständige Manpage mit Details zu jeder Option, einschließlich solcher, die in alltäglichen Workflows selten verwendet werden, aber für Debugging oder Skripting im großen Maßstab essentiell sind.</p>
        <p>Zu verstehen, wie <code>git diff</code> mit dem Rest von Gits Datenmodell interagiert — der Objektdatenbank, dem Index, Refs und dem Working Tree — zahlt sich aus. Jeder Befehl operiert auf einer Teilmenge dieser Stücke, und zu wissen, welche er berührt, hilft Ergebnisse vorherzusagen und sich von Fehlern zu erholen. Das Lesen der offiziellen Git-Dokumentation neben praktischer Übung in einem Wegwerf-Repository ist der schnellste Weg, die Nuancen zu verinnerlichen. Die meisten Produktionsprobleme mit Git rühren von einer von drei Ursachen: überraschendem Standardverhalten, partiellen Netzwerkoperationen oder dem Umschreiben bereits geteilter Historie. Ein funktionierendes mentales Modell der Nebenwirkungen von <code>git diff</code> hilft, alle drei zu vermeiden.</p>
        <h2>Häufige Optionen</h2>
        <table><thead><tr><th>Option</th><th>Beschreibung</th></tr></thead><tbody><tr><td><code>--cached</code> / <code>--staged</code></td><td>Vergleicht den Index mit HEAD statt Working Tree mit Index.</td></tr><tr><td><code>--stat</code></td><td>Zeigt eine Zusammenfassung der Einfügungen/Löschungen pro Datei.</td></tr><tr><td><code>--name-only</code></td><td>Listet nur die Namen der unterschiedlichen Dateien auf.</td></tr><tr><td><code>--word-diff</code></td><td>Hebt Änderungen auf Wortebene hervor.</td></tr><tr><td><code>-w</code>, <code>--ignore-all-space</code></td><td>Ignoriert Whitespace-Unterschiede.</td></tr><tr><td><code>--color-moved</code></td><td>Hebt verschobene Codeblöcke hervor.</td></tr><tr><td><code>-U&lt;n&gt;</code></td><td>Zeigt <code>n</code> Kontextzeilen (Standard 3).</td></tr></tbody></table>
        <h2>Beispiele</h2>
        <pre><code>git diff
        # Ungestagte Änderungen im Working Tree

        git diff --cached
        # Für den nächsten Commit gestagte Änderungen

        git diff main..feature
        # Alle Unterschiede zwischen zwei Branches

        git diff HEAD~3 HEAD -- src/
        # Letzte drei Commits, beschränkt auf src/</code></pre>
        <h2>Häufige Fehler</h2>
        <p>Das Vergessen von <code>--cached</code> beim Überprüfen, was gleich committet wird, ist eine klassische Verwirrung. Eine weitere ist die falsche Verwendung der Zwei-Punkt- vs. Drei-Punkt-Bereichssyntax: <code>A..B</code> sind "Unterschiede von A nach B", während <code>A...B</code> "Unterschiede von der Merge-Basis nach B" sind. Riesige reine Whitespace-Diffs nach Editor-Änderungen lassen sich mit <code>-w</code> zähmen.</p>
        <h2>Verwandte Befehle</h2>
        <p><code>git status</code>, <code>git log -p</code>, <code>git show</code>, <code>git range-diff</code></p>
- source_title: git rm — Remove files from the working tree and index
  title: git rm — Dateien aus dem Working Tree und dem Index entfernen
  langcode: de
  body: |-
    <h2>Übersicht</h2>
        <pre><code>git rm [-f] [-r] [--cached] [--] &lt;file&gt;...</code></pre>
        <h2>Beschreibung</h2>
        <p>Der <code>git rm</code>-Befehl entfernt Dateien in einem Schritt aus dem Working Tree und dem Index und staget die Löschung für den nächsten Commit. Die Verwendung von <code>git rm</code> ist bequemer als das Entfernen der Datei mit <code>rm</code> und anschließendem <code>git add</code> — auch wenn beide Ansätze denselben Endzustand erzeugen.</p>
        <p>Das <code>--cached</code>-Flag ist besonders nützlich: Es entfernt die Datei aus dem Index, ohne sie aus dem Working Tree zu löschen. Es ist das richtige Werkzeug, wenn Sie versehentlich eine Datei committet haben (etwa eine Konfigurationsdatei mit Geheimnissen oder ein Build-Artefakt) und das Tracking beenden, sie aber auf der Festplatte behalten wollen.</p>
        <p>Im täglichen Einsatz integriert sich <code>git rm</code> eng mit Shell-Aliasen, Editor-Plugins und Continuous Integration. Power-User fügen oft Aliase hinzu, die Flags kombinieren, die sie immer übergeben, oder wickeln den Befehl in Skripte, die Teamkonventionen durchsetzen. Die Ausgabeformatierung kann über Git-Config angepasst werden — Pretty-Formate, Farbschemata und Pager-Verhalten sind alle einstellbar. Wenn etwas schiefgeht, ist der erste Diagnoseschritt üblicherweise, den Befehl erneut mit <code>GIT_TRACE=1</code> in der Umgebung auszuführen, was die zugrunde liegenden Plumbing-Aufrufe offenlegt. Für ungewöhnliche Situationen öffnet die <code>--help</code>-Ausgabe (<code>git rm --help</code>) die vollständige Manpage mit Details zu jeder Option, einschließlich solcher, die in alltäglichen Workflows selten verwendet werden, aber für Debugging oder Skripting im großen Maßstab essentiell sind.</p>
        <p>Zu verstehen, wie <code>git rm</code> mit dem Rest von Gits Datenmodell interagiert — der Objektdatenbank, dem Index, Refs und dem Working Tree — zahlt sich aus. Jeder Befehl operiert auf einer Teilmenge dieser Stücke, und zu wissen, welche er berührt, hilft Ergebnisse vorherzusagen und sich von Fehlern zu erholen. Das Lesen der offiziellen Git-Dokumentation neben praktischer Übung in einem Wegwerf-Repository ist der schnellste Weg, die Nuancen zu verinnerlichen. Die meisten Produktionsprobleme mit Git rühren von einer von drei Ursachen: überraschendem Standardverhalten, partiellen Netzwerkoperationen oder dem Umschreiben bereits geteilter Historie. Ein funktionierendes mentales Modell der Nebenwirkungen von <code>git rm</code> hilft, alle drei zu vermeiden.</p>
        <h2>Häufige Optionen</h2>
        <table><thead><tr><th>Option</th><th>Beschreibung</th></tr></thead><tbody><tr><td><code>-f</code>, <code>--force</code></td><td>Überschreibt Sicherheitsprüfungen, wenn die Datei uncommitted Änderungen enthält.</td></tr><tr><td><code>-r</code></td><td>Entfernt Verzeichnisse rekursiv.</td></tr><tr><td><code>--cached</code></td><td>Entfernt nur aus dem Index; lässt die Datei im Working Tree unverändert.</td></tr><tr><td><code>-n</code>, <code>--dry-run</code></td><td>Zeigt, was entfernt würde, ohne es zu tun.</td></tr><tr><td><code>--ignore-unmatch</code></td><td>Beendet sich mit Null-Status, auch wenn keine Dateien passen.</td></tr><tr><td><code>-q</code>, <code>--quiet</code></td><td>Unterdrückt Ausgabe.</td></tr></tbody></table>
        <h2>Beispiele</h2>
        <pre><code>git rm old-file.txt
        # Datei löschen und Löschung stagen

        git rm -r build/
        # Verzeichnis rekursiv aus dem Repo entfernen

        git rm --cached secrets.env
        # Tracking einer Datei beenden, sie aber lokal behalten
        # Anschließend zu .gitignore hinzufügen!

        git rm -n '*.log'
        # Vorschau, welche Logdateien entfernt würden</code></pre>
        <h2>Häufige Fehler</h2>
        <p>Der größte Fallstrick: Vergessen, dass <code>git rm --cached</code> nur künftiges Tracking beendet — vergangene Commits enthalten die Datei weiterhin. Wenn Sie ein Geheimnis aus der Historie entfernen müssen, verwenden Sie <code>git filter-repo</code> oder BFG. Ein weiterer Fehler ist das Ausführen von <code>git rm</code> auf einer Datei mit unstaged Modifikationen, ohne zu merken, dass diese Änderungen verloren gehen. Verwenden Sie im Zweifel zuerst <code>-n</code>.</p>
        <h2>Verwandte Befehle</h2>
        <p><code>git add</code>, <code>git mv</code>, <code>git restore</code>, <code>git filter-repo</code></p>
- source_title: git mv — Move or rename a tracked file
  title: git mv — Eine verfolgte Datei verschieben oder umbenennen
  langcode: de
  body: |-
    <h2>Übersicht</h2>
        <pre><code>git mv [-f] [-k] [-n] &lt;source&gt; &lt;destination&gt;</code></pre>
        <h2>Beschreibung</h2>
        <p>Der <code>git mv</code>-Befehl benennt eine verfolgte Datei um oder verschiebt sie und staget die Änderung. Intern entspricht er dem Ausführen von <code>mv</code>, gefolgt von <code>git add</code> auf den neuen Pfad und <code>git rm</code> auf den alten. Der Vorteil ist, dass die Umbenennung in einem einzigen atomaren Schritt geschieht, der eindeutig gestaged wird.</p>
        <p>Hinweis: Git speichert Umbenennungen tatsächlich nicht als erstklassige Operationen. Stattdessen erkennt es Umbenennungen, indem es die Inhaltsähnlichkeit von Dateien zur Diff- und Log-Zeit vergleicht. Egal also, ob Sie <code>git mv</code> oder einfaches <code>mv</code> + <code>git add</code> + <code>git rm</code> verwenden, der resultierende Commit ist identisch, und die Umbenennungserkennung funktioniert genauso.</p>
        <p>Im täglichen Einsatz integriert sich <code>git mv</code> eng mit Shell-Aliasen, Editor-Plugins und Continuous Integration. Power-User fügen oft Aliase hinzu, die Flags kombinieren, die sie immer übergeben, oder wickeln den Befehl in Skripte, die Teamkonventionen durchsetzen. Die Ausgabeformatierung kann über Git-Config angepasst werden — Pretty-Formate, Farbschemata und Pager-Verhalten sind alle einstellbar. Wenn etwas schiefgeht, ist der erste Diagnoseschritt üblicherweise, den Befehl erneut mit <code>GIT_TRACE=1</code> in der Umgebung auszuführen, was die zugrunde liegenden Plumbing-Aufrufe offenlegt. Für ungewöhnliche Situationen öffnet die <code>--help</code>-Ausgabe (<code>git mv --help</code>) die vollständige Manpage mit Details zu jeder Option, einschließlich solcher, die in alltäglichen Workflows selten verwendet werden, aber für Debugging oder Skripting im großen Maßstab essentiell sind.</p>
        <p>Zu verstehen, wie <code>git mv</code> mit dem Rest von Gits Datenmodell interagiert — der Objektdatenbank, dem Index, Refs und dem Working Tree — zahlt sich aus. Jeder Befehl operiert auf einer Teilmenge dieser Stücke, und zu wissen, welche er berührt, hilft Ergebnisse vorherzusagen und sich von Fehlern zu erholen. Das Lesen der offiziellen Git-Dokumentation neben praktischer Übung in einem Wegwerf-Repository ist der schnellste Weg, die Nuancen zu verinnerlichen. Die meisten Produktionsprobleme mit Git rühren von einer von drei Ursachen: überraschendem Standardverhalten, partiellen Netzwerkoperationen oder dem Umschreiben bereits geteilter Historie. Ein funktionierendes mentales Modell der Nebenwirkungen von <code>git mv</code> hilft, alle drei zu vermeiden.</p>
        <h2>Häufige Optionen</h2>
        <table><thead><tr><th>Option</th><th>Beschreibung</th></tr></thead><tbody><tr><td><code>-f</code>, <code>--force</code></td><td>Überschreibt das Ziel, falls es existiert.</td></tr><tr><td><code>-k</code></td><td>Überspringt Verschiebe-/Umbenennungsaktionen, die fehlschlagen würden, ohne Fehler.</td></tr><tr><td><code>-n</code>, <code>--dry-run</code></td><td>Zeigt, was passieren würde, ohne es zu tun.</td></tr><tr><td><code>-v</code>, <code>--verbose</code></td><td>Meldet die Namen verschobener Dateien.</td></tr></tbody></table>
        <h2>Beispiele</h2>
        <pre><code>git mv old-name.txt new-name.txt
        # Eine Datei in einem Schritt umbenennen

        git mv src/utils.js src/lib/utils.js
        # Eine Datei in ein neues Verzeichnis verschieben (es muss bereits existieren)

        git mv -n *.md docs/
        # Vorschau auf das Verschieben aller Markdown-Dateien nach docs/

        git mv -f draft.md final.md
        # Überschreiben erzwingen, falls final.md bereits existiert</code></pre>
        <h2>Häufige Fehler</h2>
        <p>Wenn Sie eine Datei außerhalb von Git umbenennen (mit Ihrem Editor oder <code>mv</code>), funktioniert Gits Umbenennungserkennung beim Diff üblicherweise immer noch — Sie müssen aber <code>git add -A</code> ausführen, um sowohl die Löschung als auch das Hinzufügen zu stagen. Ein weiteres Problem: reine Groß-/Kleinschreibungs-Umbenennungen auf Case-insensitiven Dateisystemen (macOS, Windows) erfordern <code>git mv -f</code> oder eine zweistufige Umbenennung über einen temporären Namen.</p>
        <h2>Verwandte Befehle</h2>
        <p><code>git add</code>, <code>git rm</code>, <code>git log --follow</code></p>
- source_title: git branch — List, create, or delete branches
  title: git branch — Branches auflisten, erstellen oder löschen
  langcode: de
  body: |-
    <h2>Übersicht</h2>
        <pre><code>git branch [-a] [-r] [-v] [-d &lt;name&gt;] [-m &lt;old&gt; &lt;new&gt;] [&lt;name&gt; [&lt;start-point&gt;]]</code></pre>
        <h2>Beschreibung</h2>
        <p>Der <code>git branch</code>-Befehl verwaltet Branches. Ohne Argumente listet er lokale Branches auf und markiert den aktuellen mit einem Sternchen. Mit einem Namen erstellt er einen neuen Branch, der auf das aktuelle HEAD zeigt (oder auf einen angegebenen Startpunkt). Er kann Branches auch löschen, umbenennen und inspizieren. Ein Branch ist in Git ein leichtgewichtiger, beweglicher Zeiger auf einen Commit — einen zu erstellen ist im Wesentlichen kostenlos, weshalb Git-Workflows viele kurzlebige Branches fördern.</p>
        <p>Hinweis: <code>git branch &lt;name&gt;</code> erstellt einen Branch, wechselt aber nicht zu ihm. Um zu erstellen und in einem Schritt zu wechseln, verwenden Sie <code>git switch -c &lt;name&gt;</code> oder <code>git checkout -b &lt;name&gt;</code>. Das <code>--track</code>-Verhalten lässt einen neuen Branch einem Remote-Branch für Push/Pull-Defaults folgen.</p>
        <p>Im täglichen Einsatz integriert sich <code>git branch</code> eng mit Shell-Aliasen, Editor-Plugins und Continuous Integration. Power-User fügen oft Aliase hinzu, die Flags kombinieren, die sie immer übergeben, oder wickeln den Befehl in Skripte, die Teamkonventionen durchsetzen. Die Ausgabeformatierung kann über Git-Config angepasst werden — Pretty-Formate, Farbschemata und Pager-Verhalten sind alle einstellbar. Wenn etwas schiefgeht, ist der erste Diagnoseschritt üblicherweise, den Befehl erneut mit <code>GIT_TRACE=1</code> in der Umgebung auszuführen, was die zugrunde liegenden Plumbing-Aufrufe offenlegt. Für ungewöhnliche Situationen öffnet die <code>--help</code>-Ausgabe (<code>git branch --help</code>) die vollständige Manpage mit Details zu jeder Option, einschließlich solcher, die in alltäglichen Workflows selten verwendet werden, aber für Debugging oder Skripting im großen Maßstab essentiell sind.</p>
        <p>Zu verstehen, wie <code>git branch</code> mit dem Rest von Gits Datenmodell interagiert — der Objektdatenbank, dem Index, Refs und dem Working Tree — zahlt sich aus. Jeder Befehl operiert auf einer Teilmenge dieser Stücke, und zu wissen, welche er berührt, hilft Ergebnisse vorherzusagen und sich von Fehlern zu erholen. Das Lesen der offiziellen Git-Dokumentation neben praktischer Übung in einem Wegwerf-Repository ist der schnellste Weg, die Nuancen zu verinnerlichen. Die meisten Produktionsprobleme mit Git rühren von einer von drei Ursachen: überraschendem Standardverhalten, partiellen Netzwerkoperationen oder dem Umschreiben bereits geteilter Historie. Ein funktionierendes mentales Modell der Nebenwirkungen von <code>git branch</code> hilft, alle drei zu vermeiden.</p>
        <h2>Häufige Optionen</h2>
        <table><thead><tr><th>Option</th><th>Beschreibung</th></tr></thead><tbody><tr><td><code>-a</code>, <code>--all</code></td><td>Listet sowohl lokale als auch Remote-Tracking-Branches auf.</td></tr><tr><td><code>-r</code>, <code>--remotes</code></td><td>Listet nur Remote-Tracking-Branches auf.</td></tr><tr><td><code>-v</code>, <code>--verbose</code></td><td>Zeigt den jüngsten Commit jedes Branches.</td></tr><tr><td><code>-d &lt;name&gt;</code></td><td>Löscht einen vollständig gemergten Branch.</td></tr><tr><td><code>-D &lt;name&gt;</code></td><td>Erzwingt das Löschen eines Branches, auch wenn er nicht gemerged ist.</td></tr><tr><td><code>-m &lt;old&gt; &lt;new&gt;</code></td><td>Benennt einen Branch um.</td></tr><tr><td><code>--merged</code> / <code>--no-merged</code></td><td>Filtert Branches, die in HEAD (nicht) gemerged sind.</td></tr><tr><td><code>--set-upstream-to=&lt;remote&gt;/&lt;branch&gt;</code></td><td>Konfiguriert Tracking für den aktuellen Branch.</td></tr></tbody></table>
        <h2>Beispiele</h2>
        <pre><code>git branch
        # Lokale Branches auflisten

        git branch feature/login
        # Einen neuen Branch vom aktuellen HEAD erstellen

        git branch -d old-feature
        # Einen gemergten Branch löschen

        git branch -m main trunk
        # Den lokalen Branch main in trunk umbenennen

        git branch -a -v
        # Alle Branches (lokal + remote) mit letzten Commits auflisten</code></pre>
        <h2>Häufige Fehler</h2>
        <p>Das Verwenden von <code>-D</code>, um einen Branch zu erzwungenen löschen, kann ungemergte Commits für immer verlieren (jedenfalls bis zum Ablauf von <code>git reflog</code>). Versuchen Sie zuerst <code>-d</code>. Das Umbenennen des aktuellen Branches mit <code>-m</code> funktioniert ohne Argumente — <code>git branch -m new-name</code> benennt den Branch um, auf dem Sie sich befinden. Vergessen, Upstream-Tracking nach dem Erstellen eines Branches zu setzen, bedeutet, dass <code>git push</code> beim ersten Mal explizite Argumente brauchen kann.</p>
        <h2>Verwandte Befehle</h2>
        <p><code>git switch</code>, <code>git checkout</code>, <code>git merge</code>, <code>git push</code></p>
- source_title: git checkout — Switch branches or restore working tree files
  title: git checkout — Branches wechseln oder Working-Tree-Dateien wiederherstellen
  langcode: de
  body: |-
    <h2>Übersicht</h2>
        <pre><code>git checkout [&lt;branch&gt;]
    git checkout -b &lt;new-branch&gt; [&lt;start-point&gt;]
    git checkout [&lt;tree-ish&gt;] -- &lt;file&gt;...</code></pre>
        <h2>Beschreibung</h2>
        <p>Der <code>git checkout</code>-Befehl tut historisch zwei nicht zusammenhängende Dinge: Branches wechseln und Dateien wiederherstellen. Wegen dieser Überladung führte modernes Git <code>git switch</code> für Branch-Operationen und <code>git restore</code> für Datei-Operationen ein. <code>git checkout</code> funktioniert weiterhin und bleibt beliebt, aber neue Nutzer werden ermutigt, die neueren aufgeteilten Befehle zu lernen.</p>
        <p>Wenn ein Branch-Name übergeben wird, bewegt <code>git checkout</code> HEAD auf diesen Branch und aktualisiert den Working Tree. Mit einem Pfad-Argument überschreibt er die Working-Tree-Datei mit der Version aus dem Index (oder aus einem angegebenen Commit). Das <code>-b</code>-Flag erstellt einen neuen Branch und wechselt in einem Schritt zu ihm.</p>
        <p>Im täglichen Einsatz integriert sich <code>git checkout</code> eng mit Shell-Aliasen, Editor-Plugins und Continuous Integration. Power-User fügen oft Aliase hinzu, die Flags kombinieren, die sie immer übergeben, oder wickeln den Befehl in Skripte, die Teamkonventionen durchsetzen. Die Ausgabeformatierung kann über Git-Config angepasst werden — Pretty-Formate, Farbschemata und Pager-Verhalten sind alle einstellbar. Wenn etwas schiefgeht, ist der erste Diagnoseschritt üblicherweise, den Befehl erneut mit <code>GIT_TRACE=1</code> in der Umgebung auszuführen, was die zugrunde liegenden Plumbing-Aufrufe offenlegt. Für ungewöhnliche Situationen öffnet die <code>--help</code>-Ausgabe (<code>git checkout --help</code>) die vollständige Manpage mit Details zu jeder Option, einschließlich solcher, die in alltäglichen Workflows selten verwendet werden, aber für Debugging oder Skripting im großen Maßstab essentiell sind.</p>
        <p>Zu verstehen, wie <code>git checkout</code> mit dem Rest von Gits Datenmodell interagiert — der Objektdatenbank, dem Index, Refs und dem Working Tree — zahlt sich aus. Jeder Befehl operiert auf einer Teilmenge dieser Stücke, und zu wissen, welche er berührt, hilft Ergebnisse vorherzusagen und sich von Fehlern zu erholen. Das Lesen der offiziellen Git-Dokumentation neben praktischer Übung in einem Wegwerf-Repository ist der schnellste Weg, die Nuancen zu verinnerlichen. Die meisten Produktionsprobleme mit Git rühren von einer von drei Ursachen: überraschendem Standardverhalten, partiellen Netzwerkoperationen oder dem Umschreiben bereits geteilter Historie. Ein funktionierendes mentales Modell der Nebenwirkungen von <code>git checkout</code> hilft, alle drei zu vermeiden.</p>
        <h2>Häufige Optionen</h2>
        <table><thead><tr><th>Option</th><th>Beschreibung</th></tr></thead><tbody><tr><td><code>-b &lt;name&gt;</code></td><td>Erstellt einen neuen Branch und wechselt zu ihm.</td></tr><tr><td><code>-B &lt;name&gt;</code></td><td>Erstellt oder setzt einen Branch zurück und wechselt zu ihm.</td></tr><tr><td><code>--track</code></td><td>Richtet Tracking für einen Remote-Branch ein.</td></tr><tr><td><code>--detach</code></td><td>Checkt einen Commit im Detached-HEAD-Zustand aus.</td></tr><tr><td><code>--</code> &lt;path&gt;</td><td>Behandelt folgende Argumente als Pfade, nicht als Branches.</td></tr><tr><td><code>-f</code>, <code>--force</code></td><td>Verwirft lokale Änderungen beim Wechseln.</td></tr><tr><td><code>-p</code>, <code>--patch</code></td><td>Wählt interaktiv Hunks zum Wiederherstellen aus.</td></tr></tbody></table>
        <h2>Beispiele</h2>
        <pre><code>git checkout main
        # Auf den main-Branch wechseln

        git checkout -b feature/api origin/develop
        # Einen neuen Branch erstellen, der origin/develop trackt

        git checkout HEAD -- src/config.js
        # Lokale Änderungen an einer einzelnen Datei verwerfen

        git checkout v1.2.3
        # Detached HEAD bei einem bestimmten Tag</code></pre>
        <h2>Häufige Fehler</h2>
        <p>Das Ausführen von <code>git checkout &lt;file&gt;</code> überschreibt Ihre lokalen Bearbeitungen stillschweigend ohne Undo. Verwenden Sie stattdessen <code>git restore</code> — der Name ist klarer. Der Detached-HEAD-Zustand überrascht Anfänger: Dort gemachte Commits gehören zu keinem Branch und können verloren gehen, wenn Sie wegwechseln. Wenn Sie sie behalten wollen, erstellen Sie zuerst einen Branch.</p>
        <h2>Verwandte Befehle</h2>
        <p><code>git switch</code>, <code>git restore</code>, <code>git branch</code>, <code>git reset</code></p>
- source_title: git switch — Switch branches
  title: git switch — Branches wechseln
  langcode: de
  body: |-
    <h2>Übersicht</h2>
        <pre><code>git switch [-c &lt;new-branch&gt;] [--detach] &lt;branch&gt;</code></pre>
        <h2>Beschreibung</h2>
        <p>Der <code>git switch</code>-Befehl, eingeführt in Git 2.23, ist ein fokussierter Ersatz für die Branch-Wechsel-Hälfte von <code>git checkout</code>. Er wechselt nur Branches (oder erstellt und wechselt in einem Schritt). Er weigert sich, auf einzelnen Dateien zu operieren, was die häufigste Quelle der <code>checkout</code>-Fußangeln beseitigt. Wenn Sie heute Git lernen, bevorzugen Sie <code>git switch</code> für Branches und <code>git restore</code> für Dateien.</p>
        <p>Wie <code>checkout</code> aktualisiert <code>switch</code> HEAD, den Index und den Working Tree, um zum Ziel-Branch zu passen. Er weigert sich zu wechseln, falls dadurch uncommitted Änderungen überschrieben würden, es sei denn, Sie übergeben <code>--force</code>.</p>
        <p>Im täglichen Einsatz integriert sich <code>git switch</code> eng mit Shell-Aliasen, Editor-Plugins und Continuous Integration. Power-User fügen oft Aliase hinzu, die Flags kombinieren, die sie immer übergeben, oder wickeln den Befehl in Skripte, die Teamkonventionen durchsetzen. Die Ausgabeformatierung kann über Git-Config angepasst werden — Pretty-Formate, Farbschemata und Pager-Verhalten sind alle einstellbar. Wenn etwas schiefgeht, ist der erste Diagnoseschritt üblicherweise, den Befehl erneut mit <code>GIT_TRACE=1</code> in der Umgebung auszuführen, was die zugrunde liegenden Plumbing-Aufrufe offenlegt. Für ungewöhnliche Situationen öffnet die <code>--help</code>-Ausgabe (<code>git switch --help</code>) die vollständige Manpage mit Details zu jeder Option, einschließlich solcher, die in alltäglichen Workflows selten verwendet werden, aber für Debugging oder Skripting im großen Maßstab essentiell sind.</p>
        <p>Zu verstehen, wie <code>git switch</code> mit dem Rest von Gits Datenmodell interagiert — der Objektdatenbank, dem Index, Refs und dem Working Tree — zahlt sich aus. Jeder Befehl operiert auf einer Teilmenge dieser Stücke, und zu wissen, welche er berührt, hilft Ergebnisse vorherzusagen und sich von Fehlern zu erholen. Das Lesen der offiziellen Git-Dokumentation neben praktischer Übung in einem Wegwerf-Repository ist der schnellste Weg, die Nuancen zu verinnerlichen. Die meisten Produktionsprobleme mit Git rühren von einer von drei Ursachen: überraschendem Standardverhalten, partiellen Netzwerkoperationen oder dem Umschreiben bereits geteilter Historie. Ein funktionierendes mentales Modell der Nebenwirkungen von <code>git switch</code> hilft, alle drei zu vermeiden.</p>
        <h2>Häufige Optionen</h2>
        <table><thead><tr><th>Option</th><th>Beschreibung</th></tr></thead><tbody><tr><td><code>-c &lt;name&gt;</code>, <code>--create</code></td><td>Erstellt einen neuen Branch und wechselt zu ihm.</td></tr><tr><td><code>-C &lt;name&gt;</code>, <code>--force-create</code></td><td>Erstellt oder setzt einen Branch zurück und wechselt zu ihm.</td></tr><tr><td><code>--track</code></td><td>Richtet Tracking mit einem Remote-Branch ein.</td></tr><tr><td><code>--detach</code></td><td>Wechselt im Detached-HEAD-Modus zu einem Commit.</td></tr><tr><td><code>-</code></td><td>Wechselt zum vorherigen Branch (wie <code>cd -</code>).</td></tr><tr><td><code>--discard-changes</code></td><td>Verwirft lokale Änderungen beim Wechseln.</td></tr><tr><td><code>-m</code>, <code>--merge</code></td><td>Three-Way-Merge der lokalen Änderungen beim Wechseln.</td></tr></tbody></table>
        <h2>Beispiele</h2>
        <pre><code>git switch main
        # Zum main-Branch wechseln

        git switch -c feature/search
        # Einen neuen Branch erstellen und zu ihm wechseln

        git switch -
        # Zum vorherigen Branch zurückwechseln

        git switch --detach v3.0.0
        # Einen Tag inspizieren, ohne einen Branch zu erstellen</code></pre>
        <h2>Häufige Fehler</h2>
        <p>Eine häufige Verwirrung ist die Erwartung, dass <code>git switch</code> wie <code>git checkout</code> auf Dateien operiert. Das tut er nicht — verwenden Sie stattdessen <code>git restore</code>. Wenn Sie uncommitted Arbeit haben, die mit dem Ziel-Branch in Konflikt steht, schlägt das Wechseln fehl; entweder committen, stashen oder <code>--merge</code> verwenden, um einen Three-Way-Merge zu versuchen.</p>
        <h2>Verwandte Befehle</h2>
        <p><code>git checkout</code>, <code>git restore</code>, <code>git branch</code>, <code>git stash</code></p>
- source_title: git merge — Join two or more development histories together
  title: git merge — Zwei oder mehr Entwicklungshistorien zusammenführen
  langcode: de
  body: |-
    <h2>Übersicht</h2>
        <pre><code>git merge [--no-ff] [--squash] [--abort] [-s &lt;strategy&gt;] [&lt;branch&gt;]</code></pre>
        <h2>Beschreibung</h2>
        <p>Der <code>git merge</code>-Befehl integriert Änderungen aus einem Branch in einen anderen. Standardmäßig erzeugt er einen "echten Merge"-Commit mit zwei Eltern und bewahrt die Topologie beider Historien. Wenn der Ziel-Branch ein strikter Vorfahre der Quelle ist, führt Git ein Fast-Forward durch, indem es einfach den Branch-Zeiger bewegt; übergeben Sie <code>--no-ff</code>, um immer einen Merge-Commit aufzuzeichnen.</p>
        <p>Wenn dieselben Zeilen auf beiden Seiten geändert werden, hält Git mit einem Konfliktmarker an. Sie lösen manuell auf, dann führen Sie <code>git add</code> auf den Dateien aus und führen <code>git commit</code> aus (oder <code>git merge --continue</code>). Um aus einem laufenden Merge auszusteigen, verwenden Sie <code>git merge --abort</code>.</p>
        <p>Im täglichen Einsatz integriert sich <code>git merge</code> eng mit Shell-Aliasen, Editor-Plugins und Continuous Integration. Power-User fügen oft Aliase hinzu, die Flags kombinieren, die sie immer übergeben, oder wickeln den Befehl in Skripte, die Teamkonventionen durchsetzen. Die Ausgabeformatierung kann über Git-Config angepasst werden — Pretty-Formate, Farbschemata und Pager-Verhalten sind alle einstellbar. Wenn etwas schiefgeht, ist der erste Diagnoseschritt üblicherweise, den Befehl erneut mit <code>GIT_TRACE=1</code> in der Umgebung auszuführen, was die zugrunde liegenden Plumbing-Aufrufe offenlegt. Für ungewöhnliche Situationen öffnet die <code>--help</code>-Ausgabe (<code>git merge --help</code>) die vollständige Manpage mit Details zu jeder Option, einschließlich solcher, die in alltäglichen Workflows selten verwendet werden, aber für Debugging oder Skripting im großen Maßstab essentiell sind.</p>
        <p>Zu verstehen, wie <code>git merge</code> mit dem Rest von Gits Datenmodell interagiert — der Objektdatenbank, dem Index, Refs und dem Working Tree — zahlt sich aus. Jeder Befehl operiert auf einer Teilmenge dieser Stücke, und zu wissen, welche er berührt, hilft Ergebnisse vorherzusagen und sich von Fehlern zu erholen. Das Lesen der offiziellen Git-Dokumentation neben praktischer Übung in einem Wegwerf-Repository ist der schnellste Weg, die Nuancen zu verinnerlichen. Die meisten Produktionsprobleme mit Git rühren von einer von drei Ursachen: überraschendem Standardverhalten, partiellen Netzwerkoperationen oder dem Umschreiben bereits geteilter Historie. Ein funktionierendes mentales Modell der Nebenwirkungen von <code>git merge</code> hilft, alle drei zu vermeiden.</p>
        <h2>Häufige Optionen</h2>
        <table><thead><tr><th>Option</th><th>Beschreibung</th></tr></thead><tbody><tr><td><code>--no-ff</code></td><td>Erstellt immer einen Merge-Commit, auch wenn Fast-Forward möglich ist.</td></tr><tr><td><code>--ff-only</code></td><td>Verweigert das Mergen, es sei denn, Fast-Forward ist möglich.</td></tr><tr><td><code>--squash</code></td><td>Kombiniert die gemergte Historie zu einem einzigen Commit auf dem Ziel-Branch.</td></tr><tr><td><code>--abort</code></td><td>Bricht einen laufenden Merge ab.</td></tr><tr><td><code>--continue</code></td><td>Setzt einen Merge nach Konfliktauflösung fort.</td></tr><tr><td><code>-s &lt;strategy&gt;</code></td><td>Wählt die Merge-Strategie (<code>ort</code>, <code>recursive</code>, <code>resolve</code>, <code>octopus</code>).</td></tr><tr><td><code>-X &lt;option&gt;</code></td><td>Übergibt strategiespezifische Option (z. B. <code>ours</code>, <code>theirs</code>).</td></tr><tr><td><code>--no-commit</code></td><td>Staged das Merge-Ergebnis, committet aber nicht.</td></tr></tbody></table>
        <h2>Beispiele</h2>
        <pre><code>git merge feature/login
        # Feature-Branch in den aktuellen Branch mergen

        git merge --no-ff release/1.2
        # Immer einen Merge-Commit erzeugen (bewahrt Topologie)

        git merge --abort
        # Einen Merge nach Konflikten abbrechen

        git merge -X theirs hotfix
        # Konflikte automatisch auflösen, indem die "ihre" Seite bevorzugt wird</code></pre>
        <h2>Häufige Fehler</h2>
        <p>Konflikte in Eile auflösen und vergessen, Konfliktmarker (<code>&lt;&lt;&lt;&lt;&lt;&lt;&lt;</code>) zu entfernen, hinterlässt kaputten Code im Commit. Führen Sie nach der Auflösung immer einen Build oder Tests aus. Eine weitere Falle ist stilles Fast-Forwarden, wenn Sie für die Nachverfolgbarkeit einen Merge-Commit wollten — verwenden Sie <code>--no-ff</code>. Schließlich erstellt <code>--squash</code> KEINEN Merge-Commit, sodass der Quell-Branch nicht als Elternteil aufgezeichnet wird.</p>
        <h2>Verwandte Befehle</h2>
        <p><code>git rebase</code>, <code>git mergetool</code>, <code>git pull</code>, <code>git cherry-pick</code></p>
- source_title: git rebase — Reapply commits on top of another base
  title: git rebase — Commits auf einer anderen Basis erneut anwenden
  langcode: de
  body: |-
    <h2>Übersicht</h2>
        <pre><code>git rebase [-i] [--onto &lt;newbase&gt;] [&lt;upstream&gt; [&lt;branch&gt;]]</code></pre>
        <h2>Beschreibung</h2>
        <p>Der <code>git rebase</code>-Befehl bewegt eine Folge von Commits auf eine neue Basis. Er schreibt Historie um, indem er jeden Commit auf der neuen Basis erneut abspielt und so eine lineare Kette statt eines Merge-Commits erzeugt. Rebasen ist unschätzbar, um Feature-Branches aktuell zu halten, lokale Historie vor dem Pushen aufzuräumen und Fixup-Commits zu squashen.</p>
        <p>Da Rebasen neue Commits mit anderen SHAs erzeugt, rebasen Sie niemals Commits, die veröffentlicht und von anderen gepullt wurden — diese würden mit divergierenden Historien enden. Der interaktive Modus (<code>-i</code>) erlaubt es Ihnen, Commits umzuordnen, zu bearbeiten, zu squashen, zu löschen oder zu fixen.</p>
        <p>Im täglichen Einsatz integriert sich <code>git rebase</code> eng mit Shell-Aliasen, Editor-Plugins und Continuous Integration. Power-User fügen oft Aliase hinzu, die Flags kombinieren, die sie immer übergeben, oder wickeln den Befehl in Skripte, die Teamkonventionen durchsetzen. Die Ausgabeformatierung kann über Git-Config angepasst werden — Pretty-Formate, Farbschemata und Pager-Verhalten sind alle einstellbar. Wenn etwas schiefgeht, ist der erste Diagnoseschritt üblicherweise, den Befehl erneut mit <code>GIT_TRACE=1</code> in der Umgebung auszuführen, was die zugrunde liegenden Plumbing-Aufrufe offenlegt. Für ungewöhnliche Situationen öffnet die <code>--help</code>-Ausgabe (<code>git rebase --help</code>) die vollständige Manpage mit Details zu jeder Option, einschließlich solcher, die in alltäglichen Workflows selten verwendet werden, aber für Debugging oder Skripting im großen Maßstab essentiell sind.</p>
        <p>Zu verstehen, wie <code>git rebase</code> mit dem Rest von Gits Datenmodell interagiert — der Objektdatenbank, dem Index, Refs und dem Working Tree — zahlt sich aus. Jeder Befehl operiert auf einer Teilmenge dieser Stücke, und zu wissen, welche er berührt, hilft Ergebnisse vorherzusagen und sich von Fehlern zu erholen. Das Lesen der offiziellen Git-Dokumentation neben praktischer Übung in einem Wegwerf-Repository ist der schnellste Weg, die Nuancen zu verinnerlichen. Die meisten Produktionsprobleme mit Git rühren von einer von drei Ursachen: überraschendem Standardverhalten, partiellen Netzwerkoperationen oder dem Umschreiben bereits geteilter Historie. Ein funktionierendes mentales Modell der Nebenwirkungen von <code>git rebase</code> hilft, alle drei zu vermeiden.</p>
        <h2>Häufige Optionen</h2>
        <table><thead><tr><th>Option</th><th>Beschreibung</th></tr></thead><tbody><tr><td><code>-i</code>, <code>--interactive</code></td><td>Öffnet einen Editor zum Bearbeiten der Commit-Liste.</td></tr><tr><td><code>--onto &lt;newbase&gt;</code></td><td>Rebaset auf einen beliebigen Commit, nicht den Upstream.</td></tr><tr><td><code>--continue</code></td><td>Setzt nach Konfliktauflösung fort.</td></tr><tr><td><code>--abort</code></td><td>Bricht das Rebase ab und kehrt in den Ausgangszustand zurück.</td></tr><tr><td><code>--skip</code></td><td>Überspringt den aktuellen Patch und fährt fort.</td></tr><tr><td><code>--autosquash</code></td><td>Ordnet fixup/squash-Commits automatisch an.</td></tr><tr><td><code>--autostash</code></td><td>Stasht lokale Änderungen vor dem Rebase und popt danach.</td></tr><tr><td><code>-r</code>, <code>--rebase-merges</code></td><td>Bewahrt Merge-Commits während des Rebase.</td></tr></tbody></table>
        <h2>Beispiele</h2>
        <pre><code>git rebase main
        # Commits des aktuellen Branches auf main neu abspielen

        git rebase -i HEAD~5
        # Die letzten 5 Commits interaktiv bearbeiten

        git rebase --onto main feature-base feature-tip
        # Nur Commits zwischen feature-base und feature-tip auf main verschieben

        git rebase --continue
        # Nach Konfliktauflösung fortsetzen</code></pre>
        <h2>Häufige Fehler</h2>
        <p>Das Rebasen von öffentlichen, geteilten Branches bricht die Historie jedes Mitwirkenden. Reservieren Sie Rebase für lokale Aufräumarbeiten. Während der Konfliktauflösung führen Anfänger oft <code>git commit</code> statt <code>git rebase --continue</code> aus, was das Rebase in einem kaputten Zustand hinterlässt. Wenn Sie sich mitten im Rebase verirren, bringt <code>git rebase --abort</code> Sie immer in Sicherheit zurück.</p>
        <h2>Verwandte Befehle</h2>
        <p><code>git merge</code>, <code>git cherry-pick</code>, <code>git reflog</code>, <code>git pull --rebase</code></p>
- source_title: git mergetool — Run merge conflict resolution tools
  title: git mergetool — Werkzeuge zur Auflösung von Merge-Konflikten ausführen
  langcode: de
  body: |-
    <h2>Übersicht</h2>
        <pre><code>git mergetool [-t &lt;tool&gt;] [--tool-help] [&lt;file&gt;...]</code></pre>
        <h2>Beschreibung</h2>
        <p>Der <code>git mergetool</code>-Befehl startet ein externes Merge-Tool, um bei der Auflösung von Konflikten nach einem Merge, Rebase oder Cherry-Pick zu helfen, der mit Konflikten anhält. Häufige Tools sind <code>vimdiff</code>, <code>meld</code>, <code>kdiff3</code>, <code>p4merge</code>, <code>opendiff</code> und <code>vscode</code>. Sobald sie über <code>merge.tool</code> konfiguriert sind, öffnet das Ausführen von <code>git mergetool</code> jede konfliktbehaftete Datei im gewählten Tool und staget die Auflösung beim Speichern.</p>
        <p>Die meisten modernen Editoren (VS Code, JetBrains-IDEs, Vim mit Fugitive) haben eingebaute Merge-UIs, die <code>git mergetool</code> überflüssig machen. Auf der Befehlszeile oder über SSH bleibt es dennoch ein essentielles Werkzeug für grafische oder dreispältige Konfliktauflösung.</p>
        <p>Im täglichen Einsatz integriert sich <code>git mergetool</code> eng mit Shell-Aliasen, Editor-Plugins und Continuous Integration. Power-User fügen oft Aliase hinzu, die Flags kombinieren, die sie immer übergeben, oder wickeln den Befehl in Skripte, die Teamkonventionen durchsetzen. Die Ausgabeformatierung kann über Git-Config angepasst werden — Pretty-Formate, Farbschemata und Pager-Verhalten sind alle einstellbar. Wenn etwas schiefgeht, ist der erste Diagnoseschritt üblicherweise, den Befehl erneut mit <code>GIT_TRACE=1</code> in der Umgebung auszuführen, was die zugrunde liegenden Plumbing-Aufrufe offenlegt. Für ungewöhnliche Situationen öffnet die <code>--help</code>-Ausgabe (<code>git mergetool --help</code>) die vollständige Manpage mit Details zu jeder Option, einschließlich solcher, die in alltäglichen Workflows selten verwendet werden, aber für Debugging oder Skripting im großen Maßstab essentiell sind.</p>
        <p>Zu verstehen, wie <code>git mergetool</code> mit dem Rest von Gits Datenmodell interagiert — der Objektdatenbank, dem Index, Refs und dem Working Tree — zahlt sich aus. Jeder Befehl operiert auf einer Teilmenge dieser Stücke, und zu wissen, welche er berührt, hilft Ergebnisse vorherzusagen und sich von Fehlern zu erholen. Das Lesen der offiziellen Git-Dokumentation neben praktischer Übung in einem Wegwerf-Repository ist der schnellste Weg, die Nuancen zu verinnerlichen. Die meisten Produktionsprobleme mit Git rühren von einer von drei Ursachen: überraschendem Standardverhalten, partiellen Netzwerkoperationen oder dem Umschreiben bereits geteilter Historie. Ein funktionierendes mentales Modell der Nebenwirkungen von <code>git mergetool</code> hilft, alle drei zu vermeiden.</p>
        <h2>Häufige Optionen</h2>
        <table><thead><tr><th>Option</th><th>Beschreibung</th></tr></thead><tbody><tr><td><code>-t &lt;tool&gt;</code>, <code>--tool=&lt;tool&gt;</code></td><td>Verwendet ein bestimmtes Merge-Tool für diesen Lauf.</td></tr><tr><td><code>--tool-help</code></td><td>Listet die Merge-Tools auf, die Git kennt.</td></tr><tr><td><code>-y</code>, <code>--no-prompt</code></td><td>Fragt nicht vor dem Starten des Tools.</td></tr><tr><td><code>-g</code>, <code>--gui</code></td><td>Verwendet das GUI-Tool aus <code>merge.guitool</code>.</td></tr><tr><td><code>-O&lt;file&gt;</code></td><td>Verarbeitet Dateien in der in <code>file</code> aufgeführten Reihenfolge.</td></tr></tbody></table>
        <h2>Beispiele</h2>
        <pre><code>git config --global merge.tool meld
        # meld als Standard konfigurieren

        git mergetool
        # Das konfigurierte Tool auf jeder konfliktbehafteten Datei starten

        git mergetool -t vimdiff
        # Nur diesmal vimdiff verwenden

        git mergetool --tool-help
        # Liste der unterstützten Tools sehen</code></pre>
        <h2>Häufige Fehler</h2>
        <p>Nach dem Auflösen mit <code>git mergetool</code> bleiben übrige <code>.orig</code>-Backupdateien, die das Verzeichnis verschmutzen. Deaktivieren Sie sie mit <code>git config --global mergetool.keepBackup false</code>. Eine weitere Falle: Das Starten eines GUI-Tools über SSH ohne X-Forwarding schlägt stillschweigend fehl. Konfigurieren Sie für Remote-Sitzungen ein konsolenfreundliches Tool (wie <code>vimdiff</code>).</p>
        <h2>Verwandte Befehle</h2>
        <p><code>git merge</code>, <code>git rebase</code>, <code>git config</code>, <code>git diff</code></p>
- source_title: git remote — Manage tracked remote repositories
  title: git remote — Verfolgte Remote-Repositories verwalten
  langcode: de
  body: |-
    <h2>Übersicht</h2>
        <pre><code>git remote [-v]
    git remote add &lt;name&gt; &lt;url&gt;
    git remote remove &lt;name&gt;
    git remote set-url &lt;name&gt; &lt;url&gt;</code></pre>
        <h2>Beschreibung</h2>
        <p>Der <code>git remote</code>-Befehl verwaltet die Menge der Repositories ("Remotes"), deren URLs in Ihrer lokalen Konfiguration gespeichert sind. Jeder Remote hat einen kurzen Spitznamen (üblicherweise <code>origin</code> für die ursprüngliche Klon-Quelle und <code>upstream</code> für das Projekt, von dem Sie geforkt haben). Wenn Sie <code>git fetch origin</code>, <code>git push origin</code> oder Ähnliches ausführen, wird der Spitzname zur URL aufgelöst.</p>
        <p>Remotes werden in <code>.git/config</code> gespeichert und können separate URLs für Fetch und Push haben. Sie tragen auch Refspecs, die festlegen, welche Refs gefetcht werden und in welchen lokalen Namespace. Moderne Workflows haben oft nur <code>origin</code>, während Open-Source-Mitwirkende üblicherweise sowohl <code>origin</code> (ihren Fork) als auch <code>upstream</code> (das kanonische Projekt) haben.</p>
        <p>Im täglichen Einsatz integriert sich <code>git remote</code> eng mit Shell-Aliasen, Editor-Plugins und Continuous Integration. Power-User fügen oft Aliase hinzu, die Flags kombinieren, die sie immer übergeben, oder wickeln den Befehl in Skripte, die Teamkonventionen durchsetzen. Die Ausgabeformatierung kann über Git-Config angepasst werden — Pretty-Formate, Farbschemata und Pager-Verhalten sind alle einstellbar. Wenn etwas schiefgeht, ist der erste Diagnoseschritt üblicherweise, den Befehl erneut mit <code>GIT_TRACE=1</code> in der Umgebung auszuführen, was die zugrunde liegenden Plumbing-Aufrufe offenlegt. Für ungewöhnliche Situationen öffnet die <code>--help</code>-Ausgabe (<code>git remote --help</code>) die vollständige Manpage mit Details zu jeder Option, einschließlich solcher, die in alltäglichen Workflows selten verwendet werden, aber für Debugging oder Skripting im großen Maßstab essentiell sind.</p>
        <p>Zu verstehen, wie <code>git remote</code> mit dem Rest von Gits Datenmodell interagiert — der Objektdatenbank, dem Index, Refs und dem Working Tree — zahlt sich aus. Jeder Befehl operiert auf einer Teilmenge dieser Stücke, und zu wissen, welche er berührt, hilft Ergebnisse vorherzusagen und sich von Fehlern zu erholen. Das Lesen der offiziellen Git-Dokumentation neben praktischer Übung in einem Wegwerf-Repository ist der schnellste Weg, die Nuancen zu verinnerlichen. Die meisten Produktionsprobleme mit Git rühren von einer von drei Ursachen: überraschendem Standardverhalten, partiellen Netzwerkoperationen oder dem Umschreiben bereits geteilter Historie. Ein funktionierendes mentales Modell der Nebenwirkungen von <code>git remote</code> hilft, alle drei zu vermeiden.</p>
        <h2>Häufige Optionen</h2>
        <table><thead><tr><th>Option / Unterbefehl</th><th>Beschreibung</th></tr></thead><tbody><tr><td><code>-v</code>, <code>--verbose</code></td><td>Zeigt URLs neben Remote-Namen.</td></tr><tr><td><code>add &lt;name&gt; &lt;url&gt;</code></td><td>Registriert einen neuen Remote.</td></tr><tr><td><code>remove &lt;name&gt;</code></td><td>Entfernt einen Remote aus der Konfiguration.</td></tr><tr><td><code>rename &lt;old&gt; &lt;new&gt;</code></td><td>Benennt einen Remote um.</td></tr><tr><td><code>set-url &lt;name&gt; &lt;url&gt;</code></td><td>Ändert die URL eines Remotes.</td></tr><tr><td><code>show &lt;name&gt;</code></td><td>Zeigt detaillierte Informationen zu einem Remote an.</td></tr><tr><td><code>prune &lt;name&gt;</code></td><td>Löscht veraltete Remote-Tracking-Refs.</td></tr></tbody></table>
        <h2>Beispiele</h2>
        <pre><code>git remote -v
        # Alle Remotes mit URLs auflisten

        git remote add upstream https://github.com/original/project.git
        # Den Upstream-Repo eines Forks hinzufügen

        git remote set-url origin git@github.com:me/project.git
        # Von HTTPS auf SSH umstellen

        git remote prune origin
        # Tracking-Branches entfernen, die auf origin nicht mehr existieren</code></pre>
        <h2>Häufige Fehler</h2>
        <p>Eine falsche URL hinzufügen (Tippfehler, fehlendes <code>.git</code>-Suffix bei manchen Hosts) führt zu verwirrenden Fetch-Fehlern. Führen Sie <code>git remote -v</code> zur Bestätigung aus. Nach Repository-Umbenennungen oder Fork-Eigentümerwechseln werden Ihre Remote-URLs veraltet — beheben Sie das mit <code>set-url</code>. Vergessen Sie nicht, periodisch <code>git remote prune</code> auszuführen, um auf dem Server gelöschte Branches aufzuräumen.</p>
        <h2>Verwandte Befehle</h2>
        <p><code>git fetch</code>, <code>git push</code>, <code>git pull</code>, <code>git ls-remote</code></p>
- source_title: git fetch — Download objects and refs from a remote
  title: git fetch — Objekte und Refs von einem Remote herunterladen
  langcode: de
  body: |-
    <h2>Übersicht</h2>
        <pre><code>git fetch [&lt;options&gt;] [&lt;remote&gt; [&lt;refspec&gt;...]]</code></pre>
        <h2>Beschreibung</h2>
        <p>Der <code>git fetch</code>-Befehl lädt neue Commits, Dateien und Refs aus einem Remote-Repository in Ihr lokales Repo herunter, mergt sie aber NICHT in Ihren Arbeits-Branch. Nach dem Fetchen werden die Remote-Tracking-Refs (wie <code>origin/main</code>) aktualisiert, und Sie können mit <code>git log origin/main</code> prüfen, was es Neues gibt, bevor Sie sich für Merge oder Rebase entscheiden.</p>
        <p>Fetchen ist sicher — es modifiziert nie Ihren Working Tree oder den aktuellen Branch. Viele Nutzer bevorzugen <code>git fetch</code>, gefolgt von einem expliziten <code>git merge</code> oder <code>git rebase</code> gegenüber <code>git pull</code>, weil es einen klaren Vorschau-Schritt bietet. Verwenden Sie <code>--all</code>, um von jedem konfigurierten Remote zu fetchen.</p>
        <p>Im täglichen Einsatz integriert sich <code>git fetch</code> eng mit Shell-Aliasen, Editor-Plugins und Continuous Integration. Power-User fügen oft Aliase hinzu, die Flags kombinieren, die sie immer übergeben, oder wickeln den Befehl in Skripte, die Teamkonventionen durchsetzen. Die Ausgabeformatierung kann über Git-Config angepasst werden — Pretty-Formate, Farbschemata und Pager-Verhalten sind alle einstellbar. Wenn etwas schiefgeht, ist der erste Diagnoseschritt üblicherweise, den Befehl erneut mit <code>GIT_TRACE=1</code> in der Umgebung auszuführen, was die zugrunde liegenden Plumbing-Aufrufe offenlegt. Für ungewöhnliche Situationen öffnet die <code>--help</code>-Ausgabe (<code>git fetch --help</code>) die vollständige Manpage mit Details zu jeder Option, einschließlich solcher, die in alltäglichen Workflows selten verwendet werden, aber für Debugging oder Skripting im großen Maßstab essentiell sind.</p>
        <p>Zu verstehen, wie <code>git fetch</code> mit dem Rest von Gits Datenmodell interagiert — der Objektdatenbank, dem Index, Refs und dem Working Tree — zahlt sich aus. Jeder Befehl operiert auf einer Teilmenge dieser Stücke, und zu wissen, welche er berührt, hilft Ergebnisse vorherzusagen und sich von Fehlern zu erholen. Das Lesen der offiziellen Git-Dokumentation neben praktischer Übung in einem Wegwerf-Repository ist der schnellste Weg, die Nuancen zu verinnerlichen. Die meisten Produktionsprobleme mit Git rühren von einer von drei Ursachen: überraschendem Standardverhalten, partiellen Netzwerkoperationen oder dem Umschreiben bereits geteilter Historie. Ein funktionierendes mentales Modell der Nebenwirkungen von <code>git fetch</code> hilft, alle drei zu vermeiden.</p>
        <h2>Häufige Optionen</h2>
        <table><thead><tr><th>Option</th><th>Beschreibung</th></tr></thead><tbody><tr><td><code>--all</code></td><td>Fetcht von allen konfigurierten Remotes.</td></tr><tr><td><code>--prune</code> / <code>-p</code></td><td>Entfernt Remote-Tracking-Refs, die upstream nicht mehr existieren.</td></tr><tr><td><code>--tags</code></td><td>Fetcht alle Tags vom Remote.</td></tr><tr><td><code>--depth=&lt;n&gt;</code></td><td>Begrenzt die gefetchte Historietiefe (erstellt/pflegt einen Shallow Clone).</td></tr><tr><td><code>--unshallow</code></td><td>Konvertiert einen Shallow Clone in einen vollständigen.</td></tr><tr><td><code>--dry-run</code></td><td>Zeigt, was gefetcht würde.</td></tr><tr><td><code>--force</code> / <code>-f</code></td><td>Erlaubt Non-Fast-Forward-Updates von Refs.</td></tr></tbody></table>
        <h2>Beispiele</h2>
        <pre><code>git fetch
        # Remote-Tracking-Refs von origin aktualisieren

        git fetch --all --prune
        # Von jedem Remote aktualisieren und veraltete Branches aufräumen

        git fetch upstream main
        # Nur den main-Branch von upstream fetchen

        git fetch --unshallow
        # Vollständige Historie in einen Shallow Clone nachladen</code></pre>
        <h2>Häufige Fehler</h2>
        <p><code>git fetch</code> mit <code>git pull</code> zu verwechseln ist häufig: fetch lädt nur herunter, während pull fetcht und mergt. Das Vergessen von <code>--prune</code> hinterlässt mit der Zeit eine lange Liste veralteter Tracking-Branches. Konfigurieren Sie <code>fetch.prune = true</code> global, um Pruning automatisch zu machen.</p>
        <h2>Verwandte Befehle</h2>
        <p><code>git pull</code>, <code>git merge</code>, <code>git remote</code>, <code>git ls-remote</code></p>
- source_title: git pull — Fetch from and integrate with another repository
  title: git pull — Von einem anderen Repository fetchen und integrieren
  langcode: de
  body: |-
    <h2>Übersicht</h2>
        <pre><code>git pull [--rebase] [--ff-only] [&lt;remote&gt; [&lt;branch&gt;]]</code></pre>
        <h2>Beschreibung</h2>
        <p>Der <code>git pull</code>-Befehl ist eine Kurzform für <code>git fetch</code>, gefolgt von einem Integrationsschritt (standardmäßig Merge, optional Rebase). Er aktualisiert Ihren aktuellen Branch, um Upstream-Änderungen einzubeziehen. Viele Teams bevorzugen es, <code>pull.rebase = true</code> zu konfigurieren oder <code>git pull --rebase</code> zu verwenden, um die Historie linear zu halten.</p>
        <p>Wenn Ihr Branch und der Upstream divergiert sind, kann <code>git pull</code> einen Merge-Commit erzeugen. Mit <code>--ff-only</code> schlägt der Pull fehl, anstatt einen Merge zu erstellen — nützlich, wenn Sie sicher sein wollen, dass Ihr lokaler Branch nur zurückliegt, nicht divergiert.</p>
        <p>Im täglichen Einsatz integriert sich <code>git pull</code> eng mit Shell-Aliasen, Editor-Plugins und Continuous Integration. Power-User fügen oft Aliase hinzu, die Flags kombinieren, die sie immer übergeben, oder wickeln den Befehl in Skripte, die Teamkonventionen durchsetzen. Die Ausgabeformatierung kann über Git-Config angepasst werden — Pretty-Formate, Farbschemata und Pager-Verhalten sind alle einstellbar. Wenn etwas schiefgeht, ist der erste Diagnoseschritt üblicherweise, den Befehl erneut mit <code>GIT_TRACE=1</code> in der Umgebung auszuführen, was die zugrunde liegenden Plumbing-Aufrufe offenlegt. Für ungewöhnliche Situationen öffnet die <code>--help</code>-Ausgabe (<code>git pull --help</code>) die vollständige Manpage mit Details zu jeder Option, einschließlich solcher, die in alltäglichen Workflows selten verwendet werden, aber für Debugging oder Skripting im großen Maßstab essentiell sind.</p>
        <p>Zu verstehen, wie <code>git pull</code> mit dem Rest von Gits Datenmodell interagiert — der Objektdatenbank, dem Index, Refs und dem Working Tree — zahlt sich aus. Jeder Befehl operiert auf einer Teilmenge dieser Stücke, und zu wissen, welche er berührt, hilft Ergebnisse vorherzusagen und sich von Fehlern zu erholen. Das Lesen der offiziellen Git-Dokumentation neben praktischer Übung in einem Wegwerf-Repository ist der schnellste Weg, die Nuancen zu verinnerlichen. Die meisten Produktionsprobleme mit Git rühren von einer von drei Ursachen: überraschendem Standardverhalten, partiellen Netzwerkoperationen oder dem Umschreiben bereits geteilter Historie. Ein funktionierendes mentales Modell der Nebenwirkungen von <code>git pull</code> hilft, alle drei zu vermeiden.</p>
        <h2>Häufige Optionen</h2>
        <table><thead><tr><th>Option</th><th>Beschreibung</th></tr></thead><tbody><tr><td><code>--rebase</code></td><td>Rebaset lokale Commits auf gefetchte Änderungen.</td></tr><tr><td><code>--ff-only</code></td><td>Nur Fast-Forward; abbrechen, falls ein Merge nötig wäre.</td></tr><tr><td><code>--no-ff</code></td><td>Erstellt immer einen Merge-Commit.</td></tr><tr><td><code>--all</code></td><td>Fetcht von allen Remotes vor der Integration.</td></tr><tr><td><code>--autostash</code></td><td>Stasht lokale Änderungen vor dem Pull und popt sie danach.</td></tr><tr><td><code>--prune</code></td><td>Entfernt veraltete Remote-Tracking-Branches als Teil des Fetch.</td></tr></tbody></table>
        <h2>Beispiele</h2>
        <pre><code>git pull
        # Standard: Fetch und Merge vom konfigurierten Upstream

        git pull --rebase origin main
        # Lokale Commits auf das neueste origin/main rebasen

        git pull --ff-only
        # Verweigert das Erstellen eines Merge-Commits

        git config --global pull.rebase true
        # Rebase als Standard für jeden Pull setzen</code></pre>
        <h2>Häufige Fehler</h2>
        <p>Pullen mit uncommitted Änderungen kann dazu führen, dass Git sich weigert zu mergen. Entweder committen, stashen oder <code>--autostash</code> verwenden. Pullen auf einen Branch, der divergiert ist, erzeugt oft unerwartete Merge-Commits. Verwenden Sie <code>--ff-only</code> als Sicherheitsnetz oder rebasen Sie explizit.</p>
        <h2>Verwandte Befehle</h2>
        <p><code>git fetch</code>, <code>git merge</code>, <code>git rebase</code>, <code>git push</code></p>
- source_title: git push — Update remote refs along with associated objects
  title: git push — Remote-Refs samt zugehöriger Objekte aktualisieren
  langcode: de
  body: |-
    <h2>Übersicht</h2>
        <pre><code>git push [&lt;remote&gt; [&lt;refspec&gt;...]] [--force-with-lease] [--tags] [--delete]</code></pre>
        <h2>Beschreibung</h2>
        <p>Der <code>git push</code>-Befehl sendet lokale Commits an ein Remote-Repository und aktualisiert Remote-Branches, sodass sie mit Ihren lokalen übereinstimmen. Der erste Push eines neuen Branches erfordert üblicherweise <code>-u</code>, um Tracking einzurichten. Standardmäßig ist Push nicht-destruktiv: Er weigert sich, Remote-Historie zu überschreiben, die Sie nicht lokal haben. Verwenden Sie <code>--force-with-lease</code>, wenn Sie wirklich Remote-Historie umschreiben müssen (nach einem Rebase) — verwenden Sie niemals einfaches <code>--force</code> auf geteilten Branches.</p>
        <p>Push gehorcht serverseitigen Regeln: Branch-Schutz, erforderliche Reviews, signierte Commits und Pre-Receive-Hooks können einen Push alle ablehnen. Lesen Sie die Fehlermeldung sorgfältig, wenn das passiert.</p>
        <p>Im täglichen Einsatz integriert sich <code>git push</code> eng mit Shell-Aliasen, Editor-Plugins und Continuous Integration. Power-User fügen oft Aliase hinzu, die Flags kombinieren, die sie immer übergeben, oder wickeln den Befehl in Skripte, die Teamkonventionen durchsetzen. Die Ausgabeformatierung kann über Git-Config angepasst werden — Pretty-Formate, Farbschemata und Pager-Verhalten sind alle einstellbar. Wenn etwas schiefgeht, ist der erste Diagnoseschritt üblicherweise, den Befehl erneut mit <code>GIT_TRACE=1</code> in der Umgebung auszuführen, was die zugrunde liegenden Plumbing-Aufrufe offenlegt. Für ungewöhnliche Situationen öffnet die <code>--help</code>-Ausgabe (<code>git push --help</code>) die vollständige Manpage mit Details zu jeder Option, einschließlich solcher, die in alltäglichen Workflows selten verwendet werden, aber für Debugging oder Skripting im großen Maßstab essentiell sind.</p>
        <p>Zu verstehen, wie <code>git push</code> mit dem Rest von Gits Datenmodell interagiert — der Objektdatenbank, dem Index, Refs und dem Working Tree — zahlt sich aus. Jeder Befehl operiert auf einer Teilmenge dieser Stücke, und zu wissen, welche er berührt, hilft Ergebnisse vorherzusagen und sich von Fehlern zu erholen. Das Lesen der offiziellen Git-Dokumentation neben praktischer Übung in einem Wegwerf-Repository ist der schnellste Weg, die Nuancen zu verinnerlichen. Die meisten Produktionsprobleme mit Git rühren von einer von drei Ursachen: überraschendem Standardverhalten, partiellen Netzwerkoperationen oder dem Umschreiben bereits geteilter Historie. Ein funktionierendes mentales Modell der Nebenwirkungen von <code>git push</code> hilft, alle drei zu vermeiden.</p>
        <h2>Häufige Optionen</h2>
        <table><thead><tr><th>Option</th><th>Beschreibung</th></tr></thead><tbody><tr><td><code>-u</code>, <code>--set-upstream</code></td><td>Setzt Upstream für künftige Push/Pull-Defaults.</td></tr><tr><td><code>--force-with-lease</code></td><td>Force-Push nur, wenn die Remote-Ref Ihrem zuletzt gefetchten Wert entspricht.</td></tr><tr><td><code>--force</code> / <code>-f</code></td><td>Überschreibt Remote-Historie zwingend (gefährlich auf geteilten Branches).</td></tr><tr><td><code>--tags</code></td><td>Pusht alle lokalen Tags.</td></tr><tr><td><code>--delete</code></td><td>Löscht einen Remote-Branch.</td></tr><tr><td><code>--dry-run</code></td><td>Zeigt, was gepusht würde.</td></tr><tr><td><code>--all</code></td><td>Pusht alle Branches.</td></tr><tr><td><code>--atomic</code></td><td>All-or-Nothing-Update mehrerer Refs.</td></tr></tbody></table>
        <h2>Beispiele</h2>
        <pre><code>git push -u origin feature/login
        # Erster Push eines neuen Branches mit Tracking

        git push --force-with-lease
        # Sicherere Alternative zu --force nach einem Rebase

        git push origin --delete old-feature
        # Einen Remote-Branch löschen

        git push --tags
        # Alle lokalen Tags veröffentlichen</code></pre>
        <h2>Häufige Fehler</h2>
        <p>Einfaches <code>--force</code> kann Commits von Kollegen auslöschen. Verwenden Sie stattdessen <code>--force-with-lease</code>. Direkt auf <code>main</code> zu pushen umgeht in vielen Teams das Code-Review — richten Sie Branch-Schutz ein. Das Vergessen von <code>-u</code> bedeutet, dass künftige <code>git push</code>-Befehle explizite Argumente brauchen.</p>
        <h2>Verwandte Befehle</h2>
        <p><code>git fetch</code>, <code>git pull</code>, <code>git remote</code>, <code>git tag</code></p>
- source_title: git ls-remote — List references in a remote repository
  title: git ls-remote — Referenzen in einem Remote-Repository auflisten
  langcode: de
  body: |-
    <h2>Übersicht</h2>
        <pre><code>git ls-remote [--heads] [--tags] [&lt;repository&gt; [&lt;refs&gt;...]]</code></pre>
        <h2>Beschreibung</h2>
        <p>Der <code>git ls-remote</code>-Befehl fragt einen Remote ab (ohne zu klonen oder zu fetchen) und gibt den SHA-1 jeder Ref neben dem Ref-Namen aus. Er ist unschätzbar für Skripting, CI-Pipelines und schnelle Inspektion — etwa um den neuesten Tag auf einem Remote zu finden oder zu prüfen, ob ein Branch existiert. Da er keine Objekte herunterlädt, ist er auch gegenüber sehr großen Repositories leichtgewichtig und schnell.</p>
        <p>Sie können eine URL direkt übergeben, ohne zuerst einen Remote zu konfigurieren: <code>git ls-remote https://github.com/user/repo.git</code>. Das macht ihn ideal für einmalige Inspektionen oder Build-Skripte, die eine "neueste"-Version auflösen.</p>
        <p>Im täglichen Einsatz integriert sich <code>git ls-remote</code> eng mit Shell-Aliasen, Editor-Plugins und Continuous Integration. Power-User fügen oft Aliase hinzu, die Flags kombinieren, die sie immer übergeben, oder wickeln den Befehl in Skripte, die Teamkonventionen durchsetzen. Die Ausgabeformatierung kann über Git-Config angepasst werden — Pretty-Formate, Farbschemata und Pager-Verhalten sind alle einstellbar. Wenn etwas schiefgeht, ist der erste Diagnoseschritt üblicherweise, den Befehl erneut mit <code>GIT_TRACE=1</code> in der Umgebung auszuführen, was die zugrunde liegenden Plumbing-Aufrufe offenlegt. Für ungewöhnliche Situationen öffnet die <code>--help</code>-Ausgabe (<code>git ls-remote --help</code>) die vollständige Manpage mit Details zu jeder Option, einschließlich solcher, die in alltäglichen Workflows selten verwendet werden, aber für Debugging oder Skripting im großen Maßstab essentiell sind.</p>
        <p>Zu verstehen, wie <code>git ls-remote</code> mit dem Rest von Gits Datenmodell interagiert — der Objektdatenbank, dem Index, Refs und dem Working Tree — zahlt sich aus. Jeder Befehl operiert auf einer Teilmenge dieser Stücke, und zu wissen, welche er berührt, hilft Ergebnisse vorherzusagen und sich von Fehlern zu erholen. Das Lesen der offiziellen Git-Dokumentation neben praktischer Übung in einem Wegwerf-Repository ist der schnellste Weg, die Nuancen zu verinnerlichen. Die meisten Produktionsprobleme mit Git rühren von einer von drei Ursachen: überraschendem Standardverhalten, partiellen Netzwerkoperationen oder dem Umschreiben bereits geteilter Historie. Ein funktionierendes mentales Modell der Nebenwirkungen von <code>git ls-remote</code> hilft, alle drei zu vermeiden.</p>
        <h2>Häufige Optionen</h2>
        <table><thead><tr><th>Option</th><th>Beschreibung</th></tr></thead><tbody><tr><td><code>--heads</code> / <code>-h</code></td><td>Beschränkt die Ausgabe auf Branch-Refs.</td></tr><tr><td><code>--tags</code> / <code>-t</code></td><td>Beschränkt die Ausgabe auf Tag-Refs.</td></tr><tr><td><code>--refs</code></td><td>Filtert die dereferenzierte Peel von annotated Tags heraus.</td></tr><tr><td><code>--symref</code></td><td>Zeigt, worauf symbolische Refs (wie HEAD) zeigen.</td></tr><tr><td><code>--exit-code</code></td><td>Beendet sich mit Nicht-Null, wenn keine passenden Refs gefunden werden.</td></tr><tr><td><code>--sort=&lt;key&gt;</code></td><td>Sortiert Ergebnisse nach Version, refname usw.</td></tr></tbody></table>
        <h2>Beispiele</h2>
        <pre><code>git ls-remote --heads origin
        # Alle Branches auf origin mit ihren SHAs auflisten

        git ls-remote --tags --refs origin
        # Alle Tags auflisten (^{}-Dereferenzierungen überspringen)

        git ls-remote https://github.com/git/git.git HEAD
        # Anzeigen, worauf HEAD auf einem öffentlichen Repo zeigt

        git ls-remote --sort=-v:refname --tags origin 'v*' | head -1
        # Den höchsten Semver-Tag finden</code></pre>
        <h2>Häufige Fehler</h2>
        <p>Die Ausgabe ohne <code>--refs</code> zu parsen, zeigt annotated Tags zweimal (einmal als Tag-Objekt, einmal als <code>name^{}</code> für den zugrunde liegenden Commit). Verwenden Sie <code>--refs</code>, um die gepeelten Zeilen zu unterdrücken. Authentifizierung kann gegen private Repos ohne Credential-Helper still scheitern — testen Sie zuerst interaktiv.</p>
        <h2>Verwandte Befehle</h2>
        <p><code>git remote</code>, <code>git fetch</code>, <code>git tag</code>, <code>git for-each-ref</code></p>
- source_title: git log — Show commit history
  title: git log — Commit-Historie anzeigen
  langcode: de
  body: |-
    <h2>Übersicht</h2>
        <pre><code>git log [&lt;options&gt;] [&lt;revision-range&gt;] [[--] &lt;path&gt;...]</code></pre>
        <h2>Beschreibung</h2>
        <p>Der <code>git log</code>-Befehl zeigt die Commit-Historie, die von einer oder mehreren Refs aus erreichbar ist (Standard ist HEAD). Er ist eines der flexibelsten Werkzeuge in Git und unterstützt das Filtern nach Autor, Datum, Nachrichteninhalt, Dateipfaden und mehr. Kombiniert mit Formatierungsoptionen kann er Ausgaben erzeugen, die für Changelogs, Audits und Code-Archäologie geeignet sind.</p>
        <p>Nützliche Idiome sind <code>git log --oneline --graph --decorate --all</code> für eine kompakte, visuelle Ansicht der gesamten Historie und <code>git log -p</code>, um Patches inline zu sehen. Pathspec-Argumente beschränken das Log auf Commits, die bestimmte Dateien berührt haben.</p>
        <p>Im täglichen Einsatz integriert sich <code>git log</code> eng mit Shell-Aliasen, Editor-Plugins und Continuous Integration. Power-User fügen oft Aliase hinzu, die Flags kombinieren, die sie immer übergeben, oder wickeln den Befehl in Skripte, die Teamkonventionen durchsetzen. Die Ausgabeformatierung kann über Git-Config angepasst werden — Pretty-Formate, Farbschemata und Pager-Verhalten sind alle einstellbar. Wenn etwas schiefgeht, ist der erste Diagnoseschritt üblicherweise, den Befehl erneut mit <code>GIT_TRACE=1</code> in der Umgebung auszuführen, was die zugrunde liegenden Plumbing-Aufrufe offenlegt. Für ungewöhnliche Situationen öffnet die <code>--help</code>-Ausgabe (<code>git log --help</code>) die vollständige Manpage mit Details zu jeder Option, einschließlich solcher, die in alltäglichen Workflows selten verwendet werden, aber für Debugging oder Skripting im großen Maßstab essentiell sind.</p>
        <p>Zu verstehen, wie <code>git log</code> mit dem Rest von Gits Datenmodell interagiert — der Objektdatenbank, dem Index, Refs und dem Working Tree — zahlt sich aus. Jeder Befehl operiert auf einer Teilmenge dieser Stücke, und zu wissen, welche er berührt, hilft Ergebnisse vorherzusagen und sich von Fehlern zu erholen. Das Lesen der offiziellen Git-Dokumentation neben praktischer Übung in einem Wegwerf-Repository ist der schnellste Weg, die Nuancen zu verinnerlichen. Die meisten Produktionsprobleme mit Git rühren von einer von drei Ursachen: überraschendem Standardverhalten, partiellen Netzwerkoperationen oder dem Umschreiben bereits geteilter Historie. Ein funktionierendes mentales Modell der Nebenwirkungen von <code>git log</code> hilft, alle drei zu vermeiden.</p>
        <h2>Häufige Optionen</h2>
        <table><thead><tr><th>Option</th><th>Beschreibung</th></tr></thead><tbody><tr><td><code>--oneline</code></td><td>Ein Commit pro Zeile, abgekürzter SHA + Betreff.</td></tr><tr><td><code>--graph</code></td><td>ASCII-Art der Branch- und Merge-Struktur.</td></tr><tr><td><code>--all</code></td><td>Bezieht alle Refs ein, nicht nur HEAD.</td></tr><tr><td><code>-p</code>, <code>--patch</code></td><td>Zeigt Diffs zu jedem Commit.</td></tr><tr><td><code>--stat</code></td><td>Zeigt Statistiken zu geänderten Dateien.</td></tr><tr><td><code>--author=&lt;pattern&gt;</code></td><td>Filtert nach Autor.</td></tr><tr><td><code>--since</code> / <code>--until</code></td><td>Filtert nach Datum.</td></tr><tr><td><code>-S &lt;string&gt;</code></td><td>Pickaxe: findet Commits, die diesen String hinzufügen/entfernen.</td></tr><tr><td><code>--follow</code></td><td>Verfolgt die Historie einer einzelnen Datei über Umbenennungen hinweg.</td></tr></tbody></table>
        <h2>Beispiele</h2>
        <pre><code>git log --oneline --graph --decorate --all
        # Kompakte visuelle Historie von allem

        git log -p src/auth.py
        # Vollständige Diffs jedes Commits, der auth.py berührt

        git log -S "TODO" --since="2 weeks ago"
        # Jüngste Commits finden, die "TODO" hinzufügten oder entfernten

        git log --author="alice" --pretty=format:"%h %s" -n 20
        # Letzte 20 Commits von alice in eigenem Format</code></pre>
        <h2>Häufige Fehler</h2>
        <p>Vergessen, dass <code>git log file.txt</code> nur Commits zeigt, in denen <code>file.txt</code> existierte — verwenden Sie <code>--follow</code>, falls sie umbenannt wurde. Übermäßiges Verlassen auf <code>--grep</code>, wenn Sie eigentlich <code>-S</code> wollen (das Diffs durchsucht, nicht Nachrichten). Und auf riesigen Repos kann <code>git log -p</code> ohne Pfad Gigabyte an Ausgabe erzeugen.</p>
        <h2>Verwandte Befehle</h2>
        <p><code>git show</code>, <code>git blame</code>, <code>git shortlog</code>, <code>git diff</code></p>
- source_title: git show — Show various types of objects
  title: git show — Verschiedene Objekttypen anzeigen
  langcode: de
  body: |-
    <h2>Übersicht</h2>
        <pre><code>git show [&lt;options&gt;] [&lt;object&gt;...]</code></pre>
        <h2>Beschreibung</h2>
        <p>Der <code>git show</code>-Befehl zeigt Informationen über Git-Objekte an: Commits (mit Diff), Tags (Annotation + getaggtes Objekt), Trees (Datei-Auflistung) oder Blobs (Dateiinhalte). Ohne Argumente zeigt er den jüngsten Commit. Mit einem Pfad-Argument zeigt er die Datei, wie sie zu einer bestimmten Revision existierte.</p>
        <p><code>git show</code> ist das Standardwerkzeug, um einen einzelnen Commit im Detail zu inspizieren. Anders als <code>git log -1 -p</code> formatiert es sowohl annotated Tags als auch Tree-Auflistungen natürlich, was es nützlich macht, um Release-Tags zu untersuchen oder historische Dateiinhalte zu extrahieren.</p>
        <p>Im täglichen Einsatz integriert sich <code>git show</code> eng mit Shell-Aliasen, Editor-Plugins und Continuous Integration. Power-User fügen oft Aliase hinzu, die Flags kombinieren, die sie immer übergeben, oder wickeln den Befehl in Skripte, die Teamkonventionen durchsetzen. Die Ausgabeformatierung kann über Git-Config angepasst werden — Pretty-Formate, Farbschemata und Pager-Verhalten sind alle einstellbar. Wenn etwas schiefgeht, ist der erste Diagnoseschritt üblicherweise, den Befehl erneut mit <code>GIT_TRACE=1</code> in der Umgebung auszuführen, was die zugrunde liegenden Plumbing-Aufrufe offenlegt. Für ungewöhnliche Situationen öffnet die <code>--help</code>-Ausgabe (<code>git show --help</code>) die vollständige Manpage mit Details zu jeder Option, einschließlich solcher, die in alltäglichen Workflows selten verwendet werden, aber für Debugging oder Skripting im großen Maßstab essentiell sind.</p>
        <p>Zu verstehen, wie <code>git show</code> mit dem Rest von Gits Datenmodell interagiert — der Objektdatenbank, dem Index, Refs und dem Working Tree — zahlt sich aus. Jeder Befehl operiert auf einer Teilmenge dieser Stücke, und zu wissen, welche er berührt, hilft Ergebnisse vorherzusagen und sich von Fehlern zu erholen. Das Lesen der offiziellen Git-Dokumentation neben praktischer Übung in einem Wegwerf-Repository ist der schnellste Weg, die Nuancen zu verinnerlichen. Die meisten Produktionsprobleme mit Git rühren von einer von drei Ursachen: überraschendem Standardverhalten, partiellen Netzwerkoperationen oder dem Umschreiben bereits geteilter Historie. Ein funktionierendes mentales Modell der Nebenwirkungen von <code>git show</code> hilft, alle drei zu vermeiden.</p>
        <h2>Häufige Optionen</h2>
        <table><thead><tr><th>Option</th><th>Beschreibung</th></tr></thead><tbody><tr><td><code>--stat</code></td><td>Fügt eine Diffstat-Zusammenfassung hinzu.</td></tr><tr><td><code>--name-only</code></td><td>Listet nur geänderte Dateinamen auf.</td></tr><tr><td><code>--pretty=&lt;fmt&gt;</code></td><td>Wählt Format: <code>oneline</code>, <code>short</code>, <code>full</code>, eigenes.</td></tr><tr><td><code>-s</code>, <code>--no-patch</code></td><td>Unterdrückt den Diff.</td></tr><tr><td><code>--show-signature</code></td><td>Verifiziert und zeigt GPG-Signaturen.</td></tr><tr><td><code>--word-diff</code></td><td>Hebt Änderungen auf Wortebene hervor.</td></tr></tbody></table>
        <h2>Beispiele</h2>
        <pre><code>git show HEAD
        # Jüngster Commit mit Diff

        git show v2.0.0
        # Einen annotated Tag anzeigen

        git show HEAD:src/main.c
        # Die Datei anzeigen, wie sie bei HEAD war

        git show --stat abc123
        # Nur das Diffstat für einen bestimmten Commit</code></pre>
        <h2>Häufige Fehler</h2>
        <p><code>git show HEAD~1</code> (ein Commit vor HEAD) mit <code>git show HEAD^1</code> (erster Elternteil von HEAD) verwechseln — sie sind auf linearer Historie äquivalent, unterscheiden sich aber bei Merges. Beachten Sie auch, dass <code>git show HEAD:file</code> einen Doppelpunkt verwendet, kein Leerzeichen, um eine Datei zu einer Revision anzugeben.</p>
        <h2>Verwandte Befehle</h2>
        <p><code>git log</code>, <code>git diff</code>, <code>git cat-file</code>, <code>git blame</code></p>
- source_title: git blame — Show what revision and author last modified each line
  title: git blame — Anzeigen, welche Revision und welcher Autor jede Zeile zuletzt geändert hat
  langcode: de
  body: |-
    <h2>Übersicht</h2>
        <pre><code>git blame [-L &lt;range&gt;] [-w] [-M] [-C] &lt;file&gt;</code></pre>
        <h2>Beschreibung</h2>
        <p>Der <code>git blame</code>-Befehl annotiert jede Zeile einer Datei mit dem Commit, dem Autor und dem Zeitstempel, die sie zuletzt berührt haben. Er ist unschätzbar, um zu verstehen, warum ein Stück Code so aussieht, wie es aussieht, wer es eingeführt hat und wann. Trotz des anschuldigenden Namens wird Blame meist als Recherchewerkzeug verwendet, nicht als Mittel zum Schuldzuweisen.</p>
        <p>Blame kann Code folgen, wenn er verschoben oder kopiert wurde (mit <code>-M</code> und <code>-C</code>), und kann Whitespace-only- oder reine Formatierungs-Commits ignorieren, wenn Sie eine <code>.git-blame-ignore-revs</code>-Datei pflegen, die über <code>blame.ignoreRevsFile</code> referenziert wird.</p>
        <p>Im täglichen Einsatz integriert sich <code>git blame</code> eng mit Shell-Aliasen, Editor-Plugins und Continuous Integration. Power-User fügen oft Aliase hinzu, die Flags kombinieren, die sie immer übergeben, oder wickeln den Befehl in Skripte, die Teamkonventionen durchsetzen. Die Ausgabeformatierung kann über Git-Config angepasst werden — Pretty-Formate, Farbschemata und Pager-Verhalten sind alle einstellbar. Wenn etwas schiefgeht, ist der erste Diagnoseschritt üblicherweise, den Befehl erneut mit <code>GIT_TRACE=1</code> in der Umgebung auszuführen, was die zugrunde liegenden Plumbing-Aufrufe offenlegt. Für ungewöhnliche Situationen öffnet die <code>--help</code>-Ausgabe (<code>git blame --help</code>) die vollständige Manpage mit Details zu jeder Option, einschließlich solcher, die in alltäglichen Workflows selten verwendet werden, aber für Debugging oder Skripting im großen Maßstab essentiell sind.</p>
        <p>Zu verstehen, wie <code>git blame</code> mit dem Rest von Gits Datenmodell interagiert — der Objektdatenbank, dem Index, Refs und dem Working Tree — zahlt sich aus. Jeder Befehl operiert auf einer Teilmenge dieser Stücke, und zu wissen, welche er berührt, hilft Ergebnisse vorherzusagen und sich von Fehlern zu erholen. Das Lesen der offiziellen Git-Dokumentation neben praktischer Übung in einem Wegwerf-Repository ist der schnellste Weg, die Nuancen zu verinnerlichen. Die meisten Produktionsprobleme mit Git rühren von einer von drei Ursachen: überraschendem Standardverhalten, partiellen Netzwerkoperationen oder dem Umschreiben bereits geteilter Historie. Ein funktionierendes mentales Modell der Nebenwirkungen von <code>git blame</code> hilft, alle drei zu vermeiden.</p>
        <h2>Häufige Optionen</h2>
        <table><thead><tr><th>Option</th><th>Beschreibung</th></tr></thead><tbody><tr><td><code>-L &lt;start&gt;,&lt;end&gt;</code></td><td>Beschränkt Blame auf einen Zeilenbereich.</td></tr><tr><td><code>-w</code></td><td>Ignoriert Whitespace-Änderungen.</td></tr><tr><td><code>-M</code></td><td>Erkennt innerhalb einer Datei verschobene Zeilen.</td></tr><tr><td><code>-C</code></td><td>Erkennt aus anderen Dateien kopierte Zeilen (wiederholen für stärkere Erkennung).</td></tr><tr><td><code>--since=&lt;date&gt;</code></td><td>Hört vor diesem Datum mit dem Annotieren auf.</td></tr><tr><td><code>-e</code>, <code>--show-email</code></td><td>Zeigt Autor-E-Mail statt Namen.</td></tr><tr><td><code>--ignore-revs-file &lt;file&gt;</code></td><td>Überspringt aufgeführte Revisionen beim Zuweisen von Blame.</td></tr></tbody></table>
        <h2>Beispiele</h2>
        <pre><code>git blame src/parser.c
        # Jede Zeile annotieren

        git blame -L 50,100 src/parser.c
        # Nur Zeilen 50 bis 100

        git blame -w -M -C README.md
        # Whitespace ignorieren und Verschiebungen/Kopien erkennen

        git blame --ignore-revs-file .git-blame-ignore-revs file.js
        # Lärmige Formatierungs-Commits überspringen</code></pre>
        <h2>Häufige Fehler</h2>
        <p>Blame zu nutzen, um Schuld zuzuweisen statt Kontext zu untersuchen, schafft eine feindselige Kultur. Paaren Sie Blame mit <code>git log</code> auf dem fraglichen Commit, um die vollständige Nachricht und Absicht zu lesen. Nach einer Massenformatierung richten Sie <code>.git-blame-ignore-revs</code> ein, sodass Blame weiterhin auf bedeutsame Autoren zeigt.</p>
        <h2>Verwandte Befehle</h2>
        <p><code>git log -L</code>, <code>git log -S</code>, <code>git show</code>, <code>git annotate</code></p>
- source_title: git bisect — Use binary search to find the commit that introduced a bug
  title: git bisect — Per Binärsuche den Commit finden, der einen Bug einführte
  langcode: de
  body: |-
    <h2>Übersicht</h2>
        <pre><code>git bisect start
    git bisect good &lt;commit&gt;
    git bisect bad &lt;commit&gt;
    git bisect run &lt;script&gt;
    git bisect reset</code></pre>
        <h2>Beschreibung</h2>
        <p>Der <code>git bisect</code>-Befehl führt eine Binärsuche durch die Commit-Historie durch, um genau den Commit zu identifizieren, der einen Bug einführte. Sie beginnen damit, einen bekannt-schlechten Commit (oft HEAD) und einen bekannt-guten Commit (vielleicht einen Release-Tag) zu markieren, dann checkt Git einen Mittelpunkt aus und bittet Sie, zu testen. Sie antworten "good" oder "bad", Git verkleinert den Bereich, und Sie wiederholen, bis der schuldige Commit gefunden ist.</p>
        <p>Wenn Sie einen automatisierten Test oder Reproducer haben, automatisiert <code>git bisect run</code> den gesamten Prozess — Git ruft Ihr Skript bei jedem Schritt auf. Das Bisecten durch tausend Commits dauert üblicherweise etwa zehn Iterationen.</p>
        <p>Im täglichen Einsatz integriert sich <code>git bisect</code> eng mit Shell-Aliasen, Editor-Plugins und Continuous Integration. Power-User fügen oft Aliase hinzu, die Flags kombinieren, die sie immer übergeben, oder wickeln den Befehl in Skripte, die Teamkonventionen durchsetzen. Die Ausgabeformatierung kann über Git-Config angepasst werden — Pretty-Formate, Farbschemata und Pager-Verhalten sind alle einstellbar. Wenn etwas schiefgeht, ist der erste Diagnoseschritt üblicherweise, den Befehl erneut mit <code>GIT_TRACE=1</code> in der Umgebung auszuführen, was die zugrunde liegenden Plumbing-Aufrufe offenlegt. Für ungewöhnliche Situationen öffnet die <code>--help</code>-Ausgabe (<code>git bisect --help</code>) die vollständige Manpage mit Details zu jeder Option, einschließlich solcher, die in alltäglichen Workflows selten verwendet werden, aber für Debugging oder Skripting im großen Maßstab essentiell sind.</p>
        <p>Zu verstehen, wie <code>git bisect</code> mit dem Rest von Gits Datenmodell interagiert — der Objektdatenbank, dem Index, Refs und dem Working Tree — zahlt sich aus. Jeder Befehl operiert auf einer Teilmenge dieser Stücke, und zu wissen, welche er berührt, hilft Ergebnisse vorherzusagen und sich von Fehlern zu erholen. Das Lesen der offiziellen Git-Dokumentation neben praktischer Übung in einem Wegwerf-Repository ist der schnellste Weg, die Nuancen zu verinnerlichen. Die meisten Produktionsprobleme mit Git rühren von einer von drei Ursachen: überraschendem Standardverhalten, partiellen Netzwerkoperationen oder dem Umschreiben bereits geteilter Historie. Ein funktionierendes mentales Modell der Nebenwirkungen von <code>git bisect</code> hilft, alle drei zu vermeiden.</p>
        <h2>Häufige Optionen</h2>
        <table><thead><tr><th>Unterbefehl</th><th>Beschreibung</th></tr></thead><tbody><tr><td><code>start</code></td><td>Beginnt eine Bisect-Sitzung.</td></tr><tr><td><code>good</code> / <code>bad</code></td><td>Markiert den aktuellen (oder angegebenen) Commit.</td></tr><tr><td><code>skip</code></td><td>Markiert einen Commit als nicht testbar.</td></tr><tr><td><code>run &lt;cmd&gt;</code></td><td>Automatisiert durch Ausführen eines Befehls (Exit 0 = good, Nicht-Null = bad).</td></tr><tr><td><code>reset</code></td><td>Beendet die Sitzung und kehrt zum ursprünglichen Branch zurück.</td></tr><tr><td><code>log</code></td><td>Zeigt das Bisect-Log.</td></tr><tr><td><code>visualize</code></td><td>Zeigt verbleibende verdächtige Commits an.</td></tr></tbody></table>
        <h2>Beispiele</h2>
        <pre><code>git bisect start
        git bisect bad HEAD
        git bisect good v1.5.0
        # Git checkt einen Mittelpunkt aus; testen, dann:
        git bisect good   # oder: git bisect bad

        git bisect run npm test
        # Voll automatisiert: npm-test-Exit-Codes steuern die Suche

        git bisect reset
        # Zum ursprünglichen Branch zurückkehren</code></pre>
        <h2>Häufige Fehler</h2>
        <p>Vergessen, <code>git bisect reset</code> auszuführen, lässt Sie im Detached-HEAD-Zustand. Einen Commit als "good" zu markieren, wenn der Bug intermittierend ist, führt Bisect in die Irre — verwenden Sie stattdessen <code>skip</code>. Stellen Sie sicher, dass Ihr Test-Skript Exit-Code 125 zurückgibt, um "skip" zu signalisieren, falls der Build selbst bei diesem Commit kaputt ist.</p>
        <h2>Verwandte Befehle</h2>
        <p><code>git log</code>, <code>git blame</code>, <code>git show</code>, <code>git checkout</code></p>
- source_title: git grep — Search tracked files for a pattern
  title: git grep — Verfolgte Dateien nach einem Muster durchsuchen
  langcode: de
  body: |-
    <h2>Übersicht</h2>
        <pre><code>git grep [&lt;options&gt;] &lt;pattern&gt; [&lt;tree-ish&gt;...]</code></pre>
        <h2>Beschreibung</h2>
        <p>Der <code>git grep</code>-Befehl durchsucht von Git verfolgte Dateien nach einem Muster. Er ist auf großen Repositories viel schneller als <code>grep -r</code>, weil er nur das durchsucht, was Git kennt (überspringt <code>.git</code>, Build-Outputs und ignorierte Dateien) und Gits optimierte Objektdatenbank verwendet. Sie können auch jede historische Revision oder jeden Tree durchsuchen, nicht nur die Arbeitskopie.</p>
        <p>Muster können einfache Strings, Basic Regex (Standard), Extended Regex (<code>-E</code>) oder PCRE (<code>-P</code>, falls einkompiliert) sein. Verwenden Sie <code>git grep</code> statt <code>grep -r</code> in Skripten, die auf Git-Repositories operieren.</p>
        <p>Im täglichen Einsatz integriert sich <code>git grep</code> eng mit Shell-Aliasen, Editor-Plugins und Continuous Integration. Power-User fügen oft Aliase hinzu, die Flags kombinieren, die sie immer übergeben, oder wickeln den Befehl in Skripte, die Teamkonventionen durchsetzen. Die Ausgabeformatierung kann über Git-Config angepasst werden — Pretty-Formate, Farbschemata und Pager-Verhalten sind alle einstellbar. Wenn etwas schiefgeht, ist der erste Diagnoseschritt üblicherweise, den Befehl erneut mit <code>GIT_TRACE=1</code> in der Umgebung auszuführen, was die zugrunde liegenden Plumbing-Aufrufe offenlegt. Für ungewöhnliche Situationen öffnet die <code>--help</code>-Ausgabe (<code>git grep --help</code>) die vollständige Manpage mit Details zu jeder Option, einschließlich solcher, die in alltäglichen Workflows selten verwendet werden, aber für Debugging oder Skripting im großen Maßstab essentiell sind.</p>
        <p>Zu verstehen, wie <code>git grep</code> mit dem Rest von Gits Datenmodell interagiert — der Objektdatenbank, dem Index, Refs und dem Working Tree — zahlt sich aus. Jeder Befehl operiert auf einer Teilmenge dieser Stücke, und zu wissen, welche er berührt, hilft Ergebnisse vorherzusagen und sich von Fehlern zu erholen. Das Lesen der offiziellen Git-Dokumentation neben praktischer Übung in einem Wegwerf-Repository ist der schnellste Weg, die Nuancen zu verinnerlichen. Die meisten Produktionsprobleme mit Git rühren von einer von drei Ursachen: überraschendem Standardverhalten, partiellen Netzwerkoperationen oder dem Umschreiben bereits geteilter Historie. Ein funktionierendes mentales Modell der Nebenwirkungen von <code>git grep</code> hilft, alle drei zu vermeiden.</p>
        <h2>Häufige Optionen</h2>
        <table><thead><tr><th>Option</th><th>Beschreibung</th></tr></thead><tbody><tr><td><code>-i</code></td><td>Match ohne Beachtung der Groß-/Kleinschreibung.</td></tr><tr><td><code>-n</code></td><td>Zeigt Zeilennummern.</td></tr><tr><td><code>-l</code></td><td>Listet nur passende Dateinamen auf.</td></tr><tr><td><code>-E</code></td><td>Erweiterte reguläre Ausdrücke.</td></tr><tr><td><code>-P</code></td><td>Perl-kompatible Regex.</td></tr><tr><td><code>-w</code></td><td>Match auf ganze Wörter.</td></tr><tr><td><code>--cached</code></td><td>Durchsucht den Index statt des Working Trees.</td></tr><tr><td><code>--untracked</code></td><td>Durchsucht auch untracked, nicht ignorierte Dateien.</td></tr></tbody></table>
        <h2>Beispiele</h2>
        <pre><code>git grep "TODO"
        # Jedes TODO in verfolgten Dateien finden

        git grep -n -i "deprecated" src/
        # Case-insensitive, mit Zeilennummern, unter src/

        git grep "fooBar" v1.0.0
        # Den Tree des v1.0.0-Tags durchsuchen

        git grep -E "^(import|from) " --and -e "json"
        # Kombinierte Muster: Zeilen, die mit import/from beginnen und json erwähnen</code></pre>
        <h2>Häufige Fehler</h2>
        <p>Vergessen, dass <code>git grep</code> nur verfolgte Dateien durchsucht — neu hinzugefügte Dateien erscheinen nicht, es sei denn sie sind gestaged oder Sie übergeben <code>--untracked</code>. PCRE-Funktionen (<code>\b</code>, Lookbehind) erfordern ein mit PCRE-Unterstützung gebautes Git und das <code>-P</code>-Flag.</p>
        <h2>Verwandte Befehle</h2>
        <p><code>git log -S</code>, <code>git log -G</code>, <code>git ls-files</code>, <code>git show</code></p>
- source_title: git shortlog — Summarize git log output
  title: git shortlog — Die Ausgabe von git log zusammenfassen
  langcode: de
  body: |-
    <h2>Übersicht</h2>
        <pre><code>git shortlog [-n] [-s] [-e] [&lt;revision-range&gt;]</code></pre>
        <h2>Beschreibung</h2>
        <p>Der <code>git shortlog</code>-Befehl gruppiert Commits nach Autor und erzeugt prägnante Zusammenfassungen, die für Release-Notes, Mitwirkenden-Listen und schnelle "wer hat was getan"-Übersichten geeignet sind. Standardmäßig gibt er den Namen jedes Autors gefolgt von den Betreffzeilen seiner Commits im gegebenen Bereich aus.</p>
        <p>Häufige Modi sind <code>-sn</code> (Zusammenfassung, sortiert nach Anzahl) für "Top-Mitwirkende"-Listen und <code>--no-merges</code>, um Merge-Commits zu ignorieren. Kombiniert mit einem Bereich wie <code>v1.0..v2.0</code> ist Shortlog der schnellste Weg, Release-Note-Credits zu entwerfen.</p>
        <p>Im täglichen Einsatz integriert sich <code>git shortlog</code> eng mit Shell-Aliasen, Editor-Plugins und Continuous Integration. Power-User fügen oft Aliase hinzu, die Flags kombinieren, die sie immer übergeben, oder wickeln den Befehl in Skripte, die Teamkonventionen durchsetzen. Die Ausgabeformatierung kann über Git-Config angepasst werden — Pretty-Formate, Farbschemata und Pager-Verhalten sind alle einstellbar. Wenn etwas schiefgeht, ist der erste Diagnoseschritt üblicherweise, den Befehl erneut mit <code>GIT_TRACE=1</code> in der Umgebung auszuführen, was die zugrunde liegenden Plumbing-Aufrufe offenlegt. Für ungewöhnliche Situationen öffnet die <code>--help</code>-Ausgabe (<code>git shortlog --help</code>) die vollständige Manpage mit Details zu jeder Option, einschließlich solcher, die in alltäglichen Workflows selten verwendet werden, aber für Debugging oder Skripting im großen Maßstab essentiell sind.</p>
        <p>Zu verstehen, wie <code>git shortlog</code> mit dem Rest von Gits Datenmodell interagiert — der Objektdatenbank, dem Index, Refs und dem Working Tree — zahlt sich aus. Jeder Befehl operiert auf einer Teilmenge dieser Stücke, und zu wissen, welche er berührt, hilft Ergebnisse vorherzusagen und sich von Fehlern zu erholen. Das Lesen der offiziellen Git-Dokumentation neben praktischer Übung in einem Wegwerf-Repository ist der schnellste Weg, die Nuancen zu verinnerlichen. Die meisten Produktionsprobleme mit Git rühren von einer von drei Ursachen: überraschendem Standardverhalten, partiellen Netzwerkoperationen oder dem Umschreiben bereits geteilter Historie. Ein funktionierendes mentales Modell der Nebenwirkungen von <code>git shortlog</code> hilft, alle drei zu vermeiden.</p>
        <h2>Häufige Optionen</h2>
        <table><thead><tr><th>Option</th><th>Beschreibung</th></tr></thead><tbody><tr><td><code>-s</code>, <code>--summary</code></td><td>Zeigt nur Anzahl pro Autor.</td></tr><tr><td><code>-n</code>, <code>--numbered</code></td><td>Sortiert Autoren nach Commit-Anzahl.</td></tr><tr><td><code>-e</code>, <code>--email</code></td><td>Bezieht Autor-E-Mail-Adressen ein.</td></tr><tr><td><code>--no-merges</code></td><td>Schließt Merge-Commits aus.</td></tr><tr><td><code>--group=&lt;type&gt;</code></td><td>Gruppiert nach Autor, Committer oder Trailer.</td></tr><tr><td><code>-w[&lt;width&gt;]</code></td><td>Bricht Betreffzeilen um.</td></tr></tbody></table>
        <h2>Beispiele</h2>
        <pre><code>git shortlog -sn
        # Top-Mitwirkende aller Zeiten, mit Zählungen

        git shortlog -sne v1.0..v2.0
        # Mitwirkende zwischen zwei Releases, mit E-Mails

        git shortlog --no-merges HEAD~50..HEAD
        # Betreffzeilen nach Autor gruppiert für die letzten 50 Commits

        git shortlog --group=trailer:co-authored-by
        # Nach Co-authored-by-Trailer gruppieren</code></pre>
        <h2>Häufige Fehler</h2>
        <p>Mehrere Commit-Identitäten für dieselbe Person (verschiedene E-Mails, unterschiedliche Schreibweisen) blasen die Mitwirkenden-Anzahl auf. Eine <code>.mailmap</code>-Datei in der Repo-Wurzel kanonisiert sie. Das Vergessen von <code>--no-merges</code> kann viele Merge-Commits Projekt-Maintainern zuschreiben.</p>
        <h2>Verwandte Befehle</h2>
        <p><code>git log</code>, <code>git blame</code>, <code>git describe</code>, <code>git tag</code></p>
- source_title: git describe — Describe a commit using the most recent reachable tag
  title: git describe — Einen Commit über den jüngsten erreichbaren Tag beschreiben
  langcode: de
  body: |-
    <h2>Übersicht</h2>
        <pre><code>git describe [--tags] [--always] [--dirty] [&lt;commit&gt;]</code></pre>
        <h2>Beschreibung</h2>
        <p>Der <code>git describe</code>-Befehl erzeugt einen menschenlesbaren Namen für einen Commit basierend auf dem jüngsten erreichbaren Tag. Die Ausgabe sieht aus wie <code>v1.4.2-13-gabc1234</code>, was bedeutet "13 Commits nach Tag v1.4.2, bei SHA abc1234". Wenn der Commit genau auf einem Tag liegt, wird nur der Tag-Name ausgegeben.</p>
        <p>Build-Systeme verwenden <code>git describe</code>, um Versions-Strings in Binaries einzubetten. Mit <code>--dirty</code> enthält die Ausgabe ein <code>-dirty</code>-Suffix, wenn der Working Tree uncommitted Änderungen hat — perfekt zum Markieren von Entwicklungs-Builds.</p>
        <p>Im täglichen Einsatz integriert sich <code>git describe</code> eng mit Shell-Aliasen, Editor-Plugins und Continuous Integration. Power-User fügen oft Aliase hinzu, die Flags kombinieren, die sie immer übergeben, oder wickeln den Befehl in Skripte, die Teamkonventionen durchsetzen. Die Ausgabeformatierung kann über Git-Config angepasst werden — Pretty-Formate, Farbschemata und Pager-Verhalten sind alle einstellbar. Wenn etwas schiefgeht, ist der erste Diagnoseschritt üblicherweise, den Befehl erneut mit <code>GIT_TRACE=1</code> in der Umgebung auszuführen, was die zugrunde liegenden Plumbing-Aufrufe offenlegt. Für ungewöhnliche Situationen öffnet die <code>--help</code>-Ausgabe (<code>git describe --help</code>) die vollständige Manpage mit Details zu jeder Option, einschließlich solcher, die in alltäglichen Workflows selten verwendet werden, aber für Debugging oder Skripting im großen Maßstab essentiell sind.</p>
        <p>Zu verstehen, wie <code>git describe</code> mit dem Rest von Gits Datenmodell interagiert — der Objektdatenbank, dem Index, Refs und dem Working Tree — zahlt sich aus. Jeder Befehl operiert auf einer Teilmenge dieser Stücke, und zu wissen, welche er berührt, hilft Ergebnisse vorherzusagen und sich von Fehlern zu erholen. Das Lesen der offiziellen Git-Dokumentation neben praktischer Übung in einem Wegwerf-Repository ist der schnellste Weg, die Nuancen zu verinnerlichen. Die meisten Produktionsprobleme mit Git rühren von einer von drei Ursachen: überraschendem Standardverhalten, partiellen Netzwerkoperationen oder dem Umschreiben bereits geteilter Historie. Ein funktionierendes mentales Modell der Nebenwirkungen von <code>git describe</code> hilft, alle drei zu vermeiden.</p>
        <h2>Häufige Optionen</h2>
        <table><thead><tr><th>Option</th><th>Beschreibung</th></tr></thead><tbody><tr><td><code>--tags</code></td><td>Verwendet auch lightweight Tags zusätzlich zu annotated.</td></tr><tr><td><code>--always</code></td><td>Fällt auf abgekürzten SHA zurück, falls kein Tag erreichbar.</td></tr><tr><td><code>--dirty[=&lt;mark&gt;]</code></td><td>Hängt einen Marker an, falls der Working Tree dirty ist.</td></tr><tr><td><code>--long</code></td><td>Zeigt immer das lange Format, auch auf einem Tag.</td></tr><tr><td><code>--match &lt;pattern&gt;</code></td><td>Berücksichtigt nur passende Tags eines Glob-Musters.</td></tr><tr><td><code>--abbrev=&lt;n&gt;</code></td><td>Verwendet <code>n</code> Hex-Stellen für den SHA.</td></tr><tr><td><code>--contains</code></td><td>Zeigt den frühesten Tag, der den Commit enthält.</td></tr></tbody></table>
        <h2>Beispiele</h2>
        <pre><code>git describe
        # z. B. v2.1.0-3-g1a2b3c4

        git describe --tags --dirty --always
        # Robuster Versions-String für Build-Skripte

        git describe --match 'v[0-9]*'
        # Nur Semver-artige Tags berücksichtigen

        git describe --contains abc123
        # Das erste Release finden, das einen Commit enthält</code></pre>
        <h2>Häufige Fehler</h2>
        <p>Wenn Ihr Repo nur lightweight (nicht-annotated) Tags hat, sagt einfaches <code>git describe</code> "fatal: No names found." Verwenden Sie <code>--tags</code>. Shallow Clones haben möglicherweise gar keine erreichbaren Tags — fetchen Sie Tags explizit mit <code>git fetch --tags</code>.</p>
        <h2>Verwandte Befehle</h2>
        <p><code>git tag</code>, <code>git log</code>, <code>git rev-parse</code>, <code>git show</code></p>
- source_title: git restore — Restore working tree files
  title: git restore — Working-Tree-Dateien wiederherstellen
  langcode: de
  body: |-
    <h2>Übersicht</h2>
        <pre><code>git restore [--staged] [--source=&lt;tree&gt;] [-p] &lt;pathspec&gt;...</code></pre>
        <h2>Beschreibung</h2>
        <p>Der <code>git restore</code>-Befehl, eingeführt in Git 2.23, ersetzt die Datei-Wiederherstellungs-Hälfte von <code>git checkout</code>. Er ist zweckgebaut für zwei Fälle: Verwerfen von ungestagten Änderungen im Working Tree (Standardverhalten) und Unstagen von Änderungen aus dem Index (mit <code>--staged</code>). Die saubere Trennung macht das Werkzeug fehleranfälliger als <code>git checkout</code>.</p>
        <p>Sie können aus jeder Quelle wiederherstellen: einem anderen Commit, Branch oder Tag. Kombiniert mit <code>-p</code> können Sie interaktiv auswählen, welche Hunks wiederhergestellt werden. <code>git restore</code> modifiziert nie Branches oder HEAD — es berührt nur Dateien.</p>
        <p>Im täglichen Einsatz integriert sich <code>git restore</code> eng mit Shell-Aliasen, Editor-Plugins und Continuous Integration. Power-User fügen oft Aliase hinzu, die Flags kombinieren, die sie immer übergeben, oder wickeln den Befehl in Skripte, die Teamkonventionen durchsetzen. Die Ausgabeformatierung kann über Git-Config angepasst werden — Pretty-Formate, Farbschemata und Pager-Verhalten sind alle einstellbar. Wenn etwas schiefgeht, ist der erste Diagnoseschritt üblicherweise, den Befehl erneut mit <code>GIT_TRACE=1</code> in der Umgebung auszuführen, was die zugrunde liegenden Plumbing-Aufrufe offenlegt. Für ungewöhnliche Situationen öffnet die <code>--help</code>-Ausgabe (<code>git restore --help</code>) die vollständige Manpage mit Details zu jeder Option, einschließlich solcher, die in alltäglichen Workflows selten verwendet werden, aber für Debugging oder Skripting im großen Maßstab essentiell sind.</p>
        <p>Zu verstehen, wie <code>git restore</code> mit dem Rest von Gits Datenmodell interagiert — der Objektdatenbank, dem Index, Refs und dem Working Tree — zahlt sich aus. Jeder Befehl operiert auf einer Teilmenge dieser Stücke, und zu wissen, welche er berührt, hilft Ergebnisse vorherzusagen und sich von Fehlern zu erholen. Das Lesen der offiziellen Git-Dokumentation neben praktischer Übung in einem Wegwerf-Repository ist der schnellste Weg, die Nuancen zu verinnerlichen. Die meisten Produktionsprobleme mit Git rühren von einer von drei Ursachen: überraschendem Standardverhalten, partiellen Netzwerkoperationen oder dem Umschreiben bereits geteilter Historie. Ein funktionierendes mentales Modell der Nebenwirkungen von <code>git restore</code> hilft, alle drei zu vermeiden.</p>
        <h2>Häufige Optionen</h2>
        <table><thead><tr><th>Option</th><th>Beschreibung</th></tr></thead><tbody><tr><td><code>--staged</code></td><td>Stellt den Index statt des Working Trees wieder her (d. h. unstaget).</td></tr><tr><td><code>--worktree</code></td><td>Stellt den Working Tree wieder her (Standard).</td></tr><tr><td><code>--source=&lt;tree&gt;</code> / <code>-s</code></td><td>Stellt aus einem bestimmten Commit, Branch oder Tag wieder her.</td></tr><tr><td><code>-p</code>, <code>--patch</code></td><td>Wählt interaktiv Hunks zur Wiederherstellung aus.</td></tr><tr><td><code>--ours</code> / <code>--theirs</code></td><td>Stellt während eines Konflikts eine Seite wieder her.</td></tr><tr><td><code>-q</code>, <code>--quiet</code></td><td>Unterdrückt Fortschrittsausgabe.</td></tr></tbody></table>
        <h2>Beispiele</h2>
        <pre><code>git restore src/main.c
        # Ungestagte Änderungen in main.c verwerfen

        git restore --staged config.yml
        # Eine Datei unstagen (Working-Tree-Änderungen behalten)

        git restore --source=HEAD~3 README.md
        # README.md zurückbringen, wie es vor 3 Commits war

        git restore -p
        # Interaktiv Hunks zum Verwerfen auswählen</code></pre>
        <h2>Häufige Fehler</h2>
        <p><code>git restore</code> auf einer Datei mit ungespeicherten Änderungen überschreibt sie stillschweigend — es gibt keinen Bestätigungsdialog und kein einfaches Undo. Stashen Sie zuerst, falls unsicher. Anfänger verwechseln manchmal <code>--staged</code> mit <code>git reset --hard</code>; <code>--staged</code> berührt nur den Index und lässt Working-Tree-Bearbeitungen intakt.</p>
        <h2>Verwandte Befehle</h2>
        <p><code>git reset</code>, <code>git checkout</code>, <code>git stash</code>, <code>git revert</code></p>
- source_title: git reset — Reset current HEAD to a specified state
  title: git reset — Aktuelles HEAD auf einen festgelegten Zustand zurücksetzen
  langcode: de
  body: |-
    <h2>Übersicht</h2>
        <pre><code>git reset [--soft | --mixed | --hard] [&lt;commit&gt;]
    git reset [&lt;commit&gt;] [--] &lt;pathspec&gt;...</code></pre>
        <h2>Beschreibung</h2>
        <p>Der <code>git reset</code>-Befehl bewegt den aktuellen Branch-Zeiger zu einem festgelegten Commit und aktualisiert optional den Index und Working Tree. Er hat drei Hauptmodi: <code>--soft</code> (nur HEAD bewegen), <code>--mixed</code> (Standard; setzt auch den Index zurück) und <code>--hard</code> (setzt auch den Working Tree zurück und verwirft alle Änderungen).</p>
        <p>Reset ist einer der mächtigsten und gefährlichsten Git-Befehle. <code>git reset --hard</code> kann Arbeit dauerhaft verlieren — obwohl <code>git reflog</code> üblicherweise eine Wiederherstellung innerhalb des Reflog-Fensters erlaubt. Mit Pfad-Argumenten operiert reset nur auf dem Index für diese Pfade und bewegt nie HEAD.</p>
        <p>Im täglichen Einsatz integriert sich <code>git reset</code> eng mit Shell-Aliasen, Editor-Plugins und Continuous Integration. Power-User fügen oft Aliase hinzu, die Flags kombinieren, die sie immer übergeben, oder wickeln den Befehl in Skripte, die Teamkonventionen durchsetzen. Die Ausgabeformatierung kann über Git-Config angepasst werden — Pretty-Formate, Farbschemata und Pager-Verhalten sind alle einstellbar. Wenn etwas schiefgeht, ist der erste Diagnoseschritt üblicherweise, den Befehl erneut mit <code>GIT_TRACE=1</code> in der Umgebung auszuführen, was die zugrunde liegenden Plumbing-Aufrufe offenlegt. Für ungewöhnliche Situationen öffnet die <code>--help</code>-Ausgabe (<code>git reset --help</code>) die vollständige Manpage mit Details zu jeder Option, einschließlich solcher, die in alltäglichen Workflows selten verwendet werden, aber für Debugging oder Skripting im großen Maßstab essentiell sind.</p>
        <p>Zu verstehen, wie <code>git reset</code> mit dem Rest von Gits Datenmodell interagiert — der Objektdatenbank, dem Index, Refs und dem Working Tree — zahlt sich aus. Jeder Befehl operiert auf einer Teilmenge dieser Stücke, und zu wissen, welche er berührt, hilft Ergebnisse vorherzusagen und sich von Fehlern zu erholen. Das Lesen der offiziellen Git-Dokumentation neben praktischer Übung in einem Wegwerf-Repository ist der schnellste Weg, die Nuancen zu verinnerlichen. Die meisten Produktionsprobleme mit Git rühren von einer von drei Ursachen: überraschendem Standardverhalten, partiellen Netzwerkoperationen oder dem Umschreiben bereits geteilter Historie. Ein funktionierendes mentales Modell der Nebenwirkungen von <code>git reset</code> hilft, alle drei zu vermeiden.</p>
        <h2>Häufige Optionen</h2>
        <table><thead><tr><th>Option</th><th>Beschreibung</th></tr></thead><tbody><tr><td><code>--soft</code></td><td>Bewegt nur HEAD; Index und Working Tree unverändert.</td></tr><tr><td><code>--mixed</code> (Standard)</td><td>Bewegt HEAD und setzt den Index zurück; Working Tree unverändert.</td></tr><tr><td><code>--hard</code></td><td>Bewegt HEAD, setzt Index zurück und überschreibt Working Tree.</td></tr><tr><td><code>--keep</code></td><td>Wie <code>--hard</code>, bricht aber ab, falls lokale Änderungen verloren gingen.</td></tr><tr><td><code>--merge</code></td><td>Setzt den Index zurück und aktualisiert Dateien, die zwischen HEAD und Ziel unterschiedlich sind, behält lokale Merges.</td></tr><tr><td><code>-p</code></td><td>Wählt interaktiv Hunks zum Unstagen aus.</td></tr></tbody></table>
        <h2>Beispiele</h2>
        <pre><code>git reset HEAD~1
        # Einen Commit zurück; Änderungen im Working Tree behalten

        git reset --soft HEAD~3
        # Die letzten 3 Commits zu einer einzigen gestagten Änderung kombinieren

        git reset --hard origin/main
        # ALLE lokalen Commits und Änderungen verwerfen (gefährlich)

        git reset HEAD config.yml
        # Eine einzelne Datei unstagen (ältere Syntax für git restore --staged)</code></pre>
        <h2>Häufige Fehler</h2>
        <p><code>git reset --hard</code> auf einem Branch mit ungepushten Commits verliert sie. Reflog kann Sie für ~90 Tage retten, aber nur, wenn Sie wissen, wo Sie suchen müssen. <code>git reset HEAD file</code> (unstagen) mit <code>git reset --hard</code> (vernichten) zu verwechseln ist ein klassischer Anfänger-Fußschuss. Modernes Git bietet <code>git restore --staged</code> als klarere Alternative.</p>
        <h2>Verwandte Befehle</h2>
        <p><code>git restore</code>, <code>git revert</code>, <code>git reflog</code>, <code>git stash</code></p>
- source_title: git revert — Create a new commit that undoes earlier commits
  title: git revert — Einen neuen Commit erstellen, der frühere Commits rückgängig macht
  langcode: de
  body: |-
    <h2>Übersicht</h2>
        <pre><code>git revert [-n] [-m &lt;parent&gt;] &lt;commit&gt;...</code></pre>
        <h2>Beschreibung</h2>
        <p>Der <code>git revert</code>-Befehl erstellt einen neuen Commit, dessen Änderungen die Inverse eines früheren Commits sind. Anders als <code>git reset</code> schreibt er keine Historie um — er fügt einen neuen Commit hinzu, der einen oder mehrere alte rückgängig macht. Das macht Revert sicher zur Verwendung auf geteilten Branches: Mitwirkende sehen einen klaren "Undo"-Commit statt umgeschriebene Historie.</p>
        <p>Um einen Merge-Commit zu revertieren, verwenden Sie <code>-m 1</code> (oder die entsprechende Eltern-Nummer), um die "Mainline" anzugeben — den Elternteil, dessen Perspektive bewahrt werden soll. Mehrere Commits in einem einzigen Befehl zu revertieren wendet sie als Reihe neuer Commits an.</p>
        <p>Im täglichen Einsatz integriert sich <code>git revert</code> eng mit Shell-Aliasen, Editor-Plugins und Continuous Integration. Power-User fügen oft Aliase hinzu, die Flags kombinieren, die sie immer übergeben, oder wickeln den Befehl in Skripte, die Teamkonventionen durchsetzen. Die Ausgabeformatierung kann über Git-Config angepasst werden — Pretty-Formate, Farbschemata und Pager-Verhalten sind alle einstellbar. Wenn etwas schiefgeht, ist der erste Diagnoseschritt üblicherweise, den Befehl erneut mit <code>GIT_TRACE=1</code> in der Umgebung auszuführen, was die zugrunde liegenden Plumbing-Aufrufe offenlegt. Für ungewöhnliche Situationen öffnet die <code>--help</code>-Ausgabe (<code>git revert --help</code>) die vollständige Manpage mit Details zu jeder Option, einschließlich solcher, die in alltäglichen Workflows selten verwendet werden, aber für Debugging oder Skripting im großen Maßstab essentiell sind.</p>
        <p>Zu verstehen, wie <code>git revert</code> mit dem Rest von Gits Datenmodell interagiert — der Objektdatenbank, dem Index, Refs und dem Working Tree — zahlt sich aus. Jeder Befehl operiert auf einer Teilmenge dieser Stücke, und zu wissen, welche er berührt, hilft Ergebnisse vorherzusagen und sich von Fehlern zu erholen. Das Lesen der offiziellen Git-Dokumentation neben praktischer Übung in einem Wegwerf-Repository ist der schnellste Weg, die Nuancen zu verinnerlichen. Die meisten Produktionsprobleme mit Git rühren von einer von drei Ursachen: überraschendem Standardverhalten, partiellen Netzwerkoperationen oder dem Umschreiben bereits geteilter Historie. Ein funktionierendes mentales Modell der Nebenwirkungen von <code>git revert</code> hilft, alle drei zu vermeiden.</p>
        <h2>Häufige Optionen</h2>
        <table><thead><tr><th>Option</th><th>Beschreibung</th></tr></thead><tbody><tr><td><code>-n</code>, <code>--no-commit</code></td><td>Staged die inversen Änderungen ohne zu committen.</td></tr><tr><td><code>-m &lt;parent-number&gt;</code></td><td>Mainline-Elternteil zum Revertieren eines Merges.</td></tr><tr><td><code>--continue</code></td><td>Setzt nach Konfliktauflösung fort.</td></tr><tr><td><code>--abort</code></td><td>Bricht einen laufenden Revert ab.</td></tr><tr><td><code>--skip</code></td><td>Überspringt den aktuellen Commit und fährt fort.</td></tr><tr><td><code>-e</code>, <code>--edit</code></td><td>Bearbeitet die Revert-Commit-Nachricht.</td></tr></tbody></table>
        <h2>Beispiele</h2>
        <pre><code>git revert HEAD
        # Den jüngsten Commit mit einem neuen Commit rückgängig machen

        git revert abc123..def456
        # Einen Bereich von Commits revertieren

        git revert -m 1 merge-sha
        # Einen Merge-Commit revertieren, Mainline behalten

        git revert -n HEAD~2
        # Eine Inverse stagen, ohne noch zu committen</code></pre>
        <h2>Häufige Fehler</h2>
        <p>Einen Merge zu revertieren verhindert das künftige Re-Mergen desselben Branches, es sei denn, Sie revertieren auch den Revert. Planen Sie entsprechend, wenn Sie Feature-Merges revertieren. Konflikte während des Reverts erfordern <code>--continue</code> oder <code>--abort</code>, genau wie beim Rebase.</p>
        <h2>Verwandte Befehle</h2>
        <p><code>git reset</code>, <code>git restore</code>, <code>git cherry-pick</code>, <code>git log</code></p>
- source_title: git clean — Remove untracked files from the working tree
  title: git clean — Untracked Dateien aus dem Working Tree entfernen
  langcode: de
  body: |-
    <h2>Übersicht</h2>
        <pre><code>git clean [-d] [-f] [-x | -X] [-n] [-i] [&lt;path&gt;...]</code></pre>
        <h2>Beschreibung</h2>
        <p>Der <code>git clean</code>-Befehl entfernt untracked Dateien aus dem Working Tree. Standardmäßig erfordert er <code>-f</code> (oder <code>clean.requireForce = false</code>) als Sicherheitsmaßnahme, weil Löschungen unwiderruflich sind. Mit <code>-d</code> entfernt er auch untracked Verzeichnisse, und <code>-x</code> entfernt zusätzlich Dateien, die normalerweise ignoriert werden (Build-Outputs, Dependency-Caches).</p>
        <p>Führen Sie immer zuerst <code>git clean -n</code> aus, um zu sehen, welche Dateien gelöscht werden. Der interaktive Modus (<code>-i</code>) erlaubt Ihnen, die Liste zu bestätigen oder zu filtern. <code>git clean</code> ist das richtige Werkzeug, um ein Projekt in einen makellosen Zustand zurückzusetzen, besonders vor dem Debuggen von Build-Problemen.</p>
        <p>Im täglichen Einsatz integriert sich <code>git clean</code> eng mit Shell-Aliasen, Editor-Plugins und Continuous Integration. Power-User fügen oft Aliase hinzu, die Flags kombinieren, die sie immer übergeben, oder wickeln den Befehl in Skripte, die Teamkonventionen durchsetzen. Die Ausgabeformatierung kann über Git-Config angepasst werden — Pretty-Formate, Farbschemata und Pager-Verhalten sind alle einstellbar. Wenn etwas schiefgeht, ist der erste Diagnoseschritt üblicherweise, den Befehl erneut mit <code>GIT_TRACE=1</code> in der Umgebung auszuführen, was die zugrunde liegenden Plumbing-Aufrufe offenlegt. Für ungewöhnliche Situationen öffnet die <code>--help</code>-Ausgabe (<code>git clean --help</code>) die vollständige Manpage mit Details zu jeder Option, einschließlich solcher, die in alltäglichen Workflows selten verwendet werden, aber für Debugging oder Skripting im großen Maßstab essentiell sind.</p>
        <p>Zu verstehen, wie <code>git clean</code> mit dem Rest von Gits Datenmodell interagiert — der Objektdatenbank, dem Index, Refs und dem Working Tree — zahlt sich aus. Jeder Befehl operiert auf einer Teilmenge dieser Stücke, und zu wissen, welche er berührt, hilft Ergebnisse vorherzusagen und sich von Fehlern zu erholen. Das Lesen der offiziellen Git-Dokumentation neben praktischer Übung in einem Wegwerf-Repository ist der schnellste Weg, die Nuancen zu verinnerlichen. Die meisten Produktionsprobleme mit Git rühren von einer von drei Ursachen: überraschendem Standardverhalten, partiellen Netzwerkoperationen oder dem Umschreiben bereits geteilter Historie. Ein funktionierendes mentales Modell der Nebenwirkungen von <code>git clean</code> hilft, alle drei zu vermeiden.</p>
        <h2>Häufige Optionen</h2>
        <table><thead><tr><th>Option</th><th>Beschreibung</th></tr></thead><tbody><tr><td><code>-f</code>, <code>--force</code></td><td>Erforderlich, um tatsächlich zu löschen (es sei denn, die Konfiguration deaktiviert dies).</td></tr><tr><td><code>-n</code>, <code>--dry-run</code></td><td>Zeigt, was gelöscht würde, löscht nicht.</td></tr><tr><td><code>-d</code></td><td>Entfernt auch untracked Verzeichnisse.</td></tr><tr><td><code>-x</code></td><td>Entfernt auch ignorierte Dateien.</td></tr><tr><td><code>-X</code></td><td>Entfernt nur ignorierte Dateien.</td></tr><tr><td><code>-i</code>, <code>--interactive</code></td><td>Interaktive Auswahl.</td></tr><tr><td><code>-e &lt;pattern&gt;</code></td><td>Schließt Dateien aus, die auf das Muster passen.</td></tr></tbody></table>
        <h2>Beispiele</h2>
        <pre><code>git clean -nd
        # Vorschau, was gelöscht würde (Verzeichnisse einbezogen)

        git clean -fd
        # Untracked Dateien und Verzeichnisse tatsächlich löschen

        git clean -fdx
        # Plus ignorierte Dateien (vollständiger Reset auf makellos)

        git clean -i
        # Interaktiv: auswählen, was gelöscht werden soll</code></pre>
        <h2>Häufige Fehler</h2>
        <p><code>git clean -fdx</code> löscht <code>node_modules</code>, Build-Artefakte, IDE-Einstellungen und sogar <code>.env</code>-Dateien, falls diese gitignoriert sind. Verwenden Sie immer zuerst <code>-n</code> zur Vorschau. Seien Sie besonders vorsichtig in Submodules — clean operiert pro Repository.</p>
        <h2>Verwandte Befehle</h2>
        <p><code>git status</code>, <code>git stash</code>, <code>git reset</code>, <code>git rm</code></p>
- source_title: git stash — Save changes for later
  title: git stash — Änderungen für später speichern
  langcode: de
  body: |-
    <h2>Übersicht</h2>
        <pre><code>git stash [push [-m &lt;msg&gt;] [-u]]
    git stash pop [&lt;stash&gt;]
    git stash list
    git stash drop [&lt;stash&gt;]</code></pre>
        <h2>Beschreibung</h2>
        <p>Der <code>git stash</code>-Befehl legt uncommitted Änderungen (sowohl im Working Tree als auch im Index) beiseite und setzt den Working Tree in einen sauberen Zustand zurück. Die beiseite gelegten Änderungen werden auf einem Stack gespeichert, den Sie später wiederanwenden können. Stash ist perfekt für Situationen wie "Ich muss Branches wechseln, aber meine Arbeit ist nicht bereit für einen Commit."</p>
        <p>Standardmäßig werden untracked Dateien nicht gestasht; übergeben Sie <code>-u</code> (oder <code>--include-untracked</code>), um sie einzubeziehen, und <code>-a</code>, um sogar ignorierte einzubeziehen. Jeder Stash-Eintrag ist ein gewöhnliches Commit-Objekt, adressierbar als <code>stash@{0}</code>, <code>stash@{1}</code> usw.</p>
        <p>Im täglichen Einsatz integriert sich <code>git stash</code> eng mit Shell-Aliasen, Editor-Plugins und Continuous Integration. Power-User fügen oft Aliase hinzu, die Flags kombinieren, die sie immer übergeben, oder wickeln den Befehl in Skripte, die Teamkonventionen durchsetzen. Die Ausgabeformatierung kann über Git-Config angepasst werden — Pretty-Formate, Farbschemata und Pager-Verhalten sind alle einstellbar. Wenn etwas schiefgeht, ist der erste Diagnoseschritt üblicherweise, den Befehl erneut mit <code>GIT_TRACE=1</code> in der Umgebung auszuführen, was die zugrunde liegenden Plumbing-Aufrufe offenlegt. Für ungewöhnliche Situationen öffnet die <code>--help</code>-Ausgabe (<code>git stash --help</code>) die vollständige Manpage mit Details zu jeder Option, einschließlich solcher, die in alltäglichen Workflows selten verwendet werden, aber für Debugging oder Skripting im großen Maßstab essentiell sind.</p>
        <p>Zu verstehen, wie <code>git stash</code> mit dem Rest von Gits Datenmodell interagiert — der Objektdatenbank, dem Index, Refs und dem Working Tree — zahlt sich aus. Jeder Befehl operiert auf einer Teilmenge dieser Stücke, und zu wissen, welche er berührt, hilft Ergebnisse vorherzusagen und sich von Fehlern zu erholen. Das Lesen der offiziellen Git-Dokumentation neben praktischer Übung in einem Wegwerf-Repository ist der schnellste Weg, die Nuancen zu verinnerlichen. Die meisten Produktionsprobleme mit Git rühren von einer von drei Ursachen: überraschendem Standardverhalten, partiellen Netzwerkoperationen oder dem Umschreiben bereits geteilter Historie. Ein funktionierendes mentales Modell der Nebenwirkungen von <code>git stash</code> hilft, alle drei zu vermeiden.</p>
        <h2>Häufige Optionen</h2>
        <table><thead><tr><th>Option / Unterbefehl</th><th>Beschreibung</th></tr></thead><tbody><tr><td><code>push -m &lt;msg&gt;</code></td><td>Stash mit beschreibender Nachricht.</td></tr><tr><td><code>-u</code></td><td>Bezieht untracked Dateien ein.</td></tr><tr><td><code>-a</code></td><td>Bezieht auch ignorierte Dateien ein.</td></tr><tr><td><code>list</code></td><td>Zeigt alle Stash-Einträge.</td></tr><tr><td><code>show [-p] &lt;stash&gt;</code></td><td>Zeigt den Inhalt eines Stashs.</td></tr><tr><td><code>pop</code> / <code>apply</code></td><td>Wendet einen Stash erneut an; pop löscht ihn auch.</td></tr><tr><td><code>drop &lt;stash&gt;</code></td><td>Löscht einen Stash-Eintrag.</td></tr><tr><td><code>branch &lt;name&gt;</code></td><td>Erstellt einen Branch aus einem Stash.</td></tr></tbody></table>
        <h2>Beispiele</h2>
        <pre><code>git stash push -m "WIP: refactor parser"
        # Aktuelle Arbeit mit Label speichern

        git stash list
        # stash@{0}: On main: WIP: refactor parser

        git stash pop
        # Den jüngsten Stash erneut anwenden und entfernen

        git stash branch temp-branch stash@{1}
        # Einen neuen Branch aus einem konfliktbehafteten Stash erstellen</code></pre>
        <h2>Häufige Fehler</h2>
        <p>Vergessen, dass Stash standardmäßig keine untracked Dateien einbezieht, und sie dann beim Ausführen von <code>git clean</code> verlieren. Verwenden Sie <code>-u</code>. Einen Stash zu poppen, der in Konflikt gerät, kann einen komplizierten Zustand hinterlassen — ziehen Sie zuerst <code>apply</code> in Betracht, sodass der Stash nicht verworfen wird, falls etwas schiefgeht. Lange existierende Stashes häufen sich an; überprüfen Sie regelmäßig mit <code>git stash list</code>.</p>
        <h2>Verwandte Befehle</h2>
        <p><code>git commit</code>, <code>git switch</code>, <code>git restore</code>, <code>git clean</code></p>
- source_title: git apply — Apply a patch to files and/or to the index
  title: git apply — Einen Patch auf Dateien und/oder den Index anwenden
  langcode: de
  body: |-
    <h2>Übersicht</h2>
        <pre><code>git apply [--check] [--index] [--3way] &lt;patch&gt;...</code></pre>
        <h2>Beschreibung</h2>
        <p>Der <code>git apply</code>-Befehl wendet einen Unified Diff (eine Patch-Datei) auf den Working Tree, den Index oder beides an. Anders als <code>git am</code>, das einen vollständigen Patch im Mailbox-Format mit Autor- und Nachrichten-Metadaten erwartet, wendet <code>git apply</code> nur den Diff-Inhalt an. Es ist nützlich, um Patches anzuwenden, die per E-Mail, Code-Review-Tools oder erzeugt von <code>git diff</code> empfangen wurden.</p>
        <p>Standardmäßig aktualisiert <code>git apply</code> nur den Working Tree. Verwenden Sie <code>--index</code>, um auch die Staging Area zu aktualisieren, und <code>--3way</code>, um auf einen Three-Way-Merge zurückzufallen, wenn der Patch nicht sauber anwendbar ist. Um einen Patch zu verifizieren, ohne ihn anzuwenden, verwenden Sie <code>--check</code>.</p>
        <p>Im täglichen Einsatz integriert sich <code>git apply</code> eng mit Shell-Aliasen, Editor-Plugins und Continuous Integration. Power-User fügen oft Aliase hinzu, die Flags kombinieren, die sie immer übergeben, oder wickeln den Befehl in Skripte, die Teamkonventionen durchsetzen. Die Ausgabeformatierung kann über Git-Config angepasst werden — Pretty-Formate, Farbschemata und Pager-Verhalten sind alle einstellbar. Wenn etwas schiefgeht, ist der erste Diagnoseschritt üblicherweise, den Befehl erneut mit <code>GIT_TRACE=1</code> in der Umgebung auszuführen, was die zugrunde liegenden Plumbing-Aufrufe offenlegt. Für ungewöhnliche Situationen öffnet die <code>--help</code>-Ausgabe (<code>git apply --help</code>) die vollständige Manpage mit Details zu jeder Option, einschließlich solcher, die in alltäglichen Workflows selten verwendet werden, aber für Debugging oder Skripting im großen Maßstab essentiell sind.</p>
        <p>Zu verstehen, wie <code>git apply</code> mit dem Rest von Gits Datenmodell interagiert — der Objektdatenbank, dem Index, Refs und dem Working Tree — zahlt sich aus. Jeder Befehl operiert auf einer Teilmenge dieser Stücke, und zu wissen, welche er berührt, hilft Ergebnisse vorherzusagen und sich von Fehlern zu erholen. Das Lesen der offiziellen Git-Dokumentation neben praktischer Übung in einem Wegwerf-Repository ist der schnellste Weg, die Nuancen zu verinnerlichen. Die meisten Produktionsprobleme mit Git rühren von einer von drei Ursachen: überraschendem Standardverhalten, partiellen Netzwerkoperationen oder dem Umschreiben bereits geteilter Historie. Ein funktionierendes mentales Modell der Nebenwirkungen von <code>git apply</code> hilft, alle drei zu vermeiden.</p>
        <h2>Häufige Optionen</h2>
        <table><thead><tr><th>Option</th><th>Beschreibung</th></tr></thead><tbody><tr><td><code>--check</code></td><td>Testet, ob der Patch anwendbar ist, ohne etwas zu modifizieren.</td></tr><tr><td><code>--index</code></td><td>Wendet auf Working Tree und Index an.</td></tr><tr><td><code>--cached</code></td><td>Wendet nur auf den Index an.</td></tr><tr><td><code>--3way</code></td><td>Three-Way-Merge, falls Kontext nicht passt.</td></tr><tr><td><code>--reverse</code> / <code>-R</code></td><td>Wendet rückwärts an (uncommit eines Patches).</td></tr><tr><td><code>--whitespace=&lt;action&gt;</code></td><td>Behandlung von Whitespace-Fehlern (<code>warn</code>, <code>fix</code>, <code>error</code>).</td></tr><tr><td><code>-p&lt;n&gt;</code></td><td>Entfernt <code>n</code> Pfadkomponenten von Dateinamen.</td></tr></tbody></table>
        <h2>Beispiele</h2>
        <pre><code>git apply changes.patch
        # Eine Patch-Datei auf den Working Tree anwenden

        git apply --check feature.patch
        # Verifizieren, dass ein Patch sauber anwendbar ist

        git apply --index --3way mr.diff
        # Mit Three-Way-Merge-Fallback anwenden, auch in den Index

        curl -L https://example.com/fix.patch | git apply
        # Einen Patch direkt aus einer URL pipen</code></pre>
        <h2>Häufige Fehler</h2>
        <p>Wenn der Patch gegen eine andere Basis erzeugt wurde, schlägt einfaches <code>git apply</code> mit "patch does not apply" fehl. Das Hinzufügen von <code>--3way</code> rettet die Situation oft, indem ein Merge versucht wird. Für Patches mit Commit-Metadaten (Autor, Nachricht) verwenden Sie stattdessen <code>git am</code>, sodass der Commit getreu wiederhergestellt wird.</p>
        <h2>Verwandte Befehle</h2>
        <p><code>git am</code>, <code>git format-patch</code>, <code>git diff</code>, <code>git cherry-pick</code></p>
- source_title: git tag — Create, list, and verify tags
  title: git tag — Tags erstellen, auflisten und verifizieren
  langcode: de
  body: |-
    <h2>Übersicht</h2>
        <pre><code>git tag [-a] [-s] [-m &lt;msg&gt;] &lt;name&gt; [&lt;commit&gt;]
    git tag -l ['&lt;pattern&gt;']
    git tag -d &lt;name&gt;</code></pre>
        <h2>Beschreibung</h2>
        <p>Der <code>git tag</code>-Befehl markiert bestimmte Commits mit einem einprägsamen Namen, üblicherweise für Releases verwendet. Es gibt zwei Arten von Tags: lightweight (nur ein benannter Zeiger) und annotated (ein vollständiges Git-Objekt mit Autor, Datum, Nachricht und optionaler GPG-Signatur). Erstellen Sie für Releases immer annotated Tags — sie tragen die Metadaten, die das Release-Management benötigt.</p>
        <p>Tags werden NICHT standardmäßig gepusht. Verwenden Sie <code>git push origin v1.2.3</code>, um einen einzelnen Tag zu veröffentlichen, oder <code>git push --tags</code> für alle. Einmal veröffentlicht, sind Tags normalerweise unveränderlich; einen veröffentlichten Tag umzuschreiben bricht Konsumenten und wird stark abgeraten.</p>
        <p>Im täglichen Einsatz integriert sich <code>git tag</code> eng mit Shell-Aliasen, Editor-Plugins und Continuous Integration. Power-User fügen oft Aliase hinzu, die Flags kombinieren, die sie immer übergeben, oder wickeln den Befehl in Skripte, die Teamkonventionen durchsetzen. Die Ausgabeformatierung kann über Git-Config angepasst werden — Pretty-Formate, Farbschemata und Pager-Verhalten sind alle einstellbar. Wenn etwas schiefgeht, ist der erste Diagnoseschritt üblicherweise, den Befehl erneut mit <code>GIT_TRACE=1</code> in der Umgebung auszuführen, was die zugrunde liegenden Plumbing-Aufrufe offenlegt. Für ungewöhnliche Situationen öffnet die <code>--help</code>-Ausgabe (<code>git tag --help</code>) die vollständige Manpage mit Details zu jeder Option, einschließlich solcher, die in alltäglichen Workflows selten verwendet werden, aber für Debugging oder Skripting im großen Maßstab essentiell sind.</p>
        <p>Zu verstehen, wie <code>git tag</code> mit dem Rest von Gits Datenmodell interagiert — der Objektdatenbank, dem Index, Refs und dem Working Tree — zahlt sich aus. Jeder Befehl operiert auf einer Teilmenge dieser Stücke, und zu wissen, welche er berührt, hilft Ergebnisse vorherzusagen und sich von Fehlern zu erholen. Das Lesen der offiziellen Git-Dokumentation neben praktischer Übung in einem Wegwerf-Repository ist der schnellste Weg, die Nuancen zu verinnerlichen. Die meisten Produktionsprobleme mit Git rühren von einer von drei Ursachen: überraschendem Standardverhalten, partiellen Netzwerkoperationen oder dem Umschreiben bereits geteilter Historie. Ein funktionierendes mentales Modell der Nebenwirkungen von <code>git tag</code> hilft, alle drei zu vermeiden.</p>
        <h2>Häufige Optionen</h2>
        <table><thead><tr><th>Option</th><th>Beschreibung</th></tr></thead><tbody><tr><td><code>-a</code></td><td>Erstellt einen annotated Tag.</td></tr><tr><td><code>-s</code></td><td>Erstellt einen GPG-signierten annotated Tag.</td></tr><tr><td><code>-m &lt;msg&gt;</code></td><td>Setzt die Tag-Nachricht.</td></tr><tr><td><code>-l '&lt;pattern&gt;'</code></td><td>Listet Tags auf, die auf einen Glob passen.</td></tr><tr><td><code>-d &lt;name&gt;</code></td><td>Löscht einen lokalen Tag.</td></tr><tr><td><code>-v &lt;name&gt;</code></td><td>Verifiziert einen signierten Tag.</td></tr><tr><td><code>-f</code></td><td>Ersetzt einen vorhandenen Tag (mit Vorsicht verwenden).</td></tr><tr><td><code>--sort=&lt;key&gt;</code></td><td>Sortiert die Auflistung (z. B. <code>-v:refname</code>).</td></tr></tbody></table>
        <h2>Beispiele</h2>
        <pre><code>git tag -a v1.0.0 -m "Release 1.0"
        # Einen annotated Tag bei HEAD erstellen

        git tag -s v1.0.1 -m "Patch release" abc123
        # GPG-signierter Tag bei einem bestimmten Commit

        git tag -l 'v1.*' --sort=-v:refname
        # 1.x-Tags auflisten, neueste zuerst

        git push origin v1.0.0
        # Einen Tag veröffentlichen</code></pre>
        <h2>Häufige Fehler</h2>
        <p>Einen Lightweight-Tag für ein Release zu erstellen verliert Metadaten und Signierung. Verwenden Sie <code>-a</code> oder <code>-s</code>. Vergessen Sie nicht <code>git push --tags</code>, sonst sehen Kollegen Ihren Tag nie. Einen Tag mit <code>-f</code> nach Veröffentlichung zu verschieben verwirrt Caches und CI-Systeme.</p>
        <h2>Verwandte Befehle</h2>
        <p><code>git describe</code>, <code>git show</code>, <code>git push</code>, <code>git verify-tag</code></p>
- source_title: git describe (versioning) — Use tags as the source of truth for versions
  title: git describe (Versionierung) — Tags als Wahrheitsquelle für Versionen verwenden
  langcode: de
  body: |-
    <h2>Übersicht</h2>
        <pre><code>git describe --tags --dirty --always [--match 'v[0-9]*']</code></pre>
        <h2>Beschreibung</h2>
        <p>Diese Seite behandelt <code>git describe</code> aus Versionierungssicht: wie Sie ein Tag-Schema entwerfen, das reproduzierbare Build-Versions-Strings antreibt. Die Ausgabe von <code>git describe</code> wird weit von Build-Systemen (Make, CMake, Cargo, npm-Skripten) verwendet, um einen Versions-String zu erzeugen, der einen Basis-Tag plus Distanz und SHA enthält.</p>
        <p>Das empfohlene Muster: Verwenden Sie annotated Semver-Tags wie <code>v1.2.3</code>; Build-Skripte rufen <code>git describe --tags --dirty --always --match 'v[0-9]*'</code> auf; der resultierende String wird über einen generierten Header oder eine Konstante in Binaries eingebettet. Das erzeugt deterministische Versionen, die sowohl das neueste Release als auch unveröffentlichte Arbeit seitdem widerspiegeln.</p>
        <p>Im täglichen Einsatz integriert sich <code>git describe</code> eng mit Shell-Aliasen, Editor-Plugins und Continuous Integration. Power-User fügen oft Aliase hinzu, die Flags kombinieren, die sie immer übergeben, oder wickeln den Befehl in Skripte, die Teamkonventionen durchsetzen. Die Ausgabeformatierung kann über Git-Config angepasst werden — Pretty-Formate, Farbschemata und Pager-Verhalten sind alle einstellbar. Wenn etwas schiefgeht, ist der erste Diagnoseschritt üblicherweise, den Befehl erneut mit <code>GIT_TRACE=1</code> in der Umgebung auszuführen, was die zugrunde liegenden Plumbing-Aufrufe offenlegt. Für ungewöhnliche Situationen öffnet die <code>--help</code>-Ausgabe (<code>git describe --help</code>) die vollständige Manpage mit Details zu jeder Option, einschließlich solcher, die in alltäglichen Workflows selten verwendet werden, aber für Debugging oder Skripting im großen Maßstab essentiell sind.</p>
        <p>Zu verstehen, wie <code>git describe</code> mit dem Rest von Gits Datenmodell interagiert — der Objektdatenbank, dem Index, Refs und dem Working Tree — zahlt sich aus. Jeder Befehl operiert auf einer Teilmenge dieser Stücke, und zu wissen, welche er berührt, hilft Ergebnisse vorherzusagen und sich von Fehlern zu erholen. Das Lesen der offiziellen Git-Dokumentation neben praktischer Übung in einem Wegwerf-Repository ist der schnellste Weg, die Nuancen zu verinnerlichen. Die meisten Produktionsprobleme mit Git rühren von einer von drei Ursachen: überraschendem Standardverhalten, partiellen Netzwerkoperationen oder dem Umschreiben bereits geteilter Historie. Ein funktionierendes mentales Modell der Nebenwirkungen von <code>git describe</code> hilft, alle drei zu vermeiden.</p>
        <h2>Häufige Optionen</h2>
        <table><thead><tr><th>Option</th><th>Beschreibung</th></tr></thead><tbody><tr><td><code>--tags</code></td><td>Verwendet Lightweight zusätzlich zu Annotated Tags.</td></tr><tr><td><code>--dirty[=&lt;mark&gt;]</code></td><td>Hängt einen Marker an, wenn der Tree dirty ist.</td></tr><tr><td><code>--always</code></td><td>Fällt auf abgekürzten SHA zurück, wenn kein Tag erreichbar.</td></tr><tr><td><code>--long</code></td><td>Erzwingt langes Format auch bei einem Tag.</td></tr><tr><td><code>--match &lt;pattern&gt;</code></td><td>Beschränkt auf passende Tags eines Musters (z. B. <code>nightly-*</code> ausschließen).</td></tr><tr><td><code>--exclude &lt;pattern&gt;</code></td><td>Schließt passende Tags aus.</td></tr><tr><td><code>--abbrev=&lt;n&gt;</code></td><td>Länge des abgekürzten SHA.</td></tr></tbody></table>
        <h2>Beispiele</h2>
        <pre><code># Versions-String für einen Build erzeugen
        VERSION=$(git describe --tags --dirty --always --match 'v[0-9]*')
        echo "${VERSION#v}" > VERSION

        # In einem Makefile:
        VERSION := $(shell git describe --tags --dirty --always)
        CFLAGS += -DVERSION="\"$(VERSION)\""

        # In einem package.json prepublish-Skript:
        node -e "p=require('./package.json'); p.version=process.env.VERSION; require('fs').writeFileSync('package.json', JSON.stringify(p,null,2))"</code></pre>
        <h2>Häufige Fehler</h2>
        <p>Lightweight Tags zu verwenden, bricht <code>git describe</code> ohne <code>--tags</code>. Release-Candidate- oder Nightly-Tags in Ihrem Match-Muster einzubeziehen erzeugt lärmige Versionen für stabile Builds. Shallow CI-Klone haben möglicherweise gar keine Tags — fetchen Sie sie explizit: <code>git fetch --tags --unshallow</code>.</p>
        <h2>Verwandte Befehle</h2>
        <p><code>git tag</code>, <code>git rev-parse</code>, <code>git for-each-ref</code>, <code>git log</code></p>
- source_title: git cherry-pick — Apply changes from existing commits
  title: git cherry-pick — Änderungen aus bestehenden Commits anwenden
  langcode: de
  body: |-
    <h2>Übersicht</h2>
        <pre><code>git cherry-pick [-n] [-x] [--continue] [--abort] &lt;commit&gt;...</code></pre>
        <h2>Beschreibung</h2>
        <p>Der <code>git cherry-pick</code>-Befehl wendet die durch einen oder mehrere bestehende Commits eingeführten Änderungen als neue Commits auf den aktuellen Branch an. Es ist das richtige Werkzeug, wenn Sie einen einzelnen Fix von einem anderen Branch brauchen, ohne den ganzen Branch zu mergen. Cherry-Picks erstellen neue Commits mit neuen SHAs, bewahren aber den ursprünglichen Autor und die Nachricht.</p>
        <p>Cherry-Picking kann genau wie ein Merge Konflikte erzeugen. Verwenden Sie <code>--continue</code> nach der Auflösung oder <code>--abort</code>, um abzubrechen. Das <code>-x</code>-Flag fügt eine "(cherry picked from commit ...)"-Zeile zur Nachricht hinzu — nützlich für Nachverfolgbarkeit beim Portieren von Fixes zwischen Wartungs-Branches.</p>
        <p>Im täglichen Einsatz integriert sich <code>git cherry-pick</code> eng mit Shell-Aliasen, Editor-Plugins und Continuous Integration. Power-User fügen oft Aliase hinzu, die Flags kombinieren, die sie immer übergeben, oder wickeln den Befehl in Skripte, die Teamkonventionen durchsetzen. Die Ausgabeformatierung kann über Git-Config angepasst werden — Pretty-Formate, Farbschemata und Pager-Verhalten sind alle einstellbar. Wenn etwas schiefgeht, ist der erste Diagnoseschritt üblicherweise, den Befehl erneut mit <code>GIT_TRACE=1</code> in der Umgebung auszuführen, was die zugrunde liegenden Plumbing-Aufrufe offenlegt. Für ungewöhnliche Situationen öffnet die <code>--help</code>-Ausgabe (<code>git cherry-pick --help</code>) die vollständige Manpage mit Details zu jeder Option, einschließlich solcher, die in alltäglichen Workflows selten verwendet werden, aber für Debugging oder Skripting im großen Maßstab essentiell sind.</p>
        <p>Zu verstehen, wie <code>git cherry-pick</code> mit dem Rest von Gits Datenmodell interagiert — der Objektdatenbank, dem Index, Refs und dem Working Tree — zahlt sich aus. Jeder Befehl operiert auf einer Teilmenge dieser Stücke, und zu wissen, welche er berührt, hilft Ergebnisse vorherzusagen und sich von Fehlern zu erholen. Das Lesen der offiziellen Git-Dokumentation neben praktischer Übung in einem Wegwerf-Repository ist der schnellste Weg, die Nuancen zu verinnerlichen. Die meisten Produktionsprobleme mit Git rühren von einer von drei Ursachen: überraschendem Standardverhalten, partiellen Netzwerkoperationen oder dem Umschreiben bereits geteilter Historie. Ein funktionierendes mentales Modell der Nebenwirkungen von <code>git cherry-pick</code> hilft, alle drei zu vermeiden.</p>
        <h2>Häufige Optionen</h2>
        <table><thead><tr><th>Option</th><th>Beschreibung</th></tr></thead><tbody><tr><td><code>-n</code>, <code>--no-commit</code></td><td>Wendet Änderungen an, committet aber noch nicht.</td></tr><tr><td><code>-x</code></td><td>Annotiert die Commit-Nachricht mit dem Quell-SHA.</td></tr><tr><td><code>-e</code>, <code>--edit</code></td><td>Bearbeitet die Commit-Nachricht vor dem Committen.</td></tr><tr><td><code>--continue</code></td><td>Setzt nach Konfliktauflösung fort.</td></tr><tr><td><code>--abort</code></td><td>Bricht ab und stellt vorherigen Zustand wieder her.</td></tr><tr><td><code>--skip</code></td><td>Überspringt aktuellen Commit und fährt fort.</td></tr><tr><td><code>-m &lt;parent&gt;</code></td><td>Spezifiziert Mainline beim Picken eines Merge-Commits.</td></tr><tr><td><code>-S</code></td><td>GPG-signiert die resultierenden Commits.</td></tr></tbody></table>
        <h2>Beispiele</h2>
        <pre><code>git cherry-pick abc123
        # Einen einzelnen Commit auf den aktuellen Branch anwenden

        git cherry-pick -x abc123 def456
        # Zwei Commits mit Nachverfolgbarkeits-Annotationen anwenden

        git cherry-pick A..B
        # Einen Bereich picken (exklusiv A, inklusiv B)

        git cherry-pick --continue
        # Nach Konfliktauflösung fortsetzen</code></pre>
        <h2>Häufige Fehler</h2>
        <p>Dieselbe Änderung wiederholt zu cherry-picken kann spätere Merges verwirren, da identisch aussehende Commits unterschiedliche SHAs haben. Verwenden Sie <code>git rerere</code>, um sich Auflösungen zu merken. Einen Merge ohne <code>-m</code> zu picken schlägt fehl. Für lange Sequenzen bevorzugen Sie Rebase oder Merge.</p>
        <h2>Verwandte Befehle</h2>
        <p><code>git rebase</code>, <code>git revert</code>, <code>git merge</code>, <code>git rerere</code></p>
- source_title: git rebase -i — Interactive rebase to rewrite local history
  title: git rebase -i — Interaktives Rebase zum Umschreiben lokaler Historie
  langcode: de
  body: |-
    <h2>Übersicht</h2>
        <pre><code>git rebase -i &lt;upstream&gt;
    git rebase -i --root</code></pre>
        <h2>Beschreibung</h2>
        <p>Interaktives Rebase öffnet einen Editor mit der Liste der zu rebasenden Commits, jeder vorangestellt mit einer Aktion: <code>pick</code>, <code>reword</code>, <code>edit</code>, <code>squash</code>, <code>fixup</code>, <code>drop</code>, <code>exec</code> oder <code>break</code>. Durch Bearbeiten dieser Liste können Sie Commits umordnen, kombinieren, aufteilen oder entfernen, bevor sie upstream gehen. Es ist das Arbeitspferd zum "Aufräumen der Historie vor dem Pushen".</p>
        <p>Kombiniert mit <code>--autosquash</code> werden via <code>git commit --fixup</code> erzeugte Fixup-Commits automatisch neben ihren Zielen angeordnet und zum Squashen markiert. Das <code>--rebase-merges</code>-Flag bewahrt Merge-Commits während des interaktiven Rebase.</p>
        <p>Im täglichen Einsatz integriert sich <code>git rebase -i</code> eng mit Shell-Aliasen, Editor-Plugins und Continuous Integration. Power-User fügen oft Aliase hinzu, die Flags kombinieren, die sie immer übergeben, oder wickeln den Befehl in Skripte, die Teamkonventionen durchsetzen. Die Ausgabeformatierung kann über Git-Config angepasst werden — Pretty-Formate, Farbschemata und Pager-Verhalten sind alle einstellbar. Wenn etwas schiefgeht, ist der erste Diagnoseschritt üblicherweise, den Befehl erneut mit <code>GIT_TRACE=1</code> in der Umgebung auszuführen, was die zugrunde liegenden Plumbing-Aufrufe offenlegt. Für ungewöhnliche Situationen öffnet die <code>--help</code>-Ausgabe (<code>git rebase -i --help</code>) die vollständige Manpage mit Details zu jeder Option, einschließlich solcher, die in alltäglichen Workflows selten verwendet werden, aber für Debugging oder Skripting im großen Maßstab essentiell sind.</p>
        <p>Zu verstehen, wie <code>git rebase -i</code> mit dem Rest von Gits Datenmodell interagiert — der Objektdatenbank, dem Index, Refs und dem Working Tree — zahlt sich aus. Jeder Befehl operiert auf einer Teilmenge dieser Stücke, und zu wissen, welche er berührt, hilft Ergebnisse vorherzusagen und sich von Fehlern zu erholen. Das Lesen der offiziellen Git-Dokumentation neben praktischer Übung in einem Wegwerf-Repository ist der schnellste Weg, die Nuancen zu verinnerlichen. Die meisten Produktionsprobleme mit Git rühren von einer von drei Ursachen: überraschendem Standardverhalten, partiellen Netzwerkoperationen oder dem Umschreiben bereits geteilter Historie. Ein funktionierendes mentales Modell der Nebenwirkungen von <code>git rebase -i</code> hilft, alle drei zu vermeiden.</p>
        <h2>Häufige Optionen</h2>
        <table><thead><tr><th>Option</th><th>Beschreibung</th></tr></thead><tbody><tr><td><code>-i</code></td><td>Interaktiver Editor für den Rebase-Plan.</td></tr><tr><td><code>--autosquash</code></td><td>Ordnet Fixup/Squash-Commits automatisch an.</td></tr><tr><td><code>--root</code></td><td>Rebaset vom allerersten Commit.</td></tr><tr><td><code>-x &lt;cmd&gt;</code></td><td>Führt einen Befehl zwischen Commits aus (z. B. Tests).</td></tr><tr><td><code>-r</code>, <code>--rebase-merges</code></td><td>Bewahrt Merge-Commits.</td></tr><tr><td><code>--continue</code></td><td>Setzt nach Konfliktauflösung fort.</td></tr><tr><td><code>--abort</code></td><td>Bricht vollständig ab.</td></tr></tbody></table>
        <h2>Beispiele</h2>
        <pre><code>git rebase -i HEAD~5
        # Die letzten 5 Commits bearbeiten

        git commit --fixup abc123
        git rebase -i --autosquash abc123^
        # Einen Fixup hinzufügen, dann beim Rebase auto-squashen

        git rebase -i -x "npm test" main
        # Tests nach jedem Commit während des Rebase ausführen

        git rebase -i --root
        # Historie ab dem ersten Commit umschreiben</code></pre>
        <h2>Häufige Fehler</h2>
        <p>Eine leere Rebase-Todo-Liste zu speichern bricht die Operation ab — lassen Sie mindestens eine <code>pick</code>-Zeile stehen. Zu viele Commits als <code>edit</code> zu markieren erzeugt eine mühsame Sequenz von Stopps; bevorzugen Sie <code>squash</code> oder <code>fixup</code>, wenn Sie nur kombinieren wollen. Rebasen Sie niemals interaktiv Commits, die bereits gepusht und geteilt sind.</p>
        <h2>Verwandte Befehle</h2>
        <p><code>git rebase</code>, <code>git commit --fixup</code>, <code>git cherry-pick</code>, <code>git reflog</code></p>
- source_title: git filter-repo — Rewrite repository history at scale
  title: git filter-repo — Repository-Historie im großen Stil umschreiben
  langcode: de
  body: |-
    <h2>Übersicht</h2>
        <pre><code>git filter-repo --path &lt;path&gt; [--invert-paths]
    git filter-repo --replace-text &lt;file&gt;
    git filter-repo --strip-blobs-bigger-than 10M</code></pre>
        <h2>Beschreibung</h2>
        <p>Das <code>git filter-repo</code>-Tool ist die moderne, empfohlene Methode, Git-Historie umzuschreiben. Es ersetzt das veraltete <code>git filter-branch</code>, das langsam und fehleranfällig ist. <code>filter-repo</code> kann große Dateien entfernen, sensible Daten beseitigen (versehentlich committete Credentials), Pfade umstrukturieren, Autoren über eine Mailmap umschreiben oder Unterverzeichnisse in eigene Repositories extrahieren.</p>
        <p>Es wird separat vom Kern-Git verteilt (typischerweise via <code>pip install git-filter-repo</code> oder Ihrem Paketmanager). Operationen sind destruktiv — arbeiten Sie immer auf einem frischen Klon und stimmen Sie sich mit Mitwirkenden ab, weil sich jeder SHA ändert.</p>
        <p>Im täglichen Einsatz integriert sich <code>git filter-repo</code> eng mit Shell-Aliasen, Editor-Plugins und Continuous Integration. Power-User fügen oft Aliase hinzu, die Flags kombinieren, die sie immer übergeben, oder wickeln den Befehl in Skripte, die Teamkonventionen durchsetzen. Die Ausgabeformatierung kann über Git-Config angepasst werden — Pretty-Formate, Farbschemata und Pager-Verhalten sind alle einstellbar. Wenn etwas schiefgeht, ist der erste Diagnoseschritt üblicherweise, den Befehl erneut mit <code>GIT_TRACE=1</code> in der Umgebung auszuführen, was die zugrunde liegenden Plumbing-Aufrufe offenlegt. Für ungewöhnliche Situationen öffnet die <code>--help</code>-Ausgabe (<code>git filter-repo --help</code>) die vollständige Manpage mit Details zu jeder Option, einschließlich solcher, die in alltäglichen Workflows selten verwendet werden, aber für Debugging oder Skripting im großen Maßstab essentiell sind.</p>
        <p>Zu verstehen, wie <code>git filter-repo</code> mit dem Rest von Gits Datenmodell interagiert — der Objektdatenbank, dem Index, Refs und dem Working Tree — zahlt sich aus. Jeder Befehl operiert auf einer Teilmenge dieser Stücke, und zu wissen, welche er berührt, hilft Ergebnisse vorherzusagen und sich von Fehlern zu erholen. Das Lesen der offiziellen Git-Dokumentation neben praktischer Übung in einem Wegwerf-Repository ist der schnellste Weg, die Nuancen zu verinnerlichen. Die meisten Produktionsprobleme mit Git rühren von einer von drei Ursachen: überraschendem Standardverhalten, partiellen Netzwerkoperationen oder dem Umschreiben bereits geteilter Historie. Ein funktionierendes mentales Modell der Nebenwirkungen von <code>git filter-repo</code> hilft, alle drei zu vermeiden.</p>
        <h2>Häufige Optionen</h2>
        <table><thead><tr><th>Option</th><th>Beschreibung</th></tr></thead><tbody><tr><td><code>--path &lt;p&gt;</code></td><td>Behält nur den angegebenen Pfad.</td></tr><tr><td><code>--invert-paths</code></td><td>Inverse: entfernt die angegebenen Pfade.</td></tr><tr><td><code>--path-glob &lt;g&gt;</code></td><td>Verwendet ein Glob-Muster.</td></tr><tr><td><code>--replace-text &lt;file&gt;</code></td><td>Ersetzt Strings in der gesamten Historie.</td></tr><tr><td><code>--strip-blobs-bigger-than &lt;size&gt;</code></td><td>Verwirft große Blobs.</td></tr><tr><td><code>--mailmap &lt;file&gt;</code></td><td>Schreibt Autor/Committer-Info um.</td></tr><tr><td><code>--analyze</code></td><td>Erzeugt einen Bericht zur Repo-Größe vor dem Umschreiben.</td></tr><tr><td><code>--force</code></td><td>Überschreibt die Frisch-Klon-Sicherheitsprüfung.</td></tr></tbody></table>
        <h2>Beispiele</h2>
        <pre><code>git filter-repo --analyze
        # Inspizieren, was Platz frisst

        git filter-repo --path docs/ --invert-paths
        # docs/ aus der gesamten Historie entfernen

        git filter-repo --strip-blobs-bigger-than 50M
        # Jede Datei über 50 MB entfernen

        echo 'API_KEY==&gt;REDACTED' &gt; replacements.txt
        git filter-repo --replace-text replacements.txt
        # Ein geleaktes Geheimnis bereinigen</code></pre>
        <h2>Häufige Fehler</h2>
        <p><code>filter-repo</code> in Ihrem Live-Repo ohne Backup auszuführen riskiert Datenverlust. Klonen Sie immer frisch. Nach dem Umschreiben force-pushen und Mitwirkende neu klonen lassen — jeder mit alten SHAs bekommt Konflikte. Das Tool entfernt standardmäßig <code>origin</code>, um versehentliche Pushes zu verhindern; fügen Sie ihn bewusst wieder hinzu.</p>
        <h2>Verwandte Befehle</h2>
        <p><code>git filter-branch</code> (deprecated), <code>git gc</code>, <code>git reflog</code>, <code>git push --force-with-lease</code></p>
- source_title: git worktree — Manage multiple working trees
  title: git worktree — Mehrere Working Trees verwalten
  langcode: de
  body: |-
    <h2>Übersicht</h2>
        <pre><code>git worktree add &lt;path&gt; [&lt;branch&gt;]
    git worktree list
    git worktree remove &lt;path&gt;
    git worktree prune</code></pre>
        <h2>Beschreibung</h2>
        <p>Der <code>git worktree</code>-Befehl erlaubt es, dass ein einzelnes Repository mehrere Working Trees gleichzeitig ausgecheckt hat, jeden auf einem anderen Branch. Das ist schneller und billiger als mehrfaches Klonen: nur eine Objektdatenbank, aber parallele Checkouts. Worktrees sind perfekt, um Tests auf einem Release-Branch zu laufen lassen, während die Entwicklung auf main weitergeht, oder um einen Notfall-Fix abzuholen, ohne laufende Arbeit zu stören.</p>
        <p>Jedes Worktree hat sein eigenes HEAD, seinen eigenen Index und seine eigenen Arbeitsdateien, teilt aber die zugrunde liegenden Objekte und die Konfiguration. Gesperrte Worktrees verhindern automatisches Pruning von woanders gemounteten Checkouts.</p>
        <p>Im täglichen Einsatz integriert sich <code>git worktree</code> eng mit Shell-Aliasen, Editor-Plugins und Continuous Integration. Power-User fügen oft Aliase hinzu, die Flags kombinieren, die sie immer übergeben, oder wickeln den Befehl in Skripte, die Teamkonventionen durchsetzen. Die Ausgabeformatierung kann über Git-Config angepasst werden — Pretty-Formate, Farbschemata und Pager-Verhalten sind alle einstellbar. Wenn etwas schiefgeht, ist der erste Diagnoseschritt üblicherweise, den Befehl erneut mit <code>GIT_TRACE=1</code> in der Umgebung auszuführen, was die zugrunde liegenden Plumbing-Aufrufe offenlegt. Für ungewöhnliche Situationen öffnet die <code>--help</code>-Ausgabe (<code>git worktree --help</code>) die vollständige Manpage mit Details zu jeder Option, einschließlich solcher, die in alltäglichen Workflows selten verwendet werden, aber für Debugging oder Skripting im großen Maßstab essentiell sind.</p>
        <p>Zu verstehen, wie <code>git worktree</code> mit dem Rest von Gits Datenmodell interagiert — der Objektdatenbank, dem Index, Refs und dem Working Tree — zahlt sich aus. Jeder Befehl operiert auf einer Teilmenge dieser Stücke, und zu wissen, welche er berührt, hilft Ergebnisse vorherzusagen und sich von Fehlern zu erholen. Das Lesen der offiziellen Git-Dokumentation neben praktischer Übung in einem Wegwerf-Repository ist der schnellste Weg, die Nuancen zu verinnerlichen. Die meisten Produktionsprobleme mit Git rühren von einer von drei Ursachen: überraschendem Standardverhalten, partiellen Netzwerkoperationen oder dem Umschreiben bereits geteilter Historie. Ein funktionierendes mentales Modell der Nebenwirkungen von <code>git worktree</code> hilft, alle drei zu vermeiden.</p>
        <h2>Häufige Optionen</h2>
        <table><thead><tr><th>Unterbefehl</th><th>Beschreibung</th></tr></thead><tbody><tr><td><code>add &lt;path&gt; [&lt;branch&gt;]</code></td><td>Erstellt einen neuen Worktree.</td></tr><tr><td><code>add -b &lt;new&gt; &lt;path&gt; [&lt;start&gt;]</code></td><td>Erstellt neuen Branch + Worktree in einem Schritt.</td></tr><tr><td><code>list</code></td><td>Zeigt alle Worktrees.</td></tr><tr><td><code>remove &lt;path&gt;</code></td><td>Löscht das Verzeichnis und die Metadaten eines Worktrees.</td></tr><tr><td><code>prune</code></td><td>Entfernt Metadaten für Worktrees, deren Pfad weg ist.</td></tr><tr><td><code>lock</code> / <code>unlock</code></td><td>Verhindert oder erlaubt Pruning.</td></tr><tr><td><code>move &lt;old&gt; &lt;new&gt;</code></td><td>Verschiebt einen Worktree.</td></tr></tbody></table>
        <h2>Beispiele</h2>
        <pre><code>git worktree add ../project-hotfix release/1.4
        # release/1.4 in einem Geschwister-Verzeichnis auschecken

        git worktree add -b experiment ../project-experiment
        # Neuen Branch und Worktree erstellen

        git worktree list
        # Alle Worktrees anzeigen

        git worktree remove ../project-hotfix
        # Aufräumen, wenn fertig</code></pre>
        <h2>Häufige Fehler</h2>
        <p>Sie können denselben Branch nicht gleichzeitig in zwei Worktrees ausgecheckt haben — Git verweigert das. Verwenden Sie <code>--detach</code>, falls Sie nur den Inhalt brauchen. Vergessen Sie nicht <code>worktree remove</code>, sonst bleiben veraltete Metadaten; <code>git worktree prune</code> räumt auf.</p>
        <h2>Verwandte Befehle</h2>
        <p><code>git switch</code>, <code>git branch</code>, <code>git clone</code>, <code>git submodule</code></p>
- source_title: git submodule — Manage nested Git repositories
  title: git submodule — Verschachtelte Git-Repositories verwalten
  langcode: de
  body: |-
    <h2>Übersicht</h2>
        <pre><code>git submodule add &lt;url&gt; &lt;path&gt;
    git submodule update --init --recursive
    git submodule foreach &lt;cmd&gt;</code></pre>
        <h2>Beschreibung</h2>
        <p>Der <code>git submodule</code>-Befehl bettet ein externes Git-Repository in einem anderen bei einem festen Commit ein. Das Eltern-Repo zeichnet die Submodule-URL und den exakten auszucheckenden SHA auf, was Eltern- und Kind-Historien entkoppelt. Das ist nützlich zum Vendoring geteilter Bibliotheken oder zum Komponieren von Multi-Repo-Systemen.</p>
        <p>Submodules sind mächtig, haben aber den Ruf, Verwirrung zu stiften. Nach dem Klonen eines Projekts mit Submodules müssen Sie <code>git submodule update --init --recursive</code> ausführen, um sie zu befüllen. Das Aktualisieren auf einen neueren Submodule-Commit ist ein zweistufiger Tanz: im Submodule pullen, dann den neuen SHA im Elternteil committen.</p>
        <p>Im täglichen Einsatz integriert sich <code>git submodule</code> eng mit Shell-Aliasen, Editor-Plugins und Continuous Integration. Power-User fügen oft Aliase hinzu, die Flags kombinieren, die sie immer übergeben, oder wickeln den Befehl in Skripte, die Teamkonventionen durchsetzen. Die Ausgabeformatierung kann über Git-Config angepasst werden — Pretty-Formate, Farbschemata und Pager-Verhalten sind alle einstellbar. Wenn etwas schiefgeht, ist der erste Diagnoseschritt üblicherweise, den Befehl erneut mit <code>GIT_TRACE=1</code> in der Umgebung auszuführen, was die zugrunde liegenden Plumbing-Aufrufe offenlegt. Für ungewöhnliche Situationen öffnet die <code>--help</code>-Ausgabe (<code>git submodule --help</code>) die vollständige Manpage mit Details zu jeder Option, einschließlich solcher, die in alltäglichen Workflows selten verwendet werden, aber für Debugging oder Skripting im großen Maßstab essentiell sind.</p>
        <p>Zu verstehen, wie <code>git submodule</code> mit dem Rest von Gits Datenmodell interagiert — der Objektdatenbank, dem Index, Refs und dem Working Tree — zahlt sich aus. Jeder Befehl operiert auf einer Teilmenge dieser Stücke, und zu wissen, welche er berührt, hilft Ergebnisse vorherzusagen und sich von Fehlern zu erholen. Das Lesen der offiziellen Git-Dokumentation neben praktischer Übung in einem Wegwerf-Repository ist der schnellste Weg, die Nuancen zu verinnerlichen. Die meisten Produktionsprobleme mit Git rühren von einer von drei Ursachen: überraschendem Standardverhalten, partiellen Netzwerkoperationen oder dem Umschreiben bereits geteilter Historie. Ein funktionierendes mentales Modell der Nebenwirkungen von <code>git submodule</code> hilft, alle drei zu vermeiden.</p>
        <h2>Häufige Optionen</h2>
        <table><thead><tr><th>Unterbefehl</th><th>Beschreibung</th></tr></thead><tbody><tr><td><code>add &lt;url&gt; &lt;path&gt;</code></td><td>Fügt ein neues Submodule hinzu.</td></tr><tr><td><code>init</code></td><td>Registriert Submodule-URLs in <code>.git/config</code>.</td></tr><tr><td><code>update --init</code></td><td>Initialisiert und checkt Submodules aus.</td></tr><tr><td><code>update --recursive</code></td><td>Rekurriert in verschachtelte Submodules.</td></tr><tr><td><code>update --remote</code></td><td>Aktualisiert auf die Spitze des Upstream-Branches.</td></tr><tr><td><code>foreach &lt;cmd&gt;</code></td><td>Führt einen Befehl in jedem Submodule aus.</td></tr><tr><td><code>deinit &lt;path&gt;</code></td><td>Entfernt ein Submodule aus dem Working Tree.</td></tr></tbody></table>
        <h2>Beispiele</h2>
        <pre><code>git submodule add https://github.com/lib/foo.git vendor/foo
        # Ein neues Submodule unter vendor/foo hinzufügen

        git clone --recurse-submodules https://github.com/me/parent.git
        # Mit Submodules in einem Schritt klonen

        git submodule update --init --recursive
        # Alle Submodules initialisieren und befüllen

        git submodule foreach 'git pull origin main'
        # Jedes Submodule auf seine main-Branch-Spitze aktualisieren</code></pre>
        <h2>Häufige Fehler</h2>
        <p>Vergessen, <code>--recurse-submodules</code> beim Klonen zu verwenden, hinterlässt leere Submodule-Verzeichnisse. Den Eltern-Repo zu pushen, ohne zuerst Submodule-Änderungen zu pushen, hinterlässt eine dangling Referenz für Mitwirkende. Viele Teams wechseln zu <code>git subtree</code> oder Monorepos, um der Submodule-Komplexität zu entkommen.</p>
        <h2>Verwandte Befehle</h2>
        <p><code>git subtree</code>, <code>git clone --recurse-submodules</code>, <code>git config submodule</code></p>
- source_title: git subtree — Merge and split a project as a subdirectory
  title: git subtree — Ein Projekt als Unterverzeichnis mergen und aufteilen
  langcode: de
  body: |-
    <h2>Übersicht</h2>
        <pre><code>git subtree add --prefix=&lt;path&gt; &lt;repo&gt; &lt;ref&gt; [--squash]
    git subtree pull --prefix=&lt;path&gt; &lt;repo&gt; &lt;ref&gt;
    git subtree push --prefix=&lt;path&gt; &lt;repo&gt; &lt;ref&gt;
    git subtree split --prefix=&lt;path&gt; -b &lt;new-branch&gt;</code></pre>
        <h2>Beschreibung</h2>
        <p>Der <code>git subtree</code>-Befehl ist eine Alternative zu Submodules, die den Inhalt eines anderen Projekts direkt in ein Unterverzeichnis Ihres Repos mergt. Anders als bei Submodules brauchen Subtree-Konsumenten keine speziellen Schritte — die Dateien sind einfach da. Der Preis ist, dass die fremde Historie in Ihre eigene aufgenommen wird.</p>
        <p>Die zwei Hauptoperationen sind <code>add</code> (initialer Import, oft mit <code>--squash</code>, um die Historie zu verflachen) und <code>pull</code> (Upstream-Änderungen einbringen). Um Änderungen zurückzusenden, filtert <code>git subtree push</code> Commits heraus, die das Präfix berühren, und pusht sie zum Upstream-Repo.</p>
        <p>Im täglichen Einsatz integriert sich <code>git subtree</code> eng mit Shell-Aliasen, Editor-Plugins und Continuous Integration. Power-User fügen oft Aliase hinzu, die Flags kombinieren, die sie immer übergeben, oder wickeln den Befehl in Skripte, die Teamkonventionen durchsetzen. Die Ausgabeformatierung kann über Git-Config angepasst werden — Pretty-Formate, Farbschemata und Pager-Verhalten sind alle einstellbar. Wenn etwas schiefgeht, ist der erste Diagnoseschritt üblicherweise, den Befehl erneut mit <code>GIT_TRACE=1</code> in der Umgebung auszuführen, was die zugrunde liegenden Plumbing-Aufrufe offenlegt. Für ungewöhnliche Situationen öffnet die <code>--help</code>-Ausgabe (<code>git subtree --help</code>) die vollständige Manpage mit Details zu jeder Option, einschließlich solcher, die in alltäglichen Workflows selten verwendet werden, aber für Debugging oder Skripting im großen Maßstab essentiell sind.</p>
        <p>Zu verstehen, wie <code>git subtree</code> mit dem Rest von Gits Datenmodell interagiert — der Objektdatenbank, dem Index, Refs und dem Working Tree — zahlt sich aus. Jeder Befehl operiert auf einer Teilmenge dieser Stücke, und zu wissen, welche er berührt, hilft Ergebnisse vorherzusagen und sich von Fehlern zu erholen. Das Lesen der offiziellen Git-Dokumentation neben praktischer Übung in einem Wegwerf-Repository ist der schnellste Weg, die Nuancen zu verinnerlichen. Die meisten Produktionsprobleme mit Git rühren von einer von drei Ursachen: überraschendem Standardverhalten, partiellen Netzwerkoperationen oder dem Umschreiben bereits geteilter Historie. Ein funktionierendes mentales Modell der Nebenwirkungen von <code>git subtree</code> hilft, alle drei zu vermeiden.</p>
        <h2>Häufige Optionen</h2>
        <table><thead><tr><th>Unterbefehl</th><th>Beschreibung</th></tr></thead><tbody><tr><td><code>add</code></td><td>Importiert ein externes Repo in ein Unterverzeichnis.</td></tr><tr><td><code>pull</code></td><td>Mergt Upstream-Änderungen für dieses Präfix.</td></tr><tr><td><code>push</code></td><td>Pusht reine Präfix-Historie zurück zum Upstream.</td></tr><tr><td><code>merge</code></td><td>Mergt einen beliebigen Tree in das Präfix.</td></tr><tr><td><code>split</code></td><td>Extrahiert die Historie eines Unterverzeichnisses als eigenständigen Branch.</td></tr><tr><td><code>--squash</code></td><td>Verflacht fremde Historie zu einem einzelnen Commit.</td></tr><tr><td><code>--prefix=&lt;path&gt;</code></td><td>Unterverzeichnis, in das das Subtree gelegt werden soll.</td></tr></tbody></table>
        <h2>Beispiele</h2>
        <pre><code>git subtree add --prefix=vendor/foo https://github.com/lib/foo.git main --squash
        # foo nach vendor/foo importieren, Historie squashen

        git subtree pull --prefix=vendor/foo https://github.com/lib/foo.git main --squash
        # Updates pullen

        git subtree split --prefix=lib -b lib-only
        # lib/ als eigenen Branch zum Teilen extrahieren

        git subtree push --prefix=vendor/foo upstream main
        # Präfix-bezogene Commits zurück zum Upstream senden</code></pre>
        <h2>Häufige Fehler</h2>
        <p><code>--squash</code> bei manchen Operationen zu mischen und bei anderen nicht erzeugt eine chaotische Historie. Wählen Sie einen Modus und bleiben Sie dabei. Subtree-Merges erzeugen nicht-triviale Commit-Graphen, die manche Tooling verwirren. <code>git subtree split</code> kann auf großen Historien langsam sein.</p>
        <h2>Verwandte Befehle</h2>
        <p><code>git submodule</code>, <code>git merge</code>, <code>git filter-repo</code></p>
- source_title: git notes — Add or inspect commit notes
  title: git notes — Commit-Notizen hinzufügen oder einsehen
  langcode: de
  body: |-
    <h2>Übersicht</h2>
        <pre><code>git notes add [-m &lt;msg&gt;] [&lt;commit&gt;]
    git notes show [&lt;commit&gt;]
    git notes append [-m &lt;msg&gt;] [&lt;commit&gt;]
    git notes remove [&lt;commit&gt;]</code></pre>
        <h2>Beschreibung</h2>
        <p>Der <code>git notes</code>-Befehl hängt zusätzliche Metadaten an Commits an, ohne sie umzuschreiben. Notes werden in ihrem eigenen Ref-Namespace gespeichert (standardmäßig <code>refs/notes/commits</code>) und neben Commits in <code>git log</code> angezeigt. Anwendungsfälle sind Code-Review-Kommentare, Build-Status, Ticket-Links oder nachträglich hinzugefügte Sign-Offs.</p>
        <p>Notes werden standardmäßig nicht gepusht — Sie müssen explizit <code>git push origin refs/notes/*</code> ausführen. Verschiedene Teams verwenden verschiedene Namespaces; CI-Systeme schreiben oft nach <code>refs/notes/ci</code>, während Reviewer <code>refs/notes/review</code> verwenden.</p>
        <p>Im täglichen Einsatz integriert sich <code>git notes</code> eng mit Shell-Aliasen, Editor-Plugins und Continuous Integration. Power-User fügen oft Aliase hinzu, die Flags kombinieren, die sie immer übergeben, oder wickeln den Befehl in Skripte, die Teamkonventionen durchsetzen. Die Ausgabeformatierung kann über Git-Config angepasst werden — Pretty-Formate, Farbschemata und Pager-Verhalten sind alle einstellbar. Wenn etwas schiefgeht, ist der erste Diagnoseschritt üblicherweise, den Befehl erneut mit <code>GIT_TRACE=1</code> in der Umgebung auszuführen, was die zugrunde liegenden Plumbing-Aufrufe offenlegt. Für ungewöhnliche Situationen öffnet die <code>--help</code>-Ausgabe (<code>git notes --help</code>) die vollständige Manpage mit Details zu jeder Option, einschließlich solcher, die in alltäglichen Workflows selten verwendet werden, aber für Debugging oder Skripting im großen Maßstab essentiell sind.</p>
        <p>Zu verstehen, wie <code>git notes</code> mit dem Rest von Gits Datenmodell interagiert — der Objektdatenbank, dem Index, Refs und dem Working Tree — zahlt sich aus. Jeder Befehl operiert auf einer Teilmenge dieser Stücke, und zu wissen, welche er berührt, hilft Ergebnisse vorherzusagen und sich von Fehlern zu erholen. Das Lesen der offiziellen Git-Dokumentation neben praktischer Übung in einem Wegwerf-Repository ist der schnellste Weg, die Nuancen zu verinnerlichen. Die meisten Produktionsprobleme mit Git rühren von einer von drei Ursachen: überraschendem Standardverhalten, partiellen Netzwerkoperationen oder dem Umschreiben bereits geteilter Historie. Ein funktionierendes mentales Modell der Nebenwirkungen von <code>git notes</code> hilft, alle drei zu vermeiden.</p>
        <h2>Häufige Optionen</h2>
        <table><thead><tr><th>Unterbefehl</th><th>Beschreibung</th></tr></thead><tbody><tr><td><code>add</code></td><td>Hängt eine neue Notiz an einen Commit an.</td></tr><tr><td><code>append</code></td><td>Fügt zu einer bestehenden Notiz hinzu.</td></tr><tr><td><code>edit</code></td><td>Öffnet einen Editor auf der Notiz.</td></tr><tr><td><code>show</code></td><td>Gibt die Notiz aus.</td></tr><tr><td><code>remove</code></td><td>Löscht die Notiz.</td></tr><tr><td><code>list</code></td><td>Listet Commits mit Notizen auf.</td></tr><tr><td><code>--ref &lt;ref&gt;</code></td><td>Verwendet einen anderen Notes-Namespace.</td></tr></tbody></table>
        <h2>Beispiele</h2>
        <pre><code>git notes add -m "Reviewed by Alice" abc123
        # Eine Review-Notiz anhängen

        git log --show-notes
        # Notes inline mit dem Log anzeigen

        git notes --ref=ci add -m "Build #42 passed" HEAD
        # Einen eigenen Namespace verwenden

        git push origin 'refs/notes/*'
        # Notes auf den Remote veröffentlichen</code></pre>
        <h2>Häufige Fehler</h2>
        <p>Vergessen, das Notes-Ref zu pushen und zu fetchen, macht Notes für Mitwirkende unsichtbar. Konfigurieren Sie <code>notes.displayRef = refs/notes/*</code>, sodass alle Namespaces in <code>git log</code> erscheinen. Notes überleben keine Historien-Umschreibungen, es sei denn, sie werden explizit migriert.</p>
        <h2>Verwandte Befehle</h2>
        <p><code>git log</code>, <code>git commit</code>, <code>git push</code>, <code>git fetch</code></p>
- source_title: git archive — Create an archive of files from a named tree
  title: git archive — Ein Archiv von Dateien aus einem benannten Tree erstellen
  langcode: de
  body: |-
    <h2>Übersicht</h2>
        <pre><code>git archive [--format=&lt;fmt&gt;] [--prefix=&lt;p&gt;/] [-o &lt;file&gt;] &lt;tree-ish&gt; [&lt;path&gt;...]</code></pre>
        <h2>Beschreibung</h2>
        <p>Der <code>git archive</code>-Befehl erstellt eine Tar- oder Zip-Datei mit dem Inhalt eines beliebigen Trees (Commit, Tag oder Branch). Anders als ein einfaches <code>tar</code> des Working Trees enthält er nur verfolgte Dateien zu einer bestimmten Revision und schließt <code>.git</code>-Verzeichnisse aus. Das macht ihn ideal für die Erzeugung von Release-Tarballs, Quellverteilungen und reproduzierbaren Snapshots.</p>
        <p>Die <code>--prefix</code>-Option umhüllt alle Dateien unter einem Unterverzeichnis im Archiv — wichtig für Releases, sodass das Entpacken einen benannten Ordner erzeugt. <code>git archive</code> unterstützt auch das Ausführen über das Netzwerk von Servern, die das erlauben.</p>
        <p>Im täglichen Einsatz integriert sich <code>git archive</code> eng mit Shell-Aliasen, Editor-Plugins und Continuous Integration. Power-User fügen oft Aliase hinzu, die Flags kombinieren, die sie immer übergeben, oder wickeln den Befehl in Skripte, die Teamkonventionen durchsetzen. Die Ausgabeformatierung kann über Git-Config angepasst werden — Pretty-Formate, Farbschemata und Pager-Verhalten sind alle einstellbar. Wenn etwas schiefgeht, ist der erste Diagnoseschritt üblicherweise, den Befehl erneut mit <code>GIT_TRACE=1</code> in der Umgebung auszuführen, was die zugrunde liegenden Plumbing-Aufrufe offenlegt. Für ungewöhnliche Situationen öffnet die <code>--help</code>-Ausgabe (<code>git archive --help</code>) die vollständige Manpage mit Details zu jeder Option, einschließlich solcher, die in alltäglichen Workflows selten verwendet werden, aber für Debugging oder Skripting im großen Maßstab essentiell sind.</p>
        <p>Zu verstehen, wie <code>git archive</code> mit dem Rest von Gits Datenmodell interagiert — der Objektdatenbank, dem Index, Refs und dem Working Tree — zahlt sich aus. Jeder Befehl operiert auf einer Teilmenge dieser Stücke, und zu wissen, welche er berührt, hilft Ergebnisse vorherzusagen und sich von Fehlern zu erholen. Das Lesen der offiziellen Git-Dokumentation neben praktischer Übung in einem Wegwerf-Repository ist der schnellste Weg, die Nuancen zu verinnerlichen. Die meisten Produktionsprobleme mit Git rühren von einer von drei Ursachen: überraschendem Standardverhalten, partiellen Netzwerkoperationen oder dem Umschreiben bereits geteilter Historie. Ein funktionierendes mentales Modell der Nebenwirkungen von <code>git archive</code> hilft, alle drei zu vermeiden.</p>
        <h2>Häufige Optionen</h2>
        <table><thead><tr><th>Option</th><th>Beschreibung</th></tr></thead><tbody><tr><td><code>--format=&lt;fmt&gt;</code></td><td>tar, tar.gz, zip (Standard tar).</td></tr><tr><td><code>--prefix=&lt;p&gt;/</code></td><td>Stellt den Archivpfaden ein Verzeichnis voran.</td></tr><tr><td><code>-o &lt;file&gt;</code></td><td>Schreibt in Datei statt stdout.</td></tr><tr><td><code>--remote=&lt;repo&gt;</code></td><td>Archiv aus einem Remote-Repository.</td></tr><tr><td><code>--worktree-attributes</code></td><td>Beachtet <code>export-ignore</code>-Attribute.</td></tr><tr><td><code>-l</code>, <code>--list</code></td><td>Listet unterstützte Formate auf.</td></tr></tbody></table>
        <h2>Beispiele</h2>
        <pre><code>git archive --format=tar.gz --prefix=myproj-1.0/ -o myproj-1.0.tar.gz v1.0
        # Release-Tarball mit benanntem Top-Level-Verzeichnis

        git archive HEAD docs/ | tar -x -C /tmp/docs
        # Das docs/-Verzeichnis bei HEAD nach /tmp/docs extrahieren

        git archive --format=zip -o snapshot.zip HEAD
        # ZIP-Archiv des aktuellen Trees</code></pre>
        <h2>Häufige Fehler</h2>
        <p>Vergessen Sie nicht <code>--prefix</code>, sonst entlädt das Archiv Dateien beim Extrahieren ins aktuelle Verzeichnis. Ohne <code>export-ignore</code>-Attribute kann Ihr Archiv CI-Konfigurationen, Tests und Dev-only-Dateien enthalten, die Sie nicht versenden wollten.</p>
        <h2>Verwandte Befehle</h2>
        <p><code>git bundle</code>, <code>git tag</code>, <code>git show</code>, <code>tar</code></p>
- source_title: git bundle — Move objects and refs by archive
  title: git bundle — Objekte und Refs per Archiv übertragen
  langcode: de
  body: |-
    <h2>Übersicht</h2>
        <pre><code>git bundle create &lt;file&gt; &lt;git-rev-list-args&gt;
    git bundle verify &lt;file&gt;
    git bundle list-heads &lt;file&gt;
    git clone &lt;file&gt; &lt;dir&gt;</code></pre>
        <h2>Beschreibung</h2>
        <p>Der <code>git bundle</code>-Befehl verpackt Git-Historie in eine einzelne Datei, die ohne Netzwerk übertragen werden kann — per USB-Stick, E-Mail oder beliebigem Datei-Transport. Der Empfänger kann vom Bundle aus klonen oder fetchen, als wäre es ein Remote. Das ist unschätzbar für Air-Gapped-Systeme, langsame Verbindungen oder als Backup-Format.</p>
        <p>Bundles unterstützen inkrementelle Updates: Schließen Sie eine Basis-Ref ein, sodass das Bundle nur Commits seit dieser Ref enthält, und lassen Sie den Empfänger es mit <code>git fetch</code> auf einem bestehenden Repo anwenden.</p>
        <p>Im täglichen Einsatz integriert sich <code>git bundle</code> eng mit Shell-Aliasen, Editor-Plugins und Continuous Integration. Power-User fügen oft Aliase hinzu, die Flags kombinieren, die sie immer übergeben, oder wickeln den Befehl in Skripte, die Teamkonventionen durchsetzen. Die Ausgabeformatierung kann über Git-Config angepasst werden — Pretty-Formate, Farbschemata und Pager-Verhalten sind alle einstellbar. Wenn etwas schiefgeht, ist der erste Diagnoseschritt üblicherweise, den Befehl erneut mit <code>GIT_TRACE=1</code> in der Umgebung auszuführen, was die zugrunde liegenden Plumbing-Aufrufe offenlegt. Für ungewöhnliche Situationen öffnet die <code>--help</code>-Ausgabe (<code>git bundle --help</code>) die vollständige Manpage mit Details zu jeder Option, einschließlich solcher, die in alltäglichen Workflows selten verwendet werden, aber für Debugging oder Skripting im großen Maßstab essentiell sind.</p>
        <p>Zu verstehen, wie <code>git bundle</code> mit dem Rest von Gits Datenmodell interagiert — der Objektdatenbank, dem Index, Refs und dem Working Tree — zahlt sich aus. Jeder Befehl operiert auf einer Teilmenge dieser Stücke, und zu wissen, welche er berührt, hilft Ergebnisse vorherzusagen und sich von Fehlern zu erholen. Das Lesen der offiziellen Git-Dokumentation neben praktischer Übung in einem Wegwerf-Repository ist der schnellste Weg, die Nuancen zu verinnerlichen. Die meisten Produktionsprobleme mit Git rühren von einer von drei Ursachen: überraschendem Standardverhalten, partiellen Netzwerkoperationen oder dem Umschreiben bereits geteilter Historie. Ein funktionierendes mentales Modell der Nebenwirkungen von <code>git bundle</code> hilft, alle drei zu vermeiden.</p>
        <h2>Häufige Optionen</h2>
        <table><thead><tr><th>Unterbefehl</th><th>Beschreibung</th></tr></thead><tbody><tr><td><code>create &lt;file&gt; &lt;refs&gt;</code></td><td>Erstellt eine Bundle-Datei.</td></tr><tr><td><code>verify &lt;file&gt;</code></td><td>Prüft, ob ein Bundle gültig und anwendbar ist.</td></tr><tr><td><code>list-heads &lt;file&gt;</code></td><td>Listet die im Bundle enthaltenen Refs auf.</td></tr><tr><td><code>unbundle &lt;file&gt;</code></td><td>Plumbing: gibt Objekte ans Repository aus.</td></tr><tr><td><code>--all</code></td><td>Bezieht alle Refs ein.</td></tr><tr><td><code>--progress</code></td><td>Zeigt Fortschritt bei der Erstellung.</td></tr></tbody></table>
        <h2>Beispiele</h2>
        <pre><code>git bundle create repo.bundle --all
        # Vollständiges Backup jeder Ref

        git bundle create incremental.bundle main ^v2.0
        # Nur Commits auf main seit v2.0

        git bundle verify repo.bundle
        # Anwendbarkeit vor dem Fetchen prüfen

        # Auf der Empfängerseite:
        git clone repo.bundle myproj
        # oder in ein bestehendes Repo:
        git fetch ../incremental.bundle main:main</code></pre>
        <h2>Häufige Fehler</h2>
        <p>Ein Bundle ohne Basisangabe zu erstellen bedeutet, dass der Empfänger jedes Mal die volle Historie bekommt, auch für kleine Updates. Verwenden Sie Bereiche wie <code>--since</code> oder <code>^&lt;ref&gt;</code> für inkrementelle Bundles. <code>git bundle verify</code> gegen ein leeres Repo prüft nur strukturelle Gültigkeit, nicht ob die Voraussetzungen des Bundles vorhanden sind.</p>
        <h2>Verwandte Befehle</h2>
        <p><code>git archive</code>, <code>git fetch</code>, <code>git clone</code>, <code>git pack-objects</code></p>
- source_title: git reflog — Manage reference logs
  title: git reflog — Referenz-Logs verwalten
  langcode: de
  body: |-
    <h2>Übersicht</h2>
        <pre><code>git reflog [show] [&lt;ref&gt;]
    git reflog expire [--expire=&lt;time&gt;] [--all]
    git reflog delete &lt;entry&gt;</code></pre>
        <h2>Beschreibung</h2>
        <p>Der <code>git reflog</code>-Befehl zeigt die Historie, wohin jede Ref (HEAD, Branches) lokal gezeigt hat. Jede Bewegung — Commit, Checkout, Reset, Rebase — wird mit Zeitstempel und Grund protokolliert. Das Reflog ist Ihr Sicherheitsnetz: Selbst nach einer "destruktiven" Operation wie <code>git reset --hard</code> ist der vorherige Zustand wiederherstellbar, solange der Reflog-Eintrag überlebt (üblicherweise 90 Tage).</p>
        <p>Refs im Reflog sind als <code>HEAD@{2}</code> ("HEADs Wert vor 2 Bewegungen") oder <code>HEAD@{2.hours.ago}</code> adressierbar. Um einen "verlorenen" Branch wiederherzustellen, finden Sie seinen alten SHA im Reflog und erstellen Sie einen neuen Branch von ihm.</p>
        <p>Im täglichen Einsatz integriert sich <code>git reflog</code> eng mit Shell-Aliasen, Editor-Plugins und Continuous Integration. Power-User fügen oft Aliase hinzu, die Flags kombinieren, die sie immer übergeben, oder wickeln den Befehl in Skripte, die Teamkonventionen durchsetzen. Die Ausgabeformatierung kann über Git-Config angepasst werden — Pretty-Formate, Farbschemata und Pager-Verhalten sind alle einstellbar. Wenn etwas schiefgeht, ist der erste Diagnoseschritt üblicherweise, den Befehl erneut mit <code>GIT_TRACE=1</code> in der Umgebung auszuführen, was die zugrunde liegenden Plumbing-Aufrufe offenlegt. Für ungewöhnliche Situationen öffnet die <code>--help</code>-Ausgabe (<code>git reflog --help</code>) die vollständige Manpage mit Details zu jeder Option, einschließlich solcher, die in alltäglichen Workflows selten verwendet werden, aber für Debugging oder Skripting im großen Maßstab essentiell sind.</p>
        <p>Zu verstehen, wie <code>git reflog</code> mit dem Rest von Gits Datenmodell interagiert — der Objektdatenbank, dem Index, Refs und dem Working Tree — zahlt sich aus. Jeder Befehl operiert auf einer Teilmenge dieser Stücke, und zu wissen, welche er berührt, hilft Ergebnisse vorherzusagen und sich von Fehlern zu erholen. Das Lesen der offiziellen Git-Dokumentation neben praktischer Übung in einem Wegwerf-Repository ist der schnellste Weg, die Nuancen zu verinnerlichen. Die meisten Produktionsprobleme mit Git rühren von einer von drei Ursachen: überraschendem Standardverhalten, partiellen Netzwerkoperationen oder dem Umschreiben bereits geteilter Historie. Ein funktionierendes mentales Modell der Nebenwirkungen von <code>git reflog</code> hilft, alle drei zu vermeiden.</p>
        <h2>Häufige Optionen</h2>
        <table><thead><tr><th>Option / Unterbefehl</th><th>Beschreibung</th></tr></thead><tbody><tr><td><code>show &lt;ref&gt;</code></td><td>Zeigt das Reflog für eine Ref (Standard HEAD).</td></tr><tr><td><code>expire</code></td><td>Beschneidet alte Einträge.</td></tr><tr><td><code>--expire=&lt;time&gt;</code></td><td>Lässt ältere Einträge ablaufen.</td></tr><tr><td><code>--expire-unreachable=&lt;time&gt;</code></td><td>Für Commits, die von keiner Ref erreichbar sind.</td></tr><tr><td><code>--all</code></td><td>Operiert auf jeder Ref.</td></tr><tr><td><code>delete &lt;entry&gt;</code></td><td>Entfernt einen einzelnen Eintrag.</td></tr></tbody></table>
        <h2>Beispiele</h2>
        <pre><code>git reflog
        # Jüngste Bewegungen von HEAD

        git reflog show feature/api
        # Nur die Historie des Feature-Branches

        git reset --hard HEAD@{1}
        # Erholung von einem falschen Reset durch eine Bewegung zurück

        git reflog expire --expire=30.days --all
        # Reflog für jede Ref auf die letzten 30 Tage trimmen</code></pre>
        <h2>Häufige Fehler</h2>
        <p>Reflogs sind NUR LOKAL — das Fetchen von einem Remote bringt deren Reflog nicht mit. Reflog-Einträge laufen schließlich ab; verlassen Sie sich nicht darauf für Langzeit-Wiederherstellung. <code>git gc --prune=now</code> nach dem Reflog-Ablauf auszuführen kann unerreichbare Commits dauerhaft entfernen.</p>
        <h2>Verwandte Befehle</h2>
        <p><code>git reset</code>, <code>git rebase</code>, <code>git fsck</code>, <code>git gc</code></p>
- source_title: git rerere — Reuse recorded conflict resolutions
  title: git rerere — Aufgezeichnete Konfliktauflösungen wiederverwenden
  langcode: de
  body: |-
    <h2>Übersicht</h2>
        <pre><code>git config --global rerere.enabled true
    git rerere status
    git rerere diff
    git rerere clear</code></pre>
        <h2>Beschreibung</h2>
        <p>Der <code>git rerere</code>-Befehl (Reuse Recorded Resolution) zeichnet auf, wie Sie einen Konflikt das erste Mal lösen, und spielt dieselbe Auflösung automatisch ab, wenn der gleiche Konflikt das nächste Mal auftaucht. Er ist unschätzbar, wenn langlebige Feature-Branches wiederholt auf eine bewegliche Basis gemerged oder rebased werden — ohne Rerere lösen Sie jedes Mal dieselben Konflikte neu.</p>
        <p>Rerere ist Opt-in. Aktivieren Sie es global mit <code>git config --global rerere.enabled true</code>. Einmal aktiviert, wird jede Konfliktauflösung gecached, und Git wendet die gecachte Auflösung automatisch bei künftigen Begegnungen mit demselben Konflikt-Pre-Image an.</p>
        <p>Im täglichen Einsatz integriert sich <code>git rerere</code> eng mit Shell-Aliasen, Editor-Plugins und Continuous Integration. Power-User fügen oft Aliase hinzu, die Flags kombinieren, die sie immer übergeben, oder wickeln den Befehl in Skripte, die Teamkonventionen durchsetzen. Die Ausgabeformatierung kann über Git-Config angepasst werden — Pretty-Formate, Farbschemata und Pager-Verhalten sind alle einstellbar. Wenn etwas schiefgeht, ist der erste Diagnoseschritt üblicherweise, den Befehl erneut mit <code>GIT_TRACE=1</code> in der Umgebung auszuführen, was die zugrunde liegenden Plumbing-Aufrufe offenlegt. Für ungewöhnliche Situationen öffnet die <code>--help</code>-Ausgabe (<code>git rerere --help</code>) die vollständige Manpage mit Details zu jeder Option, einschließlich solcher, die in alltäglichen Workflows selten verwendet werden, aber für Debugging oder Skripting im großen Maßstab essentiell sind.</p>
        <p>Zu verstehen, wie <code>git rerere</code> mit dem Rest von Gits Datenmodell interagiert — der Objektdatenbank, dem Index, Refs und dem Working Tree — zahlt sich aus. Jeder Befehl operiert auf einer Teilmenge dieser Stücke, und zu wissen, welche er berührt, hilft Ergebnisse vorherzusagen und sich von Fehlern zu erholen. Das Lesen der offiziellen Git-Dokumentation neben praktischer Übung in einem Wegwerf-Repository ist der schnellste Weg, die Nuancen zu verinnerlichen. Die meisten Produktionsprobleme mit Git rühren von einer von drei Ursachen: überraschendem Standardverhalten, partiellen Netzwerkoperationen oder dem Umschreiben bereits geteilter Historie. Ein funktionierendes mentales Modell der Nebenwirkungen von <code>git rerere</code> hilft, alle drei zu vermeiden.</p>
        <h2>Häufige Optionen</h2>
        <table><thead><tr><th>Unterbefehl / Konfiguration</th><th>Beschreibung</th></tr></thead><tbody><tr><td><code>rerere.enabled</code></td><td>Schaltet automatisches Aufzeichnen ein.</td></tr><tr><td><code>rerere.autoUpdate</code></td><td>Staget aufgelöste Dateien automatisch.</td></tr><tr><td><code>status</code></td><td>Zeigt Dateien mit aufgezeichneten Auflösungen.</td></tr><tr><td><code>diff</code></td><td>Zeigt die aufgezeichnete Auflösung.</td></tr><tr><td><code>remaining</code></td><td>Zeigt noch ungelöste Konflikte.</td></tr><tr><td><code>clear</code></td><td>Verwirft alle aufgezeichneten Auflösungen.</td></tr><tr><td><code>forget &lt;path&gt;</code></td><td>Vergisst die Auflösung für einen einzelnen Pfad.</td></tr></tbody></table>
        <h2>Beispiele</h2>
        <pre><code>git config --global rerere.enabled true
        git config --global rerere.autoUpdate true
        # Für alle Repos aktivieren

        # Nach dem Auflösen eines Konflikts während Merge oder Rebase merkt sich Rerere.
        # Beim nächsten Auftreten desselben Konflikts wird die Auflösung automatisch angewendet.

        git rerere status
        # Dateien zeigen, bei denen eine aufgezeichnete Auflösung angewendet wurde

        git rerere clear
        # Den aufgezeichneten Satz löschen, falls er veraltet</code></pre>
        <h2>Häufige Fehler</h2>
        <p>Rerere hilft nur bei identischen Konflikten. Geringe Kontextänderungen verhindern die Wiederverwendung. Falls eine aufgezeichnete Auflösung sich als falsch herausstellt, verwenden Sie <code>git rerere forget &lt;path&gt;</code>, um sie vor dem erneuten Auflösen zu löschen. Rerere-Daten leben in <code>.git/rr-cache/</code> und sind lokal — sie werden nicht mit Mitwirkenden geteilt.</p>
        <h2>Verwandte Befehle</h2>
        <p><code>git merge</code>, <code>git rebase</code>, <code>git mergetool</code>, <code>git config</code></p>
- source_title: git range-diff — Compare two commit ranges
  title: git range-diff — Zwei Commit-Bereiche vergleichen
  langcode: de
  body: |-
    <h2>Übersicht</h2>
        <pre><code>git range-diff &lt;range1&gt; &lt;range2&gt;
    git range-diff &lt;base&gt; &lt;rev1&gt; &lt;rev2&gt;</code></pre>
        <h2>Beschreibung</h2>
        <p>Der <code>git range-diff</code>-Befehl vergleicht zwei Sequenzen von Commits (typischerweise einen Branch vor und nach einem Rebase) und zeigt, was sich zwischen ihnen auf Patch-Ebene geändert hat. Das ist weit nützlicher als ein normales <code>git diff</code> zum Reviewen von Rebases, weil entsprechende Commits gepaart und nur die substantiellen Unterschiede hervorgehoben werden.</p>
        <p>Paaren Sie das mit <code>--reroll-count</code> bei <code>format-patch</code> für Upstream-Patch-Serien, oder verwenden Sie es einfach lokal, um zu verifizieren, dass ein Force-Push nur Aufräumarbeiten eingebracht hat. Die Ausgabe verwendet ein eigenes Format mit <code>=</code> für unveränderte Commits, <code>!</code> für geänderte und <code>&lt;</code> sowie <code>&gt;</code> für fehlende oder hinzugefügte.</p>
        <p>Im täglichen Einsatz integriert sich <code>git range-diff</code> eng mit Shell-Aliasen, Editor-Plugins und Continuous Integration. Power-User fügen oft Aliase hinzu, die Flags kombinieren, die sie immer übergeben, oder wickeln den Befehl in Skripte, die Teamkonventionen durchsetzen. Die Ausgabeformatierung kann über Git-Config angepasst werden — Pretty-Formate, Farbschemata und Pager-Verhalten sind alle einstellbar. Wenn etwas schiefgeht, ist der erste Diagnoseschritt üblicherweise, den Befehl erneut mit <code>GIT_TRACE=1</code> in der Umgebung auszuführen, was die zugrunde liegenden Plumbing-Aufrufe offenlegt. Für ungewöhnliche Situationen öffnet die <code>--help</code>-Ausgabe (<code>git range-diff --help</code>) die vollständige Manpage mit Details zu jeder Option, einschließlich solcher, die in alltäglichen Workflows selten verwendet werden, aber für Debugging oder Skripting im großen Maßstab essentiell sind.</p>
        <p>Zu verstehen, wie <code>git range-diff</code> mit dem Rest von Gits Datenmodell interagiert — der Objektdatenbank, dem Index, Refs und dem Working Tree — zahlt sich aus. Jeder Befehl operiert auf einer Teilmenge dieser Stücke, und zu wissen, welche er berührt, hilft Ergebnisse vorherzusagen und sich von Fehlern zu erholen. Das Lesen der offiziellen Git-Dokumentation neben praktischer Übung in einem Wegwerf-Repository ist der schnellste Weg, die Nuancen zu verinnerlichen. Die meisten Produktionsprobleme mit Git rühren von einer von drei Ursachen: überraschendem Standardverhalten, partiellen Netzwerkoperationen oder dem Umschreiben bereits geteilter Historie. Ein funktionierendes mentales Modell der Nebenwirkungen von <code>git range-diff</code> hilft, alle drei zu vermeiden.</p>
        <h2>Häufige Optionen</h2>
        <table><thead><tr><th>Option</th><th>Beschreibung</th></tr></thead><tbody><tr><td><code>--no-color</code></td><td>Deaktiviert farbige Ausgabe.</td></tr><tr><td><code>--creation-factor=&lt;n&gt;</code></td><td>Stellgröße zum Matchen von Commits über Bereiche.</td></tr><tr><td><code>--dual-color</code></td><td>Färbt sowohl innere als auch äußere Diffs.</td></tr><tr><td><code>--no-patch</code></td><td>Zeigt nur die Match-Zusammenfassung, keine Patches.</td></tr><tr><td><code>--notes</code></td><td>Bezieht Git-Notes in den Vergleich ein.</td></tr></tbody></table>
        <h2>Beispiele</h2>
        <pre><code>git range-diff main..feature@{1} main..feature
        # Branch vor und nach einem Rebase vergleichen

        git range-diff origin/main feature.v1 feature.v2
        # Zwei Versionen einer Patch-Serie vergleichen

        git range-diff @{u}..HEAD HEAD@{1}..HEAD
        # Aktuelle Upstream-relative Spitze mit der vorherigen vergleichen</code></pre>
        <h2>Häufige Fehler</h2>
        <p>Range-Diff matcht Commits über eine Heuristik; wenn Sie viele kleine Umordnungen vornehmen, kann die Ausgabe unerwartete Commits paaren. Stellen Sie bei Bedarf <code>--creation-factor</code> ein. Verwechseln Sie Range-Diff nicht mit <code>git diff A..B</code> — sie beantworten verschiedene Fragen.</p>
        <h2>Verwandte Befehle</h2>
        <p><code>git diff</code>, <code>git log</code>, <code>git rebase</code>, <code>git format-patch</code></p>
- source_title: git stash (advanced) — Power-user stash workflows
  title: git stash (fortgeschritten) — Stash-Workflows für Power-User
  langcode: de
  body: |-
    <h2>Übersicht</h2>
        <pre><code>git stash push -p -m &lt;msg&gt; -- &lt;pathspec&gt;
    git stash branch &lt;newbranch&gt; [&lt;stash&gt;]
    git stash create
    git stash store -m &lt;msg&gt; &lt;sha&gt;</code></pre>
        <h2>Beschreibung</h2>
        <p>Über <code>git stash push</code> und <code>git stash pop</code> hinaus bietet die Stash-Maschinerie mächtige Funktionen für fortgeschrittene Workflows. Sie können bestimmte Pfade stashen, bestimmte Hunks mit <code>-p</code> stashen, einen Branch aus einem Stash wiederherstellen, der mit dem aktuellen Zustand kollidiert, oder sogar ein Stash-Objekt erstellen, ohne es auf dem Stack zu speichern (es später mit eigener Nachricht speichern).</p>
        <p>Intern ist jeder Stash ein Merge-Commit zwischen WIP-on-branch (dem Working Tree) und index-on-branch (den gestagten Änderungen), mit der Branch-Spitze als Elternteil. Diese Struktur erlaubt es <code>stash branch</code> und <code>stash apply</code>, den exakten Zustand zu rekonstruieren.</p>
        <p>Im täglichen Einsatz integriert sich <code>git stash</code> eng mit Shell-Aliasen, Editor-Plugins und Continuous Integration. Power-User fügen oft Aliase hinzu, die Flags kombinieren, die sie immer übergeben, oder wickeln den Befehl in Skripte, die Teamkonventionen durchsetzen. Die Ausgabeformatierung kann über Git-Config angepasst werden — Pretty-Formate, Farbschemata und Pager-Verhalten sind alle einstellbar. Wenn etwas schiefgeht, ist der erste Diagnoseschritt üblicherweise, den Befehl erneut mit <code>GIT_TRACE=1</code> in der Umgebung auszuführen, was die zugrunde liegenden Plumbing-Aufrufe offenlegt. Für ungewöhnliche Situationen öffnet die <code>--help</code>-Ausgabe (<code>git stash --help</code>) die vollständige Manpage mit Details zu jeder Option, einschließlich solcher, die in alltäglichen Workflows selten verwendet werden, aber für Debugging oder Skripting im großen Maßstab essentiell sind.</p>
        <p>Zu verstehen, wie <code>git stash</code> mit dem Rest von Gits Datenmodell interagiert — der Objektdatenbank, dem Index, Refs und dem Working Tree — zahlt sich aus. Jeder Befehl operiert auf einer Teilmenge dieser Stücke, und zu wissen, welche er berührt, hilft Ergebnisse vorherzusagen und sich von Fehlern zu erholen. Das Lesen der offiziellen Git-Dokumentation neben praktischer Übung in einem Wegwerf-Repository ist der schnellste Weg, die Nuancen zu verinnerlichen. Die meisten Produktionsprobleme mit Git rühren von einer von drei Ursachen: überraschendem Standardverhalten, partiellen Netzwerkoperationen oder dem Umschreiben bereits geteilter Historie. Ein funktionierendes mentales Modell der Nebenwirkungen von <code>git stash</code> hilft, alle drei zu vermeiden.</p>
        <h2>Häufige Optionen</h2>
        <table><thead><tr><th>Unterbefehl / Option</th><th>Beschreibung</th></tr></thead><tbody><tr><td><code>push -p</code></td><td>Stash interaktiv ausgewählter Hunks.</td></tr><tr><td><code>push -- &lt;pathspec&gt;</code></td><td>Stash nur angegebener Pfade.</td></tr><tr><td><code>--keep-index</code></td><td>Stash, behält aber das bereits Gestagte.</td></tr><tr><td><code>--no-keep-index</code></td><td>Setzt Index beim Stashen zurück (Standard).</td></tr><tr><td><code>branch &lt;name&gt;</code></td><td>Stellt Zustand auf einem frischen Branch wieder her.</td></tr><tr><td><code>create</code></td><td>Erstellt einen Stash-Commit, speichert ihn aber nicht.</td></tr><tr><td><code>store -m</code></td><td>Legt einen vorhandenen Commit auf den Stack.</td></tr></tbody></table>
        <h2>Beispiele</h2>
        <pre><code>git stash push -p -m "WIP: only refactor changes" -- src/refactor/
        # Nur bestimmte Pfade interaktiv stashen

        git stash --keep-index -m "Test pre-staged"
        # Verifizieren, dass gestagte Änderungen Tests bestehen, mit WIP zur Seite gelegt

        git stash branch fix-from-stash stash@{2}
        # Einen Stash wiederbeleben, der nicht mehr sauber anwendbar ist

        SHA=$(git stash create "checkpoint")
        git stash store -m "manual checkpoint" "$SHA"
        # Programmatische Stash-Erstellung</code></pre>
        <h2>Häufige Fehler</h2>
        <p>Während eines Merges oder Rebases zu stashen mischt Zustände und verwirrt den Stack. Vermeiden Sie das. Langlebige Stashes überleben ihren Kontext — überprüfen Sie sie regelmäßig. <code>--keep-index</code> ist großartig, um gestagte Änderungen zu verifizieren, aber der resultierende Stash enthält sowohl gestagten als auch ungestagten Inhalt, was überraschen kann.</p>
        <h2>Verwandte Befehle</h2>
        <p><code>git stash</code>, <code>git commit --fixup</code>, <code>git worktree</code>, <code>git restore</code></p>
- source_title: git config — Get and set repository or global options
  title: git config — Repository- oder globale Optionen lesen und setzen
  langcode: de
  body: |-
    <h2>Übersicht</h2>
        <pre><code>git config [--global | --system | --local] &lt;key&gt; [&lt;value&gt;]
    git config --list
    git config --edit</code></pre>
        <h2>Beschreibung</h2>
        <p>Der <code>git config</code>-Befehl liest und schreibt die Git-Konfiguration. Einstellungen leben in drei Schichten: systemweit (<code>/etc/gitconfig</code>), pro Nutzer (<code>~/.gitconfig</code> oder <code>~/.config/git/config</code>) und pro Repository (<code>.git/config</code>). Spezifischere Schichten überschreiben allgemeinere. Viele Git-Verhaltensweisen — Standardeditor, Push-Verhalten, Merge-Tools, Zeilenenden-Behandlung — werden über config eingestellt.</p>
        <p>Für neue Nutzer sind die Essentials <code>user.name</code>, <code>user.email</code>, <code>init.defaultBranch</code> und <code>core.editor</code>. Power-User bauen umfangreiche Aliase, passen Farben an und verwenden Conditional Includes, um pro Projektverzeichnis unterschiedliche Einstellungen anzuwenden.</p>
        <p>Im täglichen Einsatz integriert sich <code>git config</code> eng mit Shell-Aliasen, Editor-Plugins und Continuous Integration. Power-User fügen oft Aliase hinzu, die Flags kombinieren, die sie immer übergeben, oder wickeln den Befehl in Skripte, die Teamkonventionen durchsetzen. Die Ausgabeformatierung kann über Git-Config angepasst werden — Pretty-Formate, Farbschemata und Pager-Verhalten sind alle einstellbar. Wenn etwas schiefgeht, ist der erste Diagnoseschritt üblicherweise, den Befehl erneut mit <code>GIT_TRACE=1</code> in der Umgebung auszuführen, was die zugrunde liegenden Plumbing-Aufrufe offenlegt. Für ungewöhnliche Situationen öffnet die <code>--help</code>-Ausgabe (<code>git config --help</code>) die vollständige Manpage mit Details zu jeder Option, einschließlich solcher, die in alltäglichen Workflows selten verwendet werden, aber für Debugging oder Skripting im großen Maßstab essentiell sind.</p>
        <p>Zu verstehen, wie <code>git config</code> mit dem Rest von Gits Datenmodell interagiert — der Objektdatenbank, dem Index, Refs und dem Working Tree — zahlt sich aus. Jeder Befehl operiert auf einer Teilmenge dieser Stücke, und zu wissen, welche er berührt, hilft Ergebnisse vorherzusagen und sich von Fehlern zu erholen. Das Lesen der offiziellen Git-Dokumentation neben praktischer Übung in einem Wegwerf-Repository ist der schnellste Weg, die Nuancen zu verinnerlichen. Die meisten Produktionsprobleme mit Git rühren von einer von drei Ursachen: überraschendem Standardverhalten, partiellen Netzwerkoperationen oder dem Umschreiben bereits geteilter Historie. Ein funktionierendes mentales Modell der Nebenwirkungen von <code>git config</code> hilft, alle drei zu vermeiden.</p>
        <h2>Häufige Optionen</h2>
        <table><thead><tr><th>Option</th><th>Beschreibung</th></tr></thead><tbody><tr><td><code>--global</code></td><td>Operiert auf der Pro-Nutzer-Konfiguration.</td></tr><tr><td><code>--system</code></td><td>Operiert auf der systemweiten Konfiguration.</td></tr><tr><td><code>--local</code></td><td>Operiert auf der Konfiguration des aktuellen Repos (Standard, falls in einem Repo).</td></tr><tr><td><code>--list</code></td><td>Zeigt alle Einstellungen.</td></tr><tr><td><code>--edit</code></td><td>Öffnet die gewählte Konfiguration in Ihrem Editor.</td></tr><tr><td><code>--unset</code></td><td>Entfernt eine Einstellung.</td></tr><tr><td><code>--add</code></td><td>Fügt einen Wert zu einem Multi-Value-Schlüssel hinzu.</td></tr><tr><td><code>--show-origin</code></td><td>Annotiert Ausgabe mit der Datei jeder Einstellung.</td></tr></tbody></table>
        <h2>Beispiele</h2>
        <pre><code>git config --global user.name "Jane Smith"
        git config --global user.email "jane@example.com"
        # Identität für jedes Repo

        git config --global init.defaultBranch main
        git config --global pull.rebase true
        git config --global core.editor "code --wait"
        # Sinnvolle moderne Voreinstellungen

        git config --global alias.lg "log --oneline --graph --decorate --all"
        # Eigener Alias

        git config --list --show-origin
        # Audit, woher jede Einstellung stammt</code></pre>
        <h2>Häufige Fehler</h2>
        <p>Globale Konfiguration zu setzen, die als lokal gemeint ist (oder umgekehrt), führt zu verwirrendem Verhalten. Vergessen, <code>user.email</code> auf einer frischen Maschine zu setzen, lässt jeden Commit ohne Zuordnung. Verwenden Sie Conditional Includes (<code>[includeIf "gitdir:~/work/"]</code>), um Identitäten pro Verzeichnis zu wechseln.</p>
        <h2>Verwandte Befehle</h2>
        <p><code>git credential</code>, <code>git init</code>, <code>git remote</code></p>
- source_title: git credential — Manage credentials
  title: git credential — Credentials verwalten
  langcode: de
  body: |-
    <h2>Übersicht</h2>
        <pre><code>git config --global credential.helper &lt;helper&gt;
    git credential fill
    git credential approve
    git credential reject</code></pre>
        <h2>Beschreibung</h2>
        <p>Die <code>git credential</code>-Maschinerie übernimmt Authentifizierung für HTTPS-Remotes. Statt bei jedem Push nach Benutzername und Passwort zu fragen, delegiert Git an einen Credential-Helper, der Credentials sicher speichert. Helper sind <code>cache</code> (in-memory für ein paar Minuten), <code>store</code> (Klartext-Datei), <code>osxkeychain</code> (macOS Keychain), <code>manager</code> (Git Credential Manager auf Windows/macOS/Linux) und <code>libsecret</code> (Linux GNOME).</p>
        <p>Sie rufen <code>git credential</code> selten direkt auf — Sie konfigurieren einmal einen Helper, und Git ruft ihn transparent auf. Moderne Setups (besonders mit GitHub) verwenden OAuth-Tokens oder 2FA-geschützte Personal Access Tokens, gespeichert in einem System-Keyring.</p>
        <p>Im täglichen Einsatz integriert sich <code>git credential</code> eng mit Shell-Aliasen, Editor-Plugins und Continuous Integration. Power-User fügen oft Aliase hinzu, die Flags kombinieren, die sie immer übergeben, oder wickeln den Befehl in Skripte, die Teamkonventionen durchsetzen. Die Ausgabeformatierung kann über Git-Config angepasst werden — Pretty-Formate, Farbschemata und Pager-Verhalten sind alle einstellbar. Wenn etwas schiefgeht, ist der erste Diagnoseschritt üblicherweise, den Befehl erneut mit <code>GIT_TRACE=1</code> in der Umgebung auszuführen, was die zugrunde liegenden Plumbing-Aufrufe offenlegt. Für ungewöhnliche Situationen öffnet die <code>--help</code>-Ausgabe (<code>git credential --help</code>) die vollständige Manpage mit Details zu jeder Option, einschließlich solcher, die in alltäglichen Workflows selten verwendet werden, aber für Debugging oder Skripting im großen Maßstab essentiell sind.</p>
        <p>Zu verstehen, wie <code>git credential</code> mit dem Rest von Gits Datenmodell interagiert — der Objektdatenbank, dem Index, Refs und dem Working Tree — zahlt sich aus. Jeder Befehl operiert auf einer Teilmenge dieser Stücke, und zu wissen, welche er berührt, hilft Ergebnisse vorherzusagen und sich von Fehlern zu erholen. Das Lesen der offiziellen Git-Dokumentation neben praktischer Übung in einem Wegwerf-Repository ist der schnellste Weg, die Nuancen zu verinnerlichen. Die meisten Produktionsprobleme mit Git rühren von einer von drei Ursachen: überraschendem Standardverhalten, partiellen Netzwerkoperationen oder dem Umschreiben bereits geteilter Historie. Ein funktionierendes mentales Modell der Nebenwirkungen von <code>git credential</code> hilft, alle drei zu vermeiden.</p>
        <h2>Häufige Optionen</h2>
        <table><thead><tr><th>Unterbefehl / Konfiguration</th><th>Beschreibung</th></tr></thead><tbody><tr><td><code>credential.helper</code></td><td>Setzt den zu verwendenden Credential-Helper.</td></tr><tr><td><code>credential.useHttpPath</code></td><td>Bezieht den URL-Pfad in den Lookup-Schlüssel ein.</td></tr><tr><td><code>fill</code></td><td>Plumbing: fragt Helper nach Credentials.</td></tr><tr><td><code>approve</code> / <code>reject</code></td><td>Sagt Helpern, dass ein Versuch erfolgreich oder fehlgeschlagen ist.</td></tr><tr><td><code>credential.&lt;url&gt;.helper</code></td><td>URL-spezifischer Helper.</td></tr><tr><td><code>credential.helper "cache --timeout=3600"</code></td><td>Konfigurierbarer In-Memory-Cache.</td></tr></tbody></table>
        <h2>Beispiele</h2>
        <pre><code>git config --global credential.helper osxkeychain
        # macOS: Credentials in Keychain speichern

        git config --global credential.helper manager
        # Plattformübergreifend: Git Credential Manager

        git config --global credential.helper "cache --timeout=3600"
        # Eine Stunde im Speicher cachen

        # Pro-Host-Helper:
        git config --global credential.https://github.com.helper "!gh auth git-credential"
        # Das GitHub-CLI als Helper verwenden</code></pre>
        <h2>Häufige Fehler</h2>
        <p>Der <code>store</code>-Helper schreibt Klartext nach <code>~/.git-credentials</code> — okay für Wegwerf-VMs, gefährlich auf gemeinsamen Maschinen. Vermeiden Sie Passwörter ganz; verwenden Sie Personal Access Tokens oder SSH-Schlüssel für Schreibzugriff. Nach dem Rotieren eines Tokens führen Sie <code>git credential reject</code> aus oder löschen den Cache, um eine Aktualisierung zu erzwingen.</p>
        <h2>Verwandte Befehle</h2>
        <p><code>git config</code>, <code>git push</code>, <code>git fetch</code>, <code>ssh-agent</code></p>
- source_title: git cat-file — Inspect Git objects
  title: git cat-file — Git-Objekte inspizieren
  langcode: de
  body: |-
    <h2>Übersicht</h2>
        <pre><code>git cat-file (-t | -s | -p | -e) &lt;object&gt;
    git cat-file --batch
    git cat-file --batch-check</code></pre>
        <h2>Beschreibung</h2>
        <p>Der <code>git cat-file</code>-Befehl ist ein Plumbing-Tool, das rohe Git-Objekte aus der Objektdatenbank liest. Er kann Typ (<code>blob</code>, <code>tree</code>, <code>commit</code>, <code>tag</code>), Größe und Inhalt eines Objekts ausgeben. Der <code>--batch</code>-Modus erlaubt es Skripten, viele Objektnamen über stdin zu übergeben und strukturierte Ausgabe zu erhalten, was weit schneller ist, als <code>cat-file</code> pro Objekt aufzurufen.</p>
        <p>Im täglichen Einsatz integriert sich <code>git cat-file</code> eng mit Shell-Aliasen, Editor-Plugins und Continuous Integration. Power-User fügen oft Aliase hinzu, die Flags kombinieren, die sie immer übergeben, oder wickeln den Befehl in Skripte, die Teamkonventionen durchsetzen. Die Ausgabeformatierung kann über Git-Config angepasst werden — Pretty-Formate, Farbschemata und Pager-Verhalten sind alle einstellbar. Wenn etwas schiefgeht, ist der erste Diagnoseschritt üblicherweise, den Befehl erneut mit <code>GIT_TRACE=1</code> in der Umgebung auszuführen, was die zugrunde liegenden Plumbing-Aufrufe offenlegt. Für ungewöhnliche Situationen öffnet die <code>--help</code>-Ausgabe (<code>git cat-file --help</code>) die vollständige Manpage mit Details zu jeder Option, einschließlich solcher, die in alltäglichen Workflows selten verwendet werden, aber für Debugging oder Skripting im großen Maßstab essentiell sind.</p>
        <p>Zu verstehen, wie <code>git cat-file</code> mit dem Rest von Gits Datenmodell interagiert — der Objektdatenbank, dem Index, Refs und dem Working Tree — zahlt sich aus. Jeder Befehl operiert auf einer Teilmenge dieser Stücke, und zu wissen, welche er berührt, hilft Ergebnisse vorherzusagen und sich von Fehlern zu erholen. Das Lesen der offiziellen Git-Dokumentation neben praktischer Übung in einem Wegwerf-Repository ist der schnellste Weg, die Nuancen zu verinnerlichen. Die meisten Produktionsprobleme mit Git rühren von einer von drei Ursachen: überraschendem Standardverhalten, partiellen Netzwerkoperationen oder dem Umschreiben bereits geteilter Historie. Ein funktionierendes mentales Modell der Nebenwirkungen von <code>git cat-file</code> hilft, alle drei zu vermeiden.</p>
        <h2>Häufige Optionen</h2>
        <table><thead><tr><th>Option</th><th>Beschreibung</th></tr></thead><tbody><tr><td><code>-t</code></td><td>Gibt den Objekttyp aus.</td></tr><tr><td><code>-s</code></td><td>Gibt die Objektgröße in Bytes aus.</td></tr><tr><td><code>-p</code></td><td>Gibt Inhalt typabhängig schön formatiert aus.</td></tr><tr><td><code>-e</code></td><td>Beendet sich mit Null-Status, falls das Objekt existiert.</td></tr><tr><td><code>--batch</code></td><td>Streamt <code>&lt;sha&gt; &lt;type&gt; &lt;size&gt; CRLF &lt;content&gt;</code> für jede Eingabe.</td></tr><tr><td><code>--batch-check</code></td><td>Wie batch, aber nur Header-Zeilen.</td></tr><tr><td><code>--filters</code></td><td>Wendet Smudge-Filter beim Ausgeben von Blobs an.</td></tr></tbody></table>
        <h2>Beispiele</h2>
        <pre><code>git cat-file -t HEAD
        # commit

        git cat-file -p HEAD
        # Commit-Nachricht und Tree-/Eltern-SHAs anzeigen

        git cat-file -p HEAD:src/main.c
        # Die Datei ausgeben, wie sie bei HEAD war

        echo HEAD | git cat-file --batch-check
        # Typ/Größe/SHA in maschinenlesbarer Form erhalten</code></pre>
        <h2>Häufige Fehler</h2>
        <p>Eine partielle SHA zu übergeben, die mehrdeutig ist, gibt einen Fehler zurück — präzisieren Sie mit mehr Zeichen. <code>-p</code> zu vergessen und <code>-t</code> zu verwenden gibt keinen Inhalt aus. Der <code>--batch</code>-Modus erfordert sorgfältige Protokoll-Behandlung; respektieren Sie den Größen-Header, um die richtige Anzahl Bytes zu lesen.</p>
        <h2>Verwandte Befehle</h2>
        <p><code>git show</code>, <code>git hash-object</code>, <code>git ls-tree</code>, <code>git rev-parse</code></p>
- source_title: git hash-object — Compute or store a Git object
  title: git hash-object — Ein Git-Objekt berechnen oder speichern
  langcode: de
  body: |-
    <h2>Übersicht</h2>
        <pre><code>git hash-object [-t &lt;type&gt;] [-w] [--stdin] [&lt;file&gt;...]</code></pre>
        <h2>Beschreibung</h2>
        <p>Der <code>git hash-object</code>-Befehl berechnet den SHA-1 (oder SHA-256 in modernen Repos), den Git dem Inhalt einer Datei zuweisen würde. Mit <code>-w</code> schreibt er das Objekt auch in die Objektdatenbank und gibt den SHA zurück. Das ist der niedrigste Mechanismus hinter <code>git add</code>: dieser Porcelain-Befehl ruft im Wesentlichen <code>hash-object -w</code> auf und aktualisiert dann den Index.</p>
        <p>Im täglichen Einsatz integriert sich <code>git hash-object</code> eng mit Shell-Aliasen, Editor-Plugins und Continuous Integration. Power-User fügen oft Aliase hinzu, die Flags kombinieren, die sie immer übergeben, oder wickeln den Befehl in Skripte, die Teamkonventionen durchsetzen. Die Ausgabeformatierung kann über Git-Config angepasst werden — Pretty-Formate, Farbschemata und Pager-Verhalten sind alle einstellbar. Wenn etwas schiefgeht, ist der erste Diagnoseschritt üblicherweise, den Befehl erneut mit <code>GIT_TRACE=1</code> in der Umgebung auszuführen, was die zugrunde liegenden Plumbing-Aufrufe offenlegt. Für ungewöhnliche Situationen öffnet die <code>--help</code>-Ausgabe (<code>git hash-object --help</code>) die vollständige Manpage mit Details zu jeder Option, einschließlich solcher, die in alltäglichen Workflows selten verwendet werden, aber für Debugging oder Skripting im großen Maßstab essentiell sind.</p>
        <p>Zu verstehen, wie <code>git hash-object</code> mit dem Rest von Gits Datenmodell interagiert — der Objektdatenbank, dem Index, Refs und dem Working Tree — zahlt sich aus. Jeder Befehl operiert auf einer Teilmenge dieser Stücke, und zu wissen, welche er berührt, hilft Ergebnisse vorherzusagen und sich von Fehlern zu erholen. Das Lesen der offiziellen Git-Dokumentation neben praktischer Übung in einem Wegwerf-Repository ist der schnellste Weg, die Nuancen zu verinnerlichen. Die meisten Produktionsprobleme mit Git rühren von einer von drei Ursachen: überraschendem Standardverhalten, partiellen Netzwerkoperationen oder dem Umschreiben bereits geteilter Historie. Ein funktionierendes mentales Modell der Nebenwirkungen von <code>git hash-object</code> hilft, alle drei zu vermeiden.</p>
        <h2>Häufige Optionen</h2>
        <table><thead><tr><th>Option</th><th>Beschreibung</th></tr></thead><tbody><tr><td><code>-t &lt;type&gt;</code></td><td>Objekttyp (Standard <code>blob</code>).</td></tr><tr><td><code>-w</code></td><td>Schreibt das Objekt in die Datenbank.</td></tr><tr><td><code>--stdin</code></td><td>Liest Inhalt von der Standardeingabe.</td></tr><tr><td><code>--stdin-paths</code></td><td>Liest Dateinamen von stdin.</td></tr><tr><td><code>--no-filters</code></td><td>Überspringt Smudge/Clean-Filter.</td></tr><tr><td><code>--literally</code></td><td>Validiert den Inhaltstyp nicht.</td></tr></tbody></table>
        <h2>Beispiele</h2>
        <pre><code>git hash-object README.md
        # Den SHA ausgeben, den Git zuweisen würde

        echo "hello" | git hash-object --stdin
        # Beliebigen Inhalt hashen

        git hash-object -w newfile.txt
        # Den Dateiinhalt als Blob in die Objekt-DB einfügen

        find . -name '*.png' | git hash-object --stdin-paths
        # Hashes für viele Dateien stapelweise berechnen</code></pre>
        <h2>Häufige Fehler</h2>
        <p><code>-w</code> zu verwenden erzeugt einen dangling Blob, falls Sie ihn nicht von einem Tree referenzieren. <code>git gc</code> entfernt schließlich unerreichbare Objekte. Hashen durch Filter (CRLF-Normalisierung) ergibt andere SHAs als rohe Bytes — übergeben Sie <code>--no-filters</code>, um mit Roh-Hashes anderer Tools zu vergleichen.</p>
        <h2>Verwandte Befehle</h2>
        <p><code>git add</code>, <code>git cat-file</code>, <code>git update-index</code>, <code>git write-tree</code></p>
- source_title: git ls-tree — List the contents of a tree object
  title: git ls-tree — Den Inhalt eines Tree-Objekts auflisten
  langcode: de
  body: |-
    <h2>Übersicht</h2>
        <pre><code>git ls-tree [-r] [-d] [-l] [--name-only] &lt;tree-ish&gt; [&lt;path&gt;...]</code></pre>
        <h2>Beschreibung</h2>
        <p>Der <code>git ls-tree</code>-Befehl listet Einträge (Modus, Typ, SHA, Name) eines Tree-Objekts auf. Mit <code>-r</code> rekurriert er in Unterverzeichnisse. Es ist das Plumbing-Äquivalent von <code>ls</code> auf einem Git-Tree. Die Ausgabe ist ein Eintrag pro Zeile, geeignet zum Pipen in andere Tools.</p>
        <p>Im täglichen Einsatz integriert sich <code>git ls-tree</code> eng mit Shell-Aliasen, Editor-Plugins und Continuous Integration. Power-User fügen oft Aliase hinzu, die Flags kombinieren, die sie immer übergeben, oder wickeln den Befehl in Skripte, die Teamkonventionen durchsetzen. Die Ausgabeformatierung kann über Git-Config angepasst werden — Pretty-Formate, Farbschemata und Pager-Verhalten sind alle einstellbar. Wenn etwas schiefgeht, ist der erste Diagnoseschritt üblicherweise, den Befehl erneut mit <code>GIT_TRACE=1</code> in der Umgebung auszuführen, was die zugrunde liegenden Plumbing-Aufrufe offenlegt. Für ungewöhnliche Situationen öffnet die <code>--help</code>-Ausgabe (<code>git ls-tree --help</code>) die vollständige Manpage mit Details zu jeder Option, einschließlich solcher, die in alltäglichen Workflows selten verwendet werden, aber für Debugging oder Skripting im großen Maßstab essentiell sind.</p>
        <p>Zu verstehen, wie <code>git ls-tree</code> mit dem Rest von Gits Datenmodell interagiert — der Objektdatenbank, dem Index, Refs und dem Working Tree — zahlt sich aus. Jeder Befehl operiert auf einer Teilmenge dieser Stücke, und zu wissen, welche er berührt, hilft Ergebnisse vorherzusagen und sich von Fehlern zu erholen. Das Lesen der offiziellen Git-Dokumentation neben praktischer Übung in einem Wegwerf-Repository ist der schnellste Weg, die Nuancen zu verinnerlichen. Die meisten Produktionsprobleme mit Git rühren von einer von drei Ursachen: überraschendem Standardverhalten, partiellen Netzwerkoperationen oder dem Umschreiben bereits geteilter Historie. Ein funktionierendes mentales Modell der Nebenwirkungen von <code>git ls-tree</code> hilft, alle drei zu vermeiden.</p>
        <h2>Häufige Optionen</h2>
        <table><thead><tr><th>Option</th><th>Beschreibung</th></tr></thead><tbody><tr><td><code>-r</code></td><td>Rekurriert in Subtrees.</td></tr><tr><td><code>-d</code></td><td>Zeigt nur Verzeichnisse (Trees).</td></tr><tr><td><code>-l</code></td><td>Bezieht die Größe von Blob-Einträgen ein.</td></tr><tr><td><code>--name-only</code></td><td>Zeigt nur Dateinamen.</td></tr><tr><td><code>-z</code></td><td>NUL-terminierte Ausgabe für sicheres Parsen.</td></tr><tr><td><code>--full-tree</code></td><td>Beschränkt nicht durch das aktuelle Verzeichnis.</td></tr></tbody></table>
        <h2>Beispiele</h2>
        <pre><code>git ls-tree HEAD
        # Top-Level-Einträge des HEAD-Trees

        git ls-tree -r HEAD --name-only
        # Alle Dateipfade bei HEAD

        git ls-tree -r -l v1.0 src/
        # Größen und SHAs für jede Datei unter src/ bei v1.0

        git ls-tree HEAD -- 'docs/*.md'
        # Nur Markdown-Dateien in docs/</code></pre>
        <h2>Häufige Fehler</h2>
        <p>Working-Directory-relative gegenüber Repo-Root-relative Pfade verwechseln. Verwenden Sie <code>--full-tree</code> für eindeutige root-relative Ausgabe. Ohne <code>-r</code> wird nur eine Ebene gezeigt — leicht, verschachtelte Dateien zu übersehen.</p>
        <h2>Verwandte Befehle</h2>
        <p><code>git ls-files</code>, <code>git show</code>, <code>git cat-file</code>, <code>git diff-tree</code></p>
- source_title: git ls-files — Show information about files in the index and working tree
  title: git ls-files — Informationen über Dateien im Index und Working Tree anzeigen
  langcode: de
  body: |-
    <h2>Übersicht</h2>
        <pre><code>git ls-files [-c] [-d] [-m] [-o] [-i] [--exclude-standard]</code></pre>
        <h2>Beschreibung</h2>
        <p>Der <code>git ls-files</code>-Befehl listet Dateien auf, die Gits Index (und optional dem Working Tree) bekannt sind. Er unterstützt Filter: cached/staged, deleted, modified, others (untracked), ignored, unmerged usw. Er ist schneller und präziser als <code>find</code> für "zeige mir alle verfolgten Dateien".</p>
        <p>Im täglichen Einsatz integriert sich <code>git ls-files</code> eng mit Shell-Aliasen, Editor-Plugins und Continuous Integration. Power-User fügen oft Aliase hinzu, die Flags kombinieren, die sie immer übergeben, oder wickeln den Befehl in Skripte, die Teamkonventionen durchsetzen. Die Ausgabeformatierung kann über Git-Config angepasst werden — Pretty-Formate, Farbschemata und Pager-Verhalten sind alle einstellbar. Wenn etwas schiefgeht, ist der erste Diagnoseschritt üblicherweise, den Befehl erneut mit <code>GIT_TRACE=1</code> in der Umgebung auszuführen, was die zugrunde liegenden Plumbing-Aufrufe offenlegt. Für ungewöhnliche Situationen öffnet die <code>--help</code>-Ausgabe (<code>git ls-files --help</code>) die vollständige Manpage mit Details zu jeder Option, einschließlich solcher, die in alltäglichen Workflows selten verwendet werden, aber für Debugging oder Skripting im großen Maßstab essentiell sind.</p>
        <p>Zu verstehen, wie <code>git ls-files</code> mit dem Rest von Gits Datenmodell interagiert — der Objektdatenbank, dem Index, Refs und dem Working Tree — zahlt sich aus. Jeder Befehl operiert auf einer Teilmenge dieser Stücke, und zu wissen, welche er berührt, hilft Ergebnisse vorherzusagen und sich von Fehlern zu erholen. Das Lesen der offiziellen Git-Dokumentation neben praktischer Übung in einem Wegwerf-Repository ist der schnellste Weg, die Nuancen zu verinnerlichen. Die meisten Produktionsprobleme mit Git rühren von einer von drei Ursachen: überraschendem Standardverhalten, partiellen Netzwerkoperationen oder dem Umschreiben bereits geteilter Historie. Ein funktionierendes mentales Modell der Nebenwirkungen von <code>git ls-files</code> hilft, alle drei zu vermeiden.</p>
        <h2>Häufige Optionen</h2>
        <table><thead><tr><th>Option</th><th>Beschreibung</th></tr></thead><tbody><tr><td><code>-c</code>, <code>--cached</code></td><td>Zeigt gecachte Dateien (Standard).</td></tr><tr><td><code>-d</code></td><td>Zeigt gelöschte Dateien.</td></tr><tr><td><code>-m</code></td><td>Zeigt modifizierte Dateien.</td></tr><tr><td><code>-o</code></td><td>Zeigt andere (untracked) Dateien.</td></tr><tr><td><code>-i</code></td><td>Zeigt ignorierte Dateien.</td></tr><tr><td><code>--exclude-standard</code></td><td>Wendet Standard-Ignore-Regeln an.</td></tr><tr><td><code>-s</code>, <code>--stage</code></td><td>Zeigt Stage-Info (für unmerged Pfade).</td></tr><tr><td><code>-z</code></td><td>NUL-terminierte Ausgabe.</td></tr></tbody></table>
        <h2>Beispiele</h2>
        <pre><code>git ls-files
        # Jede verfolgte Datei

        git ls-files -o --exclude-standard
        # Untracked, nicht ignorierte Dateien

        git ls-files -m
        # Lokal modifizierte verfolgte Dateien

        git ls-files -s
        # Modus, SHA und Stage-Nummer für jeden Eintrag anzeigen</code></pre>
        <h2>Häufige Fehler</h2>
        <p><code>--exclude-standard</code> beim Auflisten untracked Dateien zu vergessen, überschwemmt Sie mit ignoriertem Müll. Filter zu kombinieren kann verwirrend sein — wenn Sie sowohl <code>-c</code> als auch <code>-o</code> übergeben, hängt die Bedeutung vom Kontext ab.</p>
        <h2>Verwandte Befehle</h2>
        <p><code>git status</code>, <code>git ls-tree</code>, <code>git update-index</code>, <code>git grep</code></p>
- source_title: git rev-parse — Pick out and massage parameters
  title: git rev-parse — Parameter extrahieren und aufbereiten
  langcode: de
  body: |-
    <h2>Übersicht</h2>
        <pre><code>git rev-parse [&lt;options&gt;] &lt;arg&gt;...</code></pre>
        <h2>Beschreibung</h2>
        <p>Der <code>git rev-parse</code>-Befehl löst Git-Referenzen und Argumente auf. Er wandelt symbolische Namen (Branches, Tags, <code>HEAD~3</code>, <code>HEAD@{yesterday}</code>) in 40-stellige SHAs um, normalisiert Optionen und beantwortet Introspektions-Fragen zum aktuellen Repository (Top-Level-Pfad, Git-Verzeichnis, ob wir in einem Worktree sind). Es ist das Schweizer Taschenmesser des Git-Skriptings.</p>
        <p>Im täglichen Einsatz integriert sich <code>git rev-parse</code> eng mit Shell-Aliasen, Editor-Plugins und Continuous Integration. Power-User fügen oft Aliase hinzu, die Flags kombinieren, die sie immer übergeben, oder wickeln den Befehl in Skripte, die Teamkonventionen durchsetzen. Die Ausgabeformatierung kann über Git-Config angepasst werden — Pretty-Formate, Farbschemata und Pager-Verhalten sind alle einstellbar. Wenn etwas schiefgeht, ist der erste Diagnoseschritt üblicherweise, den Befehl erneut mit <code>GIT_TRACE=1</code> in der Umgebung auszuführen, was die zugrunde liegenden Plumbing-Aufrufe offenlegt. Für ungewöhnliche Situationen öffnet die <code>--help</code>-Ausgabe (<code>git rev-parse --help</code>) die vollständige Manpage mit Details zu jeder Option, einschließlich solcher, die in alltäglichen Workflows selten verwendet werden, aber für Debugging oder Skripting im großen Maßstab essentiell sind.</p>
        <p>Zu verstehen, wie <code>git rev-parse</code> mit dem Rest von Gits Datenmodell interagiert — der Objektdatenbank, dem Index, Refs und dem Working Tree — zahlt sich aus. Jeder Befehl operiert auf einer Teilmenge dieser Stücke, und zu wissen, welche er berührt, hilft Ergebnisse vorherzusagen und sich von Fehlern zu erholen. Das Lesen der offiziellen Git-Dokumentation neben praktischer Übung in einem Wegwerf-Repository ist der schnellste Weg, die Nuancen zu verinnerlichen. Die meisten Produktionsprobleme mit Git rühren von einer von drei Ursachen: überraschendem Standardverhalten, partiellen Netzwerkoperationen oder dem Umschreiben bereits geteilter Historie. Ein funktionierendes mentales Modell der Nebenwirkungen von <code>git rev-parse</code> hilft, alle drei zu vermeiden.</p>
        <h2>Häufige Optionen</h2>
        <table><thead><tr><th>Option</th><th>Beschreibung</th></tr></thead><tbody><tr><td><code>--abbrev-ref</code></td><td>Gibt Kurz-Ref-Name aus (z. B. <code>main</code>, nicht <code>refs/heads/main</code>).</td></tr><tr><td><code>--short</code></td><td>Gibt abgekürzten SHA aus.</td></tr><tr><td><code>--show-toplevel</code></td><td>Gibt absoluten Pfad der Repo-Wurzel aus.</td></tr><tr><td><code>--git-dir</code></td><td>Gibt absoluten Pfad von <code>.git</code> aus.</td></tr><tr><td><code>--is-inside-work-tree</code></td><td>Ja/nein-Antwort, skript-freundlich.</td></tr><tr><td><code>--verify</code></td><td>Validiert, dass das Argument eine echte Ref ist.</td></tr><tr><td><code>--quiet</code></td><td>Unterdrückt Fehlerausgabe.</td></tr></tbody></table>
        <h2>Beispiele</h2>
        <pre><code>git rev-parse HEAD
        # Voller SHA des aktuellen Commits

        git rev-parse --abbrev-ref HEAD
        # Aktueller Branch-Name (oder "HEAD" falls detached)

        git rev-parse --show-toplevel
        # Pfad zur Repo-Wurzel, nützlich in Skripten

        git rev-parse --verify origin/main &gt;/dev/null && echo OK
        # Testen, ob eine Ref existiert</code></pre>
        <h2>Häufige Fehler</h2>
        <p><code>git rev-parse</code> auf Benutzereingabe ohne <code>--verify</code> zu verwenden kann bei mehrdeutigen Argumenten erfolgreich sein und überraschende Ergebnisse erzeugen. In Subshells ist <code>--show-toplevel</code> ein verlässlicherer Anker als <code>$PWD</code>.</p>
        <h2>Verwandte Befehle</h2>
        <p><code>git symbolic-ref</code>, <code>git rev-list</code>, <code>git for-each-ref</code>, <code>git config</code></p>
