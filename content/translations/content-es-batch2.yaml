- source_title: git add -p — Interactive patch staging
  title: git add -p — Staging de patch interactivo
  langcode: es
  body: |
    <h2>Sinopsis</h2>
    <pre><code>git add -p [&lt;path&gt;...]
    git add --patch [&lt;path&gt;...]</code></pre>
    <h2>Descripción</h2>
        <p><code>git add -p</code> ('patch mode') presenta cada hunk de cambios y te pregunta si stagearlo, dándote control fino sobre lo que va al próximo commit. Es la herramienta esencial para crear commits limpios y atómicos cuando tienes cambios mezclados.</p>
        <p>Las acciones disponibles incluyen <code>y</code>/<code>n</code> (sí/no), <code>s</code> (split: divide el hunk en pedazos más pequeños), <code>e</code> (edit: edita el hunk a mano) y <code>?</code> (ayuda). Domínalo para hacer commits significativamente mejores.</p>
        <p>En el uso diario, este comando se integra estrechamente con alias de shell, plugins de editor e integración continua. Los usuarios avanzados a menudo añaden alias que combinan los flags que siempre pasan. El formato de salida puede personalizarse vía configuración de Git. Cuando algo sale mal, ejecuta el comando con <code>GIT_TRACE=1</code> para revelar las llamadas plumbing subyacentes.</p><p>Entender cómo este comando interactúa con el resto del modelo de datos de Git rinde dividendos. Cada comando opera sobre algún subconjunto de las piezas (objetos, index, refs, árbol de trabajo), y saber cuáles toca ayuda a predecir resultados y a recuperarse de errores.</p>
        <h2>Opciones comunes</h2>
    <table>
      <thead><tr><th>Interactive command</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>y</code></td><td>Stage this hunk.</td></tr>
        <tr><td><code>n</code></td><td>Don't stage this hunk.</td></tr>
        <tr><td><code>s</code></td><td>Split into smaller hunks.</td></tr>
        <tr><td><code>e</code></td><td>Manually edit the hunk.</td></tr>
        <tr><td><code>a</code></td><td>Stage this and all remaining hunks in this file.</td></tr>
        <tr><td><code>d</code></td><td>Skip this and all remaining hunks in this file.</td></tr>
        <tr><td><code>q</code></td><td>Quit; don't stage further hunks.</td></tr>
        <tr><td><code>?</code></td><td>Show help.</td></tr>
      </tbody>
    </table>
    <h2>Ejemplos</h2>
    <pre><code>git add -p
    # Walk through every changed file's hunks

    git add -p src/auth.go
    # Restrict to one file

    # Inside the prompt:
    # Press 's' to split a large hunk into smaller ones
    # Press 'e' to manually edit the hunk text
    # Press 'y' or 'n' to accept or skip

    git diff --cached
    # Review what's now staged</code></pre>
    <h2>Errores comunes</h2>
    <p>Editing a hunk with <code>e</code> requires understanding the unified diff format — adding a line means the new file has it, removing a context line means the new file lacks it. Mistakes here can produce confusing index state. Always verify with <code>git diff --cached</code> after.</p>
    <h2>Comandos relacionados</h2>
    <p><code>git add</code>, <code>git stash -p</code>, <code>git restore -p</code>, <code>git checkout -p</code></p>
- source_title: git update-index — Register file contents in the working tree to the index
  title: git update-index — Registrar contenidos de archivos al index
  langcode: es
  body: |
    <h2>Sinopsis</h2>
    <pre><code>git update-index [--add] [--remove] [--refresh] [--assume-unchanged] &lt;file&gt;...</code></pre>
    <h2>Descripción</h2>
        <p>El comando <code>git update-index</code> es plumbing de bajo nivel para manipular el index. Hace lo que <code>git add</code> hace pero con muchas más opciones: cambiar bits ejecutables, marcar archivos como assume-unchanged, refrescar info stat.</p>
        <p>Raramente necesario para usuarios; útil para scripts y para situaciones específicas como configurar <code>--skip-worktree</code> en archivos de configuración locales.</p>
        <p>En el uso diario, este comando se integra estrechamente con alias de shell, plugins de editor e integración continua. Los usuarios avanzados a menudo añaden alias que combinan los flags que siempre pasan. El formato de salida puede personalizarse vía configuración de Git. Cuando algo sale mal, ejecuta el comando con <code>GIT_TRACE=1</code> para revelar las llamadas plumbing subyacentes.</p><p>Entender cómo este comando interactúa con el resto del modelo de datos de Git rinde dividendos. Cada comando opera sobre algún subconjunto de las piezas (objetos, index, refs, árbol de trabajo), y saber cuáles toca ayuda a predecir resultados y a recuperarse de errores.</p>
        <h2>Cuándo usar</h2>
    <p>Most users never need this directly. Reach for it when you want behaviors not exposed by porcelain: marking a file as <code>assume-unchanged</code> to avoid noisy <code>status</code> output for a config file you intentionally modify locally; or <code>skip-worktree</code> for sparse-checkout-like scenarios.</p>
    <h2>Opciones comunes</h2>
    <table>
      <thead><tr><th>Opción</th><th>Descripción</th></tr></thead>
      <tbody>
        <tr><td><code>--add</code></td><td>Add files not yet in the index.</td></tr>
        <tr><td><code>--remove</code></td><td>Remove files from the index.</td></tr>
        <tr><td><code>--refresh</code></td><td>Refresh stat info without changing content.</td></tr>
        <tr><td><code>--assume-unchanged</code></td><td>Tell Git not to check this file for changes.</td></tr>
        <tr><td><code>--no-assume-unchanged</code></td><td>Reverse the flag.</td></tr>
        <tr><td><code>--skip-worktree</code></td><td>Make Git ignore working-tree changes.</td></tr>
        <tr><td><code>--chmod=(+|-)x</code></td><td>Change executable bit.</td></tr>
        <tr><td><code>--cacheinfo &lt;mode&gt; &lt;sha&gt; &lt;path&gt;</code></td><td>Manually splice an entry into the index.</td></tr>
      </tbody>
    </table>
    <h2>Ejemplos</h2>
    <pre><code>git update-index --assume-unchanged config/local.yml
    # Stop tracking local edits to a config file

    git update-index --no-assume-unchanged config/local.yml
    # Resume normal tracking

    git update-index --chmod=+x scripts/deploy.sh
    # Mark a script executable in the index

    git update-index --refresh
    # Refresh stat info; useful after touching files</code></pre>
    <h2>Errores comunes</h2>
    <p><code>--assume-unchanged</code> is meant as a performance optimization, not as <code>.gitignore</code> for already-tracked files. If teammates need the file unchanged, use a config-template approach instead. Misuse causes bugs where tracked changes go unnoticed.</p>
    <h2>Comandos relacionados</h2>
    <p><code>git add</code>, <code>git rm</code>, <code>git ls-files</code>, <code>git read-tree</code></p>
- source_title: git read-tree — Read tree information into the index
  title: git read-tree — Leer información de tree al index
  langcode: es
  body: |
    <h2>Sinopsis</h2>
    <pre><code>git read-tree [-m | -u | --reset] &lt;tree-ish&gt;...</code></pre>
    <h2>Descripción</h2>
        <p>El comando <code>git read-tree</code> es plumbing que carga el contenido de uno o más objetos tree en el index. Es la operación fundamental detrás de <code>git checkout</code> y <code>git merge</code>.</p>
        <p>Con un solo tree, reemplaza el index. Con varios, hace una operación tipo merge. Plumbing puro: rara vez se invoca directamente.</p>
        <p>En el uso diario, este comando se integra estrechamente con alias de shell, plugins de editor e integración continua. Los usuarios avanzados a menudo añaden alias que combinan los flags que siempre pasan. El formato de salida puede personalizarse vía configuración de Git. Cuando algo sale mal, ejecuta el comando con <code>GIT_TRACE=1</code> para revelar las llamadas plumbing subyacentes.</p><p>Entender cómo este comando interactúa con el resto del modelo de datos de Git rinde dividendos. Cada comando opera sobre algún subconjunto de las piezas (objetos, index, refs, árbol de trabajo), y saber cuáles toca ayuda a predecir resultados y a recuperarse de errores.</p>
        <h2>Cuándo usar</h2>
    <p>Most users never need this. It's relevant for implementing custom merge tools, scripts that build the index from arbitrary trees, or for the <code>git read-tree --prefix=&lt;dir&gt;</code> trick to merge a subtree.</p>
    <h2>Opciones comunes</h2>
    <table>
      <thead><tr><th>Opción</th><th>Descripción</th></tr></thead>
      <tbody>
        <tr><td><code>-m</code></td><td>Three-way merge tree mode.</td></tr>
        <tr><td><code>-u</code></td><td>Update working tree to match index.</td></tr>
        <tr><td><code>--reset</code></td><td>Behave like <code>reset --hard</code> for the index.</td></tr>
        <tr><td><code>--prefix=&lt;dir&gt;</code></td><td>Read tree into a subdirectory.</td></tr>
        <tr><td><code>--empty</code></td><td>Empty the index.</td></tr>
        <tr><td><code>-i</code></td><td>Don't update working tree.</td></tr>
      </tbody>
    </table>
    <h2>Ejemplos</h2>
    <pre><code>git read-tree --empty
    # Clear the index

    git read-tree HEAD
    # Re-populate index from HEAD's tree

    git read-tree --prefix=lib/ -u other-branch:src
    # Splice the src/ tree of another branch into lib/

    git read-tree -m HEAD origin/main
    # Merge two trees into the index (low-level merge)</code></pre>
    <h2>Errores comunes</h2>
    <p>Calling <code>read-tree</code> without <code>-u</code> leaves the working tree out of sync with the index, surprising subsequent operations. Doing this in a busy worktree can cause confusing diffs.</p>
    <h2>Comandos relacionados</h2>
    <p><code>git write-tree</code>, <code>git checkout</code>, <code>git merge</code>, <code>git update-index</code></p>
- source_title: git write-tree — Create a tree object from the current index
  title: git write-tree — Crear un objeto tree desde el index actual
  langcode: es
  body: |
    <h2>Sinopsis</h2>
    <pre><code>git write-tree [--missing-ok] [--prefix=&lt;dir&gt;]</code></pre>
    <h2>Descripción</h2>
        <p>El comando <code>git write-tree</code> es plumbing que crea un objeto tree a partir del estado actual del index. Es lo que <code>git commit</code> hace internamente para producir el tree raíz del nuevo commit.</p>
        <p>Combinado con <code>git commit-tree</code>, te permite construir commits manualmente sin pasar por la porcelain.</p>
        <p>En el uso diario, este comando se integra estrechamente con alias de shell, plugins de editor e integración continua. Los usuarios avanzados a menudo añaden alias que combinan los flags que siempre pasan. El formato de salida puede personalizarse vía configuración de Git. Cuando algo sale mal, ejecuta el comando con <code>GIT_TRACE=1</code> para revelar las llamadas plumbing subyacentes.</p><p>Entender cómo este comando interactúa con el resto del modelo de datos de Git rinde dividendos. Cada comando opera sobre algún subconjunto de las piezas (objetos, index, refs, árbol de trabajo), y saber cuáles toca ayuda a predecir resultados y a recuperarse de errores.</p>
        <h2>Cuándo usar</h2>
    <p>You almost never call this directly. <code>git commit</code> calls <code>write-tree</code> internally to capture the staged state. Reach for it when synthesizing tree objects for custom workflows (generating a tree without a commit, scripting <code>commit-tree</code> pipelines).</p>
    <h2>Opciones comunes</h2>
    <table>
      <thead><tr><th>Opción</th><th>Descripción</th></tr></thead>
      <tbody>
        <tr><td><code>--missing-ok</code></td><td>Don't fail if referenced objects are missing.</td></tr>
        <tr><td><code>--prefix=&lt;dir&gt;</code></td><td>Write a subtree of the index.</td></tr>
      </tbody>
    </table>
    <h2>Ejemplos</h2>
    <pre><code>git write-tree
    # Print SHA of tree representing the current index

    TREE=$(git write-tree)
    COMMIT=$(echo "Snapshot" | git commit-tree "$TREE" -p HEAD)
    git update-ref refs/heads/snapshot "$COMMIT"
    # Manually craft a commit on a new branch

    git write-tree --prefix=docs/
    # Just the docs/ subtree</code></pre>
    <h2>Errores comunes</h2>
    <p>If the index has unmerged entries, <code>write-tree</code> fails. Resolve conflicts first. Forgetting that <code>write-tree</code> doesn't create a commit — only a tree — leads to dangling objects. <code>git help write-tree</code> opens the full manual page with comprehensive coverage of every option and edge case; it remains the authoritative reference whenever the summary on this page leaves a question unanswered. For team workflows, capturing how your project uses this command in a CONTRIBUTING document avoids repeated onboarding questions and keeps everyone aligned on conventions.</p>
    <h2>Comandos relacionados</h2>
    <p><code>git read-tree</code>, <code>git commit-tree</code>, <code>git ls-tree</code>, <code>git update-index</code></p>
- source_title: git commit-tree — Create a new commit object
  title: git commit-tree — Crear un nuevo objeto commit
  langcode: es
  body: |
    <h2>Sinopsis</h2>
    <pre><code>git commit-tree &lt;tree&gt; [-p &lt;parent&gt;]... [-m &lt;msg&gt;] [-S]</code></pre>
    <h2>Descripción</h2>
        <p>El comando <code>git commit-tree</code> es plumbing que crea un nuevo objeto commit dado un tree, padres opcionales y un mensaje. Es la operación de bajo nivel que <code>git commit</code> envuelve.</p>
        <p>Útil para construir commits sintéticos en scripts: imports de historial, merges personalizados o herramientas de automatización que necesitan crear commits sin pasar por el árbol de trabajo.</p>
        <p>En el uso diario, este comando se integra estrechamente con alias de shell, plugins de editor e integración continua. Los usuarios avanzados a menudo añaden alias que combinan los flags que siempre pasan. El formato de salida puede personalizarse vía configuración de Git. Cuando algo sale mal, ejecuta el comando con <code>GIT_TRACE=1</code> para revelar las llamadas plumbing subyacentes.</p><p>Entender cómo este comando interactúa con el resto del modelo de datos de Git rinde dividendos. Cada comando opera sobre algún subconjunto de las piezas (objetos, index, refs, árbol de trabajo), y saber cuáles toca ayuda a predecir resultados y a recuperarse de errores.</p>
        <h2>Cuándo usar</h2>
    <p>Most developers never use this directly. It's a building block for tools that synthesize commits programmatically: importers, custom merge strategies, history-rewriting tools. <code>filter-repo</code> uses commit-tree internally.</p>
    <h2>Opciones comunes</h2>
    <table>
      <thead><tr><th>Opción</th><th>Descripción</th></tr></thead>
      <tbody>
        <tr><td><code>-p &lt;parent&gt;</code></td><td>Specify a parent commit (repeatable for merges).</td></tr>
        <tr><td><code>-m &lt;msg&gt;</code></td><td>Commit message (or read stdin).</td></tr>
        <tr><td><code>-F &lt;file&gt;</code></td><td>Read message from file.</td></tr>
        <tr><td><code>-S[&lt;keyid&gt;]</code></td><td>GPG-sign the commit.</td></tr>
      </tbody>
    </table>
    <h2>Ejemplos</h2>
    <pre><code>TREE=$(git write-tree)
    COMMIT=$(echo "Initial commit" | git commit-tree "$TREE")
    git update-ref refs/heads/main "$COMMIT"
    # Build a root commit from scratch

    PARENT=$(git rev-parse HEAD)
    TREE=$(git write-tree)
    COMMIT=$(echo "Custom merge" | git commit-tree "$TREE" -p "$PARENT" -p "feature")
    git update-ref refs/heads/main "$COMMIT"
    # Synthesize a custom merge commit</code></pre>
    <h2>Errores comunes</h2>
    <p>Forgetting to <code>git update-ref</code> leaves the commit dangling — <code>git gc</code> will eventually delete it. Author/committer environment variables (<code>GIT_AUTHOR_NAME</code> etc.) must be set if you want non-default identities.</p>
    <h2>Comandos relacionados</h2>
    <p><code>git write-tree</code>, <code>git update-ref</code>, <code>git commit</code>, <code>git filter-repo</code></p>
- source_title: git diff-index — Compare a tree to the index or working tree
  title: git diff-index — Comparar un tree con el index o árbol de trabajo
  langcode: es
  body: |
    <h2>Sinopsis</h2>
    <pre><code>git diff-index [--cached] [-p] &lt;tree-ish&gt; [&lt;path&gt;...]</code></pre>
    <h2>Descripción</h2>
        <p>El comando <code>git diff-index</code> es el compañero plumbing de <code>git diff</code>. Compara un objeto tree (commit, tag) contra el index o árbol de trabajo. La salida es el formato de diff crudo y legible por máquina, a menos que <code>-p</code> solicite un patch.</p>
        <p>La mayoría de usuarios prefieren <code>git diff</code>, que es más fácil de leer. Usa <code>diff-index</code> en scripts donde necesites una comparación estable e inequívoca y no quieras conveniencias de porcelain. Los hooks (especialmente <code>pre-commit</code>) a menudo lo usan para verificaciones precisas.</p>
        <p>En el uso diario, este comando se integra estrechamente con alias de shell, plugins de editor e integración continua. Los usuarios avanzados a menudo añaden alias que combinan los flags que siempre pasan. El formato de salida puede personalizarse vía configuración de Git. Cuando algo sale mal, ejecuta el comando con <code>GIT_TRACE=1</code> para revelar las llamadas plumbing subyacentes.</p><p>Entender cómo este comando interactúa con el resto del modelo de datos de Git rinde dividendos. Cada comando opera sobre algún subconjunto de las piezas (objetos, index, refs, árbol de trabajo), y saber cuáles toca ayuda a predecir resultados y a recuperarse de errores.</p>
        <h2>Cuándo usar</h2>
    <p>Most users prefer <code>git diff</code>, which is easier to read. Use <code>diff-index</code> in scripts where you need a stable, unambiguous comparison and don't want porcelain conveniences. Hooks (especially <code>pre-commit</code>) often use it for precise checks.</p>
    <h2>Opciones comunes</h2>
    <table>
      <thead><tr><th>Opción</th><th>Descripción</th></tr></thead>
      <tbody>
        <tr><td><code>--cached</code></td><td>Compare tree to index (instead of working tree).</td></tr>
        <tr><td><code>-p</code></td><td>Show patch.</td></tr>
        <tr><td><code>--name-only</code></td><td>List only changed file names.</td></tr>
        <tr><td><code>--name-status</code></td><td>List names with status letters.</td></tr>
        <tr><td><code>--quiet</code></td><td>Exit nonzero if differences exist; produce no output.</td></tr>
        <tr><td><code>-z</code></td><td>NUL-terminated output.</td></tr>
      </tbody>
    </table>
    <h2>Ejemplos</h2>
    <pre><code>git diff-index --cached HEAD
    # Plumbing equivalent of "git diff --staged"

    git diff-index HEAD
    # Working tree vs HEAD

    git diff-index --quiet HEAD || echo "Repo is dirty"
    # Useful test in scripts and hooks

    git diff-index --name-only --diff-filter=A HEAD
    # List newly added files</code></pre>
    <h2>Errores comunes</h2>
    <p>The default raw output isn't patch text — pass <code>-p</code> for that. <code>--quiet</code> sets the exit code rather than printing, which is the opposite of what users sometimes expect from a "diff" command.</p>
    <h2>Comandos relacionados</h2>
    <p><code>git diff</code>, <code>git diff-tree</code>, <code>git status</code>, <code>git ls-files</code></p>
- source_title: git checkout-index — Copy files from the index to the working tree
  title: git checkout-index — Copiar archivos del index al árbol de trabajo
  langcode: es
  body: |
    <h2>Sinopsis</h2>
    <pre><code>git checkout-index [-a] [-f] [-u] [--prefix=&lt;dir&gt;] [&lt;file&gt;...]</code></pre>
    <h2>Descripción</h2>
        <p>El comando <code>git checkout-index</code> es plumbing que copia archivos del index al árbol de trabajo. Es la operación de bajo nivel detrás de <code>git checkout file</code> y partes de <code>git restore</code>.</p>
        <p>Usado por scripts que necesitan extraer archivos exactamente como están en el index, o reemplazar archivos del árbol de trabajo con sus versiones del index. Soporta exportar a un prefijo (subdirectorio) con <code>--prefix=</code>.</p>
        <p>En el uso diario, este comando se integra estrechamente con alias de shell, plugins de editor e integración continua. Los usuarios avanzados a menudo añaden alias que combinan los flags que siempre pasan. El formato de salida puede personalizarse vía configuración de Git. Cuando algo sale mal, ejecuta el comando con <code>GIT_TRACE=1</code> para revelar las llamadas plumbing subyacentes.</p><p>Entender cómo este comando interactúa con el resto del modelo de datos de Git rinde dividendos. Cada comando opera sobre algún subconjunto de las piezas (objetos, index, refs, árbol de trabajo), y saber cuáles toca ayuda a predecir resultados y a recuperarse de errores.</p>
        <h2>Cuándo usar</h2>
    <p>Most users never need this. Use it when scripting deployment from the index, building source tarballs, or exporting a snapshot to a directory other than the working tree.</p>
    <h2>Opciones comunes</h2>
    <table>
      <thead><tr><th>Opción</th><th>Descripción</th></tr></thead>
      <tbody>
        <tr><td><code>-a</code>, <code>--all</code></td><td>Check out every file in the index.</td></tr>
        <tr><td><code>-f</code>, <code>--force</code></td><td>Overwrite existing files.</td></tr>
        <tr><td><code>-u</code></td><td>Update stat information for files written.</td></tr>
        <tr><td><code>--prefix=&lt;dir&gt;</code></td><td>Write into <code>&lt;dir&gt;</code> instead of working tree.</td></tr>
        <tr><td><code>--stage=&lt;n&gt;</code></td><td>Check out a specific stage (1=base, 2=ours, 3=theirs).</td></tr>
        <tr><td><code>-z</code></td><td>NUL-terminated input/output.</td></tr>
        <tr><td><code>--no-create</code></td><td>Don't create files; just update stats.</td></tr>
      </tbody>
    </table>
    <h2>Ejemplos</h2>
    <pre><code>git checkout-index -a -f --prefix=/tmp/snapshot/
    # Export the entire index to /tmp/snapshot/

    git checkout-index --prefix=build/ src/main.c
    # Copy a single file into build/

    git checkout-index --stage=2 -f -- conflicted.txt
    # Pick "ours" version during a conflict

    git ls-files | git checkout-index -f --stdin
    # Restore every tracked file from the index</code></pre>
    <h2>Errores comunes</h2>
    <p>The <code>--prefix</code> argument must end with a slash, otherwise filenames concatenate awkwardly. Without <code>-f</code>, existing files in the destination cause errors. Picking the wrong <code>--stage</code> during conflict resolution applies a worse version than intended.</p>
    <h2>Comandos relacionados</h2>
    <p><code>git checkout</code>, <code>git restore</code>, <code>git archive</code>, <code>git ls-files</code></p>
