# Dominando Git - traducciones al español, lote 2
# 80 páginas - referencia de comandos

- source_title: git init — Create a new Git repository
  title: git init — Crear un nuevo repositorio Git
  langcode: es
  body: |
    <h2>Sinopsis</h2>
    <pre><code>git init [--bare] [--initial-branch=&lt;name&gt;] [--template=&lt;dir&gt;] [directory]</code></pre>
    <h2>Descripción</h2>
    <p>El comando <code>git init</code> crea un repositorio Git nuevo y vacío o reinicializa uno existente. Es típicamente el primer comando que ejecutas cuando quieres empezar a rastrear un proyecto con Git. El comando crea un directorio oculto <code>.git</code> que contiene todos los metadatos que Git necesita: la base de datos de objetos, las referencias, la configuración, los hooks y el index. Sin este directorio, Git no tiene dónde almacenar el historial.</p>
    <p>Ejecutar <code>git init</code> en un repositorio existente es seguro: no sobrescribirá objetos ni refs existentes. En su lugar, reinicializará las plantillas y se asegurará de que la estructura del directorio esté intacta. Por defecto, Git moderno crea un repositorio con el nombre de branch configurado por <code>init.defaultBranch</code>, que normalmente es <code>main</code> en instalaciones nuevas.</p>
    <p>Más allá del comportamiento predeterminado, <code>git init</code> respeta la configuración <code>core.hooksPath</code> si mantienes un directorio centralizado de hooks, y la config <code>init.templateDir</code> para copiar hooks personalizados y archivos de exclusión a cada nuevo repositorio. En sistemas de archivos donde la sensibilidad a mayúsculas importa, <code>core.ignoreCase</code> se establece automáticamente basado en la detección al momento del init. Los equipos que frecuentemente arrancan nuevos servicios a menudo scriptean los pasos post-init: establecer el branch predeterminado, añadir un archivo de licencia, configurar la plantilla gitignore y configurar un remoto, todo inmediatamente después de ejecutar <code>git init</code>. Entender qué archivos contiene <code>.git/</code> (HEAD, config, objects/, refs/, hooks/) desmitifica las operaciones posteriores y hace mucho más fácil la recuperación de accidentes.</p>
    <h2>Opciones comunes</h2>
    <table>
      <thead><tr><th>Opción</th><th>Descripción</th></tr></thead>
      <tbody>
        <tr><td><code>--bare</code></td><td>Crea un repositorio bare sin árbol de trabajo, adecuado para alojar en un servidor.</td></tr>
        <tr><td><code>--initial-branch=&lt;name&gt;</code> / <code>-b</code></td><td>Establece el nombre del branch inicial (predeterminado <code>main</code>).</td></tr>
        <tr><td><code>--template=&lt;dir&gt;</code></td><td>Usa un directorio de plantillas personalizado para hooks y configuración.</td></tr>
        <tr><td><code>--shared[=&lt;perms&gt;]</code></td><td>Permite que el repositorio sea compartido por un grupo Unix.</td></tr>
        <tr><td><code>--separate-git-dir=&lt;dir&gt;</code></td><td>Almacena los datos reales de Git en un directorio separado, dejando un archivo <code>.git</code> que apunta a él.</td></tr>
        <tr><td><code>-q</code>, <code>--quiet</code></td><td>Suprime la salida informativa.</td></tr>
      </tbody>
    </table>
    <h2>Ejemplos</h2>
    <pre><code>git init
    # Inicializa un repositorio en el directorio actual

    git init my-project
    # Crea un nuevo directorio e inicializa un repo dentro de él

    git init --bare /srv/git/myproject.git
    # Crea un repositorio bare para alojar en un servidor

    git init -b trunk
    # Inicializa con el branch inicial llamado "trunk" en lugar de "main"</code></pre>
    <h2>Errores comunes</h2>
    <p>Un error frecuente es ejecutar <code>git init</code> en tu directorio home por accidente, lo que convierte tu carpeta home entera en un repositorio. Verifica siempre tu directorio actual antes de ejecutarlo. Otra trampa es inicializar un repo dentro del árbol de trabajo de un repo existente: esto crea repos anidados que pueden confundir tanto a herramientas como a humanos. Si creaste accidentalmente un repo no deseado, simplemente elimina el directorio <code>.git</code> para deshacerlo.</p>
    <h2>Comandos relacionados</h2>
    <p><code>git clone</code>, <code>git config</code>, <code>git remote</code></p>
- source_title: git clone — Copy a repository from a remote source
  title: git clone — Copiar un repositorio desde una fuente remota
  langcode: es
  body: |
    <h2>Sinopsis</h2>
    <pre><code>git clone [--branch &lt;name&gt;] [--depth &lt;n&gt;] [--recurse-submodules] &lt;url&gt; [directory]</code></pre>
    <h2>Descripción</h2>
    <p>El comando <code>git clone</code> copia un repositorio existente (típicamente desde un servidor remoto) en un nuevo directorio local. Realiza tres acciones: crea un nuevo directorio, ejecuta <code>git init</code> dentro de él, y luego descarga todos los branches e historial desde el remoto. Después de clonar, el remoto se configura automáticamente como <code>origin</code>, y se hace checkout del branch predeterminado en el árbol de trabajo.</p>
    <p>Clonar soporta múltiples protocolos: HTTPS (el más común, más fácil con asistentes de credenciales), SSH (preferido para acceso de escritura usando autenticación basada en claves) y el protocolo legacy <code>git://</code>. Para repositorios muy grandes, los clones parciales, los clones shallow y los sparse checkouts pueden reducir dramáticamente la cantidad de datos transferidos.</p>
    <p>La autenticación es uno de los obstáculos más comunes. Con HTTPS, Git moderno usa asistentes de credenciales (Keychain en macOS, Credential Manager en Windows, libsecret en Linux) para cachear tokens o contraseñas de forma segura. Con SSH, tu agente SSH local proporciona la clave: asegúrate de que <code>ssh-add</code> la haya cargado. Después de clonar, <code>git config --get remote.origin.url</code> confirma lo que se configuró en realidad. Para repositorios a escala monorepo o supercomputadora, el clon parcial (<code>--filter=blob:none</code>) combinado con sparse checkout (<code>git sparse-checkout init --cone</code>) te permite trabajar con solo una porción del proyecto, reduciendo dramáticamente tanto el tiempo de clone como la huella en disco. Los pipelines de CI se benefician aún más de <code>--depth=1</code> y <code>--no-tags</code> cuando no necesitan historial.</p>
    <h2>Opciones comunes</h2>
    <table>
      <thead><tr><th>Opción</th><th>Descripción</th></tr></thead>
      <tbody>
        <tr><td><code>--branch &lt;name&gt;</code> / <code>-b</code></td><td>Hace checkout del branch o tag nombrado en lugar del predeterminado.</td></tr>
        <tr><td><code>--depth &lt;n&gt;</code></td><td>Crea un clon shallow con historial truncado.</td></tr>
        <tr><td><code>--single-branch</code></td><td>Clona solo el historial de un único branch.</td></tr>
        <tr><td><code>--recurse-submodules</code></td><td>Inicializa y clona los submódulos inmediatamente después del clon principal.</td></tr>
        <tr><td><code>--filter=blob:none</code></td><td>Crea un clon parcial sin contenido de blob (descargado perezosamente bajo demanda).</td></tr>
        <tr><td><code>--bare</code></td><td>Hace un clon bare sin árbol de trabajo.</td></tr>
        <tr><td><code>--mirror</code></td><td>Configura un mirror con todas las refs, adecuado para respaldos.</td></tr>
      </tbody>
    </table>
    <h2>Ejemplos</h2>
    <pre><code>git clone https://github.com/user/project.git
    # Clon estándar sobre HTTPS

    git clone git@github.com:user/project.git my-fork
    # Clon vía SSH a un directorio específico

    git clone --depth 1 --branch v2.0 https://github.com/user/project.git
    # Clon shallow de un tag específico, útil para CI

    git clone --filter=blob:none https://github.com/torvalds/linux.git
    # Clon parcial para repos enormes - blobs descargados bajo demanda</code></pre>
    <h2>Errores comunes</h2>
    <p>Clonar un repositorio gigantesco sin filtros puede tomar minutos u horas y consumir gigabytes. Para exploración o builds de CI, prefiere <code>--depth 1</code>. Otro error es clonar sobre HTTPS cuando pretendes hacer push de cambios: sin configuración de credenciales, cada push pedirá una contraseña. Usa SSH o un asistente de credenciales para acceso de escritura. Finalmente, ten en cuenta que los clones <code>--single-branch</code> no pueden acceder fácilmente a otros branches sin reconfigurar el remoto.</p>
    <h2>Comandos relacionados</h2>
    <p><code>git init</code>, <code>git fetch</code>, <code>git remote</code>, <code>git submodule</code></p>
- source_title: git add — Stage changes for the next commit
  title: git add — Stagear cambios para el próximo commit
  langcode: es
  body: |
    <h2>Sinopsis</h2>
    <pre><code>git add [-p] [-A] [-u] [--] [&lt;pathspec&gt;...]</code></pre>
    <h2>Descripción</h2>
    <p>El comando <code>git add</code> mueve cambios de tu árbol de trabajo al área de staging (también llamada el index). El área de staging es una instantánea de lo que irá al próximo commit. Al stagear cambios explícitamente, Git te permite elaborar commits que contienen exactamente el trabajo que quieres registrar, incluso si tu árbol de trabajo tiene otras ediciones no relacionadas en progreso.</p>
    <p><code>git add</code> puede stagear archivos enteros, partes de archivos (con <code>-p</code>) o directorios. No hace commit de nada; solo actualiza el index. El flujo más común es: editar, <code>git status</code>, <code>git add</code>, <code>git commit</code>. Dominar <code>git add</code>, especialmente sus modos interactivos, es una de las mejores formas de hacer tu historial de commits legible y fácil de revisar.</p>
    <p>En el uso diario, <code>git add</code> se integra estrechamente con alias de shell, plugins de editor e integración continua. Los usuarios avanzados a menudo añaden alias que combinan los flags que siempre pasan, o envuelven el comando en scripts que hacen cumplir convenciones de equipo. El formato de salida puede personalizarse vía configuración de Git: formatos pretty, esquemas de color y comportamiento del paginador son ajustables. Cuando algo sale mal, el primer paso de diagnóstico suele ser re-ejecutar el comando con <code>GIT_TRACE=1</code> en el entorno, lo que revela las llamadas plumbing subyacentes. Para situaciones inusuales, la salida de <code>--help</code> (<code>git add --help</code>) abre la página de manual completa con detalles de cada opción, incluyendo aquellas raramente usadas en flujos casuales pero esenciales para depuración o scripting a escala.</p><p>Entender cómo <code>git add</code> interactúa con el resto del modelo de datos de Git (la base de datos de objetos, el index, las refs y el árbol de trabajo) rinde dividendos. Cada comando opera sobre algún subconjunto de estas piezas, y saber cuáles toca ayuda a predecir resultados y a recuperarse de errores. Leer la documentación oficial de Git junto con práctica práctica en un repositorio desechable es la forma más rápida de internalizar los matices. La mayoría de problemas de producción con Git provienen de una de tres causas: comportamiento predeterminado sorprendente, operaciones de red parciales, o reescribir historial que ya se compartió. Un modelo mental funcional de los efectos secundarios de <code>git add</code> ayuda a evitar las tres.</p>
    <h2>Opciones comunes</h2>
    <table>
      <thead><tr><th>Opción</th><th>Descripción</th></tr></thead>
      <tbody>
        <tr><td><code>-A</code>, <code>--all</code></td><td>Stagea todos los cambios en el árbol de trabajo, incluidas eliminaciones y nuevos archivos.</td></tr>
        <tr><td><code>-u</code>, <code>--update</code></td><td>Stagea modificaciones y eliminaciones solo de archivos rastreados; ignora archivos nuevos.</td></tr>
        <tr><td><code>-p</code>, <code>--patch</code></td><td>Elige interactivamente hunks de cambios para stagear.</td></tr>
        <tr><td><code>-n</code>, <code>--dry-run</code></td><td>Muestra lo que se stagearía sin stagear realmente.</td></tr>
        <tr><td><code>-f</code>, <code>--force</code></td><td>Añade archivos incluso si coinciden con <code>.gitignore</code>.</td></tr>
        <tr><td><code>-i</code>, <code>--interactive</code></td><td>Abre una interfaz dirigida por menú para stagear.</td></tr>
        <tr><td><code>--intent-to-add</code> / <code>-N</code></td><td>Registra una intención de añadir un archivo para que aparezca su diff.</td></tr>
      </tbody>
    </table>
    <h2>Ejemplos</h2>
    <pre><code>git add README.md src/main.c
    # Stagea dos archivos específicos

    git add -A
    # Stagea todo: archivos nuevos, modificados y eliminados

    git add -p
    # Revisa y stagea fragmentos uno por uno interactivamente

    git add 'src/**/*.js'
    # Stagea todos los archivos JavaScript bajo src usando un pathspec</code></pre>
    <h2>Errores comunes</h2>
    <p>Ejecutar <code>git add .</code> a ciegas a menudo stagea archivos que no pretendías: archivos de log, artefactos de build, claves secretas. Usa <code>git status</code> primero y considera <code>-p</code> para cambios sensibles. Otra confusión común: <code>git add -u</code> no recogerá nuevos archivos, mientras que <code>git add .</code> sí. Después de stagear, si cambias un archivo de nuevo, esas ediciones posteriores no están staged hasta que vuelvas a ejecutar <code>git add</code>.</p>
    <h2>Comandos relacionados</h2>
    <p><code>git commit</code>, <code>git status</code>, <code>git restore</code>, <code>git reset</code></p>
- source_title: git commit — Record staged changes to the repository
  title: git commit — Registrar cambios staged en el repositorio
  langcode: es
  body: |
    <h2>Sinopsis</h2>
    <pre><code>git commit [-m &lt;msg&gt;] [-a] [--amend] [--no-verify] [-S]</code></pre>
    <h2>Descripción</h2>
    <p>El comando <code>git commit</code> toma todo lo que está actualmente en el área de staging y crea un nuevo objeto commit en el repositorio. Un commit es una instantánea inmutable que contiene un tree (los contenidos de los archivos), puntero(s) padre, metadatos de author y committer, y un mensaje. Los commits son la unidad de historial en Git: los branches son punteros a commits, los merges producen commits con múltiples padres y los tags etiquetan commits específicos.</p>
    <p>Un buen mensaje de commit tiene una línea de asunto corta (menos de 50 caracteres), una línea en blanco y un cuerpo opcional explicando el por qué. Muchos equipos usan conventional commits u otros sistemas de prefijos. La opción <code>--amend</code> modifica el commit más reciente, útil para arreglar typos en el mensaje u olvidar stagear un archivo, pero nunca enmiendes un commit que ya ha sido pusheado y compartido.</p>
    <p>En el uso diario, <code>git commit</code> se integra estrechamente con alias de shell, plugins de editor e integración continua. Los usuarios avanzados a menudo añaden alias que combinan los flags que siempre pasan, o envuelven el comando en scripts que hacen cumplir convenciones de equipo. El formato de salida puede personalizarse vía configuración de Git: formatos pretty, esquemas de color y comportamiento del paginador son ajustables. Cuando algo sale mal, el primer paso de diagnóstico suele ser re-ejecutar el comando con <code>GIT_TRACE=1</code> en el entorno, lo que revela las llamadas plumbing subyacentes. Para situaciones inusuales, la salida de <code>--help</code> (<code>git commit --help</code>) abre la página de manual completa con detalles de cada opción, incluyendo aquellas raramente usadas en flujos casuales pero esenciales para depuración o scripting a escala.</p><p>Entender cómo <code>git commit</code> interactúa con el resto del modelo de datos de Git (la base de datos de objetos, el index, las refs y el árbol de trabajo) rinde dividendos. Cada comando opera sobre algún subconjunto de estas piezas, y saber cuáles toca ayuda a predecir resultados y a recuperarse de errores. Leer la documentación oficial de Git junto con práctica práctica en un repositorio desechable es la forma más rápida de internalizar los matices. La mayoría de problemas de producción con Git provienen de una de tres causas: comportamiento predeterminado sorprendente, operaciones de red parciales, o reescribir historial que ya se compartió. Un modelo mental funcional de los efectos secundarios de <code>git commit</code> ayuda a evitar las tres.</p>
    <h2>Opciones comunes</h2>
    <table>
      <thead><tr><th>Opción</th><th>Descripción</th></tr></thead>
      <tbody>
        <tr><td><code>-m &lt;msg&gt;</code></td><td>Usa el mensaje dado en lugar de abrir un editor.</td></tr>
        <tr><td><code>-a</code>, <code>--all</code></td><td>Stagea automáticamente modificaciones y eliminaciones de archivos rastreados antes de commitear.</td></tr>
        <tr><td><code>--amend</code></td><td>Reemplaza el commit más reciente con uno nuevo.</td></tr>
        <tr><td><code>--no-verify</code></td><td>Salta los hooks pre-commit y commit-msg.</td></tr>
        <tr><td><code>-S</code>, <code>--gpg-sign</code></td><td>Firma con GPG el commit.</td></tr>
        <tr><td><code>--allow-empty</code></td><td>Permite un commit sin cambios.</td></tr>
        <tr><td><code>--fixup=&lt;commit&gt;</code></td><td>Crea un commit fixup para usar con autosquash rebase.</td></tr>
        <tr><td><code>-v</code>, <code>--verbose</code></td><td>Muestra el diff en el editor del mensaje de commit.</td></tr>
      </tbody>
    </table>
    <h2>Ejemplos</h2>
    <pre><code>git commit -m "Fix off-by-one error in pagination"
    # Commit rápido con mensaje de una línea

    git commit -am "Update README"
    # Stagea cambios rastreados y commitea en un paso

    git commit --amend -m "Better message"
    # Reescribe el mensaje del commit más reciente

    git commit --fixup=abc123
    # Crea un commit fixup para ser squasheado durante rebase</code></pre>
    <h2>Errores comunes</h2>
    <p>Enmendar un commit publicado y luego hacer force-push reescribe el historial sobre el que otros pueden haber basado trabajo, causando confusión. Solo enmienda commits locales, no compartidos. Otro error es commitear con <code>-a</code> cuando los archivos no rastreados también deberían incluirse: <code>-a</code> ignora archivos nuevos. Finalmente, nunca uses <code>--no-verify</code> solo para saltarte tests que fallan; arregla el test o el código.</p>
    <h2>Comandos relacionados</h2>
    <p><code>git add</code>, <code>git status</code>, <code>git log</code>, <code>git revert</code></p>
- source_title: git status — Show the working tree status
  title: git status — Mostrar el estado del árbol de trabajo
  langcode: es
  body: |
    <h2>Sinopsis</h2>
    <pre><code>git status [-s] [-b] [--porcelain[=&lt;version&gt;]] [--ignored]</code></pre>
    <h2>Descripción</h2>
    <p>El comando <code>git status</code> muestra el estado del árbol de trabajo y del área de staging. Muestra qué archivos están staged para el próximo commit, cuáles están modificados pero no staged y cuáles no están rastreados. También reporta el branch actual, si está ahead o behind del upstream y cualquier operación en curso como merges o rebases.</p>
    <p><code>git status</code> es el comando Git más ejecutado: es seguro, rápido e informativo. Úsalo constantemente para confirmar en qué estado está tu repositorio antes de tomar decisiones. La salida predeterminada es amigable para humanos con color y consejos; la salida <code>--porcelain</code> es estable, legible por máquina y pensada para scripts.</p>
    <p>En el uso diario, <code>git status</code> se integra estrechamente con alias de shell, plugins de editor e integración continua. Los usuarios avanzados a menudo añaden alias que combinan los flags que siempre pasan, o envuelven el comando en scripts que hacen cumplir convenciones de equipo. El formato de salida puede personalizarse vía configuración de Git: formatos pretty, esquemas de color y comportamiento del paginador son ajustables. Cuando algo sale mal, el primer paso de diagnóstico suele ser re-ejecutar el comando con <code>GIT_TRACE=1</code> en el entorno, lo que revela las llamadas plumbing subyacentes. Para situaciones inusuales, la salida de <code>--help</code> (<code>git status --help</code>) abre la página de manual completa con detalles de cada opción.</p><p>Entender cómo <code>git status</code> interactúa con el resto del modelo de datos de Git rinde dividendos. Cada comando opera sobre algún subconjunto de las piezas (objetos, index, refs, árbol de trabajo), y saber cuáles toca ayuda a predecir resultados y a recuperarse de errores.</p>
    <h2>Opciones comunes</h2>
    <table>
      <thead><tr><th>Opción</th><th>Descripción</th></tr></thead>
      <tbody>
        <tr><td><code>-s</code>, <code>--short</code></td><td>Muestra en formato corto con códigos de estado de dos caracteres.</td></tr>
        <tr><td><code>-b</code>, <code>--branch</code></td><td>Muestra info de branch y seguimiento incluso en formato corto.</td></tr>
        <tr><td><code>--porcelain</code></td><td>Salida estable legible por máquina para scripts.</td></tr>
        <tr><td><code>--ignored</code></td><td>También muestra archivos ignorados.</td></tr>
        <tr><td><code>-u &lt;mode&gt;</code></td><td>Controla cómo se reportan los archivos no rastreados (<code>no</code>, <code>normal</code>, <code>all</code>).</td></tr>
        <tr><td><code>--ahead-behind</code></td><td>Calcula conteos ahead/behind vs upstream.</td></tr>
      </tbody>
    </table>
    <h2>Ejemplos</h2>
    <pre><code>git status
    # Estado completo legible por humanos

    git status -sb
    # Formato compacto con info de branch

    git status --porcelain=v2 --branch
    # Salida estable para scripts y editores

    git status --ignored
    # Incluye archivos coincidentes con .gitignore</code></pre>
    <h2>Errores comunes</h2>
    <p>Los principiantes a veces se asustan cuando <code>git status</code> muestra muchos archivos no rastreados en un repo recién clonado con artefactos de build. Añade un <code>.gitignore</code> apropiado para filtrarlos. Otra trampa es parsear la salida predeterminada en scripts: el formato puede cambiar entre versiones y traducciones. Siempre usa <code>--porcelain</code> para automatización. Finalmente, directorios grandes no rastreados pueden ralentizar status considerablemente; usa <code>-uno</code> para saltarlos.</p>
    <h2>Comandos relacionados</h2>
    <p><code>git diff</code>, <code>git log</code>, <code>git add</code>, <code>git stash</code></p>
- source_title: git diff — Show changes between commits, trees, or the working tree
  title: git diff — Mostrar cambios entre commits, trees o el árbol de trabajo
  langcode: es
  body: |
    <h2>Sinopsis</h2>
    <pre><code>git diff [&lt;options&gt;] [&lt;commit&gt;] [--] [&lt;path&gt;...]</code></pre>
    <h2>Descripción</h2>
    <p>El comando <code>git diff</code> muestra diferencias entre dos conjuntos de contenido de archivos. Sin argumentos, compara el árbol de trabajo contra el área de staging, mostrando lo que no está staged. Con <code>--cached</code> (o <code>--staged</code>), compara el área de staging contra el último commit. Con uno o dos argumentos de commit, compara esos commits.</p>
    <p>Los diffs son centrales para revisión de código, depuración y entender el historial. Git produce diffs unificados por defecto pero también puede mostrar diffs a nivel de palabra, resaltado de movimientos de color y estadísticas. Para archivos binarios, solo se muestra una línea "differ" a menos que se configure un driver de diff binario.</p>
    <p>En el uso diario, <code>git diff</code> se integra estrechamente con alias de shell, plugins de editor e integración continua. Los usuarios avanzados a menudo añaden alias que combinan flags que siempre pasan. El formato de salida puede personalizarse vía configuración de Git. Cuando algo sale mal, ejecuta el comando con <code>GIT_TRACE=1</code> en el entorno para revelar las llamadas plumbing subyacentes.</p><p>Entender cómo <code>git diff</code> interactúa con el resto del modelo de datos de Git rinde dividendos. Cada comando opera sobre algún subconjunto de las piezas (objetos, index, refs, árbol de trabajo), y saber cuáles toca ayuda a predecir resultados.</p>
    <h2>Opciones comunes</h2>
    <table>
      <thead><tr><th>Opción</th><th>Descripción</th></tr></thead>
      <tbody>
        <tr><td><code>--cached</code> / <code>--staged</code></td><td>Compara el index con HEAD en lugar de árbol de trabajo con index.</td></tr>
        <tr><td><code>--stat</code></td><td>Muestra un resumen de inserciones/eliminaciones por archivo.</td></tr>
        <tr><td><code>--name-only</code></td><td>Lista solo los nombres de archivos que difieren.</td></tr>
        <tr><td><code>--word-diff</code></td><td>Resalta cambios a nivel de palabra.</td></tr>
        <tr><td><code>-w</code>, <code>--ignore-all-space</code></td><td>Ignora diferencias de espacios en blanco.</td></tr>
        <tr><td><code>--color-moved</code></td><td>Resalta bloques de código que fueron movidos.</td></tr>
        <tr><td><code>-U&lt;n&gt;</code></td><td>Muestra <code>n</code> líneas de contexto (predeterminado 3).</td></tr>
      </tbody>
    </table>
    <h2>Ejemplos</h2>
    <pre><code>git diff
    # Cambios no staged en el árbol de trabajo

    git diff --cached
    # Cambios staged para el próximo commit

    git diff main..feature
    # Todas las diferencias entre dos branches

    git diff HEAD~3 HEAD -- src/
    # Últimos tres commits, restringidos a src/</code></pre>
    <h2>Errores comunes</h2>
    <p>Olvidar <code>--cached</code> al revisar lo que está a punto de commitearse es una confusión clásica. Otro es usar la sintaxis de rango de dos puntos vs tres puntos incorrectamente: <code>A..B</code> es "diferencias de A a B", mientras que <code>A...B</code> es "diferencias desde la merge base hasta B". Diffs masivos solo de espacios en blanco después de cambios del editor pueden domarse con <code>-w</code>.</p>
    <h2>Comandos relacionados</h2>
    <p><code>git status</code>, <code>git log -p</code>, <code>git show</code>, <code>git range-diff</code></p>
- source_title: git rm — Remove files from the working tree and index
  title: git rm — Eliminar archivos del árbol de trabajo y del index
  langcode: es
  body: |
    <h2>Sinopsis</h2>
    <pre><code>git rm [-f] [-r] [--cached] [--] &lt;file&gt;...</code></pre>
    <h2>Descripción</h2>
    <p>El comando <code>git rm</code> elimina archivos del árbol de trabajo y del index en un solo paso, stageando la eliminación para el próximo commit. Usar <code>git rm</code> es más conveniente que eliminar el archivo con <code>rm</code> y luego ejecutar <code>git add</code>, aunque ambos enfoques producen el mismo estado final.</p>
    <p>El flag <code>--cached</code> es particularmente útil: elimina el archivo del index sin borrarlo del árbol de trabajo. Esta es la herramienta correcta cuando accidentalmente commiteaste un archivo (como un archivo de configuración con secretos, o un artefacto de build) y quieres dejar de rastrearlo pero mantenerlo en disco.</p>
    <p>En el uso diario, <code>git rm</code> se integra con alias de shell, plugins de editor e integración continua. Cuando algo sale mal, ejecuta el comando con <code>GIT_TRACE=1</code> para revelar las llamadas plumbing subyacentes.</p><p>Entender cómo <code>git rm</code> interactúa con el resto del modelo de datos de Git ayuda a predecir resultados y a recuperarse de errores.</p>
    <h2>Opciones comunes</h2>
    <table>
      <thead><tr><th>Opción</th><th>Descripción</th></tr></thead>
      <tbody>
        <tr><td><code>-f</code>, <code>--force</code></td><td>Anula las verificaciones de seguridad si el archivo tiene cambios no commiteados.</td></tr>
        <tr><td><code>-r</code></td><td>Elimina directorios recursivamente.</td></tr>
        <tr><td><code>--cached</code></td><td>Elimina solo del index; deja el archivo del árbol de trabajo en paz.</td></tr>
        <tr><td><code>-n</code>, <code>--dry-run</code></td><td>Muestra lo que se eliminaría sin hacerlo.</td></tr>
        <tr><td><code>--ignore-unmatch</code></td><td>Sale con cero incluso si no coinciden archivos.</td></tr>
        <tr><td><code>-q</code>, <code>--quiet</code></td><td>Suprime la salida.</td></tr>
      </tbody>
    </table>
    <h2>Ejemplos</h2>
    <pre><code>git rm old-file.txt
    # Elimina el archivo y stagea la eliminación

    git rm -r build/
    # Elimina recursivamente un directorio del repo

    git rm --cached secrets.env
    # Deja de rastrear un archivo pero lo mantiene localmente
    # ¡Luego añádelo a .gitignore!

    git rm -n '*.log'
    # Previsualiza qué archivos de log serían eliminados</code></pre>
    <h2>Errores comunes</h2>
    <p>El mayor obstáculo es olvidar que <code>git rm --cached</code> solo detiene el rastreo futuro: los commits pasados aún contienen el archivo. Si necesitas purgar un secreto del historial, usa <code>git filter-repo</code> o BFG. Otro error es ejecutar <code>git rm</code> sobre un archivo con modificaciones no staged sin darte cuenta de que esos cambios se pierden. Usa <code>-n</code> primero si tienes dudas.</p>
    <h2>Comandos relacionados</h2>
    <p><code>git add</code>, <code>git mv</code>, <code>git restore</code>, <code>git filter-repo</code></p>
- source_title: git mv — Move or rename a tracked file
  title: git mv — Mover o renombrar un archivo rastreado
  langcode: es
  body: |
    <h2>Sinopsis</h2>
    <pre><code>git mv [-f] [-k] [-n] &lt;source&gt; &lt;destination&gt;</code></pre>
    <h2>Descripción</h2>
    <p>El comando <code>git mv</code> renombra o mueve un archivo rastreado y stagea el cambio. Internamente equivale a ejecutar <code>mv</code> seguido de <code>git add</code> en la nueva ruta y <code>git rm</code> en la antigua. La conveniencia es que el rename ocurre en un único paso atómico que se stagea sin ambigüedad.</p>
    <p>Nota: Git no almacena renames como operaciones de primera clase. En cambio, detecta renames comparando la similitud de contenido de archivos al momento del diff y log. Así que ya sea que uses <code>git mv</code> o <code>mv</code> + <code>git add</code> + <code>git rm</code>, el commit resultante es idéntico, y la detección de rename funciona igual.</p>
    <p>En el uso diario, <code>git mv</code> se integra con alias de shell y herramientas de edición. Para depurar, ejecuta con <code>GIT_TRACE=1</code> para ver las llamadas internas.</p><p>Entender cómo <code>git mv</code> interactúa con el resto del modelo de datos de Git rinde dividendos al predecir resultados y recuperarse de errores.</p>
    <h2>Opciones comunes</h2>
    <table>
      <thead><tr><th>Opción</th><th>Descripción</th></tr></thead>
      <tbody>
        <tr><td><code>-f</code>, <code>--force</code></td><td>Sobrescribe el destino si existe.</td></tr>
        <tr><td><code>-k</code></td><td>Salta acciones de move/rename que fallarían sin error.</td></tr>
        <tr><td><code>-n</code>, <code>--dry-run</code></td><td>Muestra lo que pasaría sin hacerlo.</td></tr>
        <tr><td><code>-v</code>, <code>--verbose</code></td><td>Reporta nombres de archivos movidos.</td></tr>
      </tbody>
    </table>
    <h2>Ejemplos</h2>
    <pre><code>git mv old-name.txt new-name.txt
    # Renombra un archivo en un paso

    git mv src/utils.js src/lib/utils.js
    # Mueve un archivo a un nuevo directorio (ya debe existir)

    git mv -n *.md docs/
    # Previsualiza mover todos los archivos markdown a docs/

    git mv -f draft.md final.md
    # Sobrescritura forzada si final.md ya existe</code></pre>
    <h2>Errores comunes</h2>
    <p>Si renombras un archivo fuera de Git (con tu editor o <code>mv</code>), la detección de rename de Git aún suele funcionar al momento del diff, pero debes ejecutar <code>git add -A</code> para stagear tanto la eliminación como la adición. Otro problema: renames solo de capitalización en sistemas de archivos insensibles a mayúsculas (macOS, Windows) requieren <code>git mv -f</code> o un rename de dos pasos a través de un nombre temporal.</p>
    <h2>Comandos relacionados</h2>
    <p><code>git add</code>, <code>git rm</code>, <code>git log --follow</code></p>
- source_title: git branch — List, create, or delete branches
  title: git branch — Listar, crear o eliminar branches
  langcode: es
  body: |
    <h2>Sinopsis</h2>
    <pre><code>git branch [-a] [-r] [-v] [-d &lt;name&gt;] [-m &lt;old&gt; &lt;new&gt;] [&lt;name&gt; [&lt;start-point&gt;]]</code></pre>
    <h2>Descripción</h2>
    <p>El comando <code>git branch</code> gestiona branches. Sin argumentos lista los branches locales y marca el actual con un asterisco. Dado un nombre, crea un nuevo branch que apunta al HEAD actual (o a un punto de inicio especificado). También puede eliminar, renombrar e inspeccionar branches. Un branch en Git es un puntero ligero y movible a un commit: crear uno es esencialmente gratis, por lo que los flujos de Git fomentan muchos branches de corta duración.</p>
    <p>Nota: <code>git branch &lt;name&gt;</code> crea un branch pero no cambia a él. Para crear y cambiar en un paso, usa <code>git switch -c &lt;name&gt;</code> o <code>git checkout -b &lt;name&gt;</code>. El comportamiento <code>--track</code> hace que un nuevo branch siga a un branch remoto para los predeterminados de push/pull.</p>
    <p>En el uso diario, <code>git branch</code> se integra con alias de shell y herramientas. Para depurar, ejecuta con <code>GIT_TRACE=1</code>.</p><p>Entender cómo <code>git branch</code> interactúa con el resto del modelo de datos de Git rinde dividendos.</p>
    <h2>Opciones comunes</h2>
    <table>
      <thead><tr><th>Opción</th><th>Descripción</th></tr></thead>
      <tbody>
        <tr><td><code>-a</code>, <code>--all</code></td><td>Lista tanto branches locales como de seguimiento remoto.</td></tr>
        <tr><td><code>-r</code>, <code>--remotes</code></td><td>Lista solo branches de seguimiento remoto.</td></tr>
        <tr><td><code>-v</code>, <code>--verbose</code></td><td>Muestra el último commit en cada branch.</td></tr>
        <tr><td><code>-d &lt;name&gt;</code></td><td>Elimina un branch totalmente mergeado.</td></tr>
        <tr><td><code>-D &lt;name&gt;</code></td><td>Fuerza la eliminación de un branch incluso si no está mergeado.</td></tr>
        <tr><td><code>-m &lt;old&gt; &lt;new&gt;</code></td><td>Renombra un branch.</td></tr>
        <tr><td><code>--merged</code> / <code>--no-merged</code></td><td>Filtra branches que están (no están) mergeados en HEAD.</td></tr>
        <tr><td><code>--set-upstream-to=&lt;remote&gt;/&lt;branch&gt;</code></td><td>Configura el seguimiento del branch actual.</td></tr>
      </tbody>
    </table>
    <h2>Ejemplos</h2>
    <pre><code>git branch
    # Lista branches locales

    git branch feature/login
    # Crea un nuevo branch desde el HEAD actual

    git branch -d old-feature
    # Elimina un branch mergeado

    git branch -m main trunk
    # Renombra el branch local main a trunk

    git branch -a -v
    # Lista todos los branches (local + remoto) con últimos commits</code></pre>
    <h2>Errores comunes</h2>
    <p>Usar <code>-D</code> para forzar la eliminación de un branch puede perder commits no mergeados para siempre (bueno, hasta que <code>git reflog</code> expire). Intenta siempre <code>-d</code> primero. Renombrar el branch actual con <code>-m</code> funciona sin argumentos: <code>git branch -m new-name</code> renombra en lo que estés. Olvidar establecer el seguimiento upstream tras crear un branch significa que <code>git push</code> puede necesitar argumentos explícitos la primera vez.</p>
    <h2>Comandos relacionados</h2>
    <p><code>git switch</code>, <code>git checkout</code>, <code>git merge</code>, <code>git push</code></p>
- source_title: git checkout — Switch branches or restore working tree files
  title: git checkout — Cambiar branches o restaurar archivos del árbol de trabajo
  langcode: es
  body: |
    <h2>Sinopsis</h2>
    <pre><code>git checkout [&lt;branch&gt;]
    git checkout -b &lt;new-branch&gt; [&lt;start-point&gt;]
    git checkout [&lt;tree-ish&gt;] -- &lt;file&gt;...</code></pre>
    <h2>Descripción</h2>
    <p>El comando <code>git checkout</code> históricamente hace dos cosas no relacionadas: cambiar branches y restaurar archivos. Por esta sobrecarga, Git moderno introdujo <code>git switch</code> para operaciones de branch y <code>git restore</code> para operaciones de archivo. <code>git checkout</code> sigue funcionando y permanece popular, pero se anima a los nuevos usuarios a aprender los comandos divididos más nuevos.</p>
    <p>Cuando se le da un nombre de branch, <code>git checkout</code> mueve HEAD a ese branch y actualiza el árbol de trabajo. Cuando se le da un path, sobrescribe el archivo del árbol de trabajo con la versión del index (o de un commit especificado). El flag <code>-b</code> crea un nuevo branch y cambia a él en un paso.</p>
    <p>En el uso diario, <code>git checkout</code> se integra con alias de shell. Para depurar, ejecuta con <code>GIT_TRACE=1</code>.</p><p>Entender cómo <code>git checkout</code> interactúa con el resto del modelo de datos de Git rinde dividendos al predecir resultados.</p>
    <h2>Opciones comunes</h2>
    <table>
      <thead><tr><th>Opción</th><th>Descripción</th></tr></thead>
      <tbody>
        <tr><td><code>-b &lt;name&gt;</code></td><td>Crea y cambia a un nuevo branch.</td></tr>
        <tr><td><code>-B &lt;name&gt;</code></td><td>Crea o resetea un branch y cambia a él.</td></tr>
        <tr><td><code>--track</code></td><td>Configura el seguimiento de un branch remoto.</td></tr>
        <tr><td><code>--detach</code></td><td>Hace checkout de un commit en estado HEAD desconectado.</td></tr>
        <tr><td><code>--</code> &lt;path&gt;</td><td>Trata los argumentos siguientes como paths, no branches.</td></tr>
        <tr><td><code>-f</code>, <code>--force</code></td><td>Descarta cambios locales al cambiar.</td></tr>
        <tr><td><code>-p</code>, <code>--patch</code></td><td>Selecciona hunks interactivamente para restaurar.</td></tr>
      </tbody>
    </table>
    <h2>Ejemplos</h2>
    <pre><code>git checkout main
    # Cambia al branch main

    git checkout -b feature/api origin/develop
    # Crea un nuevo branch que rastrea origin/develop

    git checkout HEAD -- src/config.js
    # Descarta cambios locales a un único archivo

    git checkout v1.2.3
    # HEAD desconectado en un tag específico</code></pre>
    <h2>Errores comunes</h2>
    <p>Ejecutar <code>git checkout &lt;file&gt;</code> sobrescribe silenciosamente tus ediciones locales sin posibilidad de deshacer. Usa <code>git restore</code> en su lugar; tiene un nombre más claro. El estado HEAD desconectado sorprende a los principiantes: los commits hechos ahí no pertenecen a ningún branch y pueden perderse al cambiar. Si quieres conservarlos, crea un branch primero.</p>
    <h2>Comandos relacionados</h2>
    <p><code>git switch</code>, <code>git restore</code>, <code>git branch</code>, <code>git reset</code></p>
- source_title: git switch — Switch branches
  title: git switch — Cambiar branches
  langcode: es
  body: |
    <h2>Sinopsis</h2>
    <pre><code>git switch [-c &lt;new-branch&gt;] [--detach] &lt;branch&gt;</code></pre>
    <h2>Descripción</h2>
    <p>El comando <code>git switch</code>, introducido en Git 2.23, es un reemplazo enfocado para la mitad de cambio de branch de <code>git checkout</code>. Solo cambia branches (o crea y cambia en un paso). Se rehúsa a operar sobre archivos individuales, eliminando la fuente más común de errores de <code>checkout</code>. Si estás aprendiendo Git hoy, prefiere <code>git switch</code> para branches y <code>git restore</code> para archivos.</p>
    <p>Como <code>checkout</code>, <code>switch</code> actualiza HEAD, el index y el árbol de trabajo para coincidir con el branch destino. Se rehusará a cambiar si hacerlo aplastaría cambios no commiteados, a menos que pases <code>--force</code>.</p>
    <p>En el uso diario, <code>git switch</code> se integra con alias de shell. Para depurar, ejecuta con <code>GIT_TRACE=1</code>.</p><p>Entender cómo <code>git switch</code> interactúa con el modelo de datos de Git ayuda a predecir resultados y a recuperarse de errores.</p>
    <h2>Opciones comunes</h2>
    <table>
      <thead><tr><th>Opción</th><th>Descripción</th></tr></thead>
      <tbody>
        <tr><td><code>-c &lt;name&gt;</code>, <code>--create</code></td><td>Crea un nuevo branch y cambia a él.</td></tr>
        <tr><td><code>-C &lt;name&gt;</code>, <code>--force-create</code></td><td>Crea o resetea un branch y cambia a él.</td></tr>
        <tr><td><code>--track</code></td><td>Configura seguimiento con un branch remoto.</td></tr>
        <tr><td><code>--detach</code></td><td>Cambia a un commit en modo HEAD desconectado.</td></tr>
        <tr><td><code>-</code></td><td>Cambia al branch anterior (como <code>cd -</code>).</td></tr>
        <tr><td><code>--discard-changes</code></td><td>Descarta cambios locales al cambiar.</td></tr>
        <tr><td><code>-m</code>, <code>--merge</code></td><td>Merge three-way de cambios locales al cambiar.</td></tr>
      </tbody>
    </table>
    <h2>Ejemplos</h2>
    <pre><code>git switch main
    # Mueve al branch main

    git switch -c feature/search
    # Crea y cambia a un nuevo branch

    git switch -
    # Vuelve al branch anterior

    git switch --detach v3.0.0
    # Inspecciona un tag en modo desconectado</code></pre>
    <h2>Errores comunes</h2>
    <p>Olvidar pasar <code>-c</code> al intentar crear un nuevo branch deja a Git buscando un branch existente y produce un error. Recuerda: <code>switch</code> solo es para branches; usa <code>restore</code> para archivos. Otro error es asumir que <code>git switch -</code> alterna entre dos branches indefinidamente; alterna entre el actual y el anterior, no entre los dos últimos en general.</p>
    <h2>Comandos relacionados</h2>
    <p><code>git checkout</code>, <code>git restore</code>, <code>git branch</code></p>
- source_title: git merge — Join two or more development histories together
  title: git merge — Unir dos o más historiales de desarrollo
  langcode: es
  body: |
    <h2>Sinopsis</h2>
    <pre><code>git merge [--no-ff] [--squash] [--abort] [-s &lt;strategy&gt;] [&lt;branch&gt;]</code></pre>
    <h2>Descripción</h2>
    <p>El comando <code>git merge</code> integra cambios de un branch en otro. Por defecto produce un commit de "merge real" con dos padres, preservando la topología de ambos historiales. Si el branch destino es ancestro estricto del fuente, Git hace fast-forward simplemente moviendo el puntero del branch; pasa <code>--no-ff</code> para registrar siempre un merge commit.</p>
    <p>Cuando se cambian las mismas líneas en ambos lados, Git pausa con un marcador de conflicto. Resuelves manualmente, luego haces <code>git add</code> de los archivos y ejecutas <code>git commit</code> (o <code>git merge --continue</code>). Para abortar un merge en progreso, usa <code>git merge --abort</code>.</p>
    <p>En el uso diario, <code>git merge</code> se integra con alias de shell, plugins de editor e integración continua. Para depurar, ejecuta con <code>GIT_TRACE=1</code> para revelar las llamadas plumbing subyacentes.</p><p>Entender cómo <code>git merge</code> interactúa con el resto del modelo de datos de Git rinde dividendos al predecir resultados y recuperarse de errores.</p>
    <h2>Opciones comunes</h2>
    <table>
      <thead><tr><th>Opción</th><th>Descripción</th></tr></thead>
      <tbody>
        <tr><td><code>--no-ff</code></td><td>Siempre crea un merge commit, incluso cuando es posible fast-forward.</td></tr>
        <tr><td><code>--ff-only</code></td><td>Rechaza el merge a menos que sea posible fast-forward.</td></tr>
        <tr><td><code>--squash</code></td><td>Combina el historial mergeado en un único commit en el branch destino.</td></tr>
        <tr><td><code>--abort</code></td><td>Abandona un merge en progreso.</td></tr>
        <tr><td><code>--continue</code></td><td>Reanuda un merge tras resolver conflictos.</td></tr>
        <tr><td><code>-s &lt;strategy&gt;</code></td><td>Elige estrategia de merge (<code>ort</code>, <code>recursive</code>, <code>resolve</code>, <code>octopus</code>).</td></tr>
        <tr><td><code>-X &lt;option&gt;</code></td><td>Pasa opción específica de estrategia (p.ej. <code>ours</code>, <code>theirs</code>).</td></tr>
        <tr><td><code>--no-commit</code></td><td>Stagea el resultado del merge pero no commitea.</td></tr>
      </tbody>
    </table>
    <h2>Ejemplos</h2>
    <pre><code>git merge feature/login
    # Mergea el branch feature en el branch actual

    git merge --no-ff release/1.2
    # Siempre hace un merge commit (preserva topología)

    git merge --abort
    # Cancela un merge tras surgir conflictos

    git merge -X theirs hotfix
    # Auto-resuelve conflictos prefiriendo el lado "their"</code></pre>
    <h2>Errores comunes</h2>
    <p>Resolver conflictos a las prisas y olvidar quitar los marcadores de conflicto (<code>&lt;&lt;&lt;&lt;&lt;&lt;&lt;</code>) deja código roto commiteado. Siempre ejecuta un build o tests tras resolver. Otra trampa es hacer fast-forward silenciosamente cuando querías un merge commit para trazabilidad: usa <code>--no-ff</code>. Finalmente, <code>--squash</code> NO crea un merge commit, así que el branch fuente no se registra como padre.</p>
    <h2>Comandos relacionados</h2>
    <p><code>git rebase</code>, <code>git mergetool</code>, <code>git pull</code>, <code>git cherry-pick</code></p>
- source_title: git rebase — Reapply commits on top of another base
  title: git rebase — Reaplicar commits sobre otra base
  langcode: es
  body: |
    <h2>Sinopsis</h2>
    <pre><code>git rebase [-i] [--onto &lt;newbase&gt;] [&lt;upstream&gt; [&lt;branch&gt;]]</code></pre>
    <h2>Descripción</h2>
    <p>El comando <code>git rebase</code> mueve una secuencia de commits a una nueva base. Reescribe el historial reproduciendo cada commit sobre la nueva base, produciendo una cadena lineal en lugar de un merge commit. Rebasear es invaluable para mantener branches feature actualizados, limpiar el historial local antes de pushear y squashear commits fixup.</p>
    <p>Como rebase crea nuevos commits con SHAs diferentes, nunca rebasees commits que han sido publicados y descargados por otros: terminarán con historiales divergentes. El modo interactivo (<code>-i</code>) te permite reordenar, editar, squashear, descartar o arreglar commits.</p>
    <p>En el uso diario, <code>git rebase</code> se integra con alias de shell. Para depurar, ejecuta con <code>GIT_TRACE=1</code>.</p><p>Entender cómo <code>git rebase</code> interactúa con el modelo de datos de Git rinde dividendos. La mayoría de problemas con Git provienen de comportamiento predeterminado sorprendente o de reescribir historial que ya se compartió.</p>
    <h2>Opciones comunes</h2>
    <table>
      <thead><tr><th>Opción</th><th>Descripción</th></tr></thead>
      <tbody>
        <tr><td><code>-i</code>, <code>--interactive</code></td><td>Abre un editor para manipular la lista de commits.</td></tr>
        <tr><td><code>--onto &lt;newbase&gt;</code></td><td>Rebasea sobre un commit arbitrario, no sobre el upstream.</td></tr>
        <tr><td><code>--continue</code></td><td>Reanuda tras resolver conflictos.</td></tr>
        <tr><td><code>--abort</code></td><td>Cancela el rebase y vuelve al estado original.</td></tr>
        <tr><td><code>--skip</code></td><td>Salta el patch actual y continúa.</td></tr>
        <tr><td><code>--autosquash</code></td><td>Ordena automáticamente commits fixup/squash.</td></tr>
        <tr><td><code>--autostash</code></td><td>Stashea cambios locales antes de rebasear y los reaplica después.</td></tr>
        <tr><td><code>-r</code>, <code>--rebase-merges</code></td><td>Preserva merge commits durante rebase.</td></tr>
      </tbody>
    </table>
    <h2>Ejemplos</h2>
    <pre><code>git rebase main
    # Reproduce los commits del branch actual encima de main

    git rebase -i HEAD~5
    # Edita interactivamente los últimos 5 commits

    git rebase --onto main feature-base feature-tip
    # Mueve solo los commits entre feature-base y feature-tip a main

    git rebase --continue
    # Reanuda tras arreglar conflictos</code></pre>
    <h2>Errores comunes</h2>
    <p>Rebasear branches públicos compartidos rompe el historial de cada colaborador. Reserva rebase para limpieza local. Durante la resolución de conflictos, los principiantes a menudo ejecutan <code>git commit</code> en lugar de <code>git rebase --continue</code>, dejando el rebase en un estado roto. Si te pierdes a mitad de un rebase, <code>git rebase --abort</code> siempre te devuelve a un estado seguro.</p>
    <h2>Comandos relacionados</h2>
    <p><code>git merge</code>, <code>git cherry-pick</code>, <code>git reflog</code>, <code>git pull --rebase</code></p>
- source_title: git mergetool — Run merge conflict resolution tools
  title: git mergetool — Ejecutar herramientas de resolución de conflictos de merge
  langcode: es
  body: |
    <h2>Sinopsis</h2>
    <pre><code>git mergetool [-t &lt;tool&gt;] [--tool-help] [&lt;file&gt;...]</code></pre>
    <h2>Descripción</h2>
    <p>El comando <code>git mergetool</code> lanza una herramienta externa de merge para ayudar a resolver conflictos tras un merge, rebase o cherry-pick que se detiene con conflictos. Herramientas comunes incluyen <code>vimdiff</code>, <code>meld</code>, <code>kdiff3</code>, <code>p4merge</code>, <code>opendiff</code> y <code>vscode</code>. Una vez configurado vía <code>merge.tool</code>, ejecutar <code>git mergetool</code> abre cada archivo conflictivo en la herramienta elegida y stagea la resolución cuando guardas.</p>
    <p>La mayoría de editores modernos (VS Code, IDEs de JetBrains, Vim con Fugitive) tienen UIs de merge incorporadas que hacen redundante <code>git mergetool</code>. Aún así, en la línea de comandos o sobre SSH, sigue siendo una utilidad esencial para resolución gráfica o de tres paneles.</p>
    <p>En el uso diario, <code>git mergetool</code> se integra con alias de shell. Para depurar, ejecuta con <code>GIT_TRACE=1</code>.</p><p>Entender cómo <code>git mergetool</code> interactúa con el modelo de datos de Git ayuda a recuperarse de errores.</p>
    <h2>Opciones comunes</h2>
    <table>
      <thead><tr><th>Opción</th><th>Descripción</th></tr></thead>
      <tbody>
        <tr><td><code>-t &lt;tool&gt;</code>, <code>--tool=&lt;tool&gt;</code></td><td>Usa una herramienta de merge específica para esta ejecución.</td></tr>
        <tr><td><code>--tool-help</code></td><td>Lista las herramientas de merge que Git conoce.</td></tr>
        <tr><td><code>-y</code>, <code>--no-prompt</code></td><td>No pregunta antes de lanzar la herramienta.</td></tr>
        <tr><td><code>-g</code>, <code>--gui</code></td><td>Usa la herramienta GUI de <code>merge.guitool</code>.</td></tr>
        <tr><td><code>-O&lt;file&gt;</code></td><td>Procesa archivos en el orden listado en <code>file</code>.</td></tr>
      </tbody>
    </table>
    <h2>Ejemplos</h2>
    <pre><code>git config --global merge.tool meld
    # Configura meld como predeterminada

    git mergetool
    # Lanza la herramienta configurada en cada archivo conflictivo

    git mergetool -t vimdiff
    # Usa vimdiff solo esta vez

    git mergetool --tool-help
    # Ve la lista de herramientas soportadas</code></pre>
    <h2>Errores comunes</h2>
    <p>Tras resolver con <code>git mergetool</code>, los archivos de respaldo <code>.orig</code> sobrantes ensucian el directorio. Deshabilítalos con <code>git config --global mergetool.keepBackup false</code>. Otra trampa: lanzar una herramienta GUI sobre SSH sin X forwarding falla silenciosamente. Configura una herramienta amigable con consola (como <code>vimdiff</code>) para sesiones remotas.</p>
    <h2>Comandos relacionados</h2>
    <p><code>git merge</code>, <code>git rebase</code>, <code>git config</code>, <code>git diff</code></p>
- source_title: git remote — Manage tracked remote repositories
  title: git remote — Gestionar repositorios remotos rastreados
  langcode: es
  body: |
    <h2>Sinopsis</h2>
    <pre><code>git remote [-v]
    git remote add &lt;name&gt; &lt;url&gt;
    git remote remove &lt;name&gt;
    git remote set-url &lt;name&gt; &lt;url&gt;</code></pre>
    <h2>Descripción</h2>
    <p>El comando <code>git remote</code> gestiona el conjunto de repositorios ("remotos") cuyas URLs se almacenan en tu configuración local. Cada remoto tiene un apodo corto (comúnmente <code>origin</code> para la fuente original del clone y <code>upstream</code> para el proyecto del que hiciste fork). Cuando ejecutas <code>git fetch origin</code>, <code>git push origin</code> o similar, el apodo se resuelve a la URL.</p>
    <p>Los remotos se almacenan en <code>.git/config</code> y pueden tener URLs separadas para fetch y push. También llevan refspecs que determinan qué refs descargar y a qué namespace local. Los flujos modernos a menudo solo tienen <code>origin</code>, mientras que los contribuyentes de open source típicamente tienen tanto <code>origin</code> (su fork) como <code>upstream</code> (el proyecto canónico).</p>
    <p>En el uso diario, <code>git remote</code> se integra con alias de shell.</p><p>Entender cómo <code>git remote</code> interactúa con el modelo de datos de Git rinde dividendos.</p>
    <h2>Opciones comunes</h2>
    <table>
      <thead><tr><th>Opción / Subcomando</th><th>Descripción</th></tr></thead>
      <tbody>
        <tr><td><code>-v</code>, <code>--verbose</code></td><td>Muestra URLs junto a los nombres de remotos.</td></tr>
        <tr><td><code>add &lt;name&gt; &lt;url&gt;</code></td><td>Registra un nuevo remoto.</td></tr>
        <tr><td><code>remove &lt;name&gt;</code></td><td>Elimina un remoto de la config.</td></tr>
        <tr><td><code>rename &lt;old&gt; &lt;new&gt;</code></td><td>Renombra un remoto.</td></tr>
        <tr><td><code>set-url &lt;name&gt; &lt;url&gt;</code></td><td>Cambia la URL de un remoto.</td></tr>
        <tr><td><code>show &lt;name&gt;</code></td><td>Muestra info detallada sobre un remoto.</td></tr>
        <tr><td><code>prune &lt;name&gt;</code></td><td>Elimina refs de seguimiento remoto obsoletas.</td></tr>
      </tbody>
    </table>
    <h2>Ejemplos</h2>
    <pre><code>git remote -v
    # Lista todos los remotos con URLs

    git remote add upstream https://github.com/original/project.git
    # Añade el repo upstream de un fork

    git remote set-url origin git@github.com:me/project.git
    # Cambia de HTTPS a SSH

    git remote prune origin
    # Elimina branches de seguimiento que ya no existen en origin</code></pre>
    <h2>Errores comunes</h2>
    <p>Añadir la URL incorrecta (typo, sufijo <code>.git</code> faltante en algunos hosts) lleva a errores de fetch confusos. Ejecuta <code>git remote -v</code> para confirmar. Tras renombres de repositorio o cambios de propietario de fork, las URLs de tus remotos se vuelven obsoletas: arréglalas con <code>set-url</code>. No olvides hacer <code>git remote prune</code> periódicamente para limpiar branches eliminados en el servidor.</p>
    <h2>Comandos relacionados</h2>
    <p><code>git fetch</code>, <code>git push</code>, <code>git pull</code>, <code>git ls-remote</code></p>
- source_title: git fetch — Download objects and refs from a remote
  title: git fetch — Descargar objetos y refs desde un remoto
  langcode: es
  body: |
    <h2>Sinopsis</h2>
    <pre><code>git fetch [&lt;options&gt;] [&lt;remote&gt; [&lt;refspec&gt;...]]</code></pre>
    <h2>Descripción</h2>
    <p>El comando <code>git fetch</code> descarga nuevos commits, archivos y refs desde un repositorio remoto a tu repo local, pero NO los mergea en tu branch de trabajo. Tras hacer fetch, las refs de seguimiento remoto (como <code>origin/main</code>) se actualizan, y puedes inspeccionar lo nuevo con <code>git log origin/main</code> antes de decidir mergear o rebasear.</p>
    <p>Hacer fetch es seguro: nunca modifica tu árbol de trabajo o branch actual. Muchos usuarios prefieren <code>git fetch</code> seguido de un <code>git merge</code> o <code>git rebase</code> explícito sobre <code>git pull</code>, porque da un paso de previsualización claro. Usa <code>--all</code> para hacer fetch desde cada remoto configurado.</p>
    <p>En el uso diario, <code>git fetch</code> se integra con alias de shell. Para depurar, ejecuta con <code>GIT_TRACE=1</code>.</p><p>Entender cómo <code>git fetch</code> interactúa con el modelo de datos de Git rinde dividendos.</p>
    <h2>Opciones comunes</h2>
    <table>
      <thead><tr><th>Opción</th><th>Descripción</th></tr></thead>
      <tbody>
        <tr><td><code>--all</code></td><td>Hace fetch desde todos los remotos configurados.</td></tr>
        <tr><td><code>--prune</code> / <code>-p</code></td><td>Elimina refs de seguimiento remoto que ya no existen upstream.</td></tr>
        <tr><td><code>--tags</code></td><td>Descarga todos los tags del remoto.</td></tr>
        <tr><td><code>--depth=&lt;n&gt;</code></td><td>Limita la profundidad del historial descargado (crea/mantiene un clon shallow).</td></tr>
        <tr><td><code>--unshallow</code></td><td>Convierte un clon shallow en uno completo.</td></tr>
        <tr><td><code>--dry-run</code></td><td>Muestra lo que se descargaría.</td></tr>
        <tr><td><code>--force</code> / <code>-f</code></td><td>Permite actualizaciones no fast-forward de refs.</td></tr>
      </tbody>
    </table>
    <h2>Ejemplos</h2>
    <pre><code>git fetch
    # Actualiza refs de seguimiento remoto desde origin

    git fetch --all --prune
    # Actualiza desde cada remoto y limpia branches obsoletos

    git fetch upstream main
    # Descarga solo el branch main desde upstream

    git fetch --unshallow
    # Rellena el historial completo en un clon shallow</code></pre>
    <h2>Errores comunes</h2>
    <p>Confundir <code>git fetch</code> con <code>git pull</code> es común: fetch solo descarga, mientras que pull descarga y mergea. Olvidar <code>--prune</code> deja una larga lista de branches de seguimiento obsoletos con el tiempo. Configura <code>fetch.prune = true</code> globalmente para hacer pruning automático.</p>
    <h2>Comandos relacionados</h2>
    <p><code>git pull</code>, <code>git merge</code>, <code>git remote</code>, <code>git ls-remote</code></p>
- source_title: git pull — Fetch from and integrate with another repository
  title: git pull — Descargar e integrar con otro repositorio
  langcode: es
  body: |
    <h2>Sinopsis</h2>
    <pre><code>git pull [--rebase] [--ff-only] [&lt;remote&gt; [&lt;branch&gt;]]</code></pre>
    <h2>Descripción</h2>
    <p>El comando <code>git pull</code> es atajo para <code>git fetch</code> seguido de un paso de integración (merge por defecto, rebase opcionalmente). Actualiza tu branch actual para incorporar cambios de upstream. Muchos equipos prefieren configurar <code>pull.rebase = true</code> o usar <code>git pull --rebase</code> para mantener el historial lineal.</p>
    <p>Si tu branch y el upstream han divergido, <code>git pull</code> puede producir un merge commit. Con <code>--ff-only</code>, el pull fallará en lugar de crear un merge: útil cuando quieres asegurarte de que tu branch local solo está atrás, no divergente.</p>
    <p>En el uso diario, <code>git pull</code> se integra con alias de shell.</p><p>Entender cómo <code>git pull</code> interactúa con el modelo de datos de Git rinde dividendos.</p>
    <h2>Opciones comunes</h2>
    <table>
      <thead><tr><th>Opción</th><th>Descripción</th></tr></thead>
      <tbody>
        <tr><td><code>--rebase</code></td><td>Rebasea commits locales sobre los cambios descargados.</td></tr>
        <tr><td><code>--ff-only</code></td><td>Solo fast-forward; aborta si se necesitaría un merge.</td></tr>
        <tr><td><code>--no-ff</code></td><td>Siempre crea un merge commit.</td></tr>
        <tr><td><code>--all</code></td><td>Hace fetch desde todos los remotos antes de integrar.</td></tr>
        <tr><td><code>--autostash</code></td><td>Stashea cambios locales antes de pull y los reaplica después.</td></tr>
        <tr><td><code>--prune</code></td><td>Poda branches de seguimiento remoto obsoletos como parte del fetch.</td></tr>
      </tbody>
    </table>
    <h2>Ejemplos</h2>
    <pre><code>git pull
    # Predeterminado: fetch y merge desde upstream configurado

    git pull --rebase origin main
    # Rebasea commits locales sobre el último origin/main

    git pull --ff-only
    # Rechaza crear un merge commit

    git config --global pull.rebase true
    # Hace que rebase sea el predeterminado para cada pull</code></pre>
    <h2>Errores comunes</h2>
    <p>Hacer pull con cambios no commiteados puede hacer que Git rechace el merge. O bien commitea, stashea, o usa <code>--autostash</code>. Hacer pull en un branch que ha divergido a menudo produce merge commits inesperados. Usa <code>--ff-only</code> como red de seguridad o rebasea explícitamente.</p>
    <h2>Comandos relacionados</h2>
    <p><code>git fetch</code>, <code>git merge</code>, <code>git rebase</code>, <code>git push</code></p>
- source_title: git push — Update remote refs along with associated objects
  title: git push — Actualizar refs remotas junto con sus objetos asociados
  langcode: es
  body: |
    <h2>Sinopsis</h2>
    <pre><code>git push [&lt;remote&gt; [&lt;refspec&gt;...]] [--force-with-lease] [--tags] [--delete]</code></pre>
    <h2>Descripción</h2>
    <p>El comando <code>git push</code> envía commits locales a un repositorio remoto, actualizando los branches remotos para coincidir con los locales. El primer push de un nuevo branch típicamente requiere <code>-u</code> para configurar el seguimiento. Por defecto, push es no destructivo: rechaza sobrescribir historial remoto que no tienes localmente. Usa <code>--force-with-lease</code> cuando genuinamente necesites reescribir historial remoto (tras un rebase): nunca uses <code>--force</code> simple en branches compartidos.</p>
    <p>Push obedece reglas del lado del servidor: protecciones de branch, revisiones requeridas, commits firmados y hooks pre-receive pueden rechazar un push. Lee el mensaje de error con cuidado cuando esto pase.</p>
    <p>En el uso diario, <code>git push</code> se integra con alias de shell. Para depurar, ejecuta con <code>GIT_TRACE=1</code>.</p><p>Entender cómo <code>git push</code> interactúa con el modelo de datos de Git ayuda a evitar reescribir historial compartido.</p>
    <h2>Opciones comunes</h2>
    <table>
      <thead><tr><th>Opción</th><th>Descripción</th></tr></thead>
      <tbody>
        <tr><td><code>-u</code>, <code>--set-upstream</code></td><td>Establece upstream para predeterminados de futuros push/pull.</td></tr>
        <tr><td><code>--force-with-lease</code></td><td>Force push solo si la ref remota coincide con tu último valor descargado.</td></tr>
        <tr><td><code>--force</code> / <code>-f</code></td><td>Sobrescribe historial remoto a la fuerza (peligroso en branches compartidos).</td></tr>
        <tr><td><code>--tags</code></td><td>Pushea todos los tags locales.</td></tr>
        <tr><td><code>--delete</code></td><td>Elimina un branch remoto.</td></tr>
        <tr><td><code>--dry-run</code></td><td>Muestra lo que se pushearía.</td></tr>
        <tr><td><code>--all</code></td><td>Pushea todos los branches.</td></tr>
        <tr><td><code>--atomic</code></td><td>Actualización todo-o-nada de múltiples refs.</td></tr>
      </tbody>
    </table>
    <h2>Ejemplos</h2>
    <pre><code>git push -u origin feature/login
    # Primer push de un nuevo branch con seguimiento

    git push --force-with-lease
    # Alternativa más segura a --force tras rebase

    git push origin --delete old-feature
    # Elimina un branch remoto

    git push --tags
    # Publica todos los tags locales</code></pre>
    <h2>Errores comunes</h2>
    <p>El simple <code>--force</code> puede borrar commits de colegas. Usa <code>--force-with-lease</code> en su lugar. Pushear directamente a <code>main</code> evita la revisión de código en muchos equipos: configura protección de branch. Olvidar <code>-u</code> significa que comandos <code>git push</code> futuros necesitan argumentos explícitos.</p>
    <h2>Comandos relacionados</h2>
    <p><code>git fetch</code>, <code>git pull</code>, <code>git remote</code>, <code>git tag</code></p>
- source_title: git ls-remote — List references in a remote repository
  title: git ls-remote — Listar referencias en un repositorio remoto
  langcode: es
  body: |
    <h2>Sinopsis</h2>
    <pre><code>git ls-remote [--heads] [--tags] [&lt;repository&gt; [&lt;refs&gt;...]]</code></pre>
    <h2>Descripción</h2>
    <p>El comando <code>git ls-remote</code> consulta un remoto (sin clonar ni hacer fetch) e imprime el SHA-1 de cada ref junto al nombre de la ref. Es invaluable para scripting, pipelines de CI e inspección rápida: por ejemplo, encontrar el último tag en un remoto o verificar si un branch existe. Como no descarga objetos, es ligero y rápido incluso contra repositorios muy grandes.</p>
    <p>Puedes pasar una URL directamente sin configurar primero un remoto: <code>git ls-remote https://github.com/user/repo.git</code>. Esto lo hace ideal para inspección puntual o scripts de build que resuelven una versión "última".</p>
    <p>En el uso diario, <code>git ls-remote</code> se integra con scripts.</p><p>Entender cómo <code>git ls-remote</code> interactúa con el modelo de datos de Git ayuda a usarlo correctamente.</p>
    <h2>Opciones comunes</h2>
    <table>
      <thead><tr><th>Opción</th><th>Descripción</th></tr></thead>
      <tbody>
        <tr><td><code>--heads</code> / <code>-h</code></td><td>Limita la salida a refs de branch.</td></tr>
        <tr><td><code>--tags</code> / <code>-t</code></td><td>Limita la salida a refs de tag.</td></tr>
        <tr><td><code>--refs</code></td><td>Filtra el peel desreferenciado de tags anotados.</td></tr>
        <tr><td><code>--symref</code></td><td>Muestra a qué apuntan las refs simbólicas (como HEAD).</td></tr>
        <tr><td><code>--exit-code</code></td><td>Sale con código distinto de cero si no se encuentran refs coincidentes.</td></tr>
        <tr><td><code>--sort=&lt;key&gt;</code></td><td>Ordena resultados por versión, refname, etc.</td></tr>
      </tbody>
    </table>
    <h2>Ejemplos</h2>
    <pre><code>git ls-remote --heads origin
    # Lista todos los branches en origin con sus SHAs

    git ls-remote --tags --refs origin
    # Lista todos los tags (saltando ^{} dereferenciados)

    git ls-remote https://github.com/git/git.git HEAD
    # Muestra a qué apunta HEAD en un repo público

    git ls-remote --sort=-v:refname --tags origin 'v*' | head -1
    # Encuentra el tag semver más alto</code></pre>
    <h2>Errores comunes</h2>
    <p>Parsear la salida sin <code>--refs</code> muestra los tags anotados dos veces (una como objeto tag, otra como <code>name^{}</code> para el commit subyacente). Usa <code>--refs</code> para suprimir las líneas peeled. La autenticación puede fallar silenciosamente contra repos privados sin un asistente de credenciales: prueba interactivamente primero.</p>
    <h2>Comandos relacionados</h2>
    <p><code>git remote</code>, <code>git fetch</code>, <code>git tag</code>, <code>git for-each-ref</code></p>
- source_title: git log — Show commit history
  title: git log — Mostrar el historial de commits
  langcode: es
  body: |
    <h2>Sinopsis</h2>
    <pre><code>git log [&lt;options&gt;] [&lt;revision-range&gt;] [[--] &lt;path&gt;...]</code></pre>
    <h2>Descripción</h2>
        <p>El comando <code>git log</code> muestra el historial de commits alcanzable desde una o más refs (predeterminado HEAD). Es una de las herramientas más flexibles de Git, soportando filtrado por autor, fecha, contenido del mensaje, paths de archivo y más. Combinado con opciones de formato, puede producir salida adecuada para changelogs, auditorías y arqueología de código.</p>
        <p>Idiomas útiles incluyen <code>git log --oneline --graph --decorate --all</code> para una vista visual y compacta del historial entero, y <code>git log -p</code> para ver patches en línea. Argumentos pathspec restringen el log a commits que tocaron archivos específicos.</p>
        <p>En el uso diario, este comando se integra estrechamente con alias de shell, plugins de editor e integración continua. Los usuarios avanzados a menudo añaden alias que combinan los flags que siempre pasan. El formato de salida puede personalizarse vía configuración de Git. Cuando algo sale mal, ejecuta el comando con <code>GIT_TRACE=1</code> para revelar las llamadas plumbing subyacentes.</p><p>Entender cómo este comando interactúa con el resto del modelo de datos de Git rinde dividendos. Cada comando opera sobre algún subconjunto de las piezas (objetos, index, refs, árbol de trabajo), y saber cuáles toca ayuda a predecir resultados y a recuperarse de errores.</p>
        <h2>Opciones comunes</h2>
    <table>
      <thead><tr><th>Opción</th><th>Descripción</th></tr></thead>
      <tbody>
        <tr><td><code>--oneline</code></td><td>One commit per line, abbreviated SHA + subject.</td></tr>
        <tr><td><code>--graph</code></td><td>ASCII art of branch and merge structure.</td></tr>
        <tr><td><code>--all</code></td><td>Include all refs, not just HEAD.</td></tr>
        <tr><td><code>-p</code>, <code>--patch</code></td><td>Show diffs alongside each commit.</td></tr>
        <tr><td><code>--stat</code></td><td>Show changed-file statistics.</td></tr>
        <tr><td><code>--author=&lt;pattern&gt;</code></td><td>Filter by author.</td></tr>
        <tr><td><code>--since</code> / <code>--until</code></td><td>Filter by date.</td></tr>
        <tr><td><code>-S &lt;string&gt;</code></td><td>Pickaxe: find commits that add/remove this string.</td></tr>
        <tr><td><code>--follow</code></td><td>Track a single file's history across renames.</td></tr>
      </tbody>
    </table>
    <h2>Ejemplos</h2>
    <pre><code>git log --oneline --graph --decorate --all
    # Compact visual history of everything

    git log -p src/auth.py
    # Full diffs of every commit touching auth.py

    git log -S "TODO" --since="2 weeks ago"
    # Find recent commits that added or removed "TODO"

    git log --author="alice" --pretty=format:"%h %s" -n 20
    # Last 20 commits by alice in custom format</code></pre>
    <h2>Errores comunes</h2>
    <p>Forgetting that <code>git log file.txt</code> only shows commits where <code>file.txt</code> existed — use <code>--follow</code> if it has been renamed. Over-relying on <code>--grep</code> when you really want <code>-S</code> (which searches diffs, not messages). And on huge repos, <code>git log -p</code> without a path can produce gigabytes of output.</p>
    <h2>Comandos relacionados</h2>
    <p><code>git show</code>, <code>git blame</code>, <code>git shortlog</code>, <code>git diff</code></p>
- source_title: git show — Show various types of objects
  title: git show — Mostrar varios tipos de objetos
  langcode: es
  body: |
    <h2>Sinopsis</h2>
    <pre><code>git show [&lt;options&gt;] [&lt;object&gt;...]</code></pre>
    <h2>Descripción</h2>
        <p>El comando <code>git show</code> muestra información sobre objetos Git: commits (con diff), tags (anotación + objeto etiquetado), trees (listado de archivos) o blobs (contenido de archivos). Sin argumentos, muestra el commit más reciente. Con un argumento de path, muestra el archivo como existía en una revisión específica.</p>
        <p><code>git show</code> es la herramienta de referencia para inspeccionar un único commit en detalle. A diferencia de <code>git log -1 -p</code>, formatea naturalmente tanto tags anotados como listados de tree, lo que lo hace útil para examinar tags de release o extraer contenido de archivos históricos.</p>
        <p>En el uso diario, este comando se integra estrechamente con alias de shell, plugins de editor e integración continua. Los usuarios avanzados a menudo añaden alias que combinan los flags que siempre pasan. El formato de salida puede personalizarse vía configuración de Git. Cuando algo sale mal, ejecuta el comando con <code>GIT_TRACE=1</code> para revelar las llamadas plumbing subyacentes.</p><p>Entender cómo este comando interactúa con el resto del modelo de datos de Git rinde dividendos. Cada comando opera sobre algún subconjunto de las piezas (objetos, index, refs, árbol de trabajo), y saber cuáles toca ayuda a predecir resultados y a recuperarse de errores.</p>
        <h2>Opciones comunes</h2>
    <table>
      <thead><tr><th>Opción</th><th>Descripción</th></tr></thead>
      <tbody>
        <tr><td><code>--stat</code></td><td>Add a diffstat summary.</td></tr>
        <tr><td><code>--name-only</code></td><td>List only changed file names.</td></tr>
        <tr><td><code>--pretty=&lt;fmt&gt;</code></td><td>Choose format: <code>oneline</code>, <code>short</code>, <code>full</code>, custom.</td></tr>
        <tr><td><code>-s</code>, <code>--no-patch</code></td><td>Suppress the diff.</td></tr>
        <tr><td><code>--show-signature</code></td><td>Verify and display GPG signatures.</td></tr>
        <tr><td><code>--word-diff</code></td><td>Highlight changes at the word level.</td></tr>
      </tbody>
    </table>
    <h2>Ejemplos</h2>
    <pre><code>git show HEAD
    # Latest commit with diff

    git show v2.0.0
    # Show an annotated tag

    git show HEAD:src/main.c
    # Display the file as it was at HEAD

    git show --stat abc123
    # Just the diffstat for a specific commit</code></pre>
    <h2>Errores comunes</h2>
    <p>Confusing <code>git show HEAD~1</code> (one commit before HEAD) with <code>git show HEAD^1</code> (first parent of HEAD) — they're equivalent on linear history but differ on merges. Also note <code>git show HEAD:file</code> uses a colon, not a space, to specify a file at a revision.</p>
    <h2>Comandos relacionados</h2>
    <p><code>git log</code>, <code>git diff</code>, <code>git cat-file</code>, <code>git blame</code></p>
- source_title: git blame — Show what revision and author last modified each line
  title: git blame — Mostrar qué revisión y autor modificó por última vez cada línea
  langcode: es
  body: |
    <h2>Sinopsis</h2>
    <pre><code>git blame [-L &lt;range&gt;] [-w] [-M] [-C] &lt;file&gt;</code></pre>
    <h2>Descripción</h2>
        <p>El comando <code>git blame</code> anota cada línea de un archivo con el commit, autor y timestamp que la tocó por última vez. Es invaluable para entender por qué una pieza de código se ve como se ve, quién la introdujo y cuándo. A pesar del nombre acusatorio, blame se usa principalmente como herramienta de investigación, no como medio para señalar culpables.</p>
        <p>Blame puede seguir código a medida que se movió o copió (con <code>-M</code> y <code>-C</code>), y puede ignorar commits solo de espacios o solo de formato si mantienes un archivo <code>.git-blame-ignore-revs</code> referenciado vía <code>blame.ignoreRevsFile</code>.</p>
        <p>En el uso diario, este comando se integra estrechamente con alias de shell, plugins de editor e integración continua. Los usuarios avanzados a menudo añaden alias que combinan los flags que siempre pasan. El formato de salida puede personalizarse vía configuración de Git. Cuando algo sale mal, ejecuta el comando con <code>GIT_TRACE=1</code> para revelar las llamadas plumbing subyacentes.</p><p>Entender cómo este comando interactúa con el resto del modelo de datos de Git rinde dividendos. Cada comando opera sobre algún subconjunto de las piezas (objetos, index, refs, árbol de trabajo), y saber cuáles toca ayuda a predecir resultados y a recuperarse de errores.</p>
        <h2>Opciones comunes</h2>
    <table>
      <thead><tr><th>Opción</th><th>Descripción</th></tr></thead>
      <tbody>
        <tr><td><code>-L &lt;start&gt;,&lt;end&gt;</code></td><td>Restrict blame to a line range.</td></tr>
        <tr><td><code>-w</code></td><td>Ignore whitespace changes.</td></tr>
        <tr><td><code>-M</code></td><td>Detect lines moved within a file.</td></tr>
        <tr><td><code>-C</code></td><td>Detect lines copied from other files (repeat for stronger detection).</td></tr>
        <tr><td><code>--since=&lt;date&gt;</code></td><td>Stop annotating earlier than this date.</td></tr>
        <tr><td><code>-e</code>, <code>--show-email</code></td><td>Show author email instead of name.</td></tr>
        <tr><td><code>--ignore-revs-file &lt;file&gt;</code></td><td>Skip listed revisions when assigning blame.</td></tr>
      </tbody>
    </table>
    <h2>Ejemplos</h2>
    <pre><code>git blame src/parser.c
    # Annotate every line

    git blame -L 50,100 src/parser.c
    # Just lines 50 through 100

    git blame -w -M -C README.md
    # Ignore whitespace and detect moves/copies

    git blame --ignore-revs-file .git-blame-ignore-revs file.js
    # Skip noisy formatting commits</code></pre>
    <h2>Errores comunes</h2>
    <p>Using blame to assign fault rather than to investigate context creates a hostile culture. Pair blame with <code>git log</code> on the offending commit to read the full message and intent. After mass formatting, set up <code>.git-blame-ignore-revs</code> so blame still points to meaningful authors.</p>
    <h2>Comandos relacionados</h2>
    <p><code>git log -L</code>, <code>git log -S</code>, <code>git show</code>, <code>git annotate</code></p>
- source_title: git bisect — Use binary search to find the commit that introduced a bug
  title: git bisect — Usar búsqueda binaria para encontrar el commit que introdujo un bug
  langcode: es
  body: |
    <h2>Sinopsis</h2>
    <pre><code>git bisect start
    git bisect good &lt;commit&gt;
    git bisect bad &lt;commit&gt;
    git bisect run &lt;script&gt;
    git bisect reset</code></pre>
    <h2>Descripción</h2>
        <p>El comando <code>git bisect</code> realiza una búsqueda binaria a través del historial de commits para identificar exactamente qué commit introdujo un bug. Empiezas marcando un commit conocido como malo (a menudo HEAD) y un commit conocido como bueno (quizás un tag de release), luego Git hace checkout de un punto medio y te pide probar. Respondes good o bad, Git reduce el rango y repites hasta encontrar el commit ofensor.</p>
        <p>Si tienes un test automatizado o reproductor, <code>git bisect run</code> automatiza el proceso entero: Git invoca tu script en cada paso. Hacer bisect a través de mil commits típicamente toma alrededor de diez iteraciones.</p>
        <p>En el uso diario, este comando se integra estrechamente con alias de shell, plugins de editor e integración continua. Los usuarios avanzados a menudo añaden alias que combinan los flags que siempre pasan. El formato de salida puede personalizarse vía configuración de Git. Cuando algo sale mal, ejecuta el comando con <code>GIT_TRACE=1</code> para revelar las llamadas plumbing subyacentes.</p><p>Entender cómo este comando interactúa con el resto del modelo de datos de Git rinde dividendos. Cada comando opera sobre algún subconjunto de las piezas (objetos, index, refs, árbol de trabajo), y saber cuáles toca ayuda a predecir resultados y a recuperarse de errores.</p>
        <h2>Opciones comunes</h2>
    <table>
      <thead><tr><th>Subcomando</th><th>Descripción</th></tr></thead>
      <tbody>
        <tr><td><code>start</code></td><td>Begin a bisect session.</td></tr>
        <tr><td><code>good</code> / <code>bad</code></td><td>Mark the current (or specified) commit.</td></tr>
        <tr><td><code>skip</code></td><td>Mark a commit as untestable.</td></tr>
        <tr><td><code>run &lt;cmd&gt;</code></td><td>Automate by running a command (exit 0 = good, non-zero = bad).</td></tr>
        <tr><td><code>reset</code></td><td>End the session and return to the original branch.</td></tr>
        <tr><td><code>log</code></td><td>Show the bisect log.</td></tr>
        <tr><td><code>visualize</code></td><td>Show remaining suspect commits.</td></tr>
      </tbody>
    </table>
    <h2>Ejemplos</h2>
    <pre><code>git bisect start
    git bisect bad HEAD
    git bisect good v1.5.0
    # Git checks out a midpoint; test it, then:
    git bisect good   # or: git bisect bad

    git bisect run npm test
    # Fully automated: npm test exit codes drive the search

    git bisect reset
    # Return to your original branch</code></pre>
    <h2>Errores comunes</h2>
    <p>Forgetting to <code>git bisect reset</code> leaves you in a detached HEAD state. Marking a commit "good" when the bug is intermittent leads bisect astray — use <code>skip</code> instead. Make sure your test script returns exit code 125 to signal "skip" if the build itself is broken at that commit.</p>
    <h2>Comandos relacionados</h2>
    <p><code>git log</code>, <code>git blame</code>, <code>git show</code>, <code>git checkout</code></p>
- source_title: git grep — Search tracked files for a pattern
  title: git grep — Buscar un patrón en archivos rastreados
  langcode: es
  body: |
    <h2>Sinopsis</h2>
    <pre><code>git grep [&lt;options&gt;] &lt;pattern&gt; [&lt;tree-ish&gt;...]</code></pre>
    <h2>Descripción</h2>
        <p>El comando <code>git grep</code> busca un patrón en archivos rastreados por Git. Es mucho más rápido que <code>grep -r</code> en repositorios grandes porque solo busca lo que Git conoce (saltándose <code>.git</code>, salidas de build y archivos ignorados) y usa la base de datos de objetos optimizada de Git. También puedes buscar cualquier revisión histórica o tree, no solo la copia de trabajo.</p>
        <p>Los patrones pueden ser cadenas planas, regex básico (predeterminado), regex extendido (<code>-E</code>) o PCRE (<code>-P</code> si está compilado). Usa <code>git grep</code> en lugar de <code>grep -r</code> en scripts que operan sobre repositorios Git.</p>
        <p>En el uso diario, este comando se integra estrechamente con alias de shell, plugins de editor e integración continua. Los usuarios avanzados a menudo añaden alias que combinan los flags que siempre pasan. El formato de salida puede personalizarse vía configuración de Git. Cuando algo sale mal, ejecuta el comando con <code>GIT_TRACE=1</code> para revelar las llamadas plumbing subyacentes.</p><p>Entender cómo este comando interactúa con el resto del modelo de datos de Git rinde dividendos. Cada comando opera sobre algún subconjunto de las piezas (objetos, index, refs, árbol de trabajo), y saber cuáles toca ayuda a predecir resultados y a recuperarse de errores.</p>
        <h2>Opciones comunes</h2>
    <table>
      <thead><tr><th>Opción</th><th>Descripción</th></tr></thead>
      <tbody>
        <tr><td><code>-i</code></td><td>Case-insensitive match.</td></tr>
        <tr><td><code>-n</code></td><td>Show line numbers.</td></tr>
        <tr><td><code>-l</code></td><td>List only matching file names.</td></tr>
        <tr><td><code>-E</code></td><td>Extended regular expressions.</td></tr>
        <tr><td><code>-P</code></td><td>Perl-compatible regex.</td></tr>
        <tr><td><code>-w</code></td><td>Match whole words.</td></tr>
        <tr><td><code>--cached</code></td><td>Search the index instead of the working tree.</td></tr>
        <tr><td><code>--untracked</code></td><td>Also search untracked, non-ignored files.</td></tr>
      </tbody>
    </table>
    <h2>Ejemplos</h2>
    <pre><code>git grep "TODO"
    # Find every TODO in tracked files

    git grep -n -i "deprecated" src/
    # Case-insensitive, with line numbers, under src/

    git grep "fooBar" v1.0.0
    # Search the v1.0.0 tag's tree

    git grep -E "^(import|from) " --and -e "json"
    # Combined patterns: lines starting with import/from that mention json</code></pre>
    <h2>Errores comunes</h2>
    <p>Forgetting that <code>git grep</code> only searches tracked files — newly added files won't appear unless staged or you pass <code>--untracked</code>. PCRE features (<code>\b</code>, lookbehind) require Git built with PCRE support and the <code>-P</code> flag.</p>
    <h2>Comandos relacionados</h2>
    <p><code>git log -S</code>, <code>git log -G</code>, <code>git ls-files</code>, <code>git show</code></p>
- source_title: git shortlog — Summarize git log output
  title: git shortlog — Resumir la salida de git log
  langcode: es
  body: |
    <h2>Sinopsis</h2>
    <pre><code>git shortlog [-n] [-s] [-e] [&lt;revision-range&gt;]</code></pre>
    <h2>Descripción</h2>
        <p>El comando <code>git shortlog</code> agrupa commits por autor, produciendo resúmenes concisos adecuados para notas de release, listas de contribuyentes y vistazos rápidos de quién hizo qué. Por defecto imprime el nombre de cada autor seguido de las líneas de asunto de sus commits en el rango dado.</p>
        <p>Modos comunes incluyen <code>-sn</code> (resumen, ordenado por conteo) para listas de top contribuyentes y <code>--no-merges</code> para ignorar merge commits. Combinado con un rango como <code>v1.0..v2.0</code>, shortlog es la forma más rápida de redactar créditos de notas de release.</p>
        <p>En el uso diario, este comando se integra estrechamente con alias de shell, plugins de editor e integración continua. Los usuarios avanzados a menudo añaden alias que combinan los flags que siempre pasan. El formato de salida puede personalizarse vía configuración de Git. Cuando algo sale mal, ejecuta el comando con <code>GIT_TRACE=1</code> para revelar las llamadas plumbing subyacentes.</p><p>Entender cómo este comando interactúa con el resto del modelo de datos de Git rinde dividendos. Cada comando opera sobre algún subconjunto de las piezas (objetos, index, refs, árbol de trabajo), y saber cuáles toca ayuda a predecir resultados y a recuperarse de errores.</p>
        <h2>Opciones comunes</h2>
    <table>
      <thead><tr><th>Opción</th><th>Descripción</th></tr></thead>
      <tbody>
        <tr><td><code>-s</code>, <code>--summary</code></td><td>Show only counts per author.</td></tr>
        <tr><td><code>-n</code>, <code>--numbered</code></td><td>Sort authors by commit count.</td></tr>
        <tr><td><code>-e</code>, <code>--email</code></td><td>Include author email addresses.</td></tr>
        <tr><td><code>--no-merges</code></td><td>Exclude merge commits.</td></tr>
        <tr><td><code>--group=&lt;type&gt;</code></td><td>Group by author, committer, or trailer.</td></tr>
        <tr><td><code>-w[&lt;width&gt;]</code></td><td>Wrap subject lines.</td></tr>
      </tbody>
    </table>
    <h2>Ejemplos</h2>
    <pre><code>git shortlog -sn
    # Top contributors all-time, with counts

    git shortlog -sne v1.0..v2.0
    # Contributors between two releases, with emails

    git shortlog --no-merges HEAD~50..HEAD
    # Subjects grouped by author for the last 50 commits

    git shortlog --group=trailer:co-authored-by
    # Group by Co-authored-by trailer</code></pre>
    <h2>Errores comunes</h2>
    <p>Multiple commit identities for the same person (different emails, different name capitalizations) inflate the contributor count. A <code>.mailmap</code> file at the repo root canonicalizes them. Forgetting <code>--no-merges</code> can attribute many merge commits to project maintainers.</p>
    <h2>Comandos relacionados</h2>
    <p><code>git log</code>, <code>git blame</code>, <code>git describe</code>, <code>git tag</code></p>
- source_title: git describe — Describe a commit using the most recent reachable tag
  title: git describe — Describir un commit usando el tag alcanzable más reciente
  langcode: es
  body: |
    <h2>Sinopsis</h2>
    <pre><code>git describe [--tags] [--always] [--dirty] [&lt;commit&gt;]</code></pre>
    <h2>Descripción</h2>
        <p>El comando <code>git describe</code> produce un nombre legible por humanos para un commit basado en el tag alcanzable más reciente. La salida luce como <code>v1.4.2-13-gabc1234</code>, lo que significa 13 commits despues del tag v1.4.2, en SHA abc1234. Si el commit está exactamente en un tag, solo se imprime el nombre del tag.</p>
        <p>Los sistemas de build usan <code>git describe</code> para incrustar cadenas de versión en los binarios. Con <code>--dirty</code>, la salida incluye un sufijo <code>-dirty</code> cuando el árbol de trabajo tiene cambios no commiteados, perfecto para marcar builds de desarrollo.</p>
        <p>En el uso diario, este comando se integra estrechamente con alias de shell, plugins de editor e integración continua. Los usuarios avanzados a menudo añaden alias que combinan los flags que siempre pasan. El formato de salida puede personalizarse vía configuración de Git. Cuando algo sale mal, ejecuta el comando con <code>GIT_TRACE=1</code> para revelar las llamadas plumbing subyacentes.</p><p>Entender cómo este comando interactúa con el resto del modelo de datos de Git rinde dividendos. Cada comando opera sobre algún subconjunto de las piezas (objetos, index, refs, árbol de trabajo), y saber cuáles toca ayuda a predecir resultados y a recuperarse de errores.</p>
        <h2>Opciones comunes</h2>
    <table>
      <thead><tr><th>Opción</th><th>Descripción</th></tr></thead>
      <tbody>
        <tr><td><code>--tags</code></td><td>Use lightweight tags as well as annotated.</td></tr>
        <tr><td><code>--always</code></td><td>Fall back to abbreviated SHA if no tag is reachable.</td></tr>
        <tr><td><code>--dirty[=&lt;mark&gt;]</code></td><td>Append a marker if the working tree is dirty.</td></tr>
        <tr><td><code>--long</code></td><td>Always show the long format, even when at a tag.</td></tr>
        <tr><td><code>--match &lt;pattern&gt;</code></td><td>Only consider tags matching a glob.</td></tr>
        <tr><td><code>--abbrev=&lt;n&gt;</code></td><td>Use <code>n</code> hex digits for the SHA.</td></tr>
        <tr><td><code>--contains</code></td><td>Show the earliest tag that contains the commit.</td></tr>
      </tbody>
    </table>
    <h2>Ejemplos</h2>
    <pre><code>git describe
    # e.g. v2.1.0-3-g1a2b3c4

    git describe --tags --dirty --always
    # Robust version string for build scripts

    git describe --match 'v[0-9]*'
    # Only consider semver-style tags

    git describe --contains abc123
    # Find the first release that includes a commit</code></pre>
    <h2>Errores comunes</h2>
    <p>If your repo has only lightweight (non-annotated) tags, plain <code>git describe</code> says "fatal: No names found." Use <code>--tags</code>. Shallow clones may have no reachable tags at all — fetch tags explicitly with <code>git fetch --tags</code>.</p>
    <h2>Comandos relacionados</h2>
    <p><code>git tag</code>, <code>git log</code>, <code>git rev-parse</code>, <code>git show</code></p>
- source_title: git restore — Restore working tree files
  title: git restore — Restaurar archivos del árbol de trabajo
  langcode: es
  body: |
    <h2>Sinopsis</h2>
    <pre><code>git restore [--staged] [--source=&lt;tree&gt;] [-p] &lt;pathspec&gt;...</code></pre>
    <h2>Descripción</h2>
        <p>El comando <code>git restore</code>, introducido en Git 2.23, reemplaza la mitad de restauración de archivos de <code>git checkout</code>. Restaura archivos en el árbol de trabajo (predeterminado) o el index desde una fuente como HEAD, otro commit, o el index. A diferencia de <code>checkout</code>, no cambia branches.</p>
        <p>Las invocaciones más comunes son <code>git restore &lt;file&gt;</code> para descartar cambios no staged en un archivo, y <code>git restore --staged &lt;file&gt;</code> para quitar staging. Estas son operaciones diarias que solían requerir comandos más complicados.</p>
        <p>En el uso diario, este comando se integra estrechamente con alias de shell, plugins de editor e integración continua. Los usuarios avanzados a menudo añaden alias que combinan los flags que siempre pasan. El formato de salida puede personalizarse vía configuración de Git. Cuando algo sale mal, ejecuta el comando con <code>GIT_TRACE=1</code> para revelar las llamadas plumbing subyacentes.</p><p>Entender cómo este comando interactúa con el resto del modelo de datos de Git rinde dividendos. Cada comando opera sobre algún subconjunto de las piezas (objetos, index, refs, árbol de trabajo), y saber cuáles toca ayuda a predecir resultados y a recuperarse de errores.</p>
        <h2>Opciones comunes</h2>
    <table>
      <thead><tr><th>Opción</th><th>Descripción</th></tr></thead>
      <tbody>
        <tr><td><code>--staged</code></td><td>Restore the index instead of the working tree (i.e., unstage).</td></tr>
        <tr><td><code>--worktree</code></td><td>Restore the working tree (default).</td></tr>
        <tr><td><code>--source=&lt;tree&gt;</code> / <code>-s</code></td><td>Restore from a specific commit, branch, or tag.</td></tr>
        <tr><td><code>-p</code>, <code>--patch</code></td><td>Interactively pick hunks to restore.</td></tr>
        <tr><td><code>--ours</code> / <code>--theirs</code></td><td>During a conflict, restore one side.</td></tr>
        <tr><td><code>-q</code>, <code>--quiet</code></td><td>Suppress progress.</td></tr>
      </tbody>
    </table>
    <h2>Ejemplos</h2>
    <pre><code>git restore src/main.c
    # Discard unstaged changes in main.c

    git restore --staged config.yml
    # Unstage a file (keep working-tree changes)

    git restore --source=HEAD~3 README.md
    # Bring back README.md as it was 3 commits ago

    git restore -p
    # Interactively pick hunks to discard</code></pre>
    <h2>Errores comunes</h2>
    <p><code>git restore</code> on a file with unsaved changes silently overwrites them — there is no confirmation prompt and no easy undo. Stash first if uncertain. Beginners sometimes confuse <code>--staged</code> with <code>git reset --hard</code>; <code>--staged</code> only touches the index, leaving working-tree edits intact.</p>
    <h2>Comandos relacionados</h2>
    <p><code>git reset</code>, <code>git checkout</code>, <code>git stash</code>, <code>git revert</code></p>
- source_title: git reset — Reset current HEAD to a specified state
  title: git reset — Resetear HEAD actual a un estado especificado
  langcode: es
  body: |
    <h2>Sinopsis</h2>
    <pre><code>git reset [--soft | --mixed | --hard] [&lt;commit&gt;]
    git reset [&lt;commit&gt;] [--] &lt;pathspec&gt;...</code></pre>
    <h2>Descripción</h2>
        <p>El comando <code>git reset</code> mueve el puntero del branch actual a un commit especificado y opcionalmente actualiza el index y el árbol de trabajo. Es uno de los comandos más poderosos y peligrosos de Git: <code>--hard</code> puede destruir trabajo no commiteado.</p>
        <p>Tres modos: <code>--soft</code> (solo mueve HEAD), <code>--mixed</code> (predeterminado: mueve HEAD y resetea index), <code>--hard</code> (mueve HEAD, resetea index y árbol de trabajo). El reflog conserva el HEAD anterior durante 90 días, así que la mayoría de errores son recuperables.</p>
        <p>En el uso diario, este comando se integra estrechamente con alias de shell, plugins de editor e integración continua. Los usuarios avanzados a menudo añaden alias que combinan los flags que siempre pasan. El formato de salida puede personalizarse vía configuración de Git. Cuando algo sale mal, ejecuta el comando con <code>GIT_TRACE=1</code> para revelar las llamadas plumbing subyacentes.</p><p>Entender cómo este comando interactúa con el resto del modelo de datos de Git rinde dividendos. Cada comando opera sobre algún subconjunto de las piezas (objetos, index, refs, árbol de trabajo), y saber cuáles toca ayuda a predecir resultados y a recuperarse de errores.</p>
        <h2>Opciones comunes</h2>
    <table>
      <thead><tr><th>Opción</th><th>Descripción</th></tr></thead>
      <tbody>
        <tr><td><code>--soft</code></td><td>Move HEAD only; index and working tree unchanged.</td></tr>
        <tr><td><code>--mixed</code> (default)</td><td>Move HEAD and reset the index; working tree unchanged.</td></tr>
        <tr><td><code>--hard</code></td><td>Move HEAD, reset index, and overwrite working tree.</td></tr>
        <tr><td><code>--keep</code></td><td>Like <code>--hard</code>, but abort if local changes would be lost.</td></tr>
        <tr><td><code>--merge</code></td><td>Reset the index and updates files that differ between HEAD and target, keeping local merges.</td></tr>
        <tr><td><code>-p</code></td><td>Interactively select hunks to unstage.</td></tr>
      </tbody>
    </table>
    <h2>Ejemplos</h2>
    <pre><code>git reset HEAD~1
    # Move back one commit; keep changes in working tree

    git reset --soft HEAD~3
    # Combine the last 3 commits into a single staged change

    git reset --hard origin/main
    # Discard ALL local commits and changes (dangerous)

    git reset HEAD config.yml
    # Unstage a single file (older syntax for git restore --staged)</code></pre>
    <h2>Errores comunes</h2>
    <p><code>git reset --hard</code> on a branch with unpushed commits loses them. Reflog can save you within ~90 days, but only if you know to look. Confusing <code>git reset HEAD file</code> (unstage) with <code>git reset --hard</code> (nuke) is a classic beginner footgun. Modern Git provides <code>git restore --staged</code> as a clearer alternative.</p>
    <h2>Comandos relacionados</h2>
    <p><code>git restore</code>, <code>git revert</code>, <code>git reflog</code>, <code>git stash</code></p>
- source_title: git revert — Create a new commit that undoes earlier commits
  title: git revert — Crear un nuevo commit que deshace commits anteriores
  langcode: es
  body: |
    <h2>Sinopsis</h2>
    <pre><code>git revert [-n] [-m &lt;parent&gt;] &lt;commit&gt;...</code></pre>
    <h2>Descripción</h2>
        <p>El comando <code>git revert</code> crea un nuevo commit que deshace los cambios introducidos por un commit anterior. A diferencia de <code>reset</code>, no reescribe el historial, lo que lo hace seguro de usar en branches compartidos. El resultado es un commit limpio que puede ser pusheado y revisado normalmente.</p>
        <p>Hacer revert de un merge commit requiere especificar qué padre tratar como mainline con <code>-m 1</code>. Hacer revert de un revert es la forma común de rehacer un cambio.</p>
        <p>En el uso diario, este comando se integra estrechamente con alias de shell, plugins de editor e integración continua. Los usuarios avanzados a menudo añaden alias que combinan los flags que siempre pasan. El formato de salida puede personalizarse vía configuración de Git. Cuando algo sale mal, ejecuta el comando con <code>GIT_TRACE=1</code> para revelar las llamadas plumbing subyacentes.</p><p>Entender cómo este comando interactúa con el resto del modelo de datos de Git rinde dividendos. Cada comando opera sobre algún subconjunto de las piezas (objetos, index, refs, árbol de trabajo), y saber cuáles toca ayuda a predecir resultados y a recuperarse de errores.</p>
        <h2>Opciones comunes</h2>
    <table>
      <thead><tr><th>Opción</th><th>Descripción</th></tr></thead>
      <tbody>
        <tr><td><code>-n</code>, <code>--no-commit</code></td><td>Stage the inverse changes without committing.</td></tr>
        <tr><td><code>-m &lt;parent-number&gt;</code></td><td>Mainline parent for reverting a merge.</td></tr>
        <tr><td><code>--continue</code></td><td>Resume after resolving conflicts.</td></tr>
        <tr><td><code>--abort</code></td><td>Cancel an in-progress revert.</td></tr>
        <tr><td><code>--skip</code></td><td>Skip the current commit and move on.</td></tr>
        <tr><td><code>-e</code>, <code>--edit</code></td><td>Edit the revert commit message.</td></tr>
      </tbody>
    </table>
    <h2>Ejemplos</h2>
    <pre><code>git revert HEAD
    # Undo the most recent commit with a new commit

    git revert abc123..def456
    # Revert a range of commits

    git revert -m 1 merge-sha
    # Revert a merge commit, keeping mainline

    git revert -n HEAD~2
    # Stage an inverse without committing yet</code></pre>
    <h2>Errores comunes</h2>
    <p>Reverting a merge prevents future re-merging of the same branch unless you also revert the revert. Plan accordingly when reverting feature merges. Conflicts during revert require <code>--continue</code> or <code>--abort</code>, just like rebase.</p>
    <h2>Comandos relacionados</h2>
    <p><code>git reset</code>, <code>git restore</code>, <code>git cherry-pick</code>, <code>git log</code></p>
- source_title: git clean — Remove untracked files from the working tree
  title: git clean — Eliminar archivos no rastreados del árbol de trabajo
  langcode: es
  body: |
    <h2>Sinopsis</h2>
    <pre><code>git clean [-d] [-f] [-x | -X] [-n] [-i] [&lt;path&gt;...]</code></pre>
    <h2>Descripción</h2>
        <p>El comando <code>git clean</code> elimina archivos no rastreados del árbol de trabajo. Es destructivo: nunca afecta archivos rastreados pero borra cualquier cosa no rastreada o ignorada. Por defecto se rehúsa a ejecutar a menos que pases <code>-f</code> (force).</p>
        <p>Combinaciones comunes: <code>-fd</code> (force, incluyendo directorios), <code>-fdx</code> (también ignora archivos), <code>-n</code> (dry-run para previsualizar). Siempre usa <code>-n</code> primero para asegurarte de que no perderás trabajo importante.</p>
        <p>En el uso diario, este comando se integra estrechamente con alias de shell, plugins de editor e integración continua. Los usuarios avanzados a menudo añaden alias que combinan los flags que siempre pasan. El formato de salida puede personalizarse vía configuración de Git. Cuando algo sale mal, ejecuta el comando con <code>GIT_TRACE=1</code> para revelar las llamadas plumbing subyacentes.</p><p>Entender cómo este comando interactúa con el resto del modelo de datos de Git rinde dividendos. Cada comando opera sobre algún subconjunto de las piezas (objetos, index, refs, árbol de trabajo), y saber cuáles toca ayuda a predecir resultados y a recuperarse de errores.</p>
        <h2>Opciones comunes</h2>
    <table>
      <thead><tr><th>Opción</th><th>Descripción</th></tr></thead>
      <tbody>
        <tr><td><code>-f</code>, <code>--force</code></td><td>Required to actually delete (unless config disables this).</td></tr>
        <tr><td><code>-n</code>, <code>--dry-run</code></td><td>Show what would be deleted, don't delete.</td></tr>
        <tr><td><code>-d</code></td><td>Also remove untracked directories.</td></tr>
        <tr><td><code>-x</code></td><td>Also remove ignored files.</td></tr>
        <tr><td><code>-X</code></td><td>Remove only ignored files.</td></tr>
        <tr><td><code>-i</code>, <code>--interactive</code></td><td>Interactive selection.</td></tr>
        <tr><td><code>-e &lt;pattern&gt;</code></td><td>Exclude files matching pattern.</td></tr>
      </tbody>
    </table>
    <h2>Ejemplos</h2>
    <pre><code>git clean -nd
    # Preview what would be deleted (dirs included)

    git clean -fd
    # Actually delete untracked files and directories

    git clean -fdx
    # Plus ignored files (full reset to pristine)

    git clean -i
    # Interactive: choose what to delete</code></pre>
    <h2>Errores comunes</h2>
    <p><code>git clean -fdx</code> wipes <code>node_modules</code>, build artifacts, IDE settings, and even <code>.env</code> files if they're gitignored. Always preview with <code>-n</code> first. Be especially careful in submodules — clean operates per-repository.</p>
    <h2>Comandos relacionados</h2>
    <p><code>git status</code>, <code>git stash</code>, <code>git reset</code>, <code>git rm</code></p>
- source_title: git stash — Save changes for later
  title: git stash — Guardar cambios para más tarde
  langcode: es
  body: |
    <h2>Sinopsis</h2>
    <pre><code>git stash [push [-m &lt;msg&gt;] [-u]]
    git stash pop [&lt;stash&gt;]
    git stash list
    git stash drop [&lt;stash&gt;]</code></pre>
    <h2>Descripción</h2>
        <p>El comando <code>git stash</code> guarda tus modificaciones no commiteadas (staged y no staged) en una pila, dejando un árbol de trabajo limpio. Esto es útil cuando necesitas cambiar de branch o hacer pull pero no estás listo para commitear.</p>
        <p>El stash es una pila local: cada <code>git stash</code> empuja una nueva entrada (<code>stash@{0}</code>, <code>stash@{1}</code>, ...). Recupera con <code>git stash pop</code> (aplicar y borrar) o <code>git stash apply</code> (aplicar manteniendo la entrada).</p>
        <p>En el uso diario, este comando se integra estrechamente con alias de shell, plugins de editor e integración continua. Los usuarios avanzados a menudo añaden alias que combinan los flags que siempre pasan. El formato de salida puede personalizarse vía configuración de Git. Cuando algo sale mal, ejecuta el comando con <code>GIT_TRACE=1</code> para revelar las llamadas plumbing subyacentes.</p><p>Entender cómo este comando interactúa con el resto del modelo de datos de Git rinde dividendos. Cada comando opera sobre algún subconjunto de las piezas (objetos, index, refs, árbol de trabajo), y saber cuáles toca ayuda a predecir resultados y a recuperarse de errores.</p>
        <h2>Opciones comunes</h2>
    <table>
      <thead><tr><th>Opción / Subcomando</th><th>Descripción</th></tr></thead>
      <tbody>
        <tr><td><code>push -m &lt;msg&gt;</code></td><td>Stash with a descriptive message.</td></tr>
        <tr><td><code>-u</code></td><td>Include untracked files.</td></tr>
        <tr><td><code>-a</code></td><td>Include ignored files too.</td></tr>
        <tr><td><code>list</code></td><td>Show all stash entries.</td></tr>
        <tr><td><code>show [-p] &lt;stash&gt;</code></td><td>Display contents of a stash.</td></tr>
        <tr><td><code>pop</code> / <code>apply</code></td><td>Re-apply a stash; pop also drops it.</td></tr>
        <tr><td><code>drop &lt;stash&gt;</code></td><td>Delete a stash entry.</td></tr>
        <tr><td><code>branch &lt;name&gt;</code></td><td>Create a branch from a stash.</td></tr>
      </tbody>
    </table>
    <h2>Ejemplos</h2>
    <pre><code>git stash push -m "WIP: refactor parser"
    # Save current work with a label

    git stash list
    # stash@{0}: On main: WIP: refactor parser

    git stash pop
    # Re-apply the most recent stash and remove it

    git stash branch temp-branch stash@{1}
    # Create a new branch from a stash that conflicts</code></pre>
    <h2>Errores comunes</h2>
    <p>Forgetting that stash doesn't include untracked files by default, then losing them when running <code>git clean</code>. Use <code>-u</code>. Popping a stash that conflicts can leave a complicated state — consider <code>apply</code> first so the stash isn't dropped if things go wrong. Long-lived stashes accumulate; review with <code>git stash list</code> regularly.</p>
    <h2>Comandos relacionados</h2>
    <p><code>git commit</code>, <code>git switch</code>, <code>git restore</code>, <code>git clean</code></p>
- source_title: git apply — Apply a patch to files and/or to the index
  title: git apply — Aplicar un patch a archivos y/o al index
  langcode: es
  body: |
    <h2>Sinopsis</h2>
    <pre><code>git apply [--check] [--index] [--3way] &lt;patch&gt;...</code></pre>
    <h2>Descripción</h2>
        <p>El comando <code>git apply</code> aplica un archivo de patch (en formato diff unificado) al árbol de trabajo, al index, o a ambos. Es como <code>patch(1)</code> pero entiende los formatos de Git, incluyendo cambios de modos de archivo, renames y submódulos.</p>
        <p>A diferencia de <code>git am</code>, no crea commits: solo modifica archivos. Se usa cuando recibes un patch de un archivo, email o herramienta y quieres aplicarlo sin que afecte el historial de commits.</p>
        <p>En el uso diario, este comando se integra estrechamente con alias de shell, plugins de editor e integración continua. Los usuarios avanzados a menudo añaden alias que combinan los flags que siempre pasan. El formato de salida puede personalizarse vía configuración de Git. Cuando algo sale mal, ejecuta el comando con <code>GIT_TRACE=1</code> para revelar las llamadas plumbing subyacentes.</p><p>Entender cómo este comando interactúa con el resto del modelo de datos de Git rinde dividendos. Cada comando opera sobre algún subconjunto de las piezas (objetos, index, refs, árbol de trabajo), y saber cuáles toca ayuda a predecir resultados y a recuperarse de errores.</p>
        <h2>Opciones comunes</h2>
    <table>
      <thead><tr><th>Opción</th><th>Descripción</th></tr></thead>
      <tbody>
        <tr><td><code>--check</code></td><td>Test if the patch applies without modifying anything.</td></tr>
        <tr><td><code>--index</code></td><td>Apply to working tree and index.</td></tr>
        <tr><td><code>--cached</code></td><td>Apply to index only.</td></tr>
        <tr><td><code>--3way</code></td><td>Three-way merge if context doesn't match.</td></tr>
        <tr><td><code>--reverse</code> / <code>-R</code></td><td>Apply in reverse (uncommit a patch).</td></tr>
        <tr><td><code>--whitespace=&lt;action&gt;</code></td><td>Handle whitespace errors (<code>warn</code>, <code>fix</code>, <code>error</code>).</td></tr>
        <tr><td><code>-p&lt;n&gt;</code></td><td>Strip <code>n</code> path components from filenames.</td></tr>
      </tbody>
    </table>
    <h2>Ejemplos</h2>
    <pre><code>git apply changes.patch
    # Apply a patch file to the working tree

    git apply --check feature.patch
    # Verify a patch will apply cleanly

    git apply --index --3way mr.diff
    # Apply with three-way merge fallback, into index too

    curl -L https://example.com/fix.patch | git apply
    # Pipe a patch directly from a URL</code></pre>
    <h2>Errores comunes</h2>
    <p>If the patch was generated against a different base, plain <code>git apply</code> fails with "patch does not apply." Adding <code>--3way</code> often saves the day by attempting a merge. For patches that include commit metadata (author, message), use <code>git am</code> instead so the commit is recreated faithfully.</p>
    <h2>Comandos relacionados</h2>
    <p><code>git am</code>, <code>git format-patch</code>, <code>git diff</code>, <code>git cherry-pick</code></p>
- source_title: git tag — Create, list, and verify tags
  title: git tag — Crear, listar y verificar tags
  langcode: es
  body: |
    <h2>Sinopsis</h2>
    <pre><code>git tag [-a] [-s] [-m &lt;msg&gt;] &lt;name&gt; [&lt;commit&gt;]
    git tag -l ['&lt;pattern&gt;']
    git tag -d &lt;name&gt;</code></pre>
    <h2>Descripción</h2>
        <p>El comando <code>git tag</code> gestiona tags: marcadores nombrados que apuntan a commits específicos (típicamente releases). Los tags vienen en dos sabores: lightweight (solo una ref) y anotados (un objeto Git con metadatos: tagger, fecha, mensaje, firma opcional).</p>
        <p>Para releases publicados, siempre usa tags anotados (<code>-a</code>) o firmados (<code>-s</code>). Los tags se pushean con <code>git push --tags</code> o <code>--follow-tags</code>.</p>
        <p>En el uso diario, este comando se integra estrechamente con alias de shell, plugins de editor e integración continua. Los usuarios avanzados a menudo añaden alias que combinan los flags que siempre pasan. El formato de salida puede personalizarse vía configuración de Git. Cuando algo sale mal, ejecuta el comando con <code>GIT_TRACE=1</code> para revelar las llamadas plumbing subyacentes.</p><p>Entender cómo este comando interactúa con el resto del modelo de datos de Git rinde dividendos. Cada comando opera sobre algún subconjunto de las piezas (objetos, index, refs, árbol de trabajo), y saber cuáles toca ayuda a predecir resultados y a recuperarse de errores.</p>
        <h2>Opciones comunes</h2>
    <table>
      <thead><tr><th>Opción</th><th>Descripción</th></tr></thead>
      <tbody>
        <tr><td><code>-a</code></td><td>Create an annotated tag.</td></tr>
        <tr><td><code>-s</code></td><td>Create a GPG-signed annotated tag.</td></tr>
        <tr><td><code>-m &lt;msg&gt;</code></td><td>Set the tag message.</td></tr>
        <tr><td><code>-l '&lt;pattern&gt;'</code></td><td>List tags matching a glob.</td></tr>
        <tr><td><code>-d &lt;name&gt;</code></td><td>Delete a local tag.</td></tr>
        <tr><td><code>-v &lt;name&gt;</code></td><td>Verify a signed tag.</td></tr>
        <tr><td><code>-f</code></td><td>Replace an existing tag (use with caution).</td></tr>
        <tr><td><code>--sort=&lt;key&gt;</code></td><td>Sort listing (e.g. <code>-v:refname</code>).</td></tr>
      </tbody>
    </table>
    <h2>Ejemplos</h2>
    <pre><code>git tag -a v1.0.0 -m "Release 1.0"
    # Create an annotated tag at HEAD

    git tag -s v1.0.1 -m "Patch release" abc123
    # GPG-signed tag at a specific commit

    git tag -l 'v1.*' --sort=-v:refname
    # List 1.x tags newest first

    git push origin v1.0.0
    # Publish a tag</code></pre>
    <h2>Errores comunes</h2>
    <p>Creating a lightweight tag for a release loses metadata and signing. Use <code>-a</code> or <code>-s</code>. Forgetting <code>git push --tags</code> means colleagues never see your tag. Moving a tag with <code>-f</code> after publication confuses caches and CI systems.</p>
    <h2>Comandos relacionados</h2>
    <p><code>git describe</code>, <code>git show</code>, <code>git push</code>, <code>git verify-tag</code></p>
- source_title: git describe (versioning) — Use tags as the source of truth for versions
  title: git describe (versionado) — Usar tags como fuente de verdad para versiones
  langcode: es
  body: |
    <h2>Sinopsis</h2>
    <pre><code>git describe --tags --dirty --always [--match 'v[0-9]*']</code></pre>
    <h2>Descripción</h2>
        <p><code>git describe</code> con tags anotados es la base más simple para versionado de software automático. Los sistemas de build invocan <code>git describe</code> para producir cadenas de versión que incluyen el último tag, distancia de commits y hash abreviado: <code>v1.4.2-13-gabc1234</code>.</p>
        <p>Combina con <code>--dirty</code> para marcar builds de desarrollo. Para CI determinístico, asegúrate de que el clone incluya tags (no <code>--depth=1</code> sin <code>--tags</code>).</p>
        <p>En el uso diario, este comando se integra estrechamente con alias de shell, plugins de editor e integración continua. Los usuarios avanzados a menudo añaden alias que combinan los flags que siempre pasan. El formato de salida puede personalizarse vía configuración de Git. Cuando algo sale mal, ejecuta el comando con <code>GIT_TRACE=1</code> para revelar las llamadas plumbing subyacentes.</p><p>Entender cómo este comando interactúa con el resto del modelo de datos de Git rinde dividendos. Cada comando opera sobre algún subconjunto de las piezas (objetos, index, refs, árbol de trabajo), y saber cuáles toca ayuda a predecir resultados y a recuperarse de errores.</p>
        <h2>Opciones comunes</h2>
    <table>
      <thead><tr><th>Opción</th><th>Descripción</th></tr></thead>
      <tbody>
        <tr><td><code>--tags</code></td><td>Use lightweight as well as annotated tags.</td></tr>
        <tr><td><code>--dirty[=&lt;mark&gt;]</code></td><td>Append a marker if the tree is dirty.</td></tr>
        <tr><td><code>--always</code></td><td>Fall back to abbreviated SHA when no tag is reachable.</td></tr>
        <tr><td><code>--long</code></td><td>Force long format even at a tag.</td></tr>
        <tr><td><code>--match &lt;pattern&gt;</code></td><td>Restrict to tags matching a pattern (e.g. exclude <code>nightly-*</code>).</td></tr>
        <tr><td><code>--exclude &lt;pattern&gt;</code></td><td>Exclude matching tags.</td></tr>
        <tr><td><code>--abbrev=&lt;n&gt;</code></td><td>Abbrev SHA length.</td></tr>
      </tbody>
    </table>
    <h2>Ejemplos</h2>
    <pre><code># Generate a version string for a build
    VERSION=$(git describe --tags --dirty --always --match 'v[0-9]*')
    echo "${VERSION#v}" > VERSION

    # In a Makefile:
    VERSION := $(shell git describe --tags --dirty --always)
    CFLAGS += -DVERSION="\"$(VERSION)\""

    # In package.json prepublish script:
    node -e "p=require('./package.json'); p.version=process.env.VERSION; require('fs').writeFileSync('package.json', JSON.stringify(p,null,2))"</code></pre>
    <h2>Errores comunes</h2>
    <p>Using lightweight tags breaks <code>git describe</code> without <code>--tags</code>. Including release candidate or nightly tags in your match pattern produces noisy versions for stable builds. Shallow CI clones may have no tags at all — fetch them explicitly: <code>git fetch --tags --unshallow</code>.</p>
    <h2>Comandos relacionados</h2>
    <p><code>git tag</code>, <code>git rev-parse</code>, <code>git for-each-ref</code>, <code>git log</code></p>
- source_title: git cherry-pick — Apply changes from existing commits
  title: git cherry-pick — Aplicar cambios de commits existentes
  langcode: es
  body: |
    <h2>Sinopsis</h2>
    <pre><code>git cherry-pick [-n] [-x] [--continue] [--abort] &lt;commit&gt;...</code></pre>
    <h2>Descripción</h2>
        <p>El comando <code>git cherry-pick</code> aplica los cambios de uno o más commits existentes a tu branch actual, creando nuevos commits con SHAs diferentes pero el mismo contenido. Es la herramienta correcta para portar bug fixes entre branches de release.</p>
        <p>Si surge un conflicto, cherry-pick se pausa para que resuelvas, igual que merge. Pásale múltiples SHAs o un rango (<code>A..B</code>) para portar varios commits a la vez.</p>
        <p>En el uso diario, este comando se integra estrechamente con alias de shell, plugins de editor e integración continua. Los usuarios avanzados a menudo añaden alias que combinan los flags que siempre pasan. El formato de salida puede personalizarse vía configuración de Git. Cuando algo sale mal, ejecuta el comando con <code>GIT_TRACE=1</code> para revelar las llamadas plumbing subyacentes.</p><p>Entender cómo este comando interactúa con el resto del modelo de datos de Git rinde dividendos. Cada comando opera sobre algún subconjunto de las piezas (objetos, index, refs, árbol de trabajo), y saber cuáles toca ayuda a predecir resultados y a recuperarse de errores.</p>
        <h2>Opciones comunes</h2>
    <table>
      <thead><tr><th>Opción</th><th>Descripción</th></tr></thead>
      <tbody>
        <tr><td><code>-n</code>, <code>--no-commit</code></td><td>Apply changes but don't commit yet.</td></tr>
        <tr><td><code>-x</code></td><td>Annotate the commit message with the source SHA.</td></tr>
        <tr><td><code>-e</code>, <code>--edit</code></td><td>Edit the commit message before committing.</td></tr>
        <tr><td><code>--continue</code></td><td>Resume after resolving conflicts.</td></tr>
        <tr><td><code>--abort</code></td><td>Cancel and restore prior state.</td></tr>
        <tr><td><code>--skip</code></td><td>Skip current commit and continue.</td></tr>
        <tr><td><code>-m &lt;parent&gt;</code></td><td>Specify mainline when picking a merge commit.</td></tr>
        <tr><td><code>-S</code></td><td>GPG-sign the resulting commits.</td></tr>
      </tbody>
    </table>
    <h2>Ejemplos</h2>
    <pre><code>git cherry-pick abc123
    # Apply a single commit onto current branch

    git cherry-pick -x abc123 def456
    # Apply two commits with traceability annotations

    git cherry-pick A..B
    # Pick a range (exclusive of A, inclusive of B)

    git cherry-pick --continue
    # Continue after fixing conflicts</code></pre>
    <h2>Errores comunes</h2>
    <p>Cherry-picking the same change repeatedly can confuse later merges, since identical-looking commits have different SHAs. Use <code>git rerere</code> to remember resolutions. Picking a merge without <code>-m</code> fails. For long sequences, prefer rebase or merge.</p>
    <h2>Comandos relacionados</h2>
    <p><code>git rebase</code>, <code>git revert</code>, <code>git merge</code>, <code>git rerere</code></p>
- source_title: git rebase -i — Interactive rebase to rewrite local history
  title: git rebase -i — Rebase interactivo para reescribir historial local
  langcode: es
  body: |
    <h2>Sinopsis</h2>
    <pre><code>git rebase -i &lt;upstream&gt;
    git rebase -i --root</code></pre>
    <h2>Descripción</h2>
        <p>El rebase interactivo (<code>git rebase -i</code>) abre un editor con la lista de commits a rebasear, permitiéndote reordenar, editar, squashear, descartar o renombrar mensajes. Es la herramienta más poderosa para limpiar el historial local antes de pushear.</p>
        <p>Las acciones comunes (<code>pick</code>, <code>reword</code>, <code>edit</code>, <code>squash</code>, <code>fixup</code>, <code>drop</code>) están listadas en la cabecera del archivo. Combinado con <code>--autosquash</code>, los commits fixup se ordenan automáticamente.</p>
        <p>En el uso diario, este comando se integra estrechamente con alias de shell, plugins de editor e integración continua. Los usuarios avanzados a menudo añaden alias que combinan los flags que siempre pasan. El formato de salida puede personalizarse vía configuración de Git. Cuando algo sale mal, ejecuta el comando con <code>GIT_TRACE=1</code> para revelar las llamadas plumbing subyacentes.</p><p>Entender cómo este comando interactúa con el resto del modelo de datos de Git rinde dividendos. Cada comando opera sobre algún subconjunto de las piezas (objetos, index, refs, árbol de trabajo), y saber cuáles toca ayuda a predecir resultados y a recuperarse de errores.</p>
        <h2>Opciones comunes</h2>
    <table>
      <thead><tr><th>Opción</th><th>Descripción</th></tr></thead>
      <tbody>
        <tr><td><code>-i</code></td><td>Interactive editor for rebase plan.</td></tr>
        <tr><td><code>--autosquash</code></td><td>Auto-arrange fixup/squash commits.</td></tr>
        <tr><td><code>--root</code></td><td>Rebase from the very first commit.</td></tr>
        <tr><td><code>-x &lt;cmd&gt;</code></td><td>Run a command between commits (e.g. tests).</td></tr>
        <tr><td><code>-r</code>, <code>--rebase-merges</code></td><td>Preserve merge commits.</td></tr>
        <tr><td><code>--continue</code></td><td>Resume after resolving.</td></tr>
        <tr><td><code>--abort</code></td><td>Cancel completely.</td></tr>
      </tbody>
    </table>
    <h2>Ejemplos</h2>
    <pre><code>git rebase -i HEAD~5
    # Edit the last 5 commits

    git commit --fixup abc123
    git rebase -i --autosquash abc123^
    # Add a fixup, then auto-squash on rebase

    git rebase -i -x "npm test" main
    # Run tests after each commit during rebase

    git rebase -i --root
    # Rewrite history from the first commit</code></pre>
    <h2>Errores comunes</h2>
    <p>Saving an empty rebase todo list aborts the operation — leave at least one <code>pick</code> line. Marking too many commits as <code>edit</code> creates a tedious sequence of stops; prefer <code>squash</code> or <code>fixup</code> when you just want to combine. Never interactive-rebase commits that are already pushed and shared.</p>
    <h2>Comandos relacionados</h2>
    <p><code>git rebase</code>, <code>git commit --fixup</code>, <code>git cherry-pick</code>, <code>git reflog</code></p>
- source_title: git filter-repo — Rewrite repository history at scale
  title: git filter-repo — Reescribir el historial del repositorio a escala
  langcode: es
  body: |
    <h2>Sinopsis</h2>
    <pre><code>git filter-repo --path &lt;path&gt; [--invert-paths]
    git filter-repo --replace-text &lt;file&gt;
    git filter-repo --strip-blobs-bigger-than 10M</code></pre>
    <h2>Descripción</h2>
        <p><code>git filter-repo</code> es una herramienta de tercera parte (recomendada por el proyecto Git sobre el deprecado <code>git filter-branch</code>) para reescrituras a gran escala del historial: eliminar archivos, cambiar autores, eliminar branches, etc. Es órdenes de magnitud más rápida que <code>filter-branch</code> y más segura por defecto.</p>
        <p>Usos comunes incluyen quitar archivos sensibles del historial, fusionar repos, y dividir un subdirectorio en su propio repo. Siempre opera sobre un clon fresco como protección, ya que cambia los SHAs de todos los commits.</p>
        <p>En el uso diario, este comando se integra estrechamente con alias de shell, plugins de editor e integración continua. Los usuarios avanzados a menudo añaden alias que combinan los flags que siempre pasan. El formato de salida puede personalizarse vía configuración de Git. Cuando algo sale mal, ejecuta el comando con <code>GIT_TRACE=1</code> para revelar las llamadas plumbing subyacentes.</p><p>Entender cómo este comando interactúa con el resto del modelo de datos de Git rinde dividendos. Cada comando opera sobre algún subconjunto de las piezas (objetos, index, refs, árbol de trabajo), y saber cuáles toca ayuda a predecir resultados y a recuperarse de errores.</p>
        <h2>Opciones comunes</h2>
    <table>
      <thead><tr><th>Opción</th><th>Descripción</th></tr></thead>
      <tbody>
        <tr><td><code>--path &lt;p&gt;</code></td><td>Keep only the specified path.</td></tr>
        <tr><td><code>--invert-paths</code></td><td>Inverse: remove the specified paths.</td></tr>
        <tr><td><code>--path-glob &lt;g&gt;</code></td><td>Use a glob pattern.</td></tr>
        <tr><td><code>--replace-text &lt;file&gt;</code></td><td>Replace strings throughout history.</td></tr>
        <tr><td><code>--strip-blobs-bigger-than &lt;size&gt;</code></td><td>Drop large blobs.</td></tr>
        <tr><td><code>--mailmap &lt;file&gt;</code></td><td>Rewrite author/committer info.</td></tr>
        <tr><td><code>--analyze</code></td><td>Produce a report on repo size before rewriting.</td></tr>
        <tr><td><code>--force</code></td><td>Override the fresh-clone safety check.</td></tr>
      </tbody>
    </table>
    <h2>Ejemplos</h2>
    <pre><code>git filter-repo --analyze
    # Inspect what's eating space

    git filter-repo --path docs/ --invert-paths
    # Remove docs/ from all history

    git filter-repo --strip-blobs-bigger-than 50M
    # Purge any file over 50 MB

    echo 'API_KEY==&gt;REDACTED' &gt; replacements.txt
    git filter-repo --replace-text replacements.txt
    # Scrub a leaked secret</code></pre>
    <h2>Errores comunes</h2>
    <p>Running <code>filter-repo</code> in your live repo without a backup risks losing data. Always clone fresh. After rewriting, force-push and have collaborators re-clone — anyone with old SHAs will get conflicts. The tool removes <code>origin</code> by default to prevent accidental pushes; re-add it deliberately.</p>
    <h2>Comandos relacionados</h2>
    <p><code>git filter-branch</code> (deprecated), <code>git gc</code>, <code>git reflog</code>, <code>git push --force-with-lease</code></p>
- source_title: git worktree — Manage multiple working trees
  title: git worktree — Gestionar múltiples árboles de trabajo
  langcode: es
  body: |
    <h2>Sinopsis</h2>
    <pre><code>git worktree add &lt;path&gt; [&lt;branch&gt;]
    git worktree list
    git worktree remove &lt;path&gt;
    git worktree prune</code></pre>
    <h2>Descripción</h2>
        <p>El comando <code>git worktree</code> te permite tener múltiples árboles de trabajo conectados a un único repositorio Git. Cada worktree puede tener un branch diferente checkeado, así puedes trabajar en varias cosas simultáneamente sin stash o cambio de branch constante.</p>
        <p>Cada worktree comparte la base de datos de objetos del repo principal pero tiene su propio HEAD, index y árbol de trabajo. Usa <code>git worktree add &lt;path&gt; &lt;branch&gt;</code> para crear uno nuevo y <code>git worktree remove &lt;path&gt;</code> para limpiarlo.</p>
        <p>En el uso diario, este comando se integra estrechamente con alias de shell, plugins de editor e integración continua. Los usuarios avanzados a menudo añaden alias que combinan los flags que siempre pasan. El formato de salida puede personalizarse vía configuración de Git. Cuando algo sale mal, ejecuta el comando con <code>GIT_TRACE=1</code> para revelar las llamadas plumbing subyacentes.</p><p>Entender cómo este comando interactúa con el resto del modelo de datos de Git rinde dividendos. Cada comando opera sobre algún subconjunto de las piezas (objetos, index, refs, árbol de trabajo), y saber cuáles toca ayuda a predecir resultados y a recuperarse de errores.</p>
        <h2>Opciones comunes</h2>
    <table>
      <thead><tr><th>Subcomando</th><th>Descripción</th></tr></thead>
      <tbody>
        <tr><td><code>add &lt;path&gt; [&lt;branch&gt;]</code></td><td>Create a new worktree.</td></tr>
        <tr><td><code>add -b &lt;new&gt; &lt;path&gt; [&lt;start&gt;]</code></td><td>Create new branch + worktree in one step.</td></tr>
        <tr><td><code>list</code></td><td>Show all worktrees.</td></tr>
        <tr><td><code>remove &lt;path&gt;</code></td><td>Delete a worktree's directory and metadata.</td></tr>
        <tr><td><code>prune</code></td><td>Remove metadata for worktrees whose path is gone.</td></tr>
        <tr><td><code>lock</code> / <code>unlock</code></td><td>Prevent or allow pruning.</td></tr>
        <tr><td><code>move &lt;old&gt; &lt;new&gt;</code></td><td>Relocate a worktree.</td></tr>
      </tbody>
    </table>
    <h2>Ejemplos</h2>
    <pre><code>git worktree add ../project-hotfix release/1.4
    # Check out release/1.4 in a sibling directory

    git worktree add -b experiment ../project-experiment
    # Create a new branch and worktree

    git worktree list
    # Display all worktrees

    git worktree remove ../project-hotfix
    # Tear down when finished</code></pre>
    <h2>Errores comunes</h2>
    <p>You cannot have the same branch checked out in two worktrees simultaneously — Git refuses. Use <code>--detach</code> if you only need the contents. Forgetting to <code>worktree remove</code> leaves stale metadata; <code>git worktree prune</code> cleans up.</p>
    <h2>Comandos relacionados</h2>
    <p><code>git switch</code>, <code>git branch</code>, <code>git clone</code>, <code>git submodule</code></p>
- source_title: git submodule — Manage nested Git repositories
  title: git submodule — Gestionar repositorios Git anidados
  langcode: es
  body: |
    <h2>Sinopsis</h2>
    <pre><code>git submodule add &lt;url&gt; &lt;path&gt;
    git submodule update --init --recursive
    git submodule foreach &lt;cmd&gt;</code></pre>
    <h2>Descripción</h2>
        <p>El comando <code>git submodule</code> gestiona repositorios Git anidados dentro de un repositorio padre. Cada submódulo es un commit fijado de otro repo, lo que te permite incluir dependencias o componentes externos como parte de tu proyecto.</p>
        <p>Los submódulos son notoriamente complicados: requieren init y update explícitos tras un clone, los commits del submódulo no son visibles en el log del padre, y los pushes a submódulos son una operación separada. Considera alternativas (<code>git subtree</code>, gestores de paquetes) antes de adoptarlos.</p>
        <p>En el uso diario, este comando se integra estrechamente con alias de shell, plugins de editor e integración continua. Los usuarios avanzados a menudo añaden alias que combinan los flags que siempre pasan. El formato de salida puede personalizarse vía configuración de Git. Cuando algo sale mal, ejecuta el comando con <code>GIT_TRACE=1</code> para revelar las llamadas plumbing subyacentes.</p><p>Entender cómo este comando interactúa con el resto del modelo de datos de Git rinde dividendos. Cada comando opera sobre algún subconjunto de las piezas (objetos, index, refs, árbol de trabajo), y saber cuáles toca ayuda a predecir resultados y a recuperarse de errores.</p>
        <h2>Opciones comunes</h2>
    <table>
      <thead><tr><th>Subcomando</th><th>Descripción</th></tr></thead>
      <tbody>
        <tr><td><code>add &lt;url&gt; &lt;path&gt;</code></td><td>Add a new submodule.</td></tr>
        <tr><td><code>init</code></td><td>Register submodule URLs in <code>.git/config</code>.</td></tr>
        <tr><td><code>update --init</code></td><td>Init and check out submodules.</td></tr>
        <tr><td><code>update --recursive</code></td><td>Recurse into nested submodules.</td></tr>
        <tr><td><code>update --remote</code></td><td>Update to the upstream branch tip.</td></tr>
        <tr><td><code>foreach &lt;cmd&gt;</code></td><td>Run a command in every submodule.</td></tr>
        <tr><td><code>deinit &lt;path&gt;</code></td><td>Remove a submodule from the working tree.</td></tr>
      </tbody>
    </table>
    <h2>Ejemplos</h2>
    <pre><code>git submodule add https://github.com/lib/foo.git vendor/foo
    # Add a new submodule at vendor/foo

    git clone --recurse-submodules https://github.com/me/parent.git
    # Clone with submodules in one step

    git submodule update --init --recursive
    # Initialize and populate all submodules

    git submodule foreach 'git pull origin main'
    # Update each submodule to its main branch tip</code></pre>
    <h2>Errores comunes</h2>
    <p>Forgetting <code>--recurse-submodules</code> on clone leaves empty submodule directories. Pushing the parent repo without first pushing submodule changes leaves a dangling reference for collaborators. Many teams move to <code>git subtree</code> or monorepos to escape submodule complexity.</p>
    <h2>Comandos relacionados</h2>
    <p><code>git subtree</code>, <code>git clone --recurse-submodules</code>, <code>git config submodule</code></p>
- source_title: git subtree — Merge and split a project as a subdirectory
  title: git subtree — Mergear y dividir un proyecto como subdirectorio
  langcode: es
  body: |
    <h2>Sinopsis</h2>
    <pre><code>git subtree add --prefix=&lt;path&gt; &lt;repo&gt; &lt;ref&gt; [--squash]
    git subtree pull --prefix=&lt;path&gt; &lt;repo&gt; &lt;ref&gt;
    git subtree push --prefix=&lt;path&gt; &lt;repo&gt; &lt;ref&gt;
    git subtree split --prefix=&lt;path&gt; -b &lt;new-branch&gt;</code></pre>
    <h2>Descripción</h2>
        <p>El comando <code>git subtree</code> es una alternativa a <code>git submodule</code> para incluir el historial de otro repo dentro del tuyo. A diferencia de los submódulos, subtree fusiona el contenido directamente en tu repo, así que tus colaboradores no necesitan pasos adicionales tras un clone.</p>
        <p>Usa <code>git subtree add</code> para incluir, <code>git subtree pull</code> para actualizar y <code>git subtree push</code> para enviar cambios de vuelta al repo upstream. La trampa es que el historial se vuelve más complejo y los splits no siempre son exactos.</p>
        <p>En el uso diario, este comando se integra estrechamente con alias de shell, plugins de editor e integración continua. Los usuarios avanzados a menudo añaden alias que combinan los flags que siempre pasan. El formato de salida puede personalizarse vía configuración de Git. Cuando algo sale mal, ejecuta el comando con <code>GIT_TRACE=1</code> para revelar las llamadas plumbing subyacentes.</p><p>Entender cómo este comando interactúa con el resto del modelo de datos de Git rinde dividendos. Cada comando opera sobre algún subconjunto de las piezas (objetos, index, refs, árbol de trabajo), y saber cuáles toca ayuda a predecir resultados y a recuperarse de errores.</p>
        <h2>Opciones comunes</h2>
    <table>
      <thead><tr><th>Subcomando</th><th>Descripción</th></tr></thead>
      <tbody>
        <tr><td><code>add</code></td><td>Import an external repo into a subdirectory.</td></tr>
        <tr><td><code>pull</code></td><td>Merge upstream changes for that prefix.</td></tr>
        <tr><td><code>push</code></td><td>Push prefix-only history back upstream.</td></tr>
        <tr><td><code>merge</code></td><td>Merge an arbitrary tree into the prefix.</td></tr>
        <tr><td><code>split</code></td><td>Extract a subdirectory's history as a standalone branch.</td></tr>
        <tr><td><code>--squash</code></td><td>Flatten foreign history into a single commit.</td></tr>
        <tr><td><code>--prefix=&lt;path&gt;</code></td><td>Subdirectory under which to place the subtree.</td></tr>
      </tbody>
    </table>
    <h2>Ejemplos</h2>
    <pre><code>git subtree add --prefix=vendor/foo https://github.com/lib/foo.git main --squash
    # Import foo into vendor/foo, squashing history

    git subtree pull --prefix=vendor/foo https://github.com/lib/foo.git main --squash
    # Pull updates

    git subtree split --prefix=lib -b lib-only
    # Extract lib/ as its own branch for sharing

    git subtree push --prefix=vendor/foo upstream main
    # Send prefix-scoped commits back to upstream</code></pre>
    <h2>Errores comunes</h2>
    <p>Mixing <code>--squash</code> on some operations and not others creates messy history. Pick one mode and stick with it. Subtree merges produce nontrivial commit graphs that confuse some tooling. <code>git subtree split</code> can be slow on large histories.</p>
    <h2>Comandos relacionados</h2>
    <p><code>git submodule</code>, <code>git merge</code>, <code>git filter-repo</code></p>
- source_title: git notes — Add or inspect commit notes
  title: git notes — Añadir o inspeccionar notas de commits
  langcode: es
  body: |
    <h2>Sinopsis</h2>
    <pre><code>git notes add [-m &lt;msg&gt;] [&lt;commit&gt;]
    git notes show [&lt;commit&gt;]
    git notes append [-m &lt;msg&gt;] [&lt;commit&gt;]
    git notes remove [&lt;commit&gt;]</code></pre>
    <h2>Descripción</h2>
        <p>El comando <code>git notes</code> añade metadatos arbitrarios a commits sin reescribir el historial. Las notas se almacenan en una ref separada (<code>refs/notes/commits</code>) y se muestran junto al commit en <code>git log</code>.</p>
        <p>Usos típicos: anotar resultados de CI, etiquetar cherry-picks, registrar metadatos de revisión. Las notas no se pushean por defecto: requieren refspecs específicos para sincronizarse con remotos.</p>
        <p>En el uso diario, este comando se integra estrechamente con alias de shell, plugins de editor e integración continua. Los usuarios avanzados a menudo añaden alias que combinan los flags que siempre pasan. El formato de salida puede personalizarse vía configuración de Git. Cuando algo sale mal, ejecuta el comando con <code>GIT_TRACE=1</code> para revelar las llamadas plumbing subyacentes.</p><p>Entender cómo este comando interactúa con el resto del modelo de datos de Git rinde dividendos. Cada comando opera sobre algún subconjunto de las piezas (objetos, index, refs, árbol de trabajo), y saber cuáles toca ayuda a predecir resultados y a recuperarse de errores.</p>
        <h2>Opciones comunes</h2>
    <table>
      <thead><tr><th>Subcomando</th><th>Descripción</th></tr></thead>
      <tbody>
        <tr><td><code>add</code></td><td>Attach a new note to a commit.</td></tr>
        <tr><td><code>append</code></td><td>Add to an existing note.</td></tr>
        <tr><td><code>edit</code></td><td>Open an editor on the note.</td></tr>
        <tr><td><code>show</code></td><td>Print the note.</td></tr>
        <tr><td><code>remove</code></td><td>Delete the note.</td></tr>
        <tr><td><code>list</code></td><td>List commits that have notes.</td></tr>
        <tr><td><code>--ref &lt;ref&gt;</code></td><td>Use a different notes namespace.</td></tr>
      </tbody>
    </table>
    <h2>Ejemplos</h2>
    <pre><code>git notes add -m "Reviewed by Alice" abc123
    # Attach a review note

    git log --show-notes
    # Show notes inline with log

    git notes --ref=ci add -m "Build #42 passed" HEAD
    # Use a custom namespace

    git push origin 'refs/notes/*'
    # Publish notes to the remote</code></pre>
    <h2>Errores comunes</h2>
    <p>Forgetting to push and fetch the notes ref makes notes invisible to collaborators. Configure <code>notes.displayRef = refs/notes/*</code> so all namespaces show in <code>git log</code>. Notes don't survive history rewrites unless explicitly migrated.</p>
    <h2>Comandos relacionados</h2>
    <p><code>git log</code>, <code>git commit</code>, <code>git push</code>, <code>git fetch</code></p>
- source_title: git archive — Create an archive of files from a named tree
  title: git archive — Crear un archivo desde un tree nombrado
  langcode: es
  body: |
    <h2>Sinopsis</h2>
    <pre><code>git archive [--format=&lt;fmt&gt;] [--prefix=&lt;p&gt;/] [-o &lt;file&gt;] &lt;tree-ish&gt; [&lt;path&gt;...]</code></pre>
    <h2>Descripción</h2>
        <p>El comando <code>git archive</code> crea un tarball o zip de los archivos en un commit, tag o tree dado. A diferencia de copiar el árbol de trabajo, exporta exactamente lo que Git tiene rastreado en esa revisión, sin <code>.git</code> y sin archivos no rastreados.</p>
        <p>Usado típicamente para distribuir releases sin clonar el repo entero. <code>git archive --format=tar.gz HEAD &gt; release.tar.gz</code> es el caso de uso más común.</p>
        <p>En el uso diario, este comando se integra estrechamente con alias de shell, plugins de editor e integración continua. Los usuarios avanzados a menudo añaden alias que combinan los flags que siempre pasan. El formato de salida puede personalizarse vía configuración de Git. Cuando algo sale mal, ejecuta el comando con <code>GIT_TRACE=1</code> para revelar las llamadas plumbing subyacentes.</p><p>Entender cómo este comando interactúa con el resto del modelo de datos de Git rinde dividendos. Cada comando opera sobre algún subconjunto de las piezas (objetos, index, refs, árbol de trabajo), y saber cuáles toca ayuda a predecir resultados y a recuperarse de errores.</p>
        <h2>Opciones comunes</h2>
    <table>
      <thead><tr><th>Opción</th><th>Descripción</th></tr></thead>
      <tbody>
        <tr><td><code>--format=&lt;fmt&gt;</code></td><td>tar, tar.gz, zip (default tar).</td></tr>
        <tr><td><code>--prefix=&lt;p&gt;/</code></td><td>Prepend a directory to all archive paths.</td></tr>
        <tr><td><code>-o &lt;file&gt;</code></td><td>Write to file instead of stdout.</td></tr>
        <tr><td><code>--remote=&lt;repo&gt;</code></td><td>Archive from a remote repository.</td></tr>
        <tr><td><code>--worktree-attributes</code></td><td>Honor <code>export-ignore</code> attributes.</td></tr>
        <tr><td><code>-l</code>, <code>--list</code></td><td>List supported formats.</td></tr>
      </tbody>
    </table>
    <h2>Ejemplos</h2>
    <pre><code>git archive --format=tar.gz --prefix=myproj-1.0/ -o myproj-1.0.tar.gz v1.0
    # Release tarball with named top-level directory

    git archive HEAD docs/ | tar -x -C /tmp/docs
    # Extract the docs/ directory at HEAD into /tmp/docs

    git archive --format=zip -o snapshot.zip HEAD
    # ZIP archive of current tree</code></pre>
    <h2>Examples (continued)</h2>
    <pre><code># Use .gitattributes to exclude files from archives:
    echo "tests/ export-ignore" &gt;&gt; .gitattributes
    echo ".github/ export-ignore" &gt;&gt; .gitattributes
    git archive --worktree-attributes -o release.tar.gz HEAD</code></pre>
    <h2>Errores comunes</h2>
    <p>Forgetting <code>--prefix</code> creates an archive that explodes files into the current directory on extraction. Without <code>export-ignore</code> attributes, your archive may include CI configs, tests, and dev-only files that you didn't intend to ship.</p>
    <h2>Comandos relacionados</h2>
    <p><code>git bundle</code>, <code>git tag</code>, <code>git show</code>, <code>tar</code></p>
- source_title: git bundle — Move objects and refs by archive
  title: git bundle — Mover objetos y refs mediante archivo
  langcode: es
  body: |
    <h2>Sinopsis</h2>
    <pre><code>git bundle create &lt;file&gt; &lt;git-rev-list-args&gt;
    git bundle verify &lt;file&gt;
    git bundle list-heads &lt;file&gt;
    git clone &lt;file&gt; &lt;dir&gt;</code></pre>
    <h2>Descripción</h2>
        <p>El comando <code>git bundle</code> empaqueta refs y objetos en un único archivo binario, útil para transferir cambios entre repos sin acceso a la red. El bundle resultante se puede tratar como un remoto: <code>git fetch /path/to.bundle</code>.</p>
        <p>Casos de uso: trabajar offline, transferir cambios sobre medios físicos, hacer backup incremental de un repo. El bundle es autocontenido y verificable.</p>
        <p>En el uso diario, este comando se integra estrechamente con alias de shell, plugins de editor e integración continua. Los usuarios avanzados a menudo añaden alias que combinan los flags que siempre pasan. El formato de salida puede personalizarse vía configuración de Git. Cuando algo sale mal, ejecuta el comando con <code>GIT_TRACE=1</code> para revelar las llamadas plumbing subyacentes.</p><p>Entender cómo este comando interactúa con el resto del modelo de datos de Git rinde dividendos. Cada comando opera sobre algún subconjunto de las piezas (objetos, index, refs, árbol de trabajo), y saber cuáles toca ayuda a predecir resultados y a recuperarse de errores.</p>
        <h2>Opciones comunes</h2>
    <table>
      <thead><tr><th>Subcomando</th><th>Descripción</th></tr></thead>
      <tbody>
        <tr><td><code>create &lt;file&gt; &lt;refs&gt;</code></td><td>Create a bundle file.</td></tr>
        <tr><td><code>verify &lt;file&gt;</code></td><td>Check that a bundle is valid and applicable.</td></tr>
        <tr><td><code>list-heads &lt;file&gt;</code></td><td>List the refs the bundle contains.</td></tr>
        <tr><td><code>unbundle &lt;file&gt;</code></td><td>Plumbing: emit objects to the repository.</td></tr>
        <tr><td><code>--all</code></td><td>Include all refs.</td></tr>
        <tr><td><code>--progress</code></td><td>Show progress on creation.</td></tr>
      </tbody>
    </table>
    <h2>Ejemplos</h2>
    <pre><code>git bundle create repo.bundle --all
    # Full backup of every ref

    git bundle create incremental.bundle main ^v2.0
    # Just commits on main since v2.0

    git bundle verify repo.bundle
    # Check applicability before fetching

    # On the receiving side:
    git clone repo.bundle myproj
    # or, into an existing repo:
    git fetch ../incremental.bundle main:main</code></pre>
    <h2>Errores comunes</h2>
    <p>Creating a bundle without specifying a base means the recipient gets the full history every time, even for small updates. Use ranges like <code>--since</code> or <code>^&lt;ref&gt;</code> for incremental bundles. <code>git bundle verify</code> against an empty repo only checks structural validity, not whether the bundle's prerequisites are present.</p>
    <h2>Comandos relacionados</h2>
    <p><code>git archive</code>, <code>git fetch</code>, <code>git clone</code>, <code>git pack-objects</code></p>
- source_title: git reflog — Manage reference logs
  title: git reflog — Gestionar logs de referencias
  langcode: es
  body: |
    <h2>Sinopsis</h2>
    <pre><code>git reflog [show] [&lt;ref&gt;]
    git reflog expire [--expire=&lt;time&gt;] [--all]
    git reflog delete &lt;entry&gt;</code></pre>
    <h2>Descripción</h2>
        <p>El comando <code>git reflog</code> muestra el log local de cómo HEAD (u otra ref) se ha movido con el tiempo: cada commit, reset, rebase, etc. Es la red de seguridad de Git: incluso después de operaciones destructivas como <code>reset --hard</code>, los commits viejos siguen siendo recuperables vía reflog durante 90 días.</p>
        <p>Cada entrada del reflog tiene un identificador (<code>HEAD@{0}</code>, <code>HEAD@{1}</code>, ...) que puedes usar como cualquier ref. Si perdiste un commit, <code>git reflog</code> es casi siempre el primer lugar para buscar.</p>
        <p>En el uso diario, este comando se integra estrechamente con alias de shell, plugins de editor e integración continua. Los usuarios avanzados a menudo añaden alias que combinan los flags que siempre pasan. El formato de salida puede personalizarse vía configuración de Git. Cuando algo sale mal, ejecuta el comando con <code>GIT_TRACE=1</code> para revelar las llamadas plumbing subyacentes.</p><p>Entender cómo este comando interactúa con el resto del modelo de datos de Git rinde dividendos. Cada comando opera sobre algún subconjunto de las piezas (objetos, index, refs, árbol de trabajo), y saber cuáles toca ayuda a predecir resultados y a recuperarse de errores.</p>
        <h2>Opciones comunes</h2>
    <table>
      <thead><tr><th>Opción / Subcomando</th><th>Descripción</th></tr></thead>
      <tbody>
        <tr><td><code>show &lt;ref&gt;</code></td><td>Display reflog for a ref (default HEAD).</td></tr>
        <tr><td><code>expire</code></td><td>Prune old entries.</td></tr>
        <tr><td><code>--expire=&lt;time&gt;</code></td><td>Expire entries older than this.</td></tr>
        <tr><td><code>--expire-unreachable=&lt;time&gt;</code></td><td>For commits unreachable from any ref.</td></tr>
        <tr><td><code>--all</code></td><td>Operate on every ref.</td></tr>
        <tr><td><code>delete &lt;entry&gt;</code></td><td>Remove a single entry.</td></tr>
      </tbody>
    </table>
    <h2>Ejemplos</h2>
    <pre><code>git reflog
    # Recent moves of HEAD

    git reflog show feature/api
    # Just the feature branch's history

    git reset --hard HEAD@{1}
    # Recover from a wrong reset by going back one move

    git reflog expire --expire=30.days --all
    # Trim reflog to last 30 days for every ref</code></pre>
    <h2>Errores comunes</h2>
    <p>Reflogs are LOCAL only — fetching from a remote does not include their reflog. Reflog entries expire eventually; don't rely on them for long-term recovery. Running <code>git gc --prune=now</code> after expiring the reflog can permanently remove unreachable commits.</p>
    <h2>Comandos relacionados</h2>
    <p><code>git reset</code>, <code>git rebase</code>, <code>git fsck</code>, <code>git gc</code></p>
- source_title: git rerere — Reuse recorded conflict resolutions
  title: git rerere — Reutilizar resoluciones de conflictos registradas
  langcode: es
  body: |
    <h2>Sinopsis</h2>
    <pre><code>git config --global rerere.enabled true
    git rerere status
    git rerere diff
    git rerere clear</code></pre>
    <h2>Descripción</h2>
        <p>El comando <code>git rerere</code> ('reuse recorded resolution') recuerda cómo resolviste conflictos de merge específicos y replica esa resolución automáticamente cuando el mismo conflicto reaparece. Es invaluable para flujos con rebase frecuente o branches de larga duración.</p>
        <p>Habilítalo con <code>git config --global rerere.enabled true</code>. Tras eso, cada resolución de conflicto se registra; futuros encuentros con el mismo conflicto se resuelven automáticamente.</p>
        <p>En el uso diario, este comando se integra estrechamente con alias de shell, plugins de editor e integración continua. Los usuarios avanzados a menudo añaden alias que combinan los flags que siempre pasan. El formato de salida puede personalizarse vía configuración de Git. Cuando algo sale mal, ejecuta el comando con <code>GIT_TRACE=1</code> para revelar las llamadas plumbing subyacentes.</p><p>Entender cómo este comando interactúa con el resto del modelo de datos de Git rinde dividendos. Cada comando opera sobre algún subconjunto de las piezas (objetos, index, refs, árbol de trabajo), y saber cuáles toca ayuda a predecir resultados y a recuperarse de errores.</p>
        <h2>Opciones comunes</h2>
    <table>
      <thead><tr><th>Subcommand / Config</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>rerere.enabled</code></td><td>Turn on automatic recording.</td></tr>
        <tr><td><code>rerere.autoUpdate</code></td><td>Automatically stage resolved files.</td></tr>
        <tr><td><code>status</code></td><td>Show files with recorded resolutions.</td></tr>
        <tr><td><code>diff</code></td><td>Display the recorded resolution.</td></tr>
        <tr><td><code>remaining</code></td><td>Show conflicts not yet resolved.</td></tr>
        <tr><td><code>clear</code></td><td>Drop all recorded resolutions.</td></tr>
        <tr><td><code>forget &lt;path&gt;</code></td><td>Forget the resolution for a single path.</td></tr>
      </tbody>
    </table>
    <h2>Ejemplos</h2>
    <pre><code>git config --global rerere.enabled true
    git config --global rerere.autoUpdate true
    # Enable for all repos

    # After resolving a conflict during merge or rebase, rerere remembers.
    # Next time the same conflict appears, the resolution is auto-applied.

    git rerere status
    # Show files where a recorded resolution kicked in

    git rerere clear
    # Wipe the recorded set if it gets stale</code></pre>
    <h2>Errores comunes</h2>
    <p>Rerere only helps with identical conflicts. Slight context changes prevent reuse. If a recorded resolution turns out to be wrong, use <code>git rerere forget &lt;path&gt;</code> to clear it before re-resolving. Rerere data lives in <code>.git/rr-cache/</code> and is local — it isn't shared with collaborators.</p>
    <h2>Comandos relacionados</h2>
    <p><code>git merge</code>, <code>git rebase</code>, <code>git mergetool</code>, <code>git config</code></p>
- source_title: git range-diff — Compare two commit ranges
  title: git range-diff — Comparar dos rangos de commits
  langcode: es
  body: |
    <h2>Sinopsis</h2>
    <pre><code>git range-diff &lt;range1&gt; &lt;range2&gt;
    git range-diff &lt;base&gt; &lt;rev1&gt; &lt;rev2&gt;</code></pre>
    <h2>Descripción</h2>
        <p>El comando <code>git range-diff</code> compara dos rangos de commits, mostrando cómo difieren commit-a-commit. Es la mejor herramienta para revisar lo que cambió entre dos versiones de un branch rebaseado o una serie de patches.</p>
        <p>A diferencia de <code>git diff old-tip new-tip</code>, range-diff intenta emparejar commits entre rangos basándose en mensaje y patch, mostrando los cambios reales en cada commit en lugar de un diff combinado confuso.</p>
        <p>En el uso diario, este comando se integra estrechamente con alias de shell, plugins de editor e integración continua. Los usuarios avanzados a menudo añaden alias que combinan los flags que siempre pasan. El formato de salida puede personalizarse vía configuración de Git. Cuando algo sale mal, ejecuta el comando con <code>GIT_TRACE=1</code> para revelar las llamadas plumbing subyacentes.</p><p>Entender cómo este comando interactúa con el resto del modelo de datos de Git rinde dividendos. Cada comando opera sobre algún subconjunto de las piezas (objetos, index, refs, árbol de trabajo), y saber cuáles toca ayuda a predecir resultados y a recuperarse de errores.</p>
        <h2>Opciones comunes</h2>
    <table>
      <thead><tr><th>Opción</th><th>Descripción</th></tr></thead>
      <tbody>
        <tr><td><code>--no-color</code></td><td>Disable color output.</td></tr>
        <tr><td><code>--creation-factor=&lt;n&gt;</code></td><td>Tunable for matching commits across ranges.</td></tr>
        <tr><td><code>--dual-color</code></td><td>Color both inner and outer diffs.</td></tr>
        <tr><td><code>--no-patch</code></td><td>Show only the matching summary, not patches.</td></tr>
        <tr><td><code>--notes</code></td><td>Include git notes in the comparison.</td></tr>
      </tbody>
    </table>
    <h2>Ejemplos</h2>
    <pre><code>git range-diff main..feature@{1} main..feature
    # Compare branch before and after a rebase

    git range-diff origin/main feature.v1 feature.v2
    # Compare two patch series versions

    git range-diff @{u}..HEAD HEAD@{1}..HEAD
    # Compare current upstream-relative tip with what it was last time</code></pre>
    <h2>Errores comunes</h2>
    <p>Range-diff matches commits using a heuristic; if you make many small reorderings, the output may pair unexpected commits. Tune <code>--creation-factor</code> if needed. Don't confuse range-diff with <code>git diff A..B</code> — they answer different questions.</p>
    <h2>Comandos relacionados</h2>
    <p><code>git diff</code>, <code>git log</code>, <code>git rebase</code>, <code>git format-patch</code></p>
- source_title: git stash (advanced) — Power-user stash workflows
  title: git stash (avanzado) — Flujos de stash para usuarios avanzados
  langcode: es
  body: |
    <h2>Sinopsis</h2>
    <pre><code>git stash push -p -m &lt;msg&gt; -- &lt;pathspec&gt;
    git stash branch &lt;newbranch&gt; [&lt;stash&gt;]
    git stash create
    git stash store -m &lt;msg&gt; &lt;sha&gt;</code></pre>
    <h2>Descripción</h2>
        <p>Más allá del <code>git stash</code> y <code>git stash pop</code> básicos, los flujos avanzados de stash incluyen mensajes nombrados (<code>git stash push -m descripción</code>), stashing parcial con <code>-p</code>, stashear solo cambios staged (<code>--staged</code>), y crear branches desde stashes (<code>git stash branch</code>).</p>
        <p>El stash es una pila local que vive en <code>refs/stash</code>. Inspecciona con <code>git stash list</code>, <code>git stash show -p stash@{2}</code>. Los stashes no se pushean automáticamente; son local-only.</p>
        <p>En el uso diario, este comando se integra estrechamente con alias de shell, plugins de editor e integración continua. Los usuarios avanzados a menudo añaden alias que combinan los flags que siempre pasan. El formato de salida puede personalizarse vía configuración de Git. Cuando algo sale mal, ejecuta el comando con <code>GIT_TRACE=1</code> para revelar las llamadas plumbing subyacentes.</p><p>Entender cómo este comando interactúa con el resto del modelo de datos de Git rinde dividendos. Cada comando opera sobre algún subconjunto de las piezas (objetos, index, refs, árbol de trabajo), y saber cuáles toca ayuda a predecir resultados y a recuperarse de errores.</p>
        <h2>Opciones comunes</h2>
    <table>
      <thead><tr><th>Subcommand / Option</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>push -p</code></td><td>Stash interactively chosen hunks.</td></tr>
        <tr><td><code>push -- &lt;pathspec&gt;</code></td><td>Stash only specified paths.</td></tr>
        <tr><td><code>--keep-index</code></td><td>Stash but keep what's already staged.</td></tr>
        <tr><td><code>--no-keep-index</code></td><td>Reset index when stashing (default).</td></tr>
        <tr><td><code>branch &lt;name&gt;</code></td><td>Recreate state on a fresh branch.</td></tr>
        <tr><td><code>create</code></td><td>Make a stash commit but don't store it.</td></tr>
        <tr><td><code>store -m</code></td><td>Place an existing commit on the stack.</td></tr>
      </tbody>
    </table>
    <h2>Ejemplos</h2>
    <pre><code>git stash push -p -m "WIP: only refactor changes" -- src/refactor/
    # Stash only specific paths, interactively

    git stash --keep-index -m "Test pre-staged"
    # Verify that staged changes pass tests, with WIP set aside

    git stash branch fix-from-stash stash@{2}
    # Resurrect a stash that no longer applies cleanly

    SHA=$(git stash create "checkpoint")
    git stash store -m "manual checkpoint" "$SHA"
    # Programmatic stash creation</code></pre>
    <h2>Errores comunes</h2>
    <p>Stashing during a merge or rebase mixes states and confuses the stack. Avoid. Long-running stashes outlive their context — review periodically. <code>--keep-index</code> is great for verifying staged changes, but the resulting stash includes both staged and unstaged content, which can surprise.</p>
    <h2>Comandos relacionados</h2>
    <p><code>git stash</code>, <code>git commit --fixup</code>, <code>git worktree</code>, <code>git restore</code></p>
- source_title: git config — Get and set repository or global options
  title: git config — Obtener y establecer opciones del repositorio o globales
  langcode: es
  body: |
    <h2>Sinopsis</h2>
    <pre><code>git config [--global | --system | --local] &lt;key&gt; [&lt;value&gt;]
    git config --list
    git config --edit</code></pre>
    <h2>Descripción</h2>
        <p>El comando <code>git config</code> lee y escribe valores en los archivos de configuración de Git. Hay tres ámbitos: system (<code>/etc/gitconfig</code>), global (<code>~/.gitconfig</code>) y local (<code>.git/config</code>). Los más específicos sobrescriben a los más generales.</p>
        <p>Los usos comunes incluyen configurar identidad (<code>user.name</code>, <code>user.email</code>), aliases, predeterminados de pull/push y configuración de credenciales. <code>git config --list --show-origin</code> muestra todos los valores efectivos y de qué archivo vienen.</p>
        <p>En el uso diario, este comando se integra estrechamente con alias de shell, plugins de editor e integración continua. Los usuarios avanzados a menudo añaden alias que combinan los flags que siempre pasan. El formato de salida puede personalizarse vía configuración de Git. Cuando algo sale mal, ejecuta el comando con <code>GIT_TRACE=1</code> para revelar las llamadas plumbing subyacentes.</p><p>Entender cómo este comando interactúa con el resto del modelo de datos de Git rinde dividendos. Cada comando opera sobre algún subconjunto de las piezas (objetos, index, refs, árbol de trabajo), y saber cuáles toca ayuda a predecir resultados y a recuperarse de errores.</p>
        <h2>Opciones comunes</h2>
    <table>
      <thead><tr><th>Opción</th><th>Descripción</th></tr></thead>
      <tbody>
        <tr><td><code>--global</code></td><td>Operate on per-user config.</td></tr>
        <tr><td><code>--system</code></td><td>Operate on system-wide config.</td></tr>
        <tr><td><code>--local</code></td><td>Operate on the current repo's config (default if in a repo).</td></tr>
        <tr><td><code>--list</code></td><td>Show all settings.</td></tr>
        <tr><td><code>--edit</code></td><td>Open the chosen config in your editor.</td></tr>
        <tr><td><code>--unset</code></td><td>Remove a setting.</td></tr>
        <tr><td><code>--add</code></td><td>Add a value to a multi-valued key.</td></tr>
        <tr><td><code>--show-origin</code></td><td>Annotate output with the file each setting comes from.</td></tr>
      </tbody>
    </table>
    <h2>Ejemplos</h2>
    <pre><code>git config --global user.name "Jane Smith"
    git config --global user.email "jane@example.com"
    # Identity for every repo

    git config --global init.defaultBranch main
    git config --global pull.rebase true
    git config --global core.editor "code --wait"
    # Sensible modern defaults

    git config --global alias.lg "log --oneline --graph --decorate --all"
    # Custom alias

    git config --list --show-origin
    # Audit where each setting comes from</code></pre>
    <h2>Errores comunes</h2>
    <p>Setting global config that's meant to be local (or vice versa) leads to confusing behavior. Forgetting to set <code>user.email</code> on a fresh machine causes every commit to be unattributed. Use conditional includes (<code>[includeIf "gitdir:~/work/"]</code>) to swap identities per directory.</p>
    <h2>Comandos relacionados</h2>
    <p><code>git credential</code>, <code>git init</code>, <code>git remote</code></p>
- source_title: git credential — Manage credentials
  title: git credential — Gestionar credenciales
  langcode: es
  body: |
    <h2>Sinopsis</h2>
    <pre><code>git config --global credential.helper &lt;helper&gt;
    git credential fill
    git credential approve
    git credential reject</code></pre>
    <h2>Descripción</h2>
        <p>El comando <code>git credential</code> es la interfaz de bajo nivel al sistema de credenciales de Git, usado por los asistentes (<code>credential.helper</code>) para almacenar, recuperar y olvidar credenciales para remotos HTTPS. Normalmente lo invocan los asistentes, no los usuarios directamente.</p>
        <p>Las invocaciones interactivas comunes son <code>git credential fill</code> (obtener credenciales para una URL) y <code>git credential reject</code> (olvidar credenciales en caché). Configura un asistente con <code>git config credential.helper</code>.</p>
        <p>En el uso diario, este comando se integra estrechamente con alias de shell, plugins de editor e integración continua. Los usuarios avanzados a menudo añaden alias que combinan los flags que siempre pasan. El formato de salida puede personalizarse vía configuración de Git. Cuando algo sale mal, ejecuta el comando con <code>GIT_TRACE=1</code> para revelar las llamadas plumbing subyacentes.</p><p>Entender cómo este comando interactúa con el resto del modelo de datos de Git rinde dividendos. Cada comando opera sobre algún subconjunto de las piezas (objetos, index, refs, árbol de trabajo), y saber cuáles toca ayuda a predecir resultados y a recuperarse de errores.</p>
        <h2>Opciones comunes</h2>
    <table>
      <thead><tr><th>Subcommand / Config</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>credential.helper</code></td><td>Set the credential helper to use.</td></tr>
        <tr><td><code>credential.useHttpPath</code></td><td>Include URL path in the lookup key.</td></tr>
        <tr><td><code>fill</code></td><td>Plumbing: ask helpers for credentials.</td></tr>
        <tr><td><code>approve</code> / <code>reject</code></td><td>Tell helpers an attempt succeeded or failed.</td></tr>
        <tr><td><code>credential.&lt;url&gt;.helper</code></td><td>URL-specific helper.</td></tr>
        <tr><td><code>credential.helper "cache --timeout=3600"</code></td><td>Configurable in-memory cache.</td></tr>
      </tbody>
    </table>
    <h2>Ejemplos</h2>
    <pre><code>git config --global credential.helper osxkeychain
    # macOS: store credentials in Keychain

    git config --global credential.helper manager
    # Cross-platform: Git Credential Manager

    git config --global credential.helper "cache --timeout=3600"
    # Cache for one hour in memory

    # Per-host helper:
    git config --global credential.https://github.com.helper "!gh auth git-credential"
    # Use the GitHub CLI as the helper</code></pre>
    <h2>Errores comunes</h2>
    <p>The <code>store</code> helper writes plain text to <code>~/.git-credentials</code> — fine for throwaway VMs, dangerous on shared machines. Avoid passwords entirely; use personal access tokens or SSH keys for write access. After rotating a token, run <code>git credential reject</code> or clear the cache to force a refresh.</p>
    <h2>Comandos relacionados</h2>
    <p><code>git config</code>, <code>git push</code>, <code>git fetch</code>, <code>ssh-agent</code></p>
- source_title: git cat-file — Inspect Git objects
  title: git cat-file — Inspeccionar objetos Git
  langcode: es
  body: |
    <h2>Sinopsis</h2>
    <pre><code>git cat-file (-t | -s | -p | -e) &lt;object&gt;
    git cat-file --batch
    git cat-file --batch-check</code></pre>
    <h2>Descripción</h2>
        <p>El comando <code>git cat-file</code> es plumbing para inspeccionar objetos Git por SHA: blobs, trees, commits, tags. Muestra el tipo (<code>-t</code>), tamaño (<code>-s</code>) o contenido (<code>-p</code>) de un objeto.</p>
        <p>Esencial para debugging y exploración del modelo de objetos. <code>git cat-file -p HEAD</code> muestra el objeto commit en formato legible.</p>
        <p>En el uso diario, este comando se integra estrechamente con alias de shell, plugins de editor e integración continua. Los usuarios avanzados a menudo añaden alias que combinan los flags que siempre pasan. El formato de salida puede personalizarse vía configuración de Git. Cuando algo sale mal, ejecuta el comando con <code>GIT_TRACE=1</code> para revelar las llamadas plumbing subyacentes.</p><p>Entender cómo este comando interactúa con el resto del modelo de datos de Git rinde dividendos. Cada comando opera sobre algún subconjunto de las piezas (objetos, index, refs, árbol de trabajo), y saber cuáles toca ayuda a predecir resultados y a recuperarse de errores.</p>
        <h2>Cuándo usar</h2>
    <p>Most developers never need <code>git cat-file</code> directly — porcelain commands like <code>git show</code>, <code>git log</code>, and <code>git diff</code> wrap it transparently. Reach for it when writing scripts that walk Git objects, debugging repository corruption, or learning how Git stores data internally.</p>
    <h2>Opciones comunes</h2>
    <table>
      <thead><tr><th>Opción</th><th>Descripción</th></tr></thead>
      <tbody>
        <tr><td><code>-t</code></td><td>Print object type.</td></tr>
        <tr><td><code>-s</code></td><td>Print object size in bytes.</td></tr>
        <tr><td><code>-p</code></td><td>Pretty-print contents in a type-aware way.</td></tr>
        <tr><td><code>-e</code></td><td>Exit zero if the object exists.</td></tr>
        <tr><td><code>--batch</code></td><td>Stream <code>&lt;sha&gt; &lt;type&gt; &lt;size&gt; CRLF &lt;content&gt;</code> for each input.</td></tr>
        <tr><td><code>--batch-check</code></td><td>Like batch, but only header lines.</td></tr>
        <tr><td><code>--filters</code></td><td>Apply smudge filters when printing blobs.</td></tr>
      </tbody>
    </table>
    <h2>Ejemplos</h2>
    <pre><code>git cat-file -t HEAD
    # commit

    git cat-file -p HEAD
    # Show commit message and tree/parent SHAs

    git cat-file -p HEAD:src/main.c
    # Print the file as it was at HEAD

    echo HEAD | git cat-file --batch-check
    # Get type/size/SHA in machine-readable form</code></pre>
    <h2>Errores comunes</h2>
    <p>Passing a partial SHA that's ambiguous returns an error — disambiguate with more characters. Forgetting <code>-p</code> and using <code>-t</code> doesn't print contents. <code>--batch</code> mode requires careful protocol handling; respect the size header to read the right number of bytes.</p>
    <h2>Comandos relacionados</h2>
    <p><code>git show</code>, <code>git hash-object</code>, <code>git ls-tree</code>, <code>git rev-parse</code></p>
- source_title: git hash-object — Compute or store a Git object
  title: git hash-object — Calcular o almacenar un objeto Git
  langcode: es
  body: |
    <h2>Sinopsis</h2>
    <pre><code>git hash-object [-t &lt;type&gt;] [-w] [--stdin] [&lt;file&gt;...]</code></pre>
    <h2>Descripción</h2>
        <p>El comando <code>git hash-object</code> calcula el SHA de los contenidos de un archivo como si fuera un objeto Git, opcionalmente almacenándolo en la base de datos de objetos (con <code>-w</code>). Es plumbing para verificación e indexado de bajo nivel.</p>
        <p>Útil para entender cómo Git direcciona contenido y para construir herramientas que crean objetos manualmente.</p>
        <p>En el uso diario, este comando se integra estrechamente con alias de shell, plugins de editor e integración continua. Los usuarios avanzados a menudo añaden alias que combinan los flags que siempre pasan. El formato de salida puede personalizarse vía configuración de Git. Cuando algo sale mal, ejecuta el comando con <code>GIT_TRACE=1</code> para revelar las llamadas plumbing subyacentes.</p><p>Entender cómo este comando interactúa con el resto del modelo de datos de Git rinde dividendos. Cada comando opera sobre algún subconjunto de las piezas (objetos, index, refs, árbol de trabajo), y saber cuáles toca ayuda a predecir resultados y a recuperarse de errores.</p>
        <h2>Cuándo usar</h2>
    <p>You almost never need this directly. It is most useful for scripts that synthesize content into the object database (importers, migration tools), for debugging by checking what hash a piece of content would have, or for educational exploration of Git's content-addressable model.</p>
    <h2>Opciones comunes</h2>
    <table>
      <thead><tr><th>Opción</th><th>Descripción</th></tr></thead>
      <tbody>
        <tr><td><code>-t &lt;type&gt;</code></td><td>Object type (default <code>blob</code>).</td></tr>
        <tr><td><code>-w</code></td><td>Write the object to the database.</td></tr>
        <tr><td><code>--stdin</code></td><td>Read content from standard input.</td></tr>
        <tr><td><code>--stdin-paths</code></td><td>Read filenames from stdin.</td></tr>
        <tr><td><code>--no-filters</code></td><td>Skip smudge/clean filters.</td></tr>
        <tr><td><code>--literally</code></td><td>Don't validate content type.</td></tr>
      </tbody>
    </table>
    <h2>Ejemplos</h2>
    <pre><code>git hash-object README.md
    # Print the SHA Git would assign

    echo "hello" | git hash-object --stdin
    # Hash arbitrary content

    git hash-object -w newfile.txt
    # Add the file's content as a blob in the object DB

    find . -name '*.png' | git hash-object --stdin-paths
    # Batch-compute hashes for many files</code></pre>
    <h2>Errores comunes</h2>
    <p>Using <code>-w</code> creates a dangling blob if you don't reference it from a tree. <code>git gc</code> will eventually prune unreachable objects. Hashing through filters (CRLF normalization) yields different SHAs than raw bytes — pass <code>--no-filters</code> to compare with raw hashes from other tools.</p>
    <h2>Comandos relacionados</h2>
    <p><code>git add</code>, <code>git cat-file</code>, <code>git update-index</code>, <code>git write-tree</code></p>
- source_title: git ls-tree — List the contents of a tree object
  title: git ls-tree — Listar los contenidos de un objeto tree
  langcode: es
  body: |
    <h2>Sinopsis</h2>
    <pre><code>git ls-tree [-r] [-d] [-l] [--name-only] &lt;tree-ish&gt; [&lt;path&gt;...]</code></pre>
    <h2>Descripción</h2>
        <p>El comando <code>git ls-tree</code> lista los contenidos de un objeto tree: archivos, modos, tipos y SHAs. A diferencia de <code>git ls-files</code> (que muestra el index), opera sobre cualquier tree en cualquier commit.</p>
        <p>Usado por scripts que necesitan navegar la estructura de directorios en una revisión específica. Combinado con <code>-r</code>, recurse en subtrees.</p>
        <p>En el uso diario, este comando se integra estrechamente con alias de shell, plugins de editor e integración continua. Los usuarios avanzados a menudo añaden alias que combinan los flags que siempre pasan. El formato de salida puede personalizarse vía configuración de Git. Cuando algo sale mal, ejecuta el comando con <code>GIT_TRACE=1</code> para revelar las llamadas plumbing subyacentes.</p><p>Entender cómo este comando interactúa con el resto del modelo de datos de Git rinde dividendos. Cada comando opera sobre algún subconjunto de las piezas (objetos, index, refs, árbol de trabajo), y saber cuáles toca ayuda a predecir resultados y a recuperarse de errores.</p>
        <h2>Cuándo usar</h2>
    <p>Most developers reach for <code>git show &lt;rev&gt;:&lt;path&gt;</code> or <code>git ls-files</code> instead. <code>ls-tree</code> shines in scripts that need exact mode/type/SHA information, or when traversing a tree of any commit (not just HEAD's index).</p>
    <h2>Opciones comunes</h2>
    <table>
      <thead><tr><th>Opción</th><th>Descripción</th></tr></thead>
      <tbody>
        <tr><td><code>-r</code></td><td>Recurse into subtrees.</td></tr>
        <tr><td><code>-d</code></td><td>Show only directories (trees).</td></tr>
        <tr><td><code>-l</code></td><td>Include the size of blob entries.</td></tr>
        <tr><td><code>--name-only</code></td><td>Show only file names.</td></tr>
        <tr><td><code>-z</code></td><td>NUL-terminate output for safe parsing.</td></tr>
        <tr><td><code>--full-tree</code></td><td>Don't restrict by current directory.</td></tr>
      </tbody>
    </table>
    <h2>Ejemplos</h2>
    <pre><code>git ls-tree HEAD
    # Top-level entries of HEAD's tree

    git ls-tree -r HEAD --name-only
    # All file paths at HEAD

    git ls-tree -r -l v1.0 src/
    # Sizes and SHAs for every file under src/ at v1.0

    git ls-tree HEAD -- 'docs/*.md'
    # Just markdown files in docs/</code></pre>
    <h2>Errores comunes</h2>
    <p>Mixing up working-directory-relative versus repo-root-relative paths. Use <code>--full-tree</code> for unambiguous root-relative output. Without <code>-r</code>, only one level is shown — easy to miss nested files.</p>
    <h2>Comandos relacionados</h2>
    <p><code>git ls-files</code>, <code>git show</code>, <code>git cat-file</code>, <code>git diff-tree</code></p>
- source_title: git ls-files — Show information about files in the index and working tree
  title: git ls-files — Mostrar información sobre archivos en el index y árbol de trabajo
  langcode: es
  body: |
    <h2>Sinopsis</h2>
    <pre><code>git ls-files [-c] [-d] [-m] [-o] [-i] [--exclude-standard]</code></pre>
    <h2>Descripción</h2>
        <p>El comando <code>git ls-files</code> lista archivos en el index y árbol de trabajo. Sin opciones muestra archivos rastreados; con <code>--others</code> muestra no rastreados; con <code>--ignored</code> muestra ignorados.</p>
        <p>Plumbing usado por scripts que necesitan saber exactamente qué archivos rastrea Git. Más estable que parsear <code>git status</code>.</p>
        <p>En el uso diario, este comando se integra estrechamente con alias de shell, plugins de editor e integración continua. Los usuarios avanzados a menudo añaden alias que combinan los flags que siempre pasan. El formato de salida puede personalizarse vía configuración de Git. Cuando algo sale mal, ejecuta el comando con <code>GIT_TRACE=1</code> para revelar las llamadas plumbing subyacentes.</p><p>Entender cómo este comando interactúa con el resto del modelo de datos de Git rinde dividendos. Cada comando opera sobre algún subconjunto de las piezas (objetos, index, refs, árbol de trabajo), y saber cuáles toca ayuda a predecir resultados y a recuperarse de errores.</p>
        <h2>Cuándo usar</h2>
    <p>Most users invoke porcelain like <code>git status</code> or <code>git grep</code> rather than <code>ls-files</code>. Reach for it in scripts that operate on tracked files (lint tools, formatters, sync scripts) where you want a clean, ignore-aware list.</p>
    <h2>Opciones comunes</h2>
    <table>
      <thead><tr><th>Opción</th><th>Descripción</th></tr></thead>
      <tbody>
        <tr><td><code>-c</code>, <code>--cached</code></td><td>Show cached files (default).</td></tr>
        <tr><td><code>-d</code></td><td>Show deleted files.</td></tr>
        <tr><td><code>-m</code></td><td>Show modified files.</td></tr>
        <tr><td><code>-o</code></td><td>Show other (untracked) files.</td></tr>
        <tr><td><code>-i</code></td><td>Show ignored files.</td></tr>
        <tr><td><code>--exclude-standard</code></td><td>Apply standard ignore rules.</td></tr>
        <tr><td><code>-s</code>, <code>--stage</code></td><td>Show stage info (for unmerged paths).</td></tr>
        <tr><td><code>-z</code></td><td>NUL-terminated output.</td></tr>
      </tbody>
    </table>
    <h2>Ejemplos</h2>
    <pre><code>git ls-files
    # Every tracked file

    git ls-files -o --exclude-standard
    # Untracked, non-ignored files

    git ls-files -m
    # Locally modified tracked files

    git ls-files -s
    # Show mode, SHA, and stage number for each entry</code></pre>
    <h2>Errores comunes</h2>
    <p>Forgetting <code>--exclude-standard</code> when listing untracked files swamps you with ignored junk. Combining filters can be confusing — if you pass both <code>-c</code> and <code>-o</code>, the meaning depends on context.</p>
    <h2>Comandos relacionados</h2>
    <p><code>git status</code>, <code>git ls-tree</code>, <code>git update-index</code>, <code>git grep</code></p>
- source_title: git rev-parse — Pick out and massage parameters
  title: git rev-parse — Extraer y procesar parámetros
  langcode: es
  body: |
    <h2>Sinopsis</h2>
    <pre><code>git rev-parse [&lt;options&gt;] &lt;arg&gt;...</code></pre>
    <h2>Descripción</h2>
        <p>El comando <code>git rev-parse</code> es el navaja suiza de plumbing para resolver nombres de revisión a SHAs. Toma cualquier referencia (<code>HEAD</code>, branch, tag, expresión como <code>HEAD~3</code>) y devuelve el SHA correspondiente.</p>
        <p>También responde preguntas estructurales: <code>--git-dir</code>, <code>--show-toplevel</code>, <code>--is-inside-work-tree</code>. Esencial para scripts que necesitan ubicar archivos relativos al repo.</p>
        <p>En el uso diario, este comando se integra estrechamente con alias de shell, plugins de editor e integración continua. Los usuarios avanzados a menudo añaden alias que combinan los flags que siempre pasan. El formato de salida puede personalizarse vía configuración de Git. Cuando algo sale mal, ejecuta el comando con <code>GIT_TRACE=1</code> para revelar las llamadas plumbing subyacentes.</p><p>Entender cómo este comando interactúa con el resto del modelo de datos de Git rinde dividendos. Cada comando opera sobre algún subconjunto de las piezas (objetos, index, refs, árbol de trabajo), y saber cuáles toca ayuda a predecir resultados y a recuperarse de errores.</p>
        <h2>Cuándo usar</h2>
    <p>You'll see <code>git rev-parse</code> in nearly every shell script that wraps Git: to get the current branch name, the repo root, or to validate that an argument is a valid commit. Most users don't run it directly day-to-day, but knowledge of it dramatically improves Git scripting fluency.</p>
    <h2>Opciones comunes</h2>
    <table>
      <thead><tr><th>Opción</th><th>Descripción</th></tr></thead>
      <tbody>
        <tr><td><code>--abbrev-ref</code></td><td>Print short ref name (e.g. <code>main</code>, not <code>refs/heads/main</code>).</td></tr>
        <tr><td><code>--short</code></td><td>Output abbreviated SHA.</td></tr>
        <tr><td><code>--show-toplevel</code></td><td>Print absolute path of repo root.</td></tr>
        <tr><td><code>--git-dir</code></td><td>Print absolute path of <code>.git</code>.</td></tr>
        <tr><td><code>--is-inside-work-tree</code></td><td>Yes/no script-friendly answer.</td></tr>
        <tr><td><code>--verify</code></td><td>Validate that the argument is a real ref.</td></tr>
        <tr><td><code>--quiet</code></td><td>Suppress error output.</td></tr>
      </tbody>
    </table>
    <h2>Ejemplos</h2>
    <pre><code>git rev-parse HEAD
    # Full SHA of current commit

    git rev-parse --abbrev-ref HEAD
    # Current branch name (or "HEAD" if detached)

    git rev-parse --show-toplevel
    # Path to repo root, useful in scripts

    git rev-parse --verify origin/main &gt;/dev/null && echo OK
    # Test whether a ref exists</code></pre>
    <h2>Errores comunes</h2>
    <p>Using <code>git rev-parse</code> on user input without <code>--verify</code> can succeed for ambiguous arguments and produce surprising results. In subshells, <code>--show-toplevel</code> is a more reliable anchor than <code>$PWD</code>.</p>
    <h2>Comandos relacionados</h2>
    <p><code>git symbolic-ref</code>, <code>git rev-list</code>, <code>git for-each-ref</code>, <code>git config</code></p>
- source_title: git rev-list — List commit objects in reverse chronological order
  title: git rev-list — Listar objetos commit en orden cronológico inverso
  langcode: es
  body: |
    <h2>Sinopsis</h2>
    <pre><code>git rev-list [&lt;options&gt;] &lt;commit&gt;...</code></pre>
    <h2>Descripción</h2>
        <p>El comando <code>git rev-list</code> lista commits alcanzables desde una o más refs, en orden cronológico inverso. Es la base plumbing detrás de <code>git log</code> sin el formato amigable.</p>
        <p>Útil cuando solo necesitas SHAs (no contenido formateado), o para contar commits con <code>--count</code>. Combinado con <code>--ancestry-path</code>, identifica el camino exacto entre dos commits.</p>
        <p>En el uso diario, este comando se integra estrechamente con alias de shell, plugins de editor e integración continua. Los usuarios avanzados a menudo añaden alias que combinan los flags que siempre pasan. El formato de salida puede personalizarse vía configuración de Git. Cuando algo sale mal, ejecuta el comando con <code>GIT_TRACE=1</code> para revelar las llamadas plumbing subyacentes.</p><p>Entender cómo este comando interactúa con el resto del modelo de datos de Git rinde dividendos. Cada comando opera sobre algún subconjunto de las piezas (objetos, index, refs, árbol de trabajo), y saber cuáles toca ayuda a predecir resultados y a recuperarse de errores.</p>
        <h2>Cuándo usar</h2>
    <p>Power users and toolsmiths use <code>rev-list</code> in scripts. Day-to-day developers use <code>git log</code>, which is built on top of <code>rev-list</code> but produces human-friendly output.</p>
    <h2>Opciones comunes</h2>
    <table>
      <thead><tr><th>Opción</th><th>Descripción</th></tr></thead>
      <tbody>
        <tr><td><code>--count</code></td><td>Print just the number of commits.</td></tr>
        <tr><td><code>--max-count=&lt;n&gt;</code></td><td>Limit how many commits to list.</td></tr>
        <tr><td><code>--reverse</code></td><td>Output oldest first.</td></tr>
        <tr><td><code>--no-merges</code></td><td>Exclude merge commits.</td></tr>
        <tr><td><code>--first-parent</code></td><td>Follow only the first parent of each merge.</td></tr>
        <tr><td><code>--ancestry-path</code></td><td>Restrict to commits between two endpoints.</td></tr>
        <tr><td><code>--all</code></td><td>Include every ref as a starting point.</td></tr>
      </tbody>
    </table>
    <h2>Ejemplos</h2>
    <pre><code>git rev-list --count HEAD
    # Total number of commits reachable from HEAD

    git rev-list main..feature
    # SHAs unique to feature

    git rev-list --no-merges --since="1 month ago" main
    # Non-merge commits in the last month

    git rev-list --max-parents=0 HEAD
    # Find root commits (no parents)</code></pre>
    <h2>Errores comunes</h2>
    <p>Forgetting that ranges with two dots exclude commits reachable from the left side. <code>--first-parent</code> changes the meaning of "ancestry" significantly. On huge repos, unbounded rev-list can be slow — pair with <code>--max-count</code> or path filters.</p>
    <h2>Comandos relacionados</h2>
    <p><code>git log</code>, <code>git rev-parse</code>, <code>git merge-base</code>, <code>git bisect</code></p>
- source_title: git for-each-ref — Output information on each ref
  title: git for-each-ref — Mostrar información sobre cada ref
  langcode: es
  body: |
    <h2>Sinopsis</h2>
    <pre><code>git for-each-ref [--format=&lt;fmt&gt;] [--sort=&lt;key&gt;] [&lt;pattern&gt;...]</code></pre>
    <h2>Descripción</h2>
        <p>El comando <code>git for-each-ref</code> itera sobre todas las refs (o un subconjunto especificado) y produce salida formateada. Es la herramienta plumbing para listar branches, tags y otras refs en formato parseable.</p>
        <p>Soporta un poderoso lenguaje de formato (<code>--format='%(refname:short) %(objectname:short)'</code>) para extraer exactamente los campos que necesitas en scripts.</p>
        <p>En el uso diario, este comando se integra estrechamente con alias de shell, plugins de editor e integración continua. Los usuarios avanzados a menudo añaden alias que combinan los flags que siempre pasan. El formato de salida puede personalizarse vía configuración de Git. Cuando algo sale mal, ejecuta el comando con <code>GIT_TRACE=1</code> para revelar las llamadas plumbing subyacentes.</p><p>Entender cómo este comando interactúa con el resto del modelo de datos de Git rinde dividendos. Cada comando opera sobre algún subconjunto de las piezas (objetos, index, refs, árbol de trabajo), y saber cuáles toca ayuda a predecir resultados y a recuperarse de errores.</p>
        <h2>Cuándo usar</h2>
    <p>Reach for <code>for-each-ref</code> in scripts that need detailed ref metadata: build version selectors, dashboards of branch ages, automated cleanup of stale branches, or release-note generators.</p>
    <h2>Opciones comunes</h2>
    <table>
      <thead><tr><th>Opción</th><th>Descripción</th></tr></thead>
      <tbody>
        <tr><td><code>--format=&lt;fmt&gt;</code></td><td>Format string with field placeholders.</td></tr>
        <tr><td><code>--sort=&lt;key&gt;</code></td><td>Sort by field (prefix <code>-</code> for descending).</td></tr>
        <tr><td><code>--count=&lt;n&gt;</code></td><td>Limit number of entries.</td></tr>
        <tr><td><code>--contains &lt;commit&gt;</code></td><td>Refs containing the given commit.</td></tr>
        <tr><td><code>--merged &lt;commit&gt;</code></td><td>Refs merged into the given commit.</td></tr>
        <tr><td><code>--points-at &lt;commit&gt;</code></td><td>Refs that directly point at a commit.</td></tr>
      </tbody>
    </table>
    <h2>Ejemplos</h2>
    <pre><code>git for-each-ref --format='%(refname:short) %(objectname:short)' refs/heads/
    # Local branch names with abbreviated SHAs

    git for-each-ref --sort=-committerdate --count=10 \
      --format='%(committerdate:short) %(refname:short)' refs/heads/
    # Top 10 most recently updated branches

    git for-each-ref --sort=-v:refname --format='%(refname:short)' refs/tags/ | head -5
    # Five highest semver tags</code></pre>
    <h2>Errores comunes</h2>
    <p>Forgetting the trailing <code>/</code> on <code>refs/heads/</code> patterns can match unintended refs. Format strings can be tricky — quote field names with parentheses. <code>--sort=v:refname</code> only works on tags that look like versions.</p>
    <h2>Comandos relacionados</h2>
    <p><code>git branch</code>, <code>git tag</code>, <code>git ls-remote</code>, <code>git rev-parse</code></p>
- source_title: git update-ref — Update the object name stored in a ref safely
  title: git update-ref — Actualizar el nombre del objeto almacenado en una ref de forma segura
  langcode: es
  body: |
    <h2>Sinopsis</h2>
    <pre><code>git update-ref [-d] [--create-reflog] &lt;ref&gt; &lt;newvalue&gt; [&lt;oldvalue&gt;]</code></pre>
    <h2>Descripción</h2>
        <p>El comando <code>git update-ref</code> es plumbing para crear, mover o eliminar refs (branches, tags, refs personalizadas). Soporta compare-and-set para evitar carreras: la actualización solo tiene éxito si el valor actual coincide con el esperado.</p>
        <p>Usado por scripts que manipulan refs directamente. Más seguro que editar archivos bajo <code>.git/refs/</code> a mano.</p>
        <p>En el uso diario, este comando se integra estrechamente con alias de shell, plugins de editor e integración continua. Los usuarios avanzados a menudo añaden alias que combinan los flags que siempre pasan. El formato de salida puede personalizarse vía configuración de Git. Cuando algo sale mal, ejecuta el comando con <code>GIT_TRACE=1</code> para revelar las llamadas plumbing subyacentes.</p><p>Entender cómo este comando interactúa con el resto del modelo de datos de Git rinde dividendos. Cada comando opera sobre algún subconjunto de las piezas (objetos, index, refs, árbol de trabajo), y saber cuáles toca ayuda a predecir resultados y a recuperarse de errores.</p>
        <h2>Cuándo usar</h2>
    <p>Most developers never need this. Use it when writing automation that creates, moves, or deletes refs in custom namespaces (notes, replace, custom systems), or when a porcelain command isn't appropriate (e.g., creating a ref that points at an arbitrary tree).</p>
    <h2>Opciones comunes</h2>
    <table>
      <thead><tr><th>Opción</th><th>Descripción</th></tr></thead>
      <tbody>
        <tr><td><code>-d &lt;ref&gt; [&lt;oldvalue&gt;]</code></td><td>Delete a ref (optionally compare-and-swap).</td></tr>
        <tr><td><code>--no-deref</code></td><td>Don't follow symbolic refs.</td></tr>
        <tr><td><code>--create-reflog</code></td><td>Create a reflog if missing.</td></tr>
        <tr><td><code>-m &lt;reason&gt;</code></td><td>Reflog reason for this update.</td></tr>
        <tr><td><code>--stdin</code></td><td>Read updates from stdin (atomic batch).</td></tr>
      </tbody>
    </table>
    <h2>Ejemplos</h2>
    <pre><code>git update-ref refs/heads/feature abc123
    # Move feature branch to commit abc123

    git update-ref -d refs/heads/old-experiment
    # Delete a branch ref directly

    git update-ref refs/notes/ci HEAD def456
    # Move a custom notes ref atomically

    # Atomic multi-ref update via stdin:
    printf 'update refs/heads/main %s\nupdate refs/heads/dev %s\n' "$NEW1" "$NEW2" | \
      git update-ref --stdin</code></pre>
    <h2>Errores comunes</h2>
    <p>Bypassing safety by editing <code>.git/refs/</code> files directly can corrupt packed refs or skip reflog entries. Always use <code>update-ref</code>. Forgetting to provide <code>&lt;oldvalue&gt;</code> defeats the compare-and-swap protection — provide it whenever you can.</p>
    <h2>Comandos relacionados</h2>
    <p><code>git symbolic-ref</code>, <code>git pack-refs</code>, <code>git for-each-ref</code>, <code>git branch</code></p>
- source_title: git symbolic-ref — Read, modify, and delete symbolic refs
  title: git symbolic-ref — Leer, modificar y eliminar refs simbólicas
  langcode: es
  body: |
    <h2>Sinopsis</h2>
    <pre><code>git symbolic-ref [--short] &lt;name&gt; [&lt;ref&gt;]
    git symbolic-ref --delete &lt;name&gt;</code></pre>
    <h2>Descripción</h2>
        <p>El comando <code>git symbolic-ref</code> lee y escribe refs simbólicas: refs cuyo valor es otro nombre de ref en lugar de un SHA. <code>HEAD</code> es el ejemplo canónico (apunta a <code>refs/heads/main</code>).</p>
        <p>Usado para inspeccionar el branch actual desde scripts y para configurar el HEAD predeterminado de remotos sin hacer un checkout.</p>
        <p>En el uso diario, este comando se integra estrechamente con alias de shell, plugins de editor e integración continua. Los usuarios avanzados a menudo añaden alias que combinan los flags que siempre pasan. El formato de salida puede personalizarse vía configuración de Git. Cuando algo sale mal, ejecuta el comando con <code>GIT_TRACE=1</code> para revelar las llamadas plumbing subyacentes.</p><p>Entender cómo este comando interactúa con el resto del modelo de datos de Git rinde dividendos. Cada comando opera sobre algún subconjunto de las piezas (objetos, index, refs, árbol de trabajo), y saber cuáles toca ayuda a predecir resultados y a recuperarse de errores.</p>
        <h2>Cuándo usar</h2>
    <p>Use this when you need to switch HEAD without touching the working tree (e.g., during a custom migration), or when scripting around the default-branch concept. Most users only ever read symbolic refs via <code>git rev-parse --abbrev-ref HEAD</code>.</p>
    <h2>Opciones comunes</h2>
    <table>
      <thead><tr><th>Opción</th><th>Descripción</th></tr></thead>
      <tbody>
        <tr><td><code>--short</code></td><td>Print the short name (e.g. <code>main</code>).</td></tr>
        <tr><td><code>--delete</code></td><td>Delete the symbolic ref.</td></tr>
        <tr><td><code>--quiet</code></td><td>Don't print error if ref is missing.</td></tr>
        <tr><td><code>-m &lt;reason&gt;</code></td><td>Reflog reason for changes.</td></tr>
      </tbody>
    </table>
    <h2>Ejemplos</h2>
    <pre><code>git symbolic-ref HEAD
    # refs/heads/main

    git symbolic-ref --short HEAD
    # main

    git symbolic-ref refs/remotes/origin/HEAD refs/remotes/origin/main
    # Set the default branch indicator on origin

    git symbolic-ref HEAD refs/heads/develop
    # Switch HEAD without touching working tree (advanced!)</code></pre>
    <h2>Errores comunes</h2>
    <p>Switching HEAD via <code>symbolic-ref</code> doesn't update the working tree — files won't change. Use <code>git switch</code> for the everyday case. Setting <code>origin/HEAD</code> incorrectly confuses tools that look up the default branch.</p>
    <h2>Comandos relacionados</h2>
    <p><code>git update-ref</code>, <code>git switch</code>, <code>git rev-parse</code>, <code>git remote set-head</code></p>
- source_title: git pack-objects — Create a packed archive of objects
  title: git pack-objects — Crear un archivo empaquetado de objetos
  langcode: es
  body: |
    <h2>Sinopsis</h2>
    <pre><code>git pack-objects [--stdout] [--all] &lt;base-name&gt; &lt; &lt;object-list&gt;</code></pre>
    <h2>Descripción</h2>
        <p>El comando <code>git pack-objects</code> es plumbing que crea archivos pack: contenedores comprimidos con compresión delta de muchos objetos en un solo archivo. Los packs son cómo Git almacena objetos eficientemente y los transfiere por la red.</p>
        <p>Normalmente invocado por <code>git gc</code>, <code>git repack</code> y operaciones de fetch/push. Los usuarios rara vez lo invocan directamente.</p>
        <p>En el uso diario, este comando se integra estrechamente con alias de shell, plugins de editor e integración continua. Los usuarios avanzados a menudo añaden alias que combinan los flags que siempre pasan. El formato de salida puede personalizarse vía configuración de Git. Cuando algo sale mal, ejecuta el comando con <code>GIT_TRACE=1</code> para revelar las llamadas plumbing subyacentes.</p><p>Entender cómo este comando interactúa con el resto del modelo de datos de Git rinde dividendos. Cada comando opera sobre algún subconjunto de las piezas (objetos, index, refs, árbol de trabajo), y saber cuáles toca ayuda a predecir resultados y a recuperarse de errores.</p>
        <h2>Cuándo usar</h2>
    <p>You almost never invoke this directly. <code>git gc</code>, <code>git repack</code>, and the network protocol drive it for you. Reach for it manually when implementing custom transport, optimizing storage, or experimenting with delta strategies.</p>
    <h2>Opciones comunes</h2>
    <table>
      <thead><tr><th>Opción</th><th>Descripción</th></tr></thead>
      <tbody>
        <tr><td><code>--stdout</code></td><td>Write the pack to stdout instead of files.</td></tr>
        <tr><td><code>--all</code></td><td>Pack everything reachable from any ref.</td></tr>
        <tr><td><code>--revs</code></td><td>Read revisions from stdin instead of object SHAs.</td></tr>
        <tr><td><code>--depth=&lt;n&gt;</code></td><td>Maximum delta chain depth.</td></tr>
        <tr><td><code>--window=&lt;n&gt;</code></td><td>Window size for delta search.</td></tr>
        <tr><td><code>--thin</code></td><td>Allow thin packs (deltas against external objects).</td></tr>
        <tr><td><code>--no-reuse-delta</code></td><td>Recompute deltas instead of reusing existing.</td></tr>
      </tbody>
    </table>
    <h2>Ejemplos</h2>
    <pre><code>git rev-list --objects --all | git pack-objects --stdout &gt; everything.pack
    # Build a single pack of every reachable object

    git rev-list --objects HEAD ^origin/main | \
      git pack-objects --thin --stdout &gt; ahead.pack
    # A thin pack of just the commits ahead of origin/main

    git pack-objects --all .git/objects/pack/extra
    # Repack all reachable objects into a new pack named "extra"</code></pre>
    <h2>Errores comunes</h2>
    <p>Building large packs with <code>--depth</code> and <code>--window</code> set too high consumes lots of memory and CPU. The defaults from <code>git gc</code> are sensible for most repos. Producing thin packs without context (an existing repo to apply them to) is useless.</p>
    <h2>Comandos relacionados</h2>
    <p><code>git unpack-objects</code>, <code>git verify-pack</code>, <code>git gc</code>, <code>git repack</code></p>
- source_title: git unpack-objects — Unpack objects from a packed archive
  title: git unpack-objects — Desempaquetar objetos de un archivo empaquetado
  langcode: es
  body: |
    <h2>Sinopsis</h2>
    <pre><code>git unpack-objects [-r] [-q] &lt; &lt;pack-file&gt;</code></pre>
    <h2>Descripción</h2>
        <p>El comando <code>git unpack-objects</code> es la inversa de <code>pack-objects</code>: lee un archivo pack y explota cada objeto a un archivo suelto bajo <code>.git/objects/</code>. Útil para depurar packs corruptos o para inspección de bajo nivel.</p>
        <p>Después de explotar, los objetos están en forma suelta hasta que <code>git gc</code> los reempaqueta. Útil para extraer un solo objeto malo de un pack que de lo contrario está derribando operaciones.</p>
        <p>En el uso diario, este comando se integra estrechamente con alias de shell, plugins de editor e integración continua. Los usuarios avanzados a menudo añaden alias que combinan los flags que siempre pasan. El formato de salida puede personalizarse vía configuración de Git. Cuando algo sale mal, ejecuta el comando con <code>GIT_TRACE=1</code> para revelar las llamadas plumbing subyacentes.</p><p>Entender cómo este comando interactúa con el resto del modelo de datos de Git rinde dividendos. Cada comando opera sobre algún subconjunto de las piezas (objetos, index, refs, árbol de trabajo), y saber cuáles toca ayuda a predecir resultados y a recuperarse de errores.</p>
        <h2>Cuándo usar</h2>
    <p>Most developers never need this. It's used for recovering from a corrupt pack (unpack what's salvageable, then re-pack), for testing, or when integrating a small bundle into a repo where the loose-object format is preferable.</p>
    <h2>Opciones comunes</h2>
    <table>
      <thead><tr><th>Opción</th><th>Descripción</th></tr></thead>
      <tbody>
        <tr><td><code>-n</code></td><td>Dry-run: show what would be unpacked.</td></tr>
        <tr><td><code>-q</code></td><td>Quiet, no progress.</td></tr>
        <tr><td><code>-r</code></td><td>Recover what's possible from a damaged pack.</td></tr>
        <tr><td><code>--strict</code></td><td>Refuse to write objects with broken links.</td></tr>
      </tbody>
    </table>
    <h2>Ejemplos</h2>
    <pre><code>git unpack-objects &lt; pack-abc.pack
    # Explode pack into loose objects

    git unpack-objects -r &lt; broken.pack
    # Salvage what we can from a damaged pack

    git unpack-objects -n &lt; somepack.pack
    # Just preview what would be unpacked</code></pre>
    <h2>Errores comunes</h2>
    <p>Unpacking a huge pack creates many tiny files and slows the filesystem. Almost every operational scenario prefers keeping the pack intact. Pair this with <code>git fsck</code> when troubleshooting corruption. <code>git help unpack-objects</code> opens the full manual page with comprehensive coverage of every option and edge case; it remains the authoritative reference whenever the summary on this page leaves a question unanswered. For team workflows, capturing how your project uses this command in a CONTRIBUTING document avoids repeated onboarding questions and keeps everyone aligned on conventions.</p>
    <h2>Comandos relacionados</h2>
    <p><code>git pack-objects</code>, <code>git verify-pack</code>, <code>git fsck</code>, <code>git gc</code></p>
- source_title: git verify-pack — Validate packed Git archive files
  title: git verify-pack — Validar archivos pack de Git
  langcode: es
  body: |
    <h2>Sinopsis</h2>
    <pre><code>git verify-pack [-v] [--stat-only] &lt;pack&gt;.idx</code></pre>
    <h2>Descripción</h2>
        <p>El comando <code>git verify-pack</code> verifica la integridad de un archivo pack: comprueba que los SHAs de los objetos coinciden con sus contenidos comprimidos y reporta detalles de delta y tamaño. Esencial para diagnosticar corrupción.</p>
        <p>Con <code>-v</code>, lista cada objeto en el pack con tipo, tamaño y profundidad de delta. Combinado con <code>git fsck</code>, puede detectar y aislar problemas de almacenamiento.</p>
        <p>En el uso diario, este comando se integra estrechamente con alias de shell, plugins de editor e integración continua. Los usuarios avanzados a menudo añaden alias que combinan los flags que siempre pasan. El formato de salida puede personalizarse vía configuración de Git. Cuando algo sale mal, ejecuta el comando con <code>GIT_TRACE=1</code> para revelar las llamadas plumbing subyacentes.</p><p>Entender cómo este comando interactúa con el resto del modelo de datos de Git rinde dividendos. Cada comando opera sobre algún subconjunto de las piezas (objetos, index, refs, árbol de trabajo), y saber cuáles toca ayuda a predecir resultados y a recuperarse de errores.</p>
        <h2>Cuándo usar</h2>
    <p>Most users never run this. It's invaluable for repository forensics — finding which large blobs are eating space, understanding delta chain health, or diagnosing corruption.</p>
    <h2>Opciones comunes</h2>
    <table>
      <thead><tr><th>Opción</th><th>Descripción</th></tr></thead>
      <tbody>
        <tr><td><code>-v</code></td><td>Verbose: list every object.</td></tr>
        <tr><td><code>--stat-only</code></td><td>Show summary statistics only.</td></tr>
        <tr><td><code>-O &lt;file&gt;</code></td><td>Read pack-list from file.</td></tr>
      </tbody>
    </table>
    <h2>Ejemplos</h2>
    <pre><code>git verify-pack -v .git/objects/pack/pack-*.idx
    # Detailed listing of objects in every pack

    # Find the biggest blobs in the repository:
    git verify-pack -v .git/objects/pack/*.idx | \
      sort -k 3 -n | tail -20

    git verify-pack --stat-only .git/objects/pack/pack-*.idx
    # Summary stats per pack</code></pre>
    <h2>Errores comunes</h2>
    <p>Pointing at a <code>.pack</code> instead of <code>.idx</code> fails — always pass the index. Sorting verify-pack output to find big files works, but don't forget to also examine loose objects with <code>git count-objects -v</code>.</p>
    <h2>Comandos relacionados</h2>
    <p><code>git fsck</code>, <code>git gc</code>, <code>git repack</code>, <code>git count-objects</code></p>
- source_title: git count-objects — Count unpacked objects and disk usage
  title: git count-objects — Contar objetos no empaquetados y uso de disco
  langcode: es
  body: |
    <h2>Sinopsis</h2>
    <pre><code>git count-objects [-v] [-H]</code></pre>
    <h2>Descripción</h2>
        <p>El comando <code>git count-objects</code> reporta cuántos objetos sueltos hay en <code>.git/objects/</code> y cuánto espacio en disco usan. Con <code>-v</code>, también incluye estadísticas de packs y objetos basura.</p>
        <p>Útil para monitorear cuándo es momento de ejecutar <code>git gc</code>: muchos objetos sueltos indican que el repo se beneficiaría del empaquetamiento.</p>
        <p>En el uso diario, este comando se integra estrechamente con alias de shell, plugins de editor e integración continua. Los usuarios avanzados a menudo añaden alias que combinan los flags que siempre pasan. El formato de salida puede personalizarse vía configuración de Git. Cuando algo sale mal, ejecuta el comando con <code>GIT_TRACE=1</code> para revelar las llamadas plumbing subyacentes.</p><p>Entender cómo este comando interactúa con el resto del modelo de datos de Git rinde dividendos. Cada comando opera sobre algún subconjunto de las piezas (objetos, index, refs, árbol de trabajo), y saber cuáles toca ayuda a predecir resultados y a recuperarse de errores.</p>
        <h2>Cuándo usar</h2>
    <p>Run <code>git count-objects -v</code> to gauge whether a repo needs <code>git gc</code>: if loose-object count is high or there are many small packs, garbage collection will compact things. CI and ops teams use it for monitoring repo health.</p>
    <h2>Opciones comunes</h2>
    <table>
      <thead><tr><th>Opción</th><th>Descripción</th></tr></thead>
      <tbody>
        <tr><td><code>-v</code></td><td>Verbose breakdown.</td></tr>
        <tr><td><code>-H</code>, <code>--human-readable</code></td><td>Sizes in KiB/MiB/GiB.</td></tr>
      </tbody>
    </table>
    <h2>Ejemplos</h2>
    <pre><code>git count-objects
    # Quick: number of loose objects and their size

    git count-objects -vH
    # Full breakdown with human-readable sizes
    # count: 235 (loose objects)
    # size: 5.2 MiB
    # in-pack: 18234
    # packs: 3
    # size-pack: 142.6 MiB
    # prune-packable: 12
    # garbage: 0</code></pre>
    <h2>Errores comunes</h2>
    <p>Misreading "garbage" — these are corrupt objects, not just unreachable ones. A non-zero garbage count warrants investigation. <code>prune-packable</code> indicates objects present both loose and in packs; running <code>git gc</code> will resolve them.</p>
    <h2>Comandos relacionados</h2>
    <p><code>git gc</code>, <code>git fsck</code>, <code>git repack</code>, <code>git verify-pack</code></p>
- source_title: git gc — Cleanup unnecessary files and optimize the local repository
  title: git gc — Limpiar archivos innecesarios y optimizar el repositorio local
  langcode: es
  body: |
    <h2>Sinopsis</h2>
    <pre><code>git gc [--auto] [--aggressive] [--prune=&lt;date&gt;]</code></pre>
    <h2>Descripción</h2>
        <p>El comando <code>git gc</code> ('garbage collect') empaqueta objetos sueltos en archivos pack, elimina objetos inalcanzables más viejos que la ventana de prune, y expira entradas viejas del reflog. Mantiene el repo compacto y rápido.</p>
        <p>Auto-gc se dispara automáticamente cuando se acumulan demasiados objetos sueltos. Ejecutar <code>git gc</code> manualmente es seguro pero rara vez necesario; <code>--aggressive</code> es CPU-pesado y rara vez vale la pena.</p>
        <p>En el uso diario, este comando se integra estrechamente con alias de shell, plugins de editor e integración continua. Los usuarios avanzados a menudo añaden alias que combinan los flags que siempre pasan. El formato de salida puede personalizarse vía configuración de Git. Cuando algo sale mal, ejecuta el comando con <code>GIT_TRACE=1</code> para revelar las llamadas plumbing subyacentes.</p><p>Entender cómo este comando interactúa con el resto del modelo de datos de Git rinde dividendos. Cada comando opera sobre algún subconjunto de las piezas (objetos, index, refs, árbol de trabajo), y saber cuáles toca ayuda a predecir resultados y a recuperarse de errores.</p>
        <h2>Opciones comunes</h2>
    <table>
      <thead><tr><th>Opción</th><th>Descripción</th></tr></thead>
      <tbody>
        <tr><td><code>--auto</code></td><td>Run only if Git's heuristics say maintenance is needed.</td></tr>
        <tr><td><code>--aggressive</code></td><td>Spend more time finding optimal deltas.</td></tr>
        <tr><td><code>--prune=&lt;date&gt;</code></td><td>Prune unreachable objects older than this.</td></tr>
        <tr><td><code>--no-prune</code></td><td>Skip pruning of loose objects.</td></tr>
        <tr><td><code>--quiet</code></td><td>Suppress progress output.</td></tr>
        <tr><td><code>--force</code></td><td>Run even if another gc is in progress.</td></tr>
      </tbody>
    </table>
    <h2>Ejemplos</h2>
    <pre><code>git gc
    # Routine maintenance

    git gc --auto
    # What Git runs in the background; safe to call manually

    git gc --prune=now
    # Aggressively reclaim space; deletes recent unreachables (use with care)

    git gc --aggressive
    # Slow, exhaustive repacking — rarely worth it</code></pre>
    <h2>Errores comunes</h2>
    <p><code>--prune=now</code> immediately deletes unreachable objects, possibly including ones still referenced by reflog or stash. Don't use it casually. Disabling automatic gc on a large repo lets loose objects accumulate; configure <code>maintenance</code> instead for newer Git.</p>
    <h2>Comandos relacionados</h2>
    <p><code>git maintenance</code>, <code>git repack</code>, <code>git prune</code>, <code>git fsck</code></p>
- source_title: git fsck — Verify the connectivity and validity of objects
  title: git fsck — Verificar la conectividad y validez de objetos
  langcode: es
  body: |
    <h2>Sinopsis</h2>
    <pre><code>git fsck [--full] [--unreachable] [--dangling] [--lost-found]</code></pre>
    <h2>Descripción</h2>
        <p>El comando <code>git fsck</code> ('filesystem check') verifica la integridad de la base de datos de objetos: recalcula hashes, busca enlaces rotos, identifica objetos colgantes y reporta corrupción. Es seguro de ejecutar en cualquier repo.</p>
        <p>Con <code>--lost-found</code>, escribe objetos colgantes a <code>.git/lost-found/</code> para inspección. Esencial cuando un repo se vuelve sospechoso tras un crash o problema de disco.</p>
        <p>En el uso diario, este comando se integra estrechamente con alias de shell, plugins de editor e integración continua. Los usuarios avanzados a menudo añaden alias que combinan los flags que siempre pasan. El formato de salida puede personalizarse vía configuración de Git. Cuando algo sale mal, ejecuta el comando con <code>GIT_TRACE=1</code> para revelar las llamadas plumbing subyacentes.</p><p>Entender cómo este comando interactúa con el resto del modelo de datos de Git rinde dividendos. Cada comando opera sobre algún subconjunto de las piezas (objetos, index, refs, árbol de trabajo), y saber cuáles toca ayuda a predecir resultados y a recuperarse de errores.</p>
        <h2>Opciones comunes</h2>
    <table>
      <thead><tr><th>Opción</th><th>Descripción</th></tr></thead>
      <tbody>
        <tr><td><code>--full</code></td><td>Check every object, including reachable ones.</td></tr>
        <tr><td><code>--unreachable</code></td><td>Report unreachable objects.</td></tr>
        <tr><td><code>--dangling</code></td><td>Report dangling objects (default).</td></tr>
        <tr><td><code>--no-dangling</code></td><td>Suppress dangling listing.</td></tr>
        <tr><td><code>--lost-found</code></td><td>Write dangling objects to <code>.git/lost-found/</code>.</td></tr>
        <tr><td><code>--connectivity-only</code></td><td>Skip blob content verification.</td></tr>
        <tr><td><code>--strict</code></td><td>Report extra warnings.</td></tr>
      </tbody>
    </table>
    <h2>Ejemplos</h2>
    <pre><code>git fsck --full
    # Comprehensive check

    git fsck --lost-found
    # Materialize dangling commits/blobs into recoverable files

    git fsck --unreachable --no-reflogs
    # Find truly orphaned objects (ignoring reflog protection)

    git fsck --connectivity-only
    # Faster check that skips content hashing</code></pre>
    <h2>Errores comunes</h2>
    <p>Acting on "unreachable" warnings without considering reflog protection can lose recoverable work. <code>fsck</code> is read-only; it never deletes anything itself. Errors found by <code>fsck</code> are often resolved by <code>git gc</code> or by re-cloning a fresh copy.</p>
    <h2>Comandos relacionados</h2>
    <p><code>git gc</code>, <code>git reflog</code>, <code>git verify-pack</code>, <code>git prune</code></p>
- source_title: git prune — Prune all unreachable objects from the object database
  title: git prune — Podar todos los objetos inalcanzables de la base de datos de objetos
  langcode: es
  body: |
    <h2>Sinopsis</h2>
    <pre><code>git prune [-n] [--expire=&lt;date&gt;]</code></pre>
    <h2>Descripción</h2>
        <p>El comando <code>git prune</code> elimina objetos inalcanzables más viejos que la ventana de prune (predeterminado 2 semanas). Normalmente lo invoca <code>git gc</code>; raramente se ejecuta directamente.</p>
        <p>Los objetos inalcanzables suelen ser de operaciones canceladas, branches eliminados o reflogs expirados. La ventana de gracia previene que prune borre objetos que aún están siendo creados.</p>
        <p>En el uso diario, este comando se integra estrechamente con alias de shell, plugins de editor e integración continua. Los usuarios avanzados a menudo añaden alias que combinan los flags que siempre pasan. El formato de salida puede personalizarse vía configuración de Git. Cuando algo sale mal, ejecuta el comando con <code>GIT_TRACE=1</code> para revelar las llamadas plumbing subyacentes.</p><p>Entender cómo este comando interactúa con el resto del modelo de datos de Git rinde dividendos. Cada comando opera sobre algún subconjunto de las piezas (objetos, index, refs, árbol de trabajo), y saber cuáles toca ayuda a predecir resultados y a recuperarse de errores.</p>
        <h2>Cuándo usar</h2>
    <p>Most users never run <code>git prune</code> manually — <code>git gc</code> handles it. Reach for it only when <code>gc</code>'s defaults don't fit, or when you've explicitly purged history with <code>filter-repo</code> and want immediate space reclamation. Even then, <code>git gc --prune=now</code> is the more common path.</p>
    <h2>Opciones comunes</h2>
    <table>
      <thead><tr><th>Opción</th><th>Descripción</th></tr></thead>
      <tbody>
        <tr><td><code>-n</code>, <code>--dry-run</code></td><td>Show what would be deleted without deleting.</td></tr>
        <tr><td><code>--expire=&lt;date&gt;</code></td><td>Only prune objects older than this.</td></tr>
        <tr><td><code>--progress</code></td><td>Show progress.</td></tr>
        <tr><td><code>--verbose</code></td><td>Detail every object pruned.</td></tr>
      </tbody>
    </table>
    <h2>Ejemplos</h2>
    <pre><code>git prune -n
    # Preview prune

    git prune --expire=now
    # Aggressive: delete all unreachables right now

    git prune --expire=2.weeks.ago
    # Default behavior: keep recent unreachables</code></pre>
    <h2>Errores comunes</h2>
    <p><code>git prune --expire=now</code> can delete objects that are still in the reflog or stash if you've recently expired them. Always run <code>git fsck</code> first to understand what's at risk. On a busy repo, prune while a fetch or rebase is happening can cause issues.</p>
    <h2>Comandos relacionados</h2>
    <p><code>git gc</code>, <code>git fsck</code>, <code>git reflog expire</code>, <code>git repack</code></p>
- source_title: git repack — Pack unpacked objects in a repository
  title: git repack — Empaquetar objetos no empaquetados en un repositorio
  langcode: es
  body: |
    <h2>Sinopsis</h2>
    <pre><code>git repack [-a] [-d] [-l] [--depth=&lt;n&gt;] [--window=&lt;n&gt;]</code></pre>
    <h2>Descripción</h2>
        <p>El comando <code>git repack</code> empaqueta objetos sueltos en archivos pack y opcionalmente reconsolida packs existentes. Es la operación principal detrás de <code>git gc</code>.</p>
        <p>Con <code>-a -d</code>, recrea un solo pack y elimina los antiguos. Con <code>--geometric</code>, mantiene una serie de packs de tamaños geométricamente crecientes para mantenimiento incremental eficiente.</p>
        <p>En el uso diario, este comando se integra estrechamente con alias de shell, plugins de editor e integración continua. Los usuarios avanzados a menudo añaden alias que combinan los flags que siempre pasan. El formato de salida puede personalizarse vía configuración de Git. Cuando algo sale mal, ejecuta el comando con <code>GIT_TRACE=1</code> para revelar las llamadas plumbing subyacentes.</p><p>Entender cómo este comando interactúa con el resto del modelo de datos de Git rinde dividendos. Cada comando opera sobre algún subconjunto de las piezas (objetos, index, refs, árbol de trabajo), y saber cuáles toca ayuda a predecir resultados y a recuperarse de errores.</p>
        <h2>Cuándo usar</h2>
    <p>Most users rely on <code>gc</code>. Reach for <code>repack</code> directly when tuning storage on a server (large repos benefit from custom <code>--depth</code>, <code>--window</code>) or when investigating storage layout.</p>
    <h2>Opciones comunes</h2>
    <table>
      <thead><tr><th>Opción</th><th>Descripción</th></tr></thead>
      <tbody>
        <tr><td><code>-a</code></td><td>Pack everything reachable into a single pack.</td></tr>
        <tr><td><code>-A</code></td><td>Like <code>-a</code> but keep unreachables loose.</td></tr>
        <tr><td><code>-d</code></td><td>Delete redundant packs after repacking.</td></tr>
        <tr><td><code>-l</code></td><td>Pass <code>--local</code> to <code>pack-objects</code>.</td></tr>
        <tr><td><code>--depth=&lt;n&gt;</code></td><td>Maximum delta chain depth.</td></tr>
        <tr><td><code>--window=&lt;n&gt;</code></td><td>Window size for delta selection.</td></tr>
        <tr><td><code>-k</code>, <code>--keep-pack=&lt;name&gt;</code></td><td>Keep the named pack untouched.</td></tr>
      </tbody>
    </table>
    <h2>Ejemplos</h2>
    <pre><code>git repack -ad
    # Single pack, drop redundant ones

    git repack -a -d --depth=50 --window=250
    # Tighter packing for storage savings (slower)

    git repack -A -d
    # Keep unreachables loose for safety</code></pre>
    <h2>Errores comunes</h2>
    <p>Aggressive parameters consume RAM and CPU disproportionate to space saved. Default values are tuned reasonably. Forgetting <code>-d</code> after <code>-a</code> leaves duplicate packs.</p>
    <h2>Comandos relacionados</h2>
    <p><code>git gc</code>, <code>git pack-objects</code>, <code>git verify-pack</code>, <code>git prune</code></p>
- source_title: git maintenance — Run tasks to optimize Git repository data
  title: git maintenance — Ejecutar tareas para optimizar los datos del repositorio Git
  langcode: es
  body: |
    <h2>Sinopsis</h2>
    <pre><code>git maintenance start
    git maintenance run [--task=&lt;task&gt;]
    git maintenance stop</code></pre>
    <h2>Descripción</h2>
        <p>El comando <code>git maintenance</code> (Git 2.29+) consolida múltiples tareas de mantenimiento (gc, commit-graph, repack incremental, prefetch) en un único comando que puede registrarse para ejecución programada.</p>
        <p><code>git maintenance start</code> registra un trabajo de cron/launchd/systemd que mantiene el repo optimizado en segundo plano sin intervención del usuario.</p>
        <p>En el uso diario, este comando se integra estrechamente con alias de shell, plugins de editor e integración continua. Los usuarios avanzados a menudo añaden alias que combinan los flags que siempre pasan. El formato de salida puede personalizarse vía configuración de Git. Cuando algo sale mal, ejecuta el comando con <code>GIT_TRACE=1</code> para revelar las llamadas plumbing subyacentes.</p><p>Entender cómo este comando interactúa con el resto del modelo de datos de Git rinde dividendos. Cada comando opera sobre algún subconjunto de las piezas (objetos, index, refs, árbol de trabajo), y saber cuáles toca ayuda a predecir resultados y a recuperarse de errores.</p>
        <h2>Opciones comunes</h2>
    <table>
      <thead><tr><th>Subcommand / Option</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>start</code></td><td>Register a background schedule.</td></tr>
        <tr><td><code>stop</code></td><td>Unregister the schedule.</td></tr>
        <tr><td><code>run</code></td><td>Run tasks immediately.</td></tr>
        <tr><td><code>--task=&lt;task&gt;</code></td><td>Run only this task (commit-graph, prefetch, etc.).</td></tr>
        <tr><td><code>register</code> / <code>unregister</code></td><td>Add or remove repo from the maintenance set.</td></tr>
        <tr><td><code>--schedule=&lt;freq&gt;</code></td><td>Frequency: hourly, daily, weekly.</td></tr>
      </tbody>
    </table>
    <h2>Ejemplos</h2>
    <pre><code>git maintenance start
    # Set up background maintenance for this repo

    git maintenance run --task=commit-graph
    # Update the commit-graph on demand

    git maintenance run --task=prefetch
    # Fetch upstream objects without updating refs

    git maintenance unregister
    # Stop scheduled maintenance for this repo</code></pre>
    <h2>Errores comunes</h2>
    <p>Forgetting that <code>start</code> registers a system-wide scheduled task. On shared machines, this might not be what you want; use <code>register</code> in a config file instead. Disabling automatic gc but not enabling maintenance leaves the repo to grow unchecked.</p>
    <h2>Comandos relacionados</h2>
    <p><code>git gc</code>, <code>git commit-graph</code>, <code>git fetch --prefetch</code>, <code>git repack</code></p>
- source_title: git pack-refs — Pack heads and tags for efficient repository access
  title: git pack-refs — Empaquetar heads y tags para acceso eficiente
  langcode: es
  body: |
    <h2>Sinopsis</h2>
    <pre><code>git pack-refs [--all] [--no-prune]</code></pre>
    <h2>Descripción</h2>
        <p>El comando <code>git pack-refs</code> consolida refs sueltas (archivos individuales bajo <code>.git/refs/</code>) en un único archivo <code>.git/packed-refs</code>. Esto acelera el listado de refs en repos con miles de branches o tags.</p>
        <p>Las nuevas refs siguen escribiéndose como sueltas hasta el próximo pack. Inocuo de ejecutar; <code>git gc</code> lo invoca automáticamente.</p>
        <p>En el uso diario, este comando se integra estrechamente con alias de shell, plugins de editor e integración continua. Los usuarios avanzados a menudo añaden alias que combinan los flags que siempre pasan. El formato de salida puede personalizarse vía configuración de Git. Cuando algo sale mal, ejecuta el comando con <code>GIT_TRACE=1</code> para revelar las llamadas plumbing subyacentes.</p><p>Entender cómo este comando interactúa con el resto del modelo de datos de Git rinde dividendos. Cada comando opera sobre algún subconjunto de las piezas (objetos, index, refs, árbol de trabajo), y saber cuáles toca ayuda a predecir resultados y a recuperarse de errores.</p>
        <h2>Cuándo usar</h2>
    <p>Most repos don't need manual pack-refs — <code>git gc</code> runs it as part of maintenance. Reach for it directly when scripting performance optimizations on huge ref sets.</p>
    <h2>Opciones comunes</h2>
    <table>
      <thead><tr><th>Opción</th><th>Descripción</th></tr></thead>
      <tbody>
        <tr><td><code>--all</code></td><td>Pack all refs (default packs only branches and tags).</td></tr>
        <tr><td><code>--no-prune</code></td><td>Don't remove individual ref files after packing.</td></tr>
      </tbody>
    </table>
    <h2>Ejemplos</h2>
    <pre><code>git pack-refs --all
    # Pack every ref into packed-refs

    ls .git/refs/heads/ | wc -l
    # After packing, individual files are removed

    git pack-refs
    # Default: pack branches and tags</code></pre>
    <h2>Errores comunes</h2>
    <p>Editing <code>packed-refs</code> by hand can corrupt the repository — use <code>git update-ref</code>. After <code>pack-refs</code>, scripts that look for individual files in <code>.git/refs/heads/</code> fail. Use <code>git for-each-ref</code> for a portable lookup. <code>git help pack-refs</code> opens the full manual page with comprehensive coverage of every option and edge case; it remains the authoritative reference whenever the summary on this page leaves a question unanswered. For team workflows, capturing how your project uses this command in a CONTRIBUTING document avoids repeated onboarding questions and keeps everyone aligned on conventions.</p>
    <h2>Comandos relacionados</h2>
    <p><code>git gc</code>, <code>git update-ref</code>, <code>git for-each-ref</code>, <code>git maintenance</code></p>
- source_title: git am — Apply a series of patches from a mailbox
  title: git am — Aplicar una serie de patches desde un mailbox
  langcode: es
  body: |
    <h2>Sinopsis</h2>
    <pre><code>git am [--3way] [--abort] [--continue] [--skip] &lt;mbox&gt;...</code></pre>
    <h2>Descripción</h2>
        <p>El comando <code>git am</code> ('apply mailbox') toma una serie de patches en formato email (típicamente generados por <code>git format-patch</code>) y los aplica como nuevos commits en el branch actual, preservando autor y mensaje.</p>
        <p>Es la forma tradicional en la que el kernel de Linux y otros proyectos basados en mailing list aceptan contribuciones. Si surge un conflicto, <code>git am --continue</code> tras resolver.</p>
        <p>En el uso diario, este comando se integra estrechamente con alias de shell, plugins de editor e integración continua. Los usuarios avanzados a menudo añaden alias que combinan los flags que siempre pasan. El formato de salida puede personalizarse vía configuración de Git. Cuando algo sale mal, ejecuta el comando con <code>GIT_TRACE=1</code> para revelar las llamadas plumbing subyacentes.</p><p>Entender cómo este comando interactúa con el resto del modelo de datos de Git rinde dividendos. Cada comando opera sobre algún subconjunto de las piezas (objetos, index, refs, árbol de trabajo), y saber cuáles toca ayuda a predecir resultados y a recuperarse de errores.</p>
        <h2>Opciones comunes</h2>
    <table>
      <thead><tr><th>Opción</th><th>Descripción</th></tr></thead>
      <tbody>
        <tr><td><code>--3way</code></td><td>Fall back to three-way merge if patch doesn't apply cleanly.</td></tr>
        <tr><td><code>--abort</code></td><td>Cancel an in-progress am.</td></tr>
        <tr><td><code>--continue</code> / <code>--resolved</code></td><td>Continue after fixing conflicts.</td></tr>
        <tr><td><code>--skip</code></td><td>Skip the current patch.</td></tr>
        <tr><td><code>-s</code>, <code>--signoff</code></td><td>Add Signed-off-by trailer.</td></tr>
        <tr><td><code>-k</code></td><td>Pass <code>-k</code> to <code>mailinfo</code> (keep subject).</td></tr>
        <tr><td><code>--whitespace=&lt;action&gt;</code></td><td>Handle whitespace errors.</td></tr>
      </tbody>
    </table>
    <h2>Ejemplos</h2>
    <pre><code>git am patches/*.patch
    # Apply a series of format-patch outputs

    git am --3way --signoff incoming.mbox
    # Three-way merge fallback, add sign-off lines

    git am --abort
    # Cancel after a hopeless conflict

    curl -L https://lore.kernel.org/.../t.mbox.gz | gunzip | git am --3way
    # Apply patches downloaded from a public list</code></pre>
    <h2>Errores comunes</h2>
    <p>Forgetting <code>--3way</code> when patches were generated against a slightly different base often causes failures that <code>--3way</code> would handle. After resolving a conflict, run <code>git am --continue</code>, NOT <code>git commit</code>. Plain <code>commit</code> creates a malformed state.</p>
    <h2>Comandos relacionados</h2>
    <p><code>git apply</code>, <code>git format-patch</code>, <code>git send-email</code>, <code>git mailinfo</code></p>
- source_title: git format-patch — Prepare patches for email submission
  title: git format-patch — Preparar patches para envío por email
  langcode: es
  body: |
    <h2>Sinopsis</h2>
    <pre><code>git format-patch [&lt;options&gt;] &lt;range&gt;
    git format-patch -1 &lt;commit&gt;</code></pre>
    <h2>Descripción</h2>
        <p>El comando <code>git format-patch</code> exporta una serie de commits como archivos individuales en formato email, listos para enviar a una mailing list o aplicar con <code>git am</code>. Cada archivo incluye autor, fecha, mensaje y diff.</p>
        <p>Usos típicos: <code>git format-patch origin/main</code> exporta tus commits no pusheados; <code>--stdout</code> los concatena en uno solo.</p>
        <p>En el uso diario, este comando se integra estrechamente con alias de shell, plugins de editor e integración continua. Los usuarios avanzados a menudo añaden alias que combinan los flags que siempre pasan. El formato de salida puede personalizarse vía configuración de Git. Cuando algo sale mal, ejecuta el comando con <code>GIT_TRACE=1</code> para revelar las llamadas plumbing subyacentes.</p><p>Entender cómo este comando interactúa con el resto del modelo de datos de Git rinde dividendos. Cada comando opera sobre algún subconjunto de las piezas (objetos, index, refs, árbol de trabajo), y saber cuáles toca ayuda a predecir resultados y a recuperarse de errores.</p>
        <h2>Opciones comunes</h2>
    <table>
      <thead><tr><th>Opción</th><th>Descripción</th></tr></thead>
      <tbody>
        <tr><td><code>-&lt;n&gt;</code></td><td>Generate patches for the last <code>n</code> commits.</td></tr>
        <tr><td><code>-o &lt;dir&gt;</code></td><td>Write patches to a directory.</td></tr>
        <tr><td><code>--cover-letter</code></td><td>Generate a 0000 cover letter for the series.</td></tr>
        <tr><td><code>-v &lt;n&gt;</code>, <code>--reroll-count=&lt;n&gt;</code></td><td>Mark patches as the n-th iteration.</td></tr>
        <tr><td><code>--subject-prefix=&lt;prefix&gt;</code></td><td>Custom subject prefix (default <code>PATCH</code>).</td></tr>
        <tr><td><code>--to=&lt;addr&gt;</code> / <code>--cc=&lt;addr&gt;</code></td><td>Add recipients in headers.</td></tr>
        <tr><td><code>--thread</code></td><td>Add In-Reply-To headers.</td></tr>
      </tbody>
    </table>
    <h2>Ejemplos</h2>
    <pre><code>git format-patch -3
    # Patches for the last 3 commits, in CWD

    git format-patch -o ../patches main..feature
    # Patches from main to feature, into ../patches/

    git format-patch --cover-letter -v2 origin/main
    # Versioned series with a cover letter

    git format-patch --subject-prefix="PATCH myproj" -1 HEAD
    # Custom subject for a project-specific list</code></pre>
    <h2>Errores comunes</h2>
    <p>Generating patches against the wrong base produces apply failures for reviewers — pick the right upstream. Without <code>--cover-letter</code>, a multi-patch series has no introduction; reviewers appreciate one. Reroll without <code>-v</code> creates ambiguity about which version is being reviewed.</p>
    <h2>Comandos relacionados</h2>
    <p><code>git am</code>, <code>git send-email</code>, <code>git request-pull</code>, <code>git range-diff</code></p>
- source_title: git request-pull — Generate a summary of pending changes
  title: git request-pull — Generar un resumen de cambios pendientes
  langcode: es
  body: |
    <h2>Sinopsis</h2>
    <pre><code>git request-pull [-p] &lt;start&gt; &lt;url&gt; [&lt;end&gt;]</code></pre>
    <h2>Descripción</h2>
        <p>El comando <code>git request-pull</code> genera un resumen estructurado de cambios entre un commit base y el HEAD de tu branch publicado, listo para enviar como solicitud de pull a un mantenedor. Incluye autores, archivos modificados y resúmenes de commits.</p>
        <p>Tradicional en proyectos basados en mailing list (kernel de Linux, Git mismo) donde los pull requests son emails, no items en una UI web.</p>
        <p>En el uso diario, este comando se integra estrechamente con alias de shell, plugins de editor e integración continua. Los usuarios avanzados a menudo añaden alias que combinan los flags que siempre pasan. El formato de salida puede personalizarse vía configuración de Git. Cuando algo sale mal, ejecuta el comando con <code>GIT_TRACE=1</code> para revelar las llamadas plumbing subyacentes.</p><p>Entender cómo este comando interactúa con el resto del modelo de datos de Git rinde dividendos. Cada comando opera sobre algún subconjunto de las piezas (objetos, index, refs, árbol de trabajo), y saber cuáles toca ayuda a predecir resultados y a recuperarse de errores.</p>
        <h2>Opciones comunes</h2>
    <table>
      <thead><tr><th>Opción</th><th>Descripción</th></tr></thead>
      <tbody>
        <tr><td><code>-p</code></td><td>Include the full patch in the output.</td></tr>
      </tbody>
    </table>
    <h2>Ejemplos</h2>
    <pre><code>git request-pull v1.0 https://github.com/me/proj.git my-feature
    # Summary asking to pull my-feature from my fork

    git request-pull origin/main https://example.com/me/proj.git HEAD
    # Pull request based on what's ahead of upstream main

    git request-pull -p v2.0 git@my.server:proj.git release-2.1 | mail -s "Pull request" maintainer@example.com
    # Email a pull request with full patch</code></pre>
    <h2>Errores comunes</h2>
    <p>Specifying the wrong start point makes the diff range nonsensical. Run <code>git log</code> first to confirm the range. The remote URL must be accessible to the maintainer; private URLs produce useless requests.</p>
    <h2>Comandos relacionados</h2>
    <p><code>git format-patch</code>, <code>git send-email</code>, <code>git tag</code>, <code>git log</code></p>
