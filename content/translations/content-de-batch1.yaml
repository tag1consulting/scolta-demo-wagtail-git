# GitMastery Inhalt - Deutsch Batch 1
# 50 Seiten: 20 Erste Schritte + 30 Kernkonzepte
# Importziel: Drupal 11

- source_title: "What is Git? (and what isn't it)"
  title: "Was ist Git? (und was ist es nicht)"
  langcode: de
  body: |
    <h2>Einführung</h2>
    <p>Git ist ein <strong>verteiltes Versionsverwaltungssystem</strong>, das ursprünglich 2005 von Linus Torvalds für die Entwicklung des Linux-Kernels geschaffen wurde. Es verfolgt Änderungen an Dateien über die Zeit, ermöglicht die Zusammenarbeit mehrerer Personen und gibt jedem Entwickler eine vollständige Kopie der Projekthistorie. Heute treibt Git den Großteil der weltweiten Open-Source- und Unternehmenssoftwareentwicklung an.</p>
    <h2>Was Git ist</h2>
    <p>Git ist ein <em>inhaltsadressiertes</em> Snapshot-System. Jeder Commit speichert ein vollständiges Abbild der verfolgten Dateien Ihres Projekts, identifiziert durch einen kryptografischen Hash. Git ist schnell, weil die meisten Operationen lokal ablaufen, und robust, weil jeder Klon ein vollständiges Backup darstellt.</p>
    <ul>
      <li><strong>Verteilt</strong>: Jeder Klon ist ein vollständiges Repository.</li>
      <li><strong>Snapshot-basiert</strong>: Commits speichern Trees, keine Diffs.</li>
      <li><strong>Branch-freundlich</strong>: Branches sind günstige Zeiger, keine vollständigen Kopien.</li>
    </ul>
    <h2>Was Git nicht ist</h2>
    <p>Git ist kein Backup-Werkzeug, kein Code-Review-System und keine Deployment-Plattform. Es sperrt Dateien nicht wie zentralisierte Systeme (CVS, SVN, Perforce im Standardmodus). Es speichert binäre Diffs für große Mediendateien ohne Erweiterungen wie Git LFS nicht effizient. Und Git ist nicht GitHub: GitHub, GitLab und Bitbucket sind <em>Hosting-Dienste</em>, die auf Git aufbauen.</p>
    <h2>Es ausprobieren</h2>
    <p>Überprüfen Sie, ob Git installiert ist, und sehen Sie sich seine Version an:</p>
    <pre><code>git --version</code></pre>
    <p>Initialisieren Sie ein winziges Repository, um Git in Aktion zu sehen:</p>
    <pre><code>mkdir hello-git
    cd hello-git
    git init
    echo "hello" > readme.txt
    git add readme.txt
    git commit -m "first commit"
    git log --oneline</code></pre>
    <h2>Warum Git gewonnen hat</h2>
    <p>Vor Git nutzten die meisten Teams zentralisierte Werkzeuge, die für nahezu jede Aktion einen Netzwerkzugang erforderten. Das verteilte Modell von Git bedeutete, dass Entwickler offline committen, branchen und die Historie einsehen konnten. Kombiniert mit günstigem Branching und der Übernahme durch den Linux-Kernel wurde Git innerhalb eines Jahrzehnts zum De-facto-Standard. Die weite Verfügbarkeit kostenloser Hostings auf Plattformen wie GitHub, GitLab und Bitbucket festigte Gits Stellung: Eine ganze Generation von Entwicklern lernte Git als ihr erstes Versionsverwaltungssystem.</p>
    <h2>Wie Git Daten speichert</h2>
    <p>Gits Speichermodell ist ungewöhnlich. Anstatt Diffs zwischen Versionen aufzuzeichnen, speichert Git vollständige Snapshots jeder Datei in jedem Commit, dedupliziert nach Inhalts-Hash. Dies macht Operationen wie Checkout und Branch-Wechsel im Wesentlichen konstant in der Zeitkomplexität und Historien-Operationen wie log und blame überraschend schnell. Der Nachteil: Zufällige binäre Änderungen können den Speicherbedarf in die Höhe treiben, weshalb Git LFS für große Assets existiert.</p>
    <h2>Häufige Fehler</h2>
    <p>Anfänger verwechseln Git oft mit GitHub oder nehmen an, dass Git automatisch jede Datei in einem Ordner verfolgt. Git verfolgt nur Dateien, die Sie explizit per <code>git add</code> hinzufügen, und versioniert nur Inhalte unter dem Arbeitsverzeichnis eines initialisierten Repositories. Ein weiterer Mythos: Git "speichert" kontinuierlich. Tut es nicht. Nichts wird festgehalten, bis Sie <code>git commit</code> ausführen. Schließlich ist Git nicht für große binäre Assets ausgelegt; verwenden Sie Git LFS oder ein anderes System für Videos, große Datensätze oder Build-Artefakte.</p>

- source_title: "Installing Git (Linux, macOS, Windows)"
  title: "Git installieren (Linux, macOS, Windows)"
  langcode: de
  body: |
    <h2>Einführung</h2>
    <p>Die Installation von Git ist auf jeder größeren Plattform unkompliziert. Diese Seite führt durch die empfohlene Installationsmethode für Linux, macOS und Windows und zeigt, wie Sie die Installation überprüfen.</p>
    <h2>Linux</h2>
    <p>Die meisten Linux-Distributionen liefern Git in ihren Standard-Paketquellen aus. Verwenden Sie Ihren Paketmanager:</p>
    <pre><code># Debian, Ubuntu
    sudo apt update
    sudo apt install git

    # Fedora, RHEL, Rocky
    sudo dnf install git

    # Arch
    sudo pacman -S git</code></pre>
    <p>Für die neueste Version pflegt das offizielle Git-Projekt eine PPA für Ubuntu (<code>ppa:git-core/ppa</code>) und Quell-Tarballs auf <code>git-scm.com</code>.</p>
    <h2>macOS</h2>
    <p>macOS enthält ein Stub-<code>git</code>, das Sie auffordert, Apples Befehlszeilen-Entwicklerwerkzeuge zu installieren. Drei Optionen funktionieren gut:</p>
    <ol>
      <li>Führen Sie <code>xcode-select --install</code> aus, um Apples mitgeliefertes Git zu erhalten.</li>
      <li>Verwenden Sie <a>Homebrew</a>: <code>brew install git</code> für das aktuellste Upstream-Git.</li>
      <li>Laden Sie das offizielle Installationsprogramm von <code>git-scm.com</code> herunter.</li>
    </ol>
    <pre><code>brew install git
    git --version</code></pre>
    <h2>Windows</h2>
    <p>Das empfohlene Installationsprogramm ist <strong>Git for Windows</strong> von <code>git-scm.com</code>. Es enthält Git, einen OpenSSH-Client, eine Bash-Shell (Git Bash) und einen Credential-Helper. Alternativ können Sie winget oder Chocolatey verwenden:</p>
    <pre><code>winget install --id Git.Git -e
    choco install git</code></pre>
    <p>Während der GUI-Installation werden Sie zu Zeilenenden, dem Standardeditor und der PATH-Integration befragt. Die Voreinstellungen (Checkout im Windows-Stil, Commit im Unix-Stil; Git über die Befehlszeile) sind für die meisten Nutzer sinnvoll.</p>
    <h2>Installation überprüfen</h2>
    <pre><code>git --version
    git help -a | head</code></pre>
    <p>Jede Version 2.30 oder neuer ist für die Themen in diesem Handbuch geeignet. Älteren Versionen fehlen viele Komfortfunktionen wie <code>git switch</code> und <code>git restore</code>.</p>
    <h2>Git aktualisieren</h2>
    <p>Git aktuell zu halten ist wichtig: Viele Funktionen in diesem Handbuch erfordern Git 2.30 oder neuer, und Sicherheitsupdates erscheinen regelmäßig. Unter Linux übernimmt Ihr Paketmanager Aktualisierungen automatisch. Unter macOS mit Homebrew führen Sie regelmäßig <code>brew upgrade git</code> aus. Unter Windows prüft und installiert <code>git update-git-for-windows</code> (in Git for Windows enthalten) das neueste Release in einem einzigen Befehl.</p>
    <pre><code>git --version
    brew upgrade git
    git update-git-for-windows</code></pre>
    <p>Wenn Sie nach einem Upgrade plötzlich Deprecation-Warnungen sehen oder Befehle sich anders verhalten, lesen Sie die Release Notes in <code>/usr/share/doc/git/RelNotes/</code> oder auf <code>git-scm.com</code>; Gits Upgrade-Pfad ist sanft, aber gelegentlich ändern sich Voreinstellungen.</p>
    <h2>Häufige Fehler</h2>
    <p>Unter macOS vergessen viele, dass das Apple-eigene Git Monate oder Jahre hinter Upstream zurückliegt. Verwenden Sie Homebrew, wenn Sie aktuelle Funktionen wünschen. Unter Windows kann das Vermischen von PowerShell und Git Bash neue Nutzer verwirren, in welcher Shell sie sich befinden. Unter Linux kann das Installieren aus einem Drittanbieter-Tarball ohne Entfernen des Distributionspakets zwei <code>git</code>-Binaries auf den PATH bringen; verwenden Sie <code>which -a git</code> zur Prüfung. Schließlich: Führen Sie Git-Installer nicht mit <code>sudo</code> aus, es sei denn, Ihr Paketmanager verlangt das ausdrücklich.</p>

- source_title: "First-time configuration (git config)"
  title: "Erstkonfiguration (git config)"
  langcode: de
  body: |
    <h2>Einführung</h2>
    <p>Vor Ihrem ersten Commit muss Git wissen, wer Sie sind. <code>git config</code> speichert Schlüssel-Wert-Paare in drei Bereichen: <strong>system</strong> (alle Nutzer), <strong>global</strong> (Ihr Benutzerkonto) und <strong>local</strong> (ein einzelnes Repository). Der globale Bereich befindet sich unter <code>~/.gitconfig</code> auf Unix und <code>%USERPROFILE%\.gitconfig</code> unter Windows.</p>
    <h2>Identität</h2>
    <p>Setzen Sie Ihren Namen und Ihre E-Mail-Adresse; diese werden in jeden Commit eingebettet, den Sie erstellen:</p>
    <pre><code>git config --global user.name "Ada Lovelace"
    git config --global user.email "ada@example.com"</code></pre>
    <h2>Editor und Pager</h2>
    <p>Git startet Ihren Editor für Commit-Nachrichten und interaktive Rebases. Wählen Sie einen, den Sie auch beenden können:</p>
    <pre><code>git config --global core.editor "nano"
    # oder
    git config --global core.editor "code --wait"
    # oder
    git config --global core.editor "vim"</code></pre>
    <h2>Standard-Branch-Name</h2>
    <p>Seit Git 2.28 können Sie den Standard-Branch für neue Repositories festlegen:</p>
    <pre><code>git config --global init.defaultBranch main</code></pre>
    <h2>Zeilenenden</h2>
    <p>Um CRLF/LF-Überraschungen in plattformübergreifenden Teams zu vermeiden:</p>
    <pre><code># Linux, macOS
    git config --global core.autocrlf input

    # Windows
    git config --global core.autocrlf true</code></pre>
    <h2>Nützliche Aliase</h2>
    <pre><code>git config --global alias.st status
    git config --global alias.co checkout
    git config --global alias.lg "log --oneline --graph --decorate --all"</code></pre>
    <p>Nun liefert <code>git lg</code> einen kompakten Graphen aller Branches.</p>
    <h2>Konfiguration einsehen</h2>
    <p>Listen Sie alle Konfigurationen mit ihren Quelldateien auf, hilfreich beim Debuggen unerwarteter Verhaltensweisen:</p>
    <pre><code>git config --list --show-origin
    git config --get user.email</code></pre>
    <h2>Pull-Verhalten</h2>
    <p>Seit Git 2.27 erfordert das Standardverhalten von <code>pull</code> eine ausdrückliche Wahl. Wählen Sie eine Option:</p>
    <pre><code>git config --global pull.rebase false   # Merge (Standard)
    git config --global pull.rebase true    # Rebase
    git config --global pull.ff only        # nur Fast-Forward</code></pre>
    <h2>Bedingte Includes</h2>
    <p>Git unterstützt verzeichnisspezifische Konfiguration via <code>includeIf</code>. Dies ist die sauberste Methode, Arbeits- und private Identitäten getrennt zu halten, ohne in jedem Klon lokale Konfiguration setzen zu müssen:</p>
    <pre><code># in ~/.gitconfig
    [includeIf "gitdir:~/work/"]
      path = ~/.gitconfig-work

    # in ~/.gitconfig-work
    [user]
      email = ada@work.com
      signingkey = ssh-ed25519 AAAA...</code></pre>
    <p>Jedes unter <code>~/work/</code> geklonte Repository übernimmt automatisch die Arbeitsidentität. Kombinieren Sie dies mit <code>onbranch:</code>-Includes, um Einstellungen auf bestimmte Branches zu beschränken.</p>
    <h2>Pro-Repo-Überschreibungen</h2>
    <p>Lokale Konfiguration in <code>.git/config</code> überschreibt die globale Datei. Dies ist der richtige Ort für projektspezifische Identitäten, Hooks und Signaturschlüssel. Um zu prüfen, aus welchem Bereich eine Einstellung stammt:</p>
    <pre><code>git config --show-origin --get user.email
    git config --show-scope --get-all credential.helper</code></pre>
    <p>Wenn ein Wert falsch erscheint, sagt <code>--show-origin</code> Ihnen genau, welche Datei ihn besitzt. Achtung: Jeder der Bereiche <code>system</code>, <code>global</code>, <code>local</code> oder sogar <code>worktree</code> kann einen anderen überschatten. <code>git config --list --show-origin</code> liefert das vollständige Bild auf einen Schlag.</p>
    <h2>Häufige Fehler</h2>
    <p>Das Setzen von <code>user.email</code> auf eine private Adresse beim Committen für die Arbeit, was diese auf öffentlichen Hosting-Plattformen offenlegt. Verwenden Sie den <em>local</em>-Bereich innerhalb von Arbeits-Repositories, um den globalen Wert zu überschreiben: <code>git config user.email "ada@work.com"</code>. Ein weiterer Klassiker: Das manuelle Editieren von <code>~/.gitconfig</code> mit einem Syntaxfehler, der jeden Git-Befehl bricht. Verwenden Sie <code>git config</code> zum Schreiben von Werten und <code>git config --list</code> zur Überprüfung nach jeder Änderung.</p>

- source_title: "Creating your first repository (git init)"
  title: "Ihr erstes Repository erstellen (git init)"
  langcode: de
  body: |
    <h2>Einführung</h2>
    <p><code>git init</code> verwandelt ein gewöhnliches Verzeichnis in ein Git-Repository. Es erstellt ein verstecktes <code>.git</code>-Verzeichnis, das Gits gesamte Buchhaltung enthält: Objekte, Refs, Konfiguration und Hooks. Der Working Tree (Ihre normalen Dateien) bleibt unverändert.</p>
    <h2>Ein Projekt initialisieren</h2>
    <pre><code>mkdir my-project
    cd my-project
    git init
    # Initialized empty Git repository in /home/ada/my-project/.git/</code></pre>
    <p>Seit Git 2.28 können Sie den initialen Branch-Namen auf der Befehlszeile festlegen:</p>
    <pre><code>git init --initial-branch=main
    # oder kurz
    git init -b main</code></pre>
    <h2>Was gerade passiert ist</h2>
    <p>Sehen Sie sich das neue Verzeichnis an:</p>
    <pre><code>ls -a
    ls .git</code></pre>
    <p>Sie sehen <code>HEAD</code>, <code>config</code>, <code>description</code>, <code>hooks/</code>, <code>info/</code>, <code>objects/</code> und <code>refs/</code>. Es ist noch nichts committet; <code>HEAD</code> zeigt auf einen ungeborenen Branch.</p>
    <h2>Ihr erster Commit</h2>
    <ol>
      <li>Datei erstellen: <code>echo "# My Project" &gt; README.md</code></li>
      <li>Stagen: <code>git add README.md</code></li>
      <li>Committen: <code>git commit -m "Initial commit"</code></li>
    </ol>
    <pre><code>echo "# My Project" > README.md
    git add README.md
    git commit -m "Initial commit"
    git log --oneline</code></pre>
    <h2>Bare-Repositories</h2>
    <p>Server hosten üblicherweise <em>bare</em>-Repositories ohne Working Tree. Verwenden Sie <code>--bare</code>:</p>
    <pre><code>git init --bare project.git</code></pre>
    <p>Bare-Repositories sind das Ziel von Pushes; Sie bearbeiten Dateien darin nicht direkt.</p>
    <h2>Erneutes Initialisieren</h2>
    <p>Das erneute Ausführen von <code>git init</code> in einem bestehenden Repository ist sicher; es wendet Templates erneut an und gibt "Reinitialized existing Git repository" aus. Es löscht keine Commits.</p>
    <h2>Templates</h2>
    <p>Standardmäßig befüllt <code>git init</code> <code>.git/hooks/</code> aus <code>/usr/share/git-core/templates/</code>. Sie können das Template-Verzeichnis überschreiben, um eigene Hooks, eine Standard-<code>.gitignore</code> oder eine Beschreibung in jedes neue Repository einzubringen:</p>
    <pre><code>git init --template=~/.git-templates
    git config --global init.templateDir ~/.git-templates</code></pre>
    <p>So bringen Organisationen standardisierte Pre-Commit-Hooks in jeden neuen Klon, ohne dass jeder Entwickler Dateien manuell kopieren muss.</p>
    <h2>Initialer Branch-Name</h2>
    <p>Viele Projekte sind von <code>master</code> auf <code>main</code> als Standard-Branch-Name umgestiegen. Die Wahl ist lokal in Ihrem Repository, aber das Anpassen an die Voreinstellung Ihres Hosting-Anbieters vermeidet Verwirrung beim erstmaligen Push. Setzen Sie es einmal global und vergessen Sie es: <code>git config --global init.defaultBranch main</code>.</p>
    <h2>Wo Git aufhört zu suchen</h2>
    <p>Git findet das Repository, indem es den Verzeichnisbaum nach oben durchläuft, bis es ein <code>.git</code>-Verzeichnis oder eine entsprechende Datei findet. Der Lauf stoppt standardmäßig an Dateisystemgrenzen (<code>core.discoveryAcrossFilesystem</code> ändert dies). Die Umgebungsvariable <code>GIT_DIR</code> überschreibt die Discovery vollständig; <code>GIT_WORK_TREE</code> setzt einen abweichenden Working Tree. Zusammen erlauben sie Operationen auf einem Repository, dessen <code>.git</code> sich an einem ungewöhnlichen Ort befindet:</p>
    <pre><code>GIT_DIR=/srv/repos/widget.git GIT_WORK_TREE=/var/www git status</code></pre>
    <h2>Häufige Fehler</h2>
    <p>Versehentliches Ausführen von <code>git init</code> in Ihrem Home-Verzeichnis, was Ihre gesamte Dotfile-Sammlung unter eine massive Repository-Wurzel stellt. Prüfen Sie immer zuerst <code>pwd</code>. Ein weiterer Fehler: Das Löschen von <code>.git</code>, um "neu anzufangen", während uncommitted Arbeit erhalten bleibt. Das ist okay, aber bedenken Sie, dass die gesamte Historie für immer verloren ist. Schließlich: Committen Sie keine großen Binärdateien in ein frisch initialisiertes Repository, ohne vorher eine <code>.gitignore</code> zu schreiben; Sie werden es bereuen, wenn das Repository aufquillt. Führen Sie direkt nach <code>git init</code> ein <code>git status</code> aus, um zu sehen, was Git zu verfolgen plant, bevor Sie irgendetwas stagen.</p>

- source_title: "Basic workflow: edit, stage, commit"
  title: "Grundlegender Workflow: Bearbeiten, Stagen, Committen"
  langcode: de
  body: |
    <h2>Einführung</h2>
    <p>Fast jede Git-Sitzung folgt demselben dreistufigen Rhythmus: <strong>Bearbeiten</strong> Sie Dateien in Ihrem Working Tree, <strong>stagen</strong> Sie die Änderungen, die Sie aufzeichnen möchten, und <strong>committen</strong> Sie sie in die Historie. Diese Schleife zu beherrschen ist die Grundlage von allem anderen.</p>
    <h2>Die drei Bereiche</h2>
    <ul>
      <li><strong>Working Tree</strong>: Dateien auf der Festplatte, die Sie mit Ihrem Editor bearbeiten.</li>
      <li><strong>Index</strong> (auch Staging Area genannt): Ein Snapshot dessen, was in den nächsten Commit fließen wird.</li>
      <li><strong>Repository</strong>: Die committete Historie, gespeichert in <code>.git</code>.</li>
    </ul>
    <h2>Ein vollständiger Zyklus</h2>
    <ol>
      <li>Bearbeiten Sie eine Datei in Ihrem Editor.</li>
      <li>Führen Sie <code>git status</code> aus, um zu sehen, was sich geändert hat.</li>
      <li>Führen Sie <code>git diff</code> aus, um die Änderungen zu prüfen.</li>
      <li>Stagen Sie mit <code>git add</code>.</li>
      <li>Committen Sie mit <code>git commit</code>.</li>
    </ol>
    <pre><code>echo "hello" >> notes.txt
    git status
    git diff
    git add notes.txt
    git diff --staged
    git commit -m "Add greeting to notes"</code></pre>
    <h2>Selektives Stagen</h2>
    <p>Sie können einzelne Dateien, Glob-Muster oder sogar <em>Teile</em> einer Datei im interaktiven Modus stagen:</p>
    <pre><code>git add notes.txt readme.md
    git add "src/*.py"
    git add -p notes.txt    # Patch-Modus: ja/nein pro Hunk</code></pre>
    <p>Der Patch-Modus ist unschätzbar, wenn Sie gemischte Änderungen haben, die Sie auf separate Commits aufteilen möchten.</p>
    <h2>Den Index überspringen</h2>
    <p>Die Abkürzung <code>git commit -a</code> staged und committet alle <em>verfolgten</em> Dateien in einem Schritt. Sie fügt keine neuen (untracked) Dateien hinzu:</p>
    <pre><code>git commit -am "Quick fix"</code></pre>
    <h2>Gute Commits schreiben</h2>
    <p>Eine Commit-Nachricht hat eine kurze Betreffzeile (etwa 50 Zeichen) und einen optionalen Body, der das Warum erklärt. Führen Sie <code>git commit</code> ohne <code>-m</code> aus, um Ihren Editor zu öffnen:</p>
    <pre><code>git commit
    # Editor öffnet sich
    # Betreffzeile
    #
    # Längere Erklärung...</code></pre>
    <h2>Atomare Commits</h2>
    <p>Ein guter Commit erfasst eine logische Änderung. Bauen Sie ihn bewusst auf: Stagen Sie genau die Hunks, die zusammengehören, mit <code>git add -p</code>, und committen Sie dann. Wenn Sie sich dabei ertappen, einen Commit mit "und" in der Betreffzeile zu beschreiben ("Fix login and refactor logger"), sollten es vermutlich zwei Commits sein.</p>
    <pre><code>git add -p src/auth.py        # nur den Login-Fix stagen
    git commit -m "Fix login redirect on expired session"
    git add -p src/logger.py
    git commit -m "Refactor logger to use structured fields"</code></pre>
    <p>Atomare Commits machen <code>git bisect</code>, <code>git revert</code> und Code-Reviews später dramatisch einfacher.</p>
    <h2>Häufige Fehler</h2>
    <p>Vergessen, neue Dateien per <code>git add</code> hinzuzufügen, und überrascht sein von einem "leeren" Commit. <code>git status</code> sagt Ihnen immer die Wahrheit; lesen Sie es vor dem Committen. Eine weitere Falle: Die Verwendung von <code>git commit -am</code>, wenn Sie neue untracked Dateien haben, was diese stillschweigend zurücklässt. Schließlich: Das Committen generierter Dateien (Build-Output, <code>node_modules</code>, IDE-Einstellungen) verschmutzt die Historie und verlangsamt Klone; fügen Sie sie zu <code>.gitignore</code> hinzu, bevor Sie stagen. Im Zweifelsfall führen Sie <code>git diff --staged</code> aus, um genau zu sehen, was Ihr nächster Commit enthalten wird.</p>

- source_title: "Understanding the staging area (index)"
  title: "Die Staging Area (Index) verstehen"
  langcode: de
  body: |
    <h2>Einführung</h2>
    <p>Der <em>Index</em>, auch Staging Area oder Cache genannt, ist eines der unterscheidenden Merkmale von Git. Es handelt sich um eine Binärdatei unter <code>.git/index</code>, die den <strong>Tree enthält, den Sie als Nächstes committen wollen</strong>. Den Index zu verstehen, beseitigt das meiste Geheimnis aus der Ausgabe von <code>git status</code>.</p>
    <h2>Warum er existiert</h2>
    <p>Der Index erlaubt es Ihnen, einen Commit bewusst zusammenzustellen, anstatt jede Änderung auf einmal abzuwerfen. Sie können zehn Dateien bearbeiten, aber nur die drei committen, die einen Bug beheben, und den Rest für einen späteren Commit gestaged lassen. Diese Entkopplung ermöglicht eine saubere, atomare Historie.</p>
    <h2>Den Index inspizieren</h2>
    <p>Zwei Befehle vergleichen die drei Bereiche:</p>
    <pre><code>git diff             # Working Tree vs. Index
    git diff --staged    # Index vs. HEAD
    git diff HEAD        # Working Tree vs. HEAD</code></pre>
    <p>Der Plumbing-Befehl <code>git ls-files --stage</code> zeigt den Rohinhalt des Index, einschließlich der SHA-1-Hashes:</p>
    <pre><code>git ls-files --stage</code></pre>
    <h2>Änderungen stagen</h2>
    <pre><code>git add file.txt          # hinzufügen oder aktualisieren
    git add .                 # alles ab cwd hinzufügen
    git add -u                # nur verfolgte Dateien aktualisieren
    git add -p                # interaktiv Hunk für Hunk
    git add -N new.txt        # intent-to-add (leer verfolgen)</code></pre>
    <h2>Unstagen</h2>
    <p>Wenn Sie versehentlich etwas gestaged haben, nehmen Sie es heraus, ohne die Bearbeitung zu verlieren:</p>
    <pre><code># Modern (Git 2.23+)
    git restore --staged file.txt

    # Ältere Syntax, funktioniert weiterhin
    git reset HEAD file.txt</code></pre>
    <h2>Der Index bei Konflikten</h2>
    <p>Während eines Merge-Konflikts erhält der Index <em>drei</em> Einträge pro konfliktbehaftetem Pfad: Stage 1 ist der gemeinsame Vorfahre, Stage 2 ist "ours", Stage 3 ist "theirs". <code>git ls-files -u</code> zeigt sie an:</p>
    <pre><code>git ls-files -u</code></pre>
    <p>Den Konflikt zu lösen bedeutet, eine endgültige Version zu schreiben und sie mit <code>git add</code> hinzuzufügen, wodurch alles wieder zu einem einzigen Stage-0-Eintrag zusammenfällt.</p>
    <h2>Das Index-Dateiformat</h2>
    <p>Der Index ist ein Binärformat, das in der Git-Quelle unter <code>Documentation/gitformat-index.txt</code> dokumentiert ist. Er beginnt mit einem 12-Byte-Header (Signatur <code>DIRC</code>, Version, Eintragszahl), gefolgt von sortierten Einträgen. Mehrere optionale Erweiterungen fügen Caching hinzu: <code>TREE</code> cacht Subtree-Hashes für schnelles <code>write-tree</code>, und <code>UNTR</code> cacht Listen untracked Dateien für schnelles <code>git status</code>. Modernes Git unterstützt auch einen Sparse-Index, der Einträge außerhalb des ausgecheckten Cones auslässt:</p>
    <pre><code>git sparse-checkout init --cone
    git config core.sparseCheckoutCone true
    git update-index --test-untracked-cache</code></pre>
    <h2>Häufige Fehler</h2>
    <p>Zu glauben, dass <code>git add</code> endgültig sei. Ist es nicht: Sie können stagen, erneut bearbeiten und erneut stagen. Der Index ist nur der Entwurf des nächsten Commits. Eine weitere klassische Verwirrung: Eine gestagete Datei bearbeiten, dann committen und sich wundern, dass die neuen Bearbeitungen nicht enthalten sind. <code>git add</code> erfasst einen Snapshot in dem Moment, in dem Sie ihn ausführen; nachfolgende Bearbeitungen leben nur im Working Tree. Führen Sie <code>git diff</code> (ohne Flags) aus, um zu sehen, was gestaged-aber-dann-modifiziert ist. Schließlich: Löschen Sie <code>.git/index</code> niemals manuell; bauen Sie ihn mit <code>git read-tree HEAD</code> neu auf, falls er korrupt wird.</p>

- source_title: "Viewing history with git log"
  title: "Historie mit git log einsehen"
  langcode: de
  body: |
    <h2>Einführung</h2>
    <p><code>git log</code> durchläuft den Commit-Graphen von einem Startpunkt aus (Standard: <code>HEAD</code>) rückwärts durch die Eltern und gibt jeden Commit aus. Es ist das primäre Werkzeug zur Erkundung der Projekthistorie.</p>
    <h2>Grundlegende Verwendung</h2>
    <pre><code>git log
    git log --oneline
    git log --oneline --graph --decorate --all</code></pre>
    <p>Die letzte Form ist die Schweizer-Taschenmesser-Ansicht: ein kompakter Graph jedes Branches mit dekorierten Refs.</p>
    <h2>Filtern nach Datum, Autor, Nachricht</h2>
    <pre><code>git log --since="2 weeks ago"
    git log --until=2025-01-01
    git log --author="Ada"
    git log --grep="bugfix"
    git log -S "deprecated_function"   # Pickaxe: wann erschien ein String?</code></pre>
    <p><code>-S</code> ist unschätzbar für Code-Archäologie: Es findet Commits, die die Anzahl der Vorkommen eines Strings in irgendeiner Datei verändern.</p>
    <h2>Diffs anzeigen</h2>
    <pre><code>git log -p                 # vollständiger Patch pro Commit
    git log --stat             # geänderte Dateien plus +/- Zählungen
    git log --shortstat        # nur Zusammenfassungszeile
    git log -p -- path/to/file # nur Commits, die einen Pfad berühren</code></pre>
    <h2>Eigene Formate</h2>
    <p><code>--pretty=format:</code> akzeptiert Platzhalter. Ein nützlicher Einzeiler:</p>
    <pre><code>git log --pretty=format:"%h %an %ad %s" --date=short</code></pre>
    <p><code>%h</code> abgekürzter Hash, <code>%an</code> Autorenname, <code>%ad</code> Autorendatum, <code>%s</code> Betreff. Die vollständige Liste finden Sie unter <code>git help log</code>.</p>
    <h2>Limits und Bereiche</h2>
    <pre><code>git log -n 5                       # letzte 5 Commits
    git log main..feature              # Commits auf feature, nicht auf main
    git log main...feature             # symmetrische Differenz
    git log feature ^main              # gleichbedeutend mit main..feature</code></pre>
    <h2>Datei-Umbenennungen folgen</h2>
    <p>Git zeichnet Umbenennungen nicht auf, es erkennt sie. Um der Historie über eine Umbenennung hinweg zu folgen:</p>
    <pre><code>git log --follow -- path/to/file</code></pre>
    <h2>Nützliche Aliase</h2>
    <p>Eine Handvoll <code>git log</code>-Aliase rentiert sich in der ersten Woche. Zwei besonders gute:</p>
    <pre><code>git config --global alias.lg "log --oneline --graph --decorate --all"
    git config --global alias.last "log -1 HEAD --stat"
    git config --global alias.recent "log --since='2 weeks ago' --author=$(git config user.email)"</code></pre>
    <p><code>git lg</code> liefert den Vogelperspektivgraphen; <code>git last</code> zeigt, was gerade passiert ist; <code>git recent</code> beantwortet "Woran habe ich in letzter Zeit gearbeitet?". Fügen Sie für jeden Log-Aufruf, den Sie mehr als zweimal eintippen, einen Alias hinzu.</p>
    <h2>Umkehren und begrenzen</h2>
    <p>Standardmäßig läuft <code>git log</code> von neu nach alt. Manchmal (Release Notes, Code-Archäologie) wollen Sie das Gegenteil, gepaart mit einem sauberen Format:</p>
    <pre><code>git log --reverse --oneline v1.0.0..v1.1.0
    git log --reverse --pretty=format:"* %s (%h)" v1.0.0..HEAD &gt; CHANGELOG.draft</code></pre>
    <p>Hier zahlen sich Pickaxe und Pfadfilter aus: <code>git log --reverse -S "old_api" -- src/</code> zeigt die chronologische Historie des Erscheinens und Verschwindens eines Strings, ideal zum Verfolgen von Deprecations.</p>
    <h2>Häufige Fehler</h2>
    <p>Nur die Historie von <code>HEAD</code> lesen und Commits auf anderen Branches verpassen; übergeben Sie <code>--all</code>, um sie zu sehen. <code>--author</code> (eine Regex auf das Autorenfeld) mit einem literalen Exakt-Match verwechseln; setzen Sie das Muster sorgfältig in Anführungszeichen. <code>git log file</code> statt <code>git log -- file</code> verwenden: Der <code>--</code>-Trenner macht Pfade von Refs unterscheidbar, besonders wenn ein Branch und eine Datei einen Namen teilen. Schließlich: Erwarten, dass <code>git log</code> gelöschte Commits nach einem Force-Reset zeigt; verwenden Sie dafür <code>git reflog</code>. <code>git log</code> läuft nur erreichbare Historie ab.</p>

- source_title: "Ignoring files with .gitignore"
  title: "Dateien mit .gitignore ignorieren"
  langcode: de
  body: |
    <h2>Einführung</h2>
    <p>Eine <code>.gitignore</code>-Datei listet Muster auf, die Git als untracked behandeln und niemals zum Hinzufügen vorschlagen soll. Sie hält Build-Artefakte, Geheimnisse, OS-Metadaten und Editor-Hilfsdateien aus Ihrem Repository fern.</p>
    <h2>Mustersyntax</h2>
    <ul>
      <li><code>name</code>: Passt auf Dateien oder Verzeichnisse namens <code>name</code> in beliebiger Tiefe.</li>
      <li><code>/name</code>: Passt nur auf Repository-Wurzelebene.</li>
      <li><code>name/</code>: Passt nur auf Verzeichnisse.</li>
      <li><code>*.log</code>: Glob; passt auf jede <code>.log</code>-Datei.</li>
      <li><code>**/build</code>: Passt auf <code>build</code> in beliebiger Tiefe.</li>
      <li><code>!important.log</code>: Schließt einen zuvor ignorierten Pfad wieder ein.</li>
      <li><code>#</code> am Zeilenanfang ist ein Kommentar.</li>
    </ul>
    <h2>Ein realistisches Beispiel</h2>
    <pre><code># .gitignore
    # Build-Output
    /dist/
    /build/
    *.o
    *.pyc

    # Abhängigkeiten
    /node_modules/
    /vendor/

    # Editoren
    .idea/
    .vscode/
    *.swp

    # OS
    .DS_Store
    Thumbs.db

    # Geheimnisse
    .env
    *.pem</code></pre>
    <h2>Mehrere .gitignore-Dateien</h2>
    <p>Sie können eine <code>.gitignore</code> auf jeder Ebene platzieren. Muster sind relativ zum Verzeichnis der Datei, und tiefer liegende Dateien überschreiben flachere. Es gibt auch eine globale Ignore-Datei für persönliche Vorlieben:</p>
    <pre><code>git config --global core.excludesFile ~/.gitignore_global</code></pre>
    <p>Verwenden Sie diese für Editor-Swap-Dateien und OS-Müll, nicht für projektspezifische Pfade.</p>
    <h2>Bereits verfolgte Dateien</h2>
    <p>Einen Pfad zu <code>.gitignore</code> hinzuzufügen, entfernt ihn <strong>nicht</strong> aus dem Repository. So beenden Sie das Verfolgen einer Datei, während Sie sie auf der Festplatte behalten:</p>
    <pre><code>git rm --cached secrets.env
    git commit -m "Stop tracking secrets.env"</code></pre>
    <h2>Ignorierregeln debuggen</h2>
    <p>Warum ignoriert (oder ignoriert nicht) Git einen Pfad? Fragen Sie:</p>
    <pre><code>git check-ignore -v path/to/file</code></pre>
    <p>Die Ausgabe nennt Datei und Zeile, die zugetroffen haben.</p>
    <h2>Auswertungsreihenfolge</h2>
    <p>Git wertet Ignore-Regeln aus mehreren Quellen in folgender Reihenfolge aus: Befehlszeilenargumente, dann verzeichnisspezifische <code>.gitignore</code>-Dateien (am tiefsten zuerst), dann <code>$GIT_DIR/info/exclude</code>, und schließlich die globale <code>core.excludesFile</code>. Spätere (spezifischere) Regeln überschreiben frühere, und eine Negation (<code>!pattern</code>) schließt einen Pfad nur dann wieder ein, wenn dessen Elternverzeichnis nicht selbst ausgeschlossen ist. Diese letzte Regel stolpert viele Nutzer:</p>
    <pre><code># Falsch: kann eine Datei in einem ignorierten Verzeichnis nicht wieder einschließen
    /build/
    !/build/keep.log

    # Richtig: Inhalt ignorieren, aber das Verzeichnis behalten
    /build/*
    !/build/keep.log</code></pre>
    <h2>Pro-Repo- und globale Excludes</h2>
    <p>Zwei zusätzliche Ignore-Mechanismen ergänzen <code>.gitignore</code>. Die pro-Repo, untracked Datei <code>.git/info/exclude</code> gilt nur für Ihren Klon (gut für IDE-Dateien, die Sie nicht für das ganze Team in <code>.gitignore</code> committen wollen). Die globale <code>core.excludesFile</code> gilt für alle Ihre Repositories:</p>
    <pre><code>echo ".idea/" &gt;&gt; .git/info/exclude
    git config --global core.excludesFile ~/.gitignore_global
    echo ".DS_Store" &gt;&gt; ~/.gitignore_global</code></pre>
    <p>Verwenden Sie diese für persönliche Vorlieben; reservieren Sie die committete <code>.gitignore</code> für teamweite Regeln.</p>
    <h2>Häufige Fehler</h2>
    <p>Das Hinzufügen von <code>secrets.env</code> zu <code>.gitignore</code>, nachdem es bereits committet wurde, und davon ausgehen, dass das Geheimnis weg ist. Es ist immer noch in der Historie; rotieren Sie das Geheimnis und ziehen Sie <code>git filter-repo</code> in Betracht, um es zu entfernen. Eine weitere Falle: Ein Verzeichnis mit <code>build</code> ignorieren, wenn Sie <code>/build</code> meinten, und so versehentlich eine Datei namens <code>build</code> tief im Baum unterdrücken. Schließlich: Das Committen von <code>.gitignore</code> selbst ist essentiell; ohne sie muss jeder Mitarbeiter eigene Ignore-Regeln erfinden. <code>.gitignore</code> gehört <em>in</em> das Repository, nicht außerhalb.</p>

- source_title: "Getting help (man pages, --help, online)"
  title: "Hilfe bekommen (Manpages, --help, online)"
  langcode: de
  body: |
    <h2>Einführung</h2>
    <p>Git wird mit umfangreicher integrierter Dokumentation ausgeliefert. Zu wissen, wie man sie schnell aufruft, spart Stunden des Ratens. Diese Seite führt durch das Hilfesystem von Einzeilern bis zu vollständigen Handbüchern.</p>
    <h2>Drei Wege zu fragen</h2>
    <p>Jeder Befehl unterstützt drei Hilfeformen:</p>
    <pre><code>git help &lt;command&gt;     # vollständige Manpage in Ihrem Pager
    git &lt;command&gt; --help    # dasselbe
    git &lt;command&gt; -h        # kurze Verwendungsübersicht</code></pre>
    <p>Beispiel:</p>
    <pre><code>git help commit
    git commit --help
    git commit -h</code></pre>
    <h2>Befehle auflisten</h2>
    <pre><code>git help -a            # alle Befehle
    git help -g            # Anleitungen (gittutorial, gitcore-tutorial usw.)
    git help everyday      # der alltägliche Git-Spickzettel</code></pre>
    <p><code>git help everyday</code> ist insbesondere eine der besten Anfänger-bis-Mittelstufe-Referenzen, die mit Git ausgeliefert werden.</p>
    <h2>Konzeptanleitungen</h2>
    <p>Git enthält Prosa-Anleitungen als separate Manpages:</p>
    <pre><code>git help gittutorial
    git help gitcore-tutorial
    git help gitglossary
    git help gitworkflows
    git help gitrevisions</code></pre>
    <p><code>gitrevisions</code> ist die kanonische Referenz für Ref-Syntax (<code>HEAD~3</code>, <code>main@{yesterday}</code> usw.).</p>
    <h2>Das Hilfeformat konfigurieren</h2>
    <p>Standardmäßig öffnet <code>git help</code> eine Manpage. Sie können auf HTML oder Info umstellen:</p>
    <pre><code>git config --global help.format html
    git config --global help.format info
    git config --global help.format man   # Standard</code></pre>
    <p>HTML öffnet die lokale Kopie in Ihrem Browser, nützlich auf Systemen ohne <code>man</code>.</p>
    <h2>Online-Ressourcen</h2>
    <ul>
      <li><strong>git-scm.com/docs</strong>: offizielles Handbuch, online gespiegelt.</li>
      <li><strong>Pro Git Buch</strong> von Chacon und Straub: kostenlos, umfassend, regelmäßig aktualisiert.</li>
      <li><strong>Archiv der Git-Mailingliste</strong>: <code>lore.kernel.org/git</code> für Designdiskussionen.</li>
    </ul>
    <h2>Dokumentation durchsuchen</h2>
    <p>Wenn Sie sich an einen Befehlsnamen nicht erinnern, listet <code>man -k git</code> (oder <code>apropos git</code>) jede Git-Manpage mit einer Einzeilenbeschreibung auf. Um innerhalb der Dokumente zu suchen, leiten Sie an <code>grep</code> weiter:</p>
    <pre><code>man -k git
    git help -a | grep -i merge
    git help log | grep -A 2 'pickaxe'</code></pre>
    <p>Für vertieftes Lernen ist das Pro Git Buch kostenlos und maßgeblich; das Git Reference Manual auf <code>git-scm.com/docs</code> spiegelt die Manpages mit Querverweisen. Die <code>gitfaq</code>-Manpage ist ein unterschätztes Juwel, das viele reale Fragen in klarer Prosa beantwortet.</p>
    <h2>Häufige Fehler</h2>
    <p>Im Web nach veralteten Stack-Overflow-Antworten mit deprecated Befehlen wie <code>git checkout</code> für das Wechseln von Branches suchen, obwohl <code>git switch</code> existiert. Gleichen Sie immer mit <code>git help</code> für Ihre installierte Version ab. Ein weiterer Fehler ist die Annahme, dass <code>-h</code> und <code>--help</code> sich gleich verhalten; das tun sie nicht. <code>-h</code> gibt eine Einbildschirm-Zusammenfassung aus, während <code>--help</code> die vollständige Manpage öffnet (oder den Browser, abhängig von <code>help.format</code>). Überspringen Sie schließlich nicht <code>git help glossary</code>; viele "seltsame" Git-Begriffe (Porcelain, Plumbing, Refspec, Dangling Object) sind dort präzise auf einer einzelnen kurzen Seite definiert.</p>

- source_title: "Common beginner mistakes"
  title: "Häufige Anfängerfehler"
  langcode: de
  body: |
    <h2>Einführung</h2>
    <p>Die meisten Menschen lernen Git auf die harte Tour, durch kleine Katastrophen. Diese Seite sammelt die häufigsten Anfängerfehler und wie man sie vermeidet (oder sich von ihnen erholt). Lesen Sie sie einmal jetzt und nochmal nach einem Monat Nutzung; der zweite Durchgang wird mehr Sinn ergeben.</p>
    <h2>Mit der falschen Identität committen</h2>
    <p>Das Vergessen, <code>user.email</code> pro Repository zu setzen, lässt private Adressen in Arbeits-Commits durchsickern. Setzen Sie immer eine Pro-Repo-Identität in Arbeits-Klonen:</p>
    <pre><code>git config user.email "ada@work.com"
    git log -1 --pretty=format:"%an &lt;%ae&gt;"</code></pre>
    <h2>Geheimnisse committen</h2>
    <p>API-Schlüssel und <code>.env</code>-Dateien in Commits leben für immer, selbst nach einem nachträglichen "Löschen". Fügen Sie einen <code>.gitignore</code>-Eintrag <em>vor</em> dem ersten Commit hinzu und rotieren Sie jedes geleakte Credential sofort. Tools wie <code>git-secrets</code> und <code>gitleaks</code> können als Pre-Commit-Hooks laufen.</p>
    <h2>Force-Push über Teamkollegen</h2>
    <p><code>git push --force</code> schreibt die Historie auf dem Remote um und löscht damit Commits anderer Personen. Bevorzugen Sie <code>--force-with-lease</code>, das sich weigert zu überschreiben, wenn der Remote sich bewegt hat:</p>
    <pre><code>git push --force-with-lease</code></pre>
    <h2>Pull missverstehen</h2>
    <p><code>git pull</code> ist Fetch + Merge (oder Rebase). Es mit uncommitted Änderungen auszuführen, kann überraschende Merge-Commits erzeugen. Committen, stashen oder einen sinnvollen Standard setzen:</p>
    <pre><code>git config --global pull.rebase true
    git config --global pull.ff only</code></pre>
    <h2>Im detached HEAD bearbeiten, ohne es zu merken</h2>
    <p>Das Auschecken eines Tags oder Commit-Hashes versetzt Sie in detached HEAD. Neue Commits dort sind unerreichbar, sobald Sie weg wechseln. Erstellen Sie immer zuerst einen Branch:</p>
    <pre><code>git switch -c hotfix v1.2.3</code></pre>
    <h2>reset, revert und restore verwechseln</h2>
    <ul>
      <li><code>git restore</code> ändert den Working Tree oder den Index; sicher.</li>
      <li><code>git revert</code> erstellt einen neuen Commit, der einen anderen rückgängig macht; sicher und teilbar.</li>
      <li><code>git reset --hard</code> verschiebt den Branch und verwirft Arbeit; <em>destruktiv</em>.</li>
    </ul>
    <h2>Riesige Dateien committen</h2>
    <p>Ein 500&nbsp;MB-Video in einem Commit ist permanent. Verwenden Sie Git LFS für Binärdateien über wenige Megabyte hinaus und halten Sie Build-Artefakte vollständig aus dem Repository fern.</p>
    <h2>Recovery-Werkzeugkasten</h2>
    <pre><code>git reflog
    git fsck --lost-found
    git stash list</code></pre>
    <p>Das Reflog zeichnet jede Bewegung von <code>HEAD</code> standardmäßig 90 Tage lang auf; nahezu jeder "verlorene" Commit kann daraus wiederhergestellt werden.</p>
    <h2>Status falsch lesen</h2>
    <p>Die Ausgabe von <code>git status</code> hat subtile Schichten. "Changes not staged for commit" bedeutet im Working Tree modifizierte verfolgte Dateien. "Changes to be committed" bedeutet gestaged. "Untracked files" bedeutet, Git hat sie nie gesehen. Eine häufige Verwirrung: Eine Datei <em>nach</em> dem Stagen zu bearbeiten zeigt sie unter beiden Listen mit unterschiedlichem Inhalt; nur das, was gestaged ist, geht in den Commit. Führen Sie <code>git diff</code> (Working Tree vs. Index) und <code>git diff --staged</code> (Index vs. HEAD) aus, bis die drei Bereiche klar sind.</p>
    <pre><code>git status -sb
    git diff --staged --stat</code></pre>
    <h2>Häufige Fehler</h2>
    <p>In Panik geraten und <code>rm -rf .git</code> ausführen, wenn etwas falsch aussieht. Stop. Erstellen Sie zuerst ein Backup des Verzeichnisses. Nahezu jeder Git-Fehler ist über das Reflog oder den Stash wiederherstellbar. Die einzige wichtigste Gewohnheit für Anfänger: Führen Sie <code>git status</code> vor und nach jedem zustandsändernden Befehl aus, und führen Sie <code>git log --oneline --all --graph</code> aus, wenn etwas seltsam erscheint.</p>

- source_title: "Cloning an existing repository (git clone)"
  title: "Ein bestehendes Repository klonen (git clone)"
  langcode: de
  body: |
    <h2>Einführung</h2>
    <p><code>git clone</code> kopiert ein Remote-Repository auf Ihre Maschine. Es erstellt ein neues Verzeichnis, initialisiert <code>.git</code> darin, lädt alle Objekte und Refs herunter, richtet einen Remote namens <code>origin</code> ein und checkt den Standard-Branch aus. Nach dem Klonen haben Sie ein vollständiges, unabhängiges Repository.</p>
    <h2>Grundlegender Klon</h2>
    <pre><code>git clone https://github.com/torvalds/linux.git
    cd linux
    git remote -v
    # origin  https://github.com/torvalds/linux.git (fetch)
    # origin  https://github.com/torvalds/linux.git (push)</code></pre>
    <h2>Verzeichnisnamen wählen</h2>
    <p>Standardmäßig verwendet Git die letzte Pfadkomponente. Überschreiben Sie sie:</p>
    <pre><code>git clone https://github.com/example/widget.git my-widget</code></pre>
    <h2>Ein Protokoll wählen</h2>
    <ul>
      <li><strong>HTTPS</strong>: am einfachsten, funktioniert durch Firewalls, benötigt oft einen Credential-Helper oder ein Token.</li>
      <li><strong>SSH</strong>: bequem mit Schlüsselauthentifizierung, schnell für Power-User.</li>
      <li><strong>git://</strong>: anonym, unauthentifiziert, meist historisch.</li>
      <li><strong>file://</strong> oder lokaler Pfad: aus einem anderen Verzeichnis klonen.</li>
    </ul>
    <pre><code>git clone git@github.com:example/widget.git
    git clone /srv/git/widget.git
    git clone file:///srv/git/widget.git</code></pre>
    <h2>Nützliche Optionen</h2>
    <pre><code>git clone --depth 1 &lt;url&gt;            # shallow: nur die Spitze
    git clone --branch v1.2.3 &lt;url&gt;     # einen bestimmten Branch oder Tag auschecken
    git clone --single-branch &lt;url&gt;     # nur einen Branch holen
    git clone --bare &lt;url&gt;              # Bare-Klon, kein Working Tree
    git clone --recurse-submodules &lt;url&gt;</code></pre>
    <p>Shallow-Clones sparen Bandbreite für CI; konvertieren Sie später mit <code>git fetch --unshallow</code>.</p>
    <h2>Was clone Schritt für Schritt tut</h2>
    <ol>
      <li>Erstellt das Zielverzeichnis.</li>
      <li>Führt darin <code>git init</code> aus.</li>
      <li>Fügt <code>origin</code> als Remote hinzu.</li>
      <li>Führt <code>git fetch origin</code> aus.</li>
      <li>Richtet Tracking für den Standard-Branch ein.</li>
      <li>Führt <code>git checkout</code> für diesen Branch aus.</li>
    </ol>
    <h2>Sparse- und Partial-Clones für riesige Repositories</h2>
    <p>Repositories, die Gigabyte umfassen (Betriebssysteme, Monorepos), sind schmerzhaft, vollständig zu klonen. Zwei sich ergänzende Funktionen helfen:</p>
    <pre><code>git clone --filter=blob:none --no-checkout &lt;url&gt; repo
    cd repo
    git sparse-checkout init --cone
    git sparse-checkout set src/myteam
    git checkout main</code></pre>
    <p><code>--filter=blob:none</code> verschiebt Blob-Downloads auf später, während <code>sparse-checkout</code> nur die von Ihnen aufgelisteten Verzeichnisse befüllt. Zusammen erlauben sie es Ihnen, an einem kleinen Ausschnitt eines massiven Repositories mit proportionalen Festplatten- und Bandbreitenkosten zu arbeiten.</p>
    <h2>Klon-Zeit-Hooks</h2>
    <p>Manche Projekte liefern Setup-Schritte, die beim Klonen ausgeführt werden sollten (Pre-Commit-Hooks installieren, LFS-Objekte holen, Submodules initialisieren). Git führt beim Klonen keine Hooks aus, aber Sie können sie verketten:</p>
    <pre><code>git clone --recurse-submodules &lt;url&gt; repo
    cd repo
    git lfs install
    pre-commit install</code></pre>
    <p>Für neue Mitwirkende dokumentieren Sie diese Sequenz in <code>CONTRIBUTING.md</code> oder umhüllen Sie sie mit einem <code>scripts/bootstrap</code>-Skript. Schlaue Projekte machen ihr <code>make setup</code>-Target idempotent, sodass das erneute Ausführen nach einem veralteten Klon sicher ist.</p>
    <h2>Häufige Fehler</h2>
    <p>Klonen in ein nicht-leeres Verzeichnis: Git verweigert dies, es sei denn, Sie übergeben ein explizit leeres Ziel. Klonen riesiger Repositories ohne <code>--depth</code> über langsame Verbindungen und dann auf halbem Weg aufgeben. Klonen über HTTPS auf einen Server, der SSO erfordert, und dann nicht pushen können, weil Ihrem Token der richtige Scope fehlt. Testen Sie nach dem ersten Commit immer mit <code>git push --dry-run</code>. Schließlich: Klonen in <code>~/Desktop</code> oder einen anderen Sync-Ordner (Dropbox, iCloud, OneDrive) führt zu Korruption, wenn der Sync-Client mitten im Schreiben von <code>.git/index</code> agiert. Halten Sie Arbeitsklone auf einfachem lokalem Speicher.</p>

- source_title: "Working with remote repositories (git remote)"
  title: "Mit Remote-Repositories arbeiten (git remote)"
  langcode: de
  body: |
    <h2>Einführung</h2>
    <p>Ein <em>Remote</em> ist eine benannte URL, die auf ein anderes Git-Repository verweist. <code>git clone</code> erstellt automatisch einen namens <code>origin</code>, aber Sie können beliebig viele hinzufügen. Remotes sind die Brücke zwischen Ihrem lokalen Repository und der Außenwelt.</p>
    <h2>Auflisten und inspizieren</h2>
    <pre><code>git remote
    git remote -v
    git remote show origin</code></pre>
    <p><code>git remote show</code> kontaktiert den Server und meldet getrackte Branches, Push-Regeln und veraltete Refs.</p>
    <h2>Hinzufügen und entfernen</h2>
    <pre><code>git remote add upstream https://github.com/original/widget.git
    git remote rename upstream origin-upstream
    git remote remove origin-upstream</code></pre>
    <p>Das <em>Fork-and-Upstream</em>-Muster ist üblich: <code>origin</code> ist Ihr Fork, <code>upstream</code> ist das Projekt, von dem Sie geforkt haben.</p>
    <h2>Eine URL ändern</h2>
    <p>Wenn ein Projekt von HTTPS auf SSH oder zu einem neuen Host umzieht:</p>
    <pre><code>git remote set-url origin git@github.com:example/widget.git
    git remote -v</code></pre>
    <h2>Mehrere URLs</h2>
    <p>Sie können auf mehrere Mirrors gleichzeitig pushen, indem Sie zusätzliche Push-URLs hinzufügen:</p>
    <pre><code>git remote set-url --add --push origin git@gitlab.com:example/widget.git
    git remote -v</code></pre>
    <h2>Veraltete Branches aufräumen</h2>
    <p>Wenn Branches auf dem Server gelöscht werden, können Ihre lokalen <code>refs/remotes/origin/*</code> hinterherhinken. Räumen Sie sie auf:</p>
    <pre><code>git fetch --prune
    git remote prune origin</code></pre>
    <p>Oder dauerhaft setzen:</p>
    <pre><code>git config --global fetch.prune true</code></pre>
    <h2>Tracking inspizieren</h2>
    <pre><code>git branch -vv
    # main           a1b2c3d [origin/main] Latest fix
    # feature/login  e4f5g6h [origin/feature/login: ahead 2] WIP</code></pre>
    <p><code>-vv</code> zeigt das Upstream jedes Branches und wie weit voraus/zurück er liegt.</p>
    <h2>insteadOf-Umschreibung</h2>
    <p>Wenn sich URLs eines Projekts ändern (HTTPS zu SSH, Host-Migration, oder wenn Sie wollen, dass alle GitHub-URLs automatisch SSH verwenden), schreibt <code>insteadOf</code> sie transparent um:</p>
    <pre><code>git config --global url."git@github.com:".insteadOf "https://github.com/"
    git config --global url."https://github-mirror.example.com/".insteadOf "https://github.com/"</code></pre>
    <p>Dies ist besonders praktisch in CI, wo Sie alle Klone mit einer einzigen Konfigurationszeile auf einen lokalen Mirror umschreiben können, ohne Skripte zu bearbeiten. Die umgekehrte Richtung (<code>pushInsteadOf</code>) erlaubt Ihnen, vom selben Remote über HTTPS zu fetchen, aber über SSH zu pushen.</p>
    <h2>Triangulare Workflows</h2>
    <p>Im Open Source <em>fetchen</em> Sie typischerweise von <code>upstream</code> (dem kanonischen Projekt) und <em>pushen</em> auf <code>origin</code> (Ihren persönlichen Fork). Einmal konfigurieren und vergessen:</p>
    <pre><code>git remote add upstream https://github.com/project/repo.git
    git config branch.main.remote upstream
    git config branch.main.pushRemote origin
    git config --global push.default current</code></pre>
    <p>Nun liest <code>git pull</code> automatisch von upstream und <code>git push</code> schreibt auf Ihren Fork. Die Einstellung <code>remote.pushDefault</code> wendet die Regel auf jeden Branch in einem Klon an.</p>
    <h2>Häufige Fehler</h2>
    <p>Den <em>Namen</em> eines Remotes mit seiner URL verwechseln. <code>origin</code> ist nur ein Label; Sie können es umbenennen. Eine weitere Falle: dieselbe URL unter zwei verschiedenen Namen hinzufügen und dann von doppelten Refs überrascht werden. Verwenden Sie <code>git remote -v</code> zur Überprüfung. Vergessen, <code>git fetch</code> nach einem Netzwerkwechsel oder URL-Änderung auszuführen, lässt Ihre Tracking-Branches veralten. Schließlich: Auf gemeinsam genutzten Servern löscht das lokale Löschen einer Remote-Tracking-Ref (z. B. <code>git branch -dr origin/main</code>) den Branch <em>nicht</em> auf dem Server; verwenden Sie dafür <code>git push origin --delete main</code>, und nur dann, wenn Sie es wirklich meinen.</p>

- source_title: "Fetching and pulling changes"
  title: "Änderungen fetchen und pullen"
  langcode: de
  body: |
    <h2>Einführung</h2>
    <p><code>git fetch</code> lädt neue Objekte herunter und aktualisiert Remote-Tracking-Refs, <em>ohne</em> Ihren Working Tree zu verändern. <code>git pull</code> macht ein Fetch und integriert dann das Ergebnis in Ihren aktuellen Branch. Den Unterschied zu kennen ist einer der größten Schritte vom Anfänger zum sicheren Git-Nutzer.</p>
    <h2>Fetchen</h2>
    <pre><code>git fetch                  # Standard-Remote (üblicherweise origin)
    git fetch origin
    git fetch --all
    git fetch --prune          # Refs löschen, deren Branches auf dem Server gelöscht wurden
    git fetch origin main      # nur einen Branch</code></pre>
    <p>Nach einem Fetch prüfen Sie, was sich geändert hat:</p>
    <pre><code>git log HEAD..origin/main --oneline
    git diff HEAD origin/main</code></pre>
    <h2>Pullen</h2>
    <p><code>git pull</code> ist eine Kurzform für Fetch gefolgt von Merge oder Rebase. Wählen Sie die Strategie:</p>
    <pre><code>git pull                          # nutzt pull.rebase-Konfiguration
    git pull --rebase
    git pull --ff-only                # ablehnen, falls kein Fast-Forward
    git pull origin main</code></pre>
    <h2>Standardverhalten konfigurieren</h2>
    <pre><code>git config --global pull.rebase false   # Merge (klassischer Standard)
    git config --global pull.rebase true    # Rebase
    git config --global pull.ff only        # nur Fast-Forward
    git config --global fetch.prune true</code></pre>
    <p>Seit Git 2.27 warnt ein nacktes <code>git pull</code>, wenn keine Strategie konfiguriert ist.</p>
    <h2>Fetch vs. Pull, wann was</h2>
    <ul>
      <li>Verwenden Sie <code>fetch</code>, wenn Sie vor dem Integrieren prüfen wollen.</li>
      <li>Verwenden Sie <code>pull --ff-only</code>, wenn Sie einfach auf einem geteilten Branch aufholen wollen.</li>
      <li>Verwenden Sie <code>pull --rebase</code>, wenn Sie auf einem Topic-Branch arbeiten, den Sie noch nicht gepusht haben.</li>
      <li>Vermeiden Sie schlichtes <code>pull</code> auf langlebigen geteilten Branches; Merge-Commits multiplizieren sich.</li>
    </ul>
    <h2>Upstream inspizieren</h2>
    <pre><code>git status
    # On branch main
    # Your branch is behind 'origin/main' by 3 commits, and can be fast-forwarded.</code></pre>
    <p>Diese Nachricht stammt vom Vergleich von <code>HEAD</code> mit dem gecachten <code>origin/main</code>; führen Sie zuerst <code>git fetch</code> aus, damit sie genau ist.</p>
    <h2>Pull Requests fetchen</h2>
    <p>Die meisten Git-Hosts stellen Pull- oder Merge-Request-Branches als spezielle Refs bereit, die Sie zur Überprüfung in Ihren Klon fetchen können. Für GitHub fügen Sie eine Refspec hinzu:</p>
    <pre><code>git config --add remote.origin.fetch '+refs/pull/*/head:refs/remotes/origin/pr/*'
    git fetch
    git switch -c review/123 origin/pr/123</code></pre>
    <p>Für GitLab ist der äquivalente Pfad <code>refs/merge-requests/*/head</code>. Mit dieser Konfiguration holt jedes <code>git fetch</code> alle offenen PRs lokal, bereit zur Inspektion ohne das Terminal zu verlassen.</p>
    <h2>Häufige Fehler</h2>
    <p><code>git pull</code> mit uncommitted Änderungen ausführen und einen unerwarteten Merge-Commit auf schmutziger Arbeit erhalten. Stashen oder committen Sie zuerst. Vergessen, dass die "behind"-Zählung von <code>git status</code> nur so frisch ist wie der letzte Fetch; wenn niemand seit einer Woche gefetcht hat, lügt diese Zählung. <code>git pull --rebase</code> auf einem Branch verwenden, auf dem andere Arbeit aufgebaut haben, schreibt deren Basis um; rebasen Sie nur auf privaten Branches. Und schließlich: Verwenden Sie <code>git fetch &lt;refspec&gt;</code> niemals mit einer benutzerdefinierten Refspec, ohne sie zu verstehen; ein versehentlicher Doppelpunkt (<code>main:main</code>) überschreibt Ihr lokales <code>main</code>.</p>

- source_title: "Pushing your work"
  title: "Ihre Arbeit pushen"
  langcode: de
  body: |
    <h2>Einführung</h2>
    <p><code>git push</code> lädt lokale Commits auf einen Remote hoch und aktualisiert dessen Branches und Tags. So wird Ihre Arbeit für Mitwirkende sichtbar.</p>
    <h2>Grundlegender Push</h2>
    <pre><code>git push                          # aktueller Branch zu seinem Upstream
    git push origin main              # explizit
    git push -u origin feature/login  # Upstream setzen und pushen</code></pre>
    <p>Das Flag <code>-u</code> (oder <code>--set-upstream</code>) verknüpft den lokalen Branch mit dem Remote-Branch, sodass künftige <code>git push</code> und <code>git pull</code> keine Argumente benötigen.</p>
    <h2>Tags pushen</h2>
    <p>Tags werden standardmäßig nicht gepusht:</p>
    <pre><code>git push origin v1.2.3
    git push origin --tags          # alle Tags
    git push --follow-tags          # Tags, die von gepushten Commits aus erreichbar sind</code></pre>
    <p><code>--follow-tags</code> ist die sicherste Voreinstellung für Release-Workflows.</p>
    <h2>Remote-Branches löschen</h2>
    <pre><code>git push origin --delete feature/login
    # äquivalent
    git push origin :feature/login</code></pre>
    <h2>Sicheres Force-Pushen</h2>
    <p>Das Umschreiben der Historie (Rebase, Amend, Squash) erfordert einen Force-Push. Bevorzugen Sie immer <code>--force-with-lease</code>, das sich weigert, Refs zu überschreiben, die sich auf dem Server bewegt haben:</p>
    <pre><code>git push --force-with-lease
    git push --force-with-lease=feature/login:abcd1234</code></pre>
    <p>Verwenden Sie niemals blind <code>--force</code> auf einem geteilten Branch wie <code>main</code>.</p>
    <h2>Push-Defaults konfigurieren</h2>
    <pre><code>git config --global push.default simple    # Standard seit 2.0
    git config --global push.autoSetupRemote true   # 2.37+: automatisches -u</code></pre>
    <p>Mit gesetztem <code>push.autoSetupRemote</code> erstellt ein schlichtes <code>git push</code> auf einem neuen Branch automatisch den Remote-Branch und verknüpft beide.</p>
    <h2>Was beim Push passiert</h2>
    <ol>
      <li>Lokales Git verhandelt mit dem Remote, um gemeinsame Commits zu finden.</li>
      <li>Es packt nur die fehlenden Objekte und lädt sie hoch.</li>
      <li>Der Remote führt die Hooks <code>pre-receive</code> und <code>update</code> aus.</li>
      <li>Wenn akzeptiert, werden Refs atomar aktualisiert.</li>
      <li>Der Hook <code>post-receive</code> läuft (CI, Mirroring usw.).</li>
    </ol>
    <h2>Atomare und signierte Pushes</h2>
    <p><code>--atomic</code> verwandelt Multi-Ref-Pushes in eine einzige Transaktion; entweder werden alle Refs aktualisiert oder keiner, was partielle Deployments verhindert. <code>--signed</code> sendet ein GPG-signiertes Push-Zertifikat, das einige Hosts zur Audit-Aufzeichnung loggen:</p>
    <pre><code>git push --atomic origin main release/1.2
    git push --signed origin main</code></pre>
    <p>Für automatisierte Systeme erlaubt die Option <code>--receive-pack</code>, ein alternatives Receive-Pack auf dem Server zu spezifizieren, gelegentlich nötig für Hosts mit nicht-standardisierten Binaries. Verwenden Sie immer <code>git push --dry-run</code>, wenn Sie destruktive Pushes erstmals scripten.</p>
    <h2>Häufige Fehler</h2>
    <p>Auf <code>main</code> pushen, obwohl Sie einen Feature-Branch meinten, weil Sie vergessen haben, auf welchem Branch Sie sind. Führen Sie zuerst <code>git status</code> aus. <code>git push --force</code> gegen <code>main</code> verwenden und Commits anderer Personen umschreiben; erholen Sie sich über das Reflog des Remotes (falls Sie Shell-Zugriff haben) oder durch erneutes Pushen aus dem Klon eines Teamkollegen. Pushen ohne konfigurierte Credentials und an einer Passwortabfrage hängenbleiben; konfigurieren Sie einen Credential-Helper oder einen SSH-Schlüssel. Schließlich können große Pushes im letzten Moment fehlschlagen, wenn ein Hook sie ablehnt; in diesem Fall nennt die Ablehnungsnachricht den anstößigen Commit. Lesen Sie sie sorgfältig, anstatt blind erneut auszuführen.</p>

- source_title: "Understanding HEAD"
  title: "HEAD verstehen"
  langcode: de
  body: |
    <h2>Einführung</h2>
    <p><code>HEAD</code> ist die wichtigste Referenz in Git. Sie sagt Git, von welchem Commit Ihr nächster Commit abstammen wird. Die meiste Zeit zeigt <code>HEAD</code> auf einen Branch, und dieser Branch zeigt auf einen Commit; <code>HEAD</code> kann aber auch direkt auf einen Commit zeigen (detached HEAD).</p>
    <h2>Wo es lebt</h2>
    <p><code>HEAD</code> ist eine einzelne Datei unter <code>.git/HEAD</code>. Inspizieren Sie sie:</p>
    <pre><code>cat .git/HEAD
    # ref: refs/heads/main</code></pre>
    <p>Diese eine Zeile sagt: "HEAD zeigt aktuell auf den Branch <code>main</code>". Wenn Sie committen, rückt Git <code>main</code> vor und <code>HEAD</code> folgt.</p>
    <h2>HEAD inspizieren</h2>
    <pre><code>git rev-parse HEAD              # Commit-SHA
    git symbolic-ref HEAD           # zugrunde liegender Ref-Name
    git log -1 HEAD --oneline</code></pre>
    <h2>Detached HEAD</h2>
    <p>Das direkte Auschecken eines Commits, Tags oder Remote-Tracking-Branches versetzt <code>HEAD</code> in den <em>detached</em>-Zustand:</p>
    <pre><code>git checkout v1.2.3
    # You are in 'detached HEAD' state.</code></pre>
    <p><code>.git/HEAD</code> enthält nun einen rohen SHA. Neue Commits gehen nirgendwo hin außer ins Reflog; wechseln Sie zurück auf einen echten Branch (oder erstellen Sie einen), bevor Sie sie verlieren:</p>
    <pre><code>git switch -c experiment</code></pre>
    <h2>HEAD-Kurzformen</h2>
    <ul>
      <li><code>HEAD</code>: der aktuelle Commit.</li>
      <li><code>HEAD^</code> oder <code>HEAD~1</code>: Elternteil.</li>
      <li><code>HEAD~3</code>: drei Commits zurück über den ersten Elternteil.</li>
      <li><code>HEAD^2</code>: zweiter Elternteil eines Merge-Commits.</li>
      <li><code>HEAD@{1}</code>: vorherige Position aus dem Reflog.</li>
    </ul>
    <pre><code>git log HEAD~5..HEAD --oneline
    git diff HEAD^ HEAD</code></pre>
    <h2>Andere spezielle HEADs</h2>
    <ul>
      <li><code>ORIG_HEAD</code>: vorheriges HEAD vor einer "gefährlichen" Operation (Merge, Reset).</li>
      <li><code>MERGE_HEAD</code>: Spitze des Branches, der gemerged wird.</li>
      <li><code>FETCH_HEAD</code>: Spitze dessen, was gerade gefetcht wurde.</li>
      <li><code>CHERRY_PICK_HEAD</code>: Commit, der gerade per Cherry-Pick angewendet wird.</li>
    </ul>
    <h2>HEAD in Skripten</h2>
    <p>Skripte müssen oft den aktuellen Branch-Namen kennen. Verwenden Sie Plumbing statt Porcelain-Ausgaben zu parsen:</p>
    <pre><code>branch=$(git symbolic-ref --short -q HEAD) || branch="(detached)"
    sha=$(git rev-parse HEAD)
    short=$(git rev-parse --short HEAD)</code></pre>
    <p><code>symbolic-ref --short -q HEAD</code> beendet sich im Detached-Zustand mit Nicht-Null, was es zu einem perfekten Detektor macht. <code>git branch --show-current</code> (Git 2.22+) ist eine freundlichere Alternative, die im Detached-Zustand leere Ausgabe liefert. Beide sind über Versionen hinweg stabil; die Ausgabe von <code>git status</code> ist es nicht.</p>
    <h2>HEAD und Worktrees</h2>
    <p>Verlinkte Worktrees haben jeweils ihr eigenes <code>HEAD</code>. Das <code>.git/HEAD</code> des Hauptrepositories ist eines von vielen; jeder Worktree hat sein eigenes unter <code>.git/worktrees/&lt;name&gt;/HEAD</code>. Das bedeutet, zwei Worktrees desselben Repositories können gleichzeitig auf verschiedenen Branches sein:</p>
    <pre><code>git worktree add ../wt-feature feature/login
    git -C ../wt-feature rev-parse HEAD
    git -C . rev-parse HEAD</code></pre>
    <p>Die beiden HEADs sind unabhängig. Branch-Checkout ist über Worktrees hinweg exklusiv: Ein Branch kann gleichzeitig nur in einem Worktree ausgecheckt sein, was versehentliche gleichzeitige Bearbeitungen desselben Branches von zwei Orten verhindert.</p>
    <h2>Häufige Fehler</h2>
    <p>Glauben, dass <code>HEAD</code> ein Synonym für "aktueller Branch" sei. Ist es nicht; es ist ein Zeiger, der <em>üblicherweise</em> auf einen zeigt. <code>HEAD~3</code> und <code>HEAD^3</code> als äquivalent behandeln: Sie unterscheiden sich bei Merge-Commits. <code>.git/HEAD</code> manuell editieren, um Branches zu wechseln; verwenden Sie stattdessen <code>git switch</code> oder <code>git checkout</code>. Und schließlich: "Detached HEAD"-Warnungen ignorieren und ins Leere committen; wenn Sie sich dort mit neuen Commits wiederfinden, führen Sie sofort <code>git switch -c &lt;newbranch&gt;</code> aus, um sie zu verankern.</p>

- source_title: "Creating and switching branches"
  title: "Branches erstellen und wechseln"
  langcode: de
  body: |
    <h2>Einführung</h2>
    <p>Branches sind Gits Art, parallele Entwicklungslinien zu unterstützen. Einen Branch zu erstellen ist im Wesentlichen kostenlos: Es ist nur eine 41-Byte-Datei, die einen Commit-Hash enthält. Verwenden Sie sie großzügig für Features, Experimente und Bugfixes.</p>
    <h2>Moderne Befehle</h2>
    <p>Seit Git 2.23 gibt es zwei zweckgebaute Befehle: <code>git switch</code> für Branches und <code>git restore</code> für Dateien. Verwenden Sie sie; sie sind klarer als das überladene Verhalten von <code>git checkout</code>.</p>
    <pre><code>git switch main                    # auf existierenden Branch wechseln
    git switch -c feature/login        # erstellen und wechseln
    git switch -c hotfix v1.2.3        # von einem Tag erstellen
    git switch -                       # vorheriger Branch (wie cd -)</code></pre>
    <h2>Branches auflisten</h2>
    <pre><code>git branch                    # lokal
    git branch -r                 # Remote-Tracking
    git branch -a                 # alle
    git branch -vv                # mit Upstream und voraus/zurück
    git branch --merged           # in den aktuellen gemerged
    git branch --no-merged        # noch nicht gemerged</code></pre>
    <h2>Umbenennen und löschen</h2>
    <pre><code>git branch -m old new             # umbenennen
    git branch -m new                  # aktuellen Branch umbenennen
    git branch -d feature/login        # gemergten Branch löschen
    git branch -D feature/abandoned    # ungemergten erzwingen-löschen</code></pre>
    <p><code>-d</code> verweigert, wenn der Branch ungemergte Commits hat, und schützt so Arbeit.</p>
    <h2>Remote-Branches tracken</h2>
    <pre><code>git switch feature/login           # erstellt automatisch lokal aus origin/feature/login
    git switch -c mine origin/feature/login   # explizit
    git branch -u origin/main          # Upstream des aktuellen Branches setzen</code></pre>
    <h2>Die klassische Syntax</h2>
    <p>Ältere Tutorials verwenden <code>git checkout</code>. Es funktioniert weiterhin:</p>
    <pre><code>git checkout main
    git checkout -b feature/login
    git checkout v1.2.3</code></pre>
    <p>Der Nachteil ist, dass derselbe Befehl auch Dateien wiederherstellt, was Verwirrung stiftet. Bevorzugen Sie <code>switch</code> und <code>restore</code> in neuen Skripten.</p>
    <h2>Branch-Namenskonventionen</h2>
    <p>Konsistente Namen erleichtern das Tooling. Häufige Muster:</p>
    <ul>
      <li><code>feature/&lt;ticket&gt;-short-desc</code></li>
      <li><code>bugfix/&lt;ticket&gt;-short-desc</code></li>
      <li><code>hotfix/&lt;version&gt;</code></li>
      <li><code>release/&lt;version&gt;</code></li>
    </ul>
    <pre><code>git switch -c feature/PROJ-123-add-search
    git config --global branch.autoSetupMerge always
    git config --global branch.autoSetupRebase always</code></pre>
    <p>Die <code>autoSetup</code>-Optionen sorgen dafür, dass neue Branches automatisch ihren Startpunkt tracken, was die voraus/zurück-Zeile von <code>git status</code> vom ersten Tag an aussagekräftig macht.</p>
    <h2>Auf dem Remote umbenennen</h2>
    <p>Das Umbenennen eines Remote-Branches sind zwei Operationen: lokal umbenennen und die neue Ref auf dem Server erstellen, dann die alte löschen:</p>
    <pre><code>git branch -m old new
    git push -u origin new
    git push origin --delete old</code></pre>
    <h2>Häufige Fehler</h2>
    <p>Branches mit uncommitted Änderungen wechseln, die mit dem Ziel kollidieren; Git verweigert dies, und der Fix ist committen, stashen oder <code>git switch --discard-changes</code> zu verwenden, falls Sie sie wirklich nicht wollen. Dutzende langlebiger Branches erstellen und nie gemergte löschen; <code>git branch --merged | xargs git branch -d</code> räumt auf. Branches mit Zeichen benennen, die Shells verwirren (Leerzeichen, Glob-Zeichen); bleiben Sie bei Buchstaben, Ziffern, Schrägstrich und Bindestrich. Schließlich: Einen Branch mit <code>-D</code> löschen und in Panik geraten, wenn Sie merken, dass er ungemergte Arbeit hatte; das Reflog hat sie noch 90 Tage: <code>git reflog</code>, finden Sie den SHA, <code>git switch -c rescued &lt;sha&gt;</code>.</p>

- source_title: "Your first merge"
  title: "Ihr erster Merge"
  langcode: de
  body: |
    <h2>Einführung</h2>
    <p>Ein <em>Merge</em> kombiniert zwei Entwicklungslinien. Der häufigste Fall ist das Zurückführen eines Feature-Branches in <code>main</code>. Diese Seite führt durch einen sauberen Merge, einen Fast-Forward und einen konfliktbehafteten Merge.</p>
    <h2>Vorbereitung</h2>
    <pre><code>git switch -c feature/greeting
    echo "hello world" > greeting.txt
    git add greeting.txt
    git commit -m "Add greeting"
    git switch main
    git merge feature/greeting</code></pre>
    <p>Wenn sich <code>main</code> seit der Branch-Erstellung nicht bewegt hat, führt Git ein Fast-Forward durch: Es bewegt einfach den Zeiger von <code>main</code> auf die Spitze von <code>feature/greeting</code>. Es wird kein Merge-Commit erstellt.</p>
    <h2>Echte Three-Way-Merges</h2>
    <p>Wenn beide Branches neue Commits haben, erstellt Git einen <em>Merge-Commit</em> mit zwei Eltern:</p>
    <pre><code>git switch main
    echo "main change" >> notes.txt
    git commit -am "Update notes on main"
    git merge feature/greeting
    # Merge made by the 'ort' strategy.</code></pre>
    <p>Der erste Elternteil des Merge-Commits ist das vorherige <code>HEAD</code> von <code>main</code>; der zweite Elternteil ist die Spitze des gemergten Branches.</p>
    <h2>Einen Merge-Commit erzwingen</h2>
    <p>Um die Historie sichtbar zu erhalten, auch wenn Fast-Forward möglich ist:</p>
    <pre><code>git merge --no-ff feature/greeting -m "Merge feature/greeting"</code></pre>
    <h2>Konflikte</h2>
    <p>Wenn beide Seiten dieselben Zeilen bearbeitet haben, hält Git an und schreibt Konfliktmarker:</p>
    <pre><code>&lt;&lt;&lt;&lt;&lt;&lt;&lt; HEAD
    line from main
    =======
    line from feature
    &gt;&gt;&gt;&gt;&gt;&gt;&gt; feature/greeting</code></pre>
    <p>Lösen Sie auf, indem Sie die Datei bearbeiten, dann:</p>
    <pre><code>git add notes.txt
    git status
    git commit               # nutzt die vorbereitete Merge-Nachricht</code></pre>
    <h2>Abbrechen</h2>
    <p>Wenn Sie es sich mitten im Merge anders überlegen:</p>
    <pre><code>git merge --abort</code></pre>
    <p>Dies stellt den Working Tree auf den Zustand vor dem Merge zurück.</p>
    <h2>Das Ergebnis prüfen</h2>
    <pre><code>git log --oneline --graph --decorate -n 10</code></pre>
    <p>Der Graph zeigt die durch den Merge erzeugte Rautenform.</p>
    <h2>Einen Merge inspizieren</h2>
    <p>Merge-Commits haben zwei Eltern, daher benötigen Diffs explizite Behandlung. <code>git show</code> auf einem Merge zeigt standardmäßig einen "kombinierten Diff", der nur Änderungen hervorhebt, die mit beiden Eltern in Konflikt stehen:</p>
    <pre><code>git show HEAD                       # kombinierter Diff
    git show -m HEAD                    # Diff gegen jeden Elternteil separat
    git show --first-parent HEAD        # nur gegen den ersten Elternteil
    git log --merges --oneline          # nur Merge-Commits
    git log --no-merges --oneline       # ohne Merge-Commits</code></pre>
    <p>Für Code-Archäologie offenbart <code>--first-parent</code> auf einem langlebigen Branch die Integrationsgeschichte: wann jedes Feature in chronologischer Trunk-Reihenfolge gelandet ist.</p>
    <h2>Häufige Fehler</h2>
    <p>Während eines Merges Dateien bearbeiten, aber vergessen, sie per <code>git add</code> hinzuzufügen, sodass <code>git commit</code> sich weiterhin über unmerged paths beschwert. Führen Sie nach dem Bearbeiten immer <code>git status</code> aus. Auflösen, indem Sie die Konfliktmarker löschen, aber veralteten Text einer Seite stehen lassen; bauen Sie und führen Sie Tests aus, bevor Sie den Merge committen. <code>--no-ff</code> bei jedem Merge in einem schnellen Repository verwenden, was die Historie mit leeren Merge-Commits verschmutzt. Schließlich: An der Eingabeaufforderung in Panik geraten und mitten im Merge <code>git reset --hard</code> ausführen; <code>git merge --abort</code> ist sicherer, weil es <code>ORIG_HEAD</code> berücksichtigt.</p>

- source_title: "Undoing changes (intro)"
  title: "Änderungen rückgängig machen (Einführung)"
  langcode: de
  body: |
    <h2>Einführung</h2>
    <p>Git bietet mehrere Möglichkeiten, etwas rückgängig zu machen, je nachdem, ob die Änderung in Ihrem Working Tree, im Index, in Ihrem letzten Commit oder bereits gepusht ist. Die richtige Wahl verhindert Unfälle.</p>
    <h2>Working-Tree-Bearbeitungen verwerfen</h2>
    <p>Sie haben eine Datei bearbeitet, wollen die Änderungen aber wegwerfen:</p>
    <pre><code>git restore file.txt              # modern
    git checkout -- file.txt          # klassisches Äquivalent</code></pre>
    <p><code>git restore</code> ohne <code>--source</code> verwendet den Index, sodass die Datei in ihren letzten <code>git add</code>-Zustand zurückkehrt.</p>
    <h2>Unstagen</h2>
    <p>Sie haben <code>git add</code> ausgeführt, wollen aber eine Datei aus dem nächsten Commit nehmen (ohne Bearbeitungen zu verlieren):</p>
    <pre><code>git restore --staged file.txt
    git reset HEAD file.txt           # ältere Syntax</code></pre>
    <h2>Den letzten Commit ändern</h2>
    <p>Sie haben committet, wollen aber die Nachricht korrigieren oder eine weitere Datei einbeziehen:</p>
    <pre><code>git commit --amend -m "Better message"
    git add forgotten.txt
    git commit --amend --no-edit</code></pre>
    <p>Ändern Sie nur Commits, die Sie <strong>noch nicht gepusht</strong> haben, oder seien Sie bereit für einen Force-Push.</p>
    <h2>Einen öffentlichen Commit revertieren</h2>
    <p>Wenn ein schlechter Commit bereits gepusht ist, schreiben Sie die Historie nicht um. Erstellen Sie einen neuen Commit, der ihn rückgängig macht:</p>
    <pre><code>git revert &lt;sha&gt;
    git push</code></pre>
    <p><code>git revert</code> öffnet einen Editor mit einer generierten Nachricht; das Ergebnis ist ein sauberes Undo, das jeder pullen kann.</p>
    <h2>Resetten</h2>
    <p><code>git reset</code> bewegt den Zeiger des aktuellen Branches. Es hat drei Modi:</p>
    <ul>
      <li><code>--soft</code>: nur den Branch verschieben; Index und Working Tree behalten.</li>
      <li><code>--mixed</code> (Standard): Branch verschieben und Index zurücksetzen; Working Tree behalten.</li>
      <li><code>--hard</code>: Branch verschieben, Index zurücksetzen, Working Tree zurücksetzen. Destruktiv.</li>
    </ul>
    <pre><code>git reset --soft HEAD~1            # Uncommit, Änderungen bleiben gestaged
    git reset HEAD~1                   # Uncommit, Änderungen bleiben unstaged
    git reset --hard HEAD~1            # letzten Commit und Änderungen vernichten</code></pre>
    <h2>Wiederherstellung nach --hard</h2>
    <pre><code>git reflog
    git reset --hard HEAD@{1}</code></pre>
    <p>Das Reflog erinnert sich 90 Tage an jede Bewegung von <code>HEAD</code>.</p>
    <h2>Das richtige Undo wählen</h2>
    <p>Eine einfache Entscheidungsmatrix:</p>
    <ul>
      <li><strong>Nur Working Tree</strong>: <code>git restore &lt;file&gt;</code></li>
      <li><strong>Gestagte Datei</strong>: <code>git restore --staged &lt;file&gt;</code></li>
      <li><strong>Letzter ungepushter Commit</strong>: <code>git commit --amend</code> oder <code>git reset --soft HEAD~1</code></li>
      <li><strong>Gepushter Commit</strong>: <code>git revert &lt;sha&gt;</code></li>
      <li><strong>Ganze Branch-Spitze</strong>: <code>git reset --hard ORIG_HEAD</code> (nach einem schlechten Merge/Rebase)</li>
    </ul>
    <pre><code>git status
    git diff
    git log --oneline -5</code></pre>
    <p>Führen Sie diese drei immer vor jedem destruktiven Undo aus. Sie zeigen Working Tree, gestagte Änderungen und jüngste Historie; zusammen sagen sie Ihnen, welches Undo sicher ist.</p>
    <h2>Häufige Fehler</h2>
    <p><code>revert</code> mit <code>reset</code> verwechseln. <em>Revert</em> fügt hinzu; <em>Reset</em> entfernt. <code>git reset --hard</code> mit uncommitted Arbeit ausführen und dann merken, dass Sie sie brauchten; greifen Sie sofort zum Reflog, bevor Garbage Collection läuft. Einen gepushten Commit ändern und den Force-Push nicht mit Teamkollegen abstimmen. Verwenden Sie <code>git revert</code> auf geteilter Historie. Und schließlich: <code>git checkout file</code> als sicher behandeln; in älterem Git überschreibt es ohne Papierkorb stillschweigend Ihre Bearbeitungen. Modernes <code>git restore</code> ist nicht anders; sichern Sie zuerst, falls unsicher.</p>

- source_title: "Tagging releases"
  title: "Releases mit Tags markieren"
  langcode: de
  body: |
    <h2>Einführung</h2>
    <p>Tags sind benannte Referenzen auf bestimmte Commits. Anders als Branches sind Tags nicht dafür gedacht, sich zu bewegen. Sie eignen sich perfekt zum Markieren von Releases (<code>v1.0.0</code>) und anderen historischen Punkten.</p>
    <h2>Zwei Arten von Tags</h2>
    <ul>
      <li><strong>Lightweight</strong>: nur eine Ref, die auf einen Commit zeigt. Keine Metadaten.</li>
      <li><strong>Annotated</strong>: ein vollständiges Git-Objekt mit Tagger, Datum, Nachricht und optionaler GPG-Signatur. Verwenden Sie diese für Releases.</li>
    </ul>
    <h2>Tags erstellen</h2>
    <pre><code>git tag v1.0.0                          # Lightweight
    git tag -a v1.0.0 -m "First stable release"   # Annotated
    git tag -s v1.0.0 -m "Signed release"         # GPG-signiert</code></pre>
    <p>Standardmäßig hängen Tags an <code>HEAD</code>. Um einen bestimmten Commit zu taggen:</p>
    <pre><code>git tag -a v0.9.0 a1b2c3d -m "Beta"</code></pre>
    <h2>Auflisten und inspizieren</h2>
    <pre><code>git tag
    git tag -l "v1.*"
    git show v1.0.0
    git tag -l --format='%(refname:short) %(taggerdate:short) %(subject)'</code></pre>
    <h2>Tags pushen</h2>
    <p>Tags werden standardmäßig nicht gepusht:</p>
    <pre><code>git push origin v1.0.0
    git push origin --tags                # alle Tags
    git push --follow-tags                # nur Tags, die von gepushten Commits aus erreichbar sind</code></pre>
    <p><code>--follow-tags</code> ist die empfohlene Voreinstellung für Release-Pipelines.</p>
    <h2>Tags löschen</h2>
    <pre><code>git tag -d v1.0.0                     # lokal
    git push origin --delete v1.0.0       # Remote</code></pre>
    <h2>Einen Tag auschecken</h2>
    <pre><code>git switch --detach v1.0.0
    # oder einen Hotfix-Branch auf einem Tag basieren
    git switch -c hotfix/1.0.1 v1.0.0</code></pre>
    <h2>Signaturen verifizieren</h2>
    <pre><code>git tag -v v1.0.0</code></pre>
    <p>Erfordert den öffentlichen Schlüssel des Taggers in Ihrem GPG-Keyring.</p>
    <h2>Builds mit git describe beschreiben</h2>
    <p>Sobald Ihr Repository annotated Tags hat, erzeugt <code>git describe</code> stabile Build-Identifikatoren, die den letzten Tag, den Abstand und den abgekürzten SHA kombinieren:</p>
    <pre><code>git describe
    # v1.2.3-7-gabc1234
    git describe --always --dirty
    # v1.2.3-7-gabc1234-dirty</code></pre>
    <p>Das <code>--dirty</code>-Suffix erscheint, wenn der Working Tree uncommitted Änderungen hat; <code>--always</code> fällt auf einen reinen SHA zurück, wenn kein Tag erreichbar ist. CI-Pipelines betten diesen String oft in Binaries ein, um die Fehlersuche bei Berichten aus dem Feld trivial zu machen.</p>
    <h2>Tagging-Richtlinien</h2>
    <p>Für langfristig unterstützte Projekte sollten Sie entscheiden und dokumentieren:</p>
    <ul>
      <li>Namensschema: <code>v1.2.3</code>, <code>release-2025-04</code>, <code>1.2.3</code> (ohne Präfix)?</li>
      <li>Annotated oder signiert?</li>
      <li>Wer darf Tags pushen? Viele Hosts erlauben es Ihnen, Tag-Namen mit Mustern zu schützen.</li>
      <li>Was ist die Wahrheitsquelle: nur Tags-auf-main, oder Release-Branches mit eigenen Tags?</li>
    </ul>
    <pre><code>git for-each-ref --sort=-creatordate --format='%(refname:short) %(creatordate:short)' refs/tags | head</code></pre>
    <p>Wählen Sie ein Schema und bleiben Sie dabei; Tag-Historie ist schwerer zu migrieren als Commit-Historie.</p>
    <h2>Häufige Fehler</h2>
    <p>Lightweight-Tags für Releases verwenden. Ihnen fehlen Datum, Autor und Nachricht, was Audit-Trails schmerzhaft macht. Verwenden Sie für Releases immer <code>-a</code> oder <code>-s</code>. Einen Tag nach Veröffentlichung verschieben; nachgelagerte Nutzer übernehmen die Änderung nicht sauber. Erstellen Sie stattdessen einen neuen Tag (z. B. <code>v1.0.1</code>). Vergessen, Tags zu pushen, und sich wundern, warum die Release-Seite leer ist; denken Sie an <code>git push --tags</code> oder <code>--follow-tags</code>. Schließlich: Tags mit Zeichen benennen, die mit Refs kollidieren (ein Tag und ein Branch namens <code>release</code> erzeugen Mehrdeutigkeit); verwenden Sie eine klare Konvention wie <code>v&lt;semver&gt;</code> für Releases.</p>

- source_title: "Git on the command line: tips for new users"
  title: "Git auf der Befehlszeile: Tipps für neue Nutzer"
  langcode: de
  body: |
    <h2>Einführung</h2>
    <p>Git belohnt Befehlszeilen-Geläufigkeit. Ein paar kleine Gewohnheiten machen die tägliche Arbeit dramatisch schneller und sicherer. Diese Seite sammelt die wirkungsvollsten Tipps für neue Nutzer.</p>
    <h2>Wissen Sie immer, wo Sie sind</h2>
    <p>Fügen Sie den Git-Status zu Ihrem Shell-Prompt hinzu. Bash und Zsh liefern beide contrib-Skripte mit:</p>
    <pre><code># bash
    source /usr/share/git/completion/git-prompt.sh
    PS1='\w$(__git_ps1 " (%s)")\$ '

    # zsh mit oh-my-zsh: Git-Plugin in ~/.zshrc aktivieren</code></pre>
    <p>Nun sind der aktuelle Branch und der Dirty-Zustand jederzeit sichtbar.</p>
    <h2>Tab-Vervollständigung</h2>
    <p>Git liefert <code>git-completion.bash</code> mit; die meisten Paketmanager installieren es automatisch. Vervollständigen Sie Befehle, Branches, Remotes und Refs per Tab:</p>
    <pre><code>git che&lt;TAB&gt;
    git switch fea&lt;TAB&gt;</code></pre>
    <h2>Aliase, die sich auszahlen</h2>
    <pre><code>git config --global alias.s "status -sb"
    git config --global alias.lg "log --oneline --graph --decorate --all"
    git config --global alias.co switch
    git config --global alias.last "log -1 HEAD --stat"
    git config --global alias.unstage "restore --staged"</code></pre>
    <h2>Kürzerer Status</h2>
    <pre><code>git status -sb</code></pre>
    <p>Die <code>-sb</code>-Form ist zweispaltig und enthält Branch-Tracking-Info; perfekt für schnelle Prüfungen.</p>
    <h2>Bessere Diffs</h2>
    <pre><code>git diff --word-diff
    git diff --color-words
    git config --global diff.colorMoved zebra</code></pre>
    <p><code>colorMoved=zebra</code> hebt verschobene Codeblöcke anders hervor als hinzugefügte/entfernte, was Refactorings einfacher zu reviewen macht.</p>
    <h2>Nützliche Umgebung</h2>
    <ul>
      <li>Setzen Sie <code>GIT_PAGER=less -FRX</code> für sinnvolles Paging.</li>
      <li>Setzen Sie <code>EDITOR</code> auf etwas, das Sie zu beenden wissen.</li>
      <li>Verwenden Sie einen Credential-Helper: <code>git config --global credential.helper cache</code> unter Linux, <code>osxkeychain</code> unter macOS, <code>manager</code> unter Windows.</li>
    </ul>
    <h2>Sichere Voreinstellungen</h2>
    <pre><code>git config --global pull.ff only
    git config --global push.autoSetupRemote true
    git config --global fetch.prune true
    git config --global rerere.enabled true</code></pre>
    <p><code>rerere</code> ("reuse recorded resolution") merkt sich, wie Sie einen Konflikt gelöst haben, und spielt es beim nächsten Mal ab.</p>
    <h2>Commit-Historie schnell lesen</h2>
    <p>Zwei Anzeigetricks zahlen sich täglich aus:</p>
    <pre><code>git log --oneline --graph --all --decorate
    git log -p --follow path/to/file
    git show HEAD --stat
    git diff @{u}                  # gegen Upstream
    git diff @{1.day.ago}          # gegen HEAD vor einem Tag</code></pre>
    <p>Jeder Git-Befehl, der einen Commit erwartet, akzeptiert dieselbe Revisions-Syntax: Branch-Namen, SHAs, <code>HEAD~3</code>, <code>@{upstream}</code>, <code>@{2.hours.ago}</code>, <code>tag^{commit}</code>. Lernen Sie sie einmal über <code>git help gitrevisions</code> und nutzen Sie sie überall.</p>
    <h2>Häufige Fehler</h2>
    <p>Lange Befehle aus Blogposts kopieren, ohne sie zu verstehen; lesen Sie für jedes unbekannte Flag <code>git help &lt;cmd&gt;</code>. Destruktive Befehle auf kurze Namen aliasen (<code>r = reset --hard</code>) und sie versehentlich auslösen; reservieren Sie kurze Aliase für sichere Operationen. Tab-Vervollständigung der Shell ignorieren und Branch-Namen von Hand tippen, mit allen damit verbundenen Tippfehlern. Schließlich: Fügen Sie niemals Shell-Ausgabe in eine Commit-Nachricht ein in der Erwartung, sie würde als Code dargestellt; verwenden Sie einen Codeblock in Ihrem Editor oder committen Sie stattdessen eine Datei. Kleine Gewohnheiten summieren sich; investieren Sie einen Nachmittag in die Konfiguration Ihrer Shell und ernten Sie jahrelang die Vorteile.</p>

- source_title: "The object model: blobs, trees, commits, tags"
  title: "Das Objektmodell: Blobs, Trees, Commits, Tags"
  langcode: de
  body: |
    <h2>Einführung</h2>
    <p>Gits Repository ist im Kern ein <em>inhaltsadressierter Objektspeicher</em>. Es gibt genau vier Objekttypen: <strong>Blob</strong>, <strong>Tree</strong>, <strong>Commit</strong> und <strong>Tag</strong>. Jede Operation berührt sie letztlich. Diese vier Typen zu verstehen entmystifiziert das meiste an Git.</p>
    <h2>Blobs</h2>
    <p>Ein Blob speichert Dateiinhalte, mehr nicht. Kein Dateiname, keine Berechtigungen, keine Historie. Zwei Dateien mit identischem Inhalt teilen sich einen Blob, unabhängig davon, wo sie im Tree liegen.</p>
    <pre><code>echo "hello" | git hash-object --stdin
    # ce013625030ba8dba906f756967f9e9ca394464a</code></pre>
    <h2>Trees</h2>
    <p>Ein Tree ist ein Verzeichniseintrag: eine sortierte Menge von <code>(mode, type, sha, name)</code>-Einträgen. Unterverzeichnisse sind selbst Trees, rekursiv. Jeder Commit zeigt auf genau einen Wurzel-Tree.</p>
    <pre><code>git ls-tree HEAD
    # 100644 blob a1b2... README.md
    # 040000 tree c3d4... src</code></pre>
    <h2>Commits</h2>
    <p>Ein Commit-Objekt enthält:</p>
    <ul>
      <li>Einen Zeiger auf einen Wurzel-Tree.</li>
      <li>Null oder mehr Eltern-Commits (null für die Wurzel, zwei oder mehr für Merges).</li>
      <li>Autor und Committer mit Zeitstempeln.</li>
      <li>Eine Nachricht.</li>
      <li>Optionale GPG/SSH-Signatur.</li>
    </ul>
    <pre><code>git cat-file -p HEAD
    # tree 9f1a...
    # parent b2c3...
    # author Ada &lt;ada@example.com&gt; 1714300000 +0000
    # committer Ada &lt;ada@example.com&gt; 1714300000 +0000
    #
    # Add greeting</code></pre>
    <h2>Tags</h2>
    <p>Ein annotated Tag ist ein eigenes Objekt, das auf ein anderes Objekt zeigt (fast immer einen Commit), mit Tagger-Info und einer Nachricht. Lightweight-Tags sind nur Refs und haben kein Objekt.</p>
    <pre><code>git cat-file -t v1.0.0
    # tag
    git cat-file -p v1.0.0</code></pre>
    <h2>Zusammensetzen</h2>
    <p>Den Tree eines Commits manuell durchlaufen:</p>
    <pre><code>git cat-file -p HEAD^{tree}
    git cat-file -p HEAD^{tree}:src
    git cat-file -p HEAD:README.md</code></pre>
    <p>Die <code>^{tree}</code>-Peel- und die <code>commit:path</code>-Syntax sind die Art, wie alle Git-Werkzeuge navigieren.</p>
    <h2>Speicherung</h2>
    <p>Jedes Objekt ist zlib-komprimiert und adressiert durch den SHA-1 (oder SHA-256) seines unkomprimierten Inhalts plus Header. Identischer Inhalt, irgendwo in der Historie, dedupliziert sich automatisch.</p>
    <h2>Tree-Eintragsmodi</h2>
    <p>Das mode-Feld in einem Tree-Eintrag ist eine kleine Menge POSIX-ähnlicher Dateimodi:</p>
    <ul>
      <li><code>100644</code>: reguläre nicht-ausführbare Datei (Blob).</li>
      <li><code>100755</code>: ausführbare Datei (Blob).</li>
      <li><code>120000</code>: symbolischer Link (Blob, dessen Inhalt das Ziel ist).</li>
      <li><code>040000</code>: Unterverzeichnis (Tree).</li>
      <li><code>160000</code>: Gitlink (Submodule-Referenz auf einen Commit-SHA).</li>
    </ul>
    <pre><code>git ls-tree HEAD
    git update-index --chmod=+x scripts/run.sh
    git ls-tree HEAD scripts/</code></pre>
    <p>Git ist absichtlich begrenzt; willkürliche Berechtigungen und Eigentümerschaften werden nicht gespeichert.</p>
    <h2>Häufige Fehler</h2>
    <p>Glauben, dass Git Diffs speichert. Tut es nicht; es speichert vollständige Snapshots, dedupliziert nach Hash und später Delta-komprimiert in Pack-Dateien. Trees mit Verzeichnissen auf der Festplatte verwechseln; Trees sind unveränderliche Objekte. Lightweight-Tags mit annotated verwechseln; nur annotated Tags tragen Metadaten und Signaturen. Schließlich: Erwarten, dass das Umbenennen einer Datei den Blob ändert; der Blob ist derselbe, nur der Name-Eintrag des Trees ändert sich. Verbringen Sie zehn Minuten mit <code>git cat-file -p</code> auf einem echten Repository und das Modell wird zur zweiten Natur.</p>

- source_title: "Content-addressed storage: SHA-1 and SHA-256"
  title: "Inhaltsadressierte Speicherung: SHA-1 und SHA-256"
  langcode: de
  body: |
    <h2>Einführung</h2>
    <p>Git benennt jedes Objekt nach dem kryptografischen Hash seines Inhalts. Das ist <em>inhaltsadressierte</em> Speicherung: Der Name <em>ist</em> der Fingerabdruck des Inhalts. Der Standard-Hash ist SHA-1 (160 Bit, 40 Hex-Zeichen). SHA-256-Unterstützung existiert seit Git 2.29 experimentell.</p>
    <h2>Wie ein Hash berechnet wird</h2>
    <p>Git stellt dem Rohinhalt einen Header der Form <code>&lt;type&gt; &lt;size&gt;\0</code> voran und hasht dann:</p>
    <pre><code>printf 'blob 6\0hello\n' | sha1sum
    # ce013625030ba8dba906f756967f9e9ca394464a  -</code></pre>
    <p>Derselbe Wert kommt aus <code>git hash-object</code>:</p>
    <pre><code>printf 'hello\n' | git hash-object --stdin
    # ce013625030ba8dba906f756967f9e9ca394464a</code></pre>
    <h2>Warum Inhaltsadressierung</h2>
    <ul>
      <li><strong>Deduplizierung</strong>: identischer Inhalt einmal gespeichert.</li>
      <li><strong>Integrität</strong>: jede Korruption ändert den Hash, sofort erkennbar.</li>
      <li><strong>Reproduzierbarkeit</strong>: derselbe Tree hat immer denselben Namen.</li>
      <li><strong>Verteilte Synchronisation</strong>: Git kann fragen "habt ihr <code>abc123</code>?" ohne zu erklären, was es ist.</li>
    </ul>
    <h2>Abgekürzte Hashes</h2>
    <p>Git akzeptiert das kürzeste eindeutige Präfix, üblicherweise 7 Zeichen. Mit wachsendem Repository können mehr Stellen nötig sein:</p>
    <pre><code>git rev-parse --short HEAD
    git rev-parse --short=12 HEAD
    git config --global core.abbrev 12</code></pre>
    <h2>SHA-1 versus SHA-256</h2>
    <p>SHA-1 hat bekannte Kollisionsangriffe (SHAttered, 2017). Das Git-Projekt antwortete mit SHA-256 als alternativem Objektformat. Um ein SHA-256-Repository zu erstellen:</p>
    <pre><code>git init --object-format=sha256</code></pre>
    <p>Hinweis: SHA-1- und SHA-256-Repositories können noch nicht zusammenarbeiten; Tooling- und Hosting-Unterstützung reift noch ab Git 2.45+. Vorerst bleiben die meisten Projekte bei SHA-1, ergänzt durch Gits gehärtete kollisionserkennende SHA-1-Implementierung.</p>
    <h2>Integrität verifizieren</h2>
    <pre><code>git fsck --full
    git fsck --strict</code></pre>
    <p><code>git fsck</code> berechnet Hashes für jedes Objekt neu und meldet jede Abweichung.</p>
    <h2>Ein Objekt inspizieren</h2>
    <pre><code>git cat-file -t &lt;sha&gt;       # Typ
    git cat-file -s &lt;sha&gt;       # Größe
    git cat-file -p &lt;sha&gt;       # schön formatierter Inhalt</code></pre>
    <h2>Gehärtetes SHA-1</h2>
    <p>Seit 2017 wird Git mit einer "kollisionserkennenden" SHA-1-Implementierung (<code>sha1dc</code>) ausgeliefert, die das veröffentlichte SHAttered-Muster erkennt und sich weigert, solche Eingaben zu hashen. Dies macht praktische Angriffe gegen Git-Repositories im Wesentlichen unmöglich, ohne eine neue Kollisionstechnik zu entdecken. Der Preis ist eine kleine Verlangsamung beim Hashen; Sie können sich beim Bauen aus dem Quellcode mit <code>./configure --with-openssl-sha1</code> für das Standard-OpenSSL-SHA-1 entscheiden, doch nur wenige Nutzer haben Grund dazu.</p>
    <pre><code>git --version --build-options 2&gt;&amp;1 | grep -i sha</code></pre>
    <h2>Häufige Fehler</h2>
    <p>Sich Sorgen machen, dass SHA-1-Kollisionen Ihr Repository kompromittieren. Die bekannten Angriffe erfordern speziell konstruierte Eingaben; Git erkennt zusätzlich das veröffentlichte Kollisionsmuster. Das pragmatische Risiko für ein normales Projekt ist im Wesentlichen null. Hashes in Skripten zu aggressiv abkürzen; in einem Repository mit einer Million Objekten können 7 Zeichen kollidieren. Verwenden Sie <code>git rev-parse --short</code> und lassen Sie Git wählen. Objektdateien direkt unter <code>.git/objects</code> bearbeiten; das bricht die Inhaltsadress-Invariante und korrumpiert das Repository. Alle Schreibvorgänge müssen über Git-Plumbing erfolgen.</p>

- source_title: "References: refs, HEAD, branches, and tags"
  title: "Referenzen: Refs, HEAD, Branches und Tags"
  langcode: de
  body: |
    <h2>Einführung</h2>
    <p>Objekte sind unveränderlich und durch Hash benannt. <em>Referenzen</em> sind die veränderlichen, menschenlesbaren Namen, die auf sie zeigen. Jeder Branch, Tag, Remote-Tracking-Branch und HEAD ist eine Ref.</p>
    <h2>Wo Refs leben</h2>
    <p>Refs sind Dateien (oder Einträge in der packed-refs-Datei) unter <code>.git/refs/</code>:</p>
    <ul>
      <li><code>.git/refs/heads/&lt;name&gt;</code>: lokale Branches.</li>
      <li><code>.git/refs/tags/&lt;name&gt;</code>: Tags.</li>
      <li><code>.git/refs/remotes/&lt;remote&gt;/&lt;name&gt;</code>: Remote-Tracking-Branches.</li>
      <li><code>.git/HEAD</code>: die aktuelle Ref.</li>
    </ul>
    <p>Jede nicht-symbolische Ref ist eine einzeilige Datei mit einem Hash:</p>
    <pre><code>cat .git/refs/heads/main
    # a1b2c3d4...</code></pre>
    <h2>Refs auflisten</h2>
    <pre><code>git for-each-ref
    git for-each-ref refs/tags/
    git for-each-ref --format='%(refname:short) %(objectname:short) %(subject)'
    git show-ref</code></pre>
    <h2>Symbolische Refs</h2>
    <p>Eine symbolische Ref zeigt auf eine andere Ref statt auf einen Hash. <code>HEAD</code> ist das kanonische Beispiel:</p>
    <pre><code>cat .git/HEAD
    # ref: refs/heads/main
    git symbolic-ref HEAD
    git symbolic-ref refs/remotes/origin/HEAD</code></pre>
    <h2>Refs sicher lesen</h2>
    <p>Verwenden Sie immer Plumbing, anstatt Dateien zu lesen:</p>
    <pre><code>git rev-parse HEAD
    git rev-parse main
    git rev-parse origin/main
    git rev-parse v1.0.0^{commit}</code></pre>
    <p>Plumbing handhabt packed Refs, symbolische Refs und Ref-Lookups einheitlich.</p>
    <h2>Refs aktualisieren</h2>
    <pre><code>git update-ref refs/heads/feature/login &lt;sha&gt;
    git update-ref -d refs/heads/feature/login           # löschen
    git update-ref refs/heads/feature/login &lt;new&gt; &lt;old&gt; # CAS</code></pre>
    <p>Die Drei-Argumente-Form ist Compare-and-Set; sie verweigert, wenn der aktuelle Wert abweicht.</p>
    <h2>Packed Refs</h2>
    <p>Aus Performance-Gründen kann Git viele Refs in eine einzige <code>.git/packed-refs</code>-Datei packen. <code>git pack-refs --all</code> tut dies; künftige Schreibvorgänge gehen weiterhin in lose Dateien, bis zum nächsten Pack.</p>
    <h2>Refspec-Syntax</h2>
    <p>Remotes verwenden <em>Refspecs</em>, um zwischen lokalen und Remote-Refs abzubilden:</p>
    <pre><code>+refs/heads/*:refs/remotes/origin/*</code></pre>
    <p>Das führende <code>+</code> bedeutet "Force Update". Diese eine Zeile ist es, was <code>git fetch</code> dazu bringt, <code>refs/remotes/origin/</code> zu befüllen.</p>
    <h2>Das Reftable-Backend</h2>
    <p>Modernes Git (2.45+) liefert ein alternatives Ref-Speicherformat namens <em>Reftable</em>, ursprünglich für JGit entwickelt. Reftable speichert Millionen Refs effizient in einem binären log-strukturierten Format und unterstützt atomare Transaktionen über viele Refs hinweg. Aktivieren auf einem neuen Repository:</p>
    <pre><code>git init --ref-format=reftable
    git rev-parse --show-ref-format</code></pre>
    <p>Für die meisten Nutzer ist das klassische lose+packed-Format weiterhin in Ordnung. Reftable glänzt auf Servern und auf riesigen Monorepos mit Hunderttausenden Refs (z. B. eine Ref pro Pull Request).</p>
    <h2>Eigene Ref-Hierarchien</h2>
    <p>Refs müssen nicht unter den vier Standard-Namespaces leben. Tools, die eigene Namen brauchen, verwenden eigene Hierarchien unter <code>refs/</code>:</p>
    <ul>
      <li><code>refs/notes/*</code>: <code>git notes</code>.</li>
      <li><code>refs/stash</code>: <code>git stash</code>.</li>
      <li><code>refs/replace/*</code>: <code>git replace</code>.</li>
      <li><code>refs/bisect/*</code>: <code>git bisect</code>-Status.</li>
      <li><code>refs/pull/*/head</code> und <code>refs/merge-requests/*/head</code>: Hosting-Anbieter.</li>
    </ul>
    <pre><code>git for-each-ref refs/notes/
    git for-each-ref refs/replace/</code></pre>
    <p>Sie können eigene erstellen, solange der Name eine gültige Ref ist (keine doppelten Punkte, keine Leerzeichen, kein führender Bindestrich).</p>
    <h2>Häufige Fehler</h2>
    <p>Ref-Dateien manuell editieren und mit einem Trailing-Newline-Problem oder einer halb geschriebenen Datei enden. Verwenden Sie <code>git update-ref</code>. <code>refs/heads/main</code>, <code>main</code> und <code>refs/main</code> verwechseln; <code>git rev-parse --symbolic-full-name</code> löst jeden Kurznamen zu seiner kanonischen Form auf. Einen Branch und einen Tag identisch benennen; Tools bevorzugen dann den Tag, was zu subtiler Verwirrung führt. Schließlich: <code>.git/packed-refs</code> löschen, um "aufzuräumen"; das löscht Refs, die nicht auch lose sind. Gehen Sie immer über Git.</p>

- source_title: "The index (staging area) in depth"
  title: "Der Index (Staging Area) im Detail"
  langcode: de
  body: |
    <h2>Einführung</h2>
    <p>Der Index ist eine Binärdatei unter <code>.git/index</code>, die ein Tree-Objekt spiegelt: eine sortierte Liste von Pfaden mit Modus, Hash und Stat-Informationen. Er ist die Staging Area für den nächsten Commit und ein Cache, der es Git erlaubt, das erneute Hashen unveränderter Dateien zu überspringen.</p>
    <h2>Inspizieren</h2>
    <pre><code>git ls-files --stage
    # 100644 a1b2c3...  0  README.md
    # 100644 e4f5g6...  0  src/main.c</code></pre>
    <p>Stage 0 bedeutet "kein Konflikt". Während eines Merges erhalten konfliktbehaftete Pfade die Stages 1 (Basis), 2 (ours), 3 (theirs).</p>
    <h2>Was Stat-Caching bringt</h2>
    <p>Der Index speichert auch ctime, mtime, Größe und Inode für jeden Pfad. <code>git status</code> vergleicht diese mit dem Working Tree, bevor er hasht; bei Übereinstimmung gilt die Datei als unverändert. Deshalb ist <code>git status</code> auf riesigen Bäumen schnell.</p>
    <pre><code>git update-index --refresh
    git update-index --really-refresh</code></pre>
    <h2>Den Index modifizieren</h2>
    <pre><code>git add file.txt                  # aus Working Tree stagen
    git rm --cached file.txt          # aus Index entfernen, auf Festplatte behalten
    git restore --staged file.txt     # unstagen
    git update-index --chmod=+x bin/run   # Executable-Bit ändern</code></pre>
    <h2>assume-unchanged und skip-worktree</h2>
    <p>Zwei Flags sagen Git, bestimmte Pfade zu ignorieren:</p>
    <pre><code>git update-index --assume-unchanged config.local
    git update-index --skip-worktree config.local</code></pre>
    <ul>
      <li><code>assume-unchanged</code>: ein Performance-Hinweis; Git kann Änderungen trotzdem bemerken.</li>
      <li><code>skip-worktree</code>: stärker; gedacht für Dateien, die der Nutzer lokal modifiziert lässt.</li>
    </ul>
    <p>Keiner ersetzt <code>.gitignore</code>; beide sind Workspace-lokale Hacks, nicht teilbar.</p>
    <h2>Trees lesen und schreiben</h2>
    <pre><code>git write-tree                # Index als Tree-Objekt einfrieren
    git read-tree HEAD            # Index auf einen Tree zurücksetzen
    git read-tree --reset -u HEAD # auch Working Tree aktualisieren</code></pre>
    <p>Diese Plumbing-Befehle liegen <code>commit</code>, <code>checkout</code> und <code>merge</code> zugrunde.</p>
    <h2>Konflikte im Index</h2>
    <p>Während eines Merges wird der Index zur Wahrheitsquelle dafür, was ungelöst ist:</p>
    <pre><code>git ls-files -u
    # 100644 a1...  1  src/main.c
    # 100644 b2...  2  src/main.c
    # 100644 c3...  3  src/main.c</code></pre>
    <p>Einen Konflikt zu lösen bedeutet, den finalen Inhalt zu schreiben und mit <code>git add</code> hinzuzufügen, wodurch alles zu einem einzigen Stage-0-Eintrag zusammenfällt.</p>
    <h2>Sparse-Checkout und der Sparse-Index</h2>
    <p>Sparse-Checkout befüllt den Working Tree mit nur einer Teilmenge des Repository-Trees, nützlich in Monorepos. Mit Cone-Modus plus dem Sparse-Index schrumpft auch der Index selbst auf den aktiven Cone, was Operationen auf riesigen Repositories schnell macht:</p>
    <pre><code>git sparse-checkout init --cone
    git sparse-checkout set src/myteam docs
    git sparse-checkout list
    git sparse-checkout disable</code></pre>
    <p>Der Sparse-Index markiert ausgelassene Einträge mit einem speziellen Bit, sodass Git sie faul nur erweitern kann, wenn Befehle es brauchen. Diese Funktion erfordert Git 2.32 oder neuer für volle Funktionalität.</p>
    <h2>Häufige Fehler</h2>
    <p>Glauben, der Index sei nur "was gestaged ist". Er ist auch ein Cache und Konflikt-Tracker. <code>.git/index</code> löschen, wenn man feststeckt; bauen Sie ihn mit <code>git read-tree HEAD</code> neu, aber Sie verlieren jedes uncommitted Staging. <code>--assume-unchanged</code> als Ersatz für <code>.gitignore</code> verwenden; der nächste Klon wird es nicht respektieren. Schließlich: Erwarten, dass der Index leere Verzeichnisse verfolgt; das kann er nicht. Verwenden Sie eine Platzhalterdatei (<code>.gitkeep</code>), wenn Sie einen leeren Ordner committen müssen.</p>

- source_title: "Branches as lightweight pointers"
  title: "Branches als leichtgewichtige Zeiger"
  langcode: de
  body: |
    <h2>Einführung</h2>
    <p>In Git ist ein Branch nur eine bewegliche Referenz auf einen Commit. Einen Branch zu erstellen bedeutet, eine 41-Byte-Datei zu erstellen. Verglichen mit zentralisierten Systemen, in denen Branches vollständige Verzeichniskopien sind, macht Gits Modell Branching günstig genug, um es leichtfertig zu nutzen.</p>
    <h2>Was ein Branch tatsächlich ist</h2>
    <pre><code>cat .git/refs/heads/main
    # a1b2c3d4e5f6...
    git rev-parse main</code></pre>
    <p>Dieser Hash ist die <em>Spitze</em> des Branches. Der "Branch" selbst ist die Kette von Commits, die von der Spitze über Eltern-Zeiger erreichbar sind.</p>
    <h2>Branches erstellen</h2>
    <pre><code>git branch feature/login           # erstellen, nicht wechseln
    git switch -c feature/login        # erstellen und wechseln
    git switch -c hotfix v1.2.3        # von einem Tag
    git branch fixup HEAD~3            # von einer relativen Ref</code></pre>
    <h2>Die Spitze bewegen</h2>
    <p>Jeder Commit auf dem aktuellen Branch rückt seine Spitze um eins vor. Befehle, die Spitzen bewegen, sind <code>commit</code>, <code>merge</code>, <code>rebase</code>, <code>reset</code> und <code>cherry-pick</code>.</p>
    <pre><code>git commit -m "Work"           # main rückt vor
    git reset --hard HEAD~2        # main bewegt sich zurück; Commits werden unerreichbar</code></pre>
    <h2>Branches und Erreichbarkeit</h2>
    <p>Ein Commit ist "lebendig", solange ihn irgendeine Ref erreicht. Löschen Sie jeden Branch und Tag, der auf einen Commit zeigt, und er wird <em>dangling</em>; Gits Garbage Collector entfernt ihn schließlich.</p>
    <pre><code>git fsck --unreachable
    git gc</code></pre>
    <h2>Upstream tracken</h2>
    <p>Ein lokaler Branch kann mit einem Remote-Tracking-Branch verknüpft werden:</p>
    <pre><code>git branch --set-upstream-to=origin/main main
    git branch -u origin/main
    git status            # zeigt voraus/zurück basierend auf der Verknüpfung</code></pre>
    <h2>Branch-Pflege</h2>
    <pre><code>git branch --merged main           # vollständig gemergte Branches
    git branch --no-merged main        # Branches mit ungemergter Arbeit
    git branch -d feature/old          # gemergten löschen
    git branch -D feature/discarded    # erzwingen-löschen</code></pre>
    <h2>Branches vergleichen</h2>
    <pre><code>git log main..feature/login --oneline
    git diff main...feature/login
    git range-diff main..@{u} main..HEAD</code></pre>
    <p><code>range-diff</code> ist großartig zum Vergleichen zweier Versionen eines rebased Branches.</p>
    <h2>Branch-Richtlinien auf Hosts</h2>
    <p>Die meisten Hosting-Plattformen erlauben es, Branches per Namensmuster zu schützen: Pull Requests, signierte Commits, bestandene CI oder bestimmte Reviewer vor Annahme eines Pushes erforderlich machen. Die Git-Seite davon wird über <code>pre-receive</code>-Hooks implementiert; die Plattform-Seite ist Konfiguration. Aus Ihrem lokalen Klon ist der Branch-Schutz unsichtbar, bis Ihr Push abgelehnt wird, woraufhin der Server erklärt, warum. Um den Schutz von der Befehlszeile zu prüfen, verwenden Sie das CLI des Hosts (<code>gh</code>, <code>glab</code>) oder dessen API.</p>
    <pre><code>gh api repos/owner/repo/branches/main/protection</code></pre>
    <h2>Häufige Fehler</h2>
    <p>Sich Branches als Container von Commits vorstellen. Sind sie nicht; Commits existieren unabhängig, und viele Branches können denselben Commit erreichen. Einen "Feature"-Branch löschen und annehmen, die Commits seien weg; sie sind erst weg, nachdem sie unerreichbar werden <em>und</em> das Reflog abläuft (standardmäßig 90 Tage). Lange einzelwortige Branch-Namen verwenden, die mit Dateinamen kollidieren; <code>--</code>-Trenner vermeiden die Mehrdeutigkeit. Schließlich: Direkt auf <code>main</code> in einem geteilten Repository arbeiten; branchen Sie immer für nicht-triviale Arbeit, auch wenn Sie später per Fast-Forward planen.</p>

- source_title: "Merging: fast-forward vs three-way merge"
  title: "Merging: Fast-Forward vs. Three-Way-Merge"
  langcode: de
  body: |
    <h2>Einführung</h2>
    <p>Git hat zwei grundlegend verschiedene Merge-Ergebnisse: <strong>Fast-Forward</strong>, bei dem die Spitze eines Branches einfach verschoben wird, und <strong>Three-Way</strong>, bei dem ein neuer Commit mit zwei Eltern erstellt wird. Die Wahl hängt davon ab, ob die Branches divergiert sind.</p>
    <h2>Fast-Forward</h2>
    <p>Wenn die Spitze von <code>main</code> ein Vorfahre von <code>feature</code> ist, ist kein echter Merge nötig. Git rückt einfach <code>main</code> vor:</p>
    <pre><code>      A---B---C   feature
         /
    main

    # nach git merge feature
    A---B---C   main, feature</code></pre>
    <p>Befehl:</p>
    <pre><code>git switch main
    git merge feature</code></pre>
    <p>Um einen echten Merge-Commit zu erzwingen, auch wenn Fast-Forward möglich ist:</p>
    <pre><code>git merge --no-ff feature</code></pre>
    <h2>Three-Way-Merge</h2>
    <p>Wenn beide Branches divergiert sind, findet Git die <em>Merge-Basis</em> (den jüngsten gemeinsamen Vorfahren) und kombiniert die Änderungen beider Seiten:</p>
    <pre><code>      A---B---C   feature
         /
    A---D---E   main

    # nach git merge feature
    A---D---E---M   main
         \     /
          B---C   feature</code></pre>
    <p>Gits Standard-Merge-Strategie seit 2.33 ist <code>ort</code>; davor war es <code>recursive</code>. Beide berechnen einen Three-Way-Merge pro Datei mit der Merge-Basis.</p>
    <h2>Inspizieren</h2>
    <pre><code>git merge-base main feature
    git log --oneline --graph --all
    git show --stat HEAD          # Merge-Commit ansehen</code></pre>
    <h2>Strategien und Optionen</h2>
    <pre><code>git merge -X ours feature        # bei Konflikten unsere Seite bevorzugen
    git merge -X theirs feature      # ihre Seite bevorzugen
    git merge -X ignore-space-change feature
    git merge --squash feature       # Änderungen ohne Merge-Commit anwenden</code></pre>
    <p><code>--squash</code> erstellt einen einzigen Commit, der alle Änderungen von <code>feature</code> enthält, ohne Eltern-Verknüpfung dorthin. Nützlich für saubere Historie, verliert aber die Detailgenauigkeit pro Commit.</p>
    <h2>Abbrechen und rückgängig machen</h2>
    <pre><code>git merge --abort                # mitten im Merge zum Vor-Merge-Zustand zurückkehren
    git reset --hard ORIG_HEAD       # nach abgeschlossenem Merge ihn rückgängig machen</code></pre>
    <h2>Fast-Forward-Richtlinie konfigurieren</h2>
    <pre><code>git config --global merge.ff false      # immer Merge-Commit erstellen
    git config --global merge.ff only      # nur Fast-Forward, sonst ablehnen
    git config --global pull.ff only       # gleiches für Pulls</code></pre>
    <h2>Merge-Driver und Attribute</h2>
    <p>Manche Dateien mergen schlecht mit textbasiertem Three-Way (maschinengenerierte Lockfiles, generierte Dokumentation). Konfigurieren Sie einen eigenen Merge-Driver via <code>.gitattributes</code> und <code>git config</code>:</p>
    <pre><code># .gitattributes
    package-lock.json merge=ours
    Gemfile.lock merge=union</code></pre>
    <pre><code>git config merge.ours.driver true
    git config merge.union.name "Line union merge"
    git config merge.union.driver "git merge-file --union %A %O %B"</code></pre>
    <p>Die eingebaute <code>union</code>-Strategie behält beide Seiten; <code>ours</code> wählt immer unsere Version; eigene Driver können beliebige Programme ausführen. Sparsam einsetzen; überraschendes Merge-Verhalten verwirrt Reviewer.</p>
    <h2>Häufige Fehler</h2>
    <p>Glauben, Fast-Forward sei irgendwie speziell oder riskant; ist es nicht, es ist nur ein Zeiger-Move. <code>--no-ff</code> bei jedem Merge in einem schnellen Projekt verwenden, was die Historie mit leeren Merge-Commits verschmutzt. <code>-X ours</code> verwenden, wenn Sie <code>--strategy=ours</code> meinten (was die andere Seite vollständig verwirft) oder umgekehrt. Schließlich: Die Merge-Commit-Nachricht nachträglich manuell editieren und die standardisierte "Merge branch 'X'"-Formulierung brechen, auf die Tools sich verlassen; falls Sie editieren müssen, tun Sie es vor <code>git commit</code>.</p>

- source_title: "The reflog: your safety net"
  title: "Das Reflog: Ihr Sicherheitsnetz"
  langcode: de
  body: |
    <h2>Einführung</h2>
    <p>Das <em>Reflog</em> zeichnet jede Änderung an <code>HEAD</code> und an jeder Branch-Spitze auf Ihrer lokalen Maschine auf. Es ist lokal, pro Klon, und wird nicht gepusht. Nahezu jeder "verlorene" Commit kann darüber gerettet werden.</p>
    <h2>Anzeigen</h2>
    <pre><code>git reflog                            # HEAD-Reflog
    git reflog show main                  # Reflog von main
    git reflog --date=iso
    git log -g --oneline                  # Log-Lauf durch das Reflog</code></pre>
    <p>Jeder Eintrag hat eine Sequenz (<code>HEAD@{0}</code>, <code>HEAD@{1}</code>, ...), eine Aktion (<code>commit</code>, <code>reset</code>, <code>merge</code>, <code>rebase</code>, ...) und einen Ziel-SHA.</p>
    <h2>Einen verlorenen Commit wiederherstellen</h2>
    <pre><code>git reflog
    # 9f8a1c2 HEAD@{0}: reset: moving to HEAD~3
    # a1b2c3d HEAD@{1}: commit: Important work
    git switch -c rescued a1b2c3d</code></pre>
    <p>Oder direkt:</p>
    <pre><code>git reset --hard HEAD@{1}</code></pre>
    <h2>Zeitbasierte Syntax</h2>
    <pre><code>git show HEAD@{2.hours.ago}
    git diff main@{yesterday} main</code></pre>
    <p>Git interpretiert <code>@{...}</code> entweder als Zähler oder als Datum.</p>
    <h2>Reflog-Ablauf</h2>
    <p>Standardmäßig laufen erreichbare Reflog-Einträge nach 90 Tagen ab, unerreichbare nach 30:</p>
    <pre><code>git config gc.reflogExpire 90.days
    git config gc.reflogExpireUnreachable 30.days</code></pre>
    <p>Bis zum Ablauf bleiben selbst hard-resettete Commits wiederherstellbar.</p>
    <h2>Pro-Ref-Reflogs</h2>
    <p>Jeder Branch hat ein eigenes Reflog unter <code>.git/logs/refs/heads/&lt;name&gt;</code>. Stash hat ebenfalls eines (<code>refs/stash</code>):</p>
    <pre><code>git reflog show stash</code></pre>
    <h2>Reflog beschneiden</h2>
    <pre><code>git reflog expire --expire=now --all
    git gc --prune=now</code></pre>
    <p>Nur verwenden, wenn Sie Daten dauerhaft löschen müssen; dies entfernt das Sicherheitsnetz.</p>
    <h2>Reflog vs. git log</h2>
    <p><code>git log</code> durchläuft den Commit-Graphen über Eltern-Zeiger; das Reflog läuft aufgezeichnete Bewegungen einer Ref ab. Nach einem Force-Reset zeigt <code>git log</code> die aufgegebenen Commits nicht mehr, das Reflog aber schon.</p>
    <h2>Pro-Ref-Reflog-Inspektion</h2>
    <p>Jede Ref führt ein eigenes Reflog. Inspizieren Sie das Reflog eines bestimmten Branches, um zu sehen, wie sich seine Spitze bewegte:</p>
    <pre><code>git reflog show feature/login
    git log -g feature/login --oneline
    cat .git/logs/refs/heads/feature/login</code></pre>
    <p>Nützlich beim Untersuchen von "wer hat diesen Branch bewegt?" auf einem lokalen Klon. Das Reflog-Dateiformat ist eine Zeile pro Änderung mit altem SHA, neuem SHA, Committer, Zeitstempel und einer textuellen Nachricht. Kombiniert mit <code>git blame</code> auf der Datei ergibt es einen vollständigen lokalen Audit-Trail; denken Sie daran, dass Reflogs nicht gepusht werden, daher deckt der Trail nur Ihre Maschine ab.</p>
    <h2>Häufige Fehler</h2>
    <p>In Panik vergessen, dass das Reflog existiert, und Stunden Arbeit wiederholen, die leicht wiederherstellbar gewesen wäre. Prüfen Sie immer zuerst <code>git reflog</code>. Während der Wiederherstellung pushen und annehmen, das Reflog liege auf dem Server; tut es nicht, nur Ihr lokaler Klon hat es. <code>git gc --prune=now</code> aus einem "Aufräumen"-Instinkt ausführen und das Sicherheitsnetz für jeden unreferenzierten Commit zerstören. Und schließlich: Reflog-Einträge als ewig behandeln; lange gelöschte Refs altern aus. Taggen oder branchen Sie alles, was Sie behalten wollen, bevor 30 Tage vergehen.</p>

- source_title: "Detached HEAD state explained"
  title: "Der Detached-HEAD-Zustand erklärt"
  langcode: de
  body: |
    <h2>Einführung</h2>
    <p>Normalerweise zeigt <code>HEAD</code> auf eine Branch-Ref, die wiederum auf einen Commit zeigt. In <em>Detached HEAD</em> zeigt <code>HEAD</code> direkt auf einen Commit. Detached HEAD ist nicht kaputt; es ist ein bewusster Modus, der zum Inspizieren der Historie nützlich und zum gedankenlosen Committen gefährlich ist.</p>
    <h2>Wie man dorthin kommt</h2>
    <pre><code>git checkout v1.2.3
    git switch --detach v1.2.3
    git checkout HEAD~5
    git checkout origin/main      # Remote-Tracking ist quasi-readonly</code></pre>
    <p>Jeder dieser Befehle setzt <code>HEAD</code> direkt auf einen Commit statt auf einen Branch.</p>
    <h2>Inspizieren</h2>
    <pre><code>cat .git/HEAD
    # a1b2c3d4...   (roher SHA, nicht "ref: ...")
    git status
    # HEAD detached at v1.2.3</code></pre>
    <h2>Warum es existiert</h2>
    <ul>
      <li>Ein altes Release inspizieren, ohne einen Branch zu beeinflussen.</li>
      <li>Bisecten (<code>git bisect</code> verwendet Detached HEAD).</li>
      <li>Ein schnelles Experiment bauen, das Sie verwerfen können.</li>
      <li>Auf einem Tag operieren, der unbeweglich bleiben soll.</li>
    </ul>
    <h2>In Detached HEAD committen</h2>
    <p>Sie können in Detached HEAD committen, und das Commit-Objekt wird normal erzeugt. Der Haken: Kein Branch zeigt darauf. Wechseln Sie weg und der Commit wird unerreichbar.</p>
    <pre><code>git switch --detach v1.2.3
    echo fix > patch.txt
    git add patch.txt
    git commit -m "Quick fix"
    git switch main             # der neue Commit ist jetzt verwaist</code></pre>
    <p>Verankern Sie ihn vor dem Wechsel:</p>
    <pre><code>git switch -c hotfix/1.2.4</code></pre>
    <h2>Wiederherstellung nach versehentlichem Detach</h2>
    <p>Wenn Sie schon weggewechselt haben, hat das Reflog den Commit:</p>
    <pre><code>git reflog
    # a1b2c3d HEAD@{1}: commit: Quick fix
    git switch -c hotfix/1.2.4 a1b2c3d</code></pre>
    <h2>Wenn Detached HEAD nicht detached ist</h2>
    <p>Bare-Repositories haben oft <code>HEAD</code> als symbolische Ref auf <code>refs/heads/main</code>, auch wenn es keinen Working Tree gibt. Submodules checken absichtlich Detached HEAD auf dem aufgezeichneten Commit aus; das ist normal.</p>
    <h2>Warnungen konfigurieren</h2>
    <pre><code>git config --global advice.detachedHead true   # Standard: Hinweise zeigen</code></pre>
    <p>Anfänger sollten dies eingeschaltet lassen; der Warntext erklärt genau, wie man wiederherstellt.</p>
    <h2>Sicher im detached Modus arbeiten</h2>
    <p>Wenn Sie absichtlich experimentieren wollen, ohne einen Branch zu beeinflussen, ist Detached HEAD das richtige Werkzeug. Der Trick ist, wichtige Arbeit vor dem Wegwechseln zu verankern. Ein verlässliches Muster:</p>
    <pre><code>git switch --detach v1.2.3
    # ... experimentieren, committen ...
    git tag tmp/experiment           # Lesezeichen
    git switch main
    # später
    git switch -c rescued tmp/experiment
    git tag -d tmp/experiment</code></pre>
    <p>Der <code>tmp/</code>-Tag-Namespace macht offensichtlich, dass dies wegwerfbare Anker sind. Manche Teams reservieren für diesen Zweck ein ganzes Präfix und lassen CI es ignorieren.</p>
    <h2>Häufige Fehler</h2>
    <p>Die Warnung als beängstigenden Fehler behandeln und in Panik geraten. Sie ist informativ. Bedeutende Arbeit in Detached HEAD verrichten und dann <code>git switch main</code> ausführen, ohne zuerst einen Branch zu erstellen; per Reflog wiederherstellen, aber besser zuerst verankern. Detached HEAD mit einem korrupten Repository verwechseln; nichts ist korrupt, Ihnen fehlt nur ein Branch-Label. Schließlich: Im detached Modus pushen: <code>git push</code> braucht an beiden Enden einen Branch. Erstellen Sie entweder einen lokalen Branch und pushen Sie ihn, oder verwenden Sie <code>git push origin HEAD:refs/heads/new</code>.</p>

- source_title: "Remote-tracking branches"
  title: "Remote-Tracking-Branches"
  langcode: de
  body: |
    <h2>Einführung</h2>
    <p>Ein Remote-Tracking-Branch ist eine lokale Ref, die einen Branch auf einem Remote spiegelt. Sie leben unter <code>refs/remotes/&lt;remote&gt;/</code> und werden von <code>git fetch</code> aktualisiert (und Operationen, die fetch implizieren, wie <code>git pull</code> und <code>git clone</code>). Sie committen nicht direkt auf sie.</p>
    <h2>Woher sie kommen</h2>
    <p>Die Standard-Refspec für <code>origin</code> lautet:</p>
    <pre><code>+refs/heads/*:refs/remotes/origin/*</code></pre>
    <p>Wenn der Server also <code>refs/heads/main</code> hat, bekommt Ihr Klon <code>refs/remotes/origin/main</code>. Das führende <code>+</code> bedeutet "Force Update".</p>
    <h2>Auflisten</h2>
    <pre><code>git branch -r
    git branch -a                # lokal + Remote-Tracking
    git branch -vv               # zeigt Upstream der lokalen</code></pre>
    <h2>Einen lokalen Branch verknüpfen</h2>
    <pre><code>git switch feature/login                       # erstellt automatisch lokal aus origin/feature/login
    git switch -c mine origin/feature/login        # explizit
    git branch -u origin/main                      # Upstream des aktuellen Branches setzen
    git branch --unset-upstream</code></pre>
    <p>Die <em>Upstream</em>-Verknüpfung steuert die voraus/zurück-Anzeige von <code>git status</code> und die Standardziele für <code>git push</code> und <code>git pull</code>.</p>
    <h2>Aufräumen</h2>
    <p>Remote-Tracking-Branches verschwinden nicht, wenn der Remote-Branch gelöscht wird. Räumen Sie sie auf:</p>
    <pre><code>git fetch --prune
    git remote prune origin
    git config --global fetch.prune true</code></pre>
    <h2>Das spezielle Remote-HEAD</h2>
    <p>Jeder Remote hat ein symbolisches <code>HEAD</code>, das seinen Standard-Branch angibt:</p>
    <pre><code>git symbolic-ref refs/remotes/origin/HEAD
    git remote set-head origin --auto    # Server abfragen</code></pre>
    <p>Das ist es, was <code>origin</code> allein zu <code>origin/main</code> auflöst (oder welcher Standard auch immer).</p>
    <h2>Diff gegen einen Remote-Tracking-Branch</h2>
    <pre><code>git fetch
    git log HEAD..origin/main --oneline      # was Upstream ist
    git log origin/main..HEAD --oneline      # was nur lokal ist
    git diff @{u}                            # gegen Upstream</code></pre>
    <p><code>@{u}</code> (oder <code>@{upstream}</code>) ist die Kurzform für das konfigurierte Upstream des aktuellen Branches.</p>
    <h2>Push-Verhalten</h2>
    <p>Die Voreinstellung <code>push.default = simple</code> pusht den aktuellen Branch zu seinem Upstream gleichen Namens. Wenn Sie einen Branch ohne Upstream pushen und <code>push.autoSetupRemote = true</code> haben (Git 2.37+), wird das Upstream automatisch erstellt.</p>
    <h2>Refspec-Details</h2>
    <p>Die Fetch-Refspec für einen Remote kann angepasst werden, um zusätzliche Refs zu fetchen oder anders abzubilden. Zum Beispiel um zusätzlich GitHub-PR-Refs und GitLab-MR-Refs zu pullen:</p>
    <pre><code>git config --add remote.origin.fetch '+refs/pull/*/head:refs/remotes/origin/pr/*'
    git config --add remote.origin.fetch '+refs/merge-requests/*/head:refs/remotes/origin/mr/*'</code></pre>
    <p>Das führende <code>+</code> bedeutet "Force Update", nötig weil PR-Refs sich bewegen können (Rebases auf dem PR-Branch). Nach dem Fetchen erscheinen die PRs des Servers als lokale <code>origin/pr/*</code>-Refs, bereit für <code>git switch -c review/&lt;n&gt; origin/pr/&lt;n&gt;</code>.</p>
    <h2>Häufige Fehler</h2>
    <p><code>git checkout origin/main</code> versuchen und editieren wollen; es bringt Sie in Detached HEAD, weil <code>origin/main</code> readonly ist. Erstellen Sie stattdessen einen Tracking-Branch. Vergessen, <code>git fetch</code> auszuführen, und sich von veralteten voraus/zurück-Zählungen täuschen lassen. Remote-Tracking-Branches behandeln, als würde das Pushen darauf den Server aktualisieren; sie sind lokale Spiegel. Verwenden Sie <code>git push origin main</code>. Schließlich: <code>origin/main</code> mit <code>git branch -dr</code> löschen und annehmen, der Server-Branch sei weg; ist er nicht. Verwenden Sie <code>git push origin --delete main</code>, und nur wenn Sie es meinen.</p>

- source_title: "Working tree, index, and repository: the three areas"
  title: "Working Tree, Index und Repository: die drei Bereiche"
  langcode: de
  body: |
    <h2>Einführung</h2>
    <p>Jede Git-Operation bewegt Daten zwischen drei Bereichen: dem <strong>Working Tree</strong> (Ihre Dateien), dem <strong>Index</strong> (Entwurf des nächsten Commits) und dem <strong>Repository</strong> (committete Historie unter <code>.git</code>). Zu benennen, was wohin bewegt wird, ist das einzelne nützlichste mentale Modell.</p>
    <h2>Die Bereiche</h2>
    <ul>
      <li><strong>Working Tree</strong>: das Verzeichnis, in dem Sie editieren.</li>
      <li><strong>Index</strong>: <code>.git/index</code>, der gestagte Tree.</li>
      <li><strong>Repository</strong>: Objekte in <code>.git/objects</code> plus Refs in <code>.git/refs</code>.</li>
    </ul>
    <h2>Befehle nach Richtung</h2>
    <pre><code># Working Tree -> Index
    git add file
    git rm file
    git mv old new

    # Index -> Repository
    git commit
    git write-tree   # Plumbing

    # Repository -> Index
    git reset &lt;commit&gt;
    git read-tree &lt;tree&gt;

    # Repository -> Working Tree (und üblicherweise Index)
    git checkout &lt;commit&gt; -- file
    git restore --source &lt;commit&gt; file
    git switch &lt;branch&gt;</code></pre>
    <h2>Die vier Diffs</h2>
    <p>Sie können beliebige zwei Bereiche vergleichen:</p>
    <pre><code>git diff                  # Working Tree vs. Index
    git diff --staged         # Index vs. HEAD
    git diff HEAD             # Working Tree vs. HEAD
    git diff main feature     # Repository vs. Repository</code></pre>
    <h2>Status entschlüsseln</h2>
    <pre><code>git status -s
    # XY filename
    # X = Index-Status, Y = Working-Tree-Status
    # M modified, A added, D deleted, R renamed, ?? untracked</code></pre>
    <p>Zum Beispiel bedeutet <code>MM</code>, dass die Datei sowohl im Index als auch im Working Tree modifiziert ist (Sie haben eine Änderung gestaged und dann erneut bearbeitet).</p>
    <h2>Reset, restore, checkout</h2>
    <p>Jeder beeinflusst verschiedene Bereiche:</p>
    <ul>
      <li><code>git reset --soft</code>: nur Repository (Ref bewegen).</li>
      <li><code>git reset</code> (mixed): Repository + Index.</li>
      <li><code>git reset --hard</code>: Repository + Index + Working Tree.</li>
      <li><code>git restore --staged</code>: Index aus HEAD.</li>
      <li><code>git restore</code>: Working Tree aus Index.</li>
      <li><code>git restore --source=&lt;commit&gt;</code>: Working Tree (und optional Index) aus einem bestimmten Commit.</li>
    </ul>
    <h2>Eine Übung</h2>
    <pre><code>echo a &gt; f.txt
    git add f.txt
    git commit -m "v1"
    echo b &gt;&gt; f.txt
    git add f.txt
    echo c &gt;&gt; f.txt
    git status
    git diff
    git diff --staged
    git diff HEAD</code></pre>
    <p>Lesen Sie jeden Diff; zu verstehen, warum sie sich unterscheiden, festigt das Modell.</p>
    <h2>Plumbing für jeden Bereich</h2>
    <p>Das Plumbing für jeden Bereich zu kennen entmystifiziert höhere Befehle:</p>
    <ul>
      <li>Working Tree: gewöhnliche Dateisystemoperationen.</li>
      <li>Index: <code>git update-index</code>, <code>git ls-files</code>, <code>git read-tree</code>, <code>git write-tree</code>.</li>
      <li>Objektdatenbank: <code>git hash-object</code>, <code>git cat-file</code>, <code>git mktree</code>, <code>git commit-tree</code>.</li>
      <li>Refs: <code>git update-ref</code>, <code>git symbolic-ref</code>, <code>git for-each-ref</code>.</li>
    </ul>
    <pre><code>git ls-files --stage              # Index
    git ls-tree HEAD                  # Repo
    ls -R                             # Working Tree</code></pre>
    <h2>Häufige Fehler</h2>
    <p>Versuchen, Befehle statt Bereiche auswendig zu lernen; sobald Sie wissen, welcher Bereich Quelle und welcher Ziel ist, ist der richtige Befehl offensichtlich. <code>git restore file</code> mit <code>git checkout file</code> verwechseln; sie sind in diesem Fall äquivalent, aber die vielen anderen Modi von <code>checkout</code> verwirren neue Nutzer. <code>git reset --hard</code> zum "Aufräumen" verwenden, ohne zu merken, dass es den Working Tree vernichtet. Und schließlich: Erwarten, dass <code>git commit</code> ungestaged Änderungen einbezieht; tut es nicht (außer mit <code>-a</code> für nur verfolgte Dateien).</p>

- source_title: "How commits are linked: the commit graph"
  title: "Wie Commits verknüpft sind: der Commit-Graph"
  langcode: de
  body: |
    <h2>Einführung</h2>
    <p>Ein Git-Commit referenziert null, einen oder mehrere <em>Eltern</em>-Commits. Die gesamte Historie ist ein gerichteter azyklischer Graph (DAG) dieser Eltern-Verknüpfungen. Branches und Tags sind einfach Labels auf Knoten dieses Graphen.</p>
    <h2>Anatomie einer Eltern-Verknüpfung</h2>
    <pre><code>git cat-file -p HEAD
    # tree 9f1a...
    # parent b2c3...
    # parent d4e5...        (nur bei Merge-Commits)
    # author Ada ...
    # committer Ada ...</code></pre>
    <p>Ein Elternteil: lineare Historie. Zwei Eltern: ein Merge. Null Eltern: ein Wurzel-Commit. Drei oder mehr: ein Octopus-Merge.</p>
    <h2>Den Graph durchlaufen</h2>
    <pre><code>git log --oneline --graph --all
    git log --first-parent           # nur ersten Eltern folgen
    git log --topo-order
    git log --date-order</code></pre>
    <p><code>--first-parent</code> auf <code>main</code> ist großartig, um den "Trunk" der Historie ohne Merge-Side-Rauschen zu sehen.</p>
    <h2>Vorfahrenabfragen</h2>
    <pre><code>git merge-base A B               # jüngster gemeinsamer Vorfahre
    git merge-base --is-ancestor X Y   # Exit 0 falls X Vorfahre von Y
    git rev-list A..B --count          # Commits in B, nicht in A</code></pre>
    <h2>Bereichssyntax</h2>
    <ul>
      <li><code>A..B</code>: Commits von B aus erreichbar, nicht von A.</li>
      <li><code>A...B</code>: symmetrische Differenz.</li>
      <li><code>^A B</code>: gleichbedeutend mit <code>A..B</code>.</li>
      <li><code>B --not A</code>: gleichbedeutend mit <code>A..B</code>.</li>
    </ul>
    <pre><code>git log main..feature
    git log main...feature --left-right --oneline</code></pre>
    <h2>Die commit-graph-Datei</h2>
    <p>Seit Git 2.18 kann Git eine <code>commit-graph</code>-Datei schreiben, die Vorfahren-Daten für riesige Repositories vorberechnet:</p>
    <pre><code>git commit-graph write --reachable
    git config --global core.commitGraph true
    git config --global gc.writeCommitGraph true</code></pre>
    <p>Dies beschleunigt <code>git log --graph</code>, <code>git merge-base</code> und Erreichbarkeitsprüfungen dramatisch.</p>
    <h2>Octopus-Merges</h2>
    <p>Ein einzelner Merge-Commit kann viele Eltern haben:</p>
    <pre><code>git merge feature1 feature2 feature3</code></pre>
    <p>Octopus-Merges gelingen nur ohne Konflikte. Sie sind in einigen Workflows für Integrationsbranches nützlich, aber selten nötig.</p>
    <h2>Den Graph visualisieren</h2>
    <pre><code>git log --oneline --graph --decorate --all
    gitk --all
    git log --pretty=format:'%h %p %s'</code></pre>
    <p><code>%p</code> gibt Eltern-SHAs aus.</p>
    <h2>Generationsnummern</h2>
    <p>Die commit-graph-Datei speichert eine Generationsnummer pro Commit: 1 für Wurzel-Commits, max(Eltern-Generationen) + 1 sonst. Generationsnummern verwandeln viele Vorfahrenabfragen in O(log n)-Operationen. Modernes Git (2.27+) schreibt korrigierte Commit-Daten und Generation-v2-Nummern, wenn der commit-graph aktiviert ist:</p>
    <pre><code>git commit-graph write --reachable --changed-paths
    git config gc.writeCommitGraph true
    git config core.commitGraph true
    git log --oneline --graph -n 5</code></pre>
    <p><code>--changed-paths</code> zeichnet zusätzlich pro Commit einen Bloom-Filter auf, der geänderte Pfade auflistet, was pfadbeschränkte <code>git log</code>-Abfragen dramatisch beschleunigt.</p>
    <h2>Häufige Fehler</h2>
    <p>Sich Branches als getrennte Stapel von Commits vorstellen; sie sind Labels auf Knoten, die Vorfahren teilen können. <code>HEAD~3</code> auf einem Merge-Commit verwenden und überrascht sein: <code>~</code> folgt immer dem ersten Elternteil. Verwenden Sie <code>^2</code>, <code>^3</code>, um zu anderen Eltern zu springen. Vergessen, dass Rebase die Graph-Topologie umschreibt, indem es neue Commits mit neuen Eltern-Zeigern erstellt; alte Commits leben im Reflog weiter. Schließlich: Glauben, der Commit-Graph speichere Diffs; er speichert nur Trees und Eltern. Diffs werden bei Bedarf durch Vergleich der Trees berechnet.</p>

- source_title: "Pack files and object storage"
  title: "Pack-Dateien und Objektspeicherung"
  langcode: de
  body: |
    <h2>Einführung</h2>
    <p>Git speichert Objekte in zwei Formaten: <em>lose</em> (eine Datei pro Objekt unter <code>.git/objects/xx/yyyy...</code>) und <em>gepackt</em> (viele Objekte in einer einzigen <code>.pack</code>-Datei mit begleitender <code>.idx</code>). Packs sind weit effizienter auf Festplatte und im Netz.</p>
    <h2>Layout</h2>
    <pre><code>.git/objects/
      00/  ... lose Objekte, benannt nach SHA minus erste zwei Zeichen
      pack/
        pack-&lt;hash&gt;.pack    # die Daten
        pack-&lt;hash&gt;.idx     # Offset-Index
        pack-&lt;hash&gt;.rev     # Rückwärts-Index (Git 2.31+)</code></pre>
    <h2>Warum Packs</h2>
    <ul>
      <li>Eine Datei pro Objekt ist auf Dateisystemen mit Millionen von Dateien brutal.</li>
      <li>Packs wenden <em>Delta-Kompression</em> an: ähnliche Blobs als Basis plus Diff speichern.</li>
      <li>Packs verwenden zusätzlich zu Deltas zlib.</li>
      <li>Smart Fetch/Push übertragen Pack-Daten direkt.</li>
    </ul>
    <h2>Packen auslösen</h2>
    <pre><code>git gc                    # Routine-Wartung
    git gc --aggressive       # intensivere Delta-Suche
    git repack -a -d -f       # ein Pack aus allen Objekten neu erstellen
    git fetch                 # kann ebenfalls Packs erzeugen</code></pre>
    <p>Auto-gc feuert, wenn das Repository zu viele lose Objekte ansammelt; einstellbar über <code>gc.auto</code>.</p>
    <h2>Packs inspizieren</h2>
    <pre><code>ls .git/objects/pack
    git verify-pack -v .git/objects/pack/pack-&lt;hash&gt;.idx | head
    git count-objects -v</code></pre>
    <p><code>verify-pack -v</code> zeigt Typ, Größe, gepackte Größe jedes Objekts und ob es ein Delta gegen ein anderes Objekt ist.</p>
    <h2>Multi-Pack-Indexe</h2>
    <p>Für sehr große Repositories können mehrere Packs durch einen einzigen Index vereinigt werden:</p>
    <pre><code>git multi-pack-index write
    git config core.multiPackIndex true</code></pre>
    <h2>Erreichbarkeits-Bitmaps</h2>
    <p>Bitmaps beschleunigen Erreichbarkeitsabfragen (von clone und fetch auf Hosting-Servern verwendet):</p>
    <pre><code>git repack -adb        # Bitmap erstellen
    git config repack.writeBitmaps true</code></pre>
    <p>Bitmaps sind am nützlichsten beim Bedienen vieler Klone oder beim Ausführen großer <code>git rev-list</code>-Abfragen.</p>
    <h2>Details der Objektkomprimierung</h2>
    <p>Ein Delta in einem Pack speichert eine <em>Basis</em>-Objektreferenz und einen Anweisungsstrom. Die Basis kann selbst ein Delta sein. Git begrenzt Delta-Ketten über <code>pack.depth</code> (Standard 50). Die gewählte Basis ist üblicherweise ein ähnlicher Blob, oft eine vorherige Version derselben Datei.</p>
    <h2>Geometrisches Repacking</h2>
    <p>Ein einziges riesiges Pack zu pflegen ist teuer; es bei jedem gc neu zu schreiben ist verschwenderisch. Modernes Git unterstützt <em>geometrisches</em> Repacking, das eine Kette von Packs geometrisch ansteigender Größe pflegt und nur die kleinen umpackt:</p>
    <pre><code>git repack --geometric=2 -d --write-bitmap-index
    git config maintenance.incremental-repack.enabled true
    git maintenance run --task incremental-repack</code></pre>
    <p>Dies macht die Routine-Wartung beschränkt: Jedes gc berührt nur die kleinsten Packs. Kombiniert mit Multi-Pack-Indexen und Erreichbarkeits-Bitmaps ist geometrisches Repack das empfohlene Setup für große oder beschäftigte Repositories.</p>
    <h2>Häufige Fehler</h2>
    <p>Manuelles Löschen einer <code>.pack</code>-Datei zur Speicherrückgewinnung, was das Repository bricht. Das Pack enthält viele erreichbare Objekte; verwenden Sie stattdessen <code>git gc --prune</code>. <code>git gc --aggressive</code> regelmäßig laufen lassen; es ist teuer und verbessert sich gegenüber einem normalen <code>gc</code> selten. Millionen lose Objekte behalten (nach einer verpfuschten Wiederherstellung) und dann <code>git status</code> auf einem langsamen Dateisystem ausführen; packen Sie zuerst. Schließlich: Packs durch Dateikopien statt durch <code>git clone --bare</code> übertragen; Sie verpassen möglicherweise die <code>.idx</code> oder überspringen neuere Funktionen wie den Multi-Pack-Index.</p>

- source_title: "The ORIG_HEAD, MERGE_HEAD, and CHERRY_PICK_HEAD refs"
  title: "Die Refs ORIG_HEAD, MERGE_HEAD und CHERRY_PICK_HEAD"
  langcode: de
  body: |
    <h2>Einführung</h2>
    <p>Git führt mehrere spezielle "Hilfs"-Refs in <code>.git/</code>, um den Zustand mehrstufiger Operationen aufzuzeichnen. Sie zu kennen verwandelt beängstigende Wiederherstellungen in Einzeiler.</p>
    <h2>ORIG_HEAD</h2>
    <p><code>ORIG_HEAD</code> wird gesetzt, wenn eine "gefährliche" Operation <code>HEAD</code> stark bewegt: merge, rebase, reset, am. Es erfasst die vorherige Spitze, sodass Sie zurücksetzen können:</p>
    <pre><code>git merge feature
    # entscheiden, dass es ein Fehler war
    git reset --hard ORIG_HEAD</code></pre>
    <p>Derselbe Trick nach einem schlechten Rebase oder Reset:</p>
    <pre><code>git rebase main
    git reset --hard ORIG_HEAD     # zurück zum Pre-Rebase-Zustand</code></pre>
    <h2>MERGE_HEAD</h2>
    <p>Während eines Merges zeichnet <code>MERGE_HEAD</code> die Spitze des hinein-gemergten Branches auf. Es existiert vom Beginn von <code>git merge</code>, bis der Merge-Commit erstellt oder der Merge abgebrochen wird:</p>
    <pre><code>git merge feature
    cat .git/MERGE_HEAD
    git merge --abort                # entfernt MERGE_HEAD</code></pre>
    <p>Wenn Sie das Lösen von Konflikten beendet haben und den Merge-Commit schreiben wollen:</p>
    <pre><code>git commit                       # nutzt MERGE_HEAD, um den zweiten Elternteil aufzuzeichnen</code></pre>
    <h2>MERGE_MSG und AUTO_MERGE</h2>
    <p>Begleitdateien sind <code>.git/MERGE_MSG</code> (die vorbereitete Commit-Nachricht) und seit Git 2.40 <code>AUTO_MERGE</code> (ein Tree mit Gits Best-Effort-Auto-Auflösung). Letzteres ist nützlich zum Diffen gegen Ihre manuelle Auflösung.</p>
    <h2>CHERRY_PICK_HEAD und REVERT_HEAD</h2>
    <p>Während eines Cherry-Picks oder Reverts zeichnet Git den Quell-Commit auf:</p>
    <pre><code>git cherry-pick a1b2c3d
    cat .git/CHERRY_PICK_HEAD
    git cherry-pick --abort
    git cherry-pick --continue        # nach dem Lösen von Konflikten</code></pre>
    <p>Dasselbe Muster gilt für <code>git revert</code> mit <code>REVERT_HEAD</code>.</p>
    <h2>BISECT_HEAD und REBASE_HEAD</h2>
    <p>Beim Bisecten oder Rebasen schreibt Git auch <code>BISECT_HEAD</code> oder <code>REBASE_HEAD</code>, um den laufenden Zustand zu verfolgen. Werkzeuge wie <code>git status</code> verwenden diese, um genaue "Sie sind mitten in X"-Nachrichten auszugeben.</p>
    <h2>FETCH_HEAD</h2>
    <p>Nach einem Fetch listet <code>FETCH_HEAD</code> auf, was gefetcht wurde, eine Ref pro Zeile. <code>git pull</code> liest sie, um zu wissen, was zu mergen ist:</p>
    <pre><code>git fetch origin main
    cat .git/FETCH_HEAD
    git merge FETCH_HEAD</code></pre>
    <h2>Zusammensetzen</h2>
    <pre><code>git status                         # referenziert all diese nach Bedarf
    ls .git/*HEAD                      # aktuelle Hilfs-Refs auflisten</code></pre>
    <h2>Laufende Operationen erkennen</h2>
    <p><code>git status</code> liest diese Hilfs-Refs, um Ihnen zu sagen, was läuft. Skripte können dasselbe tun, indem sie auf die Existenz der Dateien testen:</p>
    <pre><code>if test -f "$(git rev-parse --git-dir)/MERGE_HEAD"; then
        echo "merge in progress"
    fi
    if test -f "$(git rev-parse --git-dir)/CHERRY_PICK_HEAD"; then
        echo "cherry-pick in progress"
    fi
    if test -d "$(git rev-parse --git-dir)/rebase-merge"; then
        echo "interactive rebase in progress"
    fi</code></pre>
    <p>Genau das tun Shell-Prompt-Integrationen wie <code>__git_ps1</code>, um <code>(main|MERGING)</code> darzustellen.</p>
    <h2>Häufige Fehler</h2>
    <p>Versuchen, <code>MERGE_HEAD</code> manuell zu löschen, um aus einem Merge zu entkommen; verwenden Sie <code>git merge --abort</code>. Vergessen, dass <code>ORIG_HEAD</code> existiert, und Commits nach einem schlechten Reset von Hand neu erstellen. <code>FETCH_HEAD</code> (letzter Fetch, transient) mit Remote-Tracking-Refs wie <code>origin/main</code> (persistent) verwechseln. Und schließlich: Skripten um diese Refs herum mit der Annahme, sie existierten; <code>MERGE_HEAD</code> existiert nur während eines Merges, also testen Sie immer auf die Datei, bevor Sie lesen.</p>

- source_title: "Annotated tags vs lightweight tags"
  title: "Annotated Tags vs. Lightweight Tags"
  langcode: de
  body: |
    <h2>Einführung</h2>
    <p>Git unterstützt zwei Arten von Tags: <strong>Lightweight</strong>, die nur Refs sind, die auf Commits zeigen, und <strong>Annotated</strong>, die vollständige Git-Objekte mit Metadaten sind. Verwenden Sie für Releases Annotated Tags.</p>
    <h2>Erstellen</h2>
    <pre><code>git tag v1.0.0                          # Lightweight
    git tag -a v1.0.0 -m "1.0 GA"           # Annotated
    git tag -s v1.0.0 -m "Signed"           # GPG-signiert annotated
    git tag -a v1.0.0 a1b2c3d -m "..."     # einen bestimmten Commit taggen</code></pre>
    <h2>Was Annotated Tags speichern</h2>
    <pre><code>git cat-file -t v1.0.0
    # tag
    git cat-file -p v1.0.0
    # object &lt;commit-sha&gt;
    # type commit
    # tag v1.0.0
    # tagger Ada &lt;ada@example.com&gt; 1714300000 +0000
    #
    # 1.0 GA</code></pre>
    <p>Ein Annotated Tag ist ein eigenes Objekt. Es hat einen eigenen, vom referenzierten Commit verschiedenen SHA, einen Tagger und ein Datum, eine Nachricht und eine optionale Signatur.</p>
    <h2>Was Lightweight Tags nicht speichern</h2>
    <p>Ein Lightweight Tag ist nur <code>refs/tags/v1.0.0</code>, der einen Commit-SHA enthält. Es gibt keine Nachricht, keinen Tagger, keine Signatur. <code>git describe</code>, <code>git tag -v</code> und viele CI-Release-Tools nehmen Annotated Tags an und verhalten sich mit Lightweight Tags seltsam.</p>
    <h2>Inspizieren</h2>
    <pre><code>git show v1.0.0
    git tag -l --format='%(refname:short) %(objecttype) %(taggername) %(subject)'</code></pre>
    <p>Lightweight Tags zeigen <code>commit</code> als Objekttyp; Annotated Tags zeigen <code>tag</code>.</p>
    <h2>Signieren und Verifizieren</h2>
    <pre><code>git tag -s v1.0.0 -m "Signed"
    git tag -v v1.0.0
    # gpg: Good signature from "Ada Lovelace &lt;ada@example.com&gt;"</code></pre>
    <p>SSH-Signierung wird in modernem Git ebenfalls unterstützt:</p>
    <pre><code>git config --global gpg.format ssh
    git config --global user.signingkey ~/.ssh/id_ed25519.pub
    git tag -s v1.1.0 -m "SSH-signed"</code></pre>
    <h2>Wählen</h2>
    <ul>
      <li>Verwenden Sie <strong>Annotated</strong> für Releases, alles, was Sie veröffentlichen, alles, was Sie signieren.</li>
      <li>Verwenden Sie <strong>Lightweight</strong> für Ad-hoc-Lokal-Lesezeichen (z. B. "diesen Commit vor dem Rebasen merken").</li>
    </ul>
    <h2>Tags pushen</h2>
    <pre><code>git push origin v1.0.0
    git push origin --tags
    git push --follow-tags         # nur Annotated Tags, von gepushten Commits aus erreichbar</code></pre>
    <p><code>--follow-tags</code> ignoriert absichtlich Lightweight Tags, was üblicherweise erwünscht ist.</p>
    <h2>Tag-Dereferenzierung</h2>
    <p>Viele Befehle dereferenzieren einen Annotated Tag automatisch zu dem Commit, auf den er zeigt; manche nicht. Verwenden Sie <code>^{}</code>, um Dereferenzierung in Skripten zu erzwingen:</p>
    <pre><code>git rev-parse v1.0.0           # SHA des Tag-Objekts (annotated)
    git rev-parse v1.0.0^{}        # SHA des Commits, auf den er zeigt
    git rev-parse v1.0.0^{commit}  # gleichbedeutend, mit Typprüfung
    git for-each-ref --format='%(refname:short) %(*objectname)' refs/tags</code></pre>
    <p>Der Platzhalter <code>%(*objectname)</code> liefert den dereferenzierten Commit für Tags und ist leer für Nicht-Tag-Refs. Dieses Muster ist essentiell für Release-Skripte, die einen Commit-SHA aus einem Tag-Namen brauchen.</p>
    <h2>Häufige Fehler</h2>
    <p>Releases mit reinem <code>git tag v1.0</code> taggen und Tagger/Datum/Nachricht in Audit-Logs verpassen. Übergeben Sie immer <code>-a</code> oder <code>-s</code>. Einen veröffentlichten Tag auf einen neuen Commit verschieben ("Force-Tag"); nachgelagerte Nutzer haben den alten SHA bereits gecacht und übernehmen die Änderung möglicherweise nicht. Vergeben Sie stattdessen <code>v1.0.1</code>. Lightweight Tags als benannte Lesezeichen über ein Team hinweg verwenden; wenn Sie teilen müssen, bevorzugen Sie Branches oder Annotated Tags. Schließlich: Erwarten, dass <code>git describe</code> ohne Annotated Tags funktioniert; standardmäßig zählt es nur die annotated (<code>--tags</code> aktiviert lightweight, mit Vorbehalten).</p>

- source_title: "What happens during git clone"
  title: "Was bei git clone passiert"
  langcode: de
  body: |
    <h2>Einführung</h2>
    <p><code>git clone</code> sieht aus wie eine Operation, setzt sich aber tatsächlich aus mehreren zusammen. Die Schritte zu verstehen hilft beim Troubleshooting partieller Klone, langsamer Klone oder überraschender Voreinstellungen.</p>
    <h2>Die Sequenz</h2>
    <ol>
      <li>Erstellt das Zielverzeichnis.</li>
      <li>Führt darin <code>git init</code> aus.</li>
      <li>Fügt <code>origin</code> als Remote mit der Quell-URL hinzu.</li>
      <li>Konfiguriert die Standard-Refspec <code>+refs/heads/*:refs/remotes/origin/*</code>.</li>
      <li>Führt <code>git fetch origin</code> aus, um Objekte und Refs herunterzuladen.</li>
      <li>Bestimmt den Standard-Branch (das <code>HEAD</code> des Remotes).</li>
      <li>Erstellt einen lokalen Branch, der ihn trackt.</li>
      <li>Checkt diesen Branch in den Working Tree aus.</li>
    </ol>
    <h2>Es beim Geschehen beobachten</h2>
    <pre><code>GIT_TRACE=1 GIT_TRACE_PACKET=1 git clone https://github.com/example/widget.git 2&gt;&amp;1 | head -50</code></pre>
    <p>Sie sehen Capability-Verhandlung, Refs-Advertisement, Want/Have-Verhandlung und Pack-Empfang.</p>
    <h2>Wire-Protokoll</h2>
    <p>Modernes Git unterstützt Protokoll v2 (<code>git config protocol.version 2</code> oder Standard in 2.26+). Der Server kündigt nur die angeforderten Refs an statt der vollständigen Ref-Liste, was die Klonzeiten für Repositories mit vielen Refs dramatisch verbessert.</p>
    <h2>Varianten</h2>
    <pre><code>git clone --bare                       # kein Working Tree
    git clone --mirror                     # Bare + alle Refs, für Mirroring konfiguriert
    git clone --depth 1                    # shallow
    git clone --filter=blob:none           # Partial Clone, Blobs erst bei Bedarf
    git clone --filter=tree:0              # noch weniger Daten, Trees on-demand
    git clone --single-branch              # nur die Historie eines Branches
    git clone --branch v1.2.3              # einen bestimmten Branch/Tag auschecken
    git clone --recurse-submodules         # Submodules ebenfalls klonen
    git clone --no-checkout                # Working Tree nicht befüllen</code></pre>
    <h2>Partial Clones</h2>
    <p>Partial Clones (<code>--filter</code>) verschieben Objekt-Downloads, bis Objekte benötigt werden. Sie erfordern Server-Unterstützung (die meisten modernen Hosts haben sie):</p>
    <pre><code>git clone --filter=blob:none https://github.com/example/big.git
    cd big
    git log --oneline                  # billig; nur Commit- und Tree-Objekte gefetcht
    git show HEAD:src/main.c           # dies löst einen Blob-Fetch aus</code></pre>
    <h2>Was wohin geht</h2>
    <p>Nach einem erfolgreichen Klon:</p>
    <ul>
      <li><code>.git/objects/pack/</code>: das vom Server empfangene Pack-File.</li>
      <li><code>.git/refs/remotes/origin/</code>: jeder Server-Branch als Remote-Tracking-Ref.</li>
      <li><code>.git/HEAD</code>: symbolische Ref auf den neuen lokalen Branch.</li>
      <li><code>.git/config</code>: <code>[remote "origin"]</code>-Sektion mit URL und Refspec.</li>
    </ul>
    <h2>Server-seitiges Advertisement</h2>
    <p>Das Erste, was der Server bei jedem Klon sendet, ist das Ref-Advertisement. Unter Protokoll v0/v1 listet dies jede Ref auf, auch wenn Sie nur eine wollen; bei riesigen Repositories mit Millionen von Refs konnte allein das Advertisement Sekunden dauern. Protokoll v2 ändert dies: Der Client sendet eine <code>ls-refs</code>-Anfrage mit Mustern, und der Server kündigt nur passende Refs an:</p>
    <pre><code>git -c protocol.version=2 ls-remote origin 'refs/heads/main'
    GIT_TRACE_PACKET=1 git -c protocol.version=2 ls-remote origin 2&gt;&amp;1 | head</code></pre>
    <p>Bei alltäglichen Klonen ist die Beschleunigung unsichtbar; bei Hosting-Servern ist sie dramatisch.</p>
    <h2>Häufige Fehler</h2>
    <p>Ein riesiges Repository auf einer wackligen Verbindung klonen und von Grund auf neu beginnen; <code>git clone</code> in 2.30+ unterstützt resumable Cloning über das Smart-HTTP-Protokoll, aber nur wenn der Server es unterstützt. Andernfalls zuerst <code>--depth 1</code>, dann später <code>git fetch --unshallow</code>. In <code>~/Dropbox</code> oder einen anderen Sync-Ordner klonen; der Sync-Client wird mit Git um die Kontrolle über <code>.git/index</code> kämpfen. Ein Repository mit Submodules klonen und <code>--recurse-submodules</code> vergessen, mit leeren Submodule-Verzeichnissen enden. Schließlich: Über HTTPS klonen ohne Credential-Helper und bei jedem Fetch nach Credentials gefragt werden; konfigurieren Sie einen einmal.</p>

- source_title: "What happens during git fetch"
  title: "Was bei git fetch passiert"
  langcode: de
  body: |
    <h2>Einführung</h2>
    <p><code>git fetch</code> ist die Netzwerkoperation, die neue Objekte herunterlädt und Remote-Tracking-Refs aktualisiert. Sie ändert Ihre Branches oder den Working Tree nicht, was sie zum sichersten "Was gibt es Neues?"-Befehl macht.</p>
    <h2>Die Sequenz</h2>
    <ol>
      <li>Remote-URL auflösen.</li>
      <li>Verbindung öffnen (HTTPS, SSH oder git://).</li>
      <li>Capabilities verhandeln (Protokollversion, Multi-Ack, Partial-Clone-Filter usw.).</li>
      <li>Server kündigt Refs an (oder, in Protokoll v2, nur die mit den angeforderten Mustern übereinstimmenden).</li>
      <li>Client meldet, was er bereits hat.</li>
      <li>Server sendet ein Pack-File mit den fehlenden Objekten.</li>
      <li>Client schreibt das Pack nach <code>.git/objects/pack/</code> und indexiert es.</li>
      <li>Client aktualisiert Remote-Tracking-Refs (<code>refs/remotes/origin/*</code>).</li>
      <li>Optional Pruning gelöschter Refs.</li>
    </ol>
    <h2>Befehle</h2>
    <pre><code>git fetch
    git fetch origin
    git fetch --all
    git fetch --prune
    git fetch origin main:my-main         # in eine lokale Ref fetchen</code></pre>
    <p>Die Doppelpunkt-Syntax <code>main:my-main</code> erstellt oder aktualisiert eine lokale Ref direkt; vorsichtig verwenden.</p>
    <h2>Inspizieren, was gefetcht wurde</h2>
    <pre><code>git fetch origin
    cat .git/FETCH_HEAD
    git log HEAD..origin/main --oneline</code></pre>
    <p><code>FETCH_HEAD</code> listet jede vom letzten Fetch aktualisierte Ref auf, in der angeforderten Reihenfolge.</p>
    <h2>Refspecs</h2>
    <p>Jeder Remote hat eine oder mehrere Fetch-Refspecs. Der Standard für <code>origin</code>:</p>
    <pre><code>+refs/heads/*:refs/remotes/origin/*</code></pre>
    <p>Sie können weitere hinzufügen, etwa um Pull-Request-Refs von GitHub zu fetchen:</p>
    <pre><code>git config --add remote.origin.fetch '+refs/pull/*/head:refs/remotes/origin/pr/*'
    git fetch
    git switch -c review/123 origin/pr/123</code></pre>
    <h2>Pruning</h2>
    <p>Ohne Prune verbleiben auf dem Server gelöschte Branches als veraltete <code>origin/*</code>-Refs:</p>
    <pre><code>git fetch --prune
    git config --global fetch.prune true</code></pre>
    <h2>Tags</h2>
    <p>Standardmäßig lädt fetch Tags herunter, die auf gefetchte Commits zeigen. Erzwingen oder deaktivieren:</p>
    <pre><code>git fetch --tags
    git fetch --no-tags</code></pre>
    <h2>Trace und Debug</h2>
    <pre><code>GIT_TRACE=1 GIT_TRACE_PACKET=1 git fetch
    GIT_CURL_VERBOSE=1 git fetch        # HTTPS</code></pre>
    <p>Diese offenbaren exakte Anfragen, nützlich beim Debuggen von Proxies oder Authentifizierung.</p>
    <h2>Verhandlung und haves</h2>
    <p>Der Fetch-Handshake ist ein Tanz aus "wants" und "haves". Der Client listet auf, was er will (die Spitzen-SHAs der Remote-Branches), und bietet haves an (jüngste lokale Commits), damit der Server ein minimales Pack berechnen kann. Modernes Git verwendet den <code>skipping</code>-Verhandlungsalgorithmus, der selbst auf langen Historien in O(log n)-Runden konvergiert. Sie können ihn einstellen:</p>
    <pre><code>git config fetch.negotiationAlgorithm skipping
    git config fetch.negotiationAlgorithm consecutive
    GIT_TRACE_PACKET=1 git fetch 2&gt;&amp;1 | grep -E 'have|want' | head</code></pre>
    <h2>Häufige Fehler</h2>
    <p>Glauben, <code>git fetch</code> ändere Ihre Branches; tut es nie. Verwenden Sie <code>git pull</code> oder <code>git merge origin/main</code> zur Integration. <code>--prune</code> in langlebigen Klonen überspringen und Dutzende veralteter <code>origin/*</code>-Refs ansammeln. Eine Refspec von Hand falsch konfigurieren und lokale Branches überschreiben; doppelt prüfen mit <code>git config -e</code>. Schließlich: Aus einem Partial Clone fetchen ohne zu merken, dass beim Zugriff auf einige Objekte ein Folge-Netzwerkaufruf nötig wird; Partial Clones tauschen Up-Front-Geschwindigkeit gegen gelegentliche Latenz später.</p>

- source_title: "What happens during git pull (fetch + merge/rebase)"
  title: "Was bei git pull passiert (fetch + merge/rebase)"
  langcode: de
  body: |
    <h2>Einführung</h2>
    <p><code>git pull</code> ist Zucker für <code>git fetch</code> gefolgt von der Integration des Upstream-Branches in den aktuellen Branch. Der Integrationsschritt ist entweder ein Merge (Standard) oder ein Rebase.</p>
    <h2>Die zwei Schritte</h2>
    <ol>
      <li><code>git fetch &lt;remote&gt; &lt;refspec&gt;</code>: herunterladen und Tracking-Refs aktualisieren.</li>
      <li>Wenn <code>pull.rebase</code> false ist: <code>git merge FETCH_HEAD</code>.</li>
      <li>Wenn <code>pull.rebase</code> true ist: <code>git rebase FETCH_HEAD</code>.</li>
    </ol>
    <p>Äquivalente manuelle Sequenz:</p>
    <pre><code>git fetch origin main
    git merge origin/main             # oder git rebase origin/main</code></pre>
    <h2>Konfiguration</h2>
    <pre><code>git config --global pull.rebase false   # Merge (klassischer Standard)
    git config --global pull.rebase true    # Rebase
    git config --global pull.ff only        # nur Fast-Forward, sonst Abbruch</code></pre>
    <p>Seit Git 2.27 gibt ein einfaches <code>git pull</code> ohne Konfiguration eine Warnung aus. Wählen Sie eine Strategie ausdrücklich.</p>
    <h2>Nur Fast-Forward</h2>
    <p><code>--ff-only</code> ist der sicherste Pull: Er gelingt nur, wenn Ihr Branch strikt zurück ist. Kein Merge-Commit, kein Rebase, keine Überraschungen.</p>
    <pre><code>git pull --ff-only</code></pre>
    <p>Kombinieren Sie mit Autostash, um Working-Tree-Blocker zu vermeiden:</p>
    <pre><code>git pull --ff-only --autostash</code></pre>
    <h2>Pull mit Rebase</h2>
    <pre><code>git pull --rebase
    git pull --rebase=merges          # Merge-Struktur erhalten</code></pre>
    <p><code>--rebase=merges</code> ist nützlich für Branches, die Merge-Commits enthalten, die Sie behalten möchten.</p>
    <h2>Pull mit Autostash</h2>
    <pre><code>git config --global rebase.autoStash true
    git config --global merge.autoStash true</code></pre>
    <p>Mit diesen aktiviert werden schmutzige Trees vor der Integration gestasht und danach transparent wieder angewendet.</p>
    <h2>Multi-Branch-Pull</h2>
    <pre><code>git pull origin main feature        # fetcht beide, mergt Octopus in HEAD</code></pre>
    <p>Das ist selten gewünscht; bevorzugen Sie separate Operationen.</p>
    <h2>Pull vs. expliziter Fetch + Integration</h2>
    <p>Viele erfahrene Nutzer ziehen es vor, <code>git pull</code> nie zu verwenden. Sie führen zuerst <code>git fetch</code> aus, prüfen <code>git log HEAD..@{u}</code> und wählen dann bewusst Merge oder Rebase. Dies ist besonders wertvoll beim Integrieren langlebiger divergenter Branches.</p>
    <h2>Pull-Richtlinien für Teams</h2>
    <p>Gesunde Teams wählen eine einzelne Pull-Richtlinie und konfigurieren sie organisationsweit. Zwei häufige Wahlmöglichkeiten:</p>
    <pre><code># Lineare-Historie-Team: beim Pull rebasen, Merge nur via PR
    git config --global pull.rebase true
    git config --global rebase.autoStash true

    # Merge-freundliches Team: nie rebasen, immer fast-forward für main
    git config --global pull.rebase false
    git config --global pull.ff only</code></pre>
    <p>Die schlechteste Konfiguration ist die fehlende: Jeder Entwickler-<code>git pull</code> verhält sich anders und erzeugt inkonsistente Historien. Dokumentieren Sie die Richtlinie in der <code>CONTRIBUTING.md</code> Ihres Repositories und stellen Sie ein einzeiliges Konfigurations-Snippet bereit, das neue Mitwirkende kopieren können.</p>
    <h2>Häufige Fehler</h2>
    <p><code>git pull</code> mit uncommitted Änderungen ausführen und einen unerwarteten Merge-Commit auf schmutziger Arbeit erhalten. Stashen, committen oder <code>autoStash</code> setzen. Mit Rebase auf einem Branch pullen, auf dem andere Arbeit aufgebaut haben; Sie schreiben deren Basis um. Rebasen Sie nur auf privaten Branches. <code>pull.rebase</code> global konfigurieren, ohne zu merken, dass es auch <code>main</code> betrifft; viele Teams setzen <code>pull.ff only</code> global und überschreiben pro Branch. Schließlich: <code>git pull</code> in CI verwenden; CI braucht selten Integration, nur den neuesten Commit. Verwenden Sie <code>git fetch</code> und ein explizites Auschecken von <code>origin/main</code>, um CI deterministisch zu halten.</p>

- source_title: "What happens during git push"
  title: "Was bei git push passiert"
  langcode: de
  body: |
    <h2>Einführung</h2>
    <p><code>git push</code> lädt Commits auf einen Remote hoch und aktualisiert dessen Refs. Anders als fetch ändert er den Zustand auf dem Server, weshalb Sicherheitsmechanismen existieren, um das Überschreiben der Arbeit anderer zu verhindern.</p>
    <h2>Die Sequenz</h2>
    <ol>
      <li>Remote-URL und Ziel-Refspec auflösen.</li>
      <li>Verbindung öffnen.</li>
      <li>Capabilities verhandeln.</li>
      <li>Server kündigt aktuelle Werte der Refs an.</li>
      <li>Client prüft jeden Push: Ist es ein Fast-Forward der Server-Ref?</li>
      <li>Client packt fehlende Objekte und lädt sie hoch.</li>
      <li>Server führt <code>pre-receive</code>-Hook aus.</li>
      <li>Für jede Ref führt der Server den <code>update</code>-Hook aus und aktualisiert die Ref atomar.</li>
      <li>Server führt <code>post-receive</code>-Hook aus.</li>
      <li>Server meldet Erfolg oder Ablehnung an den Client.</li>
    </ol>
    <h2>Befehle</h2>
    <pre><code>git push                                  # aktueller Branch zum Upstream
    git push origin main                      # explizit
    git push -u origin feature/login          # Upstream setzen
    git push origin --delete feature/login    # Remote-Branch löschen
    git push origin v1.0.0                    # einen Tag pushen
    git push --follow-tags
    git push --force-with-lease</code></pre>
    <h2>Fast-Forward-Erzwingung</h2>
    <p>Standardmäßig wird ein Push abgelehnt, wenn er die Remote-Ref nicht per Fast-Forward voranbringen würde. Dies schützt davor, versehentlich Arbeit zu überschreiben, die andere gepusht haben:</p>
    <pre><code> ! [rejected]   main -> main (non-fast-forward)
    error: failed to push some refs to 'origin'
    hint: Updates were rejected because the tip of your current branch is behind ...</code></pre>
    <p>Beheben Sie es, indem Sie fetchen, integrieren und erneut pushen.</p>
    <h2>Force-Pushen</h2>
    <pre><code>git push --force                   # gefährlich: ignoriert den Remote-Zustand
    git push --force-with-lease        # sicherer: weigert sich, falls der Remote sich bewegt hat
    git push --force-with-lease=feature/login:abc1234</code></pre>
    <p><code>--force-with-lease</code> verlangt, dass die Remote-Ref noch dem entspricht, was Ihre Tracking-Ref sagt. Bevorzugen Sie es immer.</p>
    <h2>Atomare Pushes</h2>
    <pre><code>git push --atomic origin branchA branchB</code></pre>
    <p>Mit <code>--atomic</code> gelingen entweder alle Updates oder keines; nützlich, wenn Refs sich gemeinsam bewegen müssen.</p>
    <h2>Push-Richtlinien</h2>
    <pre><code>git config --global push.default simple        # aktueller Branch zu seinem Upstream
    git config --global push.default current       # aktueller Branch zum Remote gleichen Namens
    git config --global push.default upstream      # aktueller zum Namen des Upstreams
    git config --global push.autoSetupRemote true  # 2.37+: automatisches -u für neue Branches</code></pre>
    <h2>Server-seitige Hooks</h2>
    <p>Hosting-Plattformen führen <code>pre-receive</code>- und <code>update</code>-Hooks aus, um Richtlinien durchzusetzen (signierte Commits, Branch-Benennung, verpflichtend grünes CI). Wenn ein Push abgelehnt wird, nennt die Server-Nachricht die anstößige Ref oder den anstößigen Commit. Lesen Sie die Nachricht, bevor Sie es erneut versuchen.</p>
    <h2>Häufige Fehler</h2>
    <p>Force-Push auf einen geteilten Branch wie <code>main</code> und Commits anderer Personen umschreiben. Stimmen Sie sich ab oder verwenden Sie <code>--force-with-lease</code> nur auf privaten Branches. Tags einzeln pushen und vergessen, Commits zu pushen, was dangling Tags auf dem Server hinterlässt. Verwenden Sie <code>--follow-tags</code>. An den falschen Remote pushen, weil Sie mehrere konfiguriert haben; <code>git push -v</code> zeigt genau, wohin es geht. Schließlich: Erwarten, dass <code>git push --delete</code> Dateien löscht; es löscht <em>Refs</em>. Um Dateien zu löschen, committen Sie eine Entfernung und pushen Sie diesen Commit.</p>

- source_title: "Conflict markers and how Git produces them"
  title: "Konfliktmarker und wie Git sie erzeugt"
  langcode: de
  body: |
    <h2>Einführung</h2>
    <p>Wenn Git zwei Änderungen am selben Bereich einer Datei nicht automatisch kombinieren kann, hinterlässt es <em>Konfliktmarker</em> in der Arbeitskopie und lässt Sie manuell auflösen. Die Marker sind keine Magie; sie zeichnen genau auf, was jede Seite relativ zu einer gemeinsamen Basis getan hat.</p>
    <h2>Anatomie</h2>
    <pre><code>&lt;&lt;&lt;&lt;&lt;&lt;&lt; HEAD
    line as it is on our branch
    =======
    line as it is on their branch
    &gt;&gt;&gt;&gt;&gt;&gt;&gt; feature/login</code></pre>
    <p>Der Abschnitt zwischen <code>&lt;&lt;&lt;</code> und <code>===</code> ist "ours" (der aktuelle Branch). Zwischen <code>===</code> und <code>&gt;&gt;&gt;</code> ist "theirs". Auflösen heißt, den richtigen Text zu behalten, die Marker zu löschen und zu stagen.</p>
    <h2>Three-Way-Marker (diff3-Stil)</h2>
    <pre><code>git config --global merge.conflictStyle diff3</code></pre>
    <p>Nun enthalten die Marker auch die Basisversion:</p>
    <pre><code>&lt;&lt;&lt;&lt;&lt;&lt;&lt; HEAD
    our version
    ||||||| merged common ancestor
    base version
    =======
    their version
    &gt;&gt;&gt;&gt;&gt;&gt;&gt; feature/login</code></pre>
    <p>Die Basis zu sehen klärt oft, was jede Seite beabsichtigte. Noch besser, seit Git 2.35:</p>
    <pre><code>git config --global merge.conflictStyle zdiff3</code></pre>
    <p>was gemeinsamen Kontext kürzt.</p>
    <h2>Wie Git sie erzeugt</h2>
    <p>Für jedes Paar konfliktbehafteter Hunks läuft Git einen Three-Way-Diff zwischen Basis, ours und theirs. Wenn beide Seiten denselben Bereich anders geändert haben, schreibt Git beide Versionen umgeben von Markern. Andernfalls gewinnt die Seite, die geändert hat, automatisch.</p>
    <h2>Auflösen</h2>
    <pre><code>git status                       # konfliktbehaftete Pfade auflisten
    jede Datei bearbeiten
    git add &lt;file&gt;                   # als gelöst markieren
    git commit                       # nutzt vorbereitete Nachricht</code></pre>
    <p>Oder verwenden Sie ein Merge-Tool:</p>
    <pre><code>git mergetool
    git config --global merge.tool meld</code></pre>
    <h2>Jede Seite inspizieren</h2>
    <pre><code>git show :1:path        # Basis
    git show :2:path        # ours
    git show :3:path        # theirs
    git checkout --ours path
    git checkout --theirs path</code></pre>
    <p>Die Doppelpunkt-Syntax liest direkt aus den konfliktbehafteten Index-Stages.</p>
    <h2>Abbrechen</h2>
    <pre><code>git merge --abort
    git rebase --abort
    git cherry-pick --abort</code></pre>
    <h2>rerere</h2>
    <p>"Reuse recorded resolution" merkt sich Ihre Konfliktauflösungen und wendet sie beim nächsten Auftreten desselben Konflikts erneut an:</p>
    <pre><code>git config --global rerere.enabled true</code></pre>
    <p>Unverzichtbar für langlebige Rebase-Ketten.</p>
    <h2>Umbenennungen und Binärkonflikte</h2>
    <p>Nicht alle Konflikte erzeugen Textmarker. Rename/Rename-, Rename/Delete- und Modify/Delete-Konflikte hinterlassen den Index in einem Zustand mit mehreren Stages, aber ohne &lt;&lt;&lt;-Marker in der Datei. Binärdateien können nicht textuell gemergt werden; beide Versionen werden auf die Festplatte geschrieben und der Index zeichnet den Konflikt auf:</p>
    <pre><code>git status
    # both modified:   image.png
    # deleted by us:   old.txt
    # added by them:   new.txt
    git checkout --ours image.png      # unsere Version behalten
    git checkout --theirs new.txt
    git add image.png new.txt</code></pre>
    <p>Lesen Sie zur Konfliktzeit immer <code>git status</code>; es kennzeichnet diese weniger üblichen Konflikttypen explizit.</p>
    <h2>Häufige Fehler</h2>
    <p>Auflösen, indem Sie die Marker löschen, ohne den Inhalt zu lesen, und versehentlich eine Seite weglassen. Lesen Sie immer beide Hälften und die Basis. Vergessen, nach dem Bearbeiten <code>git add</code> auszuführen; <code>git commit</code> verweigert mit "unmerged paths". <code>--ours</code> und <code>--theirs</code> als identisch zu <code>-X ours</code> und <code>-X theirs</code> behandeln; ersteres ersetzt eine ganze konfliktbehaftete Datei, letzteres ist ein Hinweis an die Merge-Strategie. Schließlich: Eine teilweise aufgelöste Datei von woanders kopieren und Git umgehen; der Index hat noch Stage-1/2/3-Einträge, bis Sie <code>git add</code> ausführen.</p>

- source_title: "The merge base algorithm"
  title: "Der Merge-Base-Algorithmus"
  langcode: de
  body: |
    <h2>Einführung</h2>
    <p>Die <em>Merge-Basis</em> zweier Commits ist ihr bester gemeinsamer Vorfahre: das Fundament, das Git für Three-Way-Merges verwendet. Die richtige Basis zu wählen ist es, was "automatische" Merges überhaupt funktionieren lässt.</p>
    <h2>Sie finden</h2>
    <pre><code>git merge-base A B
    git merge-base --all A B           # alle besten gemeinsamen Vorfahren
    git merge-base --octopus A B C
    git merge-base --is-ancestor X Y   # Exit 0 falls X Vorfahre von Y
    git merge-base --fork-point main feature</code></pre>
    <h2>Definition</h2>
    <p>Ein gemeinsamer Vorfahre C von A und B ist ein "bester" gemeinsamer Vorfahre, wenn kein anderer gemeinsamer Vorfahre von A und B ein Nachkomme von C ist. Die meisten Paare haben einen einzelnen besten gemeinsamen Vorfahren. Wenn der Graph Crisscross-Merges enthält, können mehrere existieren; das ist es, was <code>--all</code> meldet.</p>
    <h2>Wie Three-Way-Merge ihn nutzt</h2>
    <p>Gegeben Commits A und B mit Merge-Basis M, tut Git für jede Datei:</p>
    <ol>
      <li>Liest die Datei bei M, A und B.</li>
      <li>Wenn nur eine Seite geändert hat, nimm diese Seite.</li>
      <li>Wenn beide Seiten identisch geändert haben, nimm eine.</li>
      <li>Wenn beide Seiten unterschiedlich geändert haben, führe einen Three-Way-Text-Merge aus oder gib Konfliktmarker aus.</li>
    </ol>
    <h2>Recursive- und ort-Strategien</h2>
    <p>Wenn mehrere Merge-Basen existieren, <em>mergt</em> die Recursive-Strategie sie zuerst und erzeugt eine virtuelle Basis, die sie für den finalen Three-Way-Merge verwendet. Die <code>ort</code>-Strategie (Standard seit 2.33) tut dasselbe mit einer schnelleren, speichereffizienteren Implementierung.</p>
    <pre><code>git merge -s ort feature
    git merge -s recursive feature
    git merge -s resolve feature       # nur eine Merge-Basis, keine Rekursion</code></pre>
    <h2>Fork-Point</h2>
    <p>Für Rebase muss Git oft wissen, wo ein Topic-Branch einen Basis-Branch verlassen hat. <code>--fork-point</code> konsultiert das Reflog der Basis, um den jüngsten Punkt zu finden, an dem Topic und Basis Historie geteilt haben:</p>
    <pre><code>git rebase --fork-point main feature
    git merge-base --fork-point main feature</code></pre>
    <h2>Durchgearbeitetes Beispiel</h2>
    <pre><code>A---B---C   main
         \
          D---E   feature

    git merge-base main feature   # B</code></pre>
    <p>Ein Merge von <code>main</code> in <code>feature</code> Three-Way-mergt mit B als Basis.</p>
    <h2>Inspizieren, warum ein Merge in Konflikt gerät</h2>
    <pre><code>git merge-base HEAD feature
    git diff &lt;base&gt; HEAD -- file
    git diff &lt;base&gt; feature -- file</code></pre>
    <p>Dieses Diff-Paar ist genau das, was Gits Merge sieht.</p>
    <h2>Häufige Fehler</h2>
    <p>Annehmen, es gebe immer genau eine Merge-Basis; Crisscross-Historien erzeugen mehrere. <code>--fork-point</code> als Ersatz für <code>--onto</code> behandeln; sie lösen verschiedene Probleme. <code>--strategy=ours</code> wählen, wenn Sie <code>--strategy-option=ours</code> meinten; ersteres verwirft ihre Änderungen vollständig. Schließlich: Die Merge-Basis von Hand aus <code>git log</code>-Ausgaben neu berechnen und falsch liegen; verwenden Sie <code>git merge-base</code>, statt nach Augenmaß zu schätzen.</p>

- source_title: "Reachability and ancestry in Git"
  title: "Erreichbarkeit und Vorfahrenschaft in Git"
  langcode: de
  body: |
    <h2>Einführung</h2>
    <p>"Erreichbarkeit" ist die wichtigste Eigenschaft eines Git-Objekts. Ein Objekt ist <em>erreichbar</em>, wenn eine Ref über Eltern- oder Tree-Verknüpfungen zu ihm führt. Unerreichbare Objekte kommen für Garbage Collection in Frage.</p>
    <h2>Erreichbarkeitsregeln</h2>
    <p>Ausgehend von irgendeiner Ref:</p>
    <ul>
      <li>Ein Commit erreicht seinen Wurzel-Tree, alle Eltern und (transitiv) deren Trees und Eltern.</li>
      <li>Ein Tree erreicht alle Einträge (Blobs und Subtrees).</li>
      <li>Ein Annotated Tag erreicht das getaggte Objekt.</li>
    </ul>
    <p>Zu Refs gehören lokale Branches, Remote-Tracking-Branches, Tags, Stash, Notes und das Reflog (bis zum Ablauf).</p>
    <h2>Erreichbare Objekte auflisten</h2>
    <pre><code>git rev-list --objects --all | head
    git rev-list --objects HEAD
    git rev-list --count HEAD</code></pre>
    <h2>Vorfahrentests</h2>
    <pre><code>git merge-base --is-ancestor X Y &amp;&amp; echo "X is ancestor of Y"
    git rev-list X..Y --count                # wie viele Commits dazwischen liegen
    git log --ancestry-path A..B --oneline   # nur Commits auf dem Pfad A nach B</code></pre>
    <p><code>--ancestry-path</code> ist unschätzbar, um die Kette von Commits zu finden, die einen Fix von einem Tag zum anderen brachte.</p>
    <h2>Bereichsoperatoren</h2>
    <ul>
      <li><code>A..B</code>: erreichbar von B, nicht von A.</li>
      <li><code>A...B</code>: symmetrische Differenz (eine Seite, nicht beide).</li>
      <li><code>^A B C</code>: erreichbar von B oder C, aber nicht von A.</li>
    </ul>
    <pre><code>git log main..feature                 # durch feature hinzugefügte Commits
    git log main...feature --left-right   # beide Seiten markiert</code></pre>
    <h2>Unerreichbare Objekte</h2>
    <pre><code>git fsck --unreachable
    git fsck --dangling
    git fsck --lost-found      # schreibt sie nach .git/lost-found</code></pre>
    <p>Unerreichbare Objekte überleben, bis <code>git gc --prune</code> sie entfernt; die Standard-Gnadenfrist beträgt zwei Wochen (<code>gc.pruneExpire</code>).</p>
    <h2>Die Rolle der commit-graph-Datei</h2>
    <p>Erreichbarkeits- und Vorfahrenabfragen sind der Engpass vieler Git-Operationen. Die <code>commit-graph</code>-Datei berechnet Generationsnummern und Elternlisten vor und macht diese Abfragen O(log n) statt O(n):</p>
    <pre><code>git commit-graph write --reachable
    git config --global core.commitGraph true</code></pre>
    <h2>Bitmap-Erreichbarkeit</h2>
    <p>Auf der Server-Seite erlauben <em>Erreichbarkeits-Bitmaps</em> Git, in Mikrosekunden zu beantworten, "welche Objekte sind von diesem Commit aus erreichbar?", indem ein vorberechnetes Bit pro Objekt gespeichert wird. Sie werden geschrieben durch:</p>
    <pre><code>git repack -adb</code></pre>
    <h2>Durch Datum oder Pfad eingeschränkte Läufe</h2>
    <p>Die Erreichbarkeitsmaschinerie akzeptiert viele Beschränker, die mit der Bereichssyntax kombiniert werden:</p>
    <pre><code>git rev-list --since=2024-01-01 main
    git rev-list main -- path/to/file
    git rev-list --no-merges main..feature
    git rev-list --first-parent main
    git rev-list HEAD --count</code></pre>
    <p>Kombinieren Sie diese, um spezifische Fragen wie "Wie viele Nicht-Merge-Commits hat Ada im letzten Quartal auf main gelandet?" zu beantworten, ohne auf Shell-Pipelines zurückzugreifen. Die stabile Ausgabe von Plumbing macht das Ergebnis trivial in Reporting-Tools einspeisbar.</p>
    <h2>Häufige Fehler</h2>
    <p>Glauben, dass das Löschen eines Branches dessen Commits auslöscht; sie bleiben über das Reflog 90 Tage erreichbar und unerreichbar, aber nicht prunede für zwei weitere Wochen. <code>A..B</code> mit <code>A...B</code> verwechseln; eines ist asymmetrisch, das andere symmetrisch. <code>HEAD~3</code> verwenden, um über Merges hinweg zu navigieren, und durch First-Parent-Traversierung verwirrt sein; verwenden Sie <code>HEAD^2</code>, um zum zweiten Elternteil zu wechseln. Schließlich: Erwarten, dass <code>git fsck</code> verlorene Commits nach einem frischen Klon findet; das Reflog und Dangling-Objekte existieren nur lokal dort, wo die Arbeit verrichtet wurde.</p>

- source_title: "Symbolic refs"
  title: "Symbolische Refs"
  langcode: de
  body: |
    <h2>Einführung</h2>
    <p>Eine <em>symbolische Ref</em> ist eine Referenz, deren Wert ein anderer Ref-Name statt eines Objekt-Hashes ist. Das kanonische Beispiel ist <code>HEAD</code>, das üblicherweise <code>ref: refs/heads/main</code> enthält. Symbolische Refs erlauben Git, "den aktuellen Branch" als Daten statt als Zustand zu verfolgen.</p>
    <h2>Lesen und Schreiben</h2>
    <pre><code>git symbolic-ref HEAD
    # refs/heads/main

    git symbolic-ref refs/remotes/origin/HEAD
    # refs/remotes/origin/main

    git symbolic-ref HEAD refs/heads/feature/login   # ohne Checkout ändern
    git symbolic-ref --short HEAD                      # Kurzform: main
    git symbolic-ref --delete refs/remotes/origin/HEAD</code></pre>
    <h2>HEAD als symbolische Ref</h2>
    <p>Wenn Sie committen, löst Git <code>HEAD</code> auf, um den aktuellen Branch zu finden, und aktualisiert die Spitze <em>jenes</em> Branches. Wenn <code>HEAD</code> detached ist, hört es auf, symbolisch zu sein, und enthält einen rohen SHA.</p>
    <pre><code>cat .git/HEAD
    # ref: refs/heads/main         (symbolisch)
    # vs. nach Detach:
    # a1b2c3d4...                  (roh)</code></pre>
    <h2>Remote HEAD</h2>
    <p>Jeder Remote kann ein symbolisches <code>HEAD</code> haben, das seinen Standard-Branch angibt. Setzen oder erneuern:</p>
    <pre><code>git remote set-head origin --auto       # Server abfragen
    git remote set-head origin main         # explizit setzen
    git remote set-head origin --delete</code></pre>
    <p>Das ist es, was <code>git log origin</code> zu <code>origin/main</code> auflöst.</p>
    <h2>Wofür sie nützlich sind</h2>
    <ul>
      <li>"Aktueller Branch" kann sich ändern, ohne die Historie umzuschreiben.</li>
      <li>Tools können fragen "was ist der Standard?", ohne Namen hardzucodieren.</li>
      <li>Hooks können generisch auf den <em>aktuell ausgecheckten</em> Branch zielen.</li>
    </ul>
    <h2>Worktrees und Per-Worktree-HEAD</h2>
    <p>Jeder verlinkte Worktree (<code>git worktree add</code>) hat sein eigenes <code>HEAD</code>, gespeichert unter <code>.git/worktrees/&lt;name&gt;/HEAD</code>. Jedes kann auf einen anderen Branch zeigen:</p>
    <pre><code>git worktree add ../wt-feature feature/login
    cat ../wt-feature/.git
    # gitdir: /path/to/main/.git/worktrees/wt-feature
    cat .git/worktrees/wt-feature/HEAD
    # ref: refs/heads/feature/login</code></pre>
    <h2>Erkennung</h2>
    <pre><code>git symbolic-ref -q HEAD &amp;&amp; echo "on a branch" || echo "detached"</code></pre>
    <h2>Den Standard umbenennen</h2>
    <p>Um <code>master</code> sicher in <code>main</code> umzubenennen:</p>
    <pre><code>git branch -m master main
    git symbolic-ref HEAD refs/heads/main
    git push -u origin main
    git symbolic-ref refs/remotes/origin/HEAD refs/remotes/origin/main</code></pre>
    <h2>Symbolische Auflösung inspizieren</h2>
    <p><code>git rev-parse</code> löst einen Namen über symbolische Refs ganz bis zu einem SHA auf, während <code>git symbolic-ref</code> nur einer Ebene folgt. Das Paar ist nützlich für Skripte:</p>
    <pre><code>git symbolic-ref HEAD                       # refs/heads/main
    git symbolic-ref --short HEAD               # main
    git rev-parse HEAD                          # SHA
    git rev-parse --symbolic-full-name HEAD     # refs/heads/main
    git rev-parse --symbolic-full-name @{u}     # refs/remotes/origin/main</code></pre>
    <p>Verwenden Sie <code>--symbolic-full-name</code>, wenn Sie den kanonischen Ref-Namen wollen, egal welche Kurzform der Nutzer eintippte.</p>
    <h2>Häufige Fehler</h2>
    <p><code>.git/HEAD</code> manuell editieren und das abschließende Newline vergessen, sodass Git es nicht mehr parsen kann. Verwenden Sie <code>git symbolic-ref</code>. <code>refs/remotes/origin/HEAD</code> als maßgeblich behandeln, obwohl es tatsächlich gecached ist; aktualisieren mit <code>git remote set-head origin --auto</code>. Eine symbolische Ref, die auf einen fehlenden Branch zeigt, mit einem echten Fehler verwechseln; <code>git symbolic-ref -q</code> beendet sich mit Nicht-Null, was Skripte handhaben können. Schließlich: Die zugrunde liegende Ref löschen, ohne die symbolische zu aktualisieren, und einen Dangling-Symref hinterlassen; Tools können das melden, aber es ist harmlos und leicht mit einem weiteren <code>symbolic-ref</code> zu beheben.</p>

- source_title: "Loose objects vs packed objects"
  title: "Lose Objekte vs. gepackte Objekte"
  langcode: de
  body: |
    <h2>Einführung</h2>
    <p>Git speichert Objekte in zwei physischen Formaten. <em>Lose</em> Objekte sind einzelne Dateien; <em>gepackte</em> Objekte leben in einer Pack-Datei mit einem Delta-komprimierten Body. Beide Formen beschreiben dieselben logischen Objekte, adressiert durch dieselben Hashes.</p>
    <h2>Loses Layout</h2>
    <p>Jedes lose Objekt liegt unter <code>.git/objects/xx/yyy...</code>, wobei <code>xx</code> die ersten zwei Hex-Zeichen des SHA sind und <code>yyy...</code> die verbleibenden 38. Die Datei besteht aus den zlib-deflatierten Bytes von <code>&lt;type&gt; &lt;size&gt;\0&lt;content&gt;</code>:</p>
    <pre><code>find .git/objects -type f -name '??' -prune -o -type f -print | head
    git cat-file -p &lt;sha&gt;</code></pre>
    <h2>Pack-Layout</h2>
    <pre><code>.git/objects/pack/pack-&lt;hash&gt;.pack
    .git/objects/pack/pack-&lt;hash&gt;.idx</code></pre>
    <p>Die <code>.idx</code>-Datei bildet SHA auf Byte-Offset im <code>.pack</code> ab; ohne sie würde das Pack einen linearen Scan erfordern.</p>
    <h2>Wie Objekte zwischen Formen wechseln</h2>
    <p>Neue Objekte werden lose geschrieben. Sie werden gepackt, wenn:</p>
    <ul>
      <li><code>git gc</code> läuft (manuell oder automatisch).</li>
      <li><code>git repack</code> aufgerufen wird.</li>
      <li>Ein Fetch oder Push sie als Pack überträgt.</li>
      <li><code>git fast-import</code> sie direkt in ein Pack schreibt.</li>
    </ul>
    <pre><code>git gc
    git repack -a -d
    git count-objects -v</code></pre>
    <p><code>count-objects -v</code> meldet die Anzahl loser, die gesamte Festplattennutzung und Pack-Statistiken.</p>
    <h2>Abwägungen</h2>
    <ul>
      <li><strong>Lose</strong>: einfach, leicht zu inspizieren, schnell beim Schreiben eines einzelnen Objekts. Langsam bei Millionen.</li>
      <li><strong>Gepackt</strong>: kompakt, Delta-komprimiert, schnell zum Massen-Lesen. Erfordert Repacking zur Aufnahme neuer Objekte.</li>
    </ul>
    <h2>Auto-gc</h2>
    <p>Git löst ein Auto-gc aus, wenn zu viele lose Objekte angesammelt sind. Einstellbare Werte:</p>
    <pre><code>git config gc.auto 6700           # Schwellenwert für lose Objekte
    git config gc.autoPackLimit 50    # Schwellenwert für Anzahl der Packs
    git config gc.auto 0              # Auto-gc deaktivieren (nicht empfohlen)</code></pre>
    <h2>Ein Pack inspizieren</h2>
    <pre><code>git verify-pack -v .git/objects/pack/pack-&lt;hash&gt;.idx | head
    git verify-pack -s .git/objects/pack/pack-&lt;hash&gt;.idx</code></pre>
    <p>Sie sehen Objekttypen, gepackte Größen, Deltas und Kettentiefen.</p>
    <h2>Wiederherstellung nach Korruption</h2>
    <pre><code>git fsck --full
    cp -r broken-repo backup
    git unpack-objects &lt; .git/objects/pack/pack-&lt;hash&gt;.pack</code></pre>
    <p><code>unpack-objects</code> löst ein Pack zurück in lose Form, nützlich, wenn ein einzelnes schlechtes Objekt in einem Pack viele Operationen lahmlegt.</p>
    <h2>Ein Objekt nachschlagen</h2>
    <p>Wenn Git einen SHA auflöst, sucht es in dieser Reihenfolge: lose Objektdatei, dann jede Pack-idx, dann Alternates (<code>objects/info/alternates</code>). Die Suche ist dank der Fanout-Tabelle der idx im Wesentlichen pro Pack konstant in der Zeit. Der Performance-Einfluss vieler kleiner Packs gegenüber einem großen Pack ist real, weshalb <code>gc</code> konsolidiert:</p>
    <pre><code>git count-objects -v
    cat .git/objects/info/alternates 2&gt;/dev/null
    git verify-pack -s .git/objects/pack/pack-&lt;hash&gt;.idx</code></pre>
    <p>Alternates erlauben es mehreren Repositories, einen Pool von Objekten auf der Festplatte zu teilen; <code>git clone --shared</code> erstellt ein solches Setup und spart Platz auf Kosten gewisser Sicherheit.</p>
    <h2>Häufige Fehler</h2>
    <p>Manuelles Löschen von <code>pack-</code>-Dateien zur Speicherrückgewinnung; das zerstört erreichbare Historie. Verwenden Sie <code>git gc</code>. Auto-gc auf langlebigen Repositories deaktivieren und mit Millionen loser Objekte enden, was jede Operation verlangsamt. <code>git gc --aggressive</code> regelmäßig laufen lassen, wenn ein normales <code>gc</code> ausreichen würde; aggressives Packen ist teuer. Schließlich: Ein Repository mit <code>cp -r</code> kopieren, während ein Pack geschrieben wird, und mit einem korrupten Index enden. Verwenden Sie <code>git clone --local</code> für sichere Kopien.</p>

- source_title: "Delta compression in pack files"
  title: "Delta-Kompression in Pack-Dateien"
  langcode: de
  body: |
    <h2>Einführung</h2>
    <p>Gits inhaltsadressiertes Modell dedupliziert identische Objekte, aber ähnliche-aber-nicht-identische Blobs (eine Datei und ihre spätere Bearbeitung) würden weiterhin volle Größe kosten. Pack-Dateien lösen das mit <em>Delta-Kompression</em>: Speichern eines Objekts als Basis plus eine Sequenz von "copy/insert"-Anweisungen, die ein anderes Objekt erzeugen.</p>
    <h2>Wie es funktioniert</h2>
    <p>Beim Packen vergleicht Git Kandidatenobjekte (üblicherweise Blobs ähnlicher Größe und Typs) und wählt eine Basis für jedes. Das Delta zeichnet auf:</p>
    <ul>
      <li>Das Basisobjekt (per Offset im Pack oder per SHA).</li>
      <li>Größen von Basis und Ziel.</li>
      <li>Einen Strom von <em>copy</em>- (Bytes aus der Basis verwenden) und <em>insert</em>-Anweisungen (literale Bytes).</li>
    </ul>
    <p>Der Delta-Strom wird dann zlib-komprimiert.</p>
    <h2>Deltas inspizieren</h2>
    <pre><code>git verify-pack -v .git/objects/pack/pack-&lt;hash&gt;.idx | head -20</code></pre>
    <p>Die Ausgabe enthält Spalten für gepackte Größe, Tiefe und Basis-SHA für Delta-Einträge. Ein Nicht-Delta-Objekt hat keine Basis.</p>
    <h2>Einstellbare Werte</h2>
    <pre><code>git config pack.window 250          # pro Objekt geprüfte Kandidaten
    git config pack.depth 50            # maximale Kettenlänge
    git config pack.threads 4
    git config pack.windowMemory 100m
    git config pack.deltaCacheSize 256m</code></pre>
    <p><code>pack.window</code> steuert, wie aggressiv Git nach guten Basen sucht; <code>pack.depth</code> begrenzt, wie lang Delta-Ketten wachsen können.</p>
    <h2>Aggressives vs. normales Repack</h2>
    <pre><code>git repack -a -d                    # Standard
    git repack -a -d --depth=250 --window=250   # aggressiv
    git gc --aggressive</code></pre>
    <p>Aggressive Repacks werfen vorhandene Deltas weg und berechnen sie von Grund auf neu, kosten CPU, verbessern aber möglicherweise das Ergebnis.</p>
    <h2>Erreichbarkeit und Bitmaps</h2>
    <p>Server kombinieren Delta-Packing oft mit <em>Erreichbarkeits-Bitmaps</em> für schnelle Clone-Set-Berechnung:</p>
    <pre><code>git repack -adb</code></pre>
    <h2>Warum manche Objekte nicht deltifiziert werden</h2>
    <ul>
      <li>Kryptografisch zufällige Daten (bereits inkomprimierbar).</li>
      <li>Objekte, deren einzige Kandidaten kleiner sind als der konfigurierte Schwellenwert.</li>
      <li>Objekte außerhalb der Reichweite des Pack-Fensters.</li>
    </ul>
    <h2>Pack-übergreifende Deltas</h2>
    <p>Multi-Pack-Indexe (<code>git multi-pack-index</code>) plus der Repack-Modus <code>--geometric</code> (Git 2.33+) machen es möglich, Deltas effizient über viele Packs hinweg zu pflegen:</p>
    <pre><code>git repack --geometric=2 -d</code></pre>
    <p>Dies ist das empfohlene Schema für große Repositories.</p>
    <h2>Delta-Inseln</h2>
    <p>Für Server-Betreiber, die viele Forks desselben Projekts hosten, partitionieren <em>Delta-Inseln</em> Objekte so, dass Deltas nur innerhalb der Ref-Menge eines Forks geschehen, was schnelles Klonen jedes einzelnen Forks ermöglicht:</p>
    <pre><code>git config pack.island "refs/remotes/(.*)/heads"
    git config pack.islandCore "main"
    git repack -adb</code></pre>
    <p>Ohne Inseln könnte ein Objekt, das nur aus Fork A erreichbar ist, gegen ein Objekt deltifiziert werden, das nur aus Fork B erreichbar ist; Forks A's Klon zu bedienen würde dann erfordern, auch Objekte aus B zu senden. Die meisten Nutzer brauchen das nie, aber es ist die Geheimzutat hinter der Pack-Server-Performance von GitHub, GitLab und Bitbucket.</p>
    <h2>Häufige Fehler</h2>
    <p>Annehmen, Deltas seien vorwärts (neuer = Basis) oder rückwärts (älter = Basis); Git ist agnostisch und wählt das, was ein kleineres Delta ergibt. Packs zwischen Repositories mit verschiedenen SHA-Präfixen kopieren; die Daten sind inhaltsadressiert, also funktioniert das, aber das Umbenennen von Dateien basierend auf Teil-Hashes kann brechen. Absurd hohe <code>pack.depth</code>-Werte verfolgen, um kleine Packs zu erreichen; tiefere Ketten bedeuten langsameren Objektzugriff (jedes Delta in der Kette muss angewendet werden). Schließlich: Erwarten, dass Delta-Kompression Speicher bei bereits komprimierten Binärdateien (Videos, JPGs) spart; tut sie fast nie. Verwenden Sie dafür Git LFS.</p>

- source_title: "The .git directory structure"
  title: "Die Struktur des .git-Verzeichnisses"
  langcode: de
  body: |
    <h2>Einführung</h2>
    <p>Alles, was Git über ein Repository weiß, lebt in <code>.git/</code>. Zu wissen, was jeder Eintrag ist, beseitigt das Geheimnis aus "Was ist gerade passiert?"-Diagnosen.</p>
    <h2>Top-Level-Layout</h2>
    <pre><code>.git/
      HEAD                # symbolische Ref auf den aktuellen Branch
      config              # repository-lokale Konfiguration
      description         # von gitweb verwendet
      index               # die Staging Area
      packed-refs         # gepackte Branch- und Tag-Refs (optional)
      hooks/              # Client-seitige Hook-Skripte
      info/               # Excludes-Datei und andere repo-lokale Info
      logs/               # Reflogs
      objects/            # alle Objekte (lose + pack/)
      refs/               # Branches, Tags, Remote-Tracking
      worktrees/          # verlinkte Worktrees (falls vorhanden)
      modules/            # .git-Verzeichnisse von Submodules</code></pre>
    <h2>HEAD und Refs</h2>
    <pre><code>cat .git/HEAD
    ls .git/refs/heads
    ls .git/refs/remotes/origin
    ls .git/refs/tags
    cat .git/packed-refs | head</code></pre>
    <h2>objects/</h2>
    <p>Lose Objekte unter <code>objects/xx/</code>, gepackte Objekte in <code>objects/pack/</code>. Nicht von Hand anfassen.</p>
    <h2>logs/</h2>
    <p>Das Reflog. <code>logs/HEAD</code> zeichnet jede Bewegung von HEAD auf; <code>logs/refs/heads/&lt;branch&gt;</code> zeichnet die Historie jedes Branches auf.</p>
    <pre><code>cat .git/logs/HEAD | head</code></pre>
    <h2>hooks/</h2>
    <p>Beispiel-Hook-Skripte, alle standardmäßig <code>*.sample</code> benannt. Zum Aktivieren entfernen Sie das Suffix und machen es ausführbar:</p>
    <pre><code>cd .git/hooks
    cp pre-commit.sample pre-commit
    chmod +x pre-commit</code></pre>
    <h2>info/</h2>
    <p><code>info/exclude</code> ist eine pro-Repo-, pro-Klon-Ignore-Datei (nicht committet). <code>info/refs</code> wird von <code>git update-server-info</code> für dumme HTTP-Server generiert.</p>
    <h2>config</h2>
    <p>Lokale Konfiguration im INI-Format. Bearbeiten via <code>git config --local</code> oder <code>git config -e</code>:</p>
    <pre><code>cat .git/config
    git config --local user.email "me@example.com"</code></pre>
    <h2>worktrees/</h2>
    <p>Jeder verlinkte Worktree hat ein Verzeichnis unter <code>.git/worktrees/&lt;name&gt;/</code> mit eigenen <code>HEAD</code>, <code>index</code> und <code>logs</code>.</p>
    <h2>modules/</h2>
    <p>Bei Repositories mit Submodules lebt das <code>.git</code>-Verzeichnis jedes Submodules hier, und der Working Tree des Submodules enthält eine kleine <code>.git</code>-Datei, die darauf zeigt.</p>
    <h2>Bare-Repositories</h2>
    <p>Ein Bare-Repository hat denselben Inhalt, aber auf der obersten Ebene (kein <code>.git/</code>-Wrapper) und ohne Working Tree. Konvention: das Verzeichnis <code>project.git</code> nennen.</p>
    <h2>git rev-parse für Pfade</h2>
    <p>Skripte, die Pfade innerhalb von <code>.git/</code> finden müssen, sollten niemals annehmen, dass das Verzeichnis buchstäblich <code>.git</code> heißt. Submodules verwenden eine <code>.git</code>-Datei, die woanders hin zeigt; Worktrees haben verlinkte Gitdirs; Bare-Repositories haben kein separates Gitdir. Verwenden Sie <code>git rev-parse</code>:</p>
    <pre><code>git rev-parse --git-dir              # tatsächliches Gitdir für aktuelles Repository
    git rev-parse --git-common-dir       # geteiltes Verzeichnis für Worktrees
    git rev-parse --show-toplevel        # Wurzel des Working Trees
    git rev-parse --is-inside-git-dir
    git rev-parse --is-inside-work-tree</code></pre>
    <p>Diese fünf Fragen decken nahezu jede "Wo bin ich?"-Prüfung ab, die ein Skript braucht.</p>
    <h2>Häufige Fehler</h2>
    <p>Dateien innerhalb von <code>.git/</code> direkt editieren. Fast für alles gibt es einen Git-Befehl, der es korrekt, atomar und mit Hooks erledigt. Nur den Working Tree sichern und vergessen, dass <code>.git/</code> die gesamte Historie enthält; sichern Sie das ganze Verzeichnis. <code>.git/hooks/</code> teilen in der Annahme, sie würden sich verbreiten; Hooks sind <em>nicht</em> versioniert. Verwenden Sie <code>core.hooksPath</code> oder ein Tool wie <code>pre-commit</code>, um sie zu teilen. Schließlich: <code>.git/index</code> impulsiv löschen; bauen Sie ihn mit <code>git read-tree HEAD</code> neu, aber nur nach einem Backup.</p>

- source_title: "Git protocols: local, SSH, HTTP/S, git://"
  title: "Git-Protokolle: local, SSH, HTTP/S, git://"
  langcode: de
  body: |
    <h2>Einführung</h2>
    <p>Git kann Daten über vier Protokollfamilien transportieren. Jede hat unterschiedliche Abwägungen in Bezug auf Performance, Authentifizierung und Firewall-Freundlichkeit.</p>
    <h2>Local / file</h2>
    <p>Klonen aus einem Verzeichnis verwendet lokale Datei-I/O. Zwei URL-Formen:</p>
    <pre><code>git clone /srv/git/widget.git
    git clone file:///srv/git/widget.git</code></pre>
    <p>Die erste Form kann Hardlinks für Objekte verwenden, wenn auf demselben Dateisystem (sehr schnell, sehr platzsparend). Die <code>file://</code>-Form kopiert immer über das Smart-Protokoll.</p>
    <h2>SSH</h2>
    <p>Der Standard für authentifizierte Workflows. Verwendet Ihren SSH-Client und Schlüssel:</p>
    <pre><code>git clone git@github.com:example/widget.git
    git clone ssh://git@github.com/example/widget.git</code></pre>
    <p>Hinter den Kulissen ruft der Client <code>ssh</code> auf und führt <code>git-upload-pack</code> oder <code>git-receive-pack</code> auf der Server-Seite aus. Konfigurieren Sie Schlüssel via <code>~/.ssh/config</code> und <code>ssh-agent</code>.</p>
    <h2>HTTP / HTTPS</h2>
    <p>Am firewall-freundlichsten und der Standard für viele Hosts:</p>
    <pre><code>git clone https://github.com/example/widget.git</code></pre>
    <p>Das Smart-HTTP-Protokoll verwendet <code>POST /info/refs?service=git-upload-pack</code> und ähnliche Endpunkte. Authentifizierung erfolgt über Basic Auth (bei vielen Anbietern deprecated) oder Token im Passwortfeld. Ein Credential-Helper vermeidet Eingabeaufforderungen bei jeder Operation:</p>
    <pre><code>git config --global credential.helper cache
    git config --global credential.helper osxkeychain   # macOS
    git config --global credential.helper manager       # Windows</code></pre>
    <h2>git:// (anonym)</h2>
    <pre><code>git clone git://example.com/widget.git</code></pre>
    <p>Port 9418, unauthentifiziert, im Klartext. Größtenteils historisch; nicht empfohlen für neue Deployments, weil es keine Integritätsgarantien über Gits eigene Hashes hinaus bietet.</p>
    <h2>Protokollversionen</h2>
    <p>Das Wire-Protokoll hat v0, v1 und v2. Protokoll v2 (Git 2.18+, Standard 2.26+) ist für Repositories mit vielen Refs dramatisch schneller, weil der Server nur Refs ankündigt, die der Client angefragt hat.</p>
    <pre><code>git -c protocol.version=2 ls-remote origin
    git config --global protocol.version 2</code></pre>
    <h2>Smart vs. dumm</h2>
    <p>"Smart"-Protokolle verhandeln; "dummes" HTTP stellt einfach das <code>.git/</code>-Verzeichnis bereit. Dummes HTTP erfordert <code>git update-server-info</code> bei jedem Push und ist langsamer; nahezu niemand verwendet es heute.</p>
    <h2>Ein Protokoll wählen</h2>
    <ul>
      <li>HTTPS: am einfachsten einzurichten, funktioniert überall, gut für Read-Only und CI.</li>
      <li>SSH: am besten für tägliches Push/Pull, wenn Sie Ihren Schlüssel kontrollieren.</li>
      <li>file://: bequem für lokale Mirrors und Tests.</li>
      <li>git://: außer für extrem permissive öffentliche Mirrors meiden.</li>
    </ul>
    <h2>Capability-Verhandlung</h2>
    <p>Beim Verbindungsaufbau tauschen Client und Server Capabilities aus (multi-ack, side-band, ofs-delta, filter, partial clone, push-options, atomic usw.). Unterstützte Capabilities bestimmen, welche Funktionen die Operation nutzen kann. Inspizieren Sie mit Paket-Tracing:</p>
    <pre><code>GIT_TRACE_PACKET=1 git -c protocol.version=2 ls-remote origin 2&gt;&amp;1 | head -40</code></pre>
    <p>Ältere Server unterstützen möglicherweise neuere Capabilities nicht; der Client weicht elegant aus. Wenn Sie überraschend langsame Klone oder Fetches sehen, ist ein alter Server, dem <code>multi-ack-detailed</code> oder <code>filter</code> fehlt, oft die Ursache.</p>
    <h2>Häufige Fehler</h2>
    <p>HTTPS- und SSH-URLs im selben Repository mischen; wenn ein CI HTTPS verwendet, Ihre Dev-Umgebung aber SSH, können Skripte einander verwirren. Bleiben Sie entweder bei einem oder verwenden Sie <code>insteadOf</code>-Umschreibung:</p>
    <pre><code>git config --global url."git@github.com:".insteadOf "https://github.com/"</code></pre>
    <p>Personal Access Tokens im Klartext-Konfig speichern; verwenden Sie stattdessen einen Credential-Helper. Vergessen, <code>protocol.version=2</code> auf alten Git-Installationen zu aktivieren. Schließlich: <code>git://</code> auf dem offenen Internet für Schreibzugriff bereitstellen; das Protokoll kann nicht authentifizieren. Verwenden Sie SSH oder HTTPS.</p>

- source_title: "Authentication and credentials"
  title: "Authentifizierung und Credentials"
  langcode: de
  body: |
    <h2>Einführung</h2>
    <p>Sich an einem Git-Remote zu authentifizieren ist meist unsichtbar, bis es schiefgeht. Die zwei Hauptmechanismen sind <strong>SSH-Schlüssel</strong> und <strong>HTTPS-Credentials</strong> (Passwörter oder, heute üblicher, Personal Access Tokens).</p>
    <h2>SSH-Schlüssel</h2>
    <p>Einen modernen Schlüssel generieren:</p>
    <pre><code>ssh-keygen -t ed25519 -C "ada@example.com"
    ssh-add --apple-use-keychain ~/.ssh/id_ed25519     # macOS
    ssh-add ~/.ssh/id_ed25519                           # Linux</code></pre>
    <p>Fügen Sie den öffentlichen Schlüssel (<code>~/.ssh/id_ed25519.pub</code>) zu Ihrem Hosting-Konto hinzu. Testen:</p>
    <pre><code>ssh -T git@github.com
    # Hi ada! You've successfully authenticated...</code></pre>
    <h2>SSH-Konfig</h2>
    <p>Pro-Host-Überschreibungen gehen in <code>~/.ssh/config</code>:</p>
    <pre><code>Host github.com
        User git
        IdentityFile ~/.ssh/id_ed25519
        IdentitiesOnly yes</code></pre>
    <h2>HTTPS-Credentials</h2>
    <p>Die meisten Hosts akzeptieren keine Konto-Passwörter mehr; verwenden Sie ein Personal Access Token (PAT) mit den richtigen Scopes. Git speichert es über einen <em>Credential-Helper</em>:</p>
    <pre><code>git config --global credential.helper cache              # In-Memory, läuft ab
    git config --global credential.helper "cache --timeout=86400"
    git config --global credential.helper osxkeychain        # macOS
    git config --global credential.helper manager            # Windows
    git config --global credential.helper store              # Klartext-Datei (nur falls nötig)</code></pre>
    <p>Beim ersten Push fragt Git nach, und der Helper speichert das Token.</p>
    <h2>Inspizieren und Löschen</h2>
    <pre><code>echo "url=https://github.com" | git credential fill
    echo "url=https://github.com" | git credential reject</code></pre>
    <p><code>git credential</code> ist eine Low-Level-Schnittstelle zum Helper.</p>
    <h2>Pro-Host-Helper</h2>
    <pre><code>git config --global credential.https://github.com.helper manager
    git config --global credential.https://gitlab.com.helper cache</code></pre>
    <p>Nützlich, wenn verschiedene Hosts verschiedene Auth-Methoden erfordern.</p>
    <h2>Commits und Tags signieren</h2>
    <p>Authentifizierung und Signierung sind unterschiedlich. Signierung beweist die Urheberschaft eines Commits:</p>
    <pre><code>git config --global gpg.format ssh
    git config --global user.signingkey ~/.ssh/id_ed25519.pub
    git commit -S -m "Signed commit"
    git log --show-signature -1</code></pre>
    <h2>2FA und SSO</h2>
    <p>Wenn Ihr Host 2FA erfordert, braucht HTTPS-Auth ein PAT (Passwörter sind blockiert). Für SSO-geschützte Organisationen muss das PAT auch SSO-autorisiert sein; sonst erhalten Pushes einen vagen "permission denied"-Fehler.</p>
    <h2>Pro-URL-Credentials</h2>
    <p>Gits Credential-System kann verschiedene Credentials pro Host oder Pfad speichern. Der Match-Schlüssel ist das URL-Präfix, sodass Sie etwa separate Tokens für Ihre persönliche und Arbeits-GitHub-Organisation haben können:</p>
    <pre><code>git config --global credential.https://github.com/work-org.helper manager
    git config --global credential.https://github.com/personal.helper "store --file ~/.git-creds-personal"
    git credential fill &lt;&lt;&lt;"url=https://github.com/work-org/repo"</code></pre>
    <p>Die Einstellung <code>credential.useHttpPath</code> sagt Git, den Pfad in den Lookup-Schlüssel einzubeziehen, was pro-Repo-Credentials erlaubt. Verwenden Sie es nur bei Bedarf; es vervielfacht die Zahl gespeicherter Einträge.</p>
    <h2>Häufige Fehler</h2>
    <p>Mit einem Token pushen, dem die richtigen Scopes fehlen (z. B. <code>read-only</code>); die Fehlermeldung ist generisch. Übermäßig breite Scopes "zur Sicherheit" gewähren; minimieren. Tokens in <code>credential.helper store</code> auf gemeinsam genutzten Maschinen speichern; es ist eine Klartext-Datei. Vergessen, Ihren öffentlichen SSH-Schlüssel zum Host hochzuladen, und durch "permission denied (publickey)" verwirrt sein; <code>ssh -vT git@host</code> zeigt, was passiert. Schließlich: Protokolle mischen: Stellen Sie sicher, dass Ihre Remote-URL zu Ihrer Auth-Methode passt; <code>git remote set-url</code> kann wechseln.</p>

- source_title: "Shallow clones and --depth"
  title: "Shallow Clones und --depth"
  langcode: de
  body: |
    <h2>Einführung</h2>
    <p>Ein <em>Shallow Clone</em> lädt nur die jüngsten N Commits eines Branches herunter statt die vollständige Historie. Das Ergebnis ist deutlich kleiner und schneller zu fetchen, auf Kosten einer unvollständigen Historie.</p>
    <h2>Erstellen</h2>
    <pre><code>git clone --depth 1 https://github.com/example/widget.git
    git clone --depth 50 https://github.com/example/widget.git
    git clone --depth 1 --branch v1.2.3 --single-branch &lt;url&gt;</code></pre>
    <p>Das <code>.git</code>-Verzeichnis enthält eine <code>shallow</code>-Datei, die Commits auflistet, deren Eltern weggelassen wurden.</p>
    <h2>Warum shallow</h2>
    <ul>
      <li>CI-Builds: brauchen nur den Source für HEAD.</li>
      <li>Container und Dockerfiles: kleinere Images.</li>
      <li>Einmal-Tooling, das keine Historie braucht.</li>
    </ul>
    <h2>Einschränkungen</h2>
    <ul>
      <li>Sie können von einem Shallow Clone nicht pushen, wenn Ihr Push von Commits abhängt, die der Server nicht hat (selten, aber möglich).</li>
      <li><code>git log</code> hält an der Shallow-Grenze an.</li>
      <li>Manche Operationen (Rebase über die Grenze, Blame auf alten Zeilen) können nicht funktionieren.</li>
      <li>Bis Git 2.11 war Shallow-Cloning über HTTP nicht unterstützt; modernes Git handhabt es.</li>
    </ul>
    <h2>Vertiefen und Unshallow</h2>
    <pre><code>git fetch --depth 100              # Tiefe erweitern
    git fetch --deepen 50              # 50 weitere Commits hinzufügen
    git fetch --shallow-since=2024-01-01
    git fetch --unshallow              # vollständige Historie herunterladen</code></pre>
    <p>Nach <code>--unshallow</code> verhält sich das Repository wie ein normaler Klon.</p>
    <h2>Single-Branch und Shallow</h2>
    <p><code>--single-branch</code> + <code>--depth 1</code> ist der kleinstmögliche nützliche Klon. Um später andere Branches zu tracken:</p>
    <pre><code>git remote set-branches --add origin main feature
    git fetch origin</code></pre>
    <h2>Partial Clones (eine andere Optimierung)</h2>
    <p>Wenn Sie die volle Historie, aber nicht alle Blobs brauchen, verwenden Sie stattdessen einen Partial Clone:</p>
    <pre><code>git clone --filter=blob:none &lt;url&gt;
    git clone --filter=tree:0 &lt;url&gt;</code></pre>
    <p>Partial Clones laden Historie, verschieben aber Blobs (oder Trees) bis zum Bedarf. Sie sind üblicherweise eine bessere Wahl als Shallow, wenn der Server sie unterstützt.</p>
    <h2>Shallow-Zustand erkennen</h2>
    <pre><code>git rev-parse --is-shallow-repository
    cat .git/shallow</code></pre>
    <h2>CI-Muster</h2>
    <p>Viele CI-Anbieter verwenden standardmäßig Shallow Clones (Tiefe 1 oder 50). Wenn Ihr Build <code>git describe</code> ausführt oder Blame über Versionen hinweg braucht, fordern Sie einen vollständigen Klon an:</p>
    <pre><code># GitHub Actions
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0</code></pre>
    <h2>Shallow-Dateien und Grafts</h2>
    <p>Die <code>shallow</code>-Datei in <code>.git/</code> listet Commit-SHAs auf, deren Eltern absichtlich fehlen. Git behandelt sie als Wurzeln bei der Graph-Traversierung. Der verwandte, aber deprecated <code>info/grafts</code>-Mechanismus erlaubte es, Eltern-Beziehungen zu fälschen; verwenden Sie stattdessen <code>git replace --graft</code>, was sicherer ist und sich über Fetch repliziert:</p>
    <pre><code>cat .git/shallow
    git replace --graft &lt;commit&gt; &lt;new-parent&gt;
    git replace -l
    git replace -d &lt;commit&gt;</code></pre>
    <p>Das ist gelegentlich nützlich, um importierte Historien zusammenzufügen, ohne Commits umzuschreiben.</p>
    <h2>Häufige Fehler</h2>
    <p><code>git describe</code> in einem depth-1-Klon laufen lassen und einen Fehler erhalten, weil kein Annotated Tag erreichbar ist; entweder Tags fetchen (<code>--tags</code>) oder einen tieferen Klon verwenden. Versuchen, einen Feature-Branch in einem Shallow Clone zu rebasen, wo die Merge-Basis jenseits der Shallow-Grenze liegt; vertiefen Sie zuerst. Aus einem Shallow Clone pushen und durch "remote rejected" überrascht sein; der Server kann fehlende Eltern-Objekte brauchen. Schließlich: Shallow Clones als Ersatz für Partial Clones behandeln; sie lösen verschiedene Probleme, und Partial ist üblicherweise freundlicher.</p>

- source_title: "Git garbage collection basics"
  title: "Grundlagen der Git-Garbage-Collection"
  langcode: de
  body: |
    <h2>Einführung</h2>
    <p><em>Garbage Collection</em> (gc) hält Ihr Repository kompakt und schnell. Git führt sie automatisch aus, wenn bestimmte Schwellen überschritten sind. Sie können sie auch manuell aufrufen.</p>
    <h2>Was gc tut</h2>
    <ol>
      <li>Packt lose Objekte in Pack-Dateien.</li>
      <li>Re-deltifiziert auf Anfrage.</li>
      <li>Entfernt unerreichbare Objekte, älter als das Prune-Expire-Fenster.</li>
      <li>Lässt Reflog-Einträge nach ihrem TTL ablaufen.</li>
      <li>Schreibt optional die commit-graph-Datei.</li>
    </ol>
    <pre><code>git gc
    git gc --auto
    git gc --aggressive
    git gc --prune=now
    git count-objects -v</code></pre>
    <h2>Auto-gc-Schwellen</h2>
    <pre><code>git config gc.auto 6700                 # Schwellenwert für lose Objekte
    git config gc.autoPackLimit 50          # Schwelle für Anzahl Packs
    git config gc.autoDetach true           # im Hintergrund laufen lassen</code></pre>
    <p>Auto-gc feuert nach Operationen, die neue Objekte erzeugen, wie <code>commit</code> und <code>fetch</code>. Mit <code>autoDetach</code> läuft es im Hintergrund und Git kehrt sofort zurück.</p>
    <h2>Reflog-Ablauf</h2>
    <pre><code>git config gc.reflogExpire 90.days
    git config gc.reflogExpireUnreachable 30.days
    git reflog expire --expire=90.days --all</code></pre>
    <p>Erreichbare Einträge bleiben standardmäßig 90 Tage, unerreichbare 30. Branches und Tags, die Sie löschen, hinterlassen Reflog-Spuren, die innerhalb dieses Fensters überleben.</p>
    <h2>Prune-Fenster</h2>
    <pre><code>git config gc.pruneExpire 2.weeks.ago</code></pre>
    <p>Unerreichbare Objekte, älter als dies, kommen während gc zur Löschung in Frage. <code>--prune=now</code> löscht sofort; nützlich, aber gefährlich, da es Sicherheitsmargen entfernt.</p>
    <h2>Aggressiv vs. normal</h2>
    <pre><code>git gc                       # Routine: neue Objekte packen, alte prunen
    git gc --aggressive          # Deltas von Grund auf neu aufbauen</code></pre>
    <p>Aggressives gc ist selten lohnend; es ist CPU-intensiv und der Gewinn ist üblicherweise gering. Normales gc ist für die meisten Repositories ausreichend.</p>
    <h2>Maintenance</h2>
    <p>Modernes Git (2.29+) hat ein <code>maintenance</code>-Subsystem, das gc konsolidiert und verbessert:</p>
    <pre><code>git maintenance start
    git maintenance run --task gc
    git maintenance run --task commit-graph
    git maintenance run --task incremental-repack</code></pre>
    <p><code>git maintenance start</code> registriert einen Hintergrund-Job (cron, launchd oder systemd-Timer), der das Repository periodisch optimiert.</p>
    <h2>Gesperrte Operationen</h2>
    <p>Wenn gc unterbrochen wird, sehen Sie möglicherweise eine veraltete Lock-Datei:</p>
    <pre><code>ls .git/gc.pid
    rm .git/gc.pid    # nur nach Bestätigung, dass kein gc läuft</code></pre>
    <h2>Was gc nie löscht</h2>
    <p>Mehrere Objektklassen sind von gc ausgenommen, bis ihre Referenz abläuft:</p>
    <ul>
      <li>Objekte, die von einer Ref unter <code>refs/</code> aus erreichbar sind.</li>
      <li>Objekte, die aus dem Reflog einer Ref erreichbar sind (bis zum Reflog-Ablauf).</li>
      <li>Objekte unter <code>refs/stash</code> (die Stash-Liste).</li>
      <li>Objekte, die durch <code>git replace</code>-Mappings festgehalten werden.</li>
      <li>Objekte, die aus HEAD und Index der Worktrees erreichbar sind.</li>
    </ul>
    <pre><code>git fsck --unreachable --no-reflogs
    git reflog expire --expire-unreachable=now --all
    git gc --prune=now</code></pre>
    <p>Diese letzte Sequenz ist das Standard-"Wirklich unerreichbare Historie löschen"-Rezept; greifen Sie vorsichtig danach.</p>
    <h2>Häufige Fehler</h2>
    <p><code>git gc --prune=now</code> direkt nach einer destruktiven Operation ausführen und das Reflog-Sicherheitsnetz beseitigen. Warten Sie immer das Standardfenster ab, es sei denn, Sie brauchen wirklich den Platz. Auto-gc auf einem schnellen Repository deaktivieren und Millionen lose Objekte ansammeln. <code>--aggressive</code> regelmäßig laufen lassen unter der Annahme "mehr ist besser"; es verbrennt nur CPU. Schließlich: gc gleichzeitig mit <code>git push</code> auf einem Server laufen lassen; modernes Git handhabt Nebenläufigkeit sicher, aber benutzerdefinierte Skripte, die um <code>.git/objects</code> kämpfen, können korrumpieren. Verwenden Sie <code>git maintenance</code> statt selbstgemachter Cron-Jobs.</p>

- source_title: "Porcelain vs plumbing commands"
  title: "Porcelain- vs. Plumbing-Befehle"
  langcode: de
  body: |
    <h2>Einführung</h2>
    <p>Git ist in zwei Schichten aufgeteilt. <strong>Plumbing</strong>-Befehle sind Low-Level-Bausteine, die auf der Objektdatenbank, Refs und dem Index operieren. <strong>Porcelain</strong>-Befehle sind nutzerfreundliche Wrapper, aus Plumbing aufgebaut. <code>git commit</code> ist Porcelain; <code>git hash-object</code>, <code>git write-tree</code> und <code>git update-ref</code> sind Plumbing.</p>
    <h2>Warum die Aufteilung</h2>
    <p>Porcelain-Ausgabe ist für Menschen und kann sich zwischen Versionen ändern. Plumbing-Ausgabe ist stabil, parsbar und für Skripte gedacht. Sie zu verwechseln ist die häufigste Ursache zerbrechlicher Git-Skripte.</p>
    <h2>Häufige Porcelain-Befehle</h2>
    <ul>
      <li><code>git add</code>, <code>git commit</code>, <code>git status</code>, <code>git log</code></li>
      <li><code>git switch</code>, <code>git restore</code>, <code>git branch</code></li>
      <li><code>git merge</code>, <code>git rebase</code>, <code>git cherry-pick</code></li>
      <li><code>git fetch</code>, <code>git pull</code>, <code>git push</code>, <code>git clone</code></li>
    </ul>
    <h2>Häufige Plumbing-Befehle</h2>
    <ul>
      <li><code>git hash-object</code>: berechnet den SHA von Inhalt, optional mit Schreiben.</li>
      <li><code>git cat-file</code>: liest Typ, Größe oder Inhalt eines Objekts.</li>
      <li><code>git ls-tree</code>, <code>git ls-files</code>: listet Tree- oder Index-Inhalte auf.</li>
      <li><code>git rev-parse</code>: löst einen Namen zu einem SHA auf.</li>
      <li><code>git rev-list</code>: listet Commit-SHAs aus einer Graph-Traversierung auf.</li>
      <li><code>git update-ref</code>, <code>git symbolic-ref</code>: Ref-Manipulation.</li>
      <li><code>git read-tree</code>, <code>git write-tree</code>, <code>git commit-tree</code>: Index/Tree/Commit-Erstellung.</li>
      <li><code>git update-index</code>: Low-Level-Index-Manipulation.</li>
      <li><code>git pack-objects</code>, <code>git unpack-objects</code>, <code>git index-pack</code>.</li>
    </ul>
    <h2>Einen Commit von Hand bauen</h2>
    <p>Um Plumbing in Aktion zu sehen, bauen Sie einen Commit ohne Porcelain:</p>
    <pre><code>BLOB=$(echo "hello" | git hash-object --stdin -w)
    TREE=$(printf "100644 blob $BLOB\thello.txt\n" | git mktree)
    COMMIT=$(echo "first" | git commit-tree $TREE)
    git update-ref refs/heads/main $COMMIT
    git log --oneline</code></pre>
    <p>Das ist im Wesentlichen das, was <code>git commit</code> intern tut.</p>
    <h2>Stabile Skript-Schnittstellen</h2>
    <p>Manche Porcelain-Befehle haben einen "Porcelain"-Modus mit einem stabilen, parsbaren Format:</p>
    <pre><code>git status --porcelain=v2
    git diff --raw
    git ls-files --stage
    git for-each-ref --format='%(refname) %(objectname)'</code></pre>
    <p>Verwenden Sie diese in Skripten; parsen Sie niemals die menschliche Ausgabe von <code>git status</code>.</p>
    <h2>Die Manpage lesen</h2>
    <p>Porcelain-Manpages sind in <code>git help -a</code> unter "Main Porcelain Commands" aufgeführt; Plumbing unter "Manipulators", "Interrogators", "Synching repositories", "Internal helpers". Für Internas-Tutorials laufen Sie <code>git help gitcore-tutorial</code> und <code>git help gitrepository-layout</code>.</p>
    <h2>Wann Plumbing verwenden</h2>
    <ul>
      <li>Verlässliche Skripte schreiben, die Git-Upgrades überleben.</li>
      <li>Tooling bauen, das in Gits Datenmodell integriert.</li>
      <li>Porcelain-Befehle debuggen, indem ihre internen Schritte reproduziert werden.</li>
      <li>Eigene Workflows implementieren, in die Porcelain nicht passt.</li>
    </ul>
    <h2>Häufige Fehler</h2>
    <p>Die menschliche Ausgabe von <code>git status</code> oder <code>git log</code> in Skripten parsen und an einem Git-Upgrade oder Locale-Wechsel zerbrechen. Verwenden Sie <code>--porcelain</code>-Formate und <code>--pretty=format:</code> mit expliziten Platzhaltern. <code>git update-ref</code> ohne die Drei-Argumente-Compare-and-Set-Form in nebenläufigen Skripten aufrufen und mit einem anderen Prozess kollidieren. Low-Level-<code>git update-index</code> mit High-Level-<code>git add</code> im selben Workflow mischen und mit überraschendem Index-Zustand enden. Schließlich: Annehmen, Porcelain sei immer "sicherer" als Plumbing; manche Plumbing-Operationen (wie <code>git update-ref</code>) sind weit deterministischer als ihre Porcelain-Pendants. Das richtige Werkzeug hängt davon ab, was Sie bauen.</p>
