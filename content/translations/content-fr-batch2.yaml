    <p><code>git log</code>, <code>git diff</code>, <code>git cat-file</code>, <code>git blame</code></p>
    

- source_title: "git blame — Show what revision and author last modified each line"
  title: "git blame — Afficher quelle révision et quel auteur ont modifié chaque ligne en dernier"
  langcode: fr
  body: |
    <h2>Synopsis</h2>
    <pre><code>git blame [-L &lt;range&gt;] [-w] [-M] [-C] &lt;file&gt;</code></pre>
    <h2>Description</h2>
    <p>The <code>git blame</code> command annotates each line of a file with the commit, author, and timestamp that last touched it. It is invaluable for understanding why a piece of code looks the way it does, who introduced it, and when. Despite the accusatory name, blame is mostly used as a research tool, not as a means of finger-pointing.</p>
    <p>Blame can follow code as it was moved or copied (with <code>-M</code> and <code>-C</code>), and can ignore whitespace-only or formatting-only commits if you maintain a <code>.git-blame-ignore-revs</code> file referenced via <code>blame.ignoreRevsFile</code>.</p>
