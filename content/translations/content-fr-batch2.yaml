- source_title: "git hash-object — Compute or store a Git object"
  title: "git hash-object — Calculer ou stocker un objet Git"
  langcode: fr
  body: |
    <h2>Synopsis</h2>
    <pre><code>git hash-object [-t &lt;type&gt;] [-w] [--stdin] [&lt;file&gt;...]</code></pre>
    <h2>Description</h2>
    <p>The <code>git hash-object</code> command computes the SHA-1 (or SHA-256, in modern repos) that Git would assign to a file's contents. With <code>-w</code>, it also writes the object into the object database, returning the SHA. This is the lowest-level mechanism behind <code>git add</code>: that porcelain command essentially calls <code>hash-object -w</code> and then updates the index.</p>
    <p>Dans l'usage quotidien, <code>git hash-object</code> s'intègre étroitement avec les alias de shell, les plugins d'éditeur et l'intégration continue. Les utilisateurs avancés ajoutent souvent des alias combinant les flags qu'ils passent toujours, ou enveloppent la commande dans des scripts qui appliquent les conventions d'équipe. Le formatage de la sortie peut être personnalisé via la configuration Git — pretty formats, schémas de couleurs et comportement du pager sont tous ajustables. Quand quelque chose tourne mal, la première étape de diagnostic est généralement de relancer la commande avec <code>GIT_TRACE=1</code> dans l'environnement, ce qui révèle les appels de plomberie sous-jacents. Pour les situations inhabituelles, la sortie <code>--help</code> (<code>git hash-object --help</code>) ouvre la page de manuel complète avec les détails de chaque option, y compris celles rarement utilisées dans les workflows ordinaires mais essentielles pour le débogage ou le scripting à grande échelle.</p><p>Comprendre comment <code>git hash-object</code> interagit avec le reste du modèle de données de Git — la base d'objets, l'index, les refs et l'arborescence de travail — est rentable. Chaque commande opère sur un sous-ensemble de ces pièces, et savoir laquelle elle touche aide à prédire les résultats et récupérer après les erreurs. Lire la documentation officielle de Git en parallèle de la pratique sur un dépôt jetable est la façon la plus rapide d'intérioriser les subtilités. La plupart des problèmes de production avec Git proviennent de l'une de trois causes : comportement par défaut surprenant, opérations réseau partielles, ou réécriture d'historique déjà partagé. Un modèle mental fonctionnel des effets de bord de <code>git hash-object</code> aide à éviter les trois.</p>
        <h2>When to Use</h2>
    <p>You almost never need this directly. It is most useful for scripts that synthesize content into the object database (importers, migration tools), for debugging by checking what hash a piece of content would have, or for educational exploration of Git's content-addressable model.</p>
    <h2>Options courantes</h2>
    <table>
      <thead><tr><th>Option</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>-t &lt;type&gt;</code></td><td>Object type (default <code>blob</code>).</td></tr>
        <tr><td><code>-w</code></td><td>Write the object to the database.</td></tr>
        <tr><td><code>--stdin</code></td><td>Read content from standard input.</td></tr>
        <tr><td><code>--stdin-paths</code></td><td>Read filenames from stdin.</td></tr>
        <tr><td><code>--no-filters</code></td><td>Skip smudge/clean filters.</td></tr>
        <tr><td><code>--literally</code></td><td>Don't validate content type.</td></tr>
      </tbody>
    </table>
    <h2>Exemples</h2>
    <pre><code>git hash-object README.md
    # Print the SHA Git would assign
    
    echo "hello" | git hash-object --stdin
    # Hash arbitrary content
    
    git hash-object -w newfile.txt
    # Add the file's content as a blob in the object DB
    
    find . -name '*.png' | git hash-object --stdin-paths
    # Batch-compute hashes for many files</code></pre>
    <h2>Erreurs fréquentes</h2>
    <p>Using <code>-w</code> creates a dangling blob if you don't reference it from a tree. <code>git gc</code> will eventually prune unreachable objects. Hashing through filters (CRLF normalization) yields different SHAs than raw bytes — pass <code>--no-filters</code> to compare with raw hashes from other tools.</p>
    <h2>Commandes liées</h2>
    <p><code>git add</code>, <code>git cat-file</code>, <code>git update-index</code>, <code>git write-tree</code></p>
    

- source_title: "git ls-tree — List the contents of a tree object"
  title: "git ls-tree — Lister le contenu d'un objet tree"
  langcode: fr
  body: |
    <h2>Synopsis</h2>
    <pre><code>git ls-tree [-r] [-d] [-l] [--name-only] &lt;tree-ish&gt; [&lt;path&gt;...]</code></pre>
    <h2>Description</h2>
    <p>The <code>git ls-tree</code> command lists entries (mode, type, SHA, name) of a tree object. With <code>-r</code> it recurses into subdirectories. It is the plumbing equivalent of <code>ls</code> on a Git tree. Output is one entry per line, suitable for piping into other tools.</p>
    <p>Dans l'usage quotidien, <code>git ls-tree</code> s'intègre étroitement avec les alias de shell, les plugins d'éditeur et l'intégration continue. Les utilisateurs avancés ajoutent souvent des alias combinant les flags qu'ils passent toujours, ou enveloppent la commande dans des scripts qui appliquent les conventions d'équipe. Le formatage de la sortie peut être personnalisé via la configuration Git — pretty formats, schémas de couleurs et comportement du pager sont tous ajustables. Quand quelque chose tourne mal, la première étape de diagnostic est généralement de relancer la commande avec <code>GIT_TRACE=1</code> dans l'environnement, ce qui révèle les appels de plomberie sous-jacents. Pour les situations inhabituelles, la sortie <code>--help</code> (<code>git ls-tree --help</code>) ouvre la page de manuel complète avec les détails de chaque option, y compris celles rarement utilisées dans les workflows ordinaires mais essentielles pour le débogage ou le scripting à grande échelle.</p><p>Comprendre comment <code>git ls-tree</code> interagit avec le reste du modèle de données de Git — la base d'objets, l'index, les refs et l'arborescence de travail — est rentable. Chaque commande opère sur un sous-ensemble de ces pièces, et savoir laquelle elle touche aide à prédire les résultats et récupérer après les erreurs. Lire la documentation officielle de Git en parallèle de la pratique sur un dépôt jetable est la façon la plus rapide d'intérioriser les subtilités. La plupart des problèmes de production avec Git proviennent de l'une de trois causes : comportement par défaut surprenant, opérations réseau partielles, ou réécriture d'historique déjà partagé. Un modèle mental fonctionnel des effets de bord de <code>git ls-tree</code> aide à éviter les trois.</p>
        <h2>When to Use</h2>
    <p>Most developers reach for <code>git show &lt;rev&gt;:&lt;path&gt;</code> or <code>git ls-files</code> instead. <code>ls-tree</code> shines in scripts that need exact mode/type/SHA information, or when traversing a tree of any commit (not just HEAD's index).</p>
    <h2>Options courantes</h2>
    <table>
      <thead><tr><th>Option</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>-r</code></td><td>Recurse into subtrees.</td></tr>
        <tr><td><code>-d</code></td><td>Show only directories (trees).</td></tr>
        <tr><td><code>-l</code></td><td>Include the size of blob entries.</td></tr>
        <tr><td><code>--name-only</code></td><td>Show only file names.</td></tr>
        <tr><td><code>-z</code></td><td>NUL-terminate output for safe parsing.</td></tr>
        <tr><td><code>--full-tree</code></td><td>Don't restrict by current directory.</td></tr>
      </tbody>
    </table>
    <h2>Exemples</h2>
    <pre><code>git ls-tree HEAD
    # Top-level entries of HEAD's tree
    
    git ls-tree -r HEAD --name-only
    # All file paths at HEAD
    
    git ls-tree -r -l v1.0 src/
    # Sizes and SHAs for every file under src/ at v1.0
    
    git ls-tree HEAD -- 'docs/*.md'
    # Just markdown files in docs/</code></pre>
    <h2>Erreurs fréquentes</h2>
    <p>Mixing up working-directory-relative versus repo-root-relative paths. Use <code>--full-tree</code> for unambiguous root-relative output. Without <code>-r</code>, only one level is shown — easy to miss nested files.</p>
    <h2>Commandes liées</h2>
    <p><code>git ls-files</code>, <code>git show</code>, <code>git cat-file</code>, <code>git diff-tree</code></p>
    

- source_title: "git ls-files — Show information about files in the index and working tree"
  title: "git ls-files — Afficher des infos sur les fichiers dans l'index et l'arborescence"
  langcode: fr
  body: |
    <h2>Synopsis</h2>
    <pre><code>git ls-files [-c] [-d] [-m] [-o] [-i] [--exclude-standard]</code></pre>
    <h2>Description</h2>
    <p>The <code>git ls-files</code> command lists files known to Git's index (and optionally the working tree). It supports filters: cached/staged, deleted, modified, others (untracked), ignored, unmerged, and so on. It is faster and more precise than <code>find</code> for "show me all tracked files."</p>
    <p>Dans l'usage quotidien, <code>git ls-files</code> s'intègre étroitement avec les alias de shell, les plugins d'éditeur et l'intégration continue. Les utilisateurs avancés ajoutent souvent des alias combinant les flags qu'ils passent toujours, ou enveloppent la commande dans des scripts qui appliquent les conventions d'équipe. Le formatage de la sortie peut être personnalisé via la configuration Git — pretty formats, schémas de couleurs et comportement du pager sont tous ajustables. Quand quelque chose tourne mal, la première étape de diagnostic est généralement de relancer la commande avec <code>GIT_TRACE=1</code> dans l'environnement, ce qui révèle les appels de plomberie sous-jacents. Pour les situations inhabituelles, la sortie <code>--help</code> (<code>git ls-files --help</code>) ouvre la page de manuel complète avec les détails de chaque option, y compris celles rarement utilisées dans les workflows ordinaires mais essentielles pour le débogage ou le scripting à grande échelle.</p><p>Comprendre comment <code>git ls-files</code> interagit avec le reste du modèle de données de Git — la base d'objets, l'index, les refs et l'arborescence de travail — est rentable. Chaque commande opère sur un sous-ensemble de ces pièces, et savoir laquelle elle touche aide à prédire les résultats et récupérer après les erreurs. Lire la documentation officielle de Git en parallèle de la pratique sur un dépôt jetable est la façon la plus rapide d'intérioriser les subtilités. La plupart des problèmes de production avec Git proviennent de l'une de trois causes : comportement par défaut surprenant, opérations réseau partielles, ou réécriture d'historique déjà partagé. Un modèle mental fonctionnel des effets de bord de <code>git ls-files</code> aide à éviter les trois.</p>
        <h2>When to Use</h2>
    <p>Most users invoke porcelain like <code>git status</code> or <code>git grep</code> rather than <code>ls-files</code>. Reach for it in scripts that operate on tracked files (lint tools, formatters, sync scripts) where you want a clean, ignore-aware list.</p>
    <h2>Options courantes</h2>
    <table>
      <thead><tr><th>Option</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>-c</code>, <code>--cached</code></td><td>Show cached files (default).</td></tr>
        <tr><td><code>-d</code></td><td>Show deleted files.</td></tr>
        <tr><td><code>-m</code></td><td>Show modified files.</td></tr>
        <tr><td><code>-o</code></td><td>Show other (untracked) files.</td></tr>
        <tr><td><code>-i</code></td><td>Show ignored files.</td></tr>
        <tr><td><code>--exclude-standard</code></td><td>Apply standard ignore rules.</td></tr>
        <tr><td><code>-s</code>, <code>--stage</code></td><td>Show stage info (for unmerged paths).</td></tr>
        <tr><td><code>-z</code></td><td>NUL-terminated output.</td></tr>
      </tbody>
    </table>
    <h2>Exemples</h2>
    <pre><code>git ls-files
    # Every tracked file
    
    git ls-files -o --exclude-standard
    # Untracked, non-ignored files
    
    git ls-files -m
    # Locally modified tracked files
    
    git ls-files -s
    # Show mode, SHA, and stage number for each entry</code></pre>
    <h2>Erreurs fréquentes</h2>
    <p>Forgetting <code>--exclude-standard</code> when listing untracked files swamps you with ignored junk. Combining filters can be confusing — if you pass both <code>-c</code> and <code>-o</code>, the meaning depends on context.</p>
