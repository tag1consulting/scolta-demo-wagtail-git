    <p><code>git status</code>, <code>git ls-tree</code>, <code>git update-index</code>, <code>git grep</code></p>
    

- source_title: "git rev-parse — Pick out and massage parameters"
  title: "git rev-parse — Extraire et manipuler des paramètres"
  langcode: fr
  body: |
    <h2>Synopsis</h2>
    <pre><code>git rev-parse [&lt;options&gt;] &lt;arg&gt;...</code></pre>
    <h2>Description</h2>
    <p>The <code>git rev-parse</code> command resolves Git references and arguments. It turns symbolic names (branches, tags, <code>HEAD~3</code>, <code>HEAD@{yesterday}</code>) into 40-character SHAs, normalizes options, and answers introspection questions about the current repository (top-level path, Git directory, whether we're in a worktree). It is the Swiss Army knife of Git scripting.</p>
    <p>Dans l'usage quotidien, <code>git rev-parse</code> s'intègre étroitement avec les alias de shell, les plugins d'éditeur et l'intégration continue. Les utilisateurs avancés ajoutent souvent des alias combinant les flags qu'ils passent toujours, ou enveloppent la commande dans des scripts qui appliquent les conventions d'équipe. Le formatage de la sortie peut être personnalisé via la configuration Git — pretty formats, schémas de couleurs et comportement du pager sont tous ajustables. Quand quelque chose tourne mal, la première étape de diagnostic est généralement de relancer la commande avec <code>GIT_TRACE=1</code> dans l'environnement, ce qui révèle les appels de plomberie sous-jacents. Pour les situations inhabituelles, la sortie <code>--help</code> (<code>git rev-parse --help</code>) ouvre la page de manuel complète avec les détails de chaque option, y compris celles rarement utilisées dans les workflows ordinaires mais essentielles pour le débogage ou le scripting à grande échelle.</p><p>Comprendre comment <code>git rev-parse</code> interagit avec le reste du modèle de données de Git — la base d'objets, l'index, les refs et l'arborescence de travail — est rentable. Chaque commande opère sur un sous-ensemble de ces pièces, et savoir laquelle elle touche aide à prédire les résultats et récupérer après les erreurs. Lire la documentation officielle de Git en parallèle de la pratique sur un dépôt jetable est la façon la plus rapide d'intérioriser les subtilités. La plupart des problèmes de production avec Git proviennent de l'une de trois causes : comportement par défaut surprenant, opérations réseau partielles, ou réécriture d'historique déjà partagé. Un modèle mental fonctionnel des effets de bord de <code>git rev-parse</code> aide à éviter les trois.</p>
        <h2>When to Use</h2>
    <p>You'll see <code>git rev-parse</code> in nearly every shell script that wraps Git: to get the current branch name, the repo root, or to validate that an argument is a valid commit. Most users don't run it directly day-to-day, but knowledge of it dramatically improves Git scripting fluency.</p>
    <h2>Options courantes</h2>
    <table>
      <thead><tr><th>Option</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>--abbrev-ref</code></td><td>Print short ref name (e.g. <code>main</code>, not <code>refs/heads/main</code>).</td></tr>
        <tr><td><code>--short</code></td><td>Output abbreviated SHA.</td></tr>
        <tr><td><code>--show-toplevel</code></td><td>Print absolute path of repo root.</td></tr>
        <tr><td><code>--git-dir</code></td><td>Print absolute path of <code>.git</code>.</td></tr>
        <tr><td><code>--is-inside-work-tree</code></td><td>Yes/no script-friendly answer.</td></tr>
        <tr><td><code>--verify</code></td><td>Validate that the argument is a real ref.</td></tr>
        <tr><td><code>--quiet</code></td><td>Suppress error output.</td></tr>
      </tbody>
    </table>
    <h2>Exemples</h2>
    <pre><code>git rev-parse HEAD
    # Full SHA of current commit
    
    git rev-parse --abbrev-ref HEAD
    # Current branch name (or "HEAD" if detached)
    
    git rev-parse --show-toplevel
    # Path to repo root, useful in scripts
    
    git rev-parse --verify origin/main &gt;/dev/null && echo OK
    # Test whether a ref exists</code></pre>
    <h2>Erreurs fréquentes</h2>
    <p>Using <code>git rev-parse</code> on user input without <code>--verify</code> can succeed for ambiguous arguments and produce surprising results. In subshells, <code>--show-toplevel</code> is a more reliable anchor than <code>$PWD</code>.</p>
    <h2>Commandes liées</h2>
    <p><code>git symbolic-ref</code>, <code>git rev-list</code>, <code>git for-each-ref</code>, <code>git config</code></p>
    

- source_title: "git rev-list — List commit objects in reverse chronological order"
  title: "git rev-list — Lister les objets commits en ordre chronologique inverse"
  langcode: fr
  body: |
    <h2>Synopsis</h2>
    <pre><code>git rev-list [&lt;options&gt;] &lt;commit&gt;...</code></pre>
    <h2>Description</h2>
    <p>The <code>git rev-list</code> command emits the SHAs of commits reachable from one or more starting points, optionally excluding others. It is the workhorse behind <code>git log</code>, <code>git bisect</code>, and many other commands. With its many filters, it can answer "how many commits between A and B," "the SHA of the merge base," "all commits not on main," and so on.</p>
    <p>Dans l'usage quotidien, <code>git rev-list</code> s'intègre étroitement avec les alias de shell, les plugins d'éditeur et l'intégration continue. Les utilisateurs avancés ajoutent souvent des alias combinant les flags qu'ils passent toujours, ou enveloppent la commande dans des scripts qui appliquent les conventions d'équipe. Le formatage de la sortie peut être personnalisé via la configuration Git — pretty formats, schémas de couleurs et comportement du pager sont tous ajustables. Quand quelque chose tourne mal, la première étape de diagnostic est généralement de relancer la commande avec <code>GIT_TRACE=1</code> dans l'environnement, ce qui révèle les appels de plomberie sous-jacents. Pour les situations inhabituelles, la sortie <code>--help</code> (<code>git rev-list --help</code>) ouvre la page de manuel complète avec les détails de chaque option, y compris celles rarement utilisées dans les workflows ordinaires mais essentielles pour le débogage ou le scripting à grande échelle.</p><p>Comprendre comment <code>git rev-list</code> interagit avec le reste du modèle de données de Git — la base d'objets, l'index, les refs et l'arborescence de travail — est rentable. Chaque commande opère sur un sous-ensemble de ces pièces, et savoir laquelle elle touche aide à prédire les résultats et récupérer après les erreurs. Lire la documentation officielle de Git en parallèle de la pratique sur un dépôt jetable est la façon la plus rapide d'intérioriser les subtilités. La plupart des problèmes de production avec Git proviennent de l'une de trois causes : comportement par défaut surprenant, opérations réseau partielles, ou réécriture d'historique déjà partagé. Un modèle mental fonctionnel des effets de bord de <code>git rev-list</code> aide à éviter les trois.</p>
        <h2>When to Use</h2>
    <p>Power users and toolsmiths use <code>rev-list</code> in scripts. Day-to-day developers use <code>git log</code>, which is built on top of <code>rev-list</code> but produces human-friendly output.</p>
    <h2>Options courantes</h2>
    <table>
      <thead><tr><th>Option</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>--count</code></td><td>Print just the number of commits.</td></tr>
        <tr><td><code>--max-count=&lt;n&gt;</code></td><td>Limit how many commits to list.</td></tr>
        <tr><td><code>--reverse</code></td><td>Output oldest first.</td></tr>
        <tr><td><code>--no-merges</code></td><td>Exclure les merge commits.</td></tr>
        <tr><td><code>--first-parent</code></td><td>Follow only the first parent of each merge.</td></tr>
        <tr><td><code>--ancestry-path</code></td><td>Restrict to commits between two endpoints.</td></tr>
        <tr><td><code>--all</code></td><td>Include every ref as a starting point.</td></tr>
      </tbody>
    </table>
    <h2>Exemples</h2>
    <pre><code>git rev-list --count HEAD
    # Total number of commits reachable from HEAD
    
    git rev-list main..feature
    # SHAs unique to feature
    
    git rev-list --no-merges --since="1 month ago" main
    # Non-merge commits in the last month
    
    git rev-list --max-parents=0 HEAD
    # Find root commits (no parents)</code></pre>
    <h2>Erreurs fréquentes</h2>
    <p>Forgetting that ranges with two dots exclude commits reachable from the left side. <code>--first-parent</code> changes the meaning of "ancestry" significantly. On huge repos, unbounded rev-list can be slow — pair with <code>--max-count</code> or path filters.</p>
    <h2>Commandes liées</h2>
    <p><code>git log</code>, <code>git rev-parse</code>, <code>git merge-base</code>, <code>git bisect</code></p>
    

- source_title: "git for-each-ref — Output information on each ref"
  title: "git for-each-ref — Afficher des informations sur chaque ref"
  langcode: fr
  body: |
    <h2>Synopsis</h2>
    <pre><code>git for-each-ref [--format=&lt;fmt&gt;] [--sort=&lt;key&gt;] [&lt;pattern&gt;...]</code></pre>
    <h2>Description</h2>
    <p>The <code>git for-each-ref</code> command iterates over every ref (branches, tags, remotes, notes, stash) and applies a customizable format. It is far more powerful than parsing <code>git branch</code> or <code>git tag</code> output: you can sort by version, by date, or by any field, and produce stable machine-readable output.</p>
    <p>Dans l'usage quotidien, <code>git for-each-ref</code> s'intègre étroitement avec les alias de shell, les plugins d'éditeur et l'intégration continue. Les utilisateurs avancés ajoutent souvent des alias combinant les flags qu'ils passent toujours, ou enveloppent la commande dans des scripts qui appliquent les conventions d'équipe. Le formatage de la sortie peut être personnalisé via la configuration Git — pretty formats, schémas de couleurs et comportement du pager sont tous ajustables. Quand quelque chose tourne mal, la première étape de diagnostic est généralement de relancer la commande avec <code>GIT_TRACE=1</code> dans l'environnement, ce qui révèle les appels de plomberie sous-jacents. Pour les situations inhabituelles, la sortie <code>--help</code> (<code>git for-each-ref --help</code>) ouvre la page de manuel complète avec les détails de chaque option, y compris celles rarement utilisées dans les workflows ordinaires mais essentielles pour le débogage ou le scripting à grande échelle.</p><p>Comprendre comment <code>git for-each-ref</code> interagit avec le reste du modèle de données de Git — la base d'objets, l'index, les refs et l'arborescence de travail — est rentable. Chaque commande opère sur un sous-ensemble de ces pièces, et savoir laquelle elle touche aide à prédire les résultats et récupérer après les erreurs. Lire la documentation officielle de Git en parallèle de la pratique sur un dépôt jetable est la façon la plus rapide d'intérioriser les subtilités. La plupart des problèmes de production avec Git proviennent de l'une de trois causes : comportement par défaut surprenant, opérations réseau partielles, ou réécriture d'historique déjà partagé. Un modèle mental fonctionnel des effets de bord de <code>git for-each-ref</code> aide à éviter les trois.</p>
        <h2>When to Use</h2>
    <p>Reach for <code>for-each-ref</code> in scripts that need detailed ref metadata: build version selectors, dashboards of branch ages, automated cleanup of stale branches, or release-note generators.</p>
    <h2>Options courantes</h2>
    <table>
      <thead><tr><th>Option</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>--format=&lt;fmt&gt;</code></td><td>Format string with field placeholders.</td></tr>
        <tr><td><code>--sort=&lt;key&gt;</code></td><td>Sort by field (prefix <code>-</code> for descending).</td></tr>
        <tr><td><code>--count=&lt;n&gt;</code></td><td>Limit number of entries.</td></tr>
        <tr><td><code>--contains &lt;commit&gt;</code></td><td>Refs containing the given commit.</td></tr>
        <tr><td><code>--merged &lt;commit&gt;</code></td><td>Refs merged into the given commit.</td></tr>
        <tr><td><code>--points-at &lt;commit&gt;</code></td><td>Refs that directly point at a commit.</td></tr>
      </tbody>
    </table>
    <h2>Exemples</h2>
    <pre><code>git for-each-ref --format='%(refname:short) %(objectname:short)' refs/heads/
    # Local branch names with abbreviated SHAs
    
    git for-each-ref --sort=-committerdate --count=10 \
      --format='%(committerdate:short) %(refname:short)' refs/heads/
    # Top 10 most recently updated branches
    
    git for-each-ref --sort=-v:refname --format='%(refname:short)' refs/tags/ | head -5
    # Five highest semver tags</code></pre>
    <h2>Erreurs fréquentes</h2>
    <p>Forgetting the trailing <code>/</code> on <code>refs/heads/</code> patterns can match unintended refs. Format strings can be tricky — quote field names with parentheses. <code>--sort=v:refname</code> only works on tags that look like versions.</p>
    <h2>Commandes liées</h2>
    <p><code>git branch</code>, <code>git tag</code>, <code>git ls-remote</code>, <code>git rev-parse</code></p>
    

- source_title: "git update-ref — Update the object name stored in a ref safely"
  title: "git update-ref — Mettre à jour le nom d'objet stocké dans une ref en toute sécurité"
  langcode: fr
  body: |
    <h2>Synopsis</h2>
    <pre><code>git update-ref [-d] [--create-reflog] &lt;ref&gt; &lt;newvalue&gt; [&lt;oldvalue&gt;]</code></pre>
    <h2>Description</h2>
    <p>The <code>git update-ref</code> command writes a new SHA to a ref atomically. With an optional expected old value, it provides compare-and-swap semantics for safety. It is what porcelain commands like <code>git commit</code> and <code>git branch</code> use under the hood, and what scripts that manipulate refs directly should use instead of editing files in <code>.git/refs/</code>.</p>
    <p>Dans l'usage quotidien, <code>git update-ref</code> s'intègre étroitement avec les alias de shell, les plugins d'éditeur et l'intégration continue. Les utilisateurs avancés ajoutent souvent des alias combinant les flags qu'ils passent toujours, ou enveloppent la commande dans des scripts qui appliquent les conventions d'équipe. Le formatage de la sortie peut être personnalisé via la configuration Git — pretty formats, schémas de couleurs et comportement du pager sont tous ajustables. Quand quelque chose tourne mal, la première étape de diagnostic est généralement de relancer la commande avec <code>GIT_TRACE=1</code> dans l'environnement, ce qui révèle les appels de plomberie sous-jacents. Pour les situations inhabituelles, la sortie <code>--help</code> (<code>git update-ref --help</code>) ouvre la page de manuel complète avec les détails de chaque option, y compris celles rarement utilisées dans les workflows ordinaires mais essentielles pour le débogage ou le scripting à grande échelle.</p><p>Comprendre comment <code>git update-ref</code> interagit avec le reste du modèle de données de Git — la base d'objets, l'index, les refs et l'arborescence de travail — est rentable. Chaque commande opère sur un sous-ensemble de ces pièces, et savoir laquelle elle touche aide à prédire les résultats et récupérer après les erreurs. Lire la documentation officielle de Git en parallèle de la pratique sur un dépôt jetable est la façon la plus rapide d'intérioriser les subtilités. La plupart des problèmes de production avec Git proviennent de l'une de trois causes : comportement par défaut surprenant, opérations réseau partielles, ou réécriture d'historique déjà partagé. Un modèle mental fonctionnel des effets de bord de <code>git update-ref</code> aide à éviter les trois.</p>
        <h2>When to Use</h2>
    <p>Most developers never need this. Use it when writing automation that creates, moves, or deletes refs in custom namespaces (notes, replace, custom systems), or when a porcelain command isn't appropriate (e.g., creating a ref that points at an arbitrary tree).</p>
    <h2>Options courantes</h2>
    <table>
      <thead><tr><th>Option</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>-d &lt;ref&gt; [&lt;oldvalue&gt;]</code></td><td>Delete a ref (optionally compare-and-swap).</td></tr>
        <tr><td><code>--no-deref</code></td><td>Don't follow symbolic refs.</td></tr>
        <tr><td><code>--create-reflog</code></td><td>Create a reflog if missing.</td></tr>
        <tr><td><code>-m &lt;reason&gt;</code></td><td>Reflog reason for this update.</td></tr>
        <tr><td><code>--stdin</code></td><td>Read updates from stdin (atomic batch).</td></tr>
      </tbody>
    </table>
    <h2>Exemples</h2>
    <pre><code>git update-ref refs/heads/feature abc123
    # Move feature branch to commit abc123
    
    git update-ref -d refs/heads/old-experiment
    # Delete a branch ref directly
    
    git update-ref refs/notes/ci HEAD def456
    # Move a custom notes ref atomically
    
    # Atomic multi-ref update via stdin:
    printf 'update refs/heads/main %s\nupdate refs/heads/dev %s\n' "$NEW1" "$NEW2" | \
      git update-ref --stdin</code></pre>
    <h2>Erreurs fréquentes</h2>
    <p>Bypassing safety by editing <code>.git/refs/</code> files directly can corrupt packed refs or skip reflog entries. Always use <code>update-ref</code>. Forgetting to provide <code>&lt;oldvalue&gt;</code> defeats the compare-and-swap protection — provide it whenever you can.</p>
    <h2>Commandes liées</h2>
    <p><code>git symbolic-ref</code>, <code>git pack-refs</code>, <code>git for-each-ref</code>, <code>git branch</code></p>
    

- source_title: "git symbolic-ref — Read, modify, and delete symbolic refs"
  title: "git symbolic-ref — Lire, modifier et supprimer les refs symboliques"
  langcode: fr
  body: |
    <h2>Synopsis</h2>
    <pre><code>git symbolic-ref [--short] &lt;name&gt; [&lt;ref&gt;]
    git symbolic-ref --delete &lt;name&gt;</code></pre>
    <h2>Description</h2>
    <p>The <code>git symbolic-ref</code> command manipulates symbolic refs — refs that point at another ref instead of a commit. The most familiar example is HEAD: when you're on branch <code>main</code>, HEAD is a symbolic ref pointing at <code>refs/heads/main</code>. Other examples include the default branch indicator on remotes (<code>refs/remotes/origin/HEAD</code>).</p>
    <p>Dans l'usage quotidien, <code>git symbolic-ref</code> s'intègre étroitement avec les alias de shell, les plugins d'éditeur et l'intégration continue. Les utilisateurs avancés ajoutent souvent des alias combinant les flags qu'ils passent toujours, ou enveloppent la commande dans des scripts qui appliquent les conventions d'équipe. Le formatage de la sortie peut être personnalisé via la configuration Git — pretty formats, schémas de couleurs et comportement du pager sont tous ajustables. Quand quelque chose tourne mal, la première étape de diagnostic est généralement de relancer la commande avec <code>GIT_TRACE=1</code> dans l'environnement, ce qui révèle les appels de plomberie sous-jacents. Pour les situations inhabituelles, la sortie <code>--help</code> (<code>git symbolic-ref --help</code>) ouvre la page de manuel complète avec les détails de chaque option, y compris celles rarement utilisées dans les workflows ordinaires mais essentielles pour le débogage ou le scripting à grande échelle.</p><p>Comprendre comment <code>git symbolic-ref</code> interagit avec le reste du modèle de données de Git — la base d'objets, l'index, les refs et l'arborescence de travail — est rentable. Chaque commande opère sur un sous-ensemble de ces pièces, et savoir laquelle elle touche aide à prédire les résultats et récupérer après les erreurs. Lire la documentation officielle de Git en parallèle de la pratique sur un dépôt jetable est la façon la plus rapide d'intérioriser les subtilités. La plupart des problèmes de production avec Git proviennent de l'une de trois causes : comportement par défaut surprenant, opérations réseau partielles, ou réécriture d'historique déjà partagé. Un modèle mental fonctionnel des effets de bord de <code>git symbolic-ref</code> aide à éviter les trois.</p>
        <h2>When to Use</h2>
    <p>Use this when you need to switch HEAD without touching the working tree (e.g., during a custom migration), or when scripting around the default-branch concept. Most users only ever read symbolic refs via <code>git rev-parse --abbrev-ref HEAD</code>.</p>
    <h2>Options courantes</h2>
    <table>
      <thead><tr><th>Option</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>--short</code></td><td>Print the short name (e.g. <code>main</code>).</td></tr>
        <tr><td><code>--delete</code></td><td>Delete the symbolic ref.</td></tr>
        <tr><td><code>--quiet</code></td><td>Don't print error if ref is missing.</td></tr>
        <tr><td><code>-m &lt;reason&gt;</code></td><td>Reflog reason for changes.</td></tr>
      </tbody>
    </table>
    <h2>Exemples</h2>
    <pre><code>git symbolic-ref HEAD
    # refs/heads/main
    
    git symbolic-ref --short HEAD
    # main
    
    git symbolic-ref refs/remotes/origin/HEAD refs/remotes/origin/main
    # Set the default branch indicator on origin
    
    git symbolic-ref HEAD refs/heads/develop
    # Switch HEAD without touching working tree (advanced!)</code></pre>
    <h2>Erreurs fréquentes</h2>
    <p>Switching HEAD via <code>symbolic-ref</code> doesn't update the working tree — files won't change. Use <code>git switch</code> for the everyday case. Setting <code>origin/HEAD</code> incorrectly confuses tools that look up the default branch.</p>
    <h2>Commandes liées</h2>
    <p><code>git update-ref</code>, <code>git switch</code>, <code>git rev-parse</code>, <code>git remote set-head</code></p>
    

- source_title: "git pack-objects — Create a packed archive of objects"
  title: "git pack-objects — Créer une archive packée d'objets"
  langcode: fr
  body: |
    <h2>Synopsis</h2>
    <pre><code>git pack-objects [--stdout] [--all] &lt;base-name&gt; &lt; &lt;object-list&gt;</code></pre>
    <h2>Description</h2>
    <p>The <code>git pack-objects</code> command compresses a set of objects into a single packfile, applying delta compression to similar objects. Packs are how Git stores objects efficiently on disk and over the network — every fetch and push transfers packs.</p>
    <p>Dans l'usage quotidien, <code>git pack-objects</code> s'intègre étroitement avec les alias de shell, les plugins d'éditeur et l'intégration continue. Les utilisateurs avancés ajoutent souvent des alias combinant les flags qu'ils passent toujours, ou enveloppent la commande dans des scripts qui appliquent les conventions d'équipe. Le formatage de la sortie peut être personnalisé via la configuration Git — pretty formats, schémas de couleurs et comportement du pager sont tous ajustables. Quand quelque chose tourne mal, la première étape de diagnostic est généralement de relancer la commande avec <code>GIT_TRACE=1</code> dans l'environnement, ce qui révèle les appels de plomberie sous-jacents. Pour les situations inhabituelles, la sortie <code>--help</code> (<code>git pack-objects --help</code>) ouvre la page de manuel complète avec les détails de chaque option, y compris celles rarement utilisées dans les workflows ordinaires mais essentielles pour le débogage ou le scripting à grande échelle.</p><p>Comprendre comment <code>git pack-objects</code> interagit avec le reste du modèle de données de Git — la base d'objets, l'index, les refs et l'arborescence de travail — est rentable. Chaque commande opère sur un sous-ensemble de ces pièces, et savoir laquelle elle touche aide à prédire les résultats et récupérer après les erreurs. Lire la documentation officielle de Git en parallèle de la pratique sur un dépôt jetable est la façon la plus rapide d'intérioriser les subtilités. La plupart des problèmes de production avec Git proviennent de l'une de trois causes : comportement par défaut surprenant, opérations réseau partielles, ou réécriture d'historique déjà partagé. Un modèle mental fonctionnel des effets de bord de <code>git pack-objects</code> aide à éviter les trois.</p>
        <h2>When to Use</h2>
    <p>You almost never invoke this directly. <code>git gc</code>, <code>git repack</code>, and the network protocol drive it for you. Reach for it manually when implementing custom transport, optimizing storage, or experimenting with delta strategies.</p>
    <h2>Options courantes</h2>
    <table>
      <thead><tr><th>Option</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>--stdout</code></td><td>Write the pack to stdout instead of files.</td></tr>
        <tr><td><code>--all</code></td><td>Pack everything reachable from any ref.</td></tr>
        <tr><td><code>--revs</code></td><td>Read revisions from stdin instead of object SHAs.</td></tr>
        <tr><td><code>--depth=&lt;n&gt;</code></td><td>Maximum delta chain depth.</td></tr>
        <tr><td><code>--window=&lt;n&gt;</code></td><td>Window size for delta search.</td></tr>
        <tr><td><code>--thin</code></td><td>Allow thin packs (deltas against external objects).</td></tr>
        <tr><td><code>--no-reuse-delta</code></td><td>Recompute deltas instead of reusing existing.</td></tr>
      </tbody>
    </table>
    <h2>Exemples</h2>
    <pre><code>git rev-list --objects --all | git pack-objects --stdout &gt; everything.pack
    # Build a single pack of every reachable object
    
    git rev-list --objects HEAD ^origin/main | \
      git pack-objects --thin --stdout &gt; ahead.pack
    # A thin pack of just the commits ahead of origin/main
    
    git pack-objects --all .git/objects/pack/extra
    # Repack all reachable objects into a new pack named "extra"</code></pre>
    <h2>Erreurs fréquentes</h2>
    <p>Building large packs with <code>--depth</code> and <code>--window</code> set too high consumes lots of memory and CPU. The defaults from <code>git gc</code> are sensible for most repos. Producing thin packs without context (an existing repo to apply them to) is useless.</p>
    <h2>Commandes liées</h2>
    <p><code>git unpack-objects</code>, <code>git verify-pack</code>, <code>git gc</code>, <code>git repack</code></p>
    

- source_title: "git unpack-objects — Unpack objects from a packed archive"
  title: "git unpack-objects — Décompresser les objets d'une archive packée"
  langcode: fr
  body: |
    <h2>Synopsis</h2>
    <pre><code>git unpack-objects [-r] [-q] &lt; &lt;pack-file&gt;</code></pre>
    <h2>Description</h2>
    <p>The <code>git unpack-objects</code> command reads a packfile from stdin and writes its contents as individual loose objects into the object database. This is the inverse of <code>git pack-objects</code>.</p>
    <p>Dans l'usage quotidien, <code>git unpack-objects</code> s'intègre étroitement avec les alias de shell, les plugins d'éditeur et l'intégration continue. Les utilisateurs avancés ajoutent souvent des alias combinant les flags qu'ils passent toujours, ou enveloppent la commande dans des scripts qui appliquent les conventions d'équipe. Le formatage de la sortie peut être personnalisé via la configuration Git — pretty formats, schémas de couleurs et comportement du pager sont tous ajustables. Quand quelque chose tourne mal, la première étape de diagnostic est généralement de relancer la commande avec <code>GIT_TRACE=1</code> dans l'environnement, ce qui révèle les appels de plomberie sous-jacents. Pour les situations inhabituelles, la sortie <code>--help</code> (<code>git unpack-objects --help</code>) ouvre la page de manuel complète avec les détails de chaque option, y compris celles rarement utilisées dans les workflows ordinaires mais essentielles pour le débogage ou le scripting à grande échelle.</p><p>Comprendre comment <code>git unpack-objects</code> interagit avec le reste du modèle de données de Git — la base d'objets, l'index, les refs et l'arborescence de travail — est rentable. Chaque commande opère sur un sous-ensemble de ces pièces, et savoir laquelle elle touche aide à prédire les résultats et récupérer après les erreurs. Lire la documentation officielle de Git en parallèle de la pratique sur un dépôt jetable est la façon la plus rapide d'intérioriser les subtilités. La plupart des problèmes de production avec Git proviennent de l'une de trois causes : comportement par défaut surprenant, opérations réseau partielles, ou réécriture d'historique déjà partagé. Un modèle mental fonctionnel des effets de bord de <code>git unpack-objects</code> aide à éviter les trois.</p>
        <h2>When to Use</h2>
    <p>Most developers never need this. It's used for recovering from a corrupt pack (unpack what's salvageable, then re-pack), for testing, or when integrating a small bundle into a repo where the loose-object format is preferable.</p>
    <h2>Options courantes</h2>
    <table>
      <thead><tr><th>Option</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>-n</code></td><td>Dry-run: show what would be unpacked.</td></tr>
        <tr><td><code>-q</code></td><td>Quiet, no progress.</td></tr>
        <tr><td><code>-r</code></td><td>Recover what's possible from a damaged pack.</td></tr>
        <tr><td><code>--strict</code></td><td>Refuse to write objects with broken links.</td></tr>
      </tbody>
    </table>
    <h2>Exemples</h2>
    <pre><code>git unpack-objects &lt; pack-abc.pack
    # Explode pack into loose objects
    
    git unpack-objects -r &lt; broken.pack
    # Salvage what we can from a damaged pack
    
    git unpack-objects -n &lt; somepack.pack
    # Just preview what would be unpacked</code></pre>
    <h2>Erreurs fréquentes</h2>
    <p>Unpacking a huge pack creates many tiny files and slows the filesystem. Almost every operational scenario prefers keeping the pack intact. Pair this with <code>git fsck</code> when troubleshooting corruption. <code>git help unpack-objects</code> opens the full manual page with comprehensive coverage of every option and edge case; it remains the authoritative reference whenever the summary on this page leaves a question unanswered. For team workflows, capturing how your project uses this command in a CONTRIBUTING document avoids repeated onboarding questions and keeps everyone aligned on conventions.</p>
    <h2>Commandes liées</h2>
    <p><code>git pack-objects</code>, <code>git verify-pack</code>, <code>git fsck</code>, <code>git gc</code></p>
    

- source_title: "git verify-pack — Validate packed Git archive files"
  title: "git verify-pack — Valider les fichiers d'archives Git packées"
  langcode: fr
  body: |
    <h2>Synopsis</h2>
    <pre><code>git verify-pack [-v] [--stat-only] &lt;pack&gt;.idx</code></pre>
    <h2>Description</h2>
    <p>The <code>git verify-pack</code> command checks the integrity of a packfile and its index, verifying SHA-1 checksums and delta chain consistency. With <code>-v</code>, it prints the list of objects in the pack along with type, size, and (for deltas) base information.</p>
    <p>Dans l'usage quotidien, <code>git verify-pack</code> s'intègre étroitement avec les alias de shell, les plugins d'éditeur et l'intégration continue. Les utilisateurs avancés ajoutent souvent des alias combinant les flags qu'ils passent toujours, ou enveloppent la commande dans des scripts qui appliquent les conventions d'équipe. Le formatage de la sortie peut être personnalisé via la configuration Git — pretty formats, schémas de couleurs et comportement du pager sont tous ajustables. Quand quelque chose tourne mal, la première étape de diagnostic est généralement de relancer la commande avec <code>GIT_TRACE=1</code> dans l'environnement, ce qui révèle les appels de plomberie sous-jacents. Pour les situations inhabituelles, la sortie <code>--help</code> (<code>git verify-pack --help</code>) ouvre la page de manuel complète avec les détails de chaque option, y compris celles rarement utilisées dans les workflows ordinaires mais essentielles pour le débogage ou le scripting à grande échelle.</p><p>Comprendre comment <code>git verify-pack</code> interagit avec le reste du modèle de données de Git — la base d'objets, l'index, les refs et l'arborescence de travail — est rentable. Chaque commande opère sur un sous-ensemble de ces pièces, et savoir laquelle elle touche aide à prédire les résultats et récupérer après les erreurs. Lire la documentation officielle de Git en parallèle de la pratique sur un dépôt jetable est la façon la plus rapide d'intérioriser les subtilités. La plupart des problèmes de production avec Git proviennent de l'une de trois causes : comportement par défaut surprenant, opérations réseau partielles, ou réécriture d'historique déjà partagé. Un modèle mental fonctionnel des effets de bord de <code>git verify-pack</code> aide à éviter les trois.</p>
        <h2>When to Use</h2>
    <p>Most users never run this. It's invaluable for repository forensics — finding which large blobs are eating space, understanding delta chain health, or diagnosing corruption.</p>
    <h2>Options courantes</h2>
    <table>
      <thead><tr><th>Option</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>-v</code></td><td>Verbose: list every object.</td></tr>
        <tr><td><code>--stat-only</code></td><td>Show summary statistics only.</td></tr>
        <tr><td><code>-O &lt;file&gt;</code></td><td>Read pack-list from file.</td></tr>
      </tbody>
    </table>
    <h2>Exemples</h2>
    <pre><code>git verify-pack -v .git/objects/pack/pack-*.idx
    # Detailed listing of objects in every pack
    
    # Find the biggest blobs in the repository:
    git verify-pack -v .git/objects/pack/*.idx | \
      sort -k 3 -n | tail -20
    
    git verify-pack --stat-only .git/objects/pack/pack-*.idx
    # Summary stats per pack</code></pre>
    <h2>Erreurs fréquentes</h2>
    <p>Pointing at a <code>.pack</code> instead of <code>.idx</code> fails — always pass the index. Sorting verify-pack output to find big files works, but don't forget to also examine loose objects with <code>git count-objects -v</code>.</p>
    <h2>Commandes liées</h2>
    <p><code>git fsck</code>, <code>git gc</code>, <code>git repack</code>, <code>git count-objects</code></p>
    

- source_title: "git count-objects — Count unpacked objects and disk usage"
  title: "git count-objects — Compter les objets non packés et l'utilisation disque"
  langcode: fr
  body: |
    <h2>Synopsis</h2>
    <pre><code>git count-objects [-v] [-H]</code></pre>
    <h2>Description</h2>
    <p>The <code>git count-objects</code> command reports how many loose objects and packs the repository has, and how much disk space they consume. With <code>-v</code>, it includes a breakdown of garbage, packs, in-pack objects, and prune-able objects.</p>
    <p>Dans l'usage quotidien, <code>git count-objects</code> s'intègre étroitement avec les alias de shell, les plugins d'éditeur et l'intégration continue. Les utilisateurs avancés ajoutent souvent des alias combinant les flags qu'ils passent toujours, ou enveloppent la commande dans des scripts qui appliquent les conventions d'équipe. Le formatage de la sortie peut être personnalisé via la configuration Git — pretty formats, schémas de couleurs et comportement du pager sont tous ajustables. Quand quelque chose tourne mal, la première étape de diagnostic est généralement de relancer la commande avec <code>GIT_TRACE=1</code> dans l'environnement, ce qui révèle les appels de plomberie sous-jacents. Pour les situations inhabituelles, la sortie <code>--help</code> (<code>git count-objects --help</code>) ouvre la page de manuel complète avec les détails de chaque option, y compris celles rarement utilisées dans les workflows ordinaires mais essentielles pour le débogage ou le scripting à grande échelle.</p><p>Comprendre comment <code>git count-objects</code> interagit avec le reste du modèle de données de Git — la base d'objets, l'index, les refs et l'arborescence de travail — est rentable. Chaque commande opère sur un sous-ensemble de ces pièces, et savoir laquelle elle touche aide à prédire les résultats et récupérer après les erreurs. Lire la documentation officielle de Git en parallèle de la pratique sur un dépôt jetable est la façon la plus rapide d'intérioriser les subtilités. La plupart des problèmes de production avec Git proviennent de l'une de trois causes : comportement par défaut surprenant, opérations réseau partielles, ou réécriture d'historique déjà partagé. Un modèle mental fonctionnel des effets de bord de <code>git count-objects</code> aide à éviter les trois.</p>
        <h2>When to Use</h2>
    <p>Run <code>git count-objects -v</code> to gauge whether a repo needs <code>git gc</code>: if loose-object count is high or there are many small packs, garbage collection will compact things. CI and ops teams use it for monitoring repo health.</p>
    <h2>Options courantes</h2>
    <table>
      <thead><tr><th>Option</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>-v</code></td><td>Verbose breakdown.</td></tr>
        <tr><td><code>-H</code>, <code>--human-readable</code></td><td>Sizes in KiB/MiB/GiB.</td></tr>
      </tbody>
    </table>
    <h2>Exemples</h2>
    <pre><code>git count-objects
