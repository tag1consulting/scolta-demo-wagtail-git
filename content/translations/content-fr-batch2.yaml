    <p><code>git gc</code>, <code>git pack-objects</code>, <code>git verify-pack</code>, <code>git prune</code></p>
    

- source_title: "git maintenance — Run tasks to optimize Git repository data"
  title: "git maintenance — Exécuter des tâches pour optimiser les données du dépôt"
  langcode: fr
  body: |
    <h2>Synopsis</h2>
    <pre><code>git maintenance start
    git maintenance run [--task=&lt;task&gt;]
    git maintenance stop</code></pre>
    <h2>Description</h2>
    <p>The <code>git maintenance</code> command, introduced in Git 2.29, replaces and extends <code>git gc --auto</code> with scheduled, fine-grained maintenance tasks: prefetch, commit-graph generation, loose-object packing, incremental repack, and pack-refs. Running <code>git maintenance start</code> registers a recurring schedule via cron, launchd, systemd, or Task Scheduler depending on platform.</p>
    <p>For server-side or long-lived clones of large repositories, enabling maintenance dramatically improves day-to-day responsiveness. Operations like <code>git status</code> and <code>git log</code> become faster as the commit-graph and reachable-bitmap data are kept fresh.</p>
    <p>Dans l'usage quotidien, <code>git maintenance</code> s'intègre étroitement avec les alias de shell, les plugins d'éditeur et l'intégration continue. Les utilisateurs avancés ajoutent souvent des alias combinant les flags qu'ils passent toujours, ou enveloppent la commande dans des scripts qui appliquent les conventions d'équipe. Le formatage de la sortie peut être personnalisé via la configuration Git — pretty formats, schémas de couleurs et comportement du pager sont tous ajustables. Quand quelque chose tourne mal, la première étape de diagnostic est généralement de relancer la commande avec <code>GIT_TRACE=1</code> dans l'environnement, ce qui révèle les appels de plomberie sous-jacents. Pour les situations inhabituelles, la sortie <code>--help</code> (<code>git maintenance --help</code>) ouvre la page de manuel complète avec les détails de chaque option, y compris celles rarement utilisées dans les workflows ordinaires mais essentielles pour le débogage ou le scripting à grande échelle.</p><p>Comprendre comment <code>git maintenance</code> interagit avec le reste du modèle de données de Git — la base d'objets, l'index, les refs et l'arborescence de travail — est rentable. Chaque commande opère sur un sous-ensemble de ces pièces, et savoir laquelle elle touche aide à prédire les résultats et récupérer après les erreurs. Lire la documentation officielle de Git en parallèle de la pratique sur un dépôt jetable est la façon la plus rapide d'intérioriser les subtilités. La plupart des problèmes de production avec Git proviennent de l'une de trois causes : comportement par défaut surprenant, opérations réseau partielles, ou réécriture d'historique déjà partagé. Un modèle mental fonctionnel des effets de bord de <code>git maintenance</code> aide à éviter les trois.</p>
        <h2>Options courantes</h2>
    <table>
      <thead><tr><th>Subcommand / Option</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>start</code></td><td>Register a background schedule.</td></tr>
        <tr><td><code>stop</code></td><td>Unregister the schedule.</td></tr>
        <tr><td><code>run</code></td><td>Run tasks immediately.</td></tr>
        <tr><td><code>--task=&lt;task&gt;</code></td><td>Run only this task (commit-graph, prefetch, etc.).</td></tr>
        <tr><td><code>register</code> / <code>unregister</code></td><td>Add or remove repo from the maintenance set.</td></tr>
        <tr><td><code>--schedule=&lt;freq&gt;</code></td><td>Frequency: hourly, daily, weekly.</td></tr>
      </tbody>
    </table>
    <h2>Exemples</h2>
    <pre><code>git maintenance start
    # Set up background maintenance for this repo
    
    git maintenance run --task=commit-graph
    # Update the commit-graph on demand
    
    git maintenance run --task=prefetch
    # Fetch upstream objects without updating refs
    
    git maintenance unregister
    # Stop scheduled maintenance for this repo</code></pre>
    <h2>Erreurs fréquentes</h2>
    <p>Forgetting that <code>start</code> registers a system-wide scheduled task. On shared machines, this might not be what you want; use <code>register</code> in a config file instead. Disabling automatic gc but not enabling maintenance leaves the repo to grow unchecked.</p>
    <h2>Commandes liées</h2>
    <p><code>git gc</code>, <code>git commit-graph</code>, <code>git fetch --prefetch</code>, <code>git repack</code></p>
    

- source_title: "git pack-refs — Pack heads and tags for efficient repository access"
  title: "git pack-refs — Packer heads et tags pour un accès efficace"
  langcode: fr
  body: |
    <h2>Synopsis</h2>
    <pre><code>git pack-refs [--all] [--no-prune]</code></pre>
    <h2>Description</h2>
    <p>The <code>git pack-refs</code> command consolidates many individual ref files (one per branch/tag in <code>.git/refs/</code>) into a single <code>.git/packed-refs</code> file. This is faster on filesystems where opening many small files is slow (older Windows, networked filesystems), and reduces filesystem load for repos with thousands of refs.</p>
    <p>Dans l'usage quotidien, <code>git pack-refs</code> s'intègre étroitement avec les alias de shell, les plugins d'éditeur et l'intégration continue. Les utilisateurs avancés ajoutent souvent des alias combinant les flags qu'ils passent toujours, ou enveloppent la commande dans des scripts qui appliquent les conventions d'équipe. Le formatage de la sortie peut être personnalisé via la configuration Git — pretty formats, schémas de couleurs et comportement du pager sont tous ajustables. Quand quelque chose tourne mal, la première étape de diagnostic est généralement de relancer la commande avec <code>GIT_TRACE=1</code> dans l'environnement, ce qui révèle les appels de plomberie sous-jacents. Pour les situations inhabituelles, la sortie <code>--help</code> (<code>git pack-refs --help</code>) ouvre la page de manuel complète avec les détails de chaque option, y compris celles rarement utilisées dans les workflows ordinaires mais essentielles pour le débogage ou le scripting à grande échelle.</p><p>Comprendre comment <code>git pack-refs</code> interagit avec le reste du modèle de données de Git — la base d'objets, l'index, les refs et l'arborescence de travail — est rentable. Chaque commande opère sur un sous-ensemble de ces pièces, et savoir laquelle elle touche aide à prédire les résultats et récupérer après les erreurs. Lire la documentation officielle de Git en parallèle de la pratique sur un dépôt jetable est la façon la plus rapide d'intérioriser les subtilités. La plupart des problèmes de production avec Git proviennent de l'une de trois causes : comportement par défaut surprenant, opérations réseau partielles, ou réécriture d'historique déjà partagé. Un modèle mental fonctionnel des effets de bord de <code>git pack-refs</code> aide à éviter les trois.</p>
        <h2>When to Use</h2>
    <p>Most repos don't need manual pack-refs — <code>git gc</code> runs it as part of maintenance. Reach for it directly when scripting performance optimizations on huge ref sets.</p>
    <h2>Options courantes</h2>
    <table>
      <thead><tr><th>Option</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>--all</code></td><td>Pack all refs (default packs only branches and tags).</td></tr>
        <tr><td><code>--no-prune</code></td><td>Don't remove individual ref files after packing.</td></tr>
      </tbody>
    </table>
    <h2>Exemples</h2>
    <pre><code>git pack-refs --all
    # Pack every ref into packed-refs
    
    ls .git/refs/heads/ | wc -l
    # After packing, individual files are removed
    
    git pack-refs
    # Default: pack branches and tags</code></pre>
    <h2>Erreurs fréquentes</h2>
    <p>Editing <code>packed-refs</code> by hand can corrupt the repository — use <code>git update-ref</code>. After <code>pack-refs</code>, scripts that look for individual files in <code>.git/refs/heads/</code> fail. Use <code>git for-each-ref</code> for a portable lookup. <code>git help pack-refs</code> opens the full manual page with comprehensive coverage of every option and edge case; it remains the authoritative reference whenever the summary on this page leaves a question unanswered. For team workflows, capturing how your project uses this command in a CONTRIBUTING document avoids repeated onboarding questions and keeps everyone aligned on conventions.</p>
    <h2>Commandes liées</h2>
    <p><code>git gc</code>, <code>git update-ref</code>, <code>git for-each-ref</code>, <code>git maintenance</code></p>
    

- source_title: "git am — Apply a series of patches from a mailbox"
  title: "git am — Appliquer une série de patches depuis une mailbox"
  langcode: fr
  body: |
    <h2>Synopsis</h2>
    <pre><code>git am [--3way] [--abort] [--continue] [--skip] &lt;mbox&gt;...</code></pre>
    <h2>Description</h2>
    <p>The <code>git am</code> command applies patches from a mailbox file — the kind produced by <code>git format-patch</code> or generated by emailing a diff. Unlike <code>git apply</code>, which only applies the diff content, <code>git am</code> recreates each patch as a commit, preserving the author, date, message, and other metadata embedded in the email.</p>
    <p>This is the foundation of the email-based contribution workflow used by the Linux kernel and other projects: maintainers receive patches via email, save them to a mailbox, and apply them with <code>git am</code>. The result is exactly the same series of commits the author created.</p>
    <p>Dans l'usage quotidien, <code>git am</code> s'intègre étroitement avec les alias de shell, les plugins d'éditeur et l'intégration continue. Les utilisateurs avancés ajoutent souvent des alias combinant les flags qu'ils passent toujours, ou enveloppent la commande dans des scripts qui appliquent les conventions d'équipe. Le formatage de la sortie peut être personnalisé via la configuration Git — pretty formats, schémas de couleurs et comportement du pager sont tous ajustables. Quand quelque chose tourne mal, la première étape de diagnostic est généralement de relancer la commande avec <code>GIT_TRACE=1</code> dans l'environnement, ce qui révèle les appels de plomberie sous-jacents. Pour les situations inhabituelles, la sortie <code>--help</code> (<code>git am --help</code>) ouvre la page de manuel complète avec les détails de chaque option, y compris celles rarement utilisées dans les workflows ordinaires mais essentielles pour le débogage ou le scripting à grande échelle.</p><p>Comprendre comment <code>git am</code> interagit avec le reste du modèle de données de Git — la base d'objets, l'index, les refs et l'arborescence de travail — est rentable. Chaque commande opère sur un sous-ensemble de ces pièces, et savoir laquelle elle touche aide à prédire les résultats et récupérer après les erreurs. Lire la documentation officielle de Git en parallèle de la pratique sur un dépôt jetable est la façon la plus rapide d'intérioriser les subtilités. La plupart des problèmes de production avec Git proviennent de l'une de trois causes : comportement par défaut surprenant, opérations réseau partielles, ou réécriture d'historique déjà partagé. Un modèle mental fonctionnel des effets de bord de <code>git am</code> aide à éviter les trois.</p>
        <h2>Options courantes</h2>
    <table>
      <thead><tr><th>Option</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>--3way</code></td><td>Fall back to three-way merge if patch doesn't apply cleanly.</td></tr>
        <tr><td><code>--abort</code></td><td>Cancel an in-progress am.</td></tr>
        <tr><td><code>--continue</code> / <code>--resolved</code></td><td>Continue after fixing conflicts.</td></tr>
        <tr><td><code>--skip</code></td><td>Skip the current patch.</td></tr>
        <tr><td><code>-s</code>, <code>--signoff</code></td><td>Add Signed-off-by trailer.</td></tr>
        <tr><td><code>-k</code></td><td>Pass <code>-k</code> to <code>mailinfo</code> (keep subject).</td></tr>
        <tr><td><code>--whitespace=&lt;action&gt;</code></td><td>Gérer les erreurs d'espacement.</td></tr>
      </tbody>
    </table>
    <h2>Exemples</h2>
    <pre><code>git am patches/*.patch
    # Apply a series of format-patch outputs
    
    git am --3way --signoff incoming.mbox
    # Three-way merge fallback, add sign-off lines
    
    git am --abort
    # Cancel after a hopeless conflict
    
    curl -L https://lore.kernel.org/.../t.mbox.gz | gunzip | git am --3way
    # Apply patches downloaded from a public list</code></pre>
    <h2>Erreurs fréquentes</h2>
    <p>Forgetting <code>--3way</code> when patches were generated against a slightly different base often causes failures that <code>--3way</code> would handle. After resolving a conflict, run <code>git am --continue</code>, NOT <code>git commit</code>. Plain <code>commit</code> creates a malformed state.</p>
    <h2>Commandes liées</h2>
    <p><code>git apply</code>, <code>git format-patch</code>, <code>git send-email</code>, <code>git mailinfo</code></p>
    

- source_title: "git format-patch — Prepare patches for email submission"
  title: "git format-patch — Préparer des patches pour envoi par email"
  langcode: fr
  body: |
    <h2>Synopsis</h2>
    <pre><code>git format-patch [&lt;options&gt;] &lt;range&gt;
    git format-patch -1 &lt;commit&gt;</code></pre>
    <h2>Description</h2>
    <p>The <code>git format-patch</code> command produces one mailbox-formatted patch file per commit in a range, ready to be applied with <code>git am</code> or sent with <code>git send-email</code>. Each patch includes the commit message, author, date, and the diff. Patches are numbered (<code>0001-...</code>, <code>0002-...</code>) so they apply in order.</p>
    <p>This is the format the Linux kernel and many open source projects use for code review on mailing lists. Even projects that use pull requests sometimes accept patches via email, and <code>format-patch</code> is the standard producer.</p>
    <p>Dans l'usage quotidien, <code>git format-patch</code> s'intègre étroitement avec les alias de shell, les plugins d'éditeur et l'intégration continue. Les utilisateurs avancés ajoutent souvent des alias combinant les flags qu'ils passent toujours, ou enveloppent la commande dans des scripts qui appliquent les conventions d'équipe. Le formatage de la sortie peut être personnalisé via la configuration Git — pretty formats, schémas de couleurs et comportement du pager sont tous ajustables. Quand quelque chose tourne mal, la première étape de diagnostic est généralement de relancer la commande avec <code>GIT_TRACE=1</code> dans l'environnement, ce qui révèle les appels de plomberie sous-jacents. Pour les situations inhabituelles, la sortie <code>--help</code> (<code>git format-patch --help</code>) ouvre la page de manuel complète avec les détails de chaque option, y compris celles rarement utilisées dans les workflows ordinaires mais essentielles pour le débogage ou le scripting à grande échelle.</p><p>Comprendre comment <code>git format-patch</code> interagit avec le reste du modèle de données de Git — la base d'objets, l'index, les refs et l'arborescence de travail — est rentable. Chaque commande opère sur un sous-ensemble de ces pièces, et savoir laquelle elle touche aide à prédire les résultats et récupérer après les erreurs. Lire la documentation officielle de Git en parallèle de la pratique sur un dépôt jetable est la façon la plus rapide d'intérioriser les subtilités. La plupart des problèmes de production avec Git proviennent de l'une de trois causes : comportement par défaut surprenant, opérations réseau partielles, ou réécriture d'historique déjà partagé. Un modèle mental fonctionnel des effets de bord de <code>git format-patch</code> aide à éviter les trois.</p>
        <h2>Options courantes</h2>
    <table>
      <thead><tr><th>Option</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>-&lt;n&gt;</code></td><td>Generate patches for the last <code>n</code> commits.</td></tr>
        <tr><td><code>-o &lt;dir&gt;</code></td><td>Write patches to a directory.</td></tr>
        <tr><td><code>--cover-letter</code></td><td>Generate a 0000 cover letter for the series.</td></tr>
        <tr><td><code>-v &lt;n&gt;</code>, <code>--reroll-count=&lt;n&gt;</code></td><td>Mark patches as the n-th iteration.</td></tr>
        <tr><td><code>--subject-prefix=&lt;prefix&gt;</code></td><td>Custom subject prefix (default <code>PATCH</code>).</td></tr>
        <tr><td><code>--to=&lt;addr&gt;</code> / <code>--cc=&lt;addr&gt;</code></td><td>Add recipients in headers.</td></tr>
        <tr><td><code>--thread</code></td><td>Add In-Reply-To headers.</td></tr>
      </tbody>
    </table>
    <h2>Exemples</h2>
    <pre><code>git format-patch -3
    # Patches for the last 3 commits, in CWD
    
    git format-patch -o ../patches main..feature
    # Patches from main to feature, into ../patches/
    
    git format-patch --cover-letter -v2 origin/main
    # Versioned series with a cover letter
    
    git format-patch --subject-prefix="PATCH myproj" -1 HEAD
    # Custom subject for a project-specific list</code></pre>
    <h2>Erreurs fréquentes</h2>
    <p>Generating patches against the wrong base produces apply failures for reviewers — pick the right upstream. Without <code>--cover-letter</code>, a multi-patch series has no introduction; reviewers appreciate one. Reroll without <code>-v</code> creates ambiguity about which version is being reviewed.</p>
    <h2>Commandes liées</h2>
    <p><code>git am</code>, <code>git send-email</code>, <code>git request-pull</code>, <code>git range-diff</code></p>
    

- source_title: "git request-pull — Generate a summary of pending changes"
  title: "git request-pull — Générer un résumé des changements en attente"
  langcode: fr
  body: |
    <h2>Synopsis</h2>
    <pre><code>git request-pull [-p] &lt;start&gt; &lt;url&gt; [&lt;end&gt;]</code></pre>
    <h2>Description</h2>
    <p>The <code>git request-pull</code> command generates a textual summary asking an upstream maintainer to pull changes from your repository. The output includes a list of commits in the range, a diffstat, the URL and ref to pull from, and (if applicable) the SHA of the tagged version. It's the standard way to send a pull request via email on mailing-list-driven projects.</p>
    <p>This is unrelated to GitHub/GitLab pull requests — it predates them. The output is meant to be pasted into an email to the upstream maintainer.</p>
    <p>Dans l'usage quotidien, <code>git request-pull</code> s'intègre étroitement avec les alias de shell, les plugins d'éditeur et l'intégration continue. Les utilisateurs avancés ajoutent souvent des alias combinant les flags qu'ils passent toujours, ou enveloppent la commande dans des scripts qui appliquent les conventions d'équipe. Le formatage de la sortie peut être personnalisé via la configuration Git — pretty formats, schémas de couleurs et comportement du pager sont tous ajustables. Quand quelque chose tourne mal, la première étape de diagnostic est généralement de relancer la commande avec <code>GIT_TRACE=1</code> dans l'environnement, ce qui révèle les appels de plomberie sous-jacents. Pour les situations inhabituelles, la sortie <code>--help</code> (<code>git request-pull --help</code>) ouvre la page de manuel complète avec les détails de chaque option, y compris celles rarement utilisées dans les workflows ordinaires mais essentielles pour le débogage ou le scripting à grande échelle.</p><p>Comprendre comment <code>git request-pull</code> interagit avec le reste du modèle de données de Git — la base d'objets, l'index, les refs et l'arborescence de travail — est rentable. Chaque commande opère sur un sous-ensemble de ces pièces, et savoir laquelle elle touche aide à prédire les résultats et récupérer après les erreurs. Lire la documentation officielle de Git en parallèle de la pratique sur un dépôt jetable est la façon la plus rapide d'intérioriser les subtilités. La plupart des problèmes de production avec Git proviennent de l'une de trois causes : comportement par défaut surprenant, opérations réseau partielles, ou réécriture d'historique déjà partagé. Un modèle mental fonctionnel des effets de bord de <code>git request-pull</code> aide à éviter les trois.</p>
        <h2>Options courantes</h2>
    <table>
      <thead><tr><th>Option</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>-p</code></td><td>Include the full patch in the output.</td></tr>
      </tbody>
    </table>
    <h2>Exemples</h2>
    <pre><code>git request-pull v1.0 https://github.com/me/proj.git my-feature
    # Summary asking to pull my-feature from my fork
    
    git request-pull origin/main https://example.com/me/proj.git HEAD
    # Pull request based on what's ahead of upstream main
    
    git request-pull -p v2.0 git@my.server:proj.git release-2.1 | mail -s "Pull request" maintainer@example.com
    # Email a pull request with full patch</code></pre>
    <h2>Erreurs fréquentes</h2>
    <p>Specifying the wrong start point makes the diff range nonsensical. Run <code>git log</code> first to confirm the range. The remote URL must be accessible to the maintainer; private URLs produce useless requests.</p>
    <h2>Commandes liées</h2>
    <p><code>git format-patch</code>, <code>git send-email</code>, <code>git tag</code>, <code>git log</code></p>
    

- source_title: "git send-email — Send a collection of patches as emails"
  title: "git send-email — Envoyer une collection de patches par email"
  langcode: fr
  body: |
    <h2>Synopsis</h2>
    <pre><code>git send-email [--to &lt;addr&gt;] [--cc &lt;addr&gt;] [--cover-letter] &lt;patch-or-dir&gt;...</code></pre>
    <h2>Description</h2>
    <p>The <code>git send-email</code> command sends one or more patches via SMTP, each as a properly threaded email. It is the canonical tool for submitting patches to mailing-list-driven projects (Linux kernel, Git itself, U-Boot, etc.). It can read SMTP credentials from your Git config, prompt for them interactively, or use authentication files.</p>
    <p>Patches are sent in order, with <code>In-Reply-To</code> headers connecting them into a single thread. The cover letter (if present) is sent first as the parent of the thread.</p>
    <p>Dans l'usage quotidien, <code>git send-email</code> s'intègre étroitement avec les alias de shell, les plugins d'éditeur et l'intégration continue. Les utilisateurs avancés ajoutent souvent des alias combinant les flags qu'ils passent toujours, ou enveloppent la commande dans des scripts qui appliquent les conventions d'équipe. Le formatage de la sortie peut être personnalisé via la configuration Git — pretty formats, schémas de couleurs et comportement du pager sont tous ajustables. Quand quelque chose tourne mal, la première étape de diagnostic est généralement de relancer la commande avec <code>GIT_TRACE=1</code> dans l'environnement, ce qui révèle les appels de plomberie sous-jacents. Pour les situations inhabituelles, la sortie <code>--help</code> (<code>git send-email --help</code>) ouvre la page de manuel complète avec les détails de chaque option, y compris celles rarement utilisées dans les workflows ordinaires mais essentielles pour le débogage ou le scripting à grande échelle.</p><p>Comprendre comment <code>git send-email</code> interagit avec le reste du modèle de données de Git — la base d'objets, l'index, les refs et l'arborescence de travail — est rentable. Chaque commande opère sur un sous-ensemble de ces pièces, et savoir laquelle elle touche aide à prédire les résultats et récupérer après les erreurs. Lire la documentation officielle de Git en parallèle de la pratique sur un dépôt jetable est la façon la plus rapide d'intérioriser les subtilités. La plupart des problèmes de production avec Git proviennent de l'une de trois causes : comportement par défaut surprenant, opérations réseau partielles, ou réécriture d'historique déjà partagé. Un modèle mental fonctionnel des effets de bord de <code>git send-email</code> aide à éviter les trois.</p>
        <h2>Options courantes</h2>
    <table>
      <thead><tr><th>Option</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>--to=&lt;addr&gt;</code></td><td>Primary recipient.</td></tr>
        <tr><td><code>--cc=&lt;addr&gt;</code></td><td>Carbon copy.</td></tr>
        <tr><td><code>--smtp-server=&lt;host&gt;</code></td><td>SMTP server (or sendmail path).</td></tr>
        <tr><td><code>--smtp-user=&lt;user&gt;</code></td><td>SMTP username.</td></tr>
        <tr><td><code>--annotate</code></td><td>Allow editing each patch before sending.</td></tr>
        <tr><td><code>--dry-run</code></td><td>Show what would be sent.</td></tr>
        <tr><td><code>--in-reply-to=&lt;message-id&gt;</code></td><td>Thread under an existing message.</td></tr>
        <tr><td><code>--confirm=&lt;mode&gt;</code></td><td>Confirmation behavior (always, never, cc).</td></tr>
      </tbody>
    </table>
    <h2>Exemples</h2>
    <pre><code>git send-email --to=devs@example.org *.patch
    # Send all patches in CWD to a list
    
    git send-email --cover-letter --to=git@vger.kernel.org \
      --cc=maintainer@example.com 0001-*.patch
    # Series with cover letter, primary + cc
    
    git send-email --dry-run --annotate -1 HEAD
    # Preview a single patch without sending
    
    git config --global sendemail.smtpServer smtp.gmail.com
    git config --global sendemail.smtpServerPort 587
    git config --global sendemail.smtpEncryption tls
    # One-time SMTP configuration</code></pre>
    <h2>Erreurs fréquentes</h2>
    <p>Many corporate SMTP servers block plain SMTP — use TLS or app-specific passwords. Forgetting <code>--cover-letter</code> when sending a multi-patch series leaves reviewers without context. Sending a re-roll without <code>--in-reply-to</code> the original cover letter fragments the discussion.</p>
    <h2>Commandes liées</h2>
    <p><code>git format-patch</code>, <code>git am</code>, <code>git request-pull</code>, <code>git config</code></p>
    

- source_title: "git instaweb — Instantly browse your repository in gitweb"
  title: "git instaweb — Naviguer instantanément dans votre dépôt avec gitweb"
  langcode: fr
  body: |
    <h2>Synopsis</h2>
    <pre><code>git instaweb [--httpd=&lt;daemon&gt;] [--port=&lt;n&gt;] [--start | --stop | --restart]</code></pre>
    <h2>Description</h2>
    <p>The <code>git instaweb</code> command spins up a local web server (lighttpd, Apache, webrick, or Python's <code>http.server</code>) hosting the gitweb interface for the current repository. It opens a browser pointing at it, giving you a quick web UI for browsing history, files, and diffs without any setup.</p>
    <p>Despite being a command in core Git, gitweb itself is older Perl-based software and isn't always installed by default on modern distros. Many users now prefer running a local instance of cgit, gitea, or simply browsing on a hosted forge.</p>
    <p>Dans l'usage quotidien, <code>git instaweb</code> s'intègre étroitement avec les alias de shell, les plugins d'éditeur et l'intégration continue. Les utilisateurs avancés ajoutent souvent des alias combinant les flags qu'ils passent toujours, ou enveloppent la commande dans des scripts qui appliquent les conventions d'équipe. Le formatage de la sortie peut être personnalisé via la configuration Git — pretty formats, schémas de couleurs et comportement du pager sont tous ajustables. Quand quelque chose tourne mal, la première étape de diagnostic est généralement de relancer la commande avec <code>GIT_TRACE=1</code> dans l'environnement, ce qui révèle les appels de plomberie sous-jacents. Pour les situations inhabituelles, la sortie <code>--help</code> (<code>git instaweb --help</code>) ouvre la page de manuel complète avec les détails de chaque option, y compris celles rarement utilisées dans les workflows ordinaires mais essentielles pour le débogage ou le scripting à grande échelle.</p><p>Comprendre comment <code>git instaweb</code> interagit avec le reste du modèle de données de Git — la base d'objets, l'index, les refs et l'arborescence de travail — est rentable. Chaque commande opère sur un sous-ensemble de ces pièces, et savoir laquelle elle touche aide à prédire les résultats et récupérer après les erreurs. Lire la documentation officielle de Git en parallèle de la pratique sur un dépôt jetable est la façon la plus rapide d'intérioriser les subtilités. La plupart des problèmes de production avec Git proviennent de l'une de trois causes : comportement par défaut surprenant, opérations réseau partielles, ou réécriture d'historique déjà partagé. Un modèle mental fonctionnel des effets de bord de <code>git instaweb</code> aide à éviter les trois.</p>
        <h2>Options courantes</h2>
    <table>
      <thead><tr><th>Option</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>--httpd=&lt;daemon&gt;</code></td><td>Web server to use.</td></tr>
        <tr><td><code>--port=&lt;n&gt;</code></td><td>Port to listen on (default 1234).</td></tr>
        <tr><td><code>--start</code></td><td>Start the server.</td></tr>
        <tr><td><code>--stop</code></td><td>Stop the server.</td></tr>
        <tr><td><code>--restart</code></td><td>Restart it.</td></tr>
        <tr><td><code>--browser=&lt;cmd&gt;</code></td><td>Browser to open.</td></tr>
      </tbody>
    </table>
    <h2>Exemples</h2>
    <pre><code>git instaweb --httpd=webrick
    # Start gitweb backed by Ruby's WEBrick
    
    git instaweb --port=8080 --start
    # On a custom port
    
    git instaweb --stop
    # Tear down
    
    git config --global instaweb.httpd webrick
    # Save default for future invocations</code></pre>
    <h2>Erreurs fréquentes</h2>
    <p>Missing dependencies (Perl modules for gitweb, the chosen httpd) cause cryptic errors. Some distros ship gitweb in a separate package. For modern needs, consider <code>cgit</code> or hosted services.</p>
    <h2>Commandes liées</h2>
    <p><code>gitweb</code>, <code>git daemon</code>, <code>git http-backend</code>, <code>git config</code></p>
    

- source_title: "git add -p — Interactive patch staging"
  title: "git add -p — Staging de patch interactif"
  langcode: fr
  body: |
    <h2>Synopsis</h2>
    <pre><code>git add -p [&lt;path&gt;...]
    git add --patch [&lt;path&gt;...]</code></pre>
    <h2>Description</h2>
    <p>The <code>git add -p</code> command launches an interactive interface that walks through each "hunk" of changes in your working tree, asking you to decide for each: stage, skip, split, edit, etc. This is the secret weapon for crafting clean, atomic commits when your working tree contains a mixture of related and unrelated changes.</p>
    <p>The interactive prompt accepts single-letter commands: <code>y</code> (yes, stage this hunk), <code>n</code> (no, skip), <code>s</code> (split into smaller hunks), <code>e</code> (edit the hunk manually), <code>q</code> (quit), <code>?</code> (help), and several others. Mastering <code>add -p</code> is one of the highest-leverage skills for producing reviewable history.</p>
    <p>Dans l'usage quotidien, <code>git add -p</code> s'intègre étroitement avec les alias de shell, les plugins d'éditeur et l'intégration continue. Les utilisateurs avancés ajoutent souvent des alias combinant les flags qu'ils passent toujours, ou enveloppent la commande dans des scripts qui appliquent les conventions d'équipe. Le formatage de la sortie peut être personnalisé via la configuration Git — pretty formats, schémas de couleurs et comportement du pager sont tous ajustables. Quand quelque chose tourne mal, la première étape de diagnostic est généralement de relancer la commande avec <code>GIT_TRACE=1</code> dans l'environnement, ce qui révèle les appels de plomberie sous-jacents. Pour les situations inhabituelles, la sortie <code>--help</code> (<code>git add -p --help</code>) ouvre la page de manuel complète avec les détails de chaque option, y compris celles rarement utilisées dans les workflows ordinaires mais essentielles pour le débogage ou le scripting à grande échelle.</p><p>Comprendre comment <code>git add -p</code> interagit avec le reste du modèle de données de Git — la base d'objets, l'index, les refs et l'arborescence de travail — est rentable. Chaque commande opère sur un sous-ensemble de ces pièces, et savoir laquelle elle touche aide à prédire les résultats et récupérer après les erreurs. Lire la documentation officielle de Git en parallèle de la pratique sur un dépôt jetable est la façon la plus rapide d'intérioriser les subtilités. La plupart des problèmes de production avec Git proviennent de l'une de trois causes : comportement par défaut surprenant, opérations réseau partielles, ou réécriture d'historique déjà partagé. Un modèle mental fonctionnel des effets de bord de <code>git add -p</code> aide à éviter les trois.</p>
        <h2>Options courantes</h2>
    <table>
      <thead><tr><th>Interactive command</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>y</code></td><td>Stage this hunk.</td></tr>
        <tr><td><code>n</code></td><td>Don't stage this hunk.</td></tr>
        <tr><td><code>s</code></td><td>Split into smaller hunks.</td></tr>
        <tr><td><code>e</code></td><td>Manually edit the hunk.</td></tr>
        <tr><td><code>a</code></td><td>Stage this and all remaining hunks in this file.</td></tr>
        <tr><td><code>d</code></td><td>Skip this and all remaining hunks in this file.</td></tr>
        <tr><td><code>q</code></td><td>Quit; don't stage further hunks.</td></tr>
        <tr><td><code>?</code></td><td>Show help.</td></tr>
      </tbody>
    </table>
    <h2>Exemples</h2>
    <pre><code>git add -p
    # Walk through every changed file's hunks
    
    git add -p src/auth.go
    # Restrict to one file
    
    # Inside the prompt:
    # Press 's' to split a large hunk into smaller ones
    # Press 'e' to manually edit the hunk text
    # Press 'y' or 'n' to accept or skip
    
    git diff --cached
    # Review what's now staged</code></pre>
    <h2>Erreurs fréquentes</h2>
    <p>Editing a hunk with <code>e</code> requires understanding the unified diff format — adding a line means the new file has it, removing a context line means the new file lacks it. Mistakes here can produce confusing index state. Always verify with <code>git diff --cached</code> after.</p>
    <h2>Commandes liées</h2>
    <p><code>git add</code>, <code>git stash -p</code>, <code>git restore -p</code>, <code>git checkout -p</code></p>
    

- source_title: "git update-index — Register file contents in the working tree to the index"
  title: "git update-index — Enregistrer le contenu des fichiers dans l'index"
  langcode: fr
  body: |
    <h2>Synopsis</h2>
    <pre><code>git update-index [--add] [--remove] [--refresh] [--assume-unchanged] &lt;file&gt;...</code></pre>
    <h2>Description</h2>
    <p>The <code>git update-index</code> command is the plumbing behind <code>git add</code>. It records file contents in the index by SHA, manages flags like <code>assume-unchanged</code> and <code>skip-worktree</code>, and updates index timestamps. Most porcelain operations call into it.</p>
    <p>Dans l'usage quotidien, <code>git update-index</code> s'intègre étroitement avec les alias de shell, les plugins d'éditeur et l'intégration continue. Les utilisateurs avancés ajoutent souvent des alias combinant les flags qu'ils passent toujours, ou enveloppent la commande dans des scripts qui appliquent les conventions d'équipe. Le formatage de la sortie peut être personnalisé via la configuration Git — pretty formats, schémas de couleurs et comportement du pager sont tous ajustables. Quand quelque chose tourne mal, la première étape de diagnostic est généralement de relancer la commande avec <code>GIT_TRACE=1</code> dans l'environnement, ce qui révèle les appels de plomberie sous-jacents. Pour les situations inhabituelles, la sortie <code>--help</code> (<code>git update-index --help</code>) ouvre la page de manuel complète avec les détails de chaque option, y compris celles rarement utilisées dans les workflows ordinaires mais essentielles pour le débogage ou le scripting à grande échelle.</p><p>Comprendre comment <code>git update-index</code> interagit avec le reste du modèle de données de Git — la base d'objets, l'index, les refs et l'arborescence de travail — est rentable. Chaque commande opère sur un sous-ensemble de ces pièces, et savoir laquelle elle touche aide à prédire les résultats et récupérer après les erreurs. Lire la documentation officielle de Git en parallèle de la pratique sur un dépôt jetable est la façon la plus rapide d'intérioriser les subtilités. La plupart des problèmes de production avec Git proviennent de l'une de trois causes : comportement par défaut surprenant, opérations réseau partielles, ou réécriture d'historique déjà partagé. Un modèle mental fonctionnel des effets de bord de <code>git update-index</code> aide à éviter les trois.</p>
        <h2>When to Use</h2>
    <p>Most users never need this directly. Reach for it when you want behaviors not exposed by porcelain: marking a file as <code>assume-unchanged</code> to avoid noisy <code>status</code> output for a config file you intentionally modify locally; or <code>skip-worktree</code> for sparse-checkout-like scenarios.</p>
    <h2>Options courantes</h2>
    <table>
      <thead><tr><th>Option</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>--add</code></td><td>Add files not yet in the index.</td></tr>
        <tr><td><code>--remove</code></td><td>Remove files from the index.</td></tr>
        <tr><td><code>--refresh</code></td><td>Refresh stat info without changing content.</td></tr>
        <tr><td><code>--assume-unchanged</code></td><td>Tell Git not to check this file for changes.</td></tr>
        <tr><td><code>--no-assume-unchanged</code></td><td>Reverse the flag.</td></tr>
        <tr><td><code>--skip-worktree</code></td><td>Make Git ignore working-tree changes.</td></tr>
        <tr><td><code>--chmod=(+|-)x</code></td><td>Change executable bit.</td></tr>
        <tr><td><code>--cacheinfo &lt;mode&gt; &lt;sha&gt; &lt;path&gt;</code></td><td>Manually splice an entry into the index.</td></tr>
      </tbody>
    </table>
    <h2>Exemples</h2>
    <pre><code>git update-index --assume-unchanged config/local.yml
    # Stop tracking local edits to a config file
    
    git update-index --no-assume-unchanged config/local.yml
    # Resume normal tracking
    
    git update-index --chmod=+x scripts/deploy.sh
    # Mark a script executable in the index
    
    git update-index --refresh
    # Refresh stat info; useful after touching files</code></pre>
    <h2>Erreurs fréquentes</h2>
    <p><code>--assume-unchanged</code> is meant as a performance optimization, not as <code>.gitignore</code> for already-tracked files. If teammates need the file unchanged, use a config-template approach instead. Misuse causes bugs where tracked changes go unnoticed.</p>
    <h2>Commandes liées</h2>
    <p><code>git add</code>, <code>git rm</code>, <code>git ls-files</code>, <code>git read-tree</code></p>
    

- source_title: "git read-tree — Read tree information into the index"
  title: "git read-tree — Lire les informations d'un tree dans l'index"
  langcode: fr
  body: |
    <h2>Synopsis</h2>
    <pre><code>git read-tree [-m | -u | --reset] &lt;tree-ish&gt;...</code></pre>
    <h2>Description</h2>
    <p>The <code>git read-tree</code> command loads tree contents into the index. Variants support merging up to three trees (a base, ours, theirs) for use during merges. <code>git checkout</code>, <code>git merge</code>, and <code>git reset</code> all use <code>read-tree</code> internally.</p>
    <p>Dans l'usage quotidien, <code>git read-tree</code> s'intègre étroitement avec les alias de shell, les plugins d'éditeur et l'intégration continue. Les utilisateurs avancés ajoutent souvent des alias combinant les flags qu'ils passent toujours, ou enveloppent la commande dans des scripts qui appliquent les conventions d'équipe. Le formatage de la sortie peut être personnalisé via la configuration Git — pretty formats, schémas de couleurs et comportement du pager sont tous ajustables. Quand quelque chose tourne mal, la première étape de diagnostic est généralement de relancer la commande avec <code>GIT_TRACE=1</code> dans l'environnement, ce qui révèle les appels de plomberie sous-jacents. Pour les situations inhabituelles, la sortie <code>--help</code> (<code>git read-tree --help</code>) ouvre la page de manuel complète avec les détails de chaque option, y compris celles rarement utilisées dans les workflows ordinaires mais essentielles pour le débogage ou le scripting à grande échelle.</p><p>Comprendre comment <code>git read-tree</code> interagit avec le reste du modèle de données de Git — la base d'objets, l'index, les refs et l'arborescence de travail — est rentable. Chaque commande opère sur un sous-ensemble de ces pièces, et savoir laquelle elle touche aide à prédire les résultats et récupérer après les erreurs. Lire la documentation officielle de Git en parallèle de la pratique sur un dépôt jetable est la façon la plus rapide d'intérioriser les subtilités. La plupart des problèmes de production avec Git proviennent de l'une de trois causes : comportement par défaut surprenant, opérations réseau partielles, ou réécriture d'historique déjà partagé. Un modèle mental fonctionnel des effets de bord de <code>git read-tree</code> aide à éviter les trois.</p>
        <h2>When to Use</h2>
    <p>Most users never need this. It's relevant for implementing custom merge tools, scripts that build the index from arbitrary trees, or for the <code>git read-tree --prefix=&lt;dir&gt;</code> trick to merge a subtree.</p>
    <h2>Options courantes</h2>
    <table>
      <thead><tr><th>Option</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>-m</code></td><td>Three-way merge tree mode.</td></tr>
        <tr><td><code>-u</code></td><td>Update working tree to match index.</td></tr>
        <tr><td><code>--reset</code></td><td>Behave like <code>reset --hard</code> for the index.</td></tr>
        <tr><td><code>--prefix=&lt;dir&gt;</code></td><td>Read tree into a subdirectory.</td></tr>
        <tr><td><code>--empty</code></td><td>Empty the index.</td></tr>
        <tr><td><code>-i</code></td><td>Don't update working tree.</td></tr>
      </tbody>
    </table>
    <h2>Exemples</h2>
    <pre><code>git read-tree --empty
    # Clear the index
    
    git read-tree HEAD
    # Re-populate index from HEAD's tree
    
    git read-tree --prefix=lib/ -u other-branch:src
    # Splice the src/ tree of another branch into lib/
    
    git read-tree -m HEAD origin/main
    # Merge two trees into the index (low-level merge)</code></pre>
    <h2>Erreurs fréquentes</h2>
    <p>Calling <code>read-tree</code> without <code>-u</code> leaves the working tree out of sync with the index, surprising subsequent operations. Doing this in a busy worktree can cause confusing diffs.</p>
