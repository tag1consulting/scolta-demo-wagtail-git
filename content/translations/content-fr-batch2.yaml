# Maitriser Git - Traductions francaises batch 2
# 80 pages : Reference des commandes

- source_title: "git init — Create a new Git repository"
  title: "git init — Créer un nouveau dépôt Git"
  langcode: fr
  body: |
    <h2>Synopsis</h2>
    <pre><code>git init [--bare] [--initial-branch=&lt;name&gt;] [--template=&lt;dir&gt;] [directory]</code></pre>
    <h2>Description</h2>
    <p>The <code>git init</code> command creates a new, empty Git repository or reinitializes an existing one. It is typically the first command you run when you want to start tracking a project with Git. The command creates a hidden <code>.git</code> directory containing all the metadata Git needs: the object database, references, configuration, hooks, and the index. Without this directory, Git has no place to store history.</p>
    <p>Running <code>git init</code> in an existing repository is safe — it will not overwrite existing objects or refs. Instead, it will reinitialize templates and ensure the directory structure is intact. By default, modern Git creates a repository with the branch name configured by <code>init.defaultBranch</code>, which is usually <code>main</code> on new installations.</p>
    <p>Beyond the default behavior, <code>git init</code> respects the <code>core.hooksPath</code> setting if you keep a centralized hooks directory, and the <code>init.templateDir</code> config to copy custom hooks and exclude files into every new repository. On filesystems where case sensitivity matters, <code>core.ignoreCase</code> is set automatically based on detection at init time. Teams that frequently bootstrap new services often script the post-init steps: setting the default branch, adding a license file, configuring the gitignore template, and setting up a remote — all immediately after running <code>git init</code>. Understanding what files <code>.git/</code> contains (HEAD, config, objects/, refs/, hooks/) demystifies later operations and makes recovery from accidents much easier.</p>
        <h2>Options courantes</h2>
    <table>
      <thead><tr><th>Option</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>--bare</code></td><td>Créer un dépôt nu sans arborescence de travail, adapté à l'hébergement sur un serveur.</td></tr>
        <tr><td><code>--initial-branch=&lt;name&gt;</code> / <code>-b</code></td><td>Définir le nom de la branche initiale (défaut <code>main</code>).</td></tr>
        <tr><td><code>--template=&lt;dir&gt;</code></td><td>Utiliser un répertoire de modèles personnalisé pour les hooks et la config.</td></tr>
        <tr><td><code>--shared[=&lt;perms&gt;]</code></td><td>Permettre au dépôt d'être partagé par un groupe Unix.</td></tr>
        <tr><td><code>--separate-git-dir=&lt;dir&gt;</code></td><td>Stocker les données Git réelles dans un répertoire séparé, en laissant un <code>.git</code> fichier qui pointe vers lui.</td></tr>
        <tr><td><code>-q</code>, <code>--quiet</code></td><td>Supprimer la sortie informationnelle.</td></tr>
      </tbody>
    </table>
    <h2>Exemples</h2>
    <pre><code>git init
    # Initialiser un dépôt dans le répertoire courant
    
    git init my-project
    # Créer un nouveau répertoire et initialiser un dépôt à l'intérieur
    
    git init --bare /srv/git/myproject.git
    # Créer un dépôt nu à héberger sur un serveur
    
    git init -b trunk
    # Initialiser avec la branche initiale nommée "trunk" au lieu de « main »</code></pre>
    <h2>Erreurs fréquentes</h2>
    <p>A frequent mistake is running <code>git init</code> in your home directory by accident, which turns your entire home folder into a repository. Always check your current directory before running it. Another pitfall is initializing a repo inside an existing repo's working tree — this creates nested repos that can confuse tools and humans alike. If you accidentally created an unwanted repo, simply remove the <code>.git</code> directory to undo it.</p>
    <h2>Commandes liées</h2>
    <p><code>git clone</code>, <code>git config</code>, <code>git remote</code></p>
    

- source_title: "git clone — Copy a repository from a remote source"
  title: "git clone — Copier un dépôt depuis une source distante"
  langcode: fr
  body: |
    <h2>Synopsis</h2>
    <pre><code>git clone [--branch &lt;name&gt;] [--depth &lt;n&gt;] [--recurse-submodules] &lt;url&gt; [directory]</code></pre>
    <h2>Description</h2>
    <p>The <code>git clone</code> command copies an existing repository (typically from a remote server) into a new local directory. It performs three actions: it creates a new directory, runs <code>git init</code> inside it, and then fetches all branches and history from the remote. After cloning, the remote is automatically configured as <code>origin</code>, and the default branch is checked out into the working tree.</p>
    <p>Cloning supports multiple protocols: HTTPS (most common, easiest with credential helpers), SSH (preferred for write access using key-based auth), and the legacy <code>git://</code> protocol. For very large repositories, partial clones, shallow clones, and sparse checkouts can dramatically reduce the amount of data transferred.</p>
    <p>Authentication is one of the most common stumbling blocks. With HTTPS, modern Git uses credential helpers (Keychain on macOS, Credential Manager on Windows, libsecret on Linux) to cache tokens or passwords securely. With SSH, your local SSH agent supplies the key — make sure <code>ssh-add</code> has loaded it. After cloning, <code>git config --get remote.origin.url</code> confirms what was actually configured. For monorepo or supercomputer-scale repositories, partial clone (<code>--filter=blob:none</code>) combined with sparse checkout (<code>git sparse-checkout init --cone</code>) lets you work with just a slice of the project, reducing both clone time and on-disk footprint dramatically. CI pipelines benefit further from <code>--depth=1</code> and <code>--no-tags</code> when they don't need history.</p>
        <h2>Options courantes</h2>
    <table>
      <thead><tr><th>Option</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>--branch &lt;name&gt;</code> / <code>-b</code></td><td>Faire le checkout de la branche ou du tag nommé au lieu du défaut.</td></tr>
        <tr><td><code>--depth &lt;n&gt;</code></td><td>Créer un clone shallow avec un historique tronqué.</td></tr>
        <tr><td><code>--single-branch</code></td><td>Cloner uniquement l'historique d'une seule branche.</td></tr>
        <tr><td><code>--recurse-submodules</code></td><td>Initialiser et cloner les sous-modules immédiatement après le clone principal.</td></tr>
        <tr><td><code>--filter=blob:none</code></td><td>Créer un clone partiel sans contenu blob (récupéré paresseusement à la demande).</td></tr>
        <tr><td><code>--bare</code></td><td>Faire un clone nu sans arborescence de travail.</td></tr>
        <tr><td><code>--mirror</code></td><td>Configurer un miroir avec toutes les refs, adapté aux sauvegardes.</td></tr>
      </tbody>
    </table>
    <h2>Exemples</h2>
    <pre><code>git clone https://github.com/user/project.git
    # Clone standard via HTTPS
    
    git clone git@github.com:user/project.git my-fork
    # Clone via SSH dans un répertoire spécifique
    
    git clone --depth 1 --branch v2.0 https://github.com/user/project.git
    # Clone shallow d'un tag spécifique, utile pour la CI
    
    git clone --filter=blob:none https://github.com/torvalds/linux.git
    # Clone partiel pour énormes dépôts — blobs fetchés à la demande</code></pre>
    <h2>Erreurs fréquentes</h2>
    <p>Cloning a giant repository without filters can take minutes or hours and consume gigabytes. For exploration or CI builds, prefer <code>--depth 1</code>. Another mistake is cloning over HTTPS when you intend to push changes — without credential setup, every push will prompt for a password. Use SSH or a credential helper for write access. Finally, be aware that <code>--single-branch</code> clones cannot easily access other branches without reconfiguring the remote.</p>
    <h2>Commandes liées</h2>
    <p><code>git init</code>, <code>git fetch</code>, <code>git remote</code>, <code>git submodule</code></p>
    

- source_title: "git add — Stage changes for the next commit"
  title: "git add — Stager les changements pour le prochain commit"
  langcode: fr
  body: |
    <h2>Synopsis</h2>
    <pre><code>git add [-p] [-A] [-u] [--] [&lt;pathspec&gt;...]</code></pre>
    <h2>Description</h2>
    <p>The <code>git add</code> command moves changes from your working tree into the staging area (also called the index). The staging area is a snapshot of what will go into the next commit. By staging changes explicitly, Git lets you craft commits that contain exactly the work you want to record — even if your working tree has other unrelated edits in progress.</p>
    <p><code>git add</code> can stage entire files, parts of files (with <code>-p</code>), or directories. It does not commit anything; it only updates the index. The most common workflow is: edit, <code>git status</code>, <code>git add</code>, <code>git commit</code>. Mastering <code>git add</code>, especially its interactive modes, is one of the best ways to make your commit history readable and easy to review.</p>
    <p>Dans l'usage quotidien, <code>git add</code> s'intègre étroitement avec les alias de shell, les plugins d'éditeur et l'intégration continue. Les utilisateurs avancés ajoutent souvent des alias combinant les flags qu'ils passent toujours, ou enveloppent la commande dans des scripts qui appliquent les conventions d'équipe. Le formatage de la sortie peut être personnalisé via la configuration Git — pretty formats, schémas de couleurs et comportement du pager sont tous ajustables. Quand quelque chose tourne mal, la première étape de diagnostic est généralement de relancer la commande avec <code>GIT_TRACE=1</code> dans l'environnement, ce qui révèle les appels de plomberie sous-jacents. Pour les situations inhabituelles, la sortie <code>--help</code> (<code>git add --help</code>) ouvre la page de manuel complète avec les détails de chaque option, y compris celles rarement utilisées dans les workflows ordinaires mais essentielles pour le débogage ou le scripting à grande échelle.</p><p>Comprendre comment <code>git add</code> interagit avec le reste du modèle de données de Git — la base d'objets, l'index, les refs et l'arborescence de travail — est rentable. Chaque commande opère sur un sous-ensemble de ces pièces, et savoir laquelle elle touche aide à prédire les résultats et récupérer après les erreurs. Lire la documentation officielle de Git en parallèle de la pratique sur un dépôt jetable est la façon la plus rapide d'intérioriser les subtilités. La plupart des problèmes de production avec Git proviennent de l'une de trois causes : comportement par défaut surprenant, opérations réseau partielles, ou réécriture d'historique déjà partagé. Un modèle mental fonctionnel des effets de bord de <code>git add</code> aide à éviter les trois.</p>
        <h2>Options courantes</h2>
    <table>
      <thead><tr><th>Option</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>-A</code>, <code>--all</code></td><td>Stager tous les changements de l'arborescence, y compris suppressions et nouveaux fichiers.</td></tr>
        <tr><td><code>-u</code>, <code>--update</code></td><td>Stager modifications et suppressions des fichiers suivis uniquement — ignore les nouveaux fichiers.</td></tr>
        <tr><td><code>-p</code>, <code>--patch</code></td><td>Choisir interactivement les hunks à stager.</td></tr>
        <tr><td><code>-n</code>, <code>--dry-run</code></td><td>Afficher ce qui serait stagé sans le stager réellement.</td></tr>
        <tr><td><code>-f</code>, <code>--force</code></td><td>Ajouter les fichiers même s'ils correspondent à <code>.gitignore</code>.</td></tr>
        <tr><td><code>-i</code>, <code>--interactive</code></td><td>Ouvrir une interface menu pour le staging.</td></tr>
        <tr><td><code>--intent-to-add</code> / <code>-N</code></td><td>Enregistrer l'intention d'ajouter un fichier pour que son diff apparaisse.</td></tr>
      </tbody>
    </table>
    <h2>Exemples</h2>
    <pre><code>git add README.md src/main.c
    # Stager deux fichiers spécifiques
    
    git add -A
    # Tout stager : nouveaux, modifiés, supprimés
    
    git add -p
    # Réviser interactivement et stager les chunks un par un
    
    git add 'src/**/*.js'
    # Stager tous les fichiers JS sous src via un pathspec</code></pre>
    <h2>Erreurs fréquentes</h2>
    <p>Running <code>git add .</code> blindly often stages files you didn't intend — log files, build artifacts, secret keys. Use <code>git status</code> first and consider <code>-p</code> for sensitive changes. Another common confusion: <code>git add -u</code> will not pick up new files, while <code>git add .</code> will. After staging, if you change a file again, those subsequent edits are not staged until you re-run <code>git add</code>.</p>
    <h2>Commandes liées</h2>
    <p><code>git commit</code>, <code>git status</code>, <code>git restore</code>, <code>git reset</code></p>
    

- source_title: "git commit — Record staged changes to the repository"
  title: "git commit — Enregistrer les changements stagés dans le dépôt"
  langcode: fr
  body: |
    <h2>Synopsis</h2>
    <pre><code>git commit [-m &lt;msg&gt;] [-a] [--amend] [--no-verify] [-S]</code></pre>
    <h2>Description</h2>
    <p>The <code>git commit</code> command takes everything currently in the staging area and creates a new commit object in the repository. A commit is an immutable snapshot containing a tree (the file contents), parent pointer(s), author and committer metadata, and a message. Commits are the unit of history in Git: branches are pointers to commits, merges produce commits with multiple parents, and tags label specific commits.</p>
    <p>A good commit message has a short subject line (under 50 characters), a blank line, and an optional body explaining the why. Many teams use conventional commits or other prefix systems. The <code>--amend</code> option modifies the most recent commit, useful for fixing typos in the message or forgetting to stage a file — but never amend a commit that has already been pushed and shared.</p>
    <p>Dans l'usage quotidien, <code>git commit</code> s'intègre étroitement avec les alias de shell, les plugins d'éditeur et l'intégration continue. Les utilisateurs avancés ajoutent souvent des alias combinant les flags qu'ils passent toujours, ou enveloppent la commande dans des scripts qui appliquent les conventions d'équipe. Le formatage de la sortie peut être personnalisé via la configuration Git — pretty formats, schémas de couleurs et comportement du pager sont tous ajustables. Quand quelque chose tourne mal, la première étape de diagnostic est généralement de relancer la commande avec <code>GIT_TRACE=1</code> dans l'environnement, ce qui révèle les appels de plomberie sous-jacents. Pour les situations inhabituelles, la sortie <code>--help</code> (<code>git commit --help</code>) ouvre la page de manuel complète avec les détails de chaque option, y compris celles rarement utilisées dans les workflows ordinaires mais essentielles pour le débogage ou le scripting à grande échelle.</p><p>Comprendre comment <code>git commit</code> interagit avec le reste du modèle de données de Git — la base d'objets, l'index, les refs et l'arborescence de travail — est rentable. Chaque commande opère sur un sous-ensemble de ces pièces, et savoir laquelle elle touche aide à prédire les résultats et récupérer après les erreurs. Lire la documentation officielle de Git en parallèle de la pratique sur un dépôt jetable est la façon la plus rapide d'intérioriser les subtilités. La plupart des problèmes de production avec Git proviennent de l'une de trois causes : comportement par défaut surprenant, opérations réseau partielles, ou réécriture d'historique déjà partagé. Un modèle mental fonctionnel des effets de bord de <code>git commit</code> aide à éviter les trois.</p>
        <h2>Options courantes</h2>
    <table>
      <thead><tr><th>Option</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>-m &lt;msg&gt;</code></td><td>Utiliser le message donné au lieu d'ouvrir un éditeur.</td></tr>
        <tr><td><code>-a</code>, <code>--all</code></td><td>Stager automatiquement les modifications et suppressions des fichiers suivis avant de commiter.</td></tr>
        <tr><td><code>--amend</code></td><td>Remplacer le commit le plus récent par un nouveau.</td></tr>
        <tr><td><code>--no-verify</code></td><td>Sauter les hooks pre-commit et commit-msg.</td></tr>
        <tr><td><code>-S</code>, <code>--gpg-sign</code></td><td>Signer le commit en GPG.</td></tr>
        <tr><td><code>--allow-empty</code></td><td>Autoriser un commit sans changements.</td></tr>
        <tr><td><code>--fixup=&lt;commit&gt;</code></td><td>Créer un commit fixup pour rebase autosquash.</td></tr>
        <tr><td><code>-v</code>, <code>--verbose</code></td><td>Afficher le diff dans l'éditeur de message de commit.</td></tr>
      </tbody>
    </table>
    <h2>Exemples</h2>
    <pre><code>git commit -m "Fix off-by-one error in pagination"
    # Commit rapide avec message d'une ligne
    
    git commit -am "Update README"
    # Stager les changements suivis et commiter en une étape
    
    git commit --amend -m "Better message"
    # Réécrire le message du commit le plus récent
    
    git commit --fixup=abc123
    # Créer un commit fixup à squasher pendant le rebase</code></pre>
    <h2>Erreurs fréquentes</h2>
    <p>Amending a published commit and then force-pushing rewrites history that others may have based work on, causing confusion. Only amend local, unshared commits. Another mistake is committing with <code>-a</code> when untracked files should also be included — <code>-a</code> ignores new files. Finally, never use <code>--no-verify</code> just to bypass failing tests; fix the test or the code instead.</p>
    <h2>Commandes liées</h2>
    <p><code>git add</code>, <code>git status</code>, <code>git log</code>, <code>git revert</code></p>
    

- source_title: "git status — Show the working tree status"
  title: "git status — Afficher l'état de l'arborescence de travail"
  langcode: fr
  body: |
    <h2>Synopsis</h2>
    <pre><code>git status [-s] [-b] [--porcelain[=&lt;version&gt;]] [--ignored]</code></pre>
    <h2>Description</h2>
    <p>The <code>git status</code> command displays the state of the working tree and the staging area. It shows which files are staged for the next commit, which are modified but not staged, and which are untracked. It also reports the current branch, whether it is ahead or behind the upstream, and any ongoing operations such as merges or rebases.</p>
    <p><code>git status</code> is the most-run Git command — it's safe, fast, and informational. Use it constantly to confirm what state your repository is in before making decisions. The default output is human-friendly with color and hints; the <code>--porcelain</code> output is stable, machine-readable, and meant for scripts.</p>
    <p>Dans l'usage quotidien, <code>git status</code> s'intègre étroitement avec les alias de shell, les plugins d'éditeur et l'intégration continue. Les utilisateurs avancés ajoutent souvent des alias combinant les flags qu'ils passent toujours, ou enveloppent la commande dans des scripts qui appliquent les conventions d'équipe. Le formatage de la sortie peut être personnalisé via la configuration Git — pretty formats, schémas de couleurs et comportement du pager sont tous ajustables. Quand quelque chose tourne mal, la première étape de diagnostic est généralement de relancer la commande avec <code>GIT_TRACE=1</code> dans l'environnement, ce qui révèle les appels de plomberie sous-jacents. Pour les situations inhabituelles, la sortie <code>--help</code> (<code>git status --help</code>) ouvre la page de manuel complète avec les détails de chaque option, y compris celles rarement utilisées dans les workflows ordinaires mais essentielles pour le débogage ou le scripting à grande échelle.</p><p>Comprendre comment <code>git status</code> interagit avec le reste du modèle de données de Git — la base d'objets, l'index, les refs et l'arborescence de travail — est rentable. Chaque commande opère sur un sous-ensemble de ces pièces, et savoir laquelle elle touche aide à prédire les résultats et récupérer après les erreurs. Lire la documentation officielle de Git en parallèle de la pratique sur un dépôt jetable est la façon la plus rapide d'intérioriser les subtilités. La plupart des problèmes de production avec Git proviennent de l'une de trois causes : comportement par défaut surprenant, opérations réseau partielles, ou réécriture d'historique déjà partagé. Un modèle mental fonctionnel des effets de bord de <code>git status</code> aide à éviter les trois.</p>
        <h2>Options courantes</h2>
    <table>
      <thead><tr><th>Option</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>-s</code>, <code>--short</code></td><td>Afficher au format court avec codes de statut à deux caractères.</td></tr>
        <tr><td><code>-b</code>, <code>--branch</code></td><td>Afficher les infos de branche et tracking même au format court.</td></tr>
        <tr><td><code>--porcelain</code></td><td>Sortie stable lisible par machine pour les scripts.</td></tr>
        <tr><td><code>--ignored</code></td><td>Afficher aussi les fichiers ignorés.</td></tr>
        <tr><td><code>-u &lt;mode&gt;</code></td><td>Contrôler comment les fichiers non suivis sont signalés (<code>no</code>, <code>normal</code>, <code>all</code>).</td></tr>
        <tr><td><code>--ahead-behind</code></td><td>Calculer les compteurs avance/retard vs upstream.</td></tr>
      </tbody>
    </table>
    <h2>Exemples</h2>
    <pre><code>git status
    # Statut complet lisible par humain
    
    git status -sb
    # Format compact avec infos de branche
    
    git status --porcelain=v2 --branch
    # Sortie stable pour scripts shell et éditeurs
    
    git status --ignored
    # Inclure les fichiers matchés par .gitignore</code></pre>
    <h2>Erreurs fréquentes</h2>
    <p>Beginners sometimes panic when <code>git status</code> shows many untracked files in a freshly cloned repo with build artifacts. Add a proper <code>.gitignore</code> to filter them out. Another pitfall is parsing the default output in scripts — the format may change between versions and translations. Always use <code>--porcelain</code> for automation. Finally, large untracked directories can slow status considerably; use <code>-uno</code> to skip them.</p>
    <h2>Commandes liées</h2>
    <p><code>git diff</code>, <code>git log</code>, <code>git add</code>, <code>git stash</code></p>
    

- source_title: "git diff — Show changes between commits, trees, or the working tree"
  title: "git diff — Afficher les différences entre commits, trees ou l'arborescence"
  langcode: fr
  body: |
    <h2>Synopsis</h2>
    <pre><code>git diff [&lt;options&gt;] [&lt;commit&gt;] [--] [&lt;path&gt;...]</code></pre>
    <h2>Description</h2>
    <p>The <code>git diff</code> command shows differences between two sets of file content. With no arguments, it compares the working tree against the staging area, showing what is unstaged. With <code>--cached</code> (or <code>--staged</code>), it compares the staging area against the latest commit. With one or two commit arguments, it compares those commits.</p>
    <p>Diffs are central to code review, debugging, and understanding history. Git produces unified diffs by default but can also output word-level diffs, color-moved highlighting, and statistics. For binary files, only a "differ" line is shown unless a binary diff driver is configured.</p>
    <p>Dans l'usage quotidien, <code>git diff</code> s'intègre étroitement avec les alias de shell, les plugins d'éditeur et l'intégration continue. Les utilisateurs avancés ajoutent souvent des alias combinant les flags qu'ils passent toujours, ou enveloppent la commande dans des scripts qui appliquent les conventions d'équipe. Le formatage de la sortie peut être personnalisé via la configuration Git — pretty formats, schémas de couleurs et comportement du pager sont tous ajustables. Quand quelque chose tourne mal, la première étape de diagnostic est généralement de relancer la commande avec <code>GIT_TRACE=1</code> dans l'environnement, ce qui révèle les appels de plomberie sous-jacents. Pour les situations inhabituelles, la sortie <code>--help</code> (<code>git diff --help</code>) ouvre la page de manuel complète avec les détails de chaque option, y compris celles rarement utilisées dans les workflows ordinaires mais essentielles pour le débogage ou le scripting à grande échelle.</p><p>Comprendre comment <code>git diff</code> interagit avec le reste du modèle de données de Git — la base d'objets, l'index, les refs et l'arborescence de travail — est rentable. Chaque commande opère sur un sous-ensemble de ces pièces, et savoir laquelle elle touche aide à prédire les résultats et récupérer après les erreurs. Lire la documentation officielle de Git en parallèle de la pratique sur un dépôt jetable est la façon la plus rapide d'intérioriser les subtilités. La plupart des problèmes de production avec Git proviennent de l'une de trois causes : comportement par défaut surprenant, opérations réseau partielles, ou réécriture d'historique déjà partagé. Un modèle mental fonctionnel des effets de bord de <code>git diff</code> aide à éviter les trois.</p>
        <h2>Options courantes</h2>
    <table>
      <thead><tr><th>Option</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>--cached</code> / <code>--staged</code></td><td>Comparer l'index à HEAD au lieu de l'arborescence à l'index.</td></tr>
        <tr><td><code>--stat</code></td><td>Afficher un résumé insertions/suppressions par fichier.</td></tr>
        <tr><td><code>--name-only</code></td><td>Lister seulement les noms de fichiers qui diffèrent.</td></tr>
        <tr><td><code>--word-diff</code></td><td>Mettre en évidence les changements au niveau du mot.</td></tr>
        <tr><td><code>-w</code>, <code>--ignore-all-space</code></td><td>Ignorer les différences d'espacement.</td></tr>
        <tr><td><code>--color-moved</code></td><td>Mettre en évidence les blocs de code déplacés.</td></tr>
        <tr><td><code>-U&lt;n&gt;</code></td><td>Show <code>n</code> lignes de contexte (défaut 3).</td></tr>
      </tbody>
    </table>
    <h2>Exemples</h2>
    <pre><code>git diff
    # Changements non stagés dans l'arborescence
    
    git diff --cached
    # Changements stagés pour le prochain commit
    
    git diff main..feature
    # Toutes les différences entre deux branches
    
    git diff HEAD~3 HEAD -- src/
    # Trois derniers commits, limités à src/</code></pre>
    <h2>Erreurs fréquentes</h2>
    <p>Forgetting <code>--cached</code> when reviewing what is about to be committed is a classic confusion. Another is using two-dot vs three-dot range syntax incorrectly: <code>A..B</code> is "differences from A to B," while <code>A...B</code> is "differences from the merge base to B." Massive whitespace-only diffs after editor changes can be tamed with <code>-w</code>.</p>
    <h2>Commandes liées</h2>
    <p><code>git status</code>, <code>git log -p</code>, <code>git show</code>, <code>git range-diff</code></p>
    

- source_title: "git rm — Remove files from the working tree and index"
  title: "git rm — Supprimer des fichiers de l'arborescence et de l'index"
  langcode: fr
  body: |
    <h2>Synopsis</h2>
    <pre><code>git rm [-f] [-r] [--cached] [--] &lt;file&gt;...</code></pre>
    <h2>Description</h2>
    <p>The <code>git rm</code> command removes files from the working tree and the index in one step, staging the deletion for the next commit. Using <code>git rm</code> is more convenient than removing the file with <code>rm</code> and then running <code>git add</code> — although both approaches produce the same end state.</p>
    <p>The <code>--cached</code> flag is particularly useful: it removes the file from the index without deleting it from the working tree. This is the right tool when you accidentally committed a file (such as a config file with secrets, or a build artifact) and want to stop tracking it but keep it on disk.</p>
    <p>Dans l'usage quotidien, <code>git rm</code> s'intègre étroitement avec les alias de shell, les plugins d'éditeur et l'intégration continue. Les utilisateurs avancés ajoutent souvent des alias combinant les flags qu'ils passent toujours, ou enveloppent la commande dans des scripts qui appliquent les conventions d'équipe. Le formatage de la sortie peut être personnalisé via la configuration Git — pretty formats, schémas de couleurs et comportement du pager sont tous ajustables. Quand quelque chose tourne mal, la première étape de diagnostic est généralement de relancer la commande avec <code>GIT_TRACE=1</code> dans l'environnement, ce qui révèle les appels de plomberie sous-jacents. Pour les situations inhabituelles, la sortie <code>--help</code> (<code>git rm --help</code>) ouvre la page de manuel complète avec les détails de chaque option, y compris celles rarement utilisées dans les workflows ordinaires mais essentielles pour le débogage ou le scripting à grande échelle.</p><p>Comprendre comment <code>git rm</code> interagit avec le reste du modèle de données de Git — la base d'objets, l'index, les refs et l'arborescence de travail — est rentable. Chaque commande opère sur un sous-ensemble de ces pièces, et savoir laquelle elle touche aide à prédire les résultats et récupérer après les erreurs. Lire la documentation officielle de Git en parallèle de la pratique sur un dépôt jetable est la façon la plus rapide d'intérioriser les subtilités. La plupart des problèmes de production avec Git proviennent de l'une de trois causes : comportement par défaut surprenant, opérations réseau partielles, ou réécriture d'historique déjà partagé. Un modèle mental fonctionnel des effets de bord de <code>git rm</code> aide à éviter les trois.</p>
        <h2>Options courantes</h2>
    <table>
      <thead><tr><th>Option</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>-f</code>, <code>--force</code></td><td>Outrepasser les vérifications de sécurité si le fichier a des changements non commités.</td></tr>
        <tr><td><code>-r</code></td><td>Supprimer récursivement les répertoires.</td></tr>
        <tr><td><code>--cached</code></td><td>Retirer de l'index seulement ; laisser le fichier de l'arborescence intact.</td></tr>
        <tr><td><code>-n</code>, <code>--dry-run</code></td><td>Afficher ce qui serait supprimé sans le faire.</td></tr>
        <tr><td><code>--ignore-unmatch</code></td><td>Sortir avec zéro même si aucun fichier ne correspond.</td></tr>
        <tr><td><code>-q</code>, <code>--quiet</code></td><td>Supprimer la sortie.</td></tr>
      </tbody>
    </table>
    <h2>Exemples</h2>
    <pre><code>git rm old-file.txt
    # Supprimer le fichier et stager la suppression
    
    git rm -r build/
    # Supprimer récursivement un répertoire du dépôt
    
    git rm --cached secrets.env
    # Arrêter de suivre un fichier mais le garder localement
    # Puis l'ajouter à .gitignore !
    
    git rm -n '*.log'
    # Prévisualiser quels fichiers .log seraient supprimés</code></pre>
    <h2>Erreurs fréquentes</h2>
    <p>The biggest gotcha is forgetting that <code>git rm --cached</code> only stops future tracking — past commits still contain the file. If you need to purge a secret from history, use <code>git filter-repo</code> or BFG. Another mistake is running <code>git rm</code> on a file with unstaged modifications without realizing those changes are lost. Use <code>-n</code> first when in doubt.</p>
    <h2>Commandes liées</h2>
    <p><code>git add</code>, <code>git mv</code>, <code>git restore</code>, <code>git filter-repo</code></p>
    

- source_title: "git mv — Move or rename a tracked file"
  title: "git mv — Déplacer ou renommer un fichier suivi"
  langcode: fr
  body: |
    <h2>Synopsis</h2>
    <pre><code>git mv [-f] [-k] [-n] &lt;source&gt; &lt;destination&gt;</code></pre>
    <h2>Description</h2>
    <p>The <code>git mv</code> command renames or moves a tracked file and stages the change. Internally it is equivalent to running <code>mv</code> followed by <code>git add</code> on the new path and <code>git rm</code> on the old. The convenience is that the rename happens in a single atomic step that is unambiguously staged.</p>
    <p>Note: Git does not actually store renames as first-class operations. Instead, it detects renames by comparing file content similarity at diff and log time. So whether you use <code>git mv</code> or plain <code>mv</code> + <code>git add</code> + <code>git rm</code>, the resulting commit is identical, and rename detection works the same way.</p>
    <p>Dans l'usage quotidien, <code>git mv</code> s'intègre étroitement avec les alias de shell, les plugins d'éditeur et l'intégration continue. Les utilisateurs avancés ajoutent souvent des alias combinant les flags qu'ils passent toujours, ou enveloppent la commande dans des scripts qui appliquent les conventions d'équipe. Le formatage de la sortie peut être personnalisé via la configuration Git — pretty formats, schémas de couleurs et comportement du pager sont tous ajustables. Quand quelque chose tourne mal, la première étape de diagnostic est généralement de relancer la commande avec <code>GIT_TRACE=1</code> dans l'environnement, ce qui révèle les appels de plomberie sous-jacents. Pour les situations inhabituelles, la sortie <code>--help</code> (<code>git mv --help</code>) ouvre la page de manuel complète avec les détails de chaque option, y compris celles rarement utilisées dans les workflows ordinaires mais essentielles pour le débogage ou le scripting à grande échelle.</p><p>Comprendre comment <code>git mv</code> interagit avec le reste du modèle de données de Git — la base d'objets, l'index, les refs et l'arborescence de travail — est rentable. Chaque commande opère sur un sous-ensemble de ces pièces, et savoir laquelle elle touche aide à prédire les résultats et récupérer après les erreurs. Lire la documentation officielle de Git en parallèle de la pratique sur un dépôt jetable est la façon la plus rapide d'intérioriser les subtilités. La plupart des problèmes de production avec Git proviennent de l'une de trois causes : comportement par défaut surprenant, opérations réseau partielles, ou réécriture d'historique déjà partagé. Un modèle mental fonctionnel des effets de bord de <code>git mv</code> aide à éviter les trois.</p>
        <h2>Options courantes</h2>
    <table>
      <thead><tr><th>Option</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>-f</code>, <code>--force</code></td><td>Écraser la destination si elle existe.</td></tr>
        <tr><td><code>-k</code></td><td>Sauter les actions de déplacement/renommage qui échoueraient sans erreur.</td></tr>
        <tr><td><code>-n</code>, <code>--dry-run</code></td><td>Afficher ce qui se passerait sans le faire.</td></tr>
        <tr><td><code>-v</code>, <code>--verbose</code></td><td>Rapporter les noms des fichiers déplacés.</td></tr>
      </tbody>
    </table>
    <h2>Exemples</h2>
    <pre><code>git mv old-name.txt new-name.txt
    # Renommer un fichier en une étape
    
    git mv src/utils.js src/lib/utils.js
    # Déplacer un fichier dans un nouveau répertoire (il doit exister)
    
    git mv -n *.md docs/
    # Prévisualiser le déplacement de tous les .md dans docs/
    
    git mv -f draft.md final.md
    # Forcer l'écrasement si final.md existe déjà</code></pre>
    <h2>Erreurs fréquentes</h2>
    <p>If you rename a file outside of Git (with your editor or <code>mv</code>), Git's rename detection still usually works at diff time — but you must run <code>git add -A</code> to stage both the deletion and the addition. Another issue: case-only renames on case-insensitive filesystems (macOS, Windows) require <code>git mv -f</code> or a two-step rename through a temporary name.</p>
    <h2>Commandes liées</h2>
    <p><code>git add</code>, <code>git rm</code>, <code>git log --follow</code></p>
    

- source_title: "git branch — List, create, or delete branches"
  title: "git branch — Lister, créer ou supprimer des branches"
  langcode: fr
  body: |
    <h2>Synopsis</h2>
    <pre><code>git branch [-a] [-r] [-v] [-d &lt;name&gt;] [-m &lt;old&gt; &lt;new&gt;] [&lt;name&gt; [&lt;start-point&gt;]]</code></pre>
    <h2>Description</h2>
    <p>The <code>git branch</code> command manages branches. With no arguments it lists local branches and marks the current one with an asterisk. Given a name, it creates a new branch pointing at the current HEAD (or at a specified start point). It can also delete, rename, and inspect branches. A branch in Git is a lightweight, movable pointer to a commit — creating one is essentially free, which is why Git workflows encourage many short-lived branches.</p>
    <p>Note: <code>git branch &lt;name&gt;</code> creates a branch but does not switch to it. To create and switch in one step, use <code>git switch -c &lt;name&gt;</code> or <code>git checkout -b &lt;name&gt;</code>. The <code>--track</code> behavior makes a new branch follow a remote branch for push/pull defaults.</p>
    <p>Dans l'usage quotidien, <code>git branch</code> s'intègre étroitement avec les alias de shell, les plugins d'éditeur et l'intégration continue. Les utilisateurs avancés ajoutent souvent des alias combinant les flags qu'ils passent toujours, ou enveloppent la commande dans des scripts qui appliquent les conventions d'équipe. Le formatage de la sortie peut être personnalisé via la configuration Git — pretty formats, schémas de couleurs et comportement du pager sont tous ajustables. Quand quelque chose tourne mal, la première étape de diagnostic est généralement de relancer la commande avec <code>GIT_TRACE=1</code> dans l'environnement, ce qui révèle les appels de plomberie sous-jacents. Pour les situations inhabituelles, la sortie <code>--help</code> (<code>git branch --help</code>) ouvre la page de manuel complète avec les détails de chaque option, y compris celles rarement utilisées dans les workflows ordinaires mais essentielles pour le débogage ou le scripting à grande échelle.</p><p>Comprendre comment <code>git branch</code> interagit avec le reste du modèle de données de Git — la base d'objets, l'index, les refs et l'arborescence de travail — est rentable. Chaque commande opère sur un sous-ensemble de ces pièces, et savoir laquelle elle touche aide à prédire les résultats et récupérer après les erreurs. Lire la documentation officielle de Git en parallèle de la pratique sur un dépôt jetable est la façon la plus rapide d'intérioriser les subtilités. La plupart des problèmes de production avec Git proviennent de l'une de trois causes : comportement par défaut surprenant, opérations réseau partielles, ou réécriture d'historique déjà partagé. Un modèle mental fonctionnel des effets de bord de <code>git branch</code> aide à éviter les trois.</p>
        <h2>Options courantes</h2>
    <table>
      <thead><tr><th>Option</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>-a</code>, <code>--all</code></td><td>Lister les branches locales et de tracking distant.</td></tr>
        <tr><td><code>-r</code>, <code>--remotes</code></td><td>Lister seulement les branches de tracking distant.</td></tr>
        <tr><td><code>-v</code>, <code>--verbose</code></td><td>Afficher le dernier commit sur chaque branche.</td></tr>
        <tr><td><code>-d &lt;name&gt;</code></td><td>Supprimer une branche entièrement mergée.</td></tr>
        <tr><td><code>-D &lt;name&gt;</code></td><td>Forcer la suppression d'une branche même non mergée.</td></tr>
        <tr><td><code>-m &lt;old&gt; &lt;new&gt;</code></td><td>Renommer une branche.</td></tr>
        <tr><td><code>--merged</code> / <code>--no-merged</code></td><td>Filtrer les branches (non) mergées dans HEAD.</td></tr>
        <tr><td><code>--set-upstream-to=&lt;remote&gt;/&lt;branch&gt;</code></td><td>Configurer le tracking pour la branche courante.</td></tr>
      </tbody>
    </table>
    <h2>Exemples</h2>
    <pre><code>git branch
    # Lister les branches locales
    
    git branch feature/login
    # Créer une nouvelle branche depuis HEAD
    
    git branch -d old-feature
    # Supprimer une branche mergée
    
    git branch -m main trunk
    # Renommer la branche locale main en trunk
    
    git branch -a -v
    # Lister toutes les branches avec derniers commits</code></pre>
    <h2>Erreurs fréquentes</h2>
    <p>Using <code>-D</code> to force-delete a branch can lose unmerged commits forever (well, until <code>git reflog</code> expires). Always try <code>-d</code> first. Renaming the current branch with <code>-m</code> works without arguments — <code>git branch -m new-name</code> renames whatever you're on. Forgetting to set upstream tracking after creating a branch means <code>git push</code> may need explicit arguments the first time.</p>
    <h2>Commandes liées</h2>
    <p><code>git switch</code>, <code>git checkout</code>, <code>git merge</code>, <code>git push</code></p>
    

- source_title: "git checkout — Switch branches or restore working tree files"
  title: "git checkout — Changer de branche ou restaurer des fichiers"
  langcode: fr
  body: |
    <h2>Synopsis</h2>
    <pre><code>git checkout [&lt;branch&gt;]
    git checkout -b &lt;new-branch&gt; [&lt;start-point&gt;]
    git checkout [&lt;tree-ish&gt;] -- &lt;file&gt;...</code></pre>
    <h2>Description</h2>
    <p>The <code>git checkout</code> command historically does two unrelated things: switching branches and restoring files. Because of this overload, modern Git introduced <code>git switch</code> for branch operations and <code>git restore</code> for file operations. <code>git checkout</code> still works and remains popular, but new users are encouraged to learn the newer split commands.</p>
    <p>When given a branch name, <code>git checkout</code> moves HEAD to that branch and updates the working tree. When given a path, it overwrites the working-tree file with the version from the index (or from a specified commit). The <code>-b</code> flag creates a new branch and switches to it in one step.</p>
    <p>Dans l'usage quotidien, <code>git checkout</code> s'intègre étroitement avec les alias de shell, les plugins d'éditeur et l'intégration continue. Les utilisateurs avancés ajoutent souvent des alias combinant les flags qu'ils passent toujours, ou enveloppent la commande dans des scripts qui appliquent les conventions d'équipe. Le formatage de la sortie peut être personnalisé via la configuration Git — pretty formats, schémas de couleurs et comportement du pager sont tous ajustables. Quand quelque chose tourne mal, la première étape de diagnostic est généralement de relancer la commande avec <code>GIT_TRACE=1</code> dans l'environnement, ce qui révèle les appels de plomberie sous-jacents. Pour les situations inhabituelles, la sortie <code>--help</code> (<code>git checkout --help</code>) ouvre la page de manuel complète avec les détails de chaque option, y compris celles rarement utilisées dans les workflows ordinaires mais essentielles pour le débogage ou le scripting à grande échelle.</p><p>Comprendre comment <code>git checkout</code> interagit avec le reste du modèle de données de Git — la base d'objets, l'index, les refs et l'arborescence de travail — est rentable. Chaque commande opère sur un sous-ensemble de ces pièces, et savoir laquelle elle touche aide à prédire les résultats et récupérer après les erreurs. Lire la documentation officielle de Git en parallèle de la pratique sur un dépôt jetable est la façon la plus rapide d'intérioriser les subtilités. La plupart des problèmes de production avec Git proviennent de l'une de trois causes : comportement par défaut surprenant, opérations réseau partielles, ou réécriture d'historique déjà partagé. Un modèle mental fonctionnel des effets de bord de <code>git checkout</code> aide à éviter les trois.</p>
        <h2>Options courantes</h2>
    <table>
      <thead><tr><th>Option</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>-b &lt;name&gt;</code></td><td>Créer et basculer sur une nouvelle branche.</td></tr>
        <tr><td><code>-B &lt;name&gt;</code></td><td>Créer ou réinitialiser une branche et basculer dessus.</td></tr>
        <tr><td><code>--track</code></td><td>Configurer le tracking pour une branche distante.</td></tr>
        <tr><td><code>--detach</code></td><td>Faire un checkout d'un commit en état HEAD détaché.</td></tr>
        <tr><td><code>--</code> &lt;path&gt;</td><td>Traiter les arguments suivants comme des chemins, pas des branches.</td></tr>
        <tr><td><code>-f</code>, <code>--force</code></td><td>Abandonner les changements locaux en changeant.</td></tr>
        <tr><td><code>-p</code>, <code>--patch</code></td><td>Sélectionner interactivement les hunks à restaurer.</td></tr>
      </tbody>
    </table>
    <h2>Exemples</h2>
    <pre><code>git checkout main
    # Basculer sur la branche main
    
    git checkout -b feature/api origin/develop
    # Créer une nouvelle branche qui track origin/develop
    
    git checkout HEAD -- src/config.js
    # Abandonner les changements locaux sur un seul fichier
    
    git checkout v1.2.3
    # HEAD détaché sur un tag spécifique</code></pre>
    <h2>Erreurs fréquentes</h2>
    <p>Running <code>git checkout &lt;file&gt;</code> silently overwrites your local edits with no undo. Use <code>git restore</code> instead — it has a clearer name. Detached HEAD state surprises beginners: commits made there belong to no branch and may be lost when you switch away. If you want to keep them, create a branch first.</p>
    <h2>Commandes liées</h2>
    <p><code>git switch</code>, <code>git restore</code>, <code>git branch</code>, <code>git reset</code></p>
    

- source_title: "git switch — Switch branches"
  title: "git switch — Changer de branche"
  langcode: fr
  body: |
    <h2>Synopsis</h2>
    <pre><code>git switch [-c &lt;new-branch&gt;] [--detach] &lt;branch&gt;</code></pre>
    <h2>Description</h2>
    <p>The <code>git switch</code> command, introduced in Git 2.23, is a focused replacement for the branch-switching half of <code>git checkout</code>. It only switches branches (or creates and switches in one step). It refuses to operate on individual files, eliminating the most common source of <code>checkout</code> footguns. If you're learning Git today, prefer <code>git switch</code> for branches and <code>git restore</code> for files.</p>
    <p>Like <code>checkout</code>, <code>switch</code> updates HEAD, the index, and the working tree to match the target branch. It will refuse to switch if doing so would clobber uncommitted changes, unless you pass <code>--force</code>.</p>
    <p>Dans l'usage quotidien, <code>git switch</code> s'intègre étroitement avec les alias de shell, les plugins d'éditeur et l'intégration continue. Les utilisateurs avancés ajoutent souvent des alias combinant les flags qu'ils passent toujours, ou enveloppent la commande dans des scripts qui appliquent les conventions d'équipe. Le formatage de la sortie peut être personnalisé via la configuration Git — pretty formats, schémas de couleurs et comportement du pager sont tous ajustables. Quand quelque chose tourne mal, la première étape de diagnostic est généralement de relancer la commande avec <code>GIT_TRACE=1</code> dans l'environnement, ce qui révèle les appels de plomberie sous-jacents. Pour les situations inhabituelles, la sortie <code>--help</code> (<code>git switch --help</code>) ouvre la page de manuel complète avec les détails de chaque option, y compris celles rarement utilisées dans les workflows ordinaires mais essentielles pour le débogage ou le scripting à grande échelle.</p><p>Comprendre comment <code>git switch</code> interagit avec le reste du modèle de données de Git — la base d'objets, l'index, les refs et l'arborescence de travail — est rentable. Chaque commande opère sur un sous-ensemble de ces pièces, et savoir laquelle elle touche aide à prédire les résultats et récupérer après les erreurs. Lire la documentation officielle de Git en parallèle de la pratique sur un dépôt jetable est la façon la plus rapide d'intérioriser les subtilités. La plupart des problèmes de production avec Git proviennent de l'une de trois causes : comportement par défaut surprenant, opérations réseau partielles, ou réécriture d'historique déjà partagé. Un modèle mental fonctionnel des effets de bord de <code>git switch</code> aide à éviter les trois.</p>
        <h2>Options courantes</h2>
    <table>
      <thead><tr><th>Option</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>-c &lt;name&gt;</code>, <code>--create</code></td><td>Create a new branch and switch to it.</td></tr>
        <tr><td><code>-C &lt;name&gt;</code>, <code>--force-create</code></td><td>Créer ou réinitialiser une branche et basculer dessus.</td></tr>
        <tr><td><code>--track</code></td><td>Configurer le tracking avec une branche distante.</td></tr>
        <tr><td><code>--detach</code></td><td>Basculer sur un commit en mode HEAD détaché.</td></tr>
        <tr><td><code>-</code></td><td>Basculer sur la branche précédente (comme <code>cd -</code>).</td></tr>
        <tr><td><code>--discard-changes</code></td><td>Jeter les changements locaux en changeant.</td></tr>
        <tr><td><code>-m</code>, <code>--merge</code></td><td>Merge trois-voies des changements locaux en changeant.</td></tr>
      </tbody>
    </table>
    <h2>Exemples</h2>
    <pre><code>git switch main
    # Aller sur la branche main
    
    git switch -c feature/search
    # Créer et basculer sur une nouvelle branche
    
    git switch -
    # Revenir à la branche précédente
    
    git switch --detach v3.0.0
    # Inspecter un tag sans créer de branche</code></pre>
    <h2>Erreurs fréquentes</h2>
    <p>A common confusion is expecting <code>git switch</code> to operate on files like <code>git checkout</code> does. It won't — use <code>git restore</code> instead. If you have uncommitted work that conflicts with the target branch, switching will fail; either commit, stash, or use <code>--merge</code> to attempt a three-way merge.</p>
    <h2>Commandes liées</h2>
    <p><code>git checkout</code>, <code>git restore</code>, <code>git branch</code>, <code>git stash</code></p>
    

- source_title: "git merge — Join two or more development histories together"
  title: "git merge — Joindre deux ou plusieurs historiques de développement"
  langcode: fr
  body: |
    <h2>Synopsis</h2>
    <pre><code>git merge [--no-ff] [--squash] [--abort] [-s &lt;strategy&gt;] [&lt;branch&gt;]</code></pre>
    <h2>Description</h2>
    <p>The <code>git merge</code> command integrates changes from one branch into another. By default it produces a "true merge" commit with two parents, preserving the topology of both histories. If the target branch is a strict ancestor of the source, Git fast-forwards by simply moving the branch pointer; pass <code>--no-ff</code> to always record a merge commit.</p>
    <p>When the same lines are changed on both sides, Git pauses with a conflict marker. You resolve manually, then <code>git add</code> the files and run <code>git commit</code> (or <code>git merge --continue</code>). To bail out of an in-progress merge, use <code>git merge --abort</code>.</p>
    <p>Dans l'usage quotidien, <code>git merge</code> s'intègre étroitement avec les alias de shell, les plugins d'éditeur et l'intégration continue. Les utilisateurs avancés ajoutent souvent des alias combinant les flags qu'ils passent toujours, ou enveloppent la commande dans des scripts qui appliquent les conventions d'équipe. Le formatage de la sortie peut être personnalisé via la configuration Git — pretty formats, schémas de couleurs et comportement du pager sont tous ajustables. Quand quelque chose tourne mal, la première étape de diagnostic est généralement de relancer la commande avec <code>GIT_TRACE=1</code> dans l'environnement, ce qui révèle les appels de plomberie sous-jacents. Pour les situations inhabituelles, la sortie <code>--help</code> (<code>git merge --help</code>) ouvre la page de manuel complète avec les détails de chaque option, y compris celles rarement utilisées dans les workflows ordinaires mais essentielles pour le débogage ou le scripting à grande échelle.</p><p>Comprendre comment <code>git merge</code> interagit avec le reste du modèle de données de Git — la base d'objets, l'index, les refs et l'arborescence de travail — est rentable. Chaque commande opère sur un sous-ensemble de ces pièces, et savoir laquelle elle touche aide à prédire les résultats et récupérer après les erreurs. Lire la documentation officielle de Git en parallèle de la pratique sur un dépôt jetable est la façon la plus rapide d'intérioriser les subtilités. La plupart des problèmes de production avec Git proviennent de l'une de trois causes : comportement par défaut surprenant, opérations réseau partielles, ou réécriture d'historique déjà partagé. Un modèle mental fonctionnel des effets de bord de <code>git merge</code> aide à éviter les trois.</p>
        <h2>Options courantes</h2>
    <table>
      <thead><tr><th>Option</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>--no-ff</code></td><td>Toujours créer un merge commit, même si fast-forward est possible.</td></tr>
        <tr><td><code>--ff-only</code></td><td>Refuser le merge sauf si fast-forward est possible.</td></tr>
        <tr><td><code>--squash</code></td><td>Combiner l'historique mergé en un seul commit sur la branche cible.</td></tr>
        <tr><td><code>--abort</code></td><td>Abandonner un merge en cours.</td></tr>
        <tr><td><code>--continue</code></td><td>Reprendre un merge après résolution des conflits.</td></tr>
        <tr><td><code>-s &lt;strategy&gt;</code></td><td>Choisir la stratégie de merge (<code>ort</code>, <code>recursive</code>, <code>resolve</code>, <code>octopus</code>).</td></tr>
        <tr><td><code>-X &lt;option&gt;</code></td><td>Passer une option spécifique à la stratégie (par ex. <code>ours</code>, <code>theirs</code>).</td></tr>
        <tr><td><code>--no-commit</code></td><td>Stager le résultat du merge sans commiter.</td></tr>
      </tbody>
    </table>
    <h2>Exemples</h2>
    <pre><code>git merge feature/login
    # Merger la branche feature dans la branche courante
    
    git merge --no-ff release/1.2
    # Toujours faire un merge commit (préserve la topologie)
    
    git merge --abort
    # Annuler un merge après l'apparition de conflits
    
    git merge -X theirs hotfix
    # Auto-résoudre les conflits en préférant "their" side</code></pre>
    <h2>Erreurs fréquentes</h2>
    <p>Resolving conflicts in a hurry and forgetting to remove conflict markers (<code>&lt;&lt;&lt;&lt;&lt;&lt;&lt;</code>) leaves broken code committed. Always run a build or tests after resolving. Another pitfall is fast-forwarding silently when you wanted a merge commit for traceability — use <code>--no-ff</code>. Finally, <code>--squash</code> does NOT create a merge commit, so the source branch isn't recorded as a parent.</p>
    <h2>Commandes liées</h2>
    <p><code>git rebase</code>, <code>git mergetool</code>, <code>git pull</code>, <code>git cherry-pick</code></p>
    

- source_title: "git rebase — Reapply commits on top of another base"
  title: "git rebase — Réappliquer des commits par-dessus une autre base"
  langcode: fr
  body: |
    <h2>Synopsis</h2>
    <pre><code>git rebase [-i] [--onto &lt;newbase&gt;] [&lt;upstream&gt; [&lt;branch&gt;]]</code></pre>
    <h2>Description</h2>
    <p>The <code>git rebase</code> command moves a sequence of commits to a new base. It rewrites history by replaying each commit on top of the new base, producing a linear chain rather than a merge commit. Rebasing is invaluable for keeping feature branches up to date, cleaning up local history before pushing, and squashing fixup commits.</p>
    <p>Because rebasing creates new commits with different SHAs, never rebase commits that have been published and pulled by others — they will end up with diverging histories. The interactive mode (<code>-i</code>) lets you reorder, edit, squash, drop, or fix up commits.</p>
    <p>Dans l'usage quotidien, <code>git rebase</code> s'intègre étroitement avec les alias de shell, les plugins d'éditeur et l'intégration continue. Les utilisateurs avancés ajoutent souvent des alias combinant les flags qu'ils passent toujours, ou enveloppent la commande dans des scripts qui appliquent les conventions d'équipe. Le formatage de la sortie peut être personnalisé via la configuration Git — pretty formats, schémas de couleurs et comportement du pager sont tous ajustables. Quand quelque chose tourne mal, la première étape de diagnostic est généralement de relancer la commande avec <code>GIT_TRACE=1</code> dans l'environnement, ce qui révèle les appels de plomberie sous-jacents. Pour les situations inhabituelles, la sortie <code>--help</code> (<code>git rebase --help</code>) ouvre la page de manuel complète avec les détails de chaque option, y compris celles rarement utilisées dans les workflows ordinaires mais essentielles pour le débogage ou le scripting à grande échelle.</p><p>Comprendre comment <code>git rebase</code> interagit avec le reste du modèle de données de Git — la base d'objets, l'index, les refs et l'arborescence de travail — est rentable. Chaque commande opère sur un sous-ensemble de ces pièces, et savoir laquelle elle touche aide à prédire les résultats et récupérer après les erreurs. Lire la documentation officielle de Git en parallèle de la pratique sur un dépôt jetable est la façon la plus rapide d'intérioriser les subtilités. La plupart des problèmes de production avec Git proviennent de l'une de trois causes : comportement par défaut surprenant, opérations réseau partielles, ou réécriture d'historique déjà partagé. Un modèle mental fonctionnel des effets de bord de <code>git rebase</code> aide à éviter les trois.</p>
        <h2>Options courantes</h2>
    <table>
      <thead><tr><th>Option</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>-i</code>, <code>--interactive</code></td><td>Ouvrir un éditeur pour manipuler la liste de commits.</td></tr>
        <tr><td><code>--onto &lt;newbase&gt;</code></td><td>Rebase sur un commit arbitraire, pas l'upstream.</td></tr>
        <tr><td><code>--continue</code></td><td>Reprendre après résolution des conflits.</td></tr>
        <tr><td><code>--abort</code></td><td>Annuler le rebase et retourner à l'état d'origine.</td></tr>
        <tr><td><code>--skip</code></td><td>Sauter le patch courant et continuer.</td></tr>
        <tr><td><code>--autosquash</code></td><td>Ordonner automatiquement les commits fixup/squash.</td></tr>
        <tr><td><code>--autostash</code></td><td>Stasher les changements locaux avant le rebase et les pop après.</td></tr>
        <tr><td><code>-r</code>, <code>--rebase-merges</code></td><td>Préserver les merge commits pendant le rebase.</td></tr>
      </tbody>
    </table>
    <h2>Exemples</h2>
    <pre><code>git rebase main
    # Rejouer les commits de la branche courante sur main
    
    git rebase -i HEAD~5
    # Éditer interactivement les 5 derniers commits
    
    git rebase --onto main feature-base feature-tip
    # Déplacer seulement les commits entre feature-base et feature-tip sur main
    
    git rebase --continue
    # Reprendre après résolution des conflits</code></pre>
    <h2>Erreurs fréquentes</h2>
    <p>Rebasing public, shared branches breaks every collaborator's history. Reserve rebase for local cleanup. During conflict resolution, beginners often run <code>git commit</code> instead of <code>git rebase --continue</code>, leaving the rebase in a broken state. If you get lost mid-rebase, <code>git rebase --abort</code> always returns you to safety.</p>
    <h2>Commandes liées</h2>
    <p><code>git merge</code>, <code>git cherry-pick</code>, <code>git reflog</code>, <code>git pull --rebase</code></p>
    

- source_title: "git mergetool — Run merge conflict resolution tools"
  title: "git mergetool — Exécuter les outils de résolution de conflit de merge"
  langcode: fr
  body: |
    <h2>Synopsis</h2>
    <pre><code>git mergetool [-t &lt;tool&gt;] [--tool-help] [&lt;file&gt;...]</code></pre>
    <h2>Description</h2>
    <p>The <code>git mergetool</code> command launches an external merge tool to help resolve conflicts after a merge, rebase, or cherry-pick stops with conflicts. Common tools include <code>vimdiff</code>, <code>meld</code>, <code>kdiff3</code>, <code>p4merge</code>, <code>opendiff</code>, and <code>vscode</code>. Once configured via <code>merge.tool</code>, running <code>git mergetool</code> opens each conflicted file in the chosen tool and stages the resolution when you save.</p>
    <p>Most modern editors (VS Code, JetBrains IDEs, Vim with Fugitive) have built-in merge UIs that make <code>git mergetool</code> redundant. Still, on the command line or over SSH, it remains an essential utility for graphical or three-pane conflict resolution.</p>
    <p>Dans l'usage quotidien, <code>git mergetool</code> s'intègre étroitement avec les alias de shell, les plugins d'éditeur et l'intégration continue. Les utilisateurs avancés ajoutent souvent des alias combinant les flags qu'ils passent toujours, ou enveloppent la commande dans des scripts qui appliquent les conventions d'équipe. Le formatage de la sortie peut être personnalisé via la configuration Git — pretty formats, schémas de couleurs et comportement du pager sont tous ajustables. Quand quelque chose tourne mal, la première étape de diagnostic est généralement de relancer la commande avec <code>GIT_TRACE=1</code> dans l'environnement, ce qui révèle les appels de plomberie sous-jacents. Pour les situations inhabituelles, la sortie <code>--help</code> (<code>git mergetool --help</code>) ouvre la page de manuel complète avec les détails de chaque option, y compris celles rarement utilisées dans les workflows ordinaires mais essentielles pour le débogage ou le scripting à grande échelle.</p><p>Comprendre comment <code>git mergetool</code> interagit avec le reste du modèle de données de Git — la base d'objets, l'index, les refs et l'arborescence de travail — est rentable. Chaque commande opère sur un sous-ensemble de ces pièces, et savoir laquelle elle touche aide à prédire les résultats et récupérer après les erreurs. Lire la documentation officielle de Git en parallèle de la pratique sur un dépôt jetable est la façon la plus rapide d'intérioriser les subtilités. La plupart des problèmes de production avec Git proviennent de l'une de trois causes : comportement par défaut surprenant, opérations réseau partielles, ou réécriture d'historique déjà partagé. Un modèle mental fonctionnel des effets de bord de <code>git mergetool</code> aide à éviter les trois.</p>
        <h2>Options courantes</h2>
    <table>
      <thead><tr><th>Option</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>-t &lt;tool&gt;</code>, <code>--tool=&lt;tool&gt;</code></td><td>Utiliser un outil de merge spécifique pour cette exécution.</td></tr>
        <tr><td><code>--tool-help</code></td><td>Lister les outils de merge connus de Git.</td></tr>
        <tr><td><code>-y</code>, <code>--no-prompt</code></td><td>Ne pas demander avant de lancer l'outil.</td></tr>
        <tr><td><code>-g</code>, <code>--gui</code></td><td>Utiliser l'outil GUI depuis <code>merge.guitool</code>.</td></tr>
        <tr><td><code>-O&lt;file&gt;</code></td><td>Traiter les fichiers dans l'ordre listé dans <code>file</code>.</td></tr>
      </tbody>
    </table>
    <h2>Exemples</h2>
    <pre><code>git config --global merge.tool meld
    # Configurer meld par défaut
    
    git mergetool
    # Lancer l'outil configuré sur chaque fichier en conflit
    
    git mergetool -t vimdiff
    # Utiliser vimdiff pour cette fois seulement
    
    git mergetool --tool-help
    # Voir la liste des outils supportés</code></pre>
    <h2>Erreurs fréquentes</h2>
    <p>After resolving with <code>git mergetool</code>, leftover <code>.orig</code> backup files clutter the directory. Disable them with <code>git config --global mergetool.keepBackup false</code>. Another pitfall: launching a GUI tool over SSH without X forwarding fails silently. Configure a console-friendly tool (like <code>vimdiff</code>) for remote sessions.</p>
    <h2>Commandes liées</h2>
    <p><code>git merge</code>, <code>git rebase</code>, <code>git config</code>, <code>git diff</code></p>
    

- source_title: "git remote — Manage tracked remote repositories"
  title: "git remote — Gérer les dépôts distants suivis"
  langcode: fr
  body: |
    <h2>Synopsis</h2>
    <pre><code>git remote [-v]
    git remote add &lt;name&gt; &lt;url&gt;
    git remote remove &lt;name&gt;
    git remote set-url &lt;name&gt; &lt;url&gt;</code></pre>
    <h2>Description</h2>
    <p>The <code>git remote</code> command manages the set of repositories ("remotes") whose URLs are stored in your local config. Each remote has a short nickname (commonly <code>origin</code> for the original clone source and <code>upstream</code> for the project you forked from). When you run <code>git fetch origin</code>, <code>git push origin</code>, or similar, the nickname is resolved to the URL.</p>
    <p>Remotes are stored in <code>.git/config</code> and can have separate URLs for fetching and pushing. They also carry refspecs that determine which refs to fetch and into what local namespace. Modern workflows often have only <code>origin</code>, while open-source contributors typically have both <code>origin</code> (their fork) and <code>upstream</code> (the canonical project).</p>
    <p>Dans l'usage quotidien, <code>git remote</code> s'intègre étroitement avec les alias de shell, les plugins d'éditeur et l'intégration continue. Les utilisateurs avancés ajoutent souvent des alias combinant les flags qu'ils passent toujours, ou enveloppent la commande dans des scripts qui appliquent les conventions d'équipe. Le formatage de la sortie peut être personnalisé via la configuration Git — pretty formats, schémas de couleurs et comportement du pager sont tous ajustables. Quand quelque chose tourne mal, la première étape de diagnostic est généralement de relancer la commande avec <code>GIT_TRACE=1</code> dans l'environnement, ce qui révèle les appels de plomberie sous-jacents. Pour les situations inhabituelles, la sortie <code>--help</code> (<code>git remote --help</code>) ouvre la page de manuel complète avec les détails de chaque option, y compris celles rarement utilisées dans les workflows ordinaires mais essentielles pour le débogage ou le scripting à grande échelle.</p><p>Comprendre comment <code>git remote</code> interagit avec le reste du modèle de données de Git — la base d'objets, l'index, les refs et l'arborescence de travail — est rentable. Chaque commande opère sur un sous-ensemble de ces pièces, et savoir laquelle elle touche aide à prédire les résultats et récupérer après les erreurs. Lire la documentation officielle de Git en parallèle de la pratique sur un dépôt jetable est la façon la plus rapide d'intérioriser les subtilités. La plupart des problèmes de production avec Git proviennent de l'une de trois causes : comportement par défaut surprenant, opérations réseau partielles, ou réécriture d'historique déjà partagé. Un modèle mental fonctionnel des effets de bord de <code>git remote</code> aide à éviter les trois.</p>
        <h2>Options courantes</h2>
    <table>
      <thead><tr><th>Option / Sous-commande</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>-v</code>, <code>--verbose</code></td><td>Afficher les URLs avec les noms de remotes.</td></tr>
        <tr><td><code>add &lt;name&gt; &lt;url&gt;</code></td><td>Enregistrer un nouveau remote.</td></tr>
        <tr><td><code>remove &lt;name&gt;</code></td><td>Retirer un remote de la config.</td></tr>
        <tr><td><code>rename &lt;old&gt; &lt;new&gt;</code></td><td>Renommer un remote.</td></tr>
        <tr><td><code>set-url &lt;name&gt; &lt;url&gt;</code></td><td>Changer l'URL d'un remote.</td></tr>
        <tr><td><code>show &lt;name&gt;</code></td><td>Afficher des infos détaillées sur un remote.</td></tr>
        <tr><td><code>prune &lt;name&gt;</code></td><td>Supprimer les refs de tracking distant obsolètes.</td></tr>
      </tbody>
    </table>
    <h2>Exemples</h2>
    <pre><code>git remote -v
    # Lister tous les remotes avec URLs
    
    git remote add upstream https://github.com/original/project.git
    # Ajouter le dépôt upstream d'un fork
    
    git remote set-url origin git@github.com:me/project.git
    # Passer de HTTPS à SSH
    
    git remote prune origin
    # Supprimer les branches de tracking qui n'existent plus sur origin</code></pre>
    <h2>Erreurs fréquentes</h2>
    <p>Adding the wrong URL (typo, missing <code>.git</code> suffix on some hosts) leads to confusing fetch errors. Run <code>git remote -v</code> to confirm. After repository renames or fork ownership changes, your remote URLs become stale — fix them with <code>set-url</code>. Don't forget to <code>git remote prune</code> periodically to clean up branches deleted on the server.</p>
    <h2>Commandes liées</h2>
    <p><code>git fetch</code>, <code>git push</code>, <code>git pull</code>, <code>git ls-remote</code></p>
    

- source_title: "git fetch — Download objects and refs from a remote"
  title: "git fetch — Télécharger objets et refs depuis un remote"
  langcode: fr
  body: |
    <h2>Synopsis</h2>
    <pre><code>git fetch [&lt;options&gt;] [&lt;remote&gt; [&lt;refspec&gt;...]]</code></pre>
    <h2>Description</h2>
    <p>The <code>git fetch</code> command downloads new commits, files, and refs from a remote repository into your local repo, but does NOT merge them into your working branch. After fetching, the remote-tracking refs (like <code>origin/main</code>) are updated, and you can inspect what's new with <code>git log origin/main</code> before deciding to merge or rebase.</p>
    <p>Fetching is safe — it never modifies your working tree or current branch. Many users prefer <code>git fetch</code> followed by an explicit <code>git merge</code> or <code>git rebase</code> over <code>git pull</code>, because it gives a clear preview step. Use <code>--all</code> to fetch from every configured remote.</p>
    <p>Dans l'usage quotidien, <code>git fetch</code> s'intègre étroitement avec les alias de shell, les plugins d'éditeur et l'intégration continue. Les utilisateurs avancés ajoutent souvent des alias combinant les flags qu'ils passent toujours, ou enveloppent la commande dans des scripts qui appliquent les conventions d'équipe. Le formatage de la sortie peut être personnalisé via la configuration Git — pretty formats, schémas de couleurs et comportement du pager sont tous ajustables. Quand quelque chose tourne mal, la première étape de diagnostic est généralement de relancer la commande avec <code>GIT_TRACE=1</code> dans l'environnement, ce qui révèle les appels de plomberie sous-jacents. Pour les situations inhabituelles, la sortie <code>--help</code> (<code>git fetch --help</code>) ouvre la page de manuel complète avec les détails de chaque option, y compris celles rarement utilisées dans les workflows ordinaires mais essentielles pour le débogage ou le scripting à grande échelle.</p><p>Comprendre comment <code>git fetch</code> interagit avec le reste du modèle de données de Git — la base d'objets, l'index, les refs et l'arborescence de travail — est rentable. Chaque commande opère sur un sous-ensemble de ces pièces, et savoir laquelle elle touche aide à prédire les résultats et récupérer après les erreurs. Lire la documentation officielle de Git en parallèle de la pratique sur un dépôt jetable est la façon la plus rapide d'intérioriser les subtilités. La plupart des problèmes de production avec Git proviennent de l'une de trois causes : comportement par défaut surprenant, opérations réseau partielles, ou réécriture d'historique déjà partagé. Un modèle mental fonctionnel des effets de bord de <code>git fetch</code> aide à éviter les trois.</p>
        <h2>Options courantes</h2>
    <table>
      <thead><tr><th>Option</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>--all</code></td><td>Fetcher depuis tous les remotes configurés.</td></tr>
        <tr><td><code>--prune</code> / <code>-p</code></td><td>Supprimer les refs de tracking distant qui n'existent plus en upstream.</td></tr>
        <tr><td><code>--tags</code></td><td>Fetcher tous les tags depuis le remote.</td></tr>
        <tr><td><code>--depth=&lt;n&gt;</code></td><td>Limiter la profondeur d'historique fetché (crée/maintient un clone shallow).</td></tr>
        <tr><td><code>--unshallow</code></td><td>Convertir un clone shallow en clone complet.</td></tr>
        <tr><td><code>--dry-run</code></td><td>Afficher ce qui serait fetché.</td></tr>
        <tr><td><code>--force</code> / <code>-f</code></td><td>Autoriser les mises à jour non-fast-forward des refs.</td></tr>
      </tbody>
    </table>
    <h2>Exemples</h2>
    <pre><code>git fetch
    # Mettre à jour les refs de tracking distant depuis origin
    
    git fetch --all --prune
    # Mettre à jour depuis chaque remote et nettoyer les branches obsolètes
    
    git fetch upstream main
    # Fetcher seulement la branche main depuis upstream
    
    git fetch --unshallow
    # Compléter tout l'historique dans un clone shallow</code></pre>
    <h2>Erreurs fréquentes</h2>
    <p>Confusing <code>git fetch</code> with <code>git pull</code> is common: fetch just downloads, while pull fetches and merges. Forgetting <code>--prune</code> leaves a long list of stale tracking branches over time. Configure <code>fetch.prune = true</code> globally to make pruning automatic.</p>
    <h2>Commandes liées</h2>
    <p><code>git pull</code>, <code>git merge</code>, <code>git remote</code>, <code>git ls-remote</code></p>
    

- source_title: "git pull — Fetch from and integrate with another repository"
  title: "git pull — Récupérer et intégrer depuis un autre dépôt"
  langcode: fr
  body: |
    <h2>Synopsis</h2>
    <pre><code>git pull [--rebase] [--ff-only] [&lt;remote&gt; [&lt;branch&gt;]]</code></pre>
    <h2>Description</h2>
    <p>The <code>git pull</code> command is shorthand for <code>git fetch</code> followed by an integration step (merge by default, rebase optionally). It updates your current branch to incorporate upstream changes. Many teams prefer to configure <code>pull.rebase = true</code> or use <code>git pull --rebase</code> to keep history linear.</p>
    <p>If your branch and the upstream have diverged, <code>git pull</code> may produce a merge commit. With <code>--ff-only</code>, the pull will fail rather than create a merge — useful when you want to be sure your local branch is just behind, not divergent.</p>
    <p>Dans l'usage quotidien, <code>git pull</code> s'intègre étroitement avec les alias de shell, les plugins d'éditeur et l'intégration continue. Les utilisateurs avancés ajoutent souvent des alias combinant les flags qu'ils passent toujours, ou enveloppent la commande dans des scripts qui appliquent les conventions d'équipe. Le formatage de la sortie peut être personnalisé via la configuration Git — pretty formats, schémas de couleurs et comportement du pager sont tous ajustables. Quand quelque chose tourne mal, la première étape de diagnostic est généralement de relancer la commande avec <code>GIT_TRACE=1</code> dans l'environnement, ce qui révèle les appels de plomberie sous-jacents. Pour les situations inhabituelles, la sortie <code>--help</code> (<code>git pull --help</code>) ouvre la page de manuel complète avec les détails de chaque option, y compris celles rarement utilisées dans les workflows ordinaires mais essentielles pour le débogage ou le scripting à grande échelle.</p><p>Comprendre comment <code>git pull</code> interagit avec le reste du modèle de données de Git — la base d'objets, l'index, les refs et l'arborescence de travail — est rentable. Chaque commande opère sur un sous-ensemble de ces pièces, et savoir laquelle elle touche aide à prédire les résultats et récupérer après les erreurs. Lire la documentation officielle de Git en parallèle de la pratique sur un dépôt jetable est la façon la plus rapide d'intérioriser les subtilités. La plupart des problèmes de production avec Git proviennent de l'une de trois causes : comportement par défaut surprenant, opérations réseau partielles, ou réécriture d'historique déjà partagé. Un modèle mental fonctionnel des effets de bord de <code>git pull</code> aide à éviter les trois.</p>
        <h2>Options courantes</h2>
    <table>
      <thead><tr><th>Option</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>--rebase</code></td><td>Rebaser les commits locaux par-dessus les changements fetchés.</td></tr>
        <tr><td><code>--ff-only</code></td><td>Fast-forward seulement ; abandonner si un merge serait nécessaire.</td></tr>
        <tr><td><code>--no-ff</code></td><td>Toujours créer un merge commit.</td></tr>
        <tr><td><code>--all</code></td><td>Fetcher depuis tous les remotes avant intégration.</td></tr>
        <tr><td><code>--autostash</code></td><td>Stasher les changements locaux avant le pull et les pop après.</td></tr>
        <tr><td><code>--prune</code></td><td>Élaguer les branches de tracking distant obsolètes lors du fetch.</td></tr>
      </tbody>
    </table>
    <h2>Exemples</h2>
    <pre><code>git pull
    # Défaut : fetch et merge depuis l'upstream configuré
    
    git pull --rebase origin main
    # Rebaser les commits locaux sur le dernier origin/main
    
    git pull --ff-only
    # Refuser de créer un merge commit
    
    git config --global pull.rebase true
    # Faire de rebase le défaut pour chaque pull</code></pre>
    <h2>Erreurs fréquentes</h2>
    <p>Pulling with uncommitted changes can cause Git to refuse to merge. Either commit, stash, or use <code>--autostash</code>. Pulling onto a branch that has diverged often produces unexpected merge commits. Use <code>--ff-only</code> as a safety net or rebase explicitly.</p>
