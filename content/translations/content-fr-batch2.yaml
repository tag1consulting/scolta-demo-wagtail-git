    <p><code>git write-tree</code>, <code>git checkout</code>, <code>git merge</code>, <code>git update-index</code></p>
    

- source_title: "git write-tree — Create a tree object from the current index"
  title: "git write-tree — Créer un objet tree depuis l'index courant"
  langcode: fr
  body: |
    <h2>Synopsis</h2>
    <pre><code>git write-tree [--missing-ok] [--prefix=&lt;dir&gt;]</code></pre>
    <h2>Description</h2>
    <p>The <code>git write-tree</code> command serializes the current index into a tree object in the database, returning the SHA. It is the plumbing inverse of <code>read-tree</code>: that command loads a tree, this one stores one.</p>
    <p>Dans l'usage quotidien, <code>git write-tree</code> s'intègre étroitement avec les alias de shell, les plugins d'éditeur et l'intégration continue. Les utilisateurs avancés ajoutent souvent des alias combinant les flags qu'ils passent toujours, ou enveloppent la commande dans des scripts qui appliquent les conventions d'équipe. Le formatage de la sortie peut être personnalisé via la configuration Git — pretty formats, schémas de couleurs et comportement du pager sont tous ajustables. Quand quelque chose tourne mal, la première étape de diagnostic est généralement de relancer la commande avec <code>GIT_TRACE=1</code> dans l'environnement, ce qui révèle les appels de plomberie sous-jacents. Pour les situations inhabituelles, la sortie <code>--help</code> (<code>git write-tree --help</code>) ouvre la page de manuel complète avec les détails de chaque option, y compris celles rarement utilisées dans les workflows ordinaires mais essentielles pour le débogage ou le scripting à grande échelle.</p><p>Comprendre comment <code>git write-tree</code> interagit avec le reste du modèle de données de Git — la base d'objets, l'index, les refs et l'arborescence de travail — est rentable. Chaque commande opère sur un sous-ensemble de ces pièces, et savoir laquelle elle touche aide à prédire les résultats et récupérer après les erreurs. Lire la documentation officielle de Git en parallèle de la pratique sur un dépôt jetable est la façon la plus rapide d'intérioriser les subtilités. La plupart des problèmes de production avec Git proviennent de l'une de trois causes : comportement par défaut surprenant, opérations réseau partielles, ou réécriture d'historique déjà partagé. Un modèle mental fonctionnel des effets de bord de <code>git write-tree</code> aide à éviter les trois.</p>
        <h2>When to Use</h2>
    <p>You almost never call this directly. <code>git commit</code> calls <code>write-tree</code> internally to capture the staged state. Reach for it when synthesizing tree objects for custom workflows (generating a tree without a commit, scripting <code>commit-tree</code> pipelines).</p>
    <h2>Options courantes</h2>
    <table>
      <thead><tr><th>Option</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>--missing-ok</code></td><td>Don't fail if referenced objects are missing.</td></tr>
        <tr><td><code>--prefix=&lt;dir&gt;</code></td><td>Write a subtree of the index.</td></tr>
      </tbody>
    </table>
    <h2>Exemples</h2>
    <pre><code>git write-tree
    # Print SHA of tree representing the current index
    
    TREE=$(git write-tree)
    COMMIT=$(echo "Snapshot" | git commit-tree "$TREE" -p HEAD)
    git update-ref refs/heads/snapshot "$COMMIT"
    # Manually craft a commit on a new branch
    
    git write-tree --prefix=docs/
    # Just the docs/ subtree</code></pre>
    <h2>Erreurs fréquentes</h2>
    <p>If the index has unmerged entries, <code>write-tree</code> fails. Resolve conflicts first. Forgetting that <code>write-tree</code> doesn't create a commit — only a tree — leads to dangling objects. <code>git help write-tree</code> opens the full manual page with comprehensive coverage of every option and edge case; it remains the authoritative reference whenever the summary on this page leaves a question unanswered. For team workflows, capturing how your project uses this command in a CONTRIBUTING document avoids repeated onboarding questions and keeps everyone aligned on conventions.</p>
    <h2>Commandes liées</h2>
    <p><code>git read-tree</code>, <code>git commit-tree</code>, <code>git ls-tree</code>, <code>git update-index</code></p>
    

- source_title: "git commit-tree — Create a new commit object"
  title: "git commit-tree — Créer un nouvel objet commit"
  langcode: fr
  body: |
    <h2>Synopsis</h2>
    <pre><code>git commit-tree &lt;tree&gt; [-p &lt;parent&gt;]... [-m &lt;msg&gt;] [-S]</code></pre>
    <h2>Description</h2>
    <p>The <code>git commit-tree</code> command builds a commit object from a given tree SHA, an optional list of parent commits, and a message. It outputs the new commit's SHA. Unlike <code>git commit</code>, it does NOT update any ref — the resulting commit is dangling until you point a branch or tag at it.</p>
    <p>Dans l'usage quotidien, <code>git commit-tree</code> s'intègre étroitement avec les alias de shell, les plugins d'éditeur et l'intégration continue. Les utilisateurs avancés ajoutent souvent des alias combinant les flags qu'ils passent toujours, ou enveloppent la commande dans des scripts qui appliquent les conventions d'équipe. Le formatage de la sortie peut être personnalisé via la configuration Git — pretty formats, schémas de couleurs et comportement du pager sont tous ajustables. Quand quelque chose tourne mal, la première étape de diagnostic est généralement de relancer la commande avec <code>GIT_TRACE=1</code> dans l'environnement, ce qui révèle les appels de plomberie sous-jacents. Pour les situations inhabituelles, la sortie <code>--help</code> (<code>git commit-tree --help</code>) ouvre la page de manuel complète avec les détails de chaque option, y compris celles rarement utilisées dans les workflows ordinaires mais essentielles pour le débogage ou le scripting à grande échelle.</p><p>Comprendre comment <code>git commit-tree</code> interagit avec le reste du modèle de données de Git — la base d'objets, l'index, les refs et l'arborescence de travail — est rentable. Chaque commande opère sur un sous-ensemble de ces pièces, et savoir laquelle elle touche aide à prédire les résultats et récupérer après les erreurs. Lire la documentation officielle de Git en parallèle de la pratique sur un dépôt jetable est la façon la plus rapide d'intérioriser les subtilités. La plupart des problèmes de production avec Git proviennent de l'une de trois causes : comportement par défaut surprenant, opérations réseau partielles, ou réécriture d'historique déjà partagé. Un modèle mental fonctionnel des effets de bord de <code>git commit-tree</code> aide à éviter les trois.</p>
        <h2>When to Use</h2>
    <p>Most developers never use this directly. It's a building block for tools that synthesize commits programmatically: importers, custom merge strategies, history-rewriting tools. <code>filter-repo</code> uses commit-tree internally.</p>
    <h2>Options courantes</h2>
    <table>
      <thead><tr><th>Option</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>-p &lt;parent&gt;</code></td><td>Specify a parent commit (repeatable for merges).</td></tr>
        <tr><td><code>-m &lt;msg&gt;</code></td><td>Commit message (or read stdin).</td></tr>
        <tr><td><code>-F &lt;file&gt;</code></td><td>Read message from file.</td></tr>
        <tr><td><code>-S[&lt;keyid&gt;]</code></td><td>Signer le commit en GPG.</td></tr>
      </tbody>
    </table>
    <h2>Exemples</h2>
    <pre><code>TREE=$(git write-tree)
    COMMIT=$(echo "Initial commit" | git commit-tree "$TREE")
    git update-ref refs/heads/main "$COMMIT"
    # Build a root commit from scratch
    
    PARENT=$(git rev-parse HEAD)
    TREE=$(git write-tree)
    COMMIT=$(echo "Custom merge" | git commit-tree "$TREE" -p "$PARENT" -p "feature")
    git update-ref refs/heads/main "$COMMIT"
    # Synthesize a custom merge commit</code></pre>
    <h2>Erreurs fréquentes</h2>
    <p>Forgetting to <code>git update-ref</code> leaves the commit dangling — <code>git gc</code> will eventually delete it. Author/committer environment variables (<code>GIT_AUTHOR_NAME</code> etc.) must be set if you want non-default identities.</p>
    <h2>Commandes liées</h2>
    <p><code>git write-tree</code>, <code>git update-ref</code>, <code>git commit</code>, <code>git filter-repo</code></p>
    

- source_title: "git diff-index — Compare a tree to the index or working tree"
  title: "git diff-index — Comparer un tree à l'index ou à l'arborescence"
  langcode: fr
  body: |
    <h2>Synopsis</h2>
    <pre><code>git diff-index [--cached] [-p] &lt;tree-ish&gt; [&lt;path&gt;...]</code></pre>
    <h2>Description</h2>
    <p>The <code>git diff-index</code> command is the plumbing companion to <code>git diff</code>. It compares a tree object (commit, tag) against the index or working tree. Output is the raw, machine-readable diff format unless <code>-p</code> requests a patch.</p>
    <p>Dans l'usage quotidien, <code>git diff-index</code> s'intègre étroitement avec les alias de shell, les plugins d'éditeur et l'intégration continue. Les utilisateurs avancés ajoutent souvent des alias combinant les flags qu'ils passent toujours, ou enveloppent la commande dans des scripts qui appliquent les conventions d'équipe. Le formatage de la sortie peut être personnalisé via la configuration Git — pretty formats, schémas de couleurs et comportement du pager sont tous ajustables. Quand quelque chose tourne mal, la première étape de diagnostic est généralement de relancer la commande avec <code>GIT_TRACE=1</code> dans l'environnement, ce qui révèle les appels de plomberie sous-jacents. Pour les situations inhabituelles, la sortie <code>--help</code> (<code>git diff-index --help</code>) ouvre la page de manuel complète avec les détails de chaque option, y compris celles rarement utilisées dans les workflows ordinaires mais essentielles pour le débogage ou le scripting à grande échelle.</p><p>Comprendre comment <code>git diff-index</code> interagit avec le reste du modèle de données de Git — la base d'objets, l'index, les refs et l'arborescence de travail — est rentable. Chaque commande opère sur un sous-ensemble de ces pièces, et savoir laquelle elle touche aide à prédire les résultats et récupérer après les erreurs. Lire la documentation officielle de Git en parallèle de la pratique sur un dépôt jetable est la façon la plus rapide d'intérioriser les subtilités. La plupart des problèmes de production avec Git proviennent de l'une de trois causes : comportement par défaut surprenant, opérations réseau partielles, ou réécriture d'historique déjà partagé. Un modèle mental fonctionnel des effets de bord de <code>git diff-index</code> aide à éviter les trois.</p>
        <h2>When to Use</h2>
    <p>Most users prefer <code>git diff</code>, which is easier to read. Use <code>diff-index</code> in scripts where you need a stable, unambiguous comparison and don't want porcelain conveniences. Hooks (especially <code>pre-commit</code>) often use it for precise checks.</p>
    <h2>Options courantes</h2>
    <table>
      <thead><tr><th>Option</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>--cached</code></td><td>Compare tree to index (instead of working tree).</td></tr>
        <tr><td><code>-p</code></td><td>Show patch.</td></tr>
        <tr><td><code>--name-only</code></td><td>Lister seulement les noms des fichiers modifiés.</td></tr>
        <tr><td><code>--name-status</code></td><td>List names with status letters.</td></tr>
        <tr><td><code>--quiet</code></td><td>Exit nonzero if differences exist; produce no output.</td></tr>
        <tr><td><code>-z</code></td><td>NUL-terminated output.</td></tr>
      </tbody>
    </table>
    <h2>Exemples</h2>
    <pre><code>git diff-index --cached HEAD
    # Plumbing equivalent of "git diff --staged"
    
    git diff-index HEAD
    # Working tree vs HEAD
    
    git diff-index --quiet HEAD || echo "Repo is dirty"
    # Useful test in scripts and hooks
    
    git diff-index --name-only --diff-filter=A HEAD
    # List newly added files</code></pre>
    <h2>Erreurs fréquentes</h2>
    <p>The default raw output isn't patch text — pass <code>-p</code> for that. <code>--quiet</code> sets the exit code rather than printing, which is the opposite of what users sometimes expect from a "diff" command.</p>
    <h2>Commandes liées</h2>
    <p><code>git diff</code>, <code>git diff-tree</code>, <code>git status</code>, <code>git ls-files</code></p>
    

- source_title: "git checkout-index — Copy files from the index to the working tree"
  title: "git checkout-index — Copier les fichiers de l'index vers l'arborescence"
  langcode: fr
  body: |
    <h2>Synopsis</h2>
    <pre><code>git checkout-index [-a] [-f] [-u] [--prefix=&lt;dir&gt;] [&lt;file&gt;...]</code></pre>
    <h2>Description</h2>
    <p>The <code>git checkout-index</code> command writes file content from the index out to the working tree (or to an arbitrary directory using <code>--prefix</code>). It does not change the index, the current branch, or HEAD — making it safer than <code>git checkout</code> for scripted file extraction.</p>
    <p>Dans l'usage quotidien, <code>git checkout-index</code> s'intègre étroitement avec les alias de shell, les plugins d'éditeur et l'intégration continue. Les utilisateurs avancés ajoutent souvent des alias combinant les flags qu'ils passent toujours, ou enveloppent la commande dans des scripts qui appliquent les conventions d'équipe. Le formatage de la sortie peut être personnalisé via la configuration Git — pretty formats, schémas de couleurs et comportement du pager sont tous ajustables. Quand quelque chose tourne mal, la première étape de diagnostic est généralement de relancer la commande avec <code>GIT_TRACE=1</code> dans l'environnement, ce qui révèle les appels de plomberie sous-jacents. Pour les situations inhabituelles, la sortie <code>--help</code> (<code>git checkout-index --help</code>) ouvre la page de manuel complète avec les détails de chaque option, y compris celles rarement utilisées dans les workflows ordinaires mais essentielles pour le débogage ou le scripting à grande échelle.</p><p>Comprendre comment <code>git checkout-index</code> interagit avec le reste du modèle de données de Git — la base d'objets, l'index, les refs et l'arborescence de travail — est rentable. Chaque commande opère sur un sous-ensemble de ces pièces, et savoir laquelle elle touche aide à prédire les résultats et récupérer après les erreurs. Lire la documentation officielle de Git en parallèle de la pratique sur un dépôt jetable est la façon la plus rapide d'intérioriser les subtilités. La plupart des problèmes de production avec Git proviennent de l'une de trois causes : comportement par défaut surprenant, opérations réseau partielles, ou réécriture d'historique déjà partagé. Un modèle mental fonctionnel des effets de bord de <code>git checkout-index</code> aide à éviter les trois.</p>
        <h2>When to Use</h2>
    <p>Most users never need this. Use it when scripting deployment from the index, building source tarballs, or exporting a snapshot to a directory other than the working tree.</p>
    <h2>Options courantes</h2>
    <table>
      <thead><tr><th>Option</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>-a</code>, <code>--all</code></td><td>Check out every file in the index.</td></tr>
        <tr><td><code>-f</code>, <code>--force</code></td><td>Overwrite existing files.</td></tr>
        <tr><td><code>-u</code></td><td>Update stat information for files written.</td></tr>
        <tr><td><code>--prefix=&lt;dir&gt;</code></td><td>Write into <code>&lt;dir&gt;</code> instead of working tree.</td></tr>
        <tr><td><code>--stage=&lt;n&gt;</code></td><td>Check out a specific stage (1=base, 2=ours, 3=theirs).</td></tr>
        <tr><td><code>-z</code></td><td>NUL-terminated input/output.</td></tr>
        <tr><td><code>--no-create</code></td><td>Don't create files; just update stats.</td></tr>
      </tbody>
    </table>
    <h2>Exemples</h2>
    <pre><code>git checkout-index -a -f --prefix=/tmp/snapshot/
    # Export the entire index to /tmp/snapshot/
    
    git checkout-index --prefix=build/ src/main.c
    # Copy a single file into build/
    
    git checkout-index --stage=2 -f -- conflicted.txt
    # Pick "ours" version during a conflict
    
    git ls-files | git checkout-index -f --stdin
    # Restore every tracked file from the index</code></pre>
    <h2>Erreurs fréquentes</h2>
    <p>The <code>--prefix</code> argument must end with a slash, otherwise filenames concatenate awkwardly. Without <code>-f</code>, existing files in the destination cause errors. Picking the wrong <code>--stage</code> during conflict resolution applies a worse version than intended.</p>
    <h2>Commandes liées</h2>
    <p><code>git checkout</code>, <code>git restore</code>, <code>git archive</code>, <code>git ls-files</code></p>
    
