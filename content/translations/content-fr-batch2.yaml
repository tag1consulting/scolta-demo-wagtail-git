    <p><code>git fetch</code>, <code>git merge</code>, <code>git rebase</code>, <code>git push</code></p>
    

- source_title: "git push — Update remote refs along with associated objects"
  title: "git push — Mettre à jour les refs distantes avec les objets associés"
  langcode: fr
  body: |
    <h2>Synopsis</h2>
    <pre><code>git push [&lt;remote&gt; [&lt;refspec&gt;...]] [--force-with-lease] [--tags] [--delete]</code></pre>
    <h2>Description</h2>
    <p>The <code>git push</code> command sends local commits to a remote repository, updating remote branches to match your local ones. The first push of a new branch typically requires <code>-u</code> to set up tracking. By default, push is non-destructive: it refuses to overwrite remote history that you don't have locally. Use <code>--force-with-lease</code> when you genuinely need to rewrite remote history (after a rebase) — never use plain <code>--force</code> on shared branches.</p>
    <p>Push obeys server-side rules: branch protections, required reviews, signed commits, and pre-receive hooks can all reject a push. Read the error message carefully when this happens.</p>
    <p>Dans l'usage quotidien, <code>git push</code> s'intègre étroitement avec les alias de shell, les plugins d'éditeur et l'intégration continue. Les utilisateurs avancés ajoutent souvent des alias combinant les flags qu'ils passent toujours, ou enveloppent la commande dans des scripts qui appliquent les conventions d'équipe. Le formatage de la sortie peut être personnalisé via la configuration Git — pretty formats, schémas de couleurs et comportement du pager sont tous ajustables. Quand quelque chose tourne mal, la première étape de diagnostic est généralement de relancer la commande avec <code>GIT_TRACE=1</code> dans l'environnement, ce qui révèle les appels de plomberie sous-jacents. Pour les situations inhabituelles, la sortie <code>--help</code> (<code>git push --help</code>) ouvre la page de manuel complète avec les détails de chaque option, y compris celles rarement utilisées dans les workflows ordinaires mais essentielles pour le débogage ou le scripting à grande échelle.</p><p>Comprendre comment <code>git push</code> interagit avec le reste du modèle de données de Git — la base d'objets, l'index, les refs et l'arborescence de travail — est rentable. Chaque commande opère sur un sous-ensemble de ces pièces, et savoir laquelle elle touche aide à prédire les résultats et récupérer après les erreurs. Lire la documentation officielle de Git en parallèle de la pratique sur un dépôt jetable est la façon la plus rapide d'intérioriser les subtilités. La plupart des problèmes de production avec Git proviennent de l'une de trois causes : comportement par défaut surprenant, opérations réseau partielles, ou réécriture d'historique déjà partagé. Un modèle mental fonctionnel des effets de bord de <code>git push</code> aide à éviter les trois.</p>
        <h2>Options courantes</h2>
    <table>
      <thead><tr><th>Option</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>-u</code>, <code>--set-upstream</code></td><td>Définir l'upstream pour les défauts push/pull futurs.</td></tr>
        <tr><td><code>--force-with-lease</code></td><td>Forcer le push seulement si la ref distante correspond à votre dernière valeur fetchée.</td></tr>
        <tr><td><code>--force</code> / <code>-f</code></td><td>Force-écraser l'historique distant (dangereux sur les branches partagées).</td></tr>
        <tr><td><code>--tags</code></td><td>Pousser tous les tags locaux.</td></tr>
        <tr><td><code>--delete</code></td><td>Supprimer une branche distante.</td></tr>
        <tr><td><code>--dry-run</code></td><td>Afficher ce qui serait poussé.</td></tr>
        <tr><td><code>--all</code></td><td>Pousser toutes les branches.</td></tr>
        <tr><td><code>--atomic</code></td><td>Mise à jour tout-ou-rien de plusieurs refs.</td></tr>
      </tbody>
    </table>
    <h2>Exemples</h2>
    <pre><code>git push -u origin feature/login
    # Premier push d'une nouvelle branche avec tracking
    
    git push --force-with-lease
    # Alternative plus sûre à --force après un rebase
    
    git push origin --delete old-feature
    # Supprimer une branche distante
    
    git push --tags
    # Publier tous les tags locaux</code></pre>
    <h2>Erreurs fréquentes</h2>
    <p>Plain <code>--force</code> can wipe out colleagues' commits. Use <code>--force-with-lease</code> instead. Pushing to <code>main</code> directly bypasses code review on many teams — set up branch protection. Forgetting <code>-u</code> means future <code>git push</code> commands need explicit arguments.</p>
    <h2>Commandes liées</h2>
    <p><code>git fetch</code>, <code>git pull</code>, <code>git remote</code>, <code>git tag</code></p>
    

- source_title: "git ls-remote — List references in a remote repository"
  title: "git ls-remote — Lister les références d'un dépôt distant"
  langcode: fr
  body: |
    <h2>Synopsis</h2>
    <pre><code>git ls-remote [--heads] [--tags] [&lt;repository&gt; [&lt;refs&gt;...]]</code></pre>
    <h2>Description</h2>
    <p>The <code>git ls-remote</code> command queries a remote (without cloning or fetching) and prints the SHA-1 of each ref alongside the ref name. It is invaluable for scripting, CI pipelines, and quick inspection — for example, finding the latest tag on a remote or checking whether a branch exists. Because it does not download objects, it's lightweight and fast even against very large repositories.</p>
    <p>You can pass a URL directly without configuring a remote first: <code>git ls-remote https://github.com/user/repo.git</code>. This makes it ideal for one-off inspection or build scripts that resolve a "latest" version.</p>
    <p>Dans l'usage quotidien, <code>git ls-remote</code> s'intègre étroitement avec les alias de shell, les plugins d'éditeur et l'intégration continue. Les utilisateurs avancés ajoutent souvent des alias combinant les flags qu'ils passent toujours, ou enveloppent la commande dans des scripts qui appliquent les conventions d'équipe. Le formatage de la sortie peut être personnalisé via la configuration Git — pretty formats, schémas de couleurs et comportement du pager sont tous ajustables. Quand quelque chose tourne mal, la première étape de diagnostic est généralement de relancer la commande avec <code>GIT_TRACE=1</code> dans l'environnement, ce qui révèle les appels de plomberie sous-jacents. Pour les situations inhabituelles, la sortie <code>--help</code> (<code>git ls-remote --help</code>) ouvre la page de manuel complète avec les détails de chaque option, y compris celles rarement utilisées dans les workflows ordinaires mais essentielles pour le débogage ou le scripting à grande échelle.</p><p>Comprendre comment <code>git ls-remote</code> interagit avec le reste du modèle de données de Git — la base d'objets, l'index, les refs et l'arborescence de travail — est rentable. Chaque commande opère sur un sous-ensemble de ces pièces, et savoir laquelle elle touche aide à prédire les résultats et récupérer après les erreurs. Lire la documentation officielle de Git en parallèle de la pratique sur un dépôt jetable est la façon la plus rapide d'intérioriser les subtilités. La plupart des problèmes de production avec Git proviennent de l'une de trois causes : comportement par défaut surprenant, opérations réseau partielles, ou réécriture d'historique déjà partagé. Un modèle mental fonctionnel des effets de bord de <code>git ls-remote</code> aide à éviter les trois.</p>
        <h2>Options courantes</h2>
    <table>
      <thead><tr><th>Option</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>--heads</code> / <code>-h</code></td><td>Limiter la sortie aux refs de branches.</td></tr>
        <tr><td><code>--tags</code> / <code>-t</code></td><td>Limiter la sortie aux refs de tags.</td></tr>
        <tr><td><code>--refs</code></td><td>Filtrer le déréférencement (peel) des tags annotés.</td></tr>
        <tr><td><code>--symref</code></td><td>Afficher vers quoi pointent les refs symboliques (comme HEAD).</td></tr>
        <tr><td><code>--exit-code</code></td><td>Sortir avec un code non nul si aucune ref correspondante.</td></tr>
        <tr><td><code>--sort=&lt;key&gt;</code></td><td>Trier les résultats par version, refname, etc.</td></tr>
      </tbody>
    </table>
    <h2>Exemples</h2>
    <pre><code>git ls-remote --heads origin
    # Lister toutes les branches sur origin avec leurs SHAs
    
    git ls-remote --tags --refs origin
    # Lister tous les tags (en sautant les déréférencements ^{})
    
    git ls-remote https://github.com/git/git.git HEAD
    # Afficher vers quoi pointe HEAD sur un dépôt public
    
    git ls-remote --sort=-v:refname --tags origin 'v*' | head -1
    # Trouver le tag semver le plus élevé</code></pre>
    <h2>Erreurs fréquentes</h2>
    <p>Parsing the output without <code>--refs</code> shows annotated tags twice (once as the tag object, once as <code>name^{}</code> for the underlying commit). Use <code>--refs</code> to suppress the peeled lines. Authentication can fail silently against private repos without a credential helper — test interactively first.</p>
    <h2>Commandes liées</h2>
    <p><code>git remote</code>, <code>git fetch</code>, <code>git tag</code>, <code>git for-each-ref</code></p>
    

- source_title: "git log — Show commit history"
  title: "git log — Afficher l'historique des commits"
  langcode: fr
  body: |
    <h2>Synopsis</h2>
    <pre><code>git log [&lt;options&gt;] [&lt;revision-range&gt;] [[--] &lt;path&gt;...]</code></pre>
    <h2>Description</h2>
    <p>The <code>git log</code> command displays the commit history reachable from one or more refs (defaulting to HEAD). It is one of the most flexible tools in Git, supporting filtering by author, date, message content, file paths, and more. Combined with formatting options, it can produce output suitable for changelogs, audits, and code archaeology.</p>
    <p>Useful idioms include <code>git log --oneline --graph --decorate --all</code> for a compact, visual view of the entire history, and <code>git log -p</code> to see patches inline. Pathspec arguments restrict the log to commits that touched specific files.</p>
    <p>Dans l'usage quotidien, <code>git log</code> s'intègre étroitement avec les alias de shell, les plugins d'éditeur et l'intégration continue. Les utilisateurs avancés ajoutent souvent des alias combinant les flags qu'ils passent toujours, ou enveloppent la commande dans des scripts qui appliquent les conventions d'équipe. Le formatage de la sortie peut être personnalisé via la configuration Git — pretty formats, schémas de couleurs et comportement du pager sont tous ajustables. Quand quelque chose tourne mal, la première étape de diagnostic est généralement de relancer la commande avec <code>GIT_TRACE=1</code> dans l'environnement, ce qui révèle les appels de plomberie sous-jacents. Pour les situations inhabituelles, la sortie <code>--help</code> (<code>git log --help</code>) ouvre la page de manuel complète avec les détails de chaque option, y compris celles rarement utilisées dans les workflows ordinaires mais essentielles pour le débogage ou le scripting à grande échelle.</p><p>Comprendre comment <code>git log</code> interagit avec le reste du modèle de données de Git — la base d'objets, l'index, les refs et l'arborescence de travail — est rentable. Chaque commande opère sur un sous-ensemble de ces pièces, et savoir laquelle elle touche aide à prédire les résultats et récupérer après les erreurs. Lire la documentation officielle de Git en parallèle de la pratique sur un dépôt jetable est la façon la plus rapide d'intérioriser les subtilités. La plupart des problèmes de production avec Git proviennent de l'une de trois causes : comportement par défaut surprenant, opérations réseau partielles, ou réécriture d'historique déjà partagé. Un modèle mental fonctionnel des effets de bord de <code>git log</code> aide à éviter les trois.</p>
        <h2>Options courantes</h2>
    <table>
      <thead><tr><th>Option</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>--oneline</code></td><td>Un commit par ligne, SHA abrégé + sujet.</td></tr>
        <tr><td><code>--graph</code></td><td>Art ASCII de la structure de branches et merges.</td></tr>
        <tr><td><code>--all</code></td><td>Inclure toutes les refs, pas seulement HEAD.</td></tr>
        <tr><td><code>-p</code>, <code>--patch</code></td><td>Afficher les diffs avec chaque commit.</td></tr>
        <tr><td><code>--stat</code></td><td>Afficher les statistiques de fichiers modifiés.</td></tr>
        <tr><td><code>--author=&lt;pattern&gt;</code></td><td>Filtrer par auteur.</td></tr>
        <tr><td><code>--since</code> / <code>--until</code></td><td>Filtrer par date.</td></tr>
        <tr><td><code>-S &lt;string&gt;</code></td><td>Pickaxe : trouver les commits qui ajoutent/suppriment cette chaîne.</td></tr>
        <tr><td><code>--follow</code></td><td>Suivre l'historique d'un fichier à travers les renommages.</td></tr>
      </tbody>
    </table>
    <h2>Exemples</h2>
    <pre><code>git log --oneline --graph --decorate --all
    # Historique visuel compact de tout
    
    git log -p src/auth.py
    # Diffs complets de chaque commit touchant auth.py
    
    git log -S "TODO" --since="2 weeks ago"
    # Trouver les commits récents qui ont ajouté ou supprimé "TODO"
    
    git log --author="alice" --pretty=format:"%h %s" -n 20
    # 20 derniers commits d'alice au format personnalisé</code></pre>
    <h2>Erreurs fréquentes</h2>
    <p>Forgetting that <code>git log file.txt</code> only shows commits where <code>file.txt</code> existed — use <code>--follow</code> if it has been renamed. Over-relying on <code>--grep</code> when you really want <code>-S</code> (which searches diffs, not messages). And on huge repos, <code>git log -p</code> without a path can produce gigabytes of output.</p>
    <h2>Commandes liées</h2>
    <p><code>git show</code>, <code>git blame</code>, <code>git shortlog</code>, <code>git diff</code></p>
    

- source_title: "git show — Show various types of objects"
  title: "git show — Afficher divers types d'objets"
  langcode: fr
  body: |
    <h2>Synopsis</h2>
    <pre><code>git show [&lt;options&gt;] [&lt;object&gt;...]</code></pre>
    <h2>Description</h2>
    <p>The <code>git show</code> command displays information about Git objects: commits (with diff), tags (annotation + tagged object), trees (file listing), or blobs (file contents). Without arguments, it shows the most recent commit. With a path argument, it displays the file as it existed at a specific revision.</p>
    <p><code>git show</code> is the go-to tool for inspecting a single commit in detail. Unlike <code>git log -1 -p</code>, it formats both annotated tags and tree listings naturally, making it useful for examining release tags or extracting historical file contents.</p>
    <p>Dans l'usage quotidien, <code>git show</code> s'intègre étroitement avec les alias de shell, les plugins d'éditeur et l'intégration continue. Les utilisateurs avancés ajoutent souvent des alias combinant les flags qu'ils passent toujours, ou enveloppent la commande dans des scripts qui appliquent les conventions d'équipe. Le formatage de la sortie peut être personnalisé via la configuration Git — pretty formats, schémas de couleurs et comportement du pager sont tous ajustables. Quand quelque chose tourne mal, la première étape de diagnostic est généralement de relancer la commande avec <code>GIT_TRACE=1</code> dans l'environnement, ce qui révèle les appels de plomberie sous-jacents. Pour les situations inhabituelles, la sortie <code>--help</code> (<code>git show --help</code>) ouvre la page de manuel complète avec les détails de chaque option, y compris celles rarement utilisées dans les workflows ordinaires mais essentielles pour le débogage ou le scripting à grande échelle.</p><p>Comprendre comment <code>git show</code> interagit avec le reste du modèle de données de Git — la base d'objets, l'index, les refs et l'arborescence de travail — est rentable. Chaque commande opère sur un sous-ensemble de ces pièces, et savoir laquelle elle touche aide à prédire les résultats et récupérer après les erreurs. Lire la documentation officielle de Git en parallèle de la pratique sur un dépôt jetable est la façon la plus rapide d'intérioriser les subtilités. La plupart des problèmes de production avec Git proviennent de l'une de trois causes : comportement par défaut surprenant, opérations réseau partielles, ou réécriture d'historique déjà partagé. Un modèle mental fonctionnel des effets de bord de <code>git show</code> aide à éviter les trois.</p>
        <h2>Options courantes</h2>
    <table>
      <thead><tr><th>Option</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>--stat</code></td><td>Ajouter un résumé diffstat.</td></tr>
        <tr><td><code>--name-only</code></td><td>Lister seulement les noms des fichiers modifiés.</td></tr>
        <tr><td><code>--pretty=&lt;fmt&gt;</code></td><td>Choisir le format : <code>oneline</code>, <code>short</code>, <code>full</code>, custom.</td></tr>
        <tr><td><code>-s</code>, <code>--no-patch</code></td><td>Supprimer le diff.</td></tr>
        <tr><td><code>--show-signature</code></td><td>Vérifier et afficher les signatures GPG.</td></tr>
        <tr><td><code>--word-diff</code></td><td>Mettre en évidence les changements au niveau du mot.</td></tr>
      </tbody>
    </table>
    <h2>Exemples</h2>
    <pre><code>git show HEAD
    # Dernier commit avec diff
    
    git show v2.0.0
    # Afficher un tag annoté
    
    git show HEAD:src/main.c
    # Afficher le fichier tel qu'il était à HEAD
    
    git show --stat abc123
    # Seulement le diffstat pour un commit spécifique</code></pre>
    <h2>Erreurs fréquentes</h2>
    <p>Confusing <code>git show HEAD~1</code> (one commit before HEAD) with <code>git show HEAD^1</code> (first parent of HEAD) — they're equivalent on linear history but differ on merges. Also note <code>git show HEAD:file</code> uses a colon, not a space, to specify a file at a revision.</p>
