- source_title: "git gc — Cleanup unnecessary files and optimize the local repository"
  title: "git gc — Nettoyer les fichiers inutiles et optimiser le dépôt local"
  langcode: fr
  body: |
    <h2>Synopsis</h2>
    <pre><code>git gc [--auto] [--aggressive] [--prune=&lt;date&gt;]</code></pre>
    <h2>Description</h2>
    <p>The <code>git gc</code> command runs housekeeping tasks: it packs loose objects, removes unreachable objects past the prune window, packs refs, and updates auxiliary files. Git automatically runs <code>gc --auto</code> after operations that create many loose objects (like a large fetch), so most users never invoke <code>gc</code> manually. Manual invocation is useful after rewriting history, deleting many branches, or to reclaim disk space immediately.</p>
    <p>The <code>--aggressive</code> flag does extra work — recomputing deltas — but is rarely worth the time. Modern Git's default behavior is well-tuned. The <code>--prune</code> argument controls how old unreachable objects must be before they're deleted; the default is two weeks.</p>
    <p>Dans l'usage quotidien, <code>git gc</code> s'intègre étroitement avec les alias de shell, les plugins d'éditeur et l'intégration continue. Les utilisateurs avancés ajoutent souvent des alias combinant les flags qu'ils passent toujours, ou enveloppent la commande dans des scripts qui appliquent les conventions d'équipe. Le formatage de la sortie peut être personnalisé via la configuration Git — pretty formats, schémas de couleurs et comportement du pager sont tous ajustables. Quand quelque chose tourne mal, la première étape de diagnostic est généralement de relancer la commande avec <code>GIT_TRACE=1</code> dans l'environnement, ce qui révèle les appels de plomberie sous-jacents. Pour les situations inhabituelles, la sortie <code>--help</code> (<code>git gc --help</code>) ouvre la page de manuel complète avec les détails de chaque option, y compris celles rarement utilisées dans les workflows ordinaires mais essentielles pour le débogage ou le scripting à grande échelle.</p><p>Comprendre comment <code>git gc</code> interagit avec le reste du modèle de données de Git — la base d'objets, l'index, les refs et l'arborescence de travail — est rentable. Chaque commande opère sur un sous-ensemble de ces pièces, et savoir laquelle elle touche aide à prédire les résultats et récupérer après les erreurs. Lire la documentation officielle de Git en parallèle de la pratique sur un dépôt jetable est la façon la plus rapide d'intérioriser les subtilités. La plupart des problèmes de production avec Git proviennent de l'une de trois causes : comportement par défaut surprenant, opérations réseau partielles, ou réécriture d'historique déjà partagé. Un modèle mental fonctionnel des effets de bord de <code>git gc</code> aide à éviter les trois.</p>
        <h2>Options courantes</h2>
    <table>
      <thead><tr><th>Option</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>--auto</code></td><td>Run only if Git's heuristics say maintenance is needed.</td></tr>
        <tr><td><code>--aggressive</code></td><td>Spend more time finding optimal deltas.</td></tr>
        <tr><td><code>--prune=&lt;date&gt;</code></td><td>Prune unreachable objects older than this.</td></tr>
        <tr><td><code>--no-prune</code></td><td>Skip pruning of loose objects.</td></tr>
        <tr><td><code>--quiet</code></td><td>Suppress progress output.</td></tr>
        <tr><td><code>--force</code></td><td>Run even if another gc is in progress.</td></tr>
      </tbody>
    </table>
    <h2>Exemples</h2>
    <pre><code>git gc
    # Routine maintenance
    
    git gc --auto
    # What Git runs in the background; safe to call manually
    
    git gc --prune=now
    # Aggressively reclaim space; deletes recent unreachables (use with care)
    
    git gc --aggressive
    # Slow, exhaustive repacking — rarely worth it</code></pre>
    <h2>Erreurs fréquentes</h2>
    <p><code>--prune=now</code> immediately deletes unreachable objects, possibly including ones still referenced by reflog or stash. Don't use it casually. Disabling automatic gc on a large repo lets loose objects accumulate; configure <code>maintenance</code> instead for newer Git.</p>
    <h2>Commandes liées</h2>
    <p><code>git maintenance</code>, <code>git repack</code>, <code>git prune</code>, <code>git fsck</code></p>
    

- source_title: "git fsck — Verify the connectivity and validity of objects"
  title: "git fsck — Vérifier la connectivité et la validité des objets"
  langcode: fr
  body: |
    <h2>Synopsis</h2>
    <pre><code>git fsck [--full] [--unreachable] [--dangling] [--lost-found]</code></pre>
    <h2>Description</h2>
    <p>The <code>git fsck</code> command validates the integrity of the object database: every commit, tree, blob, and tag is checked for correct hash, valid format, and intact references. It identifies dangling objects (no ref points to them, but they aren't unreachable from a reflog) and unreachable objects (truly orphaned).</p>
    <p>This is the tool of choice for diagnosing repository corruption (often after a disk failure or interrupted operation), and for finding "lost" commits in the dangling category that might be recoverable.</p>
    <p>Dans l'usage quotidien, <code>git fsck</code> s'intègre étroitement avec les alias de shell, les plugins d'éditeur et l'intégration continue. Les utilisateurs avancés ajoutent souvent des alias combinant les flags qu'ils passent toujours, ou enveloppent la commande dans des scripts qui appliquent les conventions d'équipe. Le formatage de la sortie peut être personnalisé via la configuration Git — pretty formats, schémas de couleurs et comportement du pager sont tous ajustables. Quand quelque chose tourne mal, la première étape de diagnostic est généralement de relancer la commande avec <code>GIT_TRACE=1</code> dans l'environnement, ce qui révèle les appels de plomberie sous-jacents. Pour les situations inhabituelles, la sortie <code>--help</code> (<code>git fsck --help</code>) ouvre la page de manuel complète avec les détails de chaque option, y compris celles rarement utilisées dans les workflows ordinaires mais essentielles pour le débogage ou le scripting à grande échelle.</p><p>Comprendre comment <code>git fsck</code> interagit avec le reste du modèle de données de Git — la base d'objets, l'index, les refs et l'arborescence de travail — est rentable. Chaque commande opère sur un sous-ensemble de ces pièces, et savoir laquelle elle touche aide à prédire les résultats et récupérer après les erreurs. Lire la documentation officielle de Git en parallèle de la pratique sur un dépôt jetable est la façon la plus rapide d'intérioriser les subtilités. La plupart des problèmes de production avec Git proviennent de l'une de trois causes : comportement par défaut surprenant, opérations réseau partielles, ou réécriture d'historique déjà partagé. Un modèle mental fonctionnel des effets de bord de <code>git fsck</code> aide à éviter les trois.</p>
        <h2>Options courantes</h2>
    <table>
      <thead><tr><th>Option</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>--full</code></td><td>Check every object, including reachable ones.</td></tr>
        <tr><td><code>--unreachable</code></td><td>Report unreachable objects.</td></tr>
        <tr><td><code>--dangling</code></td><td>Report dangling objects (default).</td></tr>
        <tr><td><code>--no-dangling</code></td><td>Suppress dangling listing.</td></tr>
        <tr><td><code>--lost-found</code></td><td>Write dangling objects to <code>.git/lost-found/</code>.</td></tr>
        <tr><td><code>--connectivity-only</code></td><td>Skip blob content verification.</td></tr>
        <tr><td><code>--strict</code></td><td>Report extra warnings.</td></tr>
      </tbody>
    </table>
    <h2>Exemples</h2>
    <pre><code>git fsck --full
    # Comprehensive check
    
    git fsck --lost-found
    # Materialize dangling commits/blobs into recoverable files
    
    git fsck --unreachable --no-reflogs
    # Find truly orphaned objects (ignoring reflog protection)
    
    git fsck --connectivity-only
    # Faster check that skips content hashing</code></pre>
    <h2>Erreurs fréquentes</h2>
    <p>Acting on "unreachable" warnings without considering reflog protection can lose recoverable work. <code>fsck</code> is read-only; it never deletes anything itself. Errors found by <code>fsck</code> are often resolved by <code>git gc</code> or by re-cloning a fresh copy.</p>
    <h2>Commandes liées</h2>
    <p><code>git gc</code>, <code>git reflog</code>, <code>git verify-pack</code>, <code>git prune</code></p>
    

- source_title: "git prune — Prune all unreachable objects from the object database"
  title: "git prune — Élaguer tous les objets inatteignables de la base d'objets"
  langcode: fr
  body: |
    <h2>Synopsis</h2>
    <pre><code>git prune [-n] [--expire=&lt;date&gt;]</code></pre>
    <h2>Description</h2>
    <p>The <code>git prune</code> command deletes loose objects that aren't reachable from any ref. It is normally invoked indirectly by <code>git gc</code>; running it directly bypasses some of <code>gc</code>'s safety checks. The <code>--expire</code> grace period (default 2 weeks) prevents deleting recently created objects that may belong to in-progress operations.</p>
    <p>Dans l'usage quotidien, <code>git prune</code> s'intègre étroitement avec les alias de shell, les plugins d'éditeur et l'intégration continue. Les utilisateurs avancés ajoutent souvent des alias combinant les flags qu'ils passent toujours, ou enveloppent la commande dans des scripts qui appliquent les conventions d'équipe. Le formatage de la sortie peut être personnalisé via la configuration Git — pretty formats, schémas de couleurs et comportement du pager sont tous ajustables. Quand quelque chose tourne mal, la première étape de diagnostic est généralement de relancer la commande avec <code>GIT_TRACE=1</code> dans l'environnement, ce qui révèle les appels de plomberie sous-jacents. Pour les situations inhabituelles, la sortie <code>--help</code> (<code>git prune --help</code>) ouvre la page de manuel complète avec les détails de chaque option, y compris celles rarement utilisées dans les workflows ordinaires mais essentielles pour le débogage ou le scripting à grande échelle.</p><p>Comprendre comment <code>git prune</code> interagit avec le reste du modèle de données de Git — la base d'objets, l'index, les refs et l'arborescence de travail — est rentable. Chaque commande opère sur un sous-ensemble de ces pièces, et savoir laquelle elle touche aide à prédire les résultats et récupérer après les erreurs. Lire la documentation officielle de Git en parallèle de la pratique sur un dépôt jetable est la façon la plus rapide d'intérioriser les subtilités. La plupart des problèmes de production avec Git proviennent de l'une de trois causes : comportement par défaut surprenant, opérations réseau partielles, ou réécriture d'historique déjà partagé. Un modèle mental fonctionnel des effets de bord de <code>git prune</code> aide à éviter les trois.</p>
        <h2>When to Use</h2>
    <p>Most users never run <code>git prune</code> manually — <code>git gc</code> handles it. Reach for it only when <code>gc</code>'s defaults don't fit, or when you've explicitly purged history with <code>filter-repo</code> and want immediate space reclamation. Even then, <code>git gc --prune=now</code> is the more common path.</p>
    <h2>Options courantes</h2>
    <table>
      <thead><tr><th>Option</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>-n</code>, <code>--dry-run</code></td><td>Show what would be deleted without deleting.</td></tr>
        <tr><td><code>--expire=&lt;date&gt;</code></td><td>Only prune objects older than this.</td></tr>
        <tr><td><code>--progress</code></td><td>Show progress.</td></tr>
        <tr><td><code>--verbose</code></td><td>Detail every object pruned.</td></tr>
      </tbody>
    </table>
    <h2>Exemples</h2>
    <pre><code>git prune -n
    # Preview prune
    
    git prune --expire=now
    # Aggressive: delete all unreachables right now
    
    git prune --expire=2.weeks.ago
    # Default behavior: keep recent unreachables</code></pre>
    <h2>Erreurs fréquentes</h2>
    <p><code>git prune --expire=now</code> can delete objects that are still in the reflog or stash if you've recently expired them. Always run <code>git fsck</code> first to understand what's at risk. On a busy repo, prune while a fetch or rebase is happening can cause issues.</p>
    <h2>Commandes liées</h2>
    <p><code>git gc</code>, <code>git fsck</code>, <code>git reflog expire</code>, <code>git repack</code></p>
    

- source_title: "git repack — Pack unpacked objects in a repository"
  title: "git repack — Packer les objets non packés d'un dépôt"
  langcode: fr
  body: |
    <h2>Synopsis</h2>
    <pre><code>git repack [-a] [-d] [-l] [--depth=&lt;n&gt;] [--window=&lt;n&gt;]</code></pre>
    <h2>Description</h2>
    <p>The <code>git repack</code> command repackages the repository's objects, combining multiple packs into one and optionally moving loose objects into packs. It's the primary way Git stays compact. <code>git gc</code> calls <code>repack</code> as part of its work; manual <code>repack</code> exposes finer control over delta search parameters.</p>
    <p>Dans l'usage quotidien, <code>git repack</code> s'intègre étroitement avec les alias de shell, les plugins d'éditeur et l'intégration continue. Les utilisateurs avancés ajoutent souvent des alias combinant les flags qu'ils passent toujours, ou enveloppent la commande dans des scripts qui appliquent les conventions d'équipe. Le formatage de la sortie peut être personnalisé via la configuration Git — pretty formats, schémas de couleurs et comportement du pager sont tous ajustables. Quand quelque chose tourne mal, la première étape de diagnostic est généralement de relancer la commande avec <code>GIT_TRACE=1</code> dans l'environnement, ce qui révèle les appels de plomberie sous-jacents. Pour les situations inhabituelles, la sortie <code>--help</code> (<code>git repack --help</code>) ouvre la page de manuel complète avec les détails de chaque option, y compris celles rarement utilisées dans les workflows ordinaires mais essentielles pour le débogage ou le scripting à grande échelle.</p><p>Comprendre comment <code>git repack</code> interagit avec le reste du modèle de données de Git — la base d'objets, l'index, les refs et l'arborescence de travail — est rentable. Chaque commande opère sur un sous-ensemble de ces pièces, et savoir laquelle elle touche aide à prédire les résultats et récupérer après les erreurs. Lire la documentation officielle de Git en parallèle de la pratique sur un dépôt jetable est la façon la plus rapide d'intérioriser les subtilités. La plupart des problèmes de production avec Git proviennent de l'une de trois causes : comportement par défaut surprenant, opérations réseau partielles, ou réécriture d'historique déjà partagé. Un modèle mental fonctionnel des effets de bord de <code>git repack</code> aide à éviter les trois.</p>
        <h2>When to Use</h2>
    <p>Most users rely on <code>gc</code>. Reach for <code>repack</code> directly when tuning storage on a server (large repos benefit from custom <code>--depth</code>, <code>--window</code>) or when investigating storage layout.</p>
    <h2>Options courantes</h2>
    <table>
      <thead><tr><th>Option</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>-a</code></td><td>Pack everything reachable into a single pack.</td></tr>
        <tr><td><code>-A</code></td><td>Like <code>-a</code> but keep unreachables loose.</td></tr>
        <tr><td><code>-d</code></td><td>Delete redundant packs after repacking.</td></tr>
        <tr><td><code>-l</code></td><td>Pass <code>--local</code> to <code>pack-objects</code>.</td></tr>
        <tr><td><code>--depth=&lt;n&gt;</code></td><td>Maximum delta chain depth.</td></tr>
        <tr><td><code>--window=&lt;n&gt;</code></td><td>Window size for delta selection.</td></tr>
        <tr><td><code>-k</code>, <code>--keep-pack=&lt;name&gt;</code></td><td>Keep the named pack untouched.</td></tr>
      </tbody>
    </table>
    <h2>Exemples</h2>
    <pre><code>git repack -ad
    # Single pack, drop redundant ones
    
    git repack -a -d --depth=50 --window=250
    # Tighter packing for storage savings (slower)
    
    git repack -A -d
    # Keep unreachables loose for safety</code></pre>
    <h2>Erreurs fréquentes</h2>
    <p>Aggressive parameters consume RAM and CPU disproportionate to space saved. Default values are tuned reasonably. Forgetting <code>-d</code> after <code>-a</code> leaves duplicate packs.</p>
