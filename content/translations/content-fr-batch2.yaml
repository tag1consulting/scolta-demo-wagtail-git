        <h2>When to Use</h2>
    <p>Most developers never need <code>git cat-file</code> directly — porcelain commands like <code>git show</code>, <code>git log</code>, and <code>git diff</code> wrap it transparently. Reach for it when writing scripts that walk Git objects, debugging repository corruption, or learning how Git stores data internally.</p>
    <h2>Options courantes</h2>
    <table>
      <thead><tr><th>Option</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>-t</code></td><td>Print object type.</td></tr>
        <tr><td><code>-s</code></td><td>Print object size in bytes.</td></tr>
        <tr><td><code>-p</code></td><td>Pretty-print contents in a type-aware way.</td></tr>
        <tr><td><code>-e</code></td><td>Exit zero if the object exists.</td></tr>
        <tr><td><code>--batch</code></td><td>Stream <code>&lt;sha&gt; &lt;type&gt; &lt;size&gt; CRLF &lt;content&gt;</code> for each input.</td></tr>
        <tr><td><code>--batch-check</code></td><td>Like batch, but only header lines.</td></tr>
        <tr><td><code>--filters</code></td><td>Apply smudge filters when printing blobs.</td></tr>
      </tbody>
    </table>
    <h2>Exemples</h2>
    <pre><code>git cat-file -t HEAD
    # commit
    
    git cat-file -p HEAD
    # Show commit message and tree/parent SHAs
    
