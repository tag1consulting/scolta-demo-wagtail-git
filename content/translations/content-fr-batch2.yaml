        <h2>Options courantes</h2>
    <table>
      <thead><tr><th>Option</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>-L &lt;start&gt;,&lt;end&gt;</code></td><td>Restreindre blame à une plage de lignes.</td></tr>
        <tr><td><code>-w</code></td><td>Ignorer les changements d'espacement.</td></tr>
        <tr><td><code>-M</code></td><td>Détecter les lignes déplacées dans un fichier.</td></tr>
        <tr><td><code>-C</code></td><td>Détecter les lignes copiées depuis d'autres fichiers (répéter pour détection plus forte).</td></tr>
        <tr><td><code>--since=&lt;date&gt;</code></td><td>Arrêter d'annoter avant cette date.</td></tr>
        <tr><td><code>-e</code>, <code>--show-email</code></td><td>Afficher l'email de l'auteur au lieu du nom.</td></tr>
        <tr><td><code>--ignore-revs-file &lt;file&gt;</code></td><td>Sauter les révisions listées lors de l'assignation de blame.</td></tr>
      </tbody>
    </table>
    <h2>Exemples</h2>
    <pre><code>git blame src/parser.c
    # Annoter chaque ligne
    
    git blame -L 50,100 src/parser.c
    # Seulement les lignes 50 à 100
    
    git blame -w -M -C README.md
    # Ignorer les espaces et détecter les déplacements/copies
    
    git blame --ignore-revs-file .git-blame-ignore-revs file.js
    # Sauter les commits de reformatage bruyants</code></pre>
    <h2>Erreurs fréquentes</h2>
    <p>Using blame to assign fault rather than to investigate context creates a hostile culture. Pair blame with <code>git log</code> on the offending commit to read the full message and intent. After mass formatting, set up <code>.git-blame-ignore-revs</code> so blame still points to meaningful authors.</p>
    <h2>Commandes liées</h2>
    <p><code>git log -L</code>, <code>git log -S</code>, <code>git show</code>, <code>git annotate</code></p>
    

- source_title: "git bisect — Use binary search to find the commit that introduced a bug"
  title: "git bisect — Utiliser la recherche binaire pour trouver le commit ayant introduit\
  \ un bug"
  langcode: fr
  body: |
    <h2>Synopsis</h2>
    <pre><code>git bisect start
    git bisect good &lt;commit&gt;
    git bisect bad &lt;commit&gt;
    git bisect run &lt;script&gt;
    git bisect reset</code></pre>
    <h2>Description</h2>
    <p>The <code>git bisect</code> command performs a binary search through commit history to identify exactly which commit introduced a bug. You start by marking a known-bad commit (often HEAD) and a known-good commit (perhaps a release tag), then Git checks out a midpoint and asks you to test. You answer "good" or "bad," Git narrows the range, and you repeat until the offending commit is found.</p>
    <p>If you have an automated test or reproducer, <code>git bisect run</code> automates the entire process — Git invokes your script at each step. Bisecting through a thousand commits typically takes about ten iterations.</p>
    <p>Dans l'usage quotidien, <code>git bisect</code> s'intègre étroitement avec les alias de shell, les plugins d'éditeur et l'intégration continue. Les utilisateurs avancés ajoutent souvent des alias combinant les flags qu'ils passent toujours, ou enveloppent la commande dans des scripts qui appliquent les conventions d'équipe. Le formatage de la sortie peut être personnalisé via la configuration Git — pretty formats, schémas de couleurs et comportement du pager sont tous ajustables. Quand quelque chose tourne mal, la première étape de diagnostic est généralement de relancer la commande avec <code>GIT_TRACE=1</code> dans l'environnement, ce qui révèle les appels de plomberie sous-jacents. Pour les situations inhabituelles, la sortie <code>--help</code> (<code>git bisect --help</code>) ouvre la page de manuel complète avec les détails de chaque option, y compris celles rarement utilisées dans les workflows ordinaires mais essentielles pour le débogage ou le scripting à grande échelle.</p><p>Comprendre comment <code>git bisect</code> interagit avec le reste du modèle de données de Git — la base d'objets, l'index, les refs et l'arborescence de travail — est rentable. Chaque commande opère sur un sous-ensemble de ces pièces, et savoir laquelle elle touche aide à prédire les résultats et récupérer après les erreurs. Lire la documentation officielle de Git en parallèle de la pratique sur un dépôt jetable est la façon la plus rapide d'intérioriser les subtilités. La plupart des problèmes de production avec Git proviennent de l'une de trois causes : comportement par défaut surprenant, opérations réseau partielles, ou réécriture d'historique déjà partagé. Un modèle mental fonctionnel des effets de bord de <code>git bisect</code> aide à éviter les trois.</p>
        <h2>Options courantes</h2>
    <table>
      <thead><tr><th>Sous-commande</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>start</code></td><td>Commencer une session de bisect.</td></tr>
        <tr><td><code>good</code> / <code>bad</code></td><td>Marquer le commit courant (ou spécifié).</td></tr>
        <tr><td><code>skip</code></td><td>Marquer un commit comme non testable.</td></tr>
        <tr><td><code>run &lt;cmd&gt;</code></td><td>Automatiser en exécutant une commande (sortie 0 = good, non nulle = bad).</td></tr>
        <tr><td><code>reset</code></td><td>Terminer la session et retourner sur la branche d'origine.</td></tr>
        <tr><td><code>log</code></td><td>Afficher le log de bisect.</td></tr>
        <tr><td><code>visualize</code></td><td>Afficher les commits suspects restants.</td></tr>
      </tbody>
    </table>
    <h2>Exemples</h2>
    <pre><code>git bisect start
    git bisect bad HEAD
    git bisect good v1.5.0
    # Git fait un checkout d'un point milieu ; testez-le puis :
    git bisect good   # ou : git bisect bad
    
    git bisect run npm test
    # Entièrement automatisé : les codes de sortie de npm test pilotent la recherche
    
    git bisect reset
    # Retourner sur votre branche d'origine</code></pre>
    <h2>Erreurs fréquentes</h2>
    <p>Forgetting to <code>git bisect reset</code> leaves you in a detached HEAD state. Marking a commit "good" when the bug is intermittent leads bisect astray — use <code>skip</code> instead. Make sure your test script returns exit code 125 to signal "skip" if the build itself is broken at that commit.</p>
    <h2>Commandes liées</h2>
    <p><code>git log</code>, <code>git blame</code>, <code>git show</code>, <code>git checkout</code></p>
    

- source_title: "git grep — Search tracked files for a pattern"
  title: "git grep — Rechercher un motif dans les fichiers suivis"
  langcode: fr
  body: |
    <h2>Synopsis</h2>
    <pre><code>git grep [&lt;options&gt;] &lt;pattern&gt; [&lt;tree-ish&gt;...]</code></pre>
    <h2>Description</h2>
    <p>The <code>git grep</code> command searches files tracked by Git for a pattern. It is much faster than <code>grep -r</code> on large repositories because it only searches what Git knows about (skipping <code>.git</code>, build outputs, and ignored files) and uses Git's optimized object database. You can also search any historical revision or tree, not just the working copy.</p>
    <p>Patterns can be plain strings, basic regex (default), extended regex (<code>-E</code>), or PCRE (<code>-P</code> if compiled in). Use <code>git grep</code> instead of <code>grep -r</code> in scripts that operate on Git repositories.</p>
    <p>Dans l'usage quotidien, <code>git grep</code> s'intègre étroitement avec les alias de shell, les plugins d'éditeur et l'intégration continue. Les utilisateurs avancés ajoutent souvent des alias combinant les flags qu'ils passent toujours, ou enveloppent la commande dans des scripts qui appliquent les conventions d'équipe. Le formatage de la sortie peut être personnalisé via la configuration Git — pretty formats, schémas de couleurs et comportement du pager sont tous ajustables. Quand quelque chose tourne mal, la première étape de diagnostic est généralement de relancer la commande avec <code>GIT_TRACE=1</code> dans l'environnement, ce qui révèle les appels de plomberie sous-jacents. Pour les situations inhabituelles, la sortie <code>--help</code> (<code>git grep --help</code>) ouvre la page de manuel complète avec les détails de chaque option, y compris celles rarement utilisées dans les workflows ordinaires mais essentielles pour le débogage ou le scripting à grande échelle.</p><p>Comprendre comment <code>git grep</code> interagit avec le reste du modèle de données de Git — la base d'objets, l'index, les refs et l'arborescence de travail — est rentable. Chaque commande opère sur un sous-ensemble de ces pièces, et savoir laquelle elle touche aide à prédire les résultats et récupérer après les erreurs. Lire la documentation officielle de Git en parallèle de la pratique sur un dépôt jetable est la façon la plus rapide d'intérioriser les subtilités. La plupart des problèmes de production avec Git proviennent de l'une de trois causes : comportement par défaut surprenant, opérations réseau partielles, ou réécriture d'historique déjà partagé. Un modèle mental fonctionnel des effets de bord de <code>git grep</code> aide à éviter les trois.</p>
        <h2>Options courantes</h2>
    <table>
      <thead><tr><th>Option</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>-i</code></td><td>Correspondance insensible à la casse.</td></tr>
        <tr><td><code>-n</code></td><td>Afficher les numéros de ligne.</td></tr>
        <tr><td><code>-l</code></td><td>Lister seulement les noms de fichiers correspondants.</td></tr>
        <tr><td><code>-E</code></td><td>Expressions régulières étendues.</td></tr>
        <tr><td><code>-P</code></td><td>Regex compatible Perl.</td></tr>
        <tr><td><code>-w</code></td><td>Correspondance de mots entiers.</td></tr>
        <tr><td><code>--cached</code></td><td>Rechercher dans l'index au lieu de l'arborescence.</td></tr>
        <tr><td><code>--untracked</code></td><td>Rechercher aussi dans les fichiers non suivis et non ignorés.</td></tr>
      </tbody>
    </table>
    <h2>Exemples</h2>
    <pre><code>git grep "TODO"
    # Trouver chaque TODO dans les fichiers suivis
    
    git grep -n -i "deprecated" src/
    # Insensible à la casse, avec numéros de ligne, sous src/
    
    git grep "fooBar" v1.0.0
    # Rechercher dans le tree du tag v1.0.0
    
    git grep -E "^(import|from) " --and -e "json"
    # Motifs combinés : lignes commençant par import/from qui mentionnent json</code></pre>
    <h2>Erreurs fréquentes</h2>
    <p>Forgetting that <code>git grep</code> only searches tracked files — newly added files won't appear unless staged or you pass <code>--untracked</code>. PCRE features (<code>\b</code>, lookbehind) require Git built with PCRE support and the <code>-P</code> flag.</p>
    <h2>Commandes liées</h2>
    <p><code>git log -S</code>, <code>git log -G</code>, <code>git ls-files</code>, <code>git show</code></p>
    

- source_title: "git shortlog — Summarize git log output"
  title: "git shortlog — Résumer la sortie de git log"
  langcode: fr
  body: |
    <h2>Synopsis</h2>
    <pre><code>git shortlog [-n] [-s] [-e] [&lt;revision-range&gt;]</code></pre>
    <h2>Description</h2>
    <p>The <code>git shortlog</code> command groups commits by author, producing concise summaries suitable for release notes, contributor lists, and quick "who did what" overviews. By default it prints each author's name followed by the subject lines of their commits in the given range.</p>
    <p>Common modes include <code>-sn</code> (summary, sorted by count) for "top contributors" lists and <code>--no-merges</code> to ignore merge commits. Combined with a range like <code>v1.0..v2.0</code>, shortlog is the fastest way to draft release-note credits.</p>
    <p>Dans l'usage quotidien, <code>git shortlog</code> s'intègre étroitement avec les alias de shell, les plugins d'éditeur et l'intégration continue. Les utilisateurs avancés ajoutent souvent des alias combinant les flags qu'ils passent toujours, ou enveloppent la commande dans des scripts qui appliquent les conventions d'équipe. Le formatage de la sortie peut être personnalisé via la configuration Git — pretty formats, schémas de couleurs et comportement du pager sont tous ajustables. Quand quelque chose tourne mal, la première étape de diagnostic est généralement de relancer la commande avec <code>GIT_TRACE=1</code> dans l'environnement, ce qui révèle les appels de plomberie sous-jacents. Pour les situations inhabituelles, la sortie <code>--help</code> (<code>git shortlog --help</code>) ouvre la page de manuel complète avec les détails de chaque option, y compris celles rarement utilisées dans les workflows ordinaires mais essentielles pour le débogage ou le scripting à grande échelle.</p><p>Comprendre comment <code>git shortlog</code> interagit avec le reste du modèle de données de Git — la base d'objets, l'index, les refs et l'arborescence de travail — est rentable. Chaque commande opère sur un sous-ensemble de ces pièces, et savoir laquelle elle touche aide à prédire les résultats et récupérer après les erreurs. Lire la documentation officielle de Git en parallèle de la pratique sur un dépôt jetable est la façon la plus rapide d'intérioriser les subtilités. La plupart des problèmes de production avec Git proviennent de l'une de trois causes : comportement par défaut surprenant, opérations réseau partielles, ou réécriture d'historique déjà partagé. Un modèle mental fonctionnel des effets de bord de <code>git shortlog</code> aide à éviter les trois.</p>
        <h2>Options courantes</h2>
    <table>
      <thead><tr><th>Option</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>-s</code>, <code>--summary</code></td><td>Afficher seulement les compteurs par auteur.</td></tr>
        <tr><td><code>-n</code>, <code>--numbered</code></td><td>Trier les auteurs par nombre de commits.</td></tr>
        <tr><td><code>-e</code>, <code>--email</code></td><td>Inclure les adresses email des auteurs.</td></tr>
        <tr><td><code>--no-merges</code></td><td>Exclure les merge commits.</td></tr>
        <tr><td><code>--group=&lt;type&gt;</code></td><td>Grouper par auteur, committer ou trailer.</td></tr>
        <tr><td><code>-w[&lt;width&gt;]</code></td><td>Couper les lignes de sujet.</td></tr>
      </tbody>
    </table>
    <h2>Exemples</h2>
    <pre><code>git shortlog -sn
    # Top contributeurs de tous temps, avec compteurs
    
    git shortlog -sne v1.0..v2.0
    # Contributeurs entre deux releases, avec emails
    
    git shortlog --no-merges HEAD~50..HEAD
    # Sujets groupés par auteur pour les 50 derniers commits
    
    git shortlog --group=trailer:co-authored-by
    # Grouper par trailer Co-authored-by</code></pre>
    <h2>Erreurs fréquentes</h2>
    <p>Multiple commit identities for the same person (different emails, different name capitalizations) inflate the contributor count. A <code>.mailmap</code> file at the repo root canonicalizes them. Forgetting <code>--no-merges</code> can attribute many merge commits to project maintainers.</p>
    <h2>Commandes liées</h2>
    <p><code>git log</code>, <code>git blame</code>, <code>git describe</code>, <code>git tag</code></p>
    

- source_title: "git describe — Describe a commit using the most recent reachable tag"
  title: "git describe — Décrire un commit via le tag atteignable le plus récent"
  langcode: fr
  body: |
    <h2>Synopsis</h2>
    <pre><code>git describe [--tags] [--always] [--dirty] [&lt;commit&gt;]</code></pre>
    <h2>Description</h2>
    <p>The <code>git describe</code> command produces a human-readable name for a commit based on the most recent reachable tag. The output looks like <code>v1.4.2-13-gabc1234</code>, meaning "13 commits past tag v1.4.2, at SHA abc1234." If the commit is exactly at a tag, only the tag name is printed.</p>
    <p>Build systems use <code>git describe</code> to embed version strings into binaries. With <code>--dirty</code>, the output includes a <code>-dirty</code> suffix when the working tree has uncommitted changes — perfect for marking development builds.</p>
    <p>Dans l'usage quotidien, <code>git describe</code> s'intègre étroitement avec les alias de shell, les plugins d'éditeur et l'intégration continue. Les utilisateurs avancés ajoutent souvent des alias combinant les flags qu'ils passent toujours, ou enveloppent la commande dans des scripts qui appliquent les conventions d'équipe. Le formatage de la sortie peut être personnalisé via la configuration Git — pretty formats, schémas de couleurs et comportement du pager sont tous ajustables. Quand quelque chose tourne mal, la première étape de diagnostic est généralement de relancer la commande avec <code>GIT_TRACE=1</code> dans l'environnement, ce qui révèle les appels de plomberie sous-jacents. Pour les situations inhabituelles, la sortie <code>--help</code> (<code>git describe --help</code>) ouvre la page de manuel complète avec les détails de chaque option, y compris celles rarement utilisées dans les workflows ordinaires mais essentielles pour le débogage ou le scripting à grande échelle.</p><p>Comprendre comment <code>git describe</code> interagit avec le reste du modèle de données de Git — la base d'objets, l'index, les refs et l'arborescence de travail — est rentable. Chaque commande opère sur un sous-ensemble de ces pièces, et savoir laquelle elle touche aide à prédire les résultats et récupérer après les erreurs. Lire la documentation officielle de Git en parallèle de la pratique sur un dépôt jetable est la façon la plus rapide d'intérioriser les subtilités. La plupart des problèmes de production avec Git proviennent de l'une de trois causes : comportement par défaut surprenant, opérations réseau partielles, ou réécriture d'historique déjà partagé. Un modèle mental fonctionnel des effets de bord de <code>git describe</code> aide à éviter les trois.</p>
        <h2>Options courantes</h2>
    <table>
      <thead><tr><th>Option</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>--tags</code></td><td>Utiliser les tags lightweight ainsi que les annotés.</td></tr>
        <tr><td><code>--always</code></td><td>Retomber sur un SHA abrégé si aucun tag n'est atteignable.</td></tr>
        <tr><td><code>--dirty[=&lt;mark&gt;]</code></td><td>Ajouter un marqueur si l'arborescence est sale.</td></tr>
        <tr><td><code>--long</code></td><td>Toujours afficher le format long, même sur un tag.</td></tr>
        <tr><td><code>--match &lt;pattern&gt;</code></td><td>Ne considérer que les tags correspondant à un glob.</td></tr>
        <tr><td><code>--abbrev=&lt;n&gt;</code></td><td>Use <code>n</code> chiffres hex pour le SHA.</td></tr>
        <tr><td><code>--contains</code></td><td>Afficher le tag le plus ancien contenant le commit.</td></tr>
      </tbody>
    </table>
    <h2>Exemples</h2>
    <pre><code>git describe
    # par ex. v2.1.0-3-g1a2b3c4
    
    git describe --tags --dirty --always
    # Chaîne de version robuste pour scripts de build
    
    git describe --match 'v[0-9]*'
    # Ne considérer que les tags style semver
    
    git describe --contains abc123
    # Trouver la première release qui inclut un commit</code></pre>
    <h2>Erreurs fréquentes</h2>
    <p>If your repo has only lightweight (non-annotated) tags, plain <code>git describe</code> says "fatal: No names found." Use <code>--tags</code>. Shallow clones may have no reachable tags at all — fetch tags explicitly with <code>git fetch --tags</code>.</p>
    <h2>Commandes liées</h2>
    <p><code>git tag</code>, <code>git log</code>, <code>git rev-parse</code>, <code>git show</code></p>
    

- source_title: "git restore — Restore working tree files"
  title: "git restore — Restaurer les fichiers de l'arborescence"
  langcode: fr
  body: |
    <h2>Synopsis</h2>
    <pre><code>git restore [--staged] [--source=&lt;tree&gt;] [-p] &lt;pathspec&gt;...</code></pre>
    <h2>Description</h2>
    <p>The <code>git restore</code> command, introduced in Git 2.23, replaces the file-restoring half of <code>git checkout</code>. It is purpose-built for two cases: discarding unstaged changes in the working tree (default behavior) and unstaging changes from the index (with <code>--staged</code>). The cleaner separation makes the tool less error-prone than <code>git checkout</code>.</p>
    <p>You can restore from any source: another commit, a branch, or a tag. Combined with <code>-p</code>, you can interactively pick which hunks to restore. <code>git restore</code> never modifies branches or HEAD — it only touches files.</p>
    <p>Dans l'usage quotidien, <code>git restore</code> s'intègre étroitement avec les alias de shell, les plugins d'éditeur et l'intégration continue. Les utilisateurs avancés ajoutent souvent des alias combinant les flags qu'ils passent toujours, ou enveloppent la commande dans des scripts qui appliquent les conventions d'équipe. Le formatage de la sortie peut être personnalisé via la configuration Git — pretty formats, schémas de couleurs et comportement du pager sont tous ajustables. Quand quelque chose tourne mal, la première étape de diagnostic est généralement de relancer la commande avec <code>GIT_TRACE=1</code> dans l'environnement, ce qui révèle les appels de plomberie sous-jacents. Pour les situations inhabituelles, la sortie <code>--help</code> (<code>git restore --help</code>) ouvre la page de manuel complète avec les détails de chaque option, y compris celles rarement utilisées dans les workflows ordinaires mais essentielles pour le débogage ou le scripting à grande échelle.</p><p>Comprendre comment <code>git restore</code> interagit avec le reste du modèle de données de Git — la base d'objets, l'index, les refs et l'arborescence de travail — est rentable. Chaque commande opère sur un sous-ensemble de ces pièces, et savoir laquelle elle touche aide à prédire les résultats et récupérer après les erreurs. Lire la documentation officielle de Git en parallèle de la pratique sur un dépôt jetable est la façon la plus rapide d'intérioriser les subtilités. La plupart des problèmes de production avec Git proviennent de l'une de trois causes : comportement par défaut surprenant, opérations réseau partielles, ou réécriture d'historique déjà partagé. Un modèle mental fonctionnel des effets de bord de <code>git restore</code> aide à éviter les trois.</p>
        <h2>Options courantes</h2>
    <table>
      <thead><tr><th>Option</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>--staged</code></td><td>Restaurer l'index au lieu de l'arborescence (c.-à-d. désindexer).</td></tr>
        <tr><td><code>--worktree</code></td><td>Restaurer l'arborescence (défaut).</td></tr>
        <tr><td><code>--source=&lt;tree&gt;</code> / <code>-s</code></td><td>Restaurer depuis un commit, une branche ou un tag spécifique.</td></tr>
        <tr><td><code>-p</code>, <code>--patch</code></td><td>Choisir interactivement les hunks à restaurer.</td></tr>
        <tr><td><code>--ours</code> / <code>--theirs</code></td><td>Lors d'un conflit, restaurer un côté.</td></tr>
        <tr><td><code>-q</code>, <code>--quiet</code></td><td>Supprimer la progression.</td></tr>
      </tbody>
    </table>
    <h2>Exemples</h2>
    <pre><code>git restore src/main.c
    # Abandonner les changements non stagés dans main.c
    
    git restore --staged config.yml
    # Désindexer un fichier (garder les changements en arborescence)
    
    git restore --source=HEAD~3 README.md
    # Restaurer README.md tel qu'il était il y a 3 commits
    
    git restore -p
    # Choisir interactivement les hunks à abandonner</code></pre>
    <h2>Erreurs fréquentes</h2>
    <p><code>git restore</code> on a file with unsaved changes silently overwrites them — there is no confirmation prompt and no easy undo. Stash first if uncertain. Beginners sometimes confuse <code>--staged</code> with <code>git reset --hard</code>; <code>--staged</code> only touches the index, leaving working-tree edits intact.</p>
    <h2>Commandes liées</h2>
    <p><code>git reset</code>, <code>git checkout</code>, <code>git stash</code>, <code>git revert</code></p>
    

- source_title: "git reset — Reset current HEAD to a specified state"
  title: "git reset — Réinitialiser HEAD à un état spécifié"
  langcode: fr
  body: |
    <h2>Synopsis</h2>
    <pre><code>git reset [--soft | --mixed | --hard] [&lt;commit&gt;]
    git reset [&lt;commit&gt;] [--] &lt;pathspec&gt;...</code></pre>
    <h2>Description</h2>
    <p>The <code>git reset</code> command moves the current branch pointer to a specified commit, optionally updating the index and working tree. It has three primary modes: <code>--soft</code> (move HEAD only), <code>--mixed</code> (default; also reset the index), and <code>--hard</code> (also reset the working tree, discarding all changes).</p>
    <p>Reset is one of the most powerful and most dangerous Git commands. <code>git reset --hard</code> can permanently lose work — though <code>git reflog</code> usually allows recovery within the reflog window. With path arguments, reset operates only on the index for those paths and never moves HEAD.</p>
    <p>Dans l'usage quotidien, <code>git reset</code> s'intègre étroitement avec les alias de shell, les plugins d'éditeur et l'intégration continue. Les utilisateurs avancés ajoutent souvent des alias combinant les flags qu'ils passent toujours, ou enveloppent la commande dans des scripts qui appliquent les conventions d'équipe. Le formatage de la sortie peut être personnalisé via la configuration Git — pretty formats, schémas de couleurs et comportement du pager sont tous ajustables. Quand quelque chose tourne mal, la première étape de diagnostic est généralement de relancer la commande avec <code>GIT_TRACE=1</code> dans l'environnement, ce qui révèle les appels de plomberie sous-jacents. Pour les situations inhabituelles, la sortie <code>--help</code> (<code>git reset --help</code>) ouvre la page de manuel complète avec les détails de chaque option, y compris celles rarement utilisées dans les workflows ordinaires mais essentielles pour le débogage ou le scripting à grande échelle.</p><p>Comprendre comment <code>git reset</code> interagit avec le reste du modèle de données de Git — la base d'objets, l'index, les refs et l'arborescence de travail — est rentable. Chaque commande opère sur un sous-ensemble de ces pièces, et savoir laquelle elle touche aide à prédire les résultats et récupérer après les erreurs. Lire la documentation officielle de Git en parallèle de la pratique sur un dépôt jetable est la façon la plus rapide d'intérioriser les subtilités. La plupart des problèmes de production avec Git proviennent de l'une de trois causes : comportement par défaut surprenant, opérations réseau partielles, ou réécriture d'historique déjà partagé. Un modèle mental fonctionnel des effets de bord de <code>git reset</code> aide à éviter les trois.</p>
        <h2>Options courantes</h2>
    <table>
      <thead><tr><th>Option</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>--soft</code></td><td>Déplacer HEAD seulement ; index et arborescence inchangés.</td></tr>
        <tr><td><code>--mixed</code> (default)</td><td>Déplacer HEAD et réinitialiser l'index ; arborescence inchangée.</td></tr>
        <tr><td><code>--hard</code></td><td>Déplacer HEAD, réinitialiser l'index et écraser l'arborescence.</td></tr>
        <tr><td><code>--keep</code></td><td>Like <code>--hard</code>, mais abandonner si les changements locaux seraient perdus.</td></tr>
        <tr><td><code>--merge</code></td><td>Réinitialiser l'index et met à jour les fichiers qui diffèrent entre HEAD et la cible, en gardant les merges locaux.</td></tr>
        <tr><td><code>-p</code></td><td>Sélectionner interactivement les hunks à désindexer.</td></tr>
      </tbody>
    </table>
    <h2>Exemples</h2>
    <pre><code>git reset HEAD~1
    # Reculer d'un commit ; garder les changements en arborescence
    
    git reset --soft HEAD~3
    # Combiner les 3 derniers commits en un seul changement stagé
    
    git reset --hard origin/main
    # Abandonner TOUS les commits et changements locaux (dangereux)
    
    git reset HEAD config.yml
    # Désindexer un seul fichier (syntaxe ancienne pour git restore --staged)</code></pre>
    <h2>Erreurs fréquentes</h2>
    <p><code>git reset --hard</code> on a branch with unpushed commits loses them. Reflog can save you within ~90 days, but only if you know to look. Confusing <code>git reset HEAD file</code> (unstage) with <code>git reset --hard</code> (nuke) is a classic beginner footgun. Modern Git provides <code>git restore --staged</code> as a clearer alternative.</p>
    <h2>Commandes liées</h2>
    <p><code>git restore</code>, <code>git revert</code>, <code>git reflog</code>, <code>git stash</code></p>
    

- source_title: "git revert — Create a new commit that undoes earlier commits"
  title: "git revert — Créer un nouveau commit qui annule des commits antérieurs"
  langcode: fr
  body: |
    <h2>Synopsis</h2>
    <pre><code>git revert [-n] [-m &lt;parent&gt;] &lt;commit&gt;...</code></pre>
    <h2>Description</h2>
    <p>The <code>git revert</code> command creates a new commit whose changes are the inverse of an earlier commit's. Unlike <code>git reset</code>, it doesn't rewrite history — it adds a new commit that undoes one or more old ones. This makes revert safe to use on shared branches: collaborators see a clear "undo" commit rather than rewritten history.</p>
    <p>To revert a merge commit, use <code>-m 1</code> (or whichever parent number) to specify the "mainline" — the parent whose perspective should be preserved. Reverting multiple commits in a single command applies them as a series of new commits.</p>
    <p>Dans l'usage quotidien, <code>git revert</code> s'intègre étroitement avec les alias de shell, les plugins d'éditeur et l'intégration continue. Les utilisateurs avancés ajoutent souvent des alias combinant les flags qu'ils passent toujours, ou enveloppent la commande dans des scripts qui appliquent les conventions d'équipe. Le formatage de la sortie peut être personnalisé via la configuration Git — pretty formats, schémas de couleurs et comportement du pager sont tous ajustables. Quand quelque chose tourne mal, la première étape de diagnostic est généralement de relancer la commande avec <code>GIT_TRACE=1</code> dans l'environnement, ce qui révèle les appels de plomberie sous-jacents. Pour les situations inhabituelles, la sortie <code>--help</code> (<code>git revert --help</code>) ouvre la page de manuel complète avec les détails de chaque option, y compris celles rarement utilisées dans les workflows ordinaires mais essentielles pour le débogage ou le scripting à grande échelle.</p><p>Comprendre comment <code>git revert</code> interagit avec le reste du modèle de données de Git — la base d'objets, l'index, les refs et l'arborescence de travail — est rentable. Chaque commande opère sur un sous-ensemble de ces pièces, et savoir laquelle elle touche aide à prédire les résultats et récupérer après les erreurs. Lire la documentation officielle de Git en parallèle de la pratique sur un dépôt jetable est la façon la plus rapide d'intérioriser les subtilités. La plupart des problèmes de production avec Git proviennent de l'une de trois causes : comportement par défaut surprenant, opérations réseau partielles, ou réécriture d'historique déjà partagé. Un modèle mental fonctionnel des effets de bord de <code>git revert</code> aide à éviter les trois.</p>
        <h2>Options courantes</h2>
    <table>
      <thead><tr><th>Option</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>-n</code>, <code>--no-commit</code></td><td>Stager les changements inverses sans commiter.</td></tr>
        <tr><td><code>-m &lt;parent-number&gt;</code></td><td>Parent mainline pour reverter un merge.</td></tr>
        <tr><td><code>--continue</code></td><td>Reprendre après résolution des conflits.</td></tr>
        <tr><td><code>--abort</code></td><td>Annuler un revert en cours.</td></tr>
        <tr><td><code>--skip</code></td><td>Sauter le commit courant et continuer.</td></tr>
        <tr><td><code>-e</code>, <code>--edit</code></td><td>Éditer le message de commit de revert.</td></tr>
      </tbody>
    </table>
    <h2>Exemples</h2>
    <pre><code>git revert HEAD
    # Annuler le commit le plus récent avec un nouveau commit
    
    git revert abc123..def456
    # Reverter une plage de commits
    
    git revert -m 1 merge-sha
    # Reverter un merge commit, en gardant mainline
    
    git revert -n HEAD~2
    # Stager un inverse sans encore commiter</code></pre>
    <h2>Erreurs fréquentes</h2>
    <p>Reverting a merge prevents future re-merging of the same branch unless you also revert the revert. Plan accordingly when reverting feature merges. Conflicts during revert require <code>--continue</code> or <code>--abort</code>, just like rebase.</p>
    <h2>Commandes liées</h2>
    <p><code>git reset</code>, <code>git restore</code>, <code>git cherry-pick</code>, <code>git log</code></p>
    

- source_title: "git clean — Remove untracked files from the working tree"
  title: "git clean — Supprimer les fichiers non suivis de l'arborescence"
  langcode: fr
  body: |
    <h2>Synopsis</h2>
    <pre><code>git clean [-d] [-f] [-x | -X] [-n] [-i] [&lt;path&gt;...]</code></pre>
    <h2>Description</h2>
    <p>The <code>git clean</code> command removes untracked files from the working tree. By default it requires <code>-f</code> (or <code>clean.requireForce = false</code>) as a safety measure because deletions are irreversible. With <code>-d</code> it also removes untracked directories, and <code>-x</code> additionally removes files that are normally ignored (build outputs, dependency caches).</p>
    <p>Always run <code>git clean -n</code> first to preview which files will be deleted. The interactive mode (<code>-i</code>) lets you confirm or filter the list. <code>git clean</code> is the right tool for resetting a project to a pristine state, especially before debugging build issues.</p>
    <p>Dans l'usage quotidien, <code>git clean</code> s'intègre étroitement avec les alias de shell, les plugins d'éditeur et l'intégration continue. Les utilisateurs avancés ajoutent souvent des alias combinant les flags qu'ils passent toujours, ou enveloppent la commande dans des scripts qui appliquent les conventions d'équipe. Le formatage de la sortie peut être personnalisé via la configuration Git — pretty formats, schémas de couleurs et comportement du pager sont tous ajustables. Quand quelque chose tourne mal, la première étape de diagnostic est généralement de relancer la commande avec <code>GIT_TRACE=1</code> dans l'environnement, ce qui révèle les appels de plomberie sous-jacents. Pour les situations inhabituelles, la sortie <code>--help</code> (<code>git clean --help</code>) ouvre la page de manuel complète avec les détails de chaque option, y compris celles rarement utilisées dans les workflows ordinaires mais essentielles pour le débogage ou le scripting à grande échelle.</p><p>Comprendre comment <code>git clean</code> interagit avec le reste du modèle de données de Git — la base d'objets, l'index, les refs et l'arborescence de travail — est rentable. Chaque commande opère sur un sous-ensemble de ces pièces, et savoir laquelle elle touche aide à prédire les résultats et récupérer après les erreurs. Lire la documentation officielle de Git en parallèle de la pratique sur un dépôt jetable est la façon la plus rapide d'intérioriser les subtilités. La plupart des problèmes de production avec Git proviennent de l'une de trois causes : comportement par défaut surprenant, opérations réseau partielles, ou réécriture d'historique déjà partagé. Un modèle mental fonctionnel des effets de bord de <code>git clean</code> aide à éviter les trois.</p>
        <h2>Options courantes</h2>
    <table>
      <thead><tr><th>Option</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>-f</code>, <code>--force</code></td><td>Requis pour supprimer réellement (sauf si la config le désactive).</td></tr>
        <tr><td><code>-n</code>, <code>--dry-run</code></td><td>Afficher ce qui serait supprimé, sans supprimer.</td></tr>
        <tr><td><code>-d</code></td><td>Supprimer aussi les répertoires non suivis.</td></tr>
        <tr><td><code>-x</code></td><td>Supprimer aussi les fichiers ignorés.</td></tr>
        <tr><td><code>-X</code></td><td>Supprimer seulement les fichiers ignorés.</td></tr>
        <tr><td><code>-i</code>, <code>--interactive</code></td><td>Sélection interactive.</td></tr>
        <tr><td><code>-e &lt;pattern&gt;</code></td><td>Exclure les fichiers correspondant au motif.</td></tr>
      </tbody>
    </table>
    <h2>Exemples</h2>
    <pre><code>git clean -nd
    # Prévisualiser ce qui serait supprimé (répertoires inclus)
    
    git clean -fd
    # Supprimer effectivement les fichiers et répertoires non suivis
    
    git clean -fdx
    # Plus les fichiers ignorés (reset complet à l'état propre)
    
    git clean -i
    # Interactif : choisir quoi supprimer</code></pre>
    <h2>Erreurs fréquentes</h2>
    <p><code>git clean -fdx</code> wipes <code>node_modules</code>, build artifacts, IDE settings, and even <code>.env</code> files if they're gitignored. Always preview with <code>-n</code> first. Be especially careful in submodules — clean operates per-repository.</p>
    <h2>Commandes liées</h2>
    <p><code>git status</code>, <code>git stash</code>, <code>git reset</code>, <code>git rm</code></p>
    

- source_title: "git stash — Save changes for later"
  title: "git stash — Sauvegarder les changements pour plus tard"
  langcode: fr
  body: |
    <h2>Synopsis</h2>
    <pre><code>git stash [push [-m &lt;msg&gt;] [-u]]
    git stash pop [&lt;stash&gt;]
    git stash list
    git stash drop [&lt;stash&gt;]</code></pre>
    <h2>Description</h2>
    <p>The <code>git stash</code> command shelves uncommitted changes (in both working tree and index) and reverts the working tree to a clean state. The shelved changes are stored on a stack you can re-apply later. Stash is perfect for situations like "I need to switch branches but my work isn't ready to commit."</p>
    <p>By default, untracked files are not stashed; pass <code>-u</code> (or <code>--include-untracked</code>) to include them, and <code>-a</code> to include even ignored files. Each stash entry is a regular commit object, addressable as <code>stash@{0}</code>, <code>stash@{1}</code>, etc.</p>
    <p>Dans l'usage quotidien, <code>git stash</code> s'intègre étroitement avec les alias de shell, les plugins d'éditeur et l'intégration continue. Les utilisateurs avancés ajoutent souvent des alias combinant les flags qu'ils passent toujours, ou enveloppent la commande dans des scripts qui appliquent les conventions d'équipe. Le formatage de la sortie peut être personnalisé via la configuration Git — pretty formats, schémas de couleurs et comportement du pager sont tous ajustables. Quand quelque chose tourne mal, la première étape de diagnostic est généralement de relancer la commande avec <code>GIT_TRACE=1</code> dans l'environnement, ce qui révèle les appels de plomberie sous-jacents. Pour les situations inhabituelles, la sortie <code>--help</code> (<code>git stash --help</code>) ouvre la page de manuel complète avec les détails de chaque option, y compris celles rarement utilisées dans les workflows ordinaires mais essentielles pour le débogage ou le scripting à grande échelle.</p><p>Comprendre comment <code>git stash</code> interagit avec le reste du modèle de données de Git — la base d'objets, l'index, les refs et l'arborescence de travail — est rentable. Chaque commande opère sur un sous-ensemble de ces pièces, et savoir laquelle elle touche aide à prédire les résultats et récupérer après les erreurs. Lire la documentation officielle de Git en parallèle de la pratique sur un dépôt jetable est la façon la plus rapide d'intérioriser les subtilités. La plupart des problèmes de production avec Git proviennent de l'une de trois causes : comportement par défaut surprenant, opérations réseau partielles, ou réécriture d'historique déjà partagé. Un modèle mental fonctionnel des effets de bord de <code>git stash</code> aide à éviter les trois.</p>
        <h2>Options courantes</h2>
    <table>
      <thead><tr><th>Option / Sous-commande</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>push -m &lt;msg&gt;</code></td><td>Stasher avec un message descriptif.</td></tr>
        <tr><td><code>-u</code></td><td>Inclure les fichiers non suivis.</td></tr>
        <tr><td><code>-a</code></td><td>Inclure aussi les fichiers ignorés.</td></tr>
        <tr><td><code>list</code></td><td>Afficher toutes les entrées de stash.</td></tr>
        <tr><td><code>show [-p] &lt;stash&gt;</code></td><td>Afficher le contenu d'un stash.</td></tr>
        <tr><td><code>pop</code> / <code>apply</code></td><td>Réappliquer un stash ; pop le supprime aussi.</td></tr>
        <tr><td><code>drop &lt;stash&gt;</code></td><td>Supprimer une entrée de stash.</td></tr>
        <tr><td><code>branch &lt;name&gt;</code></td><td>Créer une branche depuis un stash.</td></tr>
      </tbody>
    </table>
    <h2>Exemples</h2>
    <pre><code>git stash push -m "WIP: refactor parser"
    # Sauvegarder le travail courant avec une étiquette
    
    git stash list
    # stash@{0}: On main: WIP: refactor parser
    
    git stash pop
    # Réappliquer le stash le plus récent et le supprimer
    
    git stash branch temp-branch stash@{1}
    # Créer une nouvelle branche depuis un stash qui entre en conflit</code></pre>
    <h2>Erreurs fréquentes</h2>
    <p>Forgetting that stash doesn't include untracked files by default, then losing them when running <code>git clean</code>. Use <code>-u</code>. Popping a stash that conflicts can leave a complicated state — consider <code>apply</code> first so the stash isn't dropped if things go wrong. Long-lived stashes accumulate; review with <code>git stash list</code> regularly.</p>
    <h2>Commandes liées</h2>
    <p><code>git commit</code>, <code>git switch</code>, <code>git restore</code>, <code>git clean</code></p>
    

- source_title: "git apply — Apply a patch to files and/or to the index"
  title: "git apply — Appliquer un patch aux fichiers et/ou à l'index"
  langcode: fr
  body: |
    <h2>Synopsis</h2>
    <pre><code>git apply [--check] [--index] [--3way] &lt;patch&gt;...</code></pre>
    <h2>Description</h2>
    <p>The <code>git apply</code> command applies a unified diff (a patch file) to the working tree, the index, or both. Unlike <code>git am</code>, which expects a full mailbox-format patch with author and message metadata, <code>git apply</code> just applies the diff content. It's useful for applying patches received over email, code review tools, or generated by <code>git diff</code>.</p>
    <p>By default, <code>git apply</code> only updates the working tree. Use <code>--index</code> to also update the staging area, and <code>--3way</code> to fall back to a three-way merge when the patch doesn't apply cleanly. To verify a patch without applying, use <code>--check</code>.</p>
    <p>Dans l'usage quotidien, <code>git apply</code> s'intègre étroitement avec les alias de shell, les plugins d'éditeur et l'intégration continue. Les utilisateurs avancés ajoutent souvent des alias combinant les flags qu'ils passent toujours, ou enveloppent la commande dans des scripts qui appliquent les conventions d'équipe. Le formatage de la sortie peut être personnalisé via la configuration Git — pretty formats, schémas de couleurs et comportement du pager sont tous ajustables. Quand quelque chose tourne mal, la première étape de diagnostic est généralement de relancer la commande avec <code>GIT_TRACE=1</code> dans l'environnement, ce qui révèle les appels de plomberie sous-jacents. Pour les situations inhabituelles, la sortie <code>--help</code> (<code>git apply --help</code>) ouvre la page de manuel complète avec les détails de chaque option, y compris celles rarement utilisées dans les workflows ordinaires mais essentielles pour le débogage ou le scripting à grande échelle.</p><p>Comprendre comment <code>git apply</code> interagit avec le reste du modèle de données de Git — la base d'objets, l'index, les refs et l'arborescence de travail — est rentable. Chaque commande opère sur un sous-ensemble de ces pièces, et savoir laquelle elle touche aide à prédire les résultats et récupérer après les erreurs. Lire la documentation officielle de Git en parallèle de la pratique sur un dépôt jetable est la façon la plus rapide d'intérioriser les subtilités. La plupart des problèmes de production avec Git proviennent de l'une de trois causes : comportement par défaut surprenant, opérations réseau partielles, ou réécriture d'historique déjà partagé. Un modèle mental fonctionnel des effets de bord de <code>git apply</code> aide à éviter les trois.</p>
        <h2>Options courantes</h2>
    <table>
      <thead><tr><th>Option</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>--check</code></td><td>Tester si le patch s'applique sans rien modifier.</td></tr>
        <tr><td><code>--index</code></td><td>Appliquer à l'arborescence et à l'index.</td></tr>
        <tr><td><code>--cached</code></td><td>Appliquer à l'index seulement.</td></tr>
        <tr><td><code>--3way</code></td><td>Merge trois-voies si le contexte ne correspond pas.</td></tr>
        <tr><td><code>--reverse</code> / <code>-R</code></td><td>Appliquer à l'envers (décommiter un patch).</td></tr>
        <tr><td><code>--whitespace=&lt;action&gt;</code></td><td>Gérer les erreurs d'espacement (<code>warn</code>, <code>fix</code>, <code>error</code>).</td></tr>
        <tr><td><code>-p&lt;n&gt;</code></td><td>Strip <code>n</code> composants de chemin des noms de fichiers.</td></tr>
      </tbody>
    </table>
    <h2>Exemples</h2>
    <pre><code>git apply changes.patch
    # Appliquer un fichier patch à l'arborescence
    
    git apply --check feature.patch
    # Vérifier qu'un patch s'appliquera proprement
    
    git apply --index --3way mr.diff
    # Appliquer avec fallback merge trois-voies, dans l'index aussi
    
    curl -L https://example.com/fix.patch | git apply
    # Piper un patch directement depuis une URL</code></pre>
    <h2>Erreurs fréquentes</h2>
    <p>If the patch was generated against a different base, plain <code>git apply</code> fails with "patch does not apply." Adding <code>--3way</code> often saves the day by attempting a merge. For patches that include commit metadata (author, message), use <code>git am</code> instead so the commit is recreated faithfully.</p>
    <h2>Commandes liées</h2>
    <p><code>git am</code>, <code>git format-patch</code>, <code>git diff</code>, <code>git cherry-pick</code></p>
    

- source_title: "git tag — Create, list, and verify tags"
  title: "git tag — Créer, lister et vérifier les tags"
  langcode: fr
  body: |
    <h2>Synopsis</h2>
    <pre><code>git tag [-a] [-s] [-m &lt;msg&gt;] &lt;name&gt; [&lt;commit&gt;]
    git tag -l ['&lt;pattern&gt;']
    git tag -d &lt;name&gt;</code></pre>
    <h2>Description</h2>
    <p>The <code>git tag</code> command marks specific commits with a memorable name, typically used for releases. There are two kinds of tags: lightweight (just a named pointer) and annotated (a full Git object with author, date, message, and optional GPG signature). For releases, always create annotated tags — they carry the metadata that release management requires.</p>
    <p>Tags are NOT pushed by default. Use <code>git push origin v1.2.3</code> to publish a single tag, or <code>git push --tags</code> for all of them. Once published, tags are normally immutable; rewriting a published tag breaks consumers and is strongly discouraged.</p>
    <p>Dans l'usage quotidien, <code>git tag</code> s'intègre étroitement avec les alias de shell, les plugins d'éditeur et l'intégration continue. Les utilisateurs avancés ajoutent souvent des alias combinant les flags qu'ils passent toujours, ou enveloppent la commande dans des scripts qui appliquent les conventions d'équipe. Le formatage de la sortie peut être personnalisé via la configuration Git — pretty formats, schémas de couleurs et comportement du pager sont tous ajustables. Quand quelque chose tourne mal, la première étape de diagnostic est généralement de relancer la commande avec <code>GIT_TRACE=1</code> dans l'environnement, ce qui révèle les appels de plomberie sous-jacents. Pour les situations inhabituelles, la sortie <code>--help</code> (<code>git tag --help</code>) ouvre la page de manuel complète avec les détails de chaque option, y compris celles rarement utilisées dans les workflows ordinaires mais essentielles pour le débogage ou le scripting à grande échelle.</p><p>Comprendre comment <code>git tag</code> interagit avec le reste du modèle de données de Git — la base d'objets, l'index, les refs et l'arborescence de travail — est rentable. Chaque commande opère sur un sous-ensemble de ces pièces, et savoir laquelle elle touche aide à prédire les résultats et récupérer après les erreurs. Lire la documentation officielle de Git en parallèle de la pratique sur un dépôt jetable est la façon la plus rapide d'intérioriser les subtilités. La plupart des problèmes de production avec Git proviennent de l'une de trois causes : comportement par défaut surprenant, opérations réseau partielles, ou réécriture d'historique déjà partagé. Un modèle mental fonctionnel des effets de bord de <code>git tag</code> aide à éviter les trois.</p>
        <h2>Options courantes</h2>
    <table>
      <thead><tr><th>Option</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>-a</code></td><td>Créer un tag annoté.</td></tr>
        <tr><td><code>-s</code></td><td>Créer un tag annoté signé GPG.</td></tr>
        <tr><td><code>-m &lt;msg&gt;</code></td><td>Définir le message du tag.</td></tr>
        <tr><td><code>-l '&lt;pattern&gt;'</code></td><td>Lister les tags correspondant à un glob.</td></tr>
        <tr><td><code>-d &lt;name&gt;</code></td><td>Supprimer un tag local.</td></tr>
        <tr><td><code>-v &lt;name&gt;</code></td><td>Vérifier un tag signé.</td></tr>
        <tr><td><code>-f</code></td><td>Remplacer un tag existant (à utiliser avec précaution).</td></tr>
        <tr><td><code>--sort=&lt;key&gt;</code></td><td>Trier le listing (par ex. <code>-v:refname</code>).</td></tr>
      </tbody>
    </table>
    <h2>Exemples</h2>
    <pre><code>git tag -a v1.0.0 -m "Release 1.0"
    # Créer un tag annoté à HEAD
    
    git tag -s v1.0.1 -m "Patch release" abc123
    # Tag signé GPG sur un commit spécifique
    
    git tag -l 'v1.*' --sort=-v:refname
    # Lister les tags 1.x du plus récent au plus ancien
    
    git push origin v1.0.0
    # Publier un tag</code></pre>
    <h2>Erreurs fréquentes</h2>
    <p>Creating a lightweight tag for a release loses metadata and signing. Use <code>-a</code> or <code>-s</code>. Forgetting <code>git push --tags</code> means colleagues never see your tag. Moving a tag with <code>-f</code> after publication confuses caches and CI systems.</p>
    <h2>Commandes liées</h2>
    <p><code>git describe</code>, <code>git show</code>, <code>git push</code>, <code>git verify-tag</code></p>
    

- source_title: "git describe (versioning) — Use tags as the source of truth for versions"
  title: "git describe (versionnage) — Utiliser les tags comme source de vérité pour les versions"
  langcode: fr
  body: |
    <h2>Synopsis</h2>
    <pre><code>git describe --tags --dirty --always [--match 'v[0-9]*']</code></pre>
    <h2>Description</h2>
    <p>This page covers <code>git describe</code> from a versioning angle: how to design a tag scheme that drives reproducible build version strings. The output of <code>git describe</code> is widely used by build systems (Make, CMake, Cargo, npm scripts) to generate a version string that includes a base tag plus distance and SHA.</p>
    <p>The recommended pattern: use annotated semver tags like <code>v1.2.3</code>; build scripts call <code>git describe --tags --dirty --always --match 'v[0-9]*'</code>; the resulting string is embedded into binaries via a generated header or constant. This produces deterministic versions that reflect both the latest release and any unreleased work since.</p>
    <p>Dans l'usage quotidien, <code>git describe (versioning)</code> s'intègre étroitement avec les alias de shell, les plugins d'éditeur et l'intégration continue. Les utilisateurs avancés ajoutent souvent des alias combinant les flags qu'ils passent toujours, ou enveloppent la commande dans des scripts qui appliquent les conventions d'équipe. Le formatage de la sortie peut être personnalisé via la configuration Git — pretty formats, schémas de couleurs et comportement du pager sont tous ajustables. Quand quelque chose tourne mal, la première étape de diagnostic est généralement de relancer la commande avec <code>GIT_TRACE=1</code> dans l'environnement, ce qui révèle les appels de plomberie sous-jacents. Pour les situations inhabituelles, la sortie <code>--help</code> (<code>git describe (versioning) --help</code>) ouvre la page de manuel complète avec les détails de chaque option, y compris celles rarement utilisées dans les workflows ordinaires mais essentielles pour le débogage ou le scripting à grande échelle.</p><p>Comprendre comment <code>git describe (versioning)</code> interagit avec le reste du modèle de données de Git — la base d'objets, l'index, les refs et l'arborescence de travail — est rentable. Chaque commande opère sur un sous-ensemble de ces pièces, et savoir laquelle elle touche aide à prédire les résultats et récupérer après les erreurs. Lire la documentation officielle de Git en parallèle de la pratique sur un dépôt jetable est la façon la plus rapide d'intérioriser les subtilités. La plupart des problèmes de production avec Git proviennent de l'une de trois causes : comportement par défaut surprenant, opérations réseau partielles, ou réécriture d'historique déjà partagé. Un modèle mental fonctionnel des effets de bord de <code>git describe (versioning)</code> aide à éviter les trois.</p>
        <h2>Options courantes</h2>
    <table>
      <thead><tr><th>Option</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>--tags</code></td><td>Utiliser les tags lightweight ainsi que les annotés.</td></tr>
        <tr><td><code>--dirty[=&lt;mark&gt;]</code></td><td>Ajouter un marqueur si l'arbre est sale.</td></tr>
        <tr><td><code>--always</code></td><td>Retomber sur un SHA abrégé quand aucun tag n'est atteignable.</td></tr>
        <tr><td><code>--long</code></td><td>Forcer le format long même sur un tag.</td></tr>
        <tr><td><code>--match &lt;pattern&gt;</code></td><td>Restreindre aux tags correspondant à un motif (par ex. exclure <code>nightly-*</code>).</td></tr>
        <tr><td><code>--exclude &lt;pattern&gt;</code></td><td>Exclure les tags correspondants.</td></tr>
        <tr><td><code>--abbrev=&lt;n&gt;</code></td><td>Longueur de SHA abrégée.</td></tr>
      </tbody>
    </table>
    <h2>Exemples</h2>
    <pre><code># Generate a version string for a build
    VERSION=$(git describe --tags --dirty --always --match 'v[0-9]*')
    echo "${VERSION#v}" > VERSION
    
    # In a Makefile:
    VERSION := $(shell git describe --tags --dirty --always)
    CFLAGS += -DVERSION="\"$(VERSION)\""
    
    # In package.json prepublish script:
    node -e "p=require('./package.json'); p.version=process.env.VERSION; require('fs').writeFileSync('package.json', JSON.stringify(p,null,2))"</code></pre>
    <h2>Erreurs fréquentes</h2>
    <p>Using lightweight tags breaks <code>git describe</code> without <code>--tags</code>. Including release candidate or nightly tags in your match pattern produces noisy versions for stable builds. Shallow CI clones may have no tags at all — fetch them explicitly: <code>git fetch --tags --unshallow</code>.</p>
    <h2>Commandes liées</h2>
    <p><code>git tag</code>, <code>git rev-parse</code>, <code>git for-each-ref</code>, <code>git log</code></p>
    

- source_title: "git cherry-pick — Apply changes from existing commits"
  title: "git cherry-pick — Appliquer les changements de commits existants"
  langcode: fr
  body: |
    <h2>Synopsis</h2>
    <pre><code>git cherry-pick [-n] [-x] [--continue] [--abort] &lt;commit&gt;...</code></pre>
    <h2>Description</h2>
    <p>The <code>git cherry-pick</code> command applies the changes introduced by one or more existing commits onto the current branch as new commits. It's the right tool when you need a single fix from another branch without merging the entire branch. Cherry-picks create new commits with new SHAs but preserve the original author and message.</p>
    <p>Cherry-picking can produce conflicts just like a merge. Use <code>--continue</code> after resolving, or <code>--abort</code> to bail. The <code>-x</code> flag adds a "(cherry picked from commit ...)" line to the message — useful for traceability when porting fixes between maintenance branches.</p>
    <p>Dans l'usage quotidien, <code>git cherry-pick</code> s'intègre étroitement avec les alias de shell, les plugins d'éditeur et l'intégration continue. Les utilisateurs avancés ajoutent souvent des alias combinant les flags qu'ils passent toujours, ou enveloppent la commande dans des scripts qui appliquent les conventions d'équipe. Le formatage de la sortie peut être personnalisé via la configuration Git — pretty formats, schémas de couleurs et comportement du pager sont tous ajustables. Quand quelque chose tourne mal, la première étape de diagnostic est généralement de relancer la commande avec <code>GIT_TRACE=1</code> dans l'environnement, ce qui révèle les appels de plomberie sous-jacents. Pour les situations inhabituelles, la sortie <code>--help</code> (<code>git cherry-pick --help</code>) ouvre la page de manuel complète avec les détails de chaque option, y compris celles rarement utilisées dans les workflows ordinaires mais essentielles pour le débogage ou le scripting à grande échelle.</p><p>Comprendre comment <code>git cherry-pick</code> interagit avec le reste du modèle de données de Git — la base d'objets, l'index, les refs et l'arborescence de travail — est rentable. Chaque commande opère sur un sous-ensemble de ces pièces, et savoir laquelle elle touche aide à prédire les résultats et récupérer après les erreurs. Lire la documentation officielle de Git en parallèle de la pratique sur un dépôt jetable est la façon la plus rapide d'intérioriser les subtilités. La plupart des problèmes de production avec Git proviennent de l'une de trois causes : comportement par défaut surprenant, opérations réseau partielles, ou réécriture d'historique déjà partagé. Un modèle mental fonctionnel des effets de bord de <code>git cherry-pick</code> aide à éviter les trois.</p>
        <h2>Options courantes</h2>
    <table>
      <thead><tr><th>Option</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>-n</code>, <code>--no-commit</code></td><td>Apply changes but don't commit yet.</td></tr>
        <tr><td><code>-x</code></td><td>Annotate the commit message with the source SHA.</td></tr>
        <tr><td><code>-e</code>, <code>--edit</code></td><td>Edit the commit message before committing.</td></tr>
        <tr><td><code>--continue</code></td><td>Reprendre après résolution des conflits.</td></tr>
        <tr><td><code>--abort</code></td><td>Cancel and restore prior state.</td></tr>
        <tr><td><code>--skip</code></td><td>Skip current commit and continue.</td></tr>
        <tr><td><code>-m &lt;parent&gt;</code></td><td>Specify mainline when picking a merge commit.</td></tr>
        <tr><td><code>-S</code></td><td>GPG-sign the resulting commits.</td></tr>
      </tbody>
    </table>
    <h2>Exemples</h2>
    <pre><code>git cherry-pick abc123
    # Apply a single commit onto current branch
    
    git cherry-pick -x abc123 def456
    # Apply two commits with traceability annotations
    
    git cherry-pick A..B
    # Pick a range (exclusive of A, inclusive of B)
    
    git cherry-pick --continue
    # Continue after fixing conflicts</code></pre>
    <h2>Erreurs fréquentes</h2>
    <p>Cherry-picking the same change repeatedly can confuse later merges, since identical-looking commits have different SHAs. Use <code>git rerere</code> to remember resolutions. Picking a merge without <code>-m</code> fails. For long sequences, prefer rebase or merge.</p>
    <h2>Commandes liées</h2>
    <p><code>git rebase</code>, <code>git revert</code>, <code>git merge</code>, <code>git rerere</code></p>
    

- source_title: "git rebase -i — Interactive rebase to rewrite local history"
  title: "git rebase -i — Rebase interactif pour réécrire l'historique local"
  langcode: fr
  body: |
    <h2>Synopsis</h2>
    <pre><code>git rebase -i &lt;upstream&gt;
    git rebase -i --root</code></pre>
    <h2>Description</h2>
    <p>Interactive rebase opens an editor with the list of commits to be rebased, each prefixed with an action: <code>pick</code>, <code>reword</code>, <code>edit</code>, <code>squash</code>, <code>fixup</code>, <code>drop</code>, <code>exec</code>, or <code>break</code>. By editing this list, you can reorder, combine, split, or remove commits before they go upstream. It's the workhorse of "clean up history before pushing."</p>
    <p>Combined with <code>--autosquash</code>, fixup commits created via <code>git commit --fixup</code> are automatically arranged next to their targets and marked for squashing. The <code>--rebase-merges</code> flag preserves merge commits during interactive rebase.</p>
    <p>Dans l'usage quotidien, <code>git rebase -i</code> s'intègre étroitement avec les alias de shell, les plugins d'éditeur et l'intégration continue. Les utilisateurs avancés ajoutent souvent des alias combinant les flags qu'ils passent toujours, ou enveloppent la commande dans des scripts qui appliquent les conventions d'équipe. Le formatage de la sortie peut être personnalisé via la configuration Git — pretty formats, schémas de couleurs et comportement du pager sont tous ajustables. Quand quelque chose tourne mal, la première étape de diagnostic est généralement de relancer la commande avec <code>GIT_TRACE=1</code> dans l'environnement, ce qui révèle les appels de plomberie sous-jacents. Pour les situations inhabituelles, la sortie <code>--help</code> (<code>git rebase -i --help</code>) ouvre la page de manuel complète avec les détails de chaque option, y compris celles rarement utilisées dans les workflows ordinaires mais essentielles pour le débogage ou le scripting à grande échelle.</p><p>Comprendre comment <code>git rebase -i</code> interagit avec le reste du modèle de données de Git — la base d'objets, l'index, les refs et l'arborescence de travail — est rentable. Chaque commande opère sur un sous-ensemble de ces pièces, et savoir laquelle elle touche aide à prédire les résultats et récupérer après les erreurs. Lire la documentation officielle de Git en parallèle de la pratique sur un dépôt jetable est la façon la plus rapide d'intérioriser les subtilités. La plupart des problèmes de production avec Git proviennent de l'une de trois causes : comportement par défaut surprenant, opérations réseau partielles, ou réécriture d'historique déjà partagé. Un modèle mental fonctionnel des effets de bord de <code>git rebase -i</code> aide à éviter les trois.</p>
        <h2>Options courantes</h2>
    <table>
      <thead><tr><th>Option</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>-i</code></td><td>Interactive editor for rebase plan.</td></tr>
        <tr><td><code>--autosquash</code></td><td>Auto-arrange fixup/squash commits.</td></tr>
        <tr><td><code>--root</code></td><td>Rebase from the very first commit.</td></tr>
        <tr><td><code>-x &lt;cmd&gt;</code></td><td>Run a command between commits (e.g. tests).</td></tr>
        <tr><td><code>-r</code>, <code>--rebase-merges</code></td><td>Preserve merge commits.</td></tr>
        <tr><td><code>--continue</code></td><td>Resume after resolving.</td></tr>
        <tr><td><code>--abort</code></td><td>Cancel completely.</td></tr>
      </tbody>
    </table>
    <h2>Exemples</h2>
    <pre><code>git rebase -i HEAD~5
    # Edit the last 5 commits
    
    git commit --fixup abc123
    git rebase -i --autosquash abc123^
    # Add a fixup, then auto-squash on rebase
    
    git rebase -i -x "npm test" main
    # Run tests after each commit during rebase
    
    git rebase -i --root
    # Rewrite history from the first commit</code></pre>
    <h2>Erreurs fréquentes</h2>
    <p>Saving an empty rebase todo list aborts the operation — leave at least one <code>pick</code> line. Marking too many commits as <code>edit</code> creates a tedious sequence of stops; prefer <code>squash</code> or <code>fixup</code> when you just want to combine. Never interactive-rebase commits that are already pushed and shared.</p>
    <h2>Commandes liées</h2>
    <p><code>git rebase</code>, <code>git commit --fixup</code>, <code>git cherry-pick</code>, <code>git reflog</code></p>
    

- source_title: "git filter-repo — Rewrite repository history at scale"
  title: "git filter-repo — Réécrire l'historique du dépôt à grande échelle"
  langcode: fr
  body: |
    <h2>Synopsis</h2>
    <pre><code>git filter-repo --path &lt;path&gt; [--invert-paths]
    git filter-repo --replace-text &lt;file&gt;
    git filter-repo --strip-blobs-bigger-than 10M</code></pre>
    <h2>Description</h2>
    <p>The <code>git filter-repo</code> tool is the modern, recommended way to rewrite Git history. It replaces the deprecated <code>git filter-branch</code>, which is slow and error-prone. <code>filter-repo</code> can purge large files, remove sensitive data (credentials accidentally committed), restructure paths, rewrite authors via a mailmap, or extract subdirectories into their own repository.</p>
    <p>It is distributed separately from core Git (typically via <code>pip install git-filter-repo</code> or your package manager). Operations are destructive — always work on a fresh clone and coordinate with collaborators because every SHA changes.</p>
    <p>Dans l'usage quotidien, <code>git filter-repo</code> s'intègre étroitement avec les alias de shell, les plugins d'éditeur et l'intégration continue. Les utilisateurs avancés ajoutent souvent des alias combinant les flags qu'ils passent toujours, ou enveloppent la commande dans des scripts qui appliquent les conventions d'équipe. Le formatage de la sortie peut être personnalisé via la configuration Git — pretty formats, schémas de couleurs et comportement du pager sont tous ajustables. Quand quelque chose tourne mal, la première étape de diagnostic est généralement de relancer la commande avec <code>GIT_TRACE=1</code> dans l'environnement, ce qui révèle les appels de plomberie sous-jacents. Pour les situations inhabituelles, la sortie <code>--help</code> (<code>git filter-repo --help</code>) ouvre la page de manuel complète avec les détails de chaque option, y compris celles rarement utilisées dans les workflows ordinaires mais essentielles pour le débogage ou le scripting à grande échelle.</p><p>Comprendre comment <code>git filter-repo</code> interagit avec le reste du modèle de données de Git — la base d'objets, l'index, les refs et l'arborescence de travail — est rentable. Chaque commande opère sur un sous-ensemble de ces pièces, et savoir laquelle elle touche aide à prédire les résultats et récupérer après les erreurs. Lire la documentation officielle de Git en parallèle de la pratique sur un dépôt jetable est la façon la plus rapide d'intérioriser les subtilités. La plupart des problèmes de production avec Git proviennent de l'une de trois causes : comportement par défaut surprenant, opérations réseau partielles, ou réécriture d'historique déjà partagé. Un modèle mental fonctionnel des effets de bord de <code>git filter-repo</code> aide à éviter les trois.</p>
        <h2>Options courantes</h2>
    <table>
      <thead><tr><th>Option</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>--path &lt;p&gt;</code></td><td>Keep only the specified path.</td></tr>
        <tr><td><code>--invert-paths</code></td><td>Inverse: remove the specified paths.</td></tr>
        <tr><td><code>--path-glob &lt;g&gt;</code></td><td>Use a glob pattern.</td></tr>
        <tr><td><code>--replace-text &lt;file&gt;</code></td><td>Replace strings throughout history.</td></tr>
        <tr><td><code>--strip-blobs-bigger-than &lt;size&gt;</code></td><td>Drop large blobs.</td></tr>
        <tr><td><code>--mailmap &lt;file&gt;</code></td><td>Rewrite author/committer info.</td></tr>
        <tr><td><code>--analyze</code></td><td>Produce a report on repo size before rewriting.</td></tr>
        <tr><td><code>--force</code></td><td>Override the fresh-clone safety check.</td></tr>
      </tbody>
    </table>
    <h2>Exemples</h2>
    <pre><code>git filter-repo --analyze
    # Inspect what's eating space
    
    git filter-repo --path docs/ --invert-paths
    # Remove docs/ from all history
    
    git filter-repo --strip-blobs-bigger-than 50M
    # Purge any file over 50 MB
    
    echo 'API_KEY==&gt;REDACTED' &gt; replacements.txt
    git filter-repo --replace-text replacements.txt
    # Scrub a leaked secret</code></pre>
    <h2>Erreurs fréquentes</h2>
    <p>Running <code>filter-repo</code> in your live repo without a backup risks losing data. Always clone fresh. After rewriting, force-push and have collaborators re-clone — anyone with old SHAs will get conflicts. The tool removes <code>origin</code> by default to prevent accidental pushes; re-add it deliberately.</p>
    <h2>Commandes liées</h2>
    <p><code>git filter-branch</code> (deprecated), <code>git gc</code>, <code>git reflog</code>, <code>git push --force-with-lease</code></p>
    

- source_title: "git worktree — Manage multiple working trees"
  title: "git worktree — Gérer plusieurs arborescences de travail"
  langcode: fr
  body: |
    <h2>Synopsis</h2>
    <pre><code>git worktree add &lt;path&gt; [&lt;branch&gt;]
    git worktree list
    git worktree remove &lt;path&gt;
    git worktree prune</code></pre>
    <h2>Description</h2>
    <p>The <code>git worktree</code> command lets a single repository have multiple working trees checked out simultaneously, each at a different branch. This is faster and cheaper than cloning multiple times: only one object database, but parallel checkouts. Worktrees are perfect for running tests on a release branch while continuing development on main, or for picking up an emergency fix without disturbing in-progress work.</p>
    <p>Each worktree has its own HEAD, index, and working files, but shares the underlying objects and config. Locked worktrees prevent automatic pruning of mounted-elsewhere checkouts.</p>
    <p>Dans l'usage quotidien, <code>git worktree</code> s'intègre étroitement avec les alias de shell, les plugins d'éditeur et l'intégration continue. Les utilisateurs avancés ajoutent souvent des alias combinant les flags qu'ils passent toujours, ou enveloppent la commande dans des scripts qui appliquent les conventions d'équipe. Le formatage de la sortie peut être personnalisé via la configuration Git — pretty formats, schémas de couleurs et comportement du pager sont tous ajustables. Quand quelque chose tourne mal, la première étape de diagnostic est généralement de relancer la commande avec <code>GIT_TRACE=1</code> dans l'environnement, ce qui révèle les appels de plomberie sous-jacents. Pour les situations inhabituelles, la sortie <code>--help</code> (<code>git worktree --help</code>) ouvre la page de manuel complète avec les détails de chaque option, y compris celles rarement utilisées dans les workflows ordinaires mais essentielles pour le débogage ou le scripting à grande échelle.</p><p>Comprendre comment <code>git worktree</code> interagit avec le reste du modèle de données de Git — la base d'objets, l'index, les refs et l'arborescence de travail — est rentable. Chaque commande opère sur un sous-ensemble de ces pièces, et savoir laquelle elle touche aide à prédire les résultats et récupérer après les erreurs. Lire la documentation officielle de Git en parallèle de la pratique sur un dépôt jetable est la façon la plus rapide d'intérioriser les subtilités. La plupart des problèmes de production avec Git proviennent de l'une de trois causes : comportement par défaut surprenant, opérations réseau partielles, ou réécriture d'historique déjà partagé. Un modèle mental fonctionnel des effets de bord de <code>git worktree</code> aide à éviter les trois.</p>
        <h2>Options courantes</h2>
    <table>
      <thead><tr><th>Sous-commande</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>add &lt;path&gt; [&lt;branch&gt;]</code></td><td>Create a new worktree.</td></tr>
        <tr><td><code>add -b &lt;new&gt; &lt;path&gt; [&lt;start&gt;]</code></td><td>Create new branch + worktree in one step.</td></tr>
        <tr><td><code>list</code></td><td>Show all worktrees.</td></tr>
        <tr><td><code>remove &lt;path&gt;</code></td><td>Delete a worktree's directory and metadata.</td></tr>
        <tr><td><code>prune</code></td><td>Remove metadata for worktrees whose path is gone.</td></tr>
        <tr><td><code>lock</code> / <code>unlock</code></td><td>Prevent or allow pruning.</td></tr>
        <tr><td><code>move &lt;old&gt; &lt;new&gt;</code></td><td>Relocate a worktree.</td></tr>
      </tbody>
    </table>
    <h2>Exemples</h2>
    <pre><code>git worktree add ../project-hotfix release/1.4
    # Check out release/1.4 in a sibling directory
    
    git worktree add -b experiment ../project-experiment
    # Create a new branch and worktree
    
    git worktree list
    # Display all worktrees
    
    git worktree remove ../project-hotfix
    # Tear down when finished</code></pre>
    <h2>Erreurs fréquentes</h2>
    <p>You cannot have the same branch checked out in two worktrees simultaneously — Git refuses. Use <code>--detach</code> if you only need the contents. Forgetting to <code>worktree remove</code> leaves stale metadata; <code>git worktree prune</code> cleans up.</p>
    <h2>Commandes liées</h2>
    <p><code>git switch</code>, <code>git branch</code>, <code>git clone</code>, <code>git submodule</code></p>
    

- source_title: "git submodule — Manage nested Git repositories"
  title: "git submodule — Gérer les dépôts Git imbriqués"
  langcode: fr
  body: |
    <h2>Synopsis</h2>
    <pre><code>git submodule add &lt;url&gt; &lt;path&gt;
    git submodule update --init --recursive
    git submodule foreach &lt;cmd&gt;</code></pre>
    <h2>Description</h2>
    <p>The <code>git submodule</code> command embeds an external Git repository inside another at a fixed commit. The parent repo records the submodule URL and the exact SHA to check out, decoupling parent and child histories. This is useful for vendoring shared libraries or composing multi-repo systems.</p>
    <p>Submodules are powerful but have a reputation for confusion. After cloning a project with submodules, you must run <code>git submodule update --init --recursive</code> to populate them. Updating to a newer submodule commit is a two-step dance: pull inside the submodule, then commit the new SHA in the parent.</p>
    <p>Dans l'usage quotidien, <code>git submodule</code> s'intègre étroitement avec les alias de shell, les plugins d'éditeur et l'intégration continue. Les utilisateurs avancés ajoutent souvent des alias combinant les flags qu'ils passent toujours, ou enveloppent la commande dans des scripts qui appliquent les conventions d'équipe. Le formatage de la sortie peut être personnalisé via la configuration Git — pretty formats, schémas de couleurs et comportement du pager sont tous ajustables. Quand quelque chose tourne mal, la première étape de diagnostic est généralement de relancer la commande avec <code>GIT_TRACE=1</code> dans l'environnement, ce qui révèle les appels de plomberie sous-jacents. Pour les situations inhabituelles, la sortie <code>--help</code> (<code>git submodule --help</code>) ouvre la page de manuel complète avec les détails de chaque option, y compris celles rarement utilisées dans les workflows ordinaires mais essentielles pour le débogage ou le scripting à grande échelle.</p><p>Comprendre comment <code>git submodule</code> interagit avec le reste du modèle de données de Git — la base d'objets, l'index, les refs et l'arborescence de travail — est rentable. Chaque commande opère sur un sous-ensemble de ces pièces, et savoir laquelle elle touche aide à prédire les résultats et récupérer après les erreurs. Lire la documentation officielle de Git en parallèle de la pratique sur un dépôt jetable est la façon la plus rapide d'intérioriser les subtilités. La plupart des problèmes de production avec Git proviennent de l'une de trois causes : comportement par défaut surprenant, opérations réseau partielles, ou réécriture d'historique déjà partagé. Un modèle mental fonctionnel des effets de bord de <code>git submodule</code> aide à éviter les trois.</p>
        <h2>Options courantes</h2>
    <table>
      <thead><tr><th>Sous-commande</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>add &lt;url&gt; &lt;path&gt;</code></td><td>Add a new submodule.</td></tr>
        <tr><td><code>init</code></td><td>Register submodule URLs in <code>.git/config</code>.</td></tr>
        <tr><td><code>update --init</code></td><td>Init and check out submodules.</td></tr>
        <tr><td><code>update --recursive</code></td><td>Recurse into nested submodules.</td></tr>
        <tr><td><code>update --remote</code></td><td>Update to the upstream branch tip.</td></tr>
        <tr><td><code>foreach &lt;cmd&gt;</code></td><td>Run a command in every submodule.</td></tr>
        <tr><td><code>deinit &lt;path&gt;</code></td><td>Remove a submodule from the working tree.</td></tr>
      </tbody>
    </table>
    <h2>Exemples</h2>
    <pre><code>git submodule add https://github.com/lib/foo.git vendor/foo
    # Add a new submodule at vendor/foo
    
    git clone --recurse-submodules https://github.com/me/parent.git
    # Clone with submodules in one step
    
    git submodule update --init --recursive
    # Initialize and populate all submodules
    
    git submodule foreach 'git pull origin main'
    # Update each submodule to its main branch tip</code></pre>
    <h2>Erreurs fréquentes</h2>
    <p>Forgetting <code>--recurse-submodules</code> on clone leaves empty submodule directories. Pushing the parent repo without first pushing submodule changes leaves a dangling reference for collaborators. Many teams move to <code>git subtree</code> or monorepos to escape submodule complexity.</p>
    <h2>Commandes liées</h2>
    <p><code>git subtree</code>, <code>git clone --recurse-submodules</code>, <code>git config submodule</code></p>
    

- source_title: "git subtree — Merge and split a project as a subdirectory"
  title: "git subtree — Merger et séparer un projet en sous-répertoire"
  langcode: fr
  body: |
    <h2>Synopsis</h2>
    <pre><code>git subtree add --prefix=&lt;path&gt; &lt;repo&gt; &lt;ref&gt; [--squash]
    git subtree pull --prefix=&lt;path&gt; &lt;repo&gt; &lt;ref&gt;
    git subtree push --prefix=&lt;path&gt; &lt;repo&gt; &lt;ref&gt;
    git subtree split --prefix=&lt;path&gt; -b &lt;new-branch&gt;</code></pre>
    <h2>Description</h2>
    <p>The <code>git subtree</code> command is an alternative to submodules that merges another project's content directly into a subdirectory of your repo. Unlike submodules, subtree consumers don't need any special steps — the files are simply there. The cost is that the foreign history is incorporated into your own.</p>
    <p>The two main operations are <code>add</code> (initial import, often with <code>--squash</code> to flatten history) and <code>pull</code> (bring in upstream changes). To send back changes, <code>git subtree push</code> filters out commits that touch the prefix and pushes them to the upstream repo.</p>
    <p>Dans l'usage quotidien, <code>git subtree</code> s'intègre étroitement avec les alias de shell, les plugins d'éditeur et l'intégration continue. Les utilisateurs avancés ajoutent souvent des alias combinant les flags qu'ils passent toujours, ou enveloppent la commande dans des scripts qui appliquent les conventions d'équipe. Le formatage de la sortie peut être personnalisé via la configuration Git — pretty formats, schémas de couleurs et comportement du pager sont tous ajustables. Quand quelque chose tourne mal, la première étape de diagnostic est généralement de relancer la commande avec <code>GIT_TRACE=1</code> dans l'environnement, ce qui révèle les appels de plomberie sous-jacents. Pour les situations inhabituelles, la sortie <code>--help</code> (<code>git subtree --help</code>) ouvre la page de manuel complète avec les détails de chaque option, y compris celles rarement utilisées dans les workflows ordinaires mais essentielles pour le débogage ou le scripting à grande échelle.</p><p>Comprendre comment <code>git subtree</code> interagit avec le reste du modèle de données de Git — la base d'objets, l'index, les refs et l'arborescence de travail — est rentable. Chaque commande opère sur un sous-ensemble de ces pièces, et savoir laquelle elle touche aide à prédire les résultats et récupérer après les erreurs. Lire la documentation officielle de Git en parallèle de la pratique sur un dépôt jetable est la façon la plus rapide d'intérioriser les subtilités. La plupart des problèmes de production avec Git proviennent de l'une de trois causes : comportement par défaut surprenant, opérations réseau partielles, ou réécriture d'historique déjà partagé. Un modèle mental fonctionnel des effets de bord de <code>git subtree</code> aide à éviter les trois.</p>
        <h2>Options courantes</h2>
    <table>
      <thead><tr><th>Sous-commande</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>add</code></td><td>Import an external repo into a subdirectory.</td></tr>
        <tr><td><code>pull</code></td><td>Merge upstream changes for that prefix.</td></tr>
        <tr><td><code>push</code></td><td>Push prefix-only history back upstream.</td></tr>
        <tr><td><code>merge</code></td><td>Merge an arbitrary tree into the prefix.</td></tr>
        <tr><td><code>split</code></td><td>Extract a subdirectory's history as a standalone branch.</td></tr>
        <tr><td><code>--squash</code></td><td>Flatten foreign history into a single commit.</td></tr>
        <tr><td><code>--prefix=&lt;path&gt;</code></td><td>Subdirectory under which to place the subtree.</td></tr>
      </tbody>
    </table>
    <h2>Exemples</h2>
    <pre><code>git subtree add --prefix=vendor/foo https://github.com/lib/foo.git main --squash
    # Import foo into vendor/foo, squashing history
    
    git subtree pull --prefix=vendor/foo https://github.com/lib/foo.git main --squash
    # Pull updates
    
    git subtree split --prefix=lib -b lib-only
    # Extract lib/ as its own branch for sharing
    
    git subtree push --prefix=vendor/foo upstream main
    # Send prefix-scoped commits back to upstream</code></pre>
    <h2>Erreurs fréquentes</h2>
    <p>Mixing <code>--squash</code> on some operations and not others creates messy history. Pick one mode and stick with it. Subtree merges produce nontrivial commit graphs that confuse some tooling. <code>git subtree split</code> can be slow on large histories.</p>
    <h2>Commandes liées</h2>
    <p><code>git submodule</code>, <code>git merge</code>, <code>git filter-repo</code></p>
    

- source_title: "git notes — Add or inspect commit notes"
  title: "git notes — Ajouter ou inspecter les notes de commit"
  langcode: fr
  body: |
    <h2>Synopsis</h2>
    <pre><code>git notes add [-m &lt;msg&gt;] [&lt;commit&gt;]
    git notes show [&lt;commit&gt;]
    git notes append [-m &lt;msg&gt;] [&lt;commit&gt;]
    git notes remove [&lt;commit&gt;]</code></pre>
    <h2>Description</h2>
    <p>The <code>git notes</code> command attaches additional metadata to commits without rewriting them. Notes are stored in their own ref namespace (<code>refs/notes/commits</code> by default) and are displayed alongside commits in <code>git log</code>. Use cases include code review comments, build status, ticket links, or sign-offs added after the fact.</p>
    <p>Notes are not pushed by default — you must explicitly <code>git push origin refs/notes/*</code>. Different teams use different namespaces; CI systems often write to <code>refs/notes/ci</code> while reviewers use <code>refs/notes/review</code>.</p>
    <p>Dans l'usage quotidien, <code>git notes</code> s'intègre étroitement avec les alias de shell, les plugins d'éditeur et l'intégration continue. Les utilisateurs avancés ajoutent souvent des alias combinant les flags qu'ils passent toujours, ou enveloppent la commande dans des scripts qui appliquent les conventions d'équipe. Le formatage de la sortie peut être personnalisé via la configuration Git — pretty formats, schémas de couleurs et comportement du pager sont tous ajustables. Quand quelque chose tourne mal, la première étape de diagnostic est généralement de relancer la commande avec <code>GIT_TRACE=1</code> dans l'environnement, ce qui révèle les appels de plomberie sous-jacents. Pour les situations inhabituelles, la sortie <code>--help</code> (<code>git notes --help</code>) ouvre la page de manuel complète avec les détails de chaque option, y compris celles rarement utilisées dans les workflows ordinaires mais essentielles pour le débogage ou le scripting à grande échelle.</p><p>Comprendre comment <code>git notes</code> interagit avec le reste du modèle de données de Git — la base d'objets, l'index, les refs et l'arborescence de travail — est rentable. Chaque commande opère sur un sous-ensemble de ces pièces, et savoir laquelle elle touche aide à prédire les résultats et récupérer après les erreurs. Lire la documentation officielle de Git en parallèle de la pratique sur un dépôt jetable est la façon la plus rapide d'intérioriser les subtilités. La plupart des problèmes de production avec Git proviennent de l'une de trois causes : comportement par défaut surprenant, opérations réseau partielles, ou réécriture d'historique déjà partagé. Un modèle mental fonctionnel des effets de bord de <code>git notes</code> aide à éviter les trois.</p>
        <h2>Options courantes</h2>
    <table>
      <thead><tr><th>Sous-commande</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>add</code></td><td>Attach a new note to a commit.</td></tr>
        <tr><td><code>append</code></td><td>Add to an existing note.</td></tr>
        <tr><td><code>edit</code></td><td>Open an editor on the note.</td></tr>
        <tr><td><code>show</code></td><td>Print the note.</td></tr>
        <tr><td><code>remove</code></td><td>Delete the note.</td></tr>
        <tr><td><code>list</code></td><td>List commits that have notes.</td></tr>
        <tr><td><code>--ref &lt;ref&gt;</code></td><td>Use a different notes namespace.</td></tr>
      </tbody>
    </table>
    <h2>Exemples</h2>
    <pre><code>git notes add -m "Reviewed by Alice" abc123
    # Attach a review note
    
    git log --show-notes
    # Show notes inline with log
    
    git notes --ref=ci add -m "Build #42 passed" HEAD
    # Use a custom namespace
    
    git push origin 'refs/notes/*'
    # Publish notes to the remote</code></pre>
    <h2>Erreurs fréquentes</h2>
    <p>Forgetting to push and fetch the notes ref makes notes invisible to collaborators. Configure <code>notes.displayRef = refs/notes/*</code> so all namespaces show in <code>git log</code>. Notes don't survive history rewrites unless explicitly migrated.</p>
    <h2>Commandes liées</h2>
    <p><code>git log</code>, <code>git commit</code>, <code>git push</code>, <code>git fetch</code></p>
    

- source_title: "git archive — Create an archive of files from a named tree"
  title: "git archive — Créer une archive de fichiers depuis un tree nommé"
  langcode: fr
  body: |
    <h2>Synopsis</h2>
    <pre><code>git archive [--format=&lt;fmt&gt;] [--prefix=&lt;p&gt;/] [-o &lt;file&gt;] &lt;tree-ish&gt; [&lt;path&gt;...]</code></pre>
    <h2>Description</h2>
    <p>The <code>git archive</code> command creates a tar or zip file containing the contents of any tree (commit, tag, or branch). Unlike a simple <code>tar</code> of the working tree, it includes only tracked files at a specific revision and excludes <code>.git</code> directories. This makes it ideal for producing release tarballs, source distributions, and reproducible snapshots.</p>
    <p>The <code>--prefix</code> option wraps all files under a subdirectory inside the archive — important for releases so that extraction creates a named folder. <code>git archive</code> also supports running over the network from servers that allow it.</p>
    <p>Dans l'usage quotidien, <code>git archive</code> s'intègre étroitement avec les alias de shell, les plugins d'éditeur et l'intégration continue. Les utilisateurs avancés ajoutent souvent des alias combinant les flags qu'ils passent toujours, ou enveloppent la commande dans des scripts qui appliquent les conventions d'équipe. Le formatage de la sortie peut être personnalisé via la configuration Git — pretty formats, schémas de couleurs et comportement du pager sont tous ajustables. Quand quelque chose tourne mal, la première étape de diagnostic est généralement de relancer la commande avec <code>GIT_TRACE=1</code> dans l'environnement, ce qui révèle les appels de plomberie sous-jacents. Pour les situations inhabituelles, la sortie <code>--help</code> (<code>git archive --help</code>) ouvre la page de manuel complète avec les détails de chaque option, y compris celles rarement utilisées dans les workflows ordinaires mais essentielles pour le débogage ou le scripting à grande échelle.</p><p>Comprendre comment <code>git archive</code> interagit avec le reste du modèle de données de Git — la base d'objets, l'index, les refs et l'arborescence de travail — est rentable. Chaque commande opère sur un sous-ensemble de ces pièces, et savoir laquelle elle touche aide à prédire les résultats et récupérer après les erreurs. Lire la documentation officielle de Git en parallèle de la pratique sur un dépôt jetable est la façon la plus rapide d'intérioriser les subtilités. La plupart des problèmes de production avec Git proviennent de l'une de trois causes : comportement par défaut surprenant, opérations réseau partielles, ou réécriture d'historique déjà partagé. Un modèle mental fonctionnel des effets de bord de <code>git archive</code> aide à éviter les trois.</p>
        <h2>Options courantes</h2>
    <table>
      <thead><tr><th>Option</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>--format=&lt;fmt&gt;</code></td><td>tar, tar.gz, zip (default tar).</td></tr>
        <tr><td><code>--prefix=&lt;p&gt;/</code></td><td>Prepend a directory to all archive paths.</td></tr>
        <tr><td><code>-o &lt;file&gt;</code></td><td>Write to file instead of stdout.</td></tr>
        <tr><td><code>--remote=&lt;repo&gt;</code></td><td>Archive from a remote repository.</td></tr>
        <tr><td><code>--worktree-attributes</code></td><td>Honor <code>export-ignore</code> attributes.</td></tr>
        <tr><td><code>-l</code>, <code>--list</code></td><td>List supported formats.</td></tr>
      </tbody>
    </table>
    <h2>Exemples</h2>
    <pre><code>git archive --format=tar.gz --prefix=myproj-1.0/ -o myproj-1.0.tar.gz v1.0
    # Release tarball with named top-level directory
    
    git archive HEAD docs/ | tar -x -C /tmp/docs
    # Extract the docs/ directory at HEAD into /tmp/docs
    
    git archive --format=zip -o snapshot.zip HEAD
    # ZIP archive of current tree</code></pre>
    <h2>Examples (continued)</h2>
    <pre><code># Use .gitattributes to exclude files from archives:
    echo "tests/ export-ignore" &gt;&gt; .gitattributes
    echo ".github/ export-ignore" &gt;&gt; .gitattributes
    git archive --worktree-attributes -o release.tar.gz HEAD</code></pre>
    <h2>Erreurs fréquentes</h2>
    <p>Forgetting <code>--prefix</code> creates an archive that explodes files into the current directory on extraction. Without <code>export-ignore</code> attributes, your archive may include CI configs, tests, and dev-only files that you didn't intend to ship.</p>
    <h2>Commandes liées</h2>
    <p><code>git bundle</code>, <code>git tag</code>, <code>git show</code>, <code>tar</code></p>
    

- source_title: "git bundle — Move objects and refs by archive"
  title: "git bundle — Déplacer objets et refs via une archive"
  langcode: fr
  body: |
    <h2>Synopsis</h2>
    <pre><code>git bundle create &lt;file&gt; &lt;git-rev-list-args&gt;
    git bundle verify &lt;file&gt;
    git bundle list-heads &lt;file&gt;
    git clone &lt;file&gt; &lt;dir&gt;</code></pre>
    <h2>Description</h2>
    <p>The <code>git bundle</code> command packages Git history into a single file that can be transferred without a network — by USB drive, email, or any file transport. The recipient can clone or fetch from the bundle as if it were a remote. This is invaluable for air-gapped systems, slow connections, or as a backup format.</p>
    <p>Bundles support incremental updates: include a base ref so the bundle only contains commits since that ref, then have the recipient apply it on top of an existing repo with <code>git fetch</code>.</p>
    <p>Dans l'usage quotidien, <code>git bundle</code> s'intègre étroitement avec les alias de shell, les plugins d'éditeur et l'intégration continue. Les utilisateurs avancés ajoutent souvent des alias combinant les flags qu'ils passent toujours, ou enveloppent la commande dans des scripts qui appliquent les conventions d'équipe. Le formatage de la sortie peut être personnalisé via la configuration Git — pretty formats, schémas de couleurs et comportement du pager sont tous ajustables. Quand quelque chose tourne mal, la première étape de diagnostic est généralement de relancer la commande avec <code>GIT_TRACE=1</code> dans l'environnement, ce qui révèle les appels de plomberie sous-jacents. Pour les situations inhabituelles, la sortie <code>--help</code> (<code>git bundle --help</code>) ouvre la page de manuel complète avec les détails de chaque option, y compris celles rarement utilisées dans les workflows ordinaires mais essentielles pour le débogage ou le scripting à grande échelle.</p><p>Comprendre comment <code>git bundle</code> interagit avec le reste du modèle de données de Git — la base d'objets, l'index, les refs et l'arborescence de travail — est rentable. Chaque commande opère sur un sous-ensemble de ces pièces, et savoir laquelle elle touche aide à prédire les résultats et récupérer après les erreurs. Lire la documentation officielle de Git en parallèle de la pratique sur un dépôt jetable est la façon la plus rapide d'intérioriser les subtilités. La plupart des problèmes de production avec Git proviennent de l'une de trois causes : comportement par défaut surprenant, opérations réseau partielles, ou réécriture d'historique déjà partagé. Un modèle mental fonctionnel des effets de bord de <code>git bundle</code> aide à éviter les trois.</p>
        <h2>Options courantes</h2>
    <table>
      <thead><tr><th>Sous-commande</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>create &lt;file&gt; &lt;refs&gt;</code></td><td>Create a bundle file.</td></tr>
        <tr><td><code>verify &lt;file&gt;</code></td><td>Check that a bundle is valid and applicable.</td></tr>
        <tr><td><code>list-heads &lt;file&gt;</code></td><td>List the refs the bundle contains.</td></tr>
        <tr><td><code>unbundle &lt;file&gt;</code></td><td>Plumbing: emit objects to the repository.</td></tr>
        <tr><td><code>--all</code></td><td>Include all refs.</td></tr>
        <tr><td><code>--progress</code></td><td>Show progress on creation.</td></tr>
      </tbody>
    </table>
    <h2>Exemples</h2>
    <pre><code>git bundle create repo.bundle --all
    # Full backup of every ref
    
    git bundle create incremental.bundle main ^v2.0
    # Just commits on main since v2.0
    
    git bundle verify repo.bundle
    # Check applicability before fetching
    
    # On the receiving side:
    git clone repo.bundle myproj
    # or, into an existing repo:
    git fetch ../incremental.bundle main:main</code></pre>
    <h2>Erreurs fréquentes</h2>
    <p>Creating a bundle without specifying a base means the recipient gets the full history every time, even for small updates. Use ranges like <code>--since</code> or <code>^&lt;ref&gt;</code> for incremental bundles. <code>git bundle verify</code> against an empty repo only checks structural validity, not whether the bundle's prerequisites are present.</p>
    <h2>Commandes liées</h2>
    <p><code>git archive</code>, <code>git fetch</code>, <code>git clone</code>, <code>git pack-objects</code></p>
    

- source_title: "git reflog — Manage reference logs"
  title: "git reflog — Gérer les journaux de références"
  langcode: fr
  body: |
    <h2>Synopsis</h2>
    <pre><code>git reflog [show] [&lt;ref&gt;]
    git reflog expire [--expire=&lt;time&gt;] [--all]
    git reflog delete &lt;entry&gt;</code></pre>
    <h2>Description</h2>
    <p>The <code>git reflog</code> command shows the history of where each ref (HEAD, branches) has pointed locally. Every move — commit, checkout, reset, rebase — is logged with a timestamp and reason. The reflog is your safety net: even after a "destructive" operation like <code>git reset --hard</code>, the previous state is recoverable for as long as the reflog entry survives (typically 90 days).</p>
    <p>Refs in the reflog are addressable as <code>HEAD@{2}</code> ("HEAD's value 2 moves ago") or <code>HEAD@{2.hours.ago}</code>. To recover a "lost" branch, find its old SHA in the reflog and create a new branch from it.</p>
    <p>Dans l'usage quotidien, <code>git reflog</code> s'intègre étroitement avec les alias de shell, les plugins d'éditeur et l'intégration continue. Les utilisateurs avancés ajoutent souvent des alias combinant les flags qu'ils passent toujours, ou enveloppent la commande dans des scripts qui appliquent les conventions d'équipe. Le formatage de la sortie peut être personnalisé via la configuration Git — pretty formats, schémas de couleurs et comportement du pager sont tous ajustables. Quand quelque chose tourne mal, la première étape de diagnostic est généralement de relancer la commande avec <code>GIT_TRACE=1</code> dans l'environnement, ce qui révèle les appels de plomberie sous-jacents. Pour les situations inhabituelles, la sortie <code>--help</code> (<code>git reflog --help</code>) ouvre la page de manuel complète avec les détails de chaque option, y compris celles rarement utilisées dans les workflows ordinaires mais essentielles pour le débogage ou le scripting à grande échelle.</p><p>Comprendre comment <code>git reflog</code> interagit avec le reste du modèle de données de Git — la base d'objets, l'index, les refs et l'arborescence de travail — est rentable. Chaque commande opère sur un sous-ensemble de ces pièces, et savoir laquelle elle touche aide à prédire les résultats et récupérer après les erreurs. Lire la documentation officielle de Git en parallèle de la pratique sur un dépôt jetable est la façon la plus rapide d'intérioriser les subtilités. La plupart des problèmes de production avec Git proviennent de l'une de trois causes : comportement par défaut surprenant, opérations réseau partielles, ou réécriture d'historique déjà partagé. Un modèle mental fonctionnel des effets de bord de <code>git reflog</code> aide à éviter les trois.</p>
        <h2>Options courantes</h2>
    <table>
      <thead><tr><th>Option / Sous-commande</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>show &lt;ref&gt;</code></td><td>Display reflog for a ref (default HEAD).</td></tr>
        <tr><td><code>expire</code></td><td>Prune old entries.</td></tr>
        <tr><td><code>--expire=&lt;time&gt;</code></td><td>Expire entries older than this.</td></tr>
        <tr><td><code>--expire-unreachable=&lt;time&gt;</code></td><td>For commits unreachable from any ref.</td></tr>
        <tr><td><code>--all</code></td><td>Operate on every ref.</td></tr>
        <tr><td><code>delete &lt;entry&gt;</code></td><td>Remove a single entry.</td></tr>
      </tbody>
    </table>
    <h2>Exemples</h2>
    <pre><code>git reflog
    # Recent moves of HEAD
    
    git reflog show feature/api
    # Just the feature branch's history
    
    git reset --hard HEAD@{1}
    # Recover from a wrong reset by going back one move
    
    git reflog expire --expire=30.days --all
    # Trim reflog to last 30 days for every ref</code></pre>
    <h2>Erreurs fréquentes</h2>
    <p>Reflogs are LOCAL only — fetching from a remote does not include their reflog. Reflog entries expire eventually; don't rely on them for long-term recovery. Running <code>git gc --prune=now</code> after expiring the reflog can permanently remove unreachable commits.</p>
    <h2>Commandes liées</h2>
    <p><code>git reset</code>, <code>git rebase</code>, <code>git fsck</code>, <code>git gc</code></p>
    

- source_title: "git rerere — Reuse recorded conflict resolutions"
  title: "git rerere — Réutiliser les résolutions de conflit enregistrées"
  langcode: fr
  body: |
    <h2>Synopsis</h2>
    <pre><code>git config --global rerere.enabled true
    git rerere status
    git rerere diff
    git rerere clear</code></pre>
    <h2>Description</h2>
    <p>The <code>git rerere</code> command (Reuse Recorded Resolution) records how you resolve a conflict the first time and replays the same resolution automatically the next time the same conflict appears. It is invaluable when long-lived feature branches are repeatedly merged or rebased onto a moving base — without rerere, you re-resolve the same conflicts every time.</p>
    <p>Rerere is opt-in. Enable it globally with <code>git config --global rerere.enabled true</code>. Once enabled, every conflict resolution gets cached, and Git automatically applies the cached resolution on future encounters of the same conflict pre-image.</p>
    <p>Dans l'usage quotidien, <code>git rerere</code> s'intègre étroitement avec les alias de shell, les plugins d'éditeur et l'intégration continue. Les utilisateurs avancés ajoutent souvent des alias combinant les flags qu'ils passent toujours, ou enveloppent la commande dans des scripts qui appliquent les conventions d'équipe. Le formatage de la sortie peut être personnalisé via la configuration Git — pretty formats, schémas de couleurs et comportement du pager sont tous ajustables. Quand quelque chose tourne mal, la première étape de diagnostic est généralement de relancer la commande avec <code>GIT_TRACE=1</code> dans l'environnement, ce qui révèle les appels de plomberie sous-jacents. Pour les situations inhabituelles, la sortie <code>--help</code> (<code>git rerere --help</code>) ouvre la page de manuel complète avec les détails de chaque option, y compris celles rarement utilisées dans les workflows ordinaires mais essentielles pour le débogage ou le scripting à grande échelle.</p><p>Comprendre comment <code>git rerere</code> interagit avec le reste du modèle de données de Git — la base d'objets, l'index, les refs et l'arborescence de travail — est rentable. Chaque commande opère sur un sous-ensemble de ces pièces, et savoir laquelle elle touche aide à prédire les résultats et récupérer après les erreurs. Lire la documentation officielle de Git en parallèle de la pratique sur un dépôt jetable est la façon la plus rapide d'intérioriser les subtilités. La plupart des problèmes de production avec Git proviennent de l'une de trois causes : comportement par défaut surprenant, opérations réseau partielles, ou réécriture d'historique déjà partagé. Un modèle mental fonctionnel des effets de bord de <code>git rerere</code> aide à éviter les trois.</p>
        <h2>Options courantes</h2>
    <table>
      <thead><tr><th>Subcommand / Config</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>rerere.enabled</code></td><td>Turn on automatic recording.</td></tr>
        <tr><td><code>rerere.autoUpdate</code></td><td>Automatically stage resolved files.</td></tr>
        <tr><td><code>status</code></td><td>Show files with recorded resolutions.</td></tr>
        <tr><td><code>diff</code></td><td>Display the recorded resolution.</td></tr>
        <tr><td><code>remaining</code></td><td>Show conflicts not yet resolved.</td></tr>
        <tr><td><code>clear</code></td><td>Drop all recorded resolutions.</td></tr>
        <tr><td><code>forget &lt;path&gt;</code></td><td>Forget the resolution for a single path.</td></tr>
      </tbody>
    </table>
    <h2>Exemples</h2>
    <pre><code>git config --global rerere.enabled true
    git config --global rerere.autoUpdate true
    # Enable for all repos
    
    # After resolving a conflict during merge or rebase, rerere remembers.
    # Next time the same conflict appears, the resolution is auto-applied.
    
    git rerere status
    # Show files where a recorded resolution kicked in
    
    git rerere clear
    # Wipe the recorded set if it gets stale</code></pre>
    <h2>Erreurs fréquentes</h2>
    <p>Rerere only helps with identical conflicts. Slight context changes prevent reuse. If a recorded resolution turns out to be wrong, use <code>git rerere forget &lt;path&gt;</code> to clear it before re-resolving. Rerere data lives in <code>.git/rr-cache/</code> and is local — it isn't shared with collaborators.</p>
    <h2>Commandes liées</h2>
    <p><code>git merge</code>, <code>git rebase</code>, <code>git mergetool</code>, <code>git config</code></p>
    

- source_title: "git range-diff — Compare two commit ranges"
  title: "git range-diff — Comparer deux plages de commits"
  langcode: fr
  body: |
    <h2>Synopsis</h2>
    <pre><code>git range-diff &lt;range1&gt; &lt;range2&gt;
    git range-diff &lt;base&gt; &lt;rev1&gt; &lt;rev2&gt;</code></pre>
    <h2>Description</h2>
    <p>The <code>git range-diff</code> command compares two sequences of commits (typically a branch before and after a rebase) and shows what changed between them at the patch level. This is far more useful than a regular <code>git diff</code> for reviewing rebases, because it pairs up corresponding commits and highlights only the substantive differences.</p>
    <p>Pair this with <code>--reroll-count</code> on <code>format-patch</code> for upstream patch series, or just use it locally to verify that a force-push only introduced cleanup. Output uses a custom format with <code>=</code> for unchanged commits, <code>!</code> for changed, <code>&lt;</code> and <code>&gt;</code> for missing or added.</p>
    <p>Dans l'usage quotidien, <code>git range-diff</code> s'intègre étroitement avec les alias de shell, les plugins d'éditeur et l'intégration continue. Les utilisateurs avancés ajoutent souvent des alias combinant les flags qu'ils passent toujours, ou enveloppent la commande dans des scripts qui appliquent les conventions d'équipe. Le formatage de la sortie peut être personnalisé via la configuration Git — pretty formats, schémas de couleurs et comportement du pager sont tous ajustables. Quand quelque chose tourne mal, la première étape de diagnostic est généralement de relancer la commande avec <code>GIT_TRACE=1</code> dans l'environnement, ce qui révèle les appels de plomberie sous-jacents. Pour les situations inhabituelles, la sortie <code>--help</code> (<code>git range-diff --help</code>) ouvre la page de manuel complète avec les détails de chaque option, y compris celles rarement utilisées dans les workflows ordinaires mais essentielles pour le débogage ou le scripting à grande échelle.</p><p>Comprendre comment <code>git range-diff</code> interagit avec le reste du modèle de données de Git — la base d'objets, l'index, les refs et l'arborescence de travail — est rentable. Chaque commande opère sur un sous-ensemble de ces pièces, et savoir laquelle elle touche aide à prédire les résultats et récupérer après les erreurs. Lire la documentation officielle de Git en parallèle de la pratique sur un dépôt jetable est la façon la plus rapide d'intérioriser les subtilités. La plupart des problèmes de production avec Git proviennent de l'une de trois causes : comportement par défaut surprenant, opérations réseau partielles, ou réécriture d'historique déjà partagé. Un modèle mental fonctionnel des effets de bord de <code>git range-diff</code> aide à éviter les trois.</p>
        <h2>Options courantes</h2>
    <table>
      <thead><tr><th>Option</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>--no-color</code></td><td>Disable color output.</td></tr>
        <tr><td><code>--creation-factor=&lt;n&gt;</code></td><td>Tunable for matching commits across ranges.</td></tr>
        <tr><td><code>--dual-color</code></td><td>Color both inner and outer diffs.</td></tr>
        <tr><td><code>--no-patch</code></td><td>Show only the matching summary, not patches.</td></tr>
        <tr><td><code>--notes</code></td><td>Include git notes in the comparison.</td></tr>
      </tbody>
    </table>
    <h2>Exemples</h2>
    <pre><code>git range-diff main..feature@{1} main..feature
    # Compare branch before and after a rebase
    
    git range-diff origin/main feature.v1 feature.v2
    # Compare two patch series versions
    
    git range-diff @{u}..HEAD HEAD@{1}..HEAD
    # Compare current upstream-relative tip with what it was last time</code></pre>
    <h2>Erreurs fréquentes</h2>
    <p>Range-diff matches commits using a heuristic; if you make many small reorderings, the output may pair unexpected commits. Tune <code>--creation-factor</code> if needed. Don't confuse range-diff with <code>git diff A..B</code> — they answer different questions.</p>
    <h2>Commandes liées</h2>
    <p><code>git diff</code>, <code>git log</code>, <code>git rebase</code>, <code>git format-patch</code></p>
    

- source_title: "git stash (advanced) — Power-user stash workflows"
  title: "git stash (avancé) — Workflows de stash pour utilisateurs avancés"
  langcode: fr
  body: |
    <h2>Synopsis</h2>
    <pre><code>git stash push -p -m &lt;msg&gt; -- &lt;pathspec&gt;
    git stash branch &lt;newbranch&gt; [&lt;stash&gt;]
    git stash create
    git stash store -m &lt;msg&gt; &lt;sha&gt;</code></pre>
    <h2>Description</h2>
    <p>Beyond <code>git stash push</code> and <code>git stash pop</code>, the stash machinery offers powerful capabilities for advanced workflows. You can stash specific paths, stash specific hunks with <code>-p</code>, recreate a branch from a stash that conflicts with the current state, or even create a stash object without storing it on the stack (then store it later with a custom message).</p>
    <p>Internally, each stash is a merge commit between WIP-on-branch (the working tree) and index-on-branch (the staged changes), with the parent being the branch tip. This structure is what allows <code>stash branch</code> and <code>stash apply</code> to reconstruct exact state.</p>
    <p>Dans l'usage quotidien, <code>git stash (advanced)</code> s'intègre étroitement avec les alias de shell, les plugins d'éditeur et l'intégration continue. Les utilisateurs avancés ajoutent souvent des alias combinant les flags qu'ils passent toujours, ou enveloppent la commande dans des scripts qui appliquent les conventions d'équipe. Le formatage de la sortie peut être personnalisé via la configuration Git — pretty formats, schémas de couleurs et comportement du pager sont tous ajustables. Quand quelque chose tourne mal, la première étape de diagnostic est généralement de relancer la commande avec <code>GIT_TRACE=1</code> dans l'environnement, ce qui révèle les appels de plomberie sous-jacents. Pour les situations inhabituelles, la sortie <code>--help</code> (<code>git stash (advanced) --help</code>) ouvre la page de manuel complète avec les détails de chaque option, y compris celles rarement utilisées dans les workflows ordinaires mais essentielles pour le débogage ou le scripting à grande échelle.</p><p>Comprendre comment <code>git stash (advanced)</code> interagit avec le reste du modèle de données de Git — la base d'objets, l'index, les refs et l'arborescence de travail — est rentable. Chaque commande opère sur un sous-ensemble de ces pièces, et savoir laquelle elle touche aide à prédire les résultats et récupérer après les erreurs. Lire la documentation officielle de Git en parallèle de la pratique sur un dépôt jetable est la façon la plus rapide d'intérioriser les subtilités. La plupart des problèmes de production avec Git proviennent de l'une de trois causes : comportement par défaut surprenant, opérations réseau partielles, ou réécriture d'historique déjà partagé. Un modèle mental fonctionnel des effets de bord de <code>git stash (advanced)</code> aide à éviter les trois.</p>
        <h2>Options courantes</h2>
    <table>
      <thead><tr><th>Subcommand / Option</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>push -p</code></td><td>Stash interactively chosen hunks.</td></tr>
        <tr><td><code>push -- &lt;pathspec&gt;</code></td><td>Stash only specified paths.</td></tr>
        <tr><td><code>--keep-index</code></td><td>Stash but keep what's already staged.</td></tr>
        <tr><td><code>--no-keep-index</code></td><td>Reset index when stashing (default).</td></tr>
        <tr><td><code>branch &lt;name&gt;</code></td><td>Recreate state on a fresh branch.</td></tr>
        <tr><td><code>create</code></td><td>Make a stash commit but don't store it.</td></tr>
        <tr><td><code>store -m</code></td><td>Place an existing commit on the stack.</td></tr>
      </tbody>
    </table>
    <h2>Exemples</h2>
    <pre><code>git stash push -p -m "WIP: only refactor changes" -- src/refactor/
    # Stash only specific paths, interactively
    
    git stash --keep-index -m "Test pre-staged"
    # Verify that staged changes pass tests, with WIP set aside
    
    git stash branch fix-from-stash stash@{2}
    # Resurrect a stash that no longer applies cleanly
    
    SHA=$(git stash create "checkpoint")
    git stash store -m "manual checkpoint" "$SHA"
    # Programmatic stash creation</code></pre>
    <h2>Erreurs fréquentes</h2>
    <p>Stashing during a merge or rebase mixes states and confuses the stack. Avoid. Long-running stashes outlive their context — review periodically. <code>--keep-index</code> is great for verifying staged changes, but the resulting stash includes both staged and unstaged content, which can surprise.</p>
    <h2>Commandes liées</h2>
    <p><code>git stash</code>, <code>git commit --fixup</code>, <code>git worktree</code>, <code>git restore</code></p>
    

- source_title: "git config — Get and set repository or global options"
  title: "git config — Lire et définir les options de dépôt ou globales"
  langcode: fr
  body: |
    <h2>Synopsis</h2>
    <pre><code>git config [--global | --system | --local] &lt;key&gt; [&lt;value&gt;]
    git config --list
    git config --edit</code></pre>
    <h2>Description</h2>
    <p>The <code>git config</code> command reads and writes Git configuration. Settings live in three layers: system-wide (<code>/etc/gitconfig</code>), per-user (<code>~/.gitconfig</code> or <code>~/.config/git/config</code>), and per-repository (<code>.git/config</code>). More specific layers override more general ones. Many Git behaviors — default editor, push behavior, merge tools, line-ending handling — are tuned via config.</p>
    <p>For new users, the essentials are <code>user.name</code>, <code>user.email</code>, <code>init.defaultBranch</code>, and <code>core.editor</code>. Power users build extensive aliases, customize colors, and use conditional includes to apply different settings per project directory.</p>
    <p>Dans l'usage quotidien, <code>git config</code> s'intègre étroitement avec les alias de shell, les plugins d'éditeur et l'intégration continue. Les utilisateurs avancés ajoutent souvent des alias combinant les flags qu'ils passent toujours, ou enveloppent la commande dans des scripts qui appliquent les conventions d'équipe. Le formatage de la sortie peut être personnalisé via la configuration Git — pretty formats, schémas de couleurs et comportement du pager sont tous ajustables. Quand quelque chose tourne mal, la première étape de diagnostic est généralement de relancer la commande avec <code>GIT_TRACE=1</code> dans l'environnement, ce qui révèle les appels de plomberie sous-jacents. Pour les situations inhabituelles, la sortie <code>--help</code> (<code>git config --help</code>) ouvre la page de manuel complète avec les détails de chaque option, y compris celles rarement utilisées dans les workflows ordinaires mais essentielles pour le débogage ou le scripting à grande échelle.</p><p>Comprendre comment <code>git config</code> interagit avec le reste du modèle de données de Git — la base d'objets, l'index, les refs et l'arborescence de travail — est rentable. Chaque commande opère sur un sous-ensemble de ces pièces, et savoir laquelle elle touche aide à prédire les résultats et récupérer après les erreurs. Lire la documentation officielle de Git en parallèle de la pratique sur un dépôt jetable est la façon la plus rapide d'intérioriser les subtilités. La plupart des problèmes de production avec Git proviennent de l'une de trois causes : comportement par défaut surprenant, opérations réseau partielles, ou réécriture d'historique déjà partagé. Un modèle mental fonctionnel des effets de bord de <code>git config</code> aide à éviter les trois.</p>
        <h2>Options courantes</h2>
    <table>
      <thead><tr><th>Option</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>--global</code></td><td>Operate on per-user config.</td></tr>
        <tr><td><code>--system</code></td><td>Operate on system-wide config.</td></tr>
        <tr><td><code>--local</code></td><td>Operate on the current repo's config (default if in a repo).</td></tr>
        <tr><td><code>--list</code></td><td>Show all settings.</td></tr>
        <tr><td><code>--edit</code></td><td>Open the chosen config in your editor.</td></tr>
        <tr><td><code>--unset</code></td><td>Remove a setting.</td></tr>
        <tr><td><code>--add</code></td><td>Add a value to a multi-valued key.</td></tr>
        <tr><td><code>--show-origin</code></td><td>Annotate output with the file each setting comes from.</td></tr>
      </tbody>
    </table>
    <h2>Exemples</h2>
    <pre><code>git config --global user.name "Jane Smith"
    git config --global user.email "jane@example.com"
    # Identity for every repo
    
    git config --global init.defaultBranch main
    git config --global pull.rebase true
    git config --global core.editor "code --wait"
    # Sensible modern defaults
    
    git config --global alias.lg "log --oneline --graph --decorate --all"
    # Custom alias
    
    git config --list --show-origin
    # Audit where each setting comes from</code></pre>
    <h2>Erreurs fréquentes</h2>
    <p>Setting global config that's meant to be local (or vice versa) leads to confusing behavior. Forgetting to set <code>user.email</code> on a fresh machine causes every commit to be unattributed. Use conditional includes (<code>[includeIf "gitdir:~/work/"]</code>) to swap identities per directory.</p>
    <h2>Commandes liées</h2>
    <p><code>git credential</code>, <code>git init</code>, <code>git remote</code></p>
    

- source_title: "git credential — Manage credentials"
  title: "git credential — Gérer les identifiants"
  langcode: fr
  body: |
    <h2>Synopsis</h2>
    <pre><code>git config --global credential.helper &lt;helper&gt;
    git credential fill
    git credential approve
    git credential reject</code></pre>
    <h2>Description</h2>
    <p>The <code>git credential</code> machinery handles authentication for HTTPS remotes. Rather than prompting for a username and password every push, Git delegates to a credential helper that stores credentials securely. Helpers include <code>cache</code> (in-memory for a few minutes), <code>store</code> (plain-text file), <code>osxkeychain</code> (macOS Keychain), <code>manager</code> (Git Credential Manager on Windows/macOS/Linux), and <code>libsecret</code> (Linux GNOME).</p>
    <p>You rarely call <code>git credential</code> directly — you configure a helper once, and Git invokes it transparently. Modern setups (especially with GitHub) use OAuth tokens or 2FA-protected personal access tokens stored in a system keyring.</p>
    <p>Dans l'usage quotidien, <code>git credential</code> s'intègre étroitement avec les alias de shell, les plugins d'éditeur et l'intégration continue. Les utilisateurs avancés ajoutent souvent des alias combinant les flags qu'ils passent toujours, ou enveloppent la commande dans des scripts qui appliquent les conventions d'équipe. Le formatage de la sortie peut être personnalisé via la configuration Git — pretty formats, schémas de couleurs et comportement du pager sont tous ajustables. Quand quelque chose tourne mal, la première étape de diagnostic est généralement de relancer la commande avec <code>GIT_TRACE=1</code> dans l'environnement, ce qui révèle les appels de plomberie sous-jacents. Pour les situations inhabituelles, la sortie <code>--help</code> (<code>git credential --help</code>) ouvre la page de manuel complète avec les détails de chaque option, y compris celles rarement utilisées dans les workflows ordinaires mais essentielles pour le débogage ou le scripting à grande échelle.</p><p>Comprendre comment <code>git credential</code> interagit avec le reste du modèle de données de Git — la base d'objets, l'index, les refs et l'arborescence de travail — est rentable. Chaque commande opère sur un sous-ensemble de ces pièces, et savoir laquelle elle touche aide à prédire les résultats et récupérer après les erreurs. Lire la documentation officielle de Git en parallèle de la pratique sur un dépôt jetable est la façon la plus rapide d'intérioriser les subtilités. La plupart des problèmes de production avec Git proviennent de l'une de trois causes : comportement par défaut surprenant, opérations réseau partielles, ou réécriture d'historique déjà partagé. Un modèle mental fonctionnel des effets de bord de <code>git credential</code> aide à éviter les trois.</p>
        <h2>Options courantes</h2>
    <table>
      <thead><tr><th>Subcommand / Config</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>credential.helper</code></td><td>Set the credential helper to use.</td></tr>
        <tr><td><code>credential.useHttpPath</code></td><td>Include URL path in the lookup key.</td></tr>
        <tr><td><code>fill</code></td><td>Plumbing: ask helpers for credentials.</td></tr>
        <tr><td><code>approve</code> / <code>reject</code></td><td>Tell helpers an attempt succeeded or failed.</td></tr>
        <tr><td><code>credential.&lt;url&gt;.helper</code></td><td>URL-specific helper.</td></tr>
        <tr><td><code>credential.helper "cache --timeout=3600"</code></td><td>Configurable in-memory cache.</td></tr>
      </tbody>
    </table>
    <h2>Exemples</h2>
    <pre><code>git config --global credential.helper osxkeychain
    # macOS: store credentials in Keychain
    
    git config --global credential.helper manager
    # Cross-platform: Git Credential Manager
    
    git config --global credential.helper "cache --timeout=3600"
    # Cache for one hour in memory
    
    # Per-host helper:
    git config --global credential.https://github.com.helper "!gh auth git-credential"
    # Use the GitHub CLI as the helper</code></pre>
    <h2>Erreurs fréquentes</h2>
    <p>The <code>store</code> helper writes plain text to <code>~/.git-credentials</code> — fine for throwaway VMs, dangerous on shared machines. Avoid passwords entirely; use personal access tokens or SSH keys for write access. After rotating a token, run <code>git credential reject</code> or clear the cache to force a refresh.</p>
    <h2>Commandes liées</h2>
    <p><code>git config</code>, <code>git push</code>, <code>git fetch</code>, <code>ssh-agent</code></p>
    

- source_title: "git cat-file — Inspect Git objects"
  title: "git cat-file — Inspecter les objets Git"
  langcode: fr
  body: |
    <h2>Synopsis</h2>
    <pre><code>git cat-file (-t | -s | -p | -e) &lt;object&gt;
    git cat-file --batch
    git cat-file --batch-check</code></pre>
    <h2>Description</h2>
    <p>The <code>git cat-file</code> command is a plumbing tool that reads raw Git objects from the object database. It can print an object's type (<code>blob</code>, <code>tree</code>, <code>commit</code>, <code>tag</code>), size, and content. The <code>--batch</code> mode lets scripts feed many object names on stdin and receive structured output, which is far faster than invoking <code>cat-file</code> per object.</p>
