# Padroneggiare Git - Riferimento Comandi (80 pagine)
# Traduzioni italiane batch 2

- source_title: "git init — Create a new Git repository"
  title: "git init — Crea un nuovo repository Git"
  langcode: it
  body: |
    <h2>Sinossi</h2>
    <pre><code>git init [--bare] [--initial-branch=&lt;name&gt;] [--template=&lt;dir&gt;] [directory]</code></pre>
    <h2>Descrizione</h2>
    <p>Il comando <code>git init</code> crea un nuovo repository Git vuoto o ne reinizializza uno esistente. È tipicamente il primo comando che esegui quando vuoi iniziare a tracciare un progetto con Git. Il comando crea una directory nascosta <code>.git</code> contenente tutti i metadati di cui Git ha bisogno: il database degli oggetti, i riferimenti, la configurazione, gli hook e l'index. Senza questa directory, Git non ha posto dove memorizzare la storia.</p>
    <p>Eseguire <code>git init</code> in un repository esistente è sicuro — non sovrascrive oggetti o ref esistenti. Invece, reinizializza i template e assicura che la struttura della directory sia intatta. Per impostazione predefinita, Git moderno crea un repository con il nome del branch configurato da <code>init.defaultBranch</code>, che di solito è <code>main</code> nelle nuove installazioni.</p>
    <p>Oltre al comportamento predefinito, <code>git init</code> rispetta l'impostazione <code>core.hooksPath</code> se mantieni una directory di hook centralizzata, e la config <code>init.templateDir</code> per copiare hook personalizzati e file di exclude in ogni nuovo repository. Sui filesystem dove la sensibilità al case conta, <code>core.ignoreCase</code> viene impostato automaticamente in base al rilevamento al momento dell'init. I team che fanno frequentemente bootstrap di nuovi servizi spesso scriptano i passi post-init: impostare il branch predefinito, aggiungere un file di licenza, configurare il template gitignore e configurare un remote — tutto immediatamente dopo aver eseguito <code>git init</code>. Capire quali file contiene <code>.git/</code> (HEAD, config, objects/, refs/, hooks/) demistifica le operazioni successive e rende il recupero dagli incidenti molto più facile.</p>
    <h2>Opzioni comuni</h2>
    <table>
      <thead><tr><th>Opzione</th><th>Descrizione</th></tr></thead>
      <tbody>
        <tr><td><code>--bare</code></td><td>Crea un repository bare senza working tree, adatto per essere ospitato su un server.</td></tr>
        <tr><td><code>--initial-branch=&lt;name&gt;</code> / <code>-b</code></td><td>Imposta il nome del branch iniziale (default <code>main</code>).</td></tr>
        <tr><td><code>--template=&lt;dir&gt;</code></td><td>Usa una directory template personalizzata per hook e config.</td></tr>
        <tr><td><code>--shared[=&lt;perms&gt;]</code></td><td>Permette al repository di essere condiviso da un gruppo Unix.</td></tr>
        <tr><td><code>--separate-git-dir=&lt;dir&gt;</code></td><td>Memorizza i dati Git effettivi in una directory separata, lasciando un file <code>.git</code> che vi punta.</td></tr>
        <tr><td><code>-q</code>, <code>--quiet</code></td><td>Sopprime l'output informativo.</td></tr>
      </tbody>
    </table>
    <h2>Esempi</h2>
    <pre><code>git init
    # Inizializza un repository nella directory corrente

    git init my-project
    # Crea una nuova directory e inizializza un repo al suo interno

    git init --bare /srv/git/myproject.git
    # Crea un repository bare da ospitare su un server

    git init -b trunk
    # Inizializza con il branch iniziale chiamato "trunk" invece di "main"</code></pre>
    <h2>Errori comuni</h2>
    <p>Un errore frequente è eseguire <code>git init</code> nella tua home directory per sbaglio, trasformando l'intera cartella home in un repository. Controlla sempre la tua directory corrente prima di eseguirlo. Un'altra trappola è inizializzare un repo dentro la working tree di un repo esistente — questo crea repo annidati che possono confondere strumenti e umani. Se hai creato accidentalmente un repo indesiderato, rimuovi semplicemente la directory <code>.git</code> per disfarlo.</p>
    <h2>Comandi correlati</h2>
    <p><code>git clone</code>, <code>git config</code>, <code>git remote</code></p>

- source_title: "git clone — Copy a repository from a remote source"
  title: "git clone — Copia un repository da una sorgente remota"
  langcode: it
  body: |
    <h2>Sinossi</h2>
    <pre><code>git clone [--branch &lt;name&gt;] [--depth &lt;n&gt;] [--recurse-submodules] &lt;url&gt; [directory]</code></pre>
    <h2>Descrizione</h2>
    <p>Il comando <code>git clone</code> copia un repository esistente (tipicamente da un server remoto) in una nuova directory locale. Esegue tre azioni: crea una nuova directory, esegue <code>git init</code> al suo interno, e poi scarica tutti i branch e la storia dal remote. Dopo il clone, il remote viene configurato automaticamente come <code>origin</code>, e il branch predefinito viene checkoutato nella working tree.</p>
    <p>Il cloning supporta più protocolli: HTTPS (il più comune, più facile con i credential helper), SSH (preferito per accesso in scrittura usando auth basata su chiave) e il protocollo legacy <code>git://</code>. Per repository molto grandi, partial clone, shallow clone e sparse checkout possono ridurre drasticamente la quantità di dati trasferiti.</p>
    <p>L'autenticazione è uno degli ostacoli più comuni. Con HTTPS, Git moderno usa credential helper (Keychain su macOS, Credential Manager su Windows, libsecret su Linux) per cachare token o password in sicurezza. Con SSH, il tuo SSH agent locale fornisce la chiave — assicurati che <code>ssh-add</code> l'abbia caricata. Dopo il clone, <code>git config --get remote.origin.url</code> conferma cosa è stato effettivamente configurato. Per repository su scala monorepo o supercomputer, partial clone (<code>--filter=blob:none</code>) combinato con sparse checkout (<code>git sparse-checkout init --cone</code>) ti permette di lavorare con solo una fetta del progetto, riducendo drasticamente sia il tempo di clone che lo spazio su disco. Le pipeline CI beneficiano ulteriormente di <code>--depth=1</code> e <code>--no-tags</code> quando non hanno bisogno della storia.</p>
    <h2>Opzioni comuni</h2>
    <table>
      <thead><tr><th>Opzione</th><th>Descrizione</th></tr></thead>
      <tbody>
        <tr><td><code>--branch &lt;name&gt;</code> / <code>-b</code></td><td>Fa checkout del branch o tag specificato invece del default.</td></tr>
        <tr><td><code>--depth &lt;n&gt;</code></td><td>Crea un clone shallow con storia troncata.</td></tr>
        <tr><td><code>--single-branch</code></td><td>Clona solo la storia di un singolo branch.</td></tr>
        <tr><td><code>--recurse-submodules</code></td><td>Inizializza e clona i submodule subito dopo il clone principale.</td></tr>
        <tr><td><code>--filter=blob:none</code></td><td>Crea un partial clone senza contenuto blob (scaricato pigramente al bisogno).</td></tr>
        <tr><td><code>--bare</code></td><td>Crea un clone bare senza working tree.</td></tr>
        <tr><td><code>--mirror</code></td><td>Configura un mirror con tutti i ref, adatto per i backup.</td></tr>
      </tbody>
    </table>
    <h2>Esempi</h2>
    <pre><code>git clone https://github.com/user/project.git
    # Clone standard su HTTPS

    git clone git@github.com:user/project.git my-fork
    # Clone via SSH in una directory specifica

    git clone --depth 1 --branch v2.0 https://github.com/user/project.git
    # Clone shallow di un tag specifico, utile per CI

    git clone --filter=blob:none https://github.com/torvalds/linux.git
    # Partial clone per repo enormi — blob scaricati al bisogno</code></pre>
    <h2>Errori comuni</h2>
    <p>Clonare un repository gigante senza filtri può richiedere minuti o ore e consumare gigabyte. Per esplorazione o build CI, preferisci <code>--depth 1</code>. Un altro errore è clonare via HTTPS quando intendi pushare modifiche — senza setup delle credenziali, ogni push richiederà una password. Usa SSH o un credential helper per accesso in scrittura. Infine, sappi che i clone <code>--single-branch</code> non possono accedere facilmente ad altri branch senza riconfigurare il remote.</p>
    <h2>Comandi correlati</h2>
    <p><code>git init</code>, <code>git fetch</code>, <code>git remote</code>, <code>git submodule</code></p>

- source_title: "git add — Stage changes for the next commit"
  title: "git add — Mette in stage le modifiche per il prossimo commit"
  langcode: it
  body: |
    <h2>Sinossi</h2>
    <pre><code>git add [-p] [-A] [-u] [--] [&lt;pathspec&gt;...]</code></pre>
    <h2>Descrizione</h2>
    <p>Il comando <code>git add</code> sposta le modifiche dalla tua working tree alla staging area (chiamata anche index). La staging area è uno snapshot di ciò che andrà nel prossimo commit. Mettendo in stage le modifiche esplicitamente, Git ti permette di creare commit che contengono esattamente il lavoro che vuoi registrare — anche se la tua working tree ha altre modifiche non correlate in corso.</p>
    <p><code>git add</code> può mettere in stage interi file, parti di file (con <code>-p</code>) o directory. Non committa nulla; aggiorna solo l'index. Il workflow più comune è: modifica, <code>git status</code>, <code>git add</code>, <code>git commit</code>. Padroneggiare <code>git add</code>, specialmente le sue modalità interattive, è uno dei modi migliori per rendere la storia dei commit leggibile e facile da rivedere.</p>
    <p>Nell'uso quotidiano, <code>git add</code> si integra strettamente con alias della shell, plugin dell'editor e integrazione continua. Gli utenti esperti spesso aggiungono alias che combinano flag che passano sempre, o avvolgono il comando in script che applicano convenzioni del team. La formattazione dell'output può essere personalizzata tramite Git config — formati pretty, schemi di colori e comportamento del pager sono tutti regolabili. Quando qualcosa va storto, il primo passo diagnostico è di solito ri-eseguire il comando con <code>GIT_TRACE=1</code> nell'ambiente, che rivela le chiamate di plumbing sottostanti. Per situazioni insolite, l'output di <code>--help</code> (<code>git add --help</code>) apre la man page completa con dettagli su ogni opzione.</p><p>Capire come <code>git add</code> interagisce con il resto del modello dati di Git — il database degli oggetti, l'index, i ref e la working tree — paga dividendi. Ogni comando opera su un sottoinsieme di questi pezzi, e sapere quali tocca aiuta a prevedere i risultati e recuperare dagli errori. La maggior parte dei problemi di produzione con Git deriva da una di tre cause: comportamento predefinito sorprendente, operazioni di rete parziali o riscrittura di storia già condivisa.</p>
    <h2>Opzioni comuni</h2>
    <table>
      <thead><tr><th>Opzione</th><th>Descrizione</th></tr></thead>
      <tbody>
        <tr><td><code>-A</code>, <code>--all</code></td><td>Mette in stage tutte le modifiche nella working tree, incluse cancellazioni e nuovi file.</td></tr>
        <tr><td><code>-u</code>, <code>--update</code></td><td>Mette in stage solo modifiche e cancellazioni di file tracciati — ignora i nuovi file.</td></tr>
        <tr><td><code>-p</code>, <code>--patch</code></td><td>Sceglie interattivamente gli hunk di modifiche da mettere in stage.</td></tr>
        <tr><td><code>-n</code>, <code>--dry-run</code></td><td>Mostra cosa verrebbe messo in stage senza farlo.</td></tr>
        <tr><td><code>-f</code>, <code>--force</code></td><td>Aggiunge file anche se corrispondono a <code>.gitignore</code>.</td></tr>
        <tr><td><code>-i</code>, <code>--interactive</code></td><td>Apre un'interfaccia a menu per lo staging.</td></tr>
        <tr><td><code>--intent-to-add</code> / <code>-N</code></td><td>Registra l'intento di aggiungere un file così che il suo diff appaia.</td></tr>
      </tbody>
    </table>
    <h2>Esempi</h2>
    <pre><code>git add README.md src/main.c
    # Mette in stage due file specifici

    git add -A
    # Mette in stage tutto: file nuovi, modificati e cancellati

    git add -p
    # Rivede e mette in stage gli hunk uno a uno interattivamente

    git add 'src/**/*.js'
    # Mette in stage tutti i file JavaScript sotto src usando un pathspec</code></pre>
    <h2>Errori comuni</h2>
    <p>Eseguire <code>git add .</code> alla cieca spesso mette in stage file non intenzionali — file di log, artefatti di build, chiavi segrete. Usa prima <code>git status</code> e considera <code>-p</code> per modifiche sensibili. Un'altra confusione comune: <code>git add -u</code> non prenderà i nuovi file, mentre <code>git add .</code> sì. Dopo aver messo in stage, se modifichi di nuovo un file, quelle modifiche successive non sono in stage finché non ri-esegui <code>git add</code>.</p>
    <h2>Comandi correlati</h2>
    <p><code>git commit</code>, <code>git status</code>, <code>git restore</code>, <code>git reset</code></p>

- source_title: "git commit — Record staged changes to the repository"
  title: "git commit — Registra le modifiche in stage nel repository"
  langcode: it
  body: |
    <h2>Sinossi</h2>
    <pre><code>git commit [-m &lt;msg&gt;] [-a] [--amend] [--no-verify] [-S]</code></pre>
    <h2>Descrizione</h2>
    <p>Il comando <code>git commit</code> prende tutto ciò che è attualmente nella staging area e crea un nuovo oggetto commit nel repository. Un commit è uno snapshot immutabile contenente un tree (i contenuti dei file), uno o più puntatori parent, metadati di author e committer e un messaggio. I commit sono l'unità di storia in Git: i branch sono puntatori a commit, i merge producono commit con più parent, e i tag etichettano commit specifici.</p>
    <p>Un buon messaggio di commit ha una riga oggetto breve (sotto i 50 caratteri), una riga vuota e un corpo opzionale che spiega il perché. Molti team usano conventional commit o altri sistemi di prefisso. L'opzione <code>--amend</code> modifica il commit più recente, utile per correggere typo nel messaggio o aver dimenticato di mettere in stage un file — ma non fare mai amend di un commit che è già stato pushato e condiviso.</p>
    <p>Nell'uso quotidiano, <code>git commit</code> si integra con alias della shell, plugin dell'editor e CI. Gli utenti esperti aggiungono alias e wrapper che applicano convenzioni del team. Per il debug, ri-esegui con <code>GIT_TRACE=1</code> per vedere le chiamate plumbing sottostanti. <code>git commit --help</code> apre la man page completa.</p><p>Capire come <code>git commit</code> interagisce con il modello dati di Git aiuta a prevedere i risultati. La maggior parte dei problemi deriva da: comportamento predefinito sorprendente, operazioni di rete parziali o riscrittura di storia condivisa.</p>
    <h2>Opzioni comuni</h2>
    <table>
      <thead><tr><th>Opzione</th><th>Descrizione</th></tr></thead>
      <tbody>
        <tr><td><code>-m &lt;msg&gt;</code></td><td>Usa il messaggio dato invece di aprire un editor.</td></tr>
        <tr><td><code>-a</code>, <code>--all</code></td><td>Mette automaticamente in stage modifiche e cancellazioni di file tracciati prima di committare.</td></tr>
        <tr><td><code>--amend</code></td><td>Sostituisce il commit più recente con uno nuovo.</td></tr>
        <tr><td><code>--no-verify</code></td><td>Salta gli hook pre-commit e commit-msg.</td></tr>
        <tr><td><code>-S</code>, <code>--gpg-sign</code></td><td>Firma con GPG il commit.</td></tr>
        <tr><td><code>--allow-empty</code></td><td>Permette un commit senza modifiche.</td></tr>
        <tr><td><code>--fixup=&lt;commit&gt;</code></td><td>Crea un commit fixup da usare con autosquash rebase.</td></tr>
        <tr><td><code>-v</code>, <code>--verbose</code></td><td>Mostra il diff nell'editor del messaggio di commit.</td></tr>
      </tbody>
    </table>
    <h2>Esempi</h2>
    <pre><code>git commit -m "Fix off-by-one error in pagination"
    # Commit veloce con un messaggio di una riga

    git commit -am "Update README"
    # Mette in stage modifiche tracciate e committa in un passo

    git commit --amend -m "Better message"
    # Riscrive il messaggio del commit più recente

    git commit --fixup=abc123
    # Crea un commit fixup da squashare durante il rebase</code></pre>
    <h2>Errori comuni</h2>
    <p>Fare amend di un commit pubblicato e poi force-pushare riscrive la storia su cui altri possono aver basato lavoro, causando confusione. Fai amend solo di commit locali non condivisi. Un altro errore è committare con <code>-a</code> quando anche file untracked dovrebbero essere inclusi — <code>-a</code> ignora i nuovi file. Infine, non usare mai <code>--no-verify</code> solo per bypassare test che falliscono; correggi il test o il codice.</p>
    <h2>Comandi correlati</h2>
    <p><code>git add</code>, <code>git status</code>, <code>git log</code>, <code>git revert</code></p>

- source_title: "git status — Show the working tree status"
  title: "git status — Mostra lo stato della working tree"
  langcode: it
  body: |
    <h2>Sinossi</h2>
    <pre><code>git status [-s] [-b] [--porcelain[=&lt;version&gt;]] [--ignored]</code></pre>
    <h2>Descrizione</h2>
    <p>Il comando <code>git status</code> visualizza lo stato della working tree e della staging area. Mostra quali file sono in stage per il prossimo commit, quali sono modificati ma non in stage, e quali sono untracked. Riporta anche il branch corrente, se è avanti o indietro rispetto all'upstream e qualsiasi operazione in corso come merge o rebase.</p>
    <p><code>git status</code> è il comando Git più eseguito — è sicuro, veloce e informativo. Usalo costantemente per confermare in quale stato è il tuo repository prima di prendere decisioni. L'output predefinito è amichevole con colori e suggerimenti; l'output <code>--porcelain</code> è stabile, leggibile da macchina e pensato per script.</p>
    <p>Nell'uso quotidiano, <code>git status</code> si integra con alias della shell, plugin dell'editor e CI. Per il debug, usa <code>GIT_TRACE=1</code>. <code>git status --help</code> apre la man page completa.</p><p>Capire come <code>git status</code> interagisce con il modello dati di Git paga dividendi. La maggior parte dei problemi deriva da: comportamento predefinito sorprendente, operazioni di rete parziali o riscrittura di storia condivisa.</p>
    <h2>Opzioni comuni</h2>
    <table>
      <thead><tr><th>Opzione</th><th>Descrizione</th></tr></thead>
      <tbody>
        <tr><td><code>-s</code>, <code>--short</code></td><td>Visualizza in formato corto con codici di stato a due caratteri.</td></tr>
        <tr><td><code>-b</code>, <code>--branch</code></td><td>Mostra info di branch e tracking anche in formato corto.</td></tr>
        <tr><td><code>--porcelain</code></td><td>Output stabile leggibile da macchina per script.</td></tr>
        <tr><td><code>--ignored</code></td><td>Mostra anche i file ignorati.</td></tr>
        <tr><td><code>-u &lt;mode&gt;</code></td><td>Controlla come i file untracked sono riportati (<code>no</code>, <code>normal</code>, <code>all</code>).</td></tr>
        <tr><td><code>--ahead-behind</code></td><td>Calcola conteggi ahead/behind vs upstream.</td></tr>
      </tbody>
    </table>
    <h2>Esempi</h2>
    <pre><code>git status
    # Status leggibile completo

    git status -sb
    # Formato compatto con info di branch

    git status --porcelain=v2 --branch
    # Output stabile per script shell ed editor

    git status --ignored
    # Include i file corrispondenti a .gitignore</code></pre>
    <h2>Errori comuni</h2>
    <p>I principianti a volte vanno nel panico quando <code>git status</code> mostra molti file untracked in un repo appena clonato con artefatti di build. Aggiungi un <code>.gitignore</code> appropriato per filtrarli. Un'altra trappola è parsare l'output predefinito negli script — il formato può cambiare tra versioni e traduzioni. Usa sempre <code>--porcelain</code> per l'automazione. Infine, grandi directory untracked possono rallentare considerevolmente lo status; usa <code>-uno</code> per saltarle.</p>
    <h2>Comandi correlati</h2>
    <p><code>git diff</code>, <code>git log</code>, <code>git add</code>, <code>git stash</code></p>

- source_title: "git diff — Show changes between commits, trees, or the working tree"
  title: "git diff — Mostra le modifiche tra commit, tree o working tree"
  langcode: it
  body: |
    <h2>Sinossi</h2>
    <pre><code>git diff [&lt;options&gt;] [&lt;commit&gt;] [--] [&lt;path&gt;...]</code></pre>
    <h2>Descrizione</h2>
    <p>Il comando <code>git diff</code> mostra differenze tra due insiemi di contenuto file. Senza argomenti, confronta la working tree con la staging area, mostrando ciò che non è in stage. Con <code>--cached</code> (o <code>--staged</code>), confronta la staging area con l'ultimo commit. Con uno o due argomenti commit, confronta quei commit.</p>
    <p>I diff sono centrali per la code review, il debug e capire la storia. Git produce diff unificati per default ma può anche produrre diff a livello di parola, evidenziazione color-moved e statistiche. Per i file binari, viene mostrata solo una riga "differ" a meno che non sia configurato un driver di diff binario.</p>
    <p>Nell'uso quotidiano, <code>git diff</code> si integra con alias, editor e CI. Per il debug, usa <code>GIT_TRACE=1</code>. <code>git diff --help</code> apre la man page completa.</p><p>Capire come <code>git diff</code> interagisce con il modello dati di Git paga dividendi. La maggior parte dei problemi deriva da: comportamento predefinito sorprendente, operazioni di rete parziali o riscrittura di storia condivisa.</p>
    <h2>Opzioni comuni</h2>
    <table>
      <thead><tr><th>Opzione</th><th>Descrizione</th></tr></thead>
      <tbody>
        <tr><td><code>--cached</code> / <code>--staged</code></td><td>Confronta l'index con HEAD invece della working tree con l'index.</td></tr>
        <tr><td><code>--stat</code></td><td>Mostra un riepilogo di inserimenti/cancellazioni per file.</td></tr>
        <tr><td><code>--name-only</code></td><td>Elenca solo i nomi dei file che differiscono.</td></tr>
        <tr><td><code>--word-diff</code></td><td>Evidenzia le modifiche a livello di parola.</td></tr>
        <tr><td><code>-w</code>, <code>--ignore-all-space</code></td><td>Ignora differenze di spazi.</td></tr>
        <tr><td><code>--color-moved</code></td><td>Evidenzia blocchi di codice spostati.</td></tr>
        <tr><td><code>-U&lt;n&gt;</code></td><td>Mostra <code>n</code> righe di contesto (default 3).</td></tr>
      </tbody>
    </table>
    <h2>Esempi</h2>
    <pre><code>git diff
    # Modifiche non in stage nella working tree

    git diff --cached
    # Modifiche in stage per il prossimo commit

    git diff main..feature
    # Tutte le differenze tra due branch

    git diff HEAD~3 HEAD -- src/
    # Ultimi tre commit, ristretti a src/</code></pre>
    <h2>Errori comuni</h2>
    <p>Dimenticare <code>--cached</code> quando si rivede ciò che sta per essere committato è una confusione classica. Un'altra è usare la sintassi range due-punti vs tre-punti in modo errato: <code>A..B</code> è "differenze da A a B", mentre <code>A...B</code> è "differenze dalla merge base a B". Diff massivi con solo whitespace dopo modifiche dell'editor possono essere domati con <code>-w</code>.</p>
    <h2>Comandi correlati</h2>
    <p><code>git status</code>, <code>git log -p</code>, <code>git show</code>, <code>git range-diff</code></p>

- source_title: "git rm — Remove files from the working tree and index"
  title: "git rm — Rimuove file dalla working tree e dall'index"
  langcode: it
  body: |
    <h2>Sinossi</h2>
    <pre><code>git rm [-f] [-r] [--cached] [--] &lt;file&gt;...</code></pre>
    <h2>Descrizione</h2>
    <p>Il comando <code>git rm</code> rimuove file dalla working tree e dall'index in un solo passo, mettendo in stage la cancellazione per il prossimo commit. Usare <code>git rm</code> è più comodo che rimuovere il file con <code>rm</code> e poi eseguire <code>git add</code> — anche se entrambi gli approcci producono lo stesso stato finale.</p>
    <p>Il flag <code>--cached</code> è particolarmente utile: rimuove il file dall'index senza cancellarlo dalla working tree. Questo è lo strumento giusto quando hai accidentalmente committato un file (come un file di config con segreti, o un artefatto di build) e vuoi smettere di tracciarlo ma mantenerlo su disco.</p>
    <p>Nell'uso quotidiano, <code>git rm</code> si integra con alias, editor e CI. Per il debug usa <code>GIT_TRACE=1</code>.</p><p>Capire come <code>git rm</code> interagisce con il modello dati di Git aiuta a prevedere i risultati e recuperare dagli errori.</p>
    <h2>Opzioni comuni</h2>
    <table>
      <thead><tr><th>Opzione</th><th>Descrizione</th></tr></thead>
      <tbody>
        <tr><td><code>-f</code>, <code>--force</code></td><td>Sovrascrive i controlli di sicurezza se il file ha modifiche non committate.</td></tr>
        <tr><td><code>-r</code></td><td>Rimuove ricorsivamente le directory.</td></tr>
        <tr><td><code>--cached</code></td><td>Rimuove solo dall'index; lascia stare il file nella working tree.</td></tr>
        <tr><td><code>-n</code>, <code>--dry-run</code></td><td>Mostra cosa verrebbe rimosso senza farlo.</td></tr>
        <tr><td><code>--ignore-unmatch</code></td><td>Esce zero anche se nessun file corrisponde.</td></tr>
        <tr><td><code>-q</code>, <code>--quiet</code></td><td>Sopprime l'output.</td></tr>
      </tbody>
    </table>
    <h2>Esempi</h2>
    <pre><code>git rm old-file.txt
    # Cancella il file e mette in stage la cancellazione

    git rm -r build/
    # Rimuove ricorsivamente una directory dal repo

    git rm --cached secrets.env
    # Smette di tracciare un file ma lo mantiene localmente
    # Poi aggiungilo a .gitignore!

    git rm -n '*.log'
    # Anteprima di quali file di log verrebbero rimossi</code></pre>
    <h2>Errori comuni</h2>
    <p>Il problema più grosso è dimenticare che <code>git rm --cached</code> ferma solo il tracking futuro — i commit passati contengono ancora il file. Se hai bisogno di eliminare un segreto dalla storia, usa <code>git filter-repo</code> o BFG. Un altro errore è eseguire <code>git rm</code> su un file con modifiche non in stage senza rendersi conto che quelle modifiche sono perse. Usa prima <code>-n</code> in caso di dubbio.</p>
    <h2>Comandi correlati</h2>
    <p><code>git add</code>, <code>git mv</code>, <code>git restore</code>, <code>git filter-repo</code></p>

- source_title: "git mv — Move or rename a tracked file"
  title: "git mv — Sposta o rinomina un file tracciato"
  langcode: it
  body: |
    <h2>Sinossi</h2>
    <pre><code>git mv [-f] [-k] [-n] &lt;source&gt; &lt;destination&gt;</code></pre>
    <h2>Descrizione</h2>
    <p>Il comando <code>git mv</code> rinomina o sposta un file tracciato e mette in stage la modifica. Internamente è equivalente a eseguire <code>mv</code> seguito da <code>git add</code> sul nuovo path e <code>git rm</code> sul vecchio. La comodità è che il rename avviene in un singolo passo atomico che è inequivocabilmente in stage.</p>
    <p>Nota: Git non memorizza effettivamente i rename come operazioni di prima classe. Invece, rileva i rename confrontando la similarità del contenuto dei file al momento di diff e log. Quindi sia che usi <code>git mv</code> o un semplice <code>mv</code> + <code>git add</code> + <code>git rm</code>, il commit risultante è identico, e il rilevamento dei rename funziona allo stesso modo.</p>
    <p>Nell'uso quotidiano, <code>git mv</code> si integra con alias, editor e CI. Per il debug usa <code>GIT_TRACE=1</code>.</p><p>Capire come <code>git mv</code> interagisce con il modello dati di Git aiuta a prevedere i risultati.</p>
    <h2>Opzioni comuni</h2>
    <table>
      <thead><tr><th>Opzione</th><th>Descrizione</th></tr></thead>
      <tbody>
        <tr><td><code>-f</code>, <code>--force</code></td><td>Sovrascrive la destinazione se esiste.</td></tr>
        <tr><td><code>-k</code></td><td>Salta azioni di move/rename che fallirebbero senza errore.</td></tr>
        <tr><td><code>-n</code>, <code>--dry-run</code></td><td>Mostra cosa accadrebbe senza farlo.</td></tr>
        <tr><td><code>-v</code>, <code>--verbose</code></td><td>Riporta i nomi dei file spostati.</td></tr>
      </tbody>
    </table>
    <h2>Esempi</h2>
    <pre><code>git mv old-name.txt new-name.txt
    # Rinomina un file in un passo

    git mv src/utils.js src/lib/utils.js
    # Sposta un file in una nuova directory (deve già esistere)

    git mv -n *.md docs/
    # Anteprima dello spostamento di tutti i file markdown in docs/

    git mv -f draft.md final.md
    # Forza la sovrascrittura se final.md esiste già</code></pre>
    <h2>Errori comuni</h2>
    <p>Se rinomini un file fuori da Git (con il tuo editor o <code>mv</code>), il rilevamento dei rename di Git solitamente funziona ancora al momento del diff — ma devi eseguire <code>git add -A</code> per mettere in stage sia la cancellazione che l'aggiunta. Un altro problema: i rename solo di case su filesystem case-insensitive (macOS, Windows) richiedono <code>git mv -f</code> o un rename in due passi attraverso un nome temporaneo.</p>
    <h2>Comandi correlati</h2>
    <p><code>git add</code>, <code>git rm</code>, <code>git log --follow</code></p>

- source_title: "git branch — List, create, or delete branches"
  title: "git branch — Elenca, crea o cancella branch"
  langcode: it
  body: |
    <h2>Sinossi</h2>
    <pre><code>git branch [-a] [-r] [-v] [-d &lt;name&gt;] [-m &lt;old&gt; &lt;new&gt;] [&lt;name&gt; [&lt;start-point&gt;]]</code></pre>
    <h2>Descrizione</h2>
    <p>Il comando <code>git branch</code> gestisce i branch. Senza argomenti elenca i branch locali e marca quello corrente con un asterisco. Dato un nome, crea un nuovo branch che punta all'HEAD corrente (o a un punto di partenza specificato). Può anche cancellare, rinominare e ispezionare i branch. Un branch in Git è un puntatore leggero e spostabile a un commit — crearne uno è essenzialmente gratuito, ed è per questo che i workflow Git incoraggiano molti branch a vita breve.</p>
    <p>Nota: <code>git branch &lt;name&gt;</code> crea un branch ma non passa ad esso. Per creare e passare in un solo passo, usa <code>git switch -c &lt;name&gt;</code> o <code>git checkout -b &lt;name&gt;</code>. Il comportamento <code>--track</code> fa seguire a un nuovo branch un branch remoto per i default di push/pull.</p>
    <p>Nell'uso quotidiano, <code>git branch</code> si integra con alias, editor e CI. Per il debug usa <code>GIT_TRACE=1</code>.</p><p>Capire come <code>git branch</code> interagisce con il modello dati di Git aiuta a prevedere i risultati.</p>
    <h2>Opzioni comuni</h2>
    <table>
      <thead><tr><th>Opzione</th><th>Descrizione</th></tr></thead>
      <tbody>
        <tr><td><code>-a</code>, <code>--all</code></td><td>Elenca sia branch locali che di tracking remoto.</td></tr>
        <tr><td><code>-r</code>, <code>--remotes</code></td><td>Elenca solo branch di tracking remoto.</td></tr>
        <tr><td><code>-v</code>, <code>--verbose</code></td><td>Mostra l'ultimo commit su ogni branch.</td></tr>
        <tr><td><code>-d &lt;name&gt;</code></td><td>Cancella un branch completamente mergiato.</td></tr>
        <tr><td><code>-D &lt;name&gt;</code></td><td>Forza la cancellazione di un branch anche se non mergiato.</td></tr>
        <tr><td><code>-m &lt;old&gt; &lt;new&gt;</code></td><td>Rinomina un branch.</td></tr>
        <tr><td><code>--merged</code> / <code>--no-merged</code></td><td>Filtra i branch (non) mergiati in HEAD.</td></tr>
        <tr><td><code>--set-upstream-to=&lt;remote&gt;/&lt;branch&gt;</code></td><td>Configura il tracking per il branch corrente.</td></tr>
      </tbody>
    </table>
    <h2>Esempi</h2>
    <pre><code>git branch
    # Elenca i branch locali

    git branch feature/login
    # Crea un nuovo branch dall'HEAD corrente

    git branch -d old-feature
    # Cancella un branch mergiato

    git branch -m main trunk
    # Rinomina il branch locale main in trunk

    git branch -a -v
    # Elenca tutti i branch (locali + remoti) con ultimi commit</code></pre>
    <h2>Errori comuni</h2>
    <p>Usare <code>-D</code> per forzare la cancellazione di un branch può perdere commit non mergiati per sempre (beh, finché <code>git reflog</code> non scade). Prova sempre prima <code>-d</code>. Rinominare il branch corrente con <code>-m</code> funziona senza argomenti — <code>git branch -m new-name</code> rinomina qualsiasi cosa tu sia. Dimenticare di impostare il tracking dell'upstream dopo aver creato un branch significa che <code>git push</code> potrebbe aver bisogno di argomenti espliciti la prima volta.</p>
    <h2>Comandi correlati</h2>
    <p><code>git switch</code>, <code>git checkout</code>, <code>git merge</code>, <code>git push</code></p>

- source_title: "git checkout — Switch branches or restore working tree files"
  title: "git checkout — Cambia branch o ripristina file della working tree"
  langcode: it
  body: |
    <h2>Sinossi</h2>
    <pre><code>git checkout [&lt;branch&gt;]
    git checkout -b &lt;new-branch&gt; [&lt;start-point&gt;]
    git checkout [&lt;tree-ish&gt;] -- &lt;file&gt;...</code></pre>
    <h2>Descrizione</h2>
    <p>Il comando <code>git checkout</code> storicamente fa due cose non correlate: cambiare branch e ripristinare file. A causa di questo sovraccarico, Git moderno ha introdotto <code>git switch</code> per le operazioni sui branch e <code>git restore</code> per quelle sui file. <code>git checkout</code> funziona ancora e rimane popolare, ma i nuovi utenti sono incoraggiati a imparare i nuovi comandi separati.</p>
    <p>Quando viene dato un nome di branch, <code>git checkout</code> sposta HEAD a quel branch e aggiorna la working tree. Quando viene dato un path, sovrascrive il file della working tree con la versione dall'index (o da un commit specificato). Il flag <code>-b</code> crea un nuovo branch e vi passa in un solo passo.</p>
    <p>Nell'uso quotidiano, <code>git checkout</code> si integra con alias, editor e CI. Per il debug usa <code>GIT_TRACE=1</code>.</p><p>Capire come <code>git checkout</code> interagisce con il modello dati di Git aiuta a prevedere i risultati.</p>
    <h2>Opzioni comuni</h2>
    <table>
      <thead><tr><th>Opzione</th><th>Descrizione</th></tr></thead>
      <tbody>
        <tr><td><code>-b &lt;name&gt;</code></td><td>Crea e passa a un nuovo branch.</td></tr>
        <tr><td><code>-B &lt;name&gt;</code></td><td>Crea o resetta un branch e vi passa.</td></tr>
        <tr><td><code>--track</code></td><td>Configura il tracking per un branch remoto.</td></tr>
        <tr><td><code>--detach</code></td><td>Fa checkout di un commit in stato detached HEAD.</td></tr>
        <tr><td><code>--</code> &lt;path&gt;</td><td>Tratta gli argomenti seguenti come path, non come branch.</td></tr>
        <tr><td><code>-f</code>, <code>--force</code></td><td>Scarta le modifiche locali quando passa.</td></tr>
        <tr><td><code>-p</code>, <code>--patch</code></td><td>Seleziona interattivamente gli hunk da ripristinare.</td></tr>
      </tbody>
    </table>
    <h2>Esempi</h2>
    <pre><code>git checkout main
    # Passa al branch main

    git checkout -b feature/api origin/develop
    # Crea un nuovo branch che traccia origin/develop

    git checkout HEAD -- src/config.js
    # Scarta le modifiche locali a un singolo file

    git checkout v1.2.3
    # Detached HEAD a un tag specifico</code></pre>
    <h2>Errori comuni</h2>
    <p>Eseguire <code>git checkout &lt;file&gt;</code> sovrascrive silenziosamente le tue modifiche locali senza undo. Usa invece <code>git restore</code> — ha un nome più chiaro. Lo stato detached HEAD sorprende i principianti: i commit fatti lì non appartengono ad alcun branch e possono essere persi quando passi via. Se vuoi mantenerli, crea prima un branch.</p>
    <h2>Comandi correlati</h2>
    <p><code>git switch</code>, <code>git restore</code>, <code>git branch</code>, <code>git reset</code></p>

- source_title: "git switch — Switch branches"
  title: "git switch — Cambia branch"
  langcode: it
  body: |
    <h2>Sinossi</h2>
    <pre><code>git switch [-c &lt;new-branch&gt;] [--detach] &lt;branch&gt;</code></pre>
    <h2>Descrizione</h2>
    <p>Il comando <code>git switch</code>, introdotto in Git 2.23, è un sostituto focalizzato per la metà di switching dei branch di <code>git checkout</code>. Cambia solo branch (o crea e cambia in un solo passo). Rifiuta di operare su singoli file, eliminando la fonte più comune di errori di <code>checkout</code>. Se stai imparando Git oggi, preferisci <code>git switch</code> per i branch e <code>git restore</code> per i file.</p>
    <p>Come <code>checkout</code>, <code>switch</code> aggiorna HEAD, l'index e la working tree per corrispondere al branch target. Rifiuta di passare se così facendo si calpesterebbero modifiche non committate, a meno che non si passi <code>--force</code>.</p>
    <p>Nell'uso quotidiano, <code>git switch</code> si integra con alias, editor e CI.</p><p>Capire il modello dati di Git aiuta a prevedere i risultati.</p>
    <h2>Opzioni comuni</h2>
    <table>
      <thead><tr><th>Opzione</th><th>Descrizione</th></tr></thead>
      <tbody>
        <tr><td><code>-c &lt;name&gt;</code>, <code>--create</code></td><td>Crea un nuovo branch e vi passa.</td></tr>
        <tr><td><code>-C &lt;name&gt;</code>, <code>--force-create</code></td><td>Crea o resetta un branch e vi passa.</td></tr>
        <tr><td><code>--track</code></td><td>Configura il tracking con un branch remoto.</td></tr>
        <tr><td><code>--detach</code></td><td>Passa a un commit in modalità detached HEAD.</td></tr>
        <tr><td><code>-</code></td><td>Passa al branch precedente (come <code>cd -</code>).</td></tr>
        <tr><td><code>--discard-changes</code></td><td>Butta via le modifiche locali quando passa.</td></tr>
        <tr><td><code>-m</code>, <code>--merge</code></td><td>Merge a tre vie delle modifiche locali quando passa.</td></tr>
      </tbody>
    </table>
    <h2>Esempi</h2>
    <pre><code>git switch main
    # Si sposta al branch main

    git switch -c feature/search
    # Crea e passa a un nuovo branch

    git switch -
    # Torna al branch precedente

    git switch --detach v3.0.0
    # Ispeziona un tag senza creare un branch</code></pre>
    <h2>Errori comuni</h2>
    <p>Una confusione comune è aspettarsi che <code>git switch</code> operi sui file come fa <code>git checkout</code>. Non lo farà — usa invece <code>git restore</code>. Se hai lavoro non committato che confligge con il branch target, lo switch fallirà; o committa, fai stash, o usa <code>--merge</code> per tentare un merge a tre vie.</p>
    <h2>Comandi correlati</h2>
    <p><code>git checkout</code>, <code>git restore</code>, <code>git branch</code>, <code>git stash</code></p>

- source_title: "git merge — Join two or more development histories together"
  title: "git merge — Unisce due o più storie di sviluppo"
  langcode: it
  body: |
    <h2>Sinossi</h2>
    <pre><code>git merge [--no-ff] [--squash] [--abort] [-s &lt;strategy&gt;] [&lt;branch&gt;]</code></pre>
    <h2>Descrizione</h2>
    <p>Il comando <code>git merge</code> integra modifiche da un branch a un altro. Per default produce un commit "vero merge" con due parent, preservando la topologia di entrambe le storie. Se il branch target è un antenato stretto della sorgente, Git fa fast-forward semplicemente spostando il puntatore del branch; passa <code>--no-ff</code> per registrare sempre un merge commit.</p>
    <p>Quando le stesse righe sono modificate su entrambi i lati, Git si ferma con un marker di conflitto. Risolvi manualmente, poi <code>git add</code> i file ed esegui <code>git commit</code> (o <code>git merge --continue</code>). Per uscire da un merge in corso, usa <code>git merge --abort</code>.</p>
    <p>Nell'uso quotidiano, <code>git merge</code> si integra con alias, editor e CI.</p><p>Capire il modello dati di Git aiuta a prevedere i risultati.</p>
    <h2>Opzioni comuni</h2>
    <table>
      <thead><tr><th>Opzione</th><th>Descrizione</th></tr></thead>
      <tbody>
        <tr><td><code>--no-ff</code></td><td>Crea sempre un merge commit, anche quando il fast-forward è possibile.</td></tr>
        <tr><td><code>--ff-only</code></td><td>Rifiuta di mergiare a meno che il fast-forward non sia possibile.</td></tr>
        <tr><td><code>--squash</code></td><td>Combina la storia mergiata in un singolo commit sul branch target.</td></tr>
        <tr><td><code>--abort</code></td><td>Abbandona un merge in corso.</td></tr>
        <tr><td><code>--continue</code></td><td>Riprende un merge dopo aver risolto i conflitti.</td></tr>
        <tr><td><code>-s &lt;strategy&gt;</code></td><td>Sceglie la strategia di merge (<code>ort</code>, <code>recursive</code>, <code>resolve</code>, <code>octopus</code>).</td></tr>
        <tr><td><code>-X &lt;option&gt;</code></td><td>Passa opzione specifica della strategia (es. <code>ours</code>, <code>theirs</code>).</td></tr>
        <tr><td><code>--no-commit</code></td><td>Mette in stage il risultato del merge ma non committa.</td></tr>
      </tbody>
    </table>
    <h2>Esempi</h2>
    <pre><code>git merge feature/login
    # Mergia il feature branch nel branch corrente

    git merge --no-ff release/1.2
    # Crea sempre un merge commit (preserva la topologia)

    git merge --abort
    # Cancella un merge dopo che sorgono conflitti

    git merge -X theirs hotfix
    # Auto-risolve i conflitti preferendo il "loro" lato</code></pre>
    <h2>Errori comuni</h2>
    <p>Risolvere conflitti in fretta e dimenticare di rimuovere i marker di conflitto (<code>&lt;&lt;&lt;&lt;&lt;&lt;&lt;</code>) lascia codice rotto committato. Esegui sempre una build o test dopo aver risolto. Un'altra trappola è fare fast-forward silenziosamente quando volevi un merge commit per la tracciabilità — usa <code>--no-ff</code>. Infine, <code>--squash</code> NON crea un merge commit, quindi il branch sorgente non viene registrato come parent.</p>
    <h2>Comandi correlati</h2>
    <p><code>git rebase</code>, <code>git mergetool</code>, <code>git pull</code>, <code>git cherry-pick</code></p>

- source_title: "git rebase — Reapply commits on top of another base"
  title: "git rebase — Riapplica commit sopra un'altra base"
  langcode: it
  body: |
    <h2>Sinossi</h2>
    <pre><code>git rebase [-i] [--onto &lt;newbase&gt;] [&lt;upstream&gt; [&lt;branch&gt;]]</code></pre>
    <h2>Descrizione</h2>
    <p>Il comando <code>git rebase</code> sposta una sequenza di commit a una nuova base. Riscrive la storia rieseguendo ogni commit sopra la nuova base, producendo una catena lineare invece di un merge commit. Il rebasing è prezioso per mantenere aggiornati i feature branch, pulire la storia locale prima di pushare e squashare commit fixup.</p>
    <p>Poiché il rebasing crea nuovi commit con SHA diversi, non rebasare mai commit che sono stati pubblicati e tirati da altri — finiranno con storie divergenti. La modalità interattiva (<code>-i</code>) ti permette di riordinare, modificare, squashare, eliminare o correggere i commit.</p>
    <p>Nell'uso quotidiano, <code>git rebase</code> si integra con alias, editor e CI.</p><p>Capire il modello dati di Git aiuta a prevedere i risultati.</p>
    <h2>Opzioni comuni</h2>
    <table>
      <thead><tr><th>Opzione</th><th>Descrizione</th></tr></thead>
      <tbody>
        <tr><td><code>-i</code>, <code>--interactive</code></td><td>Apre un editor per manipolare la lista dei commit.</td></tr>
        <tr><td><code>--onto &lt;newbase&gt;</code></td><td>Rebasa su un commit arbitrario, non l'upstream.</td></tr>
        <tr><td><code>--continue</code></td><td>Riprende dopo aver risolto i conflitti.</td></tr>
        <tr><td><code>--abort</code></td><td>Cancella il rebase e torna allo stato originale.</td></tr>
        <tr><td><code>--skip</code></td><td>Salta la patch corrente e continua.</td></tr>
        <tr><td><code>--autosquash</code></td><td>Ordina automaticamente i commit fixup/squash.</td></tr>
        <tr><td><code>--autostash</code></td><td>Fa stash delle modifiche locali prima del rebase e fa pop dopo.</td></tr>
        <tr><td><code>-r</code>, <code>--rebase-merges</code></td><td>Preserva i merge commit durante il rebase.</td></tr>
      </tbody>
    </table>
    <h2>Esempi</h2>
    <pre><code>git rebase main
    # Riesegue i commit del branch corrente sopra main

    git rebase -i HEAD~5
    # Modifica interattivamente gli ultimi 5 commit

    git rebase --onto main feature-base feature-tip
    # Sposta solo i commit tra feature-base e feature-tip su main

    git rebase --continue
    # Riprende dopo aver corretto i conflitti</code></pre>
    <h2>Errori comuni</h2>
    <p>Fare rebase di branch pubblici e condivisi rompe la storia di ogni collaboratore. Riserva il rebase per la pulizia locale. Durante la risoluzione dei conflitti, i principianti spesso eseguono <code>git commit</code> invece di <code>git rebase --continue</code>, lasciando il rebase in uno stato rotto. Se ti perdi a metà rebase, <code>git rebase --abort</code> ti riporta sempre al sicuro.</p>
    <h2>Comandi correlati</h2>
    <p><code>git merge</code>, <code>git cherry-pick</code>, <code>git reflog</code>, <code>git pull --rebase</code></p>

- source_title: "git mergetool — Run merge conflict resolution tools"
  title: "git mergetool — Esegue strumenti di risoluzione dei conflitti di merge"
  langcode: it
  body: |
    <h2>Sinossi</h2>
    <pre><code>git mergetool [-t &lt;tool&gt;] [--tool-help] [&lt;file&gt;...]</code></pre>
    <h2>Descrizione</h2>
    <p>Il comando <code>git mergetool</code> lancia uno strumento di merge esterno per aiutare a risolvere i conflitti dopo che un merge, rebase o cherry-pick si ferma con conflitti. Strumenti comuni includono <code>vimdiff</code>, <code>meld</code>, <code>kdiff3</code>, <code>p4merge</code>, <code>opendiff</code> e <code>vscode</code>. Una volta configurato tramite <code>merge.tool</code>, eseguire <code>git mergetool</code> apre ogni file in conflitto nello strumento scelto e mette in stage la risoluzione quando salvi.</p>
    <p>La maggior parte degli editor moderni (VS Code, IDE JetBrains, Vim con Fugitive) ha UI di merge integrate che rendono <code>git mergetool</code> ridondante. Tuttavia, sulla riga di comando o su SSH, rimane un'utility essenziale per la risoluzione grafica o a tre pannelli dei conflitti.</p>
    <p>Nell'uso quotidiano, <code>git mergetool</code> si integra con alias e CI.</p><p>Capire il modello dati di Git aiuta a prevedere i risultati.</p>
    <h2>Opzioni comuni</h2>
    <table>
      <thead><tr><th>Opzione</th><th>Descrizione</th></tr></thead>
      <tbody>
        <tr><td><code>-t &lt;tool&gt;</code>, <code>--tool=&lt;tool&gt;</code></td><td>Usa uno strumento di merge specifico per questa esecuzione.</td></tr>
        <tr><td><code>--tool-help</code></td><td>Elenca gli strumenti di merge che Git conosce.</td></tr>
        <tr><td><code>-y</code>, <code>--no-prompt</code></td><td>Non chiedere prima di lanciare lo strumento.</td></tr>
        <tr><td><code>-g</code>, <code>--gui</code></td><td>Usa lo strumento GUI da <code>merge.guitool</code>.</td></tr>
        <tr><td><code>-O&lt;file&gt;</code></td><td>Processa i file nell'ordine elencato in <code>file</code>.</td></tr>
      </tbody>
    </table>
    <h2>Esempi</h2>
    <pre><code>git config --global merge.tool meld
    # Configura meld come default

    git mergetool
    # Lancia lo strumento configurato su ogni file in conflitto

    git mergetool -t vimdiff
    # Usa vimdiff solo questa volta

    git mergetool --tool-help
    # Vedi la lista degli strumenti supportati</code></pre>
    <h2>Errori comuni</h2>
    <p>Dopo aver risolto con <code>git mergetool</code>, file di backup <code>.orig</code> rimasti ingombrano la directory. Disabilitali con <code>git config --global mergetool.keepBackup false</code>. Un'altra trappola: lanciare uno strumento GUI su SSH senza X forwarding fallisce silenziosamente. Configura uno strumento amichevole alla console (come <code>vimdiff</code>) per le sessioni remote.</p>
    <h2>Comandi correlati</h2>
    <p><code>git merge</code>, <code>git rebase</code>, <code>git config</code>, <code>git diff</code></p>

- source_title: "git remote — Manage tracked remote repositories"
  title: "git remote — Gestisce i repository remoti tracciati"
  langcode: it
  body: |
    <h2>Sinossi</h2>
    <pre><code>git remote [-v]
    git remote add &lt;name&gt; &lt;url&gt;
    git remote remove &lt;name&gt;
    git remote set-url &lt;name&gt; &lt;url&gt;</code></pre>
    <h2>Descrizione</h2>
    <p>Il comando <code>git remote</code> gestisce l'insieme di repository ("remote") i cui URL sono memorizzati nella tua config locale. Ogni remote ha un soprannome breve (comunemente <code>origin</code> per la sorgente del clone originale e <code>upstream</code> per il progetto da cui hai forkato). Quando esegui <code>git fetch origin</code>, <code>git push origin</code> o simili, il soprannome viene risolto all'URL.</p>
    <p>I remote sono memorizzati in <code>.git/config</code> e possono avere URL separati per fetch e push. Portano anche refspec che determinano quali ref scaricare e in quale namespace locale. I workflow moderni hanno spesso solo <code>origin</code>, mentre i contributori open-source tipicamente hanno sia <code>origin</code> (il loro fork) che <code>upstream</code> (il progetto canonico).</p>
    <p>Nell'uso quotidiano, <code>git remote</code> si integra con alias e CI.</p><p>Capire il modello dati di Git aiuta a prevedere i risultati.</p>
    <h2>Opzioni comuni</h2>
    <table>
      <thead><tr><th>Opzione / Sottocomando</th><th>Descrizione</th></tr></thead>
      <tbody>
        <tr><td><code>-v</code>, <code>--verbose</code></td><td>Mostra gli URL accanto ai nomi dei remote.</td></tr>
        <tr><td><code>add &lt;name&gt; &lt;url&gt;</code></td><td>Registra un nuovo remote.</td></tr>
        <tr><td><code>remove &lt;name&gt;</code></td><td>Rimuove un remote dalla config.</td></tr>
        <tr><td><code>rename &lt;old&gt; &lt;new&gt;</code></td><td>Rinomina un remote.</td></tr>
        <tr><td><code>set-url &lt;name&gt; &lt;url&gt;</code></td><td>Cambia l'URL di un remote.</td></tr>
        <tr><td><code>show &lt;name&gt;</code></td><td>Mostra info dettagliate su un remote.</td></tr>
        <tr><td><code>prune &lt;name&gt;</code></td><td>Cancella ref di tracking remoto obsoleti.</td></tr>
      </tbody>
    </table>
    <h2>Esempi</h2>
    <pre><code>git remote -v
    # Elenca tutti i remote con URL

    git remote add upstream https://github.com/original/project.git
    # Aggiunge il repo upstream di un fork

    git remote set-url origin git@github.com:me/project.git
    # Passa da HTTPS a SSH

    git remote prune origin
    # Rimuove i tracking branch che non esistono più su origin</code></pre>
    <h2>Errori comuni</h2>
    <p>Aggiungere l'URL sbagliato (typo, suffisso <code>.git</code> mancante su alcuni host) porta a errori di fetch confusi. Esegui <code>git remote -v</code> per confermare. Dopo rinomi del repository o cambi di proprietà del fork, gli URL dei tuoi remote diventano stantii — correggili con <code>set-url</code>. Non dimenticare di fare <code>git remote prune</code> periodicamente per pulire i branch cancellati sul server.</p>
    <h2>Comandi correlati</h2>
    <p><code>git fetch</code>, <code>git push</code>, <code>git pull</code>, <code>git ls-remote</code></p>

- source_title: "git fetch — Download objects and refs from a remote"
  title: "git fetch — Scarica oggetti e ref da un remote"
  langcode: it
  body: |
    <h2>Sinossi</h2>
    <pre><code>git fetch [&lt;options&gt;] [&lt;remote&gt; [&lt;refspec&gt;...]]</code></pre>
    <h2>Descrizione</h2>
    <p>Il comando <code>git fetch</code> scarica nuovi commit, file e ref da un repository remoto nel tuo repo locale, ma NON li mergia nel tuo branch di lavoro. Dopo il fetch, i ref di tracking remoto (come <code>origin/main</code>) sono aggiornati, e puoi ispezionare cosa c'è di nuovo con <code>git log origin/main</code> prima di decidere di mergiare o rebase.</p>
    <p>Il fetching è sicuro — non modifica mai la tua working tree o il branch corrente. Molti utenti preferiscono <code>git fetch</code> seguito da un esplicito <code>git merge</code> o <code>git rebase</code> rispetto a <code>git pull</code>, perché dà un chiaro passo di anteprima. Usa <code>--all</code> per fare fetch da ogni remote configurato.</p>
    <p>Nell'uso quotidiano, <code>git fetch</code> si integra con alias e CI.</p><p>Capire il modello dati di Git aiuta a prevedere i risultati.</p>
    <h2>Opzioni comuni</h2>
    <table>
      <thead><tr><th>Opzione</th><th>Descrizione</th></tr></thead>
      <tbody>
        <tr><td><code>--all</code></td><td>Fa fetch da tutti i remote configurati.</td></tr>
        <tr><td><code>--prune</code> / <code>-p</code></td><td>Rimuove ref di tracking remoto che non esistono più upstream.</td></tr>
        <tr><td><code>--tags</code></td><td>Scarica tutti i tag dal remote.</td></tr>
        <tr><td><code>--depth=&lt;n&gt;</code></td><td>Limita la profondità della storia scaricata (crea/mantiene un clone shallow).</td></tr>
        <tr><td><code>--unshallow</code></td><td>Converte un clone shallow in uno completo.</td></tr>
        <tr><td><code>--dry-run</code></td><td>Mostra cosa verrebbe scaricato.</td></tr>
        <tr><td><code>--force</code> / <code>-f</code></td><td>Permette aggiornamenti non fast-forward dei ref.</td></tr>
      </tbody>
    </table>
    <h2>Esempi</h2>
    <pre><code>git fetch
    # Aggiorna i ref di tracking remoto da origin

    git fetch --all --prune
    # Aggiorna da ogni remote e pulisce branch obsoleti

    git fetch upstream main
    # Scarica solo il branch main da upstream

    git fetch --unshallow
    # Riempie la storia completa in un clone shallow</code></pre>
    <h2>Errori comuni</h2>
    <p>Confondere <code>git fetch</code> con <code>git pull</code> è comune: fetch scarica solo, mentre pull scarica e mergia. Dimenticare <code>--prune</code> lascia una lunga lista di tracking branch obsoleti nel tempo. Configura <code>fetch.prune = true</code> globalmente per rendere il pruning automatico.</p>
    <h2>Comandi correlati</h2>
    <p><code>git pull</code>, <code>git merge</code>, <code>git remote</code>, <code>git ls-remote</code></p>

- source_title: "git pull — Fetch from and integrate with another repository"
  title: "git pull — Scarica e integra con un altro repository"
  langcode: it
  body: |
    <h2>Sinossi</h2>
    <pre><code>git pull [--rebase] [--ff-only] [&lt;remote&gt; [&lt;branch&gt;]]</code></pre>
    <h2>Descrizione</h2>
    <p>Il comando <code>git pull</code> è una scorciatoia per <code>git fetch</code> seguito da un passo di integrazione (merge per default, rebase opzionalmente). Aggiorna il tuo branch corrente per incorporare le modifiche upstream. Molti team preferiscono configurare <code>pull.rebase = true</code> o usare <code>git pull --rebase</code> per mantenere lineare la storia.</p>
    <p>Se il tuo branch e l'upstream sono divergenti, <code>git pull</code> può produrre un merge commit. Con <code>--ff-only</code>, il pull fallirà piuttosto che creare un merge — utile quando vuoi essere sicuro che il tuo branch locale sia solo indietro, non divergente.</p>
    <p>Nell'uso quotidiano, <code>git pull</code> si integra con alias e CI.</p><p>Capire il modello dati di Git aiuta a prevedere i risultati.</p>
    <h2>Opzioni comuni</h2>
    <table>
      <thead><tr><th>Opzione</th><th>Descrizione</th></tr></thead>
      <tbody>
        <tr><td><code>--rebase</code></td><td>Rebasa i commit locali sopra le modifiche scaricate.</td></tr>
        <tr><td><code>--ff-only</code></td><td>Solo fast-forward; aborta se sarebbe necessario un merge.</td></tr>
        <tr><td><code>--no-ff</code></td><td>Crea sempre un merge commit.</td></tr>
        <tr><td><code>--all</code></td><td>Fa fetch da tutti i remote prima di integrare.</td></tr>
        <tr><td><code>--autostash</code></td><td>Fa stash delle modifiche locali prima del pull e fa pop dopo.</td></tr>
        <tr><td><code>--prune</code></td><td>Rimuove i tracking branch obsoleti come parte del fetch.</td></tr>
      </tbody>
    </table>
    <h2>Esempi</h2>
    <pre><code>git pull
    # Default: scarica e mergia dall'upstream configurato

    git pull --rebase origin main
    # Rebasa i commit locali sull'ultimo origin/main

    git pull --ff-only
    # Rifiuta di creare un merge commit

    git config --global pull.rebase true
    # Rende il rebase il default per ogni pull</code></pre>
    <h2>Errori comuni</h2>
    <p>Fare pull con modifiche non committate può far rifiutare il merge a Git. O committa, fai stash, o usa <code>--autostash</code>. Fare pull su un branch divergente spesso produce merge commit inaspettati. Usa <code>--ff-only</code> come rete di sicurezza o rebase esplicitamente.</p>
    <h2>Comandi correlati</h2>
    <p><code>git fetch</code>, <code>git merge</code>, <code>git rebase</code>, <code>git push</code></p>

- source_title: "git push — Update remote refs along with associated objects"
  title: "git push — Aggiorna i ref remoti insieme agli oggetti associati"
  langcode: it
  body: |
    <h2>Sinossi</h2>
    <pre><code>git push [&lt;remote&gt; [&lt;refspec&gt;...]] [--force-with-lease] [--tags] [--delete]</code></pre>
    <h2>Descrizione</h2>
    <p>Il comando <code>git push</code> invia commit locali a un repository remoto, aggiornando i branch remoti per corrispondere ai tuoi locali. Il primo push di un nuovo branch tipicamente richiede <code>-u</code> per configurare il tracking. Per default, push è non distruttivo: rifiuta di sovrascrivere la storia remota che non hai localmente. Usa <code>--force-with-lease</code> quando hai genuinamente bisogno di riscrivere la storia remota (dopo un rebase) — non usare mai <code>--force</code> nudo su branch condivisi.</p>
    <p>Push obbedisce a regole lato server: protezioni dei branch, review obbligatorie, commit firmati e pre-receive hook possono tutti rifiutare un push. Leggi attentamente il messaggio di errore quando questo accade.</p>
    <p>Nell'uso quotidiano, <code>git push</code> si integra con alias e CI.</p><p>Capire il modello dati di Git aiuta a prevedere i risultati.</p>
    <h2>Opzioni comuni</h2>
    <table>
      <thead><tr><th>Opzione</th><th>Descrizione</th></tr></thead>
      <tbody>
        <tr><td><code>-u</code>, <code>--set-upstream</code></td><td>Imposta upstream per i default futuri di push/pull.</td></tr>
        <tr><td><code>--force-with-lease</code></td><td>Force push solo se il ref remoto corrisponde all'ultimo valore fetchato.</td></tr>
        <tr><td><code>--force</code> / <code>-f</code></td><td>Forza la sovrascrittura della storia remota (pericoloso su branch condivisi).</td></tr>
        <tr><td><code>--tags</code></td><td>Pusha tutti i tag locali.</td></tr>
        <tr><td><code>--delete</code></td><td>Cancella un branch remoto.</td></tr>
        <tr><td><code>--dry-run</code></td><td>Mostra cosa verrebbe pushato.</td></tr>
        <tr><td><code>--all</code></td><td>Pusha tutti i branch.</td></tr>
        <tr><td><code>--atomic</code></td><td>Aggiornamento all-or-nothing di più ref.</td></tr>
      </tbody>
    </table>
    <h2>Esempi</h2>
    <pre><code>git push -u origin feature/login
    # Primo push di un nuovo branch con tracking

    git push --force-with-lease
    # Alternativa più sicura a --force dopo aver fatto rebase

    git push origin --delete old-feature
    # Cancella un branch remoto

    git push --tags
    # Pubblica tutti i tag locali</code></pre>
    <h2>Errori comuni</h2>
    <p>Un semplice <code>--force</code> può cancellare i commit dei colleghi. Usa invece <code>--force-with-lease</code>. Pushare a <code>main</code> direttamente bypassa la code review in molti team — configura la protezione del branch. Dimenticare <code>-u</code> significa che i futuri comandi <code>git push</code> hanno bisogno di argomenti espliciti.</p>
    <h2>Comandi correlati</h2>
    <p><code>git fetch</code>, <code>git pull</code>, <code>git remote</code>, <code>git tag</code></p>

- source_title: "git ls-remote — List references in a remote repository"
  title: "git ls-remote — Elenca i riferimenti in un repository remoto"
  langcode: it
  body: |
    <h2>Sinossi</h2>
    <pre><code>git ls-remote [--heads] [--tags] [&lt;repository&gt; [&lt;refs&gt;...]]</code></pre>
    <h2>Descrizione</h2>
    <p>Il comando <code>git ls-remote</code> interroga un remote (senza clone o fetch) e stampa lo SHA-1 di ogni ref accanto al nome del ref. È prezioso per scripting, pipeline CI e ispezione veloce — per esempio, trovare l'ultimo tag su un remote o controllare se un branch esiste. Poiché non scarica oggetti, è leggero e veloce anche contro repository molto grandi.</p>
    <p>Puoi passare un URL direttamente senza prima configurare un remote: <code>git ls-remote https://github.com/user/repo.git</code>. Questo lo rende ideale per ispezione una tantum o script di build che risolvono una versione "latest".</p>
    <p>Nell'uso quotidiano, <code>git ls-remote</code> si integra con alias e CI.</p><p>Capire il modello dati di Git aiuta a prevedere i risultati.</p>
    <h2>Opzioni comuni</h2>
    <table>
      <thead><tr><th>Opzione</th><th>Descrizione</th></tr></thead>
      <tbody>
        <tr><td><code>--heads</code> / <code>-h</code></td><td>Limita l'output ai ref dei branch.</td></tr>
        <tr><td><code>--tags</code> / <code>-t</code></td><td>Limita l'output ai ref dei tag.</td></tr>
        <tr><td><code>--refs</code></td><td>Filtra il peel dereferenziato dei tag annotated.</td></tr>
        <tr><td><code>--symref</code></td><td>Mostra a cosa puntano i ref simbolici (come HEAD).</td></tr>
        <tr><td><code>--exit-code</code></td><td>Esce con codice non-zero se nessun ref corrispondente è trovato.</td></tr>
        <tr><td><code>--sort=&lt;key&gt;</code></td><td>Ordina i risultati per versione, refname, ecc.</td></tr>
      </tbody>
    </table>
    <h2>Esempi</h2>
    <pre><code>git ls-remote --heads origin
    # Elenca tutti i branch su origin con i loro SHA

    git ls-remote --tags --refs origin
    # Elenca tutti i tag (saltando le dereferenze ^{})

    git ls-remote https://github.com/git/git.git HEAD
    # Mostra a cosa punta HEAD su un repo pubblico

    git ls-remote --sort=-v:refname --tags origin 'v*' | head -1
    # Trova il tag semver più alto</code></pre>
    <h2>Errori comuni</h2>
    <p>Parsare l'output senza <code>--refs</code> mostra i tag annotated due volte (una come oggetto tag, una come <code>name^{}</code> per il commit sottostante). Usa <code>--refs</code> per sopprimere le righe peeled. L'autenticazione può fallire silenziosamente contro repo privati senza un credential helper — testa interattivamente prima.</p>
    <h2>Comandi correlati</h2>
    <p><code>git remote</code>, <code>git fetch</code>, <code>git tag</code>, <code>git for-each-ref</code></p>

- source_title: "git log — Show commit history"
  title: "git log — Mostra la storia dei commit"
  langcode: it
  body: |
    <h2>Sinossi</h2>
    <pre><code>git log [&lt;options&gt;] [&lt;revision-range&gt;] [[--] &lt;path&gt;...]</code></pre>
    <h2>Descrizione</h2>
    <p>Il comando <code>git log</code> visualizza la storia dei commit raggiungibili da uno o più ref (default: HEAD). È uno degli strumenti più flessibili in Git, supportando filtri per autore, data, contenuto del messaggio, path di file e altro. Combinato con opzioni di formattazione, può produrre output adatto a changelog, audit e archeologia del codice.</p>
    <p>Idiomi utili includono <code>git log --oneline --graph --decorate --all</code> per una vista compatta e visiva dell'intera storia, e <code>git log -p</code> per vedere le patch in linea. Argomenti pathspec restringono il log a commit che hanno toccato file specifici.</p>
    <p>Nell'uso quotidiano, <code>git log</code> si integra con alias e CI.</p><p>Capire il modello dati di Git aiuta a prevedere i risultati.</p>
    <h2>Opzioni comuni</h2>
    <table>
      <thead><tr><th>Opzione</th><th>Descrizione</th></tr></thead>
      <tbody>
        <tr><td><code>--oneline</code></td><td>Un commit per riga, SHA abbreviato + oggetto.</td></tr>
        <tr><td><code>--graph</code></td><td>Arte ASCII della struttura di branch e merge.</td></tr>
        <tr><td><code>--all</code></td><td>Include tutti i ref, non solo HEAD.</td></tr>
        <tr><td><code>-p</code>, <code>--patch</code></td><td>Mostra i diff accanto a ogni commit.</td></tr>
        <tr><td><code>--stat</code></td><td>Mostra statistiche di file modificati.</td></tr>
        <tr><td><code>--author=&lt;pattern&gt;</code></td><td>Filtra per autore.</td></tr>
        <tr><td><code>--since</code> / <code>--until</code></td><td>Filtra per data.</td></tr>
        <tr><td><code>-S &lt;string&gt;</code></td><td>Pickaxe: trova commit che aggiungono/rimuovono questa stringa.</td></tr>
        <tr><td><code>--follow</code></td><td>Traccia la storia di un singolo file attraverso i rename.</td></tr>
      </tbody>
    </table>
    <h2>Esempi</h2>
    <pre><code>git log --oneline --graph --decorate --all
    # Storia visiva compatta di tutto

    git log -p src/auth.py
    # Diff completi di ogni commit che tocca auth.py

    git log -S "TODO" --since="2 weeks ago"
    # Trova commit recenti che hanno aggiunto o rimosso "TODO"

    git log --author="alice" --pretty=format:"%h %s" -n 20
    # Ultimi 20 commit di alice in formato personalizzato</code></pre>
    <h2>Errori comuni</h2>
    <p>Dimenticare che <code>git log file.txt</code> mostra solo i commit dove <code>file.txt</code> esisteva — usa <code>--follow</code> se è stato rinominato. Affidarsi troppo a <code>--grep</code> quando in realtà vuoi <code>-S</code> (che cerca nei diff, non nei messaggi). E su repo enormi, <code>git log -p</code> senza un path può produrre gigabyte di output.</p>
    <h2>Comandi correlati</h2>
    <p><code>git show</code>, <code>git blame</code>, <code>git shortlog</code>, <code>git diff</code></p>

- source_title: "git show — Show various types of objects"
  title: "git show — Mostra vari tipi di oggetti"
  langcode: it
  body: |
    <h2>Sinossi</h2>
    <pre><code>git show [&lt;options&gt;] [&lt;object&gt;...]</code></pre>
    <h2>Descrizione</h2>
    <p>Il comando <code>git show</code> visualizza informazioni su oggetti Git: commit (con diff), tag (annotazione + oggetto taggato), tree (lista file) o blob (contenuti file). Senza argomenti, mostra il commit più recente. Con un argomento path, visualizza il file come esisteva a una specifica revisione.</p>
    <p><code>git show</code> è lo strumento di riferimento per ispezionare un singolo commit in dettaglio. A differenza di <code>git log -1 -p</code>, formatta naturalmente sia tag annotated che listati di tree, rendendolo utile per esaminare tag di rilascio o estrarre contenuti di file storici.</p>
    <p>Nell'uso quotidiano, <code>git show</code> si integra con alias e CI.</p><p>Capire il modello dati di Git aiuta a prevedere i risultati.</p>
    <h2>Opzioni comuni</h2>
    <table>
      <thead><tr><th>Opzione</th><th>Descrizione</th></tr></thead>
      <tbody>
        <tr><td><code>--stat</code></td><td>Aggiunge un riepilogo diffstat.</td></tr>
        <tr><td><code>--name-only</code></td><td>Elenca solo i nomi dei file modificati.</td></tr>
        <tr><td><code>--pretty=&lt;fmt&gt;</code></td><td>Sceglie il formato: <code>oneline</code>, <code>short</code>, <code>full</code>, personalizzato.</td></tr>
        <tr><td><code>-s</code>, <code>--no-patch</code></td><td>Sopprime il diff.</td></tr>
        <tr><td><code>--show-signature</code></td><td>Verifica e visualizza le firme GPG.</td></tr>
        <tr><td><code>--word-diff</code></td><td>Evidenzia le modifiche a livello di parola.</td></tr>
      </tbody>
    </table>
    <h2>Esempi</h2>
    <pre><code>git show HEAD
    # Ultimo commit con diff

    git show v2.0.0
    # Mostra un tag annotated

    git show HEAD:src/main.c
    # Visualizza il file come era in HEAD

    git show --stat abc123
    # Solo il diffstat per un commit specifico</code></pre>
    <h2>Errori comuni</h2>
    <p>Confondere <code>git show HEAD~1</code> (un commit prima di HEAD) con <code>git show HEAD^1</code> (primo parent di HEAD) — sono equivalenti su storia lineare ma differiscono sui merge. Nota anche che <code>git show HEAD:file</code> usa un colon, non uno spazio, per specificare un file a una revisione.</p>
    <h2>Comandi correlati</h2>
    <p><code>git log</code>, <code>git diff</code>, <code>git cat-file</code>, <code>git blame</code></p>

- source_title: "git blame — Show what revision and author last modified each line"
  title: "git blame — Mostra quale revisione e autore ha modificato per ultimo ogni riga"
  langcode: it
  body: |
    <h2>Sinossi</h2>
    <pre><code>git blame [-L &lt;range&gt;] [-w] [-M] [-C] &lt;file&gt;</code></pre>
    <h2>Descrizione</h2>
    <p>Il comando <code>git blame</code> annota ogni riga di un file con il commit, autore e timestamp che l'ha toccata per ultimo. È prezioso per capire perché un pezzo di codice ha quell'aspetto, chi l'ha introdotto e quando. Nonostante il nome accusatorio, blame è usato per lo più come strumento di ricerca, non come mezzo di puntare il dito.</p>
    <p>Blame può seguire il codice mentre veniva spostato o copiato (con <code>-M</code> e <code>-C</code>), e può ignorare commit di solo whitespace o solo formattazione se mantieni un file <code>.git-blame-ignore-revs</code> referenziato via <code>blame.ignoreRevsFile</code>.</p>
    <p>Nell'uso quotidiano, <code>git blame</code> si integra con alias e CI.</p><p>Capire il modello dati di Git aiuta a prevedere i risultati.</p>
    <h2>Opzioni comuni</h2>
    <table>
      <thead><tr><th>Opzione</th><th>Descrizione</th></tr></thead>
      <tbody>
        <tr><td><code>-L &lt;start&gt;,&lt;end&gt;</code></td><td>Limita blame a un intervallo di righe.</td></tr>
        <tr><td><code>-w</code></td><td>Ignora modifiche di whitespace.</td></tr>
        <tr><td><code>-M</code></td><td>Rileva righe spostate all'interno di un file.</td></tr>
        <tr><td><code>-C</code></td><td>Rileva righe copiate da altri file (ripeti per rilevamento più forte).</td></tr>
        <tr><td><code>--since=&lt;date&gt;</code></td><td>Smette di annotare prima di questa data.</td></tr>
        <tr><td><code>-e</code>, <code>--show-email</code></td><td>Mostra l'email dell'autore invece del nome.</td></tr>
        <tr><td><code>--ignore-revs-file &lt;file&gt;</code></td><td>Salta le revisioni elencate quando assegna blame.</td></tr>
      </tbody>
    </table>
    <h2>Esempi</h2>
    <pre><code>git blame src/parser.c
    # Annota ogni riga

    git blame -L 50,100 src/parser.c
    # Solo righe da 50 a 100

    git blame -w -M -C README.md
    # Ignora whitespace e rileva spostamenti/copie

    git blame --ignore-revs-file .git-blame-ignore-revs file.js
    # Salta commit di formattazione rumorosi</code></pre>
    <h2>Errori comuni</h2>
    <p>Usare blame per assegnare colpa piuttosto che per investigare il contesto crea una cultura ostile. Abbina blame a <code>git log</code> sul commit incriminato per leggere il messaggio completo e l'intento. Dopo formattazione di massa, configura <code>.git-blame-ignore-revs</code> così che blame punti ancora ad autori significativi.</p>
    <h2>Comandi correlati</h2>
    <p><code>git log -L</code>, <code>git log -S</code>, <code>git show</code>, <code>git annotate</code></p>

- source_title: "git bisect — Use binary search to find the commit that introduced a bug"
  title: "git bisect — Usa ricerca binaria per trovare il commit che ha introdotto un bug"
  langcode: it
  body: |
    <h2>Sinossi</h2>
    <pre><code>git bisect start
    git bisect good &lt;commit&gt;
    git bisect bad &lt;commit&gt;
    git bisect run &lt;script&gt;
    git bisect reset</code></pre>
    <h2>Descrizione</h2>
    <p>Il comando <code>git bisect</code> esegue una ricerca binaria attraverso la storia dei commit per identificare esattamente quale commit ha introdotto un bug. Inizi marcando un commit noto-cattivo (spesso HEAD) e uno noto-buono (forse un tag di rilascio), poi Git fa checkout di un punto intermedio e ti chiede di testare. Rispondi "good" o "bad", Git restringe il range, e ripeti finché il commit incriminato non viene trovato.</p>
    <p>Se hai un test automatizzato o un riproduttore, <code>git bisect run</code> automatizza l'intero processo — Git invoca il tuo script ad ogni passo. Bisecting attraverso mille commit tipicamente richiede circa dieci iterazioni.</p>
    <p>Nell'uso quotidiano, <code>git bisect</code> si integra con alias e CI.</p><p>Capire il modello dati di Git aiuta a prevedere i risultati.</p>
    <h2>Opzioni comuni</h2>
    <table>
      <thead><tr><th>Sottocomando</th><th>Descrizione</th></tr></thead>
      <tbody>
        <tr><td><code>start</code></td><td>Inizia una sessione di bisect.</td></tr>
        <tr><td><code>good</code> / <code>bad</code></td><td>Marca il commit corrente (o specificato).</td></tr>
        <tr><td><code>skip</code></td><td>Marca un commit come non testabile.</td></tr>
        <tr><td><code>run &lt;cmd&gt;</code></td><td>Automatizza eseguendo un comando (exit 0 = good, non-zero = bad).</td></tr>
        <tr><td><code>reset</code></td><td>Termina la sessione e torna al branch originale.</td></tr>
        <tr><td><code>log</code></td><td>Mostra il log di bisect.</td></tr>
        <tr><td><code>visualize</code></td><td>Mostra i commit sospetti rimanenti.</td></tr>
      </tbody>
    </table>
    <h2>Esempi</h2>
    <pre><code>git bisect start
    git bisect bad HEAD
    git bisect good v1.5.0
    # Git fa checkout di un punto intermedio; testalo, poi:
    git bisect good   # oppure: git bisect bad

    git bisect run npm test
    # Completamente automatizzato: i codici di uscita di npm test guidano la ricerca

    git bisect reset
    # Torna al tuo branch originale</code></pre>
    <h2>Errori comuni</h2>
    <p>Dimenticare di fare <code>git bisect reset</code> ti lascia in uno stato detached HEAD. Marcare un commit come "good" quando il bug è intermittente porta bisect fuori strada — usa invece <code>skip</code>. Assicurati che il tuo script di test ritorni il codice di uscita 125 per segnalare "skip" se la build stessa è rotta a quel commit.</p>
    <h2>Comandi correlati</h2>
    <p><code>git log</code>, <code>git blame</code>, <code>git show</code>, <code>git checkout</code></p>

- source_title: "git grep — Search tracked files for a pattern"
  title: "git grep — Cerca un pattern nei file tracciati"
  langcode: it
  body: |
    <h2>Sinossi</h2>
    <pre><code>git grep [&lt;options&gt;] &lt;pattern&gt; [&lt;tree-ish&gt;...]</code></pre>
    <h2>Descrizione</h2>
    <p>Il comando <code>git grep</code> cerca file tracciati da Git per un pattern. È molto più veloce di <code>grep -r</code> su repository grandi perché cerca solo ciò che Git conosce (saltando <code>.git</code>, output di build e file ignorati) e usa il database degli oggetti ottimizzato di Git. Puoi anche cercare in qualsiasi revisione storica o tree, non solo nella copia di lavoro.</p>
    <p>I pattern possono essere stringhe semplici, regex base (default), regex estese (<code>-E</code>) o PCRE (<code>-P</code> se compilato). Usa <code>git grep</code> invece di <code>grep -r</code> in script che operano su repository Git.</p>
    <p>Nell'uso quotidiano, <code>git grep</code> si integra con alias e CI.</p><p>Capire il modello dati di Git aiuta a prevedere i risultati.</p>
    <h2>Opzioni comuni</h2>
    <table>
      <thead><tr><th>Opzione</th><th>Descrizione</th></tr></thead>
      <tbody>
        <tr><td><code>-i</code></td><td>Match case-insensitive.</td></tr>
        <tr><td><code>-n</code></td><td>Mostra numeri di riga.</td></tr>
        <tr><td><code>-l</code></td><td>Elenca solo i nomi dei file che fanno match.</td></tr>
        <tr><td><code>-E</code></td><td>Espressioni regolari estese.</td></tr>
        <tr><td><code>-P</code></td><td>Regex Perl-compatible.</td></tr>
        <tr><td><code>-w</code></td><td>Match parole intere.</td></tr>
        <tr><td><code>--cached</code></td><td>Cerca nell'index invece che nella working tree.</td></tr>
        <tr><td><code>--untracked</code></td><td>Cerca anche file untracked non ignorati.</td></tr>
      </tbody>
    </table>
    <h2>Esempi</h2>
    <pre><code>git grep "TODO"
    # Trova ogni TODO nei file tracciati

    git grep -n -i "deprecated" src/
    # Case-insensitive, con numeri di riga, sotto src/

    git grep "fooBar" v1.0.0
    # Cerca nel tree del tag v1.0.0

    git grep -E "^(import|from) " --and -e "json"
    # Pattern combinati: righe che iniziano con import/from che menzionano json</code></pre>
    <h2>Errori comuni</h2>
    <p>Dimenticare che <code>git grep</code> cerca solo file tracciati — i file appena aggiunti non appariranno a meno che siano in stage o tu passi <code>--untracked</code>. Le funzionalità PCRE (<code>\b</code>, lookbehind) richiedono Git compilato con supporto PCRE e il flag <code>-P</code>.</p>
    <h2>Comandi correlati</h2>
    <p><code>git log -S</code>, <code>git log -G</code>, <code>git ls-files</code>, <code>git show</code></p>

- source_title: "git shortlog — Summarize git log output"
  title: "git shortlog — Riassume l'output di git log"
  langcode: it
  body: |
    <h2>Sinossi</h2>
    <pre><code>git shortlog [-n] [-s] [-e] [&lt;revision-range&gt;]</code></pre>
    <h2>Descrizione</h2>
    <p>Il comando <code>git shortlog</code> raggruppa i commit per autore, producendo riassunti concisi adatti per note di rilascio, liste di contributori e veloci panoramiche "chi ha fatto cosa". Per default stampa il nome di ogni autore seguito dalle righe oggetto dei suoi commit nel range dato.</p>
    <p>Modalità comuni includono <code>-sn</code> (riassunto, ordinato per conteggio) per liste "top contributors" e <code>--no-merges</code> per ignorare i merge commit. Combinato con un range come <code>v1.0..v2.0</code>, shortlog è il modo più veloce per redigere i credit delle note di rilascio.</p>
    <p>Nell'uso quotidiano, <code>git shortlog</code> si integra con alias e CI.</p><p>Capire il modello dati di Git aiuta a prevedere i risultati.</p>
    <h2>Opzioni comuni</h2>
    <table>
      <thead><tr><th>Opzione</th><th>Descrizione</th></tr></thead>
      <tbody>
        <tr><td><code>-s</code>, <code>--summary</code></td><td>Mostra solo i conteggi per autore.</td></tr>
        <tr><td><code>-n</code>, <code>--numbered</code></td><td>Ordina autori per numero di commit.</td></tr>
        <tr><td><code>-e</code>, <code>--email</code></td><td>Include indirizzi email autore.</td></tr>
        <tr><td><code>--no-merges</code></td><td>Esclude merge commit.</td></tr>
        <tr><td><code>--group=&lt;type&gt;</code></td><td>Raggruppa per author, committer o trailer.</td></tr>
        <tr><td><code>-w[&lt;width&gt;]</code></td><td>Manda a capo le righe oggetto.</td></tr>
      </tbody>
    </table>
    <h2>Esempi</h2>
    <pre><code>git shortlog -sn
    # Top contributors di tutti i tempi, con conteggi

    git shortlog -sne v1.0..v2.0
    # Contributori tra due release, con email

    git shortlog --no-merges HEAD~50..HEAD
    # Oggetti raggruppati per autore per gli ultimi 50 commit

    git shortlog --group=trailer:co-authored-by
    # Raggruppa per trailer Co-authored-by</code></pre>
    <h2>Errori comuni</h2>
    <p>Identità di commit multiple per la stessa persona (email diverse, capitalizzazioni di nome diverse) gonfiano il conteggio dei contributori. Un file <code>.mailmap</code> alla radice del repo le canonicalizza. Dimenticare <code>--no-merges</code> può attribuire molti merge commit ai maintainer del progetto.</p>
    <h2>Comandi correlati</h2>
    <p><code>git log</code>, <code>git blame</code>, <code>git describe</code>, <code>git tag</code></p>

- source_title: "git describe — Describe a commit using the most recent reachable tag"
  title: "git describe — Descrivi un commit usando il tag raggiungibile più recente"
  langcode: it
  body: |
    <h2>Sinossi</h2>
    <pre><code>git describe [--tags] [--always] [--dirty] [&lt;commit&gt;]</code></pre>
    <h2>Descrizione</h2>
    <p>Il comando <code>git describe</code> produce un nome leggibile dall'uomo per un commit basato sul tag raggiungibile più recente. L'output appare come <code>v1.4.2-13-gabc1234</code>, che significa "13 commit dopo il tag v1.4.2, allo SHA abc1234". Se il commit è esattamente a un tag, viene stampato solo il nome del tag.</p>
    <p>I sistemi di build usano <code>git describe</code> per incorporare stringhe di versione nei binari. Con <code>--dirty</code>, l'output include un suffisso <code>-dirty</code> quando la working tree ha modifiche non committate — perfetto per marcare build di sviluppo.</p>
    <p>Nell'uso quotidiano, <code>git describe</code> si integra con alias e CI.</p><p>Capire il modello dati di Git aiuta a prevedere i risultati.</p>
    <h2>Opzioni comuni</h2>
    <table>
      <thead><tr><th>Opzione</th><th>Descrizione</th></tr></thead>
      <tbody>
        <tr><td><code>--tags</code></td><td>Usa anche tag lightweight oltre agli annotated.</td></tr>
        <tr><td><code>--always</code></td><td>Ricade su SHA abbreviato se nessun tag è raggiungibile.</td></tr>
        <tr><td><code>--dirty[=&lt;mark&gt;]</code></td><td>Aggiunge un marker se la working tree è sporca.</td></tr>
        <tr><td><code>--long</code></td><td>Mostra sempre il formato lungo, anche quando a un tag.</td></tr>
        <tr><td><code>--match &lt;pattern&gt;</code></td><td>Considera solo tag che corrispondono a un glob.</td></tr>
        <tr><td><code>--abbrev=&lt;n&gt;</code></td><td>Usa <code>n</code> cifre esadecimali per lo SHA.</td></tr>
        <tr><td><code>--contains</code></td><td>Mostra il primo tag che contiene il commit.</td></tr>
      </tbody>
    </table>
    <h2>Esempi</h2>
    <pre><code>git describe
    # es. v2.1.0-3-g1a2b3c4

    git describe --tags --dirty --always
    # Stringa di versione robusta per script di build

    git describe --match 'v[0-9]*'
    # Considera solo tag stile semver

    git describe --contains abc123
    # Trova la prima release che include un commit</code></pre>
    <h2>Errori comuni</h2>
    <p>Se il tuo repo ha solo tag lightweight (non annotated), <code>git describe</code> dice "fatal: No names found." Usa <code>--tags</code>. I clone shallow possono non avere tag raggiungibili affatto — scarica i tag esplicitamente con <code>git fetch --tags</code>.</p>
    <h2>Comandi correlati</h2>
    <p><code>git tag</code>, <code>git log</code>, <code>git rev-parse</code>, <code>git show</code></p>

- source_title: "git restore — Restore working tree files"
  title: "git restore — Ripristina i file della working tree"
  langcode: it
  body: |
    <h2>Sinossi</h2>
    <pre><code>git restore [--staged] [--source=&lt;tree&gt;] [-p] &lt;pathspec&gt;...</code></pre>
    <h2>Descrizione</h2>
    <p>Il comando <code>git restore</code>, introdotto in Git 2.23, sostituisce la metà di ripristino file di <code>git checkout</code>. È costruito apposta per due casi: scartare modifiche non in stage nella working tree (comportamento predefinito) e togliere modifiche dall'index (con <code>--staged</code>). La separazione più pulita rende lo strumento meno soggetto a errori di <code>git checkout</code>.</p>
    <p>Puoi ripristinare da qualsiasi sorgente: un altro commit, un branch o un tag. Combinato con <code>-p</code>, puoi scegliere interattivamente quali hunk ripristinare. <code>git restore</code> non modifica mai branch o HEAD — tocca solo i file.</p>
    <p>Nell'uso quotidiano, <code>git restore</code> si integra con alias e CI.</p><p>Capire il modello dati di Git aiuta a prevedere i risultati.</p>
    <h2>Opzioni comuni</h2>
    <table>
      <thead><tr><th>Opzione</th><th>Descrizione</th></tr></thead>
      <tbody>
        <tr><td><code>--staged</code></td><td>Ripristina l'index invece della working tree (cioè toglie dallo stage).</td></tr>
        <tr><td><code>--worktree</code></td><td>Ripristina la working tree (default).</td></tr>
        <tr><td><code>--source=&lt;tree&gt;</code> / <code>-s</code></td><td>Ripristina da un commit, branch o tag specifico.</td></tr>
        <tr><td><code>-p</code>, <code>--patch</code></td><td>Sceglie interattivamente gli hunk da ripristinare.</td></tr>
        <tr><td><code>--ours</code> / <code>--theirs</code></td><td>Durante un conflitto, ripristina un lato.</td></tr>
        <tr><td><code>-q</code>, <code>--quiet</code></td><td>Sopprime il progresso.</td></tr>
      </tbody>
    </table>
    <h2>Esempi</h2>
    <pre><code>git restore src/main.c
    # Scarta modifiche non in stage in main.c

    git restore --staged config.yml
    # Toglie dallo stage un file (mantieni le modifiche della working tree)

    git restore --source=HEAD~3 README.md
    # Riporta indietro README.md come era 3 commit fa

    git restore -p
    # Sceglie interattivamente gli hunk da scartare</code></pre>
    <h2>Errori comuni</h2>
    <p><code>git restore</code> su un file con modifiche non salvate le sovrascrive silenziosamente — non c'è prompt di conferma e nessun easy undo. Fai prima stash se incerto. I principianti a volte confondono <code>--staged</code> con <code>git reset --hard</code>; <code>--staged</code> tocca solo l'index, lasciando intatte le modifiche della working tree.</p>
    <h2>Comandi correlati</h2>
    <p><code>git reset</code>, <code>git checkout</code>, <code>git stash</code>, <code>git revert</code></p>

- source_title: "git reset — Reset current HEAD to a specified state"
  title: "git reset — Resetta l'HEAD corrente a uno stato specificato"
  langcode: it
  body: |
    <h2>Sinossi</h2>
    <pre><code>git reset [--soft | --mixed | --hard] [&lt;commit&gt;]
    git reset [&lt;commit&gt;] [--] &lt;pathspec&gt;...</code></pre>
    <h2>Descrizione</h2>
    <p>Il comando <code>git reset</code> sposta il puntatore del branch corrente a un commit specificato, opzionalmente aggiornando l'index e la working tree. Ha tre modalità principali: <code>--soft</code> (sposta solo HEAD), <code>--mixed</code> (default; resetta anche l'index) e <code>--hard</code> (resetta anche la working tree, scartando tutte le modifiche).</p>
    <p>Reset è uno dei comandi Git più potenti e più pericolosi. <code>git reset --hard</code> può perdere il lavoro permanentemente — anche se <code>git reflog</code> di solito permette il recupero entro la finestra del reflog. Con argomenti path, reset opera solo sull'index per quei path e non sposta mai HEAD.</p>
    <p>Nell'uso quotidiano, <code>git reset</code> si integra con alias e CI.</p><p>Capire il modello dati di Git aiuta a prevedere i risultati.</p>
    <h2>Opzioni comuni</h2>
    <table>
      <thead><tr><th>Opzione</th><th>Descrizione</th></tr></thead>
      <tbody>
        <tr><td><code>--soft</code></td><td>Sposta solo HEAD; index e working tree invariati.</td></tr>
        <tr><td><code>--mixed</code> (default)</td><td>Sposta HEAD e resetta l'index; working tree invariata.</td></tr>
        <tr><td><code>--hard</code></td><td>Sposta HEAD, resetta l'index e sovrascrive la working tree.</td></tr>
        <tr><td><code>--keep</code></td><td>Come <code>--hard</code>, ma aborta se modifiche locali andrebbero perse.</td></tr>
        <tr><td><code>--merge</code></td><td>Resetta l'index e aggiorna i file che differiscono tra HEAD e target, mantenendo i merge locali.</td></tr>
        <tr><td><code>-p</code></td><td>Seleziona interattivamente gli hunk da togliere dallo stage.</td></tr>
      </tbody>
    </table>
    <h2>Esempi</h2>
    <pre><code>git reset HEAD~1
    # Torna indietro di un commit; mantiene le modifiche nella working tree

    git reset --soft HEAD~3
    # Combina gli ultimi 3 commit in una singola modifica in stage

    git reset --hard origin/main
    # Scarta TUTTI i commit e modifiche locali (pericoloso)

    git reset HEAD config.yml
    # Toglie un singolo file dallo stage (sintassi più vecchia per git restore --staged)</code></pre>
    <h2>Errori comuni</h2>
    <p><code>git reset --hard</code> su un branch con commit non pushati li perde. Il reflog può salvarti entro ~90 giorni, ma solo se sai dove guardare. Confondere <code>git reset HEAD file</code> (toglie dallo stage) con <code>git reset --hard</code> (distrugge) è un classico errore da principiante. Git moderno fornisce <code>git restore --staged</code> come alternativa più chiara.</p>
    <h2>Comandi correlati</h2>
    <p><code>git restore</code>, <code>git revert</code>, <code>git reflog</code>, <code>git stash</code></p>

- source_title: "git revert — Create a new commit that undoes earlier commits"
  title: "git revert — Crea un nuovo commit che annulla commit precedenti"
  langcode: it
  body: |
    <h2>Sinossi</h2>
    <pre><code>git revert [-n] [-m &lt;parent&gt;] &lt;commit&gt;...</code></pre>
    <h2>Descrizione</h2>
    <p>Il comando <code>git revert</code> crea un nuovo commit le cui modifiche sono l'inverso di quelle di un commit precedente. A differenza di <code>git reset</code>, non riscrive la storia — aggiunge un nuovo commit che annulla uno o più vecchi. Questo rende revert sicuro da usare su branch condivisi: i collaboratori vedono un chiaro commit di "undo" piuttosto che storia riscritta.</p>
    <p>Per fare revert di un merge commit, usa <code>-m 1</code> (o qualunque numero di parent) per specificare la "mainline" — il parent la cui prospettiva dovrebbe essere preservata. Fare revert di più commit in un singolo comando li applica come una serie di nuovi commit.</p>
    <p>Nell'uso quotidiano, <code>git revert</code> si integra con alias e CI.</p><p>Capire il modello dati di Git aiuta a prevedere i risultati.</p>
    <h2>Opzioni comuni</h2>
    <table>
      <thead><tr><th>Opzione</th><th>Descrizione</th></tr></thead>
      <tbody>
        <tr><td><code>-n</code>, <code>--no-commit</code></td><td>Mette in stage le modifiche inverse senza committare.</td></tr>
        <tr><td><code>-m &lt;parent-number&gt;</code></td><td>Mainline parent per fare revert di un merge.</td></tr>
        <tr><td><code>--continue</code></td><td>Riprende dopo aver risolto i conflitti.</td></tr>
        <tr><td><code>--abort</code></td><td>Cancella un revert in corso.</td></tr>
        <tr><td><code>--skip</code></td><td>Salta il commit corrente e va avanti.</td></tr>
        <tr><td><code>-e</code>, <code>--edit</code></td><td>Modifica il messaggio del commit di revert.</td></tr>
      </tbody>
    </table>
    <h2>Esempi</h2>
    <pre><code>git revert HEAD
    # Annulla il commit più recente con un nuovo commit

    git revert abc123..def456
    # Fa revert di un range di commit

    git revert -m 1 merge-sha
    # Fa revert di un merge commit, mantenendo mainline

    git revert -n HEAD~2
    # Mette in stage un inverso senza committare ancora</code></pre>
    <h2>Errori comuni</h2>
    <p>Fare revert di un merge previene il futuro re-merging dello stesso branch a meno che non si faccia anche revert del revert. Pianifica di conseguenza quando fai revert di feature merge. I conflitti durante il revert richiedono <code>--continue</code> o <code>--abort</code>, proprio come rebase.</p>
    <h2>Comandi correlati</h2>
    <p><code>git reset</code>, <code>git restore</code>, <code>git cherry-pick</code>, <code>git log</code></p>

- source_title: "git clean — Remove untracked files from the working tree"
  title: "git clean — Rimuove file untracked dalla working tree"
  langcode: it
  body: |
    <h2>Sinossi</h2>
    <pre><code>git clean [-d] [-f] [-x | -X] [-n] [-i] [&lt;path&gt;...]</code></pre>
    <h2>Descrizione</h2>
    <p>Il comando <code>git clean</code> rimuove file untracked dalla working tree. Per default richiede <code>-f</code> (o <code>clean.requireForce = false</code>) come misura di sicurezza perché le cancellazioni sono irreversibili. Con <code>-d</code> rimuove anche directory untracked, e <code>-x</code> rimuove inoltre file normalmente ignorati (output di build, cache di dipendenze).</p>
    <p>Esegui sempre prima <code>git clean -n</code> per anteprima dei file che saranno cancellati. La modalità interattiva (<code>-i</code>) ti permette di confermare o filtrare la lista. <code>git clean</code> è lo strumento giusto per resettare un progetto a uno stato pulito, specialmente prima di debuggare problemi di build.</p>
    <p>Nell'uso quotidiano, <code>git clean</code> si integra con alias e CI.</p><p>Capire il modello dati di Git aiuta a prevedere i risultati.</p>
    <h2>Opzioni comuni</h2>
    <table>
      <thead><tr><th>Opzione</th><th>Descrizione</th></tr></thead>
      <tbody>
        <tr><td><code>-f</code>, <code>--force</code></td><td>Richiesto per cancellare effettivamente (a meno che la config non lo disabiliti).</td></tr>
        <tr><td><code>-n</code>, <code>--dry-run</code></td><td>Mostra cosa verrebbe cancellato, non cancella.</td></tr>
        <tr><td><code>-d</code></td><td>Rimuove anche directory untracked.</td></tr>
        <tr><td><code>-x</code></td><td>Rimuove anche file ignorati.</td></tr>
        <tr><td><code>-X</code></td><td>Rimuove solo file ignorati.</td></tr>
        <tr><td><code>-i</code>, <code>--interactive</code></td><td>Selezione interattiva.</td></tr>
        <tr><td><code>-e &lt;pattern&gt;</code></td><td>Esclude file che fanno match al pattern.</td></tr>
      </tbody>
    </table>
    <h2>Esempi</h2>
    <pre><code>git clean -nd
    # Anteprima di cosa verrebbe cancellato (incluse dir)

    git clean -fd
    # Cancella effettivamente file e directory untracked

    git clean -fdx
    # Più i file ignorati (reset completo a stato pulito)

    git clean -i
    # Interattivo: scegli cosa cancellare</code></pre>
    <h2>Errori comuni</h2>
    <p><code>git clean -fdx</code> cancella <code>node_modules</code>, artefatti di build, impostazioni dell'IDE e anche file <code>.env</code> se sono gitignored. Anteprima sempre con <code>-n</code> prima. Fai particolarmente attenzione nei submodule — clean opera per repository.</p>
    <h2>Comandi correlati</h2>
    <p><code>git status</code>, <code>git stash</code>, <code>git reset</code>, <code>git rm</code></p>

- source_title: "git stash — Save changes for later"
  title: "git stash — Salva modifiche per dopo"
  langcode: it
  body: |
    <h2>Sinossi</h2>
    <pre><code>git stash [push [-m &lt;msg&gt;] [-u]]
    git stash pop [&lt;stash&gt;]
    git stash list
    git stash drop [&lt;stash&gt;]</code></pre>
    <h2>Descrizione</h2>
    <p>Il comando <code>git stash</code> mette da parte modifiche non committate (sia in working tree che in index) e riporta la working tree a uno stato pulito. Le modifiche messe da parte sono memorizzate su uno stack che puoi riapplicare dopo. Stash è perfetto per situazioni come "devo cambiare branch ma il mio lavoro non è pronto da committare".</p>
    <p>Per default, i file untracked non vengono stashati; passa <code>-u</code> (o <code>--include-untracked</code>) per includerli, e <code>-a</code> per includere anche file ignorati. Ogni entry stash è un normale oggetto commit, indirizzabile come <code>stash@{0}</code>, <code>stash@{1}</code>, ecc.</p>
    <p>Nell'uso quotidiano, <code>git stash</code> si integra con alias e CI.</p><p>Capire il modello dati di Git aiuta a prevedere i risultati.</p>
    <h2>Opzioni comuni</h2>
    <table>
      <thead><tr><th>Opzione / Sottocomando</th><th>Descrizione</th></tr></thead>
      <tbody>
        <tr><td><code>push -m &lt;msg&gt;</code></td><td>Stash con un messaggio descrittivo.</td></tr>
        <tr><td><code>-u</code></td><td>Include file untracked.</td></tr>
        <tr><td><code>-a</code></td><td>Include anche file ignorati.</td></tr>
        <tr><td><code>list</code></td><td>Mostra tutte le entry stash.</td></tr>
        <tr><td><code>show [-p] &lt;stash&gt;</code></td><td>Visualizza contenuti di uno stash.</td></tr>
        <tr><td><code>pop</code> / <code>apply</code></td><td>Riapplica uno stash; pop lo cancella anche.</td></tr>
        <tr><td><code>drop &lt;stash&gt;</code></td><td>Cancella un'entry stash.</td></tr>
        <tr><td><code>branch &lt;name&gt;</code></td><td>Crea un branch da uno stash.</td></tr>
      </tbody>
    </table>
    <h2>Esempi</h2>
    <pre><code>git stash push -m "WIP: refactor parser"
    # Salva il lavoro corrente con un'etichetta

    git stash list
    # stash@{0}: On main: WIP: refactor parser

    git stash pop
    # Riapplica lo stash più recente e lo rimuove

    git stash branch temp-branch stash@{1}
    # Crea un nuovo branch da uno stash che confligge</code></pre>
    <h2>Errori comuni</h2>
    <p>Dimenticare che stash non include file untracked per default, poi perderli eseguendo <code>git clean</code>. Usa <code>-u</code>. Fare pop di uno stash che confligge può lasciare uno stato complicato — considera <code>apply</code> prima così che lo stash non venga cancellato se le cose vanno male. Stash di lunga durata si accumulano; rivedi con <code>git stash list</code> regolarmente.</p>
    <h2>Comandi correlati</h2>
    <p><code>git commit</code>, <code>git switch</code>, <code>git restore</code>, <code>git clean</code></p>

- source_title: "git apply — Apply a patch to files and/or to the index"
  title: "git apply — Applica una patch ai file e/o all'index"
  langcode: it
  body: |
    <h2>Sinossi</h2>
    <pre><code>git apply [--check] [--index] [--3way] &lt;patch&gt;...</code></pre>
    <h2>Descrizione</h2>
    <p>Il comando <code>git apply</code> applica un diff unificato (un file di patch) alla working tree, all'index o ad entrambi. A differenza di <code>git am</code>, che si aspetta una patch in formato mailbox completo con metadati di autore e messaggio, <code>git apply</code> applica solo il contenuto del diff. È utile per applicare patch ricevute via email, strumenti di code review o generate da <code>git diff</code>.</p>
    <p>Per default, <code>git apply</code> aggiorna solo la working tree. Usa <code>--index</code> per aggiornare anche la staging area, e <code>--3way</code> per ricadere su un merge a tre vie quando la patch non si applica pulitamente. Per verificare una patch senza applicarla, usa <code>--check</code>.</p>
    <p>Nell'uso quotidiano, <code>git apply</code> si integra con alias e CI.</p><p>Capire il modello dati di Git aiuta a prevedere i risultati.</p>
    <h2>Opzioni comuni</h2>
    <table>
      <thead><tr><th>Opzione</th><th>Descrizione</th></tr></thead>
      <tbody>
        <tr><td><code>--check</code></td><td>Testa se la patch si applica senza modificare nulla.</td></tr>
        <tr><td><code>--index</code></td><td>Applica a working tree e index.</td></tr>
        <tr><td><code>--cached</code></td><td>Applica solo all'index.</td></tr>
        <tr><td><code>--3way</code></td><td>Merge a tre vie se il contesto non corrisponde.</td></tr>
        <tr><td><code>--reverse</code> / <code>-R</code></td><td>Applica al contrario (decommitta una patch).</td></tr>
        <tr><td><code>--whitespace=&lt;action&gt;</code></td><td>Gestisce errori di whitespace (<code>warn</code>, <code>fix</code>, <code>error</code>).</td></tr>
        <tr><td><code>-p&lt;n&gt;</code></td><td>Strip <code>n</code> componenti del path dai nomi file.</td></tr>
      </tbody>
    </table>
    <h2>Esempi</h2>
    <pre><code>git apply changes.patch
    # Applica un file di patch alla working tree

    git apply --check feature.patch
    # Verifica che una patch si applichi pulitamente

    git apply --index --3way mr.diff
    # Applica con fallback merge a tre vie, anche all'index

    curl -L https://example.com/fix.patch | git apply
    # Pipe una patch direttamente da un URL</code></pre>
    <h2>Errori comuni</h2>
    <p>Se la patch è stata generata contro una base diversa, un semplice <code>git apply</code> fallisce con "patch does not apply." Aggiungere <code>--3way</code> spesso salva la giornata tentando un merge. Per patch che includono metadati di commit (autore, messaggio), usa invece <code>git am</code> così il commit viene ricreato fedelmente.</p>
    <h2>Comandi correlati</h2>
    <p><code>git am</code>, <code>git format-patch</code>, <code>git diff</code>, <code>git cherry-pick</code></p>

- source_title: "git tag — Create, list, and verify tags"
  title: "git tag — Crea, elenca e verifica i tag"
  langcode: it
  body: |
    <h2>Sinossi</h2>
    <pre><code>git tag [-a] [-s] [-m &lt;msg&gt;] &lt;name&gt; [&lt;commit&gt;]
    git tag -l ['&lt;pattern&gt;']
    git tag -d &lt;name&gt;</code></pre>
    <h2>Descrizione</h2>
    <p>Il comando <code>git tag</code> marca commit specifici con un nome memorizzabile, tipicamente usato per le release. Ci sono due tipi di tag: lightweight (solo un puntatore nominato) e annotated (un oggetto Git completo con autore, data, messaggio e firma GPG opzionale). Per le release, crea sempre tag annotated — portano i metadati che la gestione delle release richiede.</p>
    <p>I tag NON vengono pushati per default. Usa <code>git push origin v1.2.3</code> per pubblicare un singolo tag, o <code>git push --tags</code> per tutti. Una volta pubblicati, i tag sono normalmente immutabili; riscrivere un tag pubblicato rompe i consumatori ed è fortemente sconsigliato.</p>
    <p>Nell'uso quotidiano, <code>git tag</code> si integra con alias e CI.</p><p>Capire il modello dati di Git aiuta a prevedere i risultati.</p>
    <h2>Opzioni comuni</h2>
    <table>
      <thead><tr><th>Opzione</th><th>Descrizione</th></tr></thead>
      <tbody>
        <tr><td><code>-a</code></td><td>Crea un tag annotated.</td></tr>
        <tr><td><code>-s</code></td><td>Crea un tag annotated firmato GPG.</td></tr>
        <tr><td><code>-m &lt;msg&gt;</code></td><td>Imposta il messaggio del tag.</td></tr>
        <tr><td><code>-l '&lt;pattern&gt;'</code></td><td>Elenca tag che corrispondono a un glob.</td></tr>
        <tr><td><code>-d &lt;name&gt;</code></td><td>Cancella un tag locale.</td></tr>
        <tr><td><code>-v &lt;name&gt;</code></td><td>Verifica un tag firmato.</td></tr>
        <tr><td><code>-f</code></td><td>Sostituisce un tag esistente (usa con cautela).</td></tr>
        <tr><td><code>--sort=&lt;key&gt;</code></td><td>Ordina la lista (es. <code>-v:refname</code>).</td></tr>
      </tbody>
    </table>
    <h2>Esempi</h2>
    <pre><code>git tag -a v1.0.0 -m "Release 1.0"
    # Crea un tag annotated all'HEAD

    git tag -s v1.0.1 -m "Patch release" abc123
    # Tag firmato GPG a un commit specifico

    git tag -l 'v1.*' --sort=-v:refname
    # Elenca i tag 1.x dal più nuovo

    git push origin v1.0.0
    # Pubblica un tag</code></pre>
    <h2>Errori comuni</h2>
    <p>Creare un tag lightweight per una release perde metadati e firma. Usa <code>-a</code> o <code>-s</code>. Dimenticare <code>git push --tags</code> significa che i colleghi non vedono mai il tuo tag. Spostare un tag con <code>-f</code> dopo la pubblicazione confonde le cache e i sistemi CI.</p>
    <h2>Comandi correlati</h2>
    <p><code>git describe</code>, <code>git show</code>, <code>git push</code>, <code>git verify-tag</code></p>

- source_title: "git describe (versioning) — Use tags as the source of truth for versions"
  title: "git describe (versioning) — Usa i tag come fonte di verità per le versioni"
  langcode: it
  body: |
    <h2>Sinossi</h2>
    <pre><code>git describe --tags --dirty --always [--match 'v[0-9]*']</code></pre>
    <h2>Descrizione</h2>
    <p>Questa pagina copre <code>git describe</code> da un'angolatura di versioning: come progettare uno schema di tag che guida stringhe di versione di build riproducibili. L'output di <code>git describe</code> è ampiamente usato dai sistemi di build (Make, CMake, Cargo, script npm) per generare una stringa di versione che include un tag base più distanza e SHA.</p>
    <p>Il pattern raccomandato: usa tag annotated semver come <code>v1.2.3</code>; gli script di build chiamano <code>git describe --tags --dirty --always --match 'v[0-9]*'</code>; la stringa risultante viene incorporata nei binari tramite un header generato o costante. Questo produce versioni deterministiche che riflettono sia l'ultima release che qualsiasi lavoro non rilasciato da allora.</p>
    <p>Nell'uso quotidiano, <code>git describe (versioning)</code> si integra con alias e CI.</p><p>Capire il modello dati di Git aiuta a prevedere i risultati.</p>
    <h2>Opzioni comuni</h2>
    <table>
      <thead><tr><th>Opzione</th><th>Descrizione</th></tr></thead>
      <tbody>
        <tr><td><code>--tags</code></td><td>Usa anche tag lightweight oltre agli annotated.</td></tr>
        <tr><td><code>--dirty[=&lt;mark&gt;]</code></td><td>Aggiunge un marker se la tree è sporca.</td></tr>
        <tr><td><code>--always</code></td><td>Ricade su SHA abbreviato quando nessun tag è raggiungibile.</td></tr>
        <tr><td><code>--long</code></td><td>Forza il formato lungo anche a un tag.</td></tr>
        <tr><td><code>--match &lt;pattern&gt;</code></td><td>Restringe a tag corrispondenti a un pattern (es. esclude <code>nightly-*</code>).</td></tr>
        <tr><td><code>--exclude &lt;pattern&gt;</code></td><td>Esclude tag corrispondenti.</td></tr>
        <tr><td><code>--abbrev=&lt;n&gt;</code></td><td>Lunghezza dello SHA abbreviato.</td></tr>
      </tbody>
    </table>
    <h2>Esempi</h2>
    <pre><code># Genera una stringa di versione per una build
    VERSION=$(git describe --tags --dirty --always --match 'v[0-9]*')
    echo "${VERSION#v}" > VERSION

    # In un Makefile:
    VERSION := $(shell git describe --tags --dirty --always)
    CFLAGS += -DVERSION="\"$(VERSION)\""

    # Nello script prepublish di package.json:
    node -e "p=require('./package.json'); p.version=process.env.VERSION; require('fs').writeFileSync('package.json', JSON.stringify(p,null,2))"</code></pre>
    <h2>Errori comuni</h2>
    <p>Usare tag lightweight rompe <code>git describe</code> senza <code>--tags</code>. Includere tag di release candidate o nightly nel tuo pattern di match produce versioni rumorose per build stabili. I clone shallow CI possono non avere tag affatto — scaricali esplicitamente: <code>git fetch --tags --unshallow</code>.</p>
    <h2>Comandi correlati</h2>
    <p><code>git tag</code>, <code>git rev-parse</code>, <code>git for-each-ref</code>, <code>git log</code></p>

- source_title: "git cherry-pick — Apply changes from existing commits"
  title: "git cherry-pick — Applica modifiche da commit esistenti"
  langcode: it
  body: |
    <h2>Sinossi</h2>
    <pre><code>git cherry-pick [-n] [-x] [--continue] [--abort] &lt;commit&gt;...</code></pre>
    <h2>Descrizione</h2>
    <p>Il comando <code>git cherry-pick</code> applica le modifiche introdotte da uno o più commit esistenti sul branch corrente come nuovi commit. È lo strumento giusto quando hai bisogno di un singolo fix da un altro branch senza mergiare l'intero branch. I cherry-pick creano nuovi commit con nuovi SHA ma preservano l'autore originale e il messaggio.</p>
    <p>Cherry-picking può produrre conflitti come un merge. Usa <code>--continue</code> dopo aver risolto, o <code>--abort</code> per uscire. Il flag <code>-x</code> aggiunge una riga "(cherry picked from commit ...)" al messaggio — utile per la tracciabilità quando si portano fix tra branch di manutenzione.</p>
    <p>Nell'uso quotidiano, <code>git cherry-pick</code> si integra con alias e CI.</p><p>Capire il modello dati di Git aiuta a prevedere i risultati.</p>
    <h2>Opzioni comuni</h2>
    <table>
      <thead><tr><th>Opzione</th><th>Descrizione</th></tr></thead>
      <tbody>
        <tr><td><code>-n</code>, <code>--no-commit</code></td><td>Applica le modifiche ma non committa ancora.</td></tr>
        <tr><td><code>-x</code></td><td>Annota il messaggio di commit con lo SHA sorgente.</td></tr>
        <tr><td><code>-e</code>, <code>--edit</code></td><td>Modifica il messaggio di commit prima di committare.</td></tr>
        <tr><td><code>--continue</code></td><td>Riprende dopo aver risolto i conflitti.</td></tr>
        <tr><td><code>--abort</code></td><td>Cancella e ripristina lo stato precedente.</td></tr>
        <tr><td><code>--skip</code></td><td>Salta il commit corrente e continua.</td></tr>
        <tr><td><code>-m &lt;parent&gt;</code></td><td>Specifica mainline quando si fa cherry-pick di un merge commit.</td></tr>
        <tr><td><code>-S</code></td><td>Firma GPG i commit risultanti.</td></tr>
      </tbody>
    </table>
    <h2>Esempi</h2>
    <pre><code>git cherry-pick abc123
    # Applica un singolo commit sul branch corrente

    git cherry-pick -x abc123 def456
    # Applica due commit con annotazioni di tracciabilità

    git cherry-pick A..B
    # Fa pick di un range (esclusivo di A, inclusivo di B)

    git cherry-pick --continue
    # Continua dopo aver corretto i conflitti</code></pre>
    <h2>Errori comuni</h2>
    <p>Fare cherry-pick della stessa modifica ripetutamente può confondere i merge successivi, poiché commit identici hanno SHA diversi. Usa <code>git rerere</code> per ricordare le risoluzioni. Fare pick di un merge senza <code>-m</code> fallisce. Per lunghe sequenze, preferisci rebase o merge.</p>
    <h2>Comandi correlati</h2>
    <p><code>git rebase</code>, <code>git revert</code>, <code>git merge</code>, <code>git rerere</code></p>

- source_title: "git rebase -i — Interactive rebase to rewrite local history"
  title: "git rebase -i — Rebase interattivo per riscrivere la storia locale"
  langcode: it
  body: |
    <h2>Sinossi</h2>
    <pre><code>git rebase -i &lt;upstream&gt;
    git rebase -i --root</code></pre>
    <h2>Descrizione</h2>
    <p>Il rebase interattivo apre un editor con la lista dei commit da rebasare, ognuno preceduto da un'azione: <code>pick</code>, <code>reword</code>, <code>edit</code>, <code>squash</code>, <code>fixup</code>, <code>drop</code>, <code>exec</code> o <code>break</code>. Modificando questa lista, puoi riordinare, combinare, dividere o rimuovere commit prima che vadano upstream. È il cavallo di battaglia di "pulire la storia prima di pushare".</p>
    <p>Combinato con <code>--autosquash</code>, i commit fixup creati via <code>git commit --fixup</code> sono automaticamente disposti accanto ai loro target e marcati per lo squash. Il flag <code>--rebase-merges</code> preserva i merge commit durante il rebase interattivo.</p>
    <p>Nell'uso quotidiano, <code>git rebase -i</code> si integra con alias e CI.</p><p>Capire il modello dati di Git aiuta a prevedere i risultati.</p>
    <h2>Opzioni comuni</h2>
    <table>
      <thead><tr><th>Opzione</th><th>Descrizione</th></tr></thead>
      <tbody>
        <tr><td><code>-i</code></td><td>Editor interattivo per il piano di rebase.</td></tr>
        <tr><td><code>--autosquash</code></td><td>Auto-dispone commit fixup/squash.</td></tr>
        <tr><td><code>--root</code></td><td>Rebasa dal primissimo commit.</td></tr>
        <tr><td><code>-x &lt;cmd&gt;</code></td><td>Esegue un comando tra i commit (es. test).</td></tr>
        <tr><td><code>-r</code>, <code>--rebase-merges</code></td><td>Preserva i merge commit.</td></tr>
        <tr><td><code>--continue</code></td><td>Riprende dopo aver risolto.</td></tr>
        <tr><td><code>--abort</code></td><td>Cancella completamente.</td></tr>
      </tbody>
    </table>
    <h2>Esempi</h2>
    <pre><code>git rebase -i HEAD~5
    # Modifica gli ultimi 5 commit

    git commit --fixup abc123
    git rebase -i --autosquash abc123^
    # Aggiungi un fixup, poi auto-squash al rebase

    git rebase -i -x "npm test" main
    # Esegue test dopo ogni commit durante il rebase

    git rebase -i --root
    # Riscrive la storia dal primo commit</code></pre>
    <h2>Errori comuni</h2>
    <p>Salvare una lista todo di rebase vuota aborta l'operazione — lascia almeno una riga <code>pick</code>. Marcare troppi commit come <code>edit</code> crea una sequenza tediosa di stop; preferisci <code>squash</code> o <code>fixup</code> quando vuoi solo combinare. Non fare mai rebase interattivo di commit già pushati e condivisi.</p>
    <h2>Comandi correlati</h2>
    <p><code>git rebase</code>, <code>git commit --fixup</code>, <code>git cherry-pick</code>, <code>git reflog</code></p>

- source_title: "git filter-repo — Rewrite repository history at scale"
  title: "git filter-repo — Riscrive la storia del repository su larga scala"
  langcode: it
  body: |
    <h2>Sinossi</h2>
    <pre><code>git filter-repo --path &lt;path&gt; [--invert-paths]
    git filter-repo --replace-text &lt;file&gt;
    git filter-repo --strip-blobs-bigger-than 10M</code></pre>
    <h2>Descrizione</h2>
    <p>Lo strumento <code>git filter-repo</code> è il modo moderno e raccomandato per riscrivere la storia Git. Sostituisce il deprecato <code>git filter-branch</code>, che è lento e soggetto a errori. <code>filter-repo</code> può eliminare file grandi, rimuovere dati sensibili (credenziali committate per errore), ristrutturare path, riscrivere autori via mailmap o estrarre sottodirectory nel proprio repository.</p>
    <p>È distribuito separatamente dal Git core (tipicamente via <code>pip install git-filter-repo</code> o il tuo gestore di pacchetti). Le operazioni sono distruttive — lavora sempre su un clone fresco e coordinati con i collaboratori perché ogni SHA cambia.</p>
    <p>Nell'uso quotidiano, <code>git filter-repo</code> si integra con alias e CI.</p><p>Capire il modello dati di Git aiuta a prevedere i risultati.</p>
    <h2>Opzioni comuni</h2>
    <table>
      <thead><tr><th>Opzione</th><th>Descrizione</th></tr></thead>
      <tbody>
        <tr><td><code>--path &lt;p&gt;</code></td><td>Mantiene solo il path specificato.</td></tr>
        <tr><td><code>--invert-paths</code></td><td>Inverso: rimuove i path specificati.</td></tr>
        <tr><td><code>--path-glob &lt;g&gt;</code></td><td>Usa un pattern glob.</td></tr>
        <tr><td><code>--replace-text &lt;file&gt;</code></td><td>Sostituisce stringhe in tutta la storia.</td></tr>
        <tr><td><code>--strip-blobs-bigger-than &lt;size&gt;</code></td><td>Elimina blob grandi.</td></tr>
        <tr><td><code>--mailmap &lt;file&gt;</code></td><td>Riscrive info author/committer.</td></tr>
        <tr><td><code>--analyze</code></td><td>Produce un report sulla dimensione del repo prima della riscrittura.</td></tr>
        <tr><td><code>--force</code></td><td>Sovrascrive il controllo di sicurezza fresh-clone.</td></tr>
      </tbody>
    </table>
    <h2>Esempi</h2>
    <pre><code>git filter-repo --analyze
    # Ispeziona cosa sta consumando spazio

    git filter-repo --path docs/ --invert-paths
    # Rimuove docs/ da tutta la storia

    git filter-repo --strip-blobs-bigger-than 50M
    # Elimina qualsiasi file sopra 50 MB

    echo 'API_KEY==&gt;REDACTED' &gt; replacements.txt
    git filter-repo --replace-text replacements.txt
    # Cancella un segreto trapelato</code></pre>
    <h2>Errori comuni</h2>
    <p>Eseguire <code>filter-repo</code> nel tuo repo live senza un backup rischia di perdere dati. Clona sempre fresh. Dopo la riscrittura, fai force-push e fai re-clone ai collaboratori — chiunque abbia vecchi SHA otterrà conflitti. Lo strumento rimuove <code>origin</code> per default per prevenire push accidentali; aggiungilo di nuovo deliberatamente.</p>
    <h2>Comandi correlati</h2>
    <p><code>git filter-branch</code> (deprecato), <code>git gc</code>, <code>git reflog</code>, <code>git push --force-with-lease</code></p>

- source_title: "git worktree — Manage multiple working trees"
  title: "git worktree — Gestisce multiple working tree"
  langcode: it
  body: |
    <h2>Sinossi</h2>
    <pre><code>git worktree add &lt;path&gt; [&lt;branch&gt;]
    git worktree list
    git worktree remove &lt;path&gt;
    git worktree prune</code></pre>
    <h2>Descrizione</h2>
    <p>Il comando <code>git worktree</code> permette a un singolo repository di avere più working tree checkoutate simultaneamente, ognuna su un branch diverso. Questo è più veloce ed economico che clonare più volte: un solo database degli oggetti, ma checkout paralleli. I worktree sono perfetti per eseguire test su un branch di rilascio mentre si continua lo sviluppo su main, o per prendere un fix d'emergenza senza disturbare il lavoro in corso.</p>
    <p>Ogni worktree ha il proprio HEAD, index e file di lavoro, ma condivide gli oggetti e la config sottostanti. I worktree bloccati prevengono il pruning automatico di checkout montati altrove.</p>
    <p>Nell'uso quotidiano, <code>git worktree</code> si integra con alias e CI.</p><p>Capire il modello dati di Git aiuta a prevedere i risultati.</p>
    <h2>Opzioni comuni</h2>
    <table>
      <thead><tr><th>Sottocomando</th><th>Descrizione</th></tr></thead>
      <tbody>
        <tr><td><code>add &lt;path&gt; [&lt;branch&gt;]</code></td><td>Crea un nuovo worktree.</td></tr>
        <tr><td><code>add -b &lt;new&gt; &lt;path&gt; [&lt;start&gt;]</code></td><td>Crea nuovo branch + worktree in un passo.</td></tr>
        <tr><td><code>list</code></td><td>Mostra tutti i worktree.</td></tr>
        <tr><td><code>remove &lt;path&gt;</code></td><td>Cancella la directory e i metadati di un worktree.</td></tr>
        <tr><td><code>prune</code></td><td>Rimuove metadati per worktree il cui path è sparito.</td></tr>
        <tr><td><code>lock</code> / <code>unlock</code></td><td>Previene o permette il pruning.</td></tr>
        <tr><td><code>move &lt;old&gt; &lt;new&gt;</code></td><td>Rilocaliza un worktree.</td></tr>
      </tbody>
    </table>
    <h2>Esempi</h2>
    <pre><code>git worktree add ../project-hotfix release/1.4
    # Fa checkout di release/1.4 in una directory adiacente

    git worktree add -b experiment ../project-experiment
    # Crea un nuovo branch e worktree

    git worktree list
    # Visualizza tutti i worktree

    git worktree remove ../project-hotfix
    # Smonta quando finito</code></pre>
    <h2>Errori comuni</h2>
    <p>Non puoi avere lo stesso branch checkoutato in due worktree simultaneamente — Git rifiuta. Usa <code>--detach</code> se hai bisogno solo dei contenuti. Dimenticare di fare <code>worktree remove</code> lascia metadati stantii; <code>git worktree prune</code> pulisce.</p>
    <h2>Comandi correlati</h2>
    <p><code>git switch</code>, <code>git branch</code>, <code>git clone</code>, <code>git submodule</code></p>

- source_title: "git submodule — Manage nested Git repositories"
  title: "git submodule — Gestisce repository Git annidati"
  langcode: it
  body: |
    <h2>Sinossi</h2>
    <pre><code>git submodule add &lt;url&gt; &lt;path&gt;
    git submodule update --init --recursive
    git submodule foreach &lt;cmd&gt;</code></pre>
    <h2>Descrizione</h2>
    <p>Il comando <code>git submodule</code> incorpora un repository Git esterno dentro un altro a un commit fisso. Il repo padre registra l'URL del submodule e lo SHA esatto da cui fare checkout, disaccoppiando le storie di padre e figlio. Questo è utile per il vendoring di librerie condivise o per comporre sistemi multi-repo.</p>
    <p>I submodule sono potenti ma hanno una reputazione di confusione. Dopo aver clonato un progetto con submodule, devi eseguire <code>git submodule update --init --recursive</code> per popolarli. Aggiornare a un commit più recente del submodule è una danza in due passi: pull dentro il submodule, poi committa il nuovo SHA nel padre.</p>
    <p>Nell'uso quotidiano, <code>git submodule</code> si integra con alias e CI.</p><p>Capire il modello dati di Git aiuta a prevedere i risultati.</p>
    <h2>Opzioni comuni</h2>
    <table>
      <thead><tr><th>Sottocomando</th><th>Descrizione</th></tr></thead>
      <tbody>
        <tr><td><code>add &lt;url&gt; &lt;path&gt;</code></td><td>Aggiunge un nuovo submodule.</td></tr>
        <tr><td><code>init</code></td><td>Registra gli URL dei submodule in <code>.git/config</code>.</td></tr>
        <tr><td><code>update --init</code></td><td>Init e checkout dei submodule.</td></tr>
        <tr><td><code>update --recursive</code></td><td>Ricorre nei submodule annidati.</td></tr>
        <tr><td><code>update --remote</code></td><td>Aggiorna alla punta del branch upstream.</td></tr>
        <tr><td><code>foreach &lt;cmd&gt;</code></td><td>Esegue un comando in ogni submodule.</td></tr>
        <tr><td><code>deinit &lt;path&gt;</code></td><td>Rimuove un submodule dalla working tree.</td></tr>
      </tbody>
    </table>
    <h2>Esempi</h2>
    <pre><code>git submodule add https://github.com/lib/foo.git vendor/foo
    # Aggiunge un nuovo submodule a vendor/foo

    git clone --recurse-submodules https://github.com/me/parent.git
    # Clona con submodule in un passo

    git submodule update --init --recursive
    # Inizializza e popola tutti i submodule

    git submodule foreach 'git pull origin main'
    # Aggiorna ogni submodule alla punta del suo branch main</code></pre>
    <h2>Errori comuni</h2>
    <p>Dimenticare <code>--recurse-submodules</code> al clone lascia directory submodule vuote. Pushare il repo padre senza prima pushare le modifiche del submodule lascia un riferimento penzolante per i collaboratori. Molti team passano a <code>git subtree</code> o monorepo per sfuggire alla complessità dei submodule.</p>
    <h2>Comandi correlati</h2>
    <p><code>git subtree</code>, <code>git clone --recurse-submodules</code>, <code>git config submodule</code></p>

- source_title: "git subtree — Merge and split a project as a subdirectory"
  title: "git subtree — Mergia e divide un progetto come sottodirectory"
  langcode: it
  body: |
    <h2>Sinossi</h2>
    <pre><code>git subtree add --prefix=&lt;path&gt; &lt;repo&gt; &lt;ref&gt; [--squash]
    git subtree pull --prefix=&lt;path&gt; &lt;repo&gt; &lt;ref&gt;
    git subtree push --prefix=&lt;path&gt; &lt;repo&gt; &lt;ref&gt;
    git subtree split --prefix=&lt;path&gt; -b &lt;new-branch&gt;</code></pre>
    <h2>Descrizione</h2>
    <p>Il comando <code>git subtree</code> è un'alternativa ai submodule che mergia il contenuto di un altro progetto direttamente in una sottodirectory del tuo repo. A differenza dei submodule, i consumatori di subtree non hanno bisogno di passi speciali — i file sono semplicemente lì. Il costo è che la storia esterna viene incorporata nella tua.</p>
    <p>Le due operazioni principali sono <code>add</code> (importazione iniziale, spesso con <code>--squash</code> per appiattire la storia) e <code>pull</code> (porta dentro le modifiche upstream). Per mandare indietro le modifiche, <code>git subtree push</code> filtra i commit che toccano il prefisso e li pusha al repo upstream.</p>
    <p>Nell'uso quotidiano, <code>git subtree</code> si integra con alias e CI.</p><p>Capire il modello dati di Git aiuta a prevedere i risultati.</p>
    <h2>Opzioni comuni</h2>
    <table>
      <thead><tr><th>Sottocomando</th><th>Descrizione</th></tr></thead>
      <tbody>
        <tr><td><code>add</code></td><td>Importa un repo esterno in una sottodirectory.</td></tr>
        <tr><td><code>pull</code></td><td>Mergia modifiche upstream per quel prefisso.</td></tr>
        <tr><td><code>push</code></td><td>Pusha la storia solo del prefisso indietro upstream.</td></tr>
        <tr><td><code>merge</code></td><td>Mergia un tree arbitrario nel prefisso.</td></tr>
        <tr><td><code>split</code></td><td>Estrae la storia di una sottodirectory come branch standalone.</td></tr>
        <tr><td><code>--squash</code></td><td>Appiattisce la storia esterna in un singolo commit.</td></tr>
        <tr><td><code>--prefix=&lt;path&gt;</code></td><td>Sottodirectory sotto cui mettere il subtree.</td></tr>
      </tbody>
    </table>
    <h2>Esempi</h2>
    <pre><code>git subtree add --prefix=vendor/foo https://github.com/lib/foo.git main --squash
    # Importa foo in vendor/foo, squashando la storia

    git subtree pull --prefix=vendor/foo https://github.com/lib/foo.git main --squash
    # Pull degli aggiornamenti

    git subtree split --prefix=lib -b lib-only
    # Estrae lib/ come proprio branch per la condivisione

    git subtree push --prefix=vendor/foo upstream main
    # Manda commit limitati al prefisso indietro all'upstream</code></pre>
    <h2>Errori comuni</h2>
    <p>Mescolare <code>--squash</code> su alcune operazioni e non altre crea storia disordinata. Scegli una modalità e attieniti ad essa. I merge subtree producono grafi di commit non triviali che confondono alcuni strumenti. <code>git subtree split</code> può essere lento su storie grandi.</p>
    <h2>Comandi correlati</h2>
    <p><code>git submodule</code>, <code>git merge</code>, <code>git filter-repo</code></p>

- source_title: "git notes — Add or inspect commit notes"
  title: "git notes — Aggiunge o ispeziona note dei commit"
  langcode: it
  body: |
    <h2>Sinossi</h2>
    <pre><code>git notes add [-m &lt;msg&gt;] [&lt;commit&gt;]
    git notes show [&lt;commit&gt;]
    git notes append [-m &lt;msg&gt;] [&lt;commit&gt;]
    git notes remove [&lt;commit&gt;]</code></pre>
    <h2>Descrizione</h2>
    <p>Il comando <code>git notes</code> attacca metadati aggiuntivi ai commit senza riscriverli. Le note sono memorizzate nel proprio namespace di ref (<code>refs/notes/commits</code> per default) e sono visualizzate accanto ai commit in <code>git log</code>. Casi d'uso includono commenti di code review, stato build, link a ticket o sign-off aggiunti dopo il fatto.</p>
    <p>Le note non vengono pushate per default — devi esplicitamente <code>git push origin refs/notes/*</code>. Team diversi usano namespace diversi; i sistemi CI spesso scrivono a <code>refs/notes/ci</code> mentre i revisori usano <code>refs/notes/review</code>.</p>
    <p>Nell'uso quotidiano, <code>git notes</code> si integra con alias e CI.</p><p>Capire il modello dati di Git aiuta a prevedere i risultati.</p>
    <h2>Opzioni comuni</h2>
    <table>
      <thead><tr><th>Sottocomando</th><th>Descrizione</th></tr></thead>
      <tbody>
        <tr><td><code>add</code></td><td>Attacca una nuova nota a un commit.</td></tr>
        <tr><td><code>append</code></td><td>Aggiunge a una nota esistente.</td></tr>
        <tr><td><code>edit</code></td><td>Apre un editor sulla nota.</td></tr>
        <tr><td><code>show</code></td><td>Stampa la nota.</td></tr>
        <tr><td><code>remove</code></td><td>Cancella la nota.</td></tr>
        <tr><td><code>list</code></td><td>Elenca commit che hanno note.</td></tr>
        <tr><td><code>--ref &lt;ref&gt;</code></td><td>Usa un namespace di note diverso.</td></tr>
      </tbody>
    </table>
    <h2>Esempi</h2>
    <pre><code>git notes add -m "Reviewed by Alice" abc123
    # Attacca una nota di review

    git log --show-notes
    # Mostra le note in linea con il log

    git notes --ref=ci add -m "Build #42 passed" HEAD
    # Usa un namespace personalizzato

    git push origin 'refs/notes/*'
    # Pubblica le note al remote</code></pre>
    <h2>Errori comuni</h2>
    <p>Dimenticare di pushare e fetchare il ref delle note rende le note invisibili ai collaboratori. Configura <code>notes.displayRef = refs/notes/*</code> così tutti i namespace appaiono in <code>git log</code>. Le note non sopravvivono alle riscritture della storia a meno che non vengano migrate esplicitamente.</p>
    <h2>Comandi correlati</h2>
    <p><code>git log</code>, <code>git commit</code>, <code>git push</code>, <code>git fetch</code></p>

- source_title: "git archive — Create an archive of files from a named tree"
  title: "git archive — Crea un archivio di file da un tree nominato"
  langcode: it
  body: |
    <h2>Sinossi</h2>
    <pre><code>git archive [--format=&lt;fmt&gt;] [--prefix=&lt;p&gt;/] [-o &lt;file&gt;] &lt;tree-ish&gt; [&lt;path&gt;...]</code></pre>
    <h2>Descrizione</h2>
    <p>Il comando <code>git archive</code> crea un file tar o zip contenente i contenuti di qualsiasi tree (commit, tag o branch). A differenza di un semplice <code>tar</code> della working tree, include solo file tracciati a una specifica revisione ed esclude le directory <code>.git</code>. Questo lo rende ideale per produrre tarball di rilascio, distribuzioni sorgente e snapshot riproducibili.</p>
    <p>L'opzione <code>--prefix</code> avvolge tutti i file sotto una sottodirectory dentro l'archivio — importante per le release così che l'estrazione crei una cartella nominata. <code>git archive</code> supporta anche l'esecuzione su rete da server che lo permettono.</p>
    <p>Nell'uso quotidiano, <code>git archive</code> si integra con alias e CI.</p><p>Capire il modello dati di Git aiuta a prevedere i risultati.</p>
    <h2>Opzioni comuni</h2>
    <table>
      <thead><tr><th>Opzione</th><th>Descrizione</th></tr></thead>
      <tbody>
        <tr><td><code>--format=&lt;fmt&gt;</code></td><td>tar, tar.gz, zip (default tar).</td></tr>
        <tr><td><code>--prefix=&lt;p&gt;/</code></td><td>Antepone una directory a tutti i path nell'archivio.</td></tr>
        <tr><td><code>-o &lt;file&gt;</code></td><td>Scrive su file invece che su stdout.</td></tr>
        <tr><td><code>--remote=&lt;repo&gt;</code></td><td>Archivia da un repository remoto.</td></tr>
        <tr><td><code>--worktree-attributes</code></td><td>Onora gli attributi <code>export-ignore</code>.</td></tr>
        <tr><td><code>-l</code>, <code>--list</code></td><td>Elenca formati supportati.</td></tr>
      </tbody>
    </table>
    <h2>Esempi</h2>
    <pre><code>git archive --format=tar.gz --prefix=myproj-1.0/ -o myproj-1.0.tar.gz v1.0
    # Tarball di release con directory di top level nominata

    git archive HEAD docs/ | tar -x -C /tmp/docs
    # Estrae la directory docs/ all'HEAD in /tmp/docs

    git archive --format=zip -o snapshot.zip HEAD
    # Archivio ZIP del tree corrente</code></pre>
    <h2>Esempi (continua)</h2>
    <pre><code># Usa .gitattributes per escludere file dagli archivi:
    echo "tests/ export-ignore" &gt;&gt; .gitattributes
    echo ".github/ export-ignore" &gt;&gt; .gitattributes
    git archive --worktree-attributes -o release.tar.gz HEAD</code></pre>
    <h2>Errori comuni</h2>
    <p>Dimenticare <code>--prefix</code> crea un archivio che esplode i file nella directory corrente al momento dell'estrazione. Senza attributi <code>export-ignore</code>, il tuo archivio può includere config CI, test e file solo per dev che non intendevi spedire.</p>
    <h2>Comandi correlati</h2>
    <p><code>git bundle</code>, <code>git tag</code>, <code>git show</code>, <code>tar</code></p>

- source_title: "git bundle — Move objects and refs by archive"
  title: "git bundle — Sposta oggetti e ref tramite archivio"
  langcode: it
  body: |
    <h2>Sinossi</h2>
    <pre><code>git bundle create &lt;file&gt; &lt;git-rev-list-args&gt;
    git bundle verify &lt;file&gt;
    git bundle list-heads &lt;file&gt;
    git clone &lt;file&gt; &lt;dir&gt;</code></pre>
    <h2>Descrizione</h2>
    <p>Il comando <code>git bundle</code> impacchetta la storia Git in un singolo file che può essere trasferito senza rete — tramite chiavetta USB, email o qualsiasi trasporto file. Il destinatario può clonare o fare fetch dal bundle come se fosse un remote. Questo è prezioso per sistemi air-gapped, connessioni lente o come formato di backup.</p>
    <p>I bundle supportano aggiornamenti incrementali: includi un ref base così il bundle contiene solo commit da quel ref, poi fai applicare al destinatario sopra un repo esistente con <code>git fetch</code>.</p>
    <p>Nell'uso quotidiano, <code>git bundle</code> si integra con alias e CI.</p><p>Capire il modello dati di Git aiuta a prevedere i risultati.</p>
    <h2>Opzioni comuni</h2>
    <table>
      <thead><tr><th>Sottocomando</th><th>Descrizione</th></tr></thead>
      <tbody>
        <tr><td><code>create &lt;file&gt; &lt;refs&gt;</code></td><td>Crea un file bundle.</td></tr>
        <tr><td><code>verify &lt;file&gt;</code></td><td>Controlla che un bundle sia valido e applicabile.</td></tr>
        <tr><td><code>list-heads &lt;file&gt;</code></td><td>Elenca i ref che il bundle contiene.</td></tr>
        <tr><td><code>unbundle &lt;file&gt;</code></td><td>Plumbing: emette oggetti al repository.</td></tr>
        <tr><td><code>--all</code></td><td>Include tutti i ref.</td></tr>
        <tr><td><code>--progress</code></td><td>Mostra il progresso alla creazione.</td></tr>
      </tbody>
    </table>
    <h2>Esempi</h2>
    <pre><code>git bundle create repo.bundle --all
    # Backup completo di ogni ref

    git bundle create incremental.bundle main ^v2.0
    # Solo commit su main da v2.0

    git bundle verify repo.bundle
    # Verifica applicabilità prima di fetchare

    # Sul lato ricevente:
    git clone repo.bundle myproj
    # o, in un repo esistente:
    git fetch ../incremental.bundle main:main</code></pre>
    <h2>Errori comuni</h2>
    <p>Creare un bundle senza specificare una base significa che il destinatario ottiene la storia completa ogni volta, anche per piccoli aggiornamenti. Usa range come <code>--since</code> o <code>^&lt;ref&gt;</code> per bundle incrementali. <code>git bundle verify</code> contro un repo vuoto controlla solo la validità strutturale, non se i prerequisiti del bundle sono presenti.</p>
    <h2>Comandi correlati</h2>
    <p><code>git archive</code>, <code>git fetch</code>, <code>git clone</code>, <code>git pack-objects</code></p>

- source_title: "git reflog — Manage reference logs"
  title: "git reflog — Gestisce i log dei riferimenti"
  langcode: it
  body: |
    <h2>Sinossi</h2>
    <pre><code>git reflog [show] [&lt;ref&gt;]
    git reflog expire [--expire=&lt;time&gt;] [--all]
    git reflog delete &lt;entry&gt;</code></pre>
    <h2>Descrizione</h2>
    <p>Il comando <code>git reflog</code> mostra la storia di dove ogni ref (HEAD, branch) ha puntato localmente. Ogni movimento — commit, checkout, reset, rebase — viene loggato con timestamp e ragione. Il reflog è la tua rete di sicurezza: anche dopo un'operazione "distruttiva" come <code>git reset --hard</code>, lo stato precedente è recuperabile finché l'entry reflog sopravvive (tipicamente 90 giorni).</p>
    <p>I ref nel reflog sono indirizzabili come <code>HEAD@{2}</code> ("valore di HEAD 2 movimenti fa") o <code>HEAD@{2.hours.ago}</code>. Per recuperare un branch "perso", trova il suo vecchio SHA nel reflog e crea un nuovo branch da esso.</p>
    <p>Nell'uso quotidiano, <code>git reflog</code> si integra con alias e CI.</p><p>Capire il modello dati di Git aiuta a prevedere i risultati.</p>
    <h2>Opzioni comuni</h2>
    <table>
      <thead><tr><th>Opzione / Sottocomando</th><th>Descrizione</th></tr></thead>
      <tbody>
        <tr><td><code>show &lt;ref&gt;</code></td><td>Visualizza reflog per un ref (default HEAD).</td></tr>
        <tr><td><code>expire</code></td><td>Pota vecchie entry.</td></tr>
        <tr><td><code>--expire=&lt;time&gt;</code></td><td>Fa scadere entry più vecchie di questo.</td></tr>
        <tr><td><code>--expire-unreachable=&lt;time&gt;</code></td><td>Per commit irraggiungibili da qualsiasi ref.</td></tr>
        <tr><td><code>--all</code></td><td>Opera su ogni ref.</td></tr>
        <tr><td><code>delete &lt;entry&gt;</code></td><td>Rimuove una singola entry.</td></tr>
      </tbody>
    </table>
    <h2>Esempi</h2>
    <pre><code>git reflog
    # Movimenti recenti di HEAD

    git reflog show feature/api
    # Solo storia del feature branch

    git reset --hard HEAD@{1}
    # Recupera da un reset sbagliato tornando indietro di un movimento

    git reflog expire --expire=30.days --all
    # Riduci il reflog agli ultimi 30 giorni per ogni ref</code></pre>
    <h2>Errori comuni</h2>
    <p>I reflog sono SOLO LOCALI — fare fetch da un remote non include il loro reflog. Le entry reflog scadono alla fine; non affidarti ad essi per il recupero a lungo termine. Eseguire <code>git gc --prune=now</code> dopo aver fatto scadere il reflog può rimuovere permanentemente commit irraggiungibili.</p>
    <h2>Comandi correlati</h2>
    <p><code>git reset</code>, <code>git rebase</code>, <code>git fsck</code>, <code>git gc</code></p>

- source_title: "git rerere — Reuse recorded conflict resolutions"
  title: "git rerere — Riusa risoluzioni di conflitti registrate"
  langcode: it
  body: |
    <h2>Sinossi</h2>
    <pre><code>git config --global rerere.enabled true
    git rerere status
    git rerere diff
    git rerere clear</code></pre>
    <h2>Descrizione</h2>
    <p>Il comando <code>git rerere</code> (Reuse Recorded Resolution) registra come risolvi un conflitto la prima volta e riproduce la stessa risoluzione automaticamente la volta successiva che lo stesso conflitto appare. È prezioso quando feature branch di lunga durata sono ripetutamente mergiati o rebasati su una base in movimento — senza rerere, ri-risolvi gli stessi conflitti ogni volta.</p>
    <p>Rerere è opt-in. Abilitalo globalmente con <code>git config --global rerere.enabled true</code>. Una volta abilitato, ogni risoluzione di conflitto viene cachata, e Git applica automaticamente la risoluzione cachata sui futuri incontri della stessa pre-immagine di conflitto.</p>
    <p>Nell'uso quotidiano, <code>git rerere</code> si integra con alias e CI.</p><p>Capire il modello dati di Git aiuta a prevedere i risultati.</p>
    <h2>Opzioni comuni</h2>
    <table>
      <thead><tr><th>Sottocomando / Config</th><th>Descrizione</th></tr></thead>
      <tbody>
        <tr><td><code>rerere.enabled</code></td><td>Attiva la registrazione automatica.</td></tr>
        <tr><td><code>rerere.autoUpdate</code></td><td>Mette automaticamente in stage i file risolti.</td></tr>
        <tr><td><code>status</code></td><td>Mostra file con risoluzioni registrate.</td></tr>
        <tr><td><code>diff</code></td><td>Visualizza la risoluzione registrata.</td></tr>
        <tr><td><code>remaining</code></td><td>Mostra conflitti non ancora risolti.</td></tr>
        <tr><td><code>clear</code></td><td>Elimina tutte le risoluzioni registrate.</td></tr>
        <tr><td><code>forget &lt;path&gt;</code></td><td>Dimentica la risoluzione per un singolo path.</td></tr>
      </tbody>
    </table>
    <h2>Esempi</h2>
    <pre><code>git config --global rerere.enabled true
    git config --global rerere.autoUpdate true
    # Abilita per tutti i repo

    # Dopo aver risolto un conflitto durante merge o rebase, rerere ricorda.
    # La prossima volta che lo stesso conflitto appare, la risoluzione viene auto-applicata.

    git rerere status
    # Mostra file dove una risoluzione registrata è entrata in azione

    git rerere clear
    # Cancella il set registrato se diventa stantio</code></pre>
    <h2>Errori comuni</h2>
    <p>Rerere aiuta solo con conflitti identici. Lievi cambiamenti di contesto prevengono il riuso. Se una risoluzione registrata si rivela sbagliata, usa <code>git rerere forget &lt;path&gt;</code> per cancellarla prima di ri-risolvere. I dati rerere vivono in <code>.git/rr-cache/</code> e sono locali — non sono condivisi con i collaboratori.</p>
    <h2>Comandi correlati</h2>
    <p><code>git merge</code>, <code>git rebase</code>, <code>git mergetool</code>, <code>git config</code></p>

- source_title: "git range-diff — Compare two commit ranges"
  title: "git range-diff — Confronta due range di commit"
  langcode: it
  body: |
    <h2>Sinossi</h2>
    <pre><code>git range-diff &lt;range1&gt; &lt;range2&gt;
    git range-diff &lt;base&gt; &lt;rev1&gt; &lt;rev2&gt;</code></pre>
    <h2>Descrizione</h2>
    <p>Il comando <code>git range-diff</code> confronta due sequenze di commit (tipicamente un branch prima e dopo un rebase) e mostra cosa è cambiato tra di loro a livello di patch. Questo è molto più utile di un normale <code>git diff</code> per rivedere i rebase, perché abbina i commit corrispondenti e evidenzia solo le differenze sostanziali.</p>
    <p>Abbinalo con <code>--reroll-count</code> su <code>format-patch</code> per serie di patch upstream, o usalo localmente per verificare che un force-push abbia introdotto solo pulizia. L'output usa un formato personalizzato con <code>=</code> per commit invariati, <code>!</code> per modificati, <code>&lt;</code> e <code>&gt;</code> per mancanti o aggiunti.</p>
    <p>Nell'uso quotidiano, <code>git range-diff</code> si integra con alias e CI.</p><p>Capire il modello dati di Git aiuta a prevedere i risultati.</p>
    <h2>Opzioni comuni</h2>
    <table>
      <thead><tr><th>Opzione</th><th>Descrizione</th></tr></thead>
      <tbody>
        <tr><td><code>--no-color</code></td><td>Disabilita output a colori.</td></tr>
        <tr><td><code>--creation-factor=&lt;n&gt;</code></td><td>Regolabile per il matching di commit attraverso range.</td></tr>
        <tr><td><code>--dual-color</code></td><td>Colora sia diff interni che esterni.</td></tr>
        <tr><td><code>--no-patch</code></td><td>Mostra solo il riepilogo di matching, non le patch.</td></tr>
        <tr><td><code>--notes</code></td><td>Include git notes nel confronto.</td></tr>
      </tbody>
    </table>
    <h2>Esempi</h2>
    <pre><code>git range-diff main..feature@{1} main..feature
    # Confronta branch prima e dopo un rebase

    git range-diff origin/main feature.v1 feature.v2
    # Confronta due versioni di una serie di patch

    git range-diff @{u}..HEAD HEAD@{1}..HEAD
    # Confronta la punta corrente relativa-upstream con quella dell'ultima volta</code></pre>
    <h2>Errori comuni</h2>
    <p>Range-diff abbina i commit usando un'euristica; se fai molti piccoli riordinamenti, l'output può abbinare commit inaspettati. Regola <code>--creation-factor</code> se necessario. Non confondere range-diff con <code>git diff A..B</code> — rispondono a domande diverse.</p>
    <h2>Comandi correlati</h2>
    <p><code>git diff</code>, <code>git log</code>, <code>git rebase</code>, <code>git format-patch</code></p>

- source_title: "git stash (advanced) — Power-user stash workflows"
  title: "git stash (avanzato) — Workflow stash per utenti esperti"
  langcode: it
  body: |
    <h2>Sinossi</h2>
    <pre><code>git stash push -p -m &lt;msg&gt; -- &lt;pathspec&gt;
    git stash branch &lt;newbranch&gt; [&lt;stash&gt;]
    git stash create
    git stash store -m &lt;msg&gt; &lt;sha&gt;</code></pre>
    <h2>Descrizione</h2>
    <p>Oltre a <code>git stash push</code> e <code>git stash pop</code>, il macchinario stash offre potenti capacità per workflow avanzati. Puoi stashare path specifici, stashare hunk specifici con <code>-p</code>, ricreare un branch da uno stash che confligge con lo stato corrente, o anche creare un oggetto stash senza memorizzarlo nello stack (poi memorizzarlo dopo con un messaggio personalizzato).</p>
    <p>Internamente, ogni stash è un merge commit tra WIP-on-branch (la working tree) e index-on-branch (le modifiche in stage), con il parent che è la punta del branch. Questa struttura è ciò che permette a <code>stash branch</code> e <code>stash apply</code> di ricostruire lo stato esatto.</p>
    <p>Nell'uso quotidiano, <code>git stash (advanced)</code> si integra con alias e CI.</p><p>Capire il modello dati di Git aiuta a prevedere i risultati.</p>
    <h2>Opzioni comuni</h2>
    <table>
      <thead><tr><th>Sottocomando / Opzione</th><th>Descrizione</th></tr></thead>
      <tbody>
        <tr><td><code>push -p</code></td><td>Stash di hunk scelti interattivamente.</td></tr>
        <tr><td><code>push -- &lt;pathspec&gt;</code></td><td>Stash solo dei path specificati.</td></tr>
        <tr><td><code>--keep-index</code></td><td>Stash ma mantiene ciò che è già in stage.</td></tr>
        <tr><td><code>--no-keep-index</code></td><td>Resetta l'index allo stash (default).</td></tr>
        <tr><td><code>branch &lt;name&gt;</code></td><td>Ricrea lo stato su un branch fresco.</td></tr>
        <tr><td><code>create</code></td><td>Crea un commit stash ma non lo memorizza.</td></tr>
        <tr><td><code>store -m</code></td><td>Mette un commit esistente sullo stack.</td></tr>
      </tbody>
    </table>
    <h2>Esempi</h2>
    <pre><code>git stash push -p -m "WIP: solo modifiche di refactor" -- src/refactor/
    # Stash solo path specifici, interattivamente

    git stash --keep-index -m "Test pre-staged"
    # Verifica che le modifiche in stage passino i test, con WIP da parte

    git stash branch fix-from-stash stash@{2}
    # Risuscita uno stash che non si applica più pulitamente

    SHA=$(git stash create "checkpoint")
    git stash store -m "checkpoint manuale" "$SHA"
    # Creazione programmatica di stash</code></pre>
    <h2>Errori comuni</h2>
    <p>Fare stash durante un merge o rebase mescola gli stati e confonde lo stack. Evita. Stash di lunga durata sopravvivono al loro contesto — rivedi periodicamente. <code>--keep-index</code> è ottimo per verificare modifiche in stage, ma lo stash risultante include sia contenuto in stage che fuori, il che può sorprendere.</p>
    <h2>Comandi correlati</h2>
    <p><code>git stash</code>, <code>git commit --fixup</code>, <code>git worktree</code>, <code>git restore</code></p>

- source_title: "git config — Get and set repository or global options"
  title: "git config — Ottiene e imposta opzioni del repository o globali"
  langcode: it
  body: |
    <h2>Sinossi</h2>
    <pre><code>git config [--global | --system | --local] &lt;key&gt; [&lt;value&gt;]
    git config --list
    git config --edit</code></pre>
    <h2>Descrizione</h2>
    <p>Il comando <code>git config</code> legge e scrive la configurazione Git. Le impostazioni vivono in tre layer: a livello sistema (<code>/etc/gitconfig</code>), per utente (<code>~/.gitconfig</code> o <code>~/.config/git/config</code>) e per repository (<code>.git/config</code>). I layer più specifici sovrascrivono quelli più generali. Molti comportamenti Git — editor predefinito, comportamento di push, strumenti di merge, gestione dei terminatori di riga — sono regolati via config.</p>
    <p>Per i nuovi utenti, gli essenziali sono <code>user.name</code>, <code>user.email</code>, <code>init.defaultBranch</code> e <code>core.editor</code>. Gli utenti esperti costruiscono alias estesi, personalizzano colori e usano inclusioni condizionali per applicare impostazioni diverse per directory di progetto.</p>
    <p>Nell'uso quotidiano, <code>git config</code> si integra con alias e CI.</p><p>Capire il modello dati di Git aiuta a prevedere i risultati.</p>
    <h2>Opzioni comuni</h2>
    <table>
      <thead><tr><th>Opzione</th><th>Descrizione</th></tr></thead>
      <tbody>
        <tr><td><code>--global</code></td><td>Opera sulla config per utente.</td></tr>
        <tr><td><code>--system</code></td><td>Opera sulla config a livello sistema.</td></tr>
        <tr><td><code>--local</code></td><td>Opera sulla config del repo corrente (default se in un repo).</td></tr>
        <tr><td><code>--list</code></td><td>Mostra tutte le impostazioni.</td></tr>
        <tr><td><code>--edit</code></td><td>Apre la config scelta nel tuo editor.</td></tr>
        <tr><td><code>--unset</code></td><td>Rimuove un'impostazione.</td></tr>
        <tr><td><code>--add</code></td><td>Aggiunge un valore a una chiave multi-valore.</td></tr>
        <tr><td><code>--show-origin</code></td><td>Annota l'output con il file da cui viene ogni impostazione.</td></tr>
      </tbody>
    </table>
    <h2>Esempi</h2>
    <pre><code>git config --global user.name "Jane Smith"
    git config --global user.email "jane@example.com"
    # Identità per ogni repo

    git config --global init.defaultBranch main
    git config --global pull.rebase true
    git config --global core.editor "code --wait"
    # Default moderni sensati

    git config --global alias.lg "log --oneline --graph --decorate --all"
    # Alias personalizzato

    git config --list --show-origin
    # Audit di dove viene ogni impostazione</code></pre>
    <h2>Errori comuni</h2>
    <p>Impostare config globale che è destinata a essere locale (o viceversa) porta a comportamento confuso. Dimenticare di impostare <code>user.email</code> su una macchina fresca causa che ogni commit sia non attribuito. Usa inclusioni condizionali (<code>[includeIf "gitdir:~/work/"]</code>) per scambiare identità per directory.</p>
    <h2>Comandi correlati</h2>
    <p><code>git credential</code>, <code>git init</code>, <code>git remote</code></p>

- source_title: "git credential — Manage credentials"
  title: "git credential — Gestisce le credenziali"
  langcode: it
  body: |
    <h2>Sinossi</h2>
    <pre><code>git config --global credential.helper &lt;helper&gt;
    git credential fill
    git credential approve
    git credential reject</code></pre>
    <h2>Descrizione</h2>
    <p>Il macchinario <code>git credential</code> gestisce l'autenticazione per i remote HTTPS. Piuttosto che chiedere username e password ad ogni push, Git delega a un credential helper che memorizza le credenziali in sicurezza. Helper includono <code>cache</code> (in memoria per qualche minuto), <code>store</code> (file in chiaro), <code>osxkeychain</code> (macOS Keychain), <code>manager</code> (Git Credential Manager su Windows/macOS/Linux) e <code>libsecret</code> (Linux GNOME).</p>
    <p>Raramente chiami <code>git credential</code> direttamente — configuri un helper una volta e Git lo invoca trasparentemente. Le configurazioni moderne (specialmente con GitHub) usano token OAuth o personal access token protetti da 2FA memorizzati in un keyring di sistema.</p>
    <p>Nell'uso quotidiano, <code>git credential</code> si integra con alias e CI.</p><p>Capire il modello dati di Git aiuta a prevedere i risultati.</p>
    <h2>Opzioni comuni</h2>
    <table>
      <thead><tr><th>Sottocomando / Config</th><th>Descrizione</th></tr></thead>
      <tbody>
        <tr><td><code>credential.helper</code></td><td>Imposta il credential helper da usare.</td></tr>
        <tr><td><code>credential.useHttpPath</code></td><td>Include il path dell'URL nella chiave di lookup.</td></tr>
        <tr><td><code>fill</code></td><td>Plumbing: chiede agli helper le credenziali.</td></tr>
        <tr><td><code>approve</code> / <code>reject</code></td><td>Dice agli helper se un tentativo è riuscito o fallito.</td></tr>
        <tr><td><code>credential.&lt;url&gt;.helper</code></td><td>Helper specifico per URL.</td></tr>
        <tr><td><code>credential.helper "cache --timeout=3600"</code></td><td>Cache in memoria configurabile.</td></tr>
      </tbody>
    </table>
    <h2>Esempi</h2>
    <pre><code>git config --global credential.helper osxkeychain
    # macOS: memorizza credenziali in Keychain

    git config --global credential.helper manager
    # Cross-platform: Git Credential Manager

    git config --global credential.helper "cache --timeout=3600"
    # Cache per un'ora in memoria

    # Helper per host:
    git config --global credential.https://github.com.helper "!gh auth git-credential"
    # Usa la GitHub CLI come helper</code></pre>
    <h2>Errori comuni</h2>
    <p>L'helper <code>store</code> scrive testo in chiaro in <code>~/.git-credentials</code> — bene per VM usa-e-getta, pericoloso su macchine condivise. Evita le password completamente; usa personal access token o chiavi SSH per accesso in scrittura. Dopo aver ruotato un token, esegui <code>git credential reject</code> o pulisci la cache per forzare un refresh.</p>
    <h2>Comandi correlati</h2>
    <p><code>git config</code>, <code>git push</code>, <code>git fetch</code>, <code>ssh-agent</code></p>

- source_title: "git cat-file — Inspect Git objects"
  title: "git cat-file — Ispeziona oggetti Git"
  langcode: it
  body: |
    <h2>Sinossi</h2>
    <pre><code>git cat-file (-t | -s | -p | -e) &lt;object&gt;
    git cat-file --batch
    git cat-file --batch-check</code></pre>
    <h2>Descrizione</h2>
    <p>Il comando <code>git cat-file</code> è uno strumento plumbing che legge oggetti Git grezzi dal database degli oggetti. Può stampare il tipo di un oggetto (<code>blob</code>, <code>tree</code>, <code>commit</code>, <code>tag</code>), dimensione e contenuto. La modalità <code>--batch</code> permette agli script di passare molti nomi di oggetti su stdin e ricevere output strutturato, che è molto più veloce che invocare <code>cat-file</code> per oggetto.</p>
    <p>Nell'uso quotidiano, <code>git cat-file</code> si integra con alias e CI.</p><p>Capire il modello dati di Git aiuta a prevedere i risultati.</p>
    <h2>Quando usarlo</h2>
    <p>La maggior parte degli sviluppatori non ha mai bisogno di <code>git cat-file</code> direttamente — comandi porcelain come <code>git show</code>, <code>git log</code> e <code>git diff</code> lo avvolgono trasparentemente. Ricorri ad esso quando scrivi script che percorrono oggetti Git, debugghi corruzione del repository o impari come Git memorizza i dati internamente.</p>
    <h2>Opzioni comuni</h2>
    <table>
      <thead><tr><th>Opzione</th><th>Descrizione</th></tr></thead>
      <tbody>
        <tr><td><code>-t</code></td><td>Stampa il tipo di oggetto.</td></tr>
        <tr><td><code>-s</code></td><td>Stampa la dimensione dell'oggetto in byte.</td></tr>
        <tr><td><code>-p</code></td><td>Pretty-print dei contenuti in modo type-aware.</td></tr>
        <tr><td><code>-e</code></td><td>Esce zero se l'oggetto esiste.</td></tr>
        <tr><td><code>--batch</code></td><td>Stream <code>&lt;sha&gt; &lt;type&gt; &lt;size&gt; CRLF &lt;content&gt;</code> per ogni input.</td></tr>
        <tr><td><code>--batch-check</code></td><td>Come batch, ma solo righe header.</td></tr>
        <tr><td><code>--filters</code></td><td>Applica filtri smudge quando stampa blob.</td></tr>
      </tbody>
    </table>
    <h2>Esempi</h2>
    <pre><code>git cat-file -t HEAD
    # commit

    git cat-file -p HEAD
    # Mostra il messaggio di commit e gli SHA tree/parent

    git cat-file -p HEAD:src/main.c
    # Stampa il file come era a HEAD

    echo HEAD | git cat-file --batch-check
    # Ottiene type/size/SHA in formato leggibile da macchina</code></pre>
    <h2>Errori comuni</h2>
    <p>Passare uno SHA parziale che è ambiguo restituisce un errore — disambigualo con più caratteri. Dimenticare <code>-p</code> e usare <code>-t</code> non stampa i contenuti. La modalità <code>--batch</code> richiede gestione attenta del protocollo; rispetta l'header di dimensione per leggere il giusto numero di byte.</p>
    <h2>Comandi correlati</h2>
    <p><code>git show</code>, <code>git hash-object</code>, <code>git ls-tree</code>, <code>git rev-parse</code></p>

- source_title: "git hash-object — Compute or store a Git object"
  title: "git hash-object — Calcola o memorizza un oggetto Git"
  langcode: it
  body: |
    <h2>Sinossi</h2>
    <pre><code>git hash-object [-t &lt;type&gt;] [-w] [--stdin] [&lt;file&gt;...]</code></pre>
    <h2>Descrizione</h2>
    <p>Il comando <code>git hash-object</code> calcola lo SHA-1 (o SHA-256, in repo moderni) che Git assegnerebbe ai contenuti di un file. Con <code>-w</code>, scrive anche l'oggetto nel database degli oggetti, restituendo lo SHA. Questo è il meccanismo più di basso livello dietro <code>git add</code>: quel comando porcelain essenzialmente chiama <code>hash-object -w</code> e poi aggiorna l'index.</p>
    <p>Nell'uso quotidiano, <code>git hash-object</code> si integra con alias e CI.</p><p>Capire il modello dati di Git aiuta a prevedere i risultati.</p>
    <h2>Quando usarlo</h2>
    <p>Quasi mai ne hai bisogno direttamente. È più utile per script che sintetizzano contenuto nel database degli oggetti (importer, strumenti di migrazione), per debug controllando quale hash avrebbe un pezzo di contenuto, o per esplorazione educativa del modello content-addressable di Git.</p>
    <h2>Opzioni comuni</h2>
    <table>
      <thead><tr><th>Opzione</th><th>Descrizione</th></tr></thead>
      <tbody>
        <tr><td><code>-t &lt;type&gt;</code></td><td>Tipo di oggetto (default <code>blob</code>).</td></tr>
        <tr><td><code>-w</code></td><td>Scrive l'oggetto nel database.</td></tr>
        <tr><td><code>--stdin</code></td><td>Legge contenuto da standard input.</td></tr>
        <tr><td><code>--stdin-paths</code></td><td>Legge nomi file da stdin.</td></tr>
        <tr><td><code>--no-filters</code></td><td>Salta i filtri smudge/clean.</td></tr>
        <tr><td><code>--literally</code></td><td>Non valida il tipo di contenuto.</td></tr>
      </tbody>
    </table>
    <h2>Esempi</h2>
    <pre><code>git hash-object README.md
    # Stampa lo SHA che Git assegnerebbe

    echo "hello" | git hash-object --stdin
    # Hash di contenuto arbitrario

    git hash-object -w newfile.txt
    # Aggiunge il contenuto del file come blob nel DB degli oggetti

    find . -name '*.png' | git hash-object --stdin-paths
    # Calcolo batch di hash per molti file</code></pre>
    <h2>Errori comuni</h2>
    <p>Usare <code>-w</code> crea un blob dangling se non lo riferisci da un tree. <code>git gc</code> alla fine pota gli oggetti irraggiungibili. Hashare attraverso filtri (normalizzazione CRLF) produce SHA diversi dai byte grezzi — passa <code>--no-filters</code> per confrontare con hash grezzi da altri strumenti.</p>
    <h2>Comandi correlati</h2>
    <p><code>git add</code>, <code>git cat-file</code>, <code>git update-index</code>, <code>git write-tree</code></p>

- source_title: "git ls-tree — List the contents of a tree object"
  title: "git ls-tree — Elenca i contenuti di un oggetto tree"
  langcode: it
  body: |
    <h2>Sinossi</h2>
    <pre><code>git ls-tree [-r] [-d] [-l] [--name-only] &lt;tree-ish&gt; [&lt;path&gt;...]</code></pre>
    <h2>Descrizione</h2>
    <p>Il comando <code>git ls-tree</code> elenca le entry (mode, type, SHA, name) di un oggetto tree. Con <code>-r</code> ricorre nelle sottodirectory. È l'equivalente plumbing di <code>ls</code> su un tree Git. L'output è una entry per riga, adatto per pipe in altri strumenti.</p>
    <p>Nell'uso quotidiano, <code>git ls-tree</code> si integra con alias e CI.</p><p>Capire il modello dati di Git aiuta a prevedere i risultati.</p>
    <h2>Quando usarlo</h2>
    <p>La maggior parte degli sviluppatori ricorre a <code>git show &lt;rev&gt;:&lt;path&gt;</code> o <code>git ls-files</code> invece. <code>ls-tree</code> brilla negli script che hanno bisogno di informazioni esatte di mode/type/SHA, o quando si attraversa un tree di qualsiasi commit (non solo l'index di HEAD).</p>
    <h2>Opzioni comuni</h2>
    <table>
      <thead><tr><th>Opzione</th><th>Descrizione</th></tr></thead>
      <tbody>
        <tr><td><code>-r</code></td><td>Ricorre nei sottotree.</td></tr>
        <tr><td><code>-d</code></td><td>Mostra solo directory (tree).</td></tr>
        <tr><td><code>-l</code></td><td>Include la dimensione delle entry blob.</td></tr>
        <tr><td><code>--name-only</code></td><td>Mostra solo nomi file.</td></tr>
        <tr><td><code>-z</code></td><td>Output terminato da NUL per parsing sicuro.</td></tr>
        <tr><td><code>--full-tree</code></td><td>Non restringe per directory corrente.</td></tr>
      </tbody>
    </table>
    <h2>Esempi</h2>
    <pre><code>git ls-tree HEAD
    # Entry di top-level del tree di HEAD

    git ls-tree -r HEAD --name-only
    # Tutti i path di file all'HEAD

    git ls-tree -r -l v1.0 src/
    # Dimensioni e SHA per ogni file sotto src/ a v1.0

    git ls-tree HEAD -- 'docs/*.md'
    # Solo file markdown in docs/</code></pre>
    <h2>Errori comuni</h2>
    <p>Confondere path relativi alla working directory vs relativi alla root del repo. Usa <code>--full-tree</code> per output non ambiguo relativo alla root. Senza <code>-r</code>, viene mostrato un solo livello — facile perdere file annidati.</p>
    <h2>Comandi correlati</h2>
    <p><code>git ls-files</code>, <code>git show</code>, <code>git cat-file</code>, <code>git diff-tree</code></p>

- source_title: "git ls-files — Show information about files in the index and working tree"
  title: "git ls-files — Mostra informazioni sui file nell'index e nella working tree"
  langcode: it
  body: |
    <h2>Sinossi</h2>
    <pre><code>git ls-files [-c] [-d] [-m] [-o] [-i] [--exclude-standard]</code></pre>
    <h2>Descrizione</h2>
    <p>Il comando <code>git ls-files</code> elenca i file noti all'index di Git (e opzionalmente alla working tree). Supporta filtri: cached/staged, deleted, modified, others (untracked), ignored, unmerged e così via. È più veloce e preciso di <code>find</code> per "mostrami tutti i file tracciati".</p>
    <p>Nell'uso quotidiano, <code>git ls-files</code> si integra con alias e CI.</p><p>Capire il modello dati di Git aiuta a prevedere i risultati.</p>
    <h2>Quando usarlo</h2>
    <p>La maggior parte degli utenti invoca porcelain come <code>git status</code> o <code>git grep</code> piuttosto che <code>ls-files</code>. Ricorri ad esso negli script che operano su file tracciati (strumenti di lint, formattatori, script di sync) dove vuoi una lista pulita ignore-aware.</p>
    <h2>Opzioni comuni</h2>
    <table>
      <thead><tr><th>Opzione</th><th>Descrizione</th></tr></thead>
      <tbody>
        <tr><td><code>-c</code>, <code>--cached</code></td><td>Mostra file cachati (default).</td></tr>
        <tr><td><code>-d</code></td><td>Mostra file cancellati.</td></tr>
        <tr><td><code>-m</code></td><td>Mostra file modificati.</td></tr>
        <tr><td><code>-o</code></td><td>Mostra altri file (untracked).</td></tr>
        <tr><td><code>-i</code></td><td>Mostra file ignorati.</td></tr>
        <tr><td><code>--exclude-standard</code></td><td>Applica regole di ignore standard.</td></tr>
        <tr><td><code>-s</code>, <code>--stage</code></td><td>Mostra info di stage (per path non mergiati).</td></tr>
        <tr><td><code>-z</code></td><td>Output terminato da NUL.</td></tr>
      </tbody>
    </table>
    <h2>Esempi</h2>
    <pre><code>git ls-files
    # Ogni file tracciato

    git ls-files -o --exclude-standard
    # File untracked, non ignorati

    git ls-files -m
    # File tracciati modificati localmente

    git ls-files -s
    # Mostra mode, SHA e numero di stage per ogni entry</code></pre>
    <h2>Errori comuni</h2>
    <p>Dimenticare <code>--exclude-standard</code> quando elenchi file untracked ti sommerge di spazzatura ignorata. Combinare filtri può essere confuso — se passi sia <code>-c</code> che <code>-o</code>, il significato dipende dal contesto.</p>
    <h2>Comandi correlati</h2>
    <p><code>git status</code>, <code>git ls-tree</code>, <code>git update-index</code>, <code>git grep</code></p>

- source_title: "git rev-parse — Pick out and massage parameters"
  title: "git rev-parse — Estrae e manipola parametri"
  langcode: it
  body: |
    <h2>Sinossi</h2>
    <pre><code>git rev-parse [&lt;options&gt;] &lt;arg&gt;...</code></pre>
    <h2>Descrizione</h2>
    <p>Il comando <code>git rev-parse</code> risolve riferimenti e argomenti Git. Trasforma nomi simbolici (branch, tag, <code>HEAD~3</code>, <code>HEAD@{yesterday}</code>) in SHA di 40 caratteri, normalizza opzioni e risponde a domande introspettive sul repository corrente (path top-level, directory Git, se siamo in un worktree). È il coltellino svizzero dello scripting Git.</p>
    <p>Nell'uso quotidiano, <code>git rev-parse</code> si integra con alias e CI.</p><p>Capire il modello dati di Git aiuta a prevedere i risultati.</p>
    <h2>Quando usarlo</h2>
    <p>Vedrai <code>git rev-parse</code> in quasi ogni script shell che avvolge Git: per ottenere il nome del branch corrente, la root del repo o per validare che un argomento sia un commit valido. La maggior parte degli utenti non lo esegue direttamente quotidianamente, ma la conoscenza di esso migliora drasticamente la fluidità dello scripting Git.</p>
    <h2>Opzioni comuni</h2>
    <table>
      <thead><tr><th>Opzione</th><th>Descrizione</th></tr></thead>
      <tbody>
        <tr><td><code>--abbrev-ref</code></td><td>Stampa il nome ref corto (es. <code>main</code>, non <code>refs/heads/main</code>).</td></tr>
        <tr><td><code>--short</code></td><td>Output dello SHA abbreviato.</td></tr>
        <tr><td><code>--show-toplevel</code></td><td>Stampa il path assoluto della root del repo.</td></tr>
        <tr><td><code>--git-dir</code></td><td>Stampa il path assoluto di <code>.git</code>.</td></tr>
        <tr><td><code>--is-inside-work-tree</code></td><td>Risposta sì/no script-friendly.</td></tr>
        <tr><td><code>--verify</code></td><td>Valida che l'argomento sia un ref reale.</td></tr>
        <tr><td><code>--quiet</code></td><td>Sopprime l'output di errore.</td></tr>
      </tbody>
    </table>
    <h2>Esempi</h2>
    <pre><code>git rev-parse HEAD
    # SHA completo del commit corrente

    git rev-parse --abbrev-ref HEAD
    # Nome del branch corrente (o "HEAD" se detached)

    git rev-parse --show-toplevel
    # Path alla root del repo, utile negli script

    git rev-parse --verify origin/main &gt;/dev/null && echo OK
    # Testa se un ref esiste</code></pre>
    <h2>Errori comuni</h2>
    <p>Usare <code>git rev-parse</code> su input utente senza <code>--verify</code> può riuscire per argomenti ambigui e produrre risultati sorprendenti. Nei subshell, <code>--show-toplevel</code> è un'ancora più affidabile di <code>$PWD</code>.</p>
    <h2>Comandi correlati</h2>
    <p><code>git symbolic-ref</code>, <code>git rev-list</code>, <code>git for-each-ref</code>, <code>git config</code></p>

- source_title: "git rev-list — List commit objects in reverse chronological order"
  title: "git rev-list — Elenca oggetti commit in ordine cronologico inverso"
  langcode: it
  body: |
    <h2>Sinossi</h2>
    <pre><code>git rev-list [&lt;options&gt;] &lt;commit&gt;...</code></pre>
    <h2>Descrizione</h2>
    <p>Il comando <code>git rev-list</code> emette gli SHA dei commit raggiungibili da uno o più punti di partenza, opzionalmente escludendo altri. È il cavallo di battaglia dietro <code>git log</code>, <code>git bisect</code> e molti altri comandi. Con i suoi molti filtri, può rispondere a "quanti commit tra A e B", "lo SHA della merge base", "tutti i commit non su main", e così via.</p>
    <p>Nell'uso quotidiano, <code>git rev-list</code> si integra con alias e CI.</p><p>Capire il modello dati di Git aiuta a prevedere i risultati.</p>
    <h2>Quando usarlo</h2>
    <p>Utenti esperti e toolsmith usano <code>rev-list</code> negli script. Gli sviluppatori quotidiani usano <code>git log</code>, che è costruito sopra <code>rev-list</code> ma produce output user-friendly.</p>
    <h2>Opzioni comuni</h2>
    <table>
      <thead><tr><th>Opzione</th><th>Descrizione</th></tr></thead>
      <tbody>
        <tr><td><code>--count</code></td><td>Stampa solo il numero di commit.</td></tr>
        <tr><td><code>--max-count=&lt;n&gt;</code></td><td>Limita quanti commit elencare.</td></tr>
        <tr><td><code>--reverse</code></td><td>Output dal più vecchio al più nuovo.</td></tr>
        <tr><td><code>--no-merges</code></td><td>Esclude merge commit.</td></tr>
        <tr><td><code>--first-parent</code></td><td>Segue solo il primo parent di ogni merge.</td></tr>
        <tr><td><code>--ancestry-path</code></td><td>Restringe a commit tra due endpoint.</td></tr>
        <tr><td><code>--all</code></td><td>Include ogni ref come punto di partenza.</td></tr>
      </tbody>
    </table>
    <h2>Esempi</h2>
    <pre><code>git rev-list --count HEAD
    # Numero totale di commit raggiungibili da HEAD

    git rev-list main..feature
    # SHA unici a feature

    git rev-list --no-merges --since="1 month ago" main
    # Commit non merge nell'ultimo mese

    git rev-list --max-parents=0 HEAD
    # Trova commit root (senza parent)</code></pre>
    <h2>Errori comuni</h2>
    <p>Dimenticare che i range con due punti escludono i commit raggiungibili dal lato sinistro. <code>--first-parent</code> cambia significativamente il significato di "antenato". Su repo enormi, rev-list illimitato può essere lento — abbinalo con <code>--max-count</code> o filtri di path.</p>
    <h2>Comandi correlati</h2>
    <p><code>git log</code>, <code>git rev-parse</code>, <code>git merge-base</code>, <code>git bisect</code></p>

- source_title: "git for-each-ref — Output information on each ref"
  title: "git for-each-ref — Output di informazioni su ogni ref"
  langcode: it
  body: |
    <h2>Sinossi</h2>
    <pre><code>git for-each-ref [--format=&lt;fmt&gt;] [--sort=&lt;key&gt;] [&lt;pattern&gt;...]</code></pre>
    <h2>Descrizione</h2>
    <p>Il comando <code>git for-each-ref</code> itera su ogni ref (branch, tag, remote, note, stash) e applica un formato personalizzabile. È molto più potente che parsare l'output di <code>git branch</code> o <code>git tag</code>: puoi ordinare per versione, per data o per qualsiasi campo, e produrre output stabile leggibile da macchina.</p>
    <p>Nell'uso quotidiano, <code>git for-each-ref</code> si integra con alias e CI.</p><p>Capire il modello dati di Git aiuta a prevedere i risultati.</p>
    <h2>Quando usarlo</h2>
    <p>Ricorri a <code>for-each-ref</code> negli script che hanno bisogno di metadati ref dettagliati: build di selettori di versione, dashboard di età dei branch, pulizia automatizzata di branch obsoleti o generatori di note di rilascio.</p>
    <h2>Opzioni comuni</h2>
    <table>
      <thead><tr><th>Opzione</th><th>Descrizione</th></tr></thead>
      <tbody>
        <tr><td><code>--format=&lt;fmt&gt;</code></td><td>Stringa di formato con segnaposto di campo.</td></tr>
        <tr><td><code>--sort=&lt;key&gt;</code></td><td>Ordina per campo (prefisso <code>-</code> per discendente).</td></tr>
        <tr><td><code>--count=&lt;n&gt;</code></td><td>Limita il numero di entry.</td></tr>
        <tr><td><code>--contains &lt;commit&gt;</code></td><td>Ref contenenti il commit dato.</td></tr>
        <tr><td><code>--merged &lt;commit&gt;</code></td><td>Ref mergiati nel commit dato.</td></tr>
        <tr><td><code>--points-at &lt;commit&gt;</code></td><td>Ref che puntano direttamente a un commit.</td></tr>
      </tbody>
    </table>
    <h2>Esempi</h2>
    <pre><code>git for-each-ref --format='%(refname:short) %(objectname:short)' refs/heads/
    # Nomi branch locali con SHA abbreviati

    git for-each-ref --sort=-committerdate --count=10 \
      --format='%(committerdate:short) %(refname:short)' refs/heads/
    # Top 10 branch aggiornati più di recente

    git for-each-ref --sort=-v:refname --format='%(refname:short)' refs/tags/ | head -5
    # Cinque tag semver più alti</code></pre>
    <h2>Errori comuni</h2>
    <p>Dimenticare lo slash finale su pattern <code>refs/heads/</code> può fare match a ref non intenzionali. Le stringhe di formato possono essere complicate — quota i nomi dei campi tra parentesi. <code>--sort=v:refname</code> funziona solo su tag che assomigliano a versioni.</p>
    <h2>Comandi correlati</h2>
    <p><code>git branch</code>, <code>git tag</code>, <code>git ls-remote</code>, <code>git rev-parse</code></p>

- source_title: "git update-ref — Update the object name stored in a ref safely"
  title: "git update-ref — Aggiorna in sicurezza il nome dell'oggetto memorizzato in un ref"
  langcode: it
  body: |
    <h2>Sinossi</h2>
    <pre><code>git update-ref [-d] [--create-reflog] &lt;ref&gt; &lt;newvalue&gt; [&lt;oldvalue&gt;]</code></pre>
    <h2>Descrizione</h2>
    <p>Il comando <code>git update-ref</code> scrive un nuovo SHA in un ref atomicamente. Con un valore vecchio atteso opzionale, fornisce semantica compare-and-swap per sicurezza. È ciò che i comandi porcelain come <code>git commit</code> e <code>git branch</code> usano sotto il cofano, e ciò che gli script che manipolano ref direttamente dovrebbero usare invece di modificare file in <code>.git/refs/</code>.</p>
    <p>Nell'uso quotidiano, <code>git update-ref</code> si integra con alias e CI.</p><p>Capire il modello dati di Git aiuta a prevedere i risultati.</p>
    <h2>Quando usarlo</h2>
    <p>La maggior parte degli sviluppatori non ne ha mai bisogno. Usalo quando scrivi automazione che crea, sposta o cancella ref in namespace personalizzati (note, replace, sistemi custom), o quando un comando porcelain non è appropriato (es. creare un ref che punta a un tree arbitrario).</p>
    <h2>Opzioni comuni</h2>
    <table>
      <thead><tr><th>Opzione</th><th>Descrizione</th></tr></thead>
      <tbody>
        <tr><td><code>-d &lt;ref&gt; [&lt;oldvalue&gt;]</code></td><td>Cancella un ref (opzionalmente compare-and-swap).</td></tr>
        <tr><td><code>--no-deref</code></td><td>Non segue ref simbolici.</td></tr>
        <tr><td><code>--create-reflog</code></td><td>Crea un reflog se mancante.</td></tr>
        <tr><td><code>-m &lt;reason&gt;</code></td><td>Ragione del reflog per questo aggiornamento.</td></tr>
        <tr><td><code>--stdin</code></td><td>Legge aggiornamenti da stdin (batch atomico).</td></tr>
      </tbody>
    </table>
    <h2>Esempi</h2>
    <pre><code>git update-ref refs/heads/feature abc123
    # Sposta il branch feature al commit abc123

    git update-ref -d refs/heads/old-experiment
    # Cancella un ref di branch direttamente

    git update-ref refs/notes/ci HEAD def456
    # Sposta un ref di note personalizzato atomicamente

    # Aggiornamento atomico multi-ref via stdin:
    printf 'update refs/heads/main %s\nupdate refs/heads/dev %s\n' "$NEW1" "$NEW2" | \
      git update-ref --stdin</code></pre>
    <h2>Errori comuni</h2>
    <p>Bypassare la sicurezza modificando direttamente i file <code>.git/refs/</code> può corrompere ref impacchettati o saltare entry reflog. Usa sempre <code>update-ref</code>. Dimenticare di fornire <code>&lt;oldvalue&gt;</code> annulla la protezione compare-and-swap — fornisciti quando puoi.</p>
    <h2>Comandi correlati</h2>
    <p><code>git symbolic-ref</code>, <code>git pack-refs</code>, <code>git for-each-ref</code>, <code>git branch</code></p>

- source_title: "git symbolic-ref — Read, modify, and delete symbolic refs"
  title: "git symbolic-ref — Legge, modifica e cancella ref simbolici"
  langcode: it
  body: |
    <h2>Sinossi</h2>
    <pre><code>git symbolic-ref [--short] &lt;name&gt; [&lt;ref&gt;]
    git symbolic-ref --delete &lt;name&gt;</code></pre>
    <h2>Descrizione</h2>
    <p>Il comando <code>git symbolic-ref</code> manipola i ref simbolici — ref che puntano a un altro ref invece di un commit. L'esempio più familiare è HEAD: quando sei sul branch <code>main</code>, HEAD è un ref simbolico che punta a <code>refs/heads/main</code>. Altri esempi includono l'indicatore di branch predefinito sui remote (<code>refs/remotes/origin/HEAD</code>).</p>
    <p>Nell'uso quotidiano, <code>git symbolic-ref</code> si integra con alias e CI.</p><p>Capire il modello dati di Git aiuta a prevedere i risultati.</p>
    <h2>Quando usarlo</h2>
    <p>Usalo quando devi cambiare HEAD senza toccare la working tree (es. durante una migrazione personalizzata) o quando script attorno al concetto di branch predefinito. La maggior parte degli utenti legge solo i ref simbolici via <code>git rev-parse --abbrev-ref HEAD</code>.</p>
    <h2>Opzioni comuni</h2>
    <table>
      <thead><tr><th>Opzione</th><th>Descrizione</th></tr></thead>
      <tbody>
        <tr><td><code>--short</code></td><td>Stampa il nome corto (es. <code>main</code>).</td></tr>
        <tr><td><code>--delete</code></td><td>Cancella il ref simbolico.</td></tr>
        <tr><td><code>--quiet</code></td><td>Non stampa errore se il ref manca.</td></tr>
        <tr><td><code>-m &lt;reason&gt;</code></td><td>Ragione del reflog per i cambiamenti.</td></tr>
      </tbody>
    </table>
    <h2>Esempi</h2>
    <pre><code>git symbolic-ref HEAD
    # refs/heads/main

    git symbolic-ref --short HEAD
    # main

    git symbolic-ref refs/remotes/origin/HEAD refs/remotes/origin/main
    # Imposta l'indicatore di branch predefinito su origin

    git symbolic-ref HEAD refs/heads/develop
    # Cambia HEAD senza toccare la working tree (avanzato!)</code></pre>
    <h2>Errori comuni</h2>
    <p>Cambiare HEAD via <code>symbolic-ref</code> non aggiorna la working tree — i file non cambieranno. Usa <code>git switch</code> per il caso quotidiano. Impostare <code>origin/HEAD</code> in modo errato confonde gli strumenti che cercano il branch predefinito.</p>
    <h2>Comandi correlati</h2>
    <p><code>git update-ref</code>, <code>git switch</code>, <code>git rev-parse</code>, <code>git remote set-head</code></p>

- source_title: "git pack-objects — Create a packed archive of objects"
  title: "git pack-objects — Crea un archivio packed di oggetti"
  langcode: it
  body: |
    <h2>Sinossi</h2>
    <pre><code>git pack-objects [--stdout] [--all] &lt;base-name&gt; &lt; &lt;object-list&gt;</code></pre>
    <h2>Descrizione</h2>
    <p>Il comando <code>git pack-objects</code> comprime un set di oggetti in un singolo packfile, applicando compressione delta a oggetti simili. I pack sono come Git memorizza gli oggetti efficientemente su disco e in rete — ogni fetch e push trasferisce pack.</p>
    <p>Nell'uso quotidiano, <code>git pack-objects</code> si integra con alias e CI.</p><p>Capire il modello dati di Git aiuta a prevedere i risultati.</p>
    <h2>Quando usarlo</h2>
    <p>Quasi mai lo invochi direttamente. <code>git gc</code>, <code>git repack</code> e il protocollo di rete lo guidano per te. Ricorri ad esso manualmente quando implementi trasporto personalizzato, ottimizzi lo storage o sperimenti con strategie delta.</p>
    <h2>Opzioni comuni</h2>
    <table>
      <thead><tr><th>Opzione</th><th>Descrizione</th></tr></thead>
      <tbody>
        <tr><td><code>--stdout</code></td><td>Scrive il pack su stdout invece che su file.</td></tr>
        <tr><td><code>--all</code></td><td>Impacchetta tutto raggiungibile da qualsiasi ref.</td></tr>
        <tr><td><code>--revs</code></td><td>Legge revisioni da stdin invece di SHA di oggetti.</td></tr>
        <tr><td><code>--depth=&lt;n&gt;</code></td><td>Profondità massima della catena delta.</td></tr>
        <tr><td><code>--window=&lt;n&gt;</code></td><td>Dimensione della window per ricerca delta.</td></tr>
        <tr><td><code>--thin</code></td><td>Permette pack thin (delta contro oggetti esterni).</td></tr>
        <tr><td><code>--no-reuse-delta</code></td><td>Ricalcola delta invece di riusare esistenti.</td></tr>
      </tbody>
    </table>
    <h2>Esempi</h2>
    <pre><code>git rev-list --objects --all | git pack-objects --stdout &gt; everything.pack
    # Costruisce un singolo pack di ogni oggetto raggiungibile

    git rev-list --objects HEAD ^origin/main | \
      git pack-objects --thin --stdout &gt; ahead.pack
    # Un pack thin di solo i commit avanti rispetto a origin/main

    git pack-objects --all .git/objects/pack/extra
    # Repack di tutti gli oggetti raggiungibili in un nuovo pack chiamato "extra"</code></pre>
    <h2>Errori comuni</h2>
    <p>Costruire pack grandi con <code>--depth</code> e <code>--window</code> impostati troppo alti consuma molta memoria e CPU. I default da <code>git gc</code> sono sensati per la maggior parte dei repo. Produrre pack thin senza contesto (un repo esistente a cui applicarli) è inutile.</p>
    <h2>Comandi correlati</h2>
    <p><code>git unpack-objects</code>, <code>git verify-pack</code>, <code>git gc</code>, <code>git repack</code></p>

- source_title: "git unpack-objects — Unpack objects from a packed archive"
  title: "git unpack-objects — Spacchetta oggetti da un archivio packed"
  langcode: it
  body: |
    <h2>Sinossi</h2>
    <pre><code>git unpack-objects [-r] [-q] &lt; &lt;pack-file&gt;</code></pre>
    <h2>Descrizione</h2>
    <p>Il comando <code>git unpack-objects</code> legge un packfile da stdin e ne scrive i contenuti come oggetti loose individuali nel database degli oggetti. Questo è l'inverso di <code>git pack-objects</code>.</p>
    <p>Nell'uso quotidiano, <code>git unpack-objects</code> si integra con alias e CI.</p><p>Capire il modello dati di Git aiuta a prevedere i risultati.</p>
    <h2>Quando usarlo</h2>
    <p>La maggior parte degli sviluppatori non ne ha mai bisogno. È usato per recuperare da un pack corrotto (spacchetta ciò che è recuperabile, poi ri-pack), per testing, o quando si integra un piccolo bundle in un repo dove il formato loose-object è preferibile.</p>
    <h2>Opzioni comuni</h2>
    <table>
      <thead><tr><th>Opzione</th><th>Descrizione</th></tr></thead>
      <tbody>
        <tr><td><code>-n</code></td><td>Dry-run: mostra cosa verrebbe spacchettato.</td></tr>
        <tr><td><code>-q</code></td><td>Quiet, nessun progresso.</td></tr>
        <tr><td><code>-r</code></td><td>Recupera ciò che è possibile da un pack danneggiato.</td></tr>
        <tr><td><code>--strict</code></td><td>Rifiuta di scrivere oggetti con link rotti.</td></tr>
      </tbody>
    </table>
    <h2>Esempi</h2>
    <pre><code>git unpack-objects &lt; pack-abc.pack
    # Esplode il pack in oggetti loose

    git unpack-objects -r &lt; broken.pack
    # Salva ciò che possiamo da un pack danneggiato

    git unpack-objects -n &lt; somepack.pack
    # Solo anteprima di cosa verrebbe spacchettato</code></pre>
    <h2>Errori comuni</h2>
    <p>Spacchettare un pack enorme crea molti file piccoli e rallenta il filesystem. Quasi ogni scenario operativo preferisce mantenere intatto il pack. Abbinalo con <code>git fsck</code> quando si risolvono problemi di corruzione.</p>
    <h2>Comandi correlati</h2>
    <p><code>git pack-objects</code>, <code>git verify-pack</code>, <code>git fsck</code>, <code>git gc</code></p>

- source_title: "git verify-pack — Validate packed Git archive files"
  title: "git verify-pack — Valida i file archivio Git packed"
  langcode: it
  body: |
    <h2>Sinossi</h2>
    <pre><code>git verify-pack [-v] [--stat-only] &lt;pack&gt;.idx</code></pre>
    <h2>Descrizione</h2>
    <p>Il comando <code>git verify-pack</code> controlla l'integrità di un packfile e del suo indice, verificando i checksum SHA-1 e la consistenza delle catene delta. Con <code>-v</code>, stampa la lista di oggetti nel pack insieme con tipo, dimensione e (per i delta) informazioni sulla base.</p>
    <p>Nell'uso quotidiano, <code>git verify-pack</code> si integra con alias e CI.</p><p>Capire il modello dati di Git aiuta a prevedere i risultati.</p>
    <h2>Quando usarlo</h2>
    <p>La maggior parte degli utenti non lo esegue mai. È prezioso per la forensics di repository — trovare quali blob grandi stanno consumando spazio, capire la salute delle catene delta, o diagnosticare corruzione.</p>
    <h2>Opzioni comuni</h2>
    <table>
      <thead><tr><th>Opzione</th><th>Descrizione</th></tr></thead>
      <tbody>
        <tr><td><code>-v</code></td><td>Verbose: elenca ogni oggetto.</td></tr>
        <tr><td><code>--stat-only</code></td><td>Mostra solo statistiche di riepilogo.</td></tr>
        <tr><td><code>-O &lt;file&gt;</code></td><td>Legge pack-list da file.</td></tr>
      </tbody>
    </table>
    <h2>Esempi</h2>
    <pre><code>git verify-pack -v .git/objects/pack/pack-*.idx
    # Lista dettagliata di oggetti in ogni pack

    # Trova i blob più grandi nel repository:
    git verify-pack -v .git/objects/pack/*.idx | \
      sort -k 3 -n | tail -20

    git verify-pack --stat-only .git/objects/pack/pack-*.idx
    # Statistiche riepilogo per pack</code></pre>
    <h2>Errori comuni</h2>
    <p>Puntare a un <code>.pack</code> invece che a un <code>.idx</code> fallisce — passa sempre l'indice. Ordinare l'output di verify-pack per trovare file grandi funziona, ma non dimenticare di esaminare anche oggetti loose con <code>git count-objects -v</code>.</p>
    <h2>Comandi correlati</h2>
    <p><code>git fsck</code>, <code>git gc</code>, <code>git repack</code>, <code>git count-objects</code></p>

- source_title: "git count-objects — Count unpacked objects and disk usage"
  title: "git count-objects — Conta oggetti unpacked e uso del disco"
  langcode: it
  body: |
    <h2>Sinossi</h2>
    <pre><code>git count-objects [-v] [-H]</code></pre>
    <h2>Descrizione</h2>
    <p>Il comando <code>git count-objects</code> riporta quanti oggetti loose e pack ha il repository, e quanto spazio su disco consumano. Con <code>-v</code>, include una suddivisione di garbage, pack, oggetti in-pack e oggetti potabili.</p>
    <p>Nell'uso quotidiano, <code>git count-objects</code> si integra con alias e CI.</p><p>Capire il modello dati di Git aiuta a prevedere i risultati.</p>
    <h2>Quando usarlo</h2>
    <p>Esegui <code>git count-objects -v</code> per valutare se un repo ha bisogno di <code>git gc</code>: se il conteggio di oggetti loose è alto o ci sono molti pack piccoli, il garbage collection compatterà le cose. I team CI e operations lo usano per monitorare la salute del repo.</p>
    <h2>Opzioni comuni</h2>
    <table>
      <thead><tr><th>Opzione</th><th>Descrizione</th></tr></thead>
      <tbody>
        <tr><td><code>-v</code></td><td>Suddivisione verbose.</td></tr>
        <tr><td><code>-H</code>, <code>--human-readable</code></td><td>Dimensioni in KiB/MiB/GiB.</td></tr>
      </tbody>
    </table>
    <h2>Esempi</h2>
    <pre><code>git count-objects
    # Veloce: numero di oggetti loose e loro dimensione

    git count-objects -vH
    # Suddivisione completa con dimensioni leggibili
    # count: 235 (oggetti loose)
    # size: 5.2 MiB
    # in-pack: 18234
    # packs: 3
    # size-pack: 142.6 MiB
    # prune-packable: 12
    # garbage: 0</code></pre>
    <h2>Errori comuni</h2>
    <p>Leggere male "garbage" — questi sono oggetti corrotti, non solo irraggiungibili. Un conteggio garbage non zero richiede investigazione. <code>prune-packable</code> indica oggetti presenti sia loose che in pack; eseguire <code>git gc</code> li risolverà.</p>
    <h2>Comandi correlati</h2>
    <p><code>git gc</code>, <code>git fsck</code>, <code>git repack</code>, <code>git verify-pack</code></p>

- source_title: "git gc — Cleanup unnecessary files and optimize the local repository"
  title: "git gc — Pulisce file non necessari e ottimizza il repository locale"
  langcode: it
  body: |
    <h2>Sinossi</h2>
    <pre><code>git gc [--auto] [--aggressive] [--prune=&lt;date&gt;]</code></pre>
    <h2>Descrizione</h2>
    <p>Il comando <code>git gc</code> esegue task di housekeeping: impacchetta oggetti loose, rimuove oggetti irraggiungibili oltre la finestra di prune, impacchetta i ref e aggiorna file ausiliari. Git esegue automaticamente <code>gc --auto</code> dopo operazioni che creano molti oggetti loose (come un fetch grande), quindi la maggior parte degli utenti non invoca mai <code>gc</code> manualmente. L'invocazione manuale è utile dopo aver riscritto la storia, cancellato molti branch o per recuperare spazio su disco immediatamente.</p>
    <p>Il flag <code>--aggressive</code> fa lavoro extra — ricalcolando delta — ma raramente vale il tempo. Il comportamento predefinito di Git moderno è ben tunato. L'argomento <code>--prune</code> controlla quanto vecchi devono essere gli oggetti irraggiungibili prima di essere cancellati; il default è due settimane.</p>
    <p>Nell'uso quotidiano, <code>git gc</code> si integra con alias e CI.</p><p>Capire il modello dati di Git aiuta a prevedere i risultati.</p>
    <h2>Opzioni comuni</h2>
    <table>
      <thead><tr><th>Opzione</th><th>Descrizione</th></tr></thead>
      <tbody>
        <tr><td><code>--auto</code></td><td>Esegue solo se le euristiche di Git dicono che è necessaria manutenzione.</td></tr>
        <tr><td><code>--aggressive</code></td><td>Spende più tempo cercando delta ottimali.</td></tr>
        <tr><td><code>--prune=&lt;date&gt;</code></td><td>Pota oggetti irraggiungibili più vecchi di questo.</td></tr>
        <tr><td><code>--no-prune</code></td><td>Salta il pruning di oggetti loose.</td></tr>
        <tr><td><code>--quiet</code></td><td>Sopprime output di progresso.</td></tr>
        <tr><td><code>--force</code></td><td>Esegue anche se un altro gc è in corso.</td></tr>
      </tbody>
    </table>
    <h2>Esempi</h2>
    <pre><code>git gc
    # Manutenzione di routine

    git gc --auto
    # Cosa Git esegue in background; sicuro da chiamare manualmente

    git gc --prune=now
    # Recupera spazio aggressivamente; cancella irraggiungibili recenti (usa con cura)

    git gc --aggressive
    # Repacking lento ed esaustivo — raramente vale la pena</code></pre>
    <h2>Errori comuni</h2>
    <p><code>--prune=now</code> cancella immediatamente oggetti irraggiungibili, possibilmente inclusi quelli ancora referenziati da reflog o stash. Non usarlo a cuor leggero. Disabilitare il gc automatico su un repo grande lascia accumulare oggetti loose; configura <code>maintenance</code> invece per Git più recente.</p>
    <h2>Comandi correlati</h2>
    <p><code>git maintenance</code>, <code>git repack</code>, <code>git prune</code>, <code>git fsck</code></p>

- source_title: "git fsck — Verify the connectivity and validity of objects"
  title: "git fsck — Verifica la connettività e validità degli oggetti"
  langcode: it
  body: |
    <h2>Sinossi</h2>
    <pre><code>git fsck [--full] [--unreachable] [--dangling] [--lost-found]</code></pre>
    <h2>Descrizione</h2>
    <p>Il comando <code>git fsck</code> valida l'integrità del database degli oggetti: ogni commit, tree, blob e tag viene controllato per hash corretto, formato valido e riferimenti intatti. Identifica oggetti dangling (nessun ref vi punta, ma non sono irraggiungibili da un reflog) e oggetti irraggiungibili (veramente orfani).</p>
    <p>Questo è lo strumento di scelta per diagnosticare corruzione del repository (spesso dopo un guasto del disco o un'operazione interrotta), e per trovare commit "persi" nella categoria dangling che potrebbero essere recuperabili.</p>
    <p>Nell'uso quotidiano, <code>git fsck</code> si integra con alias e CI.</p><p>Capire il modello dati di Git aiuta a prevedere i risultati.</p>
    <h2>Opzioni comuni</h2>
    <table>
      <thead><tr><th>Opzione</th><th>Descrizione</th></tr></thead>
      <tbody>
        <tr><td><code>--full</code></td><td>Controlla ogni oggetto, inclusi quelli raggiungibili.</td></tr>
        <tr><td><code>--unreachable</code></td><td>Riporta oggetti irraggiungibili.</td></tr>
        <tr><td><code>--dangling</code></td><td>Riporta oggetti dangling (default).</td></tr>
        <tr><td><code>--no-dangling</code></td><td>Sopprime listing di dangling.</td></tr>
        <tr><td><code>--lost-found</code></td><td>Scrive oggetti dangling in <code>.git/lost-found/</code>.</td></tr>
        <tr><td><code>--connectivity-only</code></td><td>Salta verifica del contenuto blob.</td></tr>
        <tr><td><code>--strict</code></td><td>Riporta avvisi extra.</td></tr>
      </tbody>
    </table>
    <h2>Esempi</h2>
    <pre><code>git fsck --full
    # Controllo completo

    git fsck --lost-found
    # Materializza commit/blob dangling in file recuperabili

    git fsck --unreachable --no-reflogs
    # Trova oggetti veramente orfani (ignorando protezione reflog)

    git fsck --connectivity-only
    # Controllo più veloce che salta hashing del contenuto</code></pre>
    <h2>Errori comuni</h2>
    <p>Agire su avvisi "unreachable" senza considerare la protezione del reflog può perdere lavoro recuperabile. <code>fsck</code> è read-only; non cancella mai nulla da solo. Errori trovati da <code>fsck</code> sono spesso risolti da <code>git gc</code> o ri-clonando una copia fresca.</p>
    <h2>Comandi correlati</h2>
    <p><code>git gc</code>, <code>git reflog</code>, <code>git verify-pack</code>, <code>git prune</code></p>

- source_title: "git prune — Prune all unreachable objects from the object database"
  title: "git prune — Pota tutti gli oggetti irraggiungibili dal database degli oggetti"
  langcode: it
  body: |
    <h2>Sinossi</h2>
    <pre><code>git prune [-n] [--expire=&lt;date&gt;]</code></pre>
    <h2>Descrizione</h2>
    <p>Il comando <code>git prune</code> cancella oggetti loose che non sono raggiungibili da nessun ref. Normalmente è invocato indirettamente da <code>git gc</code>; eseguirlo direttamente bypassa alcuni controlli di sicurezza di <code>gc</code>. Il periodo di grazia <code>--expire</code> (default 2 settimane) previene la cancellazione di oggetti creati di recente che possono appartenere a operazioni in corso.</p>
    <p>Nell'uso quotidiano, <code>git prune</code> si integra con alias e CI.</p><p>Capire il modello dati di Git aiuta a prevedere i risultati.</p>
    <h2>Quando usarlo</h2>
    <p>La maggior parte degli utenti non esegue mai <code>git prune</code> manualmente — <code>git gc</code> lo gestisce. Ricorri ad esso solo quando i default di <code>gc</code> non si adattano, o quando hai esplicitamente eliminato la storia con <code>filter-repo</code> e vuoi recupero immediato dello spazio. Anche allora, <code>git gc --prune=now</code> è il percorso più comune.</p>
    <h2>Opzioni comuni</h2>
    <table>
      <thead><tr><th>Opzione</th><th>Descrizione</th></tr></thead>
      <tbody>
        <tr><td><code>-n</code>, <code>--dry-run</code></td><td>Mostra cosa verrebbe cancellato senza cancellare.</td></tr>
        <tr><td><code>--expire=&lt;date&gt;</code></td><td>Pota solo oggetti più vecchi di questo.</td></tr>
        <tr><td><code>--progress</code></td><td>Mostra il progresso.</td></tr>
        <tr><td><code>--verbose</code></td><td>Dettaglia ogni oggetto potato.</td></tr>
      </tbody>
    </table>
    <h2>Esempi</h2>
    <pre><code>git prune -n
    # Anteprima del prune

    git prune --expire=now
    # Aggressivo: cancella tutti gli irraggiungibili adesso

    git prune --expire=2.weeks.ago
    # Comportamento predefinito: mantiene irraggiungibili recenti</code></pre>
    <h2>Errori comuni</h2>
    <p><code>git prune --expire=now</code> può cancellare oggetti che sono ancora nel reflog o stash se li hai recentemente fatti scadere. Esegui sempre prima <code>git fsck</code> per capire cosa è a rischio. Su un repo trafficato, fare prune mentre un fetch o rebase sta accadendo può causare problemi.</p>
    <h2>Comandi correlati</h2>
    <p><code>git gc</code>, <code>git fsck</code>, <code>git reflog expire</code>, <code>git repack</code></p>

- source_title: "git repack — Pack unpacked objects in a repository"
  title: "git repack — Impacchetta oggetti unpacked in un repository"
  langcode: it
  body: |
    <h2>Sinossi</h2>
    <pre><code>git repack [-a] [-d] [-l] [--depth=&lt;n&gt;] [--window=&lt;n&gt;]</code></pre>
    <h2>Descrizione</h2>
    <p>Il comando <code>git repack</code> riconfeziona gli oggetti del repository, combinando più pack in uno e opzionalmente spostando oggetti loose in pack. È il modo principale in cui Git rimane compatto. <code>git gc</code> chiama <code>repack</code> come parte del suo lavoro; il <code>repack</code> manuale espone controllo più fine sui parametri di ricerca delta.</p>
    <p>Nell'uso quotidiano, <code>git repack</code> si integra con alias e CI.</p><p>Capire il modello dati di Git aiuta a prevedere i risultati.</p>
    <h2>Quando usarlo</h2>
    <p>La maggior parte degli utenti si affida a <code>gc</code>. Ricorri direttamente a <code>repack</code> quando regoli lo storage su un server (i repo grandi beneficiano di <code>--depth</code>, <code>--window</code> personalizzati) o quando investighi il layout di storage.</p>
    <h2>Opzioni comuni</h2>
    <table>
      <thead><tr><th>Opzione</th><th>Descrizione</th></tr></thead>
      <tbody>
        <tr><td><code>-a</code></td><td>Impacchetta tutto raggiungibile in un singolo pack.</td></tr>
        <tr><td><code>-A</code></td><td>Come <code>-a</code> ma mantiene irraggiungibili loose.</td></tr>
        <tr><td><code>-d</code></td><td>Cancella pack ridondanti dopo il repacking.</td></tr>
        <tr><td><code>-l</code></td><td>Passa <code>--local</code> a <code>pack-objects</code>.</td></tr>
        <tr><td><code>--depth=&lt;n&gt;</code></td><td>Profondità massima della catena delta.</td></tr>
        <tr><td><code>--window=&lt;n&gt;</code></td><td>Dimensione della window per selezione delta.</td></tr>
        <tr><td><code>-k</code>, <code>--keep-pack=&lt;name&gt;</code></td><td>Mantiene il pack nominato intatto.</td></tr>
      </tbody>
    </table>
    <h2>Esempi</h2>
    <pre><code>git repack -ad
    # Singolo pack, elimina quelli ridondanti

    git repack -a -d --depth=50 --window=250
    # Packing più stretto per risparmi di storage (più lento)

    git repack -A -d
    # Mantieni irraggiungibili loose per sicurezza</code></pre>
    <h2>Errori comuni</h2>
    <p>Parametri aggressivi consumano RAM e CPU sproporzionati allo spazio risparmiato. I valori predefiniti sono ragionevolmente tunati. Dimenticare <code>-d</code> dopo <code>-a</code> lascia pack duplicati.</p>
    <h2>Comandi correlati</h2>
    <p><code>git gc</code>, <code>git pack-objects</code>, <code>git verify-pack</code>, <code>git prune</code></p>

- source_title: "git maintenance — Run tasks to optimize Git repository data"
  title: "git maintenance — Esegue task per ottimizzare i dati del repository Git"
  langcode: it
  body: |
    <h2>Sinossi</h2>
    <pre><code>git maintenance start
    git maintenance run [--task=&lt;task&gt;]
    git maintenance stop</code></pre>
    <h2>Descrizione</h2>
    <p>Il comando <code>git maintenance</code>, introdotto in Git 2.29, sostituisce ed estende <code>git gc --auto</code> con task di manutenzione schedulati e a grana fine: prefetch, generazione di commit-graph, packing di oggetti loose, repack incrementale e pack-refs. Eseguire <code>git maintenance start</code> registra una schedule ricorrente via cron, launchd, systemd o Task Scheduler a seconda della piattaforma.</p>
    <p>Per server-side o cloni di lunga durata di repository grandi, abilitare maintenance migliora drasticamente la responsività quotidiana. Operazioni come <code>git status</code> e <code>git log</code> diventano più veloci quando i dati commit-graph e reachable-bitmap sono mantenuti freschi.</p>
    <p>Nell'uso quotidiano, <code>git maintenance</code> si integra con alias e CI.</p><p>Capire il modello dati di Git aiuta a prevedere i risultati.</p>
    <h2>Opzioni comuni</h2>
    <table>
      <thead><tr><th>Sottocomando / Opzione</th><th>Descrizione</th></tr></thead>
      <tbody>
        <tr><td><code>start</code></td><td>Registra una schedule in background.</td></tr>
        <tr><td><code>stop</code></td><td>Annulla la registrazione della schedule.</td></tr>
        <tr><td><code>run</code></td><td>Esegue task immediatamente.</td></tr>
        <tr><td><code>--task=&lt;task&gt;</code></td><td>Esegue solo questo task (commit-graph, prefetch, ecc.).</td></tr>
        <tr><td><code>register</code> / <code>unregister</code></td><td>Aggiunge o rimuove repo dal set di maintenance.</td></tr>
        <tr><td><code>--schedule=&lt;freq&gt;</code></td><td>Frequenza: hourly, daily, weekly.</td></tr>
      </tbody>
    </table>
    <h2>Esempi</h2>
    <pre><code>git maintenance start
    # Configura maintenance in background per questo repo

    git maintenance run --task=commit-graph
    # Aggiorna il commit-graph on demand

    git maintenance run --task=prefetch
    # Scarica oggetti upstream senza aggiornare i ref

    git maintenance unregister
    # Ferma la maintenance schedulata per questo repo</code></pre>
    <h2>Errori comuni</h2>
    <p>Dimenticare che <code>start</code> registra un task schedulato a livello di sistema. Su macchine condivise, questo potrebbe non essere ciò che vuoi; usa invece <code>register</code> in un file di config. Disabilitare il gc automatico ma non abilitare maintenance lascia il repo crescere senza controllo.</p>
    <h2>Comandi correlati</h2>
    <p><code>git gc</code>, <code>git commit-graph</code>, <code>git fetch --prefetch</code>, <code>git repack</code></p>

- source_title: "git pack-refs — Pack heads and tags for efficient repository access"
  title: "git pack-refs — Impacchetta head e tag per accesso efficiente al repository"
  langcode: it
  body: |
    <h2>Sinossi</h2>
    <pre><code>git pack-refs [--all] [--no-prune]</code></pre>
    <h2>Descrizione</h2>
    <p>Il comando <code>git pack-refs</code> consolida molti file ref individuali (uno per branch/tag in <code>.git/refs/</code>) in un singolo file <code>.git/packed-refs</code>. Questo è più veloce su filesystem dove aprire molti file piccoli è lento (Windows più vecchi, filesystem di rete) e riduce il carico filesystem per repo con migliaia di ref.</p>
    <p>Nell'uso quotidiano, <code>git pack-refs</code> si integra con alias e CI.</p><p>Capire il modello dati di Git aiuta a prevedere i risultati.</p>
    <h2>Quando usarlo</h2>
    <p>La maggior parte dei repo non ha bisogno di pack-refs manuale — <code>git gc</code> lo esegue come parte della maintenance. Ricorri ad esso direttamente quando script ottimizzazioni di performance su set di ref enormi.</p>
    <h2>Opzioni comuni</h2>
    <table>
      <thead><tr><th>Opzione</th><th>Descrizione</th></tr></thead>
      <tbody>
        <tr><td><code>--all</code></td><td>Impacchetta tutti i ref (default impacchetta solo branch e tag).</td></tr>
        <tr><td><code>--no-prune</code></td><td>Non rimuove file ref individuali dopo il packing.</td></tr>
      </tbody>
    </table>
    <h2>Esempi</h2>
    <pre><code>git pack-refs --all
    # Impacchetta ogni ref in packed-refs

    ls .git/refs/heads/ | wc -l
    # Dopo il packing, i file individuali sono rimossi

    git pack-refs
    # Default: impacchetta branch e tag</code></pre>
    <h2>Errori comuni</h2>
    <p>Modificare <code>packed-refs</code> a mano può corrompere il repository — usa <code>git update-ref</code>. Dopo <code>pack-refs</code>, gli script che cercano file individuali in <code>.git/refs/heads/</code> falliscono. Usa <code>git for-each-ref</code> per un lookup portabile.</p>
    <h2>Comandi correlati</h2>
    <p><code>git gc</code>, <code>git update-ref</code>, <code>git for-each-ref</code>, <code>git maintenance</code></p>

- source_title: "git am — Apply a series of patches from a mailbox"
  title: "git am — Applica una serie di patch da una mailbox"
  langcode: it
  body: |
    <h2>Sinossi</h2>
    <pre><code>git am [--3way] [--abort] [--continue] [--skip] &lt;mbox&gt;...</code></pre>
    <h2>Descrizione</h2>
    <p>Il comando <code>git am</code> applica patch da un file mailbox — il tipo prodotto da <code>git format-patch</code> o generato emailando un diff. A differenza di <code>git apply</code>, che applica solo il contenuto del diff, <code>git am</code> ricrea ogni patch come un commit, preservando autore, data, messaggio e altri metadati incorporati nell'email.</p>
    <p>Questa è la base del workflow di contribuzione email-based usato dal kernel Linux e altri progetti: i maintainer ricevono patch via email, le salvano in una mailbox e le applicano con <code>git am</code>. Il risultato è esattamente la stessa serie di commit che l'autore ha creato.</p>
    <p>Nell'uso quotidiano, <code>git am</code> si integra con alias e CI.</p><p>Capire il modello dati di Git aiuta a prevedere i risultati.</p>
    <h2>Opzioni comuni</h2>
    <table>
      <thead><tr><th>Opzione</th><th>Descrizione</th></tr></thead>
      <tbody>
        <tr><td><code>--3way</code></td><td>Ricade su merge a tre vie se la patch non si applica pulitamente.</td></tr>
        <tr><td><code>--abort</code></td><td>Cancella un am in corso.</td></tr>
        <tr><td><code>--continue</code> / <code>--resolved</code></td><td>Continua dopo aver corretto i conflitti.</td></tr>
        <tr><td><code>--skip</code></td><td>Salta la patch corrente.</td></tr>
        <tr><td><code>-s</code>, <code>--signoff</code></td><td>Aggiunge trailer Signed-off-by.</td></tr>
        <tr><td><code>-k</code></td><td>Passa <code>-k</code> a <code>mailinfo</code> (mantiene il subject).</td></tr>
        <tr><td><code>--whitespace=&lt;action&gt;</code></td><td>Gestisce errori di whitespace.</td></tr>
      </tbody>
    </table>
    <h2>Esempi</h2>
    <pre><code>git am patches/*.patch
    # Applica una serie di output di format-patch

    git am --3way --signoff incoming.mbox
    # Fallback merge a tre vie, aggiunge righe di sign-off

    git am --abort
    # Cancella dopo un conflitto senza speranza

    curl -L https://lore.kernel.org/.../t.mbox.gz | gunzip | git am --3way
    # Applica patch scaricate da una lista pubblica</code></pre>
    <h2>Errori comuni</h2>
    <p>Dimenticare <code>--3way</code> quando le patch sono state generate contro una base leggermente diversa spesso causa fallimenti che <code>--3way</code> gestirebbe. Dopo aver risolto un conflitto, esegui <code>git am --continue</code>, NON <code>git commit</code>. Un semplice <code>commit</code> crea uno stato malformato.</p>
    <h2>Comandi correlati</h2>
    <p><code>git apply</code>, <code>git format-patch</code>, <code>git send-email</code>, <code>git mailinfo</code></p>

- source_title: "git format-patch — Prepare patches for email submission"
  title: "git format-patch — Prepara patch per submission via email"
  langcode: it
  body: |
    <h2>Sinossi</h2>
    <pre><code>git format-patch [&lt;options&gt;] &lt;range&gt;
    git format-patch -1 &lt;commit&gt;</code></pre>
    <h2>Descrizione</h2>
    <p>Il comando <code>git format-patch</code> produce un file di patch in formato mailbox per ogni commit in un range, pronto per essere applicato con <code>git am</code> o inviato con <code>git send-email</code>. Ogni patch include il messaggio di commit, autore, data e il diff. Le patch sono numerate (<code>0001-...</code>, <code>0002-...</code>) così si applicano in ordine.</p>
    <p>Questo è il formato che il kernel Linux e molti progetti open source usano per code review su mailing list. Anche progetti che usano pull request a volte accettano patch via email, e <code>format-patch</code> è il produttore standard.</p>
    <p>Nell'uso quotidiano, <code>git format-patch</code> si integra con alias e CI.</p><p>Capire il modello dati di Git aiuta a prevedere i risultati.</p>
    <h2>Opzioni comuni</h2>
    <table>
      <thead><tr><th>Opzione</th><th>Descrizione</th></tr></thead>
      <tbody>
        <tr><td><code>-&lt;n&gt;</code></td><td>Genera patch per gli ultimi <code>n</code> commit.</td></tr>
        <tr><td><code>-o &lt;dir&gt;</code></td><td>Scrive patch in una directory.</td></tr>
        <tr><td><code>--cover-letter</code></td><td>Genera una cover letter 0000 per la serie.</td></tr>
        <tr><td><code>-v &lt;n&gt;</code>, <code>--reroll-count=&lt;n&gt;</code></td><td>Marca le patch come n-esima iterazione.</td></tr>
        <tr><td><code>--subject-prefix=&lt;prefix&gt;</code></td><td>Prefisso oggetto personalizzato (default <code>PATCH</code>).</td></tr>
        <tr><td><code>--to=&lt;addr&gt;</code> / <code>--cc=&lt;addr&gt;</code></td><td>Aggiunge destinatari negli header.</td></tr>
        <tr><td><code>--thread</code></td><td>Aggiunge header In-Reply-To.</td></tr>
      </tbody>
    </table>
    <h2>Esempi</h2>
    <pre><code>git format-patch -3
    # Patch per gli ultimi 3 commit, in CWD

    git format-patch -o ../patches main..feature
    # Patch da main a feature, in ../patches/

    git format-patch --cover-letter -v2 origin/main
    # Serie versionata con cover letter

    git format-patch --subject-prefix="PATCH myproj" -1 HEAD
    # Subject personalizzato per una lista specifica del progetto</code></pre>
    <h2>Errori comuni</h2>
    <p>Generare patch contro la base sbagliata produce fallimenti di applicazione per i revisori — scegli l'upstream giusto. Senza <code>--cover-letter</code>, una serie multi-patch non ha introduzione; i revisori la apprezzano. Reroll senza <code>-v</code> crea ambiguità su quale versione viene revisionata.</p>
    <h2>Comandi correlati</h2>
    <p><code>git am</code>, <code>git send-email</code>, <code>git request-pull</code>, <code>git range-diff</code></p>

- source_title: "git request-pull — Generate a summary of pending changes"
  title: "git request-pull — Genera un riepilogo delle modifiche pendenti"
  langcode: it
  body: |
    <h2>Sinossi</h2>
    <pre><code>git request-pull [-p] &lt;start&gt; &lt;url&gt; [&lt;end&gt;]</code></pre>
    <h2>Descrizione</h2>
    <p>Il comando <code>git request-pull</code> genera un riepilogo testuale che chiede a un maintainer upstream di pullare modifiche dal tuo repository. L'output include una lista di commit nel range, un diffstat, l'URL e il ref da cui pullare e (se applicabile) lo SHA della versione taggata. È il modo standard di mandare una pull request via email su progetti guidati da mailing list.</p>
    <p>Questo non è correlato alle pull request di GitHub/GitLab — le precede. L'output è destinato a essere incollato in un'email al maintainer upstream.</p>
    <p>Nell'uso quotidiano, <code>git request-pull</code> si integra con alias e CI.</p><p>Capire il modello dati di Git aiuta a prevedere i risultati.</p>
    <h2>Opzioni comuni</h2>
    <table>
      <thead><tr><th>Opzione</th><th>Descrizione</th></tr></thead>
      <tbody>
        <tr><td><code>-p</code></td><td>Include la patch completa nell'output.</td></tr>
      </tbody>
    </table>
    <h2>Esempi</h2>
    <pre><code>git request-pull v1.0 https://github.com/me/proj.git my-feature
    # Riepilogo che chiede di pullare my-feature dal mio fork

    git request-pull origin/main https://example.com/me/proj.git HEAD
    # Pull request basata su cosa è avanti rispetto a upstream main

    git request-pull -p v2.0 git@my.server:proj.git release-2.1 | mail -s "Pull request" maintainer@example.com
    # Email di una pull request con patch completa</code></pre>
    <h2>Errori comuni</h2>
    <p>Specificare il punto di partenza sbagliato rende il range del diff senza senso. Esegui prima <code>git log</code> per confermare il range. L'URL remote deve essere accessibile al maintainer; URL privati producono richieste inutili.</p>
    <h2>Comandi correlati</h2>
    <p><code>git format-patch</code>, <code>git send-email</code>, <code>git tag</code>, <code>git log</code></p>

- source_title: "git send-email — Send a collection of patches as emails"
  title: "git send-email — Invia una collezione di patch come email"
  langcode: it
  body: |
    <h2>Sinossi</h2>
    <pre><code>git send-email [--to &lt;addr&gt;] [--cc &lt;addr&gt;] [--cover-letter] &lt;patch-or-dir&gt;...</code></pre>
    <h2>Descrizione</h2>
    <p>Il comando <code>git send-email</code> invia una o più patch via SMTP, ognuna come email correttamente threadata. È lo strumento canonico per inviare patch a progetti guidati da mailing list (kernel Linux, Git stesso, U-Boot, ecc.). Può leggere credenziali SMTP dalla tua config Git, chiederle interattivamente o usare file di autenticazione.</p>
    <p>Le patch sono inviate in ordine, con header <code>In-Reply-To</code> che le connettono in un singolo thread. La cover letter (se presente) viene inviata per prima come parent del thread.</p>
    <p>Nell'uso quotidiano, <code>git send-email</code> si integra con alias e CI.</p><p>Capire il modello dati di Git aiuta a prevedere i risultati.</p>
    <h2>Opzioni comuni</h2>
    <table>
      <thead><tr><th>Opzione</th><th>Descrizione</th></tr></thead>
      <tbody>
        <tr><td><code>--to=&lt;addr&gt;</code></td><td>Destinatario primario.</td></tr>
        <tr><td><code>--cc=&lt;addr&gt;</code></td><td>Carbon copy.</td></tr>
        <tr><td><code>--smtp-server=&lt;host&gt;</code></td><td>Server SMTP (o path sendmail).</td></tr>
        <tr><td><code>--smtp-user=&lt;user&gt;</code></td><td>Username SMTP.</td></tr>
        <tr><td><code>--annotate</code></td><td>Permette di modificare ogni patch prima dell'invio.</td></tr>
        <tr><td><code>--dry-run</code></td><td>Mostra cosa verrebbe inviato.</td></tr>
        <tr><td><code>--in-reply-to=&lt;message-id&gt;</code></td><td>Threada sotto un messaggio esistente.</td></tr>
        <tr><td><code>--confirm=&lt;mode&gt;</code></td><td>Comportamento di conferma (always, never, cc).</td></tr>
      </tbody>
    </table>
    <h2>Esempi</h2>
    <pre><code>git send-email --to=devs@example.org *.patch
    # Invia tutte le patch in CWD a una lista

    git send-email --cover-letter --to=git@vger.kernel.org \
      --cc=maintainer@example.com 0001-*.patch
    # Serie con cover letter, primario + cc

    git send-email --dry-run --annotate -1 HEAD
    # Anteprima di una singola patch senza inviare

    git config --global sendemail.smtpServer smtp.gmail.com
    git config --global sendemail.smtpServerPort 587
    git config --global sendemail.smtpEncryption tls
    # Configurazione SMTP una tantum</code></pre>
    <h2>Errori comuni</h2>
    <p>Molti server SMTP aziendali bloccano SMTP plain — usa TLS o password specifiche dell'app. Dimenticare <code>--cover-letter</code> quando si invia una serie multi-patch lascia i revisori senza contesto. Inviare un re-roll senza <code>--in-reply-to</code> della cover letter originale frammenta la discussione.</p>
    <h2>Comandi correlati</h2>
    <p><code>git format-patch</code>, <code>git am</code>, <code>git request-pull</code>, <code>git config</code></p>

- source_title: "git instaweb — Instantly browse your repository in gitweb"
  title: "git instaweb — Naviga istantaneamente il tuo repository in gitweb"
  langcode: it
  body: |
    <h2>Sinossi</h2>
    <pre><code>git instaweb [--httpd=&lt;daemon&gt;] [--port=&lt;n&gt;] [--start | --stop | --restart]</code></pre>
    <h2>Descrizione</h2>
    <p>Il comando <code>git instaweb</code> avvia un server web locale (lighttpd, Apache, webrick o <code>http.server</code> di Python) che ospita l'interfaccia gitweb per il repository corrente. Apre un browser puntandolo ad esso, dandoti una rapida UI web per navigare la storia, file e diff senza alcun setup.</p>
    <p>Nonostante sia un comando in Git core, gitweb stesso è software Perl più vecchio e non è sempre installato per default sulle distro moderne. Molti utenti ora preferiscono eseguire un'istanza locale di cgit, gitea o semplicemente navigare su una forge ospitata.</p>
    <p>Nell'uso quotidiano, <code>git instaweb</code> si integra con alias e CI.</p><p>Capire il modello dati di Git aiuta a prevedere i risultati.</p>
    <h2>Opzioni comuni</h2>
    <table>
      <thead><tr><th>Opzione</th><th>Descrizione</th></tr></thead>
      <tbody>
        <tr><td><code>--httpd=&lt;daemon&gt;</code></td><td>Server web da usare.</td></tr>
        <tr><td><code>--port=&lt;n&gt;</code></td><td>Porta su cui ascoltare (default 1234).</td></tr>
        <tr><td><code>--start</code> / <code>--stop</code> / <code>--restart</code></td><td>Controlla il server.</td></tr>
        <tr><td><code>--browser=&lt;cmd&gt;</code></td><td>Browser da lanciare.</td></tr>
        <tr><td><code>--local</code></td><td>Bind solo a localhost.</td></tr>
      </tbody>
    </table>
    <h2>Esempi</h2>
    <pre><code>git instaweb --start
    # Avvia il server e apre il browser

    git instaweb --httpd=python --port=8080
    # Usa Python http.server sulla porta 8080

    git instaweb --stop
    # Ferma il server</code></pre>
    <h2>Errori comuni</h2>
    <p>Su distro moderne, gitweb e i suoi server web di supporto possono non essere installati. Considera alternative come <code>cgit</code> o servizi di hosting. Lasciare <code>instaweb</code> in esecuzione su una porta pubblica espone il tuo repo non autenticato.</p>
    <h2>Comandi correlati</h2>
    <p><code>gitweb</code>, <code>git daemon</code>, <code>git web--browse</code></p>

- source_title: "git add -p — Interactive patch staging"
  title: "git add -p — Staging interattivo a patch"
  langcode: it
  body: |
    <h2>Sinossi</h2>
    <pre><code>git add -p [&lt;path&gt;...]
    git add --patch [&lt;path&gt;...]</code></pre>
    <h2>Descrizione</h2>
    <p>Il comando <code>git add -p</code> lancia un'interfaccia interattiva che attraversa ogni "hunk" di modifiche nella tua working tree, chiedendoti di decidere per ognuno: stage, skip, split, edit, ecc. Questa è l'arma segreta per costruire commit puliti e atomici quando la tua working tree contiene un misto di modifiche correlate e non correlate.</p>
    <p>Il prompt interattivo accetta comandi a singola lettera: <code>y</code> (sì, mette in stage questo hunk), <code>n</code> (no, salta), <code>s</code> (divide in hunk più piccoli), <code>e</code> (modifica l'hunk manualmente), <code>q</code> (esce), <code>?</code> (aiuto), e diversi altri. Padroneggiare <code>add -p</code> è una delle abilità a maggior leva per produrre storia revisionabile.</p>
    <p>Nell'uso quotidiano, <code>git add -p</code> si integra con alias e CI.</p><p>Capire il modello dati di Git aiuta a prevedere i risultati.</p>
    <h2>Opzioni comuni</h2>
    <table>
      <thead><tr><th>Comando interattivo</th><th>Descrizione</th></tr></thead>
      <tbody>
        <tr><td><code>y</code></td><td>Mette in stage questo hunk.</td></tr>
        <tr><td><code>n</code></td><td>Non mette in stage questo hunk.</td></tr>
        <tr><td><code>s</code></td><td>Divide in hunk più piccoli.</td></tr>
        <tr><td><code>e</code></td><td>Modifica manualmente l'hunk.</td></tr>
        <tr><td><code>a</code></td><td>Mette in stage questo e tutti gli hunk rimanenti in questo file.</td></tr>
        <tr><td><code>d</code></td><td>Salta questo e tutti gli hunk rimanenti in questo file.</td></tr>
        <tr><td><code>q</code></td><td>Esce; non mette in stage altri hunk.</td></tr>
        <tr><td><code>?</code></td><td>Mostra l'aiuto.</td></tr>
      </tbody>
    </table>
    <h2>Esempi</h2>
    <pre><code>git add -p
    # Attraversa gli hunk di ogni file modificato

    git add -p src/auth.go
    # Restringe a un file

    # Dentro il prompt:
    # Premi 's' per dividere un hunk grande in più piccoli
    # Premi 'e' per modificare manualmente il testo dell'hunk
    # Premi 'y' o 'n' per accettare o saltare

    git diff --cached
    # Rivedi cosa è ora in stage</code></pre>
    <h2>Errori comuni</h2>
    <p>Modificare un hunk con <code>e</code> richiede di capire il formato diff unificato — aggiungere una riga significa che il nuovo file ce l'ha, rimuovere una riga di contesto significa che il nuovo file ne è privo. Errori qui possono produrre stato dell'index confuso. Verifica sempre con <code>git diff --cached</code> dopo.</p>
    <h2>Comandi correlati</h2>
    <p><code>git add</code>, <code>git stash -p</code>, <code>git restore -p</code>, <code>git checkout -p</code></p>

- source_title: "git update-index — Register file contents in the working tree to the index"
  title: "git update-index — Registra i contenuti dei file della working tree nell'index"
  langcode: it
  body: |
    <h2>Sinossi</h2>
    <pre><code>git update-index [--add] [--remove] [--refresh] [--assume-unchanged] &lt;file&gt;...</code></pre>
    <h2>Descrizione</h2>
    <p>Il comando <code>git update-index</code> è il plumbing dietro <code>git add</code>. Registra i contenuti dei file nell'index per SHA, gestisce flag come <code>assume-unchanged</code> e <code>skip-worktree</code> e aggiorna i timestamp dell'index. La maggior parte delle operazioni porcelain lo chiama.</p>
    <p>Nell'uso quotidiano, <code>git update-index</code> si integra con alias e CI.</p><p>Capire il modello dati di Git aiuta a prevedere i risultati.</p>
    <h2>Quando usarlo</h2>
    <p>La maggior parte degli utenti non ne ha mai bisogno direttamente. Ricorri ad esso quando vuoi comportamenti non esposti dal porcelain: marcare un file come <code>assume-unchanged</code> per evitare output rumoroso di <code>status</code> per un file di config che modifichi intenzionalmente localmente; o <code>skip-worktree</code> per scenari simili a sparse-checkout.</p>
    <h2>Opzioni comuni</h2>
    <table>
      <thead><tr><th>Opzione</th><th>Descrizione</th></tr></thead>
      <tbody>
        <tr><td><code>--add</code></td><td>Aggiunge file non ancora nell'index.</td></tr>
        <tr><td><code>--remove</code></td><td>Rimuove file dall'index.</td></tr>
        <tr><td><code>--refresh</code></td><td>Refresh delle info di stat senza cambiare contenuto.</td></tr>
        <tr><td><code>--assume-unchanged</code></td><td>Dice a Git di non controllare questo file per modifiche.</td></tr>
        <tr><td><code>--no-assume-unchanged</code></td><td>Inverte il flag.</td></tr>
        <tr><td><code>--skip-worktree</code></td><td>Fa ignorare a Git le modifiche della working tree.</td></tr>
        <tr><td><code>--chmod=(+|-)x</code></td><td>Cambia il bit eseguibile.</td></tr>
        <tr><td><code>--cacheinfo &lt;mode&gt; &lt;sha&gt; &lt;path&gt;</code></td><td>Inserisce manualmente un'entry nell'index.</td></tr>
      </tbody>
    </table>
    <h2>Esempi</h2>
    <pre><code>git update-index --assume-unchanged config/local.yml
    # Smette di tracciare modifiche locali a un file di config

    git update-index --no-assume-unchanged config/local.yml
    # Riprende il tracking normale

    git update-index --chmod=+x scripts/deploy.sh
    # Marca uno script come eseguibile nell'index

    git update-index --refresh
    # Refresh delle info di stat; utile dopo aver toccato file</code></pre>
    <h2>Errori comuni</h2>
    <p><code>--assume-unchanged</code> è pensato come ottimizzazione di performance, non come <code>.gitignore</code> per file già tracciati. Se i compagni di team hanno bisogno che il file sia invariato, usa invece un approccio config-template. L'uso improprio causa bug in cui le modifiche tracciate passano inosservate.</p>
    <h2>Comandi correlati</h2>
    <p><code>git add</code>, <code>git rm</code>, <code>git ls-files</code>, <code>git read-tree</code></p>

- source_title: "git read-tree — Read tree information into the index"
  title: "git read-tree — Legge informazioni del tree nell'index"
  langcode: it
  body: |
    <h2>Sinossi</h2>
    <pre><code>git read-tree [-m | -u | --reset] &lt;tree-ish&gt;...</code></pre>
    <h2>Descrizione</h2>
    <p>Il comando <code>git read-tree</code> carica i contenuti di un tree nell'index. Le varianti supportano il merge fino a tre tree (una base, ours, theirs) per uso durante i merge. <code>git checkout</code>, <code>git merge</code> e <code>git reset</code> usano tutti <code>read-tree</code> internamente.</p>
    <p>Nell'uso quotidiano, <code>git read-tree</code> si integra con alias e CI.</p><p>Capire il modello dati di Git aiuta a prevedere i risultati.</p>
    <h2>Quando usarlo</h2>
    <p>La maggior parte degli utenti non ne ha mai bisogno. È rilevante per implementare strumenti di merge personalizzati, script che costruiscono l'index da tree arbitrari, o per il trucco <code>git read-tree --prefix=&lt;dir&gt;</code> per mergiare un subtree.</p>
    <h2>Opzioni comuni</h2>
    <table>
      <thead><tr><th>Opzione</th><th>Descrizione</th></tr></thead>
      <tbody>
        <tr><td><code>-m</code></td><td>Modalità merge tree a tre vie.</td></tr>
        <tr><td><code>-u</code></td><td>Aggiorna la working tree per corrispondere all'index.</td></tr>
        <tr><td><code>--reset</code></td><td>Si comporta come <code>reset --hard</code> per l'index.</td></tr>
        <tr><td><code>--prefix=&lt;dir&gt;</code></td><td>Legge il tree in una sottodirectory.</td></tr>
        <tr><td><code>--empty</code></td><td>Svuota l'index.</td></tr>
        <tr><td><code>-i</code></td><td>Non aggiorna la working tree.</td></tr>
      </tbody>
    </table>
    <h2>Esempi</h2>
    <pre><code>git read-tree --empty
    # Pulisce l'index

    git read-tree HEAD
    # Ri-popola l'index dal tree di HEAD

    git read-tree --prefix=lib/ -u other-branch:src
    # Inserisce il tree src/ di un altro branch in lib/

    git read-tree -m HEAD origin/main
    # Mergia due tree nell'index (merge di basso livello)</code></pre>
    <h2>Errori comuni</h2>
    <p>Chiamare <code>read-tree</code> senza <code>-u</code> lascia la working tree fuori sync con l'index, sorprendendo le operazioni successive. Fare questo in una working tree trafficata può causare diff confusi.</p>
    <h2>Comandi correlati</h2>
    <p><code>git write-tree</code>, <code>git checkout</code>, <code>git merge</code>, <code>git update-index</code></p>

- source_title: "git write-tree — Create a tree object from the current index"
  title: "git write-tree — Crea un oggetto tree dall'index corrente"
  langcode: it
  body: |
    <h2>Sinossi</h2>
    <pre><code>git write-tree [--missing-ok] [--prefix=&lt;dir&gt;]</code></pre>
    <h2>Descrizione</h2>
    <p>Il comando <code>git write-tree</code> serializza l'index corrente in un oggetto tree nel database, restituendo lo SHA. È l'inverso plumbing di <code>read-tree</code>: quel comando carica un tree, questo ne memorizza uno.</p>
    <p>Nell'uso quotidiano, <code>git write-tree</code> si integra con alias e CI.</p><p>Capire il modello dati di Git aiuta a prevedere i risultati.</p>
    <h2>Quando usarlo</h2>
    <p>Quasi mai lo chiami direttamente. <code>git commit</code> chiama <code>write-tree</code> internamente per catturare lo stato in stage. Ricorri ad esso quando sintetizzi oggetti tree per workflow personalizzati (generare un tree senza commit, scriptare pipeline <code>commit-tree</code>).</p>
    <h2>Opzioni comuni</h2>
    <table>
      <thead><tr><th>Opzione</th><th>Descrizione</th></tr></thead>
      <tbody>
        <tr><td><code>--missing-ok</code></td><td>Non fallisce se gli oggetti referenziati mancano.</td></tr>
        <tr><td><code>--prefix=&lt;dir&gt;</code></td><td>Scrive un sottoalbero dell'index.</td></tr>
      </tbody>
    </table>
    <h2>Esempi</h2>
    <pre><code>git write-tree
    # Stampa lo SHA del tree che rappresenta l'index corrente

    TREE=$(git write-tree)
    COMMIT=$(echo "Snapshot" | git commit-tree "$TREE" -p HEAD)
    git update-ref refs/heads/snapshot "$COMMIT"
    # Costruisce manualmente un commit su un nuovo branch

    git write-tree --prefix=docs/
    # Solo il sottoalbero docs/</code></pre>
    <h2>Errori comuni</h2>
    <p>Se l'index ha entry non mergiate, <code>write-tree</code> fallisce. Risolvi prima i conflitti. Dimenticare che <code>write-tree</code> non crea un commit — solo un tree — porta a oggetti dangling.</p>
    <h2>Comandi correlati</h2>
    <p><code>git read-tree</code>, <code>git commit-tree</code>, <code>git ls-tree</code>, <code>git update-index</code></p>

- source_title: "git commit-tree — Create a new commit object"
  title: "git commit-tree — Crea un nuovo oggetto commit"
  langcode: it
  body: |
    <h2>Sinossi</h2>
    <pre><code>git commit-tree &lt;tree&gt; [-p &lt;parent&gt;]... [-m &lt;msg&gt;] [-S]</code></pre>
    <h2>Descrizione</h2>
    <p>Il comando <code>git commit-tree</code> costruisce un oggetto commit da uno SHA di tree dato, una lista opzionale di commit parent e un messaggio. Stampa lo SHA del nuovo commit. A differenza di <code>git commit</code>, NON aggiorna alcun ref — il commit risultante è dangling finché non punti un branch o tag ad esso.</p>
    <p>Nell'uso quotidiano, <code>git commit-tree</code> si integra con alias e CI.</p><p>Capire il modello dati di Git aiuta a prevedere i risultati.</p>
    <h2>Quando usarlo</h2>
    <p>La maggior parte degli sviluppatori non lo usa mai direttamente. È un mattone per strumenti che sintetizzano commit programmaticamente: importer, strategie di merge personalizzate, strumenti di riscrittura della storia. <code>filter-repo</code> usa commit-tree internamente.</p>
    <h2>Opzioni comuni</h2>
    <table>
      <thead><tr><th>Opzione</th><th>Descrizione</th></tr></thead>
      <tbody>
        <tr><td><code>-p &lt;parent&gt;</code></td><td>Specifica un commit parent (ripetibile per i merge).</td></tr>
        <tr><td><code>-m &lt;msg&gt;</code></td><td>Messaggio di commit (o legge da stdin).</td></tr>
        <tr><td><code>-F &lt;file&gt;</code></td><td>Legge il messaggio da file.</td></tr>
        <tr><td><code>-S[&lt;keyid&gt;]</code></td><td>Firma GPG il commit.</td></tr>
      </tbody>
    </table>
    <h2>Esempi</h2>
    <pre><code>TREE=$(git write-tree)
    COMMIT=$(echo "Initial commit" | git commit-tree "$TREE")
    git update-ref refs/heads/main "$COMMIT"
    # Costruisce un commit root da zero

    PARENT=$(git rev-parse HEAD)
    TREE=$(git write-tree)
    COMMIT=$(echo "Custom merge" | git commit-tree "$TREE" -p "$PARENT" -p "feature")
    git update-ref refs/heads/main "$COMMIT"
    # Sintetizza un merge commit personalizzato</code></pre>
    <h2>Errori comuni</h2>
    <p>Dimenticare di fare <code>git update-ref</code> lascia il commit dangling — <code>git gc</code> alla fine lo cancellerà. Le variabili d'ambiente author/committer (<code>GIT_AUTHOR_NAME</code> ecc.) devono essere impostate se vuoi identità non predefinite.</p>
    <h2>Comandi correlati</h2>
    <p><code>git write-tree</code>, <code>git update-ref</code>, <code>git commit</code>, <code>git filter-repo</code></p>

- source_title: "git diff-index — Compare a tree to the index or working tree"
  title: "git diff-index — Confronta un tree con l'index o la working tree"
  langcode: it
  body: |
    <h2>Sinossi</h2>
    <pre><code>git diff-index [--cached] [-p] &lt;tree-ish&gt; [&lt;path&gt;...]</code></pre>
    <h2>Descrizione</h2>
    <p>Il comando <code>git diff-index</code> è il compagno plumbing di <code>git diff</code>. Confronta un oggetto tree (commit, tag) con l'index o la working tree. L'output è il formato diff grezzo leggibile da macchina a meno che <code>-p</code> richieda una patch.</p>
    <p>Nell'uso quotidiano, <code>git diff-index</code> si integra con alias e CI.</p><p>Capire il modello dati di Git aiuta a prevedere i risultati.</p>
    <h2>Quando usarlo</h2>
    <p>La maggior parte degli utenti preferisce <code>git diff</code>, che è più facile da leggere. Usa <code>diff-index</code> negli script dove hai bisogno di un confronto stabile e non ambiguo e non vuoi le comodità del porcelain. Gli hook (specialmente <code>pre-commit</code>) lo usano spesso per controlli precisi.</p>
    <h2>Opzioni comuni</h2>
    <table>
      <thead><tr><th>Opzione</th><th>Descrizione</th></tr></thead>
      <tbody>
        <tr><td><code>--cached</code></td><td>Confronta tree con index (invece di working tree).</td></tr>
        <tr><td><code>-p</code></td><td>Mostra la patch.</td></tr>
        <tr><td><code>--name-only</code></td><td>Elenca solo i nomi dei file modificati.</td></tr>
        <tr><td><code>--name-status</code></td><td>Elenca i nomi con lettere di stato.</td></tr>
        <tr><td><code>--quiet</code></td><td>Esce non-zero se esistono differenze; non produce output.</td></tr>
        <tr><td><code>-z</code></td><td>Output terminato da NUL.</td></tr>
      </tbody>
    </table>
    <h2>Esempi</h2>
    <pre><code>git diff-index --cached HEAD
    # Equivalente plumbing di "git diff --staged"

    git diff-index HEAD
    # Working tree vs HEAD

    git diff-index --quiet HEAD || echo "Repo è sporco"
    # Test utile in script e hook

    git diff-index --name-only --diff-filter=A HEAD
    # Elenca file appena aggiunti</code></pre>
    <h2>Errori comuni</h2>
    <p>L'output raw predefinito non è testo della patch — passa <code>-p</code> per quello. <code>--quiet</code> imposta il codice di uscita piuttosto che stampare, che è l'opposto di ciò che gli utenti a volte si aspettano da un comando "diff".</p>
    <h2>Comandi correlati</h2>
    <p><code>git diff</code>, <code>git diff-tree</code>, <code>git status</code>, <code>git ls-files</code></p>

- source_title: "git checkout-index — Copy files from the index to the working tree"
  title: "git checkout-index — Copia file dall'index alla working tree"
  langcode: it
  body: |
    <h2>Sinossi</h2>
    <pre><code>git checkout-index [-a] [-f] [-u] [--prefix=&lt;dir&gt;] [&lt;file&gt;...]</code></pre>
    <h2>Descrizione</h2>
    <p>Il comando <code>git checkout-index</code> scrive il contenuto dei file dall'index alla working tree (o a una directory arbitraria usando <code>--prefix</code>). Non cambia l'index, il branch corrente o HEAD — rendendolo più sicuro di <code>git checkout</code> per estrazione file scriptata.</p>
    <p>Nell'uso quotidiano, <code>git checkout-index</code> si integra con alias e CI.</p><p>Capire il modello dati di Git aiuta a prevedere i risultati.</p>
    <h2>Quando usarlo</h2>
    <p>La maggior parte degli utenti non ne ha mai bisogno. Usalo quando script un deployment dall'index, costruisci tarball sorgente o esporti uno snapshot a una directory diversa dalla working tree.</p>
    <h2>Opzioni comuni</h2>
    <table>
      <thead><tr><th>Opzione</th><th>Descrizione</th></tr></thead>
      <tbody>
        <tr><td><code>-a</code>, <code>--all</code></td><td>Fa checkout di ogni file nell'index.</td></tr>
        <tr><td><code>-f</code>, <code>--force</code></td><td>Sovrascrive file esistenti.</td></tr>
        <tr><td><code>-u</code></td><td>Aggiorna info di stat per i file scritti.</td></tr>
        <tr><td><code>--prefix=&lt;dir&gt;</code></td><td>Scrive in <code>&lt;dir&gt;</code> invece che nella working tree.</td></tr>
        <tr><td><code>--stage=&lt;n&gt;</code></td><td>Fa checkout di uno stage specifico (1=base, 2=ours, 3=theirs).</td></tr>
        <tr><td><code>-z</code></td><td>Input/output terminato da NUL.</td></tr>
        <tr><td><code>--no-create</code></td><td>Non crea file; aggiorna solo le stat.</td></tr>
      </tbody>
    </table>
    <h2>Esempi</h2>
    <pre><code>git checkout-index -a -f --prefix=/tmp/snapshot/
    # Esporta l'intero index in /tmp/snapshot/

    git checkout-index --prefix=build/ src/main.c
    # Copia un singolo file in build/

    git checkout-index --stage=2 -f -- conflicted.txt
    # Sceglie la versione "ours" durante un conflitto

    git ls-files | git checkout-index -f --stdin
    # Ripristina ogni file tracciato dall'index</code></pre>
    <h2>Errori comuni</h2>
    <p>L'argomento <code>--prefix</code> deve terminare con uno slash, altrimenti i nomi dei file si concatenano in modo strano. Senza <code>-f</code>, file esistenti nella destinazione causano errori. Scegliere lo <code>--stage</code> sbagliato durante la risoluzione dei conflitti applica una versione peggiore di quella intesa.</p>
    <h2>Comandi correlati</h2>
    <p><code>git checkout</code>, <code>git restore</code>, <code>git archive</code>, <code>git ls-files</code></p>
