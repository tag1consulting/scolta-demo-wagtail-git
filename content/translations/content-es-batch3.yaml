# Dominando Git - traducciones al español, lote 3
# 70 páginas: Avanzado y Rendimiento

- source_title: "Interactive rebase mastery: git rebase -i in depth"
  title: "Dominio del rebase interactivo: git rebase -i en profundidad"
  langcode: es
  body: |
    <h2>Por qué el rebase interactivo</h2>
    <p>El rebase interactivo reescribe una secuencia de commits en una historia más limpia y significativa antes de publicar. Es el instrumento quirúrgico de Git: puedes reordenar, editar, hacer squash, fixup, descartar, reescribir o dividir commits, todo en una sola sesión guiada. Dominarlo transforma una rama local desordenada en una historia que los revisores pueden seguir.</p>
    <h2>La lista de tareas</h2>
    <p>Ejecutar <code>git rebase -i</code> abre un editor con una lista de tareas. Cada línea tiene un verbo y un commit. Reordena las líneas para reordenar los commits. Cambia los verbos para cambiar el comportamiento.</p>
    <pre><code>git rebase -i HEAD~5</code></pre>
    <p>Los verbos incluyen <code>pick</code> (usar commit), <code>reword</code> (editar solo el mensaje), <code>edit</code> (detenerse para enmendar), <code>squash</code> (combinar con el anterior, conservar ambos mensajes), <code>fixup</code> (combinar, descartar el mensaje), <code>drop</code> (eliminar) y <code>exec</code> (ejecutar un comando shell entre commits). Dos verbos más recientes son <code>break</code> (pausar incondicionalmente) y <code>label</code>/<code>reset</code>/<code>merge</code> para el grafo de merge del rebase (desde Git 2.18).</p>
    <h2>Dividir un commit</h2>
    <p>Marca el commit con <code>edit</code>, luego deshaz y vuelve a hacer commit:</p>
    <pre><code>git reset HEAD^
    git add -p
    git commit -m "Primer cambio lógico"
    git add -p
    git commit -m "Segundo cambio lógico"
    git rebase --continue</code></pre>
    <h2>Flujo de autosquash</h2>
    <p>Cuando detectas un error tipográfico en un commit anterior, crea un commit fixup y deja que rebase los ordene automáticamente:</p>
    <pre><code>git commit --fixup=&lt;sha&gt;
    git rebase -i --autosquash HEAD~10</code></pre>
    <p>Configura <code>rebase.autoSquash = true</code> para que sea el predeterminado. Combínalo con <code>rebase.autoStash = true</code> para que los árboles de trabajo sucios no bloqueen el rebase.</p>
    <h2>Exec para verificación</h2>
    <p>Usa líneas <code>exec</code> para verificar que cada commit compila y los tests pasan — invaluable para mantener una historia bisectable:</p>
    <pre><code>git rebase -i --exec "cargo test" main</code></pre>
    <p>Cada commit entre HEAD y main será revisado y se ejecutará el comando. Si falla, rebase se detiene para que puedas arreglar y continuar.</p>
    <h2>Rebase de merges con --rebase-merges</h2>
    <p>El rebase tradicional aplana los merges. Pasa <code>--rebase-merges</code> para preservar la topología:</p>
    <pre><code>git rebase -i --rebase-merges main</code></pre>
    <h2>Errores comunes</h2>
    <p>Hacer rebase de commits publicados obliga a los colaboradores a cirugía de historia. Reserva el rebase interactivo para ramas que solo tú posees, o coordina explícitamente. Olvidar <code>git rebase --continue</code> tras resolver conflictos deja el rebase a medio aplicar. Usa <code>git status</code> — te dice exactamente qué hacer. Finalmente, si destruyes trabajo, <code>git reflog</code> casi siempre lo rescata.</p>
    <h2>Recuperación</h2>
    <p>Si un rebase sale mal, aborta y empieza de nuevo:</p>
    <pre><code>git rebase --abort
    git reflog
    git reset --hard HEAD@{5}</code></pre>

- source_title: "Cherry-picking strategies and pitfalls"
  title: "Estrategias y trampas del cherry-pick"
  langcode: es
  body: |
    <h2>Qué hace cherry-pick</h2>
    <p><code>git cherry-pick</code> aplica el diff de uno o más commits sobre la rama actual como nuevos commits. Es la herramienta correcta cuando quieres un cambio específico sin hacer merge de toda la rama — típico para portar arreglos a una rama de release o para adelantar un hotfix.</p>
    <h2>Uso básico y por rangos</h2>
    <pre><code>git cherry-pick &lt;sha&gt;
    git cherry-pick A..B          # exclusivo de A, inclusivo de B
    git cherry-pick A^..B         # inclusivo de A y B</code></pre>
    <p>Cherry-pick admite la misma sintaxis de rangos que <code>git log</code>. Usa <code>--no-commit</code> (<code>-n</code>) para preparar los cambios sin hacer commit — útil al aplicar varios picks como un único commit.</p>
    <h2>Resolver conflictos</h2>
    <p>Si un pick entra en conflicto, Git se detiene. Resuelve, prepara y continúa:</p>
    <pre><code>git cherry-pick --continue
    git cherry-pick --skip
    git cherry-pick --abort</code></pre>
    <h2>Registrar la fuente</h2>
    <p>Usa <code>-x</code> para añadir una línea "(cherry picked from commit ...)" al mensaje, lo que les encanta a los auditores:</p>
    <pre><code>git cherry-pick -x &lt;sha&gt;</code></pre>
    <h2>Mainline para merges</h2>
    <p>Hacer cherry-pick de un commit de merge es ambiguo: ¿qué padre proporciona la base? Usa <code>-m</code>:</p>
    <pre><code>git cherry-pick -m 1 &lt;merge-sha&gt;</code></pre>
    <p>El mainline 1 suele ser la rama que recibió el merge.</p>
    <h2>Trampa: historias divergentes</h2>
    <p>Cherry-pick crea un nuevo commit con un SHA diferente al original. Si ambas ramas eventualmente se fusionan, Git suele reconciliarlas, pero si las dos copias han divergido por ediciones posteriores, arriesgas re-aplicar o tener conflictos. Prefiere merge cuando se desea integración completa de rama.</p>
    <h2>Trampa: deriva semántica silenciosa</h2>
    <p>Un cherry-pick textualmente limpio aún puede romper el comportamiento si el código circundante ha cambiado de significado. Siempre ejecuta tests tras los picks, especialmente entre versiones distantes.</p>
    <h2>Rastreo de picks aplicados</h2>
    <p>Para encontrar qué commits en una rama fueron escogidos de otra parte, mira <code>git log --grep="cherry picked from"</code> cuando se usó <code>-x</code>. Para un enfoque más riguroso, ver <code>git patch-id</code>:</p>
    <pre><code>git log -p &lt;sha&gt; | git patch-id
    git log -p main | git patch-id</code></pre>
    <h2>Errores comunes</h2>
    <p>Hacer cherry-pick sin <code>-x</code> en una rama de release mantenida hace dolorosos los registros de auditoría. Olvidar <code>-m</code> en un commit de merge produce un pick vacío o un diff confuso. Cuando dudes, prefiere <code>git rebase --onto</code> para mover secuencias de commits entre ramas.</p>

- source_title: "Automatic bug bisection with git bisect"
  title: "Bisección automática de bugs con git bisect"
  langcode: es
  body: |
    <h2>Búsqueda binaria por la historia</h2>
    <p><code>git bisect</code> realiza una búsqueda binaria entre commits para encontrar el que introdujo un bug. Dado un commit conocido como bueno y otro conocido como malo, Git revisa commits intermedios y te pide que pruebes. Cada respuesta divide el espacio de búsqueda a la mitad, así que 1024 commits se resuelven en unos 10 pasos.</p>
    <h2>Sesión manual de bisect</h2>
    <pre><code>git bisect start
    git bisect bad                    # commit actual es malo
    git bisect good v2.4.0            # este tag antiguo era bueno
    # Git revisa el punto medio
    # Prueba el build, luego:
    git bisect bad                    # o: git bisect good
    # Continúa hasta que Git nombre el primer commit malo
    git bisect reset                  # vuelve a la rama original</code></pre>
    <h2>Términos personalizados</h2>
    <p>A veces "good/bad" no es el vocabulario correcto — por ejemplo, al bisectar una regresión de rendimiento podrías preferir "fast/slow":</p>
    <pre><code>git bisect start --term-old fast --term-new slow
    git bisect slow
    git bisect fast v2.4.0</code></pre>
    <h2>Saltarse commits no probables</h2>
    <p>Si el commit revisado no se puede probar, usa <code>git bisect skip</code>. Git escogerá un commit cercano y se ajustará.</p>
    <pre><code>git bisect skip
    git bisect skip &lt;sha1&gt; &lt;sha2&gt;</code></pre>
    <h2>Visualizar</h2>
    <pre><code>git bisect visualize
    git bisect log &gt; bisect.log
    git bisect replay bisect.log</code></pre>
    <h2>Restringir la búsqueda</h2>
    <p>Si sospechas que la regresión está en un subdirectorio:</p>
    <pre><code>git bisect start -- src/parser/</code></pre>
    <h2>Errores comunes</h2>
    <p>Olvidar marcar los puntos extremos iniciales — Git no puede bisectar sin uno bueno y uno malo. Marcar incorrectamente un commit envenena la búsqueda.</p>
    <h2>Bisecting por primer padre</h2>
    <p>Desde Git 2.29, <code>--first-parent</code> indica seguir solo el primer padre de cada merge:</p>
    <pre><code>git bisect start --first-parent</code></pre>

- source_title: "Bisect with automated test scripts"
  title: "Bisect con scripts de test automatizados"
  langcode: es
  body: |
    <h2>Bisección sin manos</h2>
    <p>El bisect manual requiere un veredicto humano en cada paso. <code>git bisect run</code> automatiza el bucle: proporciona un script que devuelve 0 para bueno, distinto de cero para malo, y 125 para "saltar este commit." Bisect llevará la búsqueda hasta el final, a menudo desatendido.</p>
    <h2>El contrato</h2>
    <p>Tu script debe:</p>
    <ul>
      <li>Devolver 0 cuando el commit sea bueno.</li>
      <li>Devolver entre 1 y 124, o 126/127, cuando sea malo.</li>
      <li>Devolver 125 cuando no se pueda probar.</li>
      <li>Evitar códigos fuera de estos rangos; 128+ aborta bisect.</li>
    </ul>
    <h2>Ejemplo</h2>
    <pre><code>#!/usr/bin/env bash
    set -e
    make clean
    make || exit 125              # no probable
    ./tests/regression-1234 || exit 1
    exit 0</code></pre>
    <p>Conduce bisect con él:</p>
    <pre><code>git bisect start HEAD v2.4.0
    git bisect run ./bisect-test.sh</code></pre>
    <h2>One-liners en línea</h2>
    <pre><code>git bisect run sh -c "make &amp;&amp; ./run-test || exit 1"</code></pre>
    <h2>Regresiones de rendimiento</h2>
    <pre><code>git bisect run sh -c '
      cargo build --release || exit 125
      t=$(./bench --json | jq .ms)
      awk -v t="$t" "BEGIN { exit (t &gt; 250) }"'</code></pre>
    <h2>Tests intermitentes</h2>
    <pre><code>git bisect run sh -c '
      for i in 1 2 3 4 5; do
    ./flaky-test || exit 1
      done
      exit 0'</code></pre>
    <h2>Errores comunes</h2>
    <p>Devolver código 128 o más a mitad de búsqueda aborta bisect. Olvidar <code>git bisect reset</code> al final te deja en HEAD desacoplado. No usar <code>exit 125</code> en commits no compilables causa malos falsos.</p>
    <h2>Reportes reproducibles</h2>
    <pre><code>git bisect log &gt; bisect.log</code></pre>

- source_title: "Submodules: adding and updating"
  title: "Submódulos: añadir y actualizar"
  langcode: es
  body: |
    <h2>Qué son los submódulos</h2>
    <p>Un submódulo es un repositorio Git anidado dentro de otro. El repo padre registra la URL del submódulo y un SHA específico, así cualquiera que clone el padre puede obtener el código exacto que se probó conjuntamente. Usa submódulos cuando quieras anclar una dependencia a un commit fijo preservando su historia independiente.</p>
    <h2>Añadir un submódulo</h2>
    <pre><code>git submodule add https://github.com/example/lib third_party/lib
    git commit -m "Añadir submódulo lib"</code></pre>
    <p>Esto crea un archivo <code>.gitmodules</code> que registra la ruta y la URL.</p>
    <h2>Clonar un proyecto con submódulos</h2>
    <pre><code>git clone --recurse-submodules https://github.com/you/parent
    # o, tras un clone simple:
    git submodule update --init --recursive</code></pre>
    <p>Configura <code>submodule.recurse = true</code> globalmente para que comandos como <code>git pull</code> y <code>git checkout</code> actualicen submódulos automáticamente.</p>
    <h2>Actualizar a un nuevo commit del submódulo</h2>
    <pre><code>cd third_party/lib
    git fetch
    git checkout v2.0.0
    cd ../..
    git add third_party/lib
    git commit -m "Subir lib a v2.0.0"</code></pre>
    <h2>Diff y status</h2>
    <pre><code>git diff --submodule=log
    git submodule status
    git submodule summary</code></pre>
    <h2>Foreach</h2>
    <pre><code>git submodule foreach 'git fetch --all'
    git submodule foreach --recursive 'git checkout main &amp;&amp; git pull'</code></pre>
    <h2>Errores comunes</h2>
    <p>Olvidar <code>--init</code> en el primer clone deja directorios de submódulo vacíos. Editar dentro de un submódulo y hacer commit en el padre sin haber hecho push del submódulo primero deja a los colaboradores con un padre que referencia un SHA inalcanzable. Siempre haz push del submódulo primero, luego del padre. Configura <code>push.recurseSubmodules = on-demand</code>.</p>
    <h2>Trampa de seguimiento de rama</h2>
    <p>Los submódulos hacen checkout de un HEAD desacoplado en el SHA registrado. Antes de cambiar archivos, haz <code>git checkout</code> de una rama dentro del submódulo.</p>

- source_title: "Submodules: common problems and solutions"
  title: "Submódulos: problemas comunes y soluciones"
  langcode: es
  body: |
    <h2>Lista de frustraciones</h2>
    <p>Los submódulos son potentes pero hacen tropezar a los nuevos usuarios repetidamente. Esta página cataloga los fallos más comunes y las recetas que los arreglan.</p>
    <h2>Directorio de submódulo vacío</h2>
    <pre><code>git submodule update --init --recursive</code></pre>
    <h2>Ediciones en HEAD desacoplado perdidas</h2>
    <p>Editaste dentro de un submódulo, hiciste commit, luego ejecutaste <code>git submodule update</code> en el padre. La actualización reseteó el submódulo al SHA registrado, abandonando tu trabajo en HEAD desacoplado. Recupera con <code>git reflog</code> dentro del submódulo.</p>
    <pre><code>cd third_party/lib
    git reflog
    git checkout -b rescue HEAD@{1}</code></pre>
    <p>Crea siempre una rama dentro de un submódulo antes de editar.</p>
    <h2>URL cambiada upstream</h2>
    <pre><code>git submodule sync --recursive
    git submodule update --init --recursive</code></pre>
    <h2>Eliminar un submódulo</h2>
    <pre><code>git submodule deinit -f third_party/lib
    git rm -f third_party/lib
    rm -rf .git/modules/third_party/lib
    git commit -m "Eliminar submódulo lib"</code></pre>
    <h2>Contenido modificado pero sin diff</h2>
    <pre><code>git submodule update --recursive
    # o
    git add third_party/lib &amp;&amp; git commit -m "Subir lib"</code></pre>
    <h2>El orden de push importa</h2>
    <pre><code>git config --global push.recurseSubmodules on-demand</code></pre>
    <h2>Submódulos shallow</h2>
    <pre><code>git submodule update --init --recursive --depth 1</code></pre>
    <h2>Errores comunes</h2>
    <p>Tratar a los submódulos como subdirectorios normales — no lo son, todo comando Git se detiene en el límite a menos que pases <code>--recurse-submodules</code>. Mezclar submódulos con seguimiento de rama con flujos de SHA fijo lleva a confusión.</p>

- source_title: "Subtrees: a simpler alternative to submodules"
  title: "Subárboles: una alternativa más simple a los submódulos"
  langcode: es
  body: |
    <h2>El modelo de subárbol</h2>
    <p>Un subárbol fusiona la historia de otro repositorio en un subdirectorio del tuyo. A diferencia de los submódulos, no hay gitlink separado ni comandos extra requeridos para clonar — cualquiera que clone tu repo obtiene el contenido del subárbol automáticamente. El costo es una historia más densa; el beneficio es simplicidad operativa.</p>
    <h2>Añadir un subárbol</h2>
    <pre><code>git subtree add --prefix=third_party/lib \
      https://github.com/example/lib main --squash</code></pre>
    <p>El flag <code>--squash</code> colapsa la historia importada en un solo commit. Omítelo si quieres la historia upstream completa.</p>
    <h2>Traer actualizaciones</h2>
    <pre><code>git subtree pull --prefix=third_party/lib \
      https://github.com/example/lib main --squash</code></pre>
    <p>Añade un alias de remote para evitar reescribir la URL:</p>
    <pre><code>git remote add lib https://github.com/example/lib
    git subtree pull --prefix=third_party/lib lib main --squash</code></pre>
    <h2>Hacer push hacia upstream</h2>
    <pre><code>git subtree push --prefix=third_party/lib lib feature-branch</code></pre>
    <h2>Subárbol vs submódulo</h2>
    <p>Elige subárboles cuando quieras un clone sin fricción para los novatos, cuando rara vez modifiques el código vendor, o cuando la complejidad de CI alrededor de submódulos te haya mordido. Elige submódulos cuando necesites anclar a un SHA upstream exacto.</p>
    <h2>Dividir un subdirectorio</h2>
    <pre><code>git subtree split --prefix=third_party/lib -b lib-only
    cd ..
    git clone /path/to/parent --branch lib-only lib-extracted</code></pre>
    <h2>Errores comunes</h2>
    <p>Olvidar <code>--squash</code> importa decenas de miles de commits upstream. Mezclar ediciones dentro del prefijo con ediciones fuera en el mismo commit hace ruidoso a <code>subtree push</code>.</p>
    <h2>Alternativa: estrategia merge subtree</h2>
    <pre><code>git remote add -f lib https://github.com/example/lib
    git merge -s ours --no-commit --allow-unrelated-histories lib/main
    git read-tree --prefix=third_party/lib/ -u lib/main
    git commit -m "Subtree merge of lib"</code></pre>

- source_title: "filter-repo: rewriting history safely"
  title: "filter-repo: reescribir la historia con seguridad"
  langcode: es
  body: |
    <h2>Por qué filter-repo</h2>
    <p><code>git filter-repo</code> es el reemplazo moderno del obsoleto <code>git filter-branch</code>. Es dramáticamente más rápido — a veces 100x — más seguro por defecto, y proporciona las operaciones de alto nivel que la cirugía de historia realmente necesita: eliminar archivos, renombrar rutas, eliminar autores, dividir subdirectorios y cambiar emails en todos los commits.</p>
    <h2>Instalación</h2>
    <p>filter-repo no viene incluido con Git pero está ampliamente empaquetado. En macOS: <code>brew install git-filter-repo</code>. En Debian/Ubuntu: <code>apt install git-filter-repo</code>.</p>
    <h2>Eliminar un archivo de toda la historia</h2>
    <pre><code>git filter-repo --path secrets.env --invert-paths</code></pre>
    <p>Esto reescribe cada commit que tocó <code>secrets.env</code> para omitir el archivo, luego poda los objetos huérfanos. Haz force-push del resultado y rota cualquier credencial filtrada inmediatamente.</p>
    <h2>Extraer un subdirectorio como nuevo repo</h2>
    <pre><code>git clone --no-local original/ extracted/
    cd extracted
    git filter-repo --subdirectory-filter packages/foo</code></pre>
    <h2>Renombrar rutas</h2>
    <pre><code>git filter-repo --path-rename old/dir/:new/dir/</code></pre>
    <h2>Actualizar emails de autor</h2>
    <pre><code>cat &gt; mailmap.txt &lt;&lt;'EOF'
    Jane Doe &lt;jane@new.example&gt; &lt;jane@old.example&gt;
    EOF
    git filter-repo --mailmap mailmap.txt</code></pre>
    <h2>Características de seguridad</h2>
    <p>filter-repo se niega a ejecutarse en un clone no fresco por defecto. Anula solo cuando entiendas las implicaciones:</p>
    <pre><code>git filter-repo --force</code></pre>
    <h2>Errores comunes</h2>
    <p>Ejecutar en tu único clone con <code>--force</code> y sin backup. Siempre clona primero. Olvidar que filter-repo elimina el remote original para prevenir pushes accidentales — vuelve a añadirlo explícitamente.</p>
    <h2>Rendimiento</h2>
    <p>filter-repo hace streaming vía <code>git fast-export</code>/<code>fast-import</code>. Para repos muy grandes, ejecuta en un SSD rápido y aumenta <code>core.bigFileThreshold</code> si tienes problemas de memoria.</p>

- source_title: "Removing sensitive data from history"
  title: "Eliminar datos sensibles de la historia"
  langcode: es
  body: |
    <h2>Respuesta a incidentes</h2>
    <p>Hiciste commit de una clave API, contraseña o llave privada. Eliminarla del último commit no es suficiente — Git mantiene el archivo en cada commit anterior hasta que reescribas la historia. Esta página recorre la respuesta completa al incidente.</p>
    <h2>Paso 1: rotar inmediatamente</h2>
    <p>Antes de tocar el repo, revoca la credencial. Asume que cualquier historia subida ya ha sido replicada, raspada o cacheada por el programa de archivo de GitHub. Rotar es la única solución verdadera; reescribir solo ralentiza a los atacantes.</p>
    <h2>Paso 2: reescribir la historia con filter-repo</h2>
    <pre><code>git clone --mirror git@github.com:org/repo.git repo-mirror
    cd repo-mirror
    git filter-repo --path config/secrets.yml --invert-paths</code></pre>
    <p>Para eliminación basada en patrones a través de muchos archivos:</p>
    <pre><code>cat &gt; replace.txt &lt;&lt;'EOF'
    regex:AKIA[0-9A-Z]{16}==&gt;REDACTED
    literal:hunter2==&gt;REDACTED
    EOF
    git filter-repo --replace-text replace.txt</code></pre>
    <h2>Paso 3: force-push</h2>
    <pre><code>git push --force --all
    git push --force --tags</code></pre>
    <p>Coordina con los colaboradores: cada clone que tienen contiene el secreto. Deben re-clonar o hacer rebase.</p>
    <h2>Paso 4: podar objetos locales</h2>
    <pre><code>git reflog expire --expire=now --all
    git gc --prune=now --aggressive</code></pre>
    <h2>Detectar secretos pronto</h2>
    <p>Instala un hook pre-commit que escanee el contenido staged con <code>gitleaks</code> o <code>trufflehog</code>:</p>
    <pre><code>#!/usr/bin/env bash
    gitleaks protect --staged --redact || exit 1</code></pre>
    <h2>Errores comunes</h2>
    <p>Creer que un force-push es suficiente — los caches, forks, mirrors y clones del equipo aún tienen los datos. Saltarse la rotación. Usar <code>git filter-branch</code>, que está obsoleto y es lento. Olvidar los tags: los secretos a menudo viven también en releases tageadas.</p>
    <h2>Auditoría</h2>
    <pre><code>git log -p --all -S "AKIA"
    git grep "hunter2" $(git rev-list --all)</code></pre>

- source_title: "Squashing and reorganizing commits"
  title: "Squash y reorganización de commits"
  langcode: es
  body: |
    <h2>Por qué squash</h2>
    <p>Una rama de feature suele acumular commits de "WIP", "fix typo" y "atendiendo review" que entierran la intención. El squash los condensa en un pequeño número de commits lógicamente significativos antes del merge. Los revisores ven historia limpia; bisect funciona sobre unidades reales de cambio.</p>
    <h2>Squash en el merge</h2>
    <pre><code>git checkout main
    git merge --squash feature
    git commit -m "Añadir feature X"</code></pre>
    <h2>Squash con rebase interactivo</h2>
    <pre><code>git rebase -i main</code></pre>
    <p>Cambia <code>pick</code> por <code>squash</code> (mantener ambos mensajes) o <code>fixup</code> (descartar el mensaje del squash) en las líneas que quieras colapsar.</p>
    <h2>Flujo de autosquash</h2>
    <pre><code>git commit --fixup=&lt;sha&gt;
    git commit --squash=&lt;sha&gt;
    git rebase -i --autosquash main</code></pre>
    <p>Configura <code>git config rebase.autoSquash true</code>.</p>
    <h2>Reordenar para claridad</h2>
    <p>Durante el rebase interactivo, intercambia líneas para reordenar. Si un refactor debe preceder a un feature, asegúrate de que el commit del refactor venga primero.</p>
    <h2>Dividir commits demasiado grandes</h2>
    <pre><code>git reset HEAD^
    git add -p src/parser.c
    git commit -m "Refactor parser"
    git add -p src/runtime.c
    git commit -m "Refactor runtime"
    git rebase --continue</code></pre>
    <h2>Errores comunes</h2>
    <p>Hacer squash entre un merge colapsa dos ramas en un mega-commit. Hacer squash de commits ya pushed obliga a los colaboradores a hacer rebase. Apunta a varios commits enfocados, no uno gigante.</p>
    <h2>Preservar autores</h2>
    <pre><code>git commit -m "Añadir feature X

    Co-authored-by: Alice &lt;alice@example.com&gt;
    Co-authored-by: Bob &lt;bob@example.com&gt;"</code></pre>

- source_title: "Rerere: automatic conflict resolution reuse"
  title: "Rerere: reutilización automática de resoluciones de conflicto"
  langcode: es
  body: |
    <h2>Qué hace rerere</h2>
    <p>Rerere — "reuse recorded resolution" — observa cómo resuelves un conflicto de merge, registra la resolución, y la reproduce la próxima vez que el mismo conflicto aparezca. Es invaluable en ramas de larga vida que repetidamente hacen rebase o merge contra un main activo.</p>
    <h2>Habilitación</h2>
    <pre><code>git config --global rerere.enabled true
    git config --global rerere.autoupdate true</code></pre>
    <h2>Cómo funciona</h2>
    <p>Cuando ocurre un conflicto, Git almacena un hash del contexto del conflicto bajo <code>.git/rr-cache/</code>. Tras resolver y hacer commit, la resolución se asocia con ese hash. Futuros merges que produzcan el mismo contexto reciben la resolución registrada automáticamente.</p>
    <h2>Inspeccionar estado</h2>
    <pre><code>git rerere status
    git rerere diff
    git rerere remaining</code></pre>
    <h2>Olvidar una mala resolución</h2>
    <pre><code>git rerere forget path/to/file</code></pre>
    <h2>Caso de uso: tormentas de rebase</h2>
    <p>Mantienes una rama de feature larga y haces rebase contra main semanalmente. Los mismos conflictos en <code>CHANGELOG.md</code> aparecen cada vez. Sin rerere los re-resuelves; con rerere, la primera resolución manual se reproduce el resto del rebase.</p>
    <h2>Caso de uso: rama de integración</h2>
    <p>Algunos equipos mantienen una rama de "integración" que re-fusiona todas las ramas de feature cada noche para detectar conflictos pronto. Rerere hace casi automáticos esos merges nocturnos.</p>
    <h2>Errores comunes</h2>
    <p>Confiar ciegamente en rerere: siempre inspecciona con <code>git diff --staged</code> antes de hacer commit. Rerere coincide por contexto, no por intención semántica.</p>
    <h2>Entrenar rerere desde la historia</h2>
    <pre><code>git rev-list --merges main | while read merge; do
      git checkout "$merge^"
      git merge "$merge^2" || git rerere
      git reset --hard
    done</code></pre>

- source_title: "Git hooks: pre-commit, prepare-commit-msg, commit-msg"
  title: "Hooks de Git: pre-commit, prepare-commit-msg, commit-msg"
  langcode: es
  body: |
    <h2>Hooks del lado cliente</h2>
    <p>Los hooks son scripts ejecutables en <code>.git/hooks/</code> (o donde apunte <code>core.hooksPath</code>). Git los invoca en momentos bien definidos. Los tres hooks de tiempo de commit te permiten aplicar políticas antes de que un commit sea finalizado.</p>
    <h2>pre-commit</h2>
    <p>Se ejecuta antes de que se componga el mensaje del commit. Devuelve no-cero para abortar. Usos típicos: linting, formato, escaneo de secretos, ejecutar tests rápidos.</p>
    <pre><code>#!/usr/bin/env bash
    # .git/hooks/pre-commit
    set -e
    files=$(git diff --cached --name-only --diff-filter=ACMR | grep '\.py$' || true)
    [ -z "$files" ] &amp;&amp; exit 0
    ruff check $files
    ruff format --check $files</code></pre>
    <p>Hazlo ejecutable: <code>chmod +x .git/hooks/pre-commit</code>.</p>
    <h2>prepare-commit-msg</h2>
    <p>Se ejecuta tras generar el mensaje por defecto y antes de abrirse el editor. Útil para anteponer números de ticket extraídos del nombre de la rama.</p>
    <pre><code>#!/usr/bin/env bash
    # .git/hooks/prepare-commit-msg
    MSG_FILE=$1
    SOURCE=$2
    [ "$SOURCE" = "message" ] &amp;&amp; exit 0
    branch=$(git symbolic-ref --short HEAD)
    ticket=$(echo "$branch" | grep -oE '[A-Z]+-[0-9]+' || true)
    [ -n "$ticket" ] &amp;&amp; sed -i.bak "1s/^/[$ticket] /" "$MSG_FILE"</code></pre>
    <h2>commit-msg</h2>
    <pre><code>#!/usr/bin/env bash
    # .git/hooks/commit-msg
    pattern='^(feat|fix|docs|refactor|test|chore)(\(.+\))?: .{1,72}'
    grep -qE "$pattern" "$1" || {
      echo "El mensaje del commit debe seguir Conventional Commits."
      exit 1
    }</code></pre>
    <h2>Compartir hooks con el equipo</h2>
    <pre><code>git config core.hooksPath .githooks</code></pre>
    <p>O usa un gestor como <code>pre-commit</code> (Python), <code>lefthook</code>, o <code>husky</code> (JS).</p>
    <h2>Saltarse</h2>
    <p>Pasa <code>--no-verify</code> para saltar los hooks pre-commit y commit-msg. Reserva esto para emergencias.</p>
    <h2>Errores comunes</h2>
    <p>Hooks lentos frustran a los desarrolladores y se saltan. Mantenlos por debajo de un segundo cuando sea posible. Olvidar el bit ejecutable en checkouts de Windows rompe la ejecución del hook.</p>

- source_title: "Git hooks: post-commit, post-receive, pre-push"
  title: "Hooks de Git: post-commit, post-receive, pre-push"
  langcode: es
  body: |
    <h2>Después del hecho</h2>
    <p>Donde los hooks de tiempo de commit dan forma a los commits, los hooks de esta página reaccionan a ellos. <code>post-commit</code> se ejecuta localmente tras cada commit, <code>pre-push</code> se ejecuta antes de transferir objetos a un remote, y <code>post-receive</code> se ejecuta en el servidor tras aterrizar un push.</p>
    <h2>post-commit</h2>
    <p>No puede bloquear — se ejecuta tras registrarse el commit. Útil para notificaciones, regeneración de ctags, o lanzar tareas en background.</p>
    <pre><code>#!/usr/bin/env bash
    # .git/hooks/post-commit
    ctags -R --languages=python -f .tags &amp; disown
    notify-send "Committed: $(git log -1 --format=%s)"</code></pre>
    <h2>pre-push</h2>
    <pre><code>#!/usr/bin/env bash
    # .git/hooks/pre-push
    remote="$1"
    url="$2"
    while read local_ref local_sha remote_ref remote_sha; do
      if [ "$remote_ref" = "refs/heads/main" ]; then
    if ! cargo test --quiet; then
      echo "Los tests fallan; rechazando push a main."
      exit 1
    fi
      fi
    done</code></pre>
    <h2>post-receive (lado servidor)</h2>
    <p>Se ejecuta en el remote tras completarse un push. Usos comunes: desplegar un sitio estático, lanzar CI, enviar notificaciones de chat, mirror a otro remote.</p>
    <pre><code>#!/usr/bin/env bash
    while read oldrev newrev refname; do
      branch=${refname#refs/heads/}
      if [ "$branch" = "main" ]; then
    GIT_WORK_TREE=/var/www/site git checkout -f main
    curl -X POST https://chat.example/notify \
      -d "Desplegado $newrev a producción"
      fi
    done</code></pre>
    <h2>Otros hooks de servidor</h2>
    <p><code>pre-receive</code> se ejecuta una vez por push y puede rechazar todo el push. <code>update</code> se ejecuta una vez por ref y puede rechazar refs individuales.</p>
    <h2>Encadenamiento de hooks</h2>
    <pre><code>#!/usr/bin/env bash
    for hook in .githooks/post-commit.d/*; do
      [ -x "$hook" ] &amp;&amp; "$hook" "$@" || exit $?
    done</code></pre>
    <h2>Errores comunes</h2>
    <p>post-commit no puede prevenir un commit; no pongas validación allí. pre-push se ejecuta solo cuando push es invocado manualmente.</p>
    <h2>Depuración</h2>
    <pre><code>exec &gt;&gt; /tmp/git-hook.log 2&gt;&amp;1
    set -x</code></pre>

- source_title: "Custom merge strategies and drivers"
  title: "Estrategias y drivers de merge personalizados"
  langcode: es
  body: |
    <h2>Estrategias vs drivers</h2>
    <p>Una <em>estrategia</em> de merge decide cómo Git combina dos historias — <code>ort</code> (predeterminada desde Git 2.34), <code>recursive</code> (legacy), <code>resolve</code>, <code>octopus</code> y <code>ours</code>. Un <em>driver</em> de merge es lógica por archivo que se ejecuta cuando ambos lados han cambiado el mismo archivo.</p>
    <h2>Seleccionar una estrategia</h2>
    <pre><code>git merge -s ort feature
    git merge -s ours legacy-branch
    git merge -s octopus a b c d</code></pre>
    <h2>Opciones de estrategia</h2>
    <pre><code>git merge -X theirs feature
    git merge -X ignore-all-space main
    git merge -X renormalize legacy</code></pre>
    <h2>Drivers personalizados</h2>
    <pre><code>[merge "ours-only"]
    name = Mantener siempre nuestra versión
    driver = true</code></pre>
    <p>Conéctalo en <code>.gitattributes</code>:</p>
    <pre><code>CHANGELOG.md merge=ours-only
    *.lock merge=union</code></pre>
    <h2>Driver del mundo real: yarn.lock</h2>
    <pre><code>[merge "yarn-lock"]
    name = Re-ejecutar yarn install
    driver = "yarn install --silent &amp;&amp; git add yarn.lock"</code></pre>
    <h2>Contrato del driver</h2>
    <p>Los scripts de driver reciben placeholders: <code>%O</code> ancestro, <code>%A</code> el nuestro (escribir resultado aquí), <code>%B</code> el suyo, <code>%P</code> ruta, <code>%L</code> tamaño del marcador de conflicto.</p>
    <h2>Errores comunes</h2>
    <p>Olvidar que los drivers deben instalarse en cada clone — solo <code>.gitattributes</code> se comparte. Documenta la configuración en tu README.</p>

- source_title: "Custom diff drivers with gitattributes"
  title: "Drivers de diff personalizados con gitattributes"
  langcode: es
  body: |
    <h2>Por qué diffs personalizados</h2>
    <p>El diff predeterminado de Git es línea por línea de texto. Para formatos binarios (PDF, DOCX, imágenes) y texto estructurado donde los diffs por línea no son útiles (JS minificado, dumps SQL generados), los drivers de diff personalizados producen algo que los humanos pueden leer.</p>
    <h2>Drivers de lenguaje incorporados</h2>
    <pre><code># .gitattributes
    *.py    diff=python
    *.rs    diff=rust
    *.go    diff=golang</code></pre>
    <h2>Definir un driver personalizado</h2>
    <pre><code>[diff "exif"]
    textconv = exiftool
    cachetextconv = true</code></pre>
    <pre><code>*.jpg diff=exif
    *.png diff=exif</code></pre>
    <h2>Diff a nivel de palabra para prosa</h2>
    <pre><code>[diff "tex"]
    wordRegex = "[^[:space:]\\\\]+"</code></pre>
    <h2>Anular detección binaria</h2>
    <pre><code>*.svg   diff
    *.pdf   -diff
    *.bin   binary</code></pre>
    <h2>Ejemplo real: dumps SQL</h2>
    <pre><code>[diff "sqldump"]
    textconv = "sed 's/^INSERT INTO/\\nINSERT INTO/g'"</code></pre>
    <h2>Errores comunes</h2>
    <p>Drivers configurados en <code>~/.gitconfig</code> son locales — los colegas no ven diff. Documenta la instalación.</p>
    <h2>Diff externo completo</h2>
    <pre><code>GIT_EXTERNAL_DIFF=meld git diff
    git config diff.tool meld
    git difftool</code></pre>

- source_title: "Gitattributes: line endings, exports, and encoding"
  title: "Gitattributes: finales de línea, exportaciones y codificación"
  langcode: es
  body: |
    <h2>Qué hace gitattributes</h2>
    <p><code>.gitattributes</code> aplica configuraciones por ruta: finales de línea, drivers de diff y merge, filtros de export, declaraciones de codificación. A diferencia de <code>.gitignore</code>, los attributes aplican a archivos rastreados y son honrados por todo el equipo.</p>
    <h2>Finales de línea</h2>
    <pre><code># .gitattributes
    * text=auto
    *.sh text eol=lf
    *.bat text eol=crlf
    *.png binary</code></pre>
    <p>Tras añadir este archivo, ejecuta <code>git add --renormalize .</code>.</p>
    <h2>core.autocrlf vs gitattributes</h2>
    <p><code>core.autocrlf</code> es un fallback por desarrollador. Gitattributes es autoritativo y compartido.</p>
    <h2>Export-ignore</h2>
    <pre><code>tests/      export-ignore
    .github/    export-ignore
    .gitignore  export-ignore
    Makefile    export-ignore</code></pre>
    <h2>Export-subst</h2>
    <pre><code>VERSION export-subst</code></pre>
    <p>Dentro de <code>VERSION</code>: <code>$Format:%H %ci$</code>.</p>
    <h2>Codificación de árbol de trabajo</h2>
    <pre><code>*.cs working-tree-encoding=UTF-16LE-BOM
    *.txt working-tree-encoding=Shift_JIS</code></pre>
    <h2>Drivers de filtro</h2>
    <pre><code>[filter "redact"]
    clean  = sed 's/SECRET=.*/SECRET=***REDACTED***/'
    smudge = cat
    *.env filter=redact</code></pre>
    <h2>Macros</h2>
    <pre><code>[attr]docfile diff=markdown export-ignore
    README.md docfile</code></pre>
    <h2>Errores comunes</h2>
    <p>Añadir <code>* text=auto</code> sin renormalizar deja finales mezclados en el repo. Olvidar que <code>binary</code> es un macro.</p>

- source_title: "GPG signing commits and tags"
  title: "Firmar commits y tags con GPG"
  langcode: es
  body: |
    <h2>Por qué firmar</h2>
    <p>Un commit firmado atestigua criptográficamente "este commit fue autorizado por el poseedor de esta llave, sin cambios desde la firma." Las firmas defienden contra suplantación y manipulación, y plataformas como GitHub muestran un badge "Verified" cuando la firma coincide con una llave configurada.</p>
    <h2>Configuración inicial</h2>
    <pre><code>gpg --full-generate-key       # elegir RSA 4096 o Ed25519
    gpg --list-secret-keys --keyid-format=long
    git config --global user.signingkey 0xABCDEF1234567890
    git config --global commit.gpgsign true
    git config --global tag.gpgsign true</code></pre>
    <p>Exporta la llave pública y añádela a GitHub/GitLab/Gitea:</p>
    <pre><code>gpg --armor --export 0xABCDEF1234567890</code></pre>
    <h2>Firmar bajo demanda</h2>
    <pre><code>git commit -S -m "Cambio importante"
    git tag -s v1.0.0 -m "Release 1.0.0"</code></pre>
    <p>Verifica un commit individual o todas las entradas:</p>
    <pre><code>git log --show-signature
    git verify-commit &lt;sha&gt;
    git verify-tag v1.0.0</code></pre>
    <h2>GPG agent y pinentry</h2>
    <pre><code># ~/.gnupg/gpg-agent.conf
    default-cache-ttl 28800
    max-cache-ttl 86400
    pinentry-program /usr/local/bin/pinentry-mac</code></pre>
    <h2>Llaves hardware</h2>
    <p>YubiKey o tokens similares pueden albergar la llave de firma GPG, requiriendo un toque por commit.</p>
    <h2>WSL y SSH</h2>
    <p>Si firmas desde WSL o sobre SSH, configura el agent forwarding correctamente. Establece <code>GPG_TTY=$(tty)</code> en la inicialización de tu shell.</p>
    <h2>Errores comunes</h2>
    <p>Establecer <code>commit.gpgsign true</code> sin un agent funcional hace que cada <code>git commit</code> se cuelgue. Olvidar publicar tu llave pública en la plataforma deja badges "Unverified". Las llaves caducan; calendariza un recordatorio.</p>
    <h2>Verificar un push remoto</h2>
    <pre><code>git push --signed</code></pre>

- source_title: "SSH signing (Git 2.34+)"
  title: "Firma SSH (Git 2.34+)"
  langcode: es
  body: |
    <h2>El caso de la firma SSH</h2>
    <p>GPG es potente pero operativamente doloroso. Desde Git 2.34, puedes firmar commits y tags con las llaves SSH que ya usas para hacer push. Sin keyring, sin malabarismos de passphrase, sin red de confianza separada. GitHub, GitLab, Gitea y Forgejo aceptan commits firmados con SSH.</p>
    <h2>Configuración</h2>
    <pre><code>git config --global gpg.format ssh
    git config --global user.signingkey ~/.ssh/id_ed25519.pub
    git config --global commit.gpgsign true
    git config --global tag.gpgsign true</code></pre>
    <h2>Archivo de signers permitidos</h2>
    <pre><code>cat &gt; ~/.config/git/allowed_signers &lt;&lt;EOF
    alice@example.com ssh-ed25519 AAAA... alice
    bob@example.com   ssh-ed25519 AAAA... bob
    EOF
    git config --global gpg.ssh.allowedSignersFile ~/.config/git/allowed_signers</code></pre>
    <h2>Verificación</h2>
    <pre><code>git log --show-signature
    git verify-commit HEAD
    git verify-tag v1.0.0</code></pre>
    <h2>Llaves respaldadas por hardware</h2>
    <p>OpenSSH soporta llaves FIDO/U2F (<code>ssh-keygen -t ed25519-sk</code>). Funcionan transparentemente para firmar.</p>
    <h2>Revocación</h2>
    <pre><code>git config --global gpg.ssh.revocationFile ~/.config/git/revoked_keys</code></pre>
    <h2>Errores comunes</h2>
    <p>Email desajustado entre autor del commit y entrada en signers permitidos. Apuntar <code>user.signingkey</code> a una llave privada; quieres la <code>.pub</code>. Olvidar subir la llave pública a la plataforma host.</p>
    <h2>Entornos mixtos</h2>
    <p>Los commits firmados con SSH y con GPG pueden coexistir en un repo. Elige uno para nuevos commits y documenta la política.</p>

- source_title: "Worktrees: multiple checkouts of one repo"
  title: "Worktrees: múltiples checkouts de un repo"
  langcode: es
  body: |
    <h2>El problema que resuelven los worktrees</h2>
    <p>Estás a mitad de feature cuando llega una solicitud urgente de hotfix. Hacer stash o cambiar de contexto es arriesgado y lento. Los worktrees te dejan hacer checkout de ramas adicionales en directorios separados, todos compartiendo una base de datos de objetos subyacente. Cada worktree tiene su propio HEAD, índice y árbol de trabajo.</p>
    <h2>Añadir un worktree</h2>
    <pre><code>git worktree add ../hotfix main
    cd ../hotfix
    git checkout -b hotfix/urgent
    # arregla el bug, push, vuelve
    cd -
    git worktree remove ../hotfix</code></pre>
    <h2>Listar y podar</h2>
    <pre><code>git worktree list
    git worktree list --porcelain
    git worktree prune
    git worktree remove ../old-feature
    git worktree lock ../release
    git worktree unlock ../release</code></pre>
    <h2>Worktrees desacoplados</h2>
    <pre><code>git worktree add --detach ../v1.0 v1.0.0</code></pre>
    <h2>Reglas de compartición de ramas</h2>
    <p>La misma rama no puede estar en checkout en dos worktrees simultáneamente, por diseño.</p>
    <h2>Casos de uso</h2>
    <ul>
      <li>Build largo de CI en un worktree mientras sigues codificando.</li>
      <li>Comparación lado a lado de dos ramas en tu editor.</li>
      <li>Bisect en un worktree mientras tu checkout principal queda fijo.</li>
      <li>Ejecutar múltiples versiones de lenguaje o builds de contenedor en paralelo.</li>
    </ul>
    <h2>Configuración</h2>
    <pre><code>git config --worktree user.email contractor@client.com</code></pre>
    <p>Habilita con <code>git config extensions.worktreeConfig true</code>.</p>
    <h2>Errores comunes</h2>
    <p>Eliminar un directorio de worktree con <code>rm -rf</code> en lugar de <code>git worktree remove</code> deja metadatos viejos; <code>git worktree prune</code> limpia.</p>

- source_title: "Git internals: the object database"
  title: "Internals de Git: la base de datos de objetos"
  langcode: es
  body: |
    <h2>Cuatro tipos de objetos</h2>
    <p>Git almacena todo como objetos direccionados por contenido bajo <code>.git/objects</code>. Hay cuatro tipos: <em>blob</em> (contenido de archivo), <em>tree</em> (listado de directorio de blobs y subtrees), <em>commit</em> (puntero de instantánea con autor, committer, mensaje y padres), y <em>tag</em> (tag anotado con firmante y mensaje). Cada uno se nombra por el SHA-1 (o SHA-256) de su contenido.</p>
    <h2>Inspección</h2>
    <pre><code>git cat-file -t &lt;sha&gt;
    git cat-file -p &lt;sha&gt;
    git cat-file -s &lt;sha&gt;
    git ls-tree HEAD
    git rev-parse HEAD^{tree}</code></pre>
    <h2>Sueltos vs empaquetados</h2>
    <p>Los objetos recién creados empiezan sueltos: un archivo comprimido por zlib por objeto bajo <code>.git/objects/xx/yyyy...</code>. La recolección de basura combina luego muchos objetos en un packfile.</p>
    <h2>Hashing</h2>
    <pre><code>echo "hello" | git hash-object --stdin
    git hash-object -w README.md</code></pre>
    <h2>Los trees codifican permisos</h2>
    <p>Una entrada de tree es modo + nombre + sha. Los modos son <code>040000</code> (directorio), <code>100644</code> (regular), <code>100755</code> (ejecutable), <code>120000</code> (symlink), <code>160000</code> (gitlink/submódulo).</p>
    <h2>Caminar la historia</h2>
    <pre><code>git log --raw
    git log --pretty=raw
    git rev-list --objects HEAD</code></pre>
    <h2>Alcanzabilidad y poda</h2>
    <p>Un objeto es alcanzable si alguna ref lleva a él a través del grafo commit-tree-blob. Los objetos no alcanzables son podados por gc tras la ventana de expiración del reflog.</p>
    <pre><code>git fsck --unreachable
    git gc --prune=now</code></pre>
    <h2>Transición a SHA-256</h2>
    <p>Git moderno soporta repositorios SHA-256 (<code>git init --object-format=sha256</code>).</p>
    <h2>Errores comunes</h2>
    <p>Editar archivos bajo <code>.git/objects</code> directamente. No lo hagas. Asumir que las colisiones SHA-1 son imposibles — Git incluye detección reforzada por defecto.</p>

- source_title: "Git internals: packfiles and delta compression"
  title: "Internals de Git: packfiles y compresión delta"
  langcode: es
  body: |
    <h2>Fundamentos de packfile</h2>
    <p>Un packfile agrupa muchos objetos en un archivo con compresión delta — en lugar de almacenar cada versión de un archivo completa, los objetos similares comparten una base y solo guardan la diferencia. El resultado es una reducción de tamaño 5x a 50x en repos reales.</p>
    <h2>Inspeccionar packs</h2>
    <pre><code>git verify-pack -v .git/objects/pack/pack-*.idx | head
    git count-objects -v
    git cat-file --batch-all-objects --batch-check='%(objectname) %(objecttype) %(objectsize:disk)'</code></pre>
    <h2>Repacking</h2>
    <pre><code>git repack -ad
    git repack -adf --depth=50 --window=250
    git repack --geometric=2 -d</code></pre>
    <h2>Repacking geométrico</h2>
    <p>El repacking geométrico (Git 2.32+) mantiene una serie de tamaños de pack en una proporción 1:N, evitando el costo de repackear todo cada vez.</p>
    <h2>Multi-pack-index</h2>
    <p>Con muchos packs, las búsquedas se ralentizan. El archivo MIDX (Git 2.20+) proporciona un índice unificado a través de los packs:</p>
    <pre><code>git multi-pack-index write
    git multi-pack-index verify</code></pre>
    <h2>Ajuste de delta</h2>
    <pre><code>[pack]
    windowMemory = 256m
    threads = 0
    deltaCacheSize = 256m</code></pre>
    <h2>Bitmaps de alcanzabilidad</h2>
    <pre><code>git repack -adb</code></pre>
    <h2>Errores comunes</h2>
    <p>Eliminar manualmente archivos de pack — Git los rastrea en metadatos; usa <code>git repack</code>. Establecer <code>pack.window</code> muy alto sin <code>pack.windowMemory</code> puede agotar la memoria.</p>

- source_title: "Git internals: references and the reflog"
  title: "Internals de Git: referencias y el reflog"
  langcode: es
  body: |
    <h2>Qué es una ref</h2>
    <p>Una ref es un nombre que apunta a un objeto — usualmente un commit. Las branches son refs bajo <code>refs/heads/</code>, los tags bajo <code>refs/tags/</code>, los remote-tracking bajo <code>refs/remotes/</code>, y pseudo-refs como <code>HEAD</code>, <code>FETCH_HEAD</code>, <code>ORIG_HEAD</code> viven en la raíz de <code>.git</code>.</p>
    <h2>Inspeccionar refs</h2>
    <pre><code>git for-each-ref
    git for-each-ref --sort=-committerdate --format='%(refname:short) %(committerdate:relative)' refs/heads
    git symbolic-ref HEAD
    git update-ref refs/heads/foo &lt;sha&gt;</code></pre>
    <h2>El reflog</h2>
    <p>Cada cambio a una ref se registra: movimientos del tip de la branch, commits, resets, rebases, fetches. El reflog es una red de seguridad por clone independiente del grafo de objetos.</p>
    <pre><code>git reflog
    git reflog show feature
    git reflog show HEAD@{2.weeks.ago}
    git log -g --oneline</code></pre>
    <p>Recupera un commit "perdido":</p>
    <pre><code>git checkout HEAD@{1}
    git branch rescue HEAD@{5}</code></pre>
    <h2>Expiración del reflog</h2>
    <pre><code>git config gc.reflogExpire never
    git config gc.reflogExpireUnreachable 60.days</code></pre>
    <h2>Pseudo-refs especiales</h2>
    <p><code>HEAD</code> apunta a la branch actual. <code>ORIG_HEAD</code> registra el tip anterior antes de operaciones destructivas. <code>FETCH_HEAD</code> registra los tips fetched. <code>MERGE_HEAD</code> existe durante un merge en progreso.</p>
    <h2>Backend reftable</h2>
    <pre><code>git init --ref-format=reftable</code></pre>
    <h2>Errores comunes</h2>
    <p>Confiar en el reflog para siempre: caduca. Editar <code>.git/refs/</code> a mano: usa <code>git update-ref</code> para atomicidad. Confundir <code>HEAD@{2}</code> (índice del reflog) con <code>HEAD~2</code> (ancestría de commits).</p>

- source_title: "Git internals: the index format"
  title: "Internals de Git: el formato del índice"
  langcode: es
  body: |
    <h2>El área de staging, desmitificada</h2>
    <p>El <em>índice</em> (alias cache, área de staging) vive en <code>.git/index</code> como archivo binario que describe lo que contendrá el próximo commit. No es un tree — es una lista plana ordenada de entradas de ruta con stat info, modo y SHA. Operaciones como <code>git add</code>, <code>git rm</code> y <code>git mv</code> actualizan el índice; <code>git commit</code> lo convierte en un objeto tree.</p>
    <h2>Inspección</h2>
    <pre><code>git ls-files --stage
    git ls-files --debug
    git diff --cached
    git diff</code></pre>
    <h2>Versiones del índice</h2>
    <p>Git soporta varias versiones. La 2 fue histórica; la 3 añadió skip-worktree (para sparse checkout); la 4 (predeterminada en 2.20+) comprime prefijos de rutas para árboles grandes.</p>
    <pre><code>git config index.version 4
    git update-index --index-version 4</code></pre>
    <h2>Caching de stat</h2>
    <p>El índice registra dispositivo, inode, ctime, mtime, tamaño para cada entrada. <code>git status</code> usa esto para saltar archivos cuyo stat coincide.</p>
    <h2>Sparse index</h2>
    <pre><code>git sparse-checkout init --cone
    git sparse-checkout set apps/web libs/shared
    git config core.sparseCheckoutCone true
    git config index.sparse true</code></pre>
    <h2>Merge de tres vías en el índice</h2>
    <pre><code>git ls-files -u
    git checkout-index --stage=2 -- file
    git checkout-index --stage=3 -- file</code></pre>
    <h2>Errores comunes</h2>
    <p>Creer que <code>git add</code> stagea archivos "permanentemente" — stagea una instantánea. Re-edita y re-añade.</p>
    <h2>Palancas de rendimiento</h2>
    <p>Índices grandes son lentos de leer/escribir. Palancas: <code>index.version=4</code>, <code>core.untrackedCache=true</code>, <code>core.fsmonitor=true</code>, sparse index, y <code>feature.manyFiles=true</code>.</p>

- source_title: "Grafts and replace refs"
  title: "Grafts y replace refs"
  langcode: es
  body: |
    <h2>Editar la historia sin reescribirla</h2>
    <p>A veces quieres empalmar historias (un import de Subversion convertido encontrándose con una continuación, por ejemplo) sin reescribir commits. Los grafts y el namespace <code>refs/replace/</code> le permiten a Git fingir que el padre de un commit es un commit diferente, dejando los objetos originales intactos.</p>
    <h2>Grafts (legacy)</h2>
    <p><code>.git/info/grafts</code> es un archivo de texto plano: cada línea especifica los padres de un commit. Los grafts están obsoletos en favor de replace refs porque son solo locales y confusos.</p>
    <pre><code># .git/info/grafts
    &lt;child-sha&gt; &lt;new-parent-sha&gt;</code></pre>
    <h2>Replace refs</h2>
    <p>Las replace refs son refs reales bajo <code>refs/replace/</code>. Mapean un SHA "original" a un SHA de "reemplazo". A diferencia de los grafts, pueden ser pushed y compartidas.</p>
    <pre><code>git replace --graft &lt;child&gt; &lt;new-parent&gt;
    git replace --graft v3.0.0 v2.99.0
    git replace --convert-graft-file
    git replace -d &lt;sha&gt;
    git replace -l</code></pre>
    <h2>Caso de uso: empalmar imports</h2>
    <pre><code>git replace --graft $(git rev-list --max-parents=0 main | head -1) svn-history-tip</code></pre>
    <h2>Compartir</h2>
    <pre><code>git push origin 'refs/replace/*:refs/replace/*'</code></pre>
    <h2>Deshabilitar temporalmente</h2>
    <pre><code>git --no-replace-objects log
    GIT_NO_REPLACE_OBJECTS=1 git log</code></pre>
    <h2>Errores comunes</h2>
    <p>Confundir replace con reescritura — replace no cambia los SHAs de objetos, así que las firmas siguen siendo válidas pero el padre "real" de un commit no es lo que ves.</p>

- source_title: "Advanced git log: formatting, filtering, and graph"
  title: "git log avanzado: formato, filtrado y grafo"
  langcode: es
  body: |
    <h2>Más allá del predeterminado</h2>
    <p><code>git log</code> es un pequeño lenguaje de consulta para tu historia. Con los flags adecuados produce reportes calidad dashboard, registros de auditoría y forenses de bugs.</p>
    <h2>Formatos pretty</h2>
    <pre><code>git log --pretty=oneline
    git log --pretty=fuller
    git log --pretty=format:'%h %ad %an %s' --date=short
    git log --pretty=format:'%C(yellow)%h%Creset %C(cyan)%ad%Creset %s %C(green)(%an)%Creset' --date=short</code></pre>
    <p>Define un alias permanente:</p>
    <pre><code>git config --global alias.lg "log --pretty=format:'%C(auto)%h %ad %s %d' --date=short --graph"</code></pre>
    <h2>Vista de grafo</h2>
    <pre><code>git log --graph --oneline --all --decorate
    git log --graph --first-parent main</code></pre>
    <h2>Filtrar por contenido</h2>
    <pre><code>git log -S"FunctionName"
    git log -G"regex.*pattern"
    git log -L :myFunc:src/file.c
    git log -L 100,150:src/file.c</code></pre>
    <h2>Filtrar por metadatos</h2>
    <pre><code>git log --since=2.weeks --until=yesterday
    git log --author='Alice'
    git log --grep='hotfix' --grep='security' --all-match
    git log --no-merges
    git log --merges --first-parent main
    git log --committer='@example.com'</code></pre>
    <h2>Log restringido por ruta</h2>
    <pre><code>git log -- src/parser/
    git log --diff-filter=D -- secrets.env
    git log --follow -- src/old/path.go</code></pre>
    <h2>Conteo y estadísticas</h2>
    <pre><code>git shortlog -sne
    git log --stat
    git log --shortstat
    git log --numstat</code></pre>
    <h2>Recorridos</h2>
    <pre><code>git log --ancestry-path A..B
    git log --boundary --left-right A...B
    git log --reverse
    git log --topo-order
    git log --date-order</code></pre>
    <h2>Errores comunes</h2>
    <p>Usar <code>--all</code> cuando quieres <code>--branches</code>. Olvidar <code>--follow</code> en archivos renombrados. Confundir <code>A..B</code> con <code>A...B</code>.</p>
    <h2>Range-diff para series</h2>
    <pre><code>git range-diff main..topic-v1 main..topic-v2</code></pre>

- source_title: "The ORIG_HEAD, FETCH_HEAD, and other special refs"
  title: "ORIG_HEAD, FETCH_HEAD y otras refs especiales"
  langcode: es
  body: |
    <h2>Las pseudo-refs poco celebradas</h2>
    <p>Más allá de <code>HEAD</code>, Git mantiene un pequeño zoológico de refs actualizadas automáticamente que registran lo que acaba de pasar. Conocerlas convierte "borré mi trabajo" en una recuperación de una línea.</p>
    <h2>HEAD</h2>
    <p>Apunta a la branch actual (e.g., <code>ref: refs/heads/main</code>) o, cuando está desacoplado, a un SHA de commit directamente.</p>
    <h2>ORIG_HEAD</h2>
    <p>Establecida por operaciones destructivas (<code>merge</code>, <code>rebase</code>, <code>reset</code>, <code>am</code>) al tip anterior. La recuperación clásica:</p>
    <pre><code>git reset --hard ORIG_HEAD</code></pre>
    <h2>FETCH_HEAD</h2>
    <p>Actualizada por <code>git fetch</code>. Cada línea es <code>&lt;sha&gt;\t[not-for-merge]\t&lt;descripción&gt;</code>.</p>
    <pre><code>git fetch origin
    git log HEAD..FETCH_HEAD
    git diff HEAD FETCH_HEAD -- src/</code></pre>
    <h2>MERGE_HEAD y CHERRY_PICK_HEAD</h2>
    <pre><code>cat .git/MERGE_HEAD
    git rev-parse --verify MERGE_HEAD &amp;&amp; echo "merge en progreso"</code></pre>
    <h2>REVERT_HEAD, BISECT_*</h2>
    <p>Marcadores similares existen para revert, bisect, rebase y AM.</p>
    <h2>Selectores del reflog</h2>
    <pre><code>git reset --hard HEAD@{1}
    git checkout @{-1}
    git checkout -</code></pre>
    <h2>Errores comunes</h2>
    <p>Confundir <code>ORIG_HEAD</code> con el reflog — <code>ORIG_HEAD</code> se sobrescribe en la próxima op destructiva.</p>
    <h2>Flujo práctico de recuperación</h2>
    <pre><code>git reflog
    git branch rescue HEAD@{14}
    git reset --hard rescue</code></pre>

- source_title: "Three-way diff and conflict resolution strategies"
  title: "Diff de tres vías y estrategias de resolución de conflictos"
  langcode: es
  body: |
    <h2>Qué es tres-vías</h2>
    <p>El diff de dos vías muestra qué cambió entre dos versiones. El diff de tres vías también considera el ancestro común, dejando que Git decida si una región fue cambiada por un lado, el otro o ambos. Tres vías es la base del merge.</p>
    <h2>Inspeccionar un conflicto</h2>
    <pre><code>&lt;&lt;&lt;&lt;&lt;&lt;&lt; HEAD
    nuestra versión
    =======
    su versión
    &gt;&gt;&gt;&gt;&gt;&gt;&gt; feature</code></pre>
    <p>Mostrar los tres lados:</p>
    <pre><code>git config merge.conflictStyle diff3
    git checkout --conflict=diff3 path/to/file</code></pre>
    <h2>Etapas del índice</h2>
    <pre><code>git ls-files -u
    git show :1:path
    git show :2:path
    git show :3:path</code></pre>
    <h2>Estrategias</h2>
    <pre><code>git checkout --ours path/to/file
    git checkout --theirs path/to/file
    git checkout --merge path/to/file</code></pre>
    <pre><code>git merge -X theirs feature
    git merge -X ignore-all-space feature
    git merge -X renormalize feature</code></pre>
    <h2>Mergetool</h2>
    <pre><code>git config merge.tool meld
    git mergetool</code></pre>
    <h2>Ancestro recursivo (ort)</h2>
    <p>Cuando dos branches comparten múltiples bases de merge, la estrategia <code>ort</code> (predeterminada desde Git 2.34) las fusiona virtualmente primero.</p>
    <h2>Errores comunes</h2>
    <p>Asumir que el ancestro en los marcadores de conflicto coincide con tu commit anterior — es la base del merge. Resolver conflictos eliminando ambos lados.</p>

- source_title: "Merge conflict resolution in depth"
  title: "Resolución de conflictos de merge en profundidad"
  langcode: es
  body: |
    <h2>Un flujo, no un pánico</h2>
    <p>Los conflictos son rutina. El flujo correcto los convierte de un evento de estrés en una tarea de cinco minutos: inspeccionar, decidir, editar, verificar, continuar.</p>
    <h2>Paso 1: inspeccionar</h2>
    <pre><code>git status
    git diff --name-only --diff-filter=U
    git log --merge -p path/to/file</code></pre>
    <h2>Paso 2: elegir estrategia</h2>
    <pre><code>git checkout --theirs assets/logo.png
    git add assets/logo.png</code></pre>
    <h2>Paso 3: editar</h2>
    <pre><code>git config --global merge.conflictStyle zdiff3
    git diff --check</code></pre>
    <h2>Paso 4: verificar</h2>
    <pre><code>cargo test
    git add path/to/file
    git status</code></pre>
    <h2>Paso 5: continuar</h2>
    <pre><code>git merge --continue
    git rebase --continue
    git cherry-pick --continue</code></pre>
    <p>O abortar:</p>
    <pre><code>git merge --abort
    git rebase --abort</code></pre>
    <h2>Herramientas que ayudan</h2>
    <ul>
      <li><code>git mergetool</code> con meld, kdiff3, p4merge, vimdiff, beyond compare, IntelliJ.</li>
      <li><code>git rerere</code> para reproducir resoluciones en rebases repetidos.</li>
      <li><code>git imerge</code> para merging incremental estilo bisect.</li>
    </ul>
    <h2>Patrones</h2>
    <p>¿Espacios en blanco conflictivos? Prueba <code>git merge -X ignore-all-space</code>. ¿Conflictos repetidos en changelog? Marca <code>CHANGELOG.md merge=union</code>.</p>
    <h2>Errores comunes</h2>
    <p>Resolver en el editor sin inspeccionar <code>git log --merge</code>. Hacer commit de un archivo medio resuelto. Saltar tests porque "compila."</p>

- source_title: "Generating and applying patches"
  title: "Generar y aplicar parches"
  langcode: es
  body: |
    <h2>Por qué parches</h2>
    <p>Los parches son diffs portables que puedes enviar por correo, pegar en un ticket o guardar como archivo. Así funciona el desarrollo del kernel de Linux a escala y siguen siendo útiles cuando necesites compartir un cambio sin acceso de push a un remote compartido.</p>
    <h2>Crear con diff y apply</h2>
    <pre><code>git diff &gt; change.patch
    git diff main..feature &gt; series.patch
    git diff --staged &gt; staged.patch
    git apply change.patch
    git apply --check change.patch
    git apply --3way change.patch</code></pre>
    <h2>Crear con format-patch</h2>
    <pre><code>git format-patch -1 HEAD
    git format-patch main
    git format-patch -3 --cover-letter -o out/</code></pre>
    <h2>Aplicar con am</h2>
    <pre><code>git am 0001-fix.patch
    git am out/*.patch
    git am --3way out/*.patch
    git am --abort
    git am --skip</code></pre>
    <h2>Parches binarios</h2>
    <pre><code>git diff --binary &gt; with-binaries.patch
    git format-patch --binary -1</code></pre>
    <h2>Solo stat o resumen</h2>
    <pre><code>git diff --stat
    git format-patch --stat=200 -1</code></pre>
    <h2>Errores comunes</h2>
    <p>Generar con <code>git diff</code> cuando necesitabas metadatos; <code>format-patch</code> es la elección correcta. Olvidar <code>--binary</code> cuando el cambio incluye imágenes.</p>
    <h2>Range diff para revisión</h2>
    <pre><code>git range-diff main..v1 main..v2</code></pre>

- source_title: "Git am: applying mailbox patches"
  title: "Git am: aplicar parches mailbox"
  langcode: es
  body: |
    <h2>La tradición mailbox</h2>
    <p><code>git am</code> aplica parches en formato mbox: el formato usado por proyectos dirigidos por listas de correo como el kernel de Linux y Git mismo. Cada entrada mbox contiene un parche más sus metadatos de commit (autor, asunto, cuerpo).</p>
    <h2>Aplicación básica</h2>
    <pre><code>git am 0001-feature.patch
    git am out/*.patch
    git am --3way out/*.patch
    git am --keep-cr</code></pre>
    <h2>Desde clientes de correo</h2>
    <pre><code>cat /var/mail/inbox | git am</code></pre>
    <h2>Signed-off-by</h2>
    <pre><code>git am --signoff out/*.patch
    git config format.signOff true</code></pre>
    <h2>Directo desde URL</h2>
    <pre><code>curl -sL https://lore.kernel.org/.../t.mbox.gz | gunzip | git am
    b4 am https://lore.kernel.org/...</code></pre>
    <h2>Comportamiento de reset</h2>
    <pre><code>git am --abort
    git am --skip
    git am --continue</code></pre>
    <h2>Manejo de espacios</h2>
    <pre><code>git am --whitespace=warn out/*.patch
    git am --whitespace=fix out/*.patch
    git am --ignore-whitespace out/*.patch</code></pre>
    <h2>Errores comunes</h2>
    <p>Aplicar parches en orden incorrecto. Olvidar <code>--3way</code> cuando el parche se generó contra una base diferente. Finales de línea mezclados.</p>

- source_title: "Maintaining a patch series with git format-patch"
  title: "Mantener una serie de parches con git format-patch"
  langcode: es
  body: |
    <h2>Desarrollo dirigido por series</h2>
    <p>Muchos proyectos revisan parches por serie, no por branch. Publicas v1, recibes feedback, revisas, envías v2, repites hasta el merge. Git proporciona herramientas de primera clase para este bucle.</p>
    <h2>Generar una serie</h2>
    <pre><code>git format-patch -o out/v1 main
    git format-patch -o out/v1 --cover-letter --thread main
    git format-patch -o out/v1 --subject-prefix='PATCH v1' main</code></pre>
    <h2>Enviar</h2>
    <pre><code>git send-email out/v1/*.patch \
      --to=maintainer@example.com \
      --cc=list@example.com</code></pre>
    <p>Configura SMTP en <code>~/.gitconfig</code>:</p>
    <pre><code>[sendemail]
    smtpserver = smtp.example.com
    smtpuser = you@example.com
    smtpencryption = tls
    smtpserverport = 587</code></pre>
    <h2>Iteración</h2>
    <pre><code>git format-patch -o out/v2 --subject-prefix='PATCH v2' \
      --cover-letter --thread \
      --in-reply-to=&lt;v1-message-id&gt; main</code></pre>
    <pre><code>git range-diff main..v1 main..HEAD</code></pre>
    <h2>Prefijo de reroll</h2>
    <pre><code>git format-patch -v3 -o out/v3 main</code></pre>
    <h2>Rastreo de acks</h2>
    <pre><code>git interpret-trailers --in-place --trailer 'Reviewed-by: Alice &lt;a@x&gt;' &lt;commit&gt;</code></pre>
    <h2>Errores comunes</h2>
    <p>Olvidar <code>--in-reply-to</code> en rerolls. Saltarse la cover letter al enviar tres o más parches.</p>

- source_title: "Git range-diff: comparing revision series"
  title: "Git range-diff: comparar series de revisiones"
  langcode: es
  body: |
    <h2>Diff de diffs</h2>
    <p><code>git range-diff</code> (introducido en Git 2.19) compara dos rangos de commits, emparejándolos por similitud y mostrando los cambios entre versiones. Es indispensable al revisar rerolls de series de parches o comparar branches rebased.</p>
    <h2>Invocación básica</h2>
    <pre><code>git range-diff main..topic-v1 main..topic-v2
    git range-diff topic-v1...topic-v2
    git range-diff origin/main...HEAD</code></pre>
    <h2>Leer la salida</h2>
    <ul>
      <li><code>=</code> commit sin cambios.</li>
      <li><code>!</code> commit modificado — seguido por el inter-diff.</li>
      <li><code>&lt;</code> commit solo en el primer rango.</li>
      <li><code>&gt;</code> commit solo en el segundo rango.</li>
    </ul>
    <h2>Uso práctico: revisión pre-merge</h2>
    <pre><code>git range-diff @{u}...HEAD</code></pre>
    <h2>En cover letters</h2>
    <pre><code>git range-diff main..topic-v1 main..topic-v2 &gt;&gt; out/v2/0000-cover-letter.patch</code></pre>
    <h2>Ajuste</h2>
    <pre><code>git range-diff --creation-factor=70 main..a main..b
    git range-diff --no-color-moved main..a main..b
    git range-diff --left-only main..a main..b</code></pre>
    <h2>Errores comunes</h2>
    <p>Comparar entre bases diferentes sin darse cuenta. Malinterpretar <code>=</code> como "idéntico" — significa equivalente en contenido; los SHAs pueden diferir.</p>

- source_title: "Git notes: attaching metadata to commits"
  title: "Git notes: adjuntar metadatos a commits"
  langcode: es
  body: |
    <h2>Notas sin reescribir</h2>
    <p><code>git notes</code> adjunta metadatos arbitrarios a commits existentes sin cambiar sus SHAs. Reviews, estados de build, sign-offs, métricas de rendimiento — cualquier cosa que quieras asociar a un commit puede vivir en notas. Se almacenan en la ref especial <code>refs/notes/commits</code> por defecto.</p>
    <h2>Añadir y editar</h2>
    <pre><code>git notes add -m "Revisado por equipo Phoenix" &lt;sha&gt;
    git notes append -m "QA pasó" &lt;sha&gt;
    git notes edit &lt;sha&gt;
    git notes show &lt;sha&gt;
    git notes remove &lt;sha&gt;</code></pre>
    <h2>Usar namespaces</h2>
    <pre><code>git notes --ref=builds add -m "build #1234 OK" &lt;sha&gt;
    git notes --ref=reviews add -m "LGTM" &lt;sha&gt;
    git config notes.displayRef "refs/notes/*"</code></pre>
    <h2>Mostrar en log</h2>
    <pre><code>git log --notes
    git log --show-notes=builds
    git log --pretty=format:'%h %s%n%N' --notes</code></pre>
    <h2>Compartir notas</h2>
    <pre><code>git config --add remote.origin.fetch '+refs/notes/*:refs/notes/*'
    git fetch
    git push origin 'refs/notes/*'</code></pre>
    <h2>Caso de uso: anotaciones de CI</h2>
    <pre><code>git notes --ref=ci add -m "duration=312s status=pass coverage=87%" &lt;sha&gt;
    git push origin refs/notes/ci</code></pre>
    <h2>Hacer merge de notas</h2>
    <pre><code>git notes merge -s union refs/notes/origin/commits</code></pre>
    <h2>Errores comunes</h2>
    <p>Esperar que las notas viajen con <code>git push</code> automáticamente — no lo hacen. Configura refspecs explícitamente.</p>

- source_title: "Git archive and bundle for distribution"
  title: "Git archive y bundle para distribución"
  langcode: es
  body: |
    <h2>Dos formatos, dos propósitos</h2>
    <p><code>git archive</code> produce una instantánea tar o zip de un tree — código sin historia, perfecto para releases. <code>git bundle</code> produce un archivo de transporte portable que contiene objetos y refs — perfecto para transferencia offline de un repo entero.</p>
    <h2>Ejemplos de archive</h2>
    <pre><code>git archive --format=tar.gz -o release-1.0.tar.gz v1.0.0
    git archive --format=zip --prefix=myapp-1.0/ -o myapp-1.0.zip HEAD
    git archive --format=tar HEAD src/ | tar -xC /tmp/snapshot</code></pre>
    <h2>Excluir archivos</h2>
    <pre><code>tests/      export-ignore
    .github/    export-ignore
    *.dev.json  export-ignore</code></pre>
    <h2>Bundle para transferencia offline</h2>
    <pre><code>git bundle create repo.bundle --all
    git bundle create incr.bundle main ^origin/main
    git bundle verify repo.bundle
    git clone repo.bundle myrepo
    git fetch repo.bundle main:imported</code></pre>
    <h2>Caso de uso: enviar a cliente bajo embargo</h2>
    <pre><code>git bundle create v1.2.bundle main --tags
    git fetch v1.2.bundle '+refs/heads/*:refs/remotes/upstream/*' '+refs/tags/*:refs/tags/*'</code></pre>
    <h2>Archivos reproducibles</h2>
    <pre><code>git archive --format=tar.gz \
      --output=src.tar.gz \
      --prefix=src/ HEAD</code></pre>
    <h2>Errores comunes</h2>
    <p>Confundir <code>git archive</code> (sin historia) con <code>git bundle</code> (historia completa). Olvidar <code>--prefix</code> produciendo una "tarbomb."</p>

- source_title: "Advanced stash usage"
  title: "Uso avanzado de stash"
  langcode: es
  body: |
    <h2>Más allá de git stash pop</h2>
    <p>Stash es más capaz que el simple save/pop que sueles ver. Bien usado, es un cuaderno personal para cambios de contexto que vence al hacer commit de WIP en la branch.</p>
    <h2>Guardar con intención</h2>
    <pre><code>git stash push -m "WIP: refactor parser"
    git stash push -m "ajustes config" -- src/config/
    git stash push -k -m "sin staged"
    git stash push -u -m "incluir untracked"
    git stash push -a -m "incluir ignorados"</code></pre>
    <h2>Listar e inspeccionar</h2>
    <pre><code>git stash list
    git stash show stash@{2}
    git stash show -p stash@{2}
    git diff stash@{0}^1 stash@{0}</code></pre>
    <h2>Apply, pop, branch</h2>
    <pre><code>git stash apply
    git stash pop
    git stash apply stash@{3}
    git stash branch fix-bug stash@{1}</code></pre>
    <h2>Stash parcial</h2>
    <pre><code>git stash push -p</code></pre>
    <h2>Resolución de conflictos</h2>
    <pre><code>git stash apply
    git stash pop --index</code></pre>
    <h2>Limpieza</h2>
    <pre><code>git stash drop stash@{4}
    git stash clear
    git reflog show stash</code></pre>
    <h2>Caso de uso: rebuild antes de review</h2>
    <pre><code>git stash push -u -m "feature WIP"
    git checkout main &amp;&amp; git pull
    git switch -c ci-fix
    # arreglar + commit + push
    git checkout feature
    git stash pop</code></pre>
    <h2>Errores comunes</h2>
    <p>Hacer stash con archivos untracked pero sin <code>-u</code>. Tratar el stash como almacenamiento a largo plazo.</p>

- source_title: "Sparse checkout: working with subsets of a large repo"
  title: "Sparse checkout: trabajar con subconjuntos de un repo grande"
  langcode: es
  body: |
    <h2>Por qué sparse</h2>
    <p>Sparse checkout puebla solo un subconjunto del árbol de trabajo de un repo, conservando todos los metadatos e historia. Para monorepos, esto puede significar hacer checkout del 1% de los archivos e ignorar el otro 99%, acelerando dramáticamente <code>git status</code>, indexación de IDE y uso de disco.</p>
    <h2>Modo cono</h2>
    <pre><code>git sparse-checkout init --cone
    git sparse-checkout set apps/web libs/shared
    git sparse-checkout add apps/admin
    git sparse-checkout list</code></pre>
    <h2>Modo no-cono</h2>
    <pre><code>git sparse-checkout init
    cat &gt; .git/info/sparse-checkout &lt;&lt;'EOF'
    /*
    !/build/
    !/legacy/
    EOF
    git read-tree -m -u HEAD</code></pre>
    <h2>Clonar sparse</h2>
    <pre><code>git clone --filter=blob:none --no-checkout https://example.com/big.git
    cd big
    git sparse-checkout init --cone
    git sparse-checkout set apps/web
    git checkout main</code></pre>
    <h2>Verificar el índice</h2>
    <pre><code>git ls-files -t | head
    git update-index --skip-worktree path
    git update-index --no-skip-worktree path</code></pre>
    <h2>Deshabilitar</h2>
    <pre><code>git sparse-checkout disable</code></pre>
    <h2>Errores comunes</h2>
    <p>Editar archivos fuera del cono. Usa modo cono a menos que los patrones realmente lo requieran.</p>
    <h2>Sparse index</h2>
    <pre><code>git sparse-checkout init --cone --sparse-index
    git config index.sparse true</code></pre>

- source_title: "Multiple remote workflows"
  title: "Flujos con múltiples remotes"
  langcode: es
  body: |
    <h2>Por qué múltiples remotes</h2>
    <p>Los flujos reales suelen involucrar más de un remote: un <code>origin</code> para tu fork, un <code>upstream</code> para el repo canónico, además de mirrors, destinos de despliegue y forks por entorno.</p>
    <h2>Añadir remotes</h2>
    <pre><code>git remote add origin git@github.com:you/fork.git
    git remote add upstream https://github.com/org/repo.git
    git remote add deploy git@deploy.example.com:app.git
    git remote -v</code></pre>
    <h2>Fetch desde todos</h2>
    <pre><code>git fetch --all --prune
    git remote update --prune
    git fetch upstream main:main</code></pre>
    <h2>Rastrear lo correcto</h2>
    <pre><code>git branch --set-upstream-to=origin/main main
    git push -u origin feature
    git config branch.feature.remote origin
    git config branch.feature.merge refs/heads/feature</code></pre>
    <h2>URLs diferentes para push y pull</h2>
    <pre><code>git remote set-url --push origin git@github.com:you/fork.git
    git remote set-url origin https://github.com/you/fork.git</code></pre>
    <h2>Mirroring</h2>
    <pre><code>git remote add mirror --mirror=push git@gitlab.example.com:org/repo.git
    git push mirror</code></pre>
    <h2>Flujo triangular</h2>
    <pre><code>git config remote.pushDefault origin
    git config push.default current</code></pre>
    <h2>Credenciales por remote</h2>
    <pre><code>[credential "https://github.com"]
    helper = osxkeychain
    [credential "https://gitlab.example.com"]
    helper = !pass-git-helper</code></pre>
    <h2>Errores comunes</h2>
    <p>Hacer push a <code>upstream</code> por error cuando querías <code>origin</code>; configura <code>remote.pushDefault</code>.</p>

- source_title: "Git in a monorepo"
  title: "Git en un monorepo"
  langcode: es
  body: |
    <h2>Realidades del monorepo</h2>
    <p>Un monorepo alberga muchos proyectos en un repositorio — mejores refactores, cambios atómicos cross-proyecto, un solo grafo de dependencias. El costo: escala. Los repos pueden crecer a gigabytes y millones de archivos, donde Git ingenuo se vuelve doloroso.</p>
    <h2>El stack de rendimiento</h2>
    <ul>
      <li><strong>Sparse checkout (modo cono)</strong>: hacer checkout solo de los directorios en los que trabajas.</li>
      <li><strong>Sparse index</strong>: saltar rutas no-sparse en el índice por completo (Git 2.37+).</li>
      <li><strong>Partial clone</strong>: traer blobs de forma perezosa, bajo demanda.</li>
      <li><strong>Commit-graph + filtros Bloom</strong>: log/blame rápidos en subconjuntos.</li>
      <li><strong>Fsmonitor</strong>: <code>git status</code> O(1) vía eventos del SO.</li>
      <li><strong>Mantenimiento en background</strong>: mantener gc, repacking e índices frescos.</li>
    </ul>
    <h2>Setup de un golpe</h2>
    <pre><code>git clone --filter=blob:none --sparse https://example.com/big.git
    cd big
    git sparse-checkout init --cone --sparse-index
    git sparse-checkout set apps/web libs/ui
    git config feature.manyFiles true
    git config core.fsmonitor true
    git config core.untrackedCache true
    git maintenance start</code></pre>
    <h2>CODEOWNERS y protección de branches</h2>
    <p>Los monorepos confían en propiedad por directorio. Combina archivos CODEOWNERS de GitHub/GitLab con reviews requeridas.</p>
    <h2>CI consciente de rutas</h2>
    <pre><code>changed=$(git diff --name-only origin/main..HEAD | cut -d/ -f1 | sort -u)
    for pkg in $changed; do
      [ -f "$pkg/Makefile" ] &amp;&amp; make -C "$pkg" test
    done</code></pre>
    <h2>Capa de tooling</h2>
    <p>Orquestadores de build (Bazel, Buck2, Pants, Nx, Turborepo) consumen el diff y re-ejecutan solo los targets afectados.</p>
    <h2>Errores comunes</h2>
    <p>Tratar un monorepo como un repo pequeño y saltarse las optimizaciones. Olvidar que los tiempos de <code>git status</code> incluyen trabajo del kernel; fsmonitor lo resuelve.</p>

- source_title: "Contributing to open source with Git"
  title: "Contribuir a open source con Git"
  langcode: es
  body: |
    <h2>El patrón fork-y-PR</h2>
    <p>La mayoría de plataformas esperan este flujo: fork del repo upstream, clonar tu fork, branch para el cambio, push, abrir un pull request. Git lo trata como un flujo triangular con dos remotes.</p>
    <h2>Configuración</h2>
    <pre><code>git clone git@github.com:you/project.git
    cd project
    git remote add upstream https://github.com/org/project.git
    git fetch upstream
    git checkout -b fix/typo upstream/main</code></pre>
    <h2>Mantenerse al día</h2>
    <pre><code>git fetch upstream
    git rebase upstream/main
    git push --force-with-lease origin fix/typo</code></pre>
    <h2>Crear commits</h2>
    <pre><code>git commit -s -m "fix(parser): manejar entrada vacía

    Rechazar buffer vacío con InvalidInput en lugar de panic. Añade
    test de regresión en tests/parser/empty.rs.

    Closes #1234"</code></pre>
    <h2>Proyectos basados en mailing-list</h2>
    <p>Para proyectos como Linux, usa <code>git format-patch</code> y <code>git send-email</code>.</p>
    <h2>Revisar feedback</h2>
    <pre><code>git commit --fixup=&lt;sha&gt;
    git rebase -i --autosquash upstream/main
    git push --force-with-lease</code></pre>
    <h2>Sign-off y trailers</h2>
    <pre><code>git config --global format.signOff true
    git commit --amend --no-edit --trailer 'Reviewed-by: Alice &lt;a@x&gt;'
    git interpret-trailers --in-place --trailer 'Cc: maintainers@list' COMMIT_MSG</code></pre>
    <h2>Errores comunes</h2>
    <p>Hacer branch desde el <code>main</code> de tu fork cuando está meses atrasado. Force-push sin <code>--force-with-lease</code>.</p>

- source_title: "Advanced gitconfig techniques"
  title: "Técnicas avanzadas de gitconfig"
  langcode: es
  body: |
    <h2>Capas de configuración</h2>
    <p>Git lee config de múltiples archivos en orden: sistema, global (<code>~/.gitconfig</code>), local (<code>.git/config</code>), worktree (cuando se habilita) y línea de comandos (<code>-c</code>). Las capas posteriores anulan a las anteriores. Inspecciona con <code>git config --list --show-origin</code>.</p>
    <h2>Includes condicionales</h2>
    <pre><code>[includeIf "gitdir:~/work/"]
    path = ~/.gitconfig.work
    [includeIf "gitdir:~/personal/"]
    path = ~/.gitconfig.personal
    [includeIf "onbranch:release/*"]
    path = ~/.gitconfig.release
    [includeIf "hasconfig:remote.*.url:git@github.com:work-org/**"]
    path = ~/.gitconfig.work</code></pre>
    <h2>Aliases que componen</h2>
    <pre><code>[alias]
    co = checkout
    cm = commit -v
    st = status -sb
    lg = log --graph --pretty=format:'%C(auto)%h %ad %s %d' --date=short
    last = log -1 HEAD --stat
    unstage = reset HEAD --
    sync = "!f() { git fetch --all --prune &amp;&amp; git rebase --autostash @{u}; }; f"
    publish = "!git push -u origin $(git symbolic-ref --short HEAD)"</code></pre>
    <h2>Reescritura de URLs</h2>
    <pre><code>[url "git@github.com:"]
    insteadOf = https://github.com/
    [url "https://github.com/"]
    pushInsteadOf = git@github.com:</code></pre>
    <h2>Config por worktree</h2>
    <pre><code>git config extensions.worktreeConfig true
    git config --worktree user.email contractor@client.com</code></pre>
    <h2>Defaults sensatos</h2>
    <pre><code>[core]
    autocrlf = input
    fsmonitor = true
    untrackedCache = true
    [merge]
    conflictStyle = zdiff3
    ff = false
    [pull]
    rebase = true
    [rebase]
    autoSquash = true
    autoStash = true
    updateRefs = true
    [push]
    autoSetupRemote = true
    default = current
    [fetch]
    prune = true
    parallel = 0
    [diff]
    algorithm = histogram
    colorMoved = default
    submodule = log
    [init]
    defaultBranch = main
    [advice]
    detachedHead = false
    [feature]
    manyFiles = true</code></pre>
    <h2>Inspección</h2>
    <pre><code>git config --list --show-origin
    git config --get-all alias.lg
    git config --show-scope user.email
    git -c user.email=other@x commit -m "identidad ad-hoc"</code></pre>
    <h2>Errores comunes</h2>
    <p>Establecer credenciales en archivos commiteados. Mezclar <code>pull.rebase=true</code> con flujos que esperan merges.</p>

- source_title: "Why Git performance matters at scale"
  title: "Por qué importa el rendimiento de Git a escala"
  langcode: es
  body: |
    <h2>Herramientas lineales, repos exponenciales</h2>
    <p>Git fue originalmente afinado para el kernel de Linux — grande para 2005 pero pequeño para hoy. Los repos modernos pueden albergar millones de archivos, cientos de gigabytes de historia y decenas de miles de refs. Muchas operaciones de Git eran O(tamaño del árbol) u O(historia) por defecto, y a escala se volvieron visiblemente lentas.</p>
    <h2>Dónde se va el tiempo</h2>
    <ul>
      <li><code>git status</code> recorre el árbol de trabajo para detectar cambios.</li>
      <li><code>git log</code>, <code>git blame</code> y cálculos de merge-base recorren grafos de commits.</li>
      <li><code>git fetch</code> negocia con el servidor sobre muchos cambios de ref.</li>
      <li><code>git gc</code> repacka cada objeto, incluso los no cambiados.</li>
      <li>El índice se lee y escribe muchas veces por comando.</li>
    </ul>
    <h2>Medir</h2>
    <pre><code>GIT_TRACE2_PERF=1 git status
    GIT_TRACE2_EVENT=/tmp/trace.json git status
    git -c trace2.eventTarget=/tmp/trace git fetch</code></pre>
    <h2>La caja de herramientas de rendimiento</h2>
    <ul>
      <li><strong>commit-graph</strong>: datos de alcanzabilidad precomputados.</li>
      <li><strong>filtros Bloom de rutas cambiadas</strong>: saltar commits irrelevantes.</li>
      <li><strong>multi-pack-index</strong>: un índice de búsqueda a través de muchos packs.</li>
      <li><strong>bitmaps de alcanzabilidad</strong>: operaciones de conjunto O(1).</li>
      <li><strong>fsmonitor</strong>: notificaciones de cambio del FS.</li>
      <li><strong>partial clone</strong> y <strong>sparse index</strong>.</li>
      <li><strong>repack geométrico</strong>.</li>
      <li><strong>protocolo v2</strong>: negociación de refs eficiente.</li>
      <li><strong>git maintenance</strong>: mantener todo fresco.</li>
    </ul>
    <h2>Victorias rápidas</h2>
    <pre><code>git config feature.manyFiles true
    git config core.fsmonitor true
    git config core.untrackedCache true
    git config index.version 4
    git maintenance start</code></pre>
    <h2>Errores comunes</h2>
    <p>Afinar antes de medir. Habilitar características sin entenderlas. Saltarse <code>git maintenance start</code>.</p>

- source_title: "Measuring Git performance with Trace2"
  title: "Medir el rendimiento de Git con Trace2"
  langcode: es
  body: |
    <h2>La facilidad Trace2</h2>
    <p>Trace2 (introducido en Git 2.22) es la facilidad de tracing estructurado integrada en Git. Emite eventos de inicio/fin de región, tracking de procesos hijos e información de tiempo en un esquema estable, adecuado tanto para inspección humana como análisis automatizado.</p>
    <h2>Tres sabores</h2>
    <ul>
      <li><code>GIT_TRACE2</code>: texto legible.</li>
      <li><code>GIT_TRACE2_PERF</code>: texto con columnas de tiempo.</li>
      <li><code>GIT_TRACE2_EVENT</code>: JSON, un evento por línea.</li>
    </ul>
    <pre><code>GIT_TRACE2=1 git status
    GIT_TRACE2_PERF=/tmp/perf.log git fetch
    GIT_TRACE2_EVENT=/tmp/event.jsonl git log --oneline | head</code></pre>
    <h2>Config persistente</h2>
    <pre><code>[trace2]
    perfTarget = ~/git-trace/
    eventTarget = ~/git-trace/
    eventNesting = 4
    maxFiles = 200</code></pre>
    <h2>Leer el formato perf</h2>
    <pre><code>14:23:01.000 |  d0 | main         |  start  |  ... | git status
    14:23:01.012 |  d0 | main         | region_enter |  | label:read_directory
    14:23:01.220 |  d0 | main         | region_leave |  | label:read_directory
    14:23:01.230 |  d0 | main         | exit         |  | code:0</code></pre>
    <h2>Análisis JSON</h2>
    <pre><code>jq -c 'select(.event=="region_leave") | {label, t_rel}' /tmp/event.jsonl
    jq -s 'group_by(.label) | map({label:.[0].label, total:(map(.t_rel) | add)})' /tmp/event.jsonl</code></pre>
    <h2>Qué medir</h2>
    <ul>
      <li><strong>git status</strong> en checkout fresco vs tras habilitar fsmonitor.</li>
      <li><strong>git log -- path</strong> con y sin filtros Bloom.</li>
      <li><strong>git fetch</strong> antes y después de MIDX y bitmaps.</li>
      <li><strong>git gc</strong> con repack geométrico vs completo.</li>
    </ul>
    <h2>Errores comunes</h2>
    <p>Recolectar solo una muestra — caches y filesystem caliente afectan dramáticamente los números.</p>
    <h2>Tooling externo</h2>
    <p>Herramientas como <code>git-trace2-tools</code> en GitHub convierten streams JSON en gráficos de llama.</p>

- source_title: "The commit-graph: faster reachability queries"
  title: "El commit-graph: consultas de alcanzabilidad más rápidas"
  langcode: es
  body: |
    <h2>El cuello de botella de alcanzabilidad</h2>
    <p>Muchas operaciones de Git necesitan responder "¿es el commit X alcanzable desde Y?" o "¿cuál es la base de merge?" Ingenuamente esto significa recorrer el grafo de commits desde lecturas crudas de objetos — lento en repos grandes. El archivo commit-graph precomputa punteros de padres, números de generación y (opcionalmente) filtros Bloom en un archivo lateral binario.</p>
    <h2>Dónde vive</h2>
    <p>Git antiguo: <code>.git/objects/info/commit-graph</code>. Git nuevo: <code>.git/objects/info/commit-graphs/</code>.</p>
    <h2>Escribir el grafo</h2>
    <pre><code>git commit-graph write --reachable --changed-paths
    git commit-graph verify
    git commit-graph write --split=replace --reachable --changed-paths</code></pre>
    <h2>Auto-escritura</h2>
    <pre><code>git config core.commitGraph true
    git config gc.writeCommitGraph true
    git config fetch.writeCommitGraph true</code></pre>
    <h2>Números de generación</h2>
    <p>Cada commit obtiene un número topológico de generación. Comparar permite a Git saltar regiones enteras del grafo durante recorridos.</p>
    <h2>Impacto en rendimiento</h2>
    <p>En el repo de Linux (más de un millón de commits), <code>git log --oneline | head</code> baja de segundos a milisegundos.</p>
    <h2>Medición</h2>
    <pre><code>git -c core.commitGraph=false log -100 --pretty=oneline &gt;/dev/null
    time git -c core.commitGraph=false log --oneline | head -10000 &gt;/dev/null
    time git log --oneline | head -10000 &gt;/dev/null</code></pre>
    <h2>Errores comunes</h2>
    <p>Olvidar escribir el grafo tras un push grande o rebase. Deshabilitar <code>core.commitGraph</code> sin darse cuenta de que muchas otras características dependen de él.</p>

- source_title: "Changed-path Bloom filters in the commit-graph"
  title: "Filtros Bloom de rutas cambiadas en el commit-graph"
  langcode: es
  body: |
    <h2>El problema del log restringido por ruta</h2>
    <p><code>git log -- path/to/file</code> debe, en principio, recorrer cada commit, hacer diff contra su padre, y emitir los que tocaron <code>path/to/file</code>. En repos grandes esto está dominado por comparaciones de tree. Los filtros Bloom de rutas cambiadas (Git 2.27+) aceleran esto dramáticamente almacenando, para cada commit, un conjunto probabilístico de rutas que tocó.</p>
    <h2>Cómo funcionan los filtros Bloom</h2>
    <p>Un filtro Bloom es un pequeño bitmap que devuelve "definitivamente no en el conjunto" o "probablemente en el conjunto". Los falsos positivos son posibles pero nunca falsos negativos.</p>
    <h2>Habilitación</h2>
    <pre><code>git commit-graph write --reachable --changed-paths
    git config commitGraph.changedPathsVersion 2
    git maintenance run --task=commit-graph</code></pre>
    <h2>Verificar</h2>
    <pre><code>GIT_TRACE2_PERF=1 git log -- src/foo.c 2&gt;&amp;1 | grep -i bloom
    git commit-graph verify</code></pre>
    <h2>Cuándo brilla</h2>
    <ul>
      <li>Monorepo de larga vida con muchos commits que tocan pocos archivos cada uno.</li>
      <li>Consultas <code>git log -- src/specific/dir</code>.</li>
      <li><code>git blame</code> en archivos individuales.</li>
    </ul>
    <h2>Cuándo no ayuda</h2>
    <ul>
      <li>Rutas con glob/regex que el filtro no puede emparejar exactamente.</li>
      <li>Logs sin un argumento de ruta <code>--</code>.</li>
      <li>Repos muy pequeños donde el recorrido ya es rápido.</li>
    </ul>
    <h2>Memoria y disco</h2>
    <p>Los filtros añaden aproximadamente 8-12 bytes por commit al archivo commit-graph.</p>
    <pre><code>git config commitGraph.maxNewFilters 50000</code></pre>
    <h2>Errores comunes</h2>
    <p>Escribir el grafo sin <code>--changed-paths</code> — los filtros no se añaden por defecto.</p>

- source_title: "Multi-pack-index (MIDX): unified pack object lookup"
  title: "Multi-pack-index (MIDX): búsqueda unificada de objetos de pack"
  langcode: es
  body: |
    <h2>El problema de muchos packs</h2>
    <p>Un repo con muchos packfiles debe buscar en cada uno para localizar un objeto — una búsqueda binaria por pack. Con docenas o cientos de packs (común en repos activos usando repack geométrico), este costo O(packs × log objetos) se acumula. El multi-pack-index (MIDX) consolida todos los índices de pack en una búsqueda binaria.</p>
    <h2>Escribir</h2>
    <pre><code>git multi-pack-index write
    git multi-pack-index verify
    git multi-pack-index expire
    git multi-pack-index repack --batch-size=2g</code></pre>
    <h2>Configuración</h2>
    <pre><code>git config core.multiPackIndex true
    git config maintenance.multi-pack-index.enabled true</code></pre>
    <h2>Bitmap MIDX (Git 2.34+)</h2>
    <pre><code>git multi-pack-index write --bitmap
    git config repack.writeBitmaps true
    git config pack.writeBitmaps true</code></pre>
    <h2>Integración geométrica</h2>
    <p>MIDX brilla emparejado con repack geométrico: muchos packs son normales, la búsqueda permanece rápida, y solo los packs más pequeños se repackean rutinariamente.</p>
    <h2>Verificación</h2>
    <pre><code>git multi-pack-index verify
    git fsck --multi-pack-index
    ls -la .git/objects/pack/multi-pack-index*</code></pre>
    <h2>Errores comunes</h2>
    <p>Eliminar manualmente archivos de pack referenciados por el MIDX; siempre usa <code>multi-pack-index expire</code>.</p>
    <h2>Impacto en rendimiento</h2>
    <p>En un repo con 50+ packs, el tiempo de búsqueda de objetos puede caer 5-10x.</p>

- source_title: "Reachability bitmaps for fast set operations"
  title: "Bitmaps de alcanzabilidad para operaciones de conjunto rápidas"
  langcode: es
  body: |
    <h2>El problema de operaciones de conjunto</h2>
    <p>Operaciones como clone, fetch y gc necesitan calcular "¿qué objetos son alcanzables desde estos commits?" — un recorrido de grafo que toca cada objeto alcanzable. Los bitmaps de alcanzabilidad almacenan esta respuesta como bitmaps comprimidos, convirtiendo el recorrido en operaciones bitwise OR/AND.</p>
    <h2>Generación</h2>
    <pre><code>git repack -adb
    git multi-pack-index write --bitmap
    git config repack.writeBitmaps true
    git config pack.writeBitmaps true</code></pre>
    <h2>Cómo los usan los servidores</h2>
    <p>Cuando un cliente clona, el servidor debe enumerar todos los objetos alcanzables. Con bitmaps, esto es un OR sobre los bitmaps de todos los tips de branch.</p>
    <h2>Bitmaps pseudo-merge (Git 2.45+)</h2>
    <pre><code>git config pack.writeBitmapPseudoMergeStable true
    git config repack.writeBitmapHashCache true</code></pre>
    <h2>Verificación</h2>
    <pre><code>ls .git/objects/pack/*.bitmap
    git rev-list --use-bitmap-index --count --all
    git rev-list --test-bitmap HEAD</code></pre>
    <h2>Servidor vs cliente</h2>
    <p>Los bitmaps benefician a ambos lados pero importan más en el servidor.</p>
    <h2>Errores comunes</h2>
    <p>Escribir bitmaps en cada gc en repos pequeños — el overhead puede exceder el beneficio.</p>
    <h2>Números reales</h2>
    <p>GitHub reportó reducciones del 50-90% en CPU de clone tras habilitar bitmaps. Los tiempos de replicación de GitLab Geo cayeron de horas a minutos.</p>

- source_title: "Geometric repacking strategy"
  title: "Estrategia de repacking geométrico"
  langcode: es
  body: |
    <h2>El costo del repack completo</h2>
    <p><code>git gc</code> tradicional ejecuta <code>git repack -ad</code>, reescribiendo todos los objetos en un packfile. En un repo de varios gigabytes, son horas de CPU e IO. El repacking geométrico (Git 2.32+) lo evita manteniendo una serie de packs cuyos tamaños siguen una progresión geométrica — solo los más pequeños se mergean cada ciclo.</p>
    <h2>Cómo funciona</h2>
    <p>Los tamaños de pack forman una secuencia donde cada pack es al menos N veces más grande que el siguiente más pequeño. El costo agregado a lo largo del tiempo es <code>O(objetos totales × log)</code> en lugar de <code>O(objetos totales)</code> por gc.</p>
    <h2>Ejecución</h2>
    <pre><code>git repack --geometric=2 -d
    git repack --geometric=2 -d --write-midx
    git config maintenance.incremental-repack.enabled true</code></pre>
    <h2>Emparejar con MIDX</h2>
    <pre><code>git config core.multiPackIndex true
    git multi-pack-index write
    git multi-pack-index expire</code></pre>
    <h2>Mantenimiento en background</h2>
    <pre><code>git maintenance start
    git maintenance run --task=incremental-repack</code></pre>
    <h2>Cuándo forzar repack completo</h2>
    <pre><code>git repack -ad --depth=50 --window=250 --write-midx --write-bitmap-index</code></pre>
    <h2>Consideraciones del servidor</h2>
    <p>Los servidores Forge (GitHub, GitLab, Gitea) usan repack geométrico a escala. Gitea 1.20+ lo habilita por defecto.</p>
    <h2>Errores comunes</h2>
    <p>Ejecutar repack geométrico sin MIDX. Establecer el factor demasiado pequeño (e.g., 1.1) — los packs proliferan.</p>
    <h2>Valores comunes</h2>
    <ul>
      <li><code>--geometric=2</code>: balanceado.</li>
      <li><code>--geometric=4</code>: menos packs, más grandes.</li>
      <li><code>--geometric=1.5</code>: merging más agresivo.</li>
    </ul>

- source_title: "Git garbage collection: gc, prune, and pack-refs"
  title: "Recolección de basura de Git: gc, prune y pack-refs"
  langcode: es
  body: |
    <h2>Qué hace gc</h2>
    <p><code>git gc</code> realiza mantenimiento: repacka objetos sueltos, poda los no alcanzables más allá de la ventana de expiración, empaqueta refs sueltas en <code>packed-refs</code>, expira reflogs, y escribe commit-graph y MIDX donde está configurado.</p>
    <h2>Auto-trigger</h2>
    <pre><code>[gc]
    auto = 6700
    autoPackLimit = 50
    autoDetach = true
    pruneExpire = 2.weeks.ago
    reflogExpire = 90.days
    reflogExpireUnreachable = 30.days</code></pre>
    <h2>Invocación manual</h2>
    <pre><code>git gc
    git gc --auto
    git gc --aggressive
    git gc --prune=now</code></pre>
    <h2>Podar de forma segura</h2>
    <pre><code>git reflog expire --expire=now --all
    git gc --prune=now</code></pre>
    <h2>pack-refs</h2>
    <pre><code>git pack-refs --all
    git for-each-ref | wc -l
    ls .git/refs/heads | wc -l</code></pre>
    <h2>Programación en background</h2>
    <pre><code>git maintenance start
    git maintenance run --task=gc
    git maintenance run --task=loose-objects
    git maintenance run --task=pack-refs</code></pre>
    <h2>Aggressive vs default</h2>
    <p><code>--aggressive</code> usa profundidad 250, ventana 250 — mucho más alto que los defaults (50/10). Reserva para ejecuciones offline ocasionales.</p>
    <h2>Errores comunes</h2>
    <p>Deshabilitar auto-gc para "ahorrar CPU" y terminar con millones de objetos sueltos.</p>

- source_title: "Background maintenance: git maintenance run/start/stop"
  title: "Mantenimiento en background: git maintenance run/start/stop"
  langcode: es
  body: |
    <h2>Por qué maintenance, no gc</h2>
    <p><code>git maintenance</code> (Git 2.31+) es el reemplazo moderno orientado a tareas para <code>gc --auto</code>. Ejecuta tareas específicas (commit-graph, prefetch, incremental-repack, loose-objects, pack-refs, gc) en horarios afinados para cada una, en background, sin bloquear tus comandos interactivos.</p>
    <h2>Iniciar</h2>
    <pre><code>git maintenance start
    git maintenance start --scheduler=systemd
    git maintenance start --scheduler=launchctl
    git maintenance start --scheduler=schtasks</code></pre>
    <h2>Inspeccionar y detener</h2>
    <pre><code>git maintenance status
    git maintenance stop
    git maintenance unregister</code></pre>
    <h2>Tareas y horarios</h2>
    <table>
      <tr><th>Tarea</th><th>Horario predeterminado</th><th>Qué hace</th></tr>
      <tr><td>commit-graph</td><td>cada hora</td><td>Actualiza el commit-graph</td></tr>
      <tr><td>prefetch</td><td>cada hora</td><td>Hace fetch a refs ocultas</td></tr>
      <tr><td>loose-objects</td><td>diario</td><td>Empaqueta objetos sueltos</td></tr>
      <tr><td>incremental-repack</td><td>diario</td><td>Repack geométrico + MIDX</td></tr>
      <tr><td>pack-refs</td><td>semanal</td><td>Empaqueta refs sueltas</td></tr>
      <tr><td>gc</td><td>off por defecto</td><td>gc completo; prefiere los otros</td></tr>
    </table>
    <h2>Ejecuciones manuales</h2>
    <pre><code>git maintenance run --task=commit-graph
    git maintenance run --task=incremental-repack
    git maintenance run --auto</code></pre>
    <h2>Config por tarea</h2>
    <pre><code>[maintenance]
    auto = false
    strategy = incremental
    [maintenance "commit-graph"]
    enabled = true
    [maintenance "incremental-repack"]
    enabled = true
    auto = 100
    [maintenance "loose-objects"]
    enabled = true
    batchSize = 50</code></pre>
    <h2>Deshabilitar auto-gc</h2>
    <pre><code>git config gc.auto 0</code></pre>
    <h2>Errores comunes</h2>
    <p>Olvidar <code>git maintenance start</code> tras clonar un repo grande.</p>
    <h2>Logs</h2>
    <p>En systemd: <code>journalctl --user -u git-maintenance.service</code>. En macOS: <code>~/Library/Logs/git-maintenance.log</code>.</p>

- source_title: "Fetch and push over large repositories"
  title: "Fetch y push sobre repositorios grandes"
  langcode: es
  body: |
    <h2>Dos extremos de un cable</h2>
    <p>El rendimiento de fetch y push depende de la eficiencia de negociación, tamaño de transferencia y cómputo del lado servidor. Cada uno tiene palancas, y las correctas difieren por tamaño de repo.</p>
    <h2>Protocolo v2</h2>
    <pre><code>GIT_TRACE_PACKET=1 git ls-remote origin 2&gt;&amp;1 | head -2
    git config protocol.version 2</code></pre>
    <h2>Algoritmo de negociación</h2>
    <pre><code>git config fetch.negotiationAlgorithm skipping
    git config fetch.negotiationAlgorithm noop</code></pre>
    <h2>URIs de bundle</h2>
    <pre><code>git clone --bundle-uri=https://cdn.example/repo.bundle https://example.com/repo.git
    git config fetch.bundleURI https://cdn.example/repo.bundle</code></pre>
    <h2>Fetch paralelo</h2>
    <pre><code>git config fetch.parallel 0
    git config submodule.fetchJobs 8</code></pre>
    <h2>Optimización de push</h2>
    <pre><code>git config push.useBitmaps true
    git config pack.useBitmaps true
    git push --atomic origin main feature</code></pre>
    <h2>Consideraciones del lado servidor</h2>
    <p>Los servidores se benefician de MIDX, bitmaps de alcanzabilidad, repack geométrico y commit-graph igual que los clientes.</p>
    <h2>Clones shallow y partial</h2>
    <pre><code>git clone --depth=1 https://example.com/repo.git
    git clone --filter=blob:none https://example.com/repo.git
    git clone --filter=tree:0 --no-checkout https://example.com/repo.git</code></pre>
    <h2>Errores comunes</h2>
    <p>Usar <code>--depth=1</code> en CI luego intentar bisect o log restringido por ruta. Deshabilitar bitmaps en el servidor "por simplicidad."</p>

- source_title: "Sparse checkout for monorepos"
  title: "Sparse checkout para monorepos"
  langcode: es
  body: |
    <h2>El conjunto de trabajo del monorepo</h2>
    <p>En un monorepo, los desarrolladores individuales suelen tocar un subconjunto pequeño — una o dos apps, un puñado de librerías. Sparse checkout puebla solo esas rutas en el árbol de trabajo, dejando el resto como entradas skip-worktree en el índice.</p>
    <h2>Setup en modo cono</h2>
    <pre><code>git sparse-checkout init --cone --sparse-index
    git sparse-checkout set apps/web libs/ui libs/api
    git sparse-checkout add apps/admin
    git sparse-checkout list</code></pre>
    <h2>Combinado con partial clone</h2>
    <pre><code>git clone --filter=blob:none --sparse https://example.com/big.git
    cd big
    git sparse-checkout init --cone --sparse-index
    git sparse-checkout set apps/web</code></pre>
    <h2>Reconfigurar</h2>
    <pre><code>git sparse-checkout reapply
    git sparse-checkout disable</code></pre>
    <h2>Uso en CI</h2>
    <pre><code>git clone --no-checkout --filter=blob:none "$REPO_URL" .
    git sparse-checkout init --cone --sparse-index
    git sparse-checkout set "$AFFECTED_DIR"
    git checkout main</code></pre>
    <h2>Integración con editor e IDE</h2>
    <p>La mayoría de editores honran sparse checkout transparentemente — los archivos fuera del cono simplemente no existen en disco.</p>
    <h2>Auditoría</h2>
    <pre><code>git sparse-checkout list
    git ls-files -t | head
    git update-index --no-skip-worktree path/file
    du -sh .</code></pre>
    <h2>Errores comunes</h2>
    <p>Usar modo no-cono sin buena razón. Olvidar habilitar sparse index.</p>

- source_title: "The sparse index: operating without a full index"
  title: "El sparse index: operar sin un índice completo"
  langcode: es
  body: |
    <h2>Por qué el índice es lento</h2>
    <p>Incluso con sparse checkout, el índice por defecto contiene una entrada por archivo en todo el repo — un millón de entradas en un monorepo, incluso si solo mil están presentes en el árbol de trabajo. El sparse index (Git 2.37+) reemplaza directorios excluidos con una sola entrada de tree.</p>
    <h2>Habilitación</h2>
    <pre><code>git sparse-checkout init --cone --sparse-index
    git config index.sparse true
    git update-index --sparse</code></pre>
    <h2>Cómo funciona</h2>
    <p>Cada directorio excluido se representa en el índice como una entrada de modo <code>040000</code> (tree) con el SHA de su tree commiteado.</p>
    <h2>Inspección</h2>
    <pre><code>git ls-files --sparse | head
    git ls-files -t | grep ^S | head
    GIT_TRACE2_PERF=1 git status 2&gt;&amp;1 | grep sparse</code></pre>
    <h2>Números de rendimiento</h2>
    <p>En un monorepo del mundo real con 4M de archivos, el equipo de Microsoft Office reportó <code>git status</code> bajando de 3 segundos a menos de 200ms. El tamaño del archivo de índice bajó de 350MB a 5MB.</p>
    <h2>Compatibilidad</h2>
    <p>Muchos comandos son sparse-aware: status, add, commit, diff, checkout, reset, restore, stash, ls-files.</p>
    <h2>Forzar expansión</h2>
    <pre><code>git update-index --no-sparse
    git update-index --sparse</code></pre>
    <h2>Errores comunes</h2>
    <p>Intentar habilitar el sparse index en modo sparse-checkout no-cono — rechazado.</p>

- source_title: "Partial clone: promise and promisor remotes"
  title: "Partial clone: promise y promisor remotes"
  langcode: es
  body: |
    <h2>Fetching de objetos perezoso</h2>
    <p>Partial clone (<code>--filter</code>) permite a un clone omitir algunos objetos de la transferencia inicial, trayéndolos perezosamente cuando se necesiten. El remote promisor mantiene su promesa de proporcionarlos bajo demanda.</p>
    <h2>Especificaciones de filtro</h2>
    <pre><code>git clone --filter=blob:none url
    git clone --filter=blob:limit=1m url
    git clone --filter=tree:0 url
    git clone --filter=sparse:oid=&lt;oid&gt; url</code></pre>
    <h2>Cómo funciona el fetching</h2>
    <pre><code>git rev-list --objects --missing=allow-promisor HEAD | \
      awk '{print $1}' | git cat-file --batch-check
    git fetch --refetch</code></pre>
    <h2>Inspección</h2>
    <pre><code>git config --get-all remote.origin.partialclonefilter
    git rev-list --missing=print HEAD | head
    git config --get extensions.partialClone</code></pre>
    <h2>Advertencias</h2>
    <ul>
      <li>Operaciones como <code>git log -p</code> en toda la historia pueden disparar fetches masivos bajo demanda.</li>
      <li>El uso desconectado es limitado — sin el promisor, los objetos faltantes fallan.</li>
      <li>El servidor debe soportar partial clone (Git 2.22+; <code>uploadpack.allowFilter=true</code>).</li>
    </ul>
    <h2>Config del servidor</h2>
    <pre><code>[uploadpack]
    allowFilter = true
    allowAnySHA1InWant = true</code></pre>
    <h2>Combinar con sparse</h2>
    <pre><code>git clone --filter=blob:none --sparse https://example.com/big.git
    cd big
    git sparse-checkout init --cone --sparse-index
    git sparse-checkout set apps/web
    git checkout main</code></pre>
    <h2>Errores comunes</h2>
    <p>Usar <code>--filter=tree:0</code> para trabajo de desarrollo — cada operación que necesita un tree lo trae bajo demanda.</p>

- source_title: "Filter specs: blob:none, tree:0, and combining filters"
  title: "Especificaciones de filtro: blob:none, tree:0 y combinar filtros"
  langcode: es
  body: |
    <h2>El lenguaje de filtros</h2>
    <p>Los filtros de partial clone se especifican mediante strings DSL cortos. Cada filtro excluye objetos que coinciden con la spec de la transferencia.</p>
    <h2>Filtros comunes</h2>
    <ul>
      <li><code>blob:none</code> — omitir todos los blobs.</li>
      <li><code>blob:limit=&lt;n&gt;[kmg]</code> — omitir blobs mayores que el umbral.</li>
      <li><code>tree:&lt;depth&gt;</code> — omitir trees más profundos que depth.</li>
      <li><code>sparse:oid=&lt;blob&gt;</code> — usar una spec sparse-checkout almacenada como blob.</li>
      <li><code>object:type=tag</code> — excluir objetos de un tipo (Git 2.36+).</li>
      <li><code>combine:F1+F2+...</code> — combinar múltiples filtros con URL-encoding.</li>
    </ul>
    <h2>Ejemplos</h2>
    <pre><code>git clone --filter=blob:none url big-no-blobs
    git clone --filter=blob:limit=10m url big-small-blobs
    git clone --filter=tree:0 --no-checkout url history-only
    git clone --filter=combine:blob:none+tree:0 url metadata-only</code></pre>
    <h2>Elegir un filtro</h2>
    <table>
      <tr><th>Caso de uso</th><th>Filtro</th></tr>
      <tr><td>Desarrollo diario en un subconjunto</td><td>blob:none + sparse-checkout</td></tr>
      <tr><td>CI para una app específica</td><td>blob:none + sparse-checkout cono</td></tr>
      <tr><td>Solo análisis de historia</td><td>tree:0</td></tr>
      <tr><td>Archivos multimedia grandes separados</td><td>blob:limit=10m</td></tr>
      <tr><td>Despliegue release de solo lectura</td><td>blob:none + checkout un tag</td></tr>
    </table>
    <h2>Filtro sparse</h2>
    <pre><code>blob_oid=$(git hash-object .sparse)
    git clone --filter=sparse:oid=$blob_oid url</code></pre>
    <h2>Combinar</h2>
    <pre><code>git clone --filter=combine:blob%3Anone+tree%3A0 url</code></pre>
    <h2>Verificar</h2>
    <pre><code>git config --get remote.origin.partialclonefilter
    git rev-list --missing=print HEAD | wc -l
    du -sh .git/objects</code></pre>
    <h2>Errores comunes</h2>
    <p>Usar <code>tree:0</code> para desarrollo activo. Olvidar que <code>blob:limit</code> es por blob, no agregado.</p>

- source_title: "Scalar: batteries-included large repo management"
  title: "Scalar: gestión de repos grandes con baterías incluidas"
  langcode: es
  body: |
    <h2>Qué es Scalar</h2>
    <p>Scalar (originalmente herramienta de Microsoft, incluido con Git en 2.38+) es un wrapper que aplica el stack completo de rendimiento — partial clone, sparse checkout, sparse index, fsmonitor, commit-graph, MIDX, repack geométrico, mantenimiento en background — con un solo comando.</p>
    <h2>Clonar</h2>
    <pre><code>scalar clone https://example.com/big.git
    cd big/src
    scalar list</code></pre>
    <h2>Qué configura Scalar</h2>
    <ul>
      <li><code>--filter=blob:none</code> partial clone.</li>
      <li><code>--sparse</code> con modo cono y sparse index.</li>
      <li><code>core.fsmonitor=true</code>.</li>
      <li><code>core.untrackedCache=true</code>.</li>
      <li>Commit-graph con filtros Bloom.</li>
      <li>Multi-pack-index con bitmaps.</li>
      <li><code>git maintenance start</code>.</li>
      <li><code>feature.manyFiles=true</code>.</li>
    </ul>
    <h2>Registrar repo existente</h2>
    <pre><code>cd existing-big-repo
    scalar register
    scalar list
    scalar unregister</code></pre>
    <h2>Diagnósticos</h2>
    <pre><code>scalar diagnose
    scalar reconfigure</code></pre>
    <h2>Cuándo usar</h2>
    <ul>
      <li>Repos con millones de archivos.</li>
      <li>Repos con cientos de GB de historia.</li>
      <li>Runners de CI clonando repos grandes repetidamente.</li>
      <li>Onboarding de nuevos miembros a un monorepo grande.</li>
    </ul>
    <h2>Cuándo no</h2>
    <p>Repos pequeños donde el stack de optimización es excesivo.</p>
    <h2>Errores comunes</h2>
    <p>Tratar Scalar como magia — cuando algo se rompe, aún necesitas entender las características subyacentes.</p>

- source_title: "Fsmonitor: faster working tree queries"
  title: "Fsmonitor: consultas más rápidas del árbol de trabajo"
  langcode: es
  body: |
    <h2>El problema del recorrido status</h2>
    <p><code>git status</code> compara el árbol de trabajo con el índice, recorriendo la stat info de cada archivo rastreado. En un repo de un millón de archivos esto puede tomar segundos. Fsmonitor usa las notificaciones de cambio de archivos del SO (FSEvents en macOS, ReadDirectoryChangesW en Windows, inotify en Linux).</p>
    <h2>Daemon integrado (Git 2.36+)</h2>
    <pre><code>git config core.fsmonitor true
    git fsmonitor--daemon start
    git fsmonitor--daemon status
    git fsmonitor--daemon stop</code></pre>
    <h2>Integraciones externas</h2>
    <pre><code>git config core.fsmonitor /path/to/hook
    git config core.fsmonitorHookVersion 2</code></pre>
    <h2>Verificar</h2>
    <pre><code>GIT_TRACE2_PERF=1 git status 2&gt;&amp;1 | grep fsmonitor
    git fsmonitor--daemon status
    git update-index --fsmonitor</code></pre>
    <h2>Cache de untracked</h2>
    <pre><code>git config core.untrackedCache true</code></pre>
    <h2>Números de rendimiento</h2>
    <p>En un monorepo de 4 millones de archivos, <code>git status</code> baja de 5+ segundos a menos de 200ms.</p>
    <h2>Errores comunes</h2>
    <p>Habilitar fsmonitor sin cache de untracked. Ejecutar en un filesystem de red que no soporta eventos de cambio.</p>
    <h2>Advertencias por plataforma</h2>
    <ul>
      <li>macOS: FSEvents es confiable.</li>
      <li>Windows: ReadDirectoryChangesW; funciona bien en NTFS.</li>
      <li>Linux: los límites de inotify pueden necesitar elevarse.</li>
    </ul>
    <pre><code>sudo sysctl fs.inotify.max_user_watches=524288</code></pre>

- source_title: "Fsmonitor daemon mode (Git 2.36+)"
  title: "Modo daemon de Fsmonitor (Git 2.36+)"
  langcode: es
  body: |
    <h2>El daemon integrado</h2>
    <p>Git 2.36 introdujo un daemon fsmonitor integrado, eliminando la necesidad de servicios externos como Watchman. Se ejecuta como <code>git fsmonitor--daemon</code>, escucha eventos del SO y responde a las consultas de Git con la lista de rutas cambiadas.</p>
    <h2>Ciclo de vida</h2>
    <pre><code>git config core.fsmonitor true
    git status
    git fsmonitor--daemon status
    git fsmonitor--daemon stop
    git fsmonitor--daemon run</code></pre>
    <h2>Cómo se integra</h2>
    <p>Cuando <code>core.fsmonitor=true</code>, Git pregunta al daemon por las rutas cambiadas. El daemon responde con un delta desde el token de consulta anterior.</p>
    <h2>Verificar speedup</h2>
    <pre><code>time git -c core.fsmonitor=false status
    time git -c core.fsmonitor=true status
    GIT_TRACE2_PERF=1 git status 2&gt;&amp;1 | grep fsmonitor</code></pre>
    <h2>Uso de recursos</h2>
    <pre><code>sudo sysctl fs.inotify.max_user_watches=524288
    sudo sysctl fs.inotify.max_user_instances=8192</code></pre>
    <h2>Múltiples worktrees</h2>
    <p>Cada worktree obtiene su propio daemon.</p>
    <h2>Logging</h2>
    <p>Los logs van a <code>.git/fsmonitor--daemon.log</code> cuando se inicia en debug.</p>
    <h2>Errores comunes</h2>
    <p>Ejecutar en filesystems de red donde los eventos de cambio no son confiables (NFS, SMB).</p>
    <h2>Watchman vs integrado</h2>
    <p>El daemon integrado es la opción recomendada por defecto.</p>

- source_title: "Configuring index.version for performance"
  title: "Configurar index.version para rendimiento"
  langcode: es
  body: |
    <h2>Versiones del índice</h2>
    <p>El índice de Git ha tenido varios formatos. La versión 2 es la baseline histórica. La 3 añadió skip-worktree y otras extensiones. La 4 (recomendada para repos grandes) añade compresión de prefijos de rutas, halvando el tamaño del índice en árboles profundos.</p>
    <h2>Establecer</h2>
    <pre><code>git config index.version 4
    git update-index --index-version 4</code></pre>
    <h2>Por qué v4 ayuda</h2>
    <p>Para monorepos con rutas profundas como <code>apps/web/src/components/foo/bar/baz/Quux.tsx</code>, los prefijos repetidos de rutas dominan el tamaño del índice. V4 almacena cada ruta como delta de la anterior, encogiendo el índice 30-60% en monorepos reales.</p>
    <h2>Inspeccionar</h2>
    <pre><code>git ls-files --debug | head
    ls -la .git/index
    GIT_TRACE2_PERF=1 git status 2&gt;&amp;1 | grep "do_read_index"</code></pre>
    <h2>Emparejar con feature.manyFiles</h2>
    <pre><code>git config feature.manyFiles true</code></pre>
    <h2>Cuándo no</h2>
    <p>Para repos pequeños (menos de 10k archivos), v2 está bien.</p>
    <h2>Errores comunes</h2>
    <p>Establecer <code>index.version</code> en config pero no ejecutar <code>git update-index --index-version</code>.</p>
    <h2>Nota lateral: skip-worktree y assume-unchanged</h2>
    <p>Estos bits viven en el índice. V3+ los soporta.</p>

- source_title: "Feature.manyFiles configuration"
  title: "Configuración Feature.manyFiles"
  langcode: es
  body: |
    <h2>El bundle de configuración</h2>
    <p>Afinar monorepos involucra una docena de configuraciones. En lugar de memorizar y aplicar cada una, Git proporciona "feature flags" que activan un bundle coherente. <code>feature.manyFiles</code> es el más útil: una sola perilla que habilita todas las optimizaciones de índice y stat.</p>
    <h2>Qué establece</h2>
    <ul>
      <li><code>index.version=4</code> — compresión de prefijos.</li>
      <li><code>core.untrackedCache=true</code> — cachear listados de untracked.</li>
      <li>(Implícito) rutas de lectura de índice recomendadas.</li>
    </ul>
    <pre><code>git config feature.manyFiles true
    git config --list | grep -E '^(index|core)\.'</code></pre>
    <h2>Características hermanas</h2>
    <ul>
      <li><code>feature.experimental=true</code> — activa flags de rendimiento de vanguardia.</li>
      <li>Histórico: <code>feature.manyCommits</code>.</li>
    </ul>
    <h2>Combinar con stack monorepo</h2>
    <pre><code>git config feature.manyFiles true
    git config core.fsmonitor true
    git config core.commitGraph true
    git sparse-checkout init --cone --sparse-index
    git maintenance start</code></pre>
    <h2>Comportamiento entre versiones</h2>
    <p>El conjunto exacto de configuraciones que <code>feature.manyFiles</code> activa puede cambiar entre versiones de Git.</p>
    <h2>Verificar impacto</h2>
    <pre><code>time git -c feature.manyFiles=false status
    time git -c feature.manyFiles=true status
    GIT_TRACE2_PERF=1 git status 2&gt;&amp;1 | head -50</code></pre>
    <h2>Errores comunes</h2>
    <pre><code>git update-index --index-version 4
    git status</code></pre>
    <h2>Reset</h2>
    <pre><code>git config --unset feature.manyFiles
    git update-index --index-version 2</code></pre>

- source_title: "Feature.experimental and feature.manyCommits"
  title: "Feature.experimental y feature.manyCommits"
  langcode: es
  body: |
    <h2>Experimentos opt-in</h2>
    <p>El proyecto Git prueba nuevas características de rendimiento detrás de <code>feature.experimental</code>. Habilitarlo activa configuraciones bajo evaluación para default-on. Es el lugar para mirar al rastrear la vanguardia del rendimiento de Git.</p>
    <h2>Qué establece actualmente</h2>
    <ul>
      <li><code>protocol.version=2</code> (ahora default).</li>
      <li><code>fetch.negotiationAlgorithm=skipping</code> (ahora default).</li>
      <li><code>pack.useSparse=true</code>.</li>
      <li><code>core.commitGraph=true</code> (ahora default).</li>
      <li><code>core.multiPackIndex=true</code> (ahora default).</li>
    </ul>
    <pre><code>git config feature.experimental true
    git config --list --show-origin | grep -i 'feature\|protocol\|pack\|commitgraph'</code></pre>
    <h2>feature.manyCommits</h2>
    <pre><code>git --version
    git help config | grep -A3 manyCommits</code></pre>
    <h2>Perfil de riesgo</h2>
    <p>"Experimental" significa que los desarrolladores de Git creen que está listo para pruebas amplias pero se reservan el derecho de afinar el comportamiento.</p>
    <h2>Rastrear cambios</h2>
    <p>Lee el directorio <code>RelNotes/</code> del código fuente de Git para cada release.</p>
    <h2>Consejo práctico</h2>
    <ul>
      <li>Para trabajo de monorepo, prefiere <code>feature.manyFiles</code> sobre <code>feature.experimental</code>.</li>
      <li>Usa <code>feature.experimental</code> en una máquina personal o staging.</li>
      <li>Documenta la versión y configuraciones en CONTRIBUTING.md.</li>
    </ul>
    <h2>Errores comunes</h2>
    <p>Habilitar características experimentales en CI luego actualizar Git.</p>

- source_title: "pack.windowMemory and pack.threads tuning"
  title: "Ajuste de pack.windowMemory y pack.threads"
  langcode: es
  body: |
    <h2>Presupuestos de repack</h2>
    <p>Cuando Git computa deltas durante repack, considera una ventana de objetos base candidatos por target. Ventanas más grandes producen packs más pequeños pero usan más memoria y CPU. El ajuste es esencial para repos enormes y runners de build con restricciones por igual.</p>
    <h2>Perillas clave</h2>
    <pre><code>[pack]
    windowMemory = 256m
    threads = 0
    deltaCacheSize = 256m
    deltaCacheLimit = 1000
    window = 10
    depth = 50
    sizeLimit = 2g
    bigFileThreshold = 512m</code></pre>
    <h2>Repack con presupuestos personalizados</h2>
    <pre><code>git repack -adf --window=250 --depth=50 \
      --window-memory=512m --threads=8 \
      --write-midx --write-bitmap-index</code></pre>
    <h2>Matemáticas de memoria</h2>
    <p>La memoria total es aproximadamente <code>pack.threads × pack.windowMemory + pack.deltaCacheSize</code>.</p>
    <pre><code>git -c pack.threads=2 -c pack.windowMemory=128m repack -adf</code></pre>
    <h2>Ajuste del servidor</h2>
    <pre><code>[uploadpack]
    packObjectsHook = /usr/local/bin/pack-objects-wrapper
    [pack]
    threads = 4
    windowMemory = 128m</code></pre>
    <h2>Umbral de archivos grandes</h2>
    <pre><code>git config core.bigFileThreshold 50m</code></pre>
    <h2>Errores comunes</h2>
    <p>Establecer <code>--window=2000</code> esperando packs más apretados sin probar memoria — sigue OOM.</p>
    <h2>Medir efecto</h2>
    <pre><code>du -sh .git/objects/pack/
    git verify-pack -v .git/objects/pack/pack-*.idx | tail -3
    GIT_TRACE2_PERF=1 git repack -adf 2&gt;&amp;1 | tail -20</code></pre>

- source_title: "core.preloadIndex and parallel checkout (Git 2.32+)"
  title: "core.preloadIndex y checkout paralelo (Git 2.32+)"
  langcode: es
  body: |
    <h2>Dos victorias de paralelismo</h2>
    <p>Dos configuraciones desbloquean speedups significativos para operaciones cotidianas. <code>core.preloadIndex</code> paraleliza las llamadas lstat que <code>git status</code> hace; el checkout paralelo (Git 2.32+) paraleliza las escrituras de archivos durante <code>git checkout</code>, <code>git switch</code> y <code>git restore</code>.</p>
    <h2>Preload index</h2>
    <pre><code>git config core.preloadIndex true</code></pre>
    <h2>Checkout paralelo</h2>
    <pre><code>git config checkout.workers 0
    git config checkout.thresholdForParallelism 100</code></pre>
    <h2>Cuándo más ayuda</h2>
    <ul>
      <li>Cambiar branches con miles de diferencias de archivos.</li>
      <li>Checkout inicial tras clone.</li>
      <li>Restaurar conjuntos de rutas grandes vía <code>git restore</code>.</li>
      <li>Filesystems con apertura por archivo lenta (Windows NTFS, shares de red).</li>
    </ul>
    <h2>Medición</h2>
    <pre><code>time git -c checkout.workers=1 checkout main
    time git -c checkout.workers=0 checkout main
    GIT_TRACE2_PERF=1 git checkout big-branch 2&gt;&amp;1 | grep -i checkout</code></pre>
    <h2>Advertencias</h2>
    <p>El checkout paralelo interactúa con filtros smudge: los filtros se ejecutan secuencialmente por archivo, pero múltiples archivos van en paralelo.</p>
    <h2>Advertencias de filesystem</h2>
    <p>En Windows, software antivirus puede serializar las creaciones de archivos.</p>
    <h2>Errores comunes</h2>
    <p>Deshabilitar preloadIndex en discos lentos, "para ahorrar threads" — al revés.</p>

- source_title: "Shallow clones in CI/CD: balancing speed and correctness"
  title: "Clones shallow en CI/CD: equilibrio entre velocidad y corrección"
  langcode: es
  body: |
    <h2>El compromiso shallow</h2>
    <p>Un clone shallow (<code>--depth=N</code>) descarga solo los últimos N commits. Más rápido, más pequeño, pero con advertencias: muchas operaciones dependientes de la historia se vuelven imposibles o incorrectas. CI es el hogar natural para clones shallow, pero solo cuando entiendes los límites.</p>
    <h2>Invocación básica</h2>
    <pre><code>git clone --depth=1 https://example.com/repo.git
    git clone --depth=50 --no-tags https://example.com/repo.git
    git clone --shallow-since=2024-01-01 https://example.com/repo.git
    git clone --shallow-exclude=v1.0.0 https://example.com/repo.git</code></pre>
    <h2>Single-branch</h2>
    <pre><code>git clone --depth=1 --no-single-branch https://example.com/repo.git</code></pre>
    <h2>Qué se rompe</h2>
    <ul>
      <li><code>git log</code> se detiene en el límite shallow.</li>
      <li><code>git blame</code> asigna cambios más profundos al commit límite.</li>
      <li><code>git bisect</code> solo puede buscar dentro de la ventana shallow.</li>
      <li><code>git merge-base</code> puede fallar al encontrar una base más antigua.</li>
    </ul>
    <h2>Promover después</h2>
    <pre><code>git fetch --unshallow
    git fetch --depth=1000
    git fetch --shallow-since=2023-01-01</code></pre>
    <h2>Patrones de CI</h2>
    <pre><code>git clone --depth=1 --no-tags --filter=tree:0 \
      --branch "$CI_COMMIT_REF_NAME" "$CI_REPOSITORY_URL" .</code></pre>
    <h2>Cuándo evitar shallow</h2>
    <ul>
      <li>Builds release que incrustan git describe.</li>
      <li>Scanners SBOM/license que recorren autoría.</li>
      <li>Pasos de bisect o blame en CI.</li>
      <li>Cómputos merge-base contra una rama base de larga vida.</li>
    </ul>
    <h2>Errores comunes</h2>
    <p>Usar <code>--depth=1</code> en un pipeline de release que ejecuta <code>git describe</code>.</p>

- source_title: "Protocol v2 for efficient fetch negotiation"
  title: "Protocolo v2 para negociación de fetch eficiente"
  langcode: es
  body: |
    <h2>Por qué v2</h2>
    <p>El protocolo v0/v1 enviaba la publicidad completa de refs del servidor al inicio de cada fetch — un payload proporcional al número de refs. En repos con decenas de miles de refs, esto dominaba el tiempo de transferencia. El protocolo v2 (default en Git 2.26+) permite al cliente solicitar refs específicas por nombre.</p>
    <h2>Verificar que está activado</h2>
    <pre><code>GIT_TRACE_PACKET=1 git ls-remote origin 2&gt;&amp;1 | head -10
    git config protocol.version 2
    git config --global protocol.version 2</code></pre>
    <h2>Requisitos del servidor</h2>
    <ul>
      <li>HTTP: Git 2.18+ en el servidor.</li>
      <li>SSH: Git 2.18+ en ambos extremos.</li>
      <li>Algunos hosts legacy pueden necesitar <code>uploadpack.allowFilter=true</code>.</li>
    </ul>
    <h2>Capabilities</h2>
    <pre><code>GIT_TRACE_PACKET=1 git fetch 2&gt;&amp;1 | grep -i 'capabilit\|fetch='</code></pre>
    <h2>Impacto práctico</h2>
    <p>En el repo de Linux (~50k refs), un fetch fresco sobre v0 gastaba 4-8 segundos en publicidad; v2 lo reduce a menos de un segundo.</p>
    <h2>Sideband y progreso</h2>
    <pre><code>git fetch --quiet
    git -c progress.delay=999 fetch</code></pre>
    <h2>Errores comunes</h2>
    <p>Forzar versión 0 del protocolo en archivos config viejos.</p>
    <h2>Combinar con</h2>
    <ul>
      <li>Algoritmo de negociación: <code>fetch.negotiationAlgorithm=skipping</code>.</li>
      <li>Bitmaps de alcanzabilidad en el servidor.</li>
      <li>Filtrado de refs: <code>fetch.refSpecs</code>.</li>
    </ul>

- source_title: "Wire protocol optimization: stateless-connect"
  title: "Optimización del protocolo de cable: stateless-connect"
  langcode: es
  body: |
    <h2>La capa de transporte</h2>
    <p>El protocolo de cable de Git históricamente intercala mensajes cliente y servidor sobre una conexión con estado. <code>stateless-connect</code> (introducido para protocolo v2 sobre HTTP) desacopla las solicitudes para que cada una sea ruteable independientemente.</p>
    <h2>Flujos sin estado</h2>
    <pre><code>GIT_TRACE_PACKET=1 GIT_TRACE_CURL=1 \
      git -c protocol.version=2 fetch origin 2&gt;&amp;1 | head -50</code></pre>
    <h2>Beneficios HTTP/2</h2>
    <p>El multiplexing HTTP/2 permite que múltiples solicitudes sin estado compartan una conexión.</p>
    <h2>Ajustar la capa HTTP</h2>
    <pre><code>[http]
    version = HTTP/2
    postBuffer = 524288000
    lowSpeedLimit = 1000
    lowSpeedTime = 30
    minSessions = 4
    maxRequestBuffer = 100M</code></pre>
    <h2>Paralelismo de fetch</h2>
    <pre><code>git config fetch.parallel 0
    git config submodule.fetchJobs 0</code></pre>
    <h2>HTTP smart vs dumb</h2>
    <p>"Smart" HTTP soporta negociación; "dumb" HTTP solo sirve <code>.git/objects</code> como archivos estáticos. Siempre prefiere smart.</p>
    <h2>Errores comunes</h2>
    <p>Forzar HTTP/1.1 con <code>http.version=HTTP/1.1</code> en un host que soporta HTTP/2.</p>
    <h2>Diagnosticar</h2>
    <pre><code>GIT_CURL_VERBOSE=1 git fetch 2&gt;&amp;1 | head -30
    GIT_TRACE_PACKET=1 git fetch 2&gt;&amp;1 | grep -i version</code></pre>

- source_title: "Delta islands for pack efficiency"
  title: "Islas delta para eficiencia de pack"
  langcode: es
  body: |
    <h2>El problema cross-fork</h2>
    <p>Los servidores Forge (GitHub, GitLab) hospedan muchos forks de un repo juntos. Ingenuamente, un solo packfile comprime delta entre todos los forks — eficiente en disco, pero ineficiente al servir un solo fork. Las islas delta restringen las cadenas delta para que las cadenas de cada fork permanezcan dentro de su propio conjunto de objetos.</p>
    <h2>Configurar islas</h2>
    <pre><code>[pack]
    island = refs/heads/main
    island = refs/heads/release/*
    island = refs/tags/*</code></pre>
    <h2>Repack con islas</h2>
    <pre><code>git repack -adf --window=250 --depth=50</code></pre>
    <h2>Casos de uso</h2>
    <ul>
      <li>Gitea/GitLab/Forgejo self-hosted con muchos forks.</li>
      <li>Mirrors internos que sirven múltiples repos internos.</li>
      <li>Backups que necesitan extraer snapshots por repo rápidamente.</li>
    </ul>
    <h2>Característica solo de servidor</h2>
    <p>Las islas delta importan en el servidor. Como cliente, casi nunca las configuras.</p>
    <h2>Verificar</h2>
    <pre><code>git verify-pack -v .git/objects/pack/pack-*.idx | head
    GIT_TRACE2_PERF=1 git pack-objects --stdout --revs &lt; refs.txt &gt; out.pack</code></pre>
    <h2>Errores comunes</h2>
    <p>Establecer islas demasiado gruesas (todo en una isla) — sin beneficio. Demasiado finas (por PR) — el tamaño del pack se infla.</p>
    <h2>Bitmaps pseudo-merge</h2>
    <p>Git reciente empareja islas delta con bitmaps pseudo-merge.</p>

- source_title: "Ahead-of-time packfile building with git fast-export"
  title: "Construcción anticipada de packfile con git fast-export"
  langcode: es
  body: |
    <h2>fast-export y fast-import</h2>
    <p><code>git fast-export</code> serializa un repositorio a un stream de comandos; <code>git fast-import</code> reconstruye un repositorio a partir de uno. Juntos forman el protocolo de intercambio de datos de Git — usado por importadores (cvs2git, hg-fast-export) y por herramientas como <code>git filter-repo</code> internamente.</p>
    <h2>Exportar</h2>
    <pre><code>git fast-export --all &gt; all.fi
    git fast-export --all --signed-tags=strip --tag-of-filtered-object=drop &gt; clean.fi
    git fast-export --reference-excluded-parents main..feature &gt; topic.fi</code></pre>
    <h2>Importar</h2>
    <pre><code>mkdir new-repo &amp;&amp; cd new-repo &amp;&amp; git init
    cat ../all.fi | git fast-import
    git checkout main</code></pre>
    <h2>Caso de uso: archivo deshidratado</h2>
    <pre><code>git rev-list --objects --all | \
      git pack-objects --stdout --revs --delta-base-offset \
      &gt; offline.pack</code></pre>
    <h2>Builds determinísticos</h2>
    <pre><code>git fast-export --all --no-data &gt; metadata-only.fi</code></pre>
    <h2>Anonimizar</h2>
    <pre><code>git fast-export --all --anonymize &gt; anon.fi</code></pre>
    <h2>Cirugía vía filter-repo</h2>
    <p><code>git filter-repo</code> usa fast-export internamente; es por eso que es rápido.</p>
    <h2>Errores comunes</h2>
    <p>Tratar streams fast-export como archivos portables — están atados a un formato Git.</p>
    <h2>Rendimiento</h2>
    <pre><code>git fast-export --all | (cd /tmp/new &amp;&amp; git init &amp;&amp; git fast-import)</code></pre>

- source_title: "Repository size analysis: git count-objects and git sizer"
  title: "Análisis de tamaño de repositorio: git count-objects y git sizer"
  langcode: es
  body: |
    <h2>Conocer tu peso</h2>
    <p>Antes de optimizar, mide. Git incluye <code>git count-objects</code> para estadísticas básicas; <code>git-sizer</code> de terceros de GitHub da un análisis más profundo con umbrales de problema.</p>
    <h2>git count-objects</h2>
    <pre><code>git count-objects -v
    git count-objects -vH
    git count-objects --human-readable</code></pre>
    <h2>git-sizer</h2>
    <pre><code>git-sizer
    git-sizer --verbose
    git-sizer --no-progress --threshold 1</code></pre>
    <h2>Insights de muestra</h2>
    <ul>
      <li>Número máximo de archivos en un tree: advierte por encima de 100k.</li>
      <li>Tamaño máximo de blob: advierte por encima de 50MB.</li>
      <li>Tamaño total de todos los commits: rastrea crecimiento.</li>
      <li>Profundidad máxima de tag.</li>
      <li>Total de objetos alcanzables.</li>
    </ul>
    <h2>Encontrar archivos grandes</h2>
    <pre><code>git rev-list --objects --all | \
      git cat-file --batch-check='%(objecttype) %(objectname) %(objectsize:disk) %(rest)' | \
      awk '$1=="blob" {print $3, $4}' | sort -rn | head</code></pre>
    <h2>Acciones por hallazgo</h2>
    <ul>
      <li>Blobs grandes: migrar a Git LFS o reescribir historia con <code>filter-repo</code>.</li>
      <li>Muchos archivos pequeños: habilitar <code>feature.manyFiles</code>, sparse checkout.</li>
      <li>Muchas refs: habilitar protocolo v2; considerar reftable.</li>
      <li>Recorridos lentos: escribir commit-graph con filtros Bloom.</li>
      <li>Búsquedas lentas: habilitar MIDX con bitmaps.</li>
    </ul>
    <h2>Errores comunes</h2>
    <p>Mirar solo el tamaño de <code>.git</code> en disco — los objetos empaquetados comparten bytes vía deltas.</p>
    <h2>Rastrear crecimiento</h2>
    <pre><code>git-sizer --json &gt; sizer-$(date +%Y%m%d).json
    diff &lt;(jq . sizer-old.json) &lt;(jq . sizer-new.json)</code></pre>

- source_title: "Configuration playbook for large repositories"
  title: "Playbook de configuración para repositorios grandes"
  langcode: es
  body: |
    <h2>La configuración todo-en-uno</h2>
    <p>Juntando las piezas: esta es una configuración única que aplica el stack moderno de rendimiento de Git. Colócala en <code>.git/config</code> en un clone fresco, ejecuta las tareas únicas, y tendrás la configuración recomendada para repos con cientos de miles de archivos e historia activa.</p>
    <h2>El bloque de config</h2>
    <pre><code>[feature]
    manyFiles = true
    [core]
    fsmonitor = true
    untrackedCache = true
    commitGraph = true
    multiPackIndex = true
    preloadIndex = true
    [index]
    version = 4
    sparse = true
    [fetch]
    parallel = 0
    writeCommitGraph = true
    negotiationAlgorithm = skipping
    showForcedUpdates = false
    [gc]
    auto = 0
    writeCommitGraph = true
    [maintenance]
    auto = false
    [checkout]
    workers = 0
    thresholdForParallelism = 100
    [pack]
    useSparse = true
    writeBitmaps = true
    threads = 0
    windowMemory = 256m
    [commitGraph]
    changedPathsVersion = 2
    [diff]
    algorithm = histogram
    [merge]
    conflictStyle = zdiff3
    [rebase]
    autoSquash = true
    autoStash = true
    updateRefs = true
    [push]
    autoSetupRemote = true
    [protocol]
    version = 2</code></pre>
    <h2>Tareas únicas</h2>
    <pre><code># Habilitar setup sparse, partial-clone-friendly
    git sparse-checkout init --cone --sparse-index
    git sparse-checkout set apps/web libs/shared

    # Construir artefactos de rendimiento
    git commit-graph write --reachable --changed-paths
    git multi-pack-index write --bitmap
    git update-index --index-version 4
    git pack-refs --all

    # Iniciar mantenimiento en background
    git maintenance start</code></pre>
    <h2>Verificación</h2>
    <pre><code>git config --list --show-origin | sort
    git maintenance status
    git fsmonitor--daemon status
    git-sizer --no-progress
    GIT_TRACE2_PERF=1 git status</code></pre>
    <h2>Notas por plataforma</h2>
    <ul>
      <li>Linux: elevar <code>fs.inotify.max_user_watches</code> a 524288+.</li>
      <li>macOS: nada extra; FSEvents maneja árboles enormes nativamente.</li>
      <li>Windows: excluir el árbol de trabajo del escaneo AV en tiempo real.</li>
      <li>WSL2: funciona correctamente; WSL1 no.</li>
    </ul>
    <h2>Notas por equipo</h2>
    <p>Documenta esto en CONTRIBUTING.md del repo. Fija una versión de Git (2.39+ recomendada).</p>
    <h2>Errores comunes</h2>
    <p>Aplicar todas las configuraciones a la vez sin medir — algunas tienen tradeoffs.</p>

- source_title: "Recovery and repair of corrupt repositories"
  title: "Recuperación y reparación de repositorios corruptos"
  langcode: es
  body: |
    <h2>Diagnosticar corrupción</h2>
    <p>Los repositorios se corrompen por pérdida de energía, fallo de disco, sync de red parcial, o herramientas no-Git con bugs tocando <code>.git</code>. Los síntomas van de "<code>fatal: bad object</code>" a contenido erróneo entregado silenciosamente. El diagnóstico empieza con <code>fsck</code>:</p>
    <pre><code>git fsck --full
    git fsck --full --strict --no-dangling
    git fsck --connectivity-only
    git fsck --lost-found</code></pre>
    <h2>Fallos comunes y arreglos</h2>
    <h3>Objeto suelto corrupto</h3>
    <pre><code># en clone sano:
    git cat-file -p &lt;sha&gt; &gt; /tmp/recovered
    # en clone corrupto:
    cd .git/objects/&lt;xx&gt;
    mv &lt;rest-of-sha&gt; &lt;rest-of-sha&gt;.bad
    git hash-object -w /tmp/recovered</code></pre>
    <h3>Archivo pack corrupto</h3>
    <pre><code>for p in .git/objects/pack/pack-*.pack; do
      git verify-pack -v "$p" &gt;/dev/null 2&gt;&amp;1 || echo "MALO: $p"
    done</code></pre>
    <pre><code>rm .git/objects/pack/pack-&lt;sha&gt;.{pack,idx,bitmap,rev}
    git fetch --all
    git repack -ad</code></pre>
    <h3>Reflog corrupto o faltante</h3>
    <p>El reflog es por clone; no se puede recuperar desde upstream.</p>
    <h3>Índice corrupto</h3>
    <pre><code>rm .git/index
    git reset</code></pre>
    <h3>Refs corruptas</h3>
    <pre><code>git pack-refs --all
    cat .git/packed-refs
    git update-ref refs/heads/main &lt;sha&gt;</code></pre>
    <h2>Recuperación de repo desde un clone</h2>
    <pre><code>git clone https://example.com/repo.git fresh
    cd corrupt
    git push ../fresh 'refs/heads/local-only:refs/heads/local-only'</code></pre>
    <h2>Prevención</h2>
    <ul>
      <li>Ejecuta <code>git fsck</code> regularmente.</li>
      <li>Almacena backups bare: <code>git clone --mirror</code>.</li>
      <li>Evita editar dentro de <code>.git/</code> a mano.</li>
      <li>Usa RAM ECC y almacenamiento confiable.</li>
    </ul>
    <h2>Errores comunes</h2>
    <p>Ejecutar <code>git gc</code> en un repo corrupto — la poda puede borrar las únicas copias de objetos recuperables.</p>
    <h2>Protección contra colisiones SHA-1</h2>
    <pre><code>git --version
    echo "test" | git hash-object --stdin</code></pre>
