# Maîtriser Git - Traductions françaises batch 1
# 50 pages : 20 Démarrage + 30 Concepts fondamentaux

- source_title: "What is Git? (and what isn't it)"
  title: "Qu'est-ce que Git ? (et ce qu'il n'est pas)"
  langcode: fr
  body: |
    <h2>Introduction</h2>
    <p>Git est un <strong>système de contrôle de version distribué</strong> créé à l'origine par Linus Torvalds en 2005 pour le développement du noyau Linux. Il suit l'évolution des fichiers dans le temps, permet à plusieurs personnes de collaborer et donne à chaque développeur une copie complète de l'historique du projet. Aujourd'hui, Git propulse la majorité du développement logiciel open source et en entreprise.</p>
    <h2>Ce qu'est Git</h2>
    <p>Git est un système de capture instantanée <em>adressé par contenu</em>. Chaque commit stocke une image complète des fichiers suivis de votre projet, identifiée par un hachage cryptographique. Git est rapide parce que la plupart des opérations sont locales, et résilient parce que chaque clone est une sauvegarde complète.</p>
    <ul>
      <li><strong>Distribué</strong> : chaque clone est un dépôt complet.</li>
      <li><strong>Basé sur des instantanés</strong> : les commits stockent des arbres, pas des diffs.</li>
      <li><strong>Favorable au branching</strong> : les branches sont des pointeurs légers, pas des copies complètes.</li>
    </ul>
    <h2>Ce que Git n'est pas</h2>
    <p>Git n'est pas un outil de sauvegarde, ni un système de revue de code, ni une plateforme de déploiement. Il ne verrouille pas les fichiers comme les systèmes centralisés (CVS, SVN, Perforce en mode par défaut). Il ne stocke pas efficacement les diffs binaires pour les gros fichiers multimédias sans extensions comme Git LFS. Et Git n'est pas GitHub : GitHub, GitLab et Bitbucket sont des <em>services d'hébergement</em> construits au-dessus de Git.</p>
    <h2>Essayez par vous-même</h2>
    <p>Vérifiez que Git est installé et inspectez sa version :</p>
    <pre><code>git --version</code></pre>
    <p>Initialisez un petit dépôt pour voir Git en action :</p>
    <pre><code>mkdir hello-git
    cd hello-git
    git init
    echo "hello" > readme.txt
    git add readme.txt
    git commit -m "first commit"
    git log --oneline</code></pre>
    <h2>Pourquoi Git a triomphé</h2>
    <p>Avant Git, la plupart des équipes utilisaient des outils centralisés qui exigeaient un accès réseau pour presque chaque action. Le modèle distribué de Git permet aux développeurs de commiter, créer des branches et consulter l'historique hors ligne. Combiné à un branching peu coûteux et à l'adoption par le noyau Linux, Git est devenu le standard de fait en moins d'une décennie. La large disponibilité d'hébergements gratuits sur des plateformes comme GitHub, GitLab et Bitbucket a cimenté la place de Git : une génération de développeurs a appris Git comme premier système de contrôle de version.</p>
    <h2>Comment Git stocke les données</h2>
    <p>Le modèle de stockage de Git est inhabituel. Au lieu d'enregistrer des diffs entre versions, Git stocke des instantanés complets de chaque fichier dans chaque commit, dédupliqués par hachage de contenu. Cela rend des opérations comme le checkout et le changement de branche essentiellement à temps constant, et rend les opérations sur l'historique comme log et blame étonnamment rapides. Le compromis est que des changements binaires aléatoires peuvent faire exploser le stockage, ce qui explique l'existence de Git LFS pour les gros assets.</p>
    <h2>Erreurs fréquentes</h2>
    <p>Les débutants confondent souvent Git avec GitHub, ou supposent que Git suit automatiquement chaque fichier dans un dossier. Git ne suit que les fichiers que vous ajoutez explicitement avec <code>git add</code>, et ne versionne que le contenu sous le répertoire de travail d'un dépôt initialisé. Autre mythe : Git « sauvegarde » en continu. C'est faux. Rien n'est enregistré tant que vous n'exécutez pas <code>git commit</code>. Enfin, Git n'est pas conçu pour les gros assets binaires ; utilisez Git LFS ou un autre système pour la vidéo, les gros jeux de données ou les artefacts de build.</p>

- source_title: "Installing Git (Linux, macOS, Windows)"
  title: "Installer Git (Linux, macOS, Windows)"
  langcode: fr
  body: |
    <h2>Introduction</h2>
    <p>Installer Git est simple sur toutes les plateformes majeures. Cette page parcourt la méthode d'installation recommandée pour Linux, macOS et Windows, et montre comment vérifier l'installation.</p>
    <h2>Linux</h2>
    <p>La plupart des distributions Linux fournissent Git dans leurs dépôts de paquets par défaut. Utilisez votre gestionnaire de paquets :</p>
    <pre><code># Debian, Ubuntu
    sudo apt update
    sudo apt install git

    # Fedora, RHEL, Rocky
    sudo dnf install git

    # Arch
    sudo pacman -S git</code></pre>
    <p>Pour la dernière version, le projet officiel Git maintient un PPA pour Ubuntu (<code>ppa:git-core/ppa</code>) et des archives source sur <code>git-scm.com</code>.</p>
    <h2>macOS</h2>
    <p>macOS inclut un <code>git</code> de substitution qui vous invite à installer les outils de développement en ligne de commande d'Apple. Trois options fonctionnent bien :</p>
    <ol>
      <li>Exécutez <code>xcode-select --install</code> pour obtenir le Git fourni par Apple.</li>
      <li>Utilisez <a>Homebrew</a> : <code>brew install git</code> pour le Git le plus récent.</li>
      <li>Téléchargez l'installateur officiel depuis <code>git-scm.com</code>.</li>
    </ol>
    <pre><code>brew install git
    git --version</code></pre>
    <h2>Windows</h2>
    <p>L'installateur recommandé est <strong>Git for Windows</strong> depuis <code>git-scm.com</code>. Il regroupe Git, un client OpenSSH, un shell Bash (Git Bash) et un assistant d'identifiants. Vous pouvez aussi utiliser winget ou Chocolatey :</p>
    <pre><code>winget install --id Git.Git -e
    choco install git</code></pre>
    <p>Pendant l'installation graphique, on vous interrogera sur les fins de ligne, l'éditeur par défaut et l'intégration au PATH. Les valeurs par défaut (checkout en style Windows, commit en style Unix ; Git en ligne de commande) conviennent à la plupart des utilisateurs.</p>
    <h2>Vérifier l'installation</h2>
    <pre><code>git --version
    git help -a | head</code></pre>
    <p>Toute version 2.30 ou plus récente convient pour les sujets de ce manuel. Les versions plus anciennes manquent de nombreuses fonctionnalités de confort comme <code>git switch</code> et <code>git restore</code>.</p>
    <h2>Mettre Git à jour</h2>
    <p>Garder Git à jour est important : de nombreuses fonctionnalités de ce manuel exigent Git 2.30 ou plus récent, et des correctifs de sécurité sortent régulièrement. Sous Linux, votre gestionnaire de paquets gère les mises à jour automatiquement. Sur macOS avec Homebrew, exécutez <code>brew upgrade git</code> périodiquement. Sous Windows, <code>git update-git-for-windows</code> (intégré à Git for Windows) vérifie et installe la dernière version en une commande.</p>
    <pre><code>git --version
    brew upgrade git
    git update-git-for-windows</code></pre>
    <p>Si vous voyez soudain des avertissements de dépréciation ou des commandes qui se comportent différemment après une mise à niveau, lisez les notes de version dans <code>/usr/share/doc/git/RelNotes/</code> ou sur <code>git-scm.com</code> ; le chemin de mise à niveau de Git est doux mais certaines valeurs par défaut changent occasionnellement.</p>
    <h2>Erreurs fréquentes</h2>
    <p>Sur macOS, oublier que le Git fourni par Apple a des mois ou des années de retard sur l'amont. Utilisez Homebrew si vous voulez les fonctionnalités récentes. Sous Windows, mélanger PowerShell et Git Bash peut désorienter les nouveaux utilisateurs sur le shell utilisé. Sous Linux, installer depuis une archive tierce sans supprimer le paquet de la distribution peut placer deux binaires <code>git</code> dans le PATH ; utilisez <code>which -a git</code> pour vérifier. Enfin, n'exécutez pas les installateurs Git en <code>sudo</code> sauf si votre gestionnaire de paquets l'exige explicitement.</p>

- source_title: "First-time configuration (git config)"
  title: "Configuration initiale (git config)"
  langcode: fr
  body: |
    <h2>Introduction</h2>
    <p>Avant votre premier commit, Git doit savoir qui vous êtes. <code>git config</code> stocke des paires clé-valeur dans trois portées : <strong>system</strong> (tous les utilisateurs), <strong>global</strong> (votre compte utilisateur) et <strong>local</strong> (un dépôt unique). La portée globale est dans <code>~/.gitconfig</code> sous Unix et <code>%USERPROFILE%\.gitconfig</code> sous Windows.</p>
    <h2>Identité</h2>
    <p>Définissez votre nom et votre adresse e-mail ; ils sont gravés dans chaque commit que vous faites :</p>
    <pre><code>git config --global user.name "Ada Lovelace"
    git config --global user.email "ada@example.com"</code></pre>
    <h2>Éditeur et pager</h2>
    <p>Git lance votre éditeur pour les messages de commit et les rebases interactifs. Choisissez-en un que vous savez quitter :</p>
    <pre><code>git config --global core.editor "nano"
    # ou
    git config --global core.editor "code --wait"
    # ou
    git config --global core.editor "vim"</code></pre>
    <h2>Nom de la branche par défaut</h2>
    <p>Depuis Git 2.28, vous pouvez définir la branche par défaut pour les nouveaux dépôts :</p>
    <pre><code>git config --global init.defaultBranch main</code></pre>
    <h2>Fins de ligne</h2>
    <p>Pour éviter les surprises CRLF/LF dans les équipes multi-plateformes :</p>
    <pre><code># Linux, macOS
    git config --global core.autocrlf input

    # Windows
    git config --global core.autocrlf true</code></pre>
    <h2>Alias utiles</h2>
    <pre><code>git config --global alias.st status
    git config --global alias.co checkout
    git config --global alias.lg "log --oneline --graph --decorate --all"</code></pre>
    <p>Maintenant <code>git lg</code> donne un graphe compact de toutes les branches.</p>
    <h2>Inspecter la configuration</h2>
    <p>Lister toute la configuration avec ses fichiers d'origine, utile pour déboguer les surprises :</p>
    <pre><code>git config --list --show-origin
    git config --get user.email</code></pre>
    <h2>Comportement de pull</h2>
    <p>Depuis Git 2.27, le comportement par défaut de <code>pull</code> exige un choix explicite. Choisissez-en un :</p>
    <pre><code>git config --global pull.rebase false   # merge (par défaut)
    git config --global pull.rebase true    # rebase
    git config --global pull.ff only        # fast-forward uniquement</code></pre>
    <h2>Inclusions conditionnelles</h2>
    <p>Git prend en charge la configuration par répertoire via <code>includeIf</code>. C'est la façon la plus propre de séparer les identités professionnelle et personnelle sans avoir à penser à définir une configuration locale dans chaque clone :</p>
    <pre><code># dans ~/.gitconfig
    [includeIf "gitdir:~/work/"]
      path = ~/.gitconfig-work

    # dans ~/.gitconfig-work
    [user]
      email = ada@work.com
      signingkey = ssh-ed25519 AAAA...</code></pre>
    <p>Tout dépôt cloné sous <code>~/work/</code> reprend automatiquement l'identité professionnelle. Combinez avec des inclusions <code>onbranch:</code> pour cibler des paramètres sur des branches spécifiques.</p>
    <h2>Surcharges par dépôt</h2>
    <p>La configuration locale dans <code>.git/config</code> surcharge le fichier global. C'est le bon endroit pour les identités, hooks et clés de signature spécifiques au projet. Pour auditer la portée d'où provient un paramètre :</p>
    <pre><code>git config --show-origin --get user.email
    git config --show-scope --get-all credential.helper</code></pre>
    <p>Si une valeur semble fausse, <code>--show-origin</code> vous indique exactement quel fichier la contient. Attention : <code>system</code>, <code>global</code>, <code>local</code> ou même la portée <code>worktree</code> peuvent masquer une autre. <code>git config --list --show-origin</code> dresse le tableau complet en une seule commande.</p>
    <h2>Erreurs fréquentes</h2>
    <p>Définir <code>user.email</code> sur une adresse personnelle tout en commitant pour le travail, exposant cette adresse sur des plateformes d'hébergement publiques. Utilisez la portée <em>locale</em> dans les dépôts professionnels pour surcharger la valeur globale : <code>git config user.email "ada@work.com"</code>. Autre classique : éditer <code>~/.gitconfig</code> à la main et introduire une erreur de syntaxe qui casse toutes les commandes Git. Utilisez <code>git config</code> pour écrire des valeurs, et <code>git config --list</code> pour vérifier après chaque changement.</p>

- source_title: "Creating your first repository (git init)"
  title: "Créer votre premier dépôt (git init)"
  langcode: fr
  body: |
    <h2>Introduction</h2>
    <p><code>git init</code> transforme un répertoire ordinaire en dépôt Git. Il crée un répertoire caché <code>.git</code> contenant toute la comptabilité de Git : objets, refs, configuration et hooks. L'arborescence de travail (vos fichiers normaux) est inchangée.</p>
    <h2>Initialiser un projet</h2>
    <pre><code>mkdir my-project
    cd my-project
    git init
    # Initialized empty Git repository in /home/ada/my-project/.git/</code></pre>
    <p>Depuis Git 2.28, vous pouvez définir le nom de la branche initiale en ligne de commande :</p>
    <pre><code>git init --initial-branch=main
    # ou en raccourci
    git init -b main</code></pre>
    <h2>Ce qui vient de se passer</h2>
    <p>Inspectez le nouveau répertoire :</p>
    <pre><code>ls -a
    ls .git</code></pre>
    <p>Vous verrez <code>HEAD</code>, <code>config</code>, <code>description</code>, <code>hooks/</code>, <code>info/</code>, <code>objects/</code> et <code>refs/</code>. Rien n'est encore commité ; <code>HEAD</code> pointe vers une branche non née.</p>
    <h2>Votre premier commit</h2>
    <ol>
      <li>Créez un fichier : <code>echo "# My Project" &gt; README.md</code></li>
      <li>Stagez-le : <code>git add README.md</code></li>
      <li>Commitez : <code>git commit -m "Initial commit"</code></li>
    </ol>
    <pre><code>echo "# My Project" > README.md
    git add README.md
    git commit -m "Initial commit"
    git log --oneline</code></pre>
    <h2>Dépôts nus (bare)</h2>
    <p>Les serveurs hébergent généralement des dépôts <em>nus</em> sans arborescence de travail. Utilisez <code>--bare</code> :</p>
    <pre><code>git init --bare project.git</code></pre>
    <p>Les dépôts nus sont la cible des push ; vous n'éditez pas de fichiers à l'intérieur directement.</p>
    <h2>Réinitialisation</h2>
    <p>Réexécuter <code>git init</code> dans un dépôt existant est sans danger ; il réapplique les modèles et affiche « Reinitialized existing Git repository ». Il ne supprime pas les commits.</p>
    <h2>Modèles</h2>
    <p>Par défaut, <code>git init</code> alimente <code>.git/hooks/</code> depuis <code>/usr/share/git-core/templates/</code>. Vous pouvez surcharger le répertoire de modèles pour injecter vos propres hooks, un <code>.gitignore</code> par défaut ou une description dans chaque nouveau dépôt :</p>
    <pre><code>git init --template=~/.git-templates
    git config --global init.templateDir ~/.git-templates</code></pre>
    <p>C'est ainsi que les organisations propagent des hooks pre-commit standard dans chaque nouveau clone sans que chaque développeur copie des fichiers manuellement.</p>
    <h2>Nom de la branche initiale</h2>
    <p>De nombreux projets sont passés de <code>master</code> à <code>main</code> comme nom de branche par défaut. Le choix est local à votre dépôt, mais correspondre au défaut de votre fournisseur d'hébergement évite la confusion lors du premier push. Définissez-le une fois globalement et oubliez-le : <code>git config --global init.defaultBranch main</code>.</p>
    <h2>Où Git arrête de chercher</h2>
    <p>Git localise le dépôt en remontant l'arborescence des répertoires jusqu'à trouver un répertoire ou fichier <code>.git</code>. La remontée s'arrête aux frontières du système de fichiers par défaut (<code>core.discoveryAcrossFilesystem</code> change cela). La variable d'environnement <code>GIT_DIR</code> surcharge entièrement la découverte ; <code>GIT_WORK_TREE</code> définit une arborescence de travail non par défaut. Ensemble, elles vous permettent d'opérer sur un dépôt dont le <code>.git</code> est dans un emplacement inhabituel :</p>
    <pre><code>GIT_DIR=/srv/repos/widget.git GIT_WORK_TREE=/var/www git status</code></pre>
    <h2>Erreurs fréquentes</h2>
    <p>Exécuter <code>git init</code> dans votre répertoire personnel par accident, ce qui place toute votre collection de dotfiles sous une racine de dépôt massive. Vérifiez toujours <code>pwd</code> d'abord. Autre erreur : supprimer <code>.git</code> pour « repartir de zéro » tout en conservant le travail non commité. C'est correct, mais sachez que tout l'historique est perdu pour toujours. Enfin, ne commitez pas de gros binaires dans un dépôt fraîchement initialisé sans avoir d'abord écrit un <code>.gitignore</code> ; vous le regretterez quand le dépôt enflera. Exécutez <code>git status</code> juste après <code>git init</code> pour voir ce que Git compte suivre avant de stager quoi que ce soit.</p>

- source_title: "Basic workflow: edit, stage, commit"
  title: "Workflow de base : éditer, stager, commiter"
  langcode: fr
  body: |
    <h2>Introduction</h2>
    <p>Presque chaque session Git suit le même rythme en trois étapes : <strong>éditer</strong> les fichiers dans votre arborescence de travail, <strong>stager</strong> les changements que vous voulez enregistrer et les <strong>commiter</strong> dans l'historique. Maîtriser cette boucle est la base de tout le reste.</p>
    <h2>Les trois zones</h2>
    <ul>
      <li><strong>Arborescence de travail</strong> : les fichiers sur disque que vous éditez avec votre éditeur.</li>
      <li><strong>Index</strong> (aussi appelé staging area) : un instantané de ce qui ira dans le prochain commit.</li>
      <li><strong>Dépôt</strong> : l'historique commité stocké dans <code>.git</code>.</li>
    </ul>
    <h2>Un cycle complet</h2>
    <ol>
      <li>Éditez un fichier dans votre éditeur.</li>
      <li>Exécutez <code>git status</code> pour voir ce qui a changé.</li>
      <li>Exécutez <code>git diff</code> pour inspecter les changements.</li>
      <li>Stagez avec <code>git add</code>.</li>
      <li>Commitez avec <code>git commit</code>.</li>
    </ol>
    <pre><code>echo "hello" >> notes.txt
    git status
    git diff
    git add notes.txt
    git diff --staged
    git commit -m "Add greeting to notes"</code></pre>
    <h2>Stager sélectivement</h2>
    <p>Vous pouvez stager des fichiers individuels, des motifs glob ou même des <em>parties</em> d'un fichier en mode interactif :</p>
    <pre><code>git add notes.txt readme.md
    git add "src/*.py"
    git add -p notes.txt    # mode patch : oui/non par hunk</code></pre>
    <p>Le mode patch est précieux quand vous avez des changements mélangés que vous voulez séparer en plusieurs commits.</p>
    <h2>Sauter l'index</h2>
    <p>Le raccourci <code>git commit -a</code> stage et commite tous les fichiers <em>suivis</em> en une étape. Il n'ajoute pas les nouveaux fichiers (non suivis) :</p>
    <pre><code>git commit -am "Quick fix"</code></pre>
    <h2>Écrire de bons commits</h2>
    <p>Un message de commit a une ligne de sujet courte (50 caractères environ) et un corps optionnel expliquant le pourquoi. Exécutez <code>git commit</code> sans <code>-m</code> pour ouvrir votre éditeur :</p>
    <pre><code>git commit
    # l'éditeur s'ouvre
    # Ligne de sujet
    #
    # Explication plus longue...</code></pre>
    <h2>Commits atomiques</h2>
    <p>Un bon commit capture un seul changement logique. Construisez-le délibérément : stagez exactement les hunks qui vont ensemble avec <code>git add -p</code>, puis commitez. Si vous décrivez un commit avec « et » dans le sujet (« Fix login and refactor logger »), il devrait probablement s'agir de deux commits.</p>
    <pre><code>git add -p src/auth.py        # stager seulement la correction de login
    git commit -m "Fix login redirect on expired session"
    git add -p src/logger.py
    git commit -m "Refactor logger to use structured fields"</code></pre>
    <p>Les commits atomiques rendent <code>git bisect</code>, <code>git revert</code> et la revue de code beaucoup plus faciles par la suite.</p>
    <h2>Erreurs fréquentes</h2>
    <p>Oublier de faire <code>git add</code> sur les nouveaux fichiers et être surpris par un commit « vide ». <code>git status</code> dit toujours la vérité ; lisez-le avant de commiter. Autre piège : utiliser <code>git commit -am</code> quand vous avez de nouveaux fichiers non suivis, ce qui les laisse silencieusement de côté. Enfin, commiter des fichiers générés (sortie de build, <code>node_modules</code>, paramètres d'IDE) encombre l'historique et ralentit les clones ; ajoutez-les à <code>.gitignore</code> avant de stager. Dans le doute, exécutez <code>git diff --staged</code> pour voir exactement ce que votre prochain commit contiendra.</p>

- source_title: "Understanding the staging area (index)"
  title: "Comprendre la zone de staging (index)"
  langcode: fr
  body: |
    <h2>Introduction</h2>
    <p>L'<em>index</em>, aussi appelé staging area ou cache, est l'une des caractéristiques distinctives de Git. C'est un fichier binaire situé à <code>.git/index</code> qui contient l'<strong>arbre que vous comptez commiter ensuite</strong>. Comprendre l'index dissipe l'essentiel du mystère de la sortie de <code>git status</code>.</p>
    <h2>Pourquoi il existe</h2>
    <p>L'index vous permet de composer un commit délibérément plutôt que de tout balancer en bloc. Vous pouvez éditer dix fichiers mais ne commiter que les trois qui corrigent un bug, en laissant les autres stagés pour un commit ultérieur. Ce découplage permet un historique propre et atomique.</p>
    <h2>Inspecter l'index</h2>
    <p>Deux commandes comparent les trois zones :</p>
    <pre><code>git diff             # arborescence de travail vs index
    git diff --staged    # index vs HEAD
    git diff HEAD        # arborescence de travail vs HEAD</code></pre>
    <p>La commande de plomberie <code>git ls-files --stage</code> montre le contenu brut de l'index, y compris les hachages SHA-1 :</p>
    <pre><code>git ls-files --stage</code></pre>
    <h2>Stager des changements</h2>
    <pre><code>git add file.txt          # ajouter ou mettre à jour
    git add .                 # tout ajouter depuis le répertoire courant
    git add -u                # mettre à jour seulement les fichiers suivis
    git add -p                # interactif hunk par hunk
    git add -N new.txt        # intent-to-add (suivre vide)</code></pre>
    <h2>Désindexer (unstage)</h2>
    <p>Si vous avez stagé quelque chose par erreur, retirez-le sans perdre l'édition :</p>
    <pre><code># Moderne (Git 2.23+)
    git restore --staged file.txt

    # Syntaxe ancienne, fonctionne toujours
    git reset HEAD file.txt</code></pre>
    <h2>L'index lors des conflits</h2>
    <p>Pendant un conflit de merge, l'index gagne <em>trois</em> entrées par chemin en conflit : le stage 1 est l'ancêtre commun, le stage 2 est « ours », le stage 3 est « theirs ». <code>git ls-files -u</code> les affiche :</p>
    <pre><code>git ls-files -u</code></pre>
    <p>Résoudre le conflit signifie écrire une version finale et la <code>git add</code>, ce qui fait revenir à une seule entrée stage 0.</p>
    <h2>Le format du fichier index</h2>
    <p>L'index est un format binaire documenté dans les sources de Git sous <code>Documentation/gitformat-index.txt</code>. Il commence par un en-tête de 12 octets (signature <code>DIRC</code>, version, nombre d'entrées) suivi d'entrées triées. Plusieurs extensions optionnelles ajoutent du caching : <code>TREE</code> met en cache les hachages de sous-arbres pour un <code>write-tree</code> rapide, et <code>UNTR</code> met en cache la liste des fichiers non suivis pour un <code>git status</code> rapide. Git moderne supporte aussi un index sparse qui élide les entrées en dehors du cône que vous avez extrait :</p>
    <pre><code>git sparse-checkout init --cone
    git config core.sparseCheckoutCone true
    git update-index --test-untracked-cache</code></pre>
    <h2>Erreurs fréquentes</h2>
    <p>Croire que <code>git add</code> est définitif. Ce n'est pas le cas : vous pouvez stager, éditer encore, et restager. L'index n'est que le brouillon du prochain commit. Autre confusion classique : éditer un fichier stagé, puis commiter, et être perplexe que les nouvelles éditions ne soient pas incluses. <code>git add</code> capture un instantané au moment où vous l'exécutez ; les éditions ultérieures vivent uniquement dans l'arborescence de travail. Exécutez <code>git diff</code> (sans flag) pour voir ce qui est stagé-puis-modifié. Enfin, ne supprimez jamais <code>.git/index</code> manuellement ; reconstruisez-le avec <code>git read-tree HEAD</code> s'il est jamais corrompu.</p>

- source_title: "Viewing history with git log"
  title: "Consulter l'historique avec git log"
  langcode: fr
  body: |
    <h2>Introduction</h2>
    <p><code>git log</code> parcourt le graphe de commits depuis un point de départ (par défaut : <code>HEAD</code>) en remontant les parents, et affiche chaque commit. C'est l'outil principal pour explorer l'historique du projet.</p>
    <h2>Utilisation de base</h2>
    <pre><code>git log
    git log --oneline
    git log --oneline --graph --decorate --all</code></pre>
    <p>La dernière forme est la vue couteau-suisse : un graphe compact de chaque branche avec les refs décorées.</p>
    <h2>Filtrer par date, auteur, message</h2>
    <pre><code>git log --since="2 weeks ago"
    git log --until=2025-01-01
    git log --author="Ada"
    git log --grep="bugfix"
    git log -S "deprecated_function"   # pickaxe : quand une chaîne est-elle apparue ?</code></pre>
    <p><code>-S</code> est précieux pour l'archéologie : il trouve les commits qui changent le nombre d'occurrences d'une chaîne dans un fichier.</p>
    <h2>Afficher les diffs</h2>
    <pre><code>git log -p                 # patch complet par commit
    git log --stat             # fichiers modifiés plus compteurs +/-
    git log --shortstat        # ligne de résumé seulement
    git log -p -- path/to/file # uniquement les commits touchant un chemin</code></pre>
    <h2>Formats personnalisés</h2>
    <p><code>--pretty=format:</code> accepte des espaces réservés. Un one-liner utile :</p>
    <pre><code>git log --pretty=format:"%h %an %ad %s" --date=short</code></pre>
    <p><code>%h</code> hachage abrégé, <code>%an</code> nom de l'auteur, <code>%ad</code> date de l'auteur, <code>%s</code> sujet. Voir <code>git help log</code> pour la liste complète.</p>
    <h2>Limites et plages</h2>
    <pre><code>git log -n 5                       # 5 derniers commits
    git log main..feature              # commits sur feature, pas sur main
    git log main...feature             # différence symétrique
    git log feature ^main              # équivalent à main..feature</code></pre>
    <h2>Suivre les renommages de fichiers</h2>
    <p>Git n'enregistre pas les renommages, il les détecte. Pour suivre l'historique à travers un renommage :</p>
    <pre><code>git log --follow -- path/to/file</code></pre>
    <h2>Alias utiles</h2>
    <p>Quelques alias <code>git log</code> sont rentabilisés dès la première semaine. Deux particulièrement bons :</p>
    <pre><code>git config --global alias.lg "log --oneline --graph --decorate --all"
    git config --global alias.last "log -1 HEAD --stat"
    git config --global alias.recent "log --since='2 weeks ago' --author=$(git config user.email)"</code></pre>
    <p><code>git lg</code> donne la vue d'ensemble du graphe ; <code>git last</code> montre ce qui vient de se passer ; <code>git recent</code> répond à « sur quoi ai-je travaillé récemment ? ». Ajoutez un alias pour toute invocation de log que vous tapez plus de deux fois.</p>
    <h2>Inverser et limiter</h2>
    <p>Par défaut, <code>git log</code> parcourt du plus récent au plus ancien. Parfois (notes de version, archéologie de code), vous voulez l'inverse, associé à un format propre :</p>
    <pre><code>git log --reverse --oneline v1.0.0..v1.1.0
    git log --reverse --pretty=format:"* %s (%h)" v1.0.0..HEAD &gt; CHANGELOG.draft</code></pre>
    <p>C'est aussi là que pickaxe et les filtres de chemin gagnent leur place : <code>git log --reverse -S "old_api" -- src/</code> montre l'historique chronologique de l'apparition et de la disparition d'une chaîne, parfait pour tracer les dépréciations.</p>
    <h2>Erreurs fréquentes</h2>
    <p>Ne lire que l'historique de <code>HEAD</code> et manquer les commits sur d'autres branches ; passez <code>--all</code> pour les voir. Confondre <code>--author</code> (une regex sur le champ auteur) avec une correspondance littérale exacte ; échappez le motif soigneusement. Utiliser <code>git log file</code> au lieu de <code>git log -- file</code> : le séparateur <code>--</code> désambiguïse les chemins des refs, surtout si une branche et un fichier partagent un nom. Enfin, attendre de <code>git log</code> qu'il affiche les commits supprimés après un reset forcé ; utilisez <code>git reflog</code> pour cela. <code>git log</code> ne parcourt que l'historique atteignable.</p>

- source_title: "Ignoring files with .gitignore"
  title: "Ignorer des fichiers avec .gitignore"
  langcode: fr
  body: |
    <h2>Introduction</h2>
    <p>Un fichier <code>.gitignore</code> liste les motifs que Git doit traiter comme non suivis et ne jamais proposer d'ajouter. Il garde les artefacts de build, les secrets, les métadonnées de l'OS et les fichiers temporaires d'éditeur hors de votre dépôt.</p>
    <h2>Syntaxe des motifs</h2>
    <ul>
      <li><code>name</code> : correspond aux fichiers ou répertoires nommés <code>name</code> à toute profondeur.</li>
      <li><code>/name</code> : correspond seulement à la racine du dépôt.</li>
      <li><code>name/</code> : correspond aux répertoires uniquement.</li>
      <li><code>*.log</code> : glob ; correspond à tout fichier <code>.log</code>.</li>
      <li><code>**/build</code> : correspond à <code>build</code> à toute profondeur.</li>
      <li><code>!important.log</code> : ré-inclure un chemin précédemment ignoré.</li>
      <li><code>#</code> en début de ligne est un commentaire.</li>
    </ul>
    <h2>Un exemple réaliste</h2>
    <pre><code># .gitignore
    # Sortie de build
    /dist/
    /build/
    *.o
    *.pyc

    # Dépendances
    /node_modules/
    /vendor/

    # Éditeurs
    .idea/
    .vscode/
    *.swp

    # OS
    .DS_Store
    Thumbs.db

    # Secrets
    .env
    *.pem</code></pre>
    <h2>Plusieurs fichiers .gitignore</h2>
    <p>Vous pouvez placer un <code>.gitignore</code> à n'importe quel niveau. Les motifs sont relatifs au répertoire du fichier, et les fichiers plus profonds remplacent les moins profonds. Il existe également un fichier d'exclusion global pour vos préférences personnelles :</p>
    <pre><code>git config --global core.excludesFile ~/.gitignore_global</code></pre>
    <p>Utilisez-le pour les fichiers temporaires d'éditeur et les déchets d'OS, pas pour les chemins spécifiques au projet.</p>
    <h2>Suivre des fichiers déjà suivis</h2>
    <p>Ajouter un chemin à <code>.gitignore</code> ne le supprime <strong>pas</strong> du dépôt. Arrêter de suivre un fichier tout en le gardant sur disque :</p>
    <pre><code>git rm --cached secrets.env
    git commit -m "Stop tracking secrets.env"</code></pre>
    <h2>Déboguer les ignores</h2>
    <p>Pourquoi Git ignore-t-il (ou n'ignore-t-il pas) un chemin ? Demandez :</p>
    <pre><code>git check-ignore -v path/to/file</code></pre>
    <p>La sortie nomme le fichier et la ligne qui correspondent.</p>
    <h2>Ordre d'évaluation</h2>
    <p>Git évalue les règles d'exclusion à partir de plusieurs sources, dans cet ordre : arguments de ligne de commande, puis les fichiers <code>.gitignore</code> par répertoire (le plus profond d'abord), puis <code>$GIT_DIR/info/exclude</code>, et enfin le <code>core.excludesFile</code> global. Les règles ultérieures (plus spécifiques) remplacent les antérieures, et une négation (<code>!pattern</code>) ne ré-inclut un chemin que si son répertoire parent n'est pas lui-même exclu. Cette dernière règle piège beaucoup d'utilisateurs :</p>
    <pre><code># Mauvais : impossible de désigner un fichier dans un répertoire ignoré
    /build/
    !/build/keep.log

    # Correct : ignorer le contenu mais garder le répertoire
    /build/*
    !/build/keep.log</code></pre>
    <h2>Exclusions par dépôt et globales</h2>
    <p>Deux mécanismes d'exclusion supplémentaires complètent <code>.gitignore</code>. Le fichier non suivi par dépôt <code>.git/info/exclude</code> ne s'applique qu'à votre clone (bon pour les fichiers d'IDE que vous ne voulez pas commiter dans le <code>.gitignore</code> de toute l'équipe). Le <code>core.excludesFile</code> global s'applique à tous vos dépôts :</p>
    <pre><code>echo ".idea/" &gt;&gt; .git/info/exclude
    git config --global core.excludesFile ~/.gitignore_global
    echo ".DS_Store" &gt;&gt; ~/.gitignore_global</code></pre>
    <p>Utilisez-les pour les préférences personnelles ; réservez le <code>.gitignore</code> commité aux règles d'équipe.</p>
    <h2>Erreurs fréquentes</h2>
    <p>Ajouter <code>secrets.env</code> à <code>.gitignore</code> après qu'il a déjà été commité et supposer que le secret a disparu. Il est toujours dans l'historique ; faites tourner le secret et envisagez d'utiliser <code>git filter-repo</code> pour le purger. Autre piège : ignorer un répertoire avec <code>build</code> alors que vous vouliez <code>/build</code>, supprimant accidentellement un fichier nommé <code>build</code> en profondeur dans l'arborescence. Enfin, commiter <code>.gitignore</code> lui-même est essentiel ; sans lui, chaque collaborateur doit inventer ses propres règles d'exclusion. <code>.gitignore</code> appartient <em>au</em> dépôt, pas à l'extérieur.</p>

- source_title: "Getting help (man pages, --help, online)"
  title: "Obtenir de l'aide (pages man, --help, en ligne)"
  langcode: fr
  body: |
    <h2>Introduction</h2>
    <p>Git est livré avec une documentation intégrée extensive. Savoir l'invoquer rapidement vous épargnera des heures de tâtonnement. Cette page parcourt le système d'aide depuis les one-liners jusqu'aux manuels complets.</p>
    <h2>Trois façons de demander</h2>
    <p>Chaque commande supporte trois formes d'aide :</p>
    <pre><code>git help &lt;command&gt;     # page man complète dans votre pager
    git &lt;command&gt; --help    # même chose
    git &lt;command&gt; -h        # résumé court d'utilisation</code></pre>
    <p>Exemple :</p>
    <pre><code>git help commit
    git commit --help
    git commit -h</code></pre>
    <h2>Lister les commandes</h2>
    <pre><code>git help -a            # toutes les commandes
    git help -g            # guides (gittutorial, gitcore-tutorial, etc.)
    git help everyday      # le pense-bête Git du quotidien</code></pre>
    <p><code>git help everyday</code> en particulier est l'une des meilleures références débutant-à-intermédiaire livrées avec Git.</p>
    <h2>Guides conceptuels</h2>
    <p>Git inclut des guides en prose comme pages man séparées :</p>
    <pre><code>git help gittutorial
    git help gitcore-tutorial
    git help gitglossary
    git help gitworkflows
    git help gitrevisions</code></pre>
    <p><code>gitrevisions</code> est la référence canonique pour la syntaxe des refs (<code>HEAD~3</code>, <code>main@{yesterday}</code>, etc.).</p>
    <h2>Configurer le format de l'aide</h2>
    <p>Par défaut, <code>git help</code> ouvre une page man. Vous pouvez basculer vers HTML ou info :</p>
    <pre><code>git config --global help.format html
    git config --global help.format info
    git config --global help.format man   # par défaut</code></pre>
    <p>HTML ouvre la copie locale dans votre navigateur, utile sur les systèmes sans <code>man</code>.</p>
    <h2>Ressources en ligne</h2>
    <ul>
      <li><strong>git-scm.com/docs</strong> : manuel officiel miroité en ligne.</li>
      <li><strong>Livre Pro Git</strong> de Chacon et Straub : gratuit, complet, régulièrement mis à jour.</li>
      <li><strong>Archive de la liste de diffusion Git</strong> : <code>lore.kernel.org/git</code> pour les discussions de conception.</li>
    </ul>
    <h2>Rechercher dans la documentation</h2>
    <p>Si vous ne vous souvenez pas du nom d'une commande, <code>man -k git</code> (ou <code>apropos git</code>) liste chaque page man Git avec une description en une ligne. Pour chercher dans la documentation, redirigez vers <code>grep</code> :</p>
    <pre><code>man -k git
    git help -a | grep -i merge
    git help log | grep -A 2 'pickaxe'</code></pre>
    <p>Pour un apprentissage approfondi, le livre Pro Git est gratuit et fait autorité ; le Manuel de Référence Git sur <code>git-scm.com/docs</code> reflète les pages man avec des liens croisés. La page man <code>gitfaq</code> est une pépite sous-utilisée qui répond à de nombreuses questions du monde réel en prose claire.</p>
    <h2>Erreurs fréquentes</h2>
    <p>Chercher sur le web des réponses Stack Overflow obsolètes utilisant des commandes dépréciées comme <code>git checkout</code> pour le changement de branche alors que <code>git switch</code> existe. Vérifiez toujours avec <code>git help</code> pour votre version installée. Autre erreur : supposer que <code>-h</code> et <code>--help</code> se comportent identiquement ; ce n'est pas le cas. <code>-h</code> affiche un résumé d'un écran, tandis que <code>--help</code> ouvre la page man complète (ou le navigateur, selon <code>help.format</code>). Enfin, ne sautez pas <code>git help glossary</code> ; de nombreux termes Git « bizarres » (porcelain, plumbing, refspec, dangling object) y sont définis précisément en une seule courte page.</p>

- source_title: "Common beginner mistakes"
  title: "Erreurs fréquentes des débutants"
  langcode: fr
  body: |
    <h2>Introduction</h2>
    <p>La plupart des gens apprennent Git à la dure, à travers de petits désastres. Cette page rassemble les erreurs de débutant les plus fréquentes et comment les éviter (ou s'en remettre). Lisez-la une fois maintenant et de nouveau après un mois d'utilisation ; la deuxième lecture aura plus de sens.</p>
    <h2>Commiter avec la mauvaise identité</h2>
    <p>Oublier de définir <code>user.email</code> par dépôt expose des adresses personnelles dans les commits professionnels. Définissez toujours une identité par dépôt dans les clones de travail :</p>
    <pre><code>git config user.email "ada@work.com"
    git log -1 --pretty=format:"%an &lt;%ae&gt;"</code></pre>
    <h2>Commiter des secrets</h2>
    <p>Les clés d'API et les fichiers <code>.env</code> dans les commits vivent pour toujours, même après une « suppression » ultérieure. Ajoutez une entrée <code>.gitignore</code> <em>avant</em> le premier commit, et faites tourner immédiatement tout identifiant divulgué. Des outils comme <code>git-secrets</code> et <code>gitleaks</code> peuvent s'exécuter comme hooks pre-commit.</p>
    <h2>Force-pusher sur les coéquipiers</h2>
    <p><code>git push --force</code> réécrit l'historique sur le remote, supprimant les commits des autres. Préférez <code>--force-with-lease</code>, qui refuse d'écraser si le remote a bougé :</p>
    <pre><code>git push --force-with-lease</code></pre>
    <h2>Mal comprendre pull</h2>
    <p><code>git pull</code> est fetch + merge (ou rebase). L'exécuter avec des changements non commités peut produire des merge commits surprenants. Soit vous commitez, stashez, soit vous définissez un défaut sensé :</p>
    <pre><code>git config --global pull.rebase true
    git config --global pull.ff only</code></pre>
    <h2>Éditer en HEAD détaché sans s'en rendre compte</h2>
    <p>Faire un checkout d'un tag ou d'un hachage de commit vous laisse en HEAD détaché. Les nouveaux commits y sont inatteignables une fois que vous changez de branche. Créez toujours une branche d'abord :</p>
    <pre><code>git switch -c hotfix v1.2.3</code></pre>
    <h2>Confondre reset, revert et restore</h2>
    <ul>
      <li><code>git restore</code> change l'arborescence de travail ou l'index ; sûr.</li>
      <li><code>git revert</code> crée un nouveau commit qui en annule un autre ; sûr et partageable.</li>
      <li><code>git reset --hard</code> déplace la branche et abandonne le travail ; <em>destructif</em>.</li>
    </ul>
    <h2>Commiter des fichiers énormes</h2>
    <p>Une vidéo de 500 Mo dans un commit est permanente. Utilisez Git LFS pour les binaires au-delà de quelques mégaoctets, et gardez les artefacts de build entièrement hors du dépôt.</p>
    <h2>Trousse de récupération</h2>
    <pre><code>git reflog
    git fsck --lost-found
    git stash list</code></pre>
    <p>Le reflog enregistre chaque mouvement de <code>HEAD</code> pendant 90 jours par défaut ; presque tout commit « perdu » peut en être récupéré.</p>
    <h2>Mal lire le status</h2>
    <p>La sortie de <code>git status</code> a des couches subtiles. « Changes not staged for commit » signifie des fichiers suivis modifiés dans l'arborescence de travail. « Changes to be committed » signifie stagés. « Untracked files » signifie que Git ne les a jamais vus. Confusion fréquente : éditer un fichier <em>après</em> l'avoir stagé l'affiche dans les deux listes avec un contenu différent ; seul ce qui est stagé va dans le commit. Exécutez <code>git diff</code> (working vs index) et <code>git diff --staged</code> (index vs HEAD) jusqu'à ce que les trois zones deviennent évidentes.</p>
    <pre><code>git status -sb
    git diff --staged --stat</code></pre>
    <h2>Erreurs fréquentes</h2>
    <p>Paniquer et exécuter <code>rm -rf .git</code> quand quelque chose semble anormal. Stop. Faites d'abord une sauvegarde du répertoire. Presque toute erreur Git est récupérable via le reflog ou le stash. L'habitude la plus importante pour les débutants : exécuter <code>git status</code> avant et après chaque commande qui change l'état, et exécuter <code>git log --oneline --all --graph</code> quand quelque chose semble bizarre.</p>

- source_title: "Cloning an existing repository (git clone)"
  title: "Cloner un dépôt existant (git clone)"
  langcode: fr
  body: |
    <h2>Introduction</h2>
    <p><code>git clone</code> copie un dépôt distant sur votre machine. Il crée un nouveau répertoire, initialise <code>.git</code> à l'intérieur, récupère tous les objets et refs, configure un remote nommé <code>origin</code>, et fait le checkout de la branche par défaut. Après le clone, vous avez un dépôt complet et indépendant.</p>
    <h2>Clone basique</h2>
    <pre><code>git clone https://github.com/torvalds/linux.git
    cd linux
    git remote -v
    # origin  https://github.com/torvalds/linux.git (fetch)
    # origin  https://github.com/torvalds/linux.git (push)</code></pre>
    <h2>Choisir un nom de répertoire</h2>
    <p>Par défaut, Git utilise le dernier composant du chemin. Surchargez-le :</p>
    <pre><code>git clone https://github.com/example/widget.git my-widget</code></pre>
    <h2>Choisir un protocole</h2>
    <ul>
      <li><strong>HTTPS</strong> : le plus simple, fonctionne à travers les pare-feu, nécessite souvent un assistant d'identifiants ou un token.</li>
      <li><strong>SSH</strong> : pratique avec l'authentification par clé, rapide pour les utilisateurs avancés.</li>
      <li><strong>git://</strong> : anonyme, non authentifié, surtout historique.</li>
      <li><strong>file://</strong> ou chemin local : cloner depuis un autre répertoire.</li>
    </ul>
    <pre><code>git clone git@github.com:example/widget.git
    git clone /srv/git/widget.git
    git clone file:///srv/git/widget.git</code></pre>
    <h2>Options utiles</h2>
    <pre><code>git clone --depth 1 &lt;url&gt;            # shallow : seulement la pointe
    git clone --branch v1.2.3 &lt;url&gt;     # checkout d'une branche ou d'un tag spécifique
    git clone --single-branch &lt;url&gt;     # récupérer une seule branche
    git clone --bare &lt;url&gt;              # clone nu, sans arborescence de travail
    git clone --recurse-submodules &lt;url&gt;</code></pre>
    <p>Les clones shallow économisent de la bande passante pour la CI ; convertissez ensuite avec <code>git fetch --unshallow</code>.</p>
    <h2>Ce que clone fait, étape par étape</h2>
    <ol>
      <li>Crée le répertoire cible.</li>
      <li>Exécute <code>git init</code> à l'intérieur.</li>
      <li>Ajoute <code>origin</code> comme remote.</li>
      <li>Exécute <code>git fetch origin</code>.</li>
      <li>Configure le tracking pour la branche par défaut.</li>
      <li>Exécute <code>git checkout</code> pour cette branche.</li>
    </ol>
    <h2>Clones sparse et partiels pour les énormes dépôts</h2>
    <p>Les dépôts qui s'étendent sur des gigaoctets (systèmes d'exploitation, monorepos) sont pénibles à cloner intégralement. Deux fonctionnalités complémentaires aident :</p>
    <pre><code>git clone --filter=blob:none --no-checkout &lt;url&gt; repo
    cd repo
    git sparse-checkout init --cone
    git sparse-checkout set src/myteam
    git checkout main</code></pre>
    <p><code>--filter=blob:none</code> reporte le téléchargement des blobs jusqu'à ce qu'ils soient nécessaires, tandis que <code>sparse-checkout</code> ne peuple que les répertoires que vous listez. Ensemble, ils vous permettent de travailler sur une petite tranche d'un dépôt massif avec un coût en disque et bande passante proportionnel.</p>
    <h2>Hooks au moment du clone</h2>
    <p>Certains projets fournissent des étapes de configuration qui devraient s'exécuter au clone (installation des hooks pre-commit, récupération des objets LFS, initialisation des sous-modules). Git n'exécute pas de hooks au clone, mais vous pouvez les enchaîner :</p>
    <pre><code>git clone --recurse-submodules &lt;url&gt; repo
    cd repo
    git lfs install
    pre-commit install</code></pre>
    <p>Pour les nouveaux contributeurs, documentez cette séquence dans <code>CONTRIBUTING.md</code> ou enveloppez-la dans un script <code>scripts/bootstrap</code>. Les projets bien conçus rendent leur cible <code>make setup</code> idempotente afin que la réexécuter après un clone obsolète soit sûr.</p>
    <h2>Erreurs fréquentes</h2>
    <p>Cloner dans un répertoire non vide : Git refuse à moins que vous ne passiez explicitement une cible vide. Cloner d'énormes dépôts sans <code>--depth</code> sur des connexions lentes, puis abandonner à mi-chemin. Cloner via HTTPS vers un serveur qui exige le SSO, puis être incapable de pusher parce que votre token n'a pas la bonne portée. Testez toujours avec <code>git push --dry-run</code> après le premier commit. Enfin, cloner dans <code>~/Desktop</code> ou un autre dossier de synchronisation (Dropbox, iCloud, OneDrive) provoque une corruption quand le client de synchronisation interrompt l'écriture de <code>.git/index</code>. Gardez les clones de travail sur du stockage local simple.</p>

- source_title: "Working with remote repositories (git remote)"
  title: "Travailler avec des dépôts distants (git remote)"
  langcode: fr
  body: |
    <h2>Introduction</h2>
    <p>Un <em>remote</em> est une URL nommée pointant vers un autre dépôt Git. <code>git clone</code> en crée un appelé <code>origin</code> automatiquement, mais vous pouvez en ajouter autant que vous le souhaitez. Les remotes sont le pont entre votre dépôt local et le monde extérieur.</p>
    <h2>Lister et inspecter</h2>
    <pre><code>git remote
    git remote -v
    git remote show origin</code></pre>
    <p><code>git remote show</code> contacte le serveur et signale les branches suivies, les règles de push et les refs obsolètes.</p>
    <h2>Ajouter et supprimer</h2>
    <pre><code>git remote add upstream https://github.com/original/widget.git
    git remote rename upstream origin-upstream
    git remote remove origin-upstream</code></pre>
    <p>Le motif <em>fork-and-upstream</em> est courant : <code>origin</code> est votre fork, <code>upstream</code> est le projet dont vous avez fait le fork.</p>
    <h2>Changer une URL</h2>
    <p>Si un projet passe de HTTPS à SSH ou vers un nouvel hôte :</p>
    <pre><code>git remote set-url origin git@github.com:example/widget.git
    git remote -v</code></pre>
    <h2>URLs multiples</h2>
    <p>Vous pouvez pusher vers plusieurs miroirs à la fois en ajoutant des URLs de push supplémentaires :</p>
    <pre><code>git remote set-url --add --push origin git@gitlab.com:example/widget.git
    git remote -v</code></pre>
    <h2>Élaguer les branches obsolètes</h2>
    <p>Quand des branches sont supprimées sur le serveur, vos refs locales <code>refs/remotes/origin/*</code> peuvent être en retard. Nettoyez-les :</p>
    <pre><code>git fetch --prune
    git remote prune origin</code></pre>
    <p>Ou définissez-le de façon permanente :</p>
    <pre><code>git config --global fetch.prune true</code></pre>
    <h2>Inspecter le tracking</h2>
    <pre><code>git branch -vv
    # main           a1b2c3d [origin/main] Latest fix
    # feature/login  e4f5g6h [origin/feature/login: ahead 2] WIP</code></pre>
    <p><code>-vv</code> montre l'upstream de chaque branche et son avance/retard.</p>
    <h2>Réécriture insteadOf</h2>
    <p>Si les URLs d'un projet changent (HTTPS vers SSH, migration d'hôte, ou si vous voulez que toutes les URLs GitHub utilisent SSH automatiquement), <code>insteadOf</code> les réécrit de façon transparente :</p>
    <pre><code>git config --global url."git@github.com:".insteadOf "https://github.com/"
    git config --global url."https://github-mirror.example.com/".insteadOf "https://github.com/"</code></pre>
    <p>C'est particulièrement pratique en CI, où vous pouvez réécrire tous les clones vers un miroir local avec une ligne de configuration, sans modifications de script. La direction inverse (<code>pushInsteadOf</code>) vous permet de fetcher via HTTPS mais de pusher via SSH depuis le même remote.</p>
    <h2>Workflows triangulaires</h2>
    <p>En open source, vous <em>fetchez</em> typiquement depuis <code>upstream</code> (le projet canonique) et <em>pushez</em> vers <code>origin</code> (votre fork personnel). Configurez une fois et oubliez :</p>
    <pre><code>git remote add upstream https://github.com/project/repo.git
    git config branch.main.remote upstream
    git config branch.main.pushRemote origin
    git config --global push.default current</code></pre>
    <p>Maintenant <code>git pull</code> lit depuis upstream et <code>git push</code> écrit vers votre fork, automatiquement. Le paramètre <code>remote.pushDefault</code> applique la règle à chaque branche d'un clone.</p>
    <h2>Erreurs fréquentes</h2>
    <p>Confondre le <em>nom</em> d'un remote avec son URL. <code>origin</code> n'est qu'une étiquette ; vous pouvez le renommer. Autre piège : ajouter la même URL sous deux noms différents, puis être surpris par des refs en double. Utilisez <code>git remote -v</code> pour auditer. Oublier de faire <code>git fetch</code> après avoir changé de réseau ou modifié une URL laisse vos branches de tracking obsolètes. Enfin, sur les serveurs partagés, supprimer une ref de tracking distante localement (par ex. <code>git branch -dr origin/main</code>) ne supprime <em>pas</em> la branche sur le serveur ; utilisez <code>git push origin --delete main</code> pour cela, et seulement quand vous le souhaitez vraiment.</p>

- source_title: "Fetching and pulling changes"
  title: "Récupérer et tirer les changements (fetch et pull)"
  langcode: fr
  body: |
    <h2>Introduction</h2>
    <p><code>git fetch</code> télécharge de nouveaux objets et met à jour les refs de tracking distant <em>sans</em> modifier votre arborescence de travail. <code>git pull</code> fait un fetch puis intègre le résultat dans votre branche courante. Connaître la différence est l'un des plus grands pas du novice à l'utilisateur Git confiant.</p>
    <h2>Fetcher</h2>
    <pre><code>git fetch                  # remote par défaut (généralement origin)
    git fetch origin
    git fetch --all
    git fetch --prune          # supprimer les refs des branches supprimées sur le serveur
    git fetch origin main      # une seule branche</code></pre>
    <p>Après un fetch, inspectez ce qui a changé :</p>
    <pre><code>git log HEAD..origin/main --oneline
    git diff HEAD origin/main</code></pre>
    <h2>Puller</h2>
    <p><code>git pull</code> est un raccourci pour fetch suivi soit d'un merge soit d'un rebase. Choisissez la stratégie :</p>
    <pre><code>git pull                          # utilise la config pull.rebase
    git pull --rebase
    git pull --ff-only                # refuse si pas fast-forward
    git pull origin main</code></pre>
    <h2>Configurer le comportement par défaut</h2>
    <pre><code>git config --global pull.rebase false   # merge (défaut classique)
    git config --global pull.rebase true    # rebase
    git config --global pull.ff only        # fast-forward seulement
    git config --global fetch.prune true</code></pre>
    <p>Depuis Git 2.27, un <code>git pull</code> nu avertit si aucune stratégie n'est configurée.</p>
    <h2>Fetch ou pull, lequel utiliser</h2>
    <ul>
      <li>Utilisez <code>fetch</code> quand vous voulez regarder avant d'intégrer.</li>
      <li>Utilisez <code>pull --ff-only</code> quand vous voulez simplement vous mettre à jour sur une branche partagée.</li>
      <li>Utilisez <code>pull --rebase</code> quand vous travaillez sur une branche thématique non poussée.</li>
      <li>Évitez <code>pull</code> simple sur des branches partagées de longue durée ; les merge commits se multiplient.</li>
    </ul>
    <h2>Inspecter l'upstream</h2>
    <pre><code>git status
    # On branch main
    # Your branch is behind 'origin/main' by 3 commits, and can be fast-forwarded.</code></pre>
    <p>Ce message provient de la comparaison de <code>HEAD</code> au <code>origin/main</code> mis en cache ; exécutez <code>git fetch</code> d'abord pour le rendre exact.</p>
    <h2>Récupérer des pull requests</h2>
    <p>La plupart des hôtes Git exposent les branches de pull request ou merge request comme des refs spéciales que vous pouvez fetcher dans votre clone pour revue. Pour GitHub, ajoutez un refspec :</p>
    <pre><code>git config --add remote.origin.fetch '+refs/pull/*/head:refs/remotes/origin/pr/*'
    git fetch
    git switch -c review/123 origin/pr/123</code></pre>
    <p>Pour GitLab le chemin équivalent est <code>refs/merge-requests/*/head</code>. Avec cela configuré, chaque <code>git fetch</code> récupère toutes les PR ouvertes localement, prêtes pour inspection sans quitter votre terminal.</p>
    <h2>Erreurs fréquentes</h2>
    <p>Exécuter <code>git pull</code> avec des changements non commités et obtenir un merge commit inattendu par-dessus du travail sale. Stashez ou commitez d'abord. Oublier que le compteur « behind » de <code>git status</code> n'est aussi frais que le dernier fetch ; si personne n'a fetché depuis une semaine, ce compteur ment. Utiliser <code>git pull --rebase</code> sur une branche sur laquelle d'autres ont basé leur travail réécrit leur base ; rebasez seulement sur des branches privées. Enfin, n'utilisez jamais <code>git fetch &lt;refspec&gt;</code> avec un refspec personnalisé sans le comprendre ; un deux-points accidentel (<code>main:main</code>) écrase votre <code>main</code> local.</p>

- source_title: "Pushing your work"
  title: "Pousser votre travail (push)"
  langcode: fr
  body: |
    <h2>Introduction</h2>
    <p><code>git push</code> téléverse les commits locaux vers un remote et met à jour les branches et tags de ce remote. C'est ainsi que votre travail devient visible aux collaborateurs.</p>
    <h2>Push basique</h2>
    <pre><code>git push                          # branche courante vers son upstream
    git push origin main              # explicite
    git push -u origin feature/login  # définit l'upstream et push</code></pre>
    <p>Le flag <code>-u</code> (ou <code>--set-upstream</code>) lie la branche locale à la distante de sorte que les futurs <code>git push</code> et <code>git pull</code> n'aient besoin d'aucun argument.</p>
    <h2>Pousser des tags</h2>
    <p>Les tags ne sont pas poussés par défaut :</p>
    <pre><code>git push origin v1.2.3
    git push origin --tags          # tous les tags
    git push --follow-tags          # tags atteignables depuis les commits poussés</code></pre>
    <p><code>--follow-tags</code> est le défaut le plus sûr pour les workflows de release.</p>
    <h2>Supprimer des branches distantes</h2>
    <pre><code>git push origin --delete feature/login
    # équivalent
    git push origin :feature/login</code></pre>
    <h2>Force-pusher en sécurité</h2>
    <p>Réécrire l'historique (rebase, amend, squash) nécessite un push forcé. Préférez toujours <code>--force-with-lease</code>, qui refuse d'écraser les refs ayant bougé sur le serveur :</p>
    <pre><code>git push --force-with-lease
    git push --force-with-lease=feature/login:abcd1234</code></pre>
    <p>Ne faites jamais <code>--force</code> aveuglément vers une branche partagée comme <code>main</code>.</p>
    <h2>Configurer les défauts de push</h2>
    <pre><code>git config --global push.default simple    # défaut depuis 2.0
    git config --global push.autoSetupRemote true   # 2.37+ : -u automatique</code></pre>
    <p>Avec <code>push.autoSetupRemote</code> activé, un simple <code>git push</code> sur une nouvelle branche crée la branche distante et les lie automatiquement.</p>
    <h2>Ce qui se passe pendant un push</h2>
    <ol>
      <li>Git local négocie avec le remote pour trouver les commits communs.</li>
      <li>Il empaquette et téléverse seulement les objets manquants.</li>
      <li>Le remote exécute les hooks <code>pre-receive</code> et <code>update</code>.</li>
      <li>Si accepté, les refs sont mises à jour atomiquement.</li>
      <li>Le hook <code>post-receive</code> s'exécute (CI, mirroring, etc.).</li>
    </ol>
    <h2>Pushes atomiques et signés</h2>
    <p><code>--atomic</code> transforme les pushes multi-refs en une seule transaction ; soit chaque ref se met à jour, soit aucune, ce qui empêche les déploiements partiels. <code>--signed</code> envoie un certificat de push signé par GPG que certains hôtes journalisent pour audit :</p>
    <pre><code>git push --atomic origin main release/1.2
    git push --signed origin main</code></pre>
    <p>Pour les systèmes automatisés, l'option <code>--receive-pack</code> vous permet de spécifier un receive-pack alternatif sur le serveur, occasionnellement nécessaire pour des hôtes avec des binaires non standard. Utilisez toujours <code>git push --dry-run</code> lors du scripting de pushes destructifs pour la première fois.</p>
    <h2>Erreurs fréquentes</h2>
    <p>Pousser vers <code>main</code> alors que vous vouliez une branche de feature, parce que vous avez oublié sur quelle branche vous étiez. Exécutez <code>git status</code> d'abord. Utiliser <code>git push --force</code> contre <code>main</code> et réécrire les commits des autres ; récupérez via le reflog du remote (si vous avez un accès shell) ou en repushant depuis le clone d'un coéquipier. Pousser sans identifiants configurés et rester bloqué sur une invite de mot de passe ; configurez un assistant d'identifiants ou une clé SSH. Enfin, les gros pushes peuvent échouer au dernier moment si un hook les rejette ; si c'est le cas, le message de rejet nomme le commit fautif. Lisez-le attentivement plutôt que de relancer aveuglément.</p>

- source_title: "Understanding HEAD"
  title: "Comprendre HEAD"
  langcode: fr
  body: |
    <h2>Introduction</h2>
    <p><code>HEAD</code> est la référence la plus importante dans Git. Il indique à Git de quel commit votre prochain commit descendra. La plupart du temps, <code>HEAD</code> pointe vers une branche, et cette branche pointe vers un commit ; mais <code>HEAD</code> peut aussi pointer directement vers un commit (HEAD détaché).</p>
    <h2>Où il vit</h2>
    <p><code>HEAD</code> est un fichier unique à <code>.git/HEAD</code>. Inspectez-le :</p>
    <pre><code>cat .git/HEAD
    # ref: refs/heads/main</code></pre>
    <p>Cette ligne unique dit « HEAD pointe actuellement sur la branche <code>main</code> ». Quand vous commitez, Git fait avancer <code>main</code> et <code>HEAD</code> suit.</p>
    <h2>Inspecter HEAD</h2>
    <pre><code>git rev-parse HEAD              # SHA du commit
    git symbolic-ref HEAD           # nom de la ref sous-jacente
    git log -1 HEAD --oneline</code></pre>
    <h2>HEAD détaché</h2>
    <p>Faire un checkout d'un commit, d'un tag ou d'une branche de tracking distant directement met <code>HEAD</code> en état <em>détaché</em> :</p>
    <pre><code>git checkout v1.2.3
    # You are in 'detached HEAD' state.</code></pre>
    <p><code>.git/HEAD</code> contient maintenant un SHA brut. Les nouveaux commits ne vont nulle part sauf dans le reflog ; revenez à une vraie branche (ou créez-en une) avant de les perdre :</p>
    <pre><code>git switch -c experiment</code></pre>
    <h2>Raccourcis HEAD</h2>
    <ul>
      <li><code>HEAD</code> : le commit courant.</li>
      <li><code>HEAD^</code> ou <code>HEAD~1</code> : parent.</li>
      <li><code>HEAD~3</code> : trois commits en arrière via le premier parent.</li>
      <li><code>HEAD^2</code> : second parent d'un merge commit.</li>
      <li><code>HEAD@{1}</code> : position précédente depuis le reflog.</li>
    </ul>
    <pre><code>git log HEAD~5..HEAD --oneline
    git diff HEAD^ HEAD</code></pre>
    <h2>Autres HEAD spéciaux</h2>
    <ul>
      <li><code>ORIG_HEAD</code> : HEAD précédent avant une opération « dangereuse » (merge, reset).</li>
      <li><code>MERGE_HEAD</code> : pointe de la branche en cours de merge.</li>
      <li><code>FETCH_HEAD</code> : pointe de ce qui vient d'être fetché.</li>
      <li><code>CHERRY_PICK_HEAD</code> : commit en cours de cherry-pick.</li>
    </ul>
    <h2>HEAD dans les scripts</h2>
    <p>Les scripts ont souvent besoin de connaître le nom de la branche courante. Utilisez la plomberie plutôt que de parser la sortie porcelain :</p>
    <pre><code>branch=$(git symbolic-ref --short -q HEAD) || branch="(detached)"
    sha=$(git rev-parse HEAD)
    short=$(git rev-parse --short HEAD)</code></pre>
    <p><code>symbolic-ref --short -q HEAD</code> sort avec un code non nul en état détaché, ce qui en fait un détecteur parfait. <code>git branch --show-current</code> (Git 2.22+) est une alternative plus conviviale qui affiche une sortie vide en état détaché. Les deux sont stables entre versions ; la sortie de <code>git status</code> ne l'est pas.</p>
    <h2>HEAD et worktrees</h2>
    <p>Les worktrees liés ont chacun leur propre <code>HEAD</code>. Le <code>.git/HEAD</code> du dépôt principal est l'un de plusieurs ; chaque worktree a le sien sous <code>.git/worktrees/&lt;name&gt;/HEAD</code>. Cela signifie que deux worktrees du même dépôt peuvent être sur des branches différentes simultanément :</p>
    <pre><code>git worktree add ../wt-feature feature/login
    git -C ../wt-feature rev-parse HEAD
    git -C . rev-parse HEAD</code></pre>
    <p>Les deux HEADs sont indépendants. Le checkout de branche est exclusif entre worktrees : une branche ne peut être extraite que dans un worktree à la fois, ce qui empêche les éditions concurrentes accidentelles à la même branche depuis deux endroits.</p>
    <h2>Erreurs fréquentes</h2>
    <p>Croire que <code>HEAD</code> est synonyme de « branche courante ». Ce n'est pas le cas ; c'est un pointeur qui pointe <em>généralement</em> vers une. Traiter <code>HEAD~3</code> et <code>HEAD^3</code> comme équivalents : ils diffèrent sur les merge commits. Éditer <code>.git/HEAD</code> à la main pour changer de branche ; utilisez plutôt <code>git switch</code> ou <code>git checkout</code>. Et enfin, ignorer les avertissements « detached HEAD » et commiter dans le vide ; si vous vous y trouvez avec de nouveaux commits, faites <code>git switch -c &lt;newbranch&gt;</code> immédiatement pour les ancrer.</p>

- source_title: "Creating and switching branches"
  title: "Créer et changer de branche"
  langcode: fr
  body: |
    <h2>Introduction</h2>
    <p>Les branches sont la façon dont Git supporte des lignes de travail parallèles. Créer une branche est essentiellement gratuit : c'est juste un fichier de 41 octets contenant un hachage de commit. Utilisez-les généreusement pour les fonctionnalités, les expériences et les corrections de bugs.</p>
    <h2>Commandes modernes</h2>
    <p>Depuis Git 2.23, il y a deux commandes dédiées : <code>git switch</code> pour les branches et <code>git restore</code> pour les fichiers. Utilisez-les ; elles sont plus claires que le comportement surchargé de <code>git checkout</code>.</p>
    <pre><code>git switch main                    # passer à une branche existante
    git switch -c feature/login        # créer et passer
    git switch -c hotfix v1.2.3        # créer depuis un tag
    git switch -                       # branche précédente (comme cd -)</code></pre>
    <h2>Lister les branches</h2>
    <pre><code>git branch                    # locales
    git branch -r                 # tracking distant
    git branch -a                 # toutes
    git branch -vv                # avec upstream et avance/retard
    git branch --merged           # mergées dans la courante
    git branch --no-merged        # pas encore mergées</code></pre>
    <h2>Renommer et supprimer</h2>
    <pre><code>git branch -m old new             # renommer
    git branch -m new                  # renommer la branche courante
    git branch -d feature/login        # supprimer une branche mergée
    git branch -D feature/abandoned    # forcer la suppression d'une non mergée</code></pre>
    <p><code>-d</code> refuse si la branche a des commits non mergés, protégeant le travail.</p>
    <h2>Suivre des branches distantes</h2>
    <pre><code>git switch feature/login           # crée auto une locale depuis origin/feature/login
    git switch -c mine origin/feature/login   # explicite
    git branch -u origin/main          # définit l'upstream de la branche courante</code></pre>
    <h2>La syntaxe classique</h2>
    <p>Les anciens tutoriels utilisent <code>git checkout</code>. Cela fonctionne toujours :</p>
    <pre><code>git checkout main
    git checkout -b feature/login
    git checkout v1.2.3</code></pre>
    <p>L'inconvénient est que la même commande restaure aussi des fichiers, ce qui crée de la confusion. Préférez <code>switch</code> et <code>restore</code> dans les nouveaux scripts.</p>
    <h2>Conventions de nommage des branches</h2>
    <p>Des noms cohérents facilitent l'outillage. Motifs courants :</p>
    <ul>
      <li><code>feature/&lt;ticket&gt;-short-desc</code></li>
      <li><code>bugfix/&lt;ticket&gt;-short-desc</code></li>
      <li><code>hotfix/&lt;version&gt;</code></li>
      <li><code>release/&lt;version&gt;</code></li>
    </ul>
    <pre><code>git switch -c feature/PROJ-123-add-search
    git config --global branch.autoSetupMerge always
    git config --global branch.autoSetupRebase always</code></pre>
    <p>Les options <code>autoSetup</code> garantissent que les nouvelles branches suivent automatiquement leur point de départ, ce qui rend la ligne avance/retard de <code>git status</code> significative dès le premier jour.</p>
    <h2>Renommer sur le remote</h2>
    <p>Renommer une branche distante est deux opérations : renommer localement et créer la nouvelle ref sur le serveur, puis supprimer l'ancienne :</p>
    <pre><code>git branch -m old new
    git push -u origin new
    git push origin --delete old</code></pre>
    <h2>Erreurs fréquentes</h2>
    <p>Changer de branche avec des changements non commités qui entrent en conflit avec la cible ; Git refuse, et la solution est de commiter, stasher, ou utiliser <code>git switch --discard-changes</code> si vous ne les voulez vraiment pas. Créer des dizaines de branches de longue durée et ne jamais supprimer les mergées ; <code>git branch --merged | xargs git branch -d</code> nettoie. Nommer des branches avec des caractères qui troublent les shells (espaces, caractères glob) ; tenez-vous-en aux lettres, chiffres, slashes et tirets. Enfin, supprimer une branche avec <code>-D</code> et paniquer en réalisant qu'elle avait du travail non mergé ; le reflog l'a encore pendant 90 jours : <code>git reflog</code>, trouvez le SHA, <code>git switch -c rescued &lt;sha&gt;</code>.</p>

- source_title: "Your first merge"
  title: "Votre premier merge"
  langcode: fr
  body: |
    <h2>Introduction</h2>
    <p>Un <em>merge</em> combine deux lignes de développement. Le cas le plus courant est de ramener une branche de feature dans <code>main</code>. Cette page parcourt un merge propre, un fast-forward et un merge avec conflits.</p>
    <h2>Mise en place</h2>
    <pre><code>git switch -c feature/greeting
    echo "hello world" > greeting.txt
    git add greeting.txt
    git commit -m "Add greeting"
    git switch main
    git merge feature/greeting</code></pre>
    <p>Si <code>main</code> n'a pas bougé depuis la création de la branche, Git fait un fast-forward : il déplace simplement le pointeur de <code>main</code> vers la pointe de <code>feature/greeting</code>. Aucun merge commit n'est créé.</p>
    <h2>Vrais merges trois-voies</h2>
    <p>Si les deux branches ont de nouveaux commits, Git crée un <em>merge commit</em> avec deux parents :</p>
    <pre><code>git switch main
    echo "main change" >> notes.txt
    git commit -am "Update notes on main"
    git merge feature/greeting
    # Merge made by the 'ort' strategy.</code></pre>
    <p>Le premier parent du merge commit est le précédent <code>HEAD</code> de <code>main</code> ; son second parent est la pointe de la branche mergée.</p>
    <h2>Forcer un merge commit</h2>
    <p>Pour préserver l'historique visiblement même quand un fast-forward est possible :</p>
    <pre><code>git merge --no-ff feature/greeting -m "Merge feature/greeting"</code></pre>
    <h2>Conflits</h2>
    <p>Si les deux côtés ont édité les mêmes lignes, Git s'arrête et écrit des marqueurs de conflit :</p>
    <pre><code>&lt;&lt;&lt;&lt;&lt;&lt;&lt; HEAD
    line from main
    =======
    line from feature
    &gt;&gt;&gt;&gt;&gt;&gt;&gt; feature/greeting</code></pre>
    <p>Résolvez en éditant le fichier, puis :</p>
    <pre><code>git add notes.txt
    git status
    git commit               # utilise le message de merge préparé</code></pre>
    <h2>Annuler</h2>
    <p>Si vous changez d'avis en cours de merge :</p>
    <pre><code>git merge --abort</code></pre>
    <p>Cela restaure l'arborescence de travail à l'état pré-merge.</p>
    <h2>Inspecter le résultat</h2>
    <pre><code>git log --oneline --graph --decorate -n 10</code></pre>
    <p>Le graphe montre la forme en losange créée par le merge.</p>
    <h2>Inspecter un merge</h2>
    <p>Les merge commits ont deux parents, donc les diffs nécessitent une gestion explicite. <code>git show</code> sur un merge utilise par défaut un « combined diff » qui ne met en évidence que les changements en conflit avec les deux parents :</p>
    <pre><code>git show HEAD                       # combined diff
    git show -m HEAD                    # diff contre chaque parent séparément
    git show --first-parent HEAD        # contre le premier parent seulement
    git log --merges --oneline          # uniquement merge commits
    git log --no-merges --oneline       # excluant merge commits</code></pre>
    <p>Pour l'archéologie de code, <code>--first-parent</code> sur une branche de longue durée révèle l'histoire d'intégration : quand chaque feature a atterri, dans l'ordre chronologique du tronc.</p>
    <h2>Erreurs fréquentes</h2>
    <p>Éditer des fichiers pendant un merge mais oublier de les <code>git add</code>, donc <code>git commit</code> se plaint encore des chemins non résolus. Exécutez toujours <code>git status</code> après avoir édité. Résoudre en supprimant les marqueurs de conflit mais en laissant du texte obsolète d'un côté ; faites un build et exécutez les tests avant de commiter le merge. Utiliser <code>--no-ff</code> sur chaque merge dans un dépôt à évolution rapide, polluant l'historique avec des merge commits vides. Enfin, paniquer à l'invite et exécuter <code>git reset --hard</code> en plein merge ; <code>git merge --abort</code> est plus sûr parce qu'il connaît <code>ORIG_HEAD</code>.</p>

- source_title: "Undoing changes (intro)"
  title: "Annuler des changements (introduction)"
  langcode: fr
  body: |
    <h2>Introduction</h2>
    <p>Git fournit plusieurs façons d'annuler, selon que le changement soit dans votre arborescence de travail, dans l'index, dans votre dernier commit, ou déjà poussé. Choisir le bon outil prévient les accidents.</p>
    <h2>Abandonner les éditions de l'arborescence de travail</h2>
    <p>Vous avez édité un fichier mais vous voulez jeter les changements :</p>
    <pre><code>git restore file.txt              # moderne
    git checkout -- file.txt          # équivalent classique</code></pre>
    <p><code>git restore</code> sans <code>--source</code> utilise l'index, donc le fichier revient à son dernier état <code>git add</code>.</p>
    <h2>Désindexer (unstage)</h2>
    <p>Vous avez exécuté <code>git add</code> mais vous voulez retirer un fichier du prochain commit (sans perdre les éditions) :</p>
    <pre><code>git restore --staged file.txt
    git reset HEAD file.txt           # syntaxe ancienne</code></pre>
    <h2>Amender le dernier commit</h2>
    <p>Vous avez commité mais vous voulez corriger le message ou inclure un autre fichier :</p>
    <pre><code>git commit --amend -m "Better message"
    git add forgotten.txt
    git commit --amend --no-edit</code></pre>
    <p>N'amendez que les commits que vous <strong>n'avez pas poussés</strong>, ou soyez prêt à force-pusher.</p>
    <h2>Reverter un commit public</h2>
    <p>Si un mauvais commit est déjà poussé, ne réécrivez pas l'historique. Créez un nouveau commit qui l'annule :</p>
    <pre><code>git revert &lt;sha&gt;
    git push</code></pre>
    <p><code>git revert</code> ouvre un éditeur avec un message généré ; le résultat est une annulation propre que tout le monde peut puller.</p>
    <h2>Resetter</h2>
    <p><code>git reset</code> déplace le pointeur de la branche courante. Il a trois modes :</p>
    <ul>
      <li><code>--soft</code> : déplace seulement la branche ; garde l'index et l'arborescence de travail.</li>
      <li><code>--mixed</code> (défaut) : déplace la branche et reset l'index ; garde l'arborescence de travail.</li>
      <li><code>--hard</code> : déplace la branche, reset l'index, reset l'arborescence de travail. Destructif.</li>
    </ul>
    <pre><code>git reset --soft HEAD~1            # décommiter, garder les changements stagés
    git reset HEAD~1                   # décommiter, garder les changements non stagés
    git reset --hard HEAD~1            # détruire le dernier commit et les changements</code></pre>
    <h2>Récupérer après --hard</h2>
    <pre><code>git reflog
    git reset --hard HEAD@{1}</code></pre>
    <p>Le reflog se souvient de chaque mouvement de <code>HEAD</code> pendant 90 jours.</p>
    <h2>Choisir la bonne annulation</h2>
    <p>Une matrice de décision simple :</p>
    <ul>
      <li><strong>Arborescence de travail seulement</strong> : <code>git restore &lt;file&gt;</code></li>
      <li><strong>Fichier stagé</strong> : <code>git restore --staged &lt;file&gt;</code></li>
      <li><strong>Dernier commit non poussé</strong> : <code>git commit --amend</code> ou <code>git reset --soft HEAD~1</code></li>
      <li><strong>Commit poussé</strong> : <code>git revert &lt;sha&gt;</code></li>
      <li><strong>Pointe de branche entière</strong> : <code>git reset --hard ORIG_HEAD</code> (après un mauvais merge/rebase)</li>
    </ul>
    <pre><code>git status
    git diff
    git log --oneline -5</code></pre>
    <p>Exécutez toujours ces trois commandes avant toute annulation destructive. Elles montrent l'arborescence de travail, les changements stagés et l'historique récent ; ensemble, elles vous disent quelle annulation est sûre.</p>
    <h2>Erreurs fréquentes</h2>
    <p>Confondre <code>revert</code> avec <code>reset</code>. <em>Revert</em> ajoute ; <em>reset</em> retire. Exécuter <code>git reset --hard</code> avec du travail non commité, puis se rendre compte qu'on en avait besoin ; allez immédiatement au reflog, avant que le garbage collection ne tourne. Amender un commit poussé sans coordonner le force-push avec les coéquipiers. Utilisez <code>git revert</code> sur l'historique partagé. Et enfin, traiter <code>git checkout file</code> comme sûr ; dans les anciens Git, il écrase silencieusement vos éditions sans corbeille. Le moderne <code>git restore</code> n'est pas différent ; sauvegardez d'abord en cas de doute.</p>

- source_title: "Tagging releases"
  title: "Étiqueter les releases (tag)"
  langcode: fr
  body: |
    <h2>Introduction</h2>
    <p>Les tags sont des références nommées vers des commits spécifiques. Contrairement aux branches, les tags ne sont pas censés bouger. Ils sont parfaits pour marquer les releases (<code>v1.0.0</code>) et autres points historiques.</p>
    <h2>Deux types de tags</h2>
    <ul>
      <li><strong>Lightweight</strong> : juste une ref pointant vers un commit. Pas de métadonnées.</li>
      <li><strong>Annotated</strong> : un objet Git complet avec tagger, date, message et signature GPG optionnelle. Utilisez ceux-ci pour les releases.</li>
    </ul>
    <h2>Créer des tags</h2>
    <pre><code>git tag v1.0.0                          # lightweight
    git tag -a v1.0.0 -m "First stable release"   # annotated
    git tag -s v1.0.0 -m "Signed release"         # signé GPG</code></pre>
    <p>Par défaut, les tags s'attachent à <code>HEAD</code>. Pour étiqueter un commit spécifique :</p>
    <pre><code>git tag -a v0.9.0 a1b2c3d -m "Beta"</code></pre>
    <h2>Lister et inspecter</h2>
    <pre><code>git tag
    git tag -l "v1.*"
    git show v1.0.0
    git tag -l --format='%(refname:short) %(taggerdate:short) %(subject)'</code></pre>
    <h2>Pousser les tags</h2>
    <p>Les tags ne sont pas poussés par défaut :</p>
    <pre><code>git push origin v1.0.0
    git push origin --tags                # tous les tags
    git push --follow-tags                # uniquement les tags atteignables depuis les commits poussés</code></pre>
    <p><code>--follow-tags</code> est le défaut recommandé pour les pipelines de release.</p>
    <h2>Supprimer des tags</h2>
    <pre><code>git tag -d v1.0.0                     # local
    git push origin --delete v1.0.0       # distant</code></pre>
    <h2>Faire un checkout d'un tag</h2>
    <pre><code>git switch --detach v1.0.0
    # ou pour baser une branche hotfix sur un tag
    git switch -c hotfix/1.0.1 v1.0.0</code></pre>
    <h2>Vérifier les signatures</h2>
    <pre><code>git tag -v v1.0.0</code></pre>
    <p>Nécessite la clé publique du tagger dans votre trousseau GPG.</p>
    <h2>Décrire les builds avec git describe</h2>
    <p>Une fois que votre dépôt a des tags annotés, <code>git describe</code> produit des identifiants de build stables qui combinent le dernier tag, la distance et le SHA abrégé :</p>
    <pre><code>git describe
    # v1.2.3-7-gabc1234
    git describe --always --dirty
    # v1.2.3-7-gabc1234-dirty</code></pre>
    <p>Le suffixe <code>--dirty</code> apparaît si l'arborescence de travail a des changements non commités ; <code>--always</code> retombe sur un SHA nu quand aucun tag n'est atteignable. Les pipelines CI intègrent souvent cette chaîne dans les binaires pour rendre triviaux les rapports de terrain.</p>
    <h2>Politiques de tagging</h2>
    <p>Pour les projets supportés à long terme, décidez et documentez :</p>
    <ul>
      <li>Schéma de nommage : <code>v1.2.3</code>, <code>release-2025-04</code>, <code>1.2.3</code> (sans préfixe) ?</li>
      <li>Annoté ou signé ?</li>
      <li>Qui est autorisé à pusher des tags ? De nombreux hôtes vous permettent de protéger les noms de tags par des motifs.</li>
      <li>Quelle est la source de vérité : tags-sur-main seulement, ou branches de release avec leurs propres tags ?</li>
    </ul>
    <pre><code>git for-each-ref --sort=-creatordate --format='%(refname:short) %(creatordate:short)' refs/tags | head</code></pre>
    <p>Choisissez un schéma et tenez-vous-y ; l'historique des tags est plus difficile à migrer que l'historique des commits.</p>
    <h2>Erreurs fréquentes</h2>
    <p>Utiliser des tags lightweight pour les releases. Ils manquent de date, d'auteur et de message, ce qui rend les pistes d'audit pénibles. Utilisez toujours <code>-a</code> ou <code>-s</code> pour les releases. Déplacer un tag après publication ; les utilisateurs en aval ne récupéreront pas le changement proprement. Créez un nouveau tag (par ex. <code>v1.0.1</code>) à la place. Oublier de pousser les tags et se demander pourquoi votre page de releases est vide ; rappelez-vous <code>git push --tags</code> ou <code>--follow-tags</code>. Enfin, nommer des tags avec des caractères en conflit avec les refs (un tag et une branche nommés <code>release</code> créeront une ambiguïté) ; utilisez une convention claire comme <code>v&lt;semver&gt;</code> pour les releases.</p>

- source_title: "Git on the command line: tips for new users"
  title: "Git en ligne de commande : conseils pour nouveaux utilisateurs"
  langcode: fr
  body: |
    <h2>Introduction</h2>
    <p>Git récompense la fluidité en ligne de commande. Quelques petites habitudes rendent le travail quotidien considérablement plus rapide et plus sûr. Cette page rassemble les conseils à plus fort impact pour les nouveaux utilisateurs.</p>
    <h2>Sachez toujours où vous êtes</h2>
    <p>Ajoutez le statut Git à votre invite shell. Bash et Zsh fournissent tous deux des scripts contrib :</p>
    <pre><code># bash
    source /usr/share/git/completion/git-prompt.sh
    PS1='\w$(__git_ps1 " (%s)")\$ '

    # zsh avec oh-my-zsh : activer le plugin git dans ~/.zshrc</code></pre>
    <p>Maintenant la branche courante et l'état modifié sont visibles en permanence.</p>
    <h2>Complétion par tabulation</h2>
    <p>Git fournit <code>git-completion.bash</code> ; la plupart des gestionnaires de paquets l'installent automatiquement. Complétez par tabulation les commandes, branches, remotes et refs :</p>
    <pre><code>git che&lt;TAB&gt;
    git switch fea&lt;TAB&gt;</code></pre>
    <h2>Alias rentables</h2>
    <pre><code>git config --global alias.s "status -sb"
    git config --global alias.lg "log --oneline --graph --decorate --all"
    git config --global alias.co switch
    git config --global alias.last "log -1 HEAD --stat"
    git config --global alias.unstage "restore --staged"</code></pre>
    <h2>Status plus court</h2>
    <pre><code>git status -sb</code></pre>
    <p>La forme <code>-sb</code> est sur deux colonnes et inclut les infos de tracking de la branche ; parfait pour des vérifications rapides.</p>
    <h2>De meilleurs diffs</h2>
    <pre><code>git diff --word-diff
    git diff --color-words
    git config --global diff.colorMoved zebra</code></pre>
    <p><code>colorMoved=zebra</code> met en évidence les blocs de code déplacés différemment des ajoutés/supprimés, rendant les refactorings plus faciles à reviewer.</p>
    <h2>Environnement utile</h2>
    <ul>
      <li>Définissez <code>GIT_PAGER=less -FRX</code> pour un paging sensé.</li>
      <li>Définissez <code>EDITOR</code> sur quelque chose que vous savez quitter.</li>
      <li>Utilisez un assistant d'identifiants : <code>git config --global credential.helper cache</code> sous Linux, <code>osxkeychain</code> sur macOS, <code>manager</code> sous Windows.</li>
    </ul>
    <h2>Défauts sûrs</h2>
    <pre><code>git config --global pull.ff only
    git config --global push.autoSetupRemote true
    git config --global fetch.prune true
    git config --global rerere.enabled true</code></pre>
    <p><code>rerere</code> (« reuse recorded resolution ») se souvient de la façon dont vous avez résolu un conflit et le rejoue la prochaine fois.</p>
    <h2>Lire l'historique des commits rapidement</h2>
    <p>Deux astuces de visualisation rentables au quotidien :</p>
    <pre><code>git log --oneline --graph --all --decorate
    git log -p --follow path/to/file
    git show HEAD --stat
    git diff @{u}                  # vs upstream
    git diff @{1.day.ago}          # vs HEAD il y a un jour</code></pre>
    <p>Chaque commande Git qui prend un commit accepte la même syntaxe de révision : noms de branches, SHAs, <code>HEAD~3</code>, <code>@{upstream}</code>, <code>@{2.hours.ago}</code>, <code>tag^{commit}</code>. Apprenez-la une fois via <code>git help gitrevisions</code> et utilisez-la partout.</p>
    <h2>Erreurs fréquentes</h2>
    <p>Copier-coller de longues commandes depuis des articles de blog sans les comprendre ; lisez <code>git help &lt;cmd&gt;</code> pour tout flag inconnu. Aliaser des commandes destructives sur des noms courts (<code>r = reset --hard</code>) et les déclencher par accident ; réservez les alias courts aux opérations sûres. Ignorer la complétion par tabulation du shell et taper les noms de branches à la main, avec toutes les fautes de frappe que cela implique. Enfin, ne collez jamais la sortie du shell dans un message de commit en attendant qu'il s'affiche comme du code ; utilisez un bloc de code dans votre éditeur ou commitez plutôt un fichier. Les petites habitudes s'accumulent ; investissez un après-midi à configurer votre shell et récoltez des années de bénéfices.</p>

- source_title: "The object model: blobs, trees, commits, tags"
  title: "Le modèle d'objets : blobs, trees, commits, tags"
  langcode: fr
  body: |
    <h2>Introduction</h2>
    <p>Le dépôt de Git est, en son cœur, un <em>magasin d'objets adressé par contenu</em>. Il existe exactement quatre types d'objets : <strong>blob</strong>, <strong>tree</strong>, <strong>commit</strong> et <strong>tag</strong>. Chaque opération finit par les toucher. Comprendre ces quatre types démystifie la majeure partie de Git.</p>
    <h2>Blobs</h2>
    <p>Un blob stocke le contenu d'un fichier, rien de plus. Pas de nom de fichier, pas de permissions, pas d'historique. Deux fichiers au contenu identique partagent un seul blob, peu importe où ils vivent dans l'arbre.</p>
    <pre><code>echo "hello" | git hash-object --stdin
    # ce013625030ba8dba906f756967f9e9ca394464a</code></pre>
    <h2>Trees</h2>
    <p>Un tree est un listing de répertoire : un ensemble trié d'entrées <code>(mode, type, sha, name)</code>. Les sous-répertoires sont eux-mêmes des trees, récursivement. Chaque commit pointe vers exactement un tree racine.</p>
    <pre><code>git ls-tree HEAD
    # 100644 blob a1b2... README.md
    # 040000 tree c3d4... src</code></pre>
    <h2>Commits</h2>
    <p>Un objet commit contient :</p>
    <ul>
      <li>Un pointeur vers un tree racine.</li>
      <li>Zéro ou plusieurs commits parents (zéro pour la racine, deux ou plus pour les merges).</li>
      <li>Auteur et committer avec horodatages.</li>
      <li>Un message.</li>
      <li>Signature GPG/SSH optionnelle.</li>
    </ul>
    <pre><code>git cat-file -p HEAD
    # tree 9f1a...
    # parent b2c3...
    # author Ada &lt;ada@example.com&gt; 1714300000 +0000
    # committer Ada &lt;ada@example.com&gt; 1714300000 +0000
    #
    # Add greeting</code></pre>
    <h2>Tags</h2>
    <p>Un tag annoté est son propre objet pointant vers un autre objet (presque toujours un commit), avec les infos du tagger et un message. Les tags lightweight sont juste des refs et n'ont pas d'objet.</p>
    <pre><code>git cat-file -t v1.0.0
    # tag
    git cat-file -p v1.0.0</code></pre>
    <h2>Mettre tout ensemble</h2>
    <p>Parcourez l'arbre d'un commit manuellement :</p>
    <pre><code>git cat-file -p HEAD^{tree}
    git cat-file -p HEAD^{tree}:src
    git cat-file -p HEAD:README.md</code></pre>
    <p>Le déréférencement <code>^{tree}</code> et la syntaxe <code>commit:path</code> sont la façon dont tous les outils Git naviguent.</p>
    <h2>Stockage</h2>
    <p>Chaque objet est compressé avec zlib et adressé par le SHA-1 (ou SHA-256) de son contenu non compressé plus un en-tête. Le contenu identique, n'importe où dans l'historique, est dédupliqué automatiquement.</p>
    <h2>Modes des entrées de tree</h2>
    <p>Le champ mode dans une entrée de tree est un petit ensemble de modes de fichiers de type POSIX :</p>
    <ul>
      <li><code>100644</code> : fichier normal non exécutable (blob).</li>
      <li><code>100755</code> : fichier exécutable (blob).</li>
      <li><code>120000</code> : lien symbolique (blob dont le contenu est la cible).</li>
      <li><code>040000</code> : sous-répertoire (tree).</li>
      <li><code>160000</code> : gitlink (référence sous-module vers un SHA de commit).</li>
    </ul>
    <pre><code>git ls-tree HEAD
    git update-index --chmod=+x scripts/run.sh
    git ls-tree HEAD scripts/</code></pre>
    <p>Git est intentionnellement limité ; les permissions et la propriété arbitraires ne sont pas stockées.</p>
    <h2>Erreurs fréquentes</h2>
    <p>Croire que Git stocke des diffs. Ce n'est pas le cas ; il stocke des instantanés complets, dédupliqués par hachage et plus tard delta-compressés dans les pack files. Confondre les trees avec les répertoires sur disque ; les trees sont des objets immuables. Confondre les tags lightweight avec les annotés ; seuls les tags annotés portent des métadonnées et des signatures. Enfin, s'attendre à ce que renommer un fichier change le blob ; le blob est le même, seule l'entrée de nom du tree change. Passez dix minutes avec <code>git cat-file -p</code> sur un vrai dépôt et le modèle deviendra une seconde nature.</p>

- source_title: "Content-addressed storage: SHA-1 and SHA-256"
  title: "Stockage adressé par contenu : SHA-1 et SHA-256"
  langcode: fr
  body: |
    <h2>Introduction</h2>
    <p>Git nomme chaque objet par le hachage cryptographique de son contenu. C'est le stockage <em>adressé par contenu</em> : le nom <em>est</em> l'empreinte du contenu. Le hachage par défaut est SHA-1 (160 bits, 40 caractères hex). Le support de SHA-256 existe expérimentalement depuis Git 2.29.</p>
    <h2>Comment un hachage est calculé</h2>
    <p>Git préfixe le contenu brut d'un en-tête de la forme <code>&lt;type&gt; &lt;size&gt;\0</code>, puis hache :</p>
    <pre><code>printf 'blob 6\0hello\n' | sha1sum
    # ce013625030ba8dba906f756967f9e9ca394464a  -</code></pre>
    <p>La même valeur sort de <code>git hash-object</code> :</p>
    <pre><code>printf 'hello\n' | git hash-object --stdin
    # ce013625030ba8dba906f756967f9e9ca394464a</code></pre>
    <h2>Pourquoi l'adressage par contenu</h2>
    <ul>
      <li><strong>Déduplication</strong> : contenu identique stocké une seule fois.</li>
      <li><strong>Intégrité</strong> : toute corruption change le hachage, instantanément détectable.</li>
      <li><strong>Reproductibilité</strong> : le même tree a toujours le même nom.</li>
      <li><strong>Synchro distribuée</strong> : Git peut demander « avez-vous <code>abc123</code> ? » sans expliquer ce que c'est.</li>
    </ul>
    <h2>Hachages abrégés</h2>
    <p>Git accepte le préfixe non ambigu le plus court, normalement 7 caractères. À mesure qu'un dépôt grandit, plus de chiffres peuvent être nécessaires :</p>
    <pre><code>git rev-parse --short HEAD
    git rev-parse --short=12 HEAD
    git config --global core.abbrev 12</code></pre>
    <h2>SHA-1 vs SHA-256</h2>
    <p>SHA-1 a des attaques de collision connues (SHAttered, 2017). Le projet Git a répondu avec SHA-256 comme format d'objet alternatif. Pour créer un dépôt SHA-256 :</p>
    <pre><code>git init --object-format=sha256</code></pre>
    <p>Note : les dépôts SHA-1 et SHA-256 ne peuvent pas encore interagir ; le support des outils et de l'hébergement mûrit encore à partir de Git 2.45+. Pour l'instant, la plupart des projets continuent avec SHA-1, augmenté par l'implémentation SHA-1 durcie de Git détectant les collisions.</p>
    <h2>Vérifier l'intégrité</h2>
    <pre><code>git fsck --full
    git fsck --strict</code></pre>
    <p><code>git fsck</code> recalcule les hachages pour chaque objet et signale toute non-correspondance.</p>
    <h2>Inspecter un objet</h2>
    <pre><code>git cat-file -t &lt;sha&gt;       # type
    git cat-file -s &lt;sha&gt;       # taille
    git cat-file -p &lt;sha&gt;       # contenu joliment imprimé</code></pre>
    <h2>SHA-1 durci</h2>
    <p>Depuis 2017, Git est livré avec une implémentation SHA-1 « détectant les collisions » (<code>sha1dc</code>) qui reconnaît le motif SHAttered publié et refuse de hacher de telles entrées. Cela rend les attaques pratiques contre les dépôts Git essentiellement impossibles sans découvrir une nouvelle technique de collision. Le coût est un léger ralentissement du hachage ; vous pouvez opter pour le SHA-1 OpenSSL standard avec <code>./configure --with-openssl-sha1</code> lors de la compilation depuis les sources, mais peu d'utilisateurs ont une raison de le faire.</p>
    <pre><code>git --version --build-options 2&gt;&amp;1 | grep -i sha</code></pre>
    <h2>Erreurs fréquentes</h2>
    <p>S'inquiéter que les collisions SHA-1 compromettent votre dépôt. Les attaques connues nécessitent des entrées élaborées ; Git détecte de plus le motif de collision publié. Le risque pragmatique pour un projet normal est essentiellement nul. Tronquer les hachages trop agressivement dans les scripts ; dans un dépôt avec un million d'objets, 7 caractères peuvent entrer en collision. Utilisez <code>git rev-parse --short</code> pour laisser Git choisir. Éditer les fichiers d'objets directement sous <code>.git/objects</code> ; cela casse l'invariant d'adressage par contenu et corrompt le dépôt. Toutes les écritures doivent passer par la plomberie Git.</p>

- source_title: "References: refs, HEAD, branches, and tags"
  title: "Références : refs, HEAD, branches et tags"
  langcode: fr
  body: |
    <h2>Introduction</h2>
    <p>Les objets sont immuables et nommés par hachage. Les <em>références</em> sont les noms mutables et lisibles par l'humain qui pointent vers eux. Chaque branche, tag, branche de tracking distant et HEAD est une ref.</p>
    <h2>Où vivent les refs</h2>
    <p>Les refs sont des fichiers (ou des entrées dans le fichier packed-refs) sous <code>.git/refs/</code> :</p>
    <ul>
      <li><code>.git/refs/heads/&lt;name&gt;</code> : branches locales.</li>
      <li><code>.git/refs/tags/&lt;name&gt;</code> : tags.</li>
      <li><code>.git/refs/remotes/&lt;remote&gt;/&lt;name&gt;</code> : branches de tracking distant.</li>
      <li><code>.git/HEAD</code> : la ref courante.</li>
    </ul>
    <p>Chaque ref non symbolique est un fichier d'une ligne contenant un hachage :</p>
    <pre><code>cat .git/refs/heads/main
    # a1b2c3d4...</code></pre>
    <h2>Lister les refs</h2>
    <pre><code>git for-each-ref
    git for-each-ref refs/tags/
    git for-each-ref --format='%(refname:short) %(objectname:short) %(subject)'
    git show-ref</code></pre>
    <h2>Refs symboliques</h2>
    <p>Une ref symbolique pointe vers une autre ref au lieu d'un hachage. <code>HEAD</code> est l'exemple canonique :</p>
    <pre><code>cat .git/HEAD
    # ref: refs/heads/main
    git symbolic-ref HEAD
    git symbolic-ref refs/remotes/origin/HEAD</code></pre>
    <h2>Lire les refs en sécurité</h2>
    <p>Passez toujours par la plomberie plutôt que de lire les fichiers :</p>
    <pre><code>git rev-parse HEAD
    git rev-parse main
    git rev-parse origin/main
    git rev-parse v1.0.0^{commit}</code></pre>
    <p>La plomberie gère uniformément les refs packées, les refs symboliques et les recherches de refs.</p>
    <h2>Mettre à jour les refs</h2>
    <pre><code>git update-ref refs/heads/feature/login &lt;sha&gt;
    git update-ref -d refs/heads/feature/login           # supprimer
    git update-ref refs/heads/feature/login &lt;new&gt; &lt;old&gt; # CAS</code></pre>
    <p>La forme à trois arguments est compare-and-set ; elle refuse si la valeur courante diffère.</p>
    <h2>Refs packées</h2>
    <p>Pour la performance, Git peut packer plusieurs refs dans un seul fichier <code>.git/packed-refs</code>. <code>git pack-refs --all</code> fait cela ; les écritures futures vont toujours dans des fichiers libres jusqu'au prochain pack.</p>
    <h2>Syntaxe des refspecs</h2>
    <p>Les remotes utilisent des <em>refspecs</em> pour mapper entre refs locales et distantes :</p>
    <pre><code>+refs/heads/*:refs/remotes/origin/*</code></pre>
    <p>Le <code>+</code> en tête signifie « mise à jour forcée ». Cette ligne unique est ce qui fait que <code>git fetch</code> peuple <code>refs/remotes/origin/</code>.</p>
    <h2>Le backend reftable</h2>
    <p>Git moderne (2.45+) fournit un format alternatif de stockage de refs appelé <em>reftable</em>, développé à l'origine pour JGit. Reftable stocke des millions de refs efficacement dans un format binaire à structure de log et supporte des transactions atomiques sur de nombreuses refs à la fois. Activez sur un nouveau dépôt :</p>
    <pre><code>git init --ref-format=reftable
    git rev-parse --show-ref-format</code></pre>
    <p>Pour la plupart des utilisateurs, le format classique loose+packed reste très bien. Reftable brille sur les serveurs et sur d'énormes monorepos avec des centaines de milliers de refs (par ex. une ref par pull request).</p>
    <h2>Hiérarchies de refs personnalisées</h2>
    <p>Les refs n'ont pas à vivre sous les quatre namespaces standards. Les outils qui ont besoin de leurs propres noms utilisent des hiérarchies personnalisées sous <code>refs/</code> :</p>
    <ul>
      <li><code>refs/notes/*</code> : <code>git notes</code>.</li>
      <li><code>refs/stash</code> : <code>git stash</code>.</li>
      <li><code>refs/replace/*</code> : <code>git replace</code>.</li>
      <li><code>refs/bisect/*</code> : état de <code>git bisect</code>.</li>
      <li><code>refs/pull/*/head</code> et <code>refs/merge-requests/*/head</code> : fournisseurs d'hébergement.</li>
    </ul>
    <pre><code>git for-each-ref refs/notes/
    git for-each-ref refs/replace/</code></pre>
    <p>Vous pouvez créer les vôtres tant que le nom est une ref valide (pas de double-points, pas d'espaces, pas de tiret en tête).</p>
    <h2>Erreurs fréquentes</h2>
    <p>Éditer les fichiers de refs à la main et finir avec un problème de saut de ligne final ou un fichier à moitié écrit. Utilisez <code>git update-ref</code>. Confondre <code>refs/heads/main</code>, <code>main</code> et <code>refs/main</code> ; <code>git rev-parse --symbolic-full-name</code> résout tout nom court vers sa forme canonique. Nommer une branche et un tag identiquement ; les outils préfèrent alors le tag, créant une confusion subtile. Enfin, supprimer <code>.git/packed-refs</code> pour « nettoyer » ; cela supprime des refs qui n'étaient pas aussi loose. Passez toujours par Git.</p>

- source_title: "The index (staging area) in depth"
  title: "L'index (staging area) en profondeur"
  langcode: fr
  body: |
    <h2>Introduction</h2>
    <p>L'index est un fichier binaire à <code>.git/index</code> qui reflète un objet tree : une liste triée de chemins avec mode, hachage et infos stat. C'est la zone de staging pour le prochain commit et un cache qui permet à Git de sauter le re-hachage des fichiers inchangés.</p>
    <h2>L'inspecter</h2>
    <pre><code>git ls-files --stage
    # 100644 a1b2c3...  0  README.md
    # 100644 e4f5g6...  0  src/main.c</code></pre>
    <p>Stage 0 signifie « pas de conflit ». Pendant un merge, les chemins en conflit obtiennent les stages 1 (base), 2 (ours), 3 (theirs).</p>
    <h2>Ce que le stat caching apporte</h2>
    <p>L'index stocke aussi ctime, mtime, size et inode pour chaque chemin. <code>git status</code> les compare à l'arborescence de travail avant de hacher ; s'ils correspondent, le fichier est supposé inchangé. C'est pourquoi <code>git status</code> est rapide sur d'énormes arbres.</p>
    <pre><code>git update-index --refresh
    git update-index --really-refresh</code></pre>
    <h2>Modifier l'index</h2>
    <pre><code>git add file.txt                  # stager depuis l'arborescence de travail
    git rm --cached file.txt          # retirer de l'index, garder sur disque
    git restore --staged file.txt     # désindexer
    git update-index --chmod=+x bin/run   # changer le bit exécutable</code></pre>
    <h2>Assume unchanged et skip-worktree</h2>
    <p>Deux flags disent à Git d'ignorer certains chemins :</p>
    <pre><code>git update-index --assume-unchanged config.local
    git update-index --skip-worktree config.local</code></pre>
    <ul>
      <li><code>assume-unchanged</code> : un indice de performance ; Git peut quand même remarquer les changements.</li>
      <li><code>skip-worktree</code> : plus fort ; destiné aux fichiers que l'utilisateur garde modifiés localement.</li>
    </ul>
    <p>Aucun ne remplace <code>.gitignore</code> ; les deux sont des bidouillages locaux à l'espace de travail, non partageables.</p>
    <h2>Lire et écrire des trees</h2>
    <pre><code>git write-tree                # capturer l'index comme objet tree
    git read-tree HEAD            # reset l'index à un tree
    git read-tree --reset -u HEAD # met aussi à jour l'arborescence de travail</code></pre>
    <p>Ces commandes de plomberie sous-tendent <code>commit</code>, <code>checkout</code> et <code>merge</code>.</p>
    <h2>Conflits dans l'index</h2>
    <p>Pendant un merge, l'index devient la source de vérité pour ce qui est non résolu :</p>
    <pre><code>git ls-files -u
    # 100644 a1...  1  src/main.c
    # 100644 b2...  2  src/main.c
    # 100644 c3...  3  src/main.c</code></pre>
    <p>Résoudre un conflit signifie écrire le contenu final et le <code>git add</code>, ce qui fait revenir à une seule entrée stage 0.</p>
    <h2>Sparse checkout et l'index sparse</h2>
    <p>Sparse checkout peuple l'arborescence de travail avec seulement un sous-ensemble du tree du dépôt, utile dans les monorepos. Avec le mode cone plus l'index sparse, l'index lui-même se réduit au cône actif, rendant les opérations sur les énormes dépôts rapides :</p>
    <pre><code>git sparse-checkout init --cone
    git sparse-checkout set src/myteam docs
    git sparse-checkout list
    git sparse-checkout disable</code></pre>
    <p>L'index sparse marque les entrées omises avec un bit spécial pour que Git puisse les développer paresseusement seulement quand les commandes en ont besoin. Cette fonctionnalité nécessite Git 2.32 ou plus récent pour une fonctionnalité complète.</p>
    <h2>Erreurs fréquentes</h2>
    <p>Croire que l'index n'est que « ce qui est stagé ». C'est aussi un cache et un traqueur de conflits. Supprimer <code>.git/index</code> en cas de blocage ; reconstruisez avec <code>git read-tree HEAD</code>, mais vous perdez tout staging non commité. Utiliser <code>--assume-unchanged</code> comme substitut à <code>.gitignore</code> ; le prochain clone ne l'honorera pas. Enfin, attendre que l'index suive les répertoires vides ; il ne peut pas. Utilisez un fichier marqueur (<code>.gitkeep</code>) si vous devez commiter un dossier vide.</p>

- source_title: "Branches as lightweight pointers"
  title: "Les branches comme pointeurs légers"
  langcode: fr
  body: |
    <h2>Introduction</h2>
    <p>Dans Git, une branche n'est qu'une référence mobile vers un commit. Créer une branche, c'est créer un fichier de 41 octets. Comparé aux systèmes centralisés où les branches sont des copies complètes de répertoires, le modèle de Git rend le branching assez peu coûteux pour être utilisé avec désinvolture.</p>
    <h2>Ce qu'est réellement une branche</h2>
    <pre><code>cat .git/refs/heads/main
    # a1b2c3d4e5f6...
    git rev-parse main</code></pre>
    <p>Ce hachage est la <em>pointe</em> de la branche. La « branche » elle-même est la chaîne de commits atteignables depuis la pointe via les pointeurs parents.</p>
    <h2>Créer des branches</h2>
    <pre><code>git branch feature/login           # créer, ne pas changer
    git switch -c feature/login        # créer et changer
    git switch -c hotfix v1.2.3        # depuis un tag
    git branch fixup HEAD~3            # depuis une ref relative</code></pre>
    <h2>Déplacer la pointe</h2>
    <p>Chaque commit sur la branche courante avance sa pointe d'un cran. Les commandes qui déplacent les pointes incluent <code>commit</code>, <code>merge</code>, <code>rebase</code>, <code>reset</code> et <code>cherry-pick</code>.</p>
    <pre><code>git commit -m "Work"           # main avance
    git reset --hard HEAD~2        # main recule ; les commits deviennent inatteignables</code></pre>
    <h2>Branches et atteignabilité</h2>
    <p>Un commit est « vivant » tant qu'une ref l'atteint. Supprimez chaque branche et tag pointant vers un commit et il devient <em>dangling</em> ; le garbage collector de Git finit par le supprimer.</p>
    <pre><code>git fsck --unreachable
    git gc</code></pre>
    <h2>Suivre l'upstream</h2>
    <p>Une branche locale peut être liée à une branche de tracking distant :</p>
    <pre><code>git branch --set-upstream-to=origin/main main
    git branch -u origin/main
    git status            # affiche avance/retard d'après le lien</code></pre>
    <h2>Maintenance des branches</h2>
    <pre><code>git branch --merged main           # branches entièrement mergées
    git branch --no-merged main        # branches avec travail non mergé
    git branch -d feature/old          # supprimer mergée
    git branch -D feature/discarded    # supprimer de force</code></pre>
    <h2>Comparer les branches</h2>
    <pre><code>git log main..feature/login --oneline
    git diff main...feature/login
    git range-diff main..@{u} main..HEAD</code></pre>
    <p><code>range-diff</code> est excellent pour comparer deux versions d'une branche rebase.</p>
    <h2>Politiques de branches sur les hôtes</h2>
    <p>La plupart des plateformes d'hébergement vous permettent de protéger les branches par motif de nom : exiger des pull requests, des commits signés, une CI passante ou des reviewers spécifiques avant qu'un push soit accepté. Le côté Git de cela est implémenté via les hooks <code>pre-receive</code> ; le côté plateforme est de la configuration. Depuis votre clone local, la protection de branche est invisible jusqu'à ce que votre push soit rejeté, moment où le serveur explique pourquoi. Pour inspecter la protection en ligne de commande, utilisez la CLI de l'hôte (<code>gh</code>, <code>glab</code>) ou son API.</p>
    <pre><code>gh api repos/owner/repo/branches/main/protection</code></pre>
    <h2>Erreurs fréquentes</h2>
    <p>Imaginer les branches comme des conteneurs de commits. Elles ne le sont pas ; les commits existent indépendamment et de nombreuses branches peuvent atteindre le même commit. Supprimer une branche « feature » et supposer que les commits sont partis ; ils ne sont partis qu'après être devenus inatteignables <em>et</em> que le reflog ait expiré (90 jours par défaut). Utiliser de longs noms de branche d'un seul mot qui entrent en collision avec des noms de fichiers ; les séparateurs <code>--</code> évitent l'ambiguïté. Enfin, travailler directement sur <code>main</code> dans un dépôt partagé ; faites toujours une branche pour le travail non trivial, même si vous comptez faire un fast-forward plus tard.</p>

- source_title: "Merging: fast-forward vs three-way merge"
  title: "Merge : fast-forward vs merge trois-voies"
  langcode: fr
  body: |
    <h2>Introduction</h2>
    <p>Git a deux résultats de merge fondamentalement différents : <strong>fast-forward</strong>, où la pointe d'une branche est simplement déplacée, et <strong>trois-voies</strong>, où un nouveau commit avec deux parents est créé. Le choix dépend de si les branches ont divergé.</p>
    <h2>Fast-forward</h2>
    <p>Si la pointe de <code>main</code> est un ancêtre de <code>feature</code>, aucun vrai merge n'est nécessaire. Git fait simplement avancer <code>main</code> :</p>
    <pre><code>      A---B---C   feature
         /
    main

    # après git merge feature
    A---B---C   main, feature</code></pre>
    <p>Commande :</p>
    <pre><code>git switch main
    git merge feature</code></pre>
    <p>Pour forcer un vrai merge commit même quand un fast-forward est possible :</p>
    <pre><code>git merge --no-ff feature</code></pre>
    <h2>Merge trois-voies</h2>
    <p>Quand les deux branches ont divergé, Git trouve la <em>base de merge</em> (l'ancêtre commun le plus récent) et combine les changements des deux côtés :</p>
    <pre><code>      A---B---C   feature
         /
    A---D---E   main

    # après git merge feature
    A---D---E---M   main
         \     /
          B---C   feature</code></pre>
    <p>La stratégie de merge par défaut de Git depuis 2.33 est <code>ort</code> ; avant c'était <code>recursive</code>. Les deux calculent un merge trois-voies par fichier en utilisant la base de merge.</p>
    <h2>Inspecter</h2>
    <pre><code>git merge-base main feature
    git log --oneline --graph --all
    git show --stat HEAD          # voir le merge commit</code></pre>
    <h2>Stratégies et options</h2>
    <pre><code>git merge -X ours feature        # préférer notre côté en cas de conflit
    git merge -X theirs feature      # préférer leur côté
    git merge -X ignore-space-change feature
    git merge --squash feature       # appliquer les changements sans merge commit</code></pre>
    <p><code>--squash</code> crée un commit unique contenant tous les changements de <code>feature</code>, sans lien parent vers elle. Utile pour un historique propre mais perd le détail par commit.</p>
    <h2>Annuler et défaire</h2>
    <pre><code>git merge --abort                # en plein merge, retour à l'état pré-merge
    git reset --hard ORIG_HEAD       # après un merge terminé, l'annuler</code></pre>
    <h2>Configurer la politique fast-forward</h2>
    <pre><code>git config --global merge.ff false      # toujours créer un merge commit
    git config --global merge.ff only      # seulement fast-forward, refuser sinon
    git config --global pull.ff only       # idem pour les pulls</code></pre>
    <h2>Pilotes de merge et attributs</h2>
    <p>Certains fichiers se mergent mal avec un trois-voies textuel (lockfiles générés par machine, documentation générée). Configurez un pilote de merge personnalisé via <code>.gitattributes</code> et <code>git config</code> :</p>
    <pre><code># .gitattributes
    package-lock.json merge=ours
    Gemfile.lock merge=union</code></pre>
    <pre><code>git config merge.ours.driver true
    git config merge.union.name "Line union merge"
    git config merge.union.driver "git merge-file --union %A %O %B"</code></pre>
    <p>La stratégie <code>union</code> intégrée garde les deux côtés ; <code>ours</code> choisit toujours notre version ; les pilotes personnalisés peuvent exécuter n'importe quel programme. À utiliser avec parcimonie ; un comportement de merge surprenant déroute les reviewers.</p>
    <h2>Erreurs fréquentes</h2>
    <p>Croire que le fast-forward est en quelque sorte spécial ou risqué ; il ne l'est pas, c'est juste un déplacement de pointeur. Utiliser <code>--no-ff</code> sur chaque merge dans un projet à évolution rapide, polluant l'historique avec des merge commits vides. Utiliser <code>-X ours</code> alors que vous vouliez <code>--strategy=ours</code> (qui abandonne entièrement l'autre côté) ou vice versa. Enfin, éditer manuellement le message de merge commit après coup et casser la formulation standardisée « Merge branch 'X' » sur laquelle s'appuient les outils ; si vous devez éditer, faites-le avant <code>git commit</code>.</p>

- source_title: "The reflog: your safety net"
  title: "Le reflog : votre filet de sécurité"
  langcode: fr
  body: |
    <h2>Introduction</h2>
    <p>Le <em>reflog</em> enregistre chaque changement de <code>HEAD</code> et de chaque pointe de branche sur votre machine locale. Il est local, par clone, et n'est pas poussé. Presque tout commit « perdu » peut être sauvé via lui.</p>
    <h2>Visualiser</h2>
    <pre><code>git reflog                            # reflog HEAD
    git reflog show main                  # reflog de main
    git reflog --date=iso
    git log -g --oneline                  # parcours de log à travers le reflog</code></pre>
    <p>Chaque entrée a une séquence (<code>HEAD@{0}</code>, <code>HEAD@{1}</code>, ...), une action (<code>commit</code>, <code>reset</code>, <code>merge</code>, <code>rebase</code>, ...), et un SHA cible.</p>
    <h2>Récupérer un commit perdu</h2>
    <pre><code>git reflog
    # 9f8a1c2 HEAD@{0}: reset: moving to HEAD~3
    # a1b2c3d HEAD@{1}: commit: Important work
    git switch -c rescued a1b2c3d</code></pre>
    <p>Ou directement :</p>
    <pre><code>git reset --hard HEAD@{1}</code></pre>
    <h2>Syntaxe basée sur le temps</h2>
    <pre><code>git show HEAD@{2.hours.ago}
    git diff main@{yesterday} main</code></pre>
    <p>Git interprète <code>@{...}</code> soit comme un compteur, soit comme une date.</p>
    <h2>Expiration du reflog</h2>
    <p>Par défaut, les entrées atteignables du reflog expirent après 90 jours, et les inatteignables après 30 :</p>
    <pre><code>git config gc.reflogExpire 90.days
    git config gc.reflogExpireUnreachable 30.days</code></pre>
    <p>Jusqu'à expiration, même les commits hard-resettés restent récupérables.</p>
    <h2>Reflogs par ref</h2>
    <p>Chaque branche a son propre reflog à <code>.git/logs/refs/heads/&lt;name&gt;</code>. Le stash en a un aussi (<code>refs/stash</code>) :</p>
    <pre><code>git reflog show stash</code></pre>
    <h2>Élaguer le reflog</h2>
    <pre><code>git reflog expire --expire=now --all
    git gc --prune=now</code></pre>
    <p>À utiliser seulement si vous devez supprimer définitivement des données ; cela retire le filet de sécurité.</p>
    <h2>Reflog vs git log</h2>
    <p><code>git log</code> parcourt le graphe de commits par les pointeurs parents ; le reflog parcourt les mouvements enregistrés d'une ref. Après un reset forcé, <code>git log</code> n'affiche plus les commits abandonnés, mais le reflog le fait encore.</p>
    <h2>Inspection du reflog par ref</h2>
    <p>Chaque ref garde son propre reflog. Inspectez le reflog d'une branche spécifique pour voir comment sa pointe a bougé :</p>
    <pre><code>git reflog show feature/login
    git log -g feature/login --oneline
    cat .git/logs/refs/heads/feature/login</code></pre>
    <p>Utile pour enquêter sur « qui a déplacé cette branche ? » sur un clone local. Le format de fichier reflog est une ligne par changement avec ancien SHA, nouveau SHA, committer, horodatage et un message textuel. Combiné avec <code>git blame</code> sur le fichier, il donne une piste d'audit locale complète ; rappelez-vous que les reflogs ne sont pas poussés, donc la piste ne couvre que votre machine.</p>
    <h2>Erreurs fréquentes</h2>
    <p>Oublier l'existence du reflog en panique et refaire des heures de travail facilement récupérable. Vérifiez toujours <code>git reflog</code> en premier. Pousser pendant la récupération et supposer que le reflog est sur le serveur ; il ne l'est pas, seul votre clone local l'a. Exécuter <code>git gc --prune=now</code> par instinct de « nettoyage » et détruire le filet de sécurité pour tout commit non référencé. Et enfin, traiter les entrées de reflog comme éternelles ; les refs supprimées de longue date vieillissent. Taggez ou branchez tout ce que vous voulez garder avant 30 jours.</p>

- source_title: "Detached HEAD state explained"
  title: "L'état HEAD détaché expliqué"
  langcode: fr
  body: |
    <h2>Introduction</h2>
    <p>Normalement, <code>HEAD</code> pointe vers une ref de branche, qui pointe à son tour vers un commit. En <em>HEAD détaché</em>, <code>HEAD</code> pointe directement vers un commit. Le HEAD détaché n'est pas cassé ; c'est un mode délibéré utile pour inspecter l'historique et dangereux pour commiter sans réfléchir.</p>
    <h2>Comment vous y arrivez</h2>
    <pre><code>git checkout v1.2.3
    git switch --detach v1.2.3
    git checkout HEAD~5
    git checkout origin/main      # le tracking distant est lecture-seule-ish</code></pre>
    <p>Chacun de ceux-ci met <code>HEAD</code> directement sur un commit au lieu d'une branche.</p>
    <h2>Inspecter</h2>
    <pre><code>cat .git/HEAD
    # a1b2c3d4...   (SHA brut, pas "ref: ...")
    git status
    # HEAD detached at v1.2.3</code></pre>
    <h2>Pourquoi il existe</h2>
    <ul>
      <li>Inspecter une ancienne release sans affecter aucune branche.</li>
      <li>Bisecter (<code>git bisect</code> utilise HEAD détaché).</li>
      <li>Construire une expérience rapide que vous pourrez jeter.</li>
      <li>Opérer sur un tag qui doit rester immobile.</li>
    </ul>
    <h2>Commiter en HEAD détaché</h2>
    <p>Vous pouvez commiter en HEAD détaché, et l'objet commit est créé normalement. Le hic : aucune branche ne pointe vers lui. Changez de branche et le commit devient inatteignable.</p>
    <pre><code>git switch --detach v1.2.3
    echo fix > patch.txt
    git add patch.txt
    git commit -m "Quick fix"
    git switch main             # le nouveau commit est maintenant orphelin</code></pre>
    <p>Ancrez-le avant de changer :</p>
    <pre><code>git switch -c hotfix/1.2.4</code></pre>
    <h2>Récupérer après détachement accidentel</h2>
    <p>Si vous avez déjà changé, le reflog a le commit :</p>
    <pre><code>git reflog
    # a1b2c3d HEAD@{1}: commit: Quick fix
    git switch -c hotfix/1.2.4 a1b2c3d</code></pre>
    <h2>Quand le HEAD détaché n'est pas détaché</h2>
    <p>Les dépôts nus ont souvent <code>HEAD</code> comme ref symbolique vers <code>refs/heads/main</code> même s'il n'y a pas d'arborescence de travail. Les sous-modules font aussi intentionnellement un checkout en HEAD détaché sur le commit enregistré ; c'est normal.</p>
    <h2>Configurer les avertissements</h2>
    <pre><code>git config --global advice.detachedHead true   # défaut : afficher le conseil</code></pre>
    <p>Les débutants devraient laisser cela activé ; le texte d'avertissement explique exactement comment récupérer.</p>
    <h2>Travailler en sécurité en détaché</h2>
    <p>Si vous voulez intentionnellement expérimenter sans affecter aucune branche, le HEAD détaché est le bon outil. L'astuce est d'ancrer le travail important avant de changer. Un motif fiable :</p>
    <pre><code>git switch --detach v1.2.3
    # ... expérimenter, commiter ...
    git tag tmp/experiment           # signet
    git switch main
    # plus tard
    git switch -c rescued tmp/experiment
    git tag -d tmp/experiment</code></pre>
    <p>Le namespace de tags <code>tmp/</code> rend évident que ce sont des ancres jetables. Certaines équipes réservent un préfixe entier à cet usage et font ignorer ce préfixe par la CI.</p>
    <h2>Erreurs fréquentes</h2>
    <p>Traiter l'avertissement comme une erreur effrayante et paniquer. C'est informatif. Faire un travail important en HEAD détaché puis exécuter <code>git switch main</code> sans créer une branche d'abord ; récupérez via le reflog, mais mieux vaut ancrer d'abord. Confondre HEAD détaché avec un dépôt corrompu ; rien n'est corrompu, vous manquez juste d'une étiquette de branche. Enfin, pousser en détaché : <code>git push</code> a besoin d'une branche aux deux extrémités. Soit créez une branche locale et poussez-la, soit utilisez <code>git push origin HEAD:refs/heads/new</code>.</p>

- source_title: "Remote-tracking branches"
  title: "Branches de tracking distant"
  langcode: fr
  body: |
    <h2>Introduction</h2>
    <p>Une branche de tracking distant est une ref locale qui reflète une branche sur un remote. Elles vivent sous <code>refs/remotes/&lt;remote&gt;/</code> et sont mises à jour par <code>git fetch</code> (et les opérations qui impliquent un fetch, comme <code>git pull</code> et <code>git clone</code>). Vous ne commitez pas directement vers elles.</p>
    <h2>D'où elles viennent</h2>
    <p>Le refspec par défaut pour <code>origin</code> est :</p>
    <pre><code>+refs/heads/*:refs/remotes/origin/*</code></pre>
    <p>Donc quand le serveur a <code>refs/heads/main</code>, votre clone obtient <code>refs/remotes/origin/main</code>. Le <code>+</code> en tête signifie « mise à jour forcée ».</p>
    <h2>Lister</h2>
    <pre><code>git branch -r
    git branch -a                # locales + tracking distant
    git branch -vv               # affiche l'upstream des locales</code></pre>
    <h2>Lier une branche locale à l'une d'elles</h2>
    <pre><code>git switch feature/login                       # crée auto une locale depuis origin/feature/login
    git switch -c mine origin/feature/login        # explicite
    git branch -u origin/main                      # définit l'upstream de la branche courante
    git branch --unset-upstream</code></pre>
    <p>Le lien <em>upstream</em> pilote l'avance/retard de <code>git status</code>, et les cibles par défaut pour <code>git push</code> et <code>git pull</code>.</p>
    <h2>Élaguer</h2>
    <p>Les branches de tracking distant ne disparaissent pas quand la branche distante est supprimée. Élaguez-les :</p>
    <pre><code>git fetch --prune
    git remote prune origin
    git config --global fetch.prune true</code></pre>
    <h2>Le HEAD distant spécial</h2>
    <p>Chaque remote a un <code>HEAD</code> symbolique indiquant sa branche par défaut :</p>
    <pre><code>git symbolic-ref refs/remotes/origin/HEAD
    git remote set-head origin --auto    # interroger le serveur</code></pre>
    <p>C'est ce qui fait que <code>origin</code> seul résout vers <code>origin/main</code> (ou quel que soit le défaut).</p>
    <h2>Differ contre une branche de tracking distant</h2>
    <pre><code>git fetch
    git log HEAD..origin/main --oneline      # ce qui est en upstream
    git log origin/main..HEAD --oneline      # ce qui est local seulement
    git diff @{u}                            # vs upstream</code></pre>
    <p><code>@{u}</code> (ou <code>@{upstream}</code>) est un raccourci pour l'upstream configuré de la branche courante.</p>
    <h2>Comportement de push</h2>
    <p>Le défaut <code>push.default = simple</code> pousse la branche courante vers son upstream du même nom. Si vous poussez une branche sans upstream et avez <code>push.autoSetupRemote = true</code> (Git 2.37+), l'upstream est créé automatiquement.</p>
    <h2>Détails des refspecs</h2>
    <p>Le refspec de fetch pour un remote peut être personnalisé pour fetcher des refs supplémentaires ou les mapper différemment. Par exemple, pour aussi récupérer les refs de PR GitHub et les refs de MR GitLab :</p>
    <pre><code>git config --add remote.origin.fetch '+refs/pull/*/head:refs/remotes/origin/pr/*'
    git config --add remote.origin.fetch '+refs/merge-requests/*/head:refs/remotes/origin/mr/*'</code></pre>
    <p>Le <code>+</code> en tête signifie « mise à jour forcée », nécessaire parce que les refs de PR peuvent bouger (rebases sur la branche de PR). Après le fetch, les PRs du serveur apparaissent comme des refs locales <code>origin/pr/*</code>, prêtes pour <code>git switch -c review/&lt;n&gt; origin/pr/&lt;n&gt;</code>.</p>
    <h2>Erreurs fréquentes</h2>
    <p>Essayer <code>git checkout origin/main</code> et éditer ; cela vous met en HEAD détaché parce que <code>origin/main</code> est en lecture seule. Créez plutôt une branche de tracking. Oublier de faire <code>git fetch</code> et être trompé par des compteurs avance/retard obsolètes. Traiter les branches de tracking distant comme si pousser vers elles mettait à jour le serveur ; ce sont des miroirs locaux. Utilisez <code>git push origin main</code>. Enfin, supprimer <code>origin/main</code> avec <code>git branch -dr</code> et supposer que la branche du serveur est partie ; elle ne l'est pas. Utilisez <code>git push origin --delete main</code> et seulement quand vous le pensez vraiment.</p>

- source_title: "Working tree, index, and repository: the three areas"
  title: "Arborescence de travail, index et dépôt : les trois zones"
  langcode: fr
  body: |
    <h2>Introduction</h2>
    <p>Chaque opération Git déplace des données entre trois zones : l'<strong>arborescence de travail</strong> (vos fichiers), l'<strong>index</strong> (le brouillon du prochain commit) et le <strong>dépôt</strong> (l'historique commité sous <code>.git</code>). Nommer ce qui se déplace où est le modèle mental le plus utile.</p>
    <h2>Les zones</h2>
    <ul>
      <li><strong>Arborescence de travail</strong> : le répertoire dans lequel vous éditez.</li>
      <li><strong>Index</strong> : <code>.git/index</code>, le tree stagé.</li>
      <li><strong>Dépôt</strong> : objets dans <code>.git/objects</code> plus refs dans <code>.git/refs</code>.</li>
    </ul>
    <h2>Commandes par direction</h2>
    <pre><code># arborescence de travail -> index
    git add file
    git rm file
    git mv old new

    # index -> dépôt
    git commit
    git write-tree   # plomberie

    # dépôt -> index
    git reset &lt;commit&gt;
    git read-tree &lt;tree&gt;

    # dépôt -> arborescence de travail (et généralement index)
    git checkout &lt;commit&gt; -- file
    git restore --source &lt;commit&gt; file
    git switch &lt;branch&gt;</code></pre>
    <h2>Les quatre diffs</h2>
    <p>Vous pouvez comparer n'importe quelles deux zones :</p>
    <pre><code>git diff                  # arborescence de travail vs index
    git diff --staged         # index vs HEAD
    git diff HEAD             # arborescence de travail vs HEAD
    git diff main feature     # dépôt vs dépôt</code></pre>
    <h2>Status décodé</h2>
    <pre><code>git status -s
    # XY filename
    # X = statut index, Y = statut arborescence de travail
    # M modifié, A ajouté, D supprimé, R renommé, ?? non suivi</code></pre>
    <p>Par exemple <code>MM</code> signifie modifié à la fois dans l'index et l'arborescence de travail (vous avez stagé un changement puis édité encore).</p>
    <h2>Reset, restore, checkout</h2>
    <p>Chacun affecte différentes zones :</p>
    <ul>
      <li><code>git reset --soft</code> : seulement le dépôt (déplacer la ref).</li>
      <li><code>git reset</code> (mixed) : dépôt + index.</li>
      <li><code>git reset --hard</code> : dépôt + index + arborescence de travail.</li>
      <li><code>git restore --staged</code> : index depuis HEAD.</li>
      <li><code>git restore</code> : arborescence de travail depuis l'index.</li>
      <li><code>git restore --source=&lt;commit&gt;</code> : arborescence de travail (et optionnellement index) depuis un commit spécifique.</li>
    </ul>
    <h2>Un exercice</h2>
    <pre><code>echo a &gt; f.txt
    git add f.txt
    git commit -m "v1"
    echo b &gt;&gt; f.txt
    git add f.txt
    echo c &gt;&gt; f.txt
    git status
    git diff
    git diff --staged
    git diff HEAD</code></pre>
    <p>Lisez chaque diff ; comprendre pourquoi ils diffèrent cimente le modèle.</p>
    <h2>Plomberie pour chaque zone</h2>
    <p>Connaître la plomberie pour chaque zone démystifie les commandes de plus haut niveau :</p>
    <ul>
      <li>Arborescence de travail : opérations ordinaires de système de fichiers.</li>
      <li>Index : <code>git update-index</code>, <code>git ls-files</code>, <code>git read-tree</code>, <code>git write-tree</code>.</li>
      <li>Base de données d'objets : <code>git hash-object</code>, <code>git cat-file</code>, <code>git mktree</code>, <code>git commit-tree</code>.</li>
      <li>Refs : <code>git update-ref</code>, <code>git symbolic-ref</code>, <code>git for-each-ref</code>.</li>
    </ul>
    <pre><code>git ls-files --stage              # index
    git ls-tree HEAD                  # dépôt
    ls -R                             # arborescence de travail</code></pre>
    <h2>Erreurs fréquentes</h2>
    <p>Essayer de mémoriser les commandes au lieu des zones ; une fois que vous savez quelle zone est la source et laquelle est la destination, la bonne commande est évidente. Confondre <code>git restore file</code> avec <code>git checkout file</code> ; ils sont équivalents pour ce cas, mais les nombreux autres modes de <code>checkout</code> déroutent les nouveaux utilisateurs. Utiliser <code>git reset --hard</code> pour « nettoyer » sans réaliser que cela détruit l'arborescence de travail. Et enfin, attendre que <code>git commit</code> inclue les éditions non stagées ; il ne le fait pas (sauf si vous passez <code>-a</code> pour les fichiers suivis seulement).</p>

- source_title: "How commits are linked: the commit graph"
  title: "Comment les commits sont liés : le graphe de commits"
  langcode: fr
  body: |
    <h2>Introduction</h2>
    <p>Un commit Git référence zéro, un ou plusieurs commits <em>parents</em>. Tout l'historique est un graphe acyclique dirigé (DAG) de ces liens parents. Les branches et tags sont simplement des étiquettes sur des nœuds de ce graphe.</p>
    <h2>Anatomie d'un lien parent</h2>
    <pre><code>git cat-file -p HEAD
    # tree 9f1a...
    # parent b2c3...
    # parent d4e5...        (uniquement sur les merge commits)
    # author Ada ...
    # committer Ada ...</code></pre>
    <p>Un parent : historique linéaire. Deux parents : un merge. Zéro parent : un commit racine. Trois ou plus : un merge octopus.</p>
    <h2>Parcourir le graphe</h2>
    <pre><code>git log --oneline --graph --all
    git log --first-parent           # suivre uniquement les premiers parents
    git log --topo-order
    git log --date-order</code></pre>
    <p><code>--first-parent</code> sur <code>main</code> est excellent pour voir le « tronc » de l'historique sans le bruit des côtés de merges.</p>
    <h2>Requêtes d'ancêtralité</h2>
    <pre><code>git merge-base A B               # ancêtre commun le plus récent
    git merge-base --is-ancestor X Y   # exit 0 si X est ancêtre de Y
    git rev-list A..B --count          # commits dans B pas dans A</code></pre>
    <h2>Syntaxe de plage</h2>
    <ul>
      <li><code>A..B</code> : commits atteignables depuis B mais pas A.</li>
      <li><code>A...B</code> : différence symétrique.</li>
      <li><code>^A B</code> : équivalent à <code>A..B</code>.</li>
      <li><code>B --not A</code> : équivalent à <code>A..B</code>.</li>
    </ul>
    <pre><code>git log main..feature
    git log main...feature --left-right --oneline</code></pre>
    <h2>Le fichier commit-graph</h2>
    <p>Depuis Git 2.18, Git peut écrire un fichier <code>commit-graph</code> qui pré-calcule les données d'ancêtralité pour les énormes dépôts :</p>
    <pre><code>git commit-graph write --reachable
    git config --global core.commitGraph true
    git config --global gc.writeCommitGraph true</code></pre>
    <p>Cela accélère considérablement <code>git log --graph</code>, <code>git merge-base</code> et les vérifications d'atteignabilité.</p>
    <h2>Merges octopus</h2>
    <p>Un seul merge commit peut avoir plusieurs parents :</p>
    <pre><code>git merge feature1 feature2 feature3</code></pre>
    <p>Les merges octopus ne réussissent que sans conflits. Ils sont utiles pour les branches d'intégration dans certains workflows mais rarement nécessaires.</p>
    <h2>Visualiser le graphe</h2>
    <pre><code>git log --oneline --graph --decorate --all
    gitk --all
    git log --pretty=format:'%h %p %s'</code></pre>
    <p><code>%p</code> affiche les SHAs des parents.</p>
    <h2>Numéros de génération</h2>
    <p>Le fichier commit-graph stocke un numéro de génération par commit : 1 pour les commits racines, max(générations parents) + 1 sinon. Les numéros de génération transforment de nombreuses requêtes d'ancêtralité en opérations O(log n). Git moderne (2.27+) écrit des dates de commit corrigées et des numéros de génération v2 quand le commit-graph est activé :</p>
    <pre><code>git commit-graph write --reachable --changed-paths
    git config gc.writeCommitGraph true
    git config core.commitGraph true
    git log --oneline --graph -n 5</code></pre>
    <p><code>--changed-paths</code> enregistre en plus un filtre de Bloom par commit listant les chemins modifiés, accélérant considérablement les requêtes <code>git log</code> limitées par chemin.</p>
    <h2>Erreurs fréquentes</h2>
    <p>Imaginer les branches comme des piles séparées de commits ; ce sont des étiquettes sur des nœuds qui peuvent partager des ancêtres. Utiliser <code>HEAD~3</code> sur un merge commit et être surpris : <code>~</code> suit toujours le premier parent. Utilisez <code>^2</code>, <code>^3</code> pour sauter à d'autres parents. Oublier que rebase réécrit la topologie du graphe en créant de nouveaux commits avec de nouveaux pointeurs parents ; les anciens commits vivent dans le reflog. Enfin, croire que le commit graph stocke des diffs ; il ne stocke que les trees et les parents. Les diffs sont calculés à la demande en comparant les trees.</p>

- source_title: "Pack files and object storage"
  title: "Fichiers pack et stockage des objets"
  langcode: fr
  body: |
    <h2>Introduction</h2>
    <p>Git stocke les objets dans deux formats : <em>loose</em> (un fichier par objet sous <code>.git/objects/xx/yyyy...</code>) et <em>packé</em> (plusieurs objets dans un seul fichier <code>.pack</code> avec un compagnon <code>.idx</code>). Les packs sont bien plus efficaces sur disque et sur le réseau.</p>
    <h2>Disposition</h2>
    <pre><code>.git/objects/
      00/  ... objets loose, nommés par sha moins les deux premiers caractères
      pack/
        pack-&lt;hash&gt;.pack    # les données
        pack-&lt;hash&gt;.idx     # index d'offset
        pack-&lt;hash&gt;.rev     # index inverse (Git 2.31+)</code></pre>
    <h2>Pourquoi les packs</h2>
    <ul>
      <li>Un fichier par objet est brutal sur les systèmes de fichiers avec des millions de fichiers.</li>
      <li>Les packs appliquent la <em>compression delta</em> : stocker des blobs similaires comme une base plus un diff.</li>
      <li>Les packs utilisent zlib en plus des deltas.</li>
      <li>Les fetch/push intelligents transfèrent directement les données pack.</li>
    </ul>
    <h2>Déclencher le packing</h2>
    <pre><code>git gc                    # maintenance de routine
    git gc --aggressive       # recherche de delta plus lourde
    git repack -a -d -f       # recréer un seul pack à partir de tous les objets
    git fetch                 # peut aussi produire des packs</code></pre>
    <p>L'auto-gc se déclenche quand le dépôt accumule trop d'objets loose ; ajustez avec <code>gc.auto</code>.</p>
    <h2>Inspecter les packs</h2>
    <pre><code>ls .git/objects/pack
    git verify-pack -v .git/objects/pack/pack-&lt;hash&gt;.idx | head
    git count-objects -v</code></pre>
    <p><code>verify-pack -v</code> affiche le type, la taille, la taille packée et si chaque objet est un delta contre un autre.</p>
    <h2>Index multi-pack</h2>
    <p>Pour les très gros dépôts, plusieurs packs peuvent être unifiés par un seul index :</p>
    <pre><code>git multi-pack-index write
    git config core.multiPackIndex true</code></pre>
    <h2>Bitmaps d'atteignabilité</h2>
    <p>Les bitmaps accélèrent les requêtes d'atteignabilité (utilisées par clone et fetch sur les serveurs d'hébergement) :</p>
    <pre><code>git repack -adb        # construire le bitmap
    git config repack.writeBitmaps true</code></pre>
    <p>Les bitmaps sont les plus utiles quand on sert de nombreux clones ou en exécutant de grandes requêtes <code>git rev-list</code>.</p>
    <h2>Détails de compression d'objets</h2>
    <p>Un delta dans un pack stocke une référence à un objet <em>base</em> et un flux d'instructions. La base peut être elle-même un delta. Git limite les chaînes de deltas via <code>pack.depth</code> (défaut 50). La base choisie est généralement un blob similaire, souvent une version précédente du même fichier.</p>
    <h2>Repacking géométrique</h2>
    <p>Maintenir un seul énorme pack est coûteux ; le réécrire à chaque gc est gaspilleur. Git moderne supporte le repacking <em>géométrique</em>, qui maintient une chaîne de packs de tailles géométriquement croissantes et ne repack que les petits :</p>
    <pre><code>git repack --geometric=2 -d --write-bitmap-index
    git config maintenance.incremental-repack.enabled true
    git maintenance run --task incremental-repack</code></pre>
    <p>Cela rend la maintenance de routine bornée : chaque gc ne touche que les plus petits packs. Combiné avec les index multi-pack et les bitmaps d'atteignabilité, le repack géométrique est la configuration recommandée pour les dépôts grands ou actifs.</p>
    <h2>Erreurs fréquentes</h2>
    <p>Supprimer manuellement un fichier <code>.pack</code> pour récupérer de l'espace, cassant le dépôt. Le pack contient de nombreux objets atteignables ; utilisez <code>git gc --prune</code>. Exécuter <code>git gc --aggressive</code> sur un planning ; c'est coûteux et améliore rarement par rapport à un <code>gc</code> normal. Garder des millions d'objets loose (après une récupération bâclée) puis faire <code>git status</code> sur un système de fichiers lent ; packez d'abord. Enfin, transférer des packs en copiant des fichiers au lieu d'utiliser <code>git clone --bare</code> ; vous pouvez manquer le <code>.idx</code> ou sauter des fonctionnalités plus récentes comme l'index multi-pack.</p>

- source_title: "The ORIG_HEAD, MERGE_HEAD, and CHERRY_PICK_HEAD refs"
  title: "Les refs ORIG_HEAD, MERGE_HEAD et CHERRY_PICK_HEAD"
  langcode: fr
  body: |
    <h2>Introduction</h2>
    <p>Git garde plusieurs refs spéciales « auxiliaires » dans <code>.git/</code> pour enregistrer l'état pendant les opérations multi-étapes. Les connaître transforme les récupérations effrayantes en one-liners.</p>
    <h2>ORIG_HEAD</h2>
    <p><code>ORIG_HEAD</code> est défini chaque fois qu'une opération « dangereuse » déplace beaucoup <code>HEAD</code> : merge, rebase, reset, am. Il capture la pointe précédente pour que vous puissiez annuler :</p>
    <pre><code>git merge feature
    # décide que c'était une erreur
    git reset --hard ORIG_HEAD</code></pre>
    <p>Même astuce après un mauvais rebase ou reset :</p>
    <pre><code>git rebase main
    git reset --hard ORIG_HEAD     # retour à l'état pré-rebase</code></pre>
    <h2>MERGE_HEAD</h2>
    <p>Pendant un merge, <code>MERGE_HEAD</code> enregistre la pointe de la branche en cours de merge. Il existe du début de <code>git merge</code> jusqu'à ce que le merge commit soit créé ou que le merge soit annulé :</p>
    <pre><code>git merge feature
    cat .git/MERGE_HEAD
    git merge --abort                # supprime MERGE_HEAD</code></pre>
    <p>Si vous avez fini de résoudre les conflits et voulez écrire le merge commit :</p>
    <pre><code>git commit                       # utilise MERGE_HEAD pour enregistrer le second parent</code></pre>
    <h2>MERGE_MSG et AUTO_MERGE</h2>
    <p>Les fichiers compagnons incluent <code>.git/MERGE_MSG</code> (le message de commit préparé) et, depuis Git 2.40, <code>AUTO_MERGE</code> (un tree contenant la meilleure résolution automatique de Git). Ce dernier est utile pour différencier votre résolution manuelle.</p>
    <h2>CHERRY_PICK_HEAD et REVERT_HEAD</h2>
    <p>Pendant un cherry-pick ou un revert, Git enregistre le commit source :</p>
    <pre><code>git cherry-pick a1b2c3d
    cat .git/CHERRY_PICK_HEAD
    git cherry-pick --abort
    git cherry-pick --continue        # après résolution des conflits</code></pre>
    <p>Le même motif s'applique à <code>git revert</code> avec <code>REVERT_HEAD</code>.</p>
    <h2>BISECT_HEAD et REBASE_HEAD</h2>
    <p>Lors d'un bisect ou rebase, Git écrit aussi <code>BISECT_HEAD</code> ou <code>REBASE_HEAD</code> pour suivre l'état en cours. Des outils comme <code>git status</code> les utilisent pour afficher des messages précis « vous êtes au milieu d'un X ».</p>
    <h2>FETCH_HEAD</h2>
    <p>Après un fetch, <code>FETCH_HEAD</code> liste ce qui a été fetché, une ref par ligne. <code>git pull</code> le lit pour savoir quoi merger :</p>
    <pre><code>git fetch origin main
    cat .git/FETCH_HEAD
    git merge FETCH_HEAD</code></pre>
    <h2>Mettre tout ensemble</h2>
    <pre><code>git status                         # référence tous ces refs au besoin
    ls .git/*HEAD                      # liste les refs auxiliaires courantes</code></pre>
    <h2>Détecter les opérations en cours</h2>
    <p><code>git status</code> lit ces refs auxiliaires pour vous dire ce qui est en cours. Les scripts peuvent faire de même en testant l'existence des fichiers :</p>
    <pre><code>if test -f "$(git rev-parse --git-dir)/MERGE_HEAD"; then
        echo "merge en cours"
    fi
    if test -f "$(git rev-parse --git-dir)/CHERRY_PICK_HEAD"; then
        echo "cherry-pick en cours"
    fi
    if test -d "$(git rev-parse --git-dir)/rebase-merge"; then
        echo "rebase interactif en cours"
    fi</code></pre>
    <p>C'est exactement ce que font les intégrations d'invite shell comme <code>__git_ps1</code> pour afficher <code>(main|MERGING)</code>.</p>
    <h2>Erreurs fréquentes</h2>
    <p>Essayer de supprimer <code>MERGE_HEAD</code> manuellement pour échapper à un merge ; utilisez <code>git merge --abort</code>. Oublier l'existence d'<code>ORIG_HEAD</code> et recréer des commits à la main après un mauvais reset. Confondre <code>FETCH_HEAD</code> (dernier fetch, transitoire) avec les refs de tracking distant comme <code>origin/main</code> (persistantes). Et enfin, scripter autour de ces refs en supposant qu'elles existent ; <code>MERGE_HEAD</code> n'existe que pendant un merge, donc testez toujours l'existence du fichier avant de le lire.</p>

- source_title: "Annotated tags vs lightweight tags"
  title: "Tags annotés vs tags lightweight"
  langcode: fr
  body: |
    <h2>Introduction</h2>
    <p>Git supporte deux types de tags : <strong>lightweight</strong>, qui sont juste des refs pointant vers des commits, et <strong>annotés</strong>, qui sont des objets Git complets avec métadonnées. Utilisez les tags annotés pour les releases.</p>
    <h2>Créer</h2>
    <pre><code>git tag v1.0.0                          # lightweight
    git tag -a v1.0.0 -m "1.0 GA"           # annoté
    git tag -s v1.0.0 -m "Signed"           # annoté signé GPG
    git tag -a v1.0.0 a1b2c3d -m "..."     # tagger un commit spécifique</code></pre>
    <h2>Ce que les tags annotés stockent</h2>
    <pre><code>git cat-file -t v1.0.0
    # tag
    git cat-file -p v1.0.0
    # object &lt;commit-sha&gt;
    # type commit
    # tag v1.0.0
    # tagger Ada &lt;ada@example.com&gt; 1714300000 +0000
    #
    # 1.0 GA</code></pre>
    <p>Un tag annoté est son propre objet. Il a son propre SHA distinct du commit vers lequel il pointe, un tagger et une date, un message et une signature optionnelle.</p>
    <h2>Ce que les tags lightweight ne stockent pas</h2>
    <p>Un tag lightweight est juste <code>refs/tags/v1.0.0</code> contenant un SHA de commit. Il n'y a pas de message, pas de tagger, pas de signature. <code>git describe</code>, <code>git tag -v</code> et de nombreux outils CI de release supposent des tags annotés et se comportent étrangement avec les lightweight.</p>
    <h2>Inspecter</h2>
    <pre><code>git show v1.0.0
    git tag -l --format='%(refname:short) %(objecttype) %(taggername) %(subject)'</code></pre>
    <p>Les tags lightweight affichent <code>commit</code> comme type d'objet ; les annotés affichent <code>tag</code>.</p>
    <h2>Signer et vérifier</h2>
    <pre><code>git tag -s v1.0.0 -m "Signed"
    git tag -v v1.0.0
    # gpg: Good signature from "Ada Lovelace &lt;ada@example.com&gt;"</code></pre>
    <p>La signature SSH est aussi supportée dans Git moderne :</p>
    <pre><code>git config --global gpg.format ssh
    git config --global user.signingkey ~/.ssh/id_ed25519.pub
    git tag -s v1.1.0 -m "SSH-signed"</code></pre>
    <h2>Choisir</h2>
    <ul>
      <li>Utilisez <strong>annotés</strong> pour les releases, tout ce que vous publiez, tout ce que vous signez.</li>
      <li>Utilisez <strong>lightweight</strong> pour des signets locaux ad hoc (par ex. « se rappeler de ce commit avant un rebase »).</li>
    </ul>
    <h2>Pousser des tags</h2>
    <pre><code>git push origin v1.0.0
    git push origin --tags
    git push --follow-tags         # uniquement tags annotés atteignables depuis les commits poussés</code></pre>
    <p><code>--follow-tags</code> ignore délibérément les tags lightweight, ce qui est généralement ce que vous voulez.</p>
    <h2>Déréférencement de tag</h2>
    <p>De nombreuses commandes déréférencent automatiquement un tag annoté vers le commit vers lequel il pointe ; certaines ne le font pas. Utilisez <code>^{}</code> pour forcer le déréférencement dans les scripts :</p>
    <pre><code>git rev-parse v1.0.0           # SHA de l'objet tag (annoté)
    git rev-parse v1.0.0^{}        # SHA du commit vers lequel il pointe
    git rev-parse v1.0.0^{commit}  # idem, avec assertion de type
    git for-each-ref --format='%(refname:short) %(*objectname)' refs/tags</code></pre>
    <p>L'espace réservé <code>%(*objectname)</code> donne le commit déréférencé pour les tags et est vide pour les refs non-tag. Ce motif est essentiel pour les scripts de release qui ont besoin d'un SHA de commit à partir d'un nom de tag.</p>
    <h2>Erreurs fréquentes</h2>
    <p>Tagger des releases avec un simple <code>git tag v1.0</code> et manquer le tagger/date/message dans les logs d'audit. Passez toujours <code>-a</code> ou <code>-s</code>. Déplacer un tag publié vers un nouveau commit (« force-tag ») ; les utilisateurs en aval ont déjà mis en cache l'ancien SHA et peuvent ne pas récupérer le changement. Émettez <code>v1.0.1</code> à la place. Utiliser des tags lightweight comme signets nommés partagés dans une équipe ; si vous devez partager, préférez les branches ou tags annotés. Enfin, attendre que <code>git describe</code> fonctionne sans tags annotés ; par défaut il ne compte que les annotés (<code>--tags</code> permet d'inclure les lightweight, avec des réserves).</p>

- source_title: "What happens during git clone"
  title: "Ce qui se passe pendant git clone"
  langcode: fr
  body: |
    <h2>Introduction</h2>
    <p><code>git clone</code> ressemble à une opération unique mais en compose en réalité plusieurs. Comprendre les étapes aide pour le dépannage des clones partiels, lents ou avec des défauts surprenants.</p>
    <h2>La séquence</h2>
    <ol>
      <li>Crée le répertoire cible.</li>
      <li>Exécute <code>git init</code> à l'intérieur.</li>
      <li>Ajoute <code>origin</code> comme remote avec l'URL source.</li>
      <li>Configure le refspec par défaut <code>+refs/heads/*:refs/remotes/origin/*</code>.</li>
      <li>Exécute <code>git fetch origin</code> pour télécharger objets et refs.</li>
      <li>Détermine la branche par défaut (le <code>HEAD</code> du remote).</li>
      <li>Crée une branche locale qui la suit.</li>
      <li>Fait un checkout de cette branche dans l'arborescence de travail.</li>
    </ol>
    <h2>Le voir se produire</h2>
    <pre><code>GIT_TRACE=1 GIT_TRACE_PACKET=1 git clone https://github.com/example/widget.git 2&gt;&amp;1 | head -50</code></pre>
    <p>Vous verrez la négociation de capacités, l'annonce des refs, la négociation want/have et la réception du pack.</p>
    <h2>Protocole filaire</h2>
    <p>Git moderne supporte le protocole v2 (<code>git config protocol.version 2</code> ou défaut depuis 2.26+). Le serveur n'annonce que les refs demandées plutôt que la liste complète des refs, ce qui améliore considérablement les temps de clone pour les dépôts avec de nombreuses refs.</p>
    <h2>Variantes</h2>
    <pre><code>git clone --bare                       # pas d'arborescence de travail
    git clone --mirror                     # nu + toutes les refs, configuré pour le mirroring
    git clone --depth 1                    # shallow
    git clone --filter=blob:none           # clone partiel, saute les blobs jusqu'à besoin
    git clone --filter=tree:0              # encore moins de données, trees à la demande
    git clone --single-branch              # historique d'une seule branche
    git clone --branch v1.2.3              # checkout d'une branche/tag spécifique
    git clone --recurse-submodules         # cloner aussi les sous-modules
    git clone --no-checkout                # sauter le peuplement de l'arborescence de travail</code></pre>
    <h2>Clones partiels</h2>
    <p>Les clones partiels (<code>--filter</code>) reportent le téléchargement d'objets jusqu'à ce qu'ils soient nécessaires. Ils nécessitent le support du serveur (la plupart des hôtes modernes l'ont) :</p>
    <pre><code>git clone --filter=blob:none https://github.com/example/big.git
    cd big
    git log --oneline                  # bon marché ; seuls les objets commit et tree fetchés
    git show HEAD:src/main.c           # cela déclenche un fetch de blob</code></pre>
    <h2>Ce qui va où</h2>
    <p>Après un clone réussi :</p>
    <ul>
      <li><code>.git/objects/pack/</code> : le pack file reçu du serveur.</li>
      <li><code>.git/refs/remotes/origin/</code> : chaque branche du serveur comme ref de tracking distant.</li>
      <li><code>.git/HEAD</code> : ref symbolique vers la nouvelle branche locale.</li>
      <li><code>.git/config</code> : section <code>[remote "origin"]</code> avec URL et refspec.</li>
    </ul>
    <h2>Annonce côté serveur</h2>
    <p>La première chose que le serveur envoie dans tout clone est l'annonce des refs. Sous le protocole v0/v1, cela liste chaque ref, même si vous n'en voulez qu'une ; sur d'énormes dépôts avec des millions de refs, l'annonce seule peut prendre des secondes. Le protocole v2 change cela : le client envoie une requête <code>ls-refs</code> spécifiant des motifs, et le serveur n'annonce que les refs correspondantes :</p>
    <pre><code>git -c protocol.version=2 ls-remote origin 'refs/heads/main'
    GIT_TRACE_PACKET=1 git -c protocol.version=2 ls-remote origin 2&gt;&amp;1 | head</code></pre>
    <p>Pour les clones quotidiens, l'accélération est invisible ; pour les serveurs d'hébergement, elle est dramatique.</p>
    <h2>Erreurs fréquentes</h2>
    <p>Cloner un énorme dépôt sur un réseau instable et recommencer depuis zéro ; <code>git clone</code> en 2.30+ supporte le clone reprenable sur le smart HTTP, mais seulement si le serveur le supporte. Sinon, <code>--depth 1</code> d'abord, puis <code>git fetch --unshallow</code> plus tard. Cloner dans <code>~/Dropbox</code> ou un autre dossier de synchronisation ; le client de synchronisation luttera avec Git pour le contrôle de <code>.git/index</code>. Cloner un dépôt avec sous-modules et oublier <code>--recurse-submodules</code>, finissant avec des répertoires de sous-modules vides. Enfin, cloner via HTTPS sans assistant d'identifiants et être interrogé pour les identifiants à chaque fetch ; configurez-en un une fois.</p>

- source_title: "What happens during git fetch"
  title: "Ce qui se passe pendant git fetch"
  langcode: fr
  body: |
    <h2>Introduction</h2>
    <p><code>git fetch</code> est l'opération réseau qui télécharge de nouveaux objets et met à jour les refs de tracking distant. Il ne change pas vos branches ou arborescence de travail, ce qui en fait la commande « quoi de neuf ? » la plus sûre.</p>
    <h2>La séquence</h2>
    <ol>
      <li>Résoudre l'URL du remote.</li>
      <li>Ouvrir une connexion (HTTPS, SSH ou git://).</li>
      <li>Négocier les capacités (version de protocole, multi-ack, filtres de clone partiel, etc.).</li>
      <li>Le serveur annonce les refs (ou, en protocole v2, seulement celles correspondant aux motifs demandés).</li>
      <li>Le client signale ce qu'il a déjà.</li>
      <li>Le serveur envoie un pack file contenant les objets manquants.</li>
      <li>Le client écrit le pack dans <code>.git/objects/pack/</code> et l'indexe.</li>
      <li>Le client met à jour les refs de tracking distant (<code>refs/remotes/origin/*</code>).</li>
      <li>Optionnellement élague les refs supprimées.</li>
    </ol>
    <h2>Commandes</h2>
    <pre><code>git fetch
    git fetch origin
    git fetch --all
    git fetch --prune
    git fetch origin main:my-main         # fetch dans une ref locale</code></pre>
    <p>La syntaxe deux-points <code>main:my-main</code> crée ou met à jour directement une ref locale ; à utiliser avec précaution.</p>
    <h2>Inspecter ce qui a été fetché</h2>
    <pre><code>git fetch origin
    cat .git/FETCH_HEAD
    git log HEAD..origin/main --oneline</code></pre>
    <p><code>FETCH_HEAD</code> liste chaque ref mise à jour par le fetch le plus récent, dans l'ordre demandé.</p>
    <h2>Refspecs</h2>
    <p>Chaque remote a un ou plusieurs refspecs de fetch. Le défaut pour <code>origin</code> :</p>
    <pre><code>+refs/heads/*:refs/remotes/origin/*</code></pre>
    <p>Vous pouvez en ajouter d'autres, par exemple pour fetcher les refs de pull-request depuis GitHub :</p>
    <pre><code>git config --add remote.origin.fetch '+refs/pull/*/head:refs/remotes/origin/pr/*'
    git fetch
    git switch -c review/123 origin/pr/123</code></pre>
    <h2>Élaguer</h2>
    <p>Sans prune, les branches supprimées sur le serveur subsistent comme des refs <code>origin/*</code> obsolètes :</p>
    <pre><code>git fetch --prune
    git config --global fetch.prune true</code></pre>
    <h2>Tags</h2>
    <p>Par défaut, fetch télécharge les tags pointant vers les commits fetchés. Forcer ou désactiver :</p>
    <pre><code>git fetch --tags
    git fetch --no-tags</code></pre>
    <h2>Trace et debug</h2>
    <pre><code>GIT_TRACE=1 GIT_TRACE_PACKET=1 git fetch
    GIT_CURL_VERBOSE=1 git fetch        # HTTPS</code></pre>
    <p>Cela révèle les requêtes exactes, utile pour déboguer les proxys ou l'authentification.</p>
    <h2>Négociation et haves</h2>
    <p>Le handshake de fetch est une danse de « wants » et « haves ». Le client liste ce qu'il veut (les SHAs des pointes des branches distantes) et offre ses haves (commits locaux récents) pour que le serveur calcule un pack minimal. Git moderne utilise l'algorithme de négociation <code>skipping</code>, qui converge en O(log n) tours même sur de longs historiques. Vous pouvez l'ajuster :</p>
    <pre><code>git config fetch.negotiationAlgorithm skipping
    git config fetch.negotiationAlgorithm consecutive
    GIT_TRACE_PACKET=1 git fetch 2&gt;&amp;1 | grep -E 'have|want' | head</code></pre>
    <h2>Erreurs fréquentes</h2>
    <p>Croire que <code>git fetch</code> change vos branches ; il ne le fait jamais. Utilisez <code>git pull</code> ou <code>git merge origin/main</code> pour intégrer. Sauter <code>--prune</code> dans les clones de longue durée et accumuler des dizaines de refs <code>origin/*</code> obsolètes. Mal configurer un refspec à la main et écraser des branches locales ; double-vérifiez avec <code>git config -e</code>. Enfin, fetcher depuis un clone partiel sans réaliser que certains objets nécessiteront un appel réseau de suivi à l'accès ; les clones partiels échangent une rapidité initiale contre une latence occasionnelle plus tard.</p>

- source_title: "What happens during git pull (fetch + merge/rebase)"
  title: "Ce qui se passe pendant git pull (fetch + merge/rebase)"
  langcode: fr
  body: |
    <h2>Introduction</h2>
    <p><code>git pull</code> est du sucre pour <code>git fetch</code> suivi de l'intégration de la branche upstream dans la branche courante. L'étape d'intégration est soit un merge (par défaut) soit un rebase.</p>
    <h2>Les deux étapes</h2>
    <ol>
      <li><code>git fetch &lt;remote&gt; &lt;refspec&gt;</code> : télécharge et met à jour les refs de tracking.</li>
      <li>Si <code>pull.rebase</code> est false : <code>git merge FETCH_HEAD</code>.</li>
      <li>Si <code>pull.rebase</code> est true : <code>git rebase FETCH_HEAD</code>.</li>
    </ol>
    <p>Séquence manuelle équivalente :</p>
    <pre><code>git fetch origin main
    git merge origin/main             # ou git rebase origin/main</code></pre>
    <h2>Configuration</h2>
    <pre><code>git config --global pull.rebase false   # merge (défaut classique)
    git config --global pull.rebase true    # rebase
    git config --global pull.ff only        # fast-forward seulement, sinon abandonner</code></pre>
    <p>Depuis Git 2.27, un simple <code>git pull</code> sans configuration affiche un avertissement. Choisissez une stratégie explicitement.</p>
    <h2>Fast-forward seulement</h2>
    <p><code>--ff-only</code> est le pull le plus sûr : il ne réussit que si votre branche est strictement en retard. Pas de merge commit, pas de rebase, pas de surprises.</p>
    <pre><code>git pull --ff-only</code></pre>
    <p>Combinez avec autostash pour éviter les blocages d'arborescence de travail :</p>
    <pre><code>git pull --ff-only --autostash</code></pre>
    <h2>Pull avec rebase</h2>
    <pre><code>git pull --rebase
    git pull --rebase=merges          # préserver la structure de merge</code></pre>
    <p><code>--rebase=merges</code> est utile pour les branches qui contiennent des merge commits que vous voulez garder.</p>
    <h2>Pull avec autostash</h2>
    <pre><code>git config --global rebase.autoStash true
    git config --global merge.autoStash true</code></pre>
    <p>Avec ces options activées, les arborescences sales sont stashées avant l'intégration et réappliquées après, de façon transparente.</p>
    <h2>Pull multi-branches</h2>
    <pre><code>git pull origin main feature        # fetche les deux, merge octopus dans HEAD</code></pre>
    <p>C'est rarement ce que vous voulez ; préférez des opérations séparées.</p>
    <h2>Pull vs fetch + intégration explicite</h2>
    <p>De nombreux utilisateurs expérimentés préfèrent ne jamais utiliser <code>git pull</code>. Ils exécutent <code>git fetch</code> d'abord, inspectent <code>git log HEAD..@{u}</code>, puis choisissent merge ou rebase délibérément. C'est particulièrement précieux lors de l'intégration de branches divergentes de longue durée.</p>
    <h2>Politiques de pull pour les équipes</h2>
    <p>Les équipes saines choisissent une seule politique de pull et la configurent à l'échelle de l'organisation. Deux choix courants :</p>
    <pre><code># Équipe historique linéaire : rebase au pull, merge via PR seulement
    git config --global pull.rebase true
    git config --global rebase.autoStash true

    # Équipe favorable au merge : jamais rebase, toujours fast-forward main
    git config --global pull.rebase false
    git config --global pull.ff only</code></pre>
    <p>La pire configuration est l'absente : le <code>git pull</code> de chaque développeur se comporte différemment, produisant des historiques incohérents. Documentez la politique dans le <code>CONTRIBUTING.md</code> de votre dépôt et fournissez un snippet de configuration en une ligne que les nouveaux contributeurs peuvent copier.</p>
    <h2>Erreurs fréquentes</h2>
    <p>Exécuter <code>git pull</code> avec des changements non commités et obtenir un merge commit inattendu par-dessus du travail sale. Soit stashez, commitez ou définissez <code>autoStash</code>. Puller avec rebase sur une branche sur laquelle d'autres ont basé leur travail ; vous réécrivez leur base. Rebasez seulement sur des branches privées. Configurer <code>pull.rebase</code> globalement sans réaliser que cela affecte aussi <code>main</code> ; de nombreuses équipes définissent <code>pull.ff only</code> globalement et surchargent par branche. Enfin, utiliser <code>git pull</code> en CI ; la CI a rarement besoin d'intégration, seulement du dernier commit. Utilisez <code>git fetch</code> et un checkout explicite de <code>origin/main</code> pour garder la CI déterministe.</p>

- source_title: "What happens during git push"
  title: "Ce qui se passe pendant git push"
  langcode: fr
  body: |
    <h2>Introduction</h2>
    <p><code>git push</code> téléverse les commits vers un remote et met à jour les refs de ce remote. Contrairement à fetch, il modifie l'état du serveur, donc des mécanismes de sécurité existent pour empêcher d'écraser le travail des autres.</p>
    <h2>La séquence</h2>
    <ol>
      <li>Résoudre l'URL du remote et le refspec cible.</li>
      <li>Ouvrir une connexion.</li>
      <li>Négocier les capacités.</li>
      <li>Le serveur annonce les valeurs courantes des refs.</li>
      <li>Le client vérifie chaque push : est-ce un fast-forward de la ref du serveur ?</li>
      <li>Le client packe les objets manquants et les téléverse.</li>
      <li>Le serveur exécute le hook <code>pre-receive</code>.</li>
      <li>Pour chaque ref, le serveur exécute le hook <code>update</code> et met à jour la ref atomiquement.</li>
      <li>Le serveur exécute le hook <code>post-receive</code>.</li>
      <li>Le serveur signale succès ou rejet au client.</li>
    </ol>
    <h2>Commandes</h2>
    <pre><code>git push                                  # branche courante vers upstream
    git push origin main                      # explicite
    git push -u origin feature/login          # définit l'upstream
    git push origin --delete feature/login    # supprime la branche distante
    git push origin v1.0.0                    # pousse un tag
    git push --follow-tags
    git push --force-with-lease</code></pre>
    <h2>Application du fast-forward</h2>
    <p>Par défaut, un push est rejeté s'il ne ferait pas un fast-forward de la ref distante. Cela protège contre l'écrasement accidentel du travail poussé par d'autres :</p>
    <pre><code> ! [rejected]   main -> main (non-fast-forward)
    error: failed to push some refs to 'origin'
    hint: Updates were rejected because the tip of your current branch is behind ...</code></pre>
    <p>Résolvez en fetchant et intégrant, puis poussez à nouveau.</p>
    <h2>Push forcé</h2>
    <pre><code>git push --force                   # dangereux : ignore l'état distant
    git push --force-with-lease        # plus sûr : refuse si le distant a bougé
    git push --force-with-lease=feature/login:abc1234</code></pre>
    <p><code>--force-with-lease</code> exige que la ref distante égale toujours ce que dit votre ref de tracking. Préférez-le toujours.</p>
    <h2>Pushes atomiques</h2>
    <pre><code>git push --atomic origin branchA branchB</code></pre>
    <p>Avec <code>--atomic</code>, soit toutes les mises à jour réussissent, soit aucune ; utile quand les refs doivent bouger ensemble.</p>
    <h2>Politiques de push</h2>
    <pre><code>git config --global push.default simple        # branche courante vers son upstream
    git config --global push.default current       # branche courante vers le remote du même nom
    git config --global push.default upstream      # courante vers le nom de son upstream
    git config --global push.autoSetupRemote true  # 2.37+ : -u auto pour nouvelles branches</code></pre>
    <h2>Hooks côté serveur</h2>
    <p>Les plateformes d'hébergement exécutent des hooks <code>pre-receive</code> et <code>update</code> pour appliquer des politiques (commits signés, nommage de branches, CI verte obligatoire). Quand un push est rejeté, le message du serveur nomme la ref ou le commit fautif. Lisez le message avant de réessayer.</p>
    <h2>Erreurs fréquentes</h2>
    <p>Force-pusher vers une branche partagée comme <code>main</code> et réécrire les commits des autres. Coordonnez, ou utilisez <code>--force-with-lease</code> uniquement sur des branches privées. Pusher des tags individuellement et oublier de pousser des commits, laissant des tags pendants sur le serveur. Utilisez <code>--follow-tags</code>. Pusher vers un mauvais remote parce que vous en avez plusieurs configurés ; <code>git push -v</code> affiche exactement où il va. Enfin, attendre que <code>git push --delete</code> supprime des fichiers ; il supprime des <em>refs</em>. Pour supprimer des fichiers, commitez une suppression et poussez ce commit.</p>

- source_title: "Conflict markers and how Git produces them"
  title: "Marqueurs de conflit et comment Git les produit"
  langcode: fr
  body: |
    <h2>Introduction</h2>
    <p>Quand Git ne peut pas combiner automatiquement deux changements à la même région d'un fichier, il laisse des <em>marqueurs de conflit</em> dans la copie de travail et vous laisse résoudre manuellement. Les marqueurs ne sont pas magiques ; ils enregistrent exactement ce que chaque côté a fait par rapport à une base commune.</p>
    <h2>Anatomie</h2>
    <pre><code>&lt;&lt;&lt;&lt;&lt;&lt;&lt; HEAD
    ligne telle qu'elle est sur notre branche
    =======
    ligne telle qu'elle est sur leur branche
    &gt;&gt;&gt;&gt;&gt;&gt;&gt; feature/login</code></pre>
    <p>La section entre <code>&lt;&lt;&lt;</code> et <code>===</code> est « ours » (la branche courante). Entre <code>===</code> et <code>&gt;&gt;&gt;</code> est « theirs ». La résolution consiste à garder le bon texte, supprimer les marqueurs et stager.</p>
    <h2>Marqueurs trois-voies (style diff3)</h2>
    <pre><code>git config --global merge.conflictStyle diff3</code></pre>
    <p>Maintenant, les marqueurs incluent aussi la version de base :</p>
    <pre><code>&lt;&lt;&lt;&lt;&lt;&lt;&lt; HEAD
    notre version
    ||||||| merged common ancestor
    version de base
    =======
    leur version
    &gt;&gt;&gt;&gt;&gt;&gt;&gt; feature/login</code></pre>
    <p>Voir la base clarifie souvent ce que chaque côté voulait faire. Encore mieux, depuis Git 2.35 :</p>
    <pre><code>git config --global merge.conflictStyle zdiff3</code></pre>
    <p>qui taille le contexte commun.</p>
    <h2>Comment Git les produit</h2>
    <p>Pour chaque paire de hunks en conflit, Git exécute un diff trois-voies entre base, ours et theirs. Si les deux côtés ont changé la même région différemment, Git écrit les deux versions entourées de marqueurs. Sinon, le côté qui a changé gagne automatiquement.</p>
    <h2>Résoudre</h2>
    <pre><code>git status                       # liste les chemins en conflit
    éditer chaque fichier
    git add &lt;file&gt;                   # marquer comme résolu
    git commit                       # utilise le message préparé</code></pre>
    <p>Ou utilisez un outil de merge :</p>
    <pre><code>git mergetool
    git config --global merge.tool meld</code></pre>
    <h2>Inspecter chaque côté</h2>
    <pre><code>git show :1:path        # base
    git show :2:path        # ours
    git show :3:path        # theirs
    git checkout --ours path
    git checkout --theirs path</code></pre>
    <p>La syntaxe deux-points lit directement les stages d'index en conflit.</p>
    <h2>Annuler</h2>
    <pre><code>git merge --abort
    git rebase --abort
    git cherry-pick --abort</code></pre>
    <h2>rerere</h2>
    <p>« Reuse recorded resolution » se souvient de vos résolutions de conflits et les réapplique la prochaine fois que le même conflit apparaît :</p>
    <pre><code>git config --global rerere.enabled true</code></pre>
    <p>Indispensable pour les chaînes de rebase de longue durée.</p>
    <h2>Renommages et conflits binaires</h2>
    <p>Tous les conflits ne produisent pas de marqueurs textuels. Les conflits rename/rename, rename/delete et modify/delete laissent l'index dans un état avec plusieurs stages mais aucun marqueur &lt;&lt;&lt; dans le fichier. Les fichiers binaires ne peuvent pas être mergés textuellement du tout ; les deux versions sont écrites sur disque et l'index enregistre le conflit :</p>
    <pre><code>git status
    # both modified:   image.png
    # deleted by us:   old.txt
    # added by them:   new.txt
    git checkout --ours image.png      # garder notre version
    git checkout --theirs new.txt
    git add image.png new.txt</code></pre>
    <p>Lisez toujours <code>git status</code> au moment du conflit ; il étiquette explicitement ces types de conflits moins courants.</p>
    <h2>Erreurs fréquentes</h2>
    <p>Résoudre en supprimant les marqueurs sans lire les contenus, abandonnant accidentellement un côté. Lisez toujours les deux moitiés et la base. Oublier <code>git add</code> après l'édition ; <code>git commit</code> refusera avec « unmerged paths ». Traiter <code>--ours</code> et <code>--theirs</code> comme identiques à <code>-X ours</code> et <code>-X theirs</code> ; les premiers remplacent un fichier en conflit entier, les seconds sont un indice à la stratégie de merge. Enfin, copier un fichier partiellement résolu d'ailleurs et contourner Git ; l'index a encore des entrées stage 1/2/3 jusqu'à ce que vous fassiez <code>git add</code>.</p>

- source_title: "The merge base algorithm"
  title: "L'algorithme de base de merge"
  langcode: fr
  body: |
    <h2>Introduction</h2>
    <p>La <em>base de merge</em> de deux commits est leur meilleur ancêtre commun : la fondation que Git utilise pour les merges trois-voies. Choisir la bonne base est ce qui fait que les merges « automatiques » fonctionnent réellement.</p>
    <h2>La trouver</h2>
    <pre><code>git merge-base A B
    git merge-base --all A B           # tous les meilleurs ancêtres communs
    git merge-base --octopus A B C
    git merge-base --is-ancestor X Y   # exit 0 si X est ancêtre de Y
    git merge-base --fork-point main feature</code></pre>
    <h2>Définition</h2>
    <p>Un ancêtre commun C de A et B est un « meilleur » ancêtre commun si aucun autre ancêtre commun de A et B n'est descendant de C. La plupart des paires ont un seul meilleur ancêtre commun. Quand le graphe contient des merges croisés, plusieurs peuvent exister ; c'est ce que <code>--all</code> rapporte.</p>
    <h2>Comment le merge trois-voies l'utilise</h2>
    <p>Étant donné les commits A et B avec base de merge M, Git pour chaque fichier :</p>
    <ol>
      <li>Lit le fichier à M, A et B.</li>
      <li>Si seul un côté a changé, prend ce côté.</li>
      <li>Si les deux côtés ont changé identiquement, prend l'un ou l'autre.</li>
      <li>Si les deux côtés ont changé différemment, exécute un merge texte trois-voies ou émet des marqueurs de conflit.</li>
    </ol>
    <h2>Stratégies recursive et ort</h2>
    <p>Quand plusieurs bases de merge existent, la stratégie recursive les <em>merge d'abord</em>, produisant une base virtuelle, et l'utilise pour le merge trois-voies final. La stratégie <code>ort</code> (par défaut depuis 2.33) fait la même chose avec une implémentation plus rapide et plus efficace en mémoire.</p>
    <pre><code>git merge -s ort feature
    git merge -s recursive feature
    git merge -s resolve feature       # une seule base de merge, pas de récursion</code></pre>
    <h2>Fork point</h2>
    <p>Pour rebase, Git a souvent besoin de savoir où une branche thématique a quitté une branche de base. <code>--fork-point</code> consulte le reflog de la base pour trouver le point le plus récent où la thématique et la base partageaient l'historique :</p>
    <pre><code>git rebase --fork-point main feature
    git merge-base --fork-point main feature</code></pre>
    <h2>Exemple résolu</h2>
    <pre><code>A---B---C   main
         \
          D---E   feature

    git merge-base main feature   # B</code></pre>
    <p>Un merge de <code>main</code> dans <code>feature</code> fait un merge trois-voies en utilisant B comme base.</p>
    <h2>Inspecter pourquoi un merge entre en conflit</h2>
    <pre><code>git merge-base HEAD feature
    git diff &lt;base&gt; HEAD -- file
    git diff &lt;base&gt; feature -- file</code></pre>
    <p>Cette paire de diffs est exactement ce que le merge de Git voit.</p>
    <h2>Erreurs fréquentes</h2>
    <p>Supposer qu'il y a toujours exactement une base de merge ; les historiques croisés en produisent plusieurs. Traiter <code>--fork-point</code> comme un substitut à <code>--onto</code> ; ils résolvent des problèmes différents. Choisir <code>--strategy=ours</code> alors que vous vouliez <code>--strategy-option=ours</code> ; le premier abandonne entièrement leurs changements. Enfin, recalculer la base de merge à la main à partir de la sortie de <code>git log</code> et se tromper ; utilisez <code>git merge-base</code> plutôt que d'estimer à l'œil.</p>

- source_title: "Reachability and ancestry in Git"
  title: "Atteignabilité et ancêtralité dans Git"
  langcode: fr
  body: |
    <h2>Introduction</h2>
    <p>L'« atteignabilité » est la propriété la plus importante d'un objet Git. Un objet est <em>atteignable</em> si une ref y mène via les liens parent ou tree. Les objets inatteignables sont éligibles au garbage collection.</p>
    <h2>Règles d'atteignabilité</h2>
    <p>En partant de n'importe quelle ref :</p>
    <ul>
      <li>Un commit atteint son tree racine, tous les parents, et (transitivement) leurs trees et parents.</li>
      <li>Un tree atteint toutes les entrées (blobs et sous-trees).</li>
      <li>Un tag annoté atteint l'objet taggé.</li>
    </ul>
    <p>Les refs incluent les branches locales, les branches de tracking distant, les tags, le stash, les notes et le reflog (jusqu'à expiration).</p>
    <h2>Lister les objets atteignables</h2>
    <pre><code>git rev-list --objects --all | head
    git rev-list --objects HEAD
    git rev-list --count HEAD</code></pre>
    <h2>Tests d'ancêtralité</h2>
    <pre><code>git merge-base --is-ancestor X Y &amp;&amp; echo "X est ancêtre de Y"
    git rev-list X..Y --count                # combien de commits entre
    git log --ancestry-path A..B --oneline   # uniquement commits sur le chemin A à B</code></pre>
    <p><code>--ancestry-path</code> est précieux pour trouver la chaîne de commits qui a apporté un correctif d'un tag à un autre.</p>
    <h2>Opérateurs de plage</h2>
    <ul>
      <li><code>A..B</code> : atteignable depuis B, pas depuis A.</li>
      <li><code>A...B</code> : différence symétrique (l'un ou l'autre, pas les deux).</li>
      <li><code>^A B C</code> : atteignable depuis B ou C mais pas A.</li>
    </ul>
    <pre><code>git log main..feature                 # commits ajoutés par feature
    git log main...feature --left-right   # les deux côtés étiquetés</code></pre>
    <h2>Objets inatteignables</h2>
    <pre><code>git fsck --unreachable
    git fsck --dangling
    git fsck --lost-found      # les écrit dans .git/lost-found</code></pre>
    <p>Les objets inatteignables survivent jusqu'à ce que <code>git gc --prune</code> les supprime ; la période de grâce par défaut est deux semaines (<code>gc.pruneExpire</code>).</p>
    <h2>Le rôle du fichier commit-graph</h2>
    <p>Les requêtes d'atteignabilité et d'ancêtralité sont le goulot d'étranglement de nombreuses opérations Git. Le fichier <code>commit-graph</code> précalcule les numéros de génération et les listes de parents, rendant ces requêtes O(log n) au lieu de O(n) :</p>
    <pre><code>git commit-graph write --reachable
    git config --global core.commitGraph true</code></pre>
    <h2>Atteignabilité par bitmap</h2>
    <p>Côté serveur, les <em>bitmaps d'atteignabilité</em> permettent à Git de répondre à « quels objets sont atteignables depuis ce commit ? » en microsecondes, en stockant un bit précalculé par objet. Ils sont écrits par :</p>
    <pre><code>git repack -adb</code></pre>
    <h2>Parcours limités par date ou chemin</h2>
    <p>La machinerie d'atteignabilité accepte de nombreux limiteurs qui se combinent avec la syntaxe de plage :</p>
    <pre><code>git rev-list --since=2024-01-01 main
    git rev-list main -- path/to/file
    git rev-list --no-merges main..feature
    git rev-list --first-parent main
    git rev-list HEAD --count</code></pre>
    <p>Combinez-les pour répondre à des questions spécifiques comme « combien de commits non-merge Ada a-t-elle déposés sur main au dernier trimestre ? » sans recourir à des pipelines shell. La sortie stable de la plomberie rend le résultat trivial à introduire dans des outils de reporting.</p>
    <h2>Erreurs fréquentes</h2>
    <p>Croire qu'une branche supprimée efface ses commits ; ils restent atteignables via le reflog pendant 90 jours, et inatteignables mais non élagués pendant deux semaines de plus. Confondre <code>A..B</code> avec <code>A...B</code> ; l'un est asymétrique, l'autre symétrique. Utiliser <code>HEAD~3</code> pour naviguer à travers les merges et être perplexe par la traversée du premier parent ; utilisez <code>HEAD^2</code> pour passer au second parent. Enfin, attendre que <code>git fsck</code> trouve des commits perdus après un clone frais ; le reflog et les objets pendants n'existent que localement où le travail a été fait.</p>

- source_title: "Symbolic refs"
  title: "Refs symboliques"
  langcode: fr
  body: |
    <h2>Introduction</h2>
    <p>Une <em>ref symbolique</em> est une référence dont la valeur est un autre nom de ref plutôt qu'un hachage d'objet. L'exemple canonique est <code>HEAD</code>, qui contient généralement <code>ref: refs/heads/main</code>. Les refs symboliques permettent à Git de suivre « la branche courante » comme donnée, pas comme état.</p>
    <h2>Lire et écrire</h2>
    <pre><code>git symbolic-ref HEAD
    # refs/heads/main

    git symbolic-ref refs/remotes/origin/HEAD
    # refs/remotes/origin/main

    git symbolic-ref HEAD refs/heads/feature/login   # changer sans checkout
    git symbolic-ref --short HEAD                      # forme courte : main
    git symbolic-ref --delete refs/remotes/origin/HEAD</code></pre>
    <h2>HEAD comme ref symbolique</h2>
    <p>Quand vous commitez, Git résout <code>HEAD</code> pour trouver la branche courante et met à jour la pointe de <em>cette</em> branche. Quand <code>HEAD</code> est détaché, il cesse d'être symbolique et contient un SHA brut.</p>
    <pre><code>cat .git/HEAD
    # ref: refs/heads/main         (symbolique)
    # vs après détachement :
    # a1b2c3d4...                  (brut)</code></pre>
    <h2>HEAD distant</h2>
    <p>Chaque remote peut avoir un <code>HEAD</code> symbolique indiquant sa branche par défaut. Définir ou rafraîchir :</p>
    <pre><code>git remote set-head origin --auto       # interroger le serveur
    git remote set-head origin main         # définir explicitement
    git remote set-head origin --delete</code></pre>
    <p>C'est ce qui fait que <code>git log origin</code> résout vers <code>origin/main</code>.</p>
    <h2>Pourquoi les utiliser</h2>
    <ul>
      <li>La « branche courante » peut changer sans réécrire l'historique.</li>
      <li>Les outils peuvent demander « quelle est la branche par défaut ? » sans coder en dur les noms.</li>
      <li>Les hooks peuvent cibler la branche <em>actuellement extraite</em> de manière générique.</li>
    </ul>
    <h2>Worktrees et HEAD par worktree</h2>
    <p>Chaque worktree lié (<code>git worktree add</code>) a son propre <code>HEAD</code>, stocké sous <code>.git/worktrees/&lt;name&gt;/HEAD</code>. Chacun peut pointer vers une branche différente :</p>
    <pre><code>git worktree add ../wt-feature feature/login
    cat ../wt-feature/.git
    # gitdir: /path/to/main/.git/worktrees/wt-feature
    cat .git/worktrees/wt-feature/HEAD
    # ref: refs/heads/feature/login</code></pre>
    <h2>Détection</h2>
    <pre><code>git symbolic-ref -q HEAD &amp;&amp; echo "sur une branche" || echo "détaché"</code></pre>
    <h2>Renommer la branche par défaut</h2>
    <p>Pour renommer <code>master</code> en <code>main</code> en sécurité :</p>
    <pre><code>git branch -m master main
    git symbolic-ref HEAD refs/heads/main
    git push -u origin main
    git symbolic-ref refs/remotes/origin/HEAD refs/remotes/origin/main</code></pre>
    <h2>Inspecter la résolution symbolique</h2>
    <p><code>git rev-parse</code> résout un nom à travers les refs symboliques jusqu'à un SHA, tandis que <code>git symbolic-ref</code> ne suit qu'un niveau. La paire est utile pour les scripts :</p>
    <pre><code>git symbolic-ref HEAD                       # refs/heads/main
    git symbolic-ref --short HEAD               # main
    git rev-parse HEAD                          # SHA
    git rev-parse --symbolic-full-name HEAD     # refs/heads/main
    git rev-parse --symbolic-full-name @{u}     # refs/remotes/origin/main</code></pre>
    <p>Utilisez <code>--symbolic-full-name</code> quand vous voulez le nom de ref canonique peu importe le raccourci tapé par l'utilisateur.</p>
    <h2>Erreurs fréquentes</h2>
    <p>Éditer <code>.git/HEAD</code> à la main et oublier le saut de ligne final, laissant Git incapable de l'analyser. Utilisez <code>git symbolic-ref</code>. Traiter <code>refs/remotes/origin/HEAD</code> comme faisant autorité alors qu'il est en réalité mis en cache ; rafraîchissez avec <code>git remote set-head origin --auto</code>. Confondre une ref symbolique pointant vers une branche manquante avec une vraie erreur ; <code>git symbolic-ref -q</code> sort avec un code non nul, que les scripts peuvent gérer. Enfin, supprimer la ref sous-jacente sans mettre à jour la symbolique, laissant un symref pendant ; les outils peuvent le signaler mais c'est inoffensif et facile à corriger avec un autre <code>symbolic-ref</code>.</p>

- source_title: "Loose objects vs packed objects"
  title: "Objets loose vs objets packés"
  langcode: fr
  body: |
    <h2>Introduction</h2>
    <p>Git stocke les objets en deux formats physiques. Les objets <em>loose</em> sont des fichiers individuels ; les objets <em>packés</em> vivent dans un pack file avec un corps delta-compressé. Les deux formes décrivent les mêmes objets logiques, adressés par les mêmes hachages.</p>
    <h2>Disposition loose</h2>
    <p>Chaque objet loose est à <code>.git/objects/xx/yyy...</code>, où <code>xx</code> est les deux premiers caractères hex du SHA et <code>yyy...</code> les 38 restants. Le fichier est les octets dégonflés zlib de <code>&lt;type&gt; &lt;size&gt;\0&lt;content&gt;</code> :</p>
    <pre><code>find .git/objects -type f -name '??' -prune -o -type f -print | head
    git cat-file -p &lt;sha&gt;</code></pre>
    <h2>Disposition pack</h2>
    <pre><code>.git/objects/pack/pack-&lt;hash&gt;.pack
    .git/objects/pack/pack-&lt;hash&gt;.idx</code></pre>
    <p>Le fichier <code>.idx</code> mappe SHA vers offset d'octet dans le <code>.pack</code> ; sans lui, le pack nécessiterait un parcours linéaire.</p>
    <h2>Comment les objets se déplacent entre formes</h2>
    <p>Les nouveaux objets sont écrits loose. Ils deviennent packés quand :</p>
    <ul>
      <li><code>git gc</code> s'exécute (manuel ou automatique).</li>
      <li><code>git repack</code> est invoqué.</li>
      <li>Un fetch ou push les transfère comme un pack.</li>
      <li><code>git fast-import</code> les écrit directement dans un pack.</li>
    </ul>
    <pre><code>git gc
    git repack -a -d
    git count-objects -v</code></pre>
    <p><code>count-objects -v</code> rapporte le nombre de loose, l'utilisation totale de disque et les stats de pack.</p>
    <h2>Compromis</h2>
    <ul>
      <li><strong>Loose</strong> : simple, facile à inspecter, rapide à écrire un seul objet. Lent quand il y en a des millions.</li>
      <li><strong>Packé</strong> : compact, delta-compressé, rapide à lire en masse. Nécessite un repacking pour incorporer de nouveaux objets.</li>
    </ul>
    <h2>Auto-gc</h2>
    <p>Git déclenche un auto-gc quand trop d'objets loose s'accumulent. Réglages :</p>
    <pre><code>git config gc.auto 6700           # seuil pour les objets loose
    git config gc.autoPackLimit 50    # seuil pour le nombre de packs
    git config gc.auto 0              # désactiver auto-gc (non recommandé)</code></pre>
    <h2>Inspecter un pack</h2>
    <pre><code>git verify-pack -v .git/objects/pack/pack-&lt;hash&gt;.idx | head
    git verify-pack -s .git/objects/pack/pack-&lt;hash&gt;.idx</code></pre>
    <p>Vous verrez les types d'objets, tailles packées, deltas et profondeurs de chaîne.</p>
    <h2>Récupérer après corruption</h2>
    <pre><code>git fsck --full
    cp -r broken-repo backup
    git unpack-objects &lt; .git/objects/pack/pack-&lt;hash&gt;.pack</code></pre>
    <p><code>unpack-objects</code> explose un pack en forme loose, utile quand un seul mauvais objet à l'intérieur d'un pack fait planter de nombreuses opérations.</p>
    <h2>Rechercher un objet</h2>
    <p>Quand Git résout un SHA, il cherche dans cet ordre : fichier d'objet loose, puis chaque idx de pack, puis les alternates (<code>objects/info/alternates</code>). La recherche est essentiellement à temps constant par pack grâce à la table fanout de l'idx. L'impact de performance d'avoir de nombreux petits packs vs un gros pack est réel, c'est pourquoi <code>gc</code> consolide :</p>
    <pre><code>git count-objects -v
    cat .git/objects/info/alternates 2&gt;/dev/null
    git verify-pack -s .git/objects/pack/pack-&lt;hash&gt;.idx</code></pre>
    <p>Les alternates permettent à plusieurs dépôts de partager un pool d'objets sur disque ; <code>git clone --shared</code> crée une telle configuration et économise de l'espace au prix d'une certaine sécurité.</p>
    <h2>Erreurs fréquentes</h2>
    <p>Supprimer manuellement les fichiers <code>pack-</code> pour récupérer de l'espace ; cela détruit l'historique atteignable. Utilisez <code>git gc</code>. Désactiver auto-gc sur des dépôts de longue durée et finir avec des millions d'objets loose, ralentissant chaque opération. Exécuter <code>git gc --aggressive</code> régulièrement quand un <code>gc</code> normal suffirait ; le packing agressif est coûteux. Enfin, copier un dépôt avec <code>cp -r</code> pendant qu'un pack est en cours d'écriture, finissant avec un index corrompu. Utilisez <code>git clone --local</code> pour des copies sûres.</p>

- source_title: "Delta compression in pack files"
  title: "Compression delta dans les pack files"
  langcode: fr
  body: |
    <h2>Introduction</h2>
    <p>Le modèle adressé par contenu de Git déduplique les objets identiques, mais les blobs similaires-mais-pas-identiques (un fichier et son édition ultérieure) coûteraient toujours leur taille complète chacun. Les pack files résolvent cela avec la <em>compression delta</em> : stocker un objet comme une base plus une séquence d'instructions « copy/insert » qui produisent un autre objet.</p>
    <h2>Comment cela fonctionne</h2>
    <p>Lors du packing, Git compare les objets candidats (typiquement des blobs de taille et type similaires) et choisit une base pour chacun. Le delta enregistre :</p>
    <ul>
      <li>L'objet base (par offset dans le pack ou par SHA).</li>
      <li>Tailles de la base et de la cible.</li>
      <li>Un flux d'instructions <em>copy</em> (utiliser des octets de la base) et <em>insert</em> (octets littéraux).</li>
    </ul>
    <p>Le flux delta est ensuite zlib-compressé.</p>
    <h2>Inspecter les deltas</h2>
    <pre><code>git verify-pack -v .git/objects/pack/pack-&lt;hash&gt;.idx | head -20</code></pre>
    <p>Les colonnes de sortie incluent la taille packée, la profondeur et le SHA de base pour les entrées delta. Un objet non-delta n'a pas de base.</p>
    <h2>Réglages</h2>
    <pre><code>git config pack.window 250          # candidats examinés par objet
    git config pack.depth 50            # longueur de chaîne max
    git config pack.threads 4
    git config pack.windowMemory 100m
    git config pack.deltaCacheSize 256m</code></pre>
    <p><code>pack.window</code> contrôle l'agressivité avec laquelle Git cherche de bonnes bases ; <code>pack.depth</code> limite la longueur des chaînes de delta.</p>
    <h2>Repack agressif vs normal</h2>
    <pre><code>git repack -a -d                    # standard
    git repack -a -d --depth=250 --window=250   # agressif
    git gc --aggressive</code></pre>
    <p>Les repacks agressifs jettent les deltas existants et recalculent à partir de zéro, coûtant du CPU mais améliorant possiblement le résultat.</p>
    <h2>Atteignabilité et bitmaps</h2>
    <p>Les serveurs combinent souvent le packing delta avec les <em>bitmaps d'atteignabilité</em> pour un calcul rapide d'ensemble de clones :</p>
    <pre><code>git repack -adb</code></pre>
    <h2>Pourquoi certains objets ne sont pas deltifiés</h2>
    <ul>
      <li>Données cryptographiquement aléatoires (déjà incompressibles).</li>
      <li>Objets dont les seuls candidats sont plus petits que le seuil configuré.</li>
      <li>Objets hors de la portée de la fenêtre du pack.</li>
    </ul>
    <h2>Deltas inter-pack</h2>
    <p>Les index multi-pack (<code>git multi-pack-index</code>) plus le mode de repack <code>--geometric</code> (Git 2.33+) permettent de garder efficacement des deltas entre plusieurs packs :</p>
    <pre><code>git repack --geometric=2 -d</code></pre>
    <p>C'est le schéma recommandé pour les gros dépôts.</p>
    <h2>Îlots de delta</h2>
    <p>Pour les opérateurs de serveur hébergeant de nombreux forks du même projet, les <em>îlots de delta</em> partitionnent les objets pour que les deltas ne se produisent qu'à l'intérieur de l'ensemble de refs d'un fork, permettant le clone rapide de tout fork unique :</p>
    <pre><code>git config pack.island "refs/remotes/(.*)/heads"
    git config pack.islandCore "main"
    git repack -adb</code></pre>
    <p>Sans îlots, un objet atteignable seulement depuis le fork A pourrait être deltifié contre un objet atteignable seulement depuis le fork B ; servir le clone du fork A nécessiterait alors d'envoyer aussi les objets de B. La plupart des utilisateurs n'en ont jamais besoin, mais c'est la sauce secrète derrière la performance des pack servers de GitHub, GitLab et Bitbucket.</p>
    <h2>Erreurs fréquentes</h2>
    <p>Supposer que les deltas sont avant (plus récent = base) ou arrière (plus ancien = base) ; Git est agnostique et choisit ce qui produit le plus petit delta. Copier des packs entre des dépôts avec différents préfixes SHA ; les données sont adressées par contenu donc c'est correct, mais renommer des fichiers basés sur des hachages partiels peut casser. Définir <code>pack.depth</code> absurdement haut pour des packs petits ; des chaînes plus profondes signifient un accès aux objets plus lent (chaque delta dans la chaîne doit être appliqué). Enfin, attendre que la compression delta économise de l'espace sur des binaires déjà compressés (vidéos, JPGs) ; ça ne le fait presque jamais. Utilisez Git LFS pour ceux-ci.</p>

- source_title: "The .git directory structure"
  title: "Structure du répertoire .git"
  langcode: fr
  body: |
    <h2>Introduction</h2>
    <p>Tout ce que Git sait d'un dépôt vit dans <code>.git/</code>. Savoir ce qu'est chaque entrée dissipe le mystère des diagnostics « que vient-il de se passer ? ».</p>
    <h2>Disposition de haut niveau</h2>
    <pre><code>.git/
      HEAD                # ref symbolique vers la branche courante
      config              # configuration locale du dépôt
      description         # utilisé par gitweb
      index               # la zone de staging
      packed-refs         # refs de branches et tags packées (optionnel)
      hooks/              # scripts de hooks côté client
      info/               # fichier excludes et autres infos locales du dépôt
      logs/               # reflogs
      objects/            # tous les objets (loose + pack/)
      refs/               # branches, tags, tracking distant
      worktrees/          # worktrees liés (s'il y en a)
      modules/            # répertoires .git des sous-modules</code></pre>
    <h2>HEAD et refs</h2>
    <pre><code>cat .git/HEAD
    ls .git/refs/heads
    ls .git/refs/remotes/origin
    ls .git/refs/tags
    cat .git/packed-refs | head</code></pre>
    <h2>objects/</h2>
    <p>Objets loose sous <code>objects/xx/</code>, objets packés dans <code>objects/pack/</code>. Ne pas toucher à la main.</p>
    <h2>logs/</h2>
    <p>Le reflog. <code>logs/HEAD</code> enregistre chaque mouvement de HEAD ; <code>logs/refs/heads/&lt;branch&gt;</code> enregistre l'historique de chaque branche.</p>
    <pre><code>cat .git/logs/HEAD | head</code></pre>
    <h2>hooks/</h2>
    <p>Exemples de scripts de hook, tous nommés <code>*.sample</code> par défaut. Pour activer, retirez le suffixe et rendez exécutable :</p>
    <pre><code>cd .git/hooks
    cp pre-commit.sample pre-commit
    chmod +x pre-commit</code></pre>
    <h2>info/</h2>
    <p><code>info/exclude</code> est un fichier d'ignore par dépôt et par clone (non commité). <code>info/refs</code> est généré par <code>git update-server-info</code> pour les serveurs HTTP dumb.</p>
    <h2>config</h2>
    <p>Configuration locale au format INI. Éditez via <code>git config --local</code> ou <code>git config -e</code> :</p>
    <pre><code>cat .git/config
    git config --local user.email "me@example.com"</code></pre>
    <h2>worktrees/</h2>
    <p>Chaque worktree lié a un répertoire sous <code>.git/worktrees/&lt;name&gt;/</code> avec son propre <code>HEAD</code>, <code>index</code> et <code>logs</code>.</p>
    <h2>modules/</h2>
    <p>Pour les dépôts avec sous-modules, le répertoire <code>.git</code> de chaque sous-module vit ici, et l'arborescence de travail du sous-module contient un petit fichier <code>.git</code> pointant vers lui.</p>
    <h2>Dépôts nus</h2>
    <p>Un dépôt nu a le même contenu mais au niveau supérieur (pas de wrapper <code>.git/</code>) et sans arborescence de travail. Convention : nommez le répertoire <code>project.git</code>.</p>
    <h2>git rev-parse pour les chemins</h2>
    <p>Les scripts qui ont besoin de trouver des chemins dans <code>.git/</code> ne devraient jamais supposer que le répertoire est littéralement nommé <code>.git</code>. Les sous-modules utilisent un fichier <code>.git</code> pointant ailleurs ; les worktrees ont des gitdirs liés ; les dépôts nus n'ont pas de gitdir séparé. Utilisez <code>git rev-parse</code> :</p>
    <pre><code>git rev-parse --git-dir              # gitdir réel pour le dépôt courant
    git rev-parse --git-common-dir       # dir partagé pour les worktrees
    git rev-parse --show-toplevel        # racine de l'arborescence de travail
    git rev-parse --is-inside-git-dir
    git rev-parse --is-inside-work-tree</code></pre>
    <p>Ces cinq questions couvrent presque toutes les vérifications « où suis-je ? » dont un script a besoin.</p>
    <h2>Erreurs fréquentes</h2>
    <p>Éditer les fichiers à l'intérieur de <code>.git/</code> directement. Presque tout a une commande Git qui le fait correctement, atomiquement et avec hooks. Sauvegarder seulement l'arborescence de travail et oublier que <code>.git/</code> contient tout l'historique ; sauvegardez tout le répertoire. Partager <code>.git/hooks/</code> en supposant qu'ils se propagent ; les hooks ne sont <em>pas</em> versionnés. Utilisez <code>core.hooksPath</code> ou un outil comme <code>pre-commit</code> pour les partager. Enfin, supprimer <code>.git/index</code> sur impulsion ; reconstruisez avec <code>git read-tree HEAD</code>, mais seulement après sauvegarde.</p>

- source_title: "Git protocols: local, SSH, HTTP/S, git://"
  title: "Protocoles Git : local, SSH, HTTP/S, git://"
  langcode: fr
  body: |
    <h2>Introduction</h2>
    <p>Git peut transporter des données sur quatre familles de protocoles. Chacun a différents compromis en performance, authentification et compatibilité avec les pare-feu.</p>
    <h2>Local / file</h2>
    <p>Cloner depuis un répertoire utilise les E/S locales. Deux formes d'URL :</p>
    <pre><code>git clone /srv/git/widget.git
    git clone file:///srv/git/widget.git</code></pre>
    <p>La première forme peut utiliser des hardlinks pour les objets sur le même système de fichiers (très rapide, très efficace en espace). La forme <code>file://</code> copie toujours via le smart protocol.</p>
    <h2>SSH</h2>
    <p>Le défaut pour les workflows authentifiés. Utilise votre client SSH et votre clé :</p>
    <pre><code>git clone git@github.com:example/widget.git
    git clone ssh://git@github.com/example/widget.git</code></pre>
    <p>Dans les coulisses, le client invoque <code>ssh</code> et exécute <code>git-upload-pack</code> ou <code>git-receive-pack</code> côté serveur. Configurez les clés via <code>~/.ssh/config</code> et <code>ssh-agent</code>.</p>
    <h2>HTTP / HTTPS</h2>
    <p>Le plus compatible avec les pare-feu et le défaut pour de nombreux hôtes :</p>
    <pre><code>git clone https://github.com/example/widget.git</code></pre>
    <p>Le smart HTTP utilise <code>POST /info/refs?service=git-upload-pack</code> et endpoints similaires. L'authentification est via Basic auth (déprécié chez de nombreux fournisseurs) ou token dans le champ mot de passe. Un assistant d'identifiants évite les invites à chaque opération :</p>
    <pre><code>git config --global credential.helper cache
    git config --global credential.helper osxkeychain   # macOS
    git config --global credential.helper manager       # Windows</code></pre>
    <h2>git:// (anonyme)</h2>
    <pre><code>git clone git://example.com/widget.git</code></pre>
    <p>Port 9418, non authentifié, en clair. Surtout historique ; non recommandé pour de nouveaux déploiements parce qu'il n'offre aucune garantie d'intégrité au-delà des hachages propres de Git.</p>
    <h2>Versions de protocole</h2>
    <p>Le protocole filaire a v0, v1 et v2. Le protocole v2 (Git 2.18+, défaut 2.26+) est dramatiquement plus rapide pour les dépôts avec de nombreuses refs, parce que le serveur n'annonce que les refs demandées par le client.</p>
    <pre><code>git -c protocol.version=2 ls-remote origin
    git config --global protocol.version 2</code></pre>
    <h2>Smart vs dumb</h2>
    <p>Les protocoles « smart » négocient ; le HTTP « dumb » expose simplement le répertoire <code>.git/</code>. Le HTTP dumb nécessite <code>git update-server-info</code> à chaque push et est plus lent ; presque personne ne l'utilise aujourd'hui.</p>
    <h2>Choisir un protocole</h2>
    <ul>
      <li>HTTPS : le plus facile à configurer, fonctionne partout, bon pour la lecture seule et la CI.</li>
      <li>SSH : le meilleur pour push/pull quotidien quand vous contrôlez votre clé.</li>
      <li>file:// : pratique pour les miroirs locaux et les tests.</li>
      <li>git:// : à éviter sauf pour les miroirs publics extrêmement permissifs.</li>
    </ul>
    <h2>Négociation de capacités</h2>
    <p>Au moment de la connexion, le client et le serveur échangent des capacités (multi-ack, side-band, ofs-delta, filter, partial clone, push-options, atomic, etc.). Les capacités supportées déterminent quelles fonctionnalités l'opération peut utiliser. Inspectez avec le traçage de paquets :</p>
    <pre><code>GIT_TRACE_PACKET=1 git -c protocol.version=2 ls-remote origin 2&gt;&amp;1 | head -40</code></pre>
    <p>Les serveurs plus anciens peuvent ne pas supporter les capacités plus récentes ; le client retombe gracieusement. Si vous voyez des clones ou fetches étonnamment lents, un vieux serveur sans <code>multi-ack-detailed</code> ou <code>filter</code> en est souvent la cause.</p>
    <h2>Erreurs fréquentes</h2>
    <p>Mélanger HTTPS et SSH dans le même dépôt ; si une CI utilise HTTPS mais votre dev utilise SSH, les scripts peuvent se confondre. Soit tenez-vous-en à un seul, soit utilisez la réécriture <code>insteadOf</code> :</p>
    <pre><code>git config --global url."git@github.com:".insteadOf "https://github.com/"</code></pre>
    <p>Stocker des tokens d'accès personnels en clair dans la configuration ; utilisez plutôt un assistant d'identifiants. Oublier d'activer <code>protocol.version=2</code> sur les vieilles installations Git. Enfin, exposer <code>git://</code> sur l'Internet ouvert pour l'accès en écriture ; le protocole ne peut pas authentifier. Utilisez SSH ou HTTPS.</p>

- source_title: "Authentication and credentials"
  title: "Authentification et identifiants"
  langcode: fr
  body: |
    <h2>Introduction</h2>
    <p>S'authentifier auprès d'un remote Git est principalement invisible jusqu'à ce que cela tourne mal. Les deux mécanismes principaux sont les <strong>clés SSH</strong> et les <strong>identifiants HTTPS</strong> (mots de passe ou, plus communément aujourd'hui, jetons d'accès personnels).</p>
    <h2>Clés SSH</h2>
    <p>Générez une clé moderne :</p>
    <pre><code>ssh-keygen -t ed25519 -C "ada@example.com"
    ssh-add --apple-use-keychain ~/.ssh/id_ed25519     # macOS
    ssh-add ~/.ssh/id_ed25519                           # Linux</code></pre>
    <p>Ajoutez la clé publique (<code>~/.ssh/id_ed25519.pub</code>) à votre compte d'hébergement. Testez :</p>
    <pre><code>ssh -T git@github.com
    # Hi ada! You've successfully authenticated...</code></pre>
    <h2>Configuration SSH</h2>
    <p>Les surcharges par hôte vont dans <code>~/.ssh/config</code> :</p>
    <pre><code>Host github.com
        User git
        IdentityFile ~/.ssh/id_ed25519
        IdentitiesOnly yes</code></pre>
    <h2>Identifiants HTTPS</h2>
    <p>La plupart des hôtes n'acceptent plus les mots de passe de compte ; utilisez un jeton d'accès personnel (PAT) avec les bonnes portées. Git le stocke via un <em>assistant d'identifiants</em> :</p>
    <pre><code>git config --global credential.helper cache              # en mémoire, expire
    git config --global credential.helper "cache --timeout=86400"
    git config --global credential.helper osxkeychain        # macOS
    git config --global credential.helper manager            # Windows
    git config --global credential.helper store              # fichier en clair (seulement si vous devez)</code></pre>
    <p>La première fois que vous poussez, Git vous demande et l'assistant sauvegarde le token.</p>
    <h2>Inspecter et effacer</h2>
    <pre><code>echo "url=https://github.com" | git credential fill
    echo "url=https://github.com" | git credential reject</code></pre>
    <p><code>git credential</code> est une interface bas niveau vers l'assistant.</p>
    <h2>Assistants par hôte</h2>
    <pre><code>git config --global credential.https://github.com.helper manager
    git config --global credential.https://gitlab.com.helper cache</code></pre>
    <p>Utile quand différents hôtes nécessitent différentes méthodes d'authentification.</p>
    <h2>Signer commits et tags</h2>
    <p>Authentification et signature sont différentes. La signature prouve la paternité d'un commit :</p>
    <pre><code>git config --global gpg.format ssh
    git config --global user.signingkey ~/.ssh/id_ed25519.pub
    git commit -S -m "Signed commit"
    git log --show-signature -1</code></pre>
    <h2>2FA et SSO</h2>
    <p>Si votre hôte exige 2FA, l'authentification HTTPS nécessite un PAT (les mots de passe sont bloqués). Pour les organisations protégées par SSO, le PAT doit aussi être autorisé pour le SSO ; sinon les pushes obtiennent une erreur vague « permission denied ».</p>
    <h2>Identifiants par URL</h2>
    <p>Le système d'identifiants de Git peut stocker différents identifiants par hôte ou chemin. La clé de correspondance est le préfixe d'URL, vous pouvez donc avoir des tokens séparés pour, par exemple, vos organisations GitHub personnelle et professionnelle :</p>
    <pre><code>git config --global credential.https://github.com/work-org.helper manager
    git config --global credential.https://github.com/personal.helper "store --file ~/.git-creds-personal"
    git credential fill &lt;&lt;&lt;"url=https://github.com/work-org/repo"</code></pre>
    <p>Le paramètre <code>credential.useHttpPath</code> dit à Git d'inclure le chemin dans la clé de recherche, permettant des identifiants par dépôt. Utilisez-le seulement quand nécessaire ; il multiplie le nombre d'entrées stockées.</p>
    <h2>Erreurs fréquentes</h2>
    <p>Pousser avec un token qui manque les bonnes portées (par ex. <code>read-only</code>) ; le message d'erreur est générique. Accorder des portées trop larges « par sécurité » ; minimisez. Stocker des tokens dans <code>credential.helper store</code> sur des machines partagées ; c'est un fichier en clair. Oublier de téléverser votre clé publique SSH vers l'hôte et être déconcerté par « permission denied (publickey) » ; <code>ssh -vT git@host</code> montre ce qui se passe. Enfin, mélanger les protocoles : assurez-vous que votre URL de remote correspond à votre méthode d'auth ; <code>git remote set-url</code> peut basculer.</p>

- source_title: "Shallow clones and --depth"
  title: "Clones shallow et --depth"
  langcode: fr
  body: |
    <h2>Introduction</h2>
    <p>Un <em>clone shallow</em> télécharge seulement les N derniers commits d'une branche au lieu de l'historique complet. Le résultat est beaucoup plus petit et plus rapide à fetcher, au prix d'un historique incomplet.</p>
    <h2>Créer</h2>
    <pre><code>git clone --depth 1 https://github.com/example/widget.git
    git clone --depth 50 https://github.com/example/widget.git
    git clone --depth 1 --branch v1.2.3 --single-branch &lt;url&gt;</code></pre>
    <p>Le répertoire <code>.git</code> contient un fichier <code>shallow</code> listant les commits dont les parents ont été omis.</p>
    <h2>Pourquoi shallow</h2>
    <ul>
      <li>Builds CI : besoin seulement de la source pour HEAD.</li>
      <li>Conteneurs et Dockerfiles : images plus petites.</li>
      <li>Outils ponctuels qui n'ont pas besoin d'historique.</li>
    </ul>
    <h2>Limitations</h2>
    <ul>
      <li>Vous ne pouvez pas pousser depuis un clone shallow si votre push dépend de commits que le serveur n'a pas (rare, mais possible).</li>
      <li><code>git log</code> s'arrête à la frontière shallow.</li>
      <li>Certaines opérations (rebase à travers la frontière, blame sur de vieilles lignes) ne peuvent pas fonctionner.</li>
      <li>Jusqu'à Git 2.11, le clonage shallow via HTTP n'était pas supporté ; Git moderne le gère.</li>
    </ul>
    <h2>Approfondir et désinitialiser le shallow</h2>
    <pre><code>git fetch --depth 100              # étendre la profondeur
    git fetch --deepen 50              # ajouter 50 commits de plus
    git fetch --shallow-since=2024-01-01
    git fetch --unshallow              # télécharger tout l'historique</code></pre>
    <p>Après <code>--unshallow</code>, le dépôt se comporte comme un clone normal.</p>
    <h2>Single-branch et shallow</h2>
    <p><code>--single-branch</code> + <code>--depth 1</code> est le plus petit clone utile possible. Pour ensuite suivre d'autres branches :</p>
    <pre><code>git remote set-branches --add origin main feature
    git fetch origin</code></pre>
    <h2>Clones partiels (une optimisation différente)</h2>
    <p>Si vous avez besoin de l'historique complet mais pas de tous les blobs, utilisez plutôt un clone partiel :</p>
    <pre><code>git clone --filter=blob:none &lt;url&gt;
    git clone --filter=tree:0 &lt;url&gt;</code></pre>
    <p>Les clones partiels téléchargent l'historique mais reportent les blobs (ou trees) jusqu'à besoin. Ils sont généralement un meilleur choix que shallow quand le serveur les supporte.</p>
    <h2>Détecter l'état shallow</h2>
    <pre><code>git rev-parse --is-shallow-repository
    cat .git/shallow</code></pre>
    <h2>Patrons CI</h2>
    <p>De nombreux fournisseurs de CI font des clones shallow par défaut (depth 1 ou 50). Si votre build exécute <code>git describe</code> ou a besoin de blame entre versions, demandez un clone complet :</p>
    <pre><code># GitHub Actions
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0</code></pre>
    <h2>Fichiers shallow et grafts</h2>
    <p>Le fichier <code>shallow</code> dans <code>.git/</code> liste les SHAs de commits dont les parents sont intentionnellement manquants. Git les traite comme des racines pendant la traversée du graphe. Le mécanisme connexe mais déprécié <code>info/grafts</code> permettait de fausser les relations parent ; utilisez plutôt <code>git replace --graft</code>, qui est plus sûr et se réplique via fetch :</p>
    <pre><code>cat .git/shallow
    git replace --graft &lt;commit&gt; &lt;new-parent&gt;
    git replace -l
    git replace -d &lt;commit&gt;</code></pre>
    <p>Cela est occasionnellement utile pour assembler des historiques importés sans réécrire les commits.</p>
    <h2>Erreurs fréquentes</h2>
    <p>Exécuter <code>git describe</code> dans un clone depth-1 et obtenir une erreur parce qu'aucun tag annoté n'est atteignable ; soit fetchez les tags (<code>--tags</code>) soit utilisez un clone plus profond. Essayer de rebaser une branche de feature dans un clone shallow où la base de merge est au-delà de la frontière shallow ; approfondissez d'abord. Pousser depuis un clone shallow et être surpris par « remote rejected » ; le serveur peut avoir besoin d'objets parents manquants. Enfin, traiter les clones shallow comme un substitut aux clones partiels ; ils résolvent des problèmes différents et le partiel est généralement plus convivial.</p>

- source_title: "Git garbage collection basics"
  title: "Bases du garbage collection Git"
  langcode: fr
  body: |
    <h2>Introduction</h2>
    <p>Le <em>garbage collection</em> (gc) garde votre dépôt compact et rapide. Git le lance automatiquement quand certains seuils sont dépassés. Vous pouvez aussi l'invoquer manuellement.</p>
    <h2>Ce que fait gc</h2>
    <ol>
      <li>Pack les objets loose dans des pack files.</li>
      <li>Re-deltifie si demandé.</li>
      <li>Supprime les objets inatteignables plus vieux que la fenêtre de prune-expire.</li>
      <li>Expire les entrées de reflog passé leur TTL.</li>
      <li>Optionnellement écrit le fichier commit-graph.</li>
    </ol>
    <pre><code>git gc
    git gc --auto
    git gc --aggressive
    git gc --prune=now
    git count-objects -v</code></pre>
    <h2>Seuils auto-gc</h2>
    <pre><code>git config gc.auto 6700                 # seuil d'objets loose
    git config gc.autoPackLimit 50          # seuil du nombre de packs
    git config gc.autoDetach true           # exécuter en arrière-plan</code></pre>
    <p>L'auto-gc se déclenche après les opérations qui créent de nouveaux objets, comme <code>commit</code> et <code>fetch</code>. Avec <code>autoDetach</code>, il s'exécute en arrière-plan et Git rend la main immédiatement.</p>
    <h2>Expiration du reflog</h2>
    <pre><code>git config gc.reflogExpire 90.days
    git config gc.reflogExpireUnreachable 30.days
    git reflog expire --expire=90.days --all</code></pre>
    <p>Les entrées atteignables durent 90 jours, les inatteignables 30 par défaut. Les branches et tags que vous supprimez laissent des traces de reflog qui survivent pendant cette fenêtre.</p>
    <h2>Fenêtre de prune</h2>
    <pre><code>git config gc.pruneExpire 2.weeks.ago</code></pre>
    <p>Les objets inatteignables plus vieux que cela sont éligibles à la suppression pendant gc. <code>--prune=now</code> supprime immédiatement ; utile mais dangereux car il retire les marges de sécurité.</p>
    <h2>Agressif vs normal</h2>
    <pre><code>git gc                       # routine : packer les nouveaux, élaguer les vieux
    git gc --aggressive          # reconstruire les deltas à partir de zéro</code></pre>
    <p>Le gc agressif vaut rarement la peine ; il est lourd en CPU et le gain est généralement faible. Le gc normal suffit pour la plupart des dépôts.</p>
    <h2>Maintenance</h2>
    <p>Git moderne (2.29+) a un sous-système <code>maintenance</code> qui consolide et améliore gc :</p>
    <pre><code>git maintenance start
    git maintenance run --task gc
    git maintenance run --task commit-graph
    git maintenance run --task incremental-repack</code></pre>
    <p><code>git maintenance start</code> enregistre une tâche de fond (cron, launchd ou timer systemd) qui optimise périodiquement le dépôt.</p>
    <h2>Opérations verrouillées</h2>
    <p>Si gc est interrompu, vous pouvez voir un fichier de verrou obsolète :</p>
    <pre><code>ls .git/gc.pid
    rm .git/gc.pid    # seulement après confirmation qu'aucun gc ne tourne</code></pre>
    <h2>Ce que gc ne supprime jamais</h2>
    <p>Plusieurs classes d'objets sont exemptes de gc jusqu'à ce que leur référence expire :</p>
    <ul>
      <li>Objets atteignables depuis toute ref sous <code>refs/</code>.</li>
      <li>Objets atteignables depuis le reflog de toute ref (jusqu'à expiration du reflog).</li>
      <li>Objets sous <code>refs/stash</code> (la liste de stash).</li>
      <li>Objets épinglés par les mappings <code>git replace</code>.</li>
      <li>Objets atteignables depuis le HEAD et l'index des worktrees.</li>
    </ul>
    <pre><code>git fsck --unreachable --no-reflogs
    git reflog expire --expire-unreachable=now --all
    git gc --prune=now</code></pre>
    <p>Cette dernière séquence est la recette standard « vraiment supprimer l'historique inatteignable » ; à utiliser avec précaution.</p>
    <h2>Erreurs fréquentes</h2>
    <p>Exécuter <code>git gc --prune=now</code> juste après une opération destructive, éliminant le filet de sécurité du reflog. Attendez toujours la fenêtre par défaut sauf si vous avez vraiment besoin de l'espace. Désactiver auto-gc sur un dépôt à évolution rapide, accumulant des millions d'objets loose. Lancer <code>--aggressive</code> sur un planning en supposant que « plus c'est mieux » ; cela ne fait que brûler du CPU. Enfin, lancer gc en concurrence avec <code>git push</code> sur un serveur ; Git moderne gère la concurrence sûrement, mais des scripts personnalisés qui se battent pour <code>.git/objects</code> peuvent corrompre. Utilisez <code>git maintenance</code> plutôt que des cron jobs maison.</p>

- source_title: "Porcelain vs plumbing commands"
  title: "Commandes porcelain vs plumbing"
  langcode: fr
  body: |
    <h2>Introduction</h2>
    <p>Git est divisé en deux couches. Les commandes <strong>plumbing</strong> sont des blocs de construction bas niveau opérant sur la base de données d'objets, les refs et l'index. Les commandes <strong>porcelain</strong> sont des wrappers conviviaux construits à partir de la plumbing. <code>git commit</code> est porcelain ; <code>git hash-object</code>, <code>git write-tree</code> et <code>git update-ref</code> sont plumbing.</p>
    <h2>Pourquoi la séparation</h2>
    <p>La sortie porcelain est destinée aux humains et peut changer entre versions. La sortie plumbing est stable, parsable et destinée aux scripts. Les confondre est la cause la plus courante de scripts Git fragiles.</p>
    <h2>Commandes porcelain courantes</h2>
    <ul>
      <li><code>git add</code>, <code>git commit</code>, <code>git status</code>, <code>git log</code></li>
      <li><code>git switch</code>, <code>git restore</code>, <code>git branch</code></li>
      <li><code>git merge</code>, <code>git rebase</code>, <code>git cherry-pick</code></li>
      <li><code>git fetch</code>, <code>git pull</code>, <code>git push</code>, <code>git clone</code></li>
    </ul>
    <h2>Commandes plumbing courantes</h2>
    <ul>
      <li><code>git hash-object</code> : calculer le SHA d'un contenu, optionnellement l'écrire.</li>
      <li><code>git cat-file</code> : lire le type, la taille ou le contenu d'un objet.</li>
      <li><code>git ls-tree</code>, <code>git ls-files</code> : lister les contenus d'un tree ou de l'index.</li>
      <li><code>git rev-parse</code> : résoudre un nom en SHA.</li>
      <li><code>git rev-list</code> : lister les SHAs de commits depuis une traversée de graphe.</li>
      <li><code>git update-ref</code>, <code>git symbolic-ref</code> : manipulation de refs.</li>
      <li><code>git read-tree</code>, <code>git write-tree</code>, <code>git commit-tree</code> : création d'index/tree/commit.</li>
      <li><code>git update-index</code> : manipulation bas niveau de l'index.</li>
      <li><code>git pack-objects</code>, <code>git unpack-objects</code>, <code>git index-pack</code>.</li>
    </ul>
    <h2>Construire un commit à la main</h2>
    <p>Pour voir la plumbing en action, construisez un commit sans porcelain :</p>
    <pre><code>BLOB=$(echo "hello" | git hash-object --stdin -w)
    TREE=$(printf "100644 blob $BLOB\thello.txt\n" | git mktree)
    COMMIT=$(echo "first" | git commit-tree $TREE)
    git update-ref refs/heads/main $COMMIT
    git log --oneline</code></pre>
    <p>C'est essentiellement ce que <code>git commit</code> fait en interne.</p>
    <h2>Interfaces de scripting stables</h2>
    <p>Certaines commandes porcelain ont un mode « porcelain » avec un format parsable stable :</p>
    <pre><code>git status --porcelain=v2
    git diff --raw
    git ls-files --stage
    git for-each-ref --format='%(refname) %(objectname)'</code></pre>
    <p>Utilisez ceux-ci dans les scripts ; ne parsez jamais la sortie humaine de <code>git status</code>.</p>
    <h2>Lire la page man</h2>
    <p>Les pages man porcelain sont listées dans <code>git help -a</code> sous « Main Porcelain Commands » ; plumbing sous « Manipulators », « Interrogators », « Synching repositories », « Internal helpers ». Pour des tutoriels d'internes, exécutez <code>git help gitcore-tutorial</code> et <code>git help gitrepository-layout</code>.</p>
    <h2>Quand utiliser plumbing</h2>
    <ul>
      <li>Écrire des scripts fiables qui survivent aux mises à niveau de Git.</li>
      <li>Construire des outils qui s'intègrent au modèle de données de Git.</li>
      <li>Déboguer les commandes porcelain en reproduisant leurs étapes internes.</li>
      <li>Implémenter des workflows personnalisés où porcelain ne convient pas.</li>
    </ul>
    <h2>Erreurs fréquentes</h2>
    <p>Parser la sortie humaine de <code>git status</code> ou <code>git log</code> dans les scripts et casser sur une mise à niveau Git ou un changement de locale. Utilisez les formats <code>--porcelain</code> et <code>--pretty=format:</code> avec des espaces réservés explicites. Appeler <code>git update-ref</code> sans la forme à trois arguments compare-and-set dans des scripts concurrents et entrer en course avec un autre processus. Mélanger le bas niveau <code>git update-index</code> avec le haut niveau <code>git add</code> dans le même workflow et finir avec un état d'index surprenant. Enfin, supposer que porcelain est toujours « plus sûr » que plumbing ; certaines opérations plumbing (comme <code>git update-ref</code>) sont bien plus déterministes que leurs équivalents porcelain. Le bon outil dépend de ce que vous construisez.</p>

