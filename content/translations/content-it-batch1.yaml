# Padroneggiare Git - traduzioni italiane batch 1
# 50 pagine: 20 Per iniziare + 30 Concetti fondamentali

- source_title: "What is Git? (and what isn't it)"
  title: "Cos'è Git? (e cosa non è)"
  langcode: it
  body: |
    <h2>Introduzione</h2>
    <p>Git è un <strong>sistema di controllo versione distribuito</strong> creato originariamente da Linus Torvalds nel 2005 per lo sviluppo del kernel Linux. Tiene traccia delle modifiche ai file nel tempo, consente la collaborazione tra più persone e fornisce a ogni sviluppatore una copia completa della storia del progetto. Oggi Git alimenta la maggior parte dello sviluppo software open source ed enterprise nel mondo.</p>
    <h2>Cos'è Git</h2>
    <p>Git è un sistema di snapshot <em>indirizzato per contenuto</em>. Ogni commit memorizza un'immagine completa dei file tracciati del progetto, identificata da un hash crittografico. Git è veloce perché la maggior parte delle operazioni è locale, ed è resiliente perché ogni clone è un backup completo.</p>
    <ul>
      <li><strong>Distribuito</strong>: ogni clone è un repository completo.</li>
      <li><strong>Basato su snapshot</strong>: i commit memorizzano alberi, non diff.</li>
      <li><strong>Adatto al branching</strong>: i branch sono puntatori leggeri, non copie complete.</li>
    </ul>
    <h2>Cosa Git non è</h2>
    <p>Git non è uno strumento di backup, non è un sistema di code review e non è una piattaforma di deployment. Non blocca i file come i sistemi centralizzati (CVS, SVN, Perforce in modalità predefinita). Non memorizza efficientemente i diff binari per file multimediali grandi senza estensioni come Git LFS. E Git non è GitHub: GitHub, GitLab e Bitbucket sono <em>servizi di hosting</em> costruiti sopra Git.</p>
    <h2>Provarlo</h2>
    <p>Verifica che Git sia installato e controlla la versione:</p>
    <pre><code>git --version</code></pre>
    <p>Inizializza un piccolo repository per vedere Git in azione:</p>
    <pre><code>mkdir hello-git
    cd hello-git
    git init
    echo "hello" > readme.txt
    git add readme.txt
    git commit -m "first commit"
    git log --oneline</code></pre>
    <h2>Perché Git ha vinto</h2>
    <p>Prima di Git, la maggior parte dei team usava strumenti centralizzati che richiedevano l'accesso alla rete per quasi ogni azione. Il modello distribuito di Git ha permesso agli sviluppatori di fare commit, branch e revisioni della storia offline. Combinato con il branching economico e l'adozione da parte del kernel Linux, Git è diventato lo standard di fatto in un decennio. La diffusa disponibilità di hosting gratuito su piattaforme come GitHub, GitLab e Bitbucket ha consolidato il posto di Git: una generazione di sviluppatori ha imparato Git come primo sistema di controllo versione.</p>
    <h2>Come Git memorizza i dati</h2>
    <p>Il modello di archiviazione di Git è insolito. Invece di registrare i diff tra le versioni, Git memorizza snapshot completi di ogni file in ogni commit, deduplicati per hash di contenuto. Questo rende operazioni come checkout e cambio di branch essenzialmente a tempo costante, e rende le operazioni sulla storia come log e blame sorprendentemente veloci. Il compromesso è che modifiche binarie casuali possono far esplodere lo spazio di archiviazione, ed è per questo che esiste Git LFS per gli asset di grandi dimensioni.</p>
    <h2>Errori comuni</h2>
    <p>I principianti confondono spesso Git con GitHub, o assumono che Git tracci automaticamente ogni file in una cartella. Git traccia solo i file su cui si esegue esplicitamente <code>git add</code>, e versiona solo il contenuto sotto la directory di lavoro di un repository inizializzato. Un altro mito: Git "salva" continuamente. Non lo fa. Niente viene registrato finché non si esegue <code>git commit</code>. Infine, Git non è progettato per asset binari di grandi dimensioni; usa Git LFS o un sistema diverso per video, dataset grandi o artefatti compilati.</p>

- source_title: "Installing Git (Linux, macOS, Windows)"
  title: "Installare Git (Linux, macOS, Windows)"
  langcode: it
  body: |
    <h2>Introduzione</h2>
    <p>Installare Git è semplice su ogni piattaforma principale. Questa pagina illustra il metodo di installazione consigliato per Linux, macOS e Windows, e mostra come verificare l'installazione.</p>
    <h2>Linux</h2>
    <p>La maggior parte delle distribuzioni Linux include Git nei repository di pacchetti predefiniti. Usa il tuo gestore di pacchetti:</p>
    <pre><code># Debian, Ubuntu
    sudo apt update
    sudo apt install git

    # Fedora, RHEL, Rocky
    sudo dnf install git

    # Arch
    sudo pacman -S git</code></pre>
    <p>Per la versione più recente, il progetto Git ufficiale mantiene un PPA per Ubuntu (<code>ppa:git-core/ppa</code>) e tarball sorgente su <code>git-scm.com</code>.</p>
    <h2>macOS</h2>
    <p>macOS include uno stub di <code>git</code> che richiede di installare gli strumenti di sviluppo da riga di comando di Apple. Tre opzioni funzionano bene:</p>
    <ol>
      <li>Esegui <code>xcode-select --install</code> per ottenere il Git fornito da Apple.</li>
      <li>Usa <a>Homebrew</a>: <code>brew install git</code> per il Git upstream più recente.</li>
      <li>Scarica l'installer ufficiale da <code>git-scm.com</code>.</li>
    </ol>
    <pre><code>brew install git
    git --version</code></pre>
    <h2>Windows</h2>
    <p>L'installer consigliato è <strong>Git for Windows</strong> da <code>git-scm.com</code>. Include Git, un client OpenSSH, una shell Bash (Git Bash) e un credential helper. In alternativa usa winget o Chocolatey:</p>
    <pre><code>winget install --id Git.Git -e
    choco install git</code></pre>
    <p>Durante l'installazione GUI ti verrà chiesto dei terminatori di riga, dell'editor predefinito e dell'integrazione con il PATH. Le impostazioni predefinite (checkout in stile Windows, commit in stile Unix; Git da riga di comando) sono sensate per la maggior parte degli utenti.</p>
    <h2>Verificare l'installazione</h2>
    <pre><code>git --version
    git help -a | head</code></pre>
    <p>Qualsiasi versione 2.30 o più recente va bene per gli argomenti di questo manuale. Le versioni più vecchie mancano di molte funzionalità di qualità della vita come <code>git switch</code> e <code>git restore</code>.</p>
    <h2>Aggiornare Git</h2>
    <p>Mantenere Git aggiornato è importante: molte funzionalità in questo manuale richiedono Git 2.30 o più recente, e le correzioni di sicurezza vengono rilasciate regolarmente. Su Linux, il tuo gestore di pacchetti gestisce automaticamente gli aggiornamenti. Su macOS con Homebrew, esegui periodicamente <code>brew upgrade git</code>. Su Windows, <code>git update-git-for-windows</code> (integrato in Git for Windows) controlla e installa l'ultima release in un comando.</p>
    <pre><code>git --version
    brew upgrade git
    git update-git-for-windows</code></pre>
    <p>Se vedi improvvisamente avvisi di deprecazione o comandi che si comportano diversamente dopo un aggiornamento, leggi le note di rilascio in <code>/usr/share/doc/git/RelNotes/</code> o su <code>git-scm.com</code>; il percorso di aggiornamento di Git è morbido ma occasionalmente i valori predefiniti cambiano.</p>
    <h2>Errori comuni</h2>
    <p>Su macOS, dimenticare che il Git fornito di serie da Apple è in ritardo rispetto all'upstream di mesi o anni. Usa Homebrew se vuoi le funzionalità recenti. Su Windows, mescolare PowerShell e Git Bash può confondere i nuovi utenti su quale shell stanno usando. Su Linux, installare da un tarball di terze parti senza rimuovere il pacchetto della distribuzione può mettere due binari <code>git</code> nel PATH; usa <code>which -a git</code> per verificare. Infine, non eseguire gli installer di Git con <code>sudo</code> a meno che il tuo gestore di pacchetti non lo richieda esplicitamente.</p>

- source_title: "First-time configuration (git config)"
  title: "Configurazione iniziale (git config)"
  langcode: it
  body: |
    <h2>Introduzione</h2>
    <p>Prima del primo commit, Git deve sapere chi sei. <code>git config</code> memorizza coppie chiave-valore in tre ambiti: <strong>system</strong> (tutti gli utenti), <strong>global</strong> (il tuo account utente) e <strong>local</strong> (un singolo repository). L'ambito globale risiede in <code>~/.gitconfig</code> su Unix e <code>%USERPROFILE%\.gitconfig</code> su Windows.</p>
    <h2>Identità</h2>
    <p>Imposta nome ed email; vengono incorporati in ogni commit:</p>
    <pre><code>git config --global user.name "Ada Lovelace"
    git config --global user.email "ada@example.com"</code></pre>
    <h2>Editor e pager</h2>
    <p>Git lancia il tuo editor per i messaggi di commit e i rebase interattivi. Scegline uno da cui sai uscire:</p>
    <pre><code>git config --global core.editor "nano"
    # oppure
    git config --global core.editor "code --wait"
    # oppure
    git config --global core.editor "vim"</code></pre>
    <h2>Nome del branch predefinito</h2>
    <p>Da Git 2.28 puoi impostare il branch predefinito per i nuovi repository:</p>
    <pre><code>git config --global init.defaultBranch main</code></pre>
    <h2>Terminatori di riga</h2>
    <p>Per evitare sorprese CRLF/LF in team multi-piattaforma:</p>
    <pre><code># Linux, macOS
    git config --global core.autocrlf input

    # Windows
    git config --global core.autocrlf true</code></pre>
    <h2>Alias utili</h2>
    <pre><code>git config --global alias.st status
    git config --global alias.co checkout
    git config --global alias.lg "log --oneline --graph --decorate --all"</code></pre>
    <p>Ora <code>git lg</code> dà un grafico compatto di tutti i branch.</p>
    <h2>Ispezionare la configurazione</h2>
    <p>Elenca tutta la configurazione con i file di origine, utile per debuggare sorprese:</p>
    <pre><code>git config --list --show-origin
    git config --get user.email</code></pre>
    <h2>Comportamento di pull</h2>
    <p>Da Git 2.27 il comportamento predefinito di <code>pull</code> richiede una scelta esplicita. Scegline una:</p>
    <pre><code>git config --global pull.rebase false   # merge (predefinito)
    git config --global pull.rebase true    # rebase
    git config --global pull.ff only        # solo fast-forward</code></pre>
    <h2>Inclusioni condizionali</h2>
    <p>Git supporta la configurazione per directory tramite <code>includeIf</code>. È il modo più pulito per tenere separate le identità lavoro e personale senza ricordarsi di impostare la configurazione locale in ogni clone:</p>
    <pre><code># in ~/.gitconfig
    [includeIf "gitdir:~/work/"]
      path = ~/.gitconfig-work

    # in ~/.gitconfig-work
    [user]
      email = ada@work.com
      signingkey = ssh-ed25519 AAAA...</code></pre>
    <p>Qualsiasi repository clonato sotto <code>~/work/</code> raccoglie automaticamente l'identità di lavoro. Combina con le inclusioni <code>onbranch:</code> per limitare le impostazioni a branch specifici.</p>
    <h2>Override per repository</h2>
    <p>La configurazione locale in <code>.git/config</code> sovrascrive il file globale. È il posto giusto per identità, hook e chiavi di firma specifiche del progetto. Per controllare da quale ambito proviene un'impostazione:</p>
    <pre><code>git config --show-origin --get user.email
    git config --show-scope --get-all credential.helper</code></pre>
    <p>Se un valore sembra sbagliato, <code>--show-origin</code> ti dice esattamente quale file lo possiede. Attenzione: ognuno degli ambiti <code>system</code>, <code>global</code>, <code>local</code> o anche <code>worktree</code> può oscurare un altro. <code>git config --list --show-origin</code> mostra il quadro completo in un colpo solo.</p>
    <h2>Errori comuni</h2>
    <p>Impostare <code>user.email</code> a un indirizzo personale mentre si fa commit per lavoro, esponendolo su piattaforme di hosting pubbliche. Usa l'ambito <em>local</em> all'interno dei repository di lavoro per sovrascrivere il valore globale: <code>git config user.email "ada@work.com"</code>. Un altro classico: modificare <code>~/.gitconfig</code> a mano e introdurre un errore di sintassi che rompe ogni comando Git. Usa <code>git config</code> per scrivere i valori, e <code>git config --list</code> per verificare dopo ogni modifica.</p>

- source_title: "Creating your first repository (git init)"
  title: "Creare il tuo primo repository (git init)"
  langcode: it
  body: |
    <h2>Introduzione</h2>
    <p><code>git init</code> trasforma una directory ordinaria in un repository Git. Crea una directory nascosta <code>.git</code> contenente tutta la contabilità di Git: oggetti, ref, configurazione e hook. La working tree (i tuoi file normali) è lasciata invariata.</p>
    <h2>Inizializzare un progetto</h2>
    <pre><code>mkdir my-project
    cd my-project
    git init
    # Initialized empty Git repository in /home/ada/my-project/.git/</code></pre>
    <p>Da Git 2.28 puoi impostare il nome del branch iniziale dalla riga di comando:</p>
    <pre><code>git init --initial-branch=main
    # oppure abbreviato
    git init -b main</code></pre>
    <h2>Cosa è appena successo</h2>
    <p>Ispeziona la nuova directory:</p>
    <pre><code>ls -a
    ls .git</code></pre>
    <p>Vedrai <code>HEAD</code>, <code>config</code>, <code>description</code>, <code>hooks/</code>, <code>info/</code>, <code>objects/</code> e <code>refs/</code>. Niente è ancora committato; <code>HEAD</code> punta a un branch non ancora nato.</p>
    <h2>Il tuo primo commit</h2>
    <ol>
      <li>Crea un file: <code>echo "# My Project" &gt; README.md</code></li>
      <li>Mettilo in stage: <code>git add README.md</code></li>
      <li>Fai commit: <code>git commit -m "Initial commit"</code></li>
    </ol>
    <pre><code>echo "# My Project" > README.md
    git add README.md
    git commit -m "Initial commit"
    git log --oneline</code></pre>
    <h2>Repository bare</h2>
    <p>I server di solito ospitano repository <em>bare</em> senza working tree. Usa <code>--bare</code>:</p>
    <pre><code>git init --bare project.git</code></pre>
    <p>I repo bare sono il bersaglio dei push; non si modificano i file direttamente al loro interno.</p>
    <h2>Ri-inizializzare</h2>
    <p>Eseguire di nuovo <code>git init</code> in un repo esistente è sicuro; ri-applica i template e stampa "Reinitialized existing Git repository". Non cancella i commit.</p>
    <h2>Template</h2>
    <p>Per impostazione predefinita <code>git init</code> popola <code>.git/hooks/</code> da <code>/usr/share/git-core/templates/</code>. Puoi sovrascrivere la directory dei template per iniettare i tuoi hook, un <code>.gitignore</code> predefinito o una description in ogni nuovo repo:</p>
    <pre><code>git init --template=~/.git-templates
    git config --global init.templateDir ~/.git-templates</code></pre>
    <p>È così che le organizzazioni distribuiscono pre-commit hook standard a ogni nuovo clone senza che ogni sviluppatore copi i file manualmente.</p>
    <h2>Nome del branch iniziale</h2>
    <p>Molti progetti sono passati da <code>master</code> a <code>main</code> come nome del branch predefinito. La scelta è locale al tuo repo, ma far corrispondere il default del tuo provider di hosting evita confusione al primo push. Impostalo una volta globalmente e dimenticatene: <code>git config --global init.defaultBranch main</code>.</p>
    <h2>Dove Git smette di cercare</h2>
    <p>Git localizza il repository risalendo l'albero delle directory finché non trova una directory o un file <code>.git</code>. La risalita si ferma ai confini del filesystem per impostazione predefinita (<code>core.discoveryAcrossFilesystem</code> cambia questo). La variabile d'ambiente <code>GIT_DIR</code> sovrascrive completamente la discovery; <code>GIT_WORK_TREE</code> imposta una working tree non predefinita. Insieme ti permettono di operare su un repo il cui <code>.git</code> è in una posizione insolita:</p>
    <pre><code>GIT_DIR=/srv/repos/widget.git GIT_WORK_TREE=/var/www git status</code></pre>
    <h2>Errori comuni</h2>
    <p>Eseguire <code>git init</code> nella tua home directory per errore, mettendo l'intera collezione di dotfile sotto un'unica radice di repository massiccia. Controlla sempre <code>pwd</code> prima. Un altro errore: cancellare <code>.git</code> per "ricominciare da capo" mantenendo il lavoro non committato. Va bene, ma renditi conto che tutta la storia è andata persa per sempre. Infine, non committare grossi binari in un repo appena inizializzato senza prima scrivere un <code>.gitignore</code>; te ne pentirai quando il repo si gonfierà. Esegui <code>git status</code> subito dopo <code>git init</code> per vedere cosa Git intende tracciare prima di mettere qualsiasi cosa in stage.</p>

- source_title: "Basic workflow: edit, stage, commit"
  title: "Workflow di base: modifica, stage, commit"
  langcode: it
  body: |
    <h2>Introduzione</h2>
    <p>Quasi ogni sessione Git segue lo stesso ritmo a tre fasi: <strong>modifica</strong> i file nella tua working tree, metti in <strong>stage</strong> le modifiche che vuoi registrare e fai il <strong>commit</strong> nella storia. Padroneggiare questo ciclo è la base di tutto il resto.</p>
    <h2>Le tre aree</h2>
    <ul>
      <li><strong>Working tree</strong>: file su disco che modifichi con il tuo editor.</li>
      <li><strong>Index</strong> (chiamato anche staging area): uno snapshot di ciò che andrà nel prossimo commit.</li>
      <li><strong>Repository</strong>: la storia committata memorizzata in <code>.git</code>.</li>
    </ul>
    <h2>Un ciclo completo</h2>
    <ol>
      <li>Modifica un file nel tuo editor.</li>
      <li>Esegui <code>git status</code> per vedere cos'è cambiato.</li>
      <li>Esegui <code>git diff</code> per ispezionare le modifiche.</li>
      <li>Metti in stage con <code>git add</code>.</li>
      <li>Fai commit con <code>git commit</code>.</li>
    </ol>
    <pre><code>echo "hello" >> notes.txt
    git status
    git diff
    git add notes.txt
    git diff --staged
    git commit -m "Add greeting to notes"</code></pre>
    <h2>Stage selettivo</h2>
    <p>Puoi mettere in stage singoli file, pattern glob o anche <em>parti</em> di un file usando la modalità interattiva:</p>
    <pre><code>git add notes.txt readme.md
    git add "src/*.py"
    git add -p notes.txt    # patch mode: yes/no per ogni hunk</code></pre>
    <p>La modalità patch è preziosa quando hai modifiche miste che vuoi dividere in commit separati.</p>
    <h2>Saltare l'index</h2>
    <p>La scorciatoia <code>git commit -a</code> mette in stage e committa tutti i file <em>tracciati</em> in un solo passo. Non aggiunge nuovi file (untracked):</p>
    <pre><code>git commit -am "Quick fix"</code></pre>
    <h2>Scrivere buoni commit</h2>
    <p>Un messaggio di commit ha una riga oggetto breve (50 caratteri circa) e un corpo opzionale che spiega il perché. Esegui <code>git commit</code> senza <code>-m</code> per aprire l'editor:</p>
    <pre><code>git commit
    # si apre l'editor
    # Riga oggetto
    #
    # Spiegazione più lunga...</code></pre>
    <h2>Commit atomici</h2>
    <p>Un buon commit cattura un cambiamento logico. Costruiscilo deliberatamente: metti in stage esattamente gli hunk che vanno insieme con <code>git add -p</code>, poi committa. Se ti ritrovi a descrivere un commit con "e" nell'oggetto ("Fix login and refactor logger"), probabilmente dovrebbe essere due commit.</p>
    <pre><code>git add -p src/auth.py        # stage solo del fix di login
    git commit -m "Fix login redirect on expired session"
    git add -p src/logger.py
    git commit -m "Refactor logger to use structured fields"</code></pre>
    <p>I commit atomici rendono <code>git bisect</code>, <code>git revert</code> e la code review enormemente più facili in seguito.</p>
    <h2>Errori comuni</h2>
    <p>Dimenticare il <code>git add</code> di nuovi file ed essere sorpresi da un commit "vuoto". <code>git status</code> dice sempre la verità; leggilo prima di committare. Un'altra trappola: usare <code>git commit -am</code> quando hai nuovi file untracked, che li lascia silenziosamente fuori. Infine, committare file generati (output di build, <code>node_modules</code>, impostazioni dell'IDE) ingombra la storia e rallenta i clone; aggiungili a <code>.gitignore</code> prima di metterli in stage. Nel dubbio, esegui <code>git diff --staged</code> per vedere esattamente cosa conterrà il prossimo commit.</p>

- source_title: "Understanding the staging area (index)"
  title: "Capire la staging area (index)"
  langcode: it
  body: |
    <h2>Introduzione</h2>
    <p>L'<em>index</em>, chiamato anche staging area o cache, è una delle caratteristiche distintive di Git. È un file binario in <code>.git/index</code> che contiene <strong>l'albero che intendi committare prossimamente</strong>. Capire l'index toglie la maggior parte del mistero dall'output di <code>git status</code>.</p>
    <h2>Perché esiste</h2>
    <p>L'index ti permette di comporre un commit deliberatamente invece di scaricare ogni modifica in una volta sola. Puoi modificare dieci file ma committarne solo i tre che risolvono un bug, lasciando gli altri in stage per un commit successivo. Questo disaccoppiamento abilita una storia pulita e atomica.</p>
    <h2>Ispezionare l'index</h2>
    <p>Due comandi confrontano le tre aree:</p>
    <pre><code>git diff             # working tree vs index
    git diff --staged    # index vs HEAD
    git diff HEAD        # working tree vs HEAD</code></pre>
    <p>Il comando plumbing <code>git ls-files --stage</code> mostra il contenuto grezzo dell'index, inclusi gli hash SHA-1:</p>
    <pre><code>git ls-files --stage</code></pre>
    <h2>Mettere in stage le modifiche</h2>
    <pre><code>git add file.txt          # aggiungi o aggiorna
    git add .                 # aggiungi tutto dalla cwd in giù
    git add -u                # aggiorna solo i file tracciati
    git add -p                # interattivo, hunk per hunk
    git add -N new.txt        # intent-to-add (traccia vuoto)</code></pre>
    <h2>Togliere dallo stage</h2>
    <p>Se hai messo in stage qualcosa per errore, toglilo senza perdere la modifica:</p>
    <pre><code># Moderno (Git 2.23+)
    git restore --staged file.txt

    # Sintassi più vecchia, funziona ancora
    git reset HEAD file.txt</code></pre>
    <h2>L'index nei conflitti</h2>
    <p>Durante un conflitto di merge, l'index acquisisce <em>tre</em> entry per ogni path in conflitto: stage 1 è l'antenato comune, stage 2 è "ours", stage 3 è "theirs". <code>git ls-files -u</code> le mostra:</p>
    <pre><code>git ls-files -u</code></pre>
    <p>Risolvere il conflitto significa scrivere una versione finale e fare <code>git add</code>, riducendo a una singola entry stage-0.</p>
    <h2>Il formato del file index</h2>
    <p>L'index è un formato binario documentato nel sorgente di Git in <code>Documentation/gitformat-index.txt</code>. Inizia con un header di 12 byte (signature <code>DIRC</code>, versione, conteggio entry) seguito da entry ordinate. Diverse estensioni opzionali aggiungono caching: <code>TREE</code> memorizza nella cache gli hash dei sottoalberi per <code>write-tree</code> veloce, e <code>UNTR</code> memorizza nella cache le liste di file untracked per <code>git status</code> veloce. Git moderno supporta anche un sparse index che omette le entry fuori dal cono che hai checkoutato:</p>
    <pre><code>git sparse-checkout init --cone
    git config core.sparseCheckoutCone true
    git update-index --test-untracked-cache</code></pre>
    <h2>Errori comuni</h2>
    <p>Credere che <code>git add</code> sia definitivo. Non lo è: puoi mettere in stage, modificare di nuovo e rimettere in stage. L'index è solo la bozza del prossimo commit. Un'altra confusione classica: modificare un file in stage, poi committare, ed essere perplessi che le nuove modifiche non siano incluse. <code>git add</code> cattura uno snapshot al momento dell'esecuzione; le modifiche successive vivono solo nella working tree. Esegui <code>git diff</code> (senza flag) per vedere cosa è in stage ma poi modificato. Infine, non cancellare mai <code>.git/index</code> manualmente; ricostruiscilo con <code>git read-tree HEAD</code> se mai si corrompe.</p>

- source_title: "Viewing history with git log"
  title: "Visualizzare la storia con git log"
  langcode: it
  body: |
    <h2>Introduzione</h2>
    <p><code>git log</code> percorre il grafo dei commit da un punto di partenza (predefinito: <code>HEAD</code>) all'indietro attraverso i parent, stampando ogni commit. È lo strumento principale per esplorare la storia del progetto.</p>
    <h2>Uso di base</h2>
    <pre><code>git log
    git log --oneline
    git log --oneline --graph --decorate --all</code></pre>
    <p>L'ultima forma è la vista coltellino svizzero: un grafico compatto di ogni branch con i ref decorati.</p>
    <h2>Filtrare per data, autore, messaggio</h2>
    <pre><code>git log --since="2 weeks ago"
    git log --until=2025-01-01
    git log --author="Ada"
    git log --grep="bugfix"
    git log -S "deprecated_function"   # pickaxe: quando è apparsa una stringa?</code></pre>
    <p><code>-S</code> è prezioso per l'archeologia: trova i commit che cambiano il numero di occorrenze di una stringa in qualsiasi file.</p>
    <h2>Mostrare i diff</h2>
    <pre><code>git log -p                 # patch completa per commit
    git log --stat             # file modificati più conteggi +/-
    git log --shortstat        # solo riga di riepilogo
    git log -p -- path/to/file # solo commit che toccano un path</code></pre>
    <h2>Formati personalizzati</h2>
    <p><code>--pretty=format:</code> accetta segnaposto. Una utile riga singola:</p>
    <pre><code>git log --pretty=format:"%h %an %ad %s" --date=short</code></pre>
    <p><code>%h</code> hash abbreviato, <code>%an</code> nome autore, <code>%ad</code> data autore, <code>%s</code> oggetto. Vedi <code>git help log</code> per la lista completa.</p>
    <h2>Limiti e range</h2>
    <pre><code>git log -n 5                       # ultimi 5 commit
    git log main..feature              # commit su feature non su main
    git log main...feature             # differenza simmetrica
    git log feature ^main              # uguale a main..feature</code></pre>
    <h2>Seguire i rename dei file</h2>
    <p>Git non registra i rename, li rileva. Per seguire la storia attraverso un rename:</p>
    <pre><code>git log --follow -- path/to/file</code></pre>
    <h2>Alias utili</h2>
    <p>Una manciata di alias per <code>git log</code> si ripaga nella prima settimana. Due particolarmente buoni:</p>
    <pre><code>git config --global alias.lg "log --oneline --graph --decorate --all"
    git config --global alias.last "log -1 HEAD --stat"
    git config --global alias.recent "log --since='2 weeks ago' --author=$(git config user.email)"</code></pre>
    <p><code>git lg</code> dà la vista dall'alto del grafo; <code>git last</code> mostra cosa è appena successo; <code>git recent</code> risponde a "su cosa ho lavorato ultimamente?". Aggiungi un alias per ogni invocazione di log che digiti più di due volte.</p>
    <h2>Inverso e limite</h2>
    <p>Per impostazione predefinita <code>git log</code> percorre dal più nuovo al più vecchio. A volte (note di rilascio, archeologia del codice) vuoi l'opposto, abbinato a un formato pulito:</p>
    <pre><code>git log --reverse --oneline v1.0.0..v1.1.0
    git log --reverse --pretty=format:"* %s (%h)" v1.0.0..HEAD &gt; CHANGELOG.draft</code></pre>
    <p>Qui pickaxe e i filtri di path danno il loro meglio: <code>git log --reverse -S "old_api" -- src/</code> mostra la storia cronologica dell'apparizione e scomparsa di una stringa, perfetto per tracciare le deprecazioni.</p>
    <h2>Errori comuni</h2>
    <p>Leggere solo la storia di <code>HEAD</code> e perdere i commit su altri branch; passa <code>--all</code> per vederli. Confondere <code>--author</code> (una regex sul campo autore) con una corrispondenza esatta letterale; quota il pattern con cura. Usare <code>git log file</code> invece di <code>git log -- file</code>: il separatore <code>--</code> disambigua i path dai ref, specialmente se un branch e un file condividono un nome. Infine, aspettarsi che <code>git log</code> mostri i commit cancellati dopo un force-reset; usa <code>git reflog</code> per quello. <code>git log</code> percorre solo la storia raggiungibile.</p>

- source_title: "Ignoring files with .gitignore"
  title: "Ignorare file con .gitignore"
  langcode: it
  body: |
    <h2>Introduzione</h2>
    <p>Un file <code>.gitignore</code> elenca i pattern che Git deve trattare come untracked e non offrire mai di aggiungere. Mantiene fuori dal repository artefatti di build, segreti, metadati del sistema operativo e file temporanei dell'editor.</p>
    <h2>Sintassi dei pattern</h2>
    <ul>
      <li><code>name</code>: corrisponde a file o directory chiamati <code>name</code> a qualsiasi profondità.</li>
      <li><code>/name</code>: corrisponde solo alla radice del repository.</li>
      <li><code>name/</code>: corrisponde solo alle directory.</li>
      <li><code>*.log</code>: glob; corrisponde a qualsiasi file <code>.log</code>.</li>
      <li><code>**/build</code>: corrisponde a <code>build</code> a qualsiasi profondità.</li>
      <li><code>!important.log</code>: ri-includi un path precedentemente ignorato.</li>
      <li><code>#</code> all'inizio di una riga è un commento.</li>
    </ul>
    <h2>Un esempio realistico</h2>
    <pre><code># .gitignore
    # Output di build
    /dist/
    /build/
    *.o
    *.pyc

    # Dipendenze
    /node_modules/
    /vendor/

    # Editor
    .idea/
    .vscode/
    *.swp

    # OS
    .DS_Store
    Thumbs.db

    # Segreti
    .env
    *.pem</code></pre>
    <h2>Più file .gitignore</h2>
    <p>Puoi mettere un <code>.gitignore</code> a qualsiasi livello. I pattern sono relativi alla directory del file, e i file più profondi sovrascrivono quelli più superficiali. C'è anche un file di ignore globale per le tue preferenze personali:</p>
    <pre><code>git config --global core.excludesFile ~/.gitignore_global</code></pre>
    <p>Usalo per file di swap dell'editor e spazzatura del sistema operativo, non per path specifici di progetto.</p>
    <h2>Tracciare file già tracciati</h2>
    <p>Aggiungere un path a <code>.gitignore</code> <strong>non</strong> lo rimuove dal repository. Smetti di tracciare un file mantenendolo su disco:</p>
    <pre><code>git rm --cached secrets.env
    git commit -m "Stop tracking secrets.env"</code></pre>
    <h2>Debug degli ignore</h2>
    <p>Perché Git sta ignorando (o non ignorando) un path? Chiedi:</p>
    <pre><code>git check-ignore -v path/to/file</code></pre>
    <p>L'output nomina il file e la riga che hanno fatto match.</p>
    <h2>Ordine di valutazione</h2>
    <p>Git valuta le regole di ignore da diverse fonti, in questo ordine: argomenti della riga di comando, poi file <code>.gitignore</code> per directory (dal più profondo), poi <code>$GIT_DIR/info/exclude</code>, infine il <code>core.excludesFile</code> globale. Le regole successive (più specifiche) sovrascrivono quelle precedenti, e una negazione (<code>!pattern</code>) re-include un path solo se la sua directory padre non è essa stessa esclusa. Questa ultima regola inciampa molti utenti:</p>
    <pre><code># Sbagliato: non si può un-ignore un file in una directory ignorata
    /build/
    !/build/keep.log

    # Giusto: ignora i contenuti ma mantieni la directory dentro
    /build/*
    !/build/keep.log</code></pre>
    <h2>Per repository e exclude globali</h2>
    <p>Due meccanismi extra di ignore complementano <code>.gitignore</code>. Il file untracked per repository <code>.git/info/exclude</code> si applica solo al tuo clone (buono per file IDE che non vuoi committare in <code>.gitignore</code> per tutto il team). Il <code>core.excludesFile</code> globale si applica a tutti i tuoi repo:</p>
    <pre><code>echo ".idea/" &gt;&gt; .git/info/exclude
    git config --global core.excludesFile ~/.gitignore_global
    echo ".DS_Store" &gt;&gt; ~/.gitignore_global</code></pre>
    <p>Usali per preferenze personali; riserva il <code>.gitignore</code> committato per le regole valide per tutto il team.</p>
    <h2>Errori comuni</h2>
    <p>Aggiungere <code>secrets.env</code> a <code>.gitignore</code> dopo che è già stato committato e assumere che il segreto sia sparito. È ancora nella storia; ruota il segreto e considera di usare <code>git filter-repo</code> per cancellarlo. Un'altra trappola: ignorare una directory con <code>build</code> quando intendevi <code>/build</code>, sopprimendo accidentalmente un file chiamato <code>build</code> in profondità nell'albero. Infine, committare <code>.gitignore</code> stesso è essenziale; senza di esso, ogni collaboratore deve inventare le proprie regole di ignore. <code>.gitignore</code> appartiene <em>al</em> repository, non fuori.</p>

- source_title: "Getting help (man pages, --help, online)"
  title: "Ottenere aiuto (man page, --help, online)"
  langcode: it
  body: |
    <h2>Introduzione</h2>
    <p>Git include una documentazione interna estensiva. Saperla evocare rapidamente ti farà risparmiare ore di tentativi alla cieca. Questa pagina fa il giro del sistema di aiuto, dalle one-liner ai manuali completi.</p>
    <h2>Tre modi di chiedere</h2>
    <p>Ogni comando supporta tre forme di aiuto:</p>
    <pre><code>git help &lt;command&gt;     # man page completa nel tuo pager
    git &lt;command&gt; --help    # stessa cosa
    git &lt;command&gt; -h        # breve riassunto d'uso</code></pre>
    <p>Esempio:</p>
    <pre><code>git help commit
    git commit --help
    git commit -h</code></pre>
    <h2>Elencare i comandi</h2>
    <pre><code>git help -a            # tutti i comandi
    git help -g            # guide (gittutorial, gitcore-tutorial, ecc.)
    git help everyday      # il cheatsheet quotidiano di Git</code></pre>
    <p><code>git help everyday</code> in particolare è uno dei migliori riferimenti da principiante a intermedio inclusi con Git.</p>
    <h2>Guide concettuali</h2>
    <p>Git include guide in prosa come man page separate:</p>
    <pre><code>git help gittutorial
    git help gitcore-tutorial
    git help gitglossary
    git help gitworkflows
    git help gitrevisions</code></pre>
    <p><code>gitrevisions</code> è il riferimento canonico per la sintassi dei ref (<code>HEAD~3</code>, <code>main@{yesterday}</code>, ecc.).</p>
    <h2>Configurare il formato dell'aiuto</h2>
    <p>Per impostazione predefinita <code>git help</code> apre una man page. Puoi passare a HTML o info:</p>
    <pre><code>git config --global help.format html
    git config --global help.format info
    git config --global help.format man   # default</code></pre>
    <p>HTML apre la copia locale nel browser, utile su sistemi senza <code>man</code>.</p>
    <h2>Risorse online</h2>
    <ul>
      <li><strong>git-scm.com/docs</strong>: manuale ufficiale rispecchiato online.</li>
      <li><strong>libro Pro Git</strong> di Chacon e Straub: gratuito, completo, regolarmente aggiornato.</li>
      <li><strong>archivio della mailing list di Git</strong>: <code>lore.kernel.org/git</code> per discussioni di design.</li>
    </ul>
    <h2>Cercare nella documentazione</h2>
    <p>Se non ricordi il nome di un comando, <code>man -k git</code> (o <code>apropos git</code>) elenca ogni man page di Git con una descrizione di una riga. Per cercare dentro i documenti, fai pipe a <code>grep</code>:</p>
    <pre><code>man -k git
    git help -a | grep -i merge
    git help log | grep -A 2 'pickaxe'</code></pre>
    <p>Per apprendimento approfondito, il libro Pro Git è gratuito e autorevole; il Git Reference Manual su <code>git-scm.com/docs</code> rispecchia le man page con riferimenti incrociati. La man page <code>gitfaq</code> è una gemma sottoutilizzata che risponde a molte domande del mondo reale in prosa semplice.</p>
    <h2>Errori comuni</h2>
    <p>Cercare sul web risposte di Stack Overflow obsolete che usano comandi deprecati come <code>git checkout</code> per cambiare branch quando esiste <code>git switch</code>. Verifica sempre con <code>git help</code> per la tua versione installata. Un altro errore è assumere che <code>-h</code> e <code>--help</code> si comportino allo stesso modo; non è così. <code>-h</code> stampa un riassunto di una schermata, mentre <code>--help</code> apre la man page completa (o il browser, a seconda di <code>help.format</code>). Infine, non saltare <code>git help glossary</code>; molti termini "strani" di Git (porcelain, plumbing, refspec, dangling object) sono definiti precisamente lì in una singola pagina breve.</p>

- source_title: "Common beginner mistakes"
  title: "Errori comuni dei principianti"
  langcode: it
  body: |
    <h2>Introduzione</h2>
    <p>La maggior parte delle persone impara Git nel modo difficile, attraverso piccoli disastri. Questa pagina raccoglie gli errori più frequenti dei principianti e come evitarli (o recuperare). Leggila una volta ora e di nuovo dopo un mese di uso; il secondo passaggio avrà più senso.</p>
    <h2>Committare con l'identità sbagliata</h2>
    <p>Dimenticare di impostare <code>user.email</code> per repository fa trapelare indirizzi personali nei commit di lavoro. Imposta sempre un'identità per-repo nei clone di lavoro:</p>
    <pre><code>git config user.email "ada@work.com"
    git log -1 --pretty=format:"%an &lt;%ae&gt;"</code></pre>
    <h2>Committare segreti</h2>
    <p>Le chiavi API e i file <code>.env</code> nei commit vivono per sempre, anche dopo una "cancellazione" successiva. Aggiungi una entry in <code>.gitignore</code> <em>prima</em> del primo commit, e ruota immediatamente qualsiasi credenziale trapelata. Strumenti come <code>git-secrets</code> e <code>gitleaks</code> possono girare come pre-commit hook.</p>
    <h2>Force-push sopra i compagni di team</h2>
    <p><code>git push --force</code> riscrive la storia sul remote, cancellando i commit di altre persone. Preferisci <code>--force-with-lease</code>, che rifiuta di sovrascrivere se il remote si è mosso:</p>
    <pre><code>git push --force-with-lease</code></pre>
    <h2>Fraintendere pull</h2>
    <p><code>git pull</code> è fetch + merge (o rebase). Eseguirlo con modifiche non committate può produrre merge commit sorprendenti. O committa, fai stash, o imposta un default sensato:</p>
    <pre><code>git config --global pull.rebase true
    git config --global pull.ff only</code></pre>
    <h2>Modificare detached HEAD senza accorgersene</h2>
    <p>Fare checkout di un tag o hash di commit ti lascia in detached HEAD. I nuovi commit lì sono irraggiungibili una volta che ti sposti. Crea sempre prima un branch:</p>
    <pre><code>git switch -c hotfix v1.2.3</code></pre>
    <h2>Confondere reset, revert e restore</h2>
    <ul>
      <li><code>git restore</code> cambia la working tree o l'index; sicuro.</li>
      <li><code>git revert</code> crea un nuovo commit che annulla un altro; sicuro e condivisibile.</li>
      <li><code>git reset --hard</code> sposta il branch e scarta il lavoro; <em>distruttivo</em>.</li>
    </ul>
    <h2>Committare file enormi</h2>
    <p>Un video da 500&nbsp;MB in un commit è permanente. Usa Git LFS per binari sopra qualche megabyte, e tieni gli artefatti di build completamente fuori dal repository.</p>
    <h2>Toolkit di recupero</h2>
    <pre><code>git reflog
    git fsck --lost-found
    git stash list</code></pre>
    <p>Il reflog registra ogni movimento di <code>HEAD</code> per 90 giorni di default; quasi ogni commit "perso" può essere recuperato da lì.</p>
    <h2>Leggere male lo status</h2>
    <p>L'output di <code>git status</code> ha strati sottili. "Changes not staged for commit" significa file tracciati modificati nella working tree. "Changes to be committed" significa in stage. "Untracked files" significa che Git non li ha mai visti. Una confusione comune: modificare un file <em>dopo</em> averlo messo in stage lo mostra in entrambe le liste con contenuto diverso; solo ciò che è in stage va nel commit. Esegui <code>git diff</code> (working vs index) e <code>git diff --staged</code> (index vs HEAD) finché le tre aree non si capiscono.</p>
    <pre><code>git status -sb
    git diff --staged --stat</code></pre>
    <h2>Errori comuni</h2>
    <p>Farsi prendere dal panico ed eseguire <code>rm -rf .git</code> quando qualcosa sembra sbagliato. Fermati. Fai prima un backup della directory. Quasi ogni errore Git è recuperabile attraverso il reflog o lo stash. La singola abitudine più importante per i principianti: esegui <code>git status</code> prima e dopo ogni comando che cambia stato, ed esegui <code>git log --oneline --all --graph</code> quando qualcosa sembra strano.</p>

- source_title: "Cloning an existing repository (git clone)"
  title: "Clonare un repository esistente (git clone)"
  langcode: it
  body: |
    <h2>Introduzione</h2>
    <p><code>git clone</code> copia un repository remoto sulla tua macchina. Crea una nuova directory, inizializza <code>.git</code> al suo interno, scarica tutti gli oggetti e i ref, configura un remote chiamato <code>origin</code> e fa il checkout del branch predefinito. Dopo il clone hai un repository completo e indipendente.</p>
    <h2>Clone di base</h2>
    <pre><code>git clone https://github.com/torvalds/linux.git
    cd linux
    git remote -v
    # origin  https://github.com/torvalds/linux.git (fetch)
    # origin  https://github.com/torvalds/linux.git (push)</code></pre>
    <h2>Scegliere un nome di directory</h2>
    <p>Per impostazione predefinita Git usa l'ultimo componente del path. Sovrascrivilo:</p>
    <pre><code>git clone https://github.com/example/widget.git my-widget</code></pre>
    <h2>Scegliere un protocollo</h2>
    <ul>
      <li><strong>HTTPS</strong>: il più semplice, funziona attraverso i firewall, spesso richiede un credential helper o token.</li>
      <li><strong>SSH</strong>: comodo con autenticazione a chiave, veloce per utenti esperti.</li>
      <li><strong>git://</strong>: anonimo, non autenticato, perlopiù storico.</li>
      <li><strong>file://</strong> o path locale: clone da un'altra directory.</li>
    </ul>
    <pre><code>git clone git@github.com:example/widget.git
    git clone /srv/git/widget.git
    git clone file:///srv/git/widget.git</code></pre>
    <h2>Opzioni utili</h2>
    <pre><code>git clone --depth 1 &lt;url&gt;            # shallow: solo la punta
    git clone --branch v1.2.3 &lt;url&gt;     # checkout di un branch o tag specifico
    git clone --single-branch &lt;url&gt;     # scarica solo un branch
    git clone --bare &lt;url&gt;              # clone bare, senza working tree
    git clone --recurse-submodules &lt;url&gt;</code></pre>
    <p>I clone shallow risparmiano banda per la CI; converti dopo con <code>git fetch --unshallow</code>.</p>
    <h2>Cosa fa clone, passo per passo</h2>
    <ol>
      <li>Crea la directory di destinazione.</li>
      <li>Esegue <code>git init</code> al suo interno.</li>
      <li>Aggiunge <code>origin</code> come remote.</li>
      <li>Esegue <code>git fetch origin</code>.</li>
      <li>Configura il tracking per il branch predefinito.</li>
      <li>Esegue <code>git checkout</code> per quel branch.</li>
    </ol>
    <h2>Sparse e partial clone per repo enormi</h2>
    <p>I repository che si estendono per gigabyte (sistemi operativi, monorepo) sono dolorosi da clonare in toto. Due funzionalità complementari aiutano:</p>
    <pre><code>git clone --filter=blob:none --no-checkout &lt;url&gt; repo
    cd repo
    git sparse-checkout init --cone
    git sparse-checkout set src/myteam
    git checkout main</code></pre>
    <p><code>--filter=blob:none</code> rimanda il download dei blob finché non sono necessari, mentre <code>sparse-checkout</code> popola solo le directory che elenchi. Insieme ti permettono di lavorare su una piccola fetta di un repo enorme con costi proporzionali di disco e banda.</p>
    <h2>Hook al momento del clone</h2>
    <p>Alcuni progetti includono passi di setup che dovrebbero girare al clone (installazione di pre-commit hook, fetch di oggetti LFS, inizializzazione di submodule). Git non esegue hook al clone, ma puoi concatenarli:</p>
    <pre><code>git clone --recurse-submodules &lt;url&gt; repo
    cd repo
    git lfs install
    pre-commit install</code></pre>
    <p>Per i nuovi contributori, documenta questa sequenza in <code>CONTRIBUTING.md</code> o avvolgila in uno script <code>scripts/bootstrap</code>. I progetti intelligenti rendono il loro target <code>make setup</code> idempotente in modo che ri-eseguirlo dopo un clone stantio sia sicuro.</p>
    <h2>Errori comuni</h2>
    <p>Clonare in una directory non vuota: Git rifiuta a meno che non passi un target esplicitamente vuoto. Clonare repository enormi senza <code>--depth</code> su connessioni lente, poi rinunciare a metà strada. Clonare via HTTPS verso un server che richiede SSO, poi non poter fare push perché il tuo token manca dello scope giusto. Testa sempre con <code>git push --dry-run</code> dopo il primo commit. Infine, clonare in <code>~/Desktop</code> o un'altra cartella di sync (Dropbox, iCloud, OneDrive) porta a corruzione quando il client di sync scrive a metà <code>.git/index</code>. Tieni i clone di lavoro su storage locale semplice.</p>

- source_title: "Working with remote repositories (git remote)"
  title: "Lavorare con repository remoti (git remote)"
  langcode: it
  body: |
    <h2>Introduzione</h2>
    <p>Un <em>remote</em> è un URL nominato che punta a un altro repository Git. <code>git clone</code> ne crea uno chiamato <code>origin</code> automaticamente, ma puoi aggiungerne quanti vuoi. I remote sono il ponte tra il tuo repo locale e il mondo esterno.</p>
    <h2>Elencare e ispezionare</h2>
    <pre><code>git remote
    git remote -v
    git remote show origin</code></pre>
    <p><code>git remote show</code> contatta il server e riporta i branch tracciati, le regole di push e i ref obsoleti.</p>
    <h2>Aggiungere e rimuovere</h2>
    <pre><code>git remote add upstream https://github.com/original/widget.git
    git remote rename upstream origin-upstream
    git remote remove origin-upstream</code></pre>
    <p>Il pattern <em>fork-and-upstream</em> è comune: <code>origin</code> è il tuo fork, <code>upstream</code> è il progetto da cui hai forkato.</p>
    <h2>Cambiare un URL</h2>
    <p>Se un progetto si sposta da HTTPS a SSH o a un nuovo host:</p>
    <pre><code>git remote set-url origin git@github.com:example/widget.git
    git remote -v</code></pre>
    <h2>URL multipli</h2>
    <p>Puoi fare push a diversi mirror contemporaneamente aggiungendo URL di push extra:</p>
    <pre><code>git remote set-url --add --push origin git@gitlab.com:example/widget.git
    git remote -v</code></pre>
    <h2>Pulire branch obsoleti</h2>
    <p>Quando i branch sono cancellati sul server, i tuoi <code>refs/remotes/origin/*</code> locali possono restare indietro. Puliscili:</p>
    <pre><code>git fetch --prune
    git remote prune origin</code></pre>
    <p>O impostalo permanentemente:</p>
    <pre><code>git config --global fetch.prune true</code></pre>
    <h2>Ispezionare il tracking</h2>
    <pre><code>git branch -vv
    # main           a1b2c3d [origin/main] Latest fix
    # feature/login  e4f5g6h [origin/feature/login: ahead 2] WIP</code></pre>
    <p><code>-vv</code> mostra l'upstream di ogni branch e quanto è avanti/indietro.</p>
    <h2>Riscrittura con insteadOf</h2>
    <p>Se gli URL di un progetto cambiano (HTTPS a SSH, migrazione di host, o vuoi che tutti gli URL GitHub usino SSH automaticamente), <code>insteadOf</code> li riscrive in modo trasparente:</p>
    <pre><code>git config --global url."git@github.com:".insteadOf "https://github.com/"
    git config --global url."https://github-mirror.example.com/".insteadOf "https://github.com/"</code></pre>
    <p>Particolarmente comodo in CI, dove puoi riscrivere tutti i clone verso un mirror locale con una riga di config, senza modifiche agli script. La direzione inversa (<code>pushInsteadOf</code>) ti permette di fetch via HTTPS ma push via SSH dallo stesso remote.</p>
    <h2>Workflow triangolari</h2>
    <p>Nell'open source, tipicamente fai <em>fetch</em> da <code>upstream</code> (il progetto canonico) e <em>push</em> a <code>origin</code> (il tuo fork personale). Configuralo una volta e dimentica:</p>
    <pre><code>git remote add upstream https://github.com/project/repo.git
    git config branch.main.remote upstream
    git config branch.main.pushRemote origin
    git config --global push.default current</code></pre>
    <p>Ora <code>git pull</code> legge da upstream e <code>git push</code> scrive sul tuo fork, automaticamente. L'impostazione <code>remote.pushDefault</code> applica la regola a ogni branch in un clone.</p>
    <h2>Errori comuni</h2>
    <p>Confondere il <em>nome</em> di un remote con il suo URL. <code>origin</code> è solo un'etichetta; puoi rinominarlo. Un'altra trappola: aggiungere lo stesso URL sotto due nomi diversi, poi essere sorpresi dai ref duplicati. Usa <code>git remote -v</code> per verificare. Dimenticare <code>git fetch</code> dopo aver cambiato rete o URL lascia i tuoi tracking branch obsoleti. Infine, sui server condivisi, cancellare un ref di tracking remoto localmente (es. <code>git branch -dr origin/main</code>) <em>non</em> cancella il branch sul server; usa <code>git push origin --delete main</code> per quello, e solo quando intendi davvero farlo.</p>

- source_title: "Fetching and pulling changes"
  title: "Scaricare e tirare modifiche (fetch e pull)"
  langcode: it
  body: |
    <h2>Introduzione</h2>
    <p><code>git fetch</code> scarica nuovi oggetti e aggiorna i ref di tracking remoto <em>senza</em> cambiare la tua working tree. <code>git pull</code> fa un fetch e poi integra il risultato nel tuo branch corrente. Conoscere la differenza è uno dei più grandi passi dal novizio all'utente Git sicuro di sé.</p>
    <h2>Fetching</h2>
    <pre><code>git fetch                  # remote predefinito (di solito origin)
    git fetch origin
    git fetch --all
    git fetch --prune          # cancella i ref per branch cancellati sul server
    git fetch origin main      # solo un branch</code></pre>
    <p>Dopo un fetch, ispeziona cosa è cambiato:</p>
    <pre><code>git log HEAD..origin/main --oneline
    git diff HEAD origin/main</code></pre>
    <h2>Pulling</h2>
    <p><code>git pull</code> è una scorciatoia per fetch seguito da merge o rebase. Scegli la strategia:</p>
    <pre><code>git pull                          # usa la config pull.rebase
    git pull --rebase
    git pull --ff-only                # rifiuta se non è fast-forward
    git pull origin main</code></pre>
    <h2>Configurare il comportamento predefinito</h2>
    <pre><code>git config --global pull.rebase false   # merge (default classico)
    git config --global pull.rebase true    # rebase
    git config --global pull.ff only        # solo fast-forward
    git config --global fetch.prune true</code></pre>
    <p>Da Git 2.27 un <code>git pull</code> nudo avvisa se nessuna strategia è configurata.</p>
    <h2>Fetch vs pull, quando usare quale</h2>
    <ul>
      <li>Usa <code>fetch</code> quando vuoi guardare prima di integrare.</li>
      <li>Usa <code>pull --ff-only</code> quando vuoi semplicemente aggiornarti su un branch condiviso.</li>
      <li>Usa <code>pull --rebase</code> quando lavori su un branch tematico che non hai ancora pushato.</li>
      <li>Evita il <code>pull</code> nudo su branch condivisi di lunga vita; i merge commit si moltiplicano.</li>
    </ul>
    <h2>Ispezionare l'upstream</h2>
    <pre><code>git status
    # On branch main
    # Your branch is behind 'origin/main' by 3 commits, and can be fast-forwarded.</code></pre>
    <p>Questo messaggio viene dal confronto di <code>HEAD</code> con il <code>origin/main</code> in cache; esegui prima <code>git fetch</code> per renderlo accurato.</p>
    <h2>Scaricare pull request</h2>
    <p>La maggior parte degli host Git espone i branch di pull o merge request come ref speciali che puoi scaricare nel tuo clone per revisione. Per GitHub, aggiungi un refspec:</p>
    <pre><code>git config --add remote.origin.fetch '+refs/pull/*/head:refs/remotes/origin/pr/*'
    git fetch
    git switch -c review/123 origin/pr/123</code></pre>
    <p>Per GitLab il path equivalente è <code>refs/merge-requests/*/head</code>. Con questo configurato, ogni <code>git fetch</code> scarica tutte le PR aperte localmente, pronte per l'ispezione senza lasciare il terminale.</p>
    <h2>Errori comuni</h2>
    <p>Eseguire <code>git pull</code> con modifiche non committate e ottenere un merge commit inaspettato sopra del lavoro sporco. Fai prima stash o commit. Dimenticare che il conteggio "behind" di <code>git status</code> è fresco solo quanto l'ultimo fetch; se nessuno ha fatto fetch da una settimana, quel conteggio mente. Usare <code>git pull --rebase</code> su un branch su cui altre persone hanno basato lavoro riscrive la loro base; rebase solo su branch privati. E infine, non usare mai <code>git fetch &lt;refspec&gt;</code> con un refspec personalizzato a meno che tu non lo capisca; un colon accidentale (<code>main:main</code>) sovrascrive il tuo <code>main</code> locale.</p>

- source_title: "Pushing your work"
  title: "Pubblicare il tuo lavoro (push)"
  langcode: it
  body: |
    <h2>Introduzione</h2>
    <p><code>git push</code> carica i commit locali su un remote e aggiorna i branch e i tag di quel remote. È così che il tuo lavoro diventa visibile ai collaboratori.</p>
    <h2>Push di base</h2>
    <pre><code>git push                          # branch corrente al suo upstream
    git push origin main              # esplicito
    git push -u origin feature/login  # imposta l'upstream e fa push</code></pre>
    <p>Il flag <code>-u</code> (o <code>--set-upstream</code>) collega il branch locale a quello remoto in modo che i futuri <code>git push</code> e <code>git pull</code> non abbiano bisogno di argomenti.</p>
    <h2>Push dei tag</h2>
    <p>I tag non vengono pushati per default:</p>
    <pre><code>git push origin v1.2.3
    git push origin --tags          # tutti i tag
    git push --follow-tags          # tag raggiungibili dai commit pushati</code></pre>
    <p><code>--follow-tags</code> è il default più sicuro per i workflow di rilascio.</p>
    <h2>Cancellare branch remoti</h2>
    <pre><code>git push origin --delete feature/login
    # equivalentemente
    git push origin :feature/login</code></pre>
    <h2>Force push in sicurezza</h2>
    <p>Riscrivere la storia (rebase, amend, squash) richiede un force push. Preferisci sempre <code>--force-with-lease</code>, che rifiuta di calpestare ref che si sono mossi sul server:</p>
    <pre><code>git push --force-with-lease
    git push --force-with-lease=feature/login:abcd1234</code></pre>
    <p>Non fare mai <code>--force</code> alla cieca su un branch condiviso come <code>main</code>.</p>
    <h2>Configurare i default di push</h2>
    <pre><code>git config --global push.default simple    # default da 2.0
    git config --global push.autoSetupRemote true   # 2.37+: auto -u</code></pre>
    <p>Con <code>push.autoSetupRemote</code> impostato, un semplice <code>git push</code> su un nuovo branch crea il branch remoto e li collega automaticamente.</p>
    <h2>Cosa succede durante il push</h2>
    <ol>
      <li>Git locale negozia con il remote per trovare commit comuni.</li>
      <li>Impacchetta e carica solo gli oggetti mancanti.</li>
      <li>Il remote esegue gli hook <code>pre-receive</code> e <code>update</code>.</li>
      <li>Se accettati, i ref vengono aggiornati atomicamente.</li>
      <li>L'hook <code>post-receive</code> viene eseguito (CI, mirroring, ecc.).</li>
    </ol>
    <h2>Push atomici e firmati</h2>
    <p><code>--atomic</code> trasforma i push multi-ref in una singola transazione; o tutti i ref si aggiornano o nessuno, prevenendo deployment parziali. <code>--signed</code> invia un certificato di push firmato GPG che alcuni host loggano per audit:</p>
    <pre><code>git push --atomic origin main release/1.2
    git push --signed origin main</code></pre>
    <p>Per i sistemi automatizzati, l'opzione <code>--receive-pack</code> ti permette di specificare un receive-pack alternativo sul server, occasionalmente necessario per host con binari non standard. Usa sempre <code>git push --dry-run</code> quando script con push distruttivi per la prima volta.</p>
    <h2>Errori comuni</h2>
    <p>Pushare su <code>main</code> quando intendevi un feature branch, perché hai dimenticato su quale branch eri. Esegui prima <code>git status</code>. Usare <code>git push --force</code> contro <code>main</code> e riscrivere i commit di altre persone; recupera con il reflog del remote (se hai accesso shell) o ri-pushando dal clone di un compagno di team. Pushare senza credenziali configurate e bloccarsi su un prompt password; configura un credential helper o una chiave SSH. Infine, push grandi possono fallire all'ultimo momento se un hook li rifiuta; in tal caso, il messaggio di rifiuto nomina il commit incriminato. Leggilo con cura piuttosto che ri-eseguire alla cieca.</p>

- source_title: "Understanding HEAD"
  title: "Capire HEAD"
  langcode: it
  body: |
    <h2>Introduzione</h2>
    <p><code>HEAD</code> è il riferimento più importante in Git. Dice a Git da quale commit discenderà il tuo prossimo commit. La maggior parte del tempo <code>HEAD</code> punta a un branch, e quel branch punta a un commit; ma <code>HEAD</code> può anche puntare direttamente a un commit (detached HEAD).</p>
    <h2>Dove vive</h2>
    <p><code>HEAD</code> è un singolo file in <code>.git/HEAD</code>. Ispezionalo:</p>
    <pre><code>cat .git/HEAD
    # ref: refs/heads/main</code></pre>
    <p>Quella singola riga dice "HEAD attualmente punta al branch <code>main</code>". Quando fai commit, Git avanza <code>main</code> e <code>HEAD</code> segue.</p>
    <h2>Ispezionare HEAD</h2>
    <pre><code>git rev-parse HEAD              # SHA del commit
    git symbolic-ref HEAD           # nome del ref sottostante
    git log -1 HEAD --oneline</code></pre>
    <h2>Detached HEAD</h2>
    <p>Fare checkout di un commit, tag o branch di tracking remoto direttamente mette <code>HEAD</code> in stato <em>detached</em>:</p>
    <pre><code>git checkout v1.2.3
    # You are in 'detached HEAD' state.</code></pre>
    <p><code>.git/HEAD</code> ora contiene un SHA grezzo. I nuovi commit non vanno da nessuna parte tranne che nel reflog; torna a un branch reale (o creane uno) prima di perderli:</p>
    <pre><code>git switch -c experiment</code></pre>
    <h2>Scorciatoie di HEAD</h2>
    <ul>
      <li><code>HEAD</code>: il commit corrente.</li>
      <li><code>HEAD^</code> o <code>HEAD~1</code>: parent.</li>
      <li><code>HEAD~3</code>: tre commit indietro tramite primo parent.</li>
      <li><code>HEAD^2</code>: secondo parent di un merge commit.</li>
      <li><code>HEAD@{1}</code>: posizione precedente dal reflog.</li>
    </ul>
    <pre><code>git log HEAD~5..HEAD --oneline
    git diff HEAD^ HEAD</code></pre>
    <h2>Altri HEAD speciali</h2>
    <ul>
      <li><code>ORIG_HEAD</code>: HEAD precedente prima di un'operazione "pericolosa" (merge, reset).</li>
      <li><code>MERGE_HEAD</code>: punta del branch in fase di merge.</li>
      <li><code>FETCH_HEAD</code>: punta di qualsiasi cosa appena fetchata.</li>
      <li><code>CHERRY_PICK_HEAD</code>: commit in fase di cherry-pick.</li>
    </ul>
    <h2>HEAD negli script</h2>
    <p>Gli script spesso devono conoscere il nome del branch corrente. Usa plumbing piuttosto che parsare l'output porcelain:</p>
    <pre><code>branch=$(git symbolic-ref --short -q HEAD) || branch="(detached)"
    sha=$(git rev-parse HEAD)
    short=$(git rev-parse --short HEAD)</code></pre>
    <p><code>symbolic-ref --short -q HEAD</code> esce con codice diverso da zero in stato detached, il che lo rende un perfetto detector. <code>git branch --show-current</code> (Git 2.22+) è un'alternativa più amichevole che stampa output vuoto quando detached. Entrambi sono stabili tra le versioni; l'output di <code>git status</code> non lo è.</p>
    <h2>HEAD e worktree</h2>
    <p>I worktree linkati hanno ognuno il proprio <code>HEAD</code>. Il <code>.git/HEAD</code> del repository principale è uno tra molti; ogni worktree ha il proprio sotto <code>.git/worktrees/&lt;name&gt;/HEAD</code>. Questo significa che due worktree dello stesso repository possono essere su branch diversi simultaneamente:</p>
    <pre><code>git worktree add ../wt-feature feature/login
    git -C ../wt-feature rev-parse HEAD
    git -C . rev-parse HEAD</code></pre>
    <p>I due HEAD sono indipendenti. Il checkout dei branch è esclusivo tra worktree: un branch può essere checkoutato solo in un worktree alla volta, prevenendo modifiche concorrenti accidentali allo stesso branch da due posizioni.</p>
    <h2>Errori comuni</h2>
    <p>Credere che <code>HEAD</code> sia un sinonimo di "branch corrente". Non lo è; è un puntatore che <em>di solito</em> punta a uno. Trattare <code>HEAD~3</code> e <code>HEAD^3</code> come equivalenti: differiscono sui merge commit. Modificare <code>.git/HEAD</code> a mano per cambiare branch; usa <code>git switch</code> o <code>git checkout</code>. E infine, ignorare gli avvisi di "detached HEAD" e committare nel vuoto; se ti ritrovi lì con nuovi commit, fai <code>git switch -c &lt;newbranch&gt;</code> immediatamente per ancorarli.</p>

- source_title: "Creating and switching branches"
  title: "Creare e cambiare branch"
  langcode: it
  body: |
    <h2>Introduzione</h2>
    <p>I branch sono come Git supporta linee di lavoro parallele. Creare un branch è essenzialmente gratuito: è solo un file di 41 byte contenente un hash di commit. Usali generosamente per feature, esperimenti e bug fix.</p>
    <h2>Comandi moderni</h2>
    <p>Da Git 2.23 ci sono due comandi appositi: <code>git switch</code> per i branch e <code>git restore</code> per i file. Usali; sono più chiari del comportamento sovraccarico di <code>git checkout</code>.</p>
    <pre><code>git switch main                    # passa a un branch esistente
    git switch -c feature/login        # crea e passa
    git switch -c hotfix v1.2.3        # crea da un tag
    git switch -                       # branch precedente (come cd -)</code></pre>
    <h2>Elencare i branch</h2>
    <pre><code>git branch                    # locali
    git branch -r                 # tracking remoto
    git branch -a                 # tutti
    git branch -vv                # con upstream e ahead/behind
    git branch --merged           # mergiati nel corrente
    git branch --no-merged        # non ancora mergiati</code></pre>
    <h2>Rinominare e cancellare</h2>
    <pre><code>git branch -m old new             # rinomina
    git branch -m new                  # rinomina il branch corrente
    git branch -d feature/login        # cancella un branch mergiato
    git branch -D feature/abandoned    # forza cancellazione di non mergiati</code></pre>
    <p><code>-d</code> rifiuta se il branch ha commit non mergiati, proteggendo il lavoro.</p>
    <h2>Tracciare branch remoti</h2>
    <pre><code>git switch feature/login           # crea automaticamente il locale da origin/feature/login
    git switch -c mine origin/feature/login   # esplicito
    git branch -u origin/main          # imposta l'upstream del branch corrente</code></pre>
    <h2>La sintassi classica</h2>
    <p>I tutorial più vecchi usano <code>git checkout</code>. Funziona ancora:</p>
    <pre><code>git checkout main
    git checkout -b feature/login
    git checkout v1.2.3</code></pre>
    <p>Lo svantaggio è che lo stesso comando ripristina anche i file, il che causa confusione. Preferisci <code>switch</code> e <code>restore</code> nei nuovi script.</p>
    <h2>Convenzioni di naming dei branch</h2>
    <p>Nomi coerenti rendono il tooling più facile. Pattern comuni:</p>
    <ul>
      <li><code>feature/&lt;ticket&gt;-short-desc</code></li>
      <li><code>bugfix/&lt;ticket&gt;-short-desc</code></li>
      <li><code>hotfix/&lt;version&gt;</code></li>
      <li><code>release/&lt;version&gt;</code></li>
    </ul>
    <pre><code>git switch -c feature/PROJ-123-add-search
    git config --global branch.autoSetupMerge always
    git config --global branch.autoSetupRebase always</code></pre>
    <p>Le opzioni <code>autoSetup</code> assicurano che i nuovi branch traccino automaticamente il loro punto di partenza, il che rende la riga ahead/behind di <code>git status</code> significativa dal primo giorno.</p>
    <h2>Rinominare sul remote</h2>
    <p>Rinominare un branch remoto sono due operazioni: rinomina localmente e crea il nuovo ref sul server, poi cancella il vecchio:</p>
    <pre><code>git branch -m old new
    git push -u origin new
    git push origin --delete old</code></pre>
    <h2>Errori comuni</h2>
    <p>Cambiare branch con modifiche non committate che entrano in conflitto con il target; Git rifiuta, e la soluzione è committare, fare stash o usare <code>git switch --discard-changes</code> se davvero non le vuoi. Creare dozzine di branch di lunga vita e non cancellare mai quelli mergiati; <code>git branch --merged | xargs git branch -d</code> mette in ordine. Nominare i branch con caratteri che confondono le shell (spazi, caratteri glob); attieniti a lettere, cifre, slash e trattino. Infine, cancellare un branch con <code>-D</code> e farsi prendere dal panico quando ti rendi conto che aveva lavoro non mergiato; il reflog ce l'ha ancora per 90 giorni: <code>git reflog</code>, trova lo SHA, <code>git switch -c rescued &lt;sha&gt;</code>.</p>

- source_title: "Your first merge"
  title: "Il tuo primo merge"
  langcode: it
  body: |
    <h2>Introduzione</h2>
    <p>Un <em>merge</em> combina due linee di sviluppo. Il caso più comune è riportare un feature branch in <code>main</code>. Questa pagina illustra un merge pulito, un fast-forward e un merge con conflitti.</p>
    <h2>Preparazione</h2>
    <pre><code>git switch -c feature/greeting
    echo "hello world" > greeting.txt
    git add greeting.txt
    git commit -m "Add greeting"
    git switch main
    git merge feature/greeting</code></pre>
    <p>Se <code>main</code> non si è mosso da quando il branch è stato creato, Git fa fast-forward: sposta semplicemente il puntatore di <code>main</code> alla punta di <code>feature/greeting</code>. Nessun merge commit viene creato.</p>
    <h2>Veri merge a tre vie</h2>
    <p>Se entrambi i branch hanno nuovi commit, Git crea un <em>merge commit</em> con due parent:</p>
    <pre><code>git switch main
    echo "main change" >> notes.txt
    git commit -am "Update notes on main"
    git merge feature/greeting
    # Merge made by the 'ort' strategy.</code></pre>
    <p>Il primo parent del merge commit è il <code>HEAD</code> precedente di <code>main</code>; il secondo è la punta del branch mergiato.</p>
    <h2>Forzare un merge commit</h2>
    <p>Per preservare visibilmente la storia anche quando il fast-forward è possibile:</p>
    <pre><code>git merge --no-ff feature/greeting -m "Merge feature/greeting"</code></pre>
    <h2>Conflitti</h2>
    <p>Se entrambi i lati hanno modificato le stesse righe, Git si ferma e scrive marker di conflitto:</p>
    <pre><code>&lt;&lt;&lt;&lt;&lt;&lt;&lt; HEAD
    line from main
    =======
    line from feature
    &gt;&gt;&gt;&gt;&gt;&gt;&gt; feature/greeting</code></pre>
    <p>Risolvi modificando il file, poi:</p>
    <pre><code>git add notes.txt
    git status
    git commit               # usa il messaggio di merge preparato</code></pre>
    <h2>Annullare</h2>
    <p>Se cambi idea a metà merge:</p>
    <pre><code>git merge --abort</code></pre>
    <p>Questo ripristina la working tree allo stato pre-merge.</p>
    <h2>Ispezionare il risultato</h2>
    <pre><code>git log --oneline --graph --decorate -n 10</code></pre>
    <p>Il grafico mostra la forma a diamante creata dal merge.</p>
    <h2>Ispezionare un merge</h2>
    <p>I merge commit hanno due parent, quindi i diff necessitano di gestione esplicita. <code>git show</code> su un merge mostra di default un "combined diff" che evidenzia solo le modifiche che confliggono con entrambi i parent:</p>
    <pre><code>git show HEAD                       # combined diff
    git show -m HEAD                    # diff contro ogni parent separatamente
    git show --first-parent HEAD        # solo contro il primo parent
    git log --merges --oneline          # solo merge commit
    git log --no-merges --oneline       # escludendo i merge commit</code></pre>
    <p>Per archeologia del codice, <code>--first-parent</code> su un branch di lunga vita rivela la storia di integrazione: quando ogni feature è atterrata, in ordine cronologico del trunk.</p>
    <h2>Errori comuni</h2>
    <p>Modificare i file durante un merge ma dimenticare di fare <code>git add</code>, così <code>git commit</code> si lamenta ancora di path non risolti. Esegui sempre <code>git status</code> dopo aver modificato. Risolvere cancellando i marker di conflitto ma lasciando testo stantio da un lato; build e test prima di committare il merge. Usare <code>--no-ff</code> su ogni merge in un repo a movimento veloce, inquinando la storia con merge commit vuoti. Infine, farsi prendere dal panico al prompt ed eseguire <code>git reset --hard</code> a metà merge; <code>git merge --abort</code> è più sicuro perché conosce <code>ORIG_HEAD</code>.</p>

- source_title: "Undoing changes (intro)"
  title: "Annullare modifiche (introduzione)"
  langcode: it
  body: |
    <h2>Introduzione</h2>
    <p>Git fornisce diversi modi per annullare, a seconda che la modifica sia nella tua working tree, nell'index, nel tuo ultimo commit o già pushata. Scegliere lo strumento giusto previene incidenti.</p>
    <h2>Scartare modifiche nella working tree</h2>
    <p>Hai modificato un file ma vuoi buttare via le modifiche:</p>
    <pre><code>git restore file.txt              # moderno
    git checkout -- file.txt          # equivalente classico</code></pre>
    <p><code>git restore</code> senza <code>--source</code> usa l'index, quindi il file torna al suo ultimo stato di <code>git add</code>.</p>
    <h2>Togliere dallo stage</h2>
    <p>Hai eseguito <code>git add</code> ma vuoi togliere un file dal prossimo commit (senza perdere le modifiche):</p>
    <pre><code>git restore --staged file.txt
    git reset HEAD file.txt           # sintassi più vecchia</code></pre>
    <h2>Modificare l'ultimo commit (amend)</h2>
    <p>Hai committato ma vuoi correggere il messaggio o includere un altro file:</p>
    <pre><code>git commit --amend -m "Better message"
    git add forgotten.txt
    git commit --amend --no-edit</code></pre>
    <p>Fai amend solo dei commit che <strong>non hai pushato</strong>, o sii pronto a fare force-push.</p>
    <h2>Revert di un commit pubblico</h2>
    <p>Se un commit cattivo è già pushato, non riscrivere la storia. Crea un nuovo commit che lo annulla:</p>
    <pre><code>git revert &lt;sha&gt;
    git push</code></pre>
    <p><code>git revert</code> apre un editor con un messaggio generato; il risultato è un undo pulito che tutti possono pullare.</p>
    <h2>Reset</h2>
    <p><code>git reset</code> sposta il puntatore del branch corrente. Ha tre modalità:</p>
    <ul>
      <li><code>--soft</code>: sposta solo il branch; mantieni index e working tree.</li>
      <li><code>--mixed</code> (default): sposta il branch e resetta l'index; mantieni la working tree.</li>
      <li><code>--hard</code>: sposta il branch, resetta index e working tree. Distruttivo.</li>
    </ul>
    <pre><code>git reset --soft HEAD~1            # uncommit, mantieni le modifiche in stage
    git reset HEAD~1                   # uncommit, mantieni le modifiche fuori stage
    git reset --hard HEAD~1            # distruggi l'ultimo commit e le modifiche</code></pre>
    <h2>Recuperare da --hard</h2>
    <pre><code>git reflog
    git reset --hard HEAD@{1}</code></pre>
    <p>Il reflog ricorda ogni movimento di <code>HEAD</code> per 90 giorni.</p>
    <h2>Scegliere l'undo giusto</h2>
    <p>Una semplice matrice decisionale:</p>
    <ul>
      <li><strong>Solo working tree</strong>: <code>git restore &lt;file&gt;</code></li>
      <li><strong>File in stage</strong>: <code>git restore --staged &lt;file&gt;</code></li>
      <li><strong>Ultimo commit non pushato</strong>: <code>git commit --amend</code> o <code>git reset --soft HEAD~1</code></li>
      <li><strong>Commit pushato</strong>: <code>git revert &lt;sha&gt;</code></li>
      <li><strong>Tutta la punta del branch</strong>: <code>git reset --hard ORIG_HEAD</code> (dopo un brutto merge/rebase)</li>
    </ul>
    <pre><code>git status
    git diff
    git log --oneline -5</code></pre>
    <p>Esegui sempre quei tre prima di qualsiasi undo distruttivo. Mostrano la working tree, le modifiche in stage e la storia recente; insieme ti dicono quale undo è sicuro.</p>
    <h2>Errori comuni</h2>
    <p>Confondere <code>revert</code> con <code>reset</code>. <em>Revert</em> aggiunge; <em>reset</em> rimuove. Eseguire <code>git reset --hard</code> con lavoro non committato, poi rendersi conto che ne avevi bisogno; ricorri al reflog immediatamente, prima che il garbage collector giri. Fare amend di un commit pushato e non coordinare il force-push con i compagni di team. Usa <code>git revert</code> sulla storia condivisa. E infine, trattare <code>git checkout file</code> come sicuro; in Git più vecchio sovrascrive silenziosamente le tue modifiche senza cestino. Il moderno <code>git restore</code> non è diverso; fai un backup prima se incerto.</p>

- source_title: "Tagging releases"
  title: "Etichettare le release con i tag"
  langcode: it
  body: |
    <h2>Introduzione</h2>
    <p>I tag sono riferimenti nominati a commit specifici. A differenza dei branch, i tag non sono pensati per muoversi. Sono perfetti per marcare release (<code>v1.0.0</code>) e altri punti storici.</p>
    <h2>Due tipi di tag</h2>
    <ul>
      <li><strong>Lightweight</strong>: solo un ref che punta a un commit. Nessun metadato.</li>
      <li><strong>Annotated</strong>: un oggetto Git completo con tagger, data, messaggio e firma GPG opzionale. Usali per le release.</li>
    </ul>
    <h2>Creare i tag</h2>
    <pre><code>git tag v1.0.0                          # lightweight
    git tag -a v1.0.0 -m "First stable release"   # annotated
    git tag -s v1.0.0 -m "Signed release"         # firmato GPG</code></pre>
    <p>Per impostazione predefinita i tag si attaccano a <code>HEAD</code>. Per taggare un commit specifico:</p>
    <pre><code>git tag -a v0.9.0 a1b2c3d -m "Beta"</code></pre>
    <h2>Elencare e ispezionare</h2>
    <pre><code>git tag
    git tag -l "v1.*"
    git show v1.0.0
    git tag -l --format='%(refname:short) %(taggerdate:short) %(subject)'</code></pre>
    <h2>Pushare i tag</h2>
    <p>I tag non vengono pushati per default:</p>
    <pre><code>git push origin v1.0.0
    git push origin --tags                # tutti i tag
    git push --follow-tags                # solo tag raggiungibili dai commit pushati</code></pre>
    <p><code>--follow-tags</code> è il default consigliato per le pipeline di rilascio.</p>
    <h2>Cancellare i tag</h2>
    <pre><code>git tag -d v1.0.0                     # locale
    git push origin --delete v1.0.0       # remoto</code></pre>
    <h2>Checkout di un tag</h2>
    <pre><code>git switch --detach v1.0.0
    # oppure per basare un branch hotfix su un tag
    git switch -c hotfix/1.0.1 v1.0.0</code></pre>
    <h2>Verificare le firme</h2>
    <pre><code>git tag -v v1.0.0</code></pre>
    <p>Richiede la chiave pubblica del tagger nel tuo keyring GPG.</p>
    <h2>Descrivere build con git describe</h2>
    <p>Una volta che il tuo repo ha tag annotated, <code>git describe</code> produce identificatori di build stabili che combinano l'ultimo tag, la distanza e lo SHA abbreviato:</p>
    <pre><code>git describe
    # v1.2.3-7-gabc1234
    git describe --always --dirty
    # v1.2.3-7-gabc1234-dirty</code></pre>
    <p>Il suffisso <code>--dirty</code> appare se la working tree ha modifiche non committate; <code>--always</code> ricade su uno SHA nudo quando nessun tag è raggiungibile. Le pipeline CI spesso incorporano questa stringa nei binari per rendere triviale la risoluzione di problemi sul campo.</p>
    <h2>Politiche di tagging</h2>
    <p>Per progetti supportati a lungo termine, decidi e documenta:</p>
    <ul>
      <li>Schema di naming: <code>v1.2.3</code>, <code>release-2025-04</code>, <code>1.2.3</code> (senza prefisso)?</li>
      <li>Annotated o firmati?</li>
      <li>Chi può pushare i tag? Molti host ti permettono di proteggere i nomi dei tag con pattern.</li>
      <li>Qual è la fonte di verità: tag solo su main, o release branch con i propri tag?</li>
    </ul>
    <pre><code>git for-each-ref --sort=-creatordate --format='%(refname:short) %(creatordate:short)' refs/tags | head</code></pre>
    <p>Scegli uno schema e attieniti ad esso; la storia dei tag è più difficile da migrare di quella dei commit.</p>
    <h2>Errori comuni</h2>
    <p>Usare tag lightweight per le release. Mancano di data, autore e messaggio, il che rende dolorose le tracce di audit. Usa sempre <code>-a</code> o <code>-s</code> per le release. Spostare un tag dopo che è pubblicato; gli utenti a valle non recepiranno il cambiamento in modo pulito. Crea un nuovo tag (es. <code>v1.0.1</code>). Dimenticare di pushare i tag e chiedersi perché la tua release page è vuota; ricorda <code>git push --tags</code> o <code>--follow-tags</code>. Infine, nominare tag con caratteri che confliggono con i ref (un tag e un branch chiamati <code>release</code> creeranno ambiguità); usa una convenzione chiara come <code>v&lt;semver&gt;</code> per le release.</p>

- source_title: "Git on the command line: tips for new users"
  title: "Git da riga di comando: consigli per i nuovi utenti"
  langcode: it
  body: |
    <h2>Introduzione</h2>
    <p>Git ricompensa la scioltezza da riga di comando. Poche piccole abitudini rendono il lavoro quotidiano enormemente più veloce e sicuro. Questa pagina raccoglie i consigli a maggior impatto per i nuovi utenti.</p>
    <h2>Sapere sempre dove sei</h2>
    <p>Aggiungi lo stato Git al prompt della shell. Sia Bash che Zsh includono script contrib:</p>
    <pre><code># bash
    source /usr/share/git/completion/git-prompt.sh
    PS1='\w$(__git_ps1 " (%s)")\$ '

    # zsh con oh-my-zsh: abilita il plugin git in ~/.zshrc</code></pre>
    <p>Ora il branch corrente e lo stato sporco sono visibili in ogni momento.</p>
    <h2>Tab completion</h2>
    <p>Git include <code>git-completion.bash</code>; la maggior parte dei gestori di pacchetti lo installa automaticamente. Tab-completa comandi, branch, remote e ref:</p>
    <pre><code>git che&lt;TAB&gt;
    git switch fea&lt;TAB&gt;</code></pre>
    <h2>Alias che ripagano</h2>
    <pre><code>git config --global alias.s "status -sb"
    git config --global alias.lg "log --oneline --graph --decorate --all"
    git config --global alias.co switch
    git config --global alias.last "log -1 HEAD --stat"
    git config --global alias.unstage "restore --staged"</code></pre>
    <h2>Status più corto</h2>
    <pre><code>git status -sb</code></pre>
    <p>La forma <code>-sb</code> è a due colonne e include info di tracking del branch; perfetto per controlli rapidi.</p>
    <h2>Diff migliori</h2>
    <pre><code>git diff --word-diff
    git diff --color-words
    git config --global diff.colorMoved zebra</code></pre>
    <p><code>colorMoved=zebra</code> evidenzia blocchi di codice spostati in modo diverso da quelli aggiunti/rimossi, rendendo i refactor più facili da rivedere.</p>
    <h2>Ambiente utile</h2>
    <ul>
      <li>Imposta <code>GIT_PAGER=less -FRX</code> per un paging sensato.</li>
      <li>Imposta <code>EDITOR</code> a qualcosa da cui sai uscire.</li>
      <li>Usa un credential helper: <code>git config --global credential.helper cache</code> su Linux, <code>osxkeychain</code> su macOS, <code>manager</code> su Windows.</li>
    </ul>
    <h2>Default sicuri</h2>
    <pre><code>git config --global pull.ff only
    git config --global push.autoSetupRemote true
    git config --global fetch.prune true
    git config --global rerere.enabled true</code></pre>
    <p><code>rerere</code> ("reuse recorded resolution") ricorda come hai risolto un conflitto e lo riapplica la volta successiva.</p>
    <h2>Leggere la storia dei commit velocemente</h2>
    <p>Due trucchi di visualizzazione ripagano quotidianamente:</p>
    <pre><code>git log --oneline --graph --all --decorate
    git log -p --follow path/to/file
    git show HEAD --stat
    git diff @{u}                  # vs upstream
    git diff @{1.day.ago}          # vs HEAD di un giorno fa</code></pre>
    <p>Ogni comando Git che accetta un commit accetta la stessa sintassi di revision: nomi di branch, SHA, <code>HEAD~3</code>, <code>@{upstream}</code>, <code>@{2.hours.ago}</code>, <code>tag^{commit}</code>. Imparala una volta tramite <code>git help gitrevisions</code> e usala ovunque.</p>
    <h2>Errori comuni</h2>
    <p>Copia-incollare comandi lunghi da blog post senza capirli; leggi <code>git help &lt;cmd&gt;</code> per qualsiasi flag sconosciuto. Aliasare comandi distruttivi a nomi corti (<code>r = reset --hard</code>) e attivarli per sbaglio; riserva alias corti per operazioni sicure. Ignorare la tab completion della shell e digitare nomi di branch a mano, con tutti i typo che ne conseguono. Infine, non incollare mai output della shell in un messaggio di commit aspettandosi che venga renderizzato come codice; usa un blocco di codice nel tuo editor o committa un file. Le piccole abitudini si compongono; investi un pomeriggio configurando la tua shell e raccogli anni di benefici.</p>

- source_title: "The object model: blobs, trees, commits, tags"
  title: "Il modello a oggetti: blob, tree, commit, tag"
  langcode: it
  body: |
    <h2>Introduzione</h2>
    <p>Il repository di Git è, nel cuore, un <em>object store indirizzato per contenuto</em>. Ci sono esattamente quattro tipi di oggetti: <strong>blob</strong>, <strong>tree</strong>, <strong>commit</strong> e <strong>tag</strong>. Ogni operazione alla fine tocca uno di essi. Capire questi quattro tipi demistifica la maggior parte di Git.</p>
    <h2>Blob</h2>
    <p>Un blob memorizza il contenuto di un file, niente di più. Nessun nome di file, nessun permesso, nessuna storia. Due file con contenuto identico condividono un solo blob, indipendentemente da dove vivono nell'albero.</p>
    <pre><code>echo "hello" | git hash-object --stdin
    # ce013625030ba8dba906f756967f9e9ca394464a</code></pre>
    <h2>Tree</h2>
    <p>Un tree è un elenco di directory: un set ordinato di entry <code>(mode, type, sha, name)</code>. Le sottodirectory sono a loro volta tree, ricorsivamente. Ogni commit punta a esattamente un tree radice.</p>
    <pre><code>git ls-tree HEAD
    # 100644 blob a1b2... README.md
    # 040000 tree c3d4... src</code></pre>
    <h2>Commit</h2>
    <p>Un oggetto commit contiene:</p>
    <ul>
      <li>Un puntatore a un tree radice.</li>
      <li>Zero o più commit parent (zero per il root, due o più per i merge).</li>
      <li>Author e committer con timestamp.</li>
      <li>Un messaggio.</li>
      <li>Firma GPG/SSH opzionale.</li>
    </ul>
    <pre><code>git cat-file -p HEAD
    # tree 9f1a...
    # parent b2c3...
    # author Ada &lt;ada@example.com&gt; 1714300000 +0000
    # committer Ada &lt;ada@example.com&gt; 1714300000 +0000
    #
    # Add greeting</code></pre>
    <h2>Tag</h2>
    <p>Un tag annotated è un proprio oggetto che punta a un altro oggetto (quasi sempre un commit), con info del tagger e un messaggio. I tag lightweight sono solo ref e non hanno oggetto.</p>
    <pre><code>git cat-file -t v1.0.0
    # tag
    git cat-file -p v1.0.0</code></pre>
    <h2>Mettere tutto insieme</h2>
    <p>Percorri manualmente il tree di un commit:</p>
    <pre><code>git cat-file -p HEAD^{tree}
    git cat-file -p HEAD^{tree}:src
    git cat-file -p HEAD:README.md</code></pre>
    <p>Il peel <code>^{tree}</code> e la sintassi <code>commit:path</code> sono come tutti gli strumenti Git navigano.</p>
    <h2>Storage</h2>
    <p>Ogni oggetto è compresso con zlib e indirizzato dallo SHA-1 (o SHA-256) del suo contenuto non compresso più un header. Contenuti identici, ovunque nella storia, vengono deduplicati automaticamente.</p>
    <h2>Mode delle entry tree</h2>
    <p>Il campo mode in un'entry tree è un piccolo set di mode file simili a POSIX:</p>
    <ul>
      <li><code>100644</code>: file regolare non eseguibile (blob).</li>
      <li><code>100755</code>: file eseguibile (blob).</li>
      <li><code>120000</code>: link simbolico (blob il cui contenuto è il target).</li>
      <li><code>040000</code>: sottodirectory (tree).</li>
      <li><code>160000</code>: gitlink (riferimento submodule a uno SHA di commit).</li>
    </ul>
    <pre><code>git ls-tree HEAD
    git update-index --chmod=+x scripts/run.sh
    git ls-tree HEAD scripts/</code></pre>
    <p>Git è intenzionalmente limitato; permessi e proprietà arbitrarie non vengono memorizzati.</p>
    <h2>Errori comuni</h2>
    <p>Credere che Git memorizzi i diff. Non lo fa; memorizza snapshot completi, deduplicati per hash e successivamente compressi in delta nei pack file. Confondere i tree con le directory su disco; i tree sono oggetti immutabili. Confondere i tag lightweight con quelli annotated; solo i tag annotated portano metadati e firme. Infine, aspettarsi che rinominare un file cambi il blob; il blob è lo stesso, solo l'entry name del tree cambia. Spendi dieci minuti con <code>git cat-file -p</code> su un repository reale e il modello diventa naturale.</p>

- source_title: "Content-addressed storage: SHA-1 and SHA-256"
  title: "Storage indirizzato per contenuto: SHA-1 e SHA-256"
  langcode: it
  body: |
    <h2>Introduzione</h2>
    <p>Git nomina ogni oggetto con l'hash crittografico del suo contenuto. Questo è storage <em>indirizzato per contenuto</em>: il nome <em>è</em> l'impronta digitale del contenuto. L'hash predefinito è SHA-1 (160 bit, 40 caratteri esadecimali). Il supporto per SHA-256 esiste sperimentalmente da Git 2.29.</p>
    <h2>Come viene calcolato un hash</h2>
    <p>Git antepone un header della forma <code>&lt;type&gt; &lt;size&gt;\0</code> al contenuto grezzo, poi lo hasha:</p>
    <pre><code>printf 'blob 6\0hello\n' | sha1sum
    # ce013625030ba8dba906f756967f9e9ca394464a  -</code></pre>
    <p>Lo stesso valore esce da <code>git hash-object</code>:</p>
    <pre><code>printf 'hello\n' | git hash-object --stdin
    # ce013625030ba8dba906f756967f9e9ca394464a</code></pre>
    <h2>Perché l'indirizzamento per contenuto</h2>
    <ul>
      <li><strong>Deduplicazione</strong>: contenuti identici memorizzati una sola volta.</li>
      <li><strong>Integrità</strong>: qualsiasi corruzione cambia l'hash, immediatamente rilevabile.</li>
      <li><strong>Riproducibilità</strong>: lo stesso tree ha sempre lo stesso nome.</li>
      <li><strong>Sync distribuito</strong>: Git può chiedere "hai <code>abc123</code>?" senza spiegare cosa sia.</li>
    </ul>
    <h2>Hash abbreviati</h2>
    <p>Git accetta il prefisso più corto non ambiguo, normalmente 7 caratteri. Man mano che un repo cresce, possono servire più cifre:</p>
    <pre><code>git rev-parse --short HEAD
    git rev-parse --short=12 HEAD
    git config --global core.abbrev 12</code></pre>
    <h2>SHA-1 contro SHA-256</h2>
    <p>SHA-1 ha attacchi di collisione noti (SHAttered, 2017). Il progetto Git ha risposto con SHA-256 come formato oggetto alternativo. Per creare un repo SHA-256:</p>
    <pre><code>git init --object-format=sha256</code></pre>
    <p>Nota: i repo SHA-1 e SHA-256 non possono ancora interoperare; il supporto di tooling e hosting sta ancora maturando da Git 2.45+. Per ora, la maggior parte dei progetti continua con SHA-1, integrato dall'implementazione SHA-1 di Git con rilevamento di collisioni.</p>
    <h2>Verificare l'integrità</h2>
    <pre><code>git fsck --full
    git fsck --strict</code></pre>
    <p><code>git fsck</code> ricalcola gli hash per ogni oggetto e segnala qualsiasi mismatch.</p>
    <h2>Ispezionare un oggetto</h2>
    <pre><code>git cat-file -t &lt;sha&gt;       # tipo
    git cat-file -s &lt;sha&gt;       # dimensione
    git cat-file -p &lt;sha&gt;       # contenuto pretty-printed</code></pre>
    <h2>SHA-1 con hardening</h2>
    <p>Dal 2017 Git è distribuito con un'implementazione SHA-1 "con rilevamento collisioni" (<code>sha1dc</code>) che riconosce il pattern SHAttered pubblicato e rifiuta di hashare tali input. Questo rende gli attacchi pratici contro i repository Git essenzialmente impossibili senza scoprire una nuova tecnica di collisione. Il costo è un piccolo rallentamento sull'hashing; puoi optare per OpenSSL SHA-1 standard con <code>./configure --with-openssl-sha1</code> quando compili dai sorgenti, ma pochi utenti hanno motivo di farlo.</p>
    <pre><code>git --version --build-options 2&gt;&amp;1 | grep -i sha</code></pre>
    <h2>Errori comuni</h2>
    <p>Preoccuparsi che le collisioni SHA-1 compromettano il tuo repo. Gli attacchi noti richiedono input forgiati; Git inoltre rileva il pattern di collisione pubblicato. Il rischio pragmatico per un progetto normale è essenzialmente zero. Troncare gli hash troppo aggressivamente negli script; in un repo con un milione di oggetti, 7 caratteri possono collidere. Usa <code>git rev-parse --short</code> per lasciare scegliere a Git. Modificare i file oggetto direttamente sotto <code>.git/objects</code>; questo rompe l'invariante di indirizzamento per contenuto e corrompe il repo. Tutte le scritture devono passare attraverso il plumbing di Git.</p>

- source_title: "References: refs, HEAD, branches, and tags"
  title: "Riferimenti: ref, HEAD, branch e tag"
  langcode: it
  body: |
    <h2>Introduzione</h2>
    <p>Gli oggetti sono immutabili e nominati per hash. I <em>riferimenti</em> sono i nomi mutabili leggibili dall'uomo che puntano ad essi. Ogni branch, tag, branch di tracking remoto e HEAD è un ref.</p>
    <h2>Dove vivono i ref</h2>
    <p>I ref sono file (o entry nel file packed-refs) sotto <code>.git/refs/</code>:</p>
    <ul>
      <li><code>.git/refs/heads/&lt;name&gt;</code>: branch locali.</li>
      <li><code>.git/refs/tags/&lt;name&gt;</code>: tag.</li>
      <li><code>.git/refs/remotes/&lt;remote&gt;/&lt;name&gt;</code>: branch di tracking remoto.</li>
      <li><code>.git/HEAD</code>: il ref corrente.</li>
    </ul>
    <p>Ogni ref non simbolico è un file di una riga contenente un hash:</p>
    <pre><code>cat .git/refs/heads/main
    # a1b2c3d4...</code></pre>
    <h2>Elencare i ref</h2>
    <pre><code>git for-each-ref
    git for-each-ref refs/tags/
    git for-each-ref --format='%(refname:short) %(objectname:short) %(subject)'
    git show-ref</code></pre>
    <h2>Ref simbolici</h2>
    <p>Un ref simbolico punta a un altro ref invece che a un hash. <code>HEAD</code> è l'esempio canonico:</p>
    <pre><code>cat .git/HEAD
    # ref: refs/heads/main
    git symbolic-ref HEAD
    git symbolic-ref refs/remotes/origin/HEAD</code></pre>
    <h2>Leggere i ref in sicurezza</h2>
    <p>Passa sempre per il plumbing piuttosto che leggere i file:</p>
    <pre><code>git rev-parse HEAD
    git rev-parse main
    git rev-parse origin/main
    git rev-parse v1.0.0^{commit}</code></pre>
    <p>Il plumbing gestisce ref impacchettati, ref simbolici e lookup di ref in modo uniforme.</p>
    <h2>Aggiornare i ref</h2>
    <pre><code>git update-ref refs/heads/feature/login &lt;sha&gt;
    git update-ref -d refs/heads/feature/login           # cancella
    git update-ref refs/heads/feature/login &lt;new&gt; &lt;old&gt; # CAS</code></pre>
    <p>La forma a tre argomenti è compare-and-set; rifiuta se il valore corrente differisce.</p>
    <h2>Ref impacchettati</h2>
    <p>Per performance, Git può impacchettare molti ref in un singolo file <code>.git/packed-refs</code>. <code>git pack-refs --all</code> fa questo; le scritture future vanno comunque a file loose fino al prossimo pack.</p>
    <h2>Sintassi dei refspec</h2>
    <p>I remote usano i <em>refspec</em> per mappare tra ref locali e remoti:</p>
    <pre><code>+refs/heads/*:refs/remotes/origin/*</code></pre>
    <p>Il <code>+</code> iniziale significa "force update". Questa singola riga è ciò che fa popolare a <code>git fetch</code> <code>refs/remotes/origin/</code>.</p>
    <h2>Il backend reftable</h2>
    <p>Git moderno (2.45+) include un formato di storage ref alternativo chiamato <em>reftable</em>, sviluppato originariamente per JGit. Reftable memorizza milioni di ref efficientemente in un formato binario log-strutturato e supporta transazioni atomiche su molti ref contemporaneamente. Abilita su un nuovo repo:</p>
    <pre><code>git init --ref-format=reftable
    git rev-parse --show-ref-format</code></pre>
    <p>Per la maggior parte degli utenti il formato classico loose+packed va ancora bene. Reftable brilla sui server e sui monorepo enormi con centinaia di migliaia di ref (es., un ref per pull request).</p>
    <h2>Gerarchie di ref personalizzate</h2>
    <p>I ref non devono vivere sotto i quattro namespace standard. Gli strumenti che hanno bisogno dei propri nomi usano gerarchie personalizzate sotto <code>refs/</code>:</p>
    <ul>
      <li><code>refs/notes/*</code>: <code>git notes</code>.</li>
      <li><code>refs/stash</code>: <code>git stash</code>.</li>
      <li><code>refs/replace/*</code>: <code>git replace</code>.</li>
      <li><code>refs/bisect/*</code>: stato di <code>git bisect</code>.</li>
      <li><code>refs/pull/*/head</code> e <code>refs/merge-requests/*/head</code>: provider di hosting.</li>
    </ul>
    <pre><code>git for-each-ref refs/notes/
    git for-each-ref refs/replace/</code></pre>
    <p>Puoi creare i tuoi finché il nome è un ref valido (niente doppi punti, niente spazi, nessun trattino iniziale).</p>
    <h2>Errori comuni</h2>
    <p>Modificare i file ref a mano e finire con un problema di newline finale o un file scritto a metà. Usa <code>git update-ref</code>. Confondere <code>refs/heads/main</code>, <code>main</code> e <code>refs/main</code>; <code>git rev-parse --symbolic-full-name</code> risolve qualsiasi nome corto nella sua forma canonica. Nominare un branch e un tag in modo identico; gli strumenti preferiscono il tag, portando a confusione sottile. Infine, cancellare <code>.git/packed-refs</code> per "fare pulizia"; cancella ref che non erano anche loose. Passa sempre attraverso Git.</p>

- source_title: "The index (staging area) in depth"
  title: "L'index (staging area) in profondità"
  langcode: it
  body: |
    <h2>Introduzione</h2>
    <p>L'index è un file binario in <code>.git/index</code> che rispecchia un oggetto tree: una lista ordinata di path con mode, hash e info di stat. È la staging area per il prossimo commit e una cache che permette a Git di saltare il re-hashing di file invariati.</p>
    <h2>Ispezionarlo</h2>
    <pre><code>git ls-files --stage
    # 100644 a1b2c3...  0  README.md
    # 100644 e4f5g6...  0  src/main.c</code></pre>
    <p>Stage 0 significa "nessun conflitto". Durante un merge, i path in conflitto ottengono gli stage 1 (base), 2 (ours), 3 (theirs).</p>
    <h2>Cosa ti dà il caching di stat</h2>
    <p>L'index memorizza anche ctime, mtime, dimensione e inode per ogni path. <code>git status</code> li confronta con la working tree prima dell'hashing; se corrispondono, il file è assunto invariato. Per questo <code>git status</code> è veloce su tree enormi.</p>
    <pre><code>git update-index --refresh
    git update-index --really-refresh</code></pre>
    <h2>Modificare l'index</h2>
    <pre><code>git add file.txt                  # stage dalla working tree
    git rm --cached file.txt          # rimuovi dall'index, mantieni su disco
    git restore --staged file.txt     # togli dallo stage
    git update-index --chmod=+x bin/run   # cambia bit eseguibile</code></pre>
    <h2>Assume unchanged e skip-worktree</h2>
    <p>Due flag dicono a Git di ignorare certi path:</p>
    <pre><code>git update-index --assume-unchanged config.local
    git update-index --skip-worktree config.local</code></pre>
    <ul>
      <li><code>assume-unchanged</code>: un suggerimento di performance; Git può comunque notare modifiche.</li>
      <li><code>skip-worktree</code>: più forte; pensato per file che l'utente mantiene modificati localmente.</li>
    </ul>
    <p>Nessuno dei due sostituisce <code>.gitignore</code>; entrambi sono hack locali allo workspace, non condivisibili.</p>
    <h2>Leggere e scrivere tree</h2>
    <pre><code>git write-tree                # snapshot dell'index come oggetto tree
    git read-tree HEAD            # resetta l'index a un tree
    git read-tree --reset -u HEAD # aggiorna anche la working tree</code></pre>
    <p>Questi comandi plumbing sono alla base di <code>commit</code>, <code>checkout</code> e <code>merge</code>.</p>
    <h2>Conflitti nell'index</h2>
    <p>Durante un merge, l'index diventa la fonte di verità per ciò che non è risolto:</p>
    <pre><code>git ls-files -u
    # 100644 a1...  1  src/main.c
    # 100644 b2...  2  src/main.c
    # 100644 c3...  3  src/main.c</code></pre>
    <p>Risolvere un conflitto significa scrivere il contenuto finale e fare <code>git add</code>, riducendo a una singola entry stage-0.</p>
    <h2>Sparse checkout e sparse index</h2>
    <p>Lo sparse checkout popola la working tree con solo un sottoinsieme del tree del repository, utile nei monorepo. Con la modalità cone più lo sparse index, l'index stesso si restringe al cono attivo, rendendo le operazioni veloci su repo enormi:</p>
    <pre><code>git sparse-checkout init --cone
    git sparse-checkout set src/myteam docs
    git sparse-checkout list
    git sparse-checkout disable</code></pre>
    <p>Lo sparse index marca le entry omesse con un bit speciale così Git può espanderle pigramente solo quando i comandi ne hanno bisogno. Questa funzionalità richiede Git 2.32 o più recente per piena funzionalità.</p>
    <h2>Errori comuni</h2>
    <p>Credere che l'index sia solo "ciò che è in stage". È anche una cache e un tracker di conflitti. Cancellare <code>.git/index</code> quando si è bloccati; ricostruisci con <code>git read-tree HEAD</code>, ma perdi qualsiasi staging non committato. Usare <code>--assume-unchanged</code> come sostituto di <code>.gitignore</code>; il prossimo clone non lo onorerà. Infine, aspettarsi che l'index tracci directory vuote; non può. Usa un file segnaposto (<code>.gitkeep</code>) se devi committare una cartella vuota.</p>

- source_title: "Branches as lightweight pointers"
  title: "I branch come puntatori leggeri"
  langcode: it
  body: |
    <h2>Introduzione</h2>
    <p>In Git, un branch è solo un riferimento spostabile a un commit. Creare un branch è creare un file di 41 byte. Rispetto ai sistemi centralizzati dove i branch sono copie complete di directory, il modello di Git rende il branching abbastanza economico da usare con disinvoltura.</p>
    <h2>Cosa è realmente un branch</h2>
    <pre><code>cat .git/refs/heads/main
    # a1b2c3d4e5f6...
    git rev-parse main</code></pre>
    <p>Quell'hash è la <em>punta</em> del branch. Il "branch" stesso è la catena di commit raggiungibili dalla punta tramite i puntatori parent.</p>
    <h2>Creare branch</h2>
    <pre><code>git branch feature/login           # crea, non passare
    git switch -c feature/login        # crea e passa
    git switch -c hotfix v1.2.3        # da un tag
    git branch fixup HEAD~3            # da un ref relativo</code></pre>
    <h2>Spostare la punta</h2>
    <p>Ogni commit sul branch corrente ne avanza la punta di uno. I comandi che spostano le punte includono <code>commit</code>, <code>merge</code>, <code>rebase</code>, <code>reset</code> e <code>cherry-pick</code>.</p>
    <pre><code>git commit -m "Work"           # main si muove avanti
    git reset --hard HEAD~2        # main si muove indietro; i commit diventano irraggiungibili</code></pre>
    <h2>Branch e raggiungibilità</h2>
    <p>Un commit è "vivo" finché qualche ref lo raggiunge. Cancella ogni branch e tag che punta a un commit ed esso diventa <em>dangling</em>; il garbage collector di Git alla fine lo rimuove.</p>
    <pre><code>git fsck --unreachable
    git gc</code></pre>
    <h2>Tracciare l'upstream</h2>
    <p>Un branch locale può essere collegato a un branch di tracking remoto:</p>
    <pre><code>git branch --set-upstream-to=origin/main main
    git branch -u origin/main
    git status            # mostra ahead/behind in base al collegamento</code></pre>
    <h2>Manutenzione dei branch</h2>
    <pre><code>git branch --merged main           # branch completamente mergiati
    git branch --no-merged main        # branch con lavoro non mergiato
    git branch -d feature/old          # cancella mergiato
    git branch -D feature/discarded    # forza cancellazione</code></pre>
    <h2>Confrontare branch</h2>
    <pre><code>git log main..feature/login --oneline
    git diff main...feature/login
    git range-diff main..@{u} main..HEAD</code></pre>
    <p><code>range-diff</code> è ottimo per confrontare due versioni di un branch rebasato.</p>
    <h2>Politiche di branch sugli host</h2>
    <p>La maggior parte delle piattaforme di hosting ti permette di proteggere i branch per pattern di nome: richiedere pull request, commit firmati, CI passing o reviewer specifici prima che un push sia accettato. Il lato Git di questo è implementato tramite hook <code>pre-receive</code>; il lato piattaforma è configurazione. Dal tuo clone locale, la protezione del branch è invisibile finché il tuo push non viene rifiutato, momento in cui il server spiega perché. Per ispezionare la protezione dalla riga di comando, usa la CLI dell'host (<code>gh</code>, <code>glab</code>) o la sua API.</p>
    <pre><code>gh api repos/owner/repo/branches/main/protection</code></pre>
    <h2>Errori comuni</h2>
    <p>Immaginare i branch come contenitori di commit. Non lo sono; i commit esistono indipendentemente e molti branch possono raggiungere lo stesso commit. Cancellare un branch "feature" e assumere che i commit siano spariti; sono spariti solo dopo che diventano irraggiungibili <em>e</em> il reflog scade (90 giorni di default). Usare nomi di branch a parola singola lunga che si scontrano con nomi di file; i separatori <code>--</code> evitano l'ambiguità. Infine, lavorare direttamente su <code>main</code> in un repo condiviso; ramifica sempre per lavoro non triviale, anche se prevedi di fare fast-forward dopo.</p>

- source_title: "Merging: fast-forward vs three-way merge"
  title: "Merge: fast-forward vs merge a tre vie"
  langcode: it
  body: |
    <h2>Introduzione</h2>
    <p>Git ha due esiti di merge fondamentalmente diversi: <strong>fast-forward</strong>, dove la punta di un branch viene semplicemente spostata, e <strong>a tre vie</strong>, dove viene creato un nuovo commit con due parent. La scelta dipende dal fatto che i branch siano divergenti.</p>
    <h2>Fast-forward</h2>
    <p>Se la punta di <code>main</code> è un antenato di <code>feature</code>, nessun vero merge è necessario. Git sposta semplicemente <code>main</code> avanti:</p>
    <pre><code>      A---B---C   feature
         /
    main

    # dopo git merge feature
    A---B---C   main, feature</code></pre>
    <p>Comando:</p>
    <pre><code>git switch main
    git merge feature</code></pre>
    <p>Per forzare un vero merge commit anche quando il fast-forward è possibile:</p>
    <pre><code>git merge --no-ff feature</code></pre>
    <h2>Merge a tre vie</h2>
    <p>Quando entrambi i branch sono divergenti, Git trova la <em>merge base</em> (l'antenato comune più recente) e combina le modifiche da entrambi i lati:</p>
    <pre><code>      A---B---C   feature
         /
    A---D---E   main

    # dopo git merge feature
    A---D---E---M   main
         \     /
          B---C   feature</code></pre>
    <p>La strategia di merge predefinita di Git da 2.33 è <code>ort</code>; prima era <code>recursive</code>. Entrambe calcolano un merge a tre vie per file usando la merge base.</p>
    <h2>Ispezionare</h2>
    <pre><code>git merge-base main feature
    git log --oneline --graph --all
    git show --stat HEAD          # vedi il merge commit</code></pre>
    <h2>Strategie e opzioni</h2>
    <pre><code>git merge -X ours feature        # preferisci il nostro lato in caso di conflitti
    git merge -X theirs feature      # preferisci il loro lato
    git merge -X ignore-space-change feature
    git merge --squash feature       # applica modifiche senza merge commit</code></pre>
    <p><code>--squash</code> crea un singolo commit che contiene tutte le modifiche da <code>feature</code>, senza link parent ad esso. Utile per una storia ordinata ma perde il dettaglio per-commit.</p>
    <h2>Annullare e disfare</h2>
    <pre><code>git merge --abort                # a metà merge, torna allo stato pre-merge
    git reset --hard ORIG_HEAD       # dopo un merge finito, disfalo</code></pre>
    <h2>Configurare la politica fast-forward</h2>
    <pre><code>git config --global merge.ff false      # crea sempre merge commit
    git config --global merge.ff only      # solo fast-forward, rifiuta altrimenti
    git config --global pull.ff only       # uguale per i pull</code></pre>
    <h2>Driver di merge e attributi</h2>
    <p>Alcuni file mergiano male con il three-way testuale (lockfile generati da macchine, documentazione generata). Configura un driver di merge personalizzato tramite <code>.gitattributes</code> e <code>git config</code>:</p>
    <pre><code># .gitattributes
    package-lock.json merge=ours
    Gemfile.lock merge=union</code></pre>
    <pre><code>git config merge.ours.driver true
    git config merge.union.name "Line union merge"
    git config merge.union.driver "git merge-file --union %A %O %B"</code></pre>
    <p>La strategia integrata <code>union</code> mantiene entrambi i lati; <code>ours</code> sceglie sempre la nostra versione; i driver personalizzati possono eseguire qualsiasi programma. Usa con parsimonia; comportamenti di merge sorprendenti confondono i revisori.</p>
    <h2>Errori comuni</h2>
    <p>Credere che il fast-forward sia in qualche modo speciale o rischioso; non lo è, è solo uno spostamento di puntatore. Usare <code>--no-ff</code> su ogni merge in un progetto a movimento veloce, inquinando la storia con merge commit vuoti. Usare <code>-X ours</code> quando intendevi <code>--strategy=ours</code> (che scarta interamente l'altro lato) o viceversa. Infine, modificare manualmente il messaggio del merge commit dopo il fatto e rompere il wording standardizzato "Merge branch 'X'" su cui gli strumenti fanno affidamento; se devi modificare, fallo prima di <code>git commit</code>.</p>

- source_title: "The reflog: your safety net"
  title: "Il reflog: la tua rete di sicurezza"
  langcode: it
  body: |
    <h2>Introduzione</h2>
    <p>Il <em>reflog</em> registra ogni cambiamento di <code>HEAD</code> e di ogni punta di branch sulla tua macchina locale. È locale, per-clone, e non viene pushato. Quasi ogni commit "perso" può essere recuperato attraverso di esso.</p>
    <h2>Visualizzare</h2>
    <pre><code>git reflog                            # reflog di HEAD
    git reflog show main                  # reflog di main
    git reflog --date=iso
    git log -g --oneline                  # walk del log attraverso il reflog</code></pre>
    <p>Ogni entry ha una sequenza (<code>HEAD@{0}</code>, <code>HEAD@{1}</code>, ...), un'azione (<code>commit</code>, <code>reset</code>, <code>merge</code>, <code>rebase</code>, ...) e uno SHA target.</p>
    <h2>Recuperare un commit perso</h2>
    <pre><code>git reflog
    # 9f8a1c2 HEAD@{0}: reset: moving to HEAD~3
    # a1b2c3d HEAD@{1}: commit: Important work
    git switch -c rescued a1b2c3d</code></pre>
    <p>O direttamente:</p>
    <pre><code>git reset --hard HEAD@{1}</code></pre>
    <h2>Sintassi temporale</h2>
    <pre><code>git show HEAD@{2.hours.ago}
    git diff main@{yesterday} main</code></pre>
    <p>Git interpreta <code>@{...}</code> come un conteggio o una data.</p>
    <h2>Scadenza del reflog</h2>
    <p>Per impostazione predefinita le entry reflog raggiungibili scadono dopo 90 giorni, e quelle irraggiungibili dopo 30:</p>
    <pre><code>git config gc.reflogExpire 90.days
    git config gc.reflogExpireUnreachable 30.days</code></pre>
    <p>Fino alla scadenza, anche i commit di hard-reset rimangono recuperabili.</p>
    <h2>Reflog per ref</h2>
    <p>Ogni branch ha il proprio reflog in <code>.git/logs/refs/heads/&lt;name&gt;</code>. Anche stash ne ha uno (<code>refs/stash</code>):</p>
    <pre><code>git reflog show stash</code></pre>
    <h2>Pulire il reflog</h2>
    <pre><code>git reflog expire --expire=now --all
    git gc --prune=now</code></pre>
    <p>Usa solo se hai bisogno di cancellare permanentemente dei dati; questo rimuove la rete di sicurezza.</p>
    <h2>Reflog vs git log</h2>
    <p><code>git log</code> percorre il grafo dei commit tramite i puntatori parent; il reflog percorre i movimenti registrati di un ref. Dopo un force-reset, <code>git log</code> non mostra più i commit abbandonati, ma il reflog sì.</p>
    <h2>Ispezione del reflog per ref</h2>
    <p>Ogni ref tiene il proprio reflog. Ispeziona il reflog di un branch specifico per vedere come si è mossa la sua punta:</p>
    <pre><code>git reflog show feature/login
    git log -g feature/login --oneline
    cat .git/logs/refs/heads/feature/login</code></pre>
    <p>Utile quando si indaga "chi ha mosso questo branch?" su un clone locale. Il formato del file reflog è una riga per cambiamento con vecchio SHA, nuovo SHA, committer, timestamp e un messaggio testuale. Combinato con <code>git blame</code> sul file, dà una traccia di audit locale completa; ricorda che i reflog non vengono pushati, quindi la traccia copre solo la tua macchina.</p>
    <h2>Errori comuni</h2>
    <p>Dimenticare che il reflog esiste in preda al panico e rifare ore di lavoro che era facilmente recuperabile. Controlla sempre <code>git reflog</code> per primo. Pushare durante il recupero e assumere che il reflog sia sul server; non lo è, solo il tuo clone locale ce l'ha. Eseguire <code>git gc --prune=now</code> per istinto di "pulizia" e distruggere la rete di sicurezza per qualsiasi commit non referenziato. E infine, trattare le entry reflog come permanenti; i ref cancellati da tempo invecchiano. Tagga o ramifica qualsiasi cosa tu voglia mantenere prima che passino 30 giorni.</p>

- source_title: "Detached HEAD state explained"
  title: "Lo stato detached HEAD spiegato"
  langcode: it
  body: |
    <h2>Introduzione</h2>
    <p>Normalmente <code>HEAD</code> punta a un ref di branch, che a sua volta punta a un commit. In <em>detached HEAD</em>, <code>HEAD</code> punta direttamente a un commit. Detached HEAD non è rotto; è una modalità deliberata utile per ispezionare la storia e pericolosa per committare senza pensare.</p>
    <h2>Come ci si arriva</h2>
    <pre><code>git checkout v1.2.3
    git switch --detach v1.2.3
    git checkout HEAD~5
    git checkout origin/main      # il tracking remoto è quasi-read-only</code></pre>
    <p>Ognuno di questi mette <code>HEAD</code> direttamente su un commit invece che su un branch.</p>
    <h2>Ispezionare</h2>
    <pre><code>cat .git/HEAD
    # a1b2c3d4...   (SHA grezzo, non "ref: ...")
    git status
    # HEAD detached at v1.2.3</code></pre>
    <h2>Perché esiste</h2>
    <ul>
      <li>Ispezionare una vecchia release senza influenzare alcun branch.</li>
      <li>Bisecting (<code>git bisect</code> usa detached HEAD).</li>
      <li>Costruire un esperimento veloce che potresti scartare.</li>
      <li>Operare su un tag che dovrebbe rimanere immutabile.</li>
    </ul>
    <h2>Committare in detached HEAD</h2>
    <p>Puoi committare in detached HEAD, e l'oggetto commit viene creato normalmente. Il problema: nessun branch lo punta. Cambia branch e il commit diventa irraggiungibile.</p>
    <pre><code>git switch --detach v1.2.3
    echo fix > patch.txt
    git add patch.txt
    git commit -m "Quick fix"
    git switch main             # il nuovo commit è ora orfano</code></pre>
    <p>Ancoralo prima di cambiare:</p>
    <pre><code>git switch -c hotfix/1.2.4</code></pre>
    <h2>Recuperare da un detach accidentale</h2>
    <p>Se sei già passato altrove, il reflog ha il commit:</p>
    <pre><code>git reflog
    # a1b2c3d HEAD@{1}: commit: Quick fix
    git switch -c hotfix/1.2.4 a1b2c3d</code></pre>
    <h2>Quando detached HEAD non è detached</h2>
    <p>I repository bare hanno spesso <code>HEAD</code> come ref simbolico a <code>refs/heads/main</code> anche se non c'è una working tree. I submodule fanno anche intenzionalmente checkout in detached HEAD sul commit registrato; è normale.</p>
    <h2>Configurare gli avvisi</h2>
    <pre><code>git config --global advice.detachedHead true   # default: mostra consigli</code></pre>
    <p>I principianti dovrebbero lasciarlo attivo; il testo dell'avviso spiega esattamente come recuperare.</p>
    <h2>Lavorare in sicurezza mentre detached</h2>
    <p>Se vuoi intenzionalmente sperimentare senza influenzare alcun branch, detached HEAD è lo strumento giusto. Il trucco è ancorare il lavoro importante prima di cambiare. Un pattern affidabile:</p>
    <pre><code>git switch --detach v1.2.3
    # ... sperimenta, committa ...
    git tag tmp/experiment           # segnalibro
    git switch main
    # dopo
    git switch -c rescued tmp/experiment
    git tag -d tmp/experiment</code></pre>
    <p>Il namespace di tag <code>tmp/</code> rende ovvio che sono ancore usa-e-getta. Alcuni team riservano un intero prefisso per questo scopo e fanno ignorare alla CI.</p>
    <h2>Errori comuni</h2>
    <p>Trattare l'avviso come un errore spaventoso e farsi prendere dal panico. È informativo. Fare lavoro significativo in detached HEAD e poi eseguire <code>git switch main</code> senza prima creare un branch; recupera tramite reflog, ma meglio ancorare prima. Confondere detached HEAD con un repo corrotto; niente è corrotto, ti manca solo un'etichetta di branch. Infine, pushare mentre detached: <code>git push</code> ha bisogno di un branch su entrambe le estremità. O crea un branch locale e pushalo, o usa <code>git push origin HEAD:refs/heads/new</code>.</p>

- source_title: "Remote-tracking branches"
  title: "Branch di tracking remoto"
  langcode: it
  body: |
    <h2>Introduzione</h2>
    <p>Un branch di tracking remoto è un ref locale che rispecchia un branch su un remote. Vivono sotto <code>refs/remotes/&lt;remote&gt;/</code> e vengono aggiornati da <code>git fetch</code> (e operazioni che implicano fetch, come <code>git pull</code> e <code>git clone</code>). Non si committa direttamente su di essi.</p>
    <h2>Da dove vengono</h2>
    <p>Il refspec predefinito per <code>origin</code> è:</p>
    <pre><code>+refs/heads/*:refs/remotes/origin/*</code></pre>
    <p>Quindi quando il server ha <code>refs/heads/main</code>, il tuo clone ottiene <code>refs/remotes/origin/main</code>. Il <code>+</code> iniziale significa "force update".</p>
    <h2>Elencare</h2>
    <pre><code>git branch -r
    git branch -a                # locali + tracking remoto
    git branch -vv               # mostra l'upstream dei locali</code></pre>
    <h2>Collegare un branch locale a uno</h2>
    <pre><code>git switch feature/login                       # crea automaticamente il locale da origin/feature/login
    git switch -c mine origin/feature/login        # esplicito
    git branch -u origin/main                      # imposta l'upstream del branch corrente
    git branch --unset-upstream</code></pre>
    <p>Il collegamento <em>upstream</em> guida l'ahead/behind di <code>git status</code>, e i target predefiniti per <code>git push</code> e <code>git pull</code>.</p>
    <h2>Pruning</h2>
    <p>I branch di tracking remoto non spariscono quando il branch remoto viene cancellato. Puliscili:</p>
    <pre><code>git fetch --prune
    git remote prune origin
    git config --global fetch.prune true</code></pre>
    <h2>Lo speciale HEAD remoto</h2>
    <p>Ogni remote ha un <code>HEAD</code> simbolico che indica il suo branch predefinito:</p>
    <pre><code>git symbolic-ref refs/remotes/origin/HEAD
    git remote set-head origin --auto    # interroga il server</code></pre>
    <p>Questo è ciò che fa risolvere <code>origin</code> da solo a <code>origin/main</code> (o qualsiasi default).</p>
    <h2>Diff contro un branch di tracking remoto</h2>
    <pre><code>git fetch
    git log HEAD..origin/main --oneline      # cosa c'è a monte
    git log origin/main..HEAD --oneline      # cosa c'è solo localmente
    git diff @{u}                            # vs upstream</code></pre>
    <p><code>@{u}</code> (o <code>@{upstream}</code>) è la scorciatoia per l'upstream configurato del branch corrente.</p>
    <h2>Comportamento di push</h2>
    <p>Il default <code>push.default = simple</code> pusha il branch corrente al suo upstream con lo stesso nome. Se pushi un branch senza upstream e hai <code>push.autoSetupRemote = true</code> (Git 2.37+), l'upstream viene creato automaticamente.</p>
    <h2>Dettagli dei refspec</h2>
    <p>Il refspec di fetch per un remote può essere personalizzato per scaricare ref aggiuntivi o per mapparli diversamente. Per esempio, per scaricare anche i ref delle PR di GitHub e MR di GitLab:</p>
    <pre><code>git config --add remote.origin.fetch '+refs/pull/*/head:refs/remotes/origin/pr/*'
    git config --add remote.origin.fetch '+refs/merge-requests/*/head:refs/remotes/origin/mr/*'</code></pre>
    <p>Il <code>+</code> iniziale significa "force update", necessario perché i ref delle PR possono muoversi (rebase sul branch della PR). Dopo il fetch, le PR del server appaiono come ref locali <code>origin/pr/*</code>, pronte per <code>git switch -c review/&lt;n&gt; origin/pr/&lt;n&gt;</code>.</p>
    <h2>Errori comuni</h2>
    <p>Provare a fare <code>git checkout origin/main</code> e modificare; ti mette in detached HEAD perché <code>origin/main</code> è read-only. Crea invece un tracking branch. Dimenticare <code>git fetch</code> e essere fuorviati da conteggi ahead/behind stantii. Trattare i branch di tracking remoto come se pushare su di essi aggiornasse il server; sono mirror locali. Usa <code>git push origin main</code>. Infine, cancellare <code>origin/main</code> con <code>git branch -dr</code> e assumere che il branch del server sia sparito; non lo è. Usa <code>git push origin --delete main</code> e solo quando intendi farlo davvero.</p>

- source_title: "Working tree, index, and repository: the three areas"
  title: "Working tree, index e repository: le tre aree"
  langcode: it
  body: |
    <h2>Introduzione</h2>
    <p>Ogni operazione Git sposta dati tra tre aree: la <strong>working tree</strong> (i tuoi file), l'<strong>index</strong> (bozza del prossimo commit) e il <strong>repository</strong> (storia committata sotto <code>.git</code>). Nominare cosa si sposta dove è il modello mentale più utile in assoluto.</p>
    <h2>Le aree</h2>
    <ul>
      <li><strong>Working tree</strong>: la directory che modifichi.</li>
      <li><strong>Index</strong>: <code>.git/index</code>, il tree in stage.</li>
      <li><strong>Repository</strong>: oggetti in <code>.git/objects</code> più ref in <code>.git/refs</code>.</li>
    </ul>
    <h2>Comandi per direzione</h2>
    <pre><code># working tree -> index
    git add file
    git rm file
    git mv old new

    # index -> repository
    git commit
    git write-tree   # plumbing

    # repository -> index
    git reset &lt;commit&gt;
    git read-tree &lt;tree&gt;

    # repository -> working tree (e di solito index)
    git checkout &lt;commit&gt; -- file
    git restore --source &lt;commit&gt; file
    git switch &lt;branch&gt;</code></pre>
    <h2>I quattro diff</h2>
    <p>Puoi confrontare due aree qualsiasi:</p>
    <pre><code>git diff                  # working tree vs index
    git diff --staged         # index vs HEAD
    git diff HEAD             # working tree vs HEAD
    git diff main feature     # repository vs repository</code></pre>
    <h2>Status decodificato</h2>
    <pre><code>git status -s
    # XY filename
    # X = stato dell'index, Y = stato della working tree
    # M modificato, A aggiunto, D cancellato, R rinominato, ?? untracked</code></pre>
    <p>Per esempio <code>MM</code> significa modificato sia nell'index che nella working tree (hai messo in stage una modifica e poi modificato di nuovo).</p>
    <h2>Reset, restore, checkout</h2>
    <p>Ognuno influenza aree diverse:</p>
    <ul>
      <li><code>git reset --soft</code>: solo repository (sposta il ref).</li>
      <li><code>git reset</code> (mixed): repository + index.</li>
      <li><code>git reset --hard</code>: repository + index + working tree.</li>
      <li><code>git restore --staged</code>: index da HEAD.</li>
      <li><code>git restore</code>: working tree dall'index.</li>
      <li><code>git restore --source=&lt;commit&gt;</code>: working tree (e opzionalmente index) da un commit specifico.</li>
    </ul>
    <h2>Un esercizio</h2>
    <pre><code>echo a &gt; f.txt
    git add f.txt
    git commit -m "v1"
    echo b &gt;&gt; f.txt
    git add f.txt
    echo c &gt;&gt; f.txt
    git status
    git diff
    git diff --staged
    git diff HEAD</code></pre>
    <p>Leggi ogni diff; capire perché differiscono cementa il modello.</p>
    <h2>Plumbing per ogni area</h2>
    <p>Conoscere il plumbing per ogni area demistifica i comandi di livello più alto:</p>
    <ul>
      <li>Working tree: operazioni filesystem ordinarie.</li>
      <li>Index: <code>git update-index</code>, <code>git ls-files</code>, <code>git read-tree</code>, <code>git write-tree</code>.</li>
      <li>Object database: <code>git hash-object</code>, <code>git cat-file</code>, <code>git mktree</code>, <code>git commit-tree</code>.</li>
      <li>Ref: <code>git update-ref</code>, <code>git symbolic-ref</code>, <code>git for-each-ref</code>.</li>
    </ul>
    <pre><code>git ls-files --stage              # index
    git ls-tree HEAD                  # repo
    ls -R                             # working tree</code></pre>
    <h2>Errori comuni</h2>
    <p>Cercare di memorizzare comandi invece di aree; una volta che sai quale area è la sorgente e quale la destinazione, il comando giusto è ovvio. Confondere <code>git restore file</code> con <code>git checkout file</code>; sono equivalenti per quel caso, ma le molte altre modalità di <code>checkout</code> confondono i nuovi utenti. Usare <code>git reset --hard</code> per "fare pulizia" senza rendersi conto che distrugge la working tree. E infine, aspettarsi che <code>git commit</code> includa modifiche non in stage; non lo fa (a meno che non passi <code>-a</code> per i soli file tracciati).</p>

- source_title: "How commits are linked: the commit graph"
  title: "Come i commit sono collegati: il grafo dei commit"
  langcode: it
  body: |
    <h2>Introduzione</h2>
    <p>Un commit Git fa riferimento a zero, uno o più commit <em>parent</em>. L'intera storia è un grafo aciclico orientato (DAG) di questi link parent. Branch e tag sono semplicemente etichette sui nodi di questo grafo.</p>
    <h2>Anatomia di un link parent</h2>
    <pre><code>git cat-file -p HEAD
    # tree 9f1a...
    # parent b2c3...
    # parent d4e5...        (solo sui merge commit)
    # author Ada ...
    # committer Ada ...</code></pre>
    <p>Un parent: storia lineare. Due parent: un merge. Zero parent: un commit root. Tre o più: un merge octopus.</p>
    <h2>Percorrere il grafo</h2>
    <pre><code>git log --oneline --graph --all
    git log --first-parent           # segui solo i primi parent
    git log --topo-order
    git log --date-order</code></pre>
    <p><code>--first-parent</code> su <code>main</code> è ottimo per vedere il "trunk" della storia senza il rumore dei lati di merge.</p>
    <h2>Query di antenati</h2>
    <pre><code>git merge-base A B               # antenato comune più recente
    git merge-base --is-ancestor X Y   # exit 0 se X è antenato di Y
    git rev-list A..B --count          # commit in B non in A</code></pre>
    <h2>Sintassi di range</h2>
    <ul>
      <li><code>A..B</code>: commit raggiungibili da B ma non da A.</li>
      <li><code>A...B</code>: differenza simmetrica.</li>
      <li><code>^A B</code>: uguale a <code>A..B</code>.</li>
      <li><code>B --not A</code>: uguale a <code>A..B</code>.</li>
    </ul>
    <pre><code>git log main..feature
    git log main...feature --left-right --oneline</code></pre>
    <h2>Il file commit-graph</h2>
    <p>Da Git 2.18, Git può scrivere un file <code>commit-graph</code> che pre-calcola dati di antenati per repo enormi:</p>
    <pre><code>git commit-graph write --reachable
    git config --global core.commitGraph true
    git config --global gc.writeCommitGraph true</code></pre>
    <p>Questo accelera drasticamente <code>git log --graph</code>, <code>git merge-base</code> e i controlli di raggiungibilità.</p>
    <h2>Merge octopus</h2>
    <p>Un singolo merge commit può avere molti parent:</p>
    <pre><code>git merge feature1 feature2 feature3</code></pre>
    <p>I merge octopus riescono solo senza conflitti. Sono utili per branch di integrazione in alcuni workflow ma raramente necessari.</p>
    <h2>Visualizzare il grafo</h2>
    <pre><code>git log --oneline --graph --decorate --all
    gitk --all
    git log --pretty=format:'%h %p %s'</code></pre>
    <p><code>%p</code> stampa gli SHA dei parent.</p>
    <h2>Numeri di generazione</h2>
    <p>Il file commit-graph memorizza un numero di generazione per commit: 1 per commit root, max(generazioni parent) + 1 altrimenti. I numeri di generazione trasformano molte query di antenati in operazioni O(log n). Git moderno (2.27+) scrive date di commit corrette e numeri di generazione v2 quando il commit-graph è abilitato:</p>
    <pre><code>git commit-graph write --reachable --changed-paths
    git config gc.writeCommitGraph true
    git config core.commitGraph true
    git log --oneline --graph -n 5</code></pre>
    <p><code>--changed-paths</code> registra inoltre un Bloom filter per commit che elenca i path modificati, accelerando drasticamente le query <code>git log</code> limitate per path.</p>
    <h2>Errori comuni</h2>
    <p>Immaginare i branch come stack separati di commit; sono etichette su nodi che possono condividere antenati. Usare <code>HEAD~3</code> su un merge commit ed essere sorpresi: <code>~</code> segue sempre il primo parent. Usa <code>^2</code>, <code>^3</code> per saltare ad altri parent. Dimenticare che il rebase riscrive la topologia del grafo creando nuovi commit con nuovi puntatori parent; i vecchi commit vivono nel reflog. Infine, pensare che il grafo dei commit memorizzi i diff; memorizza solo tree e parent. I diff vengono calcolati su richiesta confrontando i tree.</p>

- source_title: "Pack files and object storage"
  title: "Pack file e object storage"
  langcode: it
  body: |
    <h2>Introduzione</h2>
    <p>Git memorizza gli oggetti in due formati: <em>loose</em> (un file per oggetto sotto <code>.git/objects/xx/yyyy...</code>) e <em>packed</em> (molti oggetti in un singolo file <code>.pack</code> con un compagno <code>.idx</code>). I pack sono molto più efficienti su disco e in rete.</p>
    <h2>Layout</h2>
    <pre><code>.git/objects/
      00/  ... oggetti loose, nominati per sha meno i primi due caratteri
      pack/
        pack-&lt;hash&gt;.pack    # i dati
        pack-&lt;hash&gt;.idx     # indice di offset
        pack-&lt;hash&gt;.rev     # indice inverso (Git 2.31+)</code></pre>
    <h2>Perché i pack</h2>
    <ul>
      <li>Un file per oggetto è brutale sui filesystem con milioni di file.</li>
      <li>I pack applicano <em>compressione delta</em>: memorizzano blob simili come una base più un diff.</li>
      <li>I pack usano zlib oltre ai delta.</li>
      <li>Smart fetch/push trasferiscono i dati pack direttamente.</li>
    </ul>
    <h2>Innescare il packing</h2>
    <pre><code>git gc                    # manutenzione di routine
    git gc --aggressive       # ricerca delta più pesante
    git repack -a -d -f       # ricrea un pack da tutti gli oggetti
    git fetch                 # può anche produrre pack</code></pre>
    <p>L'auto-gc scatta quando il repo accumula troppi oggetti loose; regola con <code>gc.auto</code>.</p>
    <h2>Ispezionare i pack</h2>
    <pre><code>ls .git/objects/pack
    git verify-pack -v .git/objects/pack/pack-&lt;hash&gt;.idx | head
    git count-objects -v</code></pre>
    <p><code>verify-pack -v</code> mostra il tipo, dimensione, dimensione packed di ogni oggetto e se è un delta contro un altro oggetto.</p>
    <h2>Indici multi-pack</h2>
    <p>Per repo molto grandi, più pack possono essere unificati da un singolo indice:</p>
    <pre><code>git multi-pack-index write
    git config core.multiPackIndex true</code></pre>
    <h2>Bitmap di raggiungibilità</h2>
    <p>I bitmap accelerano le query di raggiungibilità (usate da clone e fetch sui server di hosting):</p>
    <pre><code>git repack -adb        # costruisce il bitmap
    git config repack.writeBitmaps true</code></pre>
    <p>I bitmap sono più utili quando si servono molti clone o quando si eseguono grandi query <code>git rev-list</code>.</p>
    <h2>Dettagli di compressione degli oggetti</h2>
    <p>Un delta in un pack memorizza un riferimento a un oggetto <em>base</em> e uno stream di istruzioni. La base può essa stessa essere un delta. Git limita le catene di delta tramite <code>pack.depth</code> (default 50). La base scelta è di solito un blob simile, spesso una versione precedente dello stesso file.</p>
    <h2>Repack geometrico</h2>
    <p>Mantenere un singolo pack enorme è costoso; riscriverlo a ogni gc è dispendioso. Git moderno supporta il repack <em>geometrico</em>, che mantiene una catena di pack di dimensione geometricamente crescente e fa repack solo dei piccoli:</p>
    <pre><code>git repack --geometric=2 -d --write-bitmap-index
    git config maintenance.incremental-repack.enabled true
    git maintenance run --task incremental-repack</code></pre>
    <p>Questo rende la manutenzione di routine limitata: ogni gc tocca solo i pack più piccoli. Combinato con indici multi-pack e bitmap di raggiungibilità, il repack geometrico è la configurazione consigliata per repository grandi o trafficati.</p>
    <h2>Errori comuni</h2>
    <p>Cancellare manualmente un file <code>.pack</code> per recuperare spazio, rompendo il repo. Il pack contiene molti oggetti raggiungibili; usa invece <code>git gc --prune</code>. Eseguire <code>git gc --aggressive</code> programmato; è costoso e raramente migliora rispetto a un normale <code>gc</code>. Tenere milioni di oggetti loose (dopo un recupero pasticciato) e poi fare <code>git status</code> su un filesystem lento; impacchetta prima. Infine, trasferire pack copiando i file invece di usare <code>git clone --bare</code>; potresti perdere il <code>.idx</code> o saltare funzionalità più nuove come l'indice multi-pack.</p>

- source_title: "The ORIG_HEAD, MERGE_HEAD, and CHERRY_PICK_HEAD refs"
  title: "I ref ORIG_HEAD, MERGE_HEAD e CHERRY_PICK_HEAD"
  langcode: it
  body: |
    <h2>Introduzione</h2>
    <p>Git tiene diversi ref speciali "ausiliari" in <code>.git/</code> per registrare lo stato durante operazioni multi-step. Conoscerli trasforma recuperi spaventosi in one-liner.</p>
    <h2>ORIG_HEAD</h2>
    <p><code>ORIG_HEAD</code> viene impostato ogni volta che un'operazione "pericolosa" sposta <code>HEAD</code> di molto: merge, rebase, reset, am. Cattura la punta precedente così puoi disfare:</p>
    <pre><code>git merge feature
    # decidi che era un errore
    git reset --hard ORIG_HEAD</code></pre>
    <p>Stesso trucco dopo un brutto rebase o reset:</p>
    <pre><code>git rebase main
    git reset --hard ORIG_HEAD     # torna allo stato pre-rebase</code></pre>
    <h2>MERGE_HEAD</h2>
    <p>Durante un merge, <code>MERGE_HEAD</code> registra la punta del branch in fase di merge. Esiste dall'inizio di <code>git merge</code> finché il merge commit non viene creato o il merge non viene annullato:</p>
    <pre><code>git merge feature
    cat .git/MERGE_HEAD
    git merge --abort                # rimuove MERGE_HEAD</code></pre>
    <p>Se hai finito di risolvere i conflitti e vuoi scrivere il merge commit:</p>
    <pre><code>git commit                       # usa MERGE_HEAD per registrare il secondo parent</code></pre>
    <h2>MERGE_MSG e AUTO_MERGE</h2>
    <p>I file compagni includono <code>.git/MERGE_MSG</code> (il messaggio di commit preparato) e, da Git 2.40, <code>AUTO_MERGE</code> (un tree contenente la migliore auto-risoluzione di Git). Quest'ultimo è utile per fare diff contro la tua risoluzione manuale.</p>
    <h2>CHERRY_PICK_HEAD e REVERT_HEAD</h2>
    <p>Durante un cherry-pick o revert, Git registra il commit di origine:</p>
    <pre><code>git cherry-pick a1b2c3d
    cat .git/CHERRY_PICK_HEAD
    git cherry-pick --abort
    git cherry-pick --continue        # dopo aver risolto i conflitti</code></pre>
    <p>Lo stesso pattern si applica a <code>git revert</code> con <code>REVERT_HEAD</code>.</p>
    <h2>BISECT_HEAD e REBASE_HEAD</h2>
    <p>Quando bisecting o rebasing, Git scrive anche <code>BISECT_HEAD</code> o <code>REBASE_HEAD</code> per tracciare lo stato in corso. Strumenti come <code>git status</code> li usano per stampare messaggi accurati "sei nel mezzo di X".</p>
    <h2>FETCH_HEAD</h2>
    <p>Dopo un fetch, <code>FETCH_HEAD</code> elenca cosa è stato scaricato, un ref per riga. <code>git pull</code> lo legge per sapere cosa mergiare:</p>
    <pre><code>git fetch origin main
    cat .git/FETCH_HEAD
    git merge FETCH_HEAD</code></pre>
    <h2>Mettere insieme</h2>
    <pre><code>git status                         # fa riferimento a tutti questi quando serve
    ls .git/*HEAD                      # elenca i ref ausiliari correnti</code></pre>
    <h2>Rilevare operazioni in corso</h2>
    <p><code>git status</code> legge questi ref ausiliari per dirti cosa è in corso. Gli script possono fare lo stesso testando l'esistenza dei file:</p>
    <pre><code>if test -f "$(git rev-parse --git-dir)/MERGE_HEAD"; then
        echo "merge in corso"
    fi
    if test -f "$(git rev-parse --git-dir)/CHERRY_PICK_HEAD"; then
        echo "cherry-pick in corso"
    fi
    if test -d "$(git rev-parse --git-dir)/rebase-merge"; then
        echo "rebase interattivo in corso"
    fi</code></pre>
    <p>Questo è esattamente ciò che fanno le integrazioni di prompt della shell come <code>__git_ps1</code> per renderizzare <code>(main|MERGING)</code>.</p>
    <h2>Errori comuni</h2>
    <p>Cercare di cancellare <code>MERGE_HEAD</code> manualmente per uscire da un merge; usa <code>git merge --abort</code>. Dimenticare che <code>ORIG_HEAD</code> esiste e ricreare commit a mano dopo un brutto reset. Confondere <code>FETCH_HEAD</code> (ultimo fetch, transitorio) con i ref di tracking remoto come <code>origin/main</code> (persistenti). E infine, fare script attorno a questi ref assumendo che esistano; <code>MERGE_HEAD</code> esiste solo durante un merge, quindi testa sempre il file prima di leggerlo.</p>

- source_title: "Annotated tags vs lightweight tags"
  title: "Tag annotated vs tag lightweight"
  langcode: it
  body: |
    <h2>Introduzione</h2>
    <p>Git supporta due tipi di tag: <strong>lightweight</strong>, che sono solo ref che puntano a commit, e <strong>annotated</strong>, che sono oggetti Git completi con metadati. Usa i tag annotated per le release.</p>
    <h2>Creare</h2>
    <pre><code>git tag v1.0.0                          # lightweight
    git tag -a v1.0.0 -m "1.0 GA"           # annotated
    git tag -s v1.0.0 -m "Signed"           # annotated firmato GPG
    git tag -a v1.0.0 a1b2c3d -m "..."     # tagga un commit specifico</code></pre>
    <h2>Cosa memorizzano i tag annotated</h2>
    <pre><code>git cat-file -t v1.0.0
    # tag
    git cat-file -p v1.0.0
    # object &lt;commit-sha&gt;
    # type commit
    # tag v1.0.0
    # tagger Ada &lt;ada@example.com&gt; 1714300000 +0000
    #
    # 1.0 GA</code></pre>
    <p>Un tag annotated è un proprio oggetto. Ha il proprio SHA distinto dal commit a cui punta, un tagger e una data, un messaggio e una firma opzionale.</p>
    <h2>Cosa i tag lightweight non memorizzano</h2>
    <p>Un tag lightweight è solo <code>refs/tags/v1.0.0</code> contenente uno SHA di commit. Non c'è messaggio, nessun tagger, nessuna firma. <code>git describe</code>, <code>git tag -v</code> e molti strumenti CI di rilascio assumono tag annotated e si comportano stranamente con quelli lightweight.</p>
    <h2>Ispezionare</h2>
    <pre><code>git show v1.0.0
    git tag -l --format='%(refname:short) %(objecttype) %(taggername) %(subject)'</code></pre>
    <p>I tag lightweight mostrano <code>commit</code> come tipo di oggetto; i tag annotated mostrano <code>tag</code>.</p>
    <h2>Firmare e verificare</h2>
    <pre><code>git tag -s v1.0.0 -m "Signed"
    git tag -v v1.0.0
    # gpg: Good signature from "Ada Lovelace &lt;ada@example.com&gt;"</code></pre>
    <p>La firma SSH è anche supportata in Git moderno:</p>
    <pre><code>git config --global gpg.format ssh
    git config --global user.signingkey ~/.ssh/id_ed25519.pub
    git tag -s v1.1.0 -m "SSH-signed"</code></pre>
    <h2>Scegliere</h2>
    <ul>
      <li>Usa <strong>annotated</strong> per le release, qualsiasi cosa pubblichi, qualsiasi cosa tu firmi.</li>
      <li>Usa <strong>lightweight</strong> per segnalibri locali ad hoc (es. "ricorda questo commit prima di fare rebase").</li>
    </ul>
    <h2>Pushare i tag</h2>
    <pre><code>git push origin v1.0.0
    git push origin --tags
    git push --follow-tags         # solo tag annotated raggiungibili dai commit pushati</code></pre>
    <p><code>--follow-tags</code> ignora deliberatamente i tag lightweight, che è di solito ciò che vuoi.</p>
    <h2>Dereferenziamento dei tag</h2>
    <p>Molti comandi dereferenziano automaticamente un tag annotated al commit a cui punta; alcuni no. Usa <code>^{}</code> per forzare il dereferenziamento negli script:</p>
    <pre><code>git rev-parse v1.0.0           # SHA dell'oggetto tag (annotated)
    git rev-parse v1.0.0^{}        # SHA del commit a cui punta
    git rev-parse v1.0.0^{commit}  # uguale, con asserzione di tipo
    git for-each-ref --format='%(refname:short) %(*objectname)' refs/tags</code></pre>
    <p>Il segnaposto <code>%(*objectname)</code> dà il commit dereferenziato per i tag ed è vuoto per i ref non-tag. Questo pattern è essenziale per gli script di rilascio che hanno bisogno di uno SHA di commit da un nome di tag.</p>
    <h2>Errori comuni</h2>
    <p>Taggare le release con un semplice <code>git tag v1.0</code> e perdere tagger/data/messaggio nei log di audit. Passa sempre <code>-a</code> o <code>-s</code>. Spostare un tag pubblicato a un nuovo commit ("force-tag"); gli utenti a valle hanno già cachato il vecchio SHA e potrebbero non recepire il cambiamento. Emetti invece <code>v1.0.1</code>. Usare tag lightweight come segnalibri nominati condivisi tra un team; se devi condividere, preferisci branch o tag annotated. Infine, aspettarsi che <code>git describe</code> funzioni senza tag annotated; per default conta solo quelli annotated (<code>--tags</code> opta in per i lightweight, con avvertenze).</p>

- source_title: "What happens during git clone"
  title: "Cosa succede durante git clone"
  langcode: it
  body: |
    <h2>Introduzione</h2>
    <p><code>git clone</code> sembra una sola operazione ma in realtà ne compone diverse. Capire i passi aiuta quando si risolvono problemi di clone parziali, clone lenti o default sorprendenti.</p>
    <h2>La sequenza</h2>
    <ol>
      <li>Crea la directory di destinazione.</li>
      <li>Esegue <code>git init</code> al suo interno.</li>
      <li>Aggiunge <code>origin</code> come remote con l'URL di origine.</li>
      <li>Configura il refspec predefinito <code>+refs/heads/*:refs/remotes/origin/*</code>.</li>
      <li>Esegue <code>git fetch origin</code> per scaricare oggetti e ref.</li>
      <li>Determina il branch predefinito (l'<code>HEAD</code> del remote).</li>
      <li>Crea un branch locale che lo traccia.</li>
      <li>Fa il checkout di quel branch nella working tree.</li>
    </ol>
    <h2>Vederlo accadere</h2>
    <pre><code>GIT_TRACE=1 GIT_TRACE_PACKET=1 git clone https://github.com/example/widget.git 2&gt;&amp;1 | head -50</code></pre>
    <p>Vedrai negoziazione di capabilities, advertisement dei ref, negoziazione want/have e ricezione del pack.</p>
    <h2>Wire protocol</h2>
    <p>Git moderno supporta il protocollo v2 (<code>git config protocol.version 2</code> o predefinito in 2.26+). Il server pubblicizza solo i ref richiesti invece della lista completa, il che migliora drasticamente i tempi di clone per repo con molti ref.</p>
    <h2>Varianti</h2>
    <pre><code>git clone --bare                       # nessuna working tree
    git clone --mirror                     # bare + tutti i ref, configurato per mirroring
    git clone --depth 1                    # shallow
    git clone --filter=blob:none           # partial clone, salta i blob fino al bisogno
    git clone --filter=tree:0              # ancora meno dati, tree on-demand
    git clone --single-branch              # solo storia di un branch
    git clone --branch v1.2.3              # checkout di un branch/tag specifico
    git clone --recurse-submodules         # clona anche i submodule
    git clone --no-checkout                # salta il popolamento della working tree</code></pre>
    <h2>Partial clone</h2>
    <p>I partial clone (<code>--filter</code>) rimandano il download degli oggetti finché non sono necessari. Richiedono supporto del server (la maggior parte degli host moderni ce l'ha):</p>
    <pre><code>git clone --filter=blob:none https://github.com/example/big.git
    cd big
    git log --oneline                  # economico; solo oggetti commit e tree scaricati
    git show HEAD:src/main.c           # questo innesca un fetch di blob</code></pre>
    <h2>Cosa va dove</h2>
    <p>Dopo un clone riuscito:</p>
    <ul>
      <li><code>.git/objects/pack/</code>: il pack file ricevuto dal server.</li>
      <li><code>.git/refs/remotes/origin/</code>: ogni branch del server come ref di tracking remoto.</li>
      <li><code>.git/HEAD</code>: ref simbolico al nuovo branch locale.</li>
      <li><code>.git/config</code>: sezione <code>[remote "origin"]</code> con URL e refspec.</li>
    </ul>
    <h2>Advertisement lato server</h2>
    <p>La prima cosa che il server invia in qualsiasi clone è l'advertisement dei ref. Sotto il protocollo v0/v1 questo elenca ogni ref, anche se ne vuoi solo uno; su repo enormi con milioni di ref il solo advertisement potrebbe richiedere secondi. Il protocollo v2 cambia questo: il client invia una richiesta <code>ls-refs</code> specificando pattern, e il server pubblicizza solo i ref corrispondenti:</p>
    <pre><code>git -c protocol.version=2 ls-remote origin 'refs/heads/main'
    GIT_TRACE_PACKET=1 git -c protocol.version=2 ls-remote origin 2&gt;&amp;1 | head</code></pre>
    <p>Per i clone quotidiani lo speedup è invisibile; per i server di hosting è drammatico.</p>
    <h2>Errori comuni</h2>
    <p>Clonare un repo enorme su una rete instabile e ricominciare da capo; <code>git clone</code> in 2.30+ supporta il cloning ripristinabile sopra il protocollo HTTP smart, ma solo se il server lo supporta. Altrimenti prima <code>--depth 1</code>, poi <code>git fetch --unshallow</code> dopo. Clonare in <code>~/Dropbox</code> o un'altra cartella di sync; il client di sync combatterà con Git per il controllo di <code>.git/index</code>. Clonare un repo con submodule e dimenticare <code>--recurse-submodules</code>, finendo con directory submodule vuote. Infine, clonare via HTTPS senza un credential helper ed essere chiesti delle credenziali a ogni fetch; configurane uno una volta.</p>

- source_title: "What happens during git fetch"
  title: "Cosa succede durante git fetch"
  langcode: it
  body: |
    <h2>Introduzione</h2>
    <p><code>git fetch</code> è l'operazione di rete che scarica nuovi oggetti e aggiorna i ref di tracking remoto. Non cambia i tuoi branch o la working tree, il che lo rende il comando "cosa c'è di nuovo?" più sicuro.</p>
    <h2>La sequenza</h2>
    <ol>
      <li>Risolve l'URL del remote.</li>
      <li>Apre una connessione (HTTPS, SSH o git://).</li>
      <li>Negozia capabilities (versione del protocollo, multi-ack, filtri partial clone, ecc.).</li>
      <li>Il server pubblicizza i ref (o, nel protocollo v2, solo quelli che corrispondono ai pattern richiesti).</li>
      <li>Il client riporta cosa ha già.</li>
      <li>Il server invia un pack file contenente gli oggetti mancanti.</li>
      <li>Il client scrive il pack in <code>.git/objects/pack/</code> e lo indicizza.</li>
      <li>Il client aggiorna i ref di tracking remoto (<code>refs/remotes/origin/*</code>).</li>
      <li>Opzionalmente fa prune dei ref cancellati.</li>
    </ol>
    <h2>Comandi</h2>
    <pre><code>git fetch
    git fetch origin
    git fetch --all
    git fetch --prune
    git fetch origin main:my-main         # fetch in un ref locale</code></pre>
    <p>La sintassi colon <code>main:my-main</code> crea o aggiorna un ref locale direttamente; usala con cura.</p>
    <h2>Ispezionare cosa è stato scaricato</h2>
    <pre><code>git fetch origin
    cat .git/FETCH_HEAD
    git log HEAD..origin/main --oneline</code></pre>
    <p><code>FETCH_HEAD</code> elenca ogni ref aggiornato dal fetch più recente, nell'ordine richiesto.</p>
    <h2>Refspec</h2>
    <p>Ogni remote ha uno o più refspec di fetch. Il default per <code>origin</code>:</p>
    <pre><code>+refs/heads/*:refs/remotes/origin/*</code></pre>
    <p>Puoi aggiungerne altri, ad esempio per scaricare i ref pull-request da GitHub:</p>
    <pre><code>git config --add remote.origin.fetch '+refs/pull/*/head:refs/remotes/origin/pr/*'
    git fetch
    git switch -c review/123 origin/pr/123</code></pre>
    <h2>Pruning</h2>
    <p>Senza prune, i branch cancellati sul server restano come ref <code>origin/*</code> obsoleti:</p>
    <pre><code>git fetch --prune
    git config --global fetch.prune true</code></pre>
    <h2>Tag</h2>
    <p>Per default, fetch scarica i tag che puntano ai commit scaricati. Forza o disabilita:</p>
    <pre><code>git fetch --tags
    git fetch --no-tags</code></pre>
    <h2>Trace e debug</h2>
    <pre><code>GIT_TRACE=1 GIT_TRACE_PACKET=1 git fetch
    GIT_CURL_VERBOSE=1 git fetch        # HTTPS</code></pre>
    <p>Questi rivelano richieste esatte, utili per debuggare proxy o auth.</p>
    <h2>Negoziazione e haves</h2>
    <p>L'handshake di fetch è una danza di "wants" e "haves". Il client elenca cosa vuole (gli SHA di punta dei branch remoti), e offre haves (commit locali recenti) così il server può calcolare un pack minimale. Git moderno usa l'algoritmo di negoziazione <code>skipping</code>, che converge in O(log n) round anche su lunghe storie. Puoi regolarlo:</p>
    <pre><code>git config fetch.negotiationAlgorithm skipping
    git config fetch.negotiationAlgorithm consecutive
    GIT_TRACE_PACKET=1 git fetch 2&gt;&amp;1 | grep -E 'have|want' | head</code></pre>
    <h2>Errori comuni</h2>
    <p>Credere che <code>git fetch</code> cambi i tuoi branch; non lo fa mai. Usa <code>git pull</code> o <code>git merge origin/main</code> per integrare. Saltare <code>--prune</code> in clone di lunga vita e accumulare dozzine di ref <code>origin/*</code> obsoleti. Configurare male un refspec a mano e sovrascrivere branch locali; doppio controllo con <code>git config -e</code>. Infine, fare fetch da un partial clone senza rendersi conto che alcuni oggetti richiederanno una chiamata di rete successiva quando vi si accede; i partial clone scambiano velocità iniziale per latenza occasionale dopo.</p>

- source_title: "What happens during git pull (fetch + merge/rebase)"
  title: "Cosa succede durante git pull (fetch + merge/rebase)"
  langcode: it
  body: |
    <h2>Introduzione</h2>
    <p><code>git pull</code> è zucchero per <code>git fetch</code> seguito dall'integrazione del branch upstream nel branch corrente. Il passo di integrazione è un merge (default) o un rebase.</p>
    <h2>I due passi</h2>
    <ol>
      <li><code>git fetch &lt;remote&gt; &lt;refspec&gt;</code>: scarica e aggiorna i ref di tracking.</li>
      <li>Se <code>pull.rebase</code> è false: <code>git merge FETCH_HEAD</code>.</li>
      <li>Se <code>pull.rebase</code> è true: <code>git rebase FETCH_HEAD</code>.</li>
    </ol>
    <p>Sequenza manuale equivalente:</p>
    <pre><code>git fetch origin main
    git merge origin/main             # o git rebase origin/main</code></pre>
    <h2>Configurazione</h2>
    <pre><code>git config --global pull.rebase false   # merge (default classico)
    git config --global pull.rebase true    # rebase
    git config --global pull.ff only        # solo fast-forward, altrimenti aborta</code></pre>
    <p>Da Git 2.27, <code>git pull</code> nudo senza configurazione stampa un avviso. Scegli una strategia esplicitamente.</p>
    <h2>Solo fast-forward</h2>
    <p><code>--ff-only</code> è il pull più sicuro: riesce solo se il tuo branch è strettamente indietro. Nessun merge commit, nessun rebase, nessuna sorpresa.</p>
    <pre><code>git pull --ff-only</code></pre>
    <p>Combina con autostash per evitare blocchi della working tree:</p>
    <pre><code>git pull --ff-only --autostash</code></pre>
    <h2>Pull con rebase</h2>
    <pre><code>git pull --rebase
    git pull --rebase=merges          # preserva la struttura merge</code></pre>
    <p><code>--rebase=merges</code> è utile per branch che contengono merge commit che vuoi mantenere.</p>
    <h2>Pull con autostash</h2>
    <pre><code>git config --global rebase.autoStash true
    git config --global merge.autoStash true</code></pre>
    <p>Con questi attivi, le tree sporche vengono fatte stash prima dell'integrazione e riapplicate dopo, in modo trasparente.</p>
    <h2>Pull multi-branch</h2>
    <pre><code>git pull origin main feature        # scarica entrambi, mergia octopus in HEAD</code></pre>
    <p>Questo è raramente ciò che vuoi; preferisci operazioni separate.</p>
    <h2>Pull vs fetch + integra esplicito</h2>
    <p>Molti utenti esperti preferiscono non usare mai <code>git pull</code>. Eseguono prima <code>git fetch</code>, ispezionano <code>git log HEAD..@{u}</code>, e poi scelgono merge o rebase deliberatamente. Questo è particolarmente prezioso quando si integrano branch divergenti di lunga vita.</p>
    <h2>Politiche di pull per i team</h2>
    <p>I team sani scelgono una singola politica di pull e la configurano a livello di organizzazione. Due scelte comuni:</p>
    <pre><code># Team con storia lineare: rebase su pull, merge solo via PR
    git config --global pull.rebase true
    git config --global rebase.autoStash true

    # Team merge-friendly: mai rebase, sempre fast-forward main
    git config --global pull.rebase false
    git config --global pull.ff only</code></pre>
    <p>La configurazione peggiore è quella assente: il <code>git pull</code> di ogni sviluppatore si comporta diversamente, producendo storie inconsistenti. Documenta la politica nel <code>CONTRIBUTING.md</code> del tuo repo e fornisci uno snippet di config di una riga che i nuovi contributori possono copiare.</p>
    <h2>Errori comuni</h2>
    <p>Eseguire <code>git pull</code> con modifiche non committate e ottenere un merge commit inaspettato sopra del lavoro sporco. O fai stash, committa, o imposta <code>autoStash</code>. Fare pull con rebase su un branch su cui altri hanno basato lavoro; riscrivi la loro base. Rebase solo su branch privati. Configurare <code>pull.rebase</code> globalmente senza rendersi conto che influenza anche <code>main</code>; molti team impostano <code>pull.ff only</code> globalmente e fanno override per branch. Infine, usare <code>git pull</code> in CI; la CI raramente ha bisogno di integrazione, solo dell'ultimo commit. Usa <code>git fetch</code> e un checkout esplicito di <code>origin/main</code> per mantenere la CI deterministica.</p>

- source_title: "What happens during git push"
  title: "Cosa succede durante git push"
  langcode: it
  body: |
    <h2>Introduzione</h2>
    <p><code>git push</code> carica commit a un remote e aggiorna i ref di quel remote. A differenza del fetch, modifica lo stato sul server, quindi esistono meccanismi di sicurezza per prevenire la sovrascrittura del lavoro di altre persone.</p>
    <h2>La sequenza</h2>
    <ol>
      <li>Risolve l'URL del remote e il refspec target.</li>
      <li>Apre una connessione.</li>
      <li>Negozia capabilities.</li>
      <li>Il server pubblicizza i valori correnti dei ref.</li>
      <li>Il client controlla ogni push: è un fast-forward del ref del server?</li>
      <li>Il client impacchetta gli oggetti mancanti e li carica.</li>
      <li>Il server esegue l'hook <code>pre-receive</code>.</li>
      <li>Per ogni ref, il server esegue l'hook <code>update</code> e aggiorna atomicamente il ref.</li>
      <li>Il server esegue l'hook <code>post-receive</code>.</li>
      <li>Il server riporta successo o rifiuto al client.</li>
    </ol>
    <h2>Comandi</h2>
    <pre><code>git push                                  # branch corrente all'upstream
    git push origin main                      # esplicito
    git push -u origin feature/login          # imposta upstream
    git push origin --delete feature/login    # cancella branch remoto
    git push origin v1.0.0                    # pusha un tag
    git push --follow-tags
    git push --force-with-lease</code></pre>
    <h2>Enforcement del fast-forward</h2>
    <p>Per default, un push viene rifiutato se non sarebbe un fast-forward del ref remoto. Questo protegge dal sovrascrivere accidentalmente lavoro che altri hanno pushato:</p>
    <pre><code> ! [rejected]   main -> main (non-fast-forward)
    error: failed to push some refs to 'origin'
    hint: Updates were rejected because the tip of your current branch is behind ...</code></pre>
    <p>Risolvi facendo fetch e integrando, poi pushando di nuovo.</p>
    <h2>Force push</h2>
    <pre><code>git push --force                   # pericoloso: ignora lo stato remoto
    git push --force-with-lease        # più sicuro: rifiuta se il remote si è mosso
    git push --force-with-lease=feature/login:abc1234</code></pre>
    <p><code>--force-with-lease</code> richiede che il ref remoto sia ancora uguale a ciò che dice il tuo ref di tracking. Preferiscilo sempre.</p>
    <h2>Push atomici</h2>
    <pre><code>git push --atomic origin branchA branchB</code></pre>
    <p>Con <code>--atomic</code>, o tutti gli aggiornamenti riescono o nessuno; utile quando i ref devono muoversi insieme.</p>
    <h2>Politiche di push</h2>
    <pre><code>git config --global push.default simple        # branch corrente al suo upstream
    git config --global push.default current       # branch corrente al remote con stesso nome
    git config --global push.default upstream      # corrente al nome del suo upstream
    git config --global push.autoSetupRemote true  # 2.37+: auto -u per nuovi branch</code></pre>
    <h2>Hook lato server</h2>
    <p>Le piattaforme di hosting eseguono hook <code>pre-receive</code> e <code>update</code> per applicare politiche (commit firmati, naming dei branch, CI verde obbligatoria). Quando un push viene rifiutato, il messaggio del server nomina il ref o commit incriminato. Leggi il messaggio prima di riprovare.</p>
    <h2>Errori comuni</h2>
    <p>Force-pushare a un branch condiviso come <code>main</code> e riscrivere i commit di altri. Coordinati, o usa <code>--force-with-lease</code> solo su branch privati. Pushare i tag individualmente e dimenticare di pushare i commit, lasciando tag dangling sul server. Usa <code>--follow-tags</code>. Pushare a un remote sbagliato perché ne hai più configurati; <code>git push -v</code> mostra esattamente dove sta andando. Infine, aspettarsi che <code>git push --delete</code> cancelli file; cancella <em>ref</em>. Per cancellare file, committa una rimozione e pusha quel commit.</p>

- source_title: "Conflict markers and how Git produces them"
  title: "Marker di conflitto e come Git li produce"
  langcode: it
  body: |
    <h2>Introduzione</h2>
    <p>Quando Git non può combinare automaticamente due modifiche alla stessa regione di un file, lascia <em>marker di conflitto</em> nella copia di lavoro e ti permette di risolvere manualmente. I marker non sono magia; registrano esattamente cosa ha fatto ogni lato relativo a una base comune.</p>
    <h2>Anatomia</h2>
    <pre><code>&lt;&lt;&lt;&lt;&lt;&lt;&lt; HEAD
    riga come è sul nostro branch
    =======
    riga come è sul loro branch
    &gt;&gt;&gt;&gt;&gt;&gt;&gt; feature/login</code></pre>
    <p>La sezione tra <code>&lt;&lt;&lt;</code> e <code>===</code> è "ours" (il branch corrente). Tra <code>===</code> e <code>&gt;&gt;&gt;</code> è "theirs". La risoluzione consiste nel mantenere il testo giusto, cancellare i marker e mettere in stage.</p>
    <h2>Marker a tre vie (stile diff3)</h2>
    <pre><code>git config --global merge.conflictStyle diff3</code></pre>
    <p>Ora i marker includono anche la versione base:</p>
    <pre><code>&lt;&lt;&lt;&lt;&lt;&lt;&lt; HEAD
    nostra versione
    ||||||| merged common ancestor
    versione base
    =======
    loro versione
    &gt;&gt;&gt;&gt;&gt;&gt;&gt; feature/login</code></pre>
    <p>Vedere la base spesso chiarisce cosa intendeva ogni lato. Ancora meglio, da Git 2.35:</p>
    <pre><code>git config --global merge.conflictStyle zdiff3</code></pre>
    <p>che taglia il contesto comune.</p>
    <h2>Come Git li produce</h2>
    <p>Per ogni coppia di hunk in conflitto, Git esegue un diff a tre vie tra base, ours e theirs. Se entrambi i lati hanno cambiato la stessa regione diversamente, Git scrive entrambe le versioni circondate da marker. Altrimenti il lato che ha cambiato vince automaticamente.</p>
    <h2>Risolvere</h2>
    <pre><code>git status                       # elenca path in conflitto
    modifica ogni file
    git add &lt;file&gt;                   # marca come risolto
    git commit                       # usa il messaggio preparato</code></pre>
    <p>Oppure usa un merge tool:</p>
    <pre><code>git mergetool
    git config --global merge.tool meld</code></pre>
    <h2>Ispezionare ogni lato</h2>
    <pre><code>git show :1:path        # base
    git show :2:path        # ours
    git show :3:path        # theirs
    git checkout --ours path
    git checkout --theirs path</code></pre>
    <p>La sintassi colon legge direttamente dagli stage dell'index in conflitto.</p>
    <h2>Annullare</h2>
    <pre><code>git merge --abort
    git rebase --abort
    git cherry-pick --abort</code></pre>
    <h2>rerere</h2>
    <p>"Reuse recorded resolution" ricorda le tue risoluzioni di conflitto e le riapplica la prossima volta che lo stesso conflitto appare:</p>
    <pre><code>git config --global rerere.enabled true</code></pre>
    <p>Indispensabile per catene di rebase di lunga durata.</p>
    <h2>Conflitti di rename e binari</h2>
    <p>Non tutti i conflitti producono marker testuali. I conflitti rename/rename, rename/delete e modify/delete lasciano l'index in uno stato con più stage ma senza marker &lt;&lt;&lt; nel file. I file binari non possono essere mergiati testualmente; entrambe le versioni vengono scritte su disco e l'index registra il conflitto:</p>
    <pre><code>git status
    # both modified:   image.png
    # deleted by us:   old.txt
    # added by them:   new.txt
    git checkout --ours image.png      # mantieni la nostra versione
    git checkout --theirs new.txt
    git add image.png new.txt</code></pre>
    <p>Leggi sempre <code>git status</code> al momento del conflitto; etichetta esplicitamente questi tipi di conflitto meno comuni.</p>
    <h2>Errori comuni</h2>
    <p>Risolvere cancellando i marker senza leggere i contenuti, accidentalmente eliminando un lato. Leggi sempre entrambe le metà e la base. Dimenticare <code>git add</code> dopo aver modificato; <code>git commit</code> rifiuterà con "unmerged paths". Trattare <code>--ours</code> e <code>--theirs</code> come identici a <code>-X ours</code> e <code>-X theirs</code>; il primo sostituisce un intero file in conflitto, il secondo è un suggerimento alla strategia di merge. Infine, copiare un file parzialmente risolto da altrove e bypassare Git; l'index ha ancora le entry stage 1/2/3 finché non fai <code>git add</code>.</p>

- source_title: "The merge base algorithm"
  title: "L'algoritmo della merge base"
  langcode: it
  body: |
    <h2>Introduzione</h2>
    <p>La <em>merge base</em> di due commit è il loro miglior antenato comune: la fondazione che Git usa per i merge a tre vie. Scegliere la base giusta è ciò che fa funzionare davvero i merge "automatici".</p>
    <h2>Trovarla</h2>
    <pre><code>git merge-base A B
    git merge-base --all A B           # tutti i migliori antenati comuni
    git merge-base --octopus A B C
    git merge-base --is-ancestor X Y   # exit 0 se X è antenato di Y
    git merge-base --fork-point main feature</code></pre>
    <h2>Definizione</h2>
    <p>Un antenato comune C di A e B è un "miglior" antenato comune se nessun altro antenato comune di A e B è discendente di C. La maggior parte delle coppie ha un singolo miglior antenato comune. Quando il grafo contiene merge incrociati, possono esistere diversi; questo è ciò che <code>--all</code> riporta.</p>
    <h2>Come il merge a tre vie la usa</h2>
    <p>Dati i commit A e B con merge base M, Git per ogni file:</p>
    <ol>
      <li>Legge il file in M, A e B.</li>
      <li>Se solo un lato è cambiato, prendi quel lato.</li>
      <li>Se entrambi i lati sono cambiati identicamente, prendi uno dei due.</li>
      <li>Se entrambi i lati sono cambiati diversamente, esegui un merge testuale a tre vie o emetti marker di conflitto.</li>
    </ol>
    <h2>Strategie recursive e ort</h2>
    <p>Quando esistono più merge base, la strategia recursive le <em>mergia prima</em>, producendo una base virtuale, e usa quella per il merge a tre vie finale. La strategia <code>ort</code> (default da 2.33) fa lo stesso con un'implementazione più veloce ed efficiente in memoria.</p>
    <pre><code>git merge -s ort feature
    git merge -s recursive feature
    git merge -s resolve feature       # solo una merge base, nessuna ricorsione</code></pre>
    <h2>Fork point</h2>
    <p>Per il rebase, Git spesso ha bisogno di sapere dove un branch tematico ha lasciato un branch di base. <code>--fork-point</code> consulta il reflog della base per trovare il punto più recente in cui il topic e la base hanno condiviso storia:</p>
    <pre><code>git rebase --fork-point main feature
    git merge-base --fork-point main feature</code></pre>
    <h2>Esempio funzionante</h2>
    <pre><code>A---B---C   main
         \
          D---E   feature

    git merge-base main feature   # B</code></pre>
    <p>Un merge di <code>main</code> in <code>feature</code> esegue un merge a tre vie usando B come base.</p>
    <h2>Ispezionare perché un merge confligge</h2>
    <pre><code>git merge-base HEAD feature
    git diff &lt;base&gt; HEAD -- file
    git diff &lt;base&gt; feature -- file</code></pre>
    <p>Questa coppia di diff è esattamente ciò che vede il merge di Git.</p>
    <h2>Errori comuni</h2>
    <p>Assumere che ci sia sempre esattamente una merge base; le storie incrociate ne producono diverse. Trattare <code>--fork-point</code> come sostituto di <code>--onto</code>; risolvono problemi diversi. Scegliere <code>--strategy=ours</code> quando intendevi <code>--strategy-option=ours</code>; il primo scarta interamente le loro modifiche. Infine, ricalcolare la merge base a mano dall'output di <code>git log</code> e sbagliare; usa <code>git merge-base</code> piuttosto che andare a occhio.</p>

- source_title: "Reachability and ancestry in Git"
  title: "Raggiungibilità e antenati in Git"
  langcode: it
  body: |
    <h2>Introduzione</h2>
    <p>La "raggiungibilità" è la proprietà più importante di un oggetto Git. Un oggetto è <em>raggiungibile</em> se qualche ref porta ad esso tramite link parent o tree. Gli oggetti irraggiungibili sono candidabili al garbage collection.</p>
    <h2>Regole di raggiungibilità</h2>
    <p>Partendo da un ref qualsiasi:</p>
    <ul>
      <li>Un commit raggiunge il suo tree radice, tutti i parent, e (transitivamente) i tree e parent di quei parent.</li>
      <li>Un tree raggiunge tutte le entry (blob e sotto-tree).</li>
      <li>Un tag annotated raggiunge l'oggetto taggato.</li>
    </ul>
    <p>I ref includono branch locali, branch di tracking remoto, tag, stash, notes e il reflog (fino alla scadenza).</p>
    <h2>Elencare oggetti raggiungibili</h2>
    <pre><code>git rev-list --objects --all | head
    git rev-list --objects HEAD
    git rev-list --count HEAD</code></pre>
    <h2>Test di antenato</h2>
    <pre><code>git merge-base --is-ancestor X Y &amp;&amp; echo "X è antenato di Y"
    git rev-list X..Y --count                # quanti commit ci sono in mezzo
    git log --ancestry-path A..B --oneline   # solo commit sul percorso da A a B</code></pre>
    <p><code>--ancestry-path</code> è prezioso per trovare la catena di commit che ha portato un fix da un tag a un altro.</p>
    <h2>Operatori di range</h2>
    <ul>
      <li><code>A..B</code>: raggiungibile da B, non da A.</li>
      <li><code>A...B</code>: differenza simmetrica (uno dei due, non entrambi).</li>
      <li><code>^A B C</code>: raggiungibile da B o C ma non da A.</li>
    </ul>
    <pre><code>git log main..feature                 # commit aggiunti da feature
    git log main...feature --left-right   # entrambi i lati etichettati</code></pre>
    <h2>Oggetti irraggiungibili</h2>
    <pre><code>git fsck --unreachable
    git fsck --dangling
    git fsck --lost-found      # li scrive in .git/lost-found</code></pre>
    <p>Gli oggetti irraggiungibili sopravvivono finché <code>git gc --prune</code> non li rimuove; il periodo di grazia predefinito è due settimane (<code>gc.pruneExpire</code>).</p>
    <h2>Il ruolo del file commit-graph</h2>
    <p>Le query di raggiungibilità e antenato sono il collo di bottiglia di molte operazioni Git. Il file <code>commit-graph</code> precalcola i numeri di generazione e le liste di parent, rendendo queste query O(log n) invece di O(n):</p>
    <pre><code>git commit-graph write --reachable
    git config --global core.commitGraph true</code></pre>
    <h2>Bitmap di raggiungibilità</h2>
    <p>Lato server, i <em>bitmap di raggiungibilità</em> permettono a Git di rispondere a "quali oggetti sono raggiungibili da questo commit?" in microsecondi, memorizzando un bit precalcolato per oggetto. Vengono scritti da:</p>
    <pre><code>git repack -adb</code></pre>
    <h2>Walk limitati per data o path</h2>
    <p>Il macchinario di raggiungibilità accetta molti limitatori che si combinano con la sintassi di range:</p>
    <pre><code>git rev-list --since=2024-01-01 main
    git rev-list main -- path/to/file
    git rev-list --no-merges main..feature
    git rev-list --first-parent main
    git rev-list HEAD --count</code></pre>
    <p>Combinali per rispondere a domande specifiche come "quanti commit non-merge ha rilasciato Ada su main lo scorso trimestre?" senza ricorrere a pipeline di shell. L'output stabile del plumbing rende il risultato banale da alimentare in strumenti di reportistica.</p>
    <h2>Errori comuni</h2>
    <p>Credere che un branch cancellato cancelli i suoi commit; rimangono raggiungibili attraverso il reflog per 90 giorni, e irraggiungibili ma non potati per altre due settimane. Confondere <code>A..B</code> con <code>A...B</code>; uno è asimmetrico, l'altro simmetrico. Usare <code>HEAD~3</code> per navigare attraverso i merge ed essere confusi dalla traversata first-parent; usa <code>HEAD^2</code> per passare al secondo parent. Infine, aspettarsi che <code>git fsck</code> trovi commit persi dopo un clone fresco; il reflog e gli oggetti dangling esistono solo localmente dove è stato fatto il lavoro.</p>

- source_title: "Symbolic refs"
  title: "Ref simbolici"
  langcode: it
  body: |
    <h2>Introduzione</h2>
    <p>Un <em>ref simbolico</em> è un riferimento il cui valore è il nome di un altro ref piuttosto che un hash di oggetto. L'esempio canonico è <code>HEAD</code>, che di solito contiene <code>ref: refs/heads/main</code>. I ref simbolici permettono a Git di tracciare "il branch corrente" come dato, non come stato.</p>
    <h2>Lettura e scrittura</h2>
    <pre><code>git symbolic-ref HEAD
    # refs/heads/main

    git symbolic-ref refs/remotes/origin/HEAD
    # refs/remotes/origin/main

    git symbolic-ref HEAD refs/heads/feature/login   # cambia senza checkout
    git symbolic-ref --short HEAD                      # forma corta: main
    git symbolic-ref --delete refs/remotes/origin/HEAD</code></pre>
    <h2>HEAD come ref simbolico</h2>
    <p>Quando fai commit, Git risolve <code>HEAD</code> per trovare il branch corrente e aggiorna la punta di <em>quel</em> branch. Quando <code>HEAD</code> è detached smette di essere simbolico e contiene uno SHA grezzo.</p>
    <pre><code>cat .git/HEAD
    # ref: refs/heads/main         (simbolico)
    # vs dopo detach:
    # a1b2c3d4...                  (grezzo)</code></pre>
    <h2>HEAD remoto</h2>
    <p>Ogni remote può avere un <code>HEAD</code> simbolico che indica il suo branch predefinito. Imposta o ricarica:</p>
    <pre><code>git remote set-head origin --auto       # interroga il server
    git remote set-head origin main         # imposta esplicitamente
    git remote set-head origin --delete</code></pre>
    <p>Questo è ciò che fa risolvere <code>git log origin</code> a <code>origin/main</code>.</p>
    <h2>Perché usarli</h2>
    <ul>
      <li>"Branch corrente" può cambiare senza riscrivere la storia.</li>
      <li>Gli strumenti possono chiedere "qual è il default?" senza hardcodare i nomi.</li>
      <li>Gli hook possono prendere di mira il branch <em>attualmente checkoutato</em> in modo generico.</li>
    </ul>
    <h2>Worktree e HEAD per worktree</h2>
    <p>Ogni worktree linkato (<code>git worktree add</code>) ha il proprio <code>HEAD</code>, memorizzato sotto <code>.git/worktrees/&lt;name&gt;/HEAD</code>. Ognuno può puntare a un branch diverso:</p>
    <pre><code>git worktree add ../wt-feature feature/login
    cat ../wt-feature/.git
    # gitdir: /path/to/main/.git/worktrees/wt-feature
    cat .git/worktrees/wt-feature/HEAD
    # ref: refs/heads/feature/login</code></pre>
    <h2>Rilevamento</h2>
    <pre><code>git symbolic-ref -q HEAD &amp;&amp; echo "su un branch" || echo "detached"</code></pre>
    <h2>Rinominare il default</h2>
    <p>Per rinominare <code>master</code> in <code>main</code> in sicurezza:</p>
    <pre><code>git branch -m master main
    git symbolic-ref HEAD refs/heads/main
    git push -u origin main
    git symbolic-ref refs/remotes/origin/HEAD refs/remotes/origin/main</code></pre>
    <h2>Ispezionare la risoluzione simbolica</h2>
    <p><code>git rev-parse</code> risolve un nome attraverso ref simbolici fino a uno SHA, mentre <code>git symbolic-ref</code> segue solo un livello. La coppia è utile per gli script:</p>
    <pre><code>git symbolic-ref HEAD                       # refs/heads/main
    git symbolic-ref --short HEAD               # main
    git rev-parse HEAD                          # SHA
    git rev-parse --symbolic-full-name HEAD     # refs/heads/main
    git rev-parse --symbolic-full-name @{u}     # refs/remotes/origin/main</code></pre>
    <p>Usa <code>--symbolic-full-name</code> quando vuoi il nome ref canonico indipendentemente da quale scorciatoia l'utente abbia digitato.</p>
    <h2>Errori comuni</h2>
    <p>Modificare <code>.git/HEAD</code> a mano e dimenticare la newline finale, lasciando Git incapace di parsarlo. Usa <code>git symbolic-ref</code>. Trattare <code>refs/remotes/origin/HEAD</code> come autoritario quando in realtà è cachato; aggiorna con <code>git remote set-head origin --auto</code>. Confondere un ref simbolico che punta a un branch mancante con un errore reale; <code>git symbolic-ref -q</code> esce con codice non-zero, che gli script possono gestire. Infine, cancellare il ref sottostante senza aggiornare quello simbolico, lasciando un symref dangling; gli strumenti possono segnalarlo ma è innocuo e facile da risolvere con un altro <code>symbolic-ref</code>.</p>

- source_title: "Loose objects vs packed objects"
  title: "Oggetti loose vs oggetti packed"
  langcode: it
  body: |
    <h2>Introduzione</h2>
    <p>Git memorizza gli oggetti in due formati fisici. Gli oggetti <em>loose</em> sono file individuali; gli oggetti <em>packed</em> vivono dentro un pack file con un corpo compresso a delta. Entrambe le forme descrivono gli stessi oggetti logici, indirizzati dagli stessi hash.</p>
    <h2>Layout loose</h2>
    <p>Ogni oggetto loose è in <code>.git/objects/xx/yyy...</code>, dove <code>xx</code> sono i primi due caratteri esadecimali dello SHA e <code>yyy...</code> sono i restanti 38. Il file è il byte deflato con zlib di <code>&lt;type&gt; &lt;size&gt;\0&lt;content&gt;</code>:</p>
    <pre><code>find .git/objects -type f -name '??' -prune -o -type f -print | head
    git cat-file -p &lt;sha&gt;</code></pre>
    <h2>Layout pack</h2>
    <pre><code>.git/objects/pack/pack-&lt;hash&gt;.pack
    .git/objects/pack/pack-&lt;hash&gt;.idx</code></pre>
    <p>Il file <code>.idx</code> mappa SHA a offset di byte all'interno del <code>.pack</code>; senza di esso, il pack richiederebbe una scansione lineare.</p>
    <h2>Come gli oggetti si muovono tra forme</h2>
    <p>I nuovi oggetti vengono scritti loose. Diventano packed quando:</p>
    <ul>
      <li><code>git gc</code> viene eseguito (manuale o automatico).</li>
      <li><code>git repack</code> viene invocato.</li>
      <li>Un fetch o push li trasferisce come pack.</li>
      <li><code>git fast-import</code> li scrive direttamente in un pack.</li>
    </ul>
    <pre><code>git gc
    git repack -a -d
    git count-objects -v</code></pre>
    <p><code>count-objects -v</code> riporta conteggio loose, uso totale del disco e statistiche dei pack.</p>
    <h2>Compromessi</h2>
    <ul>
      <li><strong>Loose</strong>: semplice, facile da ispezionare, veloce per scrivere un singolo oggetto. Lento quando ce ne sono milioni.</li>
      <li><strong>Packed</strong>: compatto, compresso a delta, veloce per letture in massa. Richiede repacking per incorporare nuovi oggetti.</li>
    </ul>
    <h2>Auto-gc</h2>
    <p>Git innesca un auto-gc quando troppi oggetti loose si accumulano. Tunable:</p>
    <pre><code>git config gc.auto 6700           # soglia per oggetti loose
    git config gc.autoPackLimit 50    # soglia per numero di pack
    git config gc.auto 0              # disabilita auto-gc (sconsigliato)</code></pre>
    <h2>Ispezionare un pack</h2>
    <pre><code>git verify-pack -v .git/objects/pack/pack-&lt;hash&gt;.idx | head
    git verify-pack -s .git/objects/pack/pack-&lt;hash&gt;.idx</code></pre>
    <p>Vedrai tipi di oggetto, dimensioni packed, delta e profondità della catena.</p>
    <h2>Recuperare da corruzione</h2>
    <pre><code>git fsck --full
    cp -r broken-repo backup
    git unpack-objects &lt; .git/objects/pack/pack-&lt;hash&gt;.pack</code></pre>
    <p><code>unpack-objects</code> esplode un pack di nuovo in forma loose, utile quando un singolo oggetto cattivo dentro un pack sta abbattendo molte operazioni.</p>
    <h2>Cercare un oggetto</h2>
    <p>Quando Git risolve uno SHA, cerca in questo ordine: file oggetto loose, poi ogni idx di pack, poi alternates (<code>objects/info/alternates</code>). Il lookup è essenzialmente a tempo costante per pack grazie alla tabella fanout dell'idx. L'impatto sulla performance di avere molti pack piccoli vs un pack grande è reale, ed è per questo che <code>gc</code> consolida:</p>
    <pre><code>git count-objects -v
    cat .git/objects/info/alternates 2&gt;/dev/null
    git verify-pack -s .git/objects/pack/pack-&lt;hash&gt;.idx</code></pre>
    <p>Gli alternates permettono a più repo di condividere un pool di oggetti su disco; <code>git clone --shared</code> crea tale setup e risparmia spazio al costo di un po' di sicurezza.</p>
    <h2>Errori comuni</h2>
    <p>Cancellare manualmente file <code>pack-</code> per recuperare spazio; questo distrugge la storia raggiungibile. Usa <code>git gc</code>. Disabilitare auto-gc su repo di lunga vita e finire con milioni di oggetti loose, rallentando ogni operazione. Eseguire <code>git gc --aggressive</code> regolarmente quando un <code>gc</code> normale basterebbe; il packing aggressivo è costoso. Infine, copiare un repo con <code>cp -r</code> mentre un pack è in scrittura, finendo con un index corrotto. Usa <code>git clone --local</code> per copie sicure.</p>

- source_title: "Delta compression in pack files"
  title: "Compressione delta nei pack file"
  langcode: it
  body: |
    <h2>Introduzione</h2>
    <p>Il modello content-addressed di Git deduplica oggetti identici, ma blob simili-ma-non-identici (un file e la sua modifica successiva) costerebbero comunque dimensione piena ciascuno. I pack file risolvono questo con la <em>compressione delta</em>: memorizza un oggetto come una base più una sequenza di istruzioni "copy/insert" che producono un altro oggetto.</p>
    <h2>Come funziona</h2>
    <p>Quando impacchetta, Git confronta oggetti candidati (tipicamente blob di dimensione e tipo simili) e sceglie una base per ognuno. Il delta registra:</p>
    <ul>
      <li>L'oggetto base (per offset all'interno del pack o per SHA).</li>
      <li>Dimensioni di base e target.</li>
      <li>Uno stream di istruzioni <em>copy</em> (usa byte dalla base) e <em>insert</em> (byte letterali).</li>
    </ul>
    <p>Lo stream delta viene poi compresso con zlib.</p>
    <h2>Ispezionare i delta</h2>
    <pre><code>git verify-pack -v .git/objects/pack/pack-&lt;hash&gt;.idx | head -20</code></pre>
    <p>Le colonne di output includono dimensione packed, profondità e SHA della base per le entry delta. Un oggetto non-delta non ha base.</p>
    <h2>Tunable</h2>
    <pre><code>git config pack.window 250          # candidati esaminati per oggetto
    git config pack.depth 50            # lunghezza massima della catena
    git config pack.threads 4
    git config pack.windowMemory 100m
    git config pack.deltaCacheSize 256m</code></pre>
    <p><code>pack.window</code> controlla quanto aggressivamente Git cerca buone basi; <code>pack.depth</code> limita quanto possono crescere le catene di delta.</p>
    <h2>Repack aggressivo vs normale</h2>
    <pre><code>git repack -a -d                    # standard
    git repack -a -d --depth=250 --window=250   # aggressivo
    git gc --aggressive</code></pre>
    <p>I repack aggressivi gettano via i delta esistenti e ricalcolano da zero, costando CPU ma possibilmente migliorando il risultato.</p>
    <h2>Raggiungibilità e bitmap</h2>
    <p>I server spesso combinano packing delta con <em>bitmap di raggiungibilità</em> per il calcolo veloce del clone-set:</p>
    <pre><code>git repack -adb</code></pre>
    <h2>Perché alcuni oggetti non sono deltificati</h2>
    <ul>
      <li>Dati casuali crittograficamente (già non comprimibili).</li>
      <li>Oggetti i cui unici candidati sono più piccoli della soglia configurata.</li>
      <li>Oggetti oltre la portata della pack window.</li>
    </ul>
    <h2>Delta cross-pack</h2>
    <p>Gli indici multi-pack (<code>git multi-pack-index</code>) più la modalità repack <code>--geometric</code> (Git 2.33+) rendono possibile mantenere delta tra molti pack efficientemente:</p>
    <pre><code>git repack --geometric=2 -d</code></pre>
    <p>Questo è lo schema raccomandato per repository grandi.</p>
    <h2>Delta islands</h2>
    <p>Per gli operatori di server che ospitano molti fork dello stesso progetto, i <em>delta islands</em> partizionano gli oggetti così i delta avvengono solo all'interno del set di ref di un fork, permettendo clone veloce di ogni singolo fork:</p>
    <pre><code>git config pack.island "refs/remotes/(.*)/heads"
    git config pack.islandCore "main"
    git repack -adb</code></pre>
    <p>Senza islands, un oggetto raggiungibile solo dal fork A potrebbe essere deltificato contro un oggetto raggiungibile solo dal fork B; servire il clone del fork A richiederebbe poi anche di inviare oggetti da B. La maggior parte degli utenti non ne ha mai bisogno, ma è la salsa segreta dietro la performance del pack server di GitHub, GitLab e Bitbucket.</p>
    <h2>Errori comuni</h2>
    <p>Assumere che i delta siano forward (più nuovo = base) o backward (più vecchio = base); Git è agnostico e sceglie quello che produce il delta più piccolo. Copiare pack tra repo con prefissi SHA diversi; i dati sono content-addressed quindi va bene, ma rinominare i file basandosi su hash parziali può rompere. Impostare <code>pack.depth</code> assurdamente alto in cerca di pack piccoli; catene più profonde significano accesso agli oggetti più lento (ogni delta nella catena deve essere applicato). Infine, aspettarsi che la compressione delta risparmi spazio su binari già compressi (video, JPG); non lo fa quasi mai. Usa Git LFS per quelli.</p>

- source_title: "The .git directory structure"
  title: "La struttura della directory .git"
  langcode: it
  body: |
    <h2>Introduzione</h2>
    <p>Tutto ciò che Git sa su un repository vive in <code>.git/</code>. Sapere cosa è ogni entry rimuove il mistero dalle diagnostiche "cosa è appena successo?".</p>
    <h2>Layout di alto livello</h2>
    <pre><code>.git/
      HEAD                # ref simbolico al branch corrente
      config              # configurazione locale del repository
      description         # usato da gitweb
      index               # la staging area
      packed-refs         # ref di branch e tag impacchettati (opzionale)
      hooks/              # script di hook lato client
      info/               # file di exclude e altre info locali al repo
      logs/               # reflog
      objects/            # tutti gli oggetti (loose + pack/)
      refs/               # branch, tag, tracking remoto
      worktrees/          # worktree linkati (se ci sono)
      modules/            # directory .git dei submodule</code></pre>
    <h2>HEAD e refs</h2>
    <pre><code>cat .git/HEAD
    ls .git/refs/heads
    ls .git/refs/remotes/origin
    ls .git/refs/tags
    cat .git/packed-refs | head</code></pre>
    <h2>objects/</h2>
    <p>Oggetti loose sotto <code>objects/xx/</code>, oggetti packed in <code>objects/pack/</code>. Non toccare a mano.</p>
    <h2>logs/</h2>
    <p>Il reflog. <code>logs/HEAD</code> registra ogni movimento di HEAD; <code>logs/refs/heads/&lt;branch&gt;</code> registra la storia di ogni branch.</p>
    <pre><code>cat .git/logs/HEAD | head</code></pre>
    <h2>hooks/</h2>
    <p>Script di hook di esempio, tutti chiamati <code>*.sample</code> per default. Per abilitare, togli il suffisso e rendi eseguibile:</p>
    <pre><code>cd .git/hooks
    cp pre-commit.sample pre-commit
    chmod +x pre-commit</code></pre>
    <h2>info/</h2>
    <p><code>info/exclude</code> è un file di ignore per repo, per clone (non committato). <code>info/refs</code> è generato da <code>git update-server-info</code> per server HTTP dumb.</p>
    <h2>config</h2>
    <p>Configurazione locale in formato INI. Modifica via <code>git config --local</code> o <code>git config -e</code>:</p>
    <pre><code>cat .git/config
    git config --local user.email "me@example.com"</code></pre>
    <h2>worktrees/</h2>
    <p>Ogni worktree linkato ha una directory sotto <code>.git/worktrees/&lt;name&gt;/</code> con il proprio <code>HEAD</code>, <code>index</code> e <code>logs</code>.</p>
    <h2>modules/</h2>
    <p>Per i repo con submodule, la directory <code>.git</code> di ogni submodule vive qui, e la working tree del submodule contiene un piccolo file <code>.git</code> che punta ad essa.</p>
    <h2>Repository bare</h2>
    <p>Un repo bare ha gli stessi contenuti ma al livello superiore (nessun wrapper <code>.git/</code>) e nessuna working tree. Convenzione: nominare la directory <code>project.git</code>.</p>
    <h2>git rev-parse per i path</h2>
    <p>Gli script che hanno bisogno di trovare path dentro <code>.git/</code> non dovrebbero mai assumere che la directory sia letteralmente chiamata <code>.git</code>. I submodule usano un file <code>.git</code> che punta altrove; i worktree hanno gitdir linkati; i repo bare non hanno gitdir separato. Usa <code>git rev-parse</code>:</p>
    <pre><code>git rev-parse --git-dir              # gitdir effettiva per il repo corrente
    git rev-parse --git-common-dir       # dir condivisa per i worktree
    git rev-parse --show-toplevel        # radice della working tree
    git rev-parse --is-inside-git-dir
    git rev-parse --is-inside-work-tree</code></pre>
    <p>Queste cinque domande coprono quasi ogni controllo "dove sono?" di cui uno script ha bisogno.</p>
    <h2>Errori comuni</h2>
    <p>Modificare i file dentro <code>.git/</code> direttamente. Quasi tutto ha un comando Git che lo fa correttamente, atomicamente e con gli hook. Fare backup solo della working tree e dimenticare che <code>.git/</code> contiene l'intera storia; fai il backup di tutta la directory. Condividere <code>.git/hooks/</code> assumendo che si propaghi; gli hook <em>non</em> sono versionati. Usa <code>core.hooksPath</code> o uno strumento come <code>pre-commit</code> per condividerli. Infine, cancellare <code>.git/index</code> d'impulso; ricostruisci con <code>git read-tree HEAD</code>, ma solo dopo aver fatto un backup.</p>

- source_title: "Git protocols: local, SSH, HTTP/S, git://"
  title: "Protocolli Git: locale, SSH, HTTP/S, git://"
  langcode: it
  body: |
    <h2>Introduzione</h2>
    <p>Git può trasportare dati su quattro famiglie di protocolli. Ognuna ha compromessi diversi in performance, autenticazione e amichevolezza con i firewall.</p>
    <h2>Locale / file</h2>
    <p>Clonare da una directory usa I/O di file locali. Due forme di URL:</p>
    <pre><code>git clone /srv/git/widget.git
    git clone file:///srv/git/widget.git</code></pre>
    <p>La prima forma può usare hardlink per gli oggetti quando sullo stesso filesystem (molto veloce, molto efficiente in spazio). La forma <code>file://</code> copia sempre via il protocollo smart.</p>
    <h2>SSH</h2>
    <p>Il default per workflow autenticati. Usa il tuo client SSH e la chiave:</p>
    <pre><code>git clone git@github.com:example/widget.git
    git clone ssh://git@github.com/example/widget.git</code></pre>
    <p>Dietro le quinte, il client invoca <code>ssh</code> ed esegue <code>git-upload-pack</code> o <code>git-receive-pack</code> sul lato server. Configura le chiavi via <code>~/.ssh/config</code> e <code>ssh-agent</code>.</p>
    <h2>HTTP / HTTPS</h2>
    <p>Più amichevole con i firewall e default per molti host:</p>
    <pre><code>git clone https://github.com/example/widget.git</code></pre>
    <p>Il protocollo HTTP smart usa <code>POST /info/refs?service=git-upload-pack</code> e endpoint simili. L'autenticazione è via Basic auth (deprecata in molti provider) o token nel campo password. Un credential helper evita prompt a ogni operazione:</p>
    <pre><code>git config --global credential.helper cache
    git config --global credential.helper osxkeychain   # macOS
    git config --global credential.helper manager       # Windows</code></pre>
    <h2>git:// (anonimo)</h2>
    <pre><code>git clone git://example.com/widget.git</code></pre>
    <p>Porta 9418, non autenticato, in chiaro. Perlopiù storico; non raccomandato per nuovi deployment perché non offre garanzie di integrità oltre agli hash di Git.</p>
    <h2>Versioni del protocollo</h2>
    <p>Il wire protocol ha v0, v1 e v2. Il protocollo v2 (Git 2.18+, default 2.26+) è drasticamente più veloce per repo con molti ref, perché il server pubblicizza solo i ref che il client ha richiesto.</p>
    <pre><code>git -c protocol.version=2 ls-remote origin
    git config --global protocol.version 2</code></pre>
    <h2>Smart vs dumb</h2>
    <p>I protocolli "smart" negoziano; il "dumb" HTTP espone solo la directory <code>.git/</code>. L'HTTP dumb richiede <code>git update-server-info</code> a ogni push ed è più lento; quasi nessuno lo usa oggi.</p>
    <h2>Scegliere un protocollo</h2>
    <ul>
      <li>HTTPS: il più facile da configurare, funziona ovunque, buono per read-only e CI.</li>
      <li>SSH: il migliore per push/pull quotidiani quando controlli la tua chiave.</li>
      <li>file://: comodo per mirror locali e test.</li>
      <li>git://: evita tranne che per mirror pubblici estremamente permissivi.</li>
    </ul>
    <h2>Negoziazione delle capabilities</h2>
    <p>Al momento della connessione, client e server scambiano capabilities (multi-ack, side-band, ofs-delta, filter, partial clone, push-options, atomic, ecc.). Le capabilities supportate determinano quali funzionalità l'operazione può usare. Ispeziona con il packet tracing:</p>
    <pre><code>GIT_TRACE_PACKET=1 git -c protocol.version=2 ls-remote origin 2&gt;&amp;1 | head -40</code></pre>
    <p>I server più vecchi possono non supportare capabilities più nuove; il client ricade con grazia. Se vedi clone o fetch sorprendentemente lenti, un server vecchio che manca di <code>multi-ack-detailed</code> o <code>filter</code> è spesso la causa.</p>
    <h2>Errori comuni</h2>
    <p>Mescolare URL HTTPS e SSH nello stesso repo; se una CI usa HTTPS ma il tuo dev usa SSH, gli script possono confondere l'uno con l'altro. O attieniti a uno o usa la riscrittura <code>insteadOf</code>:</p>
    <pre><code>git config --global url."git@github.com:".insteadOf "https://github.com/"</code></pre>
    <p>Memorizzare personal access token in config in chiaro; usa invece un credential helper. Dimenticare di abilitare <code>protocol.version=2</code> su installazioni Git vecchie. Infine, esporre <code>git://</code> sulla rete aperta per accesso in scrittura; il protocollo non può autenticare. Usa SSH o HTTPS.</p>

- source_title: "Authentication and credentials"
  title: "Autenticazione e credenziali"
  langcode: it
  body: |
    <h2>Introduzione</h2>
    <p>Autenticarsi a un remote Git è perlopiù invisibile finché qualcosa non va storto. I due meccanismi principali sono <strong>chiavi SSH</strong> e <strong>credenziali HTTPS</strong> (password o, più comunemente oggi, personal access token).</p>
    <h2>Chiavi SSH</h2>
    <p>Genera una chiave moderna:</p>
    <pre><code>ssh-keygen -t ed25519 -C "ada@example.com"
    ssh-add --apple-use-keychain ~/.ssh/id_ed25519     # macOS
    ssh-add ~/.ssh/id_ed25519                           # Linux</code></pre>
    <p>Aggiungi la chiave pubblica (<code>~/.ssh/id_ed25519.pub</code>) al tuo account di hosting. Test:</p>
    <pre><code>ssh -T git@github.com
    # Hi ada! You've successfully authenticated...</code></pre>
    <h2>Configurazione SSH</h2>
    <p>Le sovrascritture per host vanno in <code>~/.ssh/config</code>:</p>
    <pre><code>Host github.com
        User git
        IdentityFile ~/.ssh/id_ed25519
        IdentitiesOnly yes</code></pre>
    <h2>Credenziali HTTPS</h2>
    <p>La maggior parte degli host non accetta più le password dell'account; usa un personal access token (PAT) con gli scope giusti. Git lo memorizza tramite un <em>credential helper</em>:</p>
    <pre><code>git config --global credential.helper cache              # in memoria, scade
    git config --global credential.helper "cache --timeout=86400"
    git config --global credential.helper osxkeychain        # macOS
    git config --global credential.helper manager            # Windows
    git config --global credential.helper store              # file in chiaro (solo se devi)</code></pre>
    <p>La prima volta che fai push, Git richiede il token e l'helper lo salva.</p>
    <h2>Ispezionare e cancellare</h2>
    <pre><code>echo "url=https://github.com" | git credential fill
    echo "url=https://github.com" | git credential reject</code></pre>
    <p><code>git credential</code> è un'interfaccia di basso livello all'helper.</p>
    <h2>Helper per host</h2>
    <pre><code>git config --global credential.https://github.com.helper manager
    git config --global credential.https://gitlab.com.helper cache</code></pre>
    <p>Utile quando host diversi richiedono metodi di auth diversi.</p>
    <h2>Firmare commit e tag</h2>
    <p>Autenticazione e firma sono diverse. La firma prova la paternità di un commit:</p>
    <pre><code>git config --global gpg.format ssh
    git config --global user.signingkey ~/.ssh/id_ed25519.pub
    git commit -S -m "Signed commit"
    git log --show-signature -1</code></pre>
    <h2>2FA e SSO</h2>
    <p>Se il tuo host richiede 2FA, l'auth HTTPS ha bisogno di un PAT (le password sono bloccate). Per le organizzazioni protette da SSO, il PAT deve essere anche autorizzato SSO; altrimenti i push ricevono un errore vago "permission denied".</p>
    <h2>Credenziali per URL</h2>
    <p>Il sistema di credenziali di Git può memorizzare credenziali diverse per host o path. La chiave di match è il prefisso URL, quindi puoi avere token separati per, diciamo, le tue org GitHub personali e di lavoro:</p>
    <pre><code>git config --global credential.https://github.com/work-org.helper manager
    git config --global credential.https://github.com/personal.helper "store --file ~/.git-creds-personal"
    git credential fill &lt;&lt;&lt;"url=https://github.com/work-org/repo"</code></pre>
    <p>L'impostazione <code>credential.useHttpPath</code> dice a Git di includere il path nella chiave di lookup, permettendo credenziali per repo. Usalo solo quando necessario; moltiplica il numero di entry memorizzate.</p>
    <h2>Errori comuni</h2>
    <p>Pushare con un token che manca degli scope giusti (es. <code>read-only</code>); il messaggio di errore è generico. Concedere scope eccessivamente ampi "per sicurezza"; minimizza. Memorizzare token in <code>credential.helper store</code> su macchine condivise; è un file in chiaro. Dimenticare di caricare la tua chiave pubblica SSH sull'host ed essere sconcertati da "permission denied (publickey)"; <code>ssh -vT git@host</code> mostra cosa sta succedendo. Infine, mescolare protocolli: assicurati che il tuo URL remote corrisponda al tuo metodo di auth; <code>git remote set-url</code> può cambiarlo.</p>

- source_title: "Shallow clones and --depth"
  title: "Clone shallow e --depth"
  langcode: it
  body: |
    <h2>Introduzione</h2>
    <p>Un <em>clone shallow</em> scarica solo i più recenti N commit di un branch invece della storia completa. Il risultato è molto più piccolo e veloce da scaricare, al costo di una storia incompleta.</p>
    <h2>Creare</h2>
    <pre><code>git clone --depth 1 https://github.com/example/widget.git
    git clone --depth 50 https://github.com/example/widget.git
    git clone --depth 1 --branch v1.2.3 --single-branch &lt;url&gt;</code></pre>
    <p>La directory <code>.git</code> contiene un file <code>shallow</code> che elenca i commit i cui parent sono stati omessi.</p>
    <h2>Perché shallow</h2>
    <ul>
      <li>Build CI: hanno bisogno solo dei sorgenti per HEAD.</li>
      <li>Container e Dockerfile: immagini più piccole.</li>
      <li>Tooling one-shot che non ha bisogno della storia.</li>
    </ul>
    <h2>Limitazioni</h2>
    <ul>
      <li>Non puoi pushare da un clone shallow se il tuo push dipende da commit che il server non ha (raro, ma possibile).</li>
      <li><code>git log</code> si ferma al confine shallow.</li>
      <li>Alcune operazioni (rebase attraverso il confine, blame su righe vecchie) non possono funzionare.</li>
      <li>Fino a Git 2.11 il cloning shallow su HTTP non era supportato; Git moderno lo gestisce.</li>
    </ul>
    <h2>Approfondire e unshallow</h2>
    <pre><code>git fetch --depth 100              # estendi la profondità
    git fetch --deepen 50              # aggiungi 50 commit in più
    git fetch --shallow-since=2024-01-01
    git fetch --unshallow              # scarica la storia completa</code></pre>
    <p>Dopo <code>--unshallow</code> il repo si comporta come un clone normale.</p>
    <h2>Single-branch e shallow</h2>
    <p><code>--single-branch</code> + <code>--depth 1</code> è il clone più piccolo possibile utile. Per tracciare altri branch dopo:</p>
    <pre><code>git remote set-branches --add origin main feature
    git fetch origin</code></pre>
    <h2>Partial clone (un'ottimizzazione diversa)</h2>
    <p>Se hai bisogno della storia completa ma non di tutti i blob, usa invece un partial clone:</p>
    <pre><code>git clone --filter=blob:none &lt;url&gt;
    git clone --filter=tree:0 &lt;url&gt;</code></pre>
    <p>I partial clone scaricano la storia ma rimandano i blob (o tree) finché non sono necessari. Sono di solito una scelta migliore di shallow quando il server li supporta.</p>
    <h2>Rilevare lo stato shallow</h2>
    <pre><code>git rev-parse --is-shallow-repository
    cat .git/shallow</code></pre>
    <h2>Pattern CI</h2>
    <p>Molti provider CI hanno default shallow clone (depth 1 o 50). Se la tua build esegue <code>git describe</code> o ha bisogno di blame tra versioni, richiedi un clone completo:</p>
    <pre><code># GitHub Actions
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0</code></pre>
    <h2>File shallow e graft</h2>
    <p>Il file <code>shallow</code> in <code>.git/</code> elenca SHA di commit i cui parent sono intenzionalmente mancanti. Git li tratta come root durante la traversata del grafo. Il meccanismo correlato ma deprecato <code>info/grafts</code> ti permetteva di falsificare relazioni parent; usa invece <code>git replace --graft</code>, che è più sicuro e si replica via fetch:</p>
    <pre><code>cat .git/shallow
    git replace --graft &lt;commit&gt; &lt;new-parent&gt;
    git replace -l
    git replace -d &lt;commit&gt;</code></pre>
    <p>Questo è occasionalmente utile per cucire insieme storie importate senza riscrivere i commit.</p>
    <h2>Errori comuni</h2>
    <p>Eseguire <code>git describe</code> in un clone depth-1 e ottenere un errore perché nessun tag annotated è raggiungibile; o scarica i tag (<code>--tags</code>) o usa un clone più profondo. Provare a fare rebase di un feature branch in un clone shallow dove la merge base è oltre il confine shallow; approfondisci prima. Pushare da un clone shallow ed essere sorpresi da "remote rejected"; il server può aver bisogno di oggetti parent mancanti. Infine, trattare i clone shallow come sostituto dei partial clone; risolvono problemi diversi e i partial sono di solito più amichevoli.</p>

- source_title: "Git garbage collection basics"
  title: "Basi del garbage collection di Git"
  langcode: it
  body: |
    <h2>Introduzione</h2>
    <p>Il <em>garbage collection</em> (gc) mantiene il tuo repository compatto e veloce. Git lo esegue automaticamente quando certe soglie vengono superate. Puoi anche invocarlo manualmente.</p>
    <h2>Cosa fa gc</h2>
    <ol>
      <li>Impacchetta gli oggetti loose in pack file.</li>
      <li>Re-deltifica se richiesto.</li>
      <li>Rimuove oggetti irraggiungibili più vecchi della finestra prune-expire.</li>
      <li>Fa scadere le entry reflog oltre il loro TTL.</li>
      <li>Opzionalmente scrive il file commit-graph.</li>
    </ol>
    <pre><code>git gc
    git gc --auto
    git gc --aggressive
    git gc --prune=now
    git count-objects -v</code></pre>
    <h2>Soglie auto-gc</h2>
    <pre><code>git config gc.auto 6700                 # soglia oggetti loose
    git config gc.autoPackLimit 50          # soglia numero di pack
    git config gc.autoDetach true           # esegui in background</code></pre>
    <p>L'auto-gc scatta dopo operazioni che creano nuovi oggetti, come <code>commit</code> e <code>fetch</code>. Con <code>autoDetach</code>, gira in background e Git ritorna immediatamente.</p>
    <h2>Scadenza del reflog</h2>
    <pre><code>git config gc.reflogExpire 90.days
    git config gc.reflogExpireUnreachable 30.days
    git reflog expire --expire=90.days --all</code></pre>
    <p>Le entry raggiungibili durano 90 giorni, quelle irraggiungibili 30 di default. I branch e tag che cancelli lasciano tracce nel reflog che sopravvivono entro quella finestra.</p>
    <h2>Finestra di prune</h2>
    <pre><code>git config gc.pruneExpire 2.weeks.ago</code></pre>
    <p>Gli oggetti irraggiungibili più vecchi di questo sono candidati alla cancellazione durante gc. <code>--prune=now</code> cancella immediatamente; utile ma pericoloso poiché rimuove i margini di sicurezza.</p>
    <h2>Aggressivo vs normale</h2>
    <pre><code>git gc                       # routine: impacchetta nuovi oggetti, pota i vecchi
    git gc --aggressive          # ricostruisce i delta da zero</code></pre>
    <p>Il gc aggressivo raramente vale la pena; è pesante in CPU e il guadagno è di solito piccolo. Il gc normale è sufficiente per la maggior parte dei repo.</p>
    <h2>Manutenzione</h2>
    <p>Git moderno (2.29+) ha un sottosistema <code>maintenance</code> che consolida e migliora gc:</p>
    <pre><code>git maintenance start
    git maintenance run --task gc
    git maintenance run --task commit-graph
    git maintenance run --task incremental-repack</code></pre>
    <p><code>git maintenance start</code> registra un job in background (cron, launchd o timer systemd) che ottimizza periodicamente il repo.</p>
    <h2>Operazioni bloccate</h2>
    <p>Se gc viene interrotto, potresti vedere un file di lock stantio:</p>
    <pre><code>ls .git/gc.pid
    rm .git/gc.pid    # solo dopo aver confermato che nessun gc è in esecuzione</code></pre>
    <h2>Cosa gc non cancella mai</h2>
    <p>Diverse classi di oggetti sono esenti da gc finché il loro riferimento non scade:</p>
    <ul>
      <li>Oggetti raggiungibili da qualsiasi ref sotto <code>refs/</code>.</li>
      <li>Oggetti raggiungibili dal reflog di qualsiasi ref (fino alla scadenza del reflog).</li>
      <li>Oggetti sotto <code>refs/stash</code> (la lista stash).</li>
      <li>Oggetti fissati da mapping <code>git replace</code>.</li>
      <li>Oggetti raggiungibili dal HEAD e index dei worktree.</li>
    </ul>
    <pre><code>git fsck --unreachable --no-reflogs
    git reflog expire --expire-unreachable=now --all
    git gc --prune=now</code></pre>
    <p>Quell'ultima sequenza è la ricetta standard "cancella davvero la storia irraggiungibile"; ricorrici con cura.</p>
    <h2>Errori comuni</h2>
    <p>Eseguire <code>git gc --prune=now</code> subito dopo un'operazione distruttiva, eliminando la rete di sicurezza del reflog. Aspetta sempre la finestra di default a meno che tu non abbia davvero bisogno dello spazio. Disabilitare auto-gc su un repo a movimento veloce, accumulando milioni di oggetti loose. Eseguire <code>--aggressive</code> programmato sotto l'assunzione che "di più è meglio"; brucia solo CPU. Infine, eseguire gc concorrentemente con <code>git push</code> su un server; Git moderno gestisce la concorrenza in sicurezza, ma script personalizzati che combattono su <code>.git/objects</code> possono corrompere. Usa <code>git maintenance</code> piuttosto che cron job fatti in casa.</p>

- source_title: "Porcelain vs plumbing commands"
  title: "Comandi porcelain vs plumbing"
  langcode: it
  body: |
    <h2>Introduzione</h2>
    <p>Git è diviso in due strati. I comandi <strong>plumbing</strong> sono mattoni di basso livello che operano sul database degli oggetti, sui ref e sull'index. I comandi <strong>porcelain</strong> sono wrapper amichevoli costruiti dal plumbing. <code>git commit</code> è porcelain; <code>git hash-object</code>, <code>git write-tree</code> e <code>git update-ref</code> sono plumbing.</p>
    <h2>Perché la divisione</h2>
    <p>L'output porcelain è per gli umani e può cambiare tra le versioni. L'output plumbing è stabile, parsabile e pensato per gli script. Mescolarli è la causa più comune di script Git fragili.</p>
    <h2>Comandi porcelain comuni</h2>
    <ul>
      <li><code>git add</code>, <code>git commit</code>, <code>git status</code>, <code>git log</code></li>
      <li><code>git switch</code>, <code>git restore</code>, <code>git branch</code></li>
      <li><code>git merge</code>, <code>git rebase</code>, <code>git cherry-pick</code></li>
      <li><code>git fetch</code>, <code>git pull</code>, <code>git push</code>, <code>git clone</code></li>
    </ul>
    <h2>Comandi plumbing comuni</h2>
    <ul>
      <li><code>git hash-object</code>: calcola lo SHA del contenuto, opzionalmente scrivendolo.</li>
      <li><code>git cat-file</code>: legge tipo, dimensione o contenuto di un oggetto.</li>
      <li><code>git ls-tree</code>, <code>git ls-files</code>: elenca contenuti di tree o index.</li>
      <li><code>git rev-parse</code>: risolve un nome a uno SHA.</li>
      <li><code>git rev-list</code>: elenca SHA di commit da una traversata del grafo.</li>
      <li><code>git update-ref</code>, <code>git symbolic-ref</code>: manipolazione dei ref.</li>
      <li><code>git read-tree</code>, <code>git write-tree</code>, <code>git commit-tree</code>: creazione index/tree/commit.</li>
      <li><code>git update-index</code>: manipolazione di basso livello dell'index.</li>
      <li><code>git pack-objects</code>, <code>git unpack-objects</code>, <code>git index-pack</code>.</li>
    </ul>
    <h2>Costruire un commit a mano</h2>
    <p>Per vedere il plumbing in azione, costruisci un commit senza porcelain:</p>
    <pre><code>BLOB=$(echo "hello" | git hash-object --stdin -w)
    TREE=$(printf "100644 blob $BLOB\thello.txt\n" | git mktree)
    COMMIT=$(echo "first" | git commit-tree $TREE)
    git update-ref refs/heads/main $COMMIT
    git log --oneline</code></pre>
    <p>Questo è essenzialmente ciò che fa <code>git commit</code> internamente.</p>
    <h2>Interfacce di scripting stabili</h2>
    <p>Alcuni comandi porcelain hanno una modalità "porcelain" con un formato parsabile stabile:</p>
    <pre><code>git status --porcelain=v2
    git diff --raw
    git ls-files --stage
    git for-each-ref --format='%(refname) %(objectname)'</code></pre>
    <p>Usa questi negli script; non parsare mai l'output umano di <code>git status</code>.</p>
    <h2>Leggere la man page</h2>
    <p>Le man page porcelain sono elencate in <code>git help -a</code> sotto "Main Porcelain Commands"; il plumbing sotto "Manipulators", "Interrogators", "Synching repositories", "Internal helpers". Per tutorial sugli internals esegui <code>git help gitcore-tutorial</code> e <code>git help gitrepository-layout</code>.</p>
    <h2>Quando usare il plumbing</h2>
    <ul>
      <li>Scrivere script affidabili che sopravvivono agli upgrade di Git.</li>
      <li>Costruire tooling che si integra con il modello dati di Git.</li>
      <li>Debuggare comandi porcelain riproducendo i loro passi interni.</li>
      <li>Implementare workflow personalizzati dove il porcelain non si adatta.</li>
    </ul>
    <h2>Errori comuni</h2>
    <p>Parsare l'output umano di <code>git status</code> o <code>git log</code> negli script e rompere a un upgrade di Git o cambio di locale. Usa formati <code>--porcelain</code> e <code>--pretty=format:</code> con segnaposto espliciti. Chiamare <code>git update-ref</code> senza la forma a tre argomenti compare-and-set in script concorrenti e fare race con un altro processo. Mescolare <code>git update-index</code> di basso livello con <code>git add</code> di alto livello nello stesso workflow e finire con uno stato dell'index sorprendente. Infine, assumere che il porcelain sia sempre "più sicuro" del plumbing; alcune operazioni plumbing (come <code>git update-ref</code>) sono molto più deterministiche delle loro controparti porcelain. Lo strumento giusto dipende da cosa stai costruendo.</p>
