# Dominando Git - traducciones al español, lote 1
# 50 páginas

- source_title: "What is Git? (and what isn't it)"
  title: "¿Qué es Git? (y qué no es)"
  langcode: es
  body: |
    <h2>Introducción</h2>
    <p>Git es un <strong>sistema de control de versiones distribuido</strong> creado originalmente por Linus Torvalds en 2005 para el desarrollo del kernel de Linux. Registra cambios en archivos a lo largo del tiempo, permite que varias personas colaboren y le da a cada desarrollador una copia completa del historial del proyecto. Hoy Git impulsa la mayor parte del desarrollo de software libre y empresarial del mundo.</p>
    <h2>Qué es Git</h2>
    <p>Git es un sistema de instantáneas <em>direccionado por contenido</em>. Cada commit guarda una imagen completa de los archivos rastreados de tu proyecto, identificado por un hash criptográfico. Git es rápido porque la mayoría de las operaciones son locales, y resiliente porque cada clon es una copia de seguridad completa.</p>
    <ul>
      <li><strong>Distribuido</strong>: cada clon es un repositorio completo.</li>
      <li><strong>Basado en instantáneas</strong>: los commits guardan árboles, no diffs.</li>
      <li><strong>Amigable con branches</strong>: los branches son punteros baratos, no copias completas.</li>
    </ul>
    <h2>Qué no es Git</h2>
    <p>Git no es una herramienta de respaldo, ni un sistema de revisión de código, ni una plataforma de despliegue. No bloquea archivos como los sistemas centralizados (CVS, SVN, Perforce en su modo predeterminado). No almacena diffs binarios eficientemente para archivos multimedia grandes sin extensiones como Git LFS. Y Git no es GitHub: GitHub, GitLab y Bitbucket son <em>servicios de hosting</em> construidos sobre Git.</p>
    <h2>Probándolo</h2>
    <p>Verifica que Git esté instalado e inspecciona su versión:</p>
    <pre><code>git --version</code></pre>
    <p>Inicializa un repositorio diminuto para ver Git en acción:</p>
    <pre><code>mkdir hello-git
    cd hello-git
    git init
    echo "hello" > readme.txt
    git add readme.txt
    git commit -m "first commit"
    git log --oneline</code></pre>
    <h2>Por qué triunfó Git</h2>
    <p>Antes de Git, la mayoría de los equipos usaban herramientas centralizadas que requerían acceso de red para casi cualquier acción. El modelo distribuido de Git permitió a los desarrolladores hacer commits, branches y revisar el historial sin conexión. Combinado con branches baratos y la adopción del kernel de Linux, Git se convirtió en el estándar de facto en una década. La amplia disponibilidad de hosting gratuito en plataformas como GitHub, GitLab y Bitbucket consolidó el lugar de Git: una generación de desarrolladores aprendió Git como su primer sistema de control de versiones.</p>
    <h2>Cómo almacena datos Git</h2>
    <p>El modelo de almacenamiento de Git es inusual. En lugar de registrar diffs entre versiones, Git guarda instantáneas completas de cada archivo en cada commit, deduplicadas por hash de contenido. Esto hace que operaciones como checkout y cambio de branch sean esencialmente de tiempo constante, y operaciones de historial como log y blame sorprendentemente rápidas. La contrapartida es que cambios binarios aleatorios pueden inflar el almacenamiento, por lo que existe Git LFS para activos grandes.</p>
    <h2>Errores comunes</h2>
    <p>Los principiantes a menudo confunden Git con GitHub, o asumen que Git rastrea automáticamente cada archivo en una carpeta. Git solo rastrea archivos que añades explícitamente con <code>git add</code>, y solo versiona contenido bajo el directorio de trabajo de un repositorio inicializado. Otro mito: Git "guarda" continuamente. No lo hace. Nada se registra hasta que ejecutas <code>git commit</code>. Finalmente, Git no está diseñado para activos binarios grandes; usa Git LFS o un sistema diferente para video, conjuntos de datos grandes o artefactos de build.</p>

- source_title: "Installing Git (Linux, macOS, Windows)"
  title: "Instalando Git (Linux, macOS, Windows)"
  langcode: es
  body: |
    <h2>Introducción</h2>
    <p>Instalar Git es sencillo en todas las plataformas principales. Esta página recorre el método de instalación recomendado para Linux, macOS y Windows, y muestra cómo verificar la instalación.</p>
    <h2>Linux</h2>
    <p>La mayoría de las distribuciones de Linux incluyen Git en sus repositorios de paquetes predeterminados. Usa tu gestor de paquetes:</p>
    <pre><code># Debian, Ubuntu
    sudo apt update
    sudo apt install git

    # Fedora, RHEL, Rocky
    sudo dnf install git

    # Arch
    sudo pacman -S git</code></pre>
    <p>Para la última versión, el proyecto oficial de Git mantiene un PPA para Ubuntu (<code>ppa:git-core/ppa</code>) y tarballs de código fuente en <code>git-scm.com</code>.</p>
    <h2>macOS</h2>
    <p>macOS incluye un <code>git</code> de stub que te pide instalar las herramientas de línea de comandos para desarrolladores de Apple. Tres opciones funcionan bien:</p>
    <ol>
      <li>Ejecuta <code>xcode-select --install</code> para obtener el Git incluido por Apple.</li>
      <li>Usa <a>Homebrew</a>: <code>brew install git</code> para el último Git upstream.</li>
      <li>Descarga el instalador oficial desde <code>git-scm.com</code>.</li>
    </ol>
    <pre><code>brew install git
    git --version</code></pre>
    <h2>Windows</h2>
    <p>El instalador recomendado es <strong>Git for Windows</strong> desde <code>git-scm.com</code>. Incluye Git, un cliente OpenSSH, una shell Bash (Git Bash) y un asistente de credenciales. Alternativamente usa winget o Chocolatey:</p>
    <pre><code>winget install --id Git.Git -e
    choco install git</code></pre>
    <p>Durante la instalación con GUI te preguntarán sobre finales de línea, editor predeterminado e integración con PATH. Los valores predeterminados (checkout estilo Windows, commit estilo Unix; Git desde la línea de comandos) son razonables para la mayoría de usuarios.</p>
    <h2>Verificando la instalación</h2>
    <pre><code>git --version
    git help -a | head</code></pre>
    <p>Cualquier versión 2.30 o más reciente sirve para los temas de este manual. Las versiones antiguas carecen de muchas funciones de calidad de vida como <code>git switch</code> y <code>git restore</code>.</p>
    <h2>Actualizando Git</h2>
    <p>Mantener Git actualizado importa: muchas funciones en este manual requieren Git 2.30 o más reciente, y los parches de seguridad se publican regularmente. En Linux, tu gestor de paquetes maneja las actualizaciones automáticamente. En macOS con Homebrew, ejecuta <code>brew upgrade git</code> periódicamente. En Windows, <code>git update-git-for-windows</code> (incorporado en Git for Windows) verifica e instala la última versión en un solo comando.</p>
    <pre><code>git --version
    brew upgrade git
    git update-git-for-windows</code></pre>
    <p>Si de repente ves advertencias de deprecación o comandos que se comportan de forma diferente tras una actualización, lee las notas de la versión en <code>/usr/share/doc/git/RelNotes/</code> o en <code>git-scm.com</code>; el camino de actualización de Git es suave pero ocasionalmente cambian valores predeterminados.</p>
    <h2>Errores comunes</h2>
    <p>En macOS, olvidar que el Git proporcionado por Apple va meses o años atrás del upstream. Usa Homebrew si quieres funciones recientes. En Windows, mezclar PowerShell y Git Bash puede confundir a usuarios nuevos sobre en qué shell están. En Linux, instalar desde un tarball de terceros sin eliminar el paquete de la distribución puede dejar dos binarios <code>git</code> en PATH; usa <code>which -a git</code> para verificar. Finalmente, no ejecutes los instaladores de Git como <code>sudo</code> a menos que tu gestor de paquetes lo requiera explícitamente.</p>

- source_title: "First-time configuration (git config)"
  title: "Configuración inicial (git config)"
  langcode: es
  body: |
    <h2>Introducción</h2>
    <p>Antes de tu primer commit, Git necesita saber quién eres. <code>git config</code> almacena pares clave-valor en tres ámbitos: <strong>system</strong> (todos los usuarios), <strong>global</strong> (tu cuenta de usuario) y <strong>local</strong> (un único repositorio). El ámbito global vive en <code>~/.gitconfig</code> en Unix y <code>%USERPROFILE%\.gitconfig</code> en Windows.</p>
    <h2>Identidad</h2>
    <p>Configura tu nombre y correo; estos quedan grabados en cada commit que haces:</p>
    <pre><code>git config --global user.name "Ada Lovelace"
    git config --global user.email "ada@example.com"</code></pre>
    <h2>Editor y paginador</h2>
    <p>Git lanza tu editor para mensajes de commit y rebases interactivos. Elige uno del que sepas salir:</p>
    <pre><code>git config --global core.editor "nano"
    # o
    git config --global core.editor "code --wait"
    # o
    git config --global core.editor "vim"</code></pre>
    <h2>Nombre del branch predeterminado</h2>
    <p>Desde Git 2.28 puedes establecer el branch predeterminado para nuevos repositorios:</p>
    <pre><code>git config --global init.defaultBranch main</code></pre>
    <h2>Finales de línea</h2>
    <p>Para evitar sorpresas con CRLF/LF en equipos multiplataforma:</p>
    <pre><code># Linux, macOS
    git config --global core.autocrlf input

    # Windows
    git config --global core.autocrlf true</code></pre>
    <h2>Alias útiles</h2>
    <pre><code>git config --global alias.st status
    git config --global alias.co checkout
    git config --global alias.lg "log --oneline --graph --decorate --all"</code></pre>
    <p>Ahora <code>git lg</code> da un grafo compacto de todos los branches.</p>
    <h2>Inspeccionando la configuración</h2>
    <p>Lista toda la configuración con archivos de origen, útil para depurar sorpresas:</p>
    <pre><code>git config --list --show-origin
    git config --get user.email</code></pre>
    <h2>Comportamiento de pull</h2>
    <p>Desde Git 2.27 el comportamiento predeterminado de <code>pull</code> requiere una elección explícita. Elige una:</p>
    <pre><code>git config --global pull.rebase false   # merge (predeterminado)
    git config --global pull.rebase true    # rebase
    git config --global pull.ff only        # solo fast-forward</code></pre>
    <h2>Inclusiones condicionales</h2>
    <p>Git soporta configuración por directorio mediante <code>includeIf</code>. Esta es la forma más limpia de mantener identidades laborales y personales separadas sin tener que recordar establecer config local en cada clon:</p>
    <pre><code># en ~/.gitconfig
    [includeIf "gitdir:~/work/"]
      path = ~/.gitconfig-work

    # en ~/.gitconfig-work
    [user]
      email = ada@work.com
      signingkey = ssh-ed25519 AAAA...</code></pre>
    <p>Cualquier repo clonado bajo <code>~/work/</code> automáticamente toma la identidad de trabajo. Combina con inclusiones <code>onbranch:</code> para limitar configuraciones a branches específicos.</p>
    <h2>Sobrescrituras por repo</h2>
    <p>La configuración local en <code>.git/config</code> sobrescribe el archivo global. Este es el lugar correcto para identidades específicas del proyecto, hooks y claves de firma. Para auditar de qué ámbito viene una configuración:</p>
    <pre><code>git config --show-origin --get user.email
    git config --show-scope --get-all credential.helper</code></pre>
    <p>Si un valor parece incorrecto, <code>--show-origin</code> te dice exactamente qué archivo lo contiene. Cuidado: cualquiera de los ámbitos <code>system</code>, <code>global</code>, <code>local</code> o incluso <code>worktree</code> puede ocultar a otro. <code>git config --list --show-origin</code> muestra el panorama completo de una vez.</p>
    <h2>Errores comunes</h2>
    <p>Configurar <code>user.email</code> con una dirección personal mientras haces commits para el trabajo, filtrándola en plataformas públicas de hosting. Usa el ámbito <em>local</em> dentro de los repositorios de trabajo para sobrescribir el valor global: <code>git config user.email "ada@work.com"</code>. Otro clásico: editar <code>~/.gitconfig</code> a mano e introducir un error de sintaxis que rompe todos los comandos de Git. Usa <code>git config</code> para escribir valores, y <code>git config --list</code> para verificar tras cada cambio.</p>

- source_title: "Creating your first repository (git init)"
  title: "Creando tu primer repositorio (git init)"
  langcode: es
  body: |
    <h2>Introducción</h2>
    <p><code>git init</code> convierte un directorio común en un repositorio Git. Crea un directorio oculto <code>.git</code> que contiene toda la contabilidad de Git: objetos, refs, configuración y hooks. El árbol de trabajo (tus archivos normales) no cambia.</p>
    <h2>Inicializando un proyecto</h2>
    <pre><code>mkdir my-project
    cd my-project
    git init
    # Initialized empty Git repository in /home/ada/my-project/.git/</code></pre>
    <p>Desde Git 2.28 puedes establecer el nombre del branch inicial en la línea de comandos:</p>
    <pre><code>git init --initial-branch=main
    # o forma corta
    git init -b main</code></pre>
    <h2>Qué acaba de pasar</h2>
    <p>Inspecciona el nuevo directorio:</p>
    <pre><code>ls -a
    ls .git</code></pre>
    <p>Verás <code>HEAD</code>, <code>config</code>, <code>description</code>, <code>hooks/</code>, <code>info/</code>, <code>objects/</code> y <code>refs/</code>. Aún no hay nada commiteado; <code>HEAD</code> apunta a un branch no nacido.</p>
    <h2>Tu primer commit</h2>
    <ol>
      <li>Crea un archivo: <code>echo "# My Project" &gt; README.md</code></li>
      <li>Stagea: <code>git add README.md</code></li>
      <li>Commit: <code>git commit -m "Initial commit"</code></li>
    </ol>
    <pre><code>echo "# My Project" > README.md
    git add README.md
    git commit -m "Initial commit"
    git log --oneline</code></pre>
    <h2>Repositorios bare</h2>
    <p>Los servidores normalmente alojan repositorios <em>bare</em> sin árbol de trabajo. Usa <code>--bare</code>:</p>
    <pre><code>git init --bare project.git</code></pre>
    <p>Los repos bare son el destino de los pushes; no editas archivos en ellos directamente.</p>
    <h2>Reinicialización</h2>
    <p>Ejecutar <code>git init</code> de nuevo en un repo existente es seguro; reaplica las plantillas y muestra "Reinitialized existing Git repository". No elimina commits.</p>
    <h2>Plantillas</h2>
    <p>Por defecto <code>git init</code> siembra <code>.git/hooks/</code> desde <code>/usr/share/git-core/templates/</code>. Puedes sobrescribir el directorio de plantillas para inyectar tus propios hooks, un <code>.gitignore</code> predeterminado o una descripción en cada nuevo repo:</p>
    <pre><code>git init --template=~/.git-templates
    git config --global init.templateDir ~/.git-templates</code></pre>
    <p>Así es como las organizaciones distribuyen hooks pre-commit estándar a cada nuevo clon sin que cada desarrollador copie archivos manualmente.</p>
    <h2>Nombre del branch inicial</h2>
    <p>Muchos proyectos han pasado de <code>master</code> a <code>main</code> como nombre del branch predeterminado. La elección es local a tu repo, pero coincidir con el predeterminado de tu proveedor de hosting evita confusión al hacer push por primera vez. Configúralo una vez globalmente y olvídate: <code>git config --global init.defaultBranch main</code>.</p>
    <h2>Dónde Git deja de buscar</h2>
    <p>Git localiza el repositorio subiendo por el árbol de directorios hasta encontrar un directorio o archivo <code>.git</code>. La búsqueda se detiene en los límites del sistema de archivos por defecto (<code>core.discoveryAcrossFilesystem</code> lo cambia). La variable de entorno <code>GIT_DIR</code> sobrescribe el descubrimiento por completo; <code>GIT_WORK_TREE</code> establece un árbol de trabajo no predeterminado. Juntas te permiten operar sobre un repo cuyo <code>.git</code> está en una ubicación inusual:</p>
    <pre><code>GIT_DIR=/srv/repos/widget.git GIT_WORK_TREE=/var/www git status</code></pre>
    <h2>Errores comunes</h2>
    <p>Ejecutar <code>git init</code> en tu directorio home por accidente, lo que pone tu colección entera de dotfiles bajo una raíz de repositorio masiva. Siempre verifica <code>pwd</code> primero. Otro error: borrar <code>.git</code> para "empezar de nuevo" mientras conservas trabajo no commiteado. Eso está bien, pero date cuenta de que todo el historial se pierde para siempre. Finalmente, no hagas commit de binarios grandes en un repo recién inicializado sin escribir antes un <code>.gitignore</code>; te arrepentirás cuando el repo se infle. Ejecuta <code>git status</code> justo después de <code>git init</code> para ver lo que Git planea rastrear antes de stagear nada.</p>

- source_title: "Basic workflow: edit, stage, commit"
  title: "Flujo básico: editar, stagear, commitear"
  langcode: es
  body: |
    <h2>Introducción</h2>
    <p>Casi cada sesión de Git sigue el mismo ritmo de tres pasos: <strong>edita</strong> archivos en tu árbol de trabajo, <strong>stagea</strong> los cambios que quieres registrar y <strong>commitea</strong>los al historial. Dominar este bucle es la base de todo lo demás.</p>
    <h2>Las tres áreas</h2>
    <ul>
      <li><strong>Árbol de trabajo</strong>: archivos en disco que editas con tu editor.</li>
      <li><strong>Index</strong> (también llamado el área de staging): una instantánea de lo que irá al próximo commit.</li>
      <li><strong>Repositorio</strong>: el historial commiteado almacenado en <code>.git</code>.</li>
    </ul>
    <h2>Un ciclo completo</h2>
    <ol>
      <li>Edita un archivo en tu editor.</li>
      <li>Ejecuta <code>git status</code> para ver qué cambió.</li>
      <li>Ejecuta <code>git diff</code> para inspeccionar los cambios.</li>
      <li>Stagea con <code>git add</code>.</li>
      <li>Commit con <code>git commit</code>.</li>
    </ol>
    <pre><code>echo "hello" >> notes.txt
    git status
    git diff
    git add notes.txt
    git diff --staged
    git commit -m "Add greeting to notes"</code></pre>
    <h2>Stageando selectivamente</h2>
    <p>Puedes stagear archivos individuales, patrones glob o incluso <em>partes</em> de un archivo usando el modo interactivo:</p>
    <pre><code>git add notes.txt readme.md
    git add "src/*.py"
    git add -p notes.txt    # modo patch: sí/no por hunk</code></pre>
    <p>El modo patch es invaluable cuando tienes cambios mezclados que quieres dividir en commits separados.</p>
    <h2>Saltándose el index</h2>
    <p>El atajo <code>git commit -a</code> stagea y commitea todos los archivos <em>rastreados</em> en un solo paso. No añade archivos nuevos (no rastreados):</p>
    <pre><code>git commit -am "Quick fix"</code></pre>
    <h2>Escribiendo buenos commits</h2>
    <p>Un mensaje de commit tiene una línea de asunto corta (50 caracteres más o menos) y un cuerpo opcional explicando el por qué. Ejecuta <code>git commit</code> sin <code>-m</code> para abrir tu editor:</p>
    <pre><code>git commit
    # se abre el editor
    # Línea de asunto
    #
    # Explicación más larga...</code></pre>
    <h2>Commits atómicos</h2>
    <p>Un buen commit captura un cambio lógico. Constrúyelo deliberadamente: stagea exactamente los hunks que pertenecen juntos con <code>git add -p</code>, luego commitea. Si te encuentras describiendo un commit con "y" en el asunto ("Arregla login y refactoriza logger"), probablemente debería ser dos commits.</p>
    <pre><code>git add -p src/auth.py        # stagea solo el arreglo de login
    git commit -m "Fix login redirect on expired session"
    git add -p src/logger.py
    git commit -m "Refactor logger to use structured fields"</code></pre>
    <p>Los commits atómicos hacen que <code>git bisect</code>, <code>git revert</code> y la revisión de código sean dramáticamente más fáciles después.</p>
    <h2>Errores comunes</h2>
    <p>Olvidar hacer <code>git add</code> de archivos nuevos y sorprenderte con un commit "vacío". <code>git status</code> siempre te dice la verdad; léelo antes de commitear. Otra trampa: usar <code>git commit -am</code> cuando tienes nuevos archivos sin rastrear, lo que silenciosamente los deja fuera. Finalmente, commitear archivos generados (salida de build, <code>node_modules</code>, configuración del IDE) ensucia el historial y ralentiza los clones; añádelos a <code>.gitignore</code> antes de stagear. Cuando dudes, ejecuta <code>git diff --staged</code> para ver exactamente qué contendrá tu próximo commit.</p>

- source_title: "Understanding the staging area (index)"
  title: "Entendiendo el área de staging (index)"
  langcode: es
  body: |
    <h2>Introducción</h2>
    <p>El <em>index</em>, también llamado área de staging o caché, es una de las características distintivas de Git. Es un archivo binario en <code>.git/index</code> que contiene el <strong>árbol que pretendes commitear a continuación</strong>. Entender el index elimina la mayor parte del misterio de la salida de <code>git status</code>.</p>
    <h2>Por qué existe</h2>
    <p>El index te permite componer un commit deliberadamente en lugar de volcar todos los cambios a la vez. Puedes editar diez archivos pero commitear solo los tres que arreglan un bug, dejando el resto staged para un commit posterior. Este desacoplamiento permite un historial limpio y atómico.</p>
    <h2>Inspeccionando el index</h2>
    <p>Dos comandos comparan las tres áreas:</p>
    <pre><code>git diff             # árbol de trabajo vs index
    git diff --staged    # index vs HEAD
    git diff HEAD        # árbol de trabajo vs HEAD</code></pre>
    <p>El comando de plumbing <code>git ls-files --stage</code> muestra el contenido crudo del index, incluidos los hashes SHA-1:</p>
    <pre><code>git ls-files --stage</code></pre>
    <h2>Stageando cambios</h2>
    <pre><code>git add file.txt          # añadir o actualizar
    git add .                 # añadir todo desde cwd hacia abajo
    git add -u                # actualizar solo archivos rastreados
    git add -p                # interactivo, hunk por hunk
    git add -N new.txt        # intent-to-add (rastrear vacío)</code></pre>
    <h2>Quitando del staging</h2>
    <p>Si stageaste algo por error, sácalo sin perder la edición:</p>
    <pre><code># Moderno (Git 2.23+)
    git restore --staged file.txt

    # Sintaxis antigua, aún funciona
    git reset HEAD file.txt</code></pre>
    <h2>El index en conflictos</h2>
    <p>Durante un conflicto de merge, el index gana <em>tres</em> entradas por ruta conflictiva: el stage 1 es el ancestro común, el stage 2 es "ours", el stage 3 es "theirs". <code>git ls-files -u</code> los muestra:</p>
    <pre><code>git ls-files -u</code></pre>
    <p>Resolver el conflicto significa escribir una versión final y hacerle <code>git add</code>, colapsando de vuelta a una sola entrada de stage 0.</p>
    <h2>El formato del archivo index</h2>
    <p>El index es un formato binario documentado en el código fuente de Git en <code>Documentation/gitformat-index.txt</code>. Comienza con una cabecera de 12 bytes (firma <code>DIRC</code>, versión, conteo de entradas) seguida de entradas ordenadas. Varias extensiones opcionales añaden caché: <code>TREE</code> cachea hashes de subárboles para un <code>write-tree</code> rápido, y <code>UNTR</code> cachea listas de archivos no rastreados para un <code>git status</code> rápido. Git moderno también soporta un sparse index que omite entradas fuera del cono que tienes checkeado:</p>
    <pre><code>git sparse-checkout init --cone
    git config core.sparseCheckoutCone true
    git update-index --test-untracked-cache</code></pre>
    <h2>Errores comunes</h2>
    <p>Creer que <code>git add</code> es definitivo. No lo es: puedes stagear, editar de nuevo y stagear otra vez. El index es solo el borrador del próximo commit. Otra confusión clásica: editar un archivo staged, luego commitear, y quedarse perplejo de que las nuevas ediciones no estén incluidas. <code>git add</code> captura una instantánea en el momento que lo ejecutas; las ediciones posteriores viven solo en el árbol de trabajo. Ejecuta <code>git diff</code> (sin flags) para ver lo que está staged-pero-luego-modificado. Por último, nunca elimines <code>.git/index</code> manualmente; recompila con <code>git read-tree HEAD</code> si llega a corromperse.</p>

- source_title: "Viewing history with git log"
  title: "Viendo el historial con git log"
  langcode: es
  body: |
    <h2>Introducción</h2>
    <p><code>git log</code> recorre el grafo de commits desde un punto de partida (predeterminado: <code>HEAD</code>) hacia atrás a través de los padres, mostrando cada commit. Es la herramienta principal para explorar el historial del proyecto.</p>
    <h2>Uso básico</h2>
    <pre><code>git log
    git log --oneline
    git log --oneline --graph --decorate --all</code></pre>
    <p>La última forma es la vista navaja suiza: un grafo compacto de cada branch con refs decoradas.</p>
    <h2>Filtrando por fecha, autor, mensaje</h2>
    <pre><code>git log --since="2 weeks ago"
    git log --until=2025-01-01
    git log --author="Ada"
    git log --grep="bugfix"
    git log -S "deprecated_function"   # pickaxe: ¿cuándo apareció una cadena?</code></pre>
    <p><code>-S</code> es invaluable para arqueología: encuentra commits que cambian el número de ocurrencias de una cadena en cualquier archivo.</p>
    <h2>Mostrando diffs</h2>
    <pre><code>git log -p                 # patch completo por commit
    git log --stat             # archivos cambiados más conteos +/-
    git log --shortstat        # solo línea de resumen
    git log -p -- path/to/file # solo commits que tocan una ruta</code></pre>
    <h2>Formatos personalizados</h2>
    <p><code>--pretty=format:</code> acepta marcadores. Una línea útil:</p>
    <pre><code>git log --pretty=format:"%h %an %ad %s" --date=short</code></pre>
    <p><code>%h</code> hash abreviado, <code>%an</code> nombre del autor, <code>%ad</code> fecha del autor, <code>%s</code> asunto. Mira <code>git help log</code> para la lista completa.</p>
    <h2>Límites y rangos</h2>
    <pre><code>git log -n 5                       # últimos 5 commits
    git log main..feature              # commits en feature que no están en main
    git log main...feature             # diferencia simétrica
    git log feature ^main              # equivalente a main..feature</code></pre>
    <h2>Siguiendo renombres de archivos</h2>
    <p>Git no registra renombres, los detecta. Para seguir el historial a través de un renombre:</p>
    <pre><code>git log --follow -- path/to/file</code></pre>
    <h2>Alias útiles</h2>
    <p>Un puñado de alias de <code>git log</code> se pagan solos en la primera semana. Dos especialmente buenos:</p>
    <pre><code>git config --global alias.lg "log --oneline --graph --decorate --all"
    git config --global alias.last "log -1 HEAD --stat"
    git config --global alias.recent "log --since='2 weeks ago' --author=$(git config user.email)"</code></pre>
    <p><code>git lg</code> da el grafo a vista de pájaro; <code>git last</code> muestra lo que acaba de pasar; <code>git recent</code> responde "¿en qué he trabajado últimamente?". Añade un alias para cualquier invocación de log que escribas más de dos veces.</p>
    <h2>Inverso y limitado</h2>
    <p>Por defecto <code>git log</code> recorre del más nuevo al más antiguo. A veces (notas de versión, arqueología de código) quieres lo opuesto, emparejado con un formato limpio:</p>
    <pre><code>git log --reverse --oneline v1.0.0..v1.1.0
    git log --reverse --pretty=format:"* %s (%h)" v1.0.0..HEAD &gt; CHANGELOG.draft</code></pre>
    <p>Aquí también es donde pickaxe y los filtros de ruta se ganan su sueldo: <code>git log --reverse -S "old_api" -- src/</code> muestra el historial cronológico de la aparición y desaparición de una cadena, perfecto para rastrear deprecaciones.</p>
    <h2>Errores comunes</h2>
    <p>Leer solo el historial de <code>HEAD</code> y perderse commits en otros branches; pasa <code>--all</code> para verlos. Confundir <code>--author</code> (un regex sobre el campo de autor) con una coincidencia literal exacta; entrecomilla el patrón con cuidado. Usar <code>git log file</code> en lugar de <code>git log -- file</code>: el separador <code>--</code> distingue rutas de refs, especialmente si un branch y un archivo comparten nombre. Finalmente, esperar que <code>git log</code> muestre commits eliminados después de un force-reset; usa <code>git reflog</code> para eso. <code>git log</code> solo recorre historial alcanzable.</p>

- source_title: "Ignoring files with .gitignore"
  title: "Ignorando archivos con .gitignore"
  langcode: es
  body: |
    <h2>Introducción</h2>
    <p>Un archivo <code>.gitignore</code> lista patrones que Git debe tratar como no rastreados y nunca ofrecer para añadir. Mantiene fuera de tu repositorio los artefactos de build, secretos, metadatos del SO y archivos temporales del editor.</p>
    <h2>Sintaxis de patrones</h2>
    <ul>
      <li><code>name</code>: coincide con archivos o directorios llamados <code>name</code> a cualquier profundidad.</li>
      <li><code>/name</code>: coincide solo en la raíz del repositorio.</li>
      <li><code>name/</code>: coincide solo con directorios.</li>
      <li><code>*.log</code>: glob; coincide con cualquier archivo <code>.log</code>.</li>
      <li><code>**/build</code>: coincide con <code>build</code> a cualquier profundidad.</li>
      <li><code>!important.log</code>: re-incluye una ruta previamente ignorada.</li>
      <li><code>#</code> al inicio de una línea es un comentario.</li>
    </ul>
    <h2>Un ejemplo realista</h2>
    <pre><code># .gitignore
    # Salida de build
    /dist/
    /build/
    *.o
    *.pyc

    # Dependencias
    /node_modules/
    /vendor/

    # Editores
    .idea/
    .vscode/
    *.swp

    # SO
    .DS_Store
    Thumbs.db

    # Secretos
    .env
    *.pem</code></pre>
    <h2>Múltiples archivos .gitignore</h2>
    <p>Puedes colocar un <code>.gitignore</code> en cualquier nivel. Los patrones son relativos al directorio del archivo, y los archivos más profundos sobrescriben a los más superficiales. También hay un archivo de ignore global para tus preferencias personales:</p>
    <pre><code>git config --global core.excludesFile ~/.gitignore_global</code></pre>
    <p>Úsalo para archivos de swap del editor y basura del SO, no para rutas específicas del proyecto.</p>
    <h2>Rastreando archivos ya rastreados</h2>
    <p>Añadir una ruta a <code>.gitignore</code> <strong>no</strong> la elimina del repositorio. Deja de rastrear un archivo manteniéndolo en disco:</p>
    <pre><code>git rm --cached secrets.env
    git commit -m "Stop tracking secrets.env"</code></pre>
    <h2>Depurando ignores</h2>
    <p>¿Por qué Git está ignorando (o no) una ruta? Pregunta:</p>
    <pre><code>git check-ignore -v path/to/file</code></pre>
    <p>La salida nombra el archivo y la línea que coincidió.</p>
    <h2>Orden de evaluación</h2>
    <p>Git evalúa las reglas de ignore desde varias fuentes, en este orden: argumentos de la línea de comandos, luego archivos <code>.gitignore</code> por directorio (los más profundos primero), luego <code>$GIT_DIR/info/exclude</code> y finalmente el global <code>core.excludesFile</code>. Las reglas posteriores (más específicas) sobrescriben a las anteriores, y una negación (<code>!pattern</code>) solo re-incluye una ruta si su directorio padre no está él mismo excluido. Esta última regla atrapa a muchos usuarios:</p>
    <pre><code># Mal: no se puede des-ignorar un archivo en un directorio ignorado
    /build/
    !/build/keep.log

    # Bien: ignorar contenidos pero conservar el directorio
    /build/*
    !/build/keep.log</code></pre>
    <h2>Excludes por repo y globales</h2>
    <p>Dos mecanismos extra de ignore complementan a <code>.gitignore</code>. El archivo no rastreado por repo <code>.git/info/exclude</code> aplica solo a tu clon (bueno para archivos de IDE que no quieres commitear a <code>.gitignore</code> para todo el equipo). El global <code>core.excludesFile</code> aplica a todos tus repos:</p>
    <pre><code>echo ".idea/" &gt;&gt; .git/info/exclude
    git config --global core.excludesFile ~/.gitignore_global
    echo ".DS_Store" &gt;&gt; ~/.gitignore_global</code></pre>
    <p>Usa estos para preferencias personales; reserva el <code>.gitignore</code> commiteado para reglas a nivel de equipo.</p>
    <h2>Errores comunes</h2>
    <p>Añadir <code>secrets.env</code> a <code>.gitignore</code> después de que ya se haya commiteado y asumir que el secreto está fuera. Sigue estando en el historial; rota el secreto y considera usar <code>git filter-repo</code> para limpiarlo. Otra trampa: ignorar un directorio con <code>build</code> cuando querías decir <code>/build</code>, suprimiendo accidentalmente un archivo llamado <code>build</code> en lo profundo del árbol. Finalmente, commitear el propio <code>.gitignore</code> es esencial; sin él, cada colaborador debe inventar sus propias reglas de ignore. <code>.gitignore</code> pertenece <em>dentro</em> del repositorio, no fuera.</p>

- source_title: "Getting help (man pages, --help, online)"
  title: "Obteniendo ayuda (man pages, --help, en línea)"
  langcode: es
  body: |
    <h2>Introducción</h2>
    <p>Git incluye una documentación interna extensa. Saber cómo invocarla rápidamente te ahorrará horas de adivinanza. Esta página recorre el sistema de ayuda desde frases de una línea hasta manuales completos.</p>
    <h2>Tres formas de preguntar</h2>
    <p>Cada comando soporta tres formas de ayuda:</p>
    <pre><code>git help &lt;command&gt;     # man page completa en tu paginador
    git &lt;command&gt; --help    # lo mismo
    git &lt;command&gt; -h        # resumen corto de uso</code></pre>
    <p>Ejemplo:</p>
    <pre><code>git help commit
    git commit --help
    git commit -h</code></pre>
    <h2>Listando comandos</h2>
    <pre><code>git help -a            # todos los comandos
    git help -g            # guías (gittutorial, gitcore-tutorial, etc.)
    git help everyday      # la cheatsheet de Git diaria</code></pre>
    <p><code>git help everyday</code> en particular es una de las mejores referencias para principiantes-a-intermedios incluidas con Git.</p>
    <h2>Guías de conceptos</h2>
    <p>Git incluye guías en prosa como man pages separadas:</p>
    <pre><code>git help gittutorial
    git help gitcore-tutorial
    git help gitglossary
    git help gitworkflows
    git help gitrevisions</code></pre>
    <p><code>gitrevisions</code> es la referencia canónica para la sintaxis de refs (<code>HEAD~3</code>, <code>main@{yesterday}</code>, etc.).</p>
    <h2>Configurando el formato de ayuda</h2>
    <p>Por defecto <code>git help</code> abre una man page. Puedes cambiar a HTML o info:</p>
    <pre><code>git config --global help.format html
    git config --global help.format info
    git config --global help.format man   # predeterminado</code></pre>
    <p>HTML abre la copia local en tu navegador, útil en sistemas sin <code>man</code>.</p>
    <h2>Recursos en línea</h2>
    <ul>
      <li><strong>git-scm.com/docs</strong>: manual oficial replicado en línea.</li>
      <li><strong>Pro Git book</strong> de Chacon y Straub: gratis, completo, actualizado regularmente.</li>
      <li><strong>Archivo de la lista de correo de Git</strong>: <code>lore.kernel.org/git</code> para discusiones de diseño.</li>
    </ul>
    <h2>Buscando documentación</h2>
    <p>Si no recuerdas el nombre de un comando, <code>man -k git</code> (o <code>apropos git</code>) lista cada man page de Git con una descripción de una línea. Para buscar dentro de los docs, redirige a <code>grep</code>:</p>
    <pre><code>man -k git
    git help -a | grep -i merge
    git help log | grep -A 2 'pickaxe'</code></pre>
    <p>Para aprendizaje en formato largo, el libro Pro Git es gratuito y autoritativo; el Manual de Referencia de Git en <code>git-scm.com/docs</code> replica las man pages con enlaces cruzados. La man page <code>gitfaq</code> es una joya poco usada que responde muchas preguntas del mundo real en prosa simple.</p>
    <h2>Errores comunes</h2>
    <p>Buscar en la web respuestas obsoletas de Stack Overflow usando comandos deprecados como <code>git checkout</code> para cambiar de branch cuando existe <code>git switch</code>. Siempre verifica contra <code>git help</code> para tu versión instalada. Otro error es asumir que <code>-h</code> y <code>--help</code> se comportan igual; no lo hacen. <code>-h</code> imprime un resumen de una pantalla, mientras que <code>--help</code> abre la man page completa (o el navegador, dependiendo de <code>help.format</code>). Por último, no te saltes <code>git help glossary</code>; muchos términos "raros" de Git (porcelain, plumbing, refspec, dangling object) están definidos con precisión ahí en una sola página corta.</p>

- source_title: "Common beginner mistakes"
  title: "Errores comunes de principiantes"
  langcode: es
  body: |
    <h2>Introducción</h2>
    <p>La mayoría de la gente aprende Git de la manera difícil, a través de pequeños desastres. Esta página recopila los errores más frecuentes de principiantes y cómo evitarlos (o recuperarse de ellos). Léela una vez ahora y otra vez después de un mes de uso; la segunda pasada tendrá más sentido.</p>
    <h2>Commitear con la identidad equivocada</h2>
    <p>Olvidar establecer <code>user.email</code> por repositorio filtra direcciones personales en commits de trabajo. Siempre establece una identidad por repo en clones de trabajo:</p>
    <pre><code>git config user.email "ada@work.com"
    git log -1 --pretty=format:"%an &lt;%ae&gt;"</code></pre>
    <h2>Commitear secretos</h2>
    <p>Las claves de API y archivos <code>.env</code> en commits viven para siempre, incluso después de un "borrado" de seguimiento. Añade una entrada a <code>.gitignore</code> <em>antes</em> del primer commit y rota cualquier credencial filtrada inmediatamente. Herramientas como <code>git-secrets</code> y <code>gitleaks</code> pueden ejecutarse como hooks pre-commit.</p>
    <h2>Force-pushing sobre tus compañeros</h2>
    <p><code>git push --force</code> reescribe el historial en el remoto, eliminando los commits de otras personas. Prefiere <code>--force-with-lease</code>, que se rehúsa a sobrescribir si el remoto ha avanzado:</p>
    <pre><code>git push --force-with-lease</code></pre>
    <h2>Malinterpretando pull</h2>
    <p><code>git pull</code> es fetch + merge (o rebase). Ejecutarlo con cambios no commiteados puede producir merge commits sorprendentes. O bien commitea, stashea, o establece un valor predeterminado razonable:</p>
    <pre><code>git config --global pull.rebase true
    git config --global pull.ff only</code></pre>
    <h2>Editar HEAD desconectado sin darse cuenta</h2>
    <p>Hacer checkout de un tag o hash de commit te deja en HEAD desconectado. Los nuevos commits ahí son inalcanzables una vez que cambias. Crea siempre un branch primero:</p>
    <pre><code>git switch -c hotfix v1.2.3</code></pre>
    <h2>Confundir reset, revert y restore</h2>
    <ul>
      <li><code>git restore</code> cambia el árbol de trabajo o el index; seguro.</li>
      <li><code>git revert</code> crea un nuevo commit que deshace otro; seguro y compartible.</li>
      <li><code>git reset --hard</code> mueve el branch y descarta trabajo; <em>destructivo</em>.</li>
    </ul>
    <h2>Commitear archivos enormes</h2>
    <p>Un video de 500&nbsp;MB en un commit es permanente. Usa Git LFS para binarios por encima de unos pocos megabytes y mantén los artefactos de build completamente fuera del repositorio.</p>
    <h2>Kit de recuperación</h2>
    <pre><code>git reflog
    git fsck --lost-found
    git stash list</code></pre>
    <p>El reflog registra cada movimiento de <code>HEAD</code> durante 90 días por defecto; casi cualquier commit "perdido" se puede recuperar de él.</p>
    <h2>Malinterpretar status</h2>
    <p>La salida de <code>git status</code> tiene capas sutiles. "Changes not staged for commit" significa archivos rastreados modificados en el árbol de trabajo. "Changes to be committed" significa staged. "Untracked files" significa que Git nunca los ha visto. Una confusión común: editar un archivo <em>después</em> de stagearlo lo muestra bajo ambas listas con contenido diferente; solo lo que está staged va al commit. Ejecuta <code>git diff</code> (working vs index) y <code>git diff --staged</code> (index vs HEAD) hasta que las tres áreas hagan clic.</p>
    <pre><code>git status -sb
    git diff --staged --stat</code></pre>
    <h2>Errores comunes</h2>
    <p>Entrar en pánico y ejecutar <code>rm -rf .git</code> cuando algo se ve mal. Detente. Haz una copia de seguridad del directorio primero. Casi cualquier error de Git es recuperable mediante el reflog o stash. El hábito más importante para principiantes: ejecuta <code>git status</code> antes y después de cada comando que cambia estado, y ejecuta <code>git log --oneline --all --graph</code> cuando algo se sienta raro.</p>

- source_title: "Cloning an existing repository (git clone)"
  title: "Clonando un repositorio existente (git clone)"
  langcode: es
  body: |
    <h2>Introducción</h2>
    <p><code>git clone</code> copia un repositorio remoto a tu máquina. Crea un nuevo directorio, inicializa <code>.git</code> dentro de él, descarga todos los objetos y refs, configura un remoto llamado <code>origin</code> y hace checkout del branch predeterminado. Después de clonar tienes un repositorio completo e independiente.</p>
    <h2>Clone básico</h2>
    <pre><code>git clone https://github.com/torvalds/linux.git
    cd linux
    git remote -v
    # origin  https://github.com/torvalds/linux.git (fetch)
    # origin  https://github.com/torvalds/linux.git (push)</code></pre>
    <h2>Eligiendo un nombre de directorio</h2>
    <p>Por defecto Git usa el último componente de la ruta. Sobrescríbelo:</p>
    <pre><code>git clone https://github.com/example/widget.git my-widget</code></pre>
    <h2>Eligiendo un protocolo</h2>
    <ul>
      <li><strong>HTTPS</strong>: el más fácil, funciona a través de firewalls, a menudo necesita un asistente de credenciales o token.</li>
      <li><strong>SSH</strong>: conveniente con autenticación por clave, rápido para usuarios avanzados.</li>
      <li><strong>git://</strong>: anónimo, no autenticado, mayormente histórico.</li>
      <li><strong>file://</strong> o ruta local: clonar desde otro directorio.</li>
    </ul>
    <pre><code>git clone git@github.com:example/widget.git
    git clone /srv/git/widget.git
    git clone file:///srv/git/widget.git</code></pre>
    <h2>Opciones útiles</h2>
    <pre><code>git clone --depth 1 &lt;url&gt;            # shallow: solo la punta
    git clone --branch v1.2.3 &lt;url&gt;     # checkout de un branch o tag específico
    git clone --single-branch &lt;url&gt;     # descargar solo un branch
    git clone --bare &lt;url&gt;              # clon bare, sin árbol de trabajo
    git clone --recurse-submodules &lt;url&gt;</code></pre>
    <p>Los clones shallow ahorran ancho de banda en CI; conviértelos después con <code>git fetch --unshallow</code>.</p>
    <h2>Qué hace clone, paso a paso</h2>
    <ol>
      <li>Crea el directorio destino.</li>
      <li>Ejecuta <code>git init</code> dentro de él.</li>
      <li>Añade <code>origin</code> como remoto.</li>
      <li>Ejecuta <code>git fetch origin</code>.</li>
      <li>Configura el seguimiento del branch predeterminado.</li>
      <li>Ejecuta <code>git checkout</code> para ese branch.</li>
    </ol>
    <h2>Clones sparse y partial para repos enormes</h2>
    <p>Los repositorios que abarcan gigabytes (sistemas operativos, monorepos) son dolorosos de clonar completamente. Dos características complementarias ayudan:</p>
    <pre><code>git clone --filter=blob:none --no-checkout &lt;url&gt; repo
    cd repo
    git sparse-checkout init --cone
    git sparse-checkout set src/myteam
    git checkout main</code></pre>
    <p><code>--filter=blob:none</code> aplaza descargas de blobs hasta que se necesiten, mientras que <code>sparse-checkout</code> popula solo los directorios que listas. Juntos te permiten trabajar en una pequeña porción de un repo masivo con costo proporcional de disco y ancho de banda.</p>
    <h2>Hooks en tiempo de clone</h2>
    <p>Algunos proyectos incluyen pasos de configuración que deberían ejecutarse al clonar (instalar hooks pre-commit, descargar objetos LFS, inicializar submódulos). Git no ejecuta hooks al clonar, pero puedes encadenarlos:</p>
    <pre><code>git clone --recurse-submodules &lt;url&gt; repo
    cd repo
    git lfs install
    pre-commit install</code></pre>
    <p>Para nuevos contribuyentes, documenta esta secuencia en <code>CONTRIBUTING.md</code> o envuélvela en un script <code>scripts/bootstrap</code>. Los proyectos inteligentes hacen su objetivo <code>make setup</code> idempotente para que volver a ejecutarlo tras un clone obsoleto sea seguro.</p>
    <h2>Errores comunes</h2>
    <p>Clonar en un directorio no vacío: Git se rehúsa a menos que pases un destino vacío explícito. Clonar repositorios enormes sin <code>--depth</code> en conexiones lentas, y luego rendirse a la mitad. Clonar por HTTPS a un servidor que requiere SSO, y luego no poder hacer push porque tu token carece del scope correcto. Siempre prueba con <code>git push --dry-run</code> después del primer commit. Finalmente, clonar en <code>~/Desktop</code> u otra carpeta de sincronización (Dropbox, iCloud, OneDrive) lleva a corrupción cuando el cliente de sincronización escribe a medio camino sobre <code>.git/index</code>. Mantén los clones de trabajo en almacenamiento local plano.</p>

- source_title: "Working with remote repositories (git remote)"
  title: "Trabajando con repositorios remotos (git remote)"
  langcode: es
  body: |
    <h2>Introducción</h2>
    <p>Un <em>remoto</em> es una URL nombrada que apunta a otro repositorio Git. <code>git clone</code> crea uno llamado <code>origin</code> automáticamente, pero puedes añadir tantos como quieras. Los remotos son el puente entre tu repo local y el mundo exterior.</p>
    <h2>Listando e inspeccionando</h2>
    <pre><code>git remote
    git remote -v
    git remote show origin</code></pre>
    <p><code>git remote show</code> contacta al servidor y reporta los branches rastreados, reglas de push y refs obsoletas.</p>
    <h2>Añadiendo y eliminando</h2>
    <pre><code>git remote add upstream https://github.com/original/widget.git
    git remote rename upstream origin-upstream
    git remote remove origin-upstream</code></pre>
    <p>El patrón <em>fork-y-upstream</em> es común: <code>origin</code> es tu fork, <code>upstream</code> es el proyecto del que hiciste fork.</p>
    <h2>Cambiando una URL</h2>
    <p>Si un proyecto se mueve de HTTPS a SSH o a un nuevo host:</p>
    <pre><code>git remote set-url origin git@github.com:example/widget.git
    git remote -v</code></pre>
    <h2>Múltiples URLs</h2>
    <p>Puedes hacer push a varios mirrors a la vez añadiendo URLs de push extra:</p>
    <pre><code>git remote set-url --add --push origin git@gitlab.com:example/widget.git
    git remote -v</code></pre>
    <h2>Podando branches obsoletos</h2>
    <p>Cuando los branches se eliminan en el servidor, tus <code>refs/remotes/origin/*</code> locales pueden quedarse desfasados. Límpialos:</p>
    <pre><code>git fetch --prune
    git remote prune origin</code></pre>
    <p>O configúralo permanentemente:</p>
    <pre><code>git config --global fetch.prune true</code></pre>
    <h2>Inspeccionando el seguimiento</h2>
    <pre><code>git branch -vv
    # main           a1b2c3d [origin/main] Latest fix
    # feature/login  e4f5g6h [origin/feature/login: ahead 2] WIP</code></pre>
    <p><code>-vv</code> muestra el upstream de cada branch y cuán adelante/atrás está.</p>
    <h2>Reescritura con insteadOf</h2>
    <p>Si las URLs de un proyecto cambian (HTTPS a SSH, migración de host, o quieres que todas las URLs de GitHub usen SSH automáticamente), <code>insteadOf</code> las reescribe transparentemente:</p>
    <pre><code>git config --global url."git@github.com:".insteadOf "https://github.com/"
    git config --global url."https://github-mirror.example.com/".insteadOf "https://github.com/"</code></pre>
    <p>Esto es especialmente útil en CI, donde puedes reescribir todos los clones a un mirror local con una línea de configuración, sin necesidad de editar scripts. La dirección inversa (<code>pushInsteadOf</code>) te permite hacer fetch por HTTPS pero push por SSH desde el mismo remoto.</p>
    <h2>Flujos triangulares</h2>
    <p>En código abierto, típicamente haces <em>fetch</em> desde <code>upstream</code> (el proyecto canónico) y <em>push</em> a <code>origin</code> (tu fork personal). Configura una vez y olvídate:</p>
    <pre><code>git remote add upstream https://github.com/project/repo.git
    git config branch.main.remote upstream
    git config branch.main.pushRemote origin
    git config --global push.default current</code></pre>
    <p>Ahora <code>git pull</code> lee desde upstream y <code>git push</code> escribe a tu fork, automáticamente. La configuración <code>remote.pushDefault</code> aplica la regla a cada branch en un clon.</p>
    <h2>Errores comunes</h2>
    <p>Confundir el <em>nombre</em> de un remoto con su URL. <code>origin</code> es solo una etiqueta; puedes renombrarlo. Otra trampa: añadir la misma URL bajo dos nombres diferentes, y luego sorprenderse por refs duplicadas. Usa <code>git remote -v</code> para auditar. Olvidar hacer <code>git fetch</code> después de cambiar de red o cambiar URL deja tus branches de seguimiento desactualizados. Finalmente, en servidores compartidos, eliminar un ref de seguimiento remoto localmente (p.ej. <code>git branch -dr origin/main</code>) <em>no</em> elimina el branch en el servidor; usa <code>git push origin --delete main</code> para eso, y solo cuando realmente lo desees.</p>

- source_title: "Fetching and pulling changes"
  title: "Haciendo fetch y pull de cambios"
  langcode: es
  body: |
    <h2>Introducción</h2>
    <p><code>git fetch</code> descarga nuevos objetos y actualiza las refs de seguimiento remoto <em>sin</em> cambiar tu árbol de trabajo. <code>git pull</code> hace fetch y luego integra el resultado en tu branch actual. Conocer la diferencia es uno de los mayores pasos de novato a usuario confiado de Git.</p>
    <h2>Fetching</h2>
    <pre><code>git fetch                  # remoto predeterminado (normalmente origin)
    git fetch origin
    git fetch --all
    git fetch --prune          # eliminar refs de branches eliminados en el servidor
    git fetch origin main      # solo un branch</code></pre>
    <p>Después de un fetch, inspecciona qué cambió:</p>
    <pre><code>git log HEAD..origin/main --oneline
    git diff HEAD origin/main</code></pre>
    <h2>Pulling</h2>
    <p><code>git pull</code> es atajo para fetch seguido de merge o rebase. Elige la estrategia:</p>
    <pre><code>git pull                          # usa la config pull.rebase
    git pull --rebase
    git pull --ff-only                # rechazar si no es fast-forward
    git pull origin main</code></pre>
    <h2>Configurando comportamiento predeterminado</h2>
    <pre><code>git config --global pull.rebase false   # merge (predeterminado clásico)
    git config --global pull.rebase true    # rebase
    git config --global pull.ff only        # solo fast-forward
    git config --global fetch.prune true</code></pre>
    <p>Desde Git 2.27 un <code>git pull</code> sin argumentos advierte si no hay estrategia configurada.</p>
    <h2>Fetch vs pull, cuándo usar cuál</h2>
    <ul>
      <li>Usa <code>fetch</code> cuando quieras mirar antes de integrar.</li>
      <li>Usa <code>pull --ff-only</code> cuando simplemente quieras ponerte al día en un branch compartido.</li>
      <li>Usa <code>pull --rebase</code> cuando trabajas en un topic branch que aún no has pusheado.</li>
      <li>Evita un <code>pull</code> simple en branches compartidos de larga vida; los merge commits se multiplican.</li>
    </ul>
    <h2>Inspeccionando upstream</h2>
    <pre><code>git status
    # On branch main
    # Your branch is behind 'origin/main' by 3 commits, and can be fast-forwarded.</code></pre>
    <p>Este mensaje viene de comparar <code>HEAD</code> con la <code>origin/main</code> cacheada; ejecuta <code>git fetch</code> primero para hacerlo preciso.</p>
    <h2>Haciendo fetch de pull requests</h2>
    <p>La mayoría de los hosts de Git exponen los branches de pull o merge requests como refs especiales que puedes traer a tu clon para revisión. Para GitHub, añade un refspec:</p>
    <pre><code>git config --add remote.origin.fetch '+refs/pull/*/head:refs/remotes/origin/pr/*'
    git fetch
    git switch -c review/123 origin/pr/123</code></pre>
    <p>Para GitLab la ruta equivalente es <code>refs/merge-requests/*/head</code>. Con esto configurado, cada <code>git fetch</code> trae todos los PRs abiertos localmente, listos para inspección sin salir de tu terminal.</p>
    <h2>Errores comunes</h2>
    <p>Ejecutar <code>git pull</code> con cambios no commiteados y obtener un merge commit inesperado encima de trabajo sucio. Stashea o commitea primero. Olvidar que el conteo de "behind" de <code>git status</code> es solo tan fresco como el último fetch; si nadie ha hecho fetch en una semana, ese conteo miente. Usar <code>git pull --rebase</code> en un branch sobre el que otras personas han basado trabajo reescribe su base; rebase solo en branches privados. Y finalmente, nunca uses <code>git fetch &lt;refspec&gt;</code> con un refspec personalizado a menos que lo entiendas; un dos puntos accidental (<code>main:main</code>) sobrescribe tu <code>main</code> local.</p>

- source_title: "Pushing your work"
  title: "Haciendo push de tu trabajo"
  langcode: es
  body: |
    <h2>Introducción</h2>
    <p><code>git push</code> sube commits locales a un remoto y actualiza los branches y tags de ese remoto. Es cómo tu trabajo se hace visible a los colaboradores.</p>
    <h2>Push básico</h2>
    <pre><code>git push                          # branch actual a su upstream
    git push origin main              # explícito
    git push -u origin feature/login  # establecer upstream y push</code></pre>
    <p>El flag <code>-u</code> (o <code>--set-upstream</code>) vincula el branch local con el remoto, así que futuros <code>git push</code> y <code>git pull</code> no necesitan argumentos.</p>
    <h2>Pusheando tags</h2>
    <p>Los tags no se pushean por defecto:</p>
    <pre><code>git push origin v1.2.3
    git push origin --tags          # todos los tags
    git push --follow-tags          # tags alcanzables desde commits pusheados</code></pre>
    <p><code>--follow-tags</code> es el predeterminado más seguro para flujos de release.</p>
    <h2>Eliminando branches remotos</h2>
    <pre><code>git push origin --delete feature/login
    # equivalentemente
    git push origin :feature/login</code></pre>
    <h2>Force-push de forma segura</h2>
    <p>Reescribir el historial (rebase, amend, squash) requiere un force push. Siempre prefiere <code>--force-with-lease</code>, que se rehúsa a aplastar refs que se movieron en el servidor:</p>
    <pre><code>git push --force-with-lease
    git push --force-with-lease=feature/login:abcd1234</code></pre>
    <p>Nunca <code>--force</code> ciegamente a un branch compartido como <code>main</code>.</p>
    <h2>Configurando valores predeterminados de push</h2>
    <pre><code>git config --global push.default simple    # predeterminado desde 2.0
    git config --global push.autoSetupRemote true   # 2.37+: -u automático</code></pre>
    <p>Con <code>push.autoSetupRemote</code> establecido, un <code>git push</code> simple en un nuevo branch crea el branch remoto y los vincula automáticamente.</p>
    <h2>Qué pasa durante el push</h2>
    <ol>
      <li>Git local negocia con el remoto para encontrar commits comunes.</li>
      <li>Empaqueta y sube solo los objetos faltantes.</li>
      <li>El remoto ejecuta los hooks <code>pre-receive</code> y <code>update</code>.</li>
      <li>Si se acepta, las refs se actualizan atómicamente.</li>
      <li>El hook <code>post-receive</code> se ejecuta (CI, mirroring, etc.).</li>
    </ol>
    <h2>Pushes atómicos y firmados</h2>
    <p><code>--atomic</code> convierte pushes multi-ref en una sola transacción; o todas las refs se actualizan o ninguna lo hace, lo que previene despliegues parciales. <code>--signed</code> envía un certificado de push firmado con GPG que algunos hosts registran para auditoría:</p>
    <pre><code>git push --atomic origin main release/1.2
    git push --signed origin main</code></pre>
    <p>Para sistemas automatizados, la opción <code>--receive-pack</code> te permite especificar un receive-pack alternativo en el servidor, ocasionalmente necesario para hosts con binarios no estándar. Siempre usa <code>git push --dry-run</code> al ejecutar pushes destructivos por primera vez en un script.</p>
    <h2>Errores comunes</h2>
    <p>Pushear a <code>main</code> cuando querías un branch de feature, porque olvidaste en qué branch estabas. Ejecuta <code>git status</code> primero. Usar <code>git push --force</code> contra <code>main</code> y reescribir los commits de otras personas; recupera con el reflog del remoto (si tienes acceso por shell) o re-pusheando desde el clon de un compañero. Pushear sin credenciales configuradas y quedar colgado en un prompt de contraseña; configura un asistente de credenciales o clave SSH. Finalmente, pushes grandes pueden fallar al último momento si un hook los rechaza; si es así, el mensaje de rechazo nombra el commit ofensor. Léelo con cuidado en lugar de re-ejecutar ciegamente.</p>

- source_title: "Understanding HEAD"
  title: "Entendiendo HEAD"
  langcode: es
  body: |
    <h2>Introducción</h2>
    <p><code>HEAD</code> es la referencia más importante en Git. Le dice a Git de qué commit descenderá tu próximo commit. La mayoría del tiempo <code>HEAD</code> apunta a un branch, y ese branch apunta a un commit; pero <code>HEAD</code> también puede apuntar directamente a un commit (HEAD desconectado).</p>
    <h2>Dónde vive</h2>
    <p><code>HEAD</code> es un único archivo en <code>.git/HEAD</code>. Inspecciónalo:</p>
    <pre><code>cat .git/HEAD
    # ref: refs/heads/main</code></pre>
    <p>Esa única línea dice "HEAD apunta actualmente al branch <code>main</code>". Cuando haces commit, Git avanza <code>main</code> y <code>HEAD</code> sigue.</p>
    <h2>Inspeccionando HEAD</h2>
    <pre><code>git rev-parse HEAD              # SHA del commit
    git symbolic-ref HEAD           # nombre de la ref subyacente
    git log -1 HEAD --oneline</code></pre>
    <h2>HEAD desconectado</h2>
    <p>Hacer checkout de un commit, tag o branch de seguimiento remoto directamente pone a <code>HEAD</code> en estado <em>desconectado</em>:</p>
    <pre><code>git checkout v1.2.3
    # You are in 'detached HEAD' state.</code></pre>
    <p><code>.git/HEAD</code> ahora contiene un SHA crudo. Los nuevos commits no van a ningún lado salvo al reflog; vuelve a un branch real (o crea uno) antes de perderlos:</p>
    <pre><code>git switch -c experiment</code></pre>
    <h2>Atajos de HEAD</h2>
    <ul>
      <li><code>HEAD</code>: el commit actual.</li>
      <li><code>HEAD^</code> o <code>HEAD~1</code>: padre.</li>
      <li><code>HEAD~3</code>: tres commits atrás vía primer padre.</li>
      <li><code>HEAD^2</code>: segundo padre de un merge commit.</li>
      <li><code>HEAD@{1}</code>: posición previa desde el reflog.</li>
    </ul>
    <pre><code>git log HEAD~5..HEAD --oneline
    git diff HEAD^ HEAD</code></pre>
    <h2>Otros HEADs especiales</h2>
    <ul>
      <li><code>ORIG_HEAD</code>: HEAD anterior antes de una operación "peligrosa" (merge, reset).</li>
      <li><code>MERGE_HEAD</code>: punta del branch siendo mergeado.</li>
      <li><code>FETCH_HEAD</code>: punta de lo que se acaba de hacer fetch.</li>
      <li><code>CHERRY_PICK_HEAD</code>: commit siendo cherry-picked.</li>
    </ul>
    <h2>HEAD en scripts</h2>
    <p>Los scripts a menudo necesitan saber el nombre del branch actual. Usa plumbing en lugar de parsear la salida de porcelain:</p>
    <pre><code>branch=$(git symbolic-ref --short -q HEAD) || branch="(detached)"
    sha=$(git rev-parse HEAD)
    short=$(git rev-parse --short HEAD)</code></pre>
    <p><code>symbolic-ref --short -q HEAD</code> sale con código distinto de cero en estado desconectado, lo que lo hace un detector perfecto. <code>git branch --show-current</code> (Git 2.22+) es una alternativa más amigable que muestra salida vacía cuando está desconectado. Ambos son estables entre versiones; la salida de <code>git status</code> no lo es.</p>
    <h2>HEAD y worktrees</h2>
    <p>Los worktrees vinculados tienen cada uno su propio <code>HEAD</code>. El <code>.git/HEAD</code> del repositorio principal es uno de muchos; cada worktree tiene el suyo bajo <code>.git/worktrees/&lt;name&gt;/HEAD</code>. Esto significa que dos worktrees del mismo repositorio pueden estar en branches diferentes simultáneamente:</p>
    <pre><code>git worktree add ../wt-feature feature/login
    git -C ../wt-feature rev-parse HEAD
    git -C . rev-parse HEAD</code></pre>
    <p>Los dos HEADs son independientes. El checkout de branch es exclusivo entre worktrees: un branch solo puede estar checkeado en un worktree a la vez, previniendo ediciones concurrentes accidentales del mismo branch desde dos ubicaciones.</p>
    <h2>Errores comunes</h2>
    <p>Creer que <code>HEAD</code> es sinónimo de "branch actual". No lo es; es un puntero que <em>usualmente</em> apunta a uno. Tratar <code>HEAD~3</code> y <code>HEAD^3</code> como equivalentes: difieren en merge commits. Editar <code>.git/HEAD</code> a mano para cambiar de branch; usa <code>git switch</code> o <code>git checkout</code> en su lugar. Y finalmente, ignorar las advertencias de "HEAD desconectado" y commitear al vacío; si te encuentras ahí con nuevos commits, haz <code>git switch -c &lt;newbranch&gt;</code> inmediatamente para anclarlos.</p>

- source_title: "Creating and switching branches"
  title: "Creando y cambiando branches"
  langcode: es
  body: |
    <h2>Introducción</h2>
    <p>Los branches son cómo Git soporta líneas de trabajo paralelas. Crear un branch es esencialmente gratis: es solo un archivo de 41 bytes que contiene un hash de commit. Úsalos generosamente para features, experimentos y arreglos de bugs.</p>
    <h2>Comandos modernos</h2>
    <p>Desde Git 2.23 hay dos comandos especializados: <code>git switch</code> para branches y <code>git restore</code> para archivos. Úsalos; son más claros que el comportamiento sobrecargado de <code>git checkout</code>.</p>
    <pre><code>git switch main                    # cambiar a un branch existente
    git switch -c feature/login        # crear y cambiar
    git switch -c hotfix v1.2.3        # crear desde un tag
    git switch -                       # branch anterior (como cd -)</code></pre>
    <h2>Listando branches</h2>
    <pre><code>git branch                    # local
    git branch -r                 # remote-tracking
    git branch -a                 # todos
    git branch -vv                # con upstream y ahead/behind
    git branch --merged           # mergeados al actual
    git branch --no-merged        # aún no mergeados</code></pre>
    <h2>Renombrando y eliminando</h2>
    <pre><code>git branch -m old new             # renombrar
    git branch -m new                  # renombrar el branch actual
    git branch -d feature/login        # eliminar branch mergeado
    git branch -D feature/abandoned    # forzar eliminación de no mergeado</code></pre>
    <p><code>-d</code> rechaza si el branch tiene commits no mergeados, protegiendo el trabajo.</p>
    <h2>Rastreando branches remotos</h2>
    <pre><code>git switch feature/login           # auto-crea local desde origin/feature/login
    git switch -c mine origin/feature/login   # explícito
    git branch -u origin/main          # establecer upstream del branch actual</code></pre>
    <h2>La sintaxis clásica</h2>
    <p>Los tutoriales antiguos usan <code>git checkout</code>. Aún funciona:</p>
    <pre><code>git checkout main
    git checkout -b feature/login
    git checkout v1.2.3</code></pre>
    <p>El inconveniente es que el mismo comando también restaura archivos, lo que causa confusión. Prefiere <code>switch</code> y <code>restore</code> en scripts nuevos.</p>
    <h2>Convenciones de nombres de branches</h2>
    <p>Los nombres consistentes facilitan las herramientas. Patrones comunes:</p>
    <ul>
      <li><code>feature/&lt;ticket&gt;-short-desc</code></li>
      <li><code>bugfix/&lt;ticket&gt;-short-desc</code></li>
      <li><code>hotfix/&lt;version&gt;</code></li>
      <li><code>release/&lt;version&gt;</code></li>
    </ul>
    <pre><code>git switch -c feature/PROJ-123-add-search
    git config --global branch.autoSetupMerge always
    git config --global branch.autoSetupRebase always</code></pre>
    <p>Las opciones <code>autoSetup</code> aseguran que los nuevos branches automáticamente rastreen su punto de partida, lo que hace que la línea ahead/behind de <code>git status</code> sea significativa desde el día uno.</p>
    <h2>Renombrando en el remoto</h2>
    <p>Renombrar un branch remoto son dos operaciones: renombrar localmente y crear la nueva ref en el servidor, luego eliminar la antigua:</p>
    <pre><code>git branch -m old new
    git push -u origin new
    git push origin --delete old</code></pre>
    <h2>Errores comunes</h2>
    <p>Cambiar de branch con cambios no commiteados que conflictan con el destino; Git rechaza, y el arreglo es commitear, stashear o usar <code>git switch --discard-changes</code> si realmente no los quieres. Crear docenas de branches de larga vida y nunca eliminar los mergeados; <code>git branch --merged | xargs git branch -d</code> ordena. Nombrar branches con caracteres que confunden a las shells (espacios, caracteres glob); apégate a letras, dígitos, slash y guión. Finalmente, eliminar un branch con <code>-D</code> y entrar en pánico al darte cuenta de que tenía trabajo no mergeado; el reflog aún lo tiene durante 90 días: <code>git reflog</code>, encuentra el SHA, <code>git switch -c rescued &lt;sha&gt;</code>.</p>

- source_title: "Your first merge"
  title: "Tu primer merge"
  langcode: es
  body: |
    <h2>Introducción</h2>
    <p>Un <em>merge</em> combina dos líneas de desarrollo. El caso más común es traer un branch de feature de vuelta a <code>main</code>. Esta página recorre un merge limpio, un fast-forward y un merge con conflictos.</p>
    <h2>Configuración inicial</h2>
    <pre><code>git switch -c feature/greeting
    echo "hello world" > greeting.txt
    git add greeting.txt
    git commit -m "Add greeting"
    git switch main
    git merge feature/greeting</code></pre>
    <p>Si <code>main</code> no se ha movido desde que se creó el branch, Git hace fast-forward: simplemente mueve el puntero de <code>main</code> a la punta de <code>feature/greeting</code>. No se crea merge commit.</p>
    <h2>Merges three-way reales</h2>
    <p>Si ambos branches tienen commits nuevos, Git crea un <em>merge commit</em> con dos padres:</p>
    <pre><code>git switch main
    echo "main change" >> notes.txt
    git commit -am "Update notes on main"
    git merge feature/greeting
    # Merge made by the 'ort' strategy.</code></pre>
    <p>El primer padre del merge commit es el <code>HEAD</code> previo de <code>main</code>; su segundo padre es la punta del branch mergeado.</p>
    <h2>Forzando un merge commit</h2>
    <p>Para preservar el historial visiblemente incluso cuando el fast-forward es posible:</p>
    <pre><code>git merge --no-ff feature/greeting -m "Merge feature/greeting"</code></pre>
    <h2>Conflictos</h2>
    <p>Si ambos lados editaron las mismas líneas, Git se detiene y escribe marcadores de conflicto:</p>
    <pre><code>&lt;&lt;&lt;&lt;&lt;&lt;&lt; HEAD
    line from main
    =======
    line from feature
    &gt;&gt;&gt;&gt;&gt;&gt;&gt; feature/greeting</code></pre>
    <p>Resuelve editando el archivo, luego:</p>
    <pre><code>git add notes.txt
    git status
    git commit               # usa el mensaje de merge preparado</code></pre>
    <h2>Abortando</h2>
    <p>Si cambias de opinión a mitad de un merge:</p>
    <pre><code>git merge --abort</code></pre>
    <p>Esto restaura el árbol de trabajo al estado pre-merge.</p>
    <h2>Inspeccionando el resultado</h2>
    <pre><code>git log --oneline --graph --decorate -n 10</code></pre>
    <p>El grafo muestra la forma de diamante creada por el merge.</p>
    <h2>Inspeccionando un merge</h2>
    <p>Los merge commits tienen dos padres, así que los diffs requieren manejo explícito. <code>git show</code> en un merge muestra por defecto un "diff combinado" que destaca solo los cambios que conflictan con ambos padres:</p>
    <pre><code>git show HEAD                       # diff combinado
    git show -m HEAD                    # diff contra cada padre por separado
    git show --first-parent HEAD        # contra el primer padre solamente
    git log --merges --oneline          # solo merge commits
    git log --no-merges --oneline       # excluyendo merge commits</code></pre>
    <p>Para arqueología de código, <code>--first-parent</code> en un branch de larga duración revela la historia de integración: cuándo aterrizó cada feature, en orden cronológico de tronco.</p>
    <h2>Errores comunes</h2>
    <p>Editar archivos durante un merge pero olvidar hacerles <code>git add</code>, así que <code>git commit</code> sigue quejándose de paths no resueltos. Siempre ejecuta <code>git status</code> después de editar. Resolver eliminando los marcadores de conflicto pero dejando texto obsoleto de un lado; compila y ejecuta tests antes de commitear el merge. Usar <code>--no-ff</code> en cada merge en un repo de movimiento rápido, contaminando el historial con merge commits vacíos. Finalmente, entrar en pánico en el prompt y ejecutar <code>git reset --hard</code> a mitad del merge; <code>git merge --abort</code> es más seguro porque sabe sobre <code>ORIG_HEAD</code>.</p>

- source_title: "Undoing changes (intro)"
  title: "Deshaciendo cambios (introducción)"
  langcode: es
  body: |
    <h2>Introducción</h2>
    <p>Git proporciona varias formas de deshacer, dependiendo de si el cambio está en tu árbol de trabajo, en el index, en tu último commit o ya pusheado. Elegir la herramienta correcta previene accidentes.</p>
    <h2>Descartando ediciones del árbol de trabajo</h2>
    <p>Editaste un archivo pero quieres descartar los cambios:</p>
    <pre><code>git restore file.txt              # moderno
    git checkout -- file.txt          # equivalente clásico</code></pre>
    <p><code>git restore</code> sin <code>--source</code> usa el index, así que el archivo vuelve a su último estado de <code>git add</code>.</p>
    <h2>Quitando del staging</h2>
    <p>Ejecutaste <code>git add</code> pero quieres sacar un archivo del próximo commit (sin perder ediciones):</p>
    <pre><code>git restore --staged file.txt
    git reset HEAD file.txt           # sintaxis antigua</code></pre>
    <h2>Enmendar el último commit</h2>
    <p>Hiciste commit pero quieres arreglar el mensaje o incluir otro archivo:</p>
    <pre><code>git commit --amend -m "Better message"
    git add forgotten.txt
    git commit --amend --no-edit</code></pre>
    <p>Solo enmienda commits que <strong>no has pusheado</strong>, o estate listo para hacer force-push.</p>
    <h2>Revirtiendo un commit público</h2>
    <p>Si un commit malo ya está pusheado, no reescribas el historial. Crea un nuevo commit que lo deshaga:</p>
    <pre><code>git revert &lt;sha&gt;
    git push</code></pre>
    <p><code>git revert</code> abre un editor con un mensaje generado; el resultado es un undo limpio que todos pueden hacer pull.</p>
    <h2>Reseteando</h2>
    <p><code>git reset</code> mueve el puntero del branch actual. Tiene tres modos:</p>
    <ul>
      <li><code>--soft</code>: mover solo el branch; mantener index y árbol de trabajo.</li>
      <li><code>--mixed</code> (predeterminado): mover branch y resetear index; mantener árbol de trabajo.</li>
      <li><code>--hard</code>: mover branch, resetear index, resetear árbol de trabajo. Destructivo.</li>
    </ul>
    <pre><code>git reset --soft HEAD~1            # descommitear, mantener cambios staged
    git reset HEAD~1                   # descommitear, mantener cambios sin stagear
    git reset --hard HEAD~1            # destruir el último commit y los cambios</code></pre>
    <h2>Recuperando de --hard</h2>
    <pre><code>git reflog
    git reset --hard HEAD@{1}</code></pre>
    <p>El reflog recuerda cada movimiento de <code>HEAD</code> durante 90 días.</p>
    <h2>Eligiendo el undo correcto</h2>
    <p>Una matriz de decisión simple:</p>
    <ul>
      <li><strong>Solo árbol de trabajo</strong>: <code>git restore &lt;file&gt;</code></li>
      <li><strong>Archivo staged</strong>: <code>git restore --staged &lt;file&gt;</code></li>
      <li><strong>Último commit no pusheado</strong>: <code>git commit --amend</code> o <code>git reset --soft HEAD~1</code></li>
      <li><strong>Commit pusheado</strong>: <code>git revert &lt;sha&gt;</code></li>
      <li><strong>Punta del branch entera</strong>: <code>git reset --hard ORIG_HEAD</code> (después de un merge/rebase malo)</li>
    </ul>
    <pre><code>git status
    git diff
    git log --oneline -5</code></pre>
    <p>Siempre ejecuta esos tres antes de cualquier undo destructivo. Muestran el árbol de trabajo, los cambios staged y el historial reciente; juntos te dicen qué undo es seguro.</p>
    <h2>Errores comunes</h2>
    <p>Confundir <code>revert</code> con <code>reset</code>. <em>Revert</em> añade; <em>reset</em> quita. Ejecutar <code>git reset --hard</code> con trabajo no commiteado, y luego darse cuenta de que lo necesitabas; busca el reflog inmediatamente, antes de que se ejecute la recolección de basura. Enmendar un commit pusheado y no coordinar el force-push con los compañeros. Usa <code>git revert</code> en historial compartido. Y finalmente, tratar <code>git checkout file</code> como seguro; en Git antiguo sobrescribe silenciosamente tus ediciones sin papelera de reciclaje. <code>git restore</code> moderno no es diferente; haz copia de seguridad si tienes dudas.</p>

- source_title: "Tagging releases"
  title: "Etiquetando releases"
  langcode: es
  body: |
    <h2>Introducción</h2>
    <p>Los tags son referencias nombradas a commits específicos. A diferencia de los branches, los tags no están destinados a moverse. Son perfectos para marcar releases (<code>v1.0.0</code>) y otros puntos históricos.</p>
    <h2>Dos tipos de tags</h2>
    <ul>
      <li><strong>Lightweight</strong>: solo una ref que apunta a un commit. Sin metadatos.</li>
      <li><strong>Anotados</strong>: un objeto Git completo con tagger, fecha, mensaje y firma GPG opcional. Usa estos para releases.</li>
    </ul>
    <h2>Creando tags</h2>
    <pre><code>git tag v1.0.0                          # lightweight
    git tag -a v1.0.0 -m "First stable release"   # anotado
    git tag -s v1.0.0 -m "Signed release"         # firmado GPG</code></pre>
    <p>Por defecto los tags se adjuntan a <code>HEAD</code>. Para etiquetar un commit específico:</p>
    <pre><code>git tag -a v0.9.0 a1b2c3d -m "Beta"</code></pre>
    <h2>Listando e inspeccionando</h2>
    <pre><code>git tag
    git tag -l "v1.*"
    git show v1.0.0
    git tag -l --format='%(refname:short) %(taggerdate:short) %(subject)'</code></pre>
    <h2>Pusheando tags</h2>
    <p>Los tags no se pushean por defecto:</p>
    <pre><code>git push origin v1.0.0
    git push origin --tags                # todos los tags
    git push --follow-tags                # solo tags alcanzables desde commits pusheados</code></pre>
    <p><code>--follow-tags</code> es el predeterminado recomendado para pipelines de release.</p>
    <h2>Eliminando tags</h2>
    <pre><code>git tag -d v1.0.0                     # local
    git push origin --delete v1.0.0       # remoto</code></pre>
    <h2>Haciendo checkout de un tag</h2>
    <pre><code>git switch --detach v1.0.0
    # o para basar un branch hotfix en un tag
    git switch -c hotfix/1.0.1 v1.0.0</code></pre>
    <h2>Verificando firmas</h2>
    <pre><code>git tag -v v1.0.0</code></pre>
    <p>Requiere la clave pública del tagger en tu GPG keyring.</p>
    <h2>Describiendo builds con git describe</h2>
    <p>Una vez que tu repo tenga tags anotados, <code>git describe</code> produce identificadores de build estables que combinan el último tag, la distancia y el SHA abreviado:</p>
    <pre><code>git describe
    # v1.2.3-7-gabc1234
    git describe --always --dirty
    # v1.2.3-7-gabc1234-dirty</code></pre>
    <p>El sufijo <code>--dirty</code> aparece si el árbol de trabajo tiene cambios no commiteados; <code>--always</code> recurre a un SHA simple cuando no hay tag alcanzable. Los pipelines de CI a menudo embeben esta cadena en los binarios para hacer trivial la solución de problemas en reportes de campo.</p>
    <h2>Políticas de etiquetado</h2>
    <p>Para proyectos con soporte a largo plazo, decide y documenta:</p>
    <ul>
      <li>Esquema de nombres: <code>v1.2.3</code>, <code>release-2025-04</code>, <code>1.2.3</code> (sin prefijo)?</li>
      <li>Anotados o firmados?</li>
      <li>Quién puede pushear tags? Muchos hosts te permiten proteger nombres de tags con patrones.</li>
      <li>Cuál es la fuente de verdad: solo tags-en-main, o branches de release con sus propios tags?</li>
    </ul>
    <pre><code>git for-each-ref --sort=-creatordate --format='%(refname:short) %(creatordate:short)' refs/tags | head</code></pre>
    <p>Elige un esquema y apégate a él; el historial de tags es más difícil de migrar que el historial de commits.</p>
    <h2>Errores comunes</h2>
    <p>Usar tags lightweight para releases. Carecen de fecha, autor y mensaje, lo que hace dolorosos los registros de auditoría. Siempre usa <code>-a</code> o <code>-s</code> para releases. Mover un tag después de que se ha publicado; los usuarios downstream no recogerán el cambio limpiamente. Crea un nuevo tag (p.ej. <code>v1.0.1</code>) en su lugar. Olvidar pushear tags y preguntarte por qué tu página de release está vacía; recuerda <code>git push --tags</code> o <code>--follow-tags</code>. Finalmente, nombrar tags con caracteres que entran en conflicto con refs (un tag y un branch llamados <code>release</code> crearán ambigüedad); usa una convención clara como <code>v&lt;semver&gt;</code> para releases.</p>

- source_title: "Git on the command line: tips for new users"
  title: "Git en la línea de comandos: consejos para usuarios nuevos"
  langcode: es
  body: |
    <h2>Introducción</h2>
    <p>Git recompensa la fluidez en línea de comandos. Unos pocos hábitos pequeños hacen el trabajo diario dramáticamente más rápido y seguro. Esta página recopila los consejos de mayor impacto para usuarios nuevos.</p>
    <h2>Siempre sabe dónde estás</h2>
    <p>Añade el status de Git a tu prompt de shell. Bash y Zsh ambos incluyen scripts contrib:</p>
    <pre><code># bash
    source /usr/share/git/completion/git-prompt.sh
    PS1='\w$(__git_ps1 " (%s)")\$ '

    # zsh con oh-my-zsh: habilita el plugin git en ~/.zshrc</code></pre>
    <p>Ahora el branch actual y el estado sucio son visibles en todo momento.</p>
    <h2>Tab completion</h2>
    <p>Git incluye <code>git-completion.bash</code>; la mayoría de los gestores de paquetes lo instalan automáticamente. Tab-completa comandos, branches, remotos y refs:</p>
    <pre><code>git che&lt;TAB&gt;
    git switch fea&lt;TAB&gt;</code></pre>
    <h2>Alias que valen la pena</h2>
    <pre><code>git config --global alias.s "status -sb"
    git config --global alias.lg "log --oneline --graph --decorate --all"
    git config --global alias.co switch
    git config --global alias.last "log -1 HEAD --stat"
    git config --global alias.unstage "restore --staged"</code></pre>
    <h2>Status más corto</h2>
    <pre><code>git status -sb</code></pre>
    <p>La forma <code>-sb</code> es de dos columnas e incluye info de seguimiento del branch; perfecto para verificaciones rápidas.</p>
    <h2>Mejores diffs</h2>
    <pre><code>git diff --word-diff
    git diff --color-words
    git config --global diff.colorMoved zebra</code></pre>
    <p><code>colorMoved=zebra</code> resalta bloques de código movidos de manera diferente a los añadidos/eliminados, haciendo más fácil revisar refactors.</p>
    <h2>Entorno útil</h2>
    <ul>
      <li>Establece <code>GIT_PAGER=less -FRX</code> para paginación razonable.</li>
      <li>Establece <code>EDITOR</code> a algo del que sepas salir.</li>
      <li>Usa un asistente de credenciales: <code>git config --global credential.helper cache</code> en Linux, <code>osxkeychain</code> en macOS, <code>manager</code> en Windows.</li>
    </ul>
    <h2>Valores predeterminados seguros</h2>
    <pre><code>git config --global pull.ff only
    git config --global push.autoSetupRemote true
    git config --global fetch.prune true
    git config --global rerere.enabled true</code></pre>
    <p><code>rerere</code> ("reuse recorded resolution") recuerda cómo resolviste un conflicto y lo replica la próxima vez.</p>
    <h2>Leyendo el historial de commits a velocidad</h2>
    <p>Dos trucos de visualización pagan diariamente:</p>
    <pre><code>git log --oneline --graph --all --decorate
    git log -p --follow path/to/file
    git show HEAD --stat
    git diff @{u}                  # vs upstream
    git diff @{1.day.ago}          # vs HEAD hace un día</code></pre>
    <p>Cada comando Git que toma un commit acepta la misma sintaxis de revisión: nombres de branches, SHAs, <code>HEAD~3</code>, <code>@{upstream}</code>, <code>@{2.hours.ago}</code>, <code>tag^{commit}</code>. Apréndela una vez vía <code>git help gitrevisions</code> y úsala en todas partes.</p>
    <h2>Errores comunes</h2>
    <p>Copiar y pegar comandos largos de blogs sin entenderlos; lee <code>git help &lt;cmd&gt;</code> para cualquier flag desconocido. Aliasar comandos destructivos a nombres cortos (<code>r = reset --hard</code>) y dispararlos por accidente; reserva los alias cortos para operaciones seguras. Ignorar el tab-completion de la shell y escribir nombres de branches a mano, con todos los typos que eso implica. Finalmente, nunca pegues salida de shell en un mensaje de commit esperando que se renderice como código; usa un bloque de código en tu editor o commitea un archivo en su lugar. Los pequeños hábitos se acumulan; invierte una tarde configurando tu shell y cosecha años de beneficio.</p>

- source_title: "The object model: blobs, trees, commits, tags"
  title: "El modelo de objetos: blobs, trees, commits, tags"
  langcode: es
  body: |
    <h2>Introducción</h2>
    <p>El repositorio de Git es, en esencia, un <em>almacén de objetos direccionado por contenido</em>. Hay exactamente cuatro tipos de objetos: <strong>blob</strong>, <strong>tree</strong>, <strong>commit</strong> y <strong>tag</strong>. Cada operación eventualmente toca alguno de ellos. Entender estos cuatro tipos desmitifica la mayor parte de Git.</p>
    <h2>Blobs</h2>
    <p>Un blob almacena el contenido de un archivo, nada más. Sin nombre, sin permisos, sin historial. Dos archivos con contenido idéntico comparten un blob, sin importar dónde vivan en el árbol.</p>
    <pre><code>echo "hello" | git hash-object --stdin
    # ce013625030ba8dba906f756967f9e9ca394464a</code></pre>
    <h2>Trees</h2>
    <p>Un tree es un listado de directorio: un conjunto ordenado de entradas <code>(mode, type, sha, name)</code>. Los subdirectorios son ellos mismos trees, recursivamente. Cada commit apunta a exactamente un tree raíz.</p>
    <pre><code>git ls-tree HEAD
    # 100644 blob a1b2... README.md
    # 040000 tree c3d4... src</code></pre>
    <h2>Commits</h2>
    <p>Un objeto commit contiene:</p>
    <ul>
      <li>Un puntero a un tree raíz.</li>
      <li>Cero o más commits padre (cero para la raíz, dos o más para merges).</li>
      <li>Author y committer con timestamps.</li>
      <li>Un mensaje.</li>
      <li>Firma GPG/SSH opcional.</li>
    </ul>
    <pre><code>git cat-file -p HEAD
    # tree 9f1a...
    # parent b2c3...
    # author Ada &lt;ada@example.com&gt; 1714300000 +0000
    # committer Ada &lt;ada@example.com&gt; 1714300000 +0000
    #
    # Add greeting</code></pre>
    <h2>Tags</h2>
    <p>Un tag anotado es su propio objeto que apunta a otro objeto (casi siempre un commit), con info del tagger y un mensaje. Los tags lightweight son solo refs y no tienen objeto.</p>
    <pre><code>git cat-file -t v1.0.0
    # tag
    git cat-file -p v1.0.0</code></pre>
    <h2>Juntándolo todo</h2>
    <p>Recorre el tree de un commit manualmente:</p>
    <pre><code>git cat-file -p HEAD^{tree}
    git cat-file -p HEAD^{tree}:src
    git cat-file -p HEAD:README.md</code></pre>
    <p>El peeling <code>^{tree}</code> y la sintaxis <code>commit:path</code> son cómo todas las herramientas de Git navegan.</p>
    <h2>Almacenamiento</h2>
    <p>Cada objeto se comprime con zlib y se direcciona por el SHA-1 (o SHA-256) de su contenido sin comprimir más una cabecera. El contenido idéntico, en cualquier punto del historial, se deduplica automáticamente.</p>
    <h2>Modos de entrada de tree</h2>
    <p>El campo mode en una entrada de tree es un pequeño conjunto de modos de archivo tipo POSIX:</p>
    <ul>
      <li><code>100644</code>: archivo regular no ejecutable (blob).</li>
      <li><code>100755</code>: archivo ejecutable (blob).</li>
      <li><code>120000</code>: enlace simbólico (blob cuyo contenido es el destino).</li>
      <li><code>040000</code>: subdirectorio (tree).</li>
      <li><code>160000</code>: gitlink (referencia de submódulo a un SHA de commit).</li>
    </ul>
    <pre><code>git ls-tree HEAD
    git update-index --chmod=+x scripts/run.sh
    git ls-tree HEAD scripts/</code></pre>
    <p>Git es intencionalmente limitado; permisos arbitrarios y propiedad no se almacenan.</p>
    <h2>Errores comunes</h2>
    <p>Creer que Git almacena diffs. No lo hace; almacena instantáneas completas, deduplicadas por hash y luego comprimidas con delta en pack files. Confundir trees con directorios en disco; los trees son objetos inmutables. Confundir tags lightweight con anotados; solo los tags anotados llevan metadatos y firmas. Finalmente, esperar que renombrar un archivo cambie el blob; el blob es el mismo, solo cambia la entrada del nombre en el tree. Pasa diez minutos con <code>git cat-file -p</code> en un repositorio real y el modelo se vuelve segunda naturaleza.</p>

- source_title: "Content-addressed storage: SHA-1 and SHA-256"
  title: "Almacenamiento direccionado por contenido: SHA-1 y SHA-256"
  langcode: es
  body: |
    <h2>Introducción</h2>
    <p>Git nombra cada objeto por el hash criptográfico de su contenido. Esto es almacenamiento <em>direccionado por contenido</em>: el nombre <em>es</em> la huella digital del contenido. El hash predeterminado es SHA-1 (160 bits, 40 caracteres hex). El soporte SHA-256 existe experimentalmente desde Git 2.29.</p>
    <h2>Cómo se calcula un hash</h2>
    <p>Git antepone una cabecera de la forma <code>&lt;type&gt; &lt;size&gt;\0</code> al contenido crudo, luego hashea:</p>
    <pre><code>printf 'blob 6\0hello\n' | sha1sum
    # ce013625030ba8dba906f756967f9e9ca394464a  -</code></pre>
    <p>El mismo valor sale de <code>git hash-object</code>:</p>
    <pre><code>printf 'hello\n' | git hash-object --stdin
    # ce013625030ba8dba906f756967f9e9ca394464a</code></pre>
    <h2>Por qué direccionar por contenido</h2>
    <ul>
      <li><strong>Deduplicación</strong>: contenido idéntico almacenado una vez.</li>
      <li><strong>Integridad</strong>: cualquier corrupción cambia el hash, instantáneamente detectable.</li>
      <li><strong>Reproducibilidad</strong>: el mismo tree siempre tiene el mismo nombre.</li>
      <li><strong>Sincronización distribuida</strong>: Git puede preguntar "¿tienes <code>abc123</code>?" sin explicar qué es.</li>
    </ul>
    <h2>Hashes abreviados</h2>
    <p>Git acepta el prefijo no ambiguo más corto, normalmente 7 caracteres. A medida que un repo crece, pueden necesitarse más dígitos:</p>
    <pre><code>git rev-parse --short HEAD
    git rev-parse --short=12 HEAD
    git config --global core.abbrev 12</code></pre>
    <h2>SHA-1 versus SHA-256</h2>
    <p>SHA-1 tiene ataques de colisión conocidos (SHAttered, 2017). El proyecto Git respondió con SHA-256 como formato de objeto alternativo. Para crear un repo SHA-256:</p>
    <pre><code>git init --object-format=sha256</code></pre>
    <p>Nota: los repos SHA-1 y SHA-256 aún no pueden interoperar; el soporte de herramientas y hosting aún está madurando a fecha de Git 2.45+. Por ahora, la mayoría de proyectos continúan con SHA-1, aumentado con la implementación SHA-1 endurecida con detección de colisiones de Git.</p>
    <h2>Verificando integridad</h2>
    <pre><code>git fsck --full
    git fsck --strict</code></pre>
    <p><code>git fsck</code> recalcula hashes para cada objeto y reporta cualquier discrepancia.</p>
    <h2>Inspeccionando un objeto</h2>
    <pre><code>git cat-file -t &lt;sha&gt;       # tipo
    git cat-file -s &lt;sha&gt;       # tamaño
    git cat-file -p &lt;sha&gt;       # contenido formateado</code></pre>
    <h2>SHA-1 endurecido</h2>
    <p>Desde 2017 Git se distribuye con una implementación SHA-1 "detectora de colisiones" (<code>sha1dc</code>) que reconoce el patrón SHAttered publicado y se rehúsa a hashear tales entradas. Esto hace los ataques prácticos contra repositorios Git esencialmente imposibles sin descubrir una nueva técnica de colisión. El costo es una pequeña ralentización al hashear; puedes optar por el SHA-1 estándar de OpenSSL con <code>./configure --with-openssl-sha1</code> al compilar desde el código fuente, pero pocos usuarios tienen razón para hacerlo.</p>
    <pre><code>git --version --build-options 2&gt;&amp;1 | grep -i sha</code></pre>
    <h2>Errores comunes</h2>
    <p>Preocuparse de que las colisiones SHA-1 comprometan tu repo. Los ataques conocidos requieren entradas elaboradas; Git adicionalmente detecta el patrón de colisión publicado. El riesgo pragmático para un proyecto normal es esencialmente cero. Truncar hashes muy agresivamente en scripts; en un repo con un millón de objetos, 7 caracteres pueden colisionar. Usa <code>git rev-parse --short</code> para que Git elija. Editar archivos de objeto directamente bajo <code>.git/objects</code>; eso rompe la invariante de direccionamiento por contenido y corrompe el repo. Todas las escrituras deben ir a través del plumbing de Git.</p>

- source_title: "References: refs, HEAD, branches, and tags"
  title: "Referencias: refs, HEAD, branches y tags"
  langcode: es
  body: |
    <h2>Introducción</h2>
    <p>Los objetos son inmutables y nombrados por hash. Las <em>referencias</em> son los nombres mutables y legibles que apuntan a ellos. Cada branch, tag, branch de seguimiento remoto y HEAD es una ref.</p>
    <h2>Dónde viven las refs</h2>
    <p>Las refs son archivos (o entradas en el archivo packed-refs) bajo <code>.git/refs/</code>:</p>
    <ul>
      <li><code>.git/refs/heads/&lt;name&gt;</code>: branches locales.</li>
      <li><code>.git/refs/tags/&lt;name&gt;</code>: tags.</li>
      <li><code>.git/refs/remotes/&lt;remote&gt;/&lt;name&gt;</code>: branches de seguimiento remoto.</li>
      <li><code>.git/HEAD</code>: la ref actual.</li>
    </ul>
    <p>Cada ref no simbólica es un archivo de una línea que contiene un hash:</p>
    <pre><code>cat .git/refs/heads/main
    # a1b2c3d4...</code></pre>
    <h2>Listando refs</h2>
    <pre><code>git for-each-ref
    git for-each-ref refs/tags/
    git for-each-ref --format='%(refname:short) %(objectname:short) %(subject)'
    git show-ref</code></pre>
    <h2>Refs simbólicas</h2>
    <p>Una ref simbólica apunta a otra ref en lugar de a un hash. <code>HEAD</code> es el ejemplo canónico:</p>
    <pre><code>cat .git/HEAD
    # ref: refs/heads/main
    git symbolic-ref HEAD
    git symbolic-ref refs/remotes/origin/HEAD</code></pre>
    <h2>Leyendo refs de forma segura</h2>
    <p>Siempre pasa por plumbing en lugar de leer archivos:</p>
    <pre><code>git rev-parse HEAD
    git rev-parse main
    git rev-parse origin/main
    git rev-parse v1.0.0^{commit}</code></pre>
    <p>El plumbing maneja packed refs, refs simbólicas y búsquedas de refs uniformemente.</p>
    <h2>Actualizando refs</h2>
    <pre><code>git update-ref refs/heads/feature/login &lt;sha&gt;
    git update-ref -d refs/heads/feature/login           # eliminar
    git update-ref refs/heads/feature/login &lt;new&gt; &lt;old&gt; # CAS</code></pre>
    <p>La forma de tres argumentos es compare-and-set; rechaza si el valor actual difiere.</p>
    <h2>Packed refs</h2>
    <p>Por rendimiento, Git puede empaquetar muchas refs en un solo archivo <code>.git/packed-refs</code>. <code>git pack-refs --all</code> hace esto; las escrituras futuras siguen yendo a archivos sueltos hasta el próximo pack.</p>
    <h2>Sintaxis de refspec</h2>
    <p>Los remotos usan <em>refspecs</em> para mapear entre refs locales y remotas:</p>
    <pre><code>+refs/heads/*:refs/remotes/origin/*</code></pre>
    <p>El <code>+</code> inicial significa "force update". Esta única línea es lo que hace que <code>git fetch</code> popule <code>refs/remotes/origin/</code>.</p>
    <h2>El backend reftable</h2>
    <p>Git moderno (2.45+) incluye un formato alternativo de almacenamiento de refs llamado <em>reftable</em>, originalmente desarrollado para JGit. Reftable almacena millones de refs eficientemente en un formato binario log-estructurado y soporta transacciones atómicas a través de muchas refs a la vez. Habilítalo en un nuevo repo:</p>
    <pre><code>git init --ref-format=reftable
    git rev-parse --show-ref-format</code></pre>
    <p>Para la mayoría de usuarios el formato clásico loose+packed sigue siendo válido. Reftable brilla en servidores y en monorepos enormes con cientos de miles de refs (p.ej., una ref por pull request).</p>
    <h2>Jerarquías de refs personalizadas</h2>
    <p>Las refs no tienen que vivir bajo los cuatro namespaces estándar. Las herramientas que necesitan sus propios nombres usan jerarquías personalizadas bajo <code>refs/</code>:</p>
    <ul>
      <li><code>refs/notes/*</code>: <code>git notes</code>.</li>
      <li><code>refs/stash</code>: <code>git stash</code>.</li>
      <li><code>refs/replace/*</code>: <code>git replace</code>.</li>
      <li><code>refs/bisect/*</code>: estado de <code>git bisect</code>.</li>
      <li><code>refs/pull/*/head</code> y <code>refs/merge-requests/*/head</code>: proveedores de hosting.</li>
    </ul>
    <pre><code>git for-each-ref refs/notes/
    git for-each-ref refs/replace/</code></pre>
    <p>Puedes crear las tuyas propias mientras el nombre sea una ref válida (sin puntos dobles, sin espacios, sin guión inicial).</p>
    <h2>Errores comunes</h2>
    <p>Editar archivos de ref a mano y terminar con un problema de salto de línea final o un archivo escrito a medias. Usa <code>git update-ref</code>. Confundir <code>refs/heads/main</code>, <code>main</code> y <code>refs/main</code>; <code>git rev-parse --symbolic-full-name</code> resuelve cualquier nombre corto a su forma canónica. Nombrar un branch y un tag de forma idéntica; las herramientas entonces prefieren el tag, llevando a confusión sutil. Finalmente, eliminar <code>.git/packed-refs</code> para "limpiar"; elimina las refs que no estaban también sueltas. Siempre pasa por Git.</p>

- source_title: "The index (staging area) in depth"
  title: "El index (área de staging) en profundidad"
  langcode: es
  body: |
    <h2>Introducción</h2>
    <p>El index es un archivo binario en <code>.git/index</code> que refleja un objeto tree: una lista ordenada de paths con mode, hash e información stat. Es el área de staging para el próximo commit y un caché que permite a Git saltarse el rehasheo de archivos sin cambios.</p>
    <h2>Inspeccionándolo</h2>
    <pre><code>git ls-files --stage
    # 100644 a1b2c3...  0  README.md
    # 100644 e4f5g6...  0  src/main.c</code></pre>
    <p>El stage 0 significa "sin conflicto". Durante un merge, los paths conflictivos obtienen los stages 1 (base), 2 (ours), 3 (theirs).</p>
    <h2>Qué te aporta el caché de stat</h2>
    <p>El index también almacena ctime, mtime, size e inode para cada path. <code>git status</code> compara estos con el árbol de trabajo antes de hashear; si coinciden, se asume que el archivo no ha cambiado. Por eso <code>git status</code> es rápido en árboles enormes.</p>
    <pre><code>git update-index --refresh
    git update-index --really-refresh</code></pre>
    <h2>Modificando el index</h2>
    <pre><code>git add file.txt                  # stagear desde árbol de trabajo
    git rm --cached file.txt          # quitar del index, mantener en disco
    git restore --staged file.txt     # quitar del staging
    git update-index --chmod=+x bin/run   # cambiar bit de ejecutable</code></pre>
    <h2>Assume unchanged y skip-worktree</h2>
    <p>Dos flags le dicen a Git que ignore ciertos paths:</p>
    <pre><code>git update-index --assume-unchanged config.local
    git update-index --skip-worktree config.local</code></pre>
    <ul>
      <li><code>assume-unchanged</code>: una pista de rendimiento; Git aún puede notar cambios.</li>
      <li><code>skip-worktree</code>: más fuerte; pensado para archivos que el usuario mantiene modificados localmente.</li>
    </ul>
    <p>Ninguno reemplaza a <code>.gitignore</code>; ambos son hacks locales del workspace, no compartibles.</p>
    <h2>Leyendo y escribiendo trees</h2>
    <pre><code>git write-tree                # snapshot del index como objeto tree
    git read-tree HEAD            # resetear index a un tree
    git read-tree --reset -u HEAD # también actualizar árbol de trabajo</code></pre>
    <p>Estos comandos plumbing son la base de <code>commit</code>, <code>checkout</code> y <code>merge</code>.</p>
    <h2>Conflictos en el index</h2>
    <p>Durante un merge, el index se vuelve la fuente de verdad para lo que está sin resolver:</p>
    <pre><code>git ls-files -u
    # 100644 a1...  1  src/main.c
    # 100644 b2...  2  src/main.c
    # 100644 c3...  3  src/main.c</code></pre>
    <p>Resolver un conflicto significa escribir el contenido final y hacerle <code>git add</code>, colapsando de vuelta a una sola entrada de stage 0.</p>
    <h2>Sparse checkout y el sparse index</h2>
    <p>Sparse checkout popula el árbol de trabajo con solo un subconjunto del tree del repositorio, útil en monorepos. Con cone mode más el sparse index, el index mismo se reduce al cono activo, haciendo las operaciones en repos enormes rápidas:</p>
    <pre><code>git sparse-checkout init --cone
    git sparse-checkout set src/myteam docs
    git sparse-checkout list
    git sparse-checkout disable</code></pre>
    <p>El sparse index marca las entradas omitidas con un bit especial para que Git pueda expandirlas perezosamente solo cuando los comandos lo necesiten. Esta característica requiere Git 2.32 o más reciente para funcionalidad completa.</p>
    <h2>Errores comunes</h2>
    <p>Creer que el index es solo "lo que está staged". También es un caché y un rastreador de conflictos. Eliminar <code>.git/index</code> cuando estás atascado; reconstruye con <code>git read-tree HEAD</code>, pero pierdes cualquier staging no commiteado. Usar <code>--assume-unchanged</code> como sustituto de <code>.gitignore</code>; el próximo clon no lo respetará. Finalmente, esperar que el index rastree directorios vacíos; no puede. Usa un archivo placeholder (<code>.gitkeep</code>) si necesitas commitear una carpeta vacía.</p>

- source_title: "Branches as lightweight pointers"
  title: "Branches como punteros ligeros"
  langcode: es
  body: |
    <h2>Introducción</h2>
    <p>En Git, un branch es solo una referencia móvil a un commit. Crear un branch es crear un archivo de 41 bytes. Comparado con sistemas centralizados donde los branches son copias completas de directorio, el modelo de Git hace el branching lo suficientemente barato para usarlo casualmente.</p>
    <h2>Qué es realmente un branch</h2>
    <pre><code>cat .git/refs/heads/main
    # a1b2c3d4e5f6...
    git rev-parse main</code></pre>
    <p>Ese hash es la <em>punta</em> del branch. El "branch" en sí es la cadena de commits alcanzables desde la punta vía punteros padre.</p>
    <h2>Creando branches</h2>
    <pre><code>git branch feature/login           # crear, no cambiar
    git switch -c feature/login        # crear y cambiar
    git switch -c hotfix v1.2.3        # desde un tag
    git branch fixup HEAD~3            # desde una ref relativa</code></pre>
    <h2>Moviendo la punta</h2>
    <p>Cada commit en el branch actual avanza su punta en uno. Los comandos que mueven puntas incluyen <code>commit</code>, <code>merge</code>, <code>rebase</code>, <code>reset</code> y <code>cherry-pick</code>.</p>
    <pre><code>git commit -m "Work"           # main avanza
    git reset --hard HEAD~2        # main retrocede; los commits se vuelven inalcanzables</code></pre>
    <h2>Branches y alcanzabilidad</h2>
    <p>Un commit está "vivo" mientras alguna ref llegue a él. Elimina cada branch y tag que apunte a un commit y se vuelve <em>colgante</em>; el recolector de basura de Git eventualmente lo elimina.</p>
    <pre><code>git fsck --unreachable
    git gc</code></pre>
    <h2>Rastreando upstream</h2>
    <p>Un branch local puede vincularse a un branch de seguimiento remoto:</p>
    <pre><code>git branch --set-upstream-to=origin/main main
    git branch -u origin/main
    git status            # muestra ahead/behind basado en el vínculo</code></pre>
    <h2>Mantenimiento de branches</h2>
    <pre><code>git branch --merged main           # branches completamente mergeados
    git branch --no-merged main        # branches con trabajo no mergeado
    git branch -d feature/old          # eliminar mergeado
    git branch -D feature/discarded    # forzar eliminación</code></pre>
    <h2>Comparando branches</h2>
    <pre><code>git log main..feature/login --oneline
    git diff main...feature/login
    git range-diff main..@{u} main..HEAD</code></pre>
    <p><code>range-diff</code> es excelente para comparar dos versiones de un branch rebaseado.</p>
    <h2>Políticas de branch en hosts</h2>
    <p>La mayoría de las plataformas de hosting te permiten proteger branches por patrón de nombre: requerir pull requests, commits firmados, CI verde o reviewers específicos antes de aceptar un push. El lado de Git de esto se implementa vía hooks <code>pre-receive</code>; el lado de la plataforma es configuración. Desde tu clon local, la protección de branch es invisible hasta que tu push es rechazado, momento en el cual el servidor explica por qué. Para inspeccionar la protección desde la línea de comandos, usa la CLI del host (<code>gh</code>, <code>glab</code>) o su API.</p>
    <pre><code>gh api repos/owner/repo/branches/main/protection</code></pre>
    <h2>Errores comunes</h2>
    <p>Imaginar los branches como contenedores de commits. No lo son; los commits existen independientemente y muchos branches pueden alcanzar el mismo commit. Eliminar un branch "feature" y asumir que los commits se han ido; se han ido solo después de que se vuelven inalcanzables <em>y</em> el reflog expira (90 días por defecto). Usar nombres de branch de una palabra que colisionan con nombres de archivo; los separadores <code>--</code> evitan la ambigüedad. Finalmente, trabajar directamente en <code>main</code> en un repo compartido; siempre crea un branch para trabajo no trivial, incluso si planeas hacer fast-forward después.</p>

- source_title: "Merging: fast-forward vs three-way merge"
  title: "Merging: fast-forward vs merge three-way"
  langcode: es
  body: |
    <h2>Introducción</h2>
    <p>Git tiene dos resultados de merge fundamentalmente diferentes: <strong>fast-forward</strong>, donde la punta de un branch simplemente se mueve, y <strong>three-way</strong>, donde se crea un nuevo commit con dos padres. La elección depende de si los branches han divergido.</p>
    <h2>Fast-forward</h2>
    <p>Si la punta de <code>main</code> es ancestro de <code>feature</code>, no se necesita un merge real. Git solo mueve <code>main</code> hacia adelante:</p>
    <pre><code>      A---B---C   feature
         /
    main

    # después de git merge feature
    A---B---C   main, feature</code></pre>
    <p>Comando:</p>
    <pre><code>git switch main
    git merge feature</code></pre>
    <p>Para forzar un merge commit real incluso cuando es posible fast-forward:</p>
    <pre><code>git merge --no-ff feature</code></pre>
    <h2>Merge three-way</h2>
    <p>Cuando ambos branches han divergido, Git encuentra la <em>merge base</em> (el ancestro común más reciente) y combina los cambios de ambos lados:</p>
    <pre><code>      A---B---C   feature
         /
    A---D---E   main

    # después de git merge feature
    A---D---E---M   main
         \     /
          B---C   feature</code></pre>
    <p>La estrategia de merge predeterminada de Git desde 2.33 es <code>ort</code>; antes era <code>recursive</code>. Ambas calculan un merge three-way por archivo usando la merge base.</p>
    <h2>Inspeccionando</h2>
    <pre><code>git merge-base main feature
    git log --oneline --graph --all
    git show --stat HEAD          # ver el merge commit</code></pre>
    <h2>Estrategias y opciones</h2>
    <pre><code>git merge -X ours feature        # preferir nuestro lado en conflictos
    git merge -X theirs feature      # preferir su lado
    git merge -X ignore-space-change feature
    git merge --squash feature       # aplicar cambios sin merge commit</code></pre>
    <p><code>--squash</code> crea un solo commit que contiene todos los cambios de <code>feature</code>, sin enlace de padre a él. Útil para historial ordenado pero pierde el detalle por commit.</p>
    <h2>Abortando y deshaciendo</h2>
    <pre><code>git merge --abort                # a mitad de merge, volver al estado pre-merge
    git reset --hard ORIG_HEAD       # después de un merge terminado, deshacerlo</code></pre>
    <h2>Configurando política fast-forward</h2>
    <pre><code>git config --global merge.ff false      # siempre crear merge commit
    git config --global merge.ff only      # solo fast-forward, rechazar de lo contrario
    git config --global pull.ff only       # igual para pulls</code></pre>
    <h2>Drivers de merge y atributos</h2>
    <p>Algunos archivos se mergean mal con three-way basado en texto (lockfiles generados por máquina, documentación generada). Configura un driver de merge personalizado vía <code>.gitattributes</code> y <code>git config</code>:</p>
    <pre><code># .gitattributes
    package-lock.json merge=ours
    Gemfile.lock merge=union</code></pre>
    <pre><code>git config merge.ours.driver true
    git config merge.union.name "Line union merge"
    git config merge.union.driver "git merge-file --union %A %O %B"</code></pre>
    <p>La estrategia integrada <code>union</code> mantiene ambos lados; <code>ours</code> siempre elige nuestra versión; los drivers personalizados pueden ejecutar cualquier programa. Úsalos con moderación; comportamiento de merge sorprendente confunde a los reviewers.</p>
    <h2>Errores comunes</h2>
    <p>Creer que fast-forward es de alguna manera especial o arriesgado; no lo es, es solo un movimiento de puntero. Usar <code>--no-ff</code> en cada merge en un proyecto de movimiento rápido, contaminando el historial con merge commits vacíos. Usar <code>-X ours</code> cuando querías <code>--strategy=ours</code> (que descarta el otro lado por completo) o viceversa. Finalmente, editar manualmente el mensaje de merge commit después del hecho y romper la redacción estandarizada "Merge branch 'X'" en la que las herramientas se basan; si debes editarlo, hazlo antes de <code>git commit</code>.</p>

- source_title: "The reflog: your safety net"
  title: "El reflog: tu red de seguridad"
  langcode: es
  body: |
    <h2>Introducción</h2>
    <p>El <em>reflog</em> registra cada cambio a <code>HEAD</code> y a la punta de cada branch en tu máquina local. Es local, por clon y no se pushea. Casi cualquier commit "perdido" puede rescatarse a través de él.</p>
    <h2>Viendo</h2>
    <pre><code>git reflog                            # reflog de HEAD
    git reflog show main                  # reflog de main
    git reflog --date=iso
    git log -g --oneline                  # log walk a través del reflog</code></pre>
    <p>Cada entrada tiene una secuencia (<code>HEAD@{0}</code>, <code>HEAD@{1}</code>, ...), una acción (<code>commit</code>, <code>reset</code>, <code>merge</code>, <code>rebase</code>, ...) y un SHA destino.</p>
    <h2>Recuperando un commit perdido</h2>
    <pre><code>git reflog
    # 9f8a1c2 HEAD@{0}: reset: moving to HEAD~3
    # a1b2c3d HEAD@{1}: commit: Important work
    git switch -c rescued a1b2c3d</code></pre>
    <p>O directamente:</p>
    <pre><code>git reset --hard HEAD@{1}</code></pre>
    <h2>Sintaxis basada en tiempo</h2>
    <pre><code>git show HEAD@{2.hours.ago}
    git diff main@{yesterday} main</code></pre>
    <p>Git interpreta <code>@{...}</code> como un conteo o una fecha.</p>
    <h2>Expiración del reflog</h2>
    <p>Por defecto, las entradas alcanzables del reflog expiran después de 90 días, y las inalcanzables después de 30:</p>
    <pre><code>git config gc.reflogExpire 90.days
    git config gc.reflogExpireUnreachable 30.days</code></pre>
    <p>Hasta la expiración, incluso los commits hard-reseteados permanecen recuperables.</p>
    <h2>Reflogs por ref</h2>
    <p>Cada branch tiene su propio reflog en <code>.git/logs/refs/heads/&lt;name&gt;</code>. Stash también tiene uno (<code>refs/stash</code>):</p>
    <pre><code>git reflog show stash</code></pre>
    <h2>Podando el reflog</h2>
    <pre><code>git reflog expire --expire=now --all
    git gc --prune=now</code></pre>
    <p>Úsalo solo si necesitas eliminar permanentemente datos; esto remueve la red de seguridad.</p>
    <h2>Reflog vs git log</h2>
    <p><code>git log</code> recorre el grafo de commits por punteros padre; el reflog recorre los movimientos registrados de una ref. Después de un force-reset, <code>git log</code> ya no muestra los commits abandonados, pero el reflog aún los muestra.</p>
    <h2>Inspección de reflog por ref</h2>
    <p>Cada ref mantiene su propio reflog. Inspecciona el reflog de un branch específico para ver cómo se movió su punta:</p>
    <pre><code>git reflog show feature/login
    git log -g feature/login --oneline
    cat .git/logs/refs/heads/feature/login</code></pre>
    <p>Útil al investigar "¿quién movió este branch?" en un clon local. El formato del archivo de reflog es una línea por cambio con SHA viejo, SHA nuevo, committer, timestamp y un mensaje textual. Combinado con <code>git blame</code> en el archivo, da una pista de auditoría local completa; recuerda que los reflogs no se pushean, así que la pista cubre solo tu máquina.</p>
    <h2>Errores comunes</h2>
    <p>Olvidar que el reflog existe en pánico y rehacer horas de trabajo que era fácilmente recuperable. Siempre verifica <code>git reflog</code> primero. Pushear durante la recuperación y asumir que el reflog está en el servidor; no lo está, solo tu clon local lo tiene. Ejecutar <code>git gc --prune=now</code> por instinto de "limpieza" y destruir la red de seguridad para cualquier commit no referenciado. Y finalmente, tratar las entradas del reflog como eternas; las refs eliminadas hace mucho expiran. Etiqueta o branchea cualquier cosa que quieras conservar antes de que pasen 30 días.</p>

- source_title: "Detached HEAD state explained"
  title: "El estado HEAD desconectado explicado"
  langcode: es
  body: |
    <h2>Introducción</h2>
    <p>Normalmente <code>HEAD</code> apunta a una ref de branch, que a su vez apunta a un commit. En <em>HEAD desconectado</em>, <code>HEAD</code> apunta directamente a un commit. HEAD desconectado no está roto; es un modo deliberado que es útil para inspeccionar el historial y peligroso para commitear sin pensar.</p>
    <h2>Cómo llegas ahí</h2>
    <pre><code>git checkout v1.2.3
    git switch --detach v1.2.3
    git checkout HEAD~5
    git checkout origin/main      # remote-tracking es algo de solo lectura</code></pre>
    <p>Cada uno de estos pone a <code>HEAD</code> directamente en un commit en lugar de en un branch.</p>
    <h2>Inspeccionando</h2>
    <pre><code>cat .git/HEAD
    # a1b2c3d4...   (SHA crudo, no "ref: ...")
    git status
    # HEAD detached at v1.2.3</code></pre>
    <h2>Por qué existe</h2>
    <ul>
      <li>Inspeccionar un release antiguo sin afectar ningún branch.</li>
      <li>Bisecting (<code>git bisect</code> usa HEAD desconectado).</li>
      <li>Construir un experimento rápido que puedes descartar.</li>
      <li>Operar sobre un tag que debe permanecer inmovible.</li>
    </ul>
    <h2>Commiteando en HEAD desconectado</h2>
    <p>Puedes commitear en HEAD desconectado, y el objeto commit se crea normalmente. La trampa: ningún branch apunta a él. Cambia y el commit se vuelve inalcanzable.</p>
    <pre><code>git switch --detach v1.2.3
    echo fix > patch.txt
    git add patch.txt
    git commit -m "Quick fix"
    git switch main             # el nuevo commit es ahora huérfano</code></pre>
    <p>Áncalo antes de cambiar:</p>
    <pre><code>git switch -c hotfix/1.2.4</code></pre>
    <h2>Recuperando de un detach accidental</h2>
    <p>Si ya cambiaste, el reflog tiene el commit:</p>
    <pre><code>git reflog
    # a1b2c3d HEAD@{1}: commit: Quick fix
    git switch -c hotfix/1.2.4 a1b2c3d</code></pre>
    <h2>Cuando HEAD desconectado no está desconectado</h2>
    <p>Los repositorios bare a menudo tienen <code>HEAD</code> como una ref simbólica a <code>refs/heads/main</code> aunque no haya árbol de trabajo. Los submódulos también checkean intencionalmente HEAD desconectado en el commit registrado; eso es normal.</p>
    <h2>Configurando advertencias</h2>
    <pre><code>git config --global advice.detachedHead true   # predeterminado: mostrar consejo</code></pre>
    <p>Los principiantes deben dejar esto encendido; el texto de advertencia explica exactamente cómo recuperarse.</p>
    <h2>Trabajando de forma segura mientras estás desconectado</h2>
    <p>Si quieres experimentar intencionalmente sin afectar ningún branch, HEAD desconectado es la herramienta correcta. El truco es anclar el trabajo importante antes de cambiar. Un patrón confiable:</p>
    <pre><code>git switch --detach v1.2.3
    # ... experimentar, commitear ...
    git tag tmp/experiment           # marcador
    git switch main
    # más tarde
    git switch -c rescued tmp/experiment
    git tag -d tmp/experiment</code></pre>
    <p>El namespace de tags <code>tmp/</code> hace obvio que estos son anclajes desechables. Algunos equipos reservan un prefijo entero para este propósito y hacen que CI lo ignore.</p>
    <h2>Errores comunes</h2>
    <p>Tratar la advertencia como error aterrador y entrar en pánico. Es informativa. Hacer trabajo significativo en HEAD desconectado y luego ejecutar <code>git switch main</code> sin crear un branch primero; recupera vía reflog, pero mejor anclar primero. Confundir HEAD desconectado con un repo corrupto; nada está corrupto, solo te falta una etiqueta de branch. Finalmente, pushear mientras estás desconectado: <code>git push</code> necesita un branch en ambos extremos. O bien crea un branch local y púshealo, o usa <code>git push origin HEAD:refs/heads/new</code>.</p>

- source_title: "Remote-tracking branches"
  title: "Branches de seguimiento remoto"
  langcode: es
  body: |
    <h2>Introducción</h2>
    <p>Un branch de seguimiento remoto es una ref local que refleja un branch en un remoto. Viven bajo <code>refs/remotes/&lt;remote&gt;/</code> y se actualizan por <code>git fetch</code> (y operaciones que implican fetch, como <code>git pull</code> y <code>git clone</code>). No haces commit directamente a ellos.</p>
    <h2>De dónde vienen</h2>
    <p>El refspec predeterminado para <code>origin</code> es:</p>
    <pre><code>+refs/heads/*:refs/remotes/origin/*</code></pre>
    <p>Así que cuando el servidor tiene <code>refs/heads/main</code>, tu clon obtiene <code>refs/remotes/origin/main</code>. El <code>+</code> inicial significa "force update".</p>
    <h2>Listando</h2>
    <pre><code>git branch -r
    git branch -a                # local + remote-tracking
    git branch -vv               # mostrar upstream de los locales</code></pre>
    <h2>Vinculando un branch local a uno</h2>
    <pre><code>git switch feature/login                       # auto-crea local desde origin/feature/login
    git switch -c mine origin/feature/login        # explícito
    git branch -u origin/main                      # establecer upstream del branch actual
    git branch --unset-upstream</code></pre>
    <p>El vínculo <em>upstream</em> impulsa el ahead/behind de <code>git status</code>, y los destinos predeterminados para <code>git push</code> y <code>git pull</code>.</p>
    <h2>Podando</h2>
    <p>Los branches de seguimiento remoto no desaparecen cuando el branch remoto se elimina. Pódalos:</p>
    <pre><code>git fetch --prune
    git remote prune origin
    git config --global fetch.prune true</code></pre>
    <h2>El HEAD remoto especial</h2>
    <p>Cada remoto tiene un <code>HEAD</code> simbólico indicando su branch predeterminado:</p>
    <pre><code>git symbolic-ref refs/remotes/origin/HEAD
    git remote set-head origin --auto    # consultar al servidor</code></pre>
    <p>Esto es lo que hace que <code>origin</code> solo resuelva a <code>origin/main</code> (o cualquier predeterminado).</p>
    <h2>Diff contra un branch de seguimiento remoto</h2>
    <pre><code>git fetch
    git log HEAD..origin/main --oneline      # qué hay en upstream
    git log origin/main..HEAD --oneline      # qué es solo local
    git diff @{u}                            # vs upstream</code></pre>
    <p><code>@{u}</code> (o <code>@{upstream}</code>) es atajo para el upstream configurado del branch actual.</p>
    <h2>Comportamiento de push</h2>
    <p>El predeterminado <code>push.default = simple</code> pushea el branch actual a su upstream del mismo nombre. Si pusheas un branch sin upstream y tienes <code>push.autoSetupRemote = true</code> (Git 2.37+), el upstream se crea automáticamente.</p>
    <h2>Detalles de refspec</h2>
    <p>El refspec de fetch para un remoto puede personalizarse para descargar refs adicionales o para mapearlas de manera diferente. Por ejemplo, para también traer refs de PR de GitHub y refs de MR de GitLab:</p>
    <pre><code>git config --add remote.origin.fetch '+refs/pull/*/head:refs/remotes/origin/pr/*'
    git config --add remote.origin.fetch '+refs/merge-requests/*/head:refs/remotes/origin/mr/*'</code></pre>
    <p>El <code>+</code> inicial significa "force update", necesario porque las refs de PR pueden moverse (rebases en el branch de PR). Después de hacer fetch, los PRs del servidor aparecen como refs locales <code>origin/pr/*</code>, listos para <code>git switch -c review/&lt;n&gt; origin/pr/&lt;n&gt;</code>.</p>
    <h2>Errores comunes</h2>
    <p>Intentar <code>git checkout origin/main</code> y editar; te pone en HEAD desconectado porque <code>origin/main</code> es de solo lectura. Crea un branch de seguimiento en su lugar. Olvidar hacer <code>git fetch</code> y ser confundido por conteos ahead/behind obsoletos. Tratar los branches de seguimiento remoto como si pushear a ellos actualizara el servidor; son espejos locales. Usa <code>git push origin main</code>. Finalmente, eliminar <code>origin/main</code> con <code>git branch -dr</code> y asumir que el branch del servidor se ha ido; no lo está. Usa <code>git push origin --delete main</code> y solo cuando lo desees.</p>

- source_title: "Working tree, index, and repository: the three areas"
  title: "Árbol de trabajo, index y repositorio: las tres áreas"
  langcode: es
  body: |
    <h2>Introducción</h2>
    <p>Cada operación de Git mueve datos entre tres áreas: el <strong>árbol de trabajo</strong> (tus archivos), el <strong>index</strong> (borrador del próximo commit) y el <strong>repositorio</strong> (historial commiteado bajo <code>.git</code>). Nombrar lo que se mueve a dónde es el modelo mental más útil.</p>
    <h2>Las áreas</h2>
    <ul>
      <li><strong>Árbol de trabajo</strong>: el directorio en el que editas.</li>
      <li><strong>Index</strong>: <code>.git/index</code>, el tree staged.</li>
      <li><strong>Repositorio</strong>: objetos en <code>.git/objects</code> más refs en <code>.git/refs</code>.</li>
    </ul>
    <h2>Comandos por dirección</h2>
    <pre><code># árbol de trabajo -> index
    git add file
    git rm file
    git mv old new

    # index -> repositorio
    git commit
    git write-tree   # plumbing

    # repositorio -> index
    git reset &lt;commit&gt;
    git read-tree &lt;tree&gt;

    # repositorio -> árbol de trabajo (y normalmente index)
    git checkout &lt;commit&gt; -- file
    git restore --source &lt;commit&gt; file
    git switch &lt;branch&gt;</code></pre>
    <h2>Los cuatro diffs</h2>
    <p>Puedes comparar cualesquiera dos áreas:</p>
    <pre><code>git diff                  # árbol de trabajo vs index
    git diff --staged         # index vs HEAD
    git diff HEAD             # árbol de trabajo vs HEAD
    git diff main feature     # repositorio vs repositorio</code></pre>
    <h2>Status decodificado</h2>
    <pre><code>git status -s
    # XY filename
    # X = estado del index, Y = estado del árbol de trabajo
    # M modified, A added, D deleted, R renamed, ?? untracked</code></pre>
    <p>Por ejemplo <code>MM</code> significa modificado tanto en el index como en el árbol de trabajo (stageaste un cambio y luego volviste a editar).</p>
    <h2>Reset, restore, checkout</h2>
    <p>Cada uno afecta áreas diferentes:</p>
    <ul>
      <li><code>git reset --soft</code>: solo repositorio (mover ref).</li>
      <li><code>git reset</code> (mixed): repositorio + index.</li>
      <li><code>git reset --hard</code>: repositorio + index + árbol de trabajo.</li>
      <li><code>git restore --staged</code>: index desde HEAD.</li>
      <li><code>git restore</code>: árbol de trabajo desde el index.</li>
      <li><code>git restore --source=&lt;commit&gt;</code>: árbol de trabajo (y opcionalmente index) desde un commit específico.</li>
    </ul>
    <h2>Un ejercicio</h2>
    <pre><code>echo a &gt; f.txt
    git add f.txt
    git commit -m "v1"
    echo b &gt;&gt; f.txt
    git add f.txt
    echo c &gt;&gt; f.txt
    git status
    git diff
    git diff --staged
    git diff HEAD</code></pre>
    <p>Lee cada diff; entender por qué difieren cementa el modelo.</p>
    <h2>Plumbing para cada área</h2>
    <p>Conocer el plumbing para cada área desmitifica los comandos de nivel superior:</p>
    <ul>
      <li>Árbol de trabajo: operaciones ordinarias del sistema de archivos.</li>
      <li>Index: <code>git update-index</code>, <code>git ls-files</code>, <code>git read-tree</code>, <code>git write-tree</code>.</li>
      <li>Base de datos de objetos: <code>git hash-object</code>, <code>git cat-file</code>, <code>git mktree</code>, <code>git commit-tree</code>.</li>
      <li>Refs: <code>git update-ref</code>, <code>git symbolic-ref</code>, <code>git for-each-ref</code>.</li>
    </ul>
    <pre><code>git ls-files --stage              # index
    git ls-tree HEAD                  # repo
    ls -R                             # árbol de trabajo</code></pre>
    <h2>Errores comunes</h2>
    <p>Intentar memorizar comandos en lugar de áreas; una vez que sabes qué área es la fuente y cuál el destino, el comando correcto es obvio. Confundir <code>git restore file</code> con <code>git checkout file</code>; son equivalentes para ese caso, pero los muchos otros modos de <code>checkout</code> confunden a usuarios nuevos. Usar <code>git reset --hard</code> para "limpiar" sin darte cuenta de que destruye el árbol de trabajo. Y finalmente, esperar que <code>git commit</code> incluya ediciones no staged; no lo hace (a menos que pases <code>-a</code> para archivos rastreados solamente).</p>

- source_title: "How commits are linked: the commit graph"
  title: "Cómo se enlazan los commits: el grafo de commits"
  langcode: es
  body: |
    <h2>Introducción</h2>
    <p>Un commit Git referencia cero, uno o varios commits <em>padres</em>. El historial entero es un grafo dirigido acíclico (DAG) de estos enlaces de padres. Los branches y tags son simplemente etiquetas en nodos de este grafo.</p>
    <h2>Anatomía de un enlace de padre</h2>
    <pre><code>git cat-file -p HEAD
    # tree 9f1a...
    # parent b2c3...
    # parent d4e5...        (solo en merge commits)
    # author Ada ...
    # committer Ada ...</code></pre>
    <p>Un padre: historial lineal. Dos padres: un merge. Cero padres: un commit raíz. Tres o más: un merge octopus.</p>
    <h2>Recorriendo el grafo</h2>
    <pre><code>git log --oneline --graph --all
    git log --first-parent           # seguir solo primeros padres
    git log --topo-order
    git log --date-order</code></pre>
    <p><code>--first-parent</code> en <code>main</code> es excelente para ver el "tronco" del historial sin ruido de merges laterales.</p>
    <h2>Consultas de ascendencia</h2>
    <pre><code>git merge-base A B               # ancestro común más reciente
    git merge-base --is-ancestor X Y   # exit 0 si X es ancestro de Y
    git rev-list A..B --count          # commits en B que no están en A</code></pre>
    <h2>Sintaxis de rango</h2>
    <ul>
      <li><code>A..B</code>: commits alcanzables desde B pero no desde A.</li>
      <li><code>A...B</code>: diferencia simétrica.</li>
      <li><code>^A B</code>: igual que <code>A..B</code>.</li>
      <li><code>B --not A</code>: igual que <code>A..B</code>.</li>
    </ul>
    <pre><code>git log main..feature
    git log main...feature --left-right --oneline</code></pre>
    <h2>El archivo commit-graph</h2>
    <p>Desde Git 2.18, Git puede escribir un archivo <code>commit-graph</code> que precalcula datos de ascendencia para repos enormes:</p>
    <pre><code>git commit-graph write --reachable
    git config --global core.commitGraph true
    git config --global gc.writeCommitGraph true</code></pre>
    <p>Esto acelera dramáticamente <code>git log --graph</code>, <code>git merge-base</code> y verificaciones de alcanzabilidad.</p>
    <h2>Merges octopus</h2>
    <p>Un solo merge commit puede tener muchos padres:</p>
    <pre><code>git merge feature1 feature2 feature3</code></pre>
    <p>Los merges octopus solo tienen éxito sin conflictos. Son útiles para branches de integración en algunos flujos pero rara vez necesarios.</p>
    <h2>Visualizando el grafo</h2>
    <pre><code>git log --oneline --graph --decorate --all
    gitk --all
    git log --pretty=format:'%h %p %s'</code></pre>
    <p><code>%p</code> imprime los SHAs de los padres.</p>
    <h2>Números de generación</h2>
    <p>El archivo commit-graph almacena un número de generación por commit: 1 para commits raíz, max(generaciones de padres) + 1 de lo contrario. Los números de generación convierten muchas consultas de ascendencia en operaciones O(log n). Git moderno (2.27+) escribe fechas de commit corregidas y números de generación v2 cuando el commit-graph está habilitado:</p>
    <pre><code>git commit-graph write --reachable --changed-paths
    git config gc.writeCommitGraph true
    git config core.commitGraph true
    git log --oneline --graph -n 5</code></pre>
    <p><code>--changed-paths</code> adicionalmente registra un filtro Bloom por commit listando los paths cambiados, acelerando dramáticamente las consultas de <code>git log</code> limitadas por ruta.</p>
    <h2>Errores comunes</h2>
    <p>Imaginar los branches como pilas separadas de commits; son etiquetas en nodos que pueden compartir ancestros. Usar <code>HEAD~3</code> en un merge commit y sorprenderse: <code>~</code> siempre sigue al primer padre. Usa <code>^2</code>, <code>^3</code> para saltar a otros padres. Olvidar que rebase reescribe la topología del grafo creando nuevos commits con nuevos punteros padre; los commits viejos viven en el reflog. Finalmente, pensar que el grafo de commits almacena diffs; almacena trees y padres solamente. Los diffs se calculan bajo demanda comparando trees.</p>

- source_title: "Pack files and object storage"
  title: "Archivos pack y almacenamiento de objetos"
  langcode: es
  body: |
    <h2>Introducción</h2>
    <p>Git almacena objetos en dos formatos: <em>sueltos</em> (un archivo por objeto bajo <code>.git/objects/xx/yyyy...</code>) y <em>empaquetados</em> (muchos objetos en un solo archivo <code>.pack</code> con un compañero <code>.idx</code>). Los packs son mucho más eficientes en disco y en la red.</p>
    <h2>Disposición</h2>
    <pre><code>.git/objects/
      00/  ... objetos sueltos, nombrados por sha menos los primeros dos chars
      pack/
        pack-&lt;hash&gt;.pack    # los datos
        pack-&lt;hash&gt;.idx     # índice de offsets
        pack-&lt;hash&gt;.rev     # índice inverso (Git 2.31+)</code></pre>
    <h2>Por qué packs</h2>
    <ul>
      <li>Un archivo por objeto es brutal en sistemas de archivos con millones de archivos.</li>
      <li>Los packs aplican <em>compresión delta</em>: almacenan blobs similares como una base más un diff.</li>
      <li>Los packs usan zlib además de los deltas.</li>
      <li>Los fetch/push smart transfieren datos pack directamente.</li>
    </ul>
    <h2>Disparando empaquetamiento</h2>
    <pre><code>git gc                    # mantenimiento rutinario
    git gc --aggressive       # búsqueda de delta más pesada
    git repack -a -d -f       # recrear un pack desde todos los objetos
    git fetch                 # también puede producir packs</code></pre>
    <p>Auto-gc se dispara cuando el repo acumula demasiados objetos sueltos; ajusta con <code>gc.auto</code>.</p>
    <h2>Inspeccionando packs</h2>
    <pre><code>ls .git/objects/pack
    git verify-pack -v .git/objects/pack/pack-&lt;hash&gt;.idx | head
    git count-objects -v</code></pre>
    <p><code>verify-pack -v</code> muestra el tipo, tamaño, tamaño empaquetado de cada objeto, y si es un delta contra otro objeto.</p>
    <h2>Multi-pack indexes</h2>
    <p>Para repos muy grandes, múltiples packs pueden unificarse mediante un solo índice:</p>
    <pre><code>git multi-pack-index write
    git config core.multiPackIndex true</code></pre>
    <h2>Bitmaps de alcanzabilidad</h2>
    <p>Los bitmaps aceleran las consultas de alcanzabilidad (usadas por clone y fetch en servidores de hosting):</p>
    <pre><code>git repack -adb        # construir bitmap
    git config repack.writeBitmaps true</code></pre>
    <p>Los bitmaps son más útiles cuando se sirven muchos clones o cuando se ejecutan grandes consultas <code>git rev-list</code>.</p>
    <h2>Detalles de compresión de objetos</h2>
    <p>Un delta en un pack almacena una referencia de objeto <em>base</em> y un flujo de instrucciones. La base puede ser ella misma un delta. Git limita las cadenas de delta vía <code>pack.depth</code> (predeterminado 50). La base elegida es normalmente un blob similar, a menudo una versión previa del mismo archivo.</p>
    <h2>Repacking geométrico</h2>
    <p>Mantener un solo pack enorme es caro; reescribirlo en cada gc es derrochador. Git moderno soporta repacking <em>geométrico</em>, que mantiene una cadena de packs de tamaño geométricamente creciente y solo reempaqueta los pequeños:</p>
    <pre><code>git repack --geometric=2 -d --write-bitmap-index
    git config maintenance.incremental-repack.enabled true
    git maintenance run --task incremental-repack</code></pre>
    <p>Esto hace el mantenimiento rutinario acotado: cada gc solo toca los packs más pequeños. Combinado con multi-pack indexes y bitmaps de alcanzabilidad, el repack geométrico es la configuración recomendada para repositorios grandes o ocupados.</p>
    <h2>Errores comunes</h2>
    <p>Eliminar manualmente un archivo <code>.pack</code> para reclamar espacio, rompiendo el repo. El pack contiene muchos objetos alcanzables; usa <code>git gc --prune</code> en su lugar. Ejecutar <code>git gc --aggressive</code> en un horario; es caro y rara vez mejora sobre un <code>gc</code> normal. Mantener millones de objetos sueltos (después de una recuperación fallida) y luego hacer <code>git status</code> en un sistema de archivos lento; empaqueta primero. Finalmente, transferir packs copiando archivos en lugar de usar <code>git clone --bare</code>; podrías perderte el <code>.idx</code> o saltarte características más nuevas como el multi-pack index.</p>

- source_title: "The ORIG_HEAD, MERGE_HEAD, and CHERRY_PICK_HEAD refs"
  title: "Las refs ORIG_HEAD, MERGE_HEAD y CHERRY_PICK_HEAD"
  langcode: es
  body: |
    <h2>Introducción</h2>
    <p>Git mantiene varias refs "auxiliares" especiales en <code>.git/</code> para registrar estado durante operaciones multi-paso. Conocerlas convierte recuperaciones aterradoras en líneas únicas.</p>
    <h2>ORIG_HEAD</h2>
    <p><code>ORIG_HEAD</code> se establece cada vez que una operación "peligrosa" mueve <code>HEAD</code> mucho: merge, rebase, reset, am. Captura la punta previa para que puedas deshacer:</p>
    <pre><code>git merge feature
    # decidir que fue un error
    git reset --hard ORIG_HEAD</code></pre>
    <p>El mismo truco después de un mal rebase o reset:</p>
    <pre><code>git rebase main
    git reset --hard ORIG_HEAD     # de vuelta al estado pre-rebase</code></pre>
    <h2>MERGE_HEAD</h2>
    <p>Durante un merge, <code>MERGE_HEAD</code> registra la punta del branch que se está mergeando. Existe desde el inicio de <code>git merge</code> hasta que se crea el merge commit o se aborta el merge:</p>
    <pre><code>git merge feature
    cat .git/MERGE_HEAD
    git merge --abort                # elimina MERGE_HEAD</code></pre>
    <p>Si terminaste de resolver conflictos y quieres escribir el merge commit:</p>
    <pre><code>git commit                       # usa MERGE_HEAD para registrar el segundo padre</code></pre>
    <h2>MERGE_MSG y AUTO_MERGE</h2>
    <p>Los archivos compañeros incluyen <code>.git/MERGE_MSG</code> (el mensaje de commit preparado) y, desde Git 2.40, <code>AUTO_MERGE</code> (un tree que contiene la mejor auto-resolución de Git). Este último es útil para diff contra tu resolución manual.</p>
    <h2>CHERRY_PICK_HEAD y REVERT_HEAD</h2>
    <p>Durante un cherry-pick o revert, Git registra el commit fuente:</p>
    <pre><code>git cherry-pick a1b2c3d
    cat .git/CHERRY_PICK_HEAD
    git cherry-pick --abort
    git cherry-pick --continue        # tras resolver conflictos</code></pre>
    <p>El mismo patrón aplica a <code>git revert</code> con <code>REVERT_HEAD</code>.</p>
    <h2>BISECT_HEAD y REBASE_HEAD</h2>
    <p>Al hacer bisect o rebase, Git también escribe <code>BISECT_HEAD</code> o <code>REBASE_HEAD</code> para rastrear el estado en progreso. Herramientas como <code>git status</code> usan estos para imprimir mensajes precisos de "estás a mitad de X".</p>
    <h2>FETCH_HEAD</h2>
    <p>Después de un fetch, <code>FETCH_HEAD</code> lista lo que se descargó, una ref por línea. <code>git pull</code> lo lee para saber qué mergear:</p>
    <pre><code>git fetch origin main
    cat .git/FETCH_HEAD
    git merge FETCH_HEAD</code></pre>
    <h2>Juntándolo todo</h2>
    <pre><code>git status                         # referencia todos estos según se necesite
    ls .git/*HEAD                      # listar refs auxiliares actuales</code></pre>
    <h2>Detectando operaciones en progreso</h2>
    <p><code>git status</code> lee estas refs auxiliares para decirte qué está en progreso. Los scripts pueden hacer lo mismo probando la existencia de los archivos:</p>
    <pre><code>if test -f "$(git rev-parse --git-dir)/MERGE_HEAD"; then
        echo "merge in progress"
    fi
    if test -f "$(git rev-parse --git-dir)/CHERRY_PICK_HEAD"; then
        echo "cherry-pick in progress"
    fi
    if test -d "$(git rev-parse --git-dir)/rebase-merge"; then
        echo "interactive rebase in progress"
    fi</code></pre>
    <p>Esto es exactamente lo que las integraciones de prompt de shell como <code>__git_ps1</code> hacen para renderizar <code>(main|MERGING)</code>.</p>
    <h2>Errores comunes</h2>
    <p>Intentar eliminar <code>MERGE_HEAD</code> manualmente para escapar de un merge; usa <code>git merge --abort</code>. Olvidar que existe <code>ORIG_HEAD</code> y recrear commits a mano después de un mal reset. Confundir <code>FETCH_HEAD</code> (último fetch, transitorio) con refs de seguimiento remoto como <code>origin/main</code> (persistente). Y finalmente, scriptear alrededor de estas refs asumiendo que existen; <code>MERGE_HEAD</code> solo existe durante un merge, así que siempre prueba el archivo antes de leerlo.</p>

- source_title: "Annotated tags vs lightweight tags"
  title: "Tags anotados vs tags lightweight"
  langcode: es
  body: |
    <h2>Introducción</h2>
    <p>Git soporta dos tipos de tags: <strong>lightweight</strong>, que son solo refs apuntando a commits, y <strong>anotados</strong>, que son objetos Git completos con metadatos. Usa tags anotados para releases.</p>
    <h2>Creando</h2>
    <pre><code>git tag v1.0.0                          # lightweight
    git tag -a v1.0.0 -m "1.0 GA"           # anotado
    git tag -s v1.0.0 -m "Signed"           # anotado firmado GPG
    git tag -a v1.0.0 a1b2c3d -m "..."     # etiquetar un commit específico</code></pre>
    <h2>Qué almacenan los tags anotados</h2>
    <pre><code>git cat-file -t v1.0.0
    # tag
    git cat-file -p v1.0.0
    # object &lt;commit-sha&gt;
    # type commit
    # tag v1.0.0
    # tagger Ada &lt;ada@example.com&gt; 1714300000 +0000
    #
    # 1.0 GA</code></pre>
    <p>Un tag anotado es su propio objeto. Tiene su propio SHA distinto del commit al que apunta, un tagger y fecha, un mensaje, y una firma opcional.</p>
    <h2>Lo que los tags lightweight no almacenan</h2>
    <p>Un tag lightweight es solo <code>refs/tags/v1.0.0</code> que contiene un SHA de commit. No hay mensaje, ni tagger, ni firma. <code>git describe</code>, <code>git tag -v</code> y muchas herramientas de release de CI asumen tags anotados y se comportan extraño con los lightweight.</p>
    <h2>Inspeccionando</h2>
    <pre><code>git show v1.0.0
    git tag -l --format='%(refname:short) %(objecttype) %(taggername) %(subject)'</code></pre>
    <p>Los tags lightweight muestran <code>commit</code> como tipo de objeto; los tags anotados muestran <code>tag</code>.</p>
    <h2>Firmando y verificando</h2>
    <pre><code>git tag -s v1.0.0 -m "Signed"
    git tag -v v1.0.0
    # gpg: Good signature from "Ada Lovelace &lt;ada@example.com&gt;"</code></pre>
    <p>La firma SSH también está soportada en Git moderno:</p>
    <pre><code>git config --global gpg.format ssh
    git config --global user.signingkey ~/.ssh/id_ed25519.pub
    git tag -s v1.1.0 -m "SSH-signed"</code></pre>
    <h2>Eligiendo</h2>
    <ul>
      <li>Usa <strong>anotados</strong> para releases, cualquier cosa que publiques, cualquier cosa que firmes.</li>
      <li>Usa <strong>lightweight</strong> para marcadores locales ad hoc (p.ej. "recordar este commit antes de rebasear").</li>
    </ul>
    <h2>Pusheando tags</h2>
    <pre><code>git push origin v1.0.0
    git push origin --tags
    git push --follow-tags         # solo tags anotados alcanzables desde commits pusheados</code></pre>
    <p><code>--follow-tags</code> deliberadamente ignora tags lightweight, lo cual normalmente es lo que quieres.</p>
    <h2>Desreferenciamiento de tags</h2>
    <p>Muchos comandos automáticamente desreferencian un tag anotado al commit al que apunta; algunos no. Usa <code>^{}</code> para forzar el desreferenciamiento en scripts:</p>
    <pre><code>git rev-parse v1.0.0           # SHA del objeto tag (anotado)
    git rev-parse v1.0.0^{}        # SHA del commit al que apunta
    git rev-parse v1.0.0^{commit}  # igual, con aserción de tipo
    git for-each-ref --format='%(refname:short) %(*objectname)' refs/tags</code></pre>
    <p>El placeholder <code>%(*objectname)</code> da el commit desreferenciado para tags y está vacío para refs no-tag. Este patrón es esencial para scripts de release que necesitan un SHA de commit a partir de un nombre de tag.</p>
    <h2>Errores comunes</h2>
    <p>Etiquetar releases con un simple <code>git tag v1.0</code> y perder tagger/fecha/mensaje en los registros de auditoría. Siempre pasa <code>-a</code> o <code>-s</code>. Mover un tag publicado a un nuevo commit ("force-tag"); los usuarios downstream ya cachearon el SHA viejo y pueden no recoger el cambio. Emite <code>v1.0.1</code> en su lugar. Usar tags lightweight como marcadores nombrados compartidos entre un equipo; si debes compartir, prefiere branches o tags anotados. Finalmente, esperar que <code>git describe</code> funcione sin tags anotados; por defecto solo cuenta los anotados (<code>--tags</code> opta por incluir lightweight, con advertencias).</p>

- source_title: "What happens during git clone"
  title: "Qué pasa durante git clone"
  langcode: es
  body: |
    <h2>Introducción</h2>
    <p><code>git clone</code> parece una operación pero en realidad compone varias. Entender los pasos ayuda al solucionar problemas con clones parciales, clones lentos o predeterminados sorprendentes.</p>
    <h2>La secuencia</h2>
    <ol>
      <li>Crear el directorio destino.</li>
      <li>Ejecutar <code>git init</code> dentro de él.</li>
      <li>Añadir <code>origin</code> como un remoto con la URL fuente.</li>
      <li>Configurar el refspec predeterminado <code>+refs/heads/*:refs/remotes/origin/*</code>.</li>
      <li>Ejecutar <code>git fetch origin</code> para descargar objetos y refs.</li>
      <li>Determinar el branch predeterminado (el <code>HEAD</code> del remoto).</li>
      <li>Crear un branch local que lo rastree.</li>
      <li>Hacer checkout de ese branch al árbol de trabajo.</li>
    </ol>
    <h2>Viéndolo pasar</h2>
    <pre><code>GIT_TRACE=1 GIT_TRACE_PACKET=1 git clone https://github.com/example/widget.git 2&gt;&amp;1 | head -50</code></pre>
    <p>Verás negociación de capacidades, anuncio de refs, negociación want/have y recepción de pack.</p>
    <h2>Protocolo de cable</h2>
    <p>Git moderno soporta el protocolo v2 (<code>git config protocol.version 2</code> o predeterminado en 2.26+). El servidor anuncia solo las refs solicitadas en lugar de la lista completa de refs, lo que mejora dramáticamente los tiempos de clone para repos con muchas refs.</p>
    <h2>Variantes</h2>
    <pre><code>git clone --bare                       # sin árbol de trabajo
    git clone --mirror                     # bare + todas las refs, configurado para mirroring
    git clone --depth 1                    # shallow
    git clone --filter=blob:none           # clon parcial, saltar blobs hasta necesitarlos
    git clone --filter=tree:0              # incluso menos datos, trees bajo demanda
    git clone --single-branch              # historial de un solo branch
    git clone --branch v1.2.3              # checkout de un branch/tag específico
    git clone --recurse-submodules         # clonar submódulos también
    git clone --no-checkout                # saltar populación del árbol de trabajo</code></pre>
    <h2>Clones parciales</h2>
    <p>Los clones parciales (<code>--filter</code>) aplazan la descarga de objetos hasta que se necesiten. Requieren soporte del servidor (la mayoría de hosts modernos lo tienen):</p>
    <pre><code>git clone --filter=blob:none https://github.com/example/big.git
    cd big
    git log --oneline                  # barato; solo se descargan objetos commit y tree
    git show HEAD:src/main.c           # esto dispara una descarga de blob</code></pre>
    <h2>Qué va a dónde</h2>
    <p>Después de un clone exitoso:</p>
    <ul>
      <li><code>.git/objects/pack/</code>: el archivo pack recibido del servidor.</li>
      <li><code>.git/refs/remotes/origin/</code>: cada branch del servidor como una ref de seguimiento remoto.</li>
      <li><code>.git/HEAD</code>: ref simbólica al nuevo branch local.</li>
      <li><code>.git/config</code>: sección <code>[remote "origin"]</code> con URL y refspec.</li>
    </ul>
    <h2>Anuncio del lado del servidor</h2>
    <p>Lo primero que el servidor envía en cualquier clone es el anuncio de refs. Bajo el protocolo v0/v1 esto lista cada ref, incluso si solo quieres una; en repos enormes con millones de refs solo el anuncio podría tomar segundos. El protocolo v2 cambia esto: el cliente envía una solicitud <code>ls-refs</code> especificando patrones, y el servidor solo anuncia refs que coincidan:</p>
    <pre><code>git -c protocol.version=2 ls-remote origin 'refs/heads/main'
    GIT_TRACE_PACKET=1 git -c protocol.version=2 ls-remote origin 2&gt;&amp;1 | head</code></pre>
    <p>Para clones del día a día la aceleración es invisible; para servidores de hosting es dramática.</p>
    <h2>Errores comunes</h2>
    <p>Clonar un repo enorme en una red inestable y empezar de cero; <code>git clone</code> en 2.30+ soporta clonado reanudable sobre el protocolo HTTP smart, pero solo si el servidor lo soporta. De lo contrario <code>--depth 1</code> primero, luego <code>git fetch --unshallow</code> después. Clonar en <code>~/Dropbox</code> u otra carpeta de sincronización; el cliente de sincronización peleará con Git por el control de <code>.git/index</code>. Clonar un repo con submódulos y olvidar <code>--recurse-submodules</code>, terminando con directorios de submódulos vacíos. Finalmente, clonar por HTTPS sin un asistente de credenciales y que te pidan credenciales en cada fetch; configura uno una vez.</p>

- source_title: "What happens during git fetch"
  title: "Qué pasa durante git fetch"
  langcode: es
  body: |
    <h2>Introducción</h2>
    <p><code>git fetch</code> es la operación de red que descarga nuevos objetos y actualiza las refs de seguimiento remoto. No cambia tus branches ni tu árbol de trabajo, lo que lo hace el comando "¿qué hay nuevo?" más seguro.</p>
    <h2>La secuencia</h2>
    <ol>
      <li>Resolver la URL del remoto.</li>
      <li>Abrir una conexión (HTTPS, SSH o git://).</li>
      <li>Negociar capacidades (versión de protocolo, multi-ack, filtros de clon parcial, etc.).</li>
      <li>El servidor anuncia refs (o, en protocolo v2, solo las que coincidan con los patrones solicitados).</li>
      <li>El cliente reporta lo que ya tiene.</li>
      <li>El servidor envía un archivo pack que contiene los objetos faltantes.</li>
      <li>El cliente escribe el pack en <code>.git/objects/pack/</code> y lo indexa.</li>
      <li>El cliente actualiza las refs de seguimiento remoto (<code>refs/remotes/origin/*</code>).</li>
      <li>Opcionalmente poda refs eliminadas.</li>
    </ol>
    <h2>Comandos</h2>
    <pre><code>git fetch
    git fetch origin
    git fetch --all
    git fetch --prune
    git fetch origin main:my-main         # fetch a una ref local</code></pre>
    <p>La sintaxis con dos puntos <code>main:my-main</code> crea o actualiza una ref local directamente; úsala con cuidado.</p>
    <h2>Inspeccionando lo que se descargó</h2>
    <pre><code>git fetch origin
    cat .git/FETCH_HEAD
    git log HEAD..origin/main --oneline</code></pre>
    <p><code>FETCH_HEAD</code> lista cada ref actualizada por el fetch más reciente, en el orden solicitado.</p>
    <h2>Refspecs</h2>
    <p>Cada remoto tiene uno o más refspecs de fetch. El predeterminado para <code>origin</code>:</p>
    <pre><code>+refs/heads/*:refs/remotes/origin/*</code></pre>
    <p>Puedes añadir más, por ejemplo para descargar refs de pull-request desde GitHub:</p>
    <pre><code>git config --add remote.origin.fetch '+refs/pull/*/head:refs/remotes/origin/pr/*'
    git fetch
    git switch -c review/123 origin/pr/123</code></pre>
    <h2>Podando</h2>
    <p>Sin prune, los branches eliminados en el servidor permanecen como refs <code>origin/*</code> obsoletas:</p>
    <pre><code>git fetch --prune
    git config --global fetch.prune true</code></pre>
    <h2>Tags</h2>
    <p>Por defecto, fetch descarga tags que apuntan a commits descargados. Fuerza o deshabilita:</p>
    <pre><code>git fetch --tags
    git fetch --no-tags</code></pre>
    <h2>Trace y debug</h2>
    <pre><code>GIT_TRACE=1 GIT_TRACE_PACKET=1 git fetch
    GIT_CURL_VERBOSE=1 git fetch        # HTTPS</code></pre>
    <p>Estos revelan las solicitudes exactas, útil para depurar proxies o auth.</p>
    <h2>Negociación y haves</h2>
    <p>El handshake de fetch es un baile de "wants" y "haves". El cliente lista lo que quiere (los SHAs de las puntas de los branches remotos), y ofrece haves (commits locales recientes) para que el servidor pueda calcular un pack mínimo. Git moderno usa el algoritmo de negociación <code>skipping</code>, que converge en O(log n) rondas incluso en historiales largos. Puedes ajustarlo:</p>
    <pre><code>git config fetch.negotiationAlgorithm skipping
    git config fetch.negotiationAlgorithm consecutive
    GIT_TRACE_PACKET=1 git fetch 2&gt;&amp;1 | grep -E 'have|want' | head</code></pre>
    <h2>Errores comunes</h2>
    <p>Creer que <code>git fetch</code> cambia tus branches; nunca lo hace. Usa <code>git pull</code> o <code>git merge origin/main</code> para integrar. Saltarse <code>--prune</code> en clones de larga duración y acumular docenas de refs <code>origin/*</code> obsoletas. Configurar mal un refspec a mano y sobrescribir branches locales; verifica con <code>git config -e</code>. Finalmente, hacer fetch desde un clon parcial sin darte cuenta de que algunos objetos requerirán una llamada de red de seguimiento al accederlos; los clones parciales intercambian velocidad inicial por latencia ocasional posterior.</p>

- source_title: "What happens during git pull (fetch + merge/rebase)"
  title: "Qué pasa durante git pull (fetch + merge/rebase)"
  langcode: es
  body: |
    <h2>Introducción</h2>
    <p><code>git pull</code> es azúcar para <code>git fetch</code> seguido de la integración del branch upstream en el branch actual. El paso de integración es ya sea un merge (predeterminado) o un rebase.</p>
    <h2>Los dos pasos</h2>
    <ol>
      <li><code>git fetch &lt;remote&gt; &lt;refspec&gt;</code>: descargar y actualizar refs de seguimiento.</li>
      <li>Si <code>pull.rebase</code> es false: <code>git merge FETCH_HEAD</code>.</li>
      <li>Si <code>pull.rebase</code> es true: <code>git rebase FETCH_HEAD</code>.</li>
    </ol>
    <p>Secuencia manual equivalente:</p>
    <pre><code>git fetch origin main
    git merge origin/main             # o git rebase origin/main</code></pre>
    <h2>Configuración</h2>
    <pre><code>git config --global pull.rebase false   # merge (predeterminado clásico)
    git config --global pull.rebase true    # rebase
    git config --global pull.ff only        # solo fast-forward, abortar de lo contrario</code></pre>
    <p>Desde Git 2.27, un <code>git pull</code> simple sin configuración imprime una advertencia. Elige una estrategia explícitamente.</p>
    <h2>Solo fast-forward</h2>
    <p><code>--ff-only</code> es el pull más seguro: tiene éxito solo si tu branch está estrictamente atrás. Sin merge commit, sin rebase, sin sorpresas.</p>
    <pre><code>git pull --ff-only</code></pre>
    <p>Combina con autostash para evitar bloqueadores del árbol de trabajo:</p>
    <pre><code>git pull --ff-only --autostash</code></pre>
    <h2>Pull con rebase</h2>
    <pre><code>git pull --rebase
    git pull --rebase=merges          # preservar estructura de merge</code></pre>
    <p><code>--rebase=merges</code> es útil para branches que contienen merge commits que quieres mantener.</p>
    <h2>Pull con autostash</h2>
    <pre><code>git config --global rebase.autoStash true
    git config --global merge.autoStash true</code></pre>
    <p>Con estos activados, los árboles sucios se stashean antes de la integración y se reaplican después, transparentemente.</p>
    <h2>Pull multi-branch</h2>
    <pre><code>git pull origin main feature        # descarga ambos, mergea octopus en HEAD</code></pre>
    <p>Esto rara vez es lo que quieres; prefiere operaciones separadas.</p>
    <h2>Pull vs fetch + integrar explícito</h2>
    <p>Muchos usuarios experimentados prefieren nunca usar <code>git pull</code>. Ejecutan <code>git fetch</code> primero, inspeccionan <code>git log HEAD..@{u}</code> y luego eligen merge o rebase deliberadamente. Esto es especialmente valioso al integrar branches divergentes de larga duración.</p>
    <h2>Políticas de pull para equipos</h2>
    <p>Los equipos saludables eligen una política única de pull y la configuran a nivel organización. Dos elecciones comunes:</p>
    <pre><code># Equipo de historial lineal: rebase al pull, merge solo vía PR
    git config --global pull.rebase true
    git config --global rebase.autoStash true

    # Equipo amigo de merges: nunca rebasear, siempre fast-forward main
    git config --global pull.rebase false
    git config --global pull.ff only</code></pre>
    <p>La peor configuración es la ausente: el <code>git pull</code> de cada desarrollador se comporta diferente, produciendo historiales inconsistentes. Documenta la política en el <code>CONTRIBUTING.md</code> de tu repo y proporciona un fragmento de configuración de una línea que los nuevos contribuyentes puedan copiar.</p>
    <h2>Errores comunes</h2>
    <p>Ejecutar <code>git pull</code> con cambios no commiteados y obtener un merge commit inesperado encima de trabajo sucio. O bien stashea, commitea, o configura <code>autoStash</code>. Hacer pull con rebase en un branch en el que otros han basado trabajo; reescribes su base. Rebasea solo en branches privados. Configurar <code>pull.rebase</code> globalmente sin darte cuenta de que también afecta a <code>main</code>; muchos equipos configuran <code>pull.ff only</code> globalmente y sobrescriben por branch. Finalmente, usar <code>git pull</code> en CI; CI rara vez necesita integración, solo el último commit. Usa <code>git fetch</code> y un checkout explícito de <code>origin/main</code> para mantener CI determinista.</p>

- source_title: "What happens during git push"
  title: "Qué pasa durante git push"
  langcode: es
  body: |
    <h2>Introducción</h2>
    <p><code>git push</code> sube commits a un remoto y actualiza las refs de ese remoto. A diferencia de fetch, modifica el estado en el servidor, así que existen mecanismos de seguridad para prevenir sobrescribir el trabajo de otras personas.</p>
    <h2>La secuencia</h2>
    <ol>
      <li>Resolver la URL del remoto y el refspec destino.</li>
      <li>Abrir una conexión.</li>
      <li>Negociar capacidades.</li>
      <li>El servidor anuncia los valores actuales de las refs.</li>
      <li>El cliente verifica cada push: ¿es un fast-forward de la ref del servidor?</li>
      <li>El cliente empaqueta los objetos faltantes y los sube.</li>
      <li>El servidor ejecuta el hook <code>pre-receive</code>.</li>
      <li>Por cada ref, el servidor ejecuta el hook <code>update</code> y atómicamente actualiza la ref.</li>
      <li>El servidor ejecuta el hook <code>post-receive</code>.</li>
      <li>El servidor reporta éxito o rechazo al cliente.</li>
    </ol>
    <h2>Comandos</h2>
    <pre><code>git push                                  # branch actual a upstream
    git push origin main                      # explícito
    git push -u origin feature/login          # establecer upstream
    git push origin --delete feature/login    # eliminar branch remoto
    git push origin v1.0.0                    # push de un tag
    git push --follow-tags
    git push --force-with-lease</code></pre>
    <h2>Cumplimiento de fast-forward</h2>
    <p>Por defecto, un push se rechaza si no haría fast-forward de la ref remota. Esto protege contra sobrescribir accidentalmente trabajo que otros han pusheado:</p>
    <pre><code> ! [rejected]   main -> main (non-fast-forward)
    error: failed to push some refs to 'origin'
    hint: Updates were rejected because the tip of your current branch is behind ...</code></pre>
    <p>Resuelve haciendo fetch e integrando, luego haciendo push de nuevo.</p>
    <h2>Force pushing</h2>
    <pre><code>git push --force                   # peligroso: ignora estado del remoto
    git push --force-with-lease        # más seguro: rechaza si el remoto se movió
    git push --force-with-lease=feature/login:abc1234</code></pre>
    <p><code>--force-with-lease</code> requiere que la ref remota aún sea igual a lo que tu ref de seguimiento dice. Siempre prefiérelo.</p>
    <h2>Pushes atómicos</h2>
    <pre><code>git push --atomic origin branchA branchB</code></pre>
    <p>Con <code>--atomic</code>, o todas las actualizaciones tienen éxito o ninguna; útil cuando las refs deben moverse juntas.</p>
    <h2>Políticas de push</h2>
    <pre><code>git config --global push.default simple        # branch actual a su upstream
    git config --global push.default current       # branch actual a remoto del mismo nombre
    git config --global push.default upstream      # actual al nombre de su upstream
    git config --global push.autoSetupRemote true  # 2.37+: -u automático para nuevos branches</code></pre>
    <h2>Hooks del lado del servidor</h2>
    <p>Las plataformas de hosting ejecutan hooks <code>pre-receive</code> y <code>update</code> para hacer cumplir políticas (commits firmados, nombres de branch, CI verde obligatorio). Cuando un push es rechazado, el mensaje del servidor nombra la ref o commit ofensor. Lee el mensaje antes de reintentar.</p>
    <h2>Errores comunes</h2>
    <p>Hacer force-push a un branch compartido como <code>main</code> y reescribir los commits de otras personas. Coordina, o usa <code>--force-with-lease</code> solo en branches privados. Pushear tags individualmente y olvidar pushear los commits, dejando tags colgantes en el servidor. Usa <code>--follow-tags</code>. Pushear al remoto incorrecto porque tienes varios configurados; <code>git push -v</code> muestra exactamente a dónde va. Finalmente, esperar que <code>git push --delete</code> elimine archivos; elimina <em>refs</em>. Para eliminar archivos, commitea una eliminación y pushea ese commit.</p>

- source_title: "Conflict markers and how Git produces them"
  title: "Marcadores de conflicto y cómo los produce Git"
  langcode: es
  body: |
    <h2>Introducción</h2>
    <p>Cuando Git no puede combinar automáticamente dos cambios en la misma región de un archivo, deja <em>marcadores de conflicto</em> en la copia de trabajo y te permite resolver manualmente. Los marcadores no son magia; registran exactamente lo que cada lado hizo respecto a una base común.</p>
    <h2>Anatomía</h2>
    <pre><code>&lt;&lt;&lt;&lt;&lt;&lt;&lt; HEAD
    line as it is on our branch
    =======
    line as it is on their branch
    &gt;&gt;&gt;&gt;&gt;&gt;&gt; feature/login</code></pre>
    <p>La sección entre <code>&lt;&lt;&lt;</code> y <code>===</code> es "ours" (el branch actual). Entre <code>===</code> y <code>&gt;&gt;&gt;</code> es "theirs". Resolver es mantener el texto correcto, eliminar los marcadores y stagear.</p>
    <h2>Marcadores three-way (estilo diff3)</h2>
    <pre><code>git config --global merge.conflictStyle diff3</code></pre>
    <p>Ahora los marcadores también incluyen la versión base:</p>
    <pre><code>&lt;&lt;&lt;&lt;&lt;&lt;&lt; HEAD
    our version
    ||||||| merged common ancestor
    base version
    =======
    their version
    &gt;&gt;&gt;&gt;&gt;&gt;&gt; feature/login</code></pre>
    <p>Ver la base a menudo aclara qué pretendía cada lado. Aún mejor, desde Git 2.35:</p>
    <pre><code>git config --global merge.conflictStyle zdiff3</code></pre>
    <p>que recorta el contexto común.</p>
    <h2>Cómo los produce Git</h2>
    <p>Para cada par de hunks conflictivos, Git ejecuta un diff three-way entre base, ours y theirs. Si ambos lados cambiaron la misma región de manera diferente, Git escribe ambas versiones rodeadas de marcadores. De lo contrario, el lado que cambió gana automáticamente.</p>
    <h2>Resolviendo</h2>
    <pre><code>git status                       # listar paths conflictivos
    edit each file
    git add &lt;file&gt;                   # marcar como resuelto
    git commit                       # usa el mensaje preparado</code></pre>
    <p>O usa una herramienta de merge:</p>
    <pre><code>git mergetool
    git config --global merge.tool meld</code></pre>
    <h2>Inspeccionando cada lado</h2>
    <pre><code>git show :1:path        # base
    git show :2:path        # ours
    git show :3:path        # theirs
    git checkout --ours path
    git checkout --theirs path</code></pre>
    <p>La sintaxis con dos puntos lee directamente desde los stages conflictivos del index.</p>
    <h2>Abortando</h2>
    <pre><code>git merge --abort
    git rebase --abort
    git cherry-pick --abort</code></pre>
    <h2>rerere</h2>
    <p>"Reuse recorded resolution" recuerda tus resoluciones de conflicto y las reaplica la próxima vez que aparezca el mismo conflicto:</p>
    <pre><code>git config --global rerere.enabled true</code></pre>
    <p>Indispensable para cadenas largas de rebase.</p>
    <h2>Renames y conflictos binarios</h2>
    <p>No todos los conflictos producen marcadores de texto. Conflictos rename/rename, rename/delete y modify/delete dejan el index en un estado con múltiples stages pero sin marcadores &lt;&lt;&lt; en el archivo. Los archivos binarios no se pueden mergear textualmente para nada; ambas versiones se escriben a disco y el index registra el conflicto:</p>
    <pre><code>git status
    # both modified:   image.png
    # deleted by us:   old.txt
    # added by them:   new.txt
    git checkout --ours image.png      # mantener nuestra versión
    git checkout --theirs new.txt
    git add image.png new.txt</code></pre>
    <p>Siempre lee <code>git status</code> al momento del conflicto; etiqueta explícitamente estos tipos de conflicto menos comunes.</p>
    <h2>Errores comunes</h2>
    <p>Resolver eliminando los marcadores sin leer los contenidos, descartando accidentalmente un lado. Siempre lee ambas mitades y la base. Olvidar hacer <code>git add</code> tras editar; <code>git commit</code> rechazará con "unmerged paths". Tratar <code>--ours</code> y <code>--theirs</code> como idénticos a <code>-X ours</code> y <code>-X theirs</code>; el primero reemplaza un archivo conflictivo entero, el segundo es una pista a la estrategia de merge. Finalmente, copiar un archivo parcialmente resuelto desde otro lado y saltarse Git; el index aún tiene entradas en stage 1/2/3 hasta que hagas <code>git add</code>.</p>

- source_title: "The merge base algorithm"
  title: "El algoritmo de la merge base"
  langcode: es
  body: |
    <h2>Introducción</h2>
    <p>La <em>merge base</em> de dos commits es su mejor ancestro común: la base que Git usa para los merges three-way. Elegir la base correcta es lo que hace que los merges "automáticos" realmente funcionen.</p>
    <h2>Encontrándola</h2>
    <pre><code>git merge-base A B
    git merge-base --all A B           # todos los mejores ancestros comunes
    git merge-base --octopus A B C
    git merge-base --is-ancestor X Y   # exit 0 si X es ancestro de Y
    git merge-base --fork-point main feature</code></pre>
    <h2>Definición</h2>
    <p>Un ancestro común C de A y B es un "mejor" ancestro común si ningún otro ancestro común de A y B es descendiente de C. La mayoría de pares tienen un único mejor ancestro común. Cuando el grafo contiene merges entrecruzados, pueden existir varios; eso es lo que reporta <code>--all</code>.</p>
    <h2>Cómo lo usa el merge three-way</h2>
    <p>Dados commits A y B con merge base M, Git para cada archivo:</p>
    <ol>
      <li>Lee el archivo en M, A y B.</li>
      <li>Si solo un lado cambió, toma ese lado.</li>
      <li>Si ambos lados cambiaron de forma idéntica, toma cualquiera.</li>
      <li>Si ambos lados cambiaron de forma diferente, ejecuta un merge de texto three-way o emite marcadores de conflicto.</li>
    </ol>
    <h2>Estrategias recursive y ort</h2>
    <p>Cuando existen varias merge bases, la estrategia recursive las <em>mergea primero</em>, produciendo una base virtual, y la usa para el merge three-way final. La estrategia <code>ort</code> (predeterminada desde 2.33) hace lo mismo con una implementación más rápida y eficiente en memoria.</p>
    <pre><code>git merge -s ort feature
    git merge -s recursive feature
    git merge -s resolve feature       # solo una merge base, sin recursión</code></pre>
    <h2>Fork point</h2>
    <p>Para rebase, Git a menudo necesita saber dónde un branch topic se separó de un branch base. <code>--fork-point</code> consulta el reflog de la base para encontrar el punto más reciente en el que topic y base compartieron historial:</p>
    <pre><code>git rebase --fork-point main feature
    git merge-base --fork-point main feature</code></pre>
    <h2>Ejemplo trabajado</h2>
    <pre><code>A---B---C   main
         \
          D---E   feature

    git merge-base main feature   # B</code></pre>
    <p>Un merge de <code>main</code> en <code>feature</code> hace three-way usando B como la base.</p>
    <h2>Inspeccionando por qué un merge tiene conflictos</h2>
    <pre><code>git merge-base HEAD feature
    git diff &lt;base&gt; HEAD -- file
    git diff &lt;base&gt; feature -- file</code></pre>
    <p>Este par de diffs es exactamente lo que ve el merge de Git.</p>
    <h2>Errores comunes</h2>
    <p>Asumir que siempre hay exactamente una merge base; los historiales entrecruzados producen varias. Tratar <code>--fork-point</code> como sustituto de <code>--onto</code>; resuelven problemas diferentes. Elegir <code>--strategy=ours</code> cuando querías <code>--strategy-option=ours</code>; el primero descarta sus cambios completamente. Finalmente, recalcular la merge base a mano desde la salida de <code>git log</code> y equivocarte; usa <code>git merge-base</code> en lugar de adivinar a ojo.</p>

- source_title: "Reachability and ancestry in Git"
  title: "Alcanzabilidad y ascendencia en Git"
  langcode: es
  body: |
    <h2>Introducción</h2>
    <p>"Alcanzabilidad" es la propiedad más importante de un objeto Git. Un objeto es <em>alcanzable</em> si alguna ref lleva a él vía enlaces de padre o tree. Los objetos inalcanzables son elegibles para recolección de basura.</p>
    <h2>Reglas de alcanzabilidad</h2>
    <p>Empezando desde cualquier ref:</p>
    <ul>
      <li>Un commit alcanza su tree raíz, todos los padres y (transitivamente) los trees y padres de esos padres.</li>
      <li>Un tree alcanza todas las entradas (blobs y subtrees).</li>
      <li>Un tag anotado alcanza el objeto etiquetado.</li>
    </ul>
    <p>Las refs incluyen branches locales, branches de seguimiento remoto, tags, stash, notes y el reflog (hasta la expiración).</p>
    <h2>Listando objetos alcanzables</h2>
    <pre><code>git rev-list --objects --all | head
    git rev-list --objects HEAD
    git rev-list --count HEAD</code></pre>
    <h2>Pruebas de ascendencia</h2>
    <pre><code>git merge-base --is-ancestor X Y &amp;&amp; echo "X is ancestor of Y"
    git rev-list X..Y --count                # cuántos commits hay entre
    git log --ancestry-path A..B --oneline   # solo commits en el camino A a B</code></pre>
    <p><code>--ancestry-path</code> es invaluable para encontrar la cadena de commits que llevó un fix de un tag a otro.</p>
    <h2>Operadores de rango</h2>
    <ul>
      <li><code>A..B</code>: alcanzables desde B, no desde A.</li>
      <li><code>A...B</code>: diferencia simétrica (cualquier lado, no ambos).</li>
      <li><code>^A B C</code>: alcanzables desde B o C pero no A.</li>
    </ul>
    <pre><code>git log main..feature                 # commits añadidos por feature
    git log main...feature --left-right   # ambos lados etiquetados</code></pre>
    <h2>Objetos inalcanzables</h2>
    <pre><code>git fsck --unreachable
    git fsck --dangling
    git fsck --lost-found      # los escribe en .git/lost-found</code></pre>
    <p>Los objetos inalcanzables sobreviven hasta que <code>git gc --prune</code> los elimina; el período de gracia predeterminado es dos semanas (<code>gc.pruneExpire</code>).</p>
    <h2>El papel del archivo commit-graph</h2>
    <p>Las consultas de alcanzabilidad y ascendencia son el cuello de botella de muchas operaciones Git. El archivo <code>commit-graph</code> precalcula los números de generación y listas de padres, haciendo estas consultas O(log n) en lugar de O(n):</p>
    <pre><code>git commit-graph write --reachable
    git config --global core.commitGraph true</code></pre>
    <h2>Alcanzabilidad por bitmaps</h2>
    <p>Del lado del servidor, los <em>bitmaps de alcanzabilidad</em> permiten a Git responder "¿qué objetos son alcanzables desde este commit?" en microsegundos, almacenando un bit precalculado por objeto. Se escriben con:</p>
    <pre><code>git repack -adb</code></pre>
    <h2>Recorridos limitados por fecha o ruta</h2>
    <p>La maquinaria de alcanzabilidad acepta muchos limitadores que se combinan con la sintaxis de rango:</p>
    <pre><code>git rev-list --since=2024-01-01 main
    git rev-list main -- path/to/file
    git rev-list --no-merges main..feature
    git rev-list --first-parent main
    git rev-list HEAD --count</code></pre>
    <p>Combina estos para responder preguntas específicas como "¿cuántos commits no-merge aterrizó Ada en main el último trimestre?" sin recurrir a pipelines de shell. La salida estable del plumbing hace trivial alimentar el resultado a herramientas de reporte.</p>
    <h2>Errores comunes</h2>
    <p>Creer que un branch eliminado borra sus commits; permanecen alcanzables a través del reflog durante 90 días, e inalcanzables pero no podados durante dos semanas más. Confundir <code>A..B</code> con <code>A...B</code>; uno es asimétrico, el otro simétrico. Usar <code>HEAD~3</code> para navegar a través de merges y confundirse por el recorrido de primer padre; usa <code>HEAD^2</code> para cambiar al segundo padre. Finalmente, esperar que <code>git fsck</code> encuentre commits perdidos tras un clon nuevo; el reflog y los objetos colgantes solo existen localmente donde se hizo el trabajo.</p>

- source_title: "Symbolic refs"
  title: "Refs simbólicas"
  langcode: es
  body: |
    <h2>Introducción</h2>
    <p>Una <em>ref simbólica</em> es una referencia cuyo valor es otro nombre de ref en lugar de un hash de objeto. El ejemplo canónico es <code>HEAD</code>, que normalmente contiene <code>ref: refs/heads/main</code>. Las refs simbólicas permiten a Git rastrear "el branch actual" como datos, no como estado.</p>
    <h2>Leyendo y escribiendo</h2>
    <pre><code>git symbolic-ref HEAD
    # refs/heads/main

    git symbolic-ref refs/remotes/origin/HEAD
    # refs/remotes/origin/main

    git symbolic-ref HEAD refs/heads/feature/login   # cambiar sin checkout
    git symbolic-ref --short HEAD                      # forma corta: main
    git symbolic-ref --delete refs/remotes/origin/HEAD</code></pre>
    <h2>HEAD como ref simbólica</h2>
    <p>Cuando haces commit, Git resuelve <code>HEAD</code> para encontrar el branch actual y actualiza la punta de <em>ese</em> branch. Cuando <code>HEAD</code> está desconectado, deja de ser simbólica y contiene un SHA crudo.</p>
    <pre><code>cat .git/HEAD
    # ref: refs/heads/main         (simbólica)
    # vs después de detach:
    # a1b2c3d4...                  (crudo)</code></pre>
    <h2>HEAD remoto</h2>
    <p>Cada remoto puede tener un <code>HEAD</code> simbólico indicando su branch predeterminado. Establecer o refrescar:</p>
    <pre><code>git remote set-head origin --auto       # consultar al servidor
    git remote set-head origin main         # establecer explícitamente
    git remote set-head origin --delete</code></pre>
    <p>Esto es lo que hace que <code>git log origin</code> resuelva a <code>origin/main</code>.</p>
    <h2>Por qué usarlas</h2>
    <ul>
      <li>El "branch actual" puede cambiar sin reescribir el historial.</li>
      <li>Las herramientas pueden preguntar "¿cuál es el predeterminado?" sin codificar nombres.</li>
      <li>Los hooks pueden apuntar al branch <em>actualmente checkeado</em> de forma genérica.</li>
    </ul>
    <h2>Worktrees y HEAD por worktree</h2>
    <p>Cada worktree vinculado (<code>git worktree add</code>) tiene su propio <code>HEAD</code>, almacenado bajo <code>.git/worktrees/&lt;name&gt;/HEAD</code>. Cada uno puede apuntar a un branch diferente:</p>
    <pre><code>git worktree add ../wt-feature feature/login
    cat ../wt-feature/.git
    # gitdir: /path/to/main/.git/worktrees/wt-feature
    cat .git/worktrees/wt-feature/HEAD
    # ref: refs/heads/feature/login</code></pre>
    <h2>Detección</h2>
    <pre><code>git symbolic-ref -q HEAD &amp;&amp; echo "on a branch" || echo "detached"</code></pre>
    <h2>Renombrando el predeterminado</h2>
    <p>Para renombrar <code>master</code> a <code>main</code> de forma segura:</p>
    <pre><code>git branch -m master main
    git symbolic-ref HEAD refs/heads/main
    git push -u origin main
    git symbolic-ref refs/remotes/origin/HEAD refs/remotes/origin/main</code></pre>
    <h2>Inspeccionando la resolución simbólica</h2>
    <p><code>git rev-parse</code> resuelve un nombre a través de refs simbólicas hasta un SHA, mientras que <code>git symbolic-ref</code> solo sigue un nivel. La pareja es útil para scripts:</p>
    <pre><code>git symbolic-ref HEAD                       # refs/heads/main
    git symbolic-ref --short HEAD               # main
    git rev-parse HEAD                          # SHA
    git rev-parse --symbolic-full-name HEAD     # refs/heads/main
    git rev-parse --symbolic-full-name @{u}     # refs/remotes/origin/main</code></pre>
    <p>Usa <code>--symbolic-full-name</code> cuando quieras el nombre canónico de la ref sin importar qué atajo escribió el usuario.</p>
    <h2>Errores comunes</h2>
    <p>Editar <code>.git/HEAD</code> a mano y olvidar el salto de línea final, dejando a Git incapaz de parsearlo. Usa <code>git symbolic-ref</code>. Tratar <code>refs/remotes/origin/HEAD</code> como autoritativo cuando en realidad está cacheado; refresca con <code>git remote set-head origin --auto</code>. Confundir una ref simbólica que apunta a un branch faltante con un error real; <code>git symbolic-ref -q</code> sale con código distinto de cero, lo que los scripts pueden manejar. Finalmente, eliminar la ref subyacente sin actualizar la simbólica, dejando una symref colgante; las herramientas pueden reportarla pero es inofensiva y fácil de arreglar con otro <code>symbolic-ref</code>.</p>

- source_title: "Loose objects vs packed objects"
  title: "Objetos sueltos vs objetos empaquetados"
  langcode: es
  body: |
    <h2>Introducción</h2>
    <p>Git almacena objetos en dos formatos físicos. Los objetos <em>sueltos</em> son archivos individuales; los objetos <em>empaquetados</em> viven dentro de un archivo pack con un cuerpo comprimido con delta. Ambas formas describen los mismos objetos lógicos, direccionados por los mismos hashes.</p>
    <h2>Disposición de sueltos</h2>
    <p>Cada objeto suelto está en <code>.git/objects/xx/yyy...</code>, donde <code>xx</code> son los primeros dos chars hex del SHA y <code>yyy...</code> los 38 restantes. El archivo es los bytes desinflados con zlib de <code>&lt;type&gt; &lt;size&gt;\0&lt;content&gt;</code>:</p>
    <pre><code>find .git/objects -type f -name '??' -prune -o -type f -print | head
    git cat-file -p &lt;sha&gt;</code></pre>
    <h2>Disposición de pack</h2>
    <pre><code>.git/objects/pack/pack-&lt;hash&gt;.pack
    .git/objects/pack/pack-&lt;hash&gt;.idx</code></pre>
    <p>El archivo <code>.idx</code> mapea SHA a offset de bytes dentro del <code>.pack</code>; sin él, el pack requeriría un escaneo lineal.</p>
    <h2>Cómo se mueven los objetos entre formas</h2>
    <p>Los objetos nuevos se escriben sueltos. Se vuelven empaquetados cuando:</p>
    <ul>
      <li>Se ejecuta <code>git gc</code> (manual o automático).</li>
      <li>Se invoca <code>git repack</code>.</li>
      <li>Un fetch o push los transfiere como un pack.</li>
      <li><code>git fast-import</code> los escribe directamente en un pack.</li>
    </ul>
    <pre><code>git gc
    git repack -a -d
    git count-objects -v</code></pre>
    <p><code>count-objects -v</code> reporta el conteo de sueltos, uso total de disco y estadísticas de pack.</p>
    <h2>Compromisos</h2>
    <ul>
      <li><strong>Sueltos</strong>: simple, fácil de inspeccionar, rápido para escribir un solo objeto. Lento cuando hay millones.</li>
      <li><strong>Empaquetados</strong>: compactos, comprimidos con delta, rápidos para lectura masiva. Requieren reempaquetar para incorporar nuevos objetos.</li>
    </ul>
    <h2>Auto-gc</h2>
    <p>Git dispara un auto-gc cuando se acumulan demasiados objetos sueltos. Ajustables:</p>
    <pre><code>git config gc.auto 6700           # umbral para objetos sueltos
    git config gc.autoPackLimit 50    # umbral para número de packs
    git config gc.auto 0              # deshabilitar auto-gc (no recomendado)</code></pre>
    <h2>Inspeccionando un pack</h2>
    <pre><code>git verify-pack -v .git/objects/pack/pack-&lt;hash&gt;.idx | head
    git verify-pack -s .git/objects/pack/pack-&lt;hash&gt;.idx</code></pre>
    <p>Verás tipos de objeto, tamaños empaquetados, deltas y profundidades de cadena.</p>
    <h2>Recuperando de corrupción</h2>
    <pre><code>git fsck --full
    cp -r broken-repo backup
    git unpack-objects &lt; .git/objects/pack/pack-&lt;hash&gt;.pack</code></pre>
    <p><code>unpack-objects</code> explota un pack de vuelta a forma suelta, útil cuando un solo objeto malo dentro de un pack está derribando muchas operaciones.</p>
    <h2>Buscando un objeto</h2>
    <p>Cuando Git resuelve un SHA, busca en este orden: archivo de objeto suelto, luego cada idx de pack, luego alternates (<code>objects/info/alternates</code>). La búsqueda es esencialmente de tiempo constante por pack gracias a la tabla fanout del idx. El impacto en rendimiento de tener muchos packs pequeños vs un pack grande es real, por lo que <code>gc</code> consolida:</p>
    <pre><code>git count-objects -v
    cat .git/objects/info/alternates 2&gt;/dev/null
    git verify-pack -s .git/objects/pack/pack-&lt;hash&gt;.idx</code></pre>
    <p>Los alternates permiten a múltiples repos compartir un pool de objetos en disco; <code>git clone --shared</code> crea tal configuración y ahorra espacio al costo de algo de seguridad.</p>
    <h2>Errores comunes</h2>
    <p>Eliminar manualmente archivos <code>pack-</code> para reclamar espacio; eso destruye historial alcanzable. Usa <code>git gc</code>. Deshabilitar auto-gc en repos de larga duración y terminar con millones de objetos sueltos, ralentizando cada operación. Ejecutar <code>git gc --aggressive</code> regularmente cuando un <code>gc</code> normal serviría; el empaquetamiento agresivo es caro. Finalmente, copiar un repo con <code>cp -r</code> mientras un pack se está escribiendo, terminando con un index corrupto. Usa <code>git clone --local</code> para copias seguras.</p>

- source_title: "Delta compression in pack files"
  title: "Compresión delta en archivos pack"
  langcode: es
  body: |
    <h2>Introducción</h2>
    <p>El modelo direccionado por contenido de Git deduplica objetos idénticos, pero blobs similares-pero-no-idénticos (un archivo y una edición posterior) seguirían costando tamaño completo cada uno. Los archivos pack resuelven esto con <em>compresión delta</em>: almacenan un objeto como una base más una secuencia de instrucciones "copy/insert" que producen otro objeto.</p>
    <h2>Cómo funciona</h2>
    <p>Al empaquetar, Git compara objetos candidatos (típicamente blobs de tamaño y tipo similar) y elige una base para cada uno. El delta registra:</p>
    <ul>
      <li>El objeto base (por offset dentro del pack o por SHA).</li>
      <li>Tamaños de base y destino.</li>
      <li>Un flujo de instrucciones <em>copy</em> (usar bytes de la base) e <em>insert</em> (bytes literales).</li>
    </ul>
    <p>El flujo delta luego se comprime con zlib.</p>
    <h2>Inspeccionando deltas</h2>
    <pre><code>git verify-pack -v .git/objects/pack/pack-&lt;hash&gt;.idx | head -20</code></pre>
    <p>Las columnas de salida incluyen tamaño empaquetado, profundidad y SHA base para entradas delta. Un objeto no-delta no tiene base.</p>
    <h2>Ajustables</h2>
    <pre><code>git config pack.window 250          # candidatos examinados por objeto
    git config pack.depth 50            # longitud máxima de cadena
    git config pack.threads 4
    git config pack.windowMemory 100m
    git config pack.deltaCacheSize 256m</code></pre>
    <p><code>pack.window</code> controla qué tan agresivamente Git busca buenas bases; <code>pack.depth</code> limita cuán largas pueden crecer las cadenas delta.</p>
    <h2>Repack agresivo vs normal</h2>
    <pre><code>git repack -a -d                    # estándar
    git repack -a -d --depth=250 --window=250   # agresivo
    git gc --aggressive</code></pre>
    <p>Los repacks agresivos descartan los deltas existentes y los recalculan desde cero, costando CPU pero posiblemente mejorando el resultado.</p>
    <h2>Alcanzabilidad y bitmaps</h2>
    <p>Los servidores a menudo combinan empaquetamiento delta con <em>bitmaps de alcanzabilidad</em> para cálculo rápido de conjuntos de clone:</p>
    <pre><code>git repack -adb</code></pre>
    <h2>Por qué algunos objetos no se deltifican</h2>
    <ul>
      <li>Datos criptográficamente aleatorios (ya incomprimibles).</li>
      <li>Objetos cuyos únicos candidatos son más pequeños que el umbral configurado.</li>
      <li>Objetos más allá del alcance de la pack window.</li>
    </ul>
    <h2>Deltas entre packs</h2>
    <p>Los multi-pack indexes (<code>git multi-pack-index</code>) más el modo de repack <code>--geometric</code> (Git 2.33+) hacen posible mantener deltas entre muchos packs eficientemente:</p>
    <pre><code>git repack --geometric=2 -d</code></pre>
    <p>Este es el esquema recomendado para repositorios grandes.</p>
    <h2>Delta islands</h2>
    <p>Para operadores de servidor que alojan muchos forks del mismo proyecto, las <em>delta islands</em> particionan objetos para que los deltas solo ocurran dentro del conjunto de refs de un fork, permitiendo el clone rápido de cualquier fork individual:</p>
    <pre><code>git config pack.island "refs/remotes/(.*)/heads"
    git config pack.islandCore "main"
    git repack -adb</code></pre>
    <p>Sin islands, un objeto alcanzable solo desde el fork A podría ser deltificado contra un objeto solo alcanzable desde el fork B; servir el clone del fork A entonces requeriría enviar también objetos de B. La mayoría de usuarios nunca necesitan esto, pero es la salsa secreta detrás del rendimiento del pack server de GitHub, GitLab y Bitbucket.</p>
    <h2>Errores comunes</h2>
    <p>Asumir que los deltas son hacia adelante (más nuevo = base) o hacia atrás (más viejo = base); Git es agnóstico y elige cualquiera que produzca el delta más pequeño. Copiar packs entre repos con prefijos SHA diferentes; los datos están direccionados por contenido así que está bien, pero renombrar archivos basados en hashes parciales puede romper. Establecer <code>pack.depth</code> absurdamente alto en busca de packs pequeños; cadenas más profundas significan acceso a objetos más lento (cada delta en la cadena debe aplicarse). Finalmente, esperar que la compresión delta ahorre espacio en binarios ya comprimidos (videos, JPGs); casi nunca lo hace. Usa Git LFS para esos.</p>

- source_title: "The .git directory structure"
  title: "La estructura del directorio .git"
  langcode: es
  body: |
    <h2>Introducción</h2>
    <p>Todo lo que Git sabe sobre un repositorio vive en <code>.git/</code>. Conocer qué es cada entrada quita el misterio del diagnóstico "¿qué acaba de pasar?".</p>
    <h2>Disposición de nivel superior</h2>
    <pre><code>.git/
      HEAD                # ref simbólica al branch actual
      config              # configuración local del repositorio
      description         # usado por gitweb
      index               # el área de staging
      packed-refs         # refs de branch y tag empaquetadas (opcional)
      hooks/              # scripts hook del lado del cliente
      info/               # archivo de excludes y otra info local del repo
      logs/               # reflogs
      objects/            # todos los objetos (sueltos + pack/)
      refs/               # branches, tags, seguimiento remoto
      worktrees/          # worktrees vinculados (si los hay)
      modules/            # directorios .git de submódulos</code></pre>
    <h2>HEAD y refs</h2>
    <pre><code>cat .git/HEAD
    ls .git/refs/heads
    ls .git/refs/remotes/origin
    ls .git/refs/tags
    cat .git/packed-refs | head</code></pre>
    <h2>objects/</h2>
    <p>Objetos sueltos bajo <code>objects/xx/</code>, objetos empaquetados en <code>objects/pack/</code>. No tocar a mano.</p>
    <h2>logs/</h2>
    <p>El reflog. <code>logs/HEAD</code> registra cada movimiento de HEAD; <code>logs/refs/heads/&lt;branch&gt;</code> registra el historial de cada branch.</p>
    <pre><code>cat .git/logs/HEAD | head</code></pre>
    <h2>hooks/</h2>
    <p>Scripts hook de muestra, todos llamados <code>*.sample</code> por defecto. Para habilitar, quita el sufijo y hazlo ejecutable:</p>
    <pre><code>cd .git/hooks
    cp pre-commit.sample pre-commit
    chmod +x pre-commit</code></pre>
    <h2>info/</h2>
    <p><code>info/exclude</code> es un archivo ignore por repo y por clon (no commiteado). <code>info/refs</code> es generado por <code>git update-server-info</code> para servidores HTTP dumb.</p>
    <h2>config</h2>
    <p>Configuración local en formato INI. Edita vía <code>git config --local</code> o <code>git config -e</code>:</p>
    <pre><code>cat .git/config
    git config --local user.email "me@example.com"</code></pre>
    <h2>worktrees/</h2>
    <p>Cada worktree vinculado tiene un directorio bajo <code>.git/worktrees/&lt;name&gt;/</code> con su propio <code>HEAD</code>, <code>index</code> y <code>logs</code>.</p>
    <h2>modules/</h2>
    <p>Para repos con submódulos, el directorio <code>.git</code> de cada submódulo vive aquí, y el árbol de trabajo del submódulo contiene un pequeño archivo <code>.git</code> que apunta a él.</p>
    <h2>Repositorios bare</h2>
    <p>Un repo bare tiene los mismos contenidos pero a nivel superior (sin envoltorio <code>.git/</code>) y sin árbol de trabajo. Convención: nombra el directorio <code>project.git</code>.</p>
    <h2>git rev-parse para paths</h2>
    <p>Los scripts que necesitan encontrar paths dentro de <code>.git/</code> nunca deben asumir que el directorio se llama literalmente <code>.git</code>. Los submódulos usan un archivo <code>.git</code> que apunta a otro lugar; los worktrees tienen gitdirs vinculados; los repos bare no tienen gitdir separado. Usa <code>git rev-parse</code>:</p>
    <pre><code>git rev-parse --git-dir              # gitdir real para el repo actual
    git rev-parse --git-common-dir       # dir compartido para worktrees
    git rev-parse --show-toplevel        # raíz del árbol de trabajo
    git rev-parse --is-inside-git-dir
    git rev-parse --is-inside-work-tree</code></pre>
    <p>Estas cinco preguntas cubren casi cada verificación de "¿dónde estoy?" que un script necesita.</p>
    <h2>Errores comunes</h2>
    <p>Editar archivos dentro de <code>.git/</code> directamente. Casi todo tiene un comando Git que lo hace correctamente, atómicamente y con hooks. Hacer copia de seguridad solo del árbol de trabajo y olvidar que <code>.git/</code> contiene todo el historial; respalda el directorio entero. Compartir <code>.git/hooks/</code> asumiendo que se propagan; los hooks <em>no</em> están versionados. Usa <code>core.hooksPath</code> o una herramienta como <code>pre-commit</code> para compartirlos. Finalmente, eliminar <code>.git/index</code> por impulso; reconstruye con <code>git read-tree HEAD</code>, pero solo después de respaldar.</p>

- source_title: "Git protocols: local, SSH, HTTP/S, git://"
  title: "Protocolos de Git: local, SSH, HTTP/S, git://"
  langcode: es
  body: |
    <h2>Introducción</h2>
    <p>Git puede transportar datos sobre cuatro familias de protocolos. Cada uno tiene diferentes compromisos en rendimiento, autenticación y amabilidad con firewalls.</p>
    <h2>Local / file</h2>
    <p>Clonar desde un directorio usa I/O de archivo local. Dos formas de URL:</p>
    <pre><code>git clone /srv/git/widget.git
    git clone file:///srv/git/widget.git</code></pre>
    <p>La primera forma puede usar hardlinks para los objetos cuando están en el mismo sistema de archivos (muy rápido, muy eficiente en espacio). La forma <code>file://</code> siempre copia vía el protocolo smart.</p>
    <h2>SSH</h2>
    <p>El predeterminado para flujos autenticados. Usa tu cliente SSH y clave:</p>
    <pre><code>git clone git@github.com:example/widget.git
    git clone ssh://git@github.com/example/widget.git</code></pre>
    <p>Detrás de escena, el cliente invoca <code>ssh</code> y ejecuta <code>git-upload-pack</code> o <code>git-receive-pack</code> en el lado del servidor. Configura claves vía <code>~/.ssh/config</code> y <code>ssh-agent</code>.</p>
    <h2>HTTP / HTTPS</h2>
    <p>El más amigable con firewalls y predeterminado para muchos hosts:</p>
    <pre><code>git clone https://github.com/example/widget.git</code></pre>
    <p>El protocolo HTTP smart usa <code>POST /info/refs?service=git-upload-pack</code> y endpoints similares. La autenticación es vía Basic auth (deprecada en muchos proveedores) o token en el campo de contraseña. Un asistente de credenciales evita prompts en cada operación:</p>
    <pre><code>git config --global credential.helper cache
    git config --global credential.helper osxkeychain   # macOS
    git config --global credential.helper manager       # Windows</code></pre>
    <h2>git:// (anónimo)</h2>
    <pre><code>git clone git://example.com/widget.git</code></pre>
    <p>Puerto 9418, no autenticado, texto plano. Mayormente histórico; no recomendado para nuevos despliegues porque no ofrece garantías de integridad más allá de los hashes propios de Git.</p>
    <h2>Versiones de protocolo</h2>
    <p>El protocolo de cable tiene v0, v1 y v2. El protocolo v2 (Git 2.18+, predeterminado 2.26+) es dramáticamente más rápido para repos con muchas refs, porque el servidor solo anuncia las refs que el cliente solicitó.</p>
    <pre><code>git -c protocol.version=2 ls-remote origin
    git config --global protocol.version 2</code></pre>
    <h2>Smart vs dumb</h2>
    <p>Los protocolos "smart" negocian; el HTTP "dumb" solo expone el directorio <code>.git/</code>. El HTTP dumb requiere <code>git update-server-info</code> en cada push y es más lento; casi nadie lo usa hoy.</p>
    <h2>Eligiendo un protocolo</h2>
    <ul>
      <li>HTTPS: el más fácil de configurar, funciona en todas partes, bueno para solo lectura y CI.</li>
      <li>SSH: el mejor para push/pull diario cuando controlas tu clave.</li>
      <li>file://: conveniente para mirrors locales y tests.</li>
      <li>git://: evítalo excepto para mirrors públicos extremadamente permisivos.</li>
    </ul>
    <h2>Negociación de capacidades</h2>
    <p>Al momento de la conexión, el cliente y el servidor intercambian capacidades (multi-ack, side-band, ofs-delta, filter, partial clone, push-options, atomic, etc.). Las capacidades soportadas determinan qué características puede usar la operación. Inspecciona con tracing de paquetes:</p>
    <pre><code>GIT_TRACE_PACKET=1 git -c protocol.version=2 ls-remote origin 2&gt;&amp;1 | head -40</code></pre>
    <p>Los servidores antiguos pueden no soportar capacidades más nuevas; el cliente cae con elegancia. Si ves clones o fetches sorprendentemente lentos, un servidor antiguo carente de <code>multi-ack-detailed</code> o <code>filter</code> es a menudo la causa.</p>
    <h2>Errores comunes</h2>
    <p>Mezclar URLs HTTPS y SSH en el mismo repo; si un CI usa HTTPS pero tu desarrollo usa SSH, los scripts pueden confundirse entre sí. O bien apégate a uno o usa reescritura <code>insteadOf</code>:</p>
    <pre><code>git config --global url."git@github.com:".insteadOf "https://github.com/"</code></pre>
    <p>Almacenar tokens de acceso personal en config en texto plano; usa un asistente de credenciales en su lugar. Olvidar habilitar <code>protocol.version=2</code> en instalaciones de Git antiguas. Finalmente, exponer <code>git://</code> en el internet abierto para acceso de escritura; el protocolo no puede autenticar. Usa SSH o HTTPS.</p>

- source_title: "Authentication and credentials"
  title: "Autenticación y credenciales"
  langcode: es
  body: |
    <h2>Introducción</h2>
    <p>Autenticarse a un remoto Git es mayormente invisible hasta que algo sale mal. Los dos mecanismos principales son <strong>claves SSH</strong> y <strong>credenciales HTTPS</strong> (contraseñas o, más comúnmente hoy, tokens de acceso personal).</p>
    <h2>Claves SSH</h2>
    <p>Genera una clave moderna:</p>
    <pre><code>ssh-keygen -t ed25519 -C "ada@example.com"
    ssh-add --apple-use-keychain ~/.ssh/id_ed25519     # macOS
    ssh-add ~/.ssh/id_ed25519                           # Linux</code></pre>
    <p>Añade la clave pública (<code>~/.ssh/id_ed25519.pub</code>) a tu cuenta de hosting. Prueba:</p>
    <pre><code>ssh -T git@github.com
    # Hi ada! You've successfully authenticated...</code></pre>
    <h2>Configuración SSH</h2>
    <p>Las sobrescrituras por host van en <code>~/.ssh/config</code>:</p>
    <pre><code>Host github.com
        User git
        IdentityFile ~/.ssh/id_ed25519
        IdentitiesOnly yes</code></pre>
    <h2>Credenciales HTTPS</h2>
    <p>La mayoría de los hosts ya no aceptan contraseñas de cuenta; usa un personal access token (PAT) con los scopes correctos. Git lo almacena vía un <em>asistente de credenciales</em>:</p>
    <pre><code>git config --global credential.helper cache              # en memoria, expira
    git config --global credential.helper "cache --timeout=86400"
    git config --global credential.helper osxkeychain        # macOS
    git config --global credential.helper manager            # Windows
    git config --global credential.helper store              # archivo en texto plano (solo si debes)</code></pre>
    <p>La primera vez que pusheas, Git pregunta y el asistente guarda el token.</p>
    <h2>Inspeccionando y limpiando</h2>
    <pre><code>echo "url=https://github.com" | git credential fill
    echo "url=https://github.com" | git credential reject</code></pre>
    <p><code>git credential</code> es una interfaz de bajo nivel al asistente.</p>
    <h2>Asistentes por host</h2>
    <pre><code>git config --global credential.https://github.com.helper manager
    git config --global credential.https://gitlab.com.helper cache</code></pre>
    <p>Útil cuando hosts diferentes requieren métodos de autenticación diferentes.</p>
    <h2>Firmando commits y tags</h2>
    <p>Autenticación y firma son diferentes. Firmar prueba la autoría de un commit:</p>
    <pre><code>git config --global gpg.format ssh
    git config --global user.signingkey ~/.ssh/id_ed25519.pub
    git commit -S -m "Signed commit"
    git log --show-signature -1</code></pre>
    <h2>2FA y SSO</h2>
    <p>Si tu host requiere 2FA, la autenticación HTTPS necesita un PAT (las contraseñas están bloqueadas). Para organizaciones protegidas con SSO, el PAT también debe estar autorizado por SSO; de lo contrario los pushes obtienen un vago error "permission denied".</p>
    <h2>Credenciales por URL</h2>
    <p>El sistema de credenciales de Git puede almacenar credenciales diferentes por host o ruta. La clave de coincidencia es el prefijo de URL, así que puedes tener tokens separados para, digamos, tus orgs personales y de trabajo de GitHub:</p>
    <pre><code>git config --global credential.https://github.com/work-org.helper manager
    git config --global credential.https://github.com/personal.helper "store --file ~/.git-creds-personal"
    git credential fill &lt;&lt;&lt;"url=https://github.com/work-org/repo"</code></pre>
    <p>La configuración <code>credential.useHttpPath</code> le dice a Git que incluya la ruta en la clave de búsqueda, permitiendo credenciales por repo. Úsala solo cuando se necesite; multiplica el número de entradas almacenadas.</p>
    <h2>Errores comunes</h2>
    <p>Pushear con un token que carece de los scopes correctos (p.ej. <code>read-only</code>); el mensaje de error es genérico. Otorgar scopes excesivamente amplios "para estar seguro"; minimiza. Almacenar tokens en <code>credential.helper store</code> en máquinas compartidas; es un archivo en texto plano. Olvidar subir tu clave pública SSH al host y quedar perplejo por "permission denied (publickey)"; <code>ssh -vT git@host</code> muestra qué está pasando. Finalmente, mezclar protocolos: asegúrate de que la URL de tu remoto coincida con tu método de autenticación; <code>git remote set-url</code> puede cambiarla.</p>

- source_title: "Shallow clones and --depth"
  title: "Clones shallow y --depth"
  langcode: es
  body: |
    <h2>Introducción</h2>
    <p>Un <em>clon shallow</em> descarga solo los N commits más recientes de un branch en lugar del historial completo. El resultado es mucho más pequeño y rápido de descargar, al costo de un historial incompleto.</p>
    <h2>Creando</h2>
    <pre><code>git clone --depth 1 https://github.com/example/widget.git
    git clone --depth 50 https://github.com/example/widget.git
    git clone --depth 1 --branch v1.2.3 --single-branch &lt;url&gt;</code></pre>
    <p>El directorio <code>.git</code> contiene un archivo <code>shallow</code> que lista los commits cuyos padres se han omitido.</p>
    <h2>Por qué shallow</h2>
    <ul>
      <li>Builds de CI: solo necesitan el código fuente para HEAD.</li>
      <li>Contenedores y Dockerfiles: imágenes más pequeñas.</li>
      <li>Herramientas one-shot que no necesitan historial.</li>
    </ul>
    <h2>Limitaciones</h2>
    <ul>
      <li>No puedes hacer push desde un clon shallow si tu push depende de commits que el servidor no tiene (raro, pero posible).</li>
      <li><code>git log</code> se detiene en el límite shallow.</li>
      <li>Algunas operaciones (rebase a través del límite, blame en líneas viejas) no pueden funcionar.</li>
      <li>Hasta Git 2.11 clonar shallow sobre HTTP no estaba soportado; Git moderno lo maneja.</li>
    </ul>
    <h2>Profundizando y desclonando shallow</h2>
    <pre><code>git fetch --depth 100              # extender profundidad
    git fetch --deepen 50              # añadir 50 commits más
    git fetch --shallow-since=2024-01-01
    git fetch --unshallow              # descargar historial completo</code></pre>
    <p>Después de <code>--unshallow</code> el repo se comporta como un clon normal.</p>
    <h2>Single-branch y shallow</h2>
    <p><code>--single-branch</code> + <code>--depth 1</code> es el clon útil más pequeño posible. Para rastrear otros branches después:</p>
    <pre><code>git remote set-branches --add origin main feature
    git fetch origin</code></pre>
    <h2>Clones parciales (una optimización diferente)</h2>
    <p>Si necesitas historial completo pero no todos los blobs, usa un clon parcial en su lugar:</p>
    <pre><code>git clone --filter=blob:none &lt;url&gt;
    git clone --filter=tree:0 &lt;url&gt;</code></pre>
    <p>Los clones parciales descargan historial pero aplazan blobs (o trees) hasta necesitarlos. Suelen ser una mejor elección que shallow cuando el servidor los soporta.</p>
    <h2>Detectando estado shallow</h2>
    <pre><code>git rev-parse --is-shallow-repository
    cat .git/shallow</code></pre>
    <h2>Patrones de CI</h2>
    <p>Muchos proveedores de CI usan clones shallow por defecto (depth 1 o 50). Si tu build ejecuta <code>git describe</code> o necesita blame entre versiones, solicita un clon completo:</p>
    <pre><code># GitHub Actions
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0</code></pre>
    <h2>Archivos shallow y grafts</h2>
    <p>El archivo <code>shallow</code> en <code>.git/</code> lista SHAs de commits cuyos padres están intencionalmente faltantes. Git los trata como raíces durante el recorrido del grafo. El mecanismo relacionado pero deprecado <code>info/grafts</code> te permitía falsificar relaciones de padre; usa <code>git replace --graft</code> en su lugar, que es más seguro y se replica sobre fetch:</p>
    <pre><code>cat .git/shallow
    git replace --graft &lt;commit&gt; &lt;new-parent&gt;
    git replace -l
    git replace -d &lt;commit&gt;</code></pre>
    <p>Esto es ocasionalmente útil para coser historiales importados sin reescribir commits.</p>
    <h2>Errores comunes</h2>
    <p>Ejecutar <code>git describe</code> en un clon depth-1 y obtener un error porque ningún tag anotado es alcanzable; o bien descarga tags (<code>--tags</code>) o usa un clon más profundo. Intentar rebasear un branch feature en un clon shallow donde la merge base está más allá del límite shallow; profundiza primero. Pushear desde un clon shallow y sorprenderte por "remote rejected"; el servidor puede necesitar objetos padre faltantes. Finalmente, tratar los clones shallow como sustituto de los clones parciales; resuelven problemas diferentes y los parciales suelen ser más amigables.</p>

- source_title: "Git garbage collection basics"
  title: "Conceptos básicos de la recolección de basura de Git"
  langcode: es
  body: |
    <h2>Introducción</h2>
    <p>La <em>recolección de basura</em> (gc) mantiene tu repositorio compacto y rápido. Git la ejecuta automáticamente cuando se exceden ciertos umbrales. También puedes invocarla manualmente.</p>
    <h2>Qué hace gc</h2>
    <ol>
      <li>Empaqueta objetos sueltos en archivos pack.</li>
      <li>Re-deltifica si se le pide.</li>
      <li>Elimina objetos inalcanzables más viejos que la ventana prune-expire.</li>
      <li>Expira entradas del reflog pasado su TTL.</li>
      <li>Opcionalmente escribe el archivo commit-graph.</li>
    </ol>
    <pre><code>git gc
    git gc --auto
    git gc --aggressive
    git gc --prune=now
    git count-objects -v</code></pre>
    <h2>Umbrales de auto-gc</h2>
    <pre><code>git config gc.auto 6700                 # umbral de objetos sueltos
    git config gc.autoPackLimit 50          # umbral de número de packs
    git config gc.autoDetach true           # ejecutar en segundo plano</code></pre>
    <p>Auto-gc se dispara después de operaciones que crean nuevos objetos, como <code>commit</code> y <code>fetch</code>. Con <code>autoDetach</code>, se ejecuta en segundo plano y Git regresa inmediatamente.</p>
    <h2>Expiración del reflog</h2>
    <pre><code>git config gc.reflogExpire 90.days
    git config gc.reflogExpireUnreachable 30.days
    git reflog expire --expire=90.days --all</code></pre>
    <p>Las entradas alcanzables duran 90 días, las inalcanzables 30 por defecto. Los branches y tags que eliminas dejan rastros en el reflog que sobreviven dentro de esa ventana.</p>
    <h2>Ventana de prune</h2>
    <pre><code>git config gc.pruneExpire 2.weeks.ago</code></pre>
    <p>Los objetos inalcanzables más viejos que esto son elegibles para eliminación durante gc. <code>--prune=now</code> elimina inmediatamente; útil pero peligroso ya que remueve los márgenes de seguridad.</p>
    <h2>Agresivo vs normal</h2>
    <pre><code>git gc                       # rutina: empaquetar nuevos objetos, podar viejos
    git gc --aggressive          # reconstruir deltas desde cero</code></pre>
    <p>El gc agresivo rara vez vale la pena; es CPU-pesado y la ganancia suele ser pequeña. El gc normal es suficiente para la mayoría de repos.</p>
    <h2>Mantenimiento</h2>
    <p>Git moderno (2.29+) tiene un subsistema <code>maintenance</code> que consolida y mejora gc:</p>
    <pre><code>git maintenance start
    git maintenance run --task gc
    git maintenance run --task commit-graph
    git maintenance run --task incremental-repack</code></pre>
    <p><code>git maintenance start</code> registra un trabajo en segundo plano (cron, launchd o systemd timer) que periódicamente optimiza el repo.</p>
    <h2>Operaciones bloqueadas</h2>
    <p>Si gc se interrumpe, puedes ver un archivo de lock obsoleto:</p>
    <pre><code>ls .git/gc.pid
    rm .git/gc.pid    # solo después de confirmar que no hay gc en ejecución</code></pre>
    <h2>Lo que gc nunca elimina</h2>
    <p>Varias clases de objetos están exentas de gc hasta que su referencia expire:</p>
    <ul>
      <li>Objetos alcanzables desde cualquier ref bajo <code>refs/</code>.</li>
      <li>Objetos alcanzables desde el reflog de cualquier ref (hasta la expiración del reflog).</li>
      <li>Objetos bajo <code>refs/stash</code> (la lista de stashes).</li>
      <li>Objetos pinned por mappings de <code>git replace</code>.</li>
      <li>Objetos alcanzables desde HEAD e index de los worktrees.</li>
    </ul>
    <pre><code>git fsck --unreachable --no-reflogs
    git reflog expire --expire-unreachable=now --all
    git gc --prune=now</code></pre>
    <p>Esa última secuencia es la receta estándar "realmente eliminar historial inalcanzable"; úsala con cuidado.</p>
    <h2>Errores comunes</h2>
    <p>Ejecutar <code>git gc --prune=now</code> justo después de una operación destructiva, eliminando la red de seguridad del reflog. Siempre espera la ventana predeterminada a menos que realmente necesites el espacio. Deshabilitar auto-gc en un repo de movimiento rápido, acumulando millones de objetos sueltos. Ejecutar <code>--aggressive</code> en un horario bajo el supuesto de que "más es mejor"; solo quema CPU. Finalmente, ejecutar gc concurrentemente con <code>git push</code> en un servidor; Git moderno maneja la concurrencia de forma segura, pero los scripts personalizados que pelean por <code>.git/objects</code> pueden corromper. Usa <code>git maintenance</code> en lugar de cron jobs caseros.</p>

- source_title: "Porcelain vs plumbing commands"
  title: "Comandos porcelain vs plumbing"
  langcode: es
  body: |
    <h2>Introducción</h2>
    <p>Git está dividido en dos capas. Los comandos <strong>plumbing</strong> son bloques de construcción de bajo nivel que operan sobre la base de datos de objetos, las refs y el index. Los comandos <strong>porcelain</strong> son envoltorios amigables construidos a partir de plumbing. <code>git commit</code> es porcelain; <code>git hash-object</code>, <code>git write-tree</code> y <code>git update-ref</code> son plumbing.</p>
    <h2>Por qué la división</h2>
    <p>La salida de porcelain es para humanos y puede cambiar entre versiones. La salida de plumbing es estable, parseable y pensada para scripts. Mezclarlos es la causa más común de scripts Git frágiles.</p>
    <h2>Comandos porcelain comunes</h2>
    <ul>
      <li><code>git add</code>, <code>git commit</code>, <code>git status</code>, <code>git log</code></li>
      <li><code>git switch</code>, <code>git restore</code>, <code>git branch</code></li>
      <li><code>git merge</code>, <code>git rebase</code>, <code>git cherry-pick</code></li>
      <li><code>git fetch</code>, <code>git pull</code>, <code>git push</code>, <code>git clone</code></li>
    </ul>
    <h2>Comandos plumbing comunes</h2>
    <ul>
      <li><code>git hash-object</code>: calcular el SHA del contenido, opcionalmente escribiéndolo.</li>
      <li><code>git cat-file</code>: leer el tipo, tamaño o contenido de un objeto.</li>
      <li><code>git ls-tree</code>, <code>git ls-files</code>: listar contenidos de tree o index.</li>
      <li><code>git rev-parse</code>: resolver un nombre a un SHA.</li>
      <li><code>git rev-list</code>: listar SHAs de commits desde un recorrido del grafo.</li>
      <li><code>git update-ref</code>, <code>git symbolic-ref</code>: manipulación de refs.</li>
      <li><code>git read-tree</code>, <code>git write-tree</code>, <code>git commit-tree</code>: creación de index/tree/commit.</li>
      <li><code>git update-index</code>: manipulación de bajo nivel del index.</li>
      <li><code>git pack-objects</code>, <code>git unpack-objects</code>, <code>git index-pack</code>.</li>
    </ul>
    <h2>Construyendo un commit a mano</h2>
    <p>Para ver plumbing en acción, construye un commit sin porcelain:</p>
    <pre><code>BLOB=$(echo "hello" | git hash-object --stdin -w)
    TREE=$(printf "100644 blob $BLOB\thello.txt\n" | git mktree)
    COMMIT=$(echo "first" | git commit-tree $TREE)
    git update-ref refs/heads/main $COMMIT
    git log --oneline</code></pre>
    <p>Eso es esencialmente lo que <code>git commit</code> hace internamente.</p>
    <h2>Interfaces estables para scripting</h2>
    <p>Algunos comandos porcelain tienen un modo "porcelain" con un formato parseable estable:</p>
    <pre><code>git status --porcelain=v2
    git diff --raw
    git ls-files --stage
    git for-each-ref --format='%(refname) %(objectname)'</code></pre>
    <p>Usa estos en scripts; nunca parsees la salida humana de <code>git status</code>.</p>
    <h2>Leyendo la man page</h2>
    <p>Las man pages porcelain están listadas en <code>git help -a</code> bajo "Main Porcelain Commands"; plumbing bajo "Manipulators", "Interrogators", "Synching repositories", "Internal helpers". Para tutoriales internos ejecuta <code>git help gitcore-tutorial</code> y <code>git help gitrepository-layout</code>.</p>
    <h2>Cuándo usar plumbing</h2>
    <ul>
      <li>Escribir scripts confiables que sobrevivan actualizaciones de Git.</li>
      <li>Construir herramientas que se integren con el modelo de datos de Git.</li>
      <li>Depurar comandos porcelain reproduciendo sus pasos internos.</li>
      <li>Implementar flujos personalizados donde porcelain no encaja.</li>
    </ul>
    <h2>Errores comunes</h2>
    <p>Parsear la salida humana de <code>git status</code> o <code>git log</code> en scripts y romperse en una actualización de Git o cambio de locale. Usa formatos <code>--porcelain</code> y <code>--pretty=format:</code> con marcadores explícitos. Llamar a <code>git update-ref</code> sin la forma compare-and-set de tres argumentos en scripts concurrentes y carrear con otro proceso. Mezclar <code>git update-index</code> de bajo nivel con <code>git add</code> de alto nivel en el mismo flujo y terminar con un estado del index sorprendente. Finalmente, asumir que porcelain siempre es "más seguro" que plumbing; algunas operaciones plumbing (como <code>git update-ref</code>) son mucho más deterministas que sus contrapartes porcelain. La herramienta correcta depende de qué estás construyendo.</p>

