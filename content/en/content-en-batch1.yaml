# GitMastery content - English batch 1
# 50 pages: 20 Getting Started + 30 Core Concepts
# Import target: Drupal 11

- title: "What is Git? (and what isn't it)"
  section: "Getting Started"
  difficulty: "Beginner"
  git_version: "2.30+"
  weight: 10
  body: |
    <h2>Introduction</h2>
    <p>Git is a <strong>distributed version control system</strong> originally created by Linus Torvalds in 2005 for Linux kernel development. It tracks changes to files over time, lets multiple people collaborate, and gives every developer a complete copy of the project history. Today Git powers most of the world's open source and enterprise software development.</p>
    <h2>What Git is</h2>
    <p>Git is a <em>content-addressed</em> snapshot system. Each commit stores a complete picture of your project's tracked files, identified by a cryptographic hash. Git is fast because most operations are local, and resilient because every clone is a full backup.</p>
    <ul>
      <li><strong>Distributed</strong>: every clone is a complete repository.</li>
      <li><strong>Snapshot-based</strong>: commits store trees, not diffs.</li>
      <li><strong>Branch-friendly</strong>: branches are cheap pointers, not full copies.</li>
    </ul>
    <h2>What Git is not</h2>
    <p>Git is not a backup tool, not a code review system, and not a deployment platform. It does not lock files like centralized systems (CVS, SVN, Perforce in default mode). It does not store binary diffs efficiently for large media files without extensions like Git LFS. And Git is not GitHub: GitHub, GitLab, and Bitbucket are <em>hosting services</em> built on top of Git.</p>
    <h2>Trying it out</h2>
    <p>Verify Git is installed and inspect its version:</p>
    <pre><code>git --version</code></pre>
    <p>Initialize a tiny repository to see Git in action:</p>
    <pre><code>mkdir hello-git
    cd hello-git
    git init
    echo "hello" > readme.txt
    git add readme.txt
    git commit -m "first commit"
    git log --oneline</code></pre>
    <h2>Why Git won</h2>
    <p>Before Git, most teams used centralized tools that required network access for nearly every action. Git's distributed model meant developers could commit, branch, and review history offline. Combined with cheap branching and Linux kernel adoption, Git became the de facto standard within a decade. The widespread availability of free hosting on platforms like GitHub, GitLab, and Bitbucket cemented Git's place: a generation of developers learned Git as their first version control system.</p>
    <h2>How Git stores data</h2>
    <p>Git's storage model is unusual. Instead of recording diffs between versions, Git stores complete snapshots of every file in every commit, deduplicated by content hash. This makes operations like checkout and branch switching essentially constant-time, and makes history operations like log and blame surprisingly fast. The trade-off is that random binary changes can blow up storage, which is why Git LFS exists for large assets.</p>
    <h2>Common mistakes</h2>
    <p>Beginners often confuse Git with GitHub, or assume Git tracks every file in a folder automatically. Git only tracks files you explicitly <code>git add</code>, and only versions content under the working directory of an initialized repository. Another myth: Git "saves" continuously. It does not. Nothing is recorded until you run <code>git commit</code>. Finally, Git is not designed for large binary assets; use Git LFS or a different system for video, large datasets, or built artifacts.</p>

- title: "Installing Git (Linux, macOS, Windows)"
  section: "Getting Started"
  difficulty: "Beginner"
  git_version: "2.30+"
  weight: 20
  body: |
    <h2>Introduction</h2>
    <p>Installing Git is straightforward on every major platform. This page walks through the recommended installation method for Linux, macOS, and Windows, and shows how to verify the install.</p>
    <h2>Linux</h2>
    <p>Most Linux distributions ship Git in their default package repositories. Use your package manager:</p>
    <pre><code># Debian, Ubuntu
    sudo apt update
    sudo apt install git

    # Fedora, RHEL, Rocky
    sudo dnf install git

    # Arch
    sudo pacman -S git</code></pre>
    <p>For the latest version, the official Git project maintains a PPA for Ubuntu (<code>ppa:git-core/ppa</code>) and source tarballs at <code>git-scm.com</code>.</p>
    <h2>macOS</h2>
    <p>macOS includes a stub <code>git</code> that prompts you to install Apple's command line developer tools. Three options work well:</p>
    <ol>
      <li>Run <code>xcode-select --install</code> to get Apple's bundled Git.</li>
      <li>Use <a>Homebrew</a>: <code>brew install git</code> for the latest upstream Git.</li>
      <li>Download the official installer from <code>git-scm.com</code>.</li>
    </ol>
    <pre><code>brew install git
    git --version</code></pre>
    <h2>Windows</h2>
    <p>The recommended installer is <strong>Git for Windows</strong> from <code>git-scm.com</code>. It bundles Git, an OpenSSH client, a Bash shell (Git Bash), and a credential helper. Alternatively use winget or Chocolatey:</p>
    <pre><code>winget install --id Git.Git -e
    choco install git</code></pre>
    <p>During the GUI install you will be asked about line endings, default editor, and PATH integration. The defaults (checkout Windows-style, commit Unix-style; Git from the command line) are sensible for most users.</p>
    <h2>Verifying the install</h2>
    <pre><code>git --version
    git help -a | head</code></pre>
    <p>Any version 2.30 or newer is fine for the topics in this manual. Older versions lack many quality-of-life features such as <code>git switch</code> and <code>git restore</code>.</p>
    <h2>Updating Git</h2>
    <p>Keeping Git current matters: many features in this manual require Git 2.30 or newer, and security fixes ship regularly. On Linux, your package manager handles updates automatically. On macOS with Homebrew, run <code>brew upgrade git</code> periodically. On Windows, <code>git update-git-for-windows</code> (built into Git for Windows) checks for and installs the latest release in one command.</p>
    <pre><code>git --version
    brew upgrade git
    git update-git-for-windows</code></pre>
    <p>If you suddenly see deprecation warnings or commands behaving differently after an upgrade, read the release notes in <code>/usr/share/doc/git/RelNotes/</code> or on <code>git-scm.com</code>; Git's upgrade path is gentle but occasional defaults do change.</p>
    <h2>Common mistakes</h2>
    <p>On macOS, forgetting that the stock Apple-provided Git lags upstream by months or years. Use Homebrew if you want recent features. On Windows, mixing PowerShell and Git Bash can confuse new users about which shell they are in. On Linux, installing from a third-party tarball without removing the distribution package can put two <code>git</code> binaries on PATH; use <code>which -a git</code> to check. Finally, do not run Git installers as <code>sudo</code> unless your package manager explicitly requires it.</p>

- title: "First-time configuration (git config)"
  section: "Getting Started"
  difficulty: "Beginner"
  git_version: "2.30+"
  weight: 30
  body: |
    <h2>Introduction</h2>
    <p>Before your first commit, Git needs to know who you are. <code>git config</code> stores key-value pairs in three scopes: <strong>system</strong> (all users), <strong>global</strong> (your user account), and <strong>local</strong> (a single repository). The global scope lives at <code>~/.gitconfig</code> on Unix and <code>%USERPROFILE%\.gitconfig</code> on Windows.</p>
    <h2>Identity</h2>
    <p>Set your name and email; these are baked into every commit you make:</p>
    <pre><code>git config --global user.name "Ada Lovelace"
    git config --global user.email "ada@example.com"</code></pre>
    <h2>Editor and pager</h2>
    <p>Git launches your editor for commit messages and interactive rebases. Pick one you can quit:</p>
    <pre><code>git config --global core.editor "nano"
    # or
    git config --global core.editor "code --wait"
    # or
    git config --global core.editor "vim"</code></pre>
    <h2>Default branch name</h2>
    <p>Since Git 2.28 you can set the default branch for new repositories:</p>
    <pre><code>git config --global init.defaultBranch main</code></pre>
    <h2>Line endings</h2>
    <p>To prevent CRLF/LF surprises in cross-platform teams:</p>
    <pre><code># Linux, macOS
    git config --global core.autocrlf input

    # Windows
    git config --global core.autocrlf true</code></pre>
    <h2>Useful aliases</h2>
    <pre><code>git config --global alias.st status
    git config --global alias.co checkout
    git config --global alias.lg "log --oneline --graph --decorate --all"</code></pre>
    <p>Now <code>git lg</code> gives a compact graph of all branches.</p>
    <h2>Inspecting configuration</h2>
    <p>List all config with origin files, useful for debugging surprises:</p>
    <pre><code>git config --list --show-origin
    git config --get user.email</code></pre>
    <h2>Pull behaviour</h2>
    <p>Since Git 2.27 the default <code>pull</code> behaviour requires an explicit choice. Pick one:</p>
    <pre><code>git config --global pull.rebase false   # merge (default)
    git config --global pull.rebase true    # rebase
    git config --global pull.ff only        # fast-forward only</code></pre>
    <h2>Conditional includes</h2>
    <p>Git supports per-directory configuration via <code>includeIf</code>. This is the cleanest way to keep work and personal identities separate without remembering to set local config in each clone:</p>
    <pre><code># in ~/.gitconfig
    [includeIf "gitdir:~/work/"]
      path = ~/.gitconfig-work

    # in ~/.gitconfig-work
    [user]
      email = ada@work.com
      signingkey = ssh-ed25519 AAAA...</code></pre>
    <p>Any repo cloned under <code>~/work/</code> automatically picks up the work identity. Combine with <code>onbranch:</code> includes to scope settings to specific branches.</p>
    <h2>Per-repo overrides</h2>
    <p>Local configuration in <code>.git/config</code> overrides the global file. This is the right place for project-specific identities, hooks, and signing keys. To audit which scope a setting comes from:</p>
    <pre><code>git config --show-origin --get user.email
    git config --show-scope --get-all credential.helper</code></pre>
    <p>If a value seems wrong, <code>--show-origin</code> tells you exactly which file owns it. Beware: any of <code>system</code>, <code>global</code>, <code>local</code>, or even <code>worktree</code> scope can shadow another. <code>git config --list --show-origin</code> dumps the full picture in one shot.</p>
    <h2>Common mistakes</h2>
    <p>Setting <code>user.email</code> to a personal address while committing for work, leaking that on public hosting platforms. Use the <em>local</em> scope inside work repositories to override the global value: <code>git config user.email "ada@work.com"</code>. Another classic: editing <code>~/.gitconfig</code> by hand and introducing a syntax error that breaks every Git command. Use <code>git config</code> to write values, and <code>git config --list</code> to verify after each change.</p>

- title: "Creating your first repository (git init)"
  section: "Getting Started"
  difficulty: "Beginner"
  git_version: "2.30+"
  weight: 40
  body: |
    <h2>Introduction</h2>
    <p><code>git init</code> turns an ordinary directory into a Git repository. It creates a hidden <code>.git</code> directory holding all of Git's bookkeeping: objects, refs, configuration, and hooks. The working tree (your normal files) is unchanged.</p>
    <h2>Initializing a project</h2>
    <pre><code>mkdir my-project
    cd my-project
    git init
    # Initialized empty Git repository in /home/ada/my-project/.git/</code></pre>
    <p>Since Git 2.28 you can set the initial branch name on the command line:</p>
    <pre><code>git init --initial-branch=main
    # or shorthand
    git init -b main</code></pre>
    <h2>What just happened</h2>
    <p>Inspect the new directory:</p>
    <pre><code>ls -a
    ls .git</code></pre>
    <p>You will see <code>HEAD</code>, <code>config</code>, <code>description</code>, <code>hooks/</code>, <code>info/</code>, <code>objects/</code>, and <code>refs/</code>. Nothing is committed yet; <code>HEAD</code> points at an unborn branch.</p>
    <h2>Your first commit</h2>
    <ol>
      <li>Create a file: <code>echo "# My Project" &gt; README.md</code></li>
      <li>Stage it: <code>git add README.md</code></li>
      <li>Commit: <code>git commit -m "Initial commit"</code></li>
    </ol>
    <pre><code>echo "# My Project" > README.md
    git add README.md
    git commit -m "Initial commit"
    git log --oneline</code></pre>
    <h2>Bare repositories</h2>
    <p>Servers usually host <em>bare</em> repositories without a working tree. Use <code>--bare</code>:</p>
    <pre><code>git init --bare project.git</code></pre>
    <p>Bare repos are the target of pushes; you do not edit files in them directly.</p>
    <h2>Re-initializing</h2>
    <p>Running <code>git init</code> again in an existing repo is safe; it re-applies templates and prints "Reinitialized existing Git repository". It does not delete commits.</p>
    <h2>Templates</h2>
    <p>By default <code>git init</code> seeds <code>.git/hooks/</code> from <code>/usr/share/git-core/templates/</code>. You can override the template directory to inject your own hooks, default <code>.gitignore</code>, or description into every new repo:</p>
    <pre><code>git init --template=~/.git-templates
    git config --global init.templateDir ~/.git-templates</code></pre>
    <p>This is how organizations push standard pre-commit hooks to every new clone without each developer copying files manually.</p>
    <h2>Initial branch name</h2>
    <p>Many projects have moved from <code>master</code> to <code>main</code> as the default branch name. The choice is local to your repo, but matching your hosting provider's default avoids confusion when pushing for the first time. Set it once globally and forget about it: <code>git config --global init.defaultBranch main</code>.</p>
    <h2>Where Git stops looking</h2>
    <p>Git locates the repository by walking up the directory tree until it finds a <code>.git</code> directory or file. The walk stops at filesystem boundaries by default (<code>core.discoveryAcrossFilesystem</code> changes that). The environment variable <code>GIT_DIR</code> overrides discovery entirely; <code>GIT_WORK_TREE</code> sets a non-default working tree. Together they let you operate on a repo whose <code>.git</code> is in an unusual location:</p>
    <pre><code>GIT_DIR=/srv/repos/widget.git GIT_WORK_TREE=/var/www git status</code></pre>
    <h2>Common mistakes</h2>
    <p>Running <code>git init</code> in your home directory by accident, which puts your entire dotfile collection under one massive repository root. Always check <code>pwd</code> first. Another error: deleting <code>.git</code> to "start over" while keeping uncommitted work. That is fine, but realize all history is gone forever. Finally, do not commit large binaries to a freshly initialized repo without first writing a <code>.gitignore</code>; you will regret it when the repo balloons. Run <code>git status</code> right after <code>git init</code> to see what Git plans to track before you stage anything.</p>

- title: "Basic workflow: edit, stage, commit"
  section: "Getting Started"
  difficulty: "Beginner"
  git_version: "2.30+"
  weight: 50
  body: |
    <h2>Introduction</h2>
    <p>Almost every Git session follows the same three-step rhythm: <strong>edit</strong> files in your working tree, <strong>stage</strong> the changes you want to record, and <strong>commit</strong> them to history. Mastering this loop is the foundation of everything else.</p>
    <h2>The three areas</h2>
    <ul>
      <li><strong>Working tree</strong>: files on disk you edit with your editor.</li>
      <li><strong>Index</strong> (also called the staging area): a snapshot of what will go into the next commit.</li>
      <li><strong>Repository</strong>: the committed history stored in <code>.git</code>.</li>
    </ul>
    <h2>A complete cycle</h2>
    <ol>
      <li>Edit a file in your editor.</li>
      <li>Run <code>git status</code> to see what changed.</li>
      <li>Run <code>git diff</code> to inspect the changes.</li>
      <li>Stage with <code>git add</code>.</li>
      <li>Commit with <code>git commit</code>.</li>
    </ol>
    <pre><code>echo "hello" >> notes.txt
    git status
    git diff
    git add notes.txt
    git diff --staged
    git commit -m "Add greeting to notes"</code></pre>
    <h2>Staging selectively</h2>
    <p>You can stage individual files, glob patterns, or even <em>parts</em> of a file using interactive mode:</p>
    <pre><code>git add notes.txt readme.md
    git add "src/*.py"
    git add -p notes.txt    # patch mode: yes/no per hunk</code></pre>
    <p>Patch mode is invaluable when you have mixed changes you want to split into separate commits.</p>
    <h2>Skipping the index</h2>
    <p>The shortcut <code>git commit -a</code> stages and commits all <em>tracked</em> files in one step. It does not add new (untracked) files:</p>
    <pre><code>git commit -am "Quick fix"</code></pre>
    <h2>Writing good commits</h2>
    <p>A commit message has a short subject line (50 characters or so) and an optional body explaining the why. Run <code>git commit</code> without <code>-m</code> to open your editor:</p>
    <pre><code>git commit
    # editor opens
    # Subject line
    #
    # Longer explanation...</code></pre>
    <h2>Atomic commits</h2>
    <p>A good commit captures one logical change. Build it deliberately: stage exactly the hunks that belong together with <code>git add -p</code>, then commit. If you find yourself describing a commit with "and" in the subject ("Fix login and refactor logger"), it should probably be two commits.</p>
    <pre><code>git add -p src/auth.py        # stage just the login fix
    git commit -m "Fix login redirect on expired session"
    git add -p src/logger.py
    git commit -m "Refactor logger to use structured fields"</code></pre>
    <p>Atomic commits make <code>git bisect</code>, <code>git revert</code>, and code review dramatically easier later.</p>
    <h2>Common mistakes</h2>
    <p>Forgetting to <code>git add</code> new files and being surprised by an "empty" commit. <code>git status</code> always tells you the truth; read it before committing. Another trap: using <code>git commit -am</code> when you have new untracked files, which silently leaves them behind. Finally, committing generated files (build output, <code>node_modules</code>, IDE settings) clutters history and slows clones; add them to <code>.gitignore</code> before staging. When in doubt, run <code>git diff --staged</code> to see exactly what your next commit will contain.</p>

- title: "Understanding the staging area (index)"
  section: "Getting Started"
  difficulty: "Beginner"
  git_version: "2.30+"
  weight: 60
  body: |
    <h2>Introduction</h2>
    <p>The <em>index</em>, also called the staging area or the cache, is one of Git's distinguishing features. It is a binary file at <code>.git/index</code> that holds the <strong>tree you intend to commit next</strong>. Understanding the index removes most of the mystery from <code>git status</code> output.</p>
    <h2>Why it exists</h2>
    <p>The index lets you compose a commit deliberately rather than dumping every change at once. You can edit ten files but commit only the three that fix one bug, leaving the rest staged for a later commit. This decoupling enables clean, atomic history.</p>
    <h2>Inspecting the index</h2>
    <p>Two commands compare the three areas:</p>
    <pre><code>git diff             # working tree vs index
    git diff --staged    # index vs HEAD
    git diff HEAD        # working tree vs HEAD</code></pre>
    <p>The plumbing command <code>git ls-files --stage</code> shows the raw contents of the index, including SHA-1 hashes:</p>
    <pre><code>git ls-files --stage</code></pre>
    <h2>Staging changes</h2>
    <pre><code>git add file.txt          # add or update
    git add .                 # add everything from cwd down
    git add -u                # update tracked files only
    git add -p                # interactive hunk-by-hunk
    git add -N new.txt        # intent-to-add (track empty)</code></pre>
    <h2>Unstaging</h2>
    <p>If you staged something by mistake, take it out without losing the edit:</p>
    <pre><code># Modern (Git 2.23+)
    git restore --staged file.txt

    # Older syntax, still works
    git reset HEAD file.txt</code></pre>
    <h2>The index in conflicts</h2>
    <p>During a merge conflict, the index gains <em>three</em> entries per conflicted path: stage 1 is the common ancestor, stage 2 is "ours", stage 3 is "theirs". <code>git ls-files -u</code> shows them:</p>
    <pre><code>git ls-files -u</code></pre>
    <p>Resolving the conflict means writing a final version and <code>git add</code>-ing it, collapsing back to a single stage-0 entry.</p>
    <h2>The index file format</h2>
    <p>The index is a binary format documented in the Git source under <code>Documentation/gitformat-index.txt</code>. It begins with a 12-byte header (signature <code>DIRC</code>, version, entry count) followed by sorted entries. Several optional extensions add caching: <code>TREE</code> caches subtree hashes for fast <code>write-tree</code>, and <code>UNTR</code> caches untracked-file lists for fast <code>git status</code>. Modern Git also supports a sparse index that elides entries outside the cone you have checked out:</p>
    <pre><code>git sparse-checkout init --cone
    git config core.sparseCheckoutCone true
    git update-index --test-untracked-cache</code></pre>
    <h2>Common mistakes</h2>
    <p>Believing that <code>git add</code> is final. It is not: you can stage, edit again, and stage again. The index is just the next commit's draft. Another classic confusion: editing a staged file, then committing, and being puzzled that the new edits are not included. <code>git add</code> captures a snapshot at the moment you run it; subsequent edits live only in the working tree. Run <code>git diff</code> (no flags) to see what is staged-but-then-modified. Lastly, never delete <code>.git/index</code> manually; rebuild it with <code>git read-tree HEAD</code> if it ever becomes corrupt.</p>

- title: "Viewing history with git log"
  section: "Getting Started"
  difficulty: "Beginner"
  git_version: "2.30+"
  weight: 70
  body: |
    <h2>Introduction</h2>
    <p><code>git log</code> walks the commit graph from a starting point (default: <code>HEAD</code>) backwards through parents, printing each commit. It is the primary tool for exploring project history.</p>
    <h2>Basic usage</h2>
    <pre><code>git log
    git log --oneline
    git log --oneline --graph --decorate --all</code></pre>
    <p>The last form is the swiss-army view: a compact graph of every branch with refs decorated.</p>
    <h2>Filtering by date, author, message</h2>
    <pre><code>git log --since="2 weeks ago"
    git log --until=2025-01-01
    git log --author="Ada"
    git log --grep="bugfix"
    git log -S "deprecated_function"   # pickaxe: when did a string appear?</code></pre>
    <p><code>-S</code> is invaluable for archaeology: it finds commits that change the number of occurrences of a string in any file.</p>
    <h2>Showing diffs</h2>
    <pre><code>git log -p                 # full patch per commit
    git log --stat             # files changed plus +/- counts
    git log --shortstat        # summary line only
    git log -p -- path/to/file # only commits touching a path</code></pre>
    <h2>Custom formats</h2>
    <p><code>--pretty=format:</code> accepts placeholders. A useful one-liner:</p>
    <pre><code>git log --pretty=format:"%h %an %ad %s" --date=short</code></pre>
    <p><code>%h</code> abbreviated hash, <code>%an</code> author name, <code>%ad</code> author date, <code>%s</code> subject. See <code>git help log</code> for the full list.</p>
    <h2>Limits and ranges</h2>
    <pre><code>git log -n 5                       # last 5 commits
    git log main..feature              # commits on feature not on main
    git log main...feature             # symmetric difference
    git log feature ^main              # same as main..feature</code></pre>
    <h2>Following file renames</h2>
    <p>Git does not record renames, it detects them. To follow history across a rename:</p>
    <pre><code>git log --follow -- path/to/file</code></pre>
    <h2>Useful aliases</h2>
    <p>A handful of <code>git log</code> aliases pay for themselves in the first week. Two especially good ones:</p>
    <pre><code>git config --global alias.lg "log --oneline --graph --decorate --all"
    git config --global alias.last "log -1 HEAD --stat"
    git config --global alias.recent "log --since='2 weeks ago' --author=$(git config user.email)"</code></pre>
    <p><code>git lg</code> gives the bird's-eye graph; <code>git last</code> shows what just happened; <code>git recent</code> answers "what have I worked on lately?". Add an alias for any log invocation you type more than twice.</p>
    <h2>Reverse and limit</h2>
    <p>By default <code>git log</code> walks newest to oldest. Sometimes (release notes, code archaeology) you want the opposite, paired with a clean format:</p>
    <pre><code>git log --reverse --oneline v1.0.0..v1.1.0
    git log --reverse --pretty=format:"* %s (%h)" v1.0.0..HEAD &gt; CHANGELOG.draft</code></pre>
    <p>This is also where pickaxe and path filters earn their keep: <code>git log --reverse -S "old_api" -- src/</code> shows the chronological history of a string's appearance and disappearance, perfect for tracing deprecations.</p>
    <h2>Common mistakes</h2>
    <p>Reading only <code>HEAD</code>'s history and missing commits on other branches; pass <code>--all</code> to see them. Confusing <code>--author</code> (a regex on the author field) with a literal exact match; quote the pattern carefully. Using <code>git log file</code> instead of <code>git log -- file</code>: the <code>--</code> separator disambiguates paths from refs, especially if a branch and a file share a name. Finally, expecting <code>git log</code> to show deleted commits after a force-reset; use <code>git reflog</code> for that. <code>git log</code> only walks reachable history.</p>

- title: "Ignoring files with .gitignore"
  section: "Getting Started"
  difficulty: "Beginner"
  git_version: "2.30+"
  weight: 80
  body: |
    <h2>Introduction</h2>
    <p>A <code>.gitignore</code> file lists patterns Git should treat as untracked and never offer to add. It keeps build artifacts, secrets, OS metadata, and editor scratch files out of your repository.</p>
    <h2>Pattern syntax</h2>
    <ul>
      <li><code>name</code>: matches files or directories named <code>name</code> at any depth.</li>
      <li><code>/name</code>: matches only at the repository root.</li>
      <li><code>name/</code>: matches directories only.</li>
      <li><code>*.log</code>: glob; matches any <code>.log</code> file.</li>
      <li><code>**/build</code>: matches <code>build</code> at any depth.</li>
      <li><code>!important.log</code>: re-include a previously ignored path.</li>
      <li><code>#</code> at the start of a line is a comment.</li>
    </ul>
    <h2>A realistic example</h2>
    <pre><code># .gitignore
    # Build output
    /dist/
    /build/
    *.o
    *.pyc

    # Dependencies
    /node_modules/
    /vendor/

    # Editors
    .idea/
    .vscode/
    *.swp

    # OS
    .DS_Store
    Thumbs.db

    # Secrets
    .env
    *.pem</code></pre>
    <h2>Multiple .gitignore files</h2>
    <p>You can place a <code>.gitignore</code> at any level. Patterns are relative to the file's directory, and deeper files override shallower ones. There is also a global ignore file for your personal preferences:</p>
    <pre><code>git config --global core.excludesFile ~/.gitignore_global</code></pre>
    <p>Use that for editor swap files and OS junk, not project-specific paths.</p>
    <h2>Tracking already-tracked files</h2>
    <p>Adding a path to <code>.gitignore</code> does <strong>not</strong> remove it from the repository. Untrack a file while keeping it on disk:</p>
    <pre><code>git rm --cached secrets.env
    git commit -m "Stop tracking secrets.env"</code></pre>
    <h2>Debugging ignores</h2>
    <p>Why is Git ignoring (or not ignoring) a path? Ask:</p>
    <pre><code>git check-ignore -v path/to/file</code></pre>
    <p>The output names the file and line that matched.</p>
    <h2>Order of evaluation</h2>
    <p>Git evaluates ignore rules from several sources, in this order: command-line arguments, then per-directory <code>.gitignore</code> files (deepest first), then <code>$GIT_DIR/info/exclude</code>, and finally the global <code>core.excludesFile</code>. Later (more specific) rules override earlier ones, and a negation (<code>!pattern</code>) only re-includes a path if its parent directory is not itself excluded. This last rule trips many users:</p>
    <pre><code># Wrong: cannot un-ignore a file in an ignored directory
    /build/
    !/build/keep.log

    # Right: ignore contents but keep the directory in
    /build/*
    !/build/keep.log</code></pre>
    <h2>Per-repo and global excludes</h2>
    <p>Two extra ignore mechanisms complement <code>.gitignore</code>. The per-repo, untracked file <code>.git/info/exclude</code> applies only to your clone (good for IDE files you do not want to commit to <code>.gitignore</code> for the whole team). The global <code>core.excludesFile</code> applies to all your repos:</p>
    <pre><code>echo ".idea/" &gt;&gt; .git/info/exclude
    git config --global core.excludesFile ~/.gitignore_global
    echo ".DS_Store" &gt;&gt; ~/.gitignore_global</code></pre>
    <p>Use these for personal preferences; reserve committed <code>.gitignore</code> for team-wide rules.</p>
    <h2>Common mistakes</h2>
    <p>Adding <code>secrets.env</code> to <code>.gitignore</code> after it has already been committed and assuming the secret is gone. It is still in history; rotate the secret and consider using <code>git filter-repo</code> to scrub it. Another trap: ignoring a directory with <code>build</code> when you meant <code>/build</code>, accidentally suppressing a file named <code>build</code> deep in the tree. Finally, committing <code>.gitignore</code> itself is essential; without it, every collaborator must invent their own ignore rules. <code>.gitignore</code> belongs <em>in</em> the repository, not outside it.</p>

- title: "Getting help (man pages, --help, online)"
  section: "Getting Started"
  difficulty: "Beginner"
  git_version: "2.30+"
  weight: 90
  body: |
    <h2>Introduction</h2>
    <p>Git ships with extensive built-in documentation. Knowing how to summon it quickly will save you hours of guesswork. This page tours the help system from one-liners to full manuals.</p>
    <h2>Three ways to ask</h2>
    <p>Each command supports three forms of help:</p>
    <pre><code>git help &lt;command&gt;     # full man page in your pager
    git &lt;command&gt; --help    # same thing
    git &lt;command&gt; -h        # short usage summary</code></pre>
    <p>Example:</p>
    <pre><code>git help commit
    git commit --help
    git commit -h</code></pre>
    <h2>Listing commands</h2>
    <pre><code>git help -a            # all commands
    git help -g            # guides (gittutorial, gitcore-tutorial, etc.)
    git help everyday      # the everyday Git cheatsheet</code></pre>
    <p><code>git help everyday</code> in particular is one of the best beginner-to-intermediate references shipped with Git.</p>
    <h2>Concept guides</h2>
    <p>Git includes prose guides as separate man pages:</p>
    <pre><code>git help gittutorial
    git help gitcore-tutorial
    git help gitglossary
    git help gitworkflows
    git help gitrevisions</code></pre>
    <p><code>gitrevisions</code> is the canonical reference for ref syntax (<code>HEAD~3</code>, <code>main@{yesterday}</code>, etc.).</p>
    <h2>Configuring the help format</h2>
    <p>By default <code>git help</code> opens a man page. You can switch to HTML or info:</p>
    <pre><code>git config --global help.format html
    git config --global help.format info
    git config --global help.format man   # default</code></pre>
    <p>HTML opens the local copy in your browser, useful on systems without <code>man</code>.</p>
    <h2>Online resources</h2>
    <ul>
      <li><strong>git-scm.com/docs</strong>: official manual mirrored online.</li>
      <li><strong>Pro Git book</strong> by Chacon and Straub: free, comprehensive, regularly updated.</li>
      <li><strong>Git mailing list archive</strong>: <code>lore.kernel.org/git</code> for design discussions.</li>
    </ul>
    <h2>Searching documentation</h2>
    <p>If you do not remember a command name, <code>man -k git</code> (or <code>apropos git</code>) lists every Git man page with a one-line description. To search inside the docs, pipe to <code>grep</code>:</p>
    <pre><code>man -k git
    git help -a | grep -i merge
    git help log | grep -A 2 'pickaxe'</code></pre>
    <p>For long-form learning, the Pro Git book is free and authoritative; the Git Reference Manual at <code>git-scm.com/docs</code> mirrors the man pages with cross-links. The <code>gitfaq</code> man page is an underused gem that answers many real-world questions in plain prose.</p>
    <h2>Common mistakes</h2>
    <p>Searching the web for outdated Stack Overflow answers using deprecated commands like <code>git checkout</code> for branch switching when <code>git switch</code> exists. Always cross-check against <code>git help</code> for your installed version. Another mistake is assuming <code>-h</code> and <code>--help</code> behave the same; they do not. <code>-h</code> prints a one-screen summary, while <code>--help</code> opens the full man page (or browser, depending on <code>help.format</code>). Lastly, do not skip <code>git help glossary</code>; many "weird" Git terms (porcelain, plumbing, refspec, dangling object) are defined precisely there in a single short page.</p>

- title: "Common beginner mistakes"
  section: "Getting Started"
  difficulty: "Beginner"
  git_version: "2.30+"
  weight: 100
  body: |
    <h2>Introduction</h2>
    <p>Most people learn Git the hard way, through small disasters. This page collects the most frequent beginner mistakes and how to avoid (or recover from) them. Read it once now and again after a month of use; the second pass will make more sense.</p>
    <h2>Committing as the wrong identity</h2>
    <p>Forgetting to set <code>user.email</code> per repository leaks personal addresses into work commits. Always set a per-repo identity in work clones:</p>
    <pre><code>git config user.email "ada@work.com"
    git log -1 --pretty=format:"%an &lt;%ae&gt;"</code></pre>
    <h2>Committing secrets</h2>
    <p>API keys and <code>.env</code> files in commits live forever, even after a follow-up "delete". Add a <code>.gitignore</code> entry <em>before</em> the first commit, and rotate any leaked credential immediately. Tools like <code>git-secrets</code> and <code>gitleaks</code> can run as pre-commit hooks.</p>
    <h2>Force-pushing over teammates</h2>
    <p><code>git push --force</code> rewrites history on the remote, deleting other people's commits. Prefer <code>--force-with-lease</code>, which refuses to overwrite if the remote has moved:</p>
    <pre><code>git push --force-with-lease</code></pre>
    <h2>Misunderstanding pull</h2>
    <p><code>git pull</code> is fetch + merge (or rebase). Running it with uncommitted changes can produce surprising merge commits. Either commit, stash, or set a sensible default:</p>
    <pre><code>git config --global pull.rebase true
    git config --global pull.ff only</code></pre>
    <h2>Editing detached HEAD without realizing it</h2>
    <p>Checking out a tag or commit hash leaves you in detached HEAD. New commits there are unreachable once you switch away. Always create a branch first:</p>
    <pre><code>git switch -c hotfix v1.2.3</code></pre>
    <h2>Confusing reset, revert, and restore</h2>
    <ul>
      <li><code>git restore</code> changes the working tree or index; safe.</li>
      <li><code>git revert</code> creates a new commit that undoes another; safe and shareable.</li>
      <li><code>git reset --hard</code> moves the branch and discards work; <em>destructive</em>.</li>
    </ul>
    <h2>Committing huge files</h2>
    <p>A 500&nbsp;MB video in a commit is permanent. Use Git LFS for binaries above a few megabytes, and keep build artifacts out of the repository entirely.</p>
    <h2>Recovery toolkit</h2>
    <pre><code>git reflog
    git fsck --lost-found
    git stash list</code></pre>
    <p>The reflog records every move of <code>HEAD</code> for 90 days by default; almost any "lost" commit can be recovered from it.</p>
    <h2>Misreading status</h2>
    <p><code>git status</code>'s output has subtle layers. "Changes not staged for commit" means tracked files modified in the working tree. "Changes to be committed" means staged. "Untracked files" means Git has never seen them. A common confusion: editing a file <em>after</em> staging it shows it under both lists with different content; only what is staged goes into the commit. Run <code>git diff</code> (working vs index) and <code>git diff --staged</code> (index vs HEAD) until the three areas click.</p>
    <pre><code>git status -sb
    git diff --staged --stat</code></pre>
    <h2>Common mistakes</h2>
    <p>Panicking and running <code>rm -rf .git</code> when something looks wrong. Stop. Take a backup of the directory first. Almost every Git mistake is recoverable through the reflog or stash. The single most important habit for beginners: run <code>git status</code> before and after every state-changing command, and run <code>git log --oneline --all --graph</code> when something feels weird.</p>

- title: "Cloning an existing repository (git clone)"
  section: "Getting Started"
  difficulty: "Beginner"
  git_version: "2.30+"
  weight: 110
  body: |
    <h2>Introduction</h2>
    <p><code>git clone</code> copies a remote repository to your machine. It creates a new directory, initializes <code>.git</code> inside it, fetches all objects and refs, sets up a remote called <code>origin</code>, and checks out the default branch. After cloning you have a complete, independent repository.</p>
    <h2>Basic clone</h2>
    <pre><code>git clone https://github.com/torvalds/linux.git
    cd linux
    git remote -v
    # origin  https://github.com/torvalds/linux.git (fetch)
    # origin  https://github.com/torvalds/linux.git (push)</code></pre>
    <h2>Choosing a directory name</h2>
    <p>By default Git uses the last path component. Override it:</p>
    <pre><code>git clone https://github.com/example/widget.git my-widget</code></pre>
    <h2>Picking a protocol</h2>
    <ul>
      <li><strong>HTTPS</strong>: easiest, works through firewalls, often needs a credential helper or token.</li>
      <li><strong>SSH</strong>: convenient with key auth, fast for power users.</li>
      <li><strong>git://</strong>: anonymous, unauthenticated, mostly historical.</li>
      <li><strong>file://</strong> or local path: clone from another directory.</li>
    </ul>
    <pre><code>git clone git@github.com:example/widget.git
    git clone /srv/git/widget.git
    git clone file:///srv/git/widget.git</code></pre>
    <h2>Useful options</h2>
    <pre><code>git clone --depth 1 &lt;url&gt;            # shallow: only the tip
    git clone --branch v1.2.3 &lt;url&gt;     # check out a specific branch or tag
    git clone --single-branch &lt;url&gt;     # fetch only one branch
    git clone --bare &lt;url&gt;              # bare clone, no working tree
    git clone --recurse-submodules &lt;url&gt;</code></pre>
    <p>Shallow clones save bandwidth for CI; convert later with <code>git fetch --unshallow</code>.</p>
    <h2>What clone does, step by step</h2>
    <ol>
      <li>Creates the target directory.</li>
      <li>Runs <code>git init</code> inside it.</li>
      <li>Adds <code>origin</code> as a remote.</li>
      <li>Runs <code>git fetch origin</code>.</li>
      <li>Sets up tracking for the default branch.</li>
      <li>Runs <code>git checkout</code> for that branch.</li>
    </ol>
    <h2>Sparse and partial clones for huge repos</h2>
    <p>Repositories that span gigabytes (operating systems, monorepos) are painful to clone in full. Two complementary features help:</p>
    <pre><code>git clone --filter=blob:none --no-checkout &lt;url&gt; repo
    cd repo
    git sparse-checkout init --cone
    git sparse-checkout set src/myteam
    git checkout main</code></pre>
    <p><code>--filter=blob:none</code> defers blob downloads until needed, while <code>sparse-checkout</code> populates only the directories you list. Together they let you work on a small slice of a massive repo with proportional disk and bandwidth cost.</p>
    <h2>Clone-time hooks</h2>
    <p>Some projects ship setup steps that should run on clone (installing pre-commit hooks, fetching LFS objects, initializing submodules). Git does not run hooks on clone, but you can chain them:</p>
    <pre><code>git clone --recurse-submodules &lt;url&gt; repo
    cd repo
    git lfs install
    pre-commit install</code></pre>
    <p>For new contributors, document this sequence in <code>CONTRIBUTING.md</code> or wrap it in a <code>scripts/bootstrap</code> script. Smart projects make their <code>make setup</code> target idempotent so re-running it after a stale clone is safe.</p>
    <h2>Common mistakes</h2>
    <p>Cloning into a non-empty directory: Git refuses unless you pass an explicit empty target. Cloning huge repositories without <code>--depth</code> on slow connections, then giving up halfway. Cloning over HTTPS to a server that requires SSO, then being unable to push because your token lacks the right scope. Always test with <code>git push --dry-run</code> after the first commit. Finally, cloning into <code>~/Desktop</code> or another sync folder (Dropbox, iCloud, OneDrive) leads to corruption when the sync client mid-writes <code>.git/index</code>. Keep working clones on plain local storage.</p>

- title: "Working with remote repositories (git remote)"
  section: "Getting Started"
  difficulty: "Beginner"
  git_version: "2.30+"
  weight: 120
  body: |
    <h2>Introduction</h2>
    <p>A <em>remote</em> is a named URL pointing to another Git repository. <code>git clone</code> creates one called <code>origin</code> automatically, but you can add as many as you like. Remotes are the bridge between your local repo and the outside world.</p>
    <h2>Listing and inspecting</h2>
    <pre><code>git remote
    git remote -v
    git remote show origin</code></pre>
    <p><code>git remote show</code> contacts the server and reports tracked branches, push rules, and stale refs.</p>
    <h2>Adding and removing</h2>
    <pre><code>git remote add upstream https://github.com/original/widget.git
    git remote rename upstream origin-upstream
    git remote remove origin-upstream</code></pre>
    <p>The <em>fork-and-upstream</em> pattern is common: <code>origin</code> is your fork, <code>upstream</code> is the project you forked from.</p>
    <h2>Changing a URL</h2>
    <p>If a project moves from HTTPS to SSH or to a new host:</p>
    <pre><code>git remote set-url origin git@github.com:example/widget.git
    git remote -v</code></pre>
    <h2>Multiple URLs</h2>
    <p>You can push to several mirrors at once by adding extra push URLs:</p>
    <pre><code>git remote set-url --add --push origin git@gitlab.com:example/widget.git
    git remote -v</code></pre>
    <h2>Pruning stale branches</h2>
    <p>When branches are deleted on the server, your local <code>refs/remotes/origin/*</code> can lag. Clean them:</p>
    <pre><code>git fetch --prune
    git remote prune origin</code></pre>
    <p>Or set it permanently:</p>
    <pre><code>git config --global fetch.prune true</code></pre>
    <h2>Inspecting tracking</h2>
    <pre><code>git branch -vv
    # main           a1b2c3d [origin/main] Latest fix
    # feature/login  e4f5g6h [origin/feature/login: ahead 2] WIP</code></pre>
    <p><code>-vv</code> shows each branch's upstream and how far ahead/behind it is.</p>
    <h2>insteadOf rewriting</h2>
    <p>If a project's URLs change (HTTPS to SSH, host migration, or you want all GitHub URLs to use SSH automatically), <code>insteadOf</code> rewrites them transparently:</p>
    <pre><code>git config --global url."git@github.com:".insteadOf "https://github.com/"
    git config --global url."https://github-mirror.example.com/".insteadOf "https://github.com/"</code></pre>
    <p>This is especially handy in CI, where you can rewrite all clones to a local mirror with one config line, no script edits required. The reverse direction (<code>pushInsteadOf</code>) lets you fetch over HTTPS but push over SSH from the same remote.</p>
    <h2>Triangular workflows</h2>
    <p>In open source, you typically <em>fetch</em> from <code>upstream</code> (the canonical project) and <em>push</em> to <code>origin</code> (your personal fork). Configure once and forget:</p>
    <pre><code>git remote add upstream https://github.com/project/repo.git
    git config branch.main.remote upstream
    git config branch.main.pushRemote origin
    git config --global push.default current</code></pre>
    <p>Now <code>git pull</code> reads from upstream and <code>git push</code> writes to your fork, automatically. The <code>remote.pushDefault</code> setting applies the rule to every branch in a clone.</p>
    <h2>Common mistakes</h2>
    <p>Confusing the <em>name</em> of a remote with its URL. <code>origin</code> is just a label; you can rename it. Another trap: adding the same URL under two different names, then being surprised by duplicate refs. Use <code>git remote -v</code> to audit. Forgetting to <code>git fetch</code> after switching network or changing URL leaves your tracking branches out of date. Finally, on shared servers, deleting a remote-tracking ref locally (e.g. <code>git branch -dr origin/main</code>) does <em>not</em> delete the branch on the server; use <code>git push origin --delete main</code> for that, and only when you really mean it.</p>

- title: "Fetching and pulling changes"
  section: "Getting Started"
  difficulty: "Beginner"
  git_version: "2.30+"
  weight: 130
  body: |
    <h2>Introduction</h2>
    <p><code>git fetch</code> downloads new objects and updates remote-tracking refs <em>without</em> changing your working tree. <code>git pull</code> does a fetch and then integrates the result into your current branch. Knowing the difference is one of the biggest steps from novice to confident Git user.</p>
    <h2>Fetching</h2>
    <pre><code>git fetch                  # default remote (usually origin)
    git fetch origin
    git fetch --all
    git fetch --prune          # delete refs for branches deleted on server
    git fetch origin main      # only one branch</code></pre>
    <p>After a fetch, inspect what changed:</p>
    <pre><code>git log HEAD..origin/main --oneline
    git diff HEAD origin/main</code></pre>
    <h2>Pulling</h2>
    <p><code>git pull</code> is shorthand for fetch followed by either merge or rebase. Choose the strategy:</p>
    <pre><code>git pull                          # uses pull.rebase config
    git pull --rebase
    git pull --ff-only                # refuse if not fast-forward
    git pull origin main</code></pre>
    <h2>Configuring default behaviour</h2>
    <pre><code>git config --global pull.rebase false   # merge (classic default)
    git config --global pull.rebase true    # rebase
    git config --global pull.ff only        # only fast-forward
    git config --global fetch.prune true</code></pre>
    <p>Since Git 2.27 a bare <code>git pull</code> warns if no strategy is configured.</p>
    <h2>Fetch vs pull, when to use which</h2>
    <ul>
      <li>Use <code>fetch</code> when you want to look before integrating.</li>
      <li>Use <code>pull --ff-only</code> when you simply want to catch up on a shared branch.</li>
      <li>Use <code>pull --rebase</code> when working on a topic branch you have not pushed.</li>
      <li>Avoid plain <code>pull</code> on long-lived shared branches; merge commits multiply.</li>
    </ul>
    <h2>Inspecting upstream</h2>
    <pre><code>git status
    # On branch main
    # Your branch is behind 'origin/main' by 3 commits, and can be fast-forwarded.</code></pre>
    <p>This message comes from comparing <code>HEAD</code> to the cached <code>origin/main</code>; run <code>git fetch</code> first to make it accurate.</p>
    <h2>Fetching pull requests</h2>
    <p>Most Git hosts expose pull or merge request branches as special refs you can fetch into your clone for review. For GitHub, add a refspec:</p>
    <pre><code>git config --add remote.origin.fetch '+refs/pull/*/head:refs/remotes/origin/pr/*'
    git fetch
    git switch -c review/123 origin/pr/123</code></pre>
    <p>For GitLab the equivalent path is <code>refs/merge-requests/*/head</code>. With this configured, every <code>git fetch</code> grabs all open PRs locally, ready for inspection without leaving your terminal.</p>
    <h2>Common mistakes</h2>
    <p>Running <code>git pull</code> with uncommitted changes and getting an unexpected merge commit on top of dirty work. Stash or commit first. Forgetting that <code>git status</code>'s "behind" count is only as fresh as the last fetch; if no one has fetched in a week, that count lies. Using <code>git pull --rebase</code> on a branch other people have based work on rewrites their base; rebase only on private branches. And finally, never use <code>git fetch &lt;refspec&gt;</code> with a custom refspec unless you understand it; an accidental colon (<code>main:main</code>) overwrites your local <code>main</code>.</p>

- title: "Pushing your work"
  section: "Getting Started"
  difficulty: "Beginner"
  git_version: "2.30+"
  weight: 140
  body: |
    <h2>Introduction</h2>
    <p><code>git push</code> uploads local commits to a remote and updates that remote's branches and tags. It is how your work becomes visible to collaborators.</p>
    <h2>Basic push</h2>
    <pre><code>git push                          # current branch to its upstream
    git push origin main              # explicit
    git push -u origin feature/login  # set upstream and push</code></pre>
    <p>The <code>-u</code> (or <code>--set-upstream</code>) flag links the local branch to the remote one so future <code>git push</code> and <code>git pull</code> need no arguments.</p>
    <h2>Pushing tags</h2>
    <p>Tags are not pushed by default:</p>
    <pre><code>git push origin v1.2.3
    git push origin --tags          # all tags
    git push --follow-tags          # tags reachable from pushed commits</code></pre>
    <p><code>--follow-tags</code> is the safest default for release workflows.</p>
    <h2>Deleting remote branches</h2>
    <pre><code>git push origin --delete feature/login
    # equivalently
    git push origin :feature/login</code></pre>
    <h2>Force pushing safely</h2>
    <p>Rewriting history (rebase, amend, squash) requires a force push. Always prefer <code>--force-with-lease</code>, which refuses to clobber refs that moved on the server:</p>
    <pre><code>git push --force-with-lease
    git push --force-with-lease=feature/login:abcd1234</code></pre>
    <p>Never <code>--force</code> blindly to a shared branch like <code>main</code>.</p>
    <h2>Configuring push defaults</h2>
    <pre><code>git config --global push.default simple    # default since 2.0
    git config --global push.autoSetupRemote true   # 2.37+: auto -u</code></pre>
    <p>With <code>push.autoSetupRemote</code> set, plain <code>git push</code> on a new branch creates the remote branch and links them automatically.</p>
    <h2>What happens during push</h2>
    <ol>
      <li>Local Git negotiates with the remote to find common commits.</li>
      <li>It packs and uploads only the missing objects.</li>
      <li>The remote runs <code>pre-receive</code> and <code>update</code> hooks.</li>
      <li>If accepted, refs are updated atomically.</li>
      <li>The <code>post-receive</code> hook runs (CI, mirroring, etc.).</li>
    </ol>
    <h2>Atomic and signed pushes</h2>
    <p><code>--atomic</code> turns multi-ref pushes into a single transaction; either every ref updates or none do, which prevents partial deployments. <code>--signed</code> sends a GPG-signed push certificate that some hosts log for audit:</p>
    <pre><code>git push --atomic origin main release/1.2
    git push --signed origin main</code></pre>
    <p>For automated systems, the <code>--receive-pack</code> option lets you specify an alternate receive-pack on the server, occasionally needed for hosts with non-standard binaries. Always use <code>git push --dry-run</code> when scripting destructive pushes for the first time.</p>
    <h2>Common mistakes</h2>
    <p>Pushing to <code>main</code> when you meant a feature branch, because you forgot which branch you were on. Run <code>git status</code> first. Using <code>git push --force</code> against <code>main</code> and rewriting other people's commits; recover with the reflog of the remote (if you have shell access) or by re-pushing from a teammate's clone. Pushing without configured credentials and getting hung on a password prompt; configure a credential helper or SSH key. Finally, large pushes can fail at the last moment if a hook rejects them; if so, the rejection message names the offending commit. Read it carefully rather than re-running blindly.</p>

- title: "Understanding HEAD"
  section: "Getting Started"
  difficulty: "Beginner"
  git_version: "2.30+"
  weight: 150
  body: |
    <h2>Introduction</h2>
    <p><code>HEAD</code> is the most important reference in Git. It tells Git which commit your next commit will descend from. Most of the time <code>HEAD</code> points at a branch, and that branch points at a commit; but <code>HEAD</code> can also point directly at a commit (detached HEAD).</p>
    <h2>Where it lives</h2>
    <p><code>HEAD</code> is a single file at <code>.git/HEAD</code>. Inspect it:</p>
    <pre><code>cat .git/HEAD
    # ref: refs/heads/main</code></pre>
    <p>That single line says "HEAD currently points at the branch <code>main</code>". When you commit, Git advances <code>main</code> and <code>HEAD</code> follows.</p>
    <h2>Inspecting HEAD</h2>
    <pre><code>git rev-parse HEAD              # commit SHA
    git symbolic-ref HEAD           # underlying ref name
    git log -1 HEAD --oneline</code></pre>
    <h2>Detached HEAD</h2>
    <p>Checking out a commit, tag, or remote-tracking branch directly puts <code>HEAD</code> in <em>detached</em> state:</p>
    <pre><code>git checkout v1.2.3
    # You are in 'detached HEAD' state.</code></pre>
    <p><code>.git/HEAD</code> now contains a raw SHA. New commits go nowhere except into the reflog; switch back to a real branch (or create one) before you lose them:</p>
    <pre><code>git switch -c experiment</code></pre>
    <h2>HEAD shorthands</h2>
    <ul>
      <li><code>HEAD</code>: the current commit.</li>
      <li><code>HEAD^</code> or <code>HEAD~1</code>: parent.</li>
      <li><code>HEAD~3</code>: three commits back via first parent.</li>
      <li><code>HEAD^2</code>: second parent of a merge commit.</li>
      <li><code>HEAD@{1}</code>: previous position from the reflog.</li>
    </ul>
    <pre><code>git log HEAD~5..HEAD --oneline
    git diff HEAD^ HEAD</code></pre>
    <h2>Other special HEADs</h2>
    <ul>
      <li><code>ORIG_HEAD</code>: previous HEAD before a "dangerous" operation (merge, reset).</li>
      <li><code>MERGE_HEAD</code>: tip of the branch being merged.</li>
      <li><code>FETCH_HEAD</code>: tip of whatever was just fetched.</li>
      <li><code>CHERRY_PICK_HEAD</code>: commit being cherry-picked.</li>
    </ul>
    <h2>HEAD in scripts</h2>
    <p>Scripts often need to know the current branch name. Use plumbing rather than parsing porcelain output:</p>
    <pre><code>branch=$(git symbolic-ref --short -q HEAD) || branch="(detached)"
    sha=$(git rev-parse HEAD)
    short=$(git rev-parse --short HEAD)</code></pre>
    <p><code>symbolic-ref --short -q HEAD</code> exits non-zero in detached state, which makes it a perfect detector. <code>git branch --show-current</code> (Git 2.22+) is a friendlier alternative that prints empty output when detached. Both are stable across versions; <code>git status</code> output is not.</p>
    <h2>HEAD and worktrees</h2>
    <p>Linked worktrees each have their own <code>HEAD</code>. The main repository's <code>.git/HEAD</code> is one of many; each worktree has its own under <code>.git/worktrees/&lt;name&gt;/HEAD</code>. This means two worktrees of the same repository can be on different branches simultaneously:</p>
    <pre><code>git worktree add ../wt-feature feature/login
    git -C ../wt-feature rev-parse HEAD
    git -C . rev-parse HEAD</code></pre>
    <p>The two HEADs are independent. Branch checkout is exclusive across worktrees: a branch can only be checked out in one worktree at a time, preventing accidental concurrent edits to the same branch from two locations.</p>
    <h2>Common mistakes</h2>
    <p>Believing that <code>HEAD</code> is a synonym for "current branch". It is not; it is a pointer that <em>usually</em> points at one. Treating <code>HEAD~3</code> and <code>HEAD^3</code> as equivalent: they differ on merge commits. Editing <code>.git/HEAD</code> by hand to switch branches; use <code>git switch</code> or <code>git checkout</code> instead. And finally, ignoring "detached HEAD" warnings and committing into the void; if you find yourself there with new commits, do <code>git switch -c &lt;newbranch&gt;</code> immediately to anchor them.</p>

- title: "Creating and switching branches"
  section: "Getting Started"
  difficulty: "Beginner"
  git_version: "2.30+"
  weight: 160
  body: |
    <h2>Introduction</h2>
    <p>Branches are how Git supports parallel lines of work. Creating a branch is essentially free: it is just a 41-byte file containing a commit hash. Use them generously for features, experiments, and bug fixes.</p>
    <h2>Modern commands</h2>
    <p>Since Git 2.23 there are two purpose-built commands: <code>git switch</code> for branches and <code>git restore</code> for files. Use them; they are clearer than <code>git checkout</code>'s overloaded behaviour.</p>
    <pre><code>git switch main                    # switch to existing branch
    git switch -c feature/login        # create and switch
    git switch -c hotfix v1.2.3        # create from a tag
    git switch -                       # previous branch (like cd -)</code></pre>
    <h2>Listing branches</h2>
    <pre><code>git branch                    # local
    git branch -r                 # remote-tracking
    git branch -a                 # all
    git branch -vv                # with upstream and ahead/behind
    git branch --merged           # merged into current
    git branch --no-merged        # not yet merged</code></pre>
    <h2>Renaming and deleting</h2>
    <pre><code>git branch -m old new             # rename
    git branch -m new                  # rename current branch
    git branch -d feature/login        # delete merged branch
    git branch -D feature/abandoned    # force-delete unmerged</code></pre>
    <p><code>-d</code> refuses if the branch has unmerged commits, protecting work.</p>
    <h2>Tracking remote branches</h2>
    <pre><code>git switch feature/login           # auto-creates local from origin/feature/login
    git switch -c mine origin/feature/login   # explicit
    git branch -u origin/main          # set upstream of current branch</code></pre>
    <h2>The classic syntax</h2>
    <p>Older tutorials use <code>git checkout</code>. It still works:</p>
    <pre><code>git checkout main
    git checkout -b feature/login
    git checkout v1.2.3</code></pre>
    <p>The downside is the same command also restores files, which causes confusion. Prefer <code>switch</code> and <code>restore</code> in new scripts.</p>
    <h2>Branch naming conventions</h2>
    <p>Consistent names make tooling easier. Common patterns:</p>
    <ul>
      <li><code>feature/&lt;ticket&gt;-short-desc</code></li>
      <li><code>bugfix/&lt;ticket&gt;-short-desc</code></li>
      <li><code>hotfix/&lt;version&gt;</code></li>
      <li><code>release/&lt;version&gt;</code></li>
    </ul>
    <pre><code>git switch -c feature/PROJ-123-add-search
    git config --global branch.autoSetupMerge always
    git config --global branch.autoSetupRebase always</code></pre>
    <p>The <code>autoSetup</code> options ensure new branches automatically track their starting point, which makes <code>git status</code>'s ahead/behind line meaningful from day one.</p>
    <h2>Renaming on the remote</h2>
    <p>Renaming a remote branch is two operations: rename locally and create the new ref on the server, then delete the old one:</p>
    <pre><code>git branch -m old new
    git push -u origin new
    git push origin --delete old</code></pre>
    <h2>Common mistakes</h2>
    <p>Switching branches with uncommitted changes that conflict with the target; Git refuses, and the fix is to commit, stash, or use <code>git switch --discard-changes</code> if you really do not want them. Creating dozens of long-lived branches and never deleting merged ones; <code>git branch --merged | xargs git branch -d</code> tidies up. Naming branches with characters that confuse shells (spaces, glob characters); stick to letters, digits, slash, and dash. Finally, deleting a branch with <code>-D</code> and panicking when you realize it had unmerged work; the reflog still has it for 90 days: <code>git reflog</code>, find the SHA, <code>git switch -c rescued &lt;sha&gt;</code>.</p>

- title: "Your first merge"
  section: "Getting Started"
  difficulty: "Beginner"
  git_version: "2.30+"
  weight: 170
  body: |
    <h2>Introduction</h2>
    <p>A <em>merge</em> combines two lines of development. The most common case is bringing a feature branch back into <code>main</code>. This page walks through a clean merge, a fast-forward, and a conflicted merge.</p>
    <h2>Setting up</h2>
    <pre><code>git switch -c feature/greeting
    echo "hello world" > greeting.txt
    git add greeting.txt
    git commit -m "Add greeting"
    git switch main
    git merge feature/greeting</code></pre>
    <p>If <code>main</code> has not moved since the branch was created, Git fast-forwards: it simply moves <code>main</code>'s pointer to <code>feature/greeting</code>'s tip. No merge commit is created.</p>
    <h2>True three-way merges</h2>
    <p>If both branches have new commits, Git creates a <em>merge commit</em> with two parents:</p>
    <pre><code>git switch main
    echo "main change" >> notes.txt
    git commit -am "Update notes on main"
    git merge feature/greeting
    # Merge made by the 'ort' strategy.</code></pre>
    <p>The merge commit's first parent is the previous <code>HEAD</code> of <code>main</code>; its second parent is the tip of the merged branch.</p>
    <h2>Forcing a merge commit</h2>
    <p>To preserve history visibly even when fast-forward is possible:</p>
    <pre><code>git merge --no-ff feature/greeting -m "Merge feature/greeting"</code></pre>
    <h2>Conflicts</h2>
    <p>If both sides edited the same lines, Git stops and writes conflict markers:</p>
    <pre><code>&lt;&lt;&lt;&lt;&lt;&lt;&lt; HEAD
    line from main
    =======
    line from feature
    &gt;&gt;&gt;&gt;&gt;&gt;&gt; feature/greeting</code></pre>
    <p>Resolve by editing the file, then:</p>
    <pre><code>git add notes.txt
    git status
    git commit               # uses the prepared merge message</code></pre>
    <h2>Aborting</h2>
    <p>If you change your mind mid-merge:</p>
    <pre><code>git merge --abort</code></pre>
    <p>This restores the working tree to the pre-merge state.</p>
    <h2>Inspecting the result</h2>
    <pre><code>git log --oneline --graph --decorate -n 10</code></pre>
    <p>The graph shows the diamond shape created by the merge.</p>
    <h2>Inspecting a merge</h2>
    <p>Merge commits have two parents, so diffs need explicit handling. <code>git show</code> on a merge defaults to a "combined diff" that highlights only changes that conflict with both parents:</p>
    <pre><code>git show HEAD                       # combined diff
    git show -m HEAD                    # diff against each parent separately
    git show --first-parent HEAD        # against the first parent only
    git log --merges --oneline          # only merge commits
    git log --no-merges --oneline       # excluding merge commits</code></pre>
    <p>For code archaeology, <code>--first-parent</code> on a long-running branch reveals the integration story: when each feature landed, in chronological trunk order.</p>
    <h2>Common mistakes</h2>
    <p>Editing files during a merge but forgetting to <code>git add</code> them, so <code>git commit</code> still complains about unmerged paths. Always run <code>git status</code> after editing. Resolving by deleting the conflict markers but leaving stale text from one side; build and run tests before committing the merge. Using <code>--no-ff</code> on every merge in a fast-moving repo, polluting history with empty merge commits. Finally, panicking at the prompt and running <code>git reset --hard</code> mid-merge; <code>git merge --abort</code> is safer because it knows about <code>ORIG_HEAD</code>.</p>

- title: "Undoing changes (intro)"
  section: "Getting Started"
  difficulty: "Beginner"
  git_version: "2.30+"
  weight: 180
  body: |
    <h2>Introduction</h2>
    <p>Git provides several ways to undo, depending on whether the change is in your working tree, in the index, in your latest commit, or already pushed. Choosing the right tool prevents accidents.</p>
    <h2>Discarding working-tree edits</h2>
    <p>You edited a file but want to throw the changes away:</p>
    <pre><code>git restore file.txt              # modern
    git checkout -- file.txt          # classic equivalent</code></pre>
    <p><code>git restore</code> with no <code>--source</code> uses the index, so the file returns to its last <code>git add</code> state.</p>
    <h2>Unstaging</h2>
    <p>You ran <code>git add</code> but want to take a file out of the next commit (without losing edits):</p>
    <pre><code>git restore --staged file.txt
    git reset HEAD file.txt           # older syntax</code></pre>
    <h2>Amending the last commit</h2>
    <p>You committed but want to fix the message or include another file:</p>
    <pre><code>git commit --amend -m "Better message"
    git add forgotten.txt
    git commit --amend --no-edit</code></pre>
    <p>Only amend commits you have <strong>not pushed</strong>, or be ready to force-push.</p>
    <h2>Reverting a public commit</h2>
    <p>If a bad commit is already pushed, do not rewrite history. Create a new commit that undoes it:</p>
    <pre><code>git revert &lt;sha&gt;
    git push</code></pre>
    <p><code>git revert</code> opens an editor with a generated message; the result is a clean undo that everyone can pull.</p>
    <h2>Resetting</h2>
    <p><code>git reset</code> moves the current branch pointer. It has three modes:</p>
    <ul>
      <li><code>--soft</code>: move branch only; keep index and working tree.</li>
      <li><code>--mixed</code> (default): move branch and reset index; keep working tree.</li>
      <li><code>--hard</code>: move branch, reset index, reset working tree. Destructive.</li>
    </ul>
    <pre><code>git reset --soft HEAD~1            # uncommit, keep changes staged
    git reset HEAD~1                   # uncommit, keep changes unstaged
    git reset --hard HEAD~1            # nuke last commit and changes</code></pre>
    <h2>Recovering from --hard</h2>
    <pre><code>git reflog
    git reset --hard HEAD@{1}</code></pre>
    <p>The reflog remembers every move of <code>HEAD</code> for 90 days.</p>
    <h2>Choosing the right undo</h2>
    <p>A simple decision matrix:</p>
    <ul>
      <li><strong>Working-tree only</strong>: <code>git restore &lt;file&gt;</code></li>
      <li><strong>Staged file</strong>: <code>git restore --staged &lt;file&gt;</code></li>
      <li><strong>Last unpushed commit</strong>: <code>git commit --amend</code> or <code>git reset --soft HEAD~1</code></li>
      <li><strong>Pushed commit</strong>: <code>git revert &lt;sha&gt;</code></li>
      <li><strong>Whole branch tip</strong>: <code>git reset --hard ORIG_HEAD</code> (after a bad merge/rebase)</li>
    </ul>
    <pre><code>git status
    git diff
    git log --oneline -5</code></pre>
    <p>Always run those three before any destructive undo. They show the working tree, staged changes, and recent history; together they tell you which undo is safe.</p>
    <h2>Common mistakes</h2>
    <p>Confusing <code>revert</code> with <code>reset</code>. <em>Revert</em> adds; <em>reset</em> removes. Running <code>git reset --hard</code> with uncommitted work, then realizing you needed it; reach for the reflog immediately, before garbage collection runs. Amending a pushed commit and not coordinating the force-push with teammates. Use <code>git revert</code> on shared history. And finally, treating <code>git checkout file</code> as safe; in older Git it silently overwrites your edits with no recycle bin. Modern <code>git restore</code> is no different; back up first if unsure.</p>

- title: "Tagging releases"
  section: "Getting Started"
  difficulty: "Beginner"
  git_version: "2.30+"
  weight: 190
  body: |
    <h2>Introduction</h2>
    <p>Tags are named references to specific commits. Unlike branches, tags are not meant to move. They are perfect for marking releases (<code>v1.0.0</code>) and other historical points.</p>
    <h2>Two kinds of tags</h2>
    <ul>
      <li><strong>Lightweight</strong>: just a ref pointing at a commit. No metadata.</li>
      <li><strong>Annotated</strong>: a full Git object with tagger, date, message, and optional GPG signature. Use these for releases.</li>
    </ul>
    <h2>Creating tags</h2>
    <pre><code>git tag v1.0.0                          # lightweight
    git tag -a v1.0.0 -m "First stable release"   # annotated
    git tag -s v1.0.0 -m "Signed release"         # GPG signed</code></pre>
    <p>By default tags attach to <code>HEAD</code>. To tag a specific commit:</p>
    <pre><code>git tag -a v0.9.0 a1b2c3d -m "Beta"</code></pre>
    <h2>Listing and inspecting</h2>
    <pre><code>git tag
    git tag -l "v1.*"
    git show v1.0.0
    git tag -l --format='%(refname:short) %(taggerdate:short) %(subject)'</code></pre>
    <h2>Pushing tags</h2>
    <p>Tags are not pushed by default:</p>
    <pre><code>git push origin v1.0.0
    git push origin --tags                # all tags
    git push --follow-tags                # only tags reachable from pushed commits</code></pre>
    <p><code>--follow-tags</code> is the recommended default for release pipelines.</p>
    <h2>Deleting tags</h2>
    <pre><code>git tag -d v1.0.0                     # local
    git push origin --delete v1.0.0       # remote</code></pre>
    <h2>Checking out a tag</h2>
    <pre><code>git switch --detach v1.0.0
    # or to base a hotfix branch on a tag
    git switch -c hotfix/1.0.1 v1.0.0</code></pre>
    <h2>Verifying signatures</h2>
    <pre><code>git tag -v v1.0.0</code></pre>
    <p>Requires the tagger's public key in your GPG keyring.</p>
    <h2>Describing builds with git describe</h2>
    <p>Once your repo has annotated tags, <code>git describe</code> produces stable build identifiers that combine the latest tag, distance, and abbreviated SHA:</p>
    <pre><code>git describe
    # v1.2.3-7-gabc1234
    git describe --always --dirty
    # v1.2.3-7-gabc1234-dirty</code></pre>
    <p>The <code>--dirty</code> suffix appears if the working tree has uncommitted changes; <code>--always</code> falls back to a bare SHA when no tag is reachable. CI pipelines often embed this string into binaries to make troubleshooting field reports trivial.</p>
    <h2>Tagging policies</h2>
    <p>For long-term-supported projects, decide and document:</p>
    <ul>
      <li>Naming scheme: <code>v1.2.3</code>, <code>release-2025-04</code>, <code>1.2.3</code> (no prefix)?</li>
      <li>Annotated or signed?</li>
      <li>Who is allowed to push tags? Many hosts let you protect tag names with patterns.</li>
      <li>What is the source of truth: tags-on-main only, or release branches with their own tags?</li>
    </ul>
    <pre><code>git for-each-ref --sort=-creatordate --format='%(refname:short) %(creatordate:short)' refs/tags | head</code></pre>
    <p>Pick a scheme and stick to it; tag history is harder to migrate than commit history.</p>
    <h2>Common mistakes</h2>
    <p>Using lightweight tags for releases. They lack a date, author, and message, which makes audit trails painful. Always use <code>-a</code> or <code>-s</code> for releases. Moving a tag after it is published; downstream users will not pick up the change cleanly. Create a new tag (e.g. <code>v1.0.1</code>) instead. Forgetting to push tags and wondering why your release page is empty; remember <code>git push --tags</code> or <code>--follow-tags</code>. Finally, naming tags with characters that conflict with refs (a tag and a branch named <code>release</code> will create ambiguity); use a clear convention like <code>v&lt;semver&gt;</code> for releases.</p>

- title: "Git on the command line: tips for new users"
  section: "Getting Started"
  difficulty: "Beginner"
  git_version: "2.30+"
  weight: 200
  body: |
    <h2>Introduction</h2>
    <p>Git rewards command-line fluency. A few small habits make day-to-day work dramatically faster and safer. This page collects the highest-impact tips for new users.</p>
    <h2>Always know where you are</h2>
    <p>Add Git status to your shell prompt. Bash and Zsh both ship contrib scripts:</p>
    <pre><code># bash
    source /usr/share/git/completion/git-prompt.sh
    PS1='\w$(__git_ps1 " (%s)")\$ '

    # zsh with oh-my-zsh: enable the git plugin in ~/.zshrc</code></pre>
    <p>Now the current branch and dirty state are visible at all times.</p>
    <h2>Tab completion</h2>
    <p>Git ships <code>git-completion.bash</code>; most package managers install it automatically. Tab-complete commands, branches, remotes, and refs:</p>
    <pre><code>git che&lt;TAB&gt;
    git switch fea&lt;TAB&gt;</code></pre>
    <h2>Aliases that pay off</h2>
    <pre><code>git config --global alias.s "status -sb"
    git config --global alias.lg "log --oneline --graph --decorate --all"
    git config --global alias.co switch
    git config --global alias.last "log -1 HEAD --stat"
    git config --global alias.unstage "restore --staged"</code></pre>
    <h2>Shorter status</h2>
    <pre><code>git status -sb</code></pre>
    <p>The <code>-sb</code> form is two-column and includes branch tracking info; perfect for quick checks.</p>
    <h2>Better diffs</h2>
    <pre><code>git diff --word-diff
    git diff --color-words
    git config --global diff.colorMoved zebra</code></pre>
    <p><code>colorMoved=zebra</code> highlights moved blocks of code differently from added/removed ones, making refactors easier to review.</p>
    <h2>Useful environment</h2>
    <ul>
      <li>Set <code>GIT_PAGER=less -FRX</code> for sensible paging.</li>
      <li>Set <code>EDITOR</code> to something you know how to quit.</li>
      <li>Use a credential helper: <code>git config --global credential.helper cache</code> on Linux, <code>osxkeychain</code> on macOS, <code>manager</code> on Windows.</li>
    </ul>
    <h2>Safe defaults</h2>
    <pre><code>git config --global pull.ff only
    git config --global push.autoSetupRemote true
    git config --global fetch.prune true
    git config --global rerere.enabled true</code></pre>
    <p><code>rerere</code> ("reuse recorded resolution") remembers how you solved a conflict and replays it next time.</p>
    <h2>Reading commit history at speed</h2>
    <p>Two viewing tricks pay off daily:</p>
    <pre><code>git log --oneline --graph --all --decorate
    git log -p --follow path/to/file
    git show HEAD --stat
    git diff @{u}                  # vs upstream
    git diff @{1.day.ago}          # vs HEAD a day ago</code></pre>
    <p>Every Git command that takes a commit accepts the same revision syntax: branch names, SHAs, <code>HEAD~3</code>, <code>@{upstream}</code>, <code>@{2.hours.ago}</code>, <code>tag^{commit}</code>. Learn it once via <code>git help gitrevisions</code> and use it everywhere.</p>
    <h2>Common mistakes</h2>
    <p>Copy-pasting long commands from blog posts without understanding them; read <code>git help &lt;cmd&gt;</code> for any unfamiliar flag. Aliasing destructive commands to short names (<code>r = reset --hard</code>) and triggering them by accident; reserve short aliases for safe operations. Ignoring shell tab-completion and typing branch names by hand, with all the typos that implies. Finally, never paste shell output into a commit message expecting it to render as code; use a code block in your editor or commit a file instead. Small habits compound; invest one afternoon configuring your shell and reap years of benefit.</p>

- title: "The object model: blobs, trees, commits, tags"
  section: "Core Concepts"
  difficulty: "Intermediate"
  git_version: "2.30+"
  weight: 10
  body: |
    <h2>Introduction</h2>
    <p>Git's repository is, at its heart, a <em>content-addressed object store</em>. There are exactly four object types: <strong>blob</strong>, <strong>tree</strong>, <strong>commit</strong>, and <strong>tag</strong>. Every operation eventually touches them. Understanding these four types demystifies most of Git.</p>
    <h2>Blobs</h2>
    <p>A blob stores file contents, nothing more. No filename, no permissions, no history. Two files with identical contents share one blob, regardless of where they live in the tree.</p>
    <pre><code>echo "hello" | git hash-object --stdin
    # ce013625030ba8dba906f756967f9e9ca394464a</code></pre>
    <h2>Trees</h2>
    <p>A tree is a directory listing: a sorted set of <code>(mode, type, sha, name)</code> entries. Subdirectories are themselves trees, recursively. Every commit points at exactly one root tree.</p>
    <pre><code>git ls-tree HEAD
    # 100644 blob a1b2... README.md
    # 040000 tree c3d4... src</code></pre>
    <h2>Commits</h2>
    <p>A commit object contains:</p>
    <ul>
      <li>A pointer to a root tree.</li>
      <li>Zero or more parent commits (zero for the root, two or more for merges).</li>
      <li>Author and committer with timestamps.</li>
      <li>A message.</li>
      <li>Optional GPG/SSH signature.</li>
    </ul>
    <pre><code>git cat-file -p HEAD
    # tree 9f1a...
    # parent b2c3...
    # author Ada &lt;ada@example.com&gt; 1714300000 +0000
    # committer Ada &lt;ada@example.com&gt; 1714300000 +0000
    #
    # Add greeting</code></pre>
    <h2>Tags</h2>
    <p>An annotated tag is its own object pointing at another object (almost always a commit), with tagger info and a message. Lightweight tags are just refs and have no object.</p>
    <pre><code>git cat-file -t v1.0.0
    # tag
    git cat-file -p v1.0.0</code></pre>
    <h2>Putting it together</h2>
    <p>Walk a commit's tree manually:</p>
    <pre><code>git cat-file -p HEAD^{tree}
    git cat-file -p HEAD^{tree}:src
    git cat-file -p HEAD:README.md</code></pre>
    <p>The <code>^{tree}</code> peel and the <code>commit:path</code> syntax are how all Git tools navigate.</p>
    <h2>Storage</h2>
    <p>Every object is zlib-compressed and addressed by the SHA-1 (or SHA-256) of its uncompressed content plus a header. Identical content, anywhere in history, deduplicates automatically.</p>
    <h2>Tree entry modes</h2>
    <p>The mode field in a tree entry is a small set of POSIX-like file modes:</p>
    <ul>
      <li><code>100644</code>: regular non-executable file (blob).</li>
      <li><code>100755</code>: executable file (blob).</li>
      <li><code>120000</code>: symbolic link (blob whose content is the target).</li>
      <li><code>040000</code>: subdirectory (tree).</li>
      <li><code>160000</code>: gitlink (submodule reference to a commit SHA).</li>
    </ul>
    <pre><code>git ls-tree HEAD
    git update-index --chmod=+x scripts/run.sh
    git ls-tree HEAD scripts/</code></pre>
    <p>Git is intentionally limited; arbitrary permissions and ownership are not stored.</p>
    <h2>Common mistakes</h2>
    <p>Believing Git stores diffs. It does not; it stores full snapshots, deduplicated by hash and later delta-compressed in pack files. Confusing trees with directories on disk; trees are immutable objects. Mistaking lightweight tags for annotated ones; only annotated tags carry metadata and signatures. Finally, expecting that renaming a file changes the blob; the blob is the same, only the tree's name entry changes. Spend ten minutes with <code>git cat-file -p</code> on a real repository and the model becomes second nature.</p>

- title: "Content-addressed storage: SHA-1 and SHA-256"
  section: "Core Concepts"
  difficulty: "Intermediate"
  git_version: "2.30+"
  weight: 20
  body: |
    <h2>Introduction</h2>
    <p>Git names every object by the cryptographic hash of its content. This is <em>content-addressed</em> storage: the name <em>is</em> the content's fingerprint. The default hash is SHA-1 (160 bits, 40 hex chars). SHA-256 support exists experimentally since Git 2.29.</p>
    <h2>How a hash is computed</h2>
    <p>Git prepends a header of the form <code>&lt;type&gt; &lt;size&gt;\0</code> to the raw content, then hashes:</p>
    <pre><code>printf 'blob 6\0hello\n' | sha1sum
    # ce013625030ba8dba906f756967f9e9ca394464a  -</code></pre>
    <p>The same value comes out of <code>git hash-object</code>:</p>
    <pre><code>printf 'hello\n' | git hash-object --stdin
    # ce013625030ba8dba906f756967f9e9ca394464a</code></pre>
    <h2>Why content addressing</h2>
    <ul>
      <li><strong>Deduplication</strong>: identical content stored once.</li>
      <li><strong>Integrity</strong>: any corruption changes the hash, instantly detectable.</li>
      <li><strong>Reproducibility</strong>: the same tree always has the same name.</li>
      <li><strong>Distributed sync</strong>: Git can ask "do you have <code>abc123</code>?" without explaining what it is.</li>
    </ul>
    <h2>Abbreviated hashes</h2>
    <p>Git accepts the shortest unambiguous prefix, normally 7 characters. As a repo grows, more digits may be needed:</p>
    <pre><code>git rev-parse --short HEAD
    git rev-parse --short=12 HEAD
    git config --global core.abbrev 12</code></pre>
    <h2>SHA-1 versus SHA-256</h2>
    <p>SHA-1 has known collision attacks (SHAttered, 2017). The Git project responded with SHA-256 as an alternative object format. To create a SHA-256 repo:</p>
    <pre><code>git init --object-format=sha256</code></pre>
    <p>Note: SHA-1 and SHA-256 repos cannot interoperate yet; tooling and hosting support is still maturing as of Git 2.45+. For now, most projects continue with SHA-1, augmented by Git's hardened collision-detecting SHA-1 implementation.</p>
    <h2>Verifying integrity</h2>
    <pre><code>git fsck --full
    git fsck --strict</code></pre>
    <p><code>git fsck</code> recomputes hashes for every object and reports any mismatch.</p>
    <h2>Inspecting an object</h2>
    <pre><code>git cat-file -t &lt;sha&gt;       # type
    git cat-file -s &lt;sha&gt;       # size
    git cat-file -p &lt;sha&gt;       # pretty-printed content</code></pre>
    <h2>Hardened SHA-1</h2>
    <p>Since 2017 Git has shipped with a "collision-detecting" SHA-1 implementation (<code>sha1dc</code>) that recognizes the published SHAttered pattern and refuses to hash such inputs. This makes practical attacks against Git repositories essentially impossible without discovering a new collision technique. The cost is a small slowdown on hashing; you can opt into stock OpenSSL SHA-1 with <code>./configure --with-openssl-sha1</code> when building from source, but few users have any reason to.</p>
    <pre><code>git --version --build-options 2&gt;&amp;1 | grep -i sha</code></pre>
    <h2>Common mistakes</h2>
    <p>Worrying that SHA-1 collisions will compromise your repo. The known attacks require crafted inputs; Git additionally detects the published collision pattern. The pragmatic risk for a normal project is essentially zero. Truncating hashes too aggressively in scripts; in a repo with a million objects, 7 characters can collide. Use <code>git rev-parse --short</code> to let Git choose. Editing object files directly under <code>.git/objects</code>; that breaks the content-address invariant and corrupts the repo. All writes must go through Git plumbing.</p>

- title: "References: refs, HEAD, branches, and tags"
  section: "Core Concepts"
  difficulty: "Intermediate"
  git_version: "2.30+"
  weight: 30
  body: |
    <h2>Introduction</h2>
    <p>Objects are immutable and named by hash. <em>References</em> are the mutable, human-readable names that point at them. Every branch, tag, remote-tracking branch, and HEAD is a ref.</p>
    <h2>Where refs live</h2>
    <p>Refs are files (or entries in the packed-refs file) under <code>.git/refs/</code>:</p>
    <ul>
      <li><code>.git/refs/heads/&lt;name&gt;</code>: local branches.</li>
      <li><code>.git/refs/tags/&lt;name&gt;</code>: tags.</li>
      <li><code>.git/refs/remotes/&lt;remote&gt;/&lt;name&gt;</code>: remote-tracking branches.</li>
      <li><code>.git/HEAD</code>: the current ref.</li>
    </ul>
    <p>Each non-symbolic ref is a one-line file containing a hash:</p>
    <pre><code>cat .git/refs/heads/main
    # a1b2c3d4...</code></pre>
    <h2>Listing refs</h2>
    <pre><code>git for-each-ref
    git for-each-ref refs/tags/
    git for-each-ref --format='%(refname:short) %(objectname:short) %(subject)'
    git show-ref</code></pre>
    <h2>Symbolic refs</h2>
    <p>A symbolic ref points at another ref instead of a hash. <code>HEAD</code> is the canonical example:</p>
    <pre><code>cat .git/HEAD
    # ref: refs/heads/main
    git symbolic-ref HEAD
    git symbolic-ref refs/remotes/origin/HEAD</code></pre>
    <h2>Reading refs safely</h2>
    <p>Always go through plumbing rather than reading files:</p>
    <pre><code>git rev-parse HEAD
    git rev-parse main
    git rev-parse origin/main
    git rev-parse v1.0.0^{commit}</code></pre>
    <p>Plumbing handles packed refs, symbolic refs, and ref lookups uniformly.</p>
    <h2>Updating refs</h2>
    <pre><code>git update-ref refs/heads/feature/login &lt;sha&gt;
    git update-ref -d refs/heads/feature/login           # delete
    git update-ref refs/heads/feature/login &lt;new&gt; &lt;old&gt; # CAS</code></pre>
    <p>The three-argument form is compare-and-set; it refuses if the current value differs.</p>
    <h2>Packed refs</h2>
    <p>For performance, Git can pack many refs into a single <code>.git/packed-refs</code> file. <code>git pack-refs --all</code> does this; future writes still go to loose files until the next pack.</p>
    <h2>Refspec syntax</h2>
    <p>Remotes use <em>refspecs</em> to map between local and remote refs:</p>
    <pre><code>+refs/heads/*:refs/remotes/origin/*</code></pre>
    <p>The leading <code>+</code> means "force update". This single line is what makes <code>git fetch</code> populate <code>refs/remotes/origin/</code>.</p>
    <h2>The reftable backend</h2>
    <p>Modern Git (2.45+) ships an alternative ref storage format called <em>reftable</em>, originally developed for JGit. Reftable stores millions of refs efficiently in a binary log-structured format and supports atomic transactions across many refs at once. Enable on a new repo:</p>
    <pre><code>git init --ref-format=reftable
    git rev-parse --show-ref-format</code></pre>
    <p>For most users the classic loose+packed format is still fine. Reftable shines on servers and on huge monorepos with hundreds of thousands of refs (e.g., one ref per pull request).</p>
    <h2>Custom ref hierarchies</h2>
    <p>Refs do not have to live under the standard four namespaces. Tools that need their own names use custom hierarchies under <code>refs/</code>:</p>
    <ul>
      <li><code>refs/notes/*</code>: <code>git notes</code>.</li>
      <li><code>refs/stash</code>: <code>git stash</code>.</li>
      <li><code>refs/replace/*</code>: <code>git replace</code>.</li>
      <li><code>refs/bisect/*</code>: <code>git bisect</code> state.</li>
      <li><code>refs/pull/*/head</code> and <code>refs/merge-requests/*/head</code>: hosting providers.</li>
    </ul>
    <pre><code>git for-each-ref refs/notes/
    git for-each-ref refs/replace/</code></pre>
    <p>You can create your own as long as the name is a valid ref (no double dots, no spaces, no leading dash).</p>
    <h2>Common mistakes</h2>
    <p>Editing ref files by hand and ending up with a trailing newline issue or a half-written file. Use <code>git update-ref</code>. Confusing <code>refs/heads/main</code>, <code>main</code>, and <code>refs/main</code>; <code>git rev-parse --symbolic-full-name</code> resolves any short name to its canonical form. Naming a branch and a tag identically; tools then prefer the tag, leading to subtle confusion. Finally, deleting <code>.git/packed-refs</code> to "clean up"; it deletes refs that were not also loose. Always go through Git.</p>

- title: "The index (staging area) in depth"
  section: "Core Concepts"
  difficulty: "Intermediate"
  git_version: "2.30+"
  weight: 40
  body: |
    <h2>Introduction</h2>
    <p>The index is a binary file at <code>.git/index</code> that mirrors a tree object: a sorted list of paths with mode, hash, and stat information. It is the staging area for the next commit and a cache that lets Git skip rehashing unchanged files.</p>
    <h2>Inspecting it</h2>
    <pre><code>git ls-files --stage
    # 100644 a1b2c3...  0  README.md
    # 100644 e4f5g6...  0  src/main.c</code></pre>
    <p>Stage 0 means "no conflict". During a merge, conflicted paths get stages 1 (base), 2 (ours), 3 (theirs).</p>
    <h2>What stat caching buys you</h2>
    <p>The index also stores ctime, mtime, size, and inode for each path. <code>git status</code> compares these to the working tree before hashing; if they match, the file is assumed unchanged. This is why <code>git status</code> is fast on huge trees.</p>
    <pre><code>git update-index --refresh
    git update-index --really-refresh</code></pre>
    <h2>Modifying the index</h2>
    <pre><code>git add file.txt                  # stage from working tree
    git rm --cached file.txt          # remove from index, keep on disk
    git restore --staged file.txt     # unstage
    git update-index --chmod=+x bin/run   # change executable bit</code></pre>
    <h2>Assume unchanged and skip-worktree</h2>
    <p>Two flags tell Git to ignore certain paths:</p>
    <pre><code>git update-index --assume-unchanged config.local
    git update-index --skip-worktree config.local</code></pre>
    <ul>
      <li><code>assume-unchanged</code>: a performance hint; Git may still notice changes.</li>
      <li><code>skip-worktree</code>: stronger; intended for files the user keeps locally modified.</li>
    </ul>
    <p>Neither replaces <code>.gitignore</code>; both are workspace-local hacks, not shareable.</p>
    <h2>Reading and writing trees</h2>
    <pre><code>git write-tree                # snapshot index as tree object
    git read-tree HEAD            # reset index to a tree
    git read-tree --reset -u HEAD # also update working tree</code></pre>
    <p>These plumbing commands underlie <code>commit</code>, <code>checkout</code>, and <code>merge</code>.</p>
    <h2>Conflicts in the index</h2>
    <p>During a merge, the index becomes the source of truth for what is unresolved:</p>
    <pre><code>git ls-files -u
    # 100644 a1...  1  src/main.c
    # 100644 b2...  2  src/main.c
    # 100644 c3...  3  src/main.c</code></pre>
    <p>Resolving a conflict means writing the final content and <code>git add</code>-ing it, collapsing back to a single stage-0 entry.</p>
    <h2>Sparse checkout and the sparse index</h2>
    <p>Sparse checkout populates the working tree with only a subset of the repository's tree, useful in monorepos. With cone mode plus the sparse index, the index itself shrinks to the active cone, making operations on huge repos fast:</p>
    <pre><code>git sparse-checkout init --cone
    git sparse-checkout set src/myteam docs
    git sparse-checkout list
    git sparse-checkout disable</code></pre>
    <p>The sparse index marks omitted entries with a special bit so Git can lazily expand them only when commands need to. This feature requires Git 2.32 or newer for full functionality.</p>
    <h2>Common mistakes</h2>
    <p>Believing the index is just "what is staged". It is also a cache and a conflict tracker. Deleting <code>.git/index</code> when stuck; rebuild with <code>git read-tree HEAD</code>, but you lose any uncommitted staging. Using <code>--assume-unchanged</code> as a substitute for <code>.gitignore</code>; the next clone will not honor it. Finally, expecting the index to track empty directories; it cannot. Use a placeholder file (<code>.gitkeep</code>) if you need to commit an empty folder.</p>

- title: "Branches as lightweight pointers"
  section: "Core Concepts"
  difficulty: "Intermediate"
  git_version: "2.30+"
  weight: 50
  body: |
    <h2>Introduction</h2>
    <p>In Git, a branch is just a movable reference to a commit. Creating a branch is creating a 41-byte file. Compared to centralized systems where branches are full directory copies, Git's model makes branching cheap enough to use casually.</p>
    <h2>What a branch actually is</h2>
    <pre><code>cat .git/refs/heads/main
    # a1b2c3d4e5f6...
    git rev-parse main</code></pre>
    <p>That hash is the <em>tip</em> of the branch. The "branch" itself is the chain of commits reachable from the tip via parent pointers.</p>
    <h2>Creating branches</h2>
    <pre><code>git branch feature/login           # create, do not switch
    git switch -c feature/login        # create and switch
    git switch -c hotfix v1.2.3        # from a tag
    git branch fixup HEAD~3            # from a relative ref</code></pre>
    <h2>Moving the tip</h2>
    <p>Every commit on the current branch advances its tip by one. Commands that move tips include <code>commit</code>, <code>merge</code>, <code>rebase</code>, <code>reset</code>, and <code>cherry-pick</code>.</p>
    <pre><code>git commit -m "Work"           # main moves forward
    git reset --hard HEAD~2        # main moves backward; commits become unreachable</code></pre>
    <h2>Branches and reachability</h2>
    <p>A commit is "alive" as long as some ref reaches it. Delete every branch and tag pointing at a commit and it becomes <em>dangling</em>; Git's garbage collector eventually removes it.</p>
    <pre><code>git fsck --unreachable
    git gc</code></pre>
    <h2>Tracking upstream</h2>
    <p>A local branch can be linked to a remote-tracking branch:</p>
    <pre><code>git branch --set-upstream-to=origin/main main
    git branch -u origin/main
    git status            # shows ahead/behind based on the link</code></pre>
    <h2>Branch maintenance</h2>
    <pre><code>git branch --merged main           # branches fully merged
    git branch --no-merged main        # branches with unmerged work
    git branch -d feature/old          # delete merged
    git branch -D feature/discarded    # force delete</code></pre>
    <h2>Comparing branches</h2>
    <pre><code>git log main..feature/login --oneline
    git diff main...feature/login
    git range-diff main..@{u} main..HEAD</code></pre>
    <p><code>range-diff</code> is great for comparing two versions of a rebased branch.</p>
    <h2>Branch policies on hosts</h2>
    <p>Most hosting platforms let you protect branches by name pattern: require pull requests, signed commits, passing CI, or specific reviewers before a push is accepted. The Git side of this is implemented via <code>pre-receive</code> hooks; the platform side is configuration. From your local clone, branch protection is invisible until your push is rejected, at which point the server explains why. To inspect protection from the command line, use the host's CLI (<code>gh</code>, <code>glab</code>) or its API.</p>
    <pre><code>gh api repos/owner/repo/branches/main/protection</code></pre>
    <h2>Common mistakes</h2>
    <p>Imagining branches as containers of commits. They are not; commits exist independently and many branches can reach the same commit. Deleting a "feature" branch and assuming the commits are gone; they are gone only after they become unreachable <em>and</em> the reflog expires (90 days by default). Using long single-word branch names that collide with file names; <code>--</code> separators avoid the ambiguity. Finally, working directly on <code>main</code> in a shared repo; always branch for non-trivial work, even if you plan to fast-forward later.</p>

- title: "Merging: fast-forward vs three-way merge"
  section: "Core Concepts"
  difficulty: "Intermediate"
  git_version: "2.30+"
  weight: 60
  body: |
    <h2>Introduction</h2>
    <p>Git has two fundamentally different merge outcomes: <strong>fast-forward</strong>, where one branch's tip is simply moved, and <strong>three-way</strong>, where a new commit with two parents is created. The choice depends on whether the branches have diverged.</p>
    <h2>Fast-forward</h2>
    <p>If <code>main</code>'s tip is an ancestor of <code>feature</code>, no real merge is needed. Git just moves <code>main</code> forward:</p>
    <pre><code>      A---B---C   feature
         /
    main

    # after git merge feature
    A---B---C   main, feature</code></pre>
    <p>Command:</p>
    <pre><code>git switch main
    git merge feature</code></pre>
    <p>To force a real merge commit even when fast-forward is possible:</p>
    <pre><code>git merge --no-ff feature</code></pre>
    <h2>Three-way merge</h2>
    <p>When both branches have diverged, Git finds the <em>merge base</em> (the most recent common ancestor) and combines the changes from both sides:</p>
    <pre><code>      A---B---C   feature
         /
    A---D---E   main

    # after git merge feature
    A---D---E---M   main
         \     /
          B---C   feature</code></pre>
    <p>Git's default merge strategy since 2.33 is <code>ort</code>; before that it was <code>recursive</code>. Both compute a three-way merge per file using the merge base.</p>
    <h2>Inspecting</h2>
    <pre><code>git merge-base main feature
    git log --oneline --graph --all
    git show --stat HEAD          # see the merge commit</code></pre>
    <h2>Strategies and options</h2>
    <pre><code>git merge -X ours feature        # prefer our side on conflicts
    git merge -X theirs feature      # prefer their side
    git merge -X ignore-space-change feature
    git merge --squash feature       # apply changes without merge commit</code></pre>
    <p><code>--squash</code> creates a single commit that contains all changes from <code>feature</code>, with no parent link to it. Useful for tidy history but loses the per-commit detail.</p>
    <h2>Aborting and undoing</h2>
    <pre><code>git merge --abort                # mid-merge, return to pre-merge state
    git reset --hard ORIG_HEAD       # after a finished merge, undo it</code></pre>
    <h2>Configuring fast-forward policy</h2>
    <pre><code>git config --global merge.ff false      # always create merge commit
    git config --global merge.ff only      # only fast-forward, refuse otherwise
    git config --global pull.ff only       # same for pulls</code></pre>
    <h2>Merge drivers and attributes</h2>
    <p>Some files merge poorly with text-based three-way (machine-generated lockfiles, generated documentation). Configure a custom merge driver via <code>.gitattributes</code> and <code>git config</code>:</p>
    <pre><code># .gitattributes
    package-lock.json merge=ours
    Gemfile.lock merge=union</code></pre>
    <pre><code>git config merge.ours.driver true
    git config merge.union.name "Line union merge"
    git config merge.union.driver "git merge-file --union %A %O %B"</code></pre>
    <p>The built-in <code>union</code> strategy keeps both sides; <code>ours</code> always picks our version; custom drivers can run any program. Use sparingly; surprising merge behaviour confuses reviewers.</p>
    <h2>Common mistakes</h2>
    <p>Believing fast-forward is somehow special or risky; it is not, it is just a pointer move. Using <code>--no-ff</code> on every merge in a fast-moving project, polluting history with empty merge commits. Using <code>-X ours</code> when you meant <code>--strategy=ours</code> (which discards the other side entirely) or vice versa. Finally, manually editing the merge commit message after the fact and breaking the standardized "Merge branch 'X'" wording that tools rely on; if you must edit, do it before <code>git commit</code>.</p>

- title: "The reflog: your safety net"
  section: "Core Concepts"
  difficulty: "Intermediate"
  git_version: "2.30+"
  weight: 70
  body: |
    <h2>Introduction</h2>
    <p>The <em>reflog</em> records every change to <code>HEAD</code> and to each branch tip on your local machine. It is local, per-clone, and not pushed. Almost any "lost" commit can be rescued through it.</p>
    <h2>Viewing</h2>
    <pre><code>git reflog                            # HEAD reflog
    git reflog show main                  # main's reflog
    git reflog --date=iso
    git log -g --oneline                  # log walk through reflog</code></pre>
    <p>Each entry has a sequence (<code>HEAD@{0}</code>, <code>HEAD@{1}</code>, ...), an action (<code>commit</code>, <code>reset</code>, <code>merge</code>, <code>rebase</code>, ...), and a target SHA.</p>
    <h2>Recovering a lost commit</h2>
    <pre><code>git reflog
    # 9f8a1c2 HEAD@{0}: reset: moving to HEAD~3
    # a1b2c3d HEAD@{1}: commit: Important work
    git switch -c rescued a1b2c3d</code></pre>
    <p>Or directly:</p>
    <pre><code>git reset --hard HEAD@{1}</code></pre>
    <h2>Time-based syntax</h2>
    <pre><code>git show HEAD@{2.hours.ago}
    git diff main@{yesterday} main</code></pre>
    <p>Git interprets <code>@{...}</code> as either a count or a date.</p>
    <h2>Reflog expiration</h2>
    <p>By default reachable reflog entries expire after 90 days, and unreachable ones after 30:</p>
    <pre><code>git config gc.reflogExpire 90.days
    git config gc.reflogExpireUnreachable 30.days</code></pre>
    <p>Until expiration, even hard-reset commits remain recoverable.</p>
    <h2>Per-ref reflogs</h2>
    <p>Each branch has its own reflog at <code>.git/logs/refs/heads/&lt;name&gt;</code>. Stash also has one (<code>refs/stash</code>):</p>
    <pre><code>git reflog show stash</code></pre>
    <h2>Pruning the reflog</h2>
    <pre><code>git reflog expire --expire=now --all
    git gc --prune=now</code></pre>
    <p>Use only if you need to permanently delete data; this removes the safety net.</p>
    <h2>Reflog vs git log</h2>
    <p><code>git log</code> walks the commit graph by parent pointers; the reflog walks recorded movements of a ref. After a force-reset, <code>git log</code> no longer shows the abandoned commits, but the reflog still does.</p>
    <h2>Per-ref reflog inspection</h2>
    <p>Each ref keeps its own reflog. Inspect a specific branch's reflog to see how its tip moved:</p>
    <pre><code>git reflog show feature/login
    git log -g feature/login --oneline
    cat .git/logs/refs/heads/feature/login</code></pre>
    <p>Useful when investigating "who moved this branch?" on a local clone. The reflog file format is one line per change with old SHA, new SHA, committer, timestamp, and a textual message. Combined with <code>git blame</code> on the file, it gives a complete local audit trail; remember reflogs are not pushed, so the trail covers your machine only.</p>
    <h2>Common mistakes</h2>
    <p>Forgetting the reflog exists in a panic and re-doing hours of work that was easily recoverable. Always check <code>git reflog</code> first. Pushing during recovery and assuming the reflog is on the server; it is not, only your local clone has it. Running <code>git gc --prune=now</code> on a "clean up" instinct and destroying the safety net for any unreferenced commit. And finally, treating reflog entries as forever; long-deleted refs do age out. Tag or branch anything you want to keep before 30 days pass.</p>

- title: "Detached HEAD state explained"
  section: "Core Concepts"
  difficulty: "Intermediate"
  git_version: "2.30+"
  weight: 80
  body: |
    <h2>Introduction</h2>
    <p>Normally <code>HEAD</code> points at a branch ref, which in turn points at a commit. In <em>detached HEAD</em>, <code>HEAD</code> points directly at a commit. Detached HEAD is not broken; it is a deliberate mode that is useful for inspecting history and dangerous for committing without thinking.</p>
    <h2>How you get there</h2>
    <pre><code>git checkout v1.2.3
    git switch --detach v1.2.3
    git checkout HEAD~5
    git checkout origin/main      # remote-tracking is read-only-ish</code></pre>
    <p>Each of these puts <code>HEAD</code> directly on a commit instead of a branch.</p>
    <h2>Inspecting</h2>
    <pre><code>cat .git/HEAD
    # a1b2c3d4...   (raw SHA, not "ref: ...")
    git status
    # HEAD detached at v1.2.3</code></pre>
    <h2>Why it exists</h2>
    <ul>
      <li>Inspecting an old release without affecting any branch.</li>
      <li>Bisecting (<code>git bisect</code> uses detached HEAD).</li>
      <li>Building a quick experiment you may discard.</li>
      <li>Operating on a tag that should remain immovable.</li>
    </ul>
    <h2>Committing in detached HEAD</h2>
    <p>You can commit in detached HEAD, and the commit object is created normally. The catch: no branch points at it. Switch away and the commit becomes unreachable.</p>
    <pre><code>git switch --detach v1.2.3
    echo fix > patch.txt
    git add patch.txt
    git commit -m "Quick fix"
    git switch main             # the new commit is now orphan</code></pre>
    <p>Anchor it before switching:</p>
    <pre><code>git switch -c hotfix/1.2.4</code></pre>
    <h2>Recovering from accidental detach</h2>
    <p>If you already switched away, the reflog has the commit:</p>
    <pre><code>git reflog
    # a1b2c3d HEAD@{1}: commit: Quick fix
    git switch -c hotfix/1.2.4 a1b2c3d</code></pre>
    <h2>When detached HEAD is not detached</h2>
    <p>Bare repositories often have <code>HEAD</code> as a symbolic ref to <code>refs/heads/main</code> even though there is no working tree. Submodules also intentionally check out detached HEAD on the recorded commit; that is normal.</p>
    <h2>Configuring warnings</h2>
    <pre><code>git config --global advice.detachedHead true   # default: show advice</code></pre>
    <p>Beginners should leave this on; the warning text explains exactly how to recover.</p>
    <h2>Working safely while detached</h2>
    <p>If you intentionally want to experiment without affecting any branch, detached HEAD is the right tool. The trick is to anchor important work before switching away. A reliable pattern:</p>
    <pre><code>git switch --detach v1.2.3
    # ... experiment, commit ...
    git tag tmp/experiment           # bookmark
    git switch main
    # later
    git switch -c rescued tmp/experiment
    git tag -d tmp/experiment</code></pre>
    <p>The <code>tmp/</code> tag namespace makes it obvious these are throwaway anchors. Some teams reserve a whole prefix for this purpose and have CI ignore it.</p>
    <h2>Common mistakes</h2>
    <p>Treating the warning as scary error and panicking. It is informational. Doing significant work in detached HEAD and then running <code>git switch main</code> without creating a branch first; recover via reflog, but better to anchor first. Confusing detached HEAD with a corrupted repo; nothing is corrupt, you just lack a branch label. Finally, pushing while detached: <code>git push</code> needs a branch on both ends. Either create a local branch and push it, or use <code>git push origin HEAD:refs/heads/new</code>.</p>

- title: "Remote-tracking branches"
  section: "Core Concepts"
  difficulty: "Intermediate"
  git_version: "2.30+"
  weight: 90
  body: |
    <h2>Introduction</h2>
    <p>A remote-tracking branch is a local ref that mirrors a branch on a remote. They live under <code>refs/remotes/&lt;remote&gt;/</code> and are updated by <code>git fetch</code> (and operations that imply fetch, like <code>git pull</code> and <code>git clone</code>). You do not commit directly to them.</p>
    <h2>Where they come from</h2>
    <p>The default refspec for <code>origin</code> is:</p>
    <pre><code>+refs/heads/*:refs/remotes/origin/*</code></pre>
    <p>So when the server has <code>refs/heads/main</code>, your clone gets <code>refs/remotes/origin/main</code>. The leading <code>+</code> means "force update".</p>
    <h2>Listing</h2>
    <pre><code>git branch -r
    git branch -a                # local + remote-tracking
    git branch -vv               # show upstream of locals</code></pre>
    <h2>Linking a local branch to one</h2>
    <pre><code>git switch feature/login                       # auto-creates local from origin/feature/login
    git switch -c mine origin/feature/login        # explicit
    git branch -u origin/main                      # set upstream of current branch
    git branch --unset-upstream</code></pre>
    <p>The <em>upstream</em> link drives <code>git status</code>'s ahead/behind, and the default targets for <code>git push</code> and <code>git pull</code>.</p>
    <h2>Pruning</h2>
    <p>Remote-tracking branches do not vanish when the remote branch is deleted. Prune them:</p>
    <pre><code>git fetch --prune
    git remote prune origin
    git config --global fetch.prune true</code></pre>
    <h2>The special remote HEAD</h2>
    <p>Each remote has a symbolic <code>HEAD</code> indicating its default branch:</p>
    <pre><code>git symbolic-ref refs/remotes/origin/HEAD
    git remote set-head origin --auto    # query server</code></pre>
    <p>This is what makes <code>origin</code> alone resolve to <code>origin/main</code> (or whatever default).</p>
    <h2>Diffing against a remote-tracking branch</h2>
    <pre><code>git fetch
    git log HEAD..origin/main --oneline      # what is upstream
    git log origin/main..HEAD --oneline      # what is local-only
    git diff @{u}                            # vs upstream</code></pre>
    <p><code>@{u}</code> (or <code>@{upstream}</code>) is shorthand for the configured upstream of the current branch.</p>
    <h2>Push behaviour</h2>
    <p>The default <code>push.default = simple</code> pushes the current branch to its upstream of the same name. If you push a branch with no upstream and have <code>push.autoSetupRemote = true</code> (Git 2.37+), the upstream is created automatically.</p>
    <h2>Refspec details</h2>
    <p>The fetch refspec for a remote can be customized to fetch additional refs or to map them differently. For example, to also pull GitHub PR refs and GitLab MR refs:</p>
    <pre><code>git config --add remote.origin.fetch '+refs/pull/*/head:refs/remotes/origin/pr/*'
    git config --add remote.origin.fetch '+refs/merge-requests/*/head:refs/remotes/origin/mr/*'</code></pre>
    <p>The leading <code>+</code> means "force update", needed because PR refs can move (rebases on the PR branch). After fetching, the server's PRs appear as local <code>origin/pr/*</code> refs, ready to <code>git switch -c review/&lt;n&gt; origin/pr/&lt;n&gt;</code>.</p>
    <h2>Common mistakes</h2>
    <p>Trying to <code>git checkout origin/main</code> and edit; it puts you in detached HEAD because <code>origin/main</code> is read-only. Create a tracking branch instead. Forgetting to <code>git fetch</code> and being misled by stale ahead/behind counts. Treating remote-tracking branches as if pushing to them updates the server; they are local mirrors. Use <code>git push origin main</code>. Finally, deleting <code>origin/main</code> with <code>git branch -dr</code> and assuming the server branch is gone; it is not. Use <code>git push origin --delete main</code> and only when you mean it.</p>

- title: "Working tree, index, and repository: the three areas"
  section: "Core Concepts"
  difficulty: "Intermediate"
  git_version: "2.30+"
  weight: 100
  body: |
    <h2>Introduction</h2>
    <p>Every Git operation moves data between three areas: the <strong>working tree</strong> (your files), the <strong>index</strong> (next commit's draft), and the <strong>repository</strong> (committed history under <code>.git</code>). Naming what moves where is the single most useful mental model.</p>
    <h2>The areas</h2>
    <ul>
      <li><strong>Working tree</strong>: the directory you edit in.</li>
      <li><strong>Index</strong>: <code>.git/index</code>, the staged tree.</li>
      <li><strong>Repository</strong>: objects in <code>.git/objects</code> plus refs in <code>.git/refs</code>.</li>
    </ul>
    <h2>Commands by direction</h2>
    <pre><code># working tree -> index
    git add file
    git rm file
    git mv old new

    # index -> repository
    git commit
    git write-tree   # plumbing

    # repository -> index
    git reset &lt;commit&gt;
    git read-tree &lt;tree&gt;

    # repository -> working tree (and usually index)
    git checkout &lt;commit&gt; -- file
    git restore --source &lt;commit&gt; file
    git switch &lt;branch&gt;</code></pre>
    <h2>The four diffs</h2>
    <p>You can compare any two areas:</p>
    <pre><code>git diff                  # working tree vs index
    git diff --staged         # index vs HEAD
    git diff HEAD             # working tree vs HEAD
    git diff main feature     # repository vs repository</code></pre>
    <h2>Status decoded</h2>
    <pre><code>git status -s
    # XY filename
    # X = index status, Y = working tree status
    # M modified, A added, D deleted, R renamed, ?? untracked</code></pre>
    <p>For example <code>MM</code> means modified in both index and working tree (you staged a change and then edited again).</p>
    <h2>Reset, restore, checkout</h2>
    <p>Each affects different areas:</p>
    <ul>
      <li><code>git reset --soft</code>: only repository (move ref).</li>
      <li><code>git reset</code> (mixed): repository + index.</li>
      <li><code>git reset --hard</code>: repository + index + working tree.</li>
      <li><code>git restore --staged</code>: index from HEAD.</li>
      <li><code>git restore</code>: working tree from index.</li>
      <li><code>git restore --source=&lt;commit&gt;</code>: working tree (and optionally index) from a specific commit.</li>
    </ul>
    <h2>An exercise</h2>
    <pre><code>echo a &gt; f.txt
    git add f.txt
    git commit -m "v1"
    echo b &gt;&gt; f.txt
    git add f.txt
    echo c &gt;&gt; f.txt
    git status
    git diff
    git diff --staged
    git diff HEAD</code></pre>
    <p>Read each diff; understanding why they differ cements the model.</p>
    <h2>Plumbing for each area</h2>
    <p>Knowing the plumbing for each area demystifies higher-level commands:</p>
    <ul>
      <li>Working tree: ordinary filesystem operations.</li>
      <li>Index: <code>git update-index</code>, <code>git ls-files</code>, <code>git read-tree</code>, <code>git write-tree</code>.</li>
      <li>Object database: <code>git hash-object</code>, <code>git cat-file</code>, <code>git mktree</code>, <code>git commit-tree</code>.</li>
      <li>Refs: <code>git update-ref</code>, <code>git symbolic-ref</code>, <code>git for-each-ref</code>.</li>
    </ul>
    <pre><code>git ls-files --stage              # index
    git ls-tree HEAD                  # repo
    ls -R                             # working tree</code></pre>
    <h2>Common mistakes</h2>
    <p>Trying to memorize commands instead of areas; once you know which area is the source and which is the destination, the right command is obvious. Conflating <code>git restore file</code> with <code>git checkout file</code>; they are equivalent for that case, but <code>checkout</code>'s many other modes confuse new users. Using <code>git reset --hard</code> to "clean up" without realizing it nukes the working tree. And finally, expecting <code>git commit</code> to include unstaged edits; it does not (unless you pass <code>-a</code> for tracked files only).</p>

- title: "How commits are linked: the commit graph"
  section: "Core Concepts"
  difficulty: "Intermediate"
  git_version: "2.30+"
  weight: 110
  body: |
    <h2>Introduction</h2>
    <p>A Git commit references zero, one, or several <em>parent</em> commits. The whole history is a directed acyclic graph (DAG) of these parent links. Branches and tags are simply labels on nodes of this graph.</p>
    <h2>Anatomy of a parent link</h2>
    <pre><code>git cat-file -p HEAD
    # tree 9f1a...
    # parent b2c3...
    # parent d4e5...        (only on merge commits)
    # author Ada ...
    # committer Ada ...</code></pre>
    <p>One parent: linear history. Two parents: a merge. Zero parents: a root commit. Three or more: an octopus merge.</p>
    <h2>Walking the graph</h2>
    <pre><code>git log --oneline --graph --all
    git log --first-parent           # follow only first parents
    git log --topo-order
    git log --date-order</code></pre>
    <p><code>--first-parent</code> on <code>main</code> is great for seeing the "trunk" of history without merge-side noise.</p>
    <h2>Ancestry queries</h2>
    <pre><code>git merge-base A B               # most recent common ancestor
    git merge-base --is-ancestor X Y   # exit 0 if X is ancestor of Y
    git rev-list A..B --count          # commits in B not in A</code></pre>
    <h2>Range syntax</h2>
    <ul>
      <li><code>A..B</code>: commits reachable from B but not A.</li>
      <li><code>A...B</code>: symmetric difference.</li>
      <li><code>^A B</code>: same as <code>A..B</code>.</li>
      <li><code>B --not A</code>: same as <code>A..B</code>.</li>
    </ul>
    <pre><code>git log main..feature
    git log main...feature --left-right --oneline</code></pre>
    <h2>The commit-graph file</h2>
    <p>Since Git 2.18, Git can write a <code>commit-graph</code> file that pre-computes ancestry data for huge repos:</p>
    <pre><code>git commit-graph write --reachable
    git config --global core.commitGraph true
    git config --global gc.writeCommitGraph true</code></pre>
    <p>This dramatically speeds up <code>git log --graph</code>, <code>git merge-base</code>, and reachability checks.</p>
    <h2>Octopus merges</h2>
    <p>A single merge commit can have many parents:</p>
    <pre><code>git merge feature1 feature2 feature3</code></pre>
    <p>Octopus merges only succeed without conflicts. They are useful for integration branches in some workflows but rarely needed.</p>
    <h2>Visualizing the graph</h2>
    <pre><code>git log --oneline --graph --decorate --all
    gitk --all
    git log --pretty=format:'%h %p %s'</code></pre>
    <p><code>%p</code> prints parent SHAs.</p>
    <h2>Generation numbers</h2>
    <p>The commit-graph file stores a generation number per commit: 1 for root commits, max(parent generations) + 1 otherwise. Generation numbers turn many ancestry queries into O(log n) operations. Modern Git (2.27+) writes corrected commit dates and generation v2 numbers when the commit-graph is enabled:</p>
    <pre><code>git commit-graph write --reachable --changed-paths
    git config gc.writeCommitGraph true
    git config core.commitGraph true
    git log --oneline --graph -n 5</code></pre>
    <p><code>--changed-paths</code> additionally records a Bloom filter per commit listing changed paths, dramatically speeding up path-limited <code>git log</code> queries.</p>
    <h2>Common mistakes</h2>
    <p>Picturing branches as separate stacks of commits; they are labels on nodes that may share ancestors. Using <code>HEAD~3</code> on a merge commit and being surprised: <code>~</code> always follows the first parent. Use <code>^2</code>, <code>^3</code> to jump to other parents. Forgetting that rebase rewrites graph topology by creating new commits with new parent pointers; old commits live on in the reflog. Finally, thinking the commit graph stores diffs; it stores trees and parents only. Diffs are computed on demand by comparing trees.</p>

- title: "Pack files and object storage"
  section: "Core Concepts"
  difficulty: "Advanced"
  git_version: "2.30+"
  weight: 120
  body: |
    <h2>Introduction</h2>
    <p>Git stores objects in two formats: <em>loose</em> (one file per object under <code>.git/objects/xx/yyyy...</code>) and <em>packed</em> (many objects in a single <code>.pack</code> file with a companion <code>.idx</code>). Packs are far more efficient on disk and on the wire.</p>
    <h2>Layout</h2>
    <pre><code>.git/objects/
      00/  ... loose objects, named by sha minus first two chars
      pack/
        pack-&lt;hash&gt;.pack    # the data
        pack-&lt;hash&gt;.idx     # offset index
        pack-&lt;hash&gt;.rev     # reverse index (Git 2.31+)</code></pre>
    <h2>Why packs</h2>
    <ul>
      <li>One file per object is brutal on filesystems with millions of files.</li>
      <li>Packs apply <em>delta compression</em>: store similar blobs as a base plus a diff.</li>
      <li>Packs use zlib in addition to deltas.</li>
      <li>Smart fetch/push transfer pack data directly.</li>
    </ul>
    <h2>Triggering packing</h2>
    <pre><code>git gc                    # routine maintenance
    git gc --aggressive       # heavier delta search
    git repack -a -d -f       # recreate one pack from all objects
    git fetch                 # also can produce packs</code></pre>
    <p>Auto-gc fires when the repo accumulates too many loose objects; tune with <code>gc.auto</code>.</p>
    <h2>Inspecting packs</h2>
    <pre><code>ls .git/objects/pack
    git verify-pack -v .git/objects/pack/pack-&lt;hash&gt;.idx | head
    git count-objects -v</code></pre>
    <p><code>verify-pack -v</code> shows each object's type, size, packed size, and whether it is a delta against another object.</p>
    <h2>Multi-pack indexes</h2>
    <p>For very large repos, multiple packs can be unified by a single index:</p>
    <pre><code>git multi-pack-index write
    git config core.multiPackIndex true</code></pre>
    <h2>Reachability bitmaps</h2>
    <p>Bitmaps speed up reachability queries (used by clone and fetch on hosting servers):</p>
    <pre><code>git repack -adb        # build bitmap
    git config repack.writeBitmaps true</code></pre>
    <p>Bitmaps are most useful when serving many clones or when running large <code>git rev-list</code> queries.</p>
    <h2>Object compression details</h2>
    <p>A delta in a pack stores a <em>base</em> object reference and an instruction stream. The base may itself be a delta. Git limits delta chains via <code>pack.depth</code> (default 50). The chosen base is usually a similar blob, often a previous version of the same file.</p>
    <h2>Geometric repacking</h2>
    <p>Maintaining a single huge pack is expensive; rewriting it on every gc is wasteful. Modern Git supports <em>geometric</em> repacking, which keeps a chain of packs of geometrically increasing size and only repacks the small ones:</p>
    <pre><code>git repack --geometric=2 -d --write-bitmap-index
    git config maintenance.incremental-repack.enabled true
    git maintenance run --task incremental-repack</code></pre>
    <p>This makes routine maintenance bounded: each gc only touches the smallest packs. Combined with multi-pack indexes and reachability bitmaps, geometric repack is the recommended setup for large or busy repositories.</p>
    <h2>Common mistakes</h2>
    <p>Manually deleting a <code>.pack</code> file to reclaim space, breaking the repo. The pack contains many reachable objects; use <code>git gc --prune</code> instead. Running <code>git gc --aggressive</code> on a schedule; it is expensive and rarely improves over a normal <code>gc</code>. Keeping millions of loose objects (after a botched recovery) and then doing <code>git status</code> on a slow filesystem; pack first. Finally, transferring packs by copying files instead of using <code>git clone --bare</code>; you may miss the <code>.idx</code> or skip newer features like the multi-pack index.</p>

- title: "The ORIG_HEAD, MERGE_HEAD, and CHERRY_PICK_HEAD refs"
  section: "Core Concepts"
  difficulty: "Intermediate"
  git_version: "2.30+"
  weight: 130
  body: |
    <h2>Introduction</h2>
    <p>Git keeps several special "auxiliary" refs in <code>.git/</code> to record state during multi-step operations. Knowing them turns scary recoveries into one-liners.</p>
    <h2>ORIG_HEAD</h2>
    <p><code>ORIG_HEAD</code> is set whenever a "dangerous" operation moves <code>HEAD</code> by a lot: merge, rebase, reset, am. It captures the previous tip so you can undo:</p>
    <pre><code>git merge feature
    # decide it was a mistake
    git reset --hard ORIG_HEAD</code></pre>
    <p>Same trick after a bad rebase or reset:</p>
    <pre><code>git rebase main
    git reset --hard ORIG_HEAD     # back to pre-rebase state</code></pre>
    <h2>MERGE_HEAD</h2>
    <p>During a merge, <code>MERGE_HEAD</code> records the tip of the branch being merged in. It exists from the start of <code>git merge</code> until the merge commit is created or the merge is aborted:</p>
    <pre><code>git merge feature
    cat .git/MERGE_HEAD
    git merge --abort                # removes MERGE_HEAD</code></pre>
    <p>If you finished resolving conflicts and want to write the merge commit:</p>
    <pre><code>git commit                       # uses MERGE_HEAD to record the second parent</code></pre>
    <h2>MERGE_MSG and AUTO_MERGE</h2>
    <p>Companion files include <code>.git/MERGE_MSG</code> (the prepared commit message) and, since Git 2.40, <code>AUTO_MERGE</code> (a tree containing Git's best-effort auto-resolution). The latter is useful for diffing against your manual resolution.</p>
    <h2>CHERRY_PICK_HEAD and REVERT_HEAD</h2>
    <p>During a cherry-pick or revert, Git records the source commit:</p>
    <pre><code>git cherry-pick a1b2c3d
    cat .git/CHERRY_PICK_HEAD
    git cherry-pick --abort
    git cherry-pick --continue        # after resolving conflicts</code></pre>
    <p>The same pattern applies to <code>git revert</code> with <code>REVERT_HEAD</code>.</p>
    <h2>BISECT_HEAD and REBASE_HEAD</h2>
    <p>When bisecting or rebasing, Git also writes <code>BISECT_HEAD</code> or <code>REBASE_HEAD</code> to track in-progress state. Tools like <code>git status</code> use these to print accurate "you are in the middle of X" messages.</p>
    <h2>FETCH_HEAD</h2>
    <p>After a fetch, <code>FETCH_HEAD</code> lists what was fetched, one ref per line. <code>git pull</code> reads it to know what to merge:</p>
    <pre><code>git fetch origin main
    cat .git/FETCH_HEAD
    git merge FETCH_HEAD</code></pre>
    <h2>Putting it together</h2>
    <pre><code>git status                         # references all of these as needed
    ls .git/*HEAD                      # list current auxiliary refs</code></pre>
    <h2>Detecting in-progress operations</h2>
    <p><code>git status</code> reads these auxiliary refs to tell you what is in progress. Scripts can do the same by testing for the existence of the files:</p>
    <pre><code>if test -f "$(git rev-parse --git-dir)/MERGE_HEAD"; then
        echo "merge in progress"
    fi
    if test -f "$(git rev-parse --git-dir)/CHERRY_PICK_HEAD"; then
        echo "cherry-pick in progress"
    fi
    if test -d "$(git rev-parse --git-dir)/rebase-merge"; then
        echo "interactive rebase in progress"
    fi</code></pre>
    <p>This is exactly what shell prompt integrations like <code>__git_ps1</code> do to render <code>(main|MERGING)</code>.</p>
    <h2>Common mistakes</h2>
    <p>Trying to delete <code>MERGE_HEAD</code> manually to escape a merge; use <code>git merge --abort</code>. Forgetting <code>ORIG_HEAD</code> exists and recreating commits by hand after a bad reset. Confusing <code>FETCH_HEAD</code> (last fetch, transient) with remote-tracking refs like <code>origin/main</code> (persistent). And finally, scripting around these refs assuming they exist; <code>MERGE_HEAD</code> only exists during a merge, so always test for the file before reading it.</p>

- title: "Annotated tags vs lightweight tags"
  section: "Core Concepts"
  difficulty: "Intermediate"
  git_version: "2.30+"
  weight: 140
  body: |
    <h2>Introduction</h2>
    <p>Git supports two kinds of tags: <strong>lightweight</strong>, which are just refs pointing at commits, and <strong>annotated</strong>, which are full Git objects with metadata. Use annotated tags for releases.</p>
    <h2>Creating</h2>
    <pre><code>git tag v1.0.0                          # lightweight
    git tag -a v1.0.0 -m "1.0 GA"           # annotated
    git tag -s v1.0.0 -m "Signed"           # GPG-signed annotated
    git tag -a v1.0.0 a1b2c3d -m "..."     # tag a specific commit</code></pre>
    <h2>What annotated tags store</h2>
    <pre><code>git cat-file -t v1.0.0
    # tag
    git cat-file -p v1.0.0
    # object &lt;commit-sha&gt;
    # type commit
    # tag v1.0.0
    # tagger Ada &lt;ada@example.com&gt; 1714300000 +0000
    #
    # 1.0 GA</code></pre>
    <p>An annotated tag is its own object. It has its own SHA distinct from the commit it points at, a tagger and date, a message, and an optional signature.</p>
    <h2>What lightweight tags do not store</h2>
    <p>A lightweight tag is just <code>refs/tags/v1.0.0</code> containing a commit SHA. There is no message, no tagger, no signature. <code>git describe</code>, <code>git tag -v</code>, and many CI release tools assume annotated tags and behave oddly with lightweight ones.</p>
    <h2>Inspecting</h2>
    <pre><code>git show v1.0.0
    git tag -l --format='%(refname:short) %(objecttype) %(taggername) %(subject)'</code></pre>
    <p>Lightweight tags show <code>commit</code> as object type; annotated tags show <code>tag</code>.</p>
    <h2>Signing and verifying</h2>
    <pre><code>git tag -s v1.0.0 -m "Signed"
    git tag -v v1.0.0
    # gpg: Good signature from "Ada Lovelace &lt;ada@example.com&gt;"</code></pre>
    <p>SSH signing is also supported in modern Git:</p>
    <pre><code>git config --global gpg.format ssh
    git config --global user.signingkey ~/.ssh/id_ed25519.pub
    git tag -s v1.1.0 -m "SSH-signed"</code></pre>
    <h2>Choosing</h2>
    <ul>
      <li>Use <strong>annotated</strong> for releases, anything you publish, anything you sign.</li>
      <li>Use <strong>lightweight</strong> for ad hoc local bookmarks (e.g. "remember this commit before I rebase").</li>
    </ul>
    <h2>Pushing tags</h2>
    <pre><code>git push origin v1.0.0
    git push origin --tags
    git push --follow-tags         # only annotated tags reachable from pushed commits</code></pre>
    <p><code>--follow-tags</code> deliberately ignores lightweight tags, which is usually what you want.</p>
    <h2>Tag dereferencing</h2>
    <p>Many commands automatically dereference an annotated tag to the commit it points at; some do not. Use <code>^{}</code> to force dereferencing in scripts:</p>
    <pre><code>git rev-parse v1.0.0           # SHA of the tag object (annotated)
    git rev-parse v1.0.0^{}        # SHA of the commit it points at
    git rev-parse v1.0.0^{commit}  # same, with type assertion
    git for-each-ref --format='%(refname:short) %(*objectname)' refs/tags</code></pre>
    <p>The <code>%(*objectname)</code> placeholder gives the dereferenced commit for tags and is empty for non-tag refs. This pattern is essential for release scripts that need a commit SHA from a tag name.</p>
    <h2>Common mistakes</h2>
    <p>Tagging releases with plain <code>git tag v1.0</code> and missing tagger/date/message in audit logs. Always pass <code>-a</code> or <code>-s</code>. Moving a published tag to a new commit ("force-tag"); downstream users have already cached the old SHA and may not pick up the change. Issue <code>v1.0.1</code> instead. Using lightweight tags as named bookmarks shared across a team; if you must share, prefer branches or annotated tags. Finally, expecting <code>git describe</code> to work without annotated tags; by default it only counts annotated ones (<code>--tags</code> opts in to lightweight, with caveats).</p>

- title: "What happens during git clone"
  section: "Core Concepts"
  difficulty: "Intermediate"
  git_version: "2.30+"
  weight: 150
  body: |
    <h2>Introduction</h2>
    <p><code>git clone</code> looks like one operation but actually composes several. Understanding the steps helps when troubleshooting partial clones, slow clones, or surprising defaults.</p>
    <h2>The sequence</h2>
    <ol>
      <li>Create the target directory.</li>
      <li>Run <code>git init</code> inside it.</li>
      <li>Add <code>origin</code> as a remote with the source URL.</li>
      <li>Configure default refspec <code>+refs/heads/*:refs/remotes/origin/*</code>.</li>
      <li>Run <code>git fetch origin</code> to download objects and refs.</li>
      <li>Determine the default branch (the remote's <code>HEAD</code>).</li>
      <li>Create a local branch tracking it.</li>
      <li>Check out that branch into the working tree.</li>
    </ol>
    <h2>Watching it happen</h2>
    <pre><code>GIT_TRACE=1 GIT_TRACE_PACKET=1 git clone https://github.com/example/widget.git 2&gt;&amp;1 | head -50</code></pre>
    <p>You will see capability negotiation, refs advertisement, want/have negotiation, and pack receive.</p>
    <h2>Wire protocol</h2>
    <p>Modern Git supports protocol v2 (<code>git config protocol.version 2</code> or default in 2.26+). The server advertises only the requested refs rather than the full ref list, which dramatically improves clone times for repos with many refs.</p>
    <h2>Variants</h2>
    <pre><code>git clone --bare                       # no working tree
    git clone --mirror                     # bare + all refs, configured for mirroring
    git clone --depth 1                    # shallow
    git clone --filter=blob:none           # partial clone, skip blobs until needed
    git clone --filter=tree:0              # even less data, on-demand trees
    git clone --single-branch              # only one branch's history
    git clone --branch v1.2.3              # checkout a specific branch/tag
    git clone --recurse-submodules         # clone submodules too
    git clone --no-checkout                # skip working tree population</code></pre>
    <h2>Partial clones</h2>
    <p>Partial clones (<code>--filter</code>) defer object download until objects are needed. They require server support (most modern hosts have it):</p>
    <pre><code>git clone --filter=blob:none https://github.com/example/big.git
    cd big
    git log --oneline                  # cheap; only commit and tree objects fetched
    git show HEAD:src/main.c           # this triggers a blob fetch</code></pre>
    <h2>What goes where</h2>
    <p>After a successful clone:</p>
    <ul>
      <li><code>.git/objects/pack/</code>: the pack file received from the server.</li>
      <li><code>.git/refs/remotes/origin/</code>: every server branch as a remote-tracking ref.</li>
      <li><code>.git/HEAD</code>: symbolic ref to the new local branch.</li>
      <li><code>.git/config</code>: <code>[remote "origin"]</code> section with URL and refspec.</li>
    </ul>
    <h2>Server-side advertisement</h2>
    <p>The first thing the server sends in any clone is the ref advertisement. Under protocol v0/v1 this lists every ref, even if you only want one; on huge repos with millions of refs the advertisement alone could take seconds. Protocol v2 changes this: the client sends an <code>ls-refs</code> request specifying patterns, and the server only advertises matching refs:</p>
    <pre><code>git -c protocol.version=2 ls-remote origin 'refs/heads/main'
    GIT_TRACE_PACKET=1 git -c protocol.version=2 ls-remote origin 2&gt;&amp;1 | head</code></pre>
    <p>For day-to-day clones the speedup is invisible; for hosting servers it is dramatic.</p>
    <h2>Common mistakes</h2>
    <p>Cloning a huge repo on a flaky network and starting over from scratch; <code>git clone</code> in 2.30+ supports resumable cloning over the smart HTTP protocol, but only if the server supports it. Otherwise <code>--depth 1</code> first, then <code>git fetch --unshallow</code> later. Cloning into <code>~/Dropbox</code> or another sync folder; the sync client will fight Git for control of <code>.git/index</code>. Cloning a repo with submodules and forgetting <code>--recurse-submodules</code>, ending up with empty submodule directories. Finally, cloning over HTTPS without a credential helper and being prompted for credentials on every fetch; configure one once.</p>

- title: "What happens during git fetch"
  section: "Core Concepts"
  difficulty: "Intermediate"
  git_version: "2.30+"
  weight: 160
  body: |
    <h2>Introduction</h2>
    <p><code>git fetch</code> is the network operation that downloads new objects and updates remote-tracking refs. It does not change your branches or working tree, which makes it the safest "what's new?" command.</p>
    <h2>The sequence</h2>
    <ol>
      <li>Resolve the remote URL.</li>
      <li>Open a connection (HTTPS, SSH, or git://).</li>
      <li>Negotiate capabilities (protocol version, multi-ack, partial clone filters, etc.).</li>
      <li>Server advertises refs (or, in protocol v2, only those matching requested patterns).</li>
      <li>Client reports what it already has.</li>
      <li>Server sends a pack file containing the missing objects.</li>
      <li>Client writes the pack to <code>.git/objects/pack/</code> and indexes it.</li>
      <li>Client updates remote-tracking refs (<code>refs/remotes/origin/*</code>).</li>
      <li>Optionally prunes deleted refs.</li>
    </ol>
    <h2>Commands</h2>
    <pre><code>git fetch
    git fetch origin
    git fetch --all
    git fetch --prune
    git fetch origin main:my-main         # fetch into a local ref</code></pre>
    <p>The colon syntax <code>main:my-main</code> creates or updates a local ref directly; use it carefully.</p>
    <h2>Inspecting what was fetched</h2>
    <pre><code>git fetch origin
    cat .git/FETCH_HEAD
    git log HEAD..origin/main --oneline</code></pre>
    <p><code>FETCH_HEAD</code> lists every ref updated by the most recent fetch, in the order requested.</p>
    <h2>Refspecs</h2>
    <p>Each remote has one or more fetch refspecs. The default for <code>origin</code>:</p>
    <pre><code>+refs/heads/*:refs/remotes/origin/*</code></pre>
    <p>You can add more, for instance to fetch pull-request refs from GitHub:</p>
    <pre><code>git config --add remote.origin.fetch '+refs/pull/*/head:refs/remotes/origin/pr/*'
    git fetch
    git switch -c review/123 origin/pr/123</code></pre>
    <h2>Pruning</h2>
    <p>Without prune, branches deleted on the server linger as stale <code>origin/*</code> refs:</p>
    <pre><code>git fetch --prune
    git config --global fetch.prune true</code></pre>
    <h2>Tags</h2>
    <p>By default, fetch downloads tags pointing at fetched commits. Force or disable:</p>
    <pre><code>git fetch --tags
    git fetch --no-tags</code></pre>
    <h2>Trace and debug</h2>
    <pre><code>GIT_TRACE=1 GIT_TRACE_PACKET=1 git fetch
    GIT_CURL_VERBOSE=1 git fetch        # HTTPS</code></pre>
    <p>These reveal exact requests, useful for debugging proxies or auth.</p>
    <h2>Negotiation and haves</h2>
    <p>The fetch handshake is a dance of "wants" and "haves". The client lists what it wants (the tip SHAs of remote branches), and offers up haves (recent local commits) so the server can compute a minimal pack. Modern Git uses the <code>skipping</code> negotiation algorithm, which converges in O(log n) rounds even on long histories. You can tune it:</p>
    <pre><code>git config fetch.negotiationAlgorithm skipping
    git config fetch.negotiationAlgorithm consecutive
    GIT_TRACE_PACKET=1 git fetch 2&gt;&amp;1 | grep -E 'have|want' | head</code></pre>
    <h2>Common mistakes</h2>
    <p>Believing <code>git fetch</code> changes your branches; it never does. Use <code>git pull</code> or <code>git merge origin/main</code> to integrate. Skipping <code>--prune</code> in long-lived clones and accumulating dozens of stale <code>origin/*</code> refs. Misconfiguring a refspec by hand and overwriting local branches; double-check with <code>git config -e</code>. Finally, fetching from a partial clone without realizing some objects will require a follow-up network call when accessed; partial clones trade up-front speed for occasional latency later.</p>

- title: "What happens during git pull (fetch + merge/rebase)"
  section: "Core Concepts"
  difficulty: "Intermediate"
  git_version: "2.30+"
  weight: 170
  body: |
    <h2>Introduction</h2>
    <p><code>git pull</code> is sugar for <code>git fetch</code> followed by integration of the upstream branch into the current branch. The integration step is either a merge (default) or a rebase.</p>
    <h2>The two steps</h2>
    <ol>
      <li><code>git fetch &lt;remote&gt; &lt;refspec&gt;</code>: download and update tracking refs.</li>
      <li>If <code>pull.rebase</code> is false: <code>git merge FETCH_HEAD</code>.</li>
      <li>If <code>pull.rebase</code> is true: <code>git rebase FETCH_HEAD</code>.</li>
    </ol>
    <p>Equivalent manual sequence:</p>
    <pre><code>git fetch origin main
    git merge origin/main             # or git rebase origin/main</code></pre>
    <h2>Configuration</h2>
    <pre><code>git config --global pull.rebase false   # merge (default classic)
    git config --global pull.rebase true    # rebase
    git config --global pull.ff only        # fast-forward only, otherwise abort</code></pre>
    <p>Since Git 2.27, plain <code>git pull</code> with no configuration prints a warning. Pick a strategy explicitly.</p>
    <h2>Fast-forward only</h2>
    <p><code>--ff-only</code> is the safest pull: it succeeds only if your branch is strictly behind. No merge commit, no rebase, no surprises.</p>
    <pre><code>git pull --ff-only</code></pre>
    <p>Combine with autostash to avoid working-tree blockers:</p>
    <pre><code>git pull --ff-only --autostash</code></pre>
    <h2>Pull with rebase</h2>
    <pre><code>git pull --rebase
    git pull --rebase=merges          # preserve merge structure</code></pre>
    <p><code>--rebase=merges</code> is useful for branches that contain merge commits you want to keep.</p>
    <h2>Pull with autostash</h2>
    <pre><code>git config --global rebase.autoStash true
    git config --global merge.autoStash true</code></pre>
    <p>With these on, dirty trees are stashed before the integration and reapplied after, transparently.</p>
    <h2>Multi-branch pull</h2>
    <pre><code>git pull origin main feature        # fetches both, merges octopus into HEAD</code></pre>
    <p>This is rarely what you want; prefer separate operations.</p>
    <h2>Pull vs explicit fetch + integrate</h2>
    <p>Many experienced users prefer to never use <code>git pull</code>. They run <code>git fetch</code> first, inspect <code>git log HEAD..@{u}</code>, and then choose merge or rebase deliberately. This is especially valuable when integrating long-lived divergent branches.</p>
    <h2>Pull policies for teams</h2>
    <p>Healthy teams pick a single pull policy and configure it organization-wide. Two common choices:</p>
    <pre><code># Linear-history team: rebase on pull, merge via PR only
    git config --global pull.rebase true
    git config --global rebase.autoStash true

    # Merge-friendly team: never rebase, always fast-forward main
    git config --global pull.rebase false
    git config --global pull.ff only</code></pre>
    <p>The worst configuration is the absent one: each developer's <code>git pull</code> behaves differently, producing inconsistent histories. Document the policy in your repo's <code>CONTRIBUTING.md</code> and provide a one-line config snippet new contributors can copy.</p>
    <h2>Common mistakes</h2>
    <p>Running <code>git pull</code> with uncommitted changes and getting an unexpected merge commit on top of dirty work. Either stash, commit, or set <code>autoStash</code>. Pulling with rebase on a branch others have based work on; you rewrite their base. Rebase only on private branches. Configuring <code>pull.rebase</code> globally without realizing it also affects <code>main</code>; many teams set <code>pull.ff only</code> globally and override per-branch. Finally, using <code>git pull</code> in CI; CI rarely needs integration, only the latest commit. Use <code>git fetch</code> and an explicit checkout of <code>origin/main</code> to keep CI deterministic.</p>

- title: "What happens during git push"
  section: "Core Concepts"
  difficulty: "Intermediate"
  git_version: "2.30+"
  weight: 180
  body: |
    <h2>Introduction</h2>
    <p><code>git push</code> uploads commits to a remote and updates that remote's refs. Unlike fetch, it modifies state on the server, so safety mechanisms exist to prevent overwriting other people's work.</p>
    <h2>The sequence</h2>
    <ol>
      <li>Resolve the remote URL and target refspec.</li>
      <li>Open a connection.</li>
      <li>Negotiate capabilities.</li>
      <li>Server advertises current values of refs.</li>
      <li>Client checks each push: is it a fast-forward of the server's ref?</li>
      <li>Client packs missing objects and uploads them.</li>
      <li>Server runs <code>pre-receive</code> hook.</li>
      <li>For each ref, server runs <code>update</code> hook and atomically updates the ref.</li>
      <li>Server runs <code>post-receive</code> hook.</li>
      <li>Server reports success or rejection to the client.</li>
    </ol>
    <h2>Commands</h2>
    <pre><code>git push                                  # current branch to upstream
    git push origin main                      # explicit
    git push -u origin feature/login          # set upstream
    git push origin --delete feature/login    # delete remote branch
    git push origin v1.0.0                    # push a tag
    git push --follow-tags
    git push --force-with-lease</code></pre>
    <h2>Fast-forward enforcement</h2>
    <p>By default, a push is rejected if it would not fast-forward the remote ref. This protects against accidentally overwriting work others have pushed:</p>
    <pre><code> ! [rejected]   main -> main (non-fast-forward)
    error: failed to push some refs to 'origin'
    hint: Updates were rejected because the tip of your current branch is behind ...</code></pre>
    <p>Resolve by fetching and integrating, then pushing again.</p>
    <h2>Force pushing</h2>
    <pre><code>git push --force                   # dangerous: ignores remote state
    git push --force-with-lease        # safer: refuses if remote moved
    git push --force-with-lease=feature/login:abc1234</code></pre>
    <p><code>--force-with-lease</code> requires that the remote ref still equals what your tracking ref says. Always prefer it.</p>
    <h2>Atomic pushes</h2>
    <pre><code>git push --atomic origin branchA branchB</code></pre>
    <p>With <code>--atomic</code>, either all updates succeed or none do; useful when refs must move together.</p>
    <h2>Push policies</h2>
    <pre><code>git config --global push.default simple        # current branch to its upstream
    git config --global push.default current       # current branch to remote of same name
    git config --global push.default upstream      # current to its upstream's name
    git config --global push.autoSetupRemote true  # 2.37+: auto -u for new branches</code></pre>
    <h2>Server-side hooks</h2>
    <p>Hosting platforms run <code>pre-receive</code> and <code>update</code> hooks to enforce policies (signed commits, branch naming, mandatory CI green). When a push is rejected, the server message names the offending ref or commit. Read the message before retrying.</p>
    <h2>Common mistakes</h2>
    <p>Force-pushing to a shared branch like <code>main</code> and rewriting other people's commits. Coordinate, or use <code>--force-with-lease</code> on private branches only. Pushing tags individually and forgetting to push commits, leaving dangling tags on the server. Use <code>--follow-tags</code>. Pushing to a wrong remote because you have multiple configured; <code>git push -v</code> shows exactly where it is going. Finally, expecting <code>git push --delete</code> to delete files; it deletes <em>refs</em>. To delete files, commit a removal and push that commit.</p>

- title: "Conflict markers and how Git produces them"
  section: "Core Concepts"
  difficulty: "Intermediate"
  git_version: "2.30+"
  weight: 190
  body: |
    <h2>Introduction</h2>
    <p>When Git cannot automatically combine two changes to the same region of a file, it leaves <em>conflict markers</em> in the working copy and lets you resolve manually. The markers are not magic; they record exactly what each side did relative to a common base.</p>
    <h2>Anatomy</h2>
    <pre><code>&lt;&lt;&lt;&lt;&lt;&lt;&lt; HEAD
    line as it is on our branch
    =======
    line as it is on their branch
    &gt;&gt;&gt;&gt;&gt;&gt;&gt; feature/login</code></pre>
    <p>Section between <code>&lt;&lt;&lt;</code> and <code>===</code> is "ours" (the current branch). Between <code>===</code> and <code>&gt;&gt;&gt;</code> is "theirs". Resolution is to keep the right text, delete the markers, and stage.</p>
    <h2>Three-way markers (diff3 style)</h2>
    <pre><code>git config --global merge.conflictStyle diff3</code></pre>
    <p>Now markers also include the base version:</p>
    <pre><code>&lt;&lt;&lt;&lt;&lt;&lt;&lt; HEAD
    our version
    ||||||| merged common ancestor
    base version
    =======
    their version
    &gt;&gt;&gt;&gt;&gt;&gt;&gt; feature/login</code></pre>
    <p>Seeing the base often clarifies which side intended what. Even better, since Git 2.35:</p>
    <pre><code>git config --global merge.conflictStyle zdiff3</code></pre>
    <p>which trims common context.</p>
    <h2>How Git produces them</h2>
    <p>For each pair of conflicting hunks, Git runs a three-way diff between base, ours, and theirs. If both sides changed the same region differently, Git writes both versions surrounded by markers. Otherwise the side that changed wins automatically.</p>
    <h2>Resolving</h2>
    <pre><code>git status                       # list conflicted paths
    edit each file
    git add &lt;file&gt;                   # mark as resolved
    git commit                       # uses prepared message</code></pre>
    <p>Or use a merge tool:</p>
    <pre><code>git mergetool
    git config --global merge.tool meld</code></pre>
    <h2>Inspecting each side</h2>
    <pre><code>git show :1:path        # base
    git show :2:path        # ours
    git show :3:path        # theirs
    git checkout --ours path
    git checkout --theirs path</code></pre>
    <p>The colon syntax reads from the conflicted index stages directly.</p>
    <h2>Aborting</h2>
    <pre><code>git merge --abort
    git rebase --abort
    git cherry-pick --abort</code></pre>
    <h2>rerere</h2>
    <p>"Reuse recorded resolution" remembers your conflict resolutions and reapplies them next time the same conflict appears:</p>
    <pre><code>git config --global rerere.enabled true</code></pre>
    <p>Indispensable for long-running rebase chains.</p>
    <h2>Renames and binary conflicts</h2>
    <p>Not all conflicts produce text markers. Rename/rename, rename/delete, and modify/delete conflicts leave the index in a state with multiple stages but no &lt;&lt;&lt; markers in the file. Binary files cannot be merged textually at all; both versions are written to disk and the index records the conflict:</p>
    <pre><code>git status
    # both modified:   image.png
    # deleted by us:   old.txt
    # added by them:   new.txt
    git checkout --ours image.png      # keep our version
    git checkout --theirs new.txt
    git add image.png new.txt</code></pre>
    <p>Always read <code>git status</code> at conflict time; it explicitly labels these less common conflict types.</p>
    <h2>Common mistakes</h2>
    <p>Resolving by deleting the markers without reading the contents, accidentally dropping one side. Always read both halves and the base. Forgetting to <code>git add</code> after editing; <code>git commit</code> will refuse with "unmerged paths". Treating <code>--ours</code> and <code>--theirs</code> as identical to <code>-X ours</code> and <code>-X theirs</code>; the former replaces an entire conflicted file, the latter is a hint to the merge strategy. Finally, copying a partially resolved file from elsewhere and bypassing Git; the index still has stage 1/2/3 entries until you <code>git add</code>.</p>

- title: "The merge base algorithm"
  section: "Core Concepts"
  difficulty: "Advanced"
  git_version: "2.30+"
  weight: 200
  body: |
    <h2>Introduction</h2>
    <p>The <em>merge base</em> of two commits is their best common ancestor: the foundation Git uses for three-way merges. Choosing the right base is what makes "automatic" merges actually work.</p>
    <h2>Finding it</h2>
    <pre><code>git merge-base A B
    git merge-base --all A B           # all best common ancestors
    git merge-base --octopus A B C
    git merge-base --is-ancestor X Y   # exit 0 if X is ancestor of Y
    git merge-base --fork-point main feature</code></pre>
    <h2>Definition</h2>
    <p>A common ancestor C of A and B is a "best" common ancestor if no other common ancestor of A and B is a descendant of C. Most pairs have a single best common ancestor. When the graph contains crisscross merges, several can exist; that is what <code>--all</code> reports.</p>
    <h2>How three-way merge uses it</h2>
    <p>Given commits A and B with merge base M, Git for each file:</p>
    <ol>
      <li>Reads the file at M, A, and B.</li>
      <li>If only one side changed, take that side.</li>
      <li>If both sides changed identically, take either.</li>
      <li>If both sides changed differently, run a three-way text merge or emit conflict markers.</li>
    </ol>
    <h2>Recursive and ort strategies</h2>
    <p>When several merge bases exist, the recursive strategy <em>merges them first</em>, producing a virtual base, and uses that for the final three-way merge. The <code>ort</code> strategy (default since 2.33) does the same with a faster, more memory-efficient implementation.</p>
    <pre><code>git merge -s ort feature
    git merge -s recursive feature
    git merge -s resolve feature       # only one merge base, no recursion</code></pre>
    <h2>Fork point</h2>
    <p>For rebase, Git often needs to know where a topic branch left a base branch. <code>--fork-point</code> consults the reflog of the base to find the most recent point at which the topic and base shared history:</p>
    <pre><code>git rebase --fork-point main feature
    git merge-base --fork-point main feature</code></pre>
    <h2>Worked example</h2>
    <pre><code>A---B---C   main
         \
          D---E   feature

    git merge-base main feature   # B</code></pre>
    <p>A merge of <code>main</code> into <code>feature</code> three-way merges using B as the base.</p>
    <h2>Inspecting why a merge conflicts</h2>
    <pre><code>git merge-base HEAD feature
    git diff &lt;base&gt; HEAD -- file
    git diff &lt;base&gt; feature -- file</code></pre>
    <p>This pair of diffs is exactly what Git's merge sees.</p>
    <h2>Common mistakes</h2>
    <p>Assuming there is always exactly one merge base; crisscross histories produce several. Treating <code>--fork-point</code> as a substitute for <code>--onto</code>; they solve different problems. Picking <code>--strategy=ours</code> when you meant <code>--strategy-option=ours</code>; the first discards their changes entirely. Finally, recomputing the merge base by hand from <code>git log</code> output and getting it wrong; use <code>git merge-base</code> rather than eyeballing.</p>

- title: "Reachability and ancestry in Git"
  section: "Core Concepts"
  difficulty: "Advanced"
  git_version: "2.30+"
  weight: 210
  body: |
    <h2>Introduction</h2>
    <p>"Reachability" is the most important property of a Git object. An object is <em>reachable</em> if some ref leads to it via parent or tree links. Unreachable objects are eligible for garbage collection.</p>
    <h2>Reachability rules</h2>
    <p>Starting from any ref:</p>
    <ul>
      <li>A commit reaches its root tree, all parents, and (transitively) those parents' trees and parents.</li>
      <li>A tree reaches all entries (blobs and subtrees).</li>
      <li>An annotated tag reaches the tagged object.</li>
    </ul>
    <p>Refs include local branches, remote-tracking branches, tags, stash, notes, and the reflog (until expiration).</p>
    <h2>Listing reachable objects</h2>
    <pre><code>git rev-list --objects --all | head
    git rev-list --objects HEAD
    git rev-list --count HEAD</code></pre>
    <h2>Ancestry tests</h2>
    <pre><code>git merge-base --is-ancestor X Y &amp;&amp; echo "X is ancestor of Y"
    git rev-list X..Y --count                # how many commits lie between
    git log --ancestry-path A..B --oneline   # only commits on path A to B</code></pre>
    <p><code>--ancestry-path</code> is invaluable for finding the chain of commits that brought a fix from one tag to another.</p>
    <h2>Range operators</h2>
    <ul>
      <li><code>A..B</code>: reachable from B, not from A.</li>
      <li><code>A...B</code>: symmetric difference (either side, not both).</li>
      <li><code>^A B C</code>: reachable from B or C but not A.</li>
    </ul>
    <pre><code>git log main..feature                 # commits added by feature
    git log main...feature --left-right   # both sides labelled</code></pre>
    <h2>Unreachable objects</h2>
    <pre><code>git fsck --unreachable
    git fsck --dangling
    git fsck --lost-found      # writes them to .git/lost-found</code></pre>
    <p>Unreachable objects survive until <code>git gc --prune</code> removes them; the default grace period is two weeks (<code>gc.pruneExpire</code>).</p>
    <h2>The role of the commit-graph file</h2>
    <p>Reachability and ancestry queries are the bottleneck of many Git operations. The <code>commit-graph</code> file precomputes generation numbers and parent lists, making these queries O(log n) instead of O(n):</p>
    <pre><code>git commit-graph write --reachable
    git config --global core.commitGraph true</code></pre>
    <h2>Bitmap reachability</h2>
    <p>Server-side, <em>reachability bitmaps</em> let Git answer "what objects are reachable from this commit?" in microseconds, by storing a precomputed bit per object. They are written by:</p>
    <pre><code>git repack -adb</code></pre>
    <h2>Walks limited by date or path</h2>
    <p>The reachability machinery accepts many limiters that combine with range syntax:</p>
    <pre><code>git rev-list --since=2024-01-01 main
    git rev-list main -- path/to/file
    git rev-list --no-merges main..feature
    git rev-list --first-parent main
    git rev-list HEAD --count</code></pre>
    <p>Combine these to answer specific questions like "how many non-merge commits did Ada land on main last quarter?" without resorting to shell pipelines. Plumbing's stable output makes the result trivial to feed into reporting tools.</p>
    <h2>Common mistakes</h2>
    <p>Believing a deleted branch erases its commits; they remain reachable through the reflog for 90 days, and unreachable but unpruned for two more weeks. Confusing <code>A..B</code> with <code>A...B</code>; one is asymmetric, the other symmetric. Using <code>HEAD~3</code> to navigate across merges and being confused by first-parent traversal; use <code>HEAD^2</code> to switch to the second parent. Finally, expecting <code>git fsck</code> to find lost commits after a fresh clone; the reflog and dangling objects only exist locally where the work was done.</p>

- title: "Symbolic refs"
  section: "Core Concepts"
  difficulty: "Advanced"
  git_version: "2.30+"
  weight: 220
  body: |
    <h2>Introduction</h2>
    <p>A <em>symbolic ref</em> is a reference whose value is another ref name rather than an object hash. The canonical example is <code>HEAD</code>, which usually contains <code>ref: refs/heads/main</code>. Symbolic refs let Git track "the current branch" as data, not state.</p>
    <h2>Reading and writing</h2>
    <pre><code>git symbolic-ref HEAD
    # refs/heads/main

    git symbolic-ref refs/remotes/origin/HEAD
    # refs/remotes/origin/main

    git symbolic-ref HEAD refs/heads/feature/login   # change without checkout
    git symbolic-ref --short HEAD                      # short form: main
    git symbolic-ref --delete refs/remotes/origin/HEAD</code></pre>
    <h2>HEAD as a symbolic ref</h2>
    <p>When you commit, Git resolves <code>HEAD</code> to find the current branch and updates <em>that</em> branch's tip. When <code>HEAD</code> is detached it stops being symbolic and contains a raw SHA.</p>
    <pre><code>cat .git/HEAD
    # ref: refs/heads/main         (symbolic)
    # vs after detach:
    # a1b2c3d4...                  (raw)</code></pre>
    <h2>Remote HEAD</h2>
    <p>Each remote can have a symbolic <code>HEAD</code> indicating its default branch. Set or refresh:</p>
    <pre><code>git remote set-head origin --auto       # query server
    git remote set-head origin main         # set explicitly
    git remote set-head origin --delete</code></pre>
    <p>This is what makes <code>git log origin</code> resolve to <code>origin/main</code>.</p>
    <h2>Why use them</h2>
    <ul>
      <li>"Current branch" can change without rewriting history.</li>
      <li>Tools can ask "what is the default?" without hardcoding names.</li>
      <li>Hooks can target the <em>currently checked out</em> branch generically.</li>
    </ul>
    <h2>Worktrees and per-worktree HEAD</h2>
    <p>Every linked worktree (<code>git worktree add</code>) has its own <code>HEAD</code>, stored under <code>.git/worktrees/&lt;name&gt;/HEAD</code>. Each can point at a different branch:</p>
    <pre><code>git worktree add ../wt-feature feature/login
    cat ../wt-feature/.git
    # gitdir: /path/to/main/.git/worktrees/wt-feature
    cat .git/worktrees/wt-feature/HEAD
    # ref: refs/heads/feature/login</code></pre>
    <h2>Detection</h2>
    <pre><code>git symbolic-ref -q HEAD &amp;&amp; echo "on a branch" || echo "detached"</code></pre>
    <h2>Renaming the default</h2>
    <p>To rename <code>master</code> to <code>main</code> safely:</p>
    <pre><code>git branch -m master main
    git symbolic-ref HEAD refs/heads/main
    git push -u origin main
    git symbolic-ref refs/remotes/origin/HEAD refs/remotes/origin/main</code></pre>
    <h2>Inspecting symbolic resolution</h2>
    <p><code>git rev-parse</code> resolves a name through symbolic refs all the way to a SHA, while <code>git symbolic-ref</code> only follows one level. The pair is useful for scripts:</p>
    <pre><code>git symbolic-ref HEAD                       # refs/heads/main
    git symbolic-ref --short HEAD               # main
    git rev-parse HEAD                          # SHA
    git rev-parse --symbolic-full-name HEAD     # refs/heads/main
    git rev-parse --symbolic-full-name @{u}     # refs/remotes/origin/main</code></pre>
    <p>Use <code>--symbolic-full-name</code> when you want the canonical ref name no matter what shorthand the user typed.</p>
    <h2>Common mistakes</h2>
    <p>Editing <code>.git/HEAD</code> by hand and forgetting the trailing newline, leaving Git unable to parse it. Use <code>git symbolic-ref</code>. Treating <code>refs/remotes/origin/HEAD</code> as authoritative when it is actually cached; refresh with <code>git remote set-head origin --auto</code>. Confusing a symbolic ref pointing at a missing branch with a real error; <code>git symbolic-ref -q</code> exits non-zero, which scripts can handle. Finally, deleting the underlying ref without updating the symbolic one, leaving a dangling symref; tools may report it but it is harmless and easy to fix with another <code>symbolic-ref</code>.</p>

- title: "Loose objects vs packed objects"
  section: "Core Concepts"
  difficulty: "Advanced"
  git_version: "2.30+"
  weight: 230
  body: |
    <h2>Introduction</h2>
    <p>Git stores objects in two physical formats. <em>Loose</em> objects are individual files; <em>packed</em> objects live inside a pack file with a delta-compressed body. Both forms describe the same logical objects, addressed by the same hashes.</p>
    <h2>Loose layout</h2>
    <p>Each loose object is at <code>.git/objects/xx/yyy...</code>, where <code>xx</code> is the first two hex chars of the SHA and <code>yyy...</code> is the remaining 38. The file is the zlib-deflated bytes of <code>&lt;type&gt; &lt;size&gt;\0&lt;content&gt;</code>:</p>
    <pre><code>find .git/objects -type f -name '??' -prune -o -type f -print | head
    git cat-file -p &lt;sha&gt;</code></pre>
    <h2>Pack layout</h2>
    <pre><code>.git/objects/pack/pack-&lt;hash&gt;.pack
    .git/objects/pack/pack-&lt;hash&gt;.idx</code></pre>
    <p>The <code>.idx</code> file maps SHA to byte offset within the <code>.pack</code>; without it, the pack would require a linear scan.</p>
    <h2>How objects move between forms</h2>
    <p>New objects are written loose. They become packed when:</p>
    <ul>
      <li><code>git gc</code> runs (manual or automatic).</li>
      <li><code>git repack</code> is invoked.</li>
      <li>A fetch or push transfers them as a pack.</li>
      <li><code>git fast-import</code> writes them directly into a pack.</li>
    </ul>
    <pre><code>git gc
    git repack -a -d
    git count-objects -v</code></pre>
    <p><code>count-objects -v</code> reports loose count, total disk usage, and pack stats.</p>
    <h2>Trade-offs</h2>
    <ul>
      <li><strong>Loose</strong>: simple, easy to inspect, fast to write a single object. Slow when there are millions.</li>
      <li><strong>Packed</strong>: compact, delta-compressed, fast to bulk-read. Requires repacking to incorporate new objects.</li>
    </ul>
    <h2>Auto-gc</h2>
    <p>Git triggers an auto-gc when too many loose objects accumulate. Tunables:</p>
    <pre><code>git config gc.auto 6700           # threshold for loose objects
    git config gc.autoPackLimit 50    # threshold for number of packs
    git config gc.auto 0              # disable auto-gc (not recommended)</code></pre>
    <h2>Inspecting a pack</h2>
    <pre><code>git verify-pack -v .git/objects/pack/pack-&lt;hash&gt;.idx | head
    git verify-pack -s .git/objects/pack/pack-&lt;hash&gt;.idx</code></pre>
    <p>You will see object types, packed sizes, deltas, and chain depths.</p>
    <h2>Recovering from corruption</h2>
    <pre><code>git fsck --full
    cp -r broken-repo backup
    git unpack-objects &lt; .git/objects/pack/pack-&lt;hash&gt;.pack</code></pre>
    <p><code>unpack-objects</code> explodes a pack back to loose form, useful when a single bad object inside a pack is taking down many operations.</p>
    <h2>Looking up an object</h2>
    <p>When Git resolves a SHA, it searches in this order: loose object file, then each pack's idx, then alternates (<code>objects/info/alternates</code>). The lookup is essentially constant-time per pack thanks to the idx's fanout table. The performance impact of having many small packs vs one big pack is real, which is why <code>gc</code> consolidates:</p>
    <pre><code>git count-objects -v
    cat .git/objects/info/alternates 2&gt;/dev/null
    git verify-pack -s .git/objects/pack/pack-&lt;hash&gt;.idx</code></pre>
    <p>Alternates let multiple repos share a pool of objects on disk; <code>git clone --shared</code> creates such a setup and saves space at the cost of some safety.</p>
    <h2>Common mistakes</h2>
    <p>Manually deleting <code>pack-</code> files to reclaim space; that destroys reachable history. Use <code>git gc</code>. Disabling auto-gc on long-lived repos and ending up with millions of loose objects, slowing every operation. Running <code>git gc --aggressive</code> regularly when normal <code>gc</code> would do; aggressive packing is expensive. Finally, copying a repo with <code>cp -r</code> while a pack is being written, ending up with a corrupt index. Use <code>git clone --local</code> for safe copies.</p>

- title: "Delta compression in pack files"
  section: "Core Concepts"
  difficulty: "Advanced"
  git_version: "2.30+"
  weight: 240
  body: |
    <h2>Introduction</h2>
    <p>Git's content-addressed model deduplicates identical objects, but similar-but-not-identical blobs (a file and its later edit) would still cost full size each. Pack files solve this with <em>delta compression</em>: store one object as a base plus a sequence of "copy/insert" instructions that produce another object.</p>
    <h2>How it works</h2>
    <p>When packing, Git compares candidate objects (typically blobs of similar size and type) and chooses a base for each. The delta records:</p>
    <ul>
      <li>The base object (by offset within pack or by SHA).</li>
      <li>Sizes of base and target.</li>
      <li>A stream of <em>copy</em> (use bytes from base) and <em>insert</em> (literal bytes) instructions.</li>
    </ul>
    <p>The delta stream is then zlib-compressed.</p>
    <h2>Inspecting deltas</h2>
    <pre><code>git verify-pack -v .git/objects/pack/pack-&lt;hash&gt;.idx | head -20</code></pre>
    <p>Output columns include packed size, depth, and base SHA for delta entries. A non-delta object has no base.</p>
    <h2>Tunables</h2>
    <pre><code>git config pack.window 250          # candidates examined per object
    git config pack.depth 50            # max chain length
    git config pack.threads 4
    git config pack.windowMemory 100m
    git config pack.deltaCacheSize 256m</code></pre>
    <p><code>pack.window</code> controls how aggressively Git searches for good bases; <code>pack.depth</code> limits how long delta chains can grow.</p>
    <h2>Aggressive vs normal repack</h2>
    <pre><code>git repack -a -d                    # standard
    git repack -a -d --depth=250 --window=250   # aggressive
    git gc --aggressive</code></pre>
    <p>Aggressive repacks throw away existing deltas and recompute from scratch, costing CPU but possibly improving the result.</p>
    <h2>Reachability and bitmaps</h2>
    <p>Servers often combine delta packing with <em>reachability bitmaps</em> for fast clone-set computation:</p>
    <pre><code>git repack -adb</code></pre>
    <h2>Why some objects are not deltified</h2>
    <ul>
      <li>Cryptographically random data (already incompressible).</li>
      <li>Objects whose only candidates are smaller than configured threshold.</li>
      <li>Objects beyond the pack window's reach.</li>
    </ul>
    <h2>Cross-pack deltas</h2>
    <p>Multi-pack indexes (<code>git multi-pack-index</code>) plus the <code>--geometric</code> repack mode (Git 2.33+) make it possible to keep deltas across many packs efficiently:</p>
    <pre><code>git repack --geometric=2 -d</code></pre>
    <p>This is the recommended scheme for large repositories.</p>
    <h2>Delta islands</h2>
    <p>For server operators hosting many forks of the same project, <em>delta islands</em> partition objects so deltas only happen within a fork's set of refs, allowing fast clone of any single fork:</p>
    <pre><code>git config pack.island "refs/remotes/(.*)/heads"
    git config pack.islandCore "main"
    git repack -adb</code></pre>
    <p>Without islands, an object reachable only from fork A might be deltified against an object only reachable from fork B; serving fork A's clone would then require sending objects from B too. Most users never need this, but it is the secret sauce behind GitHub's, GitLab's, and Bitbucket's pack server performance.</p>
    <h2>Common mistakes</h2>
    <p>Assuming deltas are forward (newer = base) or backward (older = base); Git is agnostic and chooses whichever produces the smaller delta. Copying packs between repos with different SHA prefixes; the data is content-addressed so it is fine, but renaming files based on partial hashes can break. Setting absurdly high <code>pack.depth</code> in pursuit of small packs; deeper chains mean slower object access (each delta in the chain must be applied). Finally, expecting delta compression to save space on already-compressed binaries (videos, JPGs); it almost never does. Use Git LFS for those.</p>

- title: "The .git directory structure"
  section: "Core Concepts"
  difficulty: "Intermediate"
  git_version: "2.30+"
  weight: 250
  body: |
    <h2>Introduction</h2>
    <p>Everything Git knows about a repository lives in <code>.git/</code>. Knowing what each entry is removes the mystery from "what just happened?" diagnostics.</p>
    <h2>Top-level layout</h2>
    <pre><code>.git/
      HEAD                # symbolic ref to current branch
      config              # repository-local configuration
      description         # used by gitweb
      index               # the staging area
      packed-refs         # packed branch and tag refs (optional)
      hooks/              # client-side hook scripts
      info/               # excludes file and other repo-local info
      logs/               # reflogs
      objects/            # all objects (loose + pack/)
      refs/               # branches, tags, remote-tracking
      worktrees/          # linked worktrees (if any)
      modules/            # submodules' .git directories</code></pre>
    <h2>HEAD and refs</h2>
    <pre><code>cat .git/HEAD
    ls .git/refs/heads
    ls .git/refs/remotes/origin
    ls .git/refs/tags
    cat .git/packed-refs | head</code></pre>
    <h2>objects/</h2>
    <p>Loose objects under <code>objects/xx/</code>, packed objects in <code>objects/pack/</code>. Don't touch by hand.</p>
    <h2>logs/</h2>
    <p>The reflog. <code>logs/HEAD</code> records every move of HEAD; <code>logs/refs/heads/&lt;branch&gt;</code> records each branch's history.</p>
    <pre><code>cat .git/logs/HEAD | head</code></pre>
    <h2>hooks/</h2>
    <p>Sample hook scripts, all named <code>*.sample</code> by default. To enable, drop the suffix and make executable:</p>
    <pre><code>cd .git/hooks
    cp pre-commit.sample pre-commit
    chmod +x pre-commit</code></pre>
    <h2>info/</h2>
    <p><code>info/exclude</code> is a per-repo, per-clone ignore file (not committed). <code>info/refs</code> is generated by <code>git update-server-info</code> for dumb HTTP servers.</p>
    <h2>config</h2>
    <p>Local config in INI format. Edit via <code>git config --local</code> or <code>git config -e</code>:</p>
    <pre><code>cat .git/config
    git config --local user.email "me@example.com"</code></pre>
    <h2>worktrees/</h2>
    <p>Each linked worktree has a directory under <code>.git/worktrees/&lt;name&gt;/</code> with its own <code>HEAD</code>, <code>index</code>, and <code>logs</code>.</p>
    <h2>modules/</h2>
    <p>For repos with submodules, each submodule's <code>.git</code> directory lives here, and the submodule's working tree contains a small <code>.git</code> file pointing at it.</p>
    <h2>Bare repositories</h2>
    <p>A bare repo has the same contents but at the top level (no <code>.git/</code> wrapper) and no working tree. Convention: name the directory <code>project.git</code>.</p>
    <h2>git rev-parse for paths</h2>
    <p>Scripts that need to find paths inside <code>.git/</code> should never assume the directory is literally named <code>.git</code>. Submodules use a <code>.git</code> file pointing elsewhere; worktrees have linked gitdirs; bare repos have no separate gitdir. Use <code>git rev-parse</code>:</p>
    <pre><code>git rev-parse --git-dir              # actual gitdir for current repo
    git rev-parse --git-common-dir       # shared dir for worktrees
    git rev-parse --show-toplevel        # working tree root
    git rev-parse --is-inside-git-dir
    git rev-parse --is-inside-work-tree</code></pre>
    <p>These five questions cover almost every "where am I?" check a script needs.</p>
    <h2>Common mistakes</h2>
    <p>Editing files inside <code>.git/</code> directly. Almost everything has a Git command that does it correctly, atomically, and with hooks. Backing up only the working tree and forgetting <code>.git/</code> contains the entire history; back up the whole directory. Sharing <code>.git/hooks/</code> assuming they propagate; hooks are <em>not</em> versioned. Use <code>core.hooksPath</code> or a tool like <code>pre-commit</code> to share them. Finally, deleting <code>.git/index</code> on impulse; rebuild it with <code>git read-tree HEAD</code>, but only after backing up.</p>

- title: "Git protocols: local, SSH, HTTP/S, git://"
  section: "Core Concepts"
  difficulty: "Intermediate"
  git_version: "2.30+"
  weight: 260
  body: |
    <h2>Introduction</h2>
    <p>Git can transport data over four families of protocols. Each has different trade-offs in performance, authentication, and firewall friendliness.</p>
    <h2>Local / file</h2>
    <p>Cloning from a directory uses local file I/O. Two URL forms:</p>
    <pre><code>git clone /srv/git/widget.git
    git clone file:///srv/git/widget.git</code></pre>
    <p>The first form may use hardlinks for objects when on the same filesystem (very fast, very space-efficient). The <code>file://</code> form always copies via the smart protocol.</p>
    <h2>SSH</h2>
    <p>The default for authenticated workflows. Uses your SSH client and key:</p>
    <pre><code>git clone git@github.com:example/widget.git
    git clone ssh://git@github.com/example/widget.git</code></pre>
    <p>Behind the scenes, the client invokes <code>ssh</code> and runs <code>git-upload-pack</code> or <code>git-receive-pack</code> on the server side. Configure keys via <code>~/.ssh/config</code> and <code>ssh-agent</code>.</p>
    <h2>HTTP / HTTPS</h2>
    <p>Most firewall-friendly and the default for many hosts:</p>
    <pre><code>git clone https://github.com/example/widget.git</code></pre>
    <p>The smart HTTP protocol uses <code>POST /info/refs?service=git-upload-pack</code> and similar endpoints. Authentication is via Basic auth (deprecated in many providers) or token in the password field. A credential helper avoids prompts on every operation:</p>
    <pre><code>git config --global credential.helper cache
    git config --global credential.helper osxkeychain   # macOS
    git config --global credential.helper manager       # Windows</code></pre>
    <h2>git:// (anonymous)</h2>
    <pre><code>git clone git://example.com/widget.git</code></pre>
    <p>Port 9418, unauthenticated, plaintext. Mostly historical; not recommended for new deployments because it offers no integrity guarantees beyond Git's own hashes.</p>
    <h2>Protocol versions</h2>
    <p>The wire protocol has v0, v1, and v2. Protocol v2 (Git 2.18+, default 2.26+) is dramatically faster for repos with many refs, because the server only advertises refs the client asked for.</p>
    <pre><code>git -c protocol.version=2 ls-remote origin
    git config --global protocol.version 2</code></pre>
    <h2>Smart vs dumb</h2>
    <p>"Smart" protocols negotiate; "dumb" HTTP just exposes the <code>.git/</code> directory. Dumb HTTP requires <code>git update-server-info</code> on every push and is slower; almost no one uses it today.</p>
    <h2>Choosing a protocol</h2>
    <ul>
      <li>HTTPS: easiest to set up, works everywhere, good for read-only and CI.</li>
      <li>SSH: best for daily push/pull when you control your key.</li>
      <li>file://: convenient for local mirrors and tests.</li>
      <li>git://: avoid except for extremely permissive public mirrors.</li>
    </ul>
    <h2>Capability negotiation</h2>
    <p>At connection time, client and server exchange capabilities (multi-ack, side-band, ofs-delta, filter, partial clone, push-options, atomic, etc.). Supported capabilities determine which features the operation can use. Inspect with packet tracing:</p>
    <pre><code>GIT_TRACE_PACKET=1 git -c protocol.version=2 ls-remote origin 2&gt;&amp;1 | head -40</code></pre>
    <p>Older servers may not support newer capabilities; the client falls back gracefully. If you see surprisingly slow clones or fetches, an old server lacking <code>multi-ack-detailed</code> or <code>filter</code> is often the cause.</p>
    <h2>Common mistakes</h2>
    <p>Mixing HTTPS and SSH URLs in the same repo; if a CI uses HTTPS but your dev uses SSH, scripts can confuse each other. Either stick to one or use <code>insteadOf</code> rewriting:</p>
    <pre><code>git config --global url."git@github.com:".insteadOf "https://github.com/"</code></pre>
    <p>Storing personal access tokens in plaintext config; use a credential helper instead. Forgetting to enable <code>protocol.version=2</code> on old Git installs. Finally, exposing <code>git://</code> on the open internet for write access; the protocol cannot authenticate. Use SSH or HTTPS.</p>

- title: "Authentication and credentials"
  section: "Core Concepts"
  difficulty: "Intermediate"
  git_version: "2.30+"
  weight: 270
  body: |
    <h2>Introduction</h2>
    <p>Authenticating to a Git remote is mostly invisible until it goes wrong. The two main mechanisms are <strong>SSH keys</strong> and <strong>HTTPS credentials</strong> (passwords or, more commonly today, personal access tokens).</p>
    <h2>SSH keys</h2>
    <p>Generate a modern key:</p>
    <pre><code>ssh-keygen -t ed25519 -C "ada@example.com"
    ssh-add --apple-use-keychain ~/.ssh/id_ed25519     # macOS
    ssh-add ~/.ssh/id_ed25519                           # Linux</code></pre>
    <p>Add the public key (<code>~/.ssh/id_ed25519.pub</code>) to your hosting account. Test:</p>
    <pre><code>ssh -T git@github.com
    # Hi ada! You've successfully authenticated...</code></pre>
    <h2>SSH config</h2>
    <p>Per-host overrides go in <code>~/.ssh/config</code>:</p>
    <pre><code>Host github.com
        User git
        IdentityFile ~/.ssh/id_ed25519
        IdentitiesOnly yes</code></pre>
    <h2>HTTPS credentials</h2>
    <p>Most hosts no longer accept account passwords; use a personal access token (PAT) with the right scopes. Git stores it via a <em>credential helper</em>:</p>
    <pre><code>git config --global credential.helper cache              # in-memory, expires
    git config --global credential.helper "cache --timeout=86400"
    git config --global credential.helper osxkeychain        # macOS
    git config --global credential.helper manager            # Windows
    git config --global credential.helper store              # plaintext file (only if you must)</code></pre>
    <p>The first time you push, Git prompts and the helper saves the token.</p>
    <h2>Inspecting and clearing</h2>
    <pre><code>echo "url=https://github.com" | git credential fill
    echo "url=https://github.com" | git credential reject</code></pre>
    <p><code>git credential</code> is a low-level interface to the helper.</p>
    <h2>Per-host helpers</h2>
    <pre><code>git config --global credential.https://github.com.helper manager
    git config --global credential.https://gitlab.com.helper cache</code></pre>
    <p>Useful when different hosts require different auth methods.</p>
    <h2>Signing commits and tags</h2>
    <p>Authentication and signing are different. Signing proves authorship of a commit:</p>
    <pre><code>git config --global gpg.format ssh
    git config --global user.signingkey ~/.ssh/id_ed25519.pub
    git commit -S -m "Signed commit"
    git log --show-signature -1</code></pre>
    <h2>2FA and SSO</h2>
    <p>If your host requires 2FA, HTTPS auth needs a PAT (passwords are blocked). For SSO-protected orgs, the PAT must also be SSO-authorized; otherwise pushes get a vague "permission denied" error.</p>
    <h2>Per-URL credentials</h2>
    <p>Git's credential system can store different credentials per host or path. The match key is the URL prefix, so you can have separate tokens for, say, your personal and work GitHub orgs:</p>
    <pre><code>git config --global credential.https://github.com/work-org.helper manager
    git config --global credential.https://github.com/personal.helper "store --file ~/.git-creds-personal"
    git credential fill &lt;&lt;&lt;"url=https://github.com/work-org/repo"</code></pre>
    <p>The <code>credential.useHttpPath</code> setting tells Git to include the path in the lookup key, allowing per-repo credentials. Use it only when needed; it multiplies the number of stored entries.</p>
    <h2>Common mistakes</h2>
    <p>Pushing with a token that lacks the right scopes (e.g. <code>read-only</code>); the error message is generic. Granting overly broad scopes "to be safe"; minimize. Storing tokens in <code>credential.helper store</code> on shared machines; it is a plaintext file. Forgetting to upload your SSH public key to the host and being baffled by "permission denied (publickey)"; <code>ssh -vT git@host</code> shows what is happening. Finally, mixing protocols: ensure your remote URL matches your auth method; <code>git remote set-url</code> can switch.</p>

- title: "Shallow clones and --depth"
  section: "Core Concepts"
  difficulty: "Intermediate"
  git_version: "2.30+"
  weight: 280
  body: |
    <h2>Introduction</h2>
    <p>A <em>shallow clone</em> downloads only the most recent N commits of a branch instead of the full history. The result is much smaller and faster to fetch, at the cost of an incomplete history.</p>
    <h2>Creating</h2>
    <pre><code>git clone --depth 1 https://github.com/example/widget.git
    git clone --depth 50 https://github.com/example/widget.git
    git clone --depth 1 --branch v1.2.3 --single-branch &lt;url&gt;</code></pre>
    <p>The <code>.git</code> directory contains a <code>shallow</code> file listing commits whose parents have been omitted.</p>
    <h2>Why shallow</h2>
    <ul>
      <li>CI builds: only need source for HEAD.</li>
      <li>Containers and Dockerfiles: smaller images.</li>
      <li>One-shot tooling that does not need history.</li>
    </ul>
    <h2>Limitations</h2>
    <ul>
      <li>You cannot push from a shallow clone if your push depends on commits the server does not have (rare, but possible).</li>
      <li><code>git log</code> stops at the shallow boundary.</li>
      <li>Some operations (rebase across the boundary, blame on old lines) cannot work.</li>
      <li>Until Git 2.11 cloning shallow over HTTP was unsupported; modern Git handles it.</li>
    </ul>
    <h2>Deepening and unshallowing</h2>
    <pre><code>git fetch --depth 100              # extend depth
    git fetch --deepen 50              # add 50 more commits
    git fetch --shallow-since=2024-01-01
    git fetch --unshallow              # download full history</code></pre>
    <p>After <code>--unshallow</code> the repo behaves like a normal clone.</p>
    <h2>Single-branch and shallow</h2>
    <p><code>--single-branch</code> + <code>--depth 1</code> is the smallest possible useful clone. To later track other branches:</p>
    <pre><code>git remote set-branches --add origin main feature
    git fetch origin</code></pre>
    <h2>Partial clones (a different optimization)</h2>
    <p>If you need full history but not all blobs, use a partial clone instead:</p>
    <pre><code>git clone --filter=blob:none &lt;url&gt;
    git clone --filter=tree:0 &lt;url&gt;</code></pre>
    <p>Partial clones download history but defer blobs (or trees) until needed. They are usually a better choice than shallow when the server supports them.</p>
    <h2>Detecting shallow state</h2>
    <pre><code>git rev-parse --is-shallow-repository
    cat .git/shallow</code></pre>
    <h2>CI patterns</h2>
    <p>Many CI providers default to shallow clones (depth 1 or 50). If your build runs <code>git describe</code> or needs blame across versions, request a full clone:</p>
    <pre><code># GitHub Actions
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0</code></pre>
    <h2>Shallow files and grafts</h2>
    <p>The <code>shallow</code> file in <code>.git/</code> lists commit SHAs whose parents are intentionally missing. Git treats them as roots during graph traversal. The related but deprecated <code>info/grafts</code> mechanism let you fake parent relationships; use <code>git replace --graft</code> instead, which is safer and replicates over fetch:</p>
    <pre><code>cat .git/shallow
    git replace --graft &lt;commit&gt; &lt;new-parent&gt;
    git replace -l
    git replace -d &lt;commit&gt;</code></pre>
    <p>This is occasionally useful for stitching together imported histories without rewriting commits.</p>
    <h2>Common mistakes</h2>
    <p>Running <code>git describe</code> in a depth-1 clone and getting an error because no annotated tag is reachable; either fetch tags (<code>--tags</code>) or use a deeper clone. Trying to rebase a feature branch in a shallow clone where the merge base is beyond the shallow boundary; deepen first. Pushing from a shallow clone and being surprised by "remote rejected"; the server may need missing parent objects. Finally, treating shallow clones as a substitute for partial clones; they solve different problems and partial is usually friendlier.</p>

- title: "Git garbage collection basics"
  section: "Core Concepts"
  difficulty: "Intermediate"
  git_version: "2.30+"
  weight: 290
  body: |
    <h2>Introduction</h2>
    <p><em>Garbage collection</em> (gc) keeps your repository compact and fast. Git runs it automatically when certain thresholds are exceeded. You can also invoke it manually.</p>
    <h2>What gc does</h2>
    <ol>
      <li>Packs loose objects into pack files.</li>
      <li>Re-deltifies if asked.</li>
      <li>Removes unreachable objects older than the prune-expire window.</li>
      <li>Expires reflog entries past their TTL.</li>
      <li>Optionally writes the commit-graph file.</li>
    </ol>
    <pre><code>git gc
    git gc --auto
    git gc --aggressive
    git gc --prune=now
    git count-objects -v</code></pre>
    <h2>Auto-gc thresholds</h2>
    <pre><code>git config gc.auto 6700                 # loose objects threshold
    git config gc.autoPackLimit 50          # number-of-packs threshold
    git config gc.autoDetach true           # run in background</code></pre>
    <p>Auto-gc fires after operations that create new objects, like <code>commit</code> and <code>fetch</code>. With <code>autoDetach</code>, it runs in the background and Git returns immediately.</p>
    <h2>Reflog expiration</h2>
    <pre><code>git config gc.reflogExpire 90.days
    git config gc.reflogExpireUnreachable 30.days
    git reflog expire --expire=90.days --all</code></pre>
    <p>Reachable entries last 90 days, unreachable 30 by default. Branches and tags you delete leave reflog traces that survive within that window.</p>
    <h2>Prune window</h2>
    <pre><code>git config gc.pruneExpire 2.weeks.ago</code></pre>
    <p>Unreachable objects older than this are eligible for deletion during gc. <code>--prune=now</code> deletes immediately; useful but dangerous since it removes safety margins.</p>
    <h2>Aggressive vs normal</h2>
    <pre><code>git gc                       # routine: pack new objects, prune old
    git gc --aggressive          # rebuild deltas from scratch</code></pre>
    <p>Aggressive gc is rarely worth it; it is CPU-heavy and the gain is usually small. Normal gc is sufficient for most repos.</p>
    <h2>Maintenance</h2>
    <p>Modern Git (2.29+) has a <code>maintenance</code> subsystem that consolidates and improves gc:</p>
    <pre><code>git maintenance start
    git maintenance run --task gc
    git maintenance run --task commit-graph
    git maintenance run --task incremental-repack</code></pre>
    <p><code>git maintenance start</code> registers a background job (cron, launchd, or systemd timer) that periodically optimizes the repo.</p>
    <h2>Locked operations</h2>
    <p>If gc is interrupted, you may see a stale lock file:</p>
    <pre><code>ls .git/gc.pid
    rm .git/gc.pid    # only after confirming no gc is running</code></pre>
    <h2>What gc never deletes</h2>
    <p>Several object classes are exempt from gc until their reference expires:</p>
    <ul>
      <li>Objects reachable from any ref under <code>refs/</code>.</li>
      <li>Objects reachable from the reflog of any ref (until reflog expiry).</li>
      <li>Objects under <code>refs/stash</code> (the stash list).</li>
      <li>Objects pinned by <code>git replace</code> mappings.</li>
      <li>Objects reachable from worktrees' HEAD and index.</li>
    </ul>
    <pre><code>git fsck --unreachable --no-reflogs
    git reflog expire --expire-unreachable=now --all
    git gc --prune=now</code></pre>
    <p>That last sequence is the standard "really delete unreachable history" recipe; reach for it carefully.</p>
    <h2>Common mistakes</h2>
    <p>Running <code>git gc --prune=now</code> right after a destructive operation, eliminating the reflog safety net. Always wait the default window unless you really need the space. Disabling auto-gc on a fast-moving repo, accumulating millions of loose objects. Running <code>--aggressive</code> on a schedule under the assumption that "more is better"; it just burns CPU. Finally, running gc concurrently with <code>git push</code> on a server; modern Git handles concurrency safely, but custom scripts that fight over <code>.git/objects</code> can corrupt. Use <code>git maintenance</code> rather than home-grown cron jobs.</p>

- title: "Porcelain vs plumbing commands"
  section: "Core Concepts"
  difficulty: "Advanced"
  git_version: "2.30+"
  weight: 300
  body: |
    <h2>Introduction</h2>
    <p>Git is split into two layers. <strong>Plumbing</strong> commands are low-level building blocks operating on the object database, refs, and the index. <strong>Porcelain</strong> commands are user-friendly wrappers built from plumbing. <code>git commit</code> is porcelain; <code>git hash-object</code>, <code>git write-tree</code>, and <code>git update-ref</code> are plumbing.</p>
    <h2>Why the split</h2>
    <p>Porcelain output is for humans and may change between versions. Plumbing output is stable, parseable, and intended for scripts. Mixing them up is the most common cause of fragile Git scripts.</p>
    <h2>Common porcelain commands</h2>
    <ul>
      <li><code>git add</code>, <code>git commit</code>, <code>git status</code>, <code>git log</code></li>
      <li><code>git switch</code>, <code>git restore</code>, <code>git branch</code></li>
      <li><code>git merge</code>, <code>git rebase</code>, <code>git cherry-pick</code></li>
      <li><code>git fetch</code>, <code>git pull</code>, <code>git push</code>, <code>git clone</code></li>
    </ul>
    <h2>Common plumbing commands</h2>
    <ul>
      <li><code>git hash-object</code>: compute the SHA of content, optionally writing it.</li>
      <li><code>git cat-file</code>: read an object's type, size, or content.</li>
      <li><code>git ls-tree</code>, <code>git ls-files</code>: list tree or index contents.</li>
      <li><code>git rev-parse</code>: resolve a name to a SHA.</li>
      <li><code>git rev-list</code>: list commit SHAs from a graph traversal.</li>
      <li><code>git update-ref</code>, <code>git symbolic-ref</code>: ref manipulation.</li>
      <li><code>git read-tree</code>, <code>git write-tree</code>, <code>git commit-tree</code>: index/tree/commit creation.</li>
      <li><code>git update-index</code>: low-level index manipulation.</li>
      <li><code>git pack-objects</code>, <code>git unpack-objects</code>, <code>git index-pack</code>.</li>
    </ul>
    <h2>Building a commit by hand</h2>
    <p>To see plumbing in action, build a commit without porcelain:</p>
    <pre><code>BLOB=$(echo "hello" | git hash-object --stdin -w)
    TREE=$(printf "100644 blob $BLOB\thello.txt\n" | git mktree)
    COMMIT=$(echo "first" | git commit-tree $TREE)
    git update-ref refs/heads/main $COMMIT
    git log --oneline</code></pre>
    <p>That is essentially what <code>git commit</code> does internally.</p>
    <h2>Stable scripting interfaces</h2>
    <p>Some porcelain commands have a "porcelain" mode with a stable parseable format:</p>
    <pre><code>git status --porcelain=v2
    git diff --raw
    git ls-files --stage
    git for-each-ref --format='%(refname) %(objectname)'</code></pre>
    <p>Use these in scripts; never parse <code>git status</code> human output.</p>
    <h2>Reading the man page</h2>
    <p>Porcelain man pages are listed in <code>git help -a</code> under "Main Porcelain Commands"; plumbing under "Manipulators", "Interrogators", "Synching repositories", "Internal helpers". For internals tutorials run <code>git help gitcore-tutorial</code> and <code>git help gitrepository-layout</code>.</p>
    <h2>When to use plumbing</h2>
    <ul>
      <li>Writing reliable scripts that survive Git upgrades.</li>
      <li>Building tooling that integrates with Git's data model.</li>
      <li>Debugging porcelain commands by reproducing their internal steps.</li>
      <li>Implementing custom workflows where porcelain does not fit.</li>
    </ul>
    <h2>Common mistakes</h2>
    <p>Parsing <code>git status</code> or <code>git log</code> human output in scripts and breaking on a Git upgrade or locale change. Use <code>--porcelain</code> formats and <code>--pretty=format:</code> with explicit placeholders. Calling <code>git update-ref</code> without the three-argument compare-and-set form in concurrent scripts and racing with another process. Mixing low-level <code>git update-index</code> with high-level <code>git add</code> in the same workflow and ending up with surprising index state. Finally, assuming porcelain is always "safer" than plumbing; some plumbing operations (like <code>git update-ref</code>) are far more deterministic than their porcelain counterparts. The right tool depends on what you are building.</p>
