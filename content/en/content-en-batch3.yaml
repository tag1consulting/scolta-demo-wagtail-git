# GitMastery English source content - Batch 3
# Sections: Advanced (40 pages) and Performance & Optimization (30 pages)
# For Drupal 11 import

- title: "Interactive rebase mastery: git rebase -i in depth"
  section: "Advanced"
  difficulty: "Advanced"
  git_version: "2.30+"
  weight: 10
  body: |
    <h2>Why interactive rebase</h2>
    <p>Interactive rebase rewrites a sequence of commits into a cleaner, more meaningful history before publishing. It is the surgical instrument of Git: you can reorder, edit, squash, fixup, drop, reword, or split commits, all in a single guided session. Mastering it transforms a messy local branch into a story reviewers can follow.</p>
    <h2>The todo list</h2>
    <p>Running <code>git rebase -i</code> opens an editor with a todo list. Each line has a verb and a commit. Reorder lines to reorder commits. Change verbs to change behavior.</p>
    <pre><code>git rebase -i HEAD~5</code></pre>
    <p>Verbs include <code>pick</code> (use commit), <code>reword</code> (edit message only), <code>edit</code> (stop to amend), <code>squash</code> (combine into previous, keep both messages), <code>fixup</code> (combine, discard message), <code>drop</code> (delete), and <code>exec</code> (run a shell command between commits). Two newer verbs are <code>break</code> (pause unconditionally) and <code>label</code>/<code>reset</code>/<code>merge</code> for the rebase merge graph (since Git 2.18).</p>
    <h2>Splitting a commit</h2>
    <p>Mark the commit with <code>edit</code>, then unwind and recommit:</p>
    <pre><code>git reset HEAD^
    git add -p
    git commit -m "First logical change"
    git add -p
    git commit -m "Second logical change"
    git rebase --continue</code></pre>
    <h2>Autosquash workflow</h2>
    <p>When you spot a typo in an earlier commit, create a fixup commit, then let rebase order them automatically:</p>
    <pre><code>git commit --fixup=&lt;sha&gt;
    git rebase -i --autosquash HEAD~10</code></pre>
    <p>Set <code>rebase.autoSquash = true</code> in your config to make this the default. Pair with <code>rebase.autoStash = true</code> so dirty working trees do not block the rebase.</p>
    <h2>Exec for verification</h2>
    <p>Use <code>exec</code> lines to verify each commit builds and tests pass — invaluable for keeping a bisectable history:</p>
    <pre><code>git rebase -i --exec "cargo test" main</code></pre>
    <p>Every commit between HEAD and main will be checked out and the command run. If it fails, rebase pauses so you can fix and continue.</p>
    <h2>Rebase merges with --rebase-merges</h2>
    <p>Traditional rebase flattens merges. Pass <code>--rebase-merges</code> to preserve topology while still allowing reordering:</p>
    <pre><code>git rebase -i --rebase-merges main</code></pre>
    <h2>Common mistakes</h2>
    <p>Rebasing published commits forces collaborators into history surgery. Reserve interactive rebase for branches you alone own, or coordinate explicitly. Forgetting to <code>git rebase --continue</code> after resolving conflicts leaves the rebase half-applied. Use <code>git status</code> — it tells you exactly what to do next. Finally, if you destroy work, <code>git reflog</code> almost always rescues it; see "Git internals: references and the reflog".</p>
    <h2>Recovery</h2>
    <p>If a rebase goes badly, abort and start fresh:</p>
    <pre><code>git rebase --abort
    git reflog
    git reset --hard HEAD@{5}</code></pre>
    <p>See also "Squashing and reorganizing commits" for higher-level patterns.</p>

- title: "Cherry-picking strategies and pitfalls"
  section: "Advanced"
  difficulty: "Advanced"
  git_version: "2.30+"
  weight: 20
  body: |
    <h2>What cherry-pick does</h2>
    <p><code>git cherry-pick</code> applies the diff of one or more commits onto the current branch as new commits. It is the right tool when you want a specific change without merging the entire branch — typical for backporting fixes to a release branch or pulling a hotfix forward.</p>
    <h2>Basic and range usage</h2>
    <pre><code>git cherry-pick &lt;sha&gt;
    git cherry-pick A..B          # exclusive of A, inclusive of B
    git cherry-pick A^..B         # inclusive of A and B</code></pre>
    <p>Cherry-pick supports the same range syntax as <code>git log</code>. Use <code>--no-commit</code> (<code>-n</code>) to stage the changes without committing — useful when applying several picks as a single commit.</p>
    <h2>Resolving conflicts</h2>
    <p>If a pick conflicts, Git pauses. Resolve, stage, and continue:</p>
    <pre><code>git cherry-pick --continue
    git cherry-pick --skip
    git cherry-pick --abort</code></pre>
    <h2>Recording the source</h2>
    <p>Use <code>-x</code> to append a "(cherry picked from commit ...)" line to the message, which auditors love:</p>
    <pre><code>git cherry-pick -x &lt;sha&gt;</code></pre>
    <h2>Mainline for merges</h2>
    <p>Cherry-picking a merge commit is ambiguous: which parent provides the baseline? Use <code>-m</code>:</p>
    <pre><code>git cherry-pick -m 1 &lt;merge-sha&gt;</code></pre>
    <p>Mainline 1 is usually the branch that received the merge.</p>
    <h2>Pitfall: divergent histories</h2>
    <p>Cherry-picking creates a new commit with a different SHA than the original. If both branches eventually merge, Git often reconciles them, but if the two copies have diverged through later edits, you risk re-applying or conflicting. Prefer merging when whole-branch integration is desired; reserve cherry-pick for surgical extraction.</p>
    <h2>Pitfall: silent semantic drift</h2>
    <p>A textually clean cherry-pick can still break behavior if surrounding code has shifted meaning. Always run tests after picks, especially across long version gaps. Pair with "Bisect with automated test scripts" if regressions appear.</p>
    <h2>Tracking applied picks</h2>
    <p>To find which commits on a branch were cherry-picked from elsewhere, look at <code>git log --grep="cherry picked from"</code> when <code>-x</code> was used. For a more rigorous approach see <code>git patch-id</code>:</p>
    <pre><code>git log -p &lt;sha&gt; | git patch-id
    git log -p main | git patch-id</code></pre>
    <p>Matching patch IDs identify equivalent changes regardless of SHA.</p>
    <h2>Common mistakes</h2>
    <p>Cherry-picking without <code>-x</code> on a maintained release branch makes audit trails painful. Forgetting <code>-m</code> on a merge commit produces an empty pick or a confusing diff. Cherry-picking a long range on top of a different base often creates conflicts that a rebase or merge would handle more cleanly. When in doubt, prefer <code>git rebase --onto</code> for moving sequences of commits between branches.</p>
    <h2>Related</h2>
    <p>See "Interactive rebase mastery" for restructuring picked commits, and "Maintaining a patch series with git format-patch" for an alternative workflow.</p>

- title: "Automatic bug bisection with git bisect"
  section: "Advanced"
  difficulty: "Advanced"
  git_version: "2.30+"
  weight: 30
  body: |
    <h2>Binary search through history</h2>
    <p><code>git bisect</code> performs a binary search across commits to find the one that introduced a bug. Given a known-good and known-bad commit, Git checks out commits in the middle and asks you to test. Each answer halves the search space, so 1024 commits resolve in about 10 steps.</p>
    <h2>Manual bisect session</h2>
    <pre><code>git bisect start
    git bisect bad                    # current commit is bad
    git bisect good v2.4.0            # this older tag was good
    # Git checks out the midpoint
    # Test the build, then:
    git bisect bad                    # or: git bisect good
    # Continue until Git names the first bad commit
    git bisect reset                  # return to the original branch</code></pre>
    <h2>Custom terms</h2>
    <p>Sometimes "good/bad" is the wrong vocabulary — for example, when bisecting a performance regression you might prefer "fast/slow":</p>
    <pre><code>git bisect start --term-old fast --term-new slow
    git bisect slow
    git bisect fast v2.4.0</code></pre>
    <h2>Skipping untestable commits</h2>
    <p>If the checked-out commit cannot be tested (build broken, dependency missing), use <code>git bisect skip</code>. Git will pick a nearby commit and adjust.</p>
    <pre><code>git bisect skip
    git bisect skip &lt;sha1&gt; &lt;sha2&gt;</code></pre>
    <h2>Visualizing</h2>
    <p>At any time, see the remaining candidate set:</p>
    <pre><code>git bisect visualize
    git bisect log &gt; bisect.log       # save for replay
    git bisect replay bisect.log</code></pre>
    <h2>Narrowing the search</h2>
    <p>If you suspect the regression lies in a particular subdirectory, restrict bisect to commits touching it:</p>
    <pre><code>git bisect start -- src/parser/</code></pre>
    <h2>Common mistakes</h2>
    <p>Forgetting to mark the initial endpoints — Git cannot bisect without one good and one bad. Marking a commit incorrectly poisons the search; if you suspect this, <code>git bisect log</code> followed by editing and <code>git bisect replay</code> recovers. Building takes time on every step, so pair with <code>--first-parent</code> if your project relies heavily on merges and you only care about merge points.</p>
    <h2>First-parent bisecting</h2>
    <p>Since Git 2.29, <code>--first-parent</code> tells bisect to follow only the first parent of each merge, drastically reducing steps in projects that integrate features as merges:</p>
    <pre><code>git bisect start --first-parent</code></pre>
    <h2>Related</h2>
    <p>For automation, see "Bisect with automated test scripts". When the offending commit is found, "Cherry-picking strategies and pitfalls" helps you fix forward, and "Interactive rebase mastery" helps reshape any quick-fix commits before review.</p>

- title: "Bisect with automated test scripts"
  section: "Advanced"
  difficulty: "Advanced"
  git_version: "2.30+"
  weight: 40
  body: |
    <h2>Hands-free bisection</h2>
    <p>Manual bisect requires a human verdict at each step. <code>git bisect run</code> automates the loop: provide a script that exits 0 for good, non-zero for bad, and 125 for "skip this commit." Bisect will drive the search to completion, often unattended.</p>
    <h2>The contract</h2>
    <p>Your script must:</p>
    <ul>
      <li>Exit 0 when the commit is good.</li>
      <li>Exit between 1 and 124, or 126/127, when bad.</li>
      <li>Exit 125 when the commit cannot be tested (broken build, missing dependency).</li>
      <li>Avoid exit codes outside these ranges; 128+ aborts bisect.</li>
    </ul>
    <h2>Example</h2>
    <pre><code>#!/usr/bin/env bash
    set -e
    make clean
    make || exit 125              # untestable
    ./tests/regression-1234 || exit 1
    exit 0</code></pre>
    <p>Drive bisect with it:</p>
    <pre><code>git bisect start HEAD v2.4.0
    git bisect run ./bisect-test.sh</code></pre>
    <h2>Inline one-liners</h2>
    <p>For quick searches you can avoid a script file:</p>
    <pre><code>git bisect run sh -c "make &amp;&amp; ./run-test || exit 1"</code></pre>
    <h2>Performance regressions</h2>
    <p>Bisect a slowdown by comparing a benchmark against a threshold:</p>
    <pre><code>git bisect run sh -c '
      cargo build --release || exit 125
      t=$(./bench --json | jq .ms)
      awk -v t="$t" "BEGIN { exit (t &gt; 250) }"'</code></pre>
    <p>The <code>awk</code> trick converts the comparison into the script's exit code.</p>
    <h2>Flaky tests</h2>
    <p>If a test is intermittently failing, run it multiple times and consider it good only if all runs pass:</p>
    <pre><code>git bisect run sh -c '
      for i in 1 2 3 4 5; do
    ./flaky-test || exit 1
      done
      exit 0'</code></pre>
    <h2>Common mistakes</h2>
    <p>Returning exit code 128 or higher mid-search aborts bisect — wrap commands in <code>|| exit 1</code> to clamp. Forgetting to <code>git bisect reset</code> at the end leaves you on a detached HEAD. Failing to use <code>exit 125</code> for unbuildable commits causes false bads. Side-effect-laden tests that mutate the working tree confuse subsequent steps; always clean up first.</p>
    <h2>Reproducible reports</h2>
    <p>Capture the exact bisect path for postmortems:</p>
    <pre><code>git bisect log &gt; bisect.log</code></pre>
    <p>Attach this log to the bug ticket; it doubles as a reproduction recipe. See "Automatic bug bisection with git bisect" for the manual fundamentals.</p>

- title: "Submodules: adding and updating"
  section: "Advanced"
  difficulty: "Advanced"
  git_version: "2.30+"
  weight: 50
  body: |
    <h2>What submodules are</h2>
    <p>A submodule is a Git repository nested inside another. The parent repo records the submodule's URL and a specific commit SHA, so anyone cloning the parent can fetch the exact code that was tested together. Use submodules when you want to vendor a dependency at a pinned commit while preserving its independent history.</p>
    <h2>Adding a submodule</h2>
    <pre><code>git submodule add https://github.com/example/lib third_party/lib
    git commit -m "Add lib submodule"</code></pre>
    <p>This creates a <code>.gitmodules</code> file recording the path and URL, and stages a gitlink (a special tree entry pointing at a specific commit).</p>
    <h2>Cloning a project with submodules</h2>
    <pre><code>git clone --recurse-submodules https://github.com/you/parent
    # or, after a plain clone:
    git submodule update --init --recursive</code></pre>
    <p>Set <code>submodule.recurse = true</code> globally so commands like <code>git pull</code> and <code>git checkout</code> automatically update submodules.</p>
    <h2>Updating to a new submodule commit</h2>
    <pre><code>cd third_party/lib
    git fetch
    git checkout v2.0.0
    cd ../..
    git add third_party/lib
    git commit -m "Bump lib to v2.0.0"</code></pre>
    <p>The parent commit now references the new submodule SHA. Use <code>git submodule update --remote</code> to pull the latest commit on the submodule's tracked branch (default is the remote HEAD; configure with <code>submodule.&lt;name&gt;.branch</code>).</p>
    <h2>Diff and status</h2>
    <pre><code>git diff --submodule=log
    git submodule status
    git submodule summary</code></pre>
    <p>The <code>--submodule=log</code> form shows the commit log of submodule changes inline.</p>
    <h2>Foreach</h2>
    <p>Run a command in every submodule:</p>
    <pre><code>git submodule foreach 'git fetch --all'
    git submodule foreach --recursive 'git checkout main &amp;&amp; git pull'</code></pre>
    <h2>Common mistakes</h2>
    <p>Forgetting <code>--init</code> on first clone leaves submodule directories empty. Editing inside a submodule and committing in the parent without pushing the submodule first leaves collaborators with a parent referencing an unreachable SHA. Always push the submodule, then push the parent. Set <code>push.recurseSubmodules = on-demand</code> to enforce this.</p>
    <h2>Branch tracking gotcha</h2>
    <p>Submodules check out a detached HEAD at the recorded SHA. Edits there are not on a branch by default. Before changing files, <code>git checkout</code> a branch inside the submodule.</p>
    <h2>Related</h2>
    <p>See "Submodules: common problems and solutions" for recovery, and "Subtrees: a simpler alternative to submodules" if pinned dependencies feel too heavy.</p>

- title: "Submodules: common problems and solutions"
  section: "Advanced"
  difficulty: "Advanced"
  git_version: "2.30+"
  weight: 60
  body: |
    <h2>The frustration list</h2>
    <p>Submodules are powerful but trip new users repeatedly. This page catalogs the most common failures and the recipes that fix them.</p>
    <h2>Empty submodule directory</h2>
    <p>You cloned the parent but the subdir is empty. Initialize and update:</p>
    <pre><code>git submodule update --init --recursive</code></pre>
    <h2>Detached HEAD edits lost</h2>
    <p>You edited inside a submodule, committed, then ran <code>git submodule update</code> in the parent. The update reset the submodule to the recorded SHA, abandoning your work on a detached HEAD. Recover with <code>git reflog</code> inside the submodule.</p>
    <pre><code>cd third_party/lib
    git reflog
    git checkout -b rescue HEAD@{1}</code></pre>
    <p>Always create a branch inside a submodule before editing.</p>
    <h2>URL changed upstream</h2>
    <p>If the submodule's remote URL moves, edit <code>.gitmodules</code>, then sync local config:</p>
    <pre><code>git submodule sync --recursive
    git submodule update --init --recursive</code></pre>
    <h2>Removing a submodule</h2>
    <p>There is no single "remove" command. The clean recipe:</p>
    <pre><code>git submodule deinit -f third_party/lib
    git rm -f third_party/lib
    rm -rf .git/modules/third_party/lib
    git commit -m "Remove lib submodule"</code></pre>
    <h2>Modified content but no diff</h2>
    <p>Parent shows the submodule as modified though you did not edit it. The submodule HEAD has moved (a fetch, checkout, or build script). Either commit the new SHA in the parent or reset the submodule:</p>
    <pre><code>git submodule update --recursive    # restore recorded SHA
    # or
    git add third_party/lib &amp;&amp; git commit -m "Bump lib"</code></pre>
    <h2>Push order matters</h2>
    <p>If you commit the parent referencing a SHA you have not pushed in the submodule, collaborators cannot resolve the reference. Enforce safety:</p>
    <pre><code>git config --global push.recurseSubmodules on-demand</code></pre>
    <h2>Shallow submodules</h2>
    <p>For CI, use shallow clones to save time:</p>
    <pre><code>git submodule update --init --recursive --depth 1</code></pre>
    <h2>Common mistakes</h2>
    <p>Treating submodules like normal subdirectories — they are not, every Git command stops at the boundary unless you pass <code>--recurse-submodules</code>. Mixing branch-tracking submodules with pinned-SHA workflows leads to confusion; pick one model per project. Forgetting that <code>git status</code> in the parent only summarizes submodule state — run it inside the submodule for details.</p>
    <h2>Related</h2>
    <p>See "Submodules: adding and updating" for the basics, and "Subtrees: a simpler alternative to submodules" when the pain outweighs the benefit.</p>

- title: "Subtrees: a simpler alternative to submodules"
  section: "Advanced"
  difficulty: "Advanced"
  git_version: "2.30+"
  weight: 70
  body: |
    <h2>The subtree model</h2>
    <p>A subtree merges another repository's history into a subdirectory of yours. Unlike submodules, there is no separate gitlink and no extra commands required for clone — anyone who clones your repo gets the subtree contents automatically. The cost is a fatter history; the benefit is operational simplicity.</p>
    <h2>Adding a subtree</h2>
    <pre><code>git subtree add --prefix=third_party/lib \
      https://github.com/example/lib main --squash</code></pre>
    <p>The <code>--squash</code> flag collapses the imported history into a single commit, keeping your log clean. Omit it if you want full upstream history.</p>
    <h2>Pulling updates</h2>
    <pre><code>git subtree pull --prefix=third_party/lib \
      https://github.com/example/lib main --squash</code></pre>
    <p>Add a remote alias to avoid retyping the URL:</p>
    <pre><code>git remote add lib https://github.com/example/lib
    git subtree pull --prefix=third_party/lib lib main --squash</code></pre>
    <h2>Pushing back upstream</h2>
    <p>You can extract changes you made under the prefix and send them upstream:</p>
    <pre><code>git subtree push --prefix=third_party/lib lib feature-branch</code></pre>
    <h2>Subtree vs submodule</h2>
    <p>Choose subtrees when you want a frictionless clone for newcomers, when you rarely modify the vendored code, or when CI complexity around submodules has bitten you. Choose submodules when you need to pin to an exact upstream SHA, want to keep histories strictly separate, or have many projects that share the same dependency at different versions.</p>
    <h2>Splitting a subdirectory</h2>
    <p>If you later want to extract the subtree as its own repo:</p>
    <pre><code>git subtree split --prefix=third_party/lib -b lib-only
    cd ..
    git clone /path/to/parent --branch lib-only lib-extracted</code></pre>
    <h2>Common mistakes</h2>
    <p>Forgetting <code>--squash</code> imports tens of thousands of upstream commits — annoying for <code>git log</code> readers. Mixing edits inside the prefix with edits outside in the same commit makes <code>subtree push</code> noisy. Keep prefix-touching commits separate. Remember that <code>git subtree</code> is a contributed porcelain script; some distros omit it. Verify with <code>git subtree --help</code>.</p>
    <h2>Alternative: contrib/subtree merge strategy</h2>
    <p>For full control you can do subtree merges manually:</p>
    <pre><code>git remote add -f lib https://github.com/example/lib
    git merge -s ours --no-commit --allow-unrelated-histories lib/main
    git read-tree --prefix=third_party/lib/ -u lib/main
    git commit -m "Subtree merge of lib"</code></pre>
    <h2>Related</h2>
    <p>See "Submodules: adding and updating" and "filter-repo: rewriting history safely" for repository surgery techniques.</p>

- title: "filter-repo: rewriting history safely"
  section: "Advanced"
  difficulty: "Expert"
  git_version: "2.30+"
  weight: 80
  body: |
    <h2>Why filter-repo</h2>
    <p><code>git filter-repo</code> is the modern replacement for the deprecated <code>git filter-branch</code>. It is dramatically faster — sometimes 100x — safer by default, and provides the high-level operations history surgery actually needs: removing files, renaming paths, stripping authors, splitting subdirectories, and changing email addresses across all commits.</p>
    <h2>Installation</h2>
    <p>filter-repo is not bundled with Git itself but is widely packaged. On macOS: <code>brew install git-filter-repo</code>. On Debian/Ubuntu: <code>apt install git-filter-repo</code>. Or download the single Python file from the project and place it in PATH.</p>
    <h2>Removing a file from all history</h2>
    <pre><code>git filter-repo --path secrets.env --invert-paths</code></pre>
    <p>This rewrites every commit that ever touched <code>secrets.env</code> to omit the file, then prunes orphaned objects. Force-push the result and rotate any leaked credentials immediately. See "Removing sensitive data from history" for the full incident response.</p>
    <h2>Extracting a subdirectory as a new repo</h2>
    <pre><code>git clone --no-local original/ extracted/
    cd extracted
    git filter-repo --subdirectory-filter packages/foo</code></pre>
    <p>The result is a repository whose root is what used to be <code>packages/foo</code>, with all relevant history preserved.</p>
    <h2>Renaming paths</h2>
    <pre><code>git filter-repo --path-rename old/dir/:new/dir/</code></pre>
    <p>Trailing slashes matter: with them you rename a directory; without, you rename an exact file.</p>
    <h2>Updating author emails</h2>
    <p>Build a mailmap-style file:</p>
    <pre><code>cat &gt; mailmap.txt &lt;&lt;'EOF'
    Jane Doe &lt;jane@new.example&gt; &lt;jane@old.example&gt;
    EOF
    git filter-repo --mailmap mailmap.txt</code></pre>
    <h2>Safety features</h2>
    <p>filter-repo refuses to run on a non-fresh clone by default — it expects a freshly cloned repository so a mistake does not destroy your only copy. Override only when you understand the implications:</p>
    <pre><code>git filter-repo --force</code></pre>
    <h2>Common mistakes</h2>
    <p>Running on your only clone with <code>--force</code> and no backup. Always clone first. Forgetting that filter-repo removes the original remote to prevent accidental pushes — re-add it explicitly. Trying to mix filter-repo and filter-branch on the same repo confuses object reachability. Using filter-repo on a shared repo without coordinating: every collaborator must reclone or rebase atop the new history.</p>
    <h2>Performance</h2>
    <p>filter-repo streams via <code>git fast-export</code>/<code>fast-import</code>, which is why it is fast. For very large repos, run on a fast SSD and increase <code>core.bigFileThreshold</code> if you encounter memory issues.</p>
    <h2>Related</h2>
    <p>See "Removing sensitive data from history" for incident workflows and "Ahead-of-time packfile building with git fast-export" for the underlying machinery.</p>

- title: "Removing sensitive data from history"
  section: "Advanced"
  difficulty: "Expert"
  git_version: "2.30+"
  weight: 90
  body: |
    <h2>Incident response</h2>
    <p>You committed an API key, password, or private key. Removing it from the latest commit is not enough — Git keeps the file in every previous commit until you rewrite history. This page walks through the full incident response.</p>
    <h2>Step 1: rotate immediately</h2>
    <p>Before touching the repo, revoke the credential. Assume any pushed history has already been mirrored, scraped, or cached by GitHub's archive program. Rotating is the only true fix; rewriting just slows attackers.</p>
    <h2>Step 2: rewrite history with filter-repo</h2>
    <pre><code>git clone --mirror git@github.com:org/repo.git repo-mirror
    cd repo-mirror
    git filter-repo --path config/secrets.yml --invert-paths</code></pre>
    <p>For pattern-based removal across many files (e.g., AWS keys), use a replacements file:</p>
    <pre><code>cat &gt; replace.txt &lt;&lt;'EOF'
    regex:AKIA[0-9A-Z]{16}==&gt;REDACTED
    literal:hunter2==&gt;REDACTED
    EOF
    git filter-repo --replace-text replace.txt</code></pre>
    <h2>Step 3: force-push</h2>
    <pre><code>git push --force --all
    git push --force --tags</code></pre>
    <p>Coordinate with collaborators: every clone they hold contains the secret. They must reclone or rebase. Old PRs and forks may still expose the data; on GitHub, contact support to purge cached views.</p>
    <h2>Step 4: prune local objects</h2>
    <p>Locally, expire reflogs and run aggressive gc to drop the unreachable blobs:</p>
    <pre><code>git reflog expire --expire=now --all
    git gc --prune=now --aggressive</code></pre>
    <h2>Detecting secrets early</h2>
    <p>Prevention beats cleanup. Install a pre-commit hook that scans staged content with a tool like <code>gitleaks</code> or <code>trufflehog</code>:</p>
    <pre><code>#!/usr/bin/env bash
    gitleaks protect --staged --redact || exit 1</code></pre>
    <p>See "Git hooks: pre-commit, prepare-commit-msg, commit-msg" for installation patterns.</p>
    <h2>Common mistakes</h2>
    <p>Believing a force-push is enough — caches, forks, mirrors, and team clones still hold the data. Skipping rotation. Using <code>git filter-branch</code>, which is deprecated and slow; use filter-repo. Forgetting tags: secrets often live in tagged releases too.</p>
    <h2>Audit</h2>
    <p>After the rewrite, search the rewritten history to confirm:</p>
    <pre><code>git log -p --all -S "AKIA"
    git grep "hunter2" $(git rev-list --all)</code></pre>
    <h2>Related</h2>
    <p>See "filter-repo: rewriting history safely" for the underlying tool, and "GPG signing commits and tags" for proving authorship after a rewrite.</p>

- title: "Squashing and reorganizing commits"
  section: "Advanced"
  difficulty: "Advanced"
  git_version: "2.30+"
  weight: 100
  body: |
    <h2>Why squash</h2>
    <p>A feature branch often accumulates "WIP", "fix typo", and "address review" commits that bury intent. Squashing condenses these into a small number of logically meaningful commits before merging. Reviewers see clean history; bisect works on real units of change.</p>
    <h2>Squash on merge</h2>
    <p>The simplest approach: let the merge collapse the branch:</p>
    <pre><code>git checkout main
    git merge --squash feature
    git commit -m "Add feature X"</code></pre>
    <p>This stages the cumulative diff and you write a single commit message. The downside: the branch's history is lost.</p>
    <h2>Interactive rebase squash</h2>
    <p>For more nuance, keep a few commits but combine intermediate ones:</p>
    <pre><code>git rebase -i main</code></pre>
    <p>Change <code>pick</code> to <code>squash</code> (keep both messages) or <code>fixup</code> (drop the squashed message) on the lines you want collapsed. See "Interactive rebase mastery" for the full vocabulary.</p>
    <h2>Autosquash workflow</h2>
    <p>Mark a commit as a fixup at creation time:</p>
    <pre><code>git commit --fixup=&lt;sha&gt;
    git commit --squash=&lt;sha&gt;
    git rebase -i --autosquash main</code></pre>
    <p>Configure <code>git config rebase.autoSquash true</code> to enable this every rebase.</p>
    <h2>Reordering for clarity</h2>
    <p>During interactive rebase, swap lines to reorder. A useful pattern: bring related changes together so each commit makes one logical step. If a refactor must precede a feature, ensure the refactor commit comes first.</p>
    <h2>Splitting overlarge commits</h2>
    <p>Mark a line <code>edit</code>, then split:</p>
    <pre><code>git reset HEAD^
    git add -p src/parser.c
    git commit -m "Refactor parser"
    git add -p src/runtime.c
    git commit -m "Refactor runtime"
    git rebase --continue</code></pre>
    <h2>Common mistakes</h2>
    <p>Squashing across a merge collapses two branches into one mega-commit, often unintentionally. Squashing already-pushed commits forces collaborators to rebase. Losing context: a squash that replaces a 30-commit history with one bland message hides why you made each decision. Aim for several focused commits, not one giant one.</p>
    <h2>Preserving authors</h2>
    <p>If multiple people contributed to a branch, squashing erases their authorship. Add Co-authored-by trailers in the commit message to preserve credit:</p>
    <pre><code>git commit -m "Add feature X

    Co-authored-by: Alice &lt;alice@example.com&gt;
    Co-authored-by: Bob &lt;bob@example.com&gt;"</code></pre>
    <h2>Related</h2>
    <p>See "Interactive rebase mastery", "Rerere: automatic conflict resolution reuse" for surviving repeated squash-rebase conflicts.</p>

- title: "Rerere: automatic conflict resolution reuse"
  section: "Advanced"
  difficulty: "Advanced"
  git_version: "2.30+"
  weight: 110
  body: |
    <h2>What rerere does</h2>
    <p>Rerere — "reuse recorded resolution" — watches you resolve a merge conflict, records the resolution, and replays it the next time the same conflict appears. It is invaluable on long-lived branches that repeatedly rebase or merge against an active main, and on release branches that frequently re-merge feature branches.</p>
    <h2>Enabling</h2>
    <pre><code>git config --global rerere.enabled true
    git config --global rerere.autoupdate true</code></pre>
    <p><code>autoupdate</code> stages the resolved hunks for you when rerere has a confident answer.</p>
    <h2>How it works</h2>
    <p>When a conflict occurs, Git stores a hash of the conflict context under <code>.git/rr-cache/</code>. After you resolve and commit, the resolution is associated with that hash. Future merges that produce the same conflict context get the recorded resolution applied automatically.</p>
    <h2>Inspecting state</h2>
    <pre><code>git rerere status
    git rerere diff
    git rerere remaining</code></pre>
    <p><code>status</code> lists files with conflicts, <code>diff</code> shows the recorded resolution against the current state, and <code>remaining</code> shows files still unresolved.</p>
    <h2>Forgetting a bad resolution</h2>
    <p>If you recorded the wrong resolution, clear it:</p>
    <pre><code>git rerere forget path/to/file</code></pre>
    <p>Next time the conflict appears, Git will not auto-apply, letting you resolve afresh.</p>
    <h2>Use case: rebase storms</h2>
    <p>You maintain a long feature branch and rebase against main weekly. The same conflicts in <code>CHANGELOG.md</code> appear every time. Without rerere you re-resolve them; with rerere, the first manual resolution is replayed for the rest of the rebase, often clearing out hundreds of conflicts in seconds.</p>
    <h2>Use case: integration branch</h2>
    <p>Some teams maintain an "integration" branch that re-merges all feature branches nightly to detect conflicts early. Rerere makes those nightly merges nearly hands-off after the first conflict day.</p>
    <h2>Common mistakes</h2>
    <p>Trusting rerere blindly: always inspect with <code>git diff --staged</code> before committing, especially when <code>autoupdate</code> is on. Rerere matches by conflict context, not semantic intent — a "correct" replay may still be wrong if the surrounding code has changed meaning. Sharing <code>.git/rr-cache</code> across the team is non-trivial; tools like <code>git-rerere-train</code> can help, but most teams let each developer build their own cache.</p>
    <h2>Training rerere from history</h2>
    <p>You can teach rerere from past merge resolutions:</p>
    <pre><code>git rev-list --merges main | while read merge; do
      git checkout "$merge^"
      git merge "$merge^2" || git rerere
      git reset --hard
    done</code></pre>
    <h2>Related</h2>
    <p>See "Merge conflict resolution in depth" and "Custom merge strategies and drivers".</p>

- title: "Git hooks: pre-commit, prepare-commit-msg, commit-msg"
  section: "Advanced"
  difficulty: "Advanced"
  git_version: "2.30+"
  weight: 120
  body: |
    <h2>Client-side hooks</h2>
    <p>Hooks are executable scripts in <code>.git/hooks/</code> (or wherever <code>core.hooksPath</code> points). Git invokes them at well-defined moments. The three commit-time hooks let you enforce policy before a commit is finalized.</p>
    <h2>pre-commit</h2>
    <p>Runs before the commit message is composed. Exit non-zero to abort. Typical uses: linting, formatting, secret scanning, running fast tests.</p>
    <pre><code>#!/usr/bin/env bash
    # .git/hooks/pre-commit
    set -e
    files=$(git diff --cached --name-only --diff-filter=ACMR | grep '\.py$' || true)
    [ -z "$files" ] &amp;&amp; exit 0
    ruff check $files
    ruff format --check $files</code></pre>
    <p>Make it executable: <code>chmod +x .git/hooks/pre-commit</code>.</p>
    <h2>prepare-commit-msg</h2>
    <p>Runs after the default message is generated and before the editor opens. Useful for prepending ticket numbers extracted from the branch name.</p>
    <pre><code>#!/usr/bin/env bash
    # .git/hooks/prepare-commit-msg
    MSG_FILE=$1
    SOURCE=$2
    [ "$SOURCE" = "message" ] &amp;&amp; exit 0   # -m given, no editor
    branch=$(git symbolic-ref --short HEAD)
    ticket=$(echo "$branch" | grep -oE '[A-Z]+-[0-9]+' || true)
    [ -n "$ticket" ] &amp;&amp; sed -i.bak "1s/^/[$ticket] /" "$MSG_FILE"</code></pre>
    <h2>commit-msg</h2>
    <p>Runs after the user has written the message. Use it to validate format — for example, enforcing Conventional Commits.</p>
    <pre><code>#!/usr/bin/env bash
    # .git/hooks/commit-msg
    pattern='^(feat|fix|docs|refactor|test|chore)(\(.+\))?: .{1,72}'
    grep -qE "$pattern" "$1" || {
      echo "Commit message must follow Conventional Commits."
      exit 1
    }</code></pre>
    <h2>Sharing hooks with the team</h2>
    <p>Hooks under <code>.git/hooks/</code> are not version-controlled. Use <code>core.hooksPath</code> to point at a tracked directory:</p>
    <pre><code>git config core.hooksPath .githooks</code></pre>
    <p>Or use a manager like <code>pre-commit</code> (Python), <code>lefthook</code>, or <code>husky</code> (JS) to install hooks from a config file.</p>
    <h2>Bypassing</h2>
    <p>Pass <code>--no-verify</code> to skip pre-commit and commit-msg hooks. Reserve this for emergencies; CI should re-check.</p>
    <h2>Common mistakes</h2>
    <p>Slow hooks frustrate developers and get bypassed. Keep them under a second when possible. Hooks that mutate the working tree without staging the changes confuse Git. Forgetting executable bit on Windows checkouts breaks hook execution; check with <code>git ls-files --stage .githooks</code>.</p>
    <h2>Related</h2>
    <p>See "Git hooks: post-commit, post-receive, pre-push" for after-commit hooks, and "Removing sensitive data from history" for secret scanning patterns.</p>

- title: "Git hooks: post-commit, post-receive, pre-push"
  section: "Advanced"
  difficulty: "Advanced"
  git_version: "2.30+"
  weight: 130
  body: |
    <h2>After the fact</h2>
    <p>Where commit-time hooks shape commits, the hooks on this page react to them. <code>post-commit</code> runs locally after each commit, <code>pre-push</code> runs before transferring objects to a remote, and <code>post-receive</code> runs on the server after a push lands.</p>
    <h2>post-commit</h2>
    <p>Cannot block — runs after the commit is recorded. Useful for notifications, ctags regeneration, or kicking off background tasks.</p>
    <pre><code>#!/usr/bin/env bash
    # .git/hooks/post-commit
    ctags -R --languages=python -f .tags &amp; disown
    notify-send "Committed: $(git log -1 --format=%s)"</code></pre>
    <h2>pre-push</h2>
    <p>Runs locally before <code>git push</code> sends data. Receives stdin describing every ref being pushed, allowing fine-grained checks. Exit non-zero to abort.</p>
    <pre><code>#!/usr/bin/env bash
    # .git/hooks/pre-push
    remote="$1"
    url="$2"
    while read local_ref local_sha remote_ref remote_sha; do
      if [ "$remote_ref" = "refs/heads/main" ]; then
    if ! cargo test --quiet; then
      echo "Tests fail; refusing to push to main."
      exit 1
    fi
      fi
    done</code></pre>
    <h2>post-receive (server-side)</h2>
    <p>Runs on the remote after a push completes. Common uses: deploy a static site, trigger CI, send chat notifications, mirror to another remote.</p>
    <pre><code>#!/usr/bin/env bash
    # hooks/post-receive on the bare repo
    while read oldrev newrev refname; do
      branch=${refname#refs/heads/}
      if [ "$branch" = "main" ]; then
    GIT_WORK_TREE=/var/www/site git checkout -f main
    curl -X POST https://chat.example/notify \
      -d "Deployed $newrev to production"
      fi
    done</code></pre>
    <h2>Other server hooks</h2>
    <p><code>pre-receive</code> runs once per push and can reject the entire push. <code>update</code> runs once per ref and can reject individual refs. Use these for policy enforcement: protected branches, signed-commit requirements, message format checks.</p>
    <h2>Hook chaining</h2>
    <p>Git only runs one script per hook name. To chain, write a dispatcher that runs everything in <code>hooks.d/</code>:</p>
    <pre><code>#!/usr/bin/env bash
    for hook in .githooks/post-commit.d/*; do
      [ -x "$hook" ] &amp;&amp; "$hook" "$@" || exit $?
    done</code></pre>
    <h2>Common mistakes</h2>
    <p>post-commit cannot prevent a commit; do not put validation there. pre-push runs only when push is invoked manually — automated systems pushing via libgit2 may skip it. Server-side hooks must be installed on the remote, which means access to that machine; hosting providers like GitHub or Gitea expose equivalents through their UI rather than raw hooks.</p>
    <h2>Debugging</h2>
    <p>Hooks run with stdin/stdout connected to Git. Use <code>set -x</code> at the top while debugging, and log to a file:</p>
    <pre><code>exec &gt;&gt; /tmp/git-hook.log 2&gt;&amp;1
    set -x</code></pre>
    <h2>Related</h2>
    <p>See "Git hooks: pre-commit, prepare-commit-msg, commit-msg" for commit-time hooks.</p>

- title: "Custom merge strategies and drivers"
  section: "Advanced"
  difficulty: "Expert"
  git_version: "2.30+"
  weight: 140
  body: |
    <h2>Strategies vs drivers</h2>
    <p>A merge <em>strategy</em> decides how Git combines two histories — <code>ort</code> (default since Git 2.34), <code>recursive</code> (legacy), <code>resolve</code>, <code>octopus</code>, and <code>ours</code>. A merge <em>driver</em> is per-file logic that runs when both sides have changed the same file. Choose the right tool for the right level.</p>
    <h2>Selecting a strategy</h2>
    <pre><code>git merge -s ort feature
    git merge -s ours legacy-branch
    git merge -s octopus a b c d</code></pre>
    <p><code>ours</code> records a merge but discards the other side's content — useful when retiring a branch you no longer want to integrate. <code>octopus</code> merges multiple branches at once but refuses if any conflict, suiting integration "ferry" branches.</p>
    <h2>Strategy options</h2>
    <p>Pass options with <code>-X</code>:</p>
    <pre><code>git merge -X theirs feature      # prefer feature on conflict
    git merge -X ignore-all-space main
    git merge -X renormalize legacy</code></pre>
    <p><code>renormalize</code> applies clean/smudge filters before comparing, fixing merges across line-ending changes.</p>
    <h2>Custom drivers</h2>
    <p>Define a driver in <code>.git/config</code> or <code>~/.gitconfig</code>:</p>
    <pre><code>[merge "ours-only"]
    name = Always keep our version
    driver = true</code></pre>
    <p>Wire it up in <code>.gitattributes</code>:</p>
    <pre><code>CHANGELOG.md merge=ours-only
    *.lock merge=union</code></pre>
    <p>The built-in <code>union</code> driver concatenates both sides' lines instead of conflicting — perfect for append-only files like changelogs.</p>
    <h2>Real-world driver: yarn.lock</h2>
    <pre><code>[merge "yarn-lock"]
    name = Re-run yarn install
    driver = "yarn install --silent &amp;&amp; git add yarn.lock"</code></pre>
    <p>The driver receives the ancestor, ours, and theirs as arguments and must leave the merged content in the file at <code>%A</code>.</p>
    <h2>Driver contract</h2>
    <p>Driver scripts get placeholders: <code>%O</code> ancestor, <code>%A</code> ours (write result here), <code>%B</code> theirs, <code>%P</code> path, <code>%L</code> conflict marker size. Exit 0 for success, non-zero to leave a conflict for manual resolution.</p>
    <h2>Common mistakes</h2>
    <p>Forgetting that drivers must be installed on every clone — only <code>.gitattributes</code> is shared, not <code>.git/config</code>. Document setup in your README. Marking too many files <code>merge=ours</code> silently loses upstream fixes. Confusing the strategy <code>-s ours</code> (whole-merge) with the attribute <code>merge=ours</code> (per-file).</p>
    <h2>Related</h2>
    <p>See "Custom diff drivers with gitattributes", "Rerere: automatic conflict resolution reuse", and "Merge conflict resolution in depth".</p>

- title: "Custom diff drivers with gitattributes"
  section: "Advanced"
  difficulty: "Advanced"
  git_version: "2.30+"
  weight: 150
  body: |
    <h2>Why custom diffs</h2>
    <p>Git's default diff is line-by-line text. For binary formats (PDF, DOCX, images) and structured text where line diffs are unhelpful (minified JS, generated SQL dumps), custom diff drivers produce something humans can read.</p>
    <h2>Built-in language drivers</h2>
    <p>Git ships with hunk-header patterns for many languages: ada, bash, bibtex, cpp, csharp, css, dts, elixir, fortran, fountain, golang, html, java, kotlin, markdown, matlab, objc, pascal, perl, php, python, ruby, rust, scheme, tex. Activate via gitattributes:</p>
    <pre><code># .gitattributes
    *.py    diff=python
    *.rs    diff=rust
    *.go    diff=golang</code></pre>
    <p>Now hunk headers in <code>git diff</code> show the enclosing function or class, dramatically improving review.</p>
    <h2>Defining a custom driver</h2>
    <p>Drivers live in your gitconfig:</p>
    <pre><code>[diff "exif"]
    textconv = exiftool
    cachetextconv = true</code></pre>
    <p>And gitattributes selects them:</p>
    <pre><code>*.jpg diff=exif
    *.png diff=exif</code></pre>
    <p><code>textconv</code> commands print a textual representation of the file to stdout; Git diffs the outputs. <code>cachetextconv</code> stores the converted text under <code>.git/objects</code> for speed.</p>
    <h2>Word-level diff for prose</h2>
    <pre><code>[diff "tex"]
    wordRegex = "[^[:space:]\\\\]+"</code></pre>
    <p>Then run <code>git diff --word-diff</code> for human-friendly prose comparison.</p>
    <h2>Binary detection override</h2>
    <p>Force Git to treat a file as text or binary regardless of heuristics:</p>
    <pre><code>*.svg   diff
    *.pdf   -diff
    *.bin   binary</code></pre>
    <p>The <code>binary</code> macro is shorthand for <code>-text -diff</code>.</p>
    <h2>Real example: SQL dumps</h2>
    <pre><code>[diff "sqldump"]
    textconv = "sed 's/^INSERT INTO/\\nINSERT INTO/g'"</code></pre>
    <p>Splits cramped insert lines into readable diffs.</p>
    <h2>Common mistakes</h2>
    <p>Drivers configured in <code>~/.gitconfig</code> are local — colleagues see no diff. Document driver installation. Heavy <code>textconv</code> commands without <code>cachetextconv</code> slow every diff. <code>git log -p</code> respects drivers, so misconfigurations affect history readability everywhere.</p>
    <h2>External diff entirely</h2>
    <pre><code>GIT_EXTERNAL_DIFF=meld git diff
    git config diff.tool meld
    git difftool</code></pre>
    <h2>Related</h2>
    <p>See "Gitattributes: line endings, exports, and encoding" and "Custom merge strategies and drivers".</p>

- title: "Gitattributes: line endings, exports, and encoding"
  section: "Advanced"
  difficulty: "Advanced"
  git_version: "2.30+"
  weight: 160
  body: |
    <h2>What gitattributes does</h2>
    <p><code>.gitattributes</code> applies per-path settings: line endings, diff and merge drivers, export filters, encoding declarations, and merge behavior. Unlike <code>.gitignore</code>, attributes apply to tracked files and are honored by the entire team because the file is committed.</p>
    <h2>Line endings</h2>
    <p>The most common use. Tell Git to normalize text files in the repo to LF, while letting native checkouts on Windows convert to CRLF:</p>
    <pre><code># .gitattributes
    * text=auto
    *.sh text eol=lf
    *.bat text eol=crlf
    *.png binary</code></pre>
    <p>After adding this file, run <code>git add --renormalize .</code> to fix existing files in the repo.</p>
    <h2>core.autocrlf vs gitattributes</h2>
    <p><code>core.autocrlf</code> is a per-developer fallback. Gitattributes is authoritative and shared. Always prefer attributes for projects that span platforms.</p>
    <h2>Export-ignore</h2>
    <p>Exclude files from <code>git archive</code> tarballs (test fixtures, dev configs):</p>
    <pre><code>tests/      export-ignore
    .github/    export-ignore
    .gitignore  export-ignore
    Makefile    export-ignore</code></pre>
    <p>This keeps release tarballs lean. See "Git archive and bundle for distribution".</p>
    <h2>Export-subst</h2>
    <p>Substitute Git format placeholders into files at archive time:</p>
    <pre><code>VERSION export-subst</code></pre>
    <p>Inside <code>VERSION</code>: <code>$Format:%H %ci$</code>. <code>git archive</code> writes the commit SHA and date.</p>
    <h2>Working-tree encoding</h2>
    <p>For source files in non-UTF-8 encodings (legacy codebases), declare working-tree encoding so Git stores in UTF-8 but checks out in the original encoding:</p>
    <pre><code>*.cs working-tree-encoding=UTF-16LE-BOM
    *.txt working-tree-encoding=Shift_JIS</code></pre>
    <p>Available since Git 2.21.</p>
    <h2>Filter drivers</h2>
    <p>Run a clean filter on staging and a smudge filter on checkout. Useful for keyword expansion, secret obfuscation, or content rewriting:</p>
    <pre><code>[filter "redact"]
    clean  = sed 's/SECRET=.*/SECRET=***REDACTED***/'
    smudge = cat
    *.env filter=redact</code></pre>
    <h2>Macros</h2>
    <p>Group attributes into named bundles:</p>
    <pre><code>[attr]docfile diff=markdown export-ignore
    README.md docfile</code></pre>
    <h2>Common mistakes</h2>
    <p>Adding <code>* text=auto</code> without renormalizing leaves mixed endings in the repo. Forgetting that <code>binary</code> is a macro, not a property — it expands to <code>-text -diff</code>. Filter drivers must be installed on every clone; document this in your README.</p>
    <h2>Related</h2>
    <p>See "Custom diff drivers with gitattributes" and "Custom merge strategies and drivers".</p>

- title: "GPG signing commits and tags"
  section: "Advanced"
  difficulty: "Advanced"
  git_version: "2.30+"
  weight: 170
  body: |
    <h2>Why sign</h2>
    <p>A signed commit cryptographically attests "this commit was authored by the holder of this key, unchanged since signing." Signatures defend against impersonation and tampering, and platforms like GitHub display a "Verified" badge when the signature matches a configured key.</p>
    <h2>One-time setup</h2>
    <pre><code>gpg --full-generate-key       # choose RSA 4096 or Ed25519
    gpg --list-secret-keys --keyid-format=long
    git config --global user.signingkey 0xABCDEF1234567890
    git config --global commit.gpgsign true
    git config --global tag.gpgsign true</code></pre>
    <p>Export the public key and add it to GitHub/GitLab/Gitea:</p>
    <pre><code>gpg --armor --export 0xABCDEF1234567890</code></pre>
    <h2>Signing on demand</h2>
    <pre><code>git commit -S -m "Important change"
    git tag -s v1.0.0 -m "Release 1.0.0"</code></pre>
    <p>Verify a single commit or all log entries:</p>
    <pre><code>git log --show-signature
    git verify-commit &lt;sha&gt;
    git verify-tag v1.0.0</code></pre>
    <h2>GPG agent and pinentry</h2>
    <p>Set up <code>gpg-agent</code> with a long cache so you do not retype passphrases per commit:</p>
    <pre><code># ~/.gnupg/gpg-agent.conf
    default-cache-ttl 28800
    max-cache-ttl 86400
    pinentry-program /usr/local/bin/pinentry-mac</code></pre>
    <h2>Hardware keys</h2>
    <p>YubiKey or similar tokens can hold the GPG signing key, requiring a touch per commit. After provisioning, ensure <code>gpg --card-status</code> recognizes the device. The flow is identical to software keys but with hardware-backed non-exportability.</p>
    <h2>Smudge: WSL and SSH</h2>
    <p>If you sign from WSL or over SSH, configure the agent forwarding correctly. Set <code>GPG_TTY=$(tty)</code> in your shell init so pinentry can prompt.</p>
    <h2>Common mistakes</h2>
    <p>Setting <code>commit.gpgsign true</code> without a working agent makes every <code>git commit</code> hang on a stalled pinentry. Test interactively first. Forgetting to publish your public key to the platform leaves "Unverified" badges. Keys expire; calendar a reminder. Rebases re-sign commits with the rebaser's key, not the original author's — preserve verification carefully on shared branches.</p>
    <h2>Verify a remote push</h2>
    <pre><code>git push --signed</code></pre>
    <p>Sends a signed certificate of the push intent — useful in regulated environments to prove who pushed what when.</p>
    <h2>Related</h2>
    <p>See "SSH signing (Git 2.34+)" for an easier alternative without GPG.</p>

- title: "SSH signing (Git 2.34+)"
  section: "Advanced"
  difficulty: "Advanced"
  git_version: "2.34+"
  weight: 180
  body: |
    <h2>The case for SSH signing</h2>
    <p>GPG is powerful but operationally painful. Since Git 2.34, you can sign commits and tags with the SSH keys you already use to push. No keyring, no passphrase juggling, no separate web of trust. GitHub, GitLab, Gitea, and Forgejo all accept SSH-signed commits.</p>
    <h2>Setup</h2>
    <pre><code>git config --global gpg.format ssh
    git config --global user.signingkey ~/.ssh/id_ed25519.pub
    git config --global commit.gpgsign true
    git config --global tag.gpgsign true</code></pre>
    <p>Now <code>git commit</code> signs with your SSH private key. The "gpg" naming is historical — Git treats SSH as another signing format.</p>
    <h2>Allowed signers file</h2>
    <p>For <code>git verify-commit</code> to recognize signers, configure an allowed signers file mapping email addresses to their public keys:</p>
    <pre><code>cat &gt; ~/.config/git/allowed_signers &lt;&lt;EOF
    alice@example.com ssh-ed25519 AAAA... alice
    bob@example.com   ssh-ed25519 AAAA... bob
    EOF
    git config --global gpg.ssh.allowedSignersFile ~/.config/git/allowed_signers</code></pre>
    <h2>Verifying</h2>
    <pre><code>git log --show-signature
    git verify-commit HEAD
    git verify-tag v1.0.0</code></pre>
    <p>Without an allowed signers file, Git can still verify mathematically but cannot map signatures to identities, so it reports "no principal matched."</p>
    <h2>Hardware-backed keys</h2>
    <p>OpenSSH supports FIDO/U2F keys (<code>ssh-keygen -t ed25519-sk</code>). These work transparently for signing, requiring a touch per signature. Combined with Git 2.34+, this provides hardware-attested commit signing without GPG ceremony.</p>
    <h2>Revocation</h2>
    <p>Maintain a revocation file:</p>
    <pre><code>git config --global gpg.ssh.revocationFile ~/.config/git/revoked_keys</code></pre>
    <p>Add compromised keys here; verification will reject signatures from them.</p>
    <h2>Common mistakes</h2>
    <p>Mismatched email between commit author and allowed signers entry. Use <code>git log --pretty=fuller</code> to inspect. Pointing <code>user.signingkey</code> at a private key path; you want the <code>.pub</code>. Forgetting to upload the public key to the host platform — without that, the platform shows "Unverified" even though the math is correct.</p>
    <h2>Mixed environments</h2>
    <p>SSH-signed and GPG-signed commits can coexist in one repo. Verifiers need both <code>gpg.ssh.allowedSignersFile</code> and a working GPG keyring. Choose one for new commits and document the policy.</p>
    <h2>Related</h2>
    <p>See "GPG signing commits and tags" for the older path, and "Advanced gitconfig techniques" for managing signing config across machines.</p>

- title: "Worktrees: multiple checkouts of one repo"
  section: "Advanced"
  difficulty: "Advanced"
  git_version: "2.30+"
  weight: 190
  body: |
    <h2>The problem worktrees solve</h2>
    <p>You are mid-feature when an urgent hotfix request arrives. Stashing or context-switching is risky and slow. Worktrees let you check out additional branches into separate directories, all sharing one underlying object database. Each worktree has its own HEAD, index, and working tree.</p>
    <h2>Adding a worktree</h2>
    <pre><code>git worktree add ../hotfix main
    cd ../hotfix
    git checkout -b hotfix/urgent
    # fix the bug, push, return
    cd -
    git worktree remove ../hotfix</code></pre>
    <p>The new directory is a full working copy. <code>.git</code> there is a small file pointing into the main repo's <code>.git/worktrees/&lt;name&gt;</code> metadata.</p>
    <h2>Listing and pruning</h2>
    <pre><code>git worktree list
    git worktree list --porcelain
    git worktree prune
    git worktree remove ../old-feature
    git worktree lock ../release   # prevent prune
    git worktree unlock ../release</code></pre>
    <p>Lock worktrees on removable media to prevent <code>prune</code> from clearing them when offline.</p>
    <h2>Detached worktrees</h2>
    <p>Need a quick read-only checkout of a tag?</p>
    <pre><code>git worktree add --detach ../v1.0 v1.0.0</code></pre>
    <p>No branch is created; HEAD is detached at the tag.</p>
    <h2>Branch sharing rules</h2>
    <p>The same branch cannot be checked out in two worktrees simultaneously, by design — it would let two indexes claim authority over one branch ref. Force this with <code>--force</code> only if you understand the consequences.</p>
    <h2>Use cases</h2>
    <ul>
      <li>Long-running CI build in one worktree while you keep coding.</li>
      <li>Side-by-side comparison of two branches in your editor.</li>
      <li>Bisecting in a worktree while your main checkout stays put.</li>
      <li>Running multiple language versions or container builds in parallel.</li>
    </ul>
    <h2>Configuration</h2>
    <p>Per-worktree config (Git 2.20+) keeps machine-specific settings isolated:</p>
    <pre><code>git config --worktree user.email contractor@client.com</code></pre>
    <p>Enable with <code>git config extensions.worktreeConfig true</code>.</p>
    <h2>Common mistakes</h2>
    <p>Removing a worktree directory with <code>rm -rf</code> instead of <code>git worktree remove</code> leaves stale metadata; <code>git worktree prune</code> cleans up. Trying to share a hooks directory across worktrees: hooks live under the main <code>.git</code> and run for all worktrees, which can be surprising. Bare repositories make excellent worktree hubs — <code>git clone --bare</code> then add worktrees off it.</p>
    <h2>Related</h2>
    <p>See "Sparse checkout: working with subsets of a large repo" and "Background maintenance: git maintenance run/start/stop", which is worktree-aware.</p>

- title: "Git internals: the object database"
  section: "Advanced"
  difficulty: "Expert"
  git_version: "2.30+"
  weight: 200
  body: |
    <h2>Four object types</h2>
    <p>Git stores everything as content-addressable objects under <code>.git/objects</code>. There are four types: <em>blob</em> (file contents), <em>tree</em> (directory listing of blobs and subtrees), <em>commit</em> (snapshot pointer with author, committer, message, and parents), and <em>tag</em> (annotated tag with signer and message). Each is named by the SHA-1 (or SHA-256) of its content.</p>
    <h2>Inspecting</h2>
    <pre><code>git cat-file -t &lt;sha&gt;        # type
    git cat-file -p &lt;sha&gt;        # pretty-print
    git cat-file -s &lt;sha&gt;        # size
    git ls-tree HEAD             # list tree contents
    git rev-parse HEAD^{tree}    # tree of HEAD</code></pre>
    <h2>Loose vs packed</h2>
    <p>Newly created objects start as loose: one zlib-compressed file per object under <code>.git/objects/xx/yyyy...</code>. Garbage collection later combines many objects into a packfile under <code>.git/objects/pack/</code>, sharing common bytes via delta compression. See "Git internals: packfiles and delta compression".</p>
    <h2>Hashing</h2>
    <p>Compute an object hash without writing it:</p>
    <pre><code>echo "hello" | git hash-object --stdin
    git hash-object -w README.md       # write to object DB</code></pre>
    <h2>Trees encode permissions</h2>
    <p>A tree entry is mode + name + sha. Modes are <code>040000</code> (directory), <code>100644</code> (regular), <code>100755</code> (executable), <code>120000</code> (symlink), <code>160000</code> (gitlink/submodule). Git does not store other Unix permissions.</p>
    <h2>Walking history</h2>
    <pre><code>git log --raw                # show changed blobs
    git log --pretty=raw         # show internal commit format
    git rev-list --objects HEAD  # commits + reachable trees + blobs</code></pre>
    <p><code>rev-list --objects</code> is what <code>git fsck</code> and <code>git pack-objects</code> use under the hood.</p>
    <h2>Reachability and pruning</h2>
    <p>An object is reachable if some ref (branch, tag, reflog entry) leads to it through the commit-tree-blob graph. Unreachable objects are pruned by gc after the reflog expiry window (default 90 days for reachable, 30 for unreachable).</p>
    <pre><code>git fsck --unreachable
    git gc --prune=now</code></pre>
    <h2>SHA-256 transition</h2>
    <p>Modern Git supports SHA-256 repositories (<code>git init --object-format=sha256</code>). Interop with SHA-1 repos remains limited; choose carefully for new projects expecting decades of life.</p>
    <h2>Common mistakes</h2>
    <p>Editing files under <code>.git/objects</code> directly. Don't. Use plumbing commands like <code>git hash-object</code> and <code>git update-ref</code>. Assuming SHA-1 collisions are impossible — Git includes hardened collision detection (SHAttered) by default. Confusing tree SHA with commit SHA in scripts; <code>HEAD</code> alone resolves to a commit, <code>HEAD^{tree}</code> to its tree.</p>
    <h2>Related</h2>
    <p>See "Git internals: packfiles and delta compression", "Git internals: references and the reflog", and "Git internals: the index format".</p>

- title: "Git internals: packfiles and delta compression"
  section: "Advanced"
  difficulty: "Expert"
  git_version: "2.30+"
  weight: 210
  body: |
    <h2>Packfile basics</h2>
    <p>A packfile bundles many objects into one file with delta compression — instead of storing each version of a file in full, similar objects share a base and store only the difference. The result is a 5x to 50x size reduction on real repos. Pack files live under <code>.git/objects/pack/</code> as <code>pack-&lt;sha&gt;.pack</code> with sidecar <code>.idx</code> and (newer) <code>.rev</code> files.</p>
    <h2>Inspecting packs</h2>
    <pre><code>git verify-pack -v .git/objects/pack/pack-*.idx | head
    git count-objects -v
    git cat-file --batch-all-objects --batch-check='%(objectname) %(objecttype) %(objectsize:disk)'</code></pre>
    <p>The verify output shows each object's type, size on disk, and (if delta) base object and depth.</p>
    <h2>Repacking</h2>
    <p>Repack to consolidate loose objects and rebuild deltas:</p>
    <pre><code>git repack -ad                      # full repack, drop redundant
    git repack -adf --depth=50 --window=250
    git repack --geometric=2 -d         # geometric repack (Git 2.32+)</code></pre>
    <p><code>--window</code> controls how many objects are considered as delta bases for each candidate; larger windows produce smaller packs at the cost of CPU.</p>
    <h2>Geometric repacking</h2>
    <p>Geometric repacking (Git 2.32+) keeps a series of pack sizes in a 1:N ratio, avoiding the cost of repacking everything every time. See "Geometric repacking strategy".</p>
    <h2>Multi-pack-index</h2>
    <p>With many packs, lookups slow down. The MIDX file (Git 2.20+, on by default in modern installs) provides a unified index across packs:</p>
    <pre><code>git multi-pack-index write
    git multi-pack-index verify</code></pre>
    <p>See "Multi-pack-index (MIDX): unified pack object lookup".</p>
    <h2>Delta tuning</h2>
    <pre><code>[pack]
    windowMemory = 256m
    threads = 0       # auto-detect cores
    deltaCacheSize = 256m</code></pre>
    <p>For huge repos, increase <code>pack.windowMemory</code>. <code>pack.threads = 0</code> uses all available cores. See "pack.windowMemory and pack.threads tuning".</p>
    <h2>Reachability bitmaps</h2>
    <p>Bitmap indexes (<code>.bitmap</code> files) accelerate counts of reachable objects, used by <code>git clone</code>, <code>git fetch</code>, and gc. Generate with:</p>
    <pre><code>git repack -adb</code></pre>
    <p>See "Reachability bitmaps for fast set operations".</p>
    <h2>Common mistakes</h2>
    <p>Manually deleting pack files — Git tracks them in metadata; use <code>git repack</code>. Setting <code>pack.window</code> very high without <code>pack.windowMemory</code> can OOM the box. Forgetting that <code>git gc --aggressive</code> recomputes deltas with depth 250 and window 250, which is heavy; reserve for occasional maintenance.</p>
    <h2>Related</h2>
    <p>See "Geometric repacking strategy", "Reachability bitmaps for fast set operations", and "Background maintenance: git maintenance run/start/stop".</p>

- title: "Git internals: references and the reflog"
  section: "Advanced"
  difficulty: "Advanced"
  git_version: "2.30+"
  weight: 220
  body: |
    <h2>What is a ref</h2>
    <p>A ref is a name that points to an object — usually a commit. Branches are refs under <code>refs/heads/</code>, tags under <code>refs/tags/</code>, remote-tracking under <code>refs/remotes/</code>, and pseudo-refs like <code>HEAD</code>, <code>FETCH_HEAD</code>, <code>ORIG_HEAD</code> live at the root of <code>.git</code>. Internally, refs are either loose files or entries in <code>.git/packed-refs</code>.</p>
    <h2>Inspecting refs</h2>
    <pre><code>git for-each-ref
    git for-each-ref --sort=-committerdate --format='%(refname:short) %(committerdate:relative)' refs/heads
    git symbolic-ref HEAD
    git update-ref refs/heads/foo &lt;sha&gt;</code></pre>
    <p><code>git update-ref</code> is the plumbing way to move a branch atomically.</p>
    <h2>The reflog</h2>
    <p>Every change to a ref is logged: branch tip moves, commits, resets, rebases, fetches. The reflog is a per-clone safety net independent of the object graph.</p>
    <pre><code>git reflog
    git reflog show feature
    git reflog show HEAD@{2.weeks.ago}
    git log -g --oneline</code></pre>
    <p>Recover a "lost" commit by referencing the reflog entry:</p>
    <pre><code>git checkout HEAD@{1}
    git branch rescue HEAD@{5}</code></pre>
    <h2>Reflog expiration</h2>
    <p>Reflog entries are subject to expiry: <code>gc.reflogExpire</code> (default 90 days) for reachable, <code>gc.reflogExpireUnreachable</code> (30 days) for unreachable. After expiry, gc may prune the underlying objects.</p>
    <pre><code>git config gc.reflogExpire never
    git config gc.reflogExpireUnreachable 60.days</code></pre>
    <h2>Special pseudo-refs</h2>
    <p><code>HEAD</code> points to the current branch (or directly at a commit when detached). <code>ORIG_HEAD</code> records the previous tip before destructive ops like merge, rebase, reset. <code>FETCH_HEAD</code> records the last fetched tip(s). <code>MERGE_HEAD</code> exists during a merge in progress. See "The ORIG_HEAD, FETCH_HEAD, and other special refs".</p>
    <h2>Reftable backend</h2>
    <p>Modern Git supports the <em>reftable</em> ref storage backend, designed for repos with hundreds of thousands of refs (used internally by JGit). Enable on init:</p>
    <pre><code>git init --ref-format=reftable</code></pre>
    <h2>Common mistakes</h2>
    <p>Trusting reflog forever: it expires. Tag or branch important recoveries promptly. Editing <code>.git/refs/</code> by hand: use <code>git update-ref</code> for atomicity. Confusing <code>HEAD@{2}</code> (reflog index) with <code>HEAD~2</code> (commit ancestry); they mean very different things.</p>
    <h2>Related</h2>
    <p>See "Git internals: the object database" and "Git internals: packfiles and delta compression".</p>

- title: "Git internals: the index format"
  section: "Advanced"
  difficulty: "Expert"
  git_version: "2.30+"
  weight: 230
  body: |
    <h2>The staging area, demystified</h2>
    <p>The <em>index</em> (a.k.a. cache, staging area) lives at <code>.git/index</code> as a binary file describing what the next commit will contain. It is not a tree — it is a flat sorted list of path entries with stat info, mode, and SHA. Operations like <code>git add</code>, <code>git rm</code>, and <code>git mv</code> update the index; <code>git commit</code> turns it into a tree object.</p>
    <h2>Inspecting</h2>
    <pre><code>git ls-files --stage
    git ls-files --debug
    git diff --cached         # index vs HEAD
    git diff                  # working tree vs index</code></pre>
    <h2>Index versions</h2>
    <p>Git supports several index versions. Version 2 was historic; version 3 added skip-worktree (for sparse checkout); version 4 (default in 2.20+) prefix-compresses paths for big trees. Set with <code>index.version</code>:</p>
    <pre><code>git config index.version 4
    git update-index --index-version 4</code></pre>
    <h2>Stat caching</h2>
    <p>The index records device, inode, ctime, mtime, size for every entry. <code>git status</code> uses this to skip files whose stat info matches; only on stat mismatch does it read content. This is why huge repos benefit from <code>core.fsmonitor</code> (see "Fsmonitor: faster working tree queries").</p>
    <h2>Sparse index</h2>
    <p>Large monorepos can shrink their index by representing whole directories as a single entry (a tree SHA) rather than every contained file. Enable with sparse-checkout in cone mode:</p>
    <pre><code>git sparse-checkout init --cone
    git sparse-checkout set apps/web libs/shared
    git config core.sparseCheckoutCone true
    git config index.sparse true</code></pre>
    <p>See "The sparse index: operating without a full index".</p>
    <h2>Three-way merging in the index</h2>
    <p>During a conflicted merge, the index holds three stages per conflicting path: stage 1 (ancestor), 2 (ours), 3 (theirs).</p>
    <pre><code>git ls-files -u                    # unmerged paths
    git checkout-index --stage=2 -- file
    git checkout-index --stage=3 -- file</code></pre>
    <h2>Common mistakes</h2>
    <p>Believing <code>git add</code> stages files "permanently" — it stages a snapshot. Re-edit and re-add. Confusing index 0 (resolved) with stages 1/2/3 (conflicting). Hand-deleting <code>.git/index</code> is recoverable (<code>git reset</code>), but breaks any in-progress operation.</p>
    <h2>Performance levers</h2>
    <p>Large indexes are slow to read/write. Levers: <code>index.version=4</code>, <code>core.untrackedCache=true</code>, <code>core.fsmonitor=true</code>, sparse index, and <code>feature.manyFiles=true</code> which sets sensible defaults at once.</p>
    <h2>Related</h2>
    <p>See "Configuring index.version for performance" and "Feature.manyFiles configuration".</p>

- title: "Grafts and replace refs"
  section: "Advanced"
  difficulty: "Expert"
  git_version: "2.30+"
  weight: 240
  body: |
    <h2>Editing history without rewriting it</h2>
    <p>Sometimes you want to splice histories together (a converted Subversion import meeting a continuation, for example) without rewriting commits. Grafts and the <code>refs/replace/</code> namespace let Git pretend the parent of one commit is a different commit, leaving the original objects untouched.</p>
    <h2>Grafts (legacy)</h2>
    <p><code>.git/info/grafts</code> is a plaintext file: each line specifies a commit's parents. Git applies these overrides when traversing history. Grafts are deprecated in favor of replace refs because they are local-only and confusing.</p>
    <pre><code># .git/info/grafts
    &lt;child-sha&gt; &lt;new-parent-sha&gt;</code></pre>
    <h2>Replace refs</h2>
    <p>Replace refs are real refs under <code>refs/replace/</code>. They map an "original" object SHA to a "replacement" object SHA. Unlike grafts, they can be pushed and shared. Most commands honor them automatically.</p>
    <pre><code>git replace --graft &lt;child&gt; &lt;new-parent&gt;
    git replace --graft v3.0.0 v2.99.0
    git replace --convert-graft-file
    git replace -d &lt;sha&gt;
    git replace -l</code></pre>
    <p><code>--graft</code> creates a replacement commit identical to the original except for the parents.</p>
    <h2>Use case: stitch imports</h2>
    <p>You imported old SVN history as a separate orphan branch, and the modern repo's first commit has no parents. Splice them:</p>
    <pre><code>git replace --graft $(git rev-list --max-parents=0 main | head -1) svn-history-tip</code></pre>
    <p>Now <code>git log main</code> walks all the way back through the SVN era.</p>
    <h2>Sharing</h2>
    <p>Push replace refs explicitly:</p>
    <pre><code>git push origin 'refs/replace/*:refs/replace/*'</code></pre>
    <p>Collaborators fetching the same refspec see the same grafted view.</p>
    <h2>Disabling temporarily</h2>
    <pre><code>git --no-replace-objects log
    GIT_NO_REPLACE_OBJECTS=1 git log</code></pre>
    <p>Useful when you need the genuine, unspliced history for forensic checks.</p>
    <h2>Common mistakes</h2>
    <p>Confusing replace with rewrite — replace does not change object SHAs, so signatures remain valid but the "real" parent of a commit is not what you see. Forgetting to push replace refs means your join only exists locally. Grafts in <code>.git/info/grafts</code> are no longer recommended; convert them with <code>git replace --convert-graft-file</code>.</p>
    <h2>Common with filter-repo</h2>
    <p>If you want a permanent rewrite rather than a runtime view, use filter-repo to materialize the new history. See "filter-repo: rewriting history safely".</p>
    <h2>Related</h2>
    <p>See "Git internals: the object database" and "Git internals: references and the reflog".</p>

- title: "Advanced git log: formatting, filtering, and graph"
  section: "Advanced"
  difficulty: "Advanced"
  git_version: "2.30+"
  weight: 250
  body: |
    <h2>Beyond the default</h2>
    <p><code>git log</code> is a small query language for your history. With the right flags it produces dashboard-quality reports, audit trails, and bug forensics. This page collects the most useful incantations.</p>
    <h2>Pretty formats</h2>
    <pre><code>git log --pretty=oneline
    git log --pretty=fuller
    git log --pretty=format:'%h %ad %an %s' --date=short
    git log --pretty=format:'%C(yellow)%h%Creset %C(cyan)%ad%Creset %s %C(green)(%an)%Creset' --date=short</code></pre>
    <p>Define a permanent alias:</p>
    <pre><code>git config --global alias.lg "log --pretty=format:'%C(auto)%h %ad %s %d' --date=short --graph"</code></pre>
    <h2>Graph view</h2>
    <pre><code>git log --graph --oneline --all --decorate
    git log --graph --first-parent main</code></pre>
    <p><code>--first-parent</code> hides feature-branch noise, showing only integration history on main.</p>
    <h2>Filtering by content</h2>
    <p>Pickaxe finds commits that changed an occurrence count of a string:</p>
    <pre><code>git log -S"FunctionName"             # commits that add/remove the literal
    git log -G"regex.*pattern"           # commits whose diff matches the regex
    git log -L :myFunc:src/file.c        # function evolution
    git log -L 100,150:src/file.c        # line range evolution</code></pre>
    <h2>Filtering by metadata</h2>
    <pre><code>git log --since=2.weeks --until=yesterday
    git log --author='Alice'
    git log --grep='hotfix' --grep='security' --all-match
    git log --no-merges
    git log --merges --first-parent main
    git log --committer='@example.com'</code></pre>
    <h2>Path-restricted log</h2>
    <pre><code>git log -- src/parser/
    git log --diff-filter=D -- secrets.env       # commits that deleted a file
    git log --follow -- src/old/path.go          # follow renames</code></pre>
    <h2>Counting and stats</h2>
    <pre><code>git shortlog -sne                            # commits per author
    git log --stat
    git log --shortstat
    git log --numstat</code></pre>
    <h2>Walks</h2>
    <pre><code>git log --ancestry-path A..B
    git log --boundary --left-right A...B
    git log --reverse                            # chronological order
    git log --topo-order
    git log --date-order</code></pre>
    <h2>Common mistakes</h2>
    <p>Using <code>--all</code> when you mean <code>--branches</code> — <code>--all</code> includes tags, remotes, and stash, which can dramatically expand output. Forgetting <code>--follow</code> on renamed files. Confusing <code>A..B</code> (in B, not A) with <code>A...B</code> (symmetric difference). The pickaxe (<code>-S</code>/<code>-G</code>) only sees the textual diff; for semantic searches, combine with <code>--diff-filter</code>.</p>
    <h2>Range-diff for series</h2>
    <p>Compare two versions of a patch series:</p>
    <pre><code>git range-diff main..topic-v1 main..topic-v2</code></pre>
    <p>See "Git range-diff: comparing revision series".</p>
    <h2>Related</h2>
    <p>See "Three-way diff and conflict resolution strategies" and "Git notes: attaching metadata to commits".</p>

- title: "The ORIG_HEAD, FETCH_HEAD, and other special refs"
  section: "Advanced"
  difficulty: "Advanced"
  git_version: "2.30+"
  weight: 260
  body: |
    <h2>The unsung pseudo-refs</h2>
    <p>Beyond <code>HEAD</code>, Git maintains a small zoo of automatically-updated refs that record what just happened. Knowing them turns "I deleted my work" into a one-line recovery.</p>
    <h2>HEAD</h2>
    <p>Points to the current branch (e.g., <code>ref: refs/heads/main</code>) or, when detached, to a commit SHA directly. <code>git symbolic-ref HEAD</code> shows which.</p>
    <h2>ORIG_HEAD</h2>
    <p>Set by destructive operations (<code>merge</code>, <code>rebase</code>, <code>reset</code>, <code>am</code>) to the previous tip. The classic recovery from a botched merge or reset:</p>
    <pre><code>git reset --hard ORIG_HEAD</code></pre>
    <h2>FETCH_HEAD</h2>
    <p>Updated by <code>git fetch</code> with the tip(s) of refs just fetched. Each line is <code>&lt;sha&gt;\t[not-for-merge]\t&lt;branch description&gt;</code>. Use it for a one-shot inspect:</p>
    <pre><code>git fetch origin
    git log HEAD..FETCH_HEAD                   # what would a pull bring in?
    git diff HEAD FETCH_HEAD -- src/</code></pre>
    <h2>MERGE_HEAD and CHERRY_PICK_HEAD</h2>
    <p>Present only during a merge or cherry-pick in progress. Indicate the commit being merged in. Their existence is how Git knows the working tree is mid-operation.</p>
    <pre><code>cat .git/MERGE_HEAD             # exists during merge
    git rev-parse --verify MERGE_HEAD &amp;&amp; echo "merge in progress"</code></pre>
    <h2>REVERT_HEAD, BISECT_*</h2>
    <p>Similar markers exist for revert (<code>REVERT_HEAD</code>), bisect (<code>BISECT_LOG</code>, <code>BISECT_START</code>), rebase (<code>REBASE_HEAD</code> in modern Git), and AM (<code>AM_HEAD</code>).</p>
    <h2>Reflog selectors</h2>
    <p>You can also reach the previous state via the reflog regardless of these refs:</p>
    <pre><code>git reset --hard HEAD@{1}
    git checkout @{-1}              # previous branch
    git checkout -                  # also previous branch (alias)</code></pre>
    <p>The <code>@{N}</code> notation indexes the ref's reflog, distinct from <code>HEAD~N</code> which walks ancestry.</p>
    <h2>Common mistakes</h2>
    <p>Conflating <code>ORIG_HEAD</code> with the reflog — <code>ORIG_HEAD</code> is overwritten on the next destructive op, so chaining several can lose earlier ones. Use the reflog for deeper history. Misreading <code>FETCH_HEAD</code>: only the first line is the merge target unless you fetched multiple refspecs.</p>
    <h2>Practical recovery flow</h2>
    <pre><code>git reflog                       # find the lost state
    git branch rescue HEAD@{14}      # bookmark it
    git reset --hard rescue          # restore</code></pre>
    <h2>Related</h2>
    <p>See "Git internals: references and the reflog".</p>

- title: "Three-way diff and conflict resolution strategies"
  section: "Advanced"
  difficulty: "Advanced"
  git_version: "2.30+"
  weight: 270
  body: |
    <h2>What is three-way</h2>
    <p>Two-way diff shows what changed between two versions. Three-way diff also considers the common ancestor, letting Git decide whether a region was changed by one side, the other, or both. Three-way is the foundation of merging.</p>
    <h2>Inspecting a conflict</h2>
    <p>During a merge, files with conflicts contain markers:</p>
    <pre><code>&lt;&lt;&lt;&lt;&lt;&lt;&lt; HEAD
    our version
    =======
    their version
    &gt;&gt;&gt;&gt;&gt;&gt;&gt; feature</code></pre>
    <p>Show all three sides, including the ancestor:</p>
    <pre><code>git config merge.conflictStyle diff3       # or zdiff3 (Git 2.35+)
    git checkout --conflict=diff3 path/to/file</code></pre>
    <p><code>zdiff3</code> additionally compresses common context for cleaner output.</p>
    <h2>Index stages</h2>
    <p>The index holds three stages during conflict:</p>
    <pre><code>git ls-files -u
    git show :1:path     # ancestor
    git show :2:path     # ours
    git show :3:path     # theirs</code></pre>
    <h2>Strategies</h2>
    <p>Resolve by selecting a side:</p>
    <pre><code>git checkout --ours path/to/file
    git checkout --theirs path/to/file
    git checkout --merge path/to/file        # remerge with markers</code></pre>
    <p>Or by remerging with a different option:</p>
    <pre><code>git merge -X theirs feature
    git merge -X ignore-all-space feature
    git merge -X renormalize feature</code></pre>
    <h2>Mergetool</h2>
    <pre><code>git config merge.tool meld         # or vimdiff, kdiff3, opendiff, etc.
    git mergetool</code></pre>
    <p>The tool opens with three or four panes (LOCAL, BASE, REMOTE, MERGED) so you can pick changes by hunk.</p>
    <h2>Recursive ancestor (ort)</h2>
    <p>When two branches share multiple merge bases (criss-cross merges), the <code>ort</code> strategy (default since Git 2.34) virtually merges the bases first to compute a synthesized ancestor. This dramatically reduces spurious conflicts.</p>
    <h2>Common mistakes</h2>
    <p>Assuming the ancestor in conflict markers matches your previous commit — it's the merge base, often well in the past. Resolving conflicts by deleting both sides; the marker style hides this from review. Always read the ancestor (use diff3) to understand intent. Forgetting to <code>git add</code> after editing a conflicting file leaves it unmerged in the index.</p>
    <h2>Replay with rerere</h2>
    <p>Once you resolve, rerere can replay the same resolution next time. See "Rerere: automatic conflict resolution reuse".</p>
    <h2>Related</h2>
    <p>See "Merge conflict resolution in depth" and "Custom merge strategies and drivers".</p>

- title: "Merge conflict resolution in depth"
  section: "Advanced"
  difficulty: "Advanced"
  git_version: "2.30+"
  weight: 280
  body: |
    <h2>A workflow, not a panic</h2>
    <p>Conflicts are routine. The right workflow turns them from a stress event into a five-minute task: inspect, decide, edit, verify, continue. This page lays out the discipline.</p>
    <h2>Step 1: inspect</h2>
    <pre><code>git status                                # which files conflict
    git diff --name-only --diff-filter=U
    git log --merge -p path/to/file           # commits unique to each side</code></pre>
    <p><code>--merge</code> shows only commits relevant to the unmerged path on each side, dramatically narrowing the search.</p>
    <h2>Step 2: choose strategy</h2>
    <p>Decide per file: keep ours, keep theirs, or merge by hand. For binary files, choose one side wholesale; line-merging makes no sense:</p>
    <pre><code>git checkout --theirs assets/logo.png
    git add assets/logo.png</code></pre>
    <h2>Step 3: edit</h2>
    <p>For text, edit the conflict markers. Configure <code>merge.conflictStyle = zdiff3</code> (Git 2.35+) to see the ancestor inline. Remove all markers; <code>git diff --check</code> warns about leftovers.</p>
    <pre><code>git config --global merge.conflictStyle zdiff3
    git diff --check</code></pre>
    <h2>Step 4: verify</h2>
    <p>Build and test before staging. Conflicts that compile can still be semantically wrong — review with eyes on full context.</p>
    <pre><code>cargo test
    git add path/to/file
    git status</code></pre>
    <h2>Step 5: continue</h2>
    <pre><code>git merge --continue
    git rebase --continue
    git cherry-pick --continue</code></pre>
    <p>Or abort if you got in over your head:</p>
    <pre><code>git merge --abort
    git rebase --abort</code></pre>
    <h2>Tools that help</h2>
    <ul>
      <li><code>git mergetool</code> with meld, kdiff3, p4merge, vimdiff, beyond compare, IntelliJ.</li>
      <li><code>git rerere</code> to replay resolutions on repeated rebases — see "Rerere: automatic conflict resolution reuse".</li>
      <li><code>git imerge</code> for incremental, bisect-style merging of long-divergent branches.</li>
    </ul>
    <h2>Patterns</h2>
    <p>Conflicting whitespace? Try <code>git merge -X ignore-all-space</code>. Repeated changelog conflicts? Mark <code>CHANGELOG.md merge=union</code> in <code>.gitattributes</code>. Lockfile conflicts? Run a custom driver that regenerates them — see "Custom merge strategies and drivers".</p>
    <h2>Common mistakes</h2>
    <p>Resolving in the editor without inspecting <code>git log --merge</code> — you miss the why. Committing a half-resolved file because the markers are gone but the logic is wrong. Skipping tests because "it compiles." Force-pushing the result without telling collaborators.</p>
    <h2>Related</h2>
    <p>See "Three-way diff and conflict resolution strategies", "Custom merge strategies and drivers", and "Rerere: automatic conflict resolution reuse".</p>

- title: "Generating and applying patches"
  section: "Advanced"
  difficulty: "Advanced"
  git_version: "2.30+"
  weight: 290
  body: |
    <h2>Why patches</h2>
    <p>Patches are portable diffs you can email, paste in a ticket, or store as a file. They are how Linux kernel development works at scale and remain useful any time you need to share a change without push access to a shared remote.</p>
    <h2>Creating with diff and apply</h2>
    <pre><code>git diff &gt; change.patch
    git diff main..feature &gt; series.patch
    git diff --staged &gt; staged.patch
    git apply change.patch
    git apply --check change.patch          # dry run
    git apply --3way change.patch           # use three-way on conflicts</code></pre>
    <p><code>git apply</code> alters only the working tree; it does not create commits.</p>
    <h2>Creating with format-patch</h2>
    <p>For one or more commits with full metadata (author, date, message):</p>
    <pre><code>git format-patch -1 HEAD                    # last commit
    git format-patch main                       # all commits since main
    git format-patch -3 --cover-letter -o out/  # last 3 + cover letter</code></pre>
    <p>Each output file is a <code>.patch</code> in mailbox format, ready to email or apply with <code>git am</code>.</p>
    <h2>Applying with am</h2>
    <pre><code>git am 0001-fix.patch
    git am out/*.patch
    git am --3way out/*.patch
    git am --abort
    git am --skip</code></pre>
    <p><code>git am</code> creates real commits with original authorship preserved. See "Git am: applying mailbox patches" and "Maintaining a patch series with git format-patch".</p>
    <h2>Binary patches</h2>
    <p>Default <code>git diff</code> elides binary changes. Force inclusion:</p>
    <pre><code>git diff --binary &gt; with-binaries.patch
    git format-patch --binary -1</code></pre>
    <h2>Stat-only or summary</h2>
    <pre><code>git diff --stat
    git format-patch --stat=200 -1</code></pre>
    <h2>Common mistakes</h2>
    <p>Generating with <code>git diff</code> when you needed metadata; <code>format-patch</code> is the right choice for shareable commits. Forgetting <code>--binary</code> when the change includes images. Applying with <code>git apply</code> when you wanted commits — use <code>git am</code> instead. Whitespace differences breaking apply: try <code>git apply --whitespace=fix</code>.</p>
    <h2>Range diff for review</h2>
    <p>When iterating on a patch series, compare versions:</p>
    <pre><code>git range-diff main..v1 main..v2</code></pre>
    <p>See "Git range-diff: comparing revision series".</p>
    <h2>Related</h2>
    <p>See "Git am: applying mailbox patches" and "Maintaining a patch series with git format-patch".</p>

- title: "Git am: applying mailbox patches"
  section: "Advanced"
  difficulty: "Advanced"
  git_version: "2.30+"
  weight: 300
  body: |
    <h2>The mailbox tradition</h2>
    <p><code>git am</code> applies patches in mbox format: the format used by mailing-list-driven projects like the Linux kernel and Git itself. Each mbox entry contains a patch plus its commit metadata (author, subject, body), so applying preserves authorship.</p>
    <h2>Basic apply</h2>
    <pre><code>git am 0001-feature.patch
    git am out/*.patch
    git am --3way out/*.patch       # try three-way merge on conflict
    git am --keep-cr                # preserve carriage returns</code></pre>
    <p>If applying fails, the operation pauses. You can <code>--abort</code>, <code>--skip</code>, or resolve and <code>--continue</code>.</p>
    <h2>From mail clients</h2>
    <p>Most mail clients can save messages as mbox. Many maintainers receive patches via mailing list and feed them directly:</p>
    <pre><code>cat /var/mail/inbox | git am</code></pre>
    <h2>Signed-off-by</h2>
    <p>Convention requires a Signed-off-by trailer for each accepted patch. Add it during apply:</p>
    <pre><code>git am --signoff out/*.patch
    git config format.signOff true   # always include on format-patch</code></pre>
    <h2>Direct from URL</h2>
    <pre><code>curl -sL https://lore.kernel.org/.../t.mbox.gz | gunzip | git am
    b4 am https://lore.kernel.org/...    # fancy maintainer tool</code></pre>
    <p><code>b4</code> is a separate tool that fetches threaded patches and applies in order, recommended for kernel-style workflows.</p>
    <h2>Reset behavior</h2>
    <p>If <code>git am</code> hits a conflict, it leaves you mid-apply. Recover:</p>
    <pre><code>git am --abort       # restore pre-am state
    git am --skip        # skip this patch, move to next
    git am --continue    # after editing files</code></pre>
    <h2>Whitespace handling</h2>
    <pre><code>git am --whitespace=warn out/*.patch
    git am --whitespace=fix out/*.patch
    git am --ignore-whitespace out/*.patch</code></pre>
    <h2>Common mistakes</h2>
    <p>Applying patches in the wrong order — mbox files are usually pre-numbered (<code>0001-</code>, <code>0002-</code>); preserve order. Forgetting <code>--3way</code> when the patch was generated against a different base. Mixed line endings: <code>--keep-cr</code> or pre-normalization fixes most cases. Reapplying a patch that was already applied silently no-ops or conflicts.</p>
    <h2>Related</h2>
    <p>See "Generating and applying patches" and "Maintaining a patch series with git format-patch".</p>

- title: "Maintaining a patch series with git format-patch"
  section: "Advanced"
  difficulty: "Advanced"
  git_version: "2.30+"
  weight: 310
  body: |
    <h2>Series-driven development</h2>
    <p>Many projects review patches by series, not by branch. You publish v1, get feedback, revise, send v2, repeat until merged. Git provides first-class tools for this loop.</p>
    <h2>Generating a series</h2>
    <pre><code>git format-patch -o out/v1 main
    git format-patch -o out/v1 --cover-letter --thread main
    git format-patch -o out/v1 --subject-prefix='PATCH v1' main</code></pre>
    <p>Use <code>--cover-letter</code> to generate a 0000-cover-letter.patch you can edit with a series-wide intro. <code>--thread</code> wires Message-IDs together so mail clients display the series as a thread.</p>
    <h2>Sending</h2>
    <pre><code>git send-email out/v1/*.patch \
      --to=maintainer@example.com \
      --cc=list@example.com</code></pre>
    <p>Configure SMTP once in <code>~/.gitconfig</code>:</p>
    <pre><code>[sendemail]
    smtpserver = smtp.example.com
    smtpuser = you@example.com
    smtpencryption = tls
    smtpserverport = 587</code></pre>
    <h2>Iteration</h2>
    <p>After feedback, revise via <code>git rebase -i</code> with autosquash, then publish v2:</p>
    <pre><code>git format-patch -o out/v2 --subject-prefix='PATCH v2' \
      --cover-letter --thread \
      --in-reply-to=&lt;v1-message-id&gt; main</code></pre>
    <p>Pre-fill the cover letter's diff between versions:</p>
    <pre><code>git range-diff main..v1 main..HEAD</code></pre>
    <p>Paste the output into the cover letter to show reviewers exactly what changed since v1.</p>
    <h2>Reroll prefix</h2>
    <pre><code>git format-patch -v3 -o out/v3 main</code></pre>
    <p>The <code>-v3</code> shorthand sets the subject prefix to <code>PATCH v3</code> automatically.</p>
    <h2>Tracking acks</h2>
    <p>When reviewers reply with Reviewed-by or Acked-by, fold those trailers into the commits:</p>
    <pre><code>git interpret-trailers --in-place --trailer 'Reviewed-by: Alice &lt;a@x&gt;' &lt;commit&gt;</code></pre>
    <h2>Common mistakes</h2>
    <p>Forgetting <code>--in-reply-to</code> on rerolls — the new series fails to thread under the old. Skipping the cover letter when sending three or more patches; reviewers want context. Not running <code>./scripts/checkpatch.pl</code> or equivalent before send. Sending without testing on the project's expected base; configure <code>format.useAutoBase</code>.</p>
    <h2>Related</h2>
    <p>See "Git am: applying mailbox patches", "Git range-diff: comparing revision series", and "Generating and applying patches".</p>

- title: "Git range-diff: comparing revision series"
  section: "Advanced"
  difficulty: "Advanced"
  git_version: "2.30+"
  weight: 320
  body: |
    <h2>Diffing diffs</h2>
    <p><code>git range-diff</code> (introduced in Git 2.19) compares two ranges of commits, pairing them by similarity and showing the inter-version changes. It is indispensable when reviewing patch series rerolls or comparing rebased branches.</p>
    <h2>Basic invocation</h2>
    <pre><code>git range-diff main..topic-v1 main..topic-v2
    git range-diff topic-v1...topic-v2
    git range-diff origin/main...HEAD</code></pre>
    <p>The triple-dot form takes a single argument: the symmetric difference around a base. Useful when both topic branches share that base.</p>
    <h2>Reading the output</h2>
    <p>Each line begins with a pair of indices and a status:</p>
    <ul>
      <li><code>=</code> commit unchanged.</li>
      <li><code>!</code> commit modified — followed by the inter-diff.</li>
      <li><code>&lt;</code> commit only in the first range.</li>
      <li><code>&gt;</code> commit only in the second range.</li>
    </ul>
    <h2>Practical use: pre-merge review</h2>
    <p>Before force-pushing a rebased PR, sanity-check what changed:</p>
    <pre><code>git range-diff @{u}...HEAD</code></pre>
    <p>This compares the upstream branch tip to your local HEAD, showing exactly which commits moved, were rewritten, or were added.</p>
    <h2>In cover letters</h2>
    <p>For mailing-list workflows, paste range-diff output into the v2 cover letter:</p>
    <pre><code>git range-diff main..topic-v1 main..topic-v2 &gt;&gt; out/v2/0000-cover-letter.patch</code></pre>
    <p>Reviewers see the per-commit changes since v1 without re-reading the full series.</p>
    <h2>Tuning</h2>
    <pre><code>git range-diff --creation-factor=70 main..a main..b
    git range-diff --no-color-moved main..a main..b
    git range-diff --left-only main..a main..b</code></pre>
    <p><code>--creation-factor</code> controls how aggressively commits are paired by similarity (higher means more willing to pair near-rewrites; default 60).</p>
    <h2>Common mistakes</h2>
    <p>Comparing across different bases without realizing it — range-diff implicitly aligns by content but a different base can produce noisy "modified" markers. Misreading <code>=</code> as "identical" — it means content-equivalent; the SHAs may differ. Using triple-dot when the two branches do not share a base; results will confuse rather than illuminate.</p>
    <h2>Related</h2>
    <p>See "Maintaining a patch series with git format-patch", "Interactive rebase mastery", and "Advanced git log: formatting, filtering, and graph".</p>

- title: "Git notes: attaching metadata to commits"
  section: "Advanced"
  difficulty: "Advanced"
  git_version: "2.30+"
  weight: 330
  body: |
    <h2>Notes without rewriting</h2>
    <p><code>git notes</code> attaches arbitrary metadata to existing commits without changing their SHAs. Reviews, build statuses, sign-offs, performance metrics — anything you want associated with a commit can live in notes. They are stored in the special ref <code>refs/notes/commits</code> by default.</p>
    <h2>Adding and editing</h2>
    <pre><code>git notes add -m "Reviewed by team Phoenix" &lt;sha&gt;
    git notes append -m "QA passed" &lt;sha&gt;
    git notes edit &lt;sha&gt;
    git notes show &lt;sha&gt;
    git notes remove &lt;sha&gt;</code></pre>
    <h2>Using namespaces</h2>
    <p>Notes can live under multiple refs, one per "channel":</p>
    <pre><code>git notes --ref=builds add -m "build #1234 OK" &lt;sha&gt;
    git notes --ref=reviews add -m "LGTM" &lt;sha&gt;
    git config notes.displayRef "refs/notes/*"</code></pre>
    <p><code>notes.displayRef</code> tells <code>git log</code> which note refs to show.</p>
    <h2>Showing in log</h2>
    <pre><code>git log --notes
    git log --show-notes=builds
    git log --pretty=format:'%h %s%n%N' --notes</code></pre>
    <p>The <code>%N</code> placeholder expands to all visible notes for that commit.</p>
    <h2>Sharing notes</h2>
    <p>Notes refs are not fetched by default. Configure explicit fetch refspecs:</p>
    <pre><code>git config --add remote.origin.fetch '+refs/notes/*:refs/notes/*'
    git fetch
    git push origin 'refs/notes/*'</code></pre>
    <h2>Use case: CI annotations</h2>
    <p>A CI system can post results back as notes:</p>
    <pre><code>git notes --ref=ci add -m "duration=312s status=pass coverage=87%" &lt;sha&gt;
    git push origin refs/notes/ci</code></pre>
    <p>Developers fetch the notes channel to see results inline with <code>git log</code>.</p>
    <h2>Merging notes</h2>
    <p>If two collaborators add notes to the same commit on different clones, fetching one over the other may conflict. Resolve with:</p>
    <pre><code>git notes merge -s union refs/notes/origin/commits</code></pre>
    <p>Strategies: <code>manual</code> (default), <code>ours</code>, <code>theirs</code>, <code>union</code>, <code>cat_sort_uniq</code>.</p>
    <h2>Common mistakes</h2>
    <p>Expecting notes to travel with <code>git push</code> automatically — they do not. Configure refspecs explicitly. Believing notes are immutable like commits; they are versioned in their own ref but rewritable. Putting confidential data in notes — they share the repo's distribution model.</p>
    <h2>Related</h2>
    <p>See "Advanced git log: formatting, filtering, and graph" and "Git internals: references and the reflog".</p>

- title: "Git archive and bundle for distribution"
  section: "Advanced"
  difficulty: "Advanced"
  git_version: "2.30+"
  weight: 340
  body: |
    <h2>Two formats, two purposes</h2>
    <p><code>git archive</code> produces a tar or zip snapshot of a tree — code without history, perfect for releases. <code>git bundle</code> produces a portable transport file containing objects and refs — perfect for offline transfer of an entire repo or update.</p>
    <h2>Archive examples</h2>
    <pre><code>git archive --format=tar.gz -o release-1.0.tar.gz v1.0.0
    git archive --format=zip --prefix=myapp-1.0/ -o myapp-1.0.zip HEAD
    git archive --format=tar HEAD src/ | tar -xC /tmp/snapshot</code></pre>
    <p><code>--prefix</code> wraps the contents in a top-level directory, so extraction does not splatter into the current dir.</p>
    <h2>Excluding files from archives</h2>
    <p>Use <code>.gitattributes</code>:</p>
    <pre><code>tests/      export-ignore
    .github/    export-ignore
    *.dev.json  export-ignore</code></pre>
    <p>And substitute placeholders into a release file with <code>export-subst</code>. See "Gitattributes: line endings, exports, and encoding".</p>
    <h2>Bundle for offline transfer</h2>
    <pre><code>git bundle create repo.bundle --all
    git bundle create incr.bundle main ^origin/main     # only new commits
    git bundle verify repo.bundle
    git clone repo.bundle myrepo                        # clone from bundle
    git fetch repo.bundle main:imported                 # fetch into existing</code></pre>
    <p>Bundles let you sneakernet repository updates across air-gapped networks.</p>
    <h2>Use case: ship to embargoed customer</h2>
    <p>Generate a bundle of the release branch and email or sftp it. The customer fetches from the bundle into their clone:</p>
    <pre><code>git bundle create v1.2.bundle main --tags
    git fetch v1.2.bundle '+refs/heads/*:refs/remotes/upstream/*' '+refs/tags/*:refs/tags/*'</code></pre>
    <h2>Reproducible archives</h2>
    <p>Default <code>git archive</code> embeds the commit time. For bit-identical builds across machines, set:</p>
    <pre><code>git archive --format=tar.gz \
      --output=src.tar.gz \
      --prefix=src/ HEAD
    # or use git's reproducible flags + GNU tar --sort=name --mtime=...</code></pre>
    <h2>Common mistakes</h2>
    <p>Confusing <code>git archive</code> (no history) with <code>git bundle</code> (full history). Forgetting <code>--prefix</code> producing a "tarbomb." Generating bundles missing prerequisites: an incremental bundle requires the receiver to have the negation point's history, or the bundle is unusable.</p>
    <h2>Related</h2>
    <p>See "Gitattributes: line endings, exports, and encoding" and "Ahead-of-time packfile building with git fast-export".</p>

- title: "Advanced stash usage"
  section: "Advanced"
  difficulty: "Advanced"
  git_version: "2.30+"
  weight: 350
  body: |
    <h2>Beyond git stash pop</h2>
    <p>Stash is more capable than the basic save/pop you usually see. Used well, it is a personal scratchpad for context switches that beats committing WIP into the branch.</p>
    <h2>Saving with intent</h2>
    <pre><code>git stash push -m "WIP: parser refactor"
    git stash push -m "config tweaks" -- src/config/
    git stash push -k -m "without staged"      # keep staged
    git stash push -u -m "include untracked"
    git stash push -a -m "include ignored"</code></pre>
    <p><code>--keep-index</code> stashes the working tree but leaves staged changes intact, useful when you want to verify a partial commit.</p>
    <h2>Listing and inspecting</h2>
    <pre><code>git stash list
    git stash show stash@{2}             # diffstat
    git stash show -p stash@{2}          # full patch
    git diff stash@{0}^1 stash@{0}       # diff against base</code></pre>
    <h2>Apply, pop, branch</h2>
    <pre><code>git stash apply              # apply, keep on stash
    git stash pop                # apply, drop
    git stash apply stash@{3}
    git stash branch fix-bug stash@{1}    # branch off stash base, apply</code></pre>
    <p><code>git stash branch</code> is the cleanest way to recover from "I stashed in the wrong branch."</p>
    <h2>Partial stash</h2>
    <p>Stash interactively, choosing hunks like <code>git add -p</code>:</p>
    <pre><code>git stash push -p</code></pre>
    <h2>Conflict resolution</h2>
    <p>Pop applies via merge; conflicts mark the file unmerged in the index. The stash entry is preserved unless pop succeeds, so you can:</p>
    <pre><code>git stash apply           # try again with a different branch
    git stash pop --index     # try restoring the original staging</code></pre>
    <h2>Cleanup</h2>
    <pre><code>git stash drop stash@{4}
    git stash clear                # nuke all
    git reflog show stash          # auditing</code></pre>
    <h2>Use case: rebuild before review</h2>
    <p>You're mid-feature when CI tells you a CI-only fix is needed. Stash, switch branches, fix, push, pop:</p>
    <pre><code>git stash push -u -m "feature WIP"
    git checkout main &amp;&amp; git pull
    git switch -c ci-fix
    # fix + commit + push
    git checkout feature
    git stash pop</code></pre>
    <h2>Common mistakes</h2>
    <p>Stashing with untracked files but no <code>-u</code> — those files stay in your tree and confuse subsequent operations. Treating stash as long-term storage; reflog expiry can prune unreachable stashes. Forgetting that pop can leave conflicts; check <code>git status</code>.</p>
    <h2>Related</h2>
    <p>See "Worktrees: multiple checkouts of one repo" for an alternative to stashing.</p>

- title: "Sparse checkout: working with subsets of a large repo"
  section: "Advanced"
  difficulty: "Advanced"
  git_version: "2.30+"
  weight: 360
  body: |
    <h2>Why sparse</h2>
    <p>Sparse checkout populates only a subset of a repo's working tree, while keeping all metadata and history. For monorepos, this can mean checking out 1% of files and ignoring the other 99%, drastically speeding up <code>git status</code>, IDE indexing, and disk usage.</p>
    <h2>Cone mode</h2>
    <p>Modern Git (2.25+) introduces "cone mode" which restricts patterns to whole directories rather than arbitrary globs, in exchange for far better performance.</p>
    <pre><code>git sparse-checkout init --cone
    git sparse-checkout set apps/web libs/shared
    git sparse-checkout add apps/admin
    git sparse-checkout list</code></pre>
    <p>The cone covers all files at the root and inside the listed directories.</p>
    <h2>Non-cone mode</h2>
    <p>For arbitrary patterns, omit <code>--cone</code> and edit <code>.git/info/sparse-checkout</code> directly. Useful for include/exclude patterns:</p>
    <pre><code>git sparse-checkout init
    cat &gt; .git/info/sparse-checkout &lt;&lt;'EOF'
    /*
    !/build/
    !/legacy/
    EOF
    git read-tree -m -u HEAD</code></pre>
    <h2>Cloning sparse</h2>
    <pre><code>git clone --filter=blob:none --no-checkout https://example.com/big.git
    cd big
    git sparse-checkout init --cone
    git sparse-checkout set apps/web
    git checkout main</code></pre>
    <p>Combined with partial clone (<code>--filter=blob:none</code>), you fetch only the blobs you need on demand. See "Partial clone: promise and promisor remotes".</p>
    <h2>Checking the index</h2>
    <p>Files outside the sparse cone are marked with skip-worktree in the index:</p>
    <pre><code>git ls-files -t | head
    git update-index --skip-worktree path
    git update-index --no-skip-worktree path</code></pre>
    <h2>Disabling</h2>
    <pre><code>git sparse-checkout disable</code></pre>
    <p>Restores the full working tree.</p>
    <h2>Common mistakes</h2>
    <p>Editing files outside the cone — they may exist if previously checked out but are not tracked by sparse mode; commit unexpected behavior. Use cone mode unless patterns truly require it; non-cone is much slower. Forgetting that <code>git add</code> warns when you stage a path outside the sparse set unless <code>core.sparseCheckoutCone=true</code> is set.</p>
    <h2>Sparse index</h2>
    <p>Pair sparse checkout with the sparse index to skip recording the excluded paths in the index entirely:</p>
    <pre><code>git sparse-checkout init --cone --sparse-index
    git config index.sparse true</code></pre>
    <p>See "The sparse index: operating without a full index".</p>
    <h2>Related</h2>
    <p>See "Sparse checkout for monorepos" and "Partial clone: promise and promisor remotes".</p>

- title: "Multiple remote workflows"
  section: "Advanced"
  difficulty: "Advanced"
  git_version: "2.30+"
  weight: 370
  body: |
    <h2>Why multiple remotes</h2>
    <p>Real workflows often involve more than one remote: an <code>origin</code> for your fork, an <code>upstream</code> for the canonical repo, plus mirrors, deploy targets, and per-environment forks. Git treats remotes as named bundles of fetch and push refspecs, and you can have as many as you like.</p>
    <h2>Adding remotes</h2>
    <pre><code>git remote add origin git@github.com:you/fork.git
    git remote add upstream https://github.com/org/repo.git
    git remote add deploy git@deploy.example.com:app.git
    git remote -v</code></pre>
    <h2>Fetching from all</h2>
    <pre><code>git fetch --all --prune
    git remote update --prune
    git fetch upstream main:main         # update local main to upstream's tip</code></pre>
    <h2>Tracking the right thing</h2>
    <p>Push and pull defaults can be set per branch:</p>
    <pre><code>git branch --set-upstream-to=origin/main main
    git push -u origin feature
    git config branch.feature.remote origin
    git config branch.feature.merge refs/heads/feature</code></pre>
    <h2>Different push and pull URLs</h2>
    <pre><code>git remote set-url --push origin git@github.com:you/fork.git
    git remote set-url origin https://github.com/you/fork.git</code></pre>
    <p>Useful when you fetch via HTTPS for speed but push via SSH for auth.</p>
    <h2>Mirroring</h2>
    <pre><code>git remote add mirror --mirror=push git@gitlab.example.com:org/repo.git
    git push mirror</code></pre>
    <p>Mirror remotes copy all refs verbatim — branches, tags, notes — making them ideal for backups.</p>
    <h2>Triangular workflow</h2>
    <p>The classic open-source flow: fetch from upstream, push to your fork. Configure once:</p>
    <pre><code>git config remote.pushDefault origin
    git config push.default current</code></pre>
    <p>Now <code>git fetch</code> updates from <code>upstream</code> if that is your branch's upstream, while <code>git push</code> goes to <code>origin</code>.</p>
    <h2>Per-remote credentials</h2>
    <p>Use the <code>credential.helper</code> with URL-specific config:</p>
    <pre><code>[credential "https://github.com"]
    helper = osxkeychain
    [credential "https://gitlab.example.com"]
    helper = !pass-git-helper</code></pre>
    <h2>Common mistakes</h2>
    <p>Pushing to <code>upstream</code> by mistake when you meant <code>origin</code>; set <code>remote.pushDefault</code>. Adding a remote without fetching, then being surprised refs are missing. Mixing <code>--mirror</code> on a clone you also work on; mirror clones are bare and meant for replication.</p>
    <h2>Related</h2>
    <p>See "Contributing to open source with Git" and "Advanced gitconfig techniques".</p>

- title: "Git in a monorepo"
  section: "Advanced"
  difficulty: "Advanced"
  git_version: "2.30+"
  weight: 380
  body: |
    <h2>Monorepo realities</h2>
    <p>A monorepo holds many projects in one repository — better refactors, atomic cross-project changes, single dependency graph. The cost: scale. Repos can grow to gigabytes and millions of files, where naive Git becomes painful. The good news: modern Git has tools designed for exactly this.</p>
    <h2>The performance stack</h2>
    <ul>
      <li><strong>Sparse checkout (cone mode)</strong>: only check out the directories you work on.</li>
      <li><strong>Sparse index</strong>: skip non-sparse paths in the index entirely (Git 2.37+).</li>
      <li><strong>Partial clone</strong>: fetch blobs lazily, on demand.</li>
      <li><strong>Commit-graph + Bloom filters</strong>: fast log/blame on subsets.</li>
      <li><strong>Fsmonitor</strong>: O(1) <code>git status</code> via OS file change events.</li>
      <li><strong>Background maintenance</strong>: keep gc, repacking, and indexes fresh.</li>
    </ul>
    <h2>One-shot setup</h2>
    <pre><code>git clone --filter=blob:none --sparse https://example.com/big.git
    cd big
    git sparse-checkout init --cone --sparse-index
    git sparse-checkout set apps/web libs/ui
    git config feature.manyFiles true
    git config core.fsmonitor true
    git config core.untrackedCache true
    git maintenance start</code></pre>
    <p><code>feature.manyFiles</code> turns on a bundle of optimizations including <code>index.version=4</code> and <code>core.untrackedCache</code>.</p>
    <h2>CODEOWNERS and branch protection</h2>
    <p>Monorepos rely on per-directory ownership. Combine GitHub/GitLab CODEOWNERS files with required reviews so only the right teams gate the right paths. Couple with required CI checks per path.</p>
    <h2>Path-aware CI</h2>
    <p>Use <code>git diff --name-only origin/main..HEAD</code> in CI to only test changed projects:</p>
    <pre><code>changed=$(git diff --name-only origin/main..HEAD | cut -d/ -f1 | sort -u)
    for pkg in $changed; do
      [ -f "$pkg/Makefile" ] &amp;&amp; make -C "$pkg" test
    done</code></pre>
    <h2>Tooling layer</h2>
    <p>Build orchestrators (Bazel, Buck2, Pants, Nx, Turborepo) consume the diff and re-run only affected targets. Microsoft's Scalar (now bundled with Git) bundles many of the above settings into one command. See "Scalar: batteries-included large repo management".</p>
    <h2>Common mistakes</h2>
    <p>Treating a monorepo like a small repo and skipping the optimizations — operations get exponentially slower as files multiply. Mixing many small fork-style branches into the same shared remote: rely on PR-based workflows. Forgetting that <code>git status</code> times include kernel work; fsmonitor solves it. Underestimating gc time on a multi-gigabyte repo; let background maintenance handle it.</p>
    <h2>Related</h2>
    <p>See "Sparse checkout for monorepos", "The sparse index: operating without a full index", "Partial clone: promise and promisor remotes", and "Scalar: batteries-included large repo management".</p>

- title: "Contributing to open source with Git"
  section: "Advanced"
  difficulty: "Intermediate"
  git_version: "2.30+"
  weight: 390
  body: |
    <h2>The fork-and-PR pattern</h2>
    <p>Most platforms expect this flow: fork the upstream repo, clone your fork, branch for the change, push, open a pull request. Git treats it as a triangular workflow with two remotes.</p>
    <h2>Setup</h2>
    <pre><code>git clone git@github.com:you/project.git
    cd project
    git remote add upstream https://github.com/org/project.git
    git fetch upstream
    git checkout -b fix/typo upstream/main</code></pre>
    <p>Branching off <code>upstream/main</code> rather than <code>origin/main</code> ensures you start from the canonical tip, not your possibly-stale fork.</p>
    <h2>Keeping up to date</h2>
    <pre><code>git fetch upstream
    git rebase upstream/main
    git push --force-with-lease origin fix/typo</code></pre>
    <p><code>--force-with-lease</code> refuses to overwrite remote work you have not seen, a safer alternative to <code>--force</code>.</p>
    <h2>Crafting commits</h2>
    <p>Open-source projects expect clean history. Use small, well-described commits with imperative-mood subjects under 72 chars and bodies explaining "why." Sign off with DCO when required:</p>
    <pre><code>git commit -s -m "fix(parser): handle empty input

    Reject empty buffer with InvalidInput rather than panicking. Adds a
    regression test in tests/parser/empty.rs.

    Closes #1234"</code></pre>
    <h2>Mailing-list projects</h2>
    <p>For projects like Linux, use <code>git format-patch</code> and <code>git send-email</code>. See "Maintaining a patch series with git format-patch".</p>
    <h2>Reviewing feedback</h2>
    <p>Use fixup commits and autosquash:</p>
    <pre><code>git commit --fixup=&lt;sha&gt;
    git rebase -i --autosquash upstream/main
    git push --force-with-lease</code></pre>
    <p>Pair with <code>git range-diff</code> to show reviewers what changed since the last revision. See "Git range-diff: comparing revision series".</p>
    <h2>Sign-off and trailers</h2>
    <pre><code>git config --global format.signOff true
    git commit --amend --no-edit --trailer 'Reviewed-by: Alice &lt;a@x&gt;'
    git interpret-trailers --in-place --trailer 'Cc: maintainers@list' COMMIT_MSG</code></pre>
    <h2>Common mistakes</h2>
    <p>Branching off your fork's <code>main</code> when it is months behind; always sync from upstream first. Force-pushing without <code>--force-with-lease</code>; you can clobber a reviewer's edits. Mixing unrelated changes in one PR — split via <code>git rebase -i</code> with <code>edit</code> verbs. Forgetting the project's CONTRIBUTING.md style guide.</p>
    <h2>Related</h2>
    <p>See "Multiple remote workflows", "Interactive rebase mastery", and "GPG signing commits and tags".</p>

- title: "Advanced gitconfig techniques"
  section: "Advanced"
  difficulty: "Advanced"
  git_version: "2.30+"
  weight: 400
  body: |
    <h2>Configuration layers</h2>
    <p>Git reads config from multiple files in order: system, global (<code>~/.gitconfig</code>), local (<code>.git/config</code>), worktree (when enabled), and command-line (<code>-c</code>). Later layers override earlier. Inspect with <code>git config --list --show-origin</code>.</p>
    <h2>Conditional includes</h2>
    <p>Apply different settings per directory tree — different signing keys for work and personal, for example:</p>
    <pre><code>[includeIf "gitdir:~/work/"]
    path = ~/.gitconfig.work
    [includeIf "gitdir:~/personal/"]
    path = ~/.gitconfig.personal
    [includeIf "onbranch:release/*"]
    path = ~/.gitconfig.release
    [includeIf "hasconfig:remote.*.url:git@github.com:work-org/**"]
    path = ~/.gitconfig.work</code></pre>
    <p><code>onbranch</code> (Git 2.23+) and <code>hasconfig</code> (Git 2.36+) extend the conditional vocabulary.</p>
    <h2>Aliases that compose</h2>
    <pre><code>[alias]
    co = checkout
    cm = commit -v
    st = status -sb
    lg = log --graph --pretty=format:'%C(auto)%h %ad %s %d' --date=short
    last = log -1 HEAD --stat
    unstage = reset HEAD --
    # Shell-out alias
    sync = "!f() { git fetch --all --prune &amp;&amp; git rebase --autostash @{u}; }; f"
    publish = "!git push -u origin $(git symbolic-ref --short HEAD)"</code></pre>
    <p>Prefix with <code>!</code> to run an arbitrary shell command, with the repo as cwd.</p>
    <h2>URL rewriting</h2>
    <p>Force HTTPS to SSH (or vice versa) for an organization:</p>
    <pre><code>[url "git@github.com:"]
    insteadOf = https://github.com/
    [url "https://github.com/"]
    pushInsteadOf = git@github.com:</code></pre>
    <h2>Per-worktree config</h2>
    <pre><code>git config extensions.worktreeConfig true
    git config --worktree user.email contractor@client.com</code></pre>
    <h2>Sensible defaults</h2>
    <pre><code>[core]
    autocrlf = input
    fsmonitor = true
    untrackedCache = true
    [merge]
    conflictStyle = zdiff3
    ff = false
    [pull]
    rebase = true
    [rebase]
    autoSquash = true
    autoStash = true
    updateRefs = true
    [push]
    autoSetupRemote = true
    default = current
    [fetch]
    prune = true
    parallel = 0
    [diff]
    algorithm = histogram
    colorMoved = default
    submodule = log
    [init]
    defaultBranch = main
    [advice]
    detachedHead = false
    [feature]
    manyFiles = true</code></pre>
    <h2>Inspecting</h2>
    <pre><code>git config --list --show-origin
    git config --get-all alias.lg
    git config --show-scope user.email
    git -c user.email=other@x commit -m "ad-hoc identity"</code></pre>
    <h2>Common mistakes</h2>
    <p>Setting credentials in committed files. Mixing <code>pull.rebase=true</code> with workflows that expect merges; align with your team. Forgetting that <code>--global</code> writes to <code>~/.gitconfig</code> while <code>--system</code> writes machine-wide and may need root.</p>
    <h2>Related</h2>
    <p>See "Multiple remote workflows", "GPG signing commits and tags", and "SSH signing (Git 2.34+)".</p>

- title: "Why Git performance matters at scale"
  section: "Performance"
  difficulty: "Intermediate"
  git_version: "2.30+"
  weight: 10
  body: |
    <h2>Linear tools, exponential repos</h2>
    <p>Git was originally tuned for the Linux kernel — large by 2005 standards but tiny by today's. Modern repos can hold millions of files, hundreds of gigabytes of history, and tens of thousands of refs. Many Git operations were O(working tree size) or O(history) by default, and at scale they became visibly slow. Performance work since 2018 has added optional features that turn many operations into O(changed) rather than O(total).</p>
    <h2>Where time goes</h2>
    <p>Common slow paths:</p>
    <ul>
      <li><code>git status</code> walks the working tree to detect changes.</li>
      <li><code>git log</code>, <code>git blame</code>, and merge-base calculations walk commit graphs.</li>
      <li><code>git fetch</code> negotiates with the server over many ref changes.</li>
      <li><code>git gc</code> repacks every object, even unchanged ones.</li>
      <li>The index is read and written many times per command, and grows linearly with tree size.</li>
    </ul>
    <h2>Measuring</h2>
    <p>Before tuning, measure. Trace2 emits structured events for every Git invocation:</p>
    <pre><code>GIT_TRACE2_PERF=1 git status
    GIT_TRACE2_EVENT=/tmp/trace.json git status
    git -c trace2.eventTarget=/tmp/trace git fetch</code></pre>
    <p>See "Measuring Git performance with Trace2" for analysis.</p>
    <h2>The performance toolbox</h2>
    <p>Modern Git provides:</p>
    <ul>
      <li><strong>commit-graph</strong>: precomputed reachability data.</li>
      <li><strong>changed-path Bloom filters</strong>: skip irrelevant commits in <code>log -- path</code>.</li>
      <li><strong>multi-pack-index</strong>: one lookup index across many packs.</li>
      <li><strong>reachability bitmaps</strong>: O(1) set operations on huge histories.</li>
      <li><strong>fsmonitor</strong>: filesystem change notifications instead of stat walking.</li>
      <li><strong>partial clone</strong> and <strong>sparse index</strong>: shrink local data.</li>
      <li><strong>geometric repack</strong>: avoid full repack costs.</li>
      <li><strong>protocol v2</strong>: efficient ref negotiation.</li>
      <li><strong>git maintenance</strong>: keep all of this fresh in the background.</li>
    </ul>
    <h2>Quick wins</h2>
    <pre><code>git config feature.manyFiles true
    git config core.fsmonitor true
    git config core.untrackedCache true
    git config index.version 4
    git maintenance start</code></pre>
    <p>For most users, this trio cuts <code>git status</code> from seconds to milliseconds on repos with hundreds of thousands of files.</p>
    <h2>Common mistakes</h2>
    <p>Tuning before measuring. Enabling features without understanding them — for example, <code>core.fsmonitor=true</code> requires Git 2.37+ for the built-in daemon; older versions need an external one. Skipping <code>git maintenance start</code>, leaving the commit-graph and MIDX stale.</p>
    <h2>Related</h2>
    <p>See every page in this section. Start with "Measuring Git performance with Trace2".</p>

- title: "Measuring Git performance with Trace2"
  section: "Performance"
  difficulty: "Advanced"
  git_version: "2.30+"
  weight: 20
  body: |
    <h2>The Trace2 facility</h2>
    <p>Trace2 (introduced in Git 2.22) is the structured tracing facility built into Git. It emits region begin/end events, child process tracking, and timing information in a stable schema, suitable for both human inspection and automated analysis.</p>
    <h2>Three flavors</h2>
    <ul>
      <li><code>GIT_TRACE2</code>: human-readable text.</li>
      <li><code>GIT_TRACE2_PERF</code>: text with timing columns.</li>
      <li><code>GIT_TRACE2_EVENT</code>: JSON, one event per line.</li>
    </ul>
    <pre><code>GIT_TRACE2=1 git status
    GIT_TRACE2_PERF=/tmp/perf.log git fetch
    GIT_TRACE2_EVENT=/tmp/event.jsonl git log --oneline | head</code></pre>
    <p>Set the variable to <code>1</code>, <code>2</code>, or <code>true</code> for stderr; an absolute path writes to a file; a directory accumulates one file per invocation.</p>
    <h2>Persistent config</h2>
    <pre><code>[trace2]
    perfTarget = ~/git-trace/
    eventTarget = ~/git-trace/
    eventNesting = 4
    maxFiles = 200</code></pre>
    <p>Auto-deleted after <code>maxFiles</code> rotations.</p>
    <h2>Reading the perf format</h2>
    <p>Each line shows depth-indented region timing:</p>
    <pre><code>14:23:01.000 |  d0 | main         |  start  |  ... | git status
    14:23:01.012 |  d0 | main         | region_enter |  | label:read_directory
    14:23:01.220 |  d0 | main         | region_leave |  | label:read_directory
    14:23:01.230 |  d0 | main         | exit         |  | code:0
    14:23:01.230 |  d0 | main         | atexit       |  | code:0</code></pre>
    <p>Look for the longest <code>region_enter</code>/<code>leave</code> spans — those are the bottlenecks.</p>
    <h2>JSON analysis</h2>
    <pre><code>jq -c 'select(.event=="region_leave") | {label, t_rel}' /tmp/event.jsonl
    jq -s 'group_by(.label) | map({label:.[0].label, total:(map(.t_rel) | add)})' /tmp/event.jsonl</code></pre>
    <h2>What to measure</h2>
    <ul>
      <li><strong>git status</strong> on a fresh checkout vs after enabling fsmonitor.</li>
      <li><strong>git log -- path</strong> with and without changed-path Bloom filters.</li>
      <li><strong>git fetch</strong> before and after MIDX and reachability bitmaps.</li>
      <li><strong>git gc</strong> with geometric vs full repack.</li>
    </ul>
    <h2>Common mistakes</h2>
    <p>Only collecting one sample — caches and warm filesystem dramatically affect numbers. Run cold and warm. Forgetting to restart the fsmonitor daemon after changing config; it keeps a stale view. Comparing across Git versions without holding the repo state constant.</p>
    <h2>External tooling</h2>
    <p>Tools like <code>git-trace2-tools</code> on GitHub turn JSON streams into flame graphs. Microsoft's <code>git-fast-stats</code> aggregates across many runs.</p>
    <h2>Related</h2>
    <p>See "Why Git performance matters at scale" for the high-level map.</p>

- title: "The commit-graph: faster reachability queries"
  section: "Performance"
  difficulty: "Advanced"
  git_version: "2.30+"
  weight: 30
  body: |
    <h2>The reachability bottleneck</h2>
    <p>Many Git operations need to answer "is commit X reachable from commit Y?" or "which commit is the merge base?" Naively this means walking the commit graph from raw object reads — slow on large repos. The commit-graph file precomputes parent pointers, generation numbers, and (optionally) Bloom filters into a binary side file.</p>
    <h2>Where it lives</h2>
    <p>Older Git: <code>.git/objects/info/commit-graph</code> (single file). Newer Git: <code>.git/objects/info/commit-graphs/</code> (chained, allowing incremental writes).</p>
    <h2>Writing the graph</h2>
    <pre><code>git commit-graph write --reachable --changed-paths
    git commit-graph verify
    git commit-graph write --split=replace --reachable --changed-paths</code></pre>
    <p><code>--reachable</code> includes all ref-reachable commits. <code>--changed-paths</code> adds Bloom filters. <code>--split</code> creates incremental layers.</p>
    <h2>Auto-write</h2>
    <pre><code>git config core.commitGraph true
    git config gc.writeCommitGraph true
    git config fetch.writeCommitGraph true</code></pre>
    <p>Enabled by default in Git 2.24+ on most installs. Verify with <code>git config --show-origin core.commitGraph</code>.</p>
    <h2>Generation numbers</h2>
    <p>Each commit gets a topological generation number. Comparing them lets Git skip whole graph regions during walks. The "corrected commit date" generation (Git 2.30+) further accelerates queries by combining generation with committer date.</p>
    <h2>Performance impact</h2>
    <p>On Linux's repo (over a million commits), <code>git log --oneline | head</code> drops from seconds to milliseconds. <code>git merge-base</code> drops similarly. Tag listing on huge repos becomes near-instant.</p>
    <h2>Measurement</h2>
    <pre><code>git -c core.commitGraph=false log -100 --pretty=oneline &gt;/dev/null
    time git -c core.commitGraph=false log --oneline | head -10000 &gt;/dev/null
    time git log --oneline | head -10000 &gt;/dev/null</code></pre>
    <p>Compare the two — usually 5-50x speedup.</p>
    <h2>Common mistakes</h2>
    <p>Forgetting to write the graph after a big push or rebase; <code>fetch.writeCommitGraph=true</code> automates it. Disabling <code>core.commitGraph</code> for a "fresh test" without realizing many other features depend on it. Stale graphs after rewriting history; let <code>git maintenance</code> handle this.</p>
    <h2>Related</h2>
    <p>See "Changed-path Bloom filters in the commit-graph" and "Background maintenance: git maintenance run/start/stop".</p>

- title: "Changed-path Bloom filters in the commit-graph"
  section: "Performance"
  difficulty: "Expert"
  git_version: "2.27+"
  weight: 40
  body: |
    <h2>The path-restricted log problem</h2>
    <p><code>git log -- path/to/file</code> must, in principle, walk every commit, diff each against its parent, and emit those that touched <code>path/to/file</code>. On large repos this is dominated by tree comparisons. Changed-path Bloom filters (Git 2.27+) accelerate this dramatically by storing, for each commit, a probabilistic set of paths it touched.</p>
    <h2>How Bloom filters work</h2>
    <p>A Bloom filter is a small bitmap that returns "definitely not in the set" or "probably in the set" for membership queries. False positives are possible but never false negatives. For a path query, Git first asks the filter; only if the answer is "probably yes" does it perform the expensive tree diff.</p>
    <h2>Enabling</h2>
    <pre><code>git commit-graph write --reachable --changed-paths
    git config commitGraph.changedPathsVersion 2
    git maintenance run --task=commit-graph</code></pre>
    <p>Version 2 (Git 2.39+) uses MurmurHash3 with case-insensitive normalization and is the recommended default. Version 1 is backward-compatible.</p>
    <h2>Verifying</h2>
    <pre><code>GIT_TRACE2_PERF=1 git log -- src/foo.c 2&gt;&amp;1 | grep -i bloom
    git commit-graph verify</code></pre>
    <p>The trace shows hit/miss counts. A well-tuned filter has &gt;95% true negatives, meaning Git skips the tree diff for the vast majority of commits.</p>
    <h2>When it shines</h2>
    <ul>
      <li>Long-lived monorepo with many commits that touch only a few files each.</li>
      <li><code>git log -- src/specific/dir</code> queries.</li>
      <li><code>git blame</code> on individual files (which uses similar machinery).</li>
    </ul>
    <h2>When it does not help</h2>
    <ul>
      <li>Glob/regex paths the filter cannot exact-match.</li>
      <li>Logs without a <code>--</code> path argument — the filter only applies to path-restricted walks.</li>
      <li>Very small repos where the walk is already fast.</li>
    </ul>
    <h2>Memory and disk</h2>
    <p>Filters add roughly 8-12 bytes per commit to the commit-graph file. For a million-commit repo, expect 10MB extra. Set <code>commitGraph.maxNewFilters</code> (Git 2.34+) to throttle how many filters are computed per write, useful when first generating filters on a large repo.</p>
    <pre><code>git config commitGraph.maxNewFilters 50000</code></pre>
    <h2>Common mistakes</h2>
    <p>Writing the graph without <code>--changed-paths</code> — filters are not added by default. Mixing v1 and v2 filters across teammates; let <code>git maintenance</code> upgrade them. Expecting filters to help unrestricted log; they do not.</p>
    <h2>Related</h2>
    <p>See "The commit-graph: faster reachability queries" and "Background maintenance: git maintenance run/start/stop".</p>

- title: "Multi-pack-index (MIDX): unified pack object lookup"
  section: "Performance"
  difficulty: "Advanced"
  git_version: "2.30+"
  weight: 50
  body: |
    <h2>The many-pack problem</h2>
    <p>A repo with many packfiles must search each one to locate an object — a binary search per pack. With dozens or hundreds of packs (common in active repos using geometric repack), this O(packs × log objects) cost adds up. The multi-pack-index (MIDX) consolidates all pack indexes into one binary search, restoring O(log total objects).</p>
    <h2>Writing</h2>
    <pre><code>git multi-pack-index write
    git multi-pack-index verify
    git multi-pack-index expire
    git multi-pack-index repack --batch-size=2g</code></pre>
    <p><code>expire</code> deletes packs whose objects are fully covered by other packs. <code>repack</code> creates new packs containing only the objects from the smallest existing packs, then expires them.</p>
    <h2>Configuration</h2>
    <pre><code>git config core.multiPackIndex true
    git config maintenance.multi-pack-index.enabled true</code></pre>
    <p>On by default in Git 2.30+ for many builds.</p>
    <h2>MIDX bitmap (Git 2.34+)</h2>
    <p>The MIDX file can also carry a reachability bitmap, accelerating clones and fetches at scale:</p>
    <pre><code>git multi-pack-index write --bitmap
    git config repack.writeBitmaps true
    git config pack.writeBitmaps true</code></pre>
    <p>See "Reachability bitmaps for fast set operations".</p>
    <h2>Geometric integration</h2>
    <p>MIDX shines paired with geometric repack: many packs are normal, lookup stays fast, and only the smallest packs are repacked routinely. Without MIDX, accumulating packs degrades performance.</p>
    <h2>Verification</h2>
    <pre><code>git multi-pack-index verify
    git fsck --multi-pack-index
    ls -la .git/objects/pack/multi-pack-index*</code></pre>
    <p>The MIDX file lives at <code>.git/objects/pack/multi-pack-index</code>.</p>
    <h2>Common mistakes</h2>
    <p>Manually deleting pack files referenced by the MIDX; always use <code>multi-pack-index expire</code>. Skipping <code>--bitmap</code> on large repos that frequently clone or fetch over the network. Forgetting that MIDX is a maintenance task; let <code>git maintenance start</code> handle it.</p>
    <h2>Performance impact</h2>
    <p>On a repo with 50+ packs, object lookup time can drop 5-10x. Combined with bitmap and geometric repack, server-side fetch CPU drops dramatically — the GitHub and GitLab improvements over the past few years are largely from this stack.</p>
    <h2>Related</h2>
    <p>See "Geometric repacking strategy", "Reachability bitmaps for fast set operations", and "Git internals: packfiles and delta compression".</p>

- title: "Reachability bitmaps for fast set operations"
  section: "Performance"
  difficulty: "Expert"
  git_version: "2.30+"
  weight: 60
  body: |
    <h2>The set operation problem</h2>
    <p>Operations like clone, fetch, and gc need to compute "what objects are reachable from these commits?" — a graph traversal that touches every reachable object. Reachability bitmaps store this answer as compressed bitmaps, turning the traversal into bitwise OR/AND operations.</p>
    <h2>Generating</h2>
    <pre><code>git repack -adb
    git multi-pack-index write --bitmap
    git config repack.writeBitmaps true
    git config pack.writeBitmaps true</code></pre>
    <p>The <code>-b</code> flag to <code>repack</code> writes a bitmap alongside the new pack. The MIDX form (Git 2.34+) writes a bitmap for the multi-pack-index instead.</p>
    <h2>How servers use them</h2>
    <p>When a client clones, the server must enumerate all reachable objects. With bitmaps, this is one OR over the bitmaps of all branch tips. Negotiation during fetch ("what do I have, what do you have?") similarly accelerates from minutes to milliseconds on large repos.</p>
    <h2>Pseudo-merge bitmaps (Git 2.45+)</h2>
    <p>Recent Git supports synthesizing a "pseudo-merge" bitmap that approximates the OR of many real bitmaps, useful when the working set of refs is enormous. Configure with:</p>
    <pre><code>git config pack.writeBitmapPseudoMergeStable true
    git config repack.writeBitmapHashCache true</code></pre>
    <h2>Verifying</h2>
    <pre><code>ls .git/objects/pack/*.bitmap
    git rev-list --use-bitmap-index --count --all
    git rev-list --test-bitmap HEAD</code></pre>
    <p><code>--test-bitmap</code> reports whether bitmaps are consistent with a real walk.</p>
    <h2>Server vs client</h2>
    <p>Bitmaps benefit both sides but matter most on the server, where they reduce CPU per clone. Clients benefit from <code>git clone</code> times dropping and from local <code>git rev-list --count --all</code> queries used by tools like LSP servers.</p>
    <h2>Common mistakes</h2>
    <p>Writing bitmaps every gc on small repos — overhead may exceed benefit. Forgetting that bitmaps cover only objects in <em>one</em> pack (or the MIDX); split repos must use MIDX bitmaps. Mixing pack-level and MIDX-level bitmaps; pick one strategy.</p>
    <h2>Real numbers</h2>
    <p>GitHub reported 50-90% reductions in clone CPU after enabling bitmaps. GitLab Geo replication times dropped from hours to minutes on large repos. For self-hosted setups, bitmaps are usually the single highest-leverage perf change after MIDX.</p>
    <h2>Related</h2>
    <p>See "Multi-pack-index (MIDX): unified pack object lookup" and "Geometric repacking strategy".</p>

- title: "Geometric repacking strategy"
  section: "Performance"
  difficulty: "Expert"
  git_version: "2.32+"
  weight: 70
  body: |
    <h2>The full repack cost</h2>
    <p>Traditional <code>git gc</code> runs <code>git repack -ad</code>, rewriting all objects into one packfile. On a multi-gigabyte repo, this is hours of CPU and IO. Geometric repacking (Git 2.32+) avoids this by maintaining a series of packs whose sizes follow a geometric progression — only the smallest are merged each cycle.</p>
    <h2>How it works</h2>
    <p>Pack sizes form a sequence where each pack is at least N times larger than the next smaller. When the invariant is violated (small packs accumulate from frequent fetches), Git merges only the offenders into a new pack, leaving the largest pack untouched. The aggregate cost over time is <code>O(total objects × log)</code> instead of <code>O(total objects)</code> per gc.</p>
    <h2>Running</h2>
    <pre><code>git repack --geometric=2 -d
    git repack --geometric=2 -d --write-midx
    git config maintenance.incremental-repack.enabled true</code></pre>
    <p>The factor (2 here) is the size ratio. Larger factors mean fewer, larger packs; smaller factors mean more, smaller packs.</p>
    <h2>Pairing with MIDX</h2>
    <p>Geometric repack produces multiple packs by design. Without an MIDX, lookups slow down. Always pair them:</p>
    <pre><code>git config core.multiPackIndex true
    git multi-pack-index write
    git multi-pack-index expire</code></pre>
    <p>See "Multi-pack-index (MIDX): unified pack object lookup".</p>
    <h2>Background maintenance</h2>
    <p><code>git maintenance</code> includes an <code>incremental-repack</code> task that runs geometric repack plus MIDX upkeep:</p>
    <pre><code>git maintenance start
    git maintenance run --task=incremental-repack</code></pre>
    <h2>When to force full repack</h2>
    <p>After massive history rewrites (filter-repo, big rebases), the largest pack contains many unreachable objects. Run a full repack occasionally:</p>
    <pre><code>git repack -ad --depth=50 --window=250 --write-midx --write-bitmap-index</code></pre>
    <h2>Server-side considerations</h2>
    <p>Forge servers (GitHub, GitLab, Gitea) use geometric repack at scale. Self-hosted Gitea 1.20+ enables it by default. For raw bare repos behind ssh, configure manually.</p>
    <h2>Common mistakes</h2>
    <p>Running geometric repack without MIDX — performance regresses as packs accumulate. Setting the factor too small (e.g., 1.1) — packs proliferate. Mixing manual <code>git gc</code> with <code>git maintenance</code>; pick one.</p>
    <h2>Common values</h2>
    <ul>
      <li>Default <code>--geometric=2</code>: balanced.</li>
      <li><code>--geometric=4</code>: fewer, larger packs; less frequent merges.</li>
      <li><code>--geometric=1.5</code>: more aggressive merging.</li>
    </ul>
    <h2>Related</h2>
    <p>See "Multi-pack-index (MIDX): unified pack object lookup", "Background maintenance: git maintenance run/start/stop", and "Git garbage collection: gc, prune, and pack-refs".</p>

- title: "Git garbage collection: gc, prune, and pack-refs"
  section: "Performance"
  difficulty: "Advanced"
  git_version: "2.30+"
  weight: 80
  body: |
    <h2>What gc does</h2>
    <p><code>git gc</code> performs maintenance: repacks loose objects, prunes unreachable ones past the expiry window, packs loose refs into <code>packed-refs</code>, expires reflogs, and writes commit-graph and MIDX where configured. It runs automatically when certain thresholds are exceeded.</p>
    <h2>Auto-trigger</h2>
    <p>Git invokes <code>gc --auto</code> at the end of operations like <code>commit</code>, <code>merge</code>, <code>rebase</code>. The thresholds:</p>
    <pre><code>[gc]
    auto = 6700              # loose objects before auto gc
    autoPackLimit = 50       # packs before consolidation
    autoDetach = true        # run in background
    pruneExpire = 2.weeks.ago
    reflogExpire = 90.days
    reflogExpireUnreachable = 30.days</code></pre>
    <h2>Manual invocation</h2>
    <pre><code>git gc                       # standard
    git gc --auto                # threshold-driven
    git gc --aggressive          # heavy delta recompute
    git gc --prune=now           # prune all unreachable now</code></pre>
    <h2>Pruning safely</h2>
    <p>By default, gc only prunes objects unreachable for at least two weeks, protecting in-flight work. After a sensitive rewrite (e.g., removing secrets), force immediate pruning:</p>
    <pre><code>git reflog expire --expire=now --all
    git gc --prune=now</code></pre>
    <h2>pack-refs</h2>
    <p>Loose refs accumulate as files in <code>.git/refs/</code>. <code>git pack-refs --all</code> collapses them into <code>.git/packed-refs</code> for faster ref enumeration. Run by gc but you can run it standalone:</p>
    <pre><code>git pack-refs --all
    git for-each-ref | wc -l
    ls .git/refs/heads | wc -l   # often 0 after pack-refs</code></pre>
    <h2>Background scheduling</h2>
    <p>Modern setups prefer <code>git maintenance</code> over auto-gc. It runs targeted tasks on cron/launchd/Task Scheduler:</p>
    <pre><code>git maintenance start
    git maintenance run --task=gc
    git maintenance run --task=loose-objects
    git maintenance run --task=pack-refs</code></pre>
    <h2>Aggressive vs default</h2>
    <p><code>--aggressive</code> uses depth 250, window 250 — much higher than defaults (50/10). Smaller packs but hours of CPU on large repos. Reserve for occasional offline runs.</p>
    <h2>Common mistakes</h2>
    <p>Disabling auto-gc to "save CPU" and ending up with millions of loose objects. Running <code>--prune=now</code> while a colleague's <code>git fetch</code> writes new objects — race condition risk. Let gc run quietly. Mixing <code>git gc</code> with manual <code>git repack</code>; the maintenance command supersedes both.</p>
    <h2>Related</h2>
    <p>See "Background maintenance: git maintenance run/start/stop" and "Geometric repacking strategy".</p>

- title: "Background maintenance: git maintenance run/start/stop"
  section: "Performance"
  difficulty: "Advanced"
  git_version: "2.31+"
  weight: 90
  body: |
    <h2>Why maintenance, not gc</h2>
    <p><code>git maintenance</code> (Git 2.31+) is the modern, task-oriented replacement for <code>gc --auto</code>. It runs specific tasks (commit-graph, prefetch, incremental-repack, loose-objects, pack-refs, gc) on schedules tuned for each, in the background, without blocking your interactive commands.</p>
    <h2>Starting</h2>
    <pre><code>git maintenance start
    git maintenance start --scheduler=systemd
    git maintenance start --scheduler=launchctl
    git maintenance start --scheduler=schtasks</code></pre>
    <p>Git auto-detects your platform's scheduler and registers entries that run at hourly, daily, and weekly cadences for the appropriate tasks.</p>
    <h2>Inspecting and stopping</h2>
    <pre><code>git maintenance status
    git maintenance stop
    git maintenance unregister</code></pre>
    <p><code>unregister</code> removes the repo from the global maintenance list without stopping the scheduler globally.</p>
    <h2>Tasks and schedules</h2>
    <table>
      <tr><th>Task</th><th>Default schedule</th><th>What it does</th></tr>
      <tr><td>commit-graph</td><td>hourly</td><td>Updates the commit-graph</td></tr>
      <tr><td>prefetch</td><td>hourly</td><td>Fetches into hidden refs</td></tr>
      <tr><td>loose-objects</td><td>daily</td><td>Packs loose objects</td></tr>
      <tr><td>incremental-repack</td><td>daily</td><td>Geometric repack + MIDX</td></tr>
      <tr><td>pack-refs</td><td>weekly</td><td>Packs loose refs</td></tr>
      <tr><td>gc</td><td>off by default</td><td>Full gc; prefer the others</td></tr>
    </table>
    <h2>Manual runs</h2>
    <pre><code>git maintenance run --task=commit-graph
    git maintenance run --task=incremental-repack
    git maintenance run --auto                 # threshold-driven</code></pre>
    <h2>Per-task config</h2>
    <pre><code>[maintenance]
    auto = false
    strategy = incremental
    [maintenance "commit-graph"]
    enabled = true
    [maintenance "incremental-repack"]
    enabled = true
    auto = 100      # # of new packs to trigger
    [maintenance "loose-objects"]
    enabled = true
    batchSize = 50</code></pre>
    <h2>Disabling auto-gc</h2>
    <p>When using maintenance, disable the legacy auto-gc so they do not fight:</p>
    <pre><code>git config gc.auto 0</code></pre>
    <h2>Common mistakes</h2>
    <p>Forgetting to <code>git maintenance start</code> after cloning a large repo — performance features grow stale. Running maintenance and traditional gc together. Setting <code>maintenance.auto=false</code> globally without a replacement schedule.</p>
    <h2>Logs</h2>
    <p>Maintenance logs to the platform's scheduler facility. On systemd: <code>journalctl --user -u git-maintenance.service</code>. On macOS: <code>~/Library/Logs/git-maintenance.log</code>.</p>
    <h2>Related</h2>
    <p>See "Git garbage collection: gc, prune, and pack-refs", "Geometric repacking strategy", and "The commit-graph: faster reachability queries".</p>

- title: "Fetch and push over large repositories"
  section: "Performance"
  difficulty: "Advanced"
  git_version: "2.30+"
  weight: 100
  body: |
    <h2>Two ends of one wire</h2>
    <p>Fetch and push performance depends on negotiation efficiency, transfer size, and server-side computation. Each has levers, and the right ones differ by repo size.</p>
    <h2>Protocol v2</h2>
    <p>Protocol v2 (default in Git 2.26+) reduces the upfront ref advertisement, dramatically helping repos with thousands of refs. Verify it is in use:</p>
    <pre><code>GIT_TRACE_PACKET=1 git ls-remote origin 2&gt;&amp;1 | head -2
    git config protocol.version 2</code></pre>
    <p>See "Protocol v2 for efficient fetch negotiation".</p>
    <h2>Negotiation algorithm</h2>
    <pre><code>git config fetch.negotiationAlgorithm skipping
    git config fetch.negotiationAlgorithm noop      # client has nothing to advertise</code></pre>
    <p>The <code>skipping</code> algorithm (default in Git 2.32+) advertises ancestors with exponential gaps, finding common bases in fewer rounds.</p>
    <h2>Bundle URIs</h2>
    <p>Servers can advertise a bundle URI for new clones, letting the client download a static bundle from a CDN before negotiating the rest. Game-changer for huge clones:</p>
    <pre><code>git clone --bundle-uri=https://cdn.example/repo.bundle https://example.com/repo.git
    git config fetch.bundleURI https://cdn.example/repo.bundle</code></pre>
    <h2>Parallel fetch</h2>
    <pre><code>git config fetch.parallel 0
    git config submodule.fetchJobs 8</code></pre>
    <p><code>fetch.parallel=0</code> uses all cores. Helpful when many remotes or submodules are involved.</p>
    <h2>Push optimization</h2>
    <pre><code>git config push.useBitmaps true
    git config pack.useBitmaps true
    git push --atomic origin main feature</code></pre>
    <p><code>--atomic</code> ensures all refs update or none do, preventing partial pushes on network failures.</p>
    <h2>Server-side considerations</h2>
    <p>Servers benefit from MIDX, reachability bitmaps, geometric repack, and commit-graph just as clients do. <code>git pack-objects</code> on the server is the dominant cost; bitmaps cut it dramatically.</p>
    <h2>Shallow and partial clones</h2>
    <p>For CI or read-only consumers:</p>
    <pre><code>git clone --depth=1 https://example.com/repo.git
    git clone --filter=blob:none https://example.com/repo.git
    git clone --filter=tree:0 --no-checkout https://example.com/repo.git</code></pre>
    <p>See "Shallow clones in CI/CD" and "Partial clone: promise and promisor remotes".</p>
    <h2>Common mistakes</h2>
    <p>Using <code>--depth=1</code> in CI then trying to bisect or run path-restricted log — works only on commits in the shallow window. Disabling bitmaps on the server "for simplicity" and watching CPU spike under load. Pushing 10,000 refs at once over protocol v0 — upgrade to v2.</p>
    <h2>Related</h2>
    <p>See "Protocol v2 for efficient fetch negotiation", "Wire protocol optimization: stateless-connect", and "Reachability bitmaps for fast set operations".</p>

- title: "Sparse checkout for monorepos"
  section: "Performance"
  difficulty: "Advanced"
  git_version: "2.30+"
  weight: 110
  body: |
    <h2>The monorepo working set</h2>
    <p>In a monorepo, individual developers usually touch a small subset — one or two apps, a handful of libraries. Sparse checkout populates only those paths in the working tree, leaving the rest as skip-worktree entries in the index. The result: faster <code>git status</code>, smaller IDE indexes, less disk.</p>
    <h2>Cone mode setup</h2>
    <pre><code>git sparse-checkout init --cone --sparse-index
    git sparse-checkout set apps/web libs/ui libs/api
    git sparse-checkout add apps/admin
    git sparse-checkout list</code></pre>
    <p>Cone mode restricts patterns to whole directories — much faster than non-cone arbitrary globs.</p>
    <h2>Combined with partial clone</h2>
    <pre><code>git clone --filter=blob:none --sparse https://example.com/big.git
    cd big
    git sparse-checkout init --cone --sparse-index
    git sparse-checkout set apps/web</code></pre>
    <p>Now you fetch metadata for the whole repo but blobs only for paths inside the cone, on demand. Disk usage on a multi-gigabyte monorepo can drop 10-100x.</p>
    <h2>Reconfiguring</h2>
    <pre><code>git sparse-checkout reapply
    git sparse-checkout disable      # full checkout</code></pre>
    <p><code>reapply</code> updates the working tree after editing the cone — useful in scripts that compute the cone from a project list.</p>
    <h2>CI usage</h2>
    <p>For path-scoped CI jobs, sparse-checkout cuts checkout time:</p>
    <pre><code>git clone --no-checkout --filter=blob:none "$REPO_URL" .
    git sparse-checkout init --cone --sparse-index
    git sparse-checkout set "$AFFECTED_DIR"
    git checkout main</code></pre>
    <h2>Editor and IDE integration</h2>
    <p>Most editors honor sparse checkout transparently — files outside the cone simply do not exist on disk. VS Code, JetBrains IDEs, and Vim handle this correctly. For LSP servers that recursively scan the workspace, sparse checkout is a major win.</p>
    <h2>Auditing</h2>
    <pre><code>git sparse-checkout list
    git ls-files -t | head           # 'S' = skip-worktree
    git update-index --no-skip-worktree path/file
    du -sh .                         # shrunk working tree</code></pre>
    <h2>Common mistakes</h2>
    <p>Using non-cone mode without good reason — performance suffers. Forgetting to enable sparse index (<code>--sparse-index</code> or <code>git config index.sparse true</code>). Editing a file outside the cone via your editor's "open file" dialog and being confused by the lack of staging — set <code>git config core.sparseCheckoutCone true</code> to get warnings.</p>
    <h2>Related</h2>
    <p>See "Sparse checkout: working with subsets of a large repo", "The sparse index: operating without a full index", and "Git in a monorepo".</p>

- title: "The sparse index: operating without a full index"
  section: "Performance"
  difficulty: "Expert"
  git_version: "2.37+"
  weight: 120
  body: |
    <h2>Why the index is slow</h2>
    <p>Even with sparse checkout, the index by default contains an entry per file in the entire repo — a million entries on a monorepo, even if only a thousand are present in the working tree. Reading and writing this on every command is expensive. The sparse index (Git 2.37+) replaces excluded directories with a single tree entry, shrinking the index by 100x or more.</p>
    <h2>Enabling</h2>
    <pre><code>git sparse-checkout init --cone --sparse-index
    git config index.sparse true
    git update-index --sparse</code></pre>
    <p>Requires cone mode — non-cone patterns cannot be summarized as trees.</p>
    <h2>How it works</h2>
    <p>Each excluded directory is represented in the index as one entry of mode <code>040000</code> (tree) with the SHA of its committed tree. Index version 4 prefix-compression layers on top. Operations that need to expand a directory (e.g., editing a file inside it) trigger a partial expansion automatically.</p>
    <h2>Inspecting</h2>
    <pre><code>git ls-files --sparse | head
    git ls-files -t | grep ^S | head
    GIT_TRACE2_PERF=1 git status 2&gt;&amp;1 | grep sparse</code></pre>
    <h2>Performance numbers</h2>
    <p>On a real-world monorepo with 4M files, the Microsoft Office team reported <code>git status</code> dropping from 3 seconds to under 200ms after enabling sparse index. Index file size dropped from 350MB to 5MB.</p>
    <h2>Compatibility</h2>
    <p>Many commands are sparse-aware: status, add, commit, diff, checkout, reset, restore, stash, ls-files. Some still expand transparently when needed. Hooks and external tools that read <code>.git/index</code> directly may not understand the format — keep them on the latest libgit2 (1.5+) or use <code>git ls-files</code> to enumerate.</p>
    <h2>Forcing expansion</h2>
    <pre><code>git update-index --no-sparse           # expand to full index
    git update-index --sparse              # back to sparse</code></pre>
    <h2>Common mistakes</h2>
    <p>Trying to enable the sparse index in non-cone sparse-checkout mode — refused. Using older third-party Git GUIs that read the index without sparse support — they may render incorrectly. Forgetting that adding a directory back to the cone re-expands its index entries.</p>
    <h2>Related</h2>
    <p>See "Sparse checkout for monorepos" and "Git in a monorepo".</p>

- title: "Partial clone: promise and promisor remotes"
  section: "Performance"
  difficulty: "Expert"
  git_version: "2.30+"
  weight: 130
  body: |
    <h2>Lazy object fetching</h2>
    <p>Partial clone (<code>--filter</code>) lets a clone omit some objects from the initial transfer, fetching them lazily when needed. The promisor remote keeps its promise to provide them on demand. This is the foundation of usable monorepo clones — full history, fraction of the data.</p>
    <h2>Filter specs</h2>
    <pre><code>git clone --filter=blob:none url               # no blobs
    git clone --filter=blob:limit=1m url           # blobs &lt;1MB only
    git clone --filter=tree:0 url                  # no trees or blobs (history-only)
    git clone --filter=sparse:oid=&lt;oid&gt; url        # only paths matching sparse spec</code></pre>
    <p>See "Filter specs: blob:none, tree:0, and combining filters".</p>
    <h2>How fetching works</h2>
    <p>When a command asks for a missing object, Git automatically fetches it from the promisor remote. This is transparent for most operations but can introduce latency on first use. For predictable workflows, prefetch:</p>
    <pre><code>git rev-list --objects --missing=allow-promisor HEAD | \
      awk '{print $1}' | git cat-file --batch-check
    git fetch --refetch                             # rebuild missing</code></pre>
    <h2>Inspecting</h2>
    <pre><code>git config --get-all remote.origin.partialclonefilter
    git rev-list --missing=print HEAD | head
    git config --get extensions.partialClone</code></pre>
    <h2>Caveats</h2>
    <ul>
      <li>Operations like <code>git log -p</code> across all history may trigger massive on-demand fetches; pair with sparse checkout for predictability.</li>
      <li>Disconnected use is limited — without the promisor, missing objects fail.</li>
      <li>Server must support partial clone (Git 2.22+; <code>uploadpack.allowFilter=true</code>).</li>
    </ul>
    <h2>Server config</h2>
    <pre><code>[uploadpack]
    allowFilter = true
    allowAnySHA1InWant = true</code></pre>
    <h2>Combining with sparse</h2>
    <pre><code>git clone --filter=blob:none --sparse https://example.com/big.git
    cd big
    git sparse-checkout init --cone --sparse-index
    git sparse-checkout set apps/web
    git checkout main</code></pre>
    <p>Now you have history for everything, but blob content only for the cone — the gold-standard monorepo setup.</p>
    <h2>Common mistakes</h2>
    <p>Using <code>--filter=tree:0</code> for development work — every operation that needs a tree fetches it, slow and unpredictable. Reserve for analysis-only clones. Forgetting to keep the promisor reachable; offline becomes painful. Disabling fetch.parallel; multiple lazy fetches benefit from concurrency.</p>
    <h2>Related</h2>
    <p>See "Filter specs: blob:none, tree:0, and combining filters", "Sparse checkout for monorepos", and "The sparse index: operating without a full index".</p>

- title: "Filter specs: blob:none, tree:0, and combining filters"
  section: "Performance"
  difficulty: "Expert"
  git_version: "2.30+"
  weight: 140
  body: |
    <h2>The filter language</h2>
    <p>Partial clone filters are specified by short DSL strings. Each filter excludes objects matching the spec from the transfer; missing objects are fetched on demand from the promisor remote.</p>
    <h2>Common filters</h2>
    <ul>
      <li><code>blob:none</code> — omit all blobs.</li>
      <li><code>blob:limit=&lt;n&gt;[kmg]</code> — omit blobs larger than the threshold.</li>
      <li><code>tree:&lt;depth&gt;</code> — omit trees deeper than depth (0 means no trees, history-only).</li>
      <li><code>sparse:oid=&lt;blob&gt;</code> — use a sparse-checkout spec stored as a blob.</li>
      <li><code>object:type=tag</code> — exclude objects of a type (Git 2.36+).</li>
      <li><code>combine:F1+F2+...</code> — combine multiple filters with URL-encoding.</li>
    </ul>
    <h2>Examples</h2>
    <pre><code>git clone --filter=blob:none url big-no-blobs
    git clone --filter=blob:limit=10m url big-small-blobs
    git clone --filter=tree:0 --no-checkout url history-only
    git clone --filter=combine:blob:none+tree:0 url metadata-only</code></pre>
    <h2>Choosing a filter</h2>
    <table>
      <tr><th>Use case</th><th>Filter</th></tr>
      <tr><td>Daily development on a subset</td><td>blob:none + sparse-checkout</td></tr>
      <tr><td>CI for a specific app</td><td>blob:none + sparse-checkout cone</td></tr>
      <tr><td>History analysis only</td><td>tree:0</td></tr>
      <tr><td>Large media files separate</td><td>blob:limit=10m</td></tr>
      <tr><td>Read-only release deploy</td><td>blob:none + checkout one tag</td></tr>
    </table>
    <h2>Sparse filter</h2>
    <p>Pre-stage a sparse spec in the repo, then clone with it:</p>
    <pre><code>blob_oid=$(git hash-object .sparse)
    git clone --filter=sparse:oid=$blob_oid url</code></pre>
    <p>Useful when many users share the same cone definition.</p>
    <h2>Combining</h2>
    <p>Combine filters by URL-encoding plus signs:</p>
    <pre><code>git clone --filter=combine:blob%3Anone+tree%3A0 url</code></pre>
    <p>Each filter applies independently; the union of excluded objects is omitted.</p>
    <h2>Verifying</h2>
    <pre><code>git config --get remote.origin.partialclonefilter
    git rev-list --missing=print HEAD | wc -l
    du -sh .git/objects</code></pre>
    <h2>Common mistakes</h2>
    <p>Using <code>tree:0</code> for active development — every checkout fetches trees on demand, slowly. Forgetting that <code>blob:limit</code> is per blob, not aggregate. Combining filters with raw <code>+</code> instead of URL encoding fails parsing.</p>
    <h2>Server requirements</h2>
    <p>Server must enable <code>uploadpack.allowFilter</code> and the specific filter; some hosts restrict <code>tree:0</code> due to its CPU cost. GitHub, GitLab, Gitea, Bitbucket, Forgejo all support standard filters.</p>
    <h2>Related</h2>
    <p>See "Partial clone: promise and promisor remotes" and "Sparse checkout for monorepos".</p>

- title: "Scalar: batteries-included large repo management"
  section: "Performance"
  difficulty: "Advanced"
  git_version: "2.38+"
  weight: 150
  body: |
    <h2>What Scalar is</h2>
    <p>Scalar (originally a Microsoft tool, bundled with Git in 2.38+) is a wrapper that applies the full performance stack — partial clone, sparse checkout, sparse index, fsmonitor, commit-graph, MIDX, geometric repack, background maintenance — with one command. It is the recommended starting point for cloning a large repository.</p>
    <h2>Cloning</h2>
    <pre><code>scalar clone https://example.com/big.git
    cd big/src
    scalar list</code></pre>
    <p>Note the <code>src/</code> subdir — Scalar layers a directory above for its metadata. The actual working tree lives in <code>src/</code>.</p>
    <h2>What Scalar configures</h2>
    <ul>
      <li><code>--filter=blob:none</code> partial clone.</li>
      <li><code>--sparse</code> with cone mode and sparse index.</li>
      <li><code>core.fsmonitor=true</code>.</li>
      <li><code>core.untrackedCache=true</code>.</li>
      <li>Commit-graph with changed-path Bloom filters.</li>
      <li>Multi-pack-index with bitmaps.</li>
      <li><code>git maintenance start</code> for background upkeep.</li>
      <li><code>feature.manyFiles=true</code>.</li>
    </ul>
    <h2>Registering an existing repo</h2>
    <pre><code>cd existing-big-repo
    scalar register
    scalar list
    scalar unregister</code></pre>
    <p>Use this when you already cloned and want to retrofit Scalar's settings. <code>register</code> writes the config and starts maintenance.</p>
    <h2>Diagnostics</h2>
    <pre><code>scalar diagnose
    scalar reconfigure</code></pre>
    <p><code>diagnose</code> bundles config, repo stats, and recent maintenance logs into a zip for support. <code>reconfigure</code> reapplies recommended settings, useful after Git upgrades.</p>
    <h2>When to use</h2>
    <ul>
      <li>Repos with millions of files.</li>
      <li>Repos with hundreds of GB of history.</li>
      <li>CI runners cloning large repos repeatedly (combined with cache).</li>
      <li>New team members onboarding to a big monorepo.</li>
    </ul>
    <h2>When not to</h2>
    <p>Small repos where the optimization stack is overkill. Repos that require the full working tree (build systems that scan everything). Servers that do not support partial clone or sparse upload.</p>
    <h2>Common mistakes</h2>
    <p>Treating Scalar as magic — when something breaks, you still need to understand the underlying features. Mixing manual <code>git gc</code> with Scalar's maintenance schedules. Forgetting that the working tree is <code>src/</code>, not the top of the Scalar enlistment.</p>
    <h2>Related</h2>
    <p>See "Git in a monorepo" and every Performance page — Scalar enables most of them.</p>

- title: "Fsmonitor: faster working tree queries"
  section: "Performance"
  difficulty: "Advanced"
  git_version: "2.30+"
  weight: 160
  body: |
    <h2>The status walk problem</h2>
    <p><code>git status</code> compares working tree to index, walking every tracked file's stat info. On a million-file repo this can take seconds. Fsmonitor uses the operating system's file change notifications (FSEvents on macOS, ReadDirectoryChangesW on Windows, inotify on Linux) to know which files changed since the last query, skipping the rest.</p>
    <h2>Built-in daemon (Git 2.36+)</h2>
    <pre><code>git config core.fsmonitor true
    git fsmonitor--daemon start
    git fsmonitor--daemon status
    git fsmonitor--daemon stop</code></pre>
    <p>The daemon launches automatically on first use; you rarely need to start it by hand.</p>
    <h2>External integrations</h2>
    <p>Before the built-in daemon, Git supported external hooks:</p>
    <pre><code>git config core.fsmonitor /path/to/hook
    git config core.fsmonitorHookVersion 2</code></pre>
    <p>Watchman (Facebook's file-watching service) is a popular choice. The Watchman query hook ships with Git's contrib directory.</p>
    <h2>Verifying</h2>
    <pre><code>GIT_TRACE2_PERF=1 git status 2&gt;&amp;1 | grep fsmonitor
    git fsmonitor--daemon status
    git update-index --fsmonitor</code></pre>
    <h2>Untracked cache</h2>
    <p>Pair fsmonitor with the untracked cache for the full speedup:</p>
    <pre><code>git config core.untrackedCache true</code></pre>
    <p>Without it, Git still scans the working tree for untracked files even when fsmonitor flagged none.</p>
    <h2>Performance numbers</h2>
    <p>On a 4-million-file monorepo, <code>git status</code> drops from 5+ seconds to under 200ms. On a 100k-file repo, from 800ms to 30ms. The bigger the tree, the bigger the win.</p>
    <h2>Common mistakes</h2>
    <p>Enabling fsmonitor without untracked cache — only half the win. Running on a network filesystem that does not support change events; fsmonitor will silently fall back. Restarting Git after upgrading without restarting the daemon: <code>git fsmonitor--daemon stop</code> first. WSL1 lacks proper inotify; WSL2 works correctly.</p>
    <h2>Caveats per platform</h2>
    <ul>
      <li>macOS: FSEvents is reliable, the built-in daemon is preferred.</li>
      <li>Windows: ReadDirectoryChangesW; works well on NTFS, less reliable on network drives.</li>
      <li>Linux: inotify limits (<code>fs.inotify.max_user_watches</code>) may need raising for huge trees.</li>
    </ul>
    <pre><code>sudo sysctl fs.inotify.max_user_watches=524288</code></pre>
    <h2>Related</h2>
    <p>See "Fsmonitor daemon mode (Git 2.36+)", "Git in a monorepo", and "Configuring index.version for performance".</p>

- title: "Fsmonitor daemon mode (Git 2.36+)"
  section: "Performance"
  difficulty: "Advanced"
  git_version: "2.36+"
  weight: 170
  body: |
    <h2>The built-in daemon</h2>
    <p>Git 2.36 introduced a built-in fsmonitor daemon, eliminating the need for external services like Watchman. It runs as <code>git fsmonitor--daemon</code>, listens to OS file events, and answers Git's queries with the list of changed paths since a token timestamp.</p>
    <h2>Lifecycle</h2>
    <pre><code>git config core.fsmonitor true
    git status                              # daemon auto-starts
    git fsmonitor--daemon status
    git fsmonitor--daemon stop
    git fsmonitor--daemon run                # foreground, for debugging</code></pre>
    <p>The daemon is per-repo, started lazily, and exits if idle for too long.</p>
    <h2>How it integrates</h2>
    <p>When <code>core.fsmonitor=true</code>, Git asks the daemon for changed paths. The daemon responds with a delta since the previous query token; Git then only re-stats those paths. The index records the last fsmonitor token in its FSMN extension.</p>
    <h2>Verifying speedup</h2>
    <pre><code>time git -c core.fsmonitor=false status
    time git -c core.fsmonitor=true status
    GIT_TRACE2_PERF=1 git status 2&gt;&amp;1 | grep fsmonitor</code></pre>
    <p>Trace lines like <code>fsmonitor:read</code> show how the daemon answered.</p>
    <h2>Resource use</h2>
    <p>The daemon holds OS file watches; on macOS this is essentially free, on Linux it consumes inotify slots. For huge trees raise the limit:</p>
    <pre><code>sudo sysctl fs.inotify.max_user_watches=524288
    sudo sysctl fs.inotify.max_user_instances=8192</code></pre>
    <h2>Multiple worktrees</h2>
    <p>Each worktree gets its own daemon. Stopping the main daemon does not affect worktrees. Background maintenance keeps them all coherent.</p>
    <h2>Logging</h2>
    <p>Logs land at <code>.git/fsmonitor--daemon.log</code> when started in debug. For production, run with default config and check the daemon status when issues arise.</p>
    <h2>Common mistakes</h2>
    <p>Running on networked filesystems where change events are unreliable (NFS, SMB) — the daemon refuses or returns inconsistent results; disable in that case. Forgetting to restart the daemon after upgrading Git: <code>git fsmonitor--daemon stop</code> then any subsequent Git command relaunches it. Mixing the built-in daemon with Watchman; pick one.</p>
    <h2>Watchman vs built-in</h2>
    <p>The built-in daemon is the recommended default. Watchman remains useful in environments that already deploy it for other tooling (e.g., Mercurial), but for Git alone the built-in is simpler.</p>
    <h2>Related</h2>
    <p>See "Fsmonitor: faster working tree queries" and "Git in a monorepo".</p>

- title: "Configuring index.version for performance"
  section: "Performance"
  difficulty: "Advanced"
  git_version: "2.30+"
  weight: 180
  body: |
    <h2>Index versions</h2>
    <p>Git's index has had several formats. Version 2 is the historic baseline. Version 3 added skip-worktree and other extensions. Version 4 (recommended for large repos) adds prefix compression of paths, halving index size on deep trees. Version 4 became default in Git 2.37+ for new repos via <code>feature.manyFiles</code>.</p>
    <h2>Setting</h2>
    <pre><code>git config index.version 4
    git update-index --index-version 4</code></pre>
    <p>The first sets the policy; the second rewrites the existing index file in the new format. Run both for an existing repo.</p>
    <h2>Why version 4 helps</h2>
    <p>For monorepos with deep paths like <code>apps/web/src/components/foo/bar/baz/Quux.tsx</code>, repeated path prefixes dominate index size. V4 stores each path as a delta from the previous, shrinking the index 30-60% on real monorepos. Smaller index = faster read/write = faster every command.</p>
    <h2>Inspecting</h2>
    <pre><code>git ls-files --debug | head
    ls -la .git/index
    GIT_TRACE2_PERF=1 git status 2&gt;&amp;1 | grep "do_read_index"</code></pre>
    <p>The trace timing for index read/write reveals the impact directly.</p>
    <h2>Pair with feature.manyFiles</h2>
    <pre><code>git config feature.manyFiles true</code></pre>
    <p>This single setting enables <code>index.version=4</code>, <code>core.untrackedCache=true</code>, and other monorepo-friendly defaults. See "Feature.manyFiles configuration".</p>
    <h2>When not to</h2>
    <p>For small repos (under 10k files), v2 is fine; the difference is invisible. Some old third-party tools that read the index directly may not understand v4 — check libgit2 1.5+ or update.</p>
    <h2>Common mistakes</h2>
    <p>Setting <code>index.version</code> in config but not running <code>git update-index --index-version</code> — the next index write picks up the new version, but until then, the on-disk file stays at the old format. Mixing V4 with old fork tools: lock to current Git for the team.</p>
    <h2>Side note: skip-worktree and assume-unchanged</h2>
    <p>These bits live in the index. V3+ supports them; V2 has limited support. Sparse checkout uses skip-worktree heavily, so V3+ is required for cone mode.</p>
    <h2>Related</h2>
    <p>See "Feature.manyFiles configuration", "Git internals: the index format", and "The sparse index: operating without a full index".</p>

- title: "Feature.manyFiles configuration"
  section: "Performance"
  difficulty: "Advanced"
  git_version: "2.30+"
  weight: 190
  body: |
    <h2>The bundle setting</h2>
    <p>Tuning monorepos involves a dozen settings. Rather than memorize and apply each, Git provides "feature flags" that activate a coherent bundle. <code>feature.manyFiles</code> is the most useful: one knob that enables all the index and stat optimizations.</p>
    <h2>What it sets</h2>
    <ul>
      <li><code>index.version=4</code> — prefix compression.</li>
      <li><code>core.untrackedCache=true</code> — cache untracked listings.</li>
      <li>(Implicit) recommended index reading paths.</li>
    </ul>
    <pre><code>git config feature.manyFiles true
    git config --list | grep -E '^(index|core)\.'</code></pre>
    <h2>Sister features</h2>
    <ul>
      <li><code>feature.experimental=true</code> — turns on cutting-edge perf flags being evaluated for default-on.</li>
      <li>Historical: <code>feature.manyCommits</code> appears in some Git versions; behavior may vary by build.</li>
    </ul>
    <p>See "Feature.experimental and feature.manyCommits".</p>
    <h2>Combining with monorepo stack</h2>
    <pre><code>git config feature.manyFiles true
    git config core.fsmonitor true
    git config core.commitGraph true
    git sparse-checkout init --cone --sparse-index
    git maintenance start</code></pre>
    <p>This is the canonical setup for repos with hundreds of thousands of files.</p>
    <h2>Behavior across versions</h2>
    <p>The exact set of settings <code>feature.manyFiles</code> activates may change across Git versions. Treat it as opinionated defaults that the Git project tunes for you. Inspect with <code>git config --show-origin --list</code> after enabling.</p>
    <h2>Verifying impact</h2>
    <pre><code>time git -c feature.manyFiles=false status
    time git -c feature.manyFiles=true status
    GIT_TRACE2_PERF=1 git status 2&gt;&amp;1 | head -50</code></pre>
    <h2>Common mistakes</h2>
    <p>Setting <code>feature.manyFiles=true</code> without running <code>git update-index --index-version=4</code> on an existing repo — the policy is set but the on-disk index stays old. Re-running <code>git status</code> rewrites it, but you can force it:</p>
    <pre><code>git update-index --index-version 4
    git status                                # rewrites with new defaults</code></pre>
    <h2>Reset</h2>
    <pre><code>git config --unset feature.manyFiles
    git update-index --index-version 2</code></pre>
    <h2>Related</h2>
    <p>See "Configuring index.version for performance", "Feature.experimental and feature.manyCommits", and "Fsmonitor: faster working tree queries".</p>

- title: "Feature.experimental and feature.manyCommits"
  section: "Performance"
  difficulty: "Expert"
  git_version: "2.30+"
  weight: 200
  body: |
    <h2>Opt-in experiments</h2>
    <p>The Git project tests new performance features behind <code>feature.experimental</code>. Enabling it activates settings under evaluation for default-on. This is the place to look when tracking the bleeding edge of Git performance.</p>
    <h2>What it currently sets</h2>
    <p>Across recent versions, <code>feature.experimental=true</code> has at various times included:</p>
    <ul>
      <li><code>protocol.version=2</code> (now default).</li>
      <li><code>fetch.negotiationAlgorithm=skipping</code> (now default).</li>
      <li><code>pack.useSparse=true</code>.</li>
      <li><code>core.commitGraph=true</code> (now default).</li>
      <li><code>core.multiPackIndex=true</code> (now default).</li>
    </ul>
    <p>The exact set varies by Git version. Inspect after enabling:</p>
    <pre><code>git config feature.experimental true
    git config --list --show-origin | grep -i 'feature\|protocol\|pack\|commitgraph'</code></pre>
    <h2>feature.manyCommits</h2>
    <p>This feature flag has appeared in Git planning to bundle commit-graph-related defaults. As of recent stable Git, most of those settings are already on by default. Treat <code>feature.manyCommits</code> as a forward-compatibility hook; check your Git version's documentation.</p>
    <pre><code>git --version
    git help config | grep -A3 manyCommits</code></pre>
    <h2>Risk profile</h2>
    <p>"Experimental" means the Git developers think it is ready for broad testing but reserve the right to tune behavior. If you hit a perf regression, file a report and disable the flag. Production CI should pin Git versions to avoid surprises.</p>
    <h2>Tracking changes</h2>
    <p>Read the <code>RelNotes/</code> directory of the Git source for each release to see what experimental flags have moved in or out. Subscribe to the git@vger.kernel.org mailing list for ongoing discussions.</p>
    <h2>Practical advice</h2>
    <ul>
      <li>For monorepo work, prefer <code>feature.manyFiles</code> over <code>feature.experimental</code>.</li>
      <li>Use <code>feature.experimental</code> on a personal machine or staging system to evaluate.</li>
      <li>Document the Git version and feature settings in your CONTRIBUTING.md so the team is consistent.</li>
    </ul>
    <h2>Common mistakes</h2>
    <p>Enabling experimental features in CI then upgrading Git, watching behavior change unexpectedly. Confusing <code>feature.experimental</code> with <code>feature.manyFiles</code>; they overlap but are distinct knobs. Forgetting that some experimental features eventually become default — the flag becomes a no-op rather than retroactively changing behavior.</p>
    <h2>Related</h2>
    <p>See "Feature.manyFiles configuration", "Why Git performance matters at scale", and "Configuration playbook for large repositories".</p>

- title: "pack.windowMemory and pack.threads tuning"
  section: "Performance"
  difficulty: "Expert"
  git_version: "2.30+"
  weight: 210
  body: |
    <h2>Repack budgets</h2>
    <p>When Git computes deltas during repack, it considers a window of candidate base objects per target. Larger windows produce smaller packs but use more memory and CPU. Tuning is essential for huge repos and constrained build runners alike.</p>
    <h2>Key knobs</h2>
    <pre><code>[pack]
    windowMemory = 256m       # max RAM per delta-search worker
    threads = 0               # 0 = auto-detect cores
    deltaCacheSize = 256m     # cache for in-flight deltas
    deltaCacheLimit = 1000    # objects beyond this size skip cache
    window = 10               # default delta window size
    depth = 50                # max delta chain depth
    sizeLimit = 2g            # split packs larger than this
    bigFileThreshold = 512m   # treat above as binary, no delta</code></pre>
    <h2>Repacking with custom budgets</h2>
    <pre><code>git repack -adf --window=250 --depth=50 \
      --window-memory=512m --threads=8 \
      --write-midx --write-bitmap-index</code></pre>
    <p>The <code>-f</code> flag forces full delta recomputation rather than reusing existing deltas, important after big imports.</p>
    <h2>Memory math</h2>
    <p>Total memory roughly equals <code>pack.threads × pack.windowMemory + pack.deltaCacheSize</code>. On a 16-core box with 256m windows and 256m cache, that's ~4.3GB during repack. Constrain on small runners:</p>
    <pre><code>git -c pack.threads=2 -c pack.windowMemory=128m repack -adf</code></pre>
    <h2>Server tuning</h2>
    <p>Shared Git servers serve many concurrent fetches that each spawn pack workers. Limit per-process memory:</p>
    <pre><code>[uploadpack]
    packObjectsHook = /usr/local/bin/pack-objects-wrapper
    [pack]
    threads = 4
    windowMemory = 128m</code></pre>
    <h2>Big file threshold</h2>
    <p>Files above <code>core.bigFileThreshold</code> (default 512m) are stored undeltified, saving CPU at the cost of disk. Useful when your repo has occasional huge binary blobs.</p>
    <pre><code>git config core.bigFileThreshold 50m</code></pre>
    <h2>Common mistakes</h2>
    <p>Setting <code>--window=2000</code> hoping for tighter packs without testing memory — OOM follows. Pinning <code>pack.threads=1</code> on a multi-core runner, leaving 90% of CPU idle. Forgetting that <code>--aggressive</code> overrides defaults to depth=250, window=250 — never use it on a CI box.</p>
    <h2>Measuring effect</h2>
    <pre><code>du -sh .git/objects/pack/
    git verify-pack -v .git/objects/pack/pack-*.idx | tail -3
    GIT_TRACE2_PERF=1 git repack -adf 2&gt;&amp;1 | tail -20</code></pre>
    <h2>Related</h2>
    <p>See "Geometric repacking strategy", "Multi-pack-index (MIDX): unified pack object lookup", and "Configuration playbook for large repositories".</p>

- title: "core.preloadIndex and parallel checkout (Git 2.32+)"
  section: "Performance"
  difficulty: "Advanced"
  git_version: "2.32+"
  weight: 220
  body: |
    <h2>Two parallelism wins</h2>
    <p>Two settings unlock significant speedups for everyday operations. <code>core.preloadIndex</code> parallelizes the lstat calls that <code>git status</code> makes; parallel checkout (Git 2.32+) parallelizes the file writes during <code>git checkout</code>, <code>git switch</code>, and <code>git restore</code>.</p>
    <h2>Preload index</h2>
    <pre><code>git config core.preloadIndex true</code></pre>
    <p>Default true on most modern builds. With it, Git fans out lstat calls across multiple threads, dramatically faster on filesystems with high syscall latency (network mounts, encrypted filesystems).</p>
    <h2>Parallel checkout</h2>
    <pre><code>git config checkout.workers 0           # auto-detect cores
    git config checkout.thresholdForParallelism 100</code></pre>
    <p><code>workers=0</code> uses all cores. <code>thresholdForParallelism</code> controls how many files must change before parallelization kicks in (default 100; below it, single-threaded is faster due to startup overhead).</p>
    <h2>When parallel checkout helps most</h2>
    <ul>
      <li>Switching branches with thousands of file differences.</li>
      <li>Initial checkout after clone.</li>
      <li>Restoring large path sets via <code>git restore</code>.</li>
      <li>Filesystems with slow per-file open (Windows NTFS, network shares).</li>
    </ul>
    <h2>Measurement</h2>
    <pre><code>time git -c checkout.workers=1 checkout main
    time git -c checkout.workers=0 checkout main
    GIT_TRACE2_PERF=1 git checkout big-branch 2&gt;&amp;1 | grep -i checkout</code></pre>
    <h2>Caveats</h2>
    <p>Parallel checkout interacts with smudge filters: filters run sequentially per-file, but multiple files run in parallel. Long-running filters (Git LFS) benefit handsomely. Filter order is not guaranteed, but file content is correct.</p>
    <h2>Filesystem warnings</h2>
    <p>On Windows, antivirus software can serialize file creates regardless of Git's threads. Exclude the working tree from real-time scanning, or you'll see no benefit.</p>
    <h2>Common mistakes</h2>
    <p>Disabling preloadIndex on slow disks, "to save threads" — backwards: parallelism hides latency. Setting <code>checkout.workers=1</code> in a Docker base image and forgetting; CI loses 4-8x potential. Confusing <code>checkout.workers</code> (write parallelism) with <code>fetch.parallel</code> (network parallelism) — both useful but for different operations.</p>
    <h2>Related</h2>
    <p>See "Why Git performance matters at scale" and "Configuration playbook for large repositories".</p>

- title: "Shallow clones in CI/CD: balancing speed and correctness"
  section: "Performance"
  difficulty: "Intermediate"
  git_version: "2.30+"
  weight: 230
  body: |
    <h2>The shallow tradeoff</h2>
    <p>A shallow clone (<code>--depth=N</code>) downloads only the last N commits. Faster, smaller, but with caveats: many history-dependent operations become impossible or wrong. CI is the natural home for shallow clones, but only when you understand the limits.</p>
    <h2>Basic invocation</h2>
    <pre><code>git clone --depth=1 https://example.com/repo.git
    git clone --depth=50 --no-tags https://example.com/repo.git
    git clone --shallow-since=2024-01-01 https://example.com/repo.git
    git clone --shallow-exclude=v1.0.0 https://example.com/repo.git</code></pre>
    <h2>Single-branch</h2>
    <p>Shallow clones default to <code>--single-branch</code> with <code>--depth</code>. To clone all branches shallowly:</p>
    <pre><code>git clone --depth=1 --no-single-branch https://example.com/repo.git</code></pre>
    <h2>What breaks</h2>
    <ul>
      <li><code>git log</code> stops at the shallow boundary.</li>
      <li><code>git blame</code> assigns deeper changes to the boundary commit.</li>
      <li><code>git bisect</code> can only search inside the shallow window.</li>
      <li><code>git merge-base</code> may fail to find a base that is older than the shallow.</li>
      <li><code>git push</code> is fine, but <code>git fetch</code> returning history older than the shallow requires <code>--unshallow</code>.</li>
    </ul>
    <h2>Promoting later</h2>
    <pre><code>git fetch --unshallow
    git fetch --depth=1000      # extend the depth
    git fetch --shallow-since=2023-01-01</code></pre>
    <h2>CI patterns</h2>
    <p>For build-and-test only:</p>
    <pre><code>git clone --depth=1 --no-tags --filter=tree:0 \
      --branch "$CI_COMMIT_REF_NAME" "$CI_REPOSITORY_URL" .</code></pre>
    <p>Combining <code>--depth=1</code> with <code>--filter</code> is generally redundant — depth already cuts history — but pairing with sparse-checkout for path-scoped builds is potent.</p>
    <h2>When to avoid shallow</h2>
    <ul>
      <li>Release builds that embed git describe — needs tags and history.</li>
      <li>SBOM/license scanners that walk authorship.</li>
      <li>Bisect or blame steps in CI.</li>
      <li>Merge-base computations against a long-lived base branch.</li>
    </ul>
    <h2>Common mistakes</h2>
    <p>Using <code>--depth=1</code> in a release pipeline that runs <code>git describe</code> and printing v0.0.0-unknown. Treating <code>--unshallow</code> as fast — it pulls the rest of history, large on big repos. Forgetting <code>--no-tags</code> on shallow CI clones; tags can balloon the transfer.</p>
    <h2>Related</h2>
    <p>See "Partial clone: promise and promisor remotes" for an alternative trade-off.</p>

- title: "Protocol v2 for efficient fetch negotiation"
  section: "Performance"
  difficulty: "Advanced"
  git_version: "2.30+"
  weight: 240
  body: |
    <h2>Why v2</h2>
    <p>Protocol v0/v1 sent the server's full ref advertisement at the start of every fetch — a payload proportional to the number of refs. On repos with tens of thousands of refs (releases, PRs, mirrors), this dominated transfer time. Protocol v2 (default in Git 2.26+) lets the client request specific refs by name, dropping the upfront cost dramatically.</p>
    <h2>Verifying it is on</h2>
    <pre><code>GIT_TRACE_PACKET=1 git ls-remote origin 2&gt;&amp;1 | head -10
    git config protocol.version 2
    git config --global protocol.version 2</code></pre>
    <p>Look for <code>version=2</code> in the trace. Some older servers still negotiate down to v0 or v1.</p>
    <h2>Server requirements</h2>
    <ul>
      <li>HTTP: Git 2.18+ on the server, with <code>http.receivepack</code> aware of v2.</li>
      <li>SSH: Git 2.18+ on both ends; for many providers, this is automatic.</li>
      <li>Some legacy hosts may need <code>uploadpack.allowFilter=true</code> and explicit v2 enablement.</li>
    </ul>
    <h2>Capabilities</h2>
    <p>v2 introduces capability negotiation. The client lists what it understands; the server responds with the intersection. Newer features (filter, ref-prefix, sideband) ride along.</p>
    <pre><code>GIT_TRACE_PACKET=1 git fetch 2&gt;&amp;1 | grep -i 'capabilit\|fetch='</code></pre>
    <h2>Practical impact</h2>
    <p>On Linux's repo (~50k refs), a fresh fetch over v0 spent 4-8 seconds in advertisement; v2 cuts this to under a second. On JS monorepos with auto-generated PR refs, the difference is even more pronounced.</p>
    <h2>Sideband and progress</h2>
    <p>v2 standardizes sideband-64k progress reporting. Disable for non-tty consumers like CI:</p>
    <pre><code>git fetch --quiet
    git -c progress.delay=999 fetch</code></pre>
    <h2>Common mistakes</h2>
    <p>Forcing protocol version 0 in old config files left from upgrades. Believing v2 helps with object transfer size — it primarily helps with negotiation overhead. Mixing v2 client with v0 server: works (negotiates down) but wastes the win.</p>
    <h2>Combine with</h2>
    <ul>
      <li>Negotiation algorithm: <code>fetch.negotiationAlgorithm=skipping</code>.</li>
      <li>Reachability bitmaps on the server.</li>
      <li>Ref filtering: <code>fetch.refSpecs</code>.</li>
    </ul>
    <h2>Related</h2>
    <p>See "Wire protocol optimization: stateless-connect" and "Fetch and push over large repositories".</p>

- title: "Wire protocol optimization: stateless-connect"
  section: "Performance"
  difficulty: "Expert"
  git_version: "2.30+"
  weight: 250
  body: |
    <h2>The transport layer</h2>
    <p>Git's wire protocol historically interleaves client and server messages over a stateful connection. <code>stateless-connect</code> (introduced for protocol v2 over HTTP) decouples requests so each is independently routable, friendlier to load balancers and HTTP/2 servers.</p>
    <h2>Stateless flows</h2>
    <p>Under stateless-connect, the client sends a self-contained request (capabilities, wants, haves, options) over a single HTTP POST. The server answers with the response. No long-lived TCP state, no per-connection negotiation rounds.</p>
    <pre><code>GIT_TRACE_PACKET=1 GIT_TRACE_CURL=1 \
      git -c protocol.version=2 fetch origin 2&gt;&amp;1 | head -50</code></pre>
    <h2>HTTP/2 benefits</h2>
    <p>HTTP/2 multiplexing lets multiple stateless requests share one connection. Combined with v2's capability negotiation, fetches against modern servers (GitHub, GitLab) are noticeably faster — especially over high-latency links.</p>
    <h2>Tuning the HTTP layer</h2>
    <pre><code>[http]
    version = HTTP/2
    postBuffer = 524288000     # 500MB; raise for large pushes
    lowSpeedLimit = 1000
    lowSpeedTime = 30
    minSessions = 4
    maxRequestBuffer = 100M</code></pre>
    <p><code>http.postBuffer</code> matters for pushes over flaky networks; the buffer holds the request before sending, so larger means fewer retries on TCP hiccups.</p>
    <h2>Fetch parallelism</h2>
    <pre><code>git config fetch.parallel 0
    git config submodule.fetchJobs 0</code></pre>
    <p>Stateless requests parallelize cleanly; multiple submodule fetches go in parallel without sharing state.</p>
    <h2>Smart vs dumb HTTP</h2>
    <p>"Smart" HTTP supports negotiation (the modern path); "dumb" HTTP just serves <code>.git/objects</code> as static files. Always prefer smart. Configure servers to expose <code>git-upload-pack</code> CGI or use a forge that runs Git natively.</p>
    <h2>Common mistakes</h2>
    <p>Forcing HTTP/1.1 with <code>http.version=HTTP/1.1</code> on a host that supports HTTP/2 — multiplexing wins are lost. Setting <code>http.postBuffer</code> very high "just in case" — it allocates per request. Believing stateless-connect changes object format; it only changes the request layer.</p>
    <h2>Diagnosing</h2>
    <pre><code>GIT_CURL_VERBOSE=1 git fetch 2&gt;&amp;1 | head -30
    GIT_TRACE_PACKET=1 git fetch 2&gt;&amp;1 | grep -i version</code></pre>
    <h2>Related</h2>
    <p>See "Protocol v2 for efficient fetch negotiation" and "Fetch and push over large repositories".</p>

- title: "Delta islands for pack efficiency"
  section: "Performance"
  difficulty: "Expert"
  git_version: "2.30+"
  weight: 260
  body: |
    <h2>The cross-fork problem</h2>
    <p>Forge servers (GitHub, GitLab) host many forks of a repo together. Naively, a single packfile delta-compresses across all forks — efficient on disk, but inefficient when serving a single fork: the server must decompress through unrelated objects to reconstruct what one client wants. Delta islands constrain delta chains so that each fork's chains stay within its own object set.</p>
    <h2>Configuring islands</h2>
    <pre><code>[pack]
    island = refs/heads/main
    island = refs/heads/release/*
    island = refs/tags/*</code></pre>
    <p>Each <code>pack.island</code> entry defines a regex over ref names. Objects reachable only from one island compute deltas against other objects in the same island, never crossing.</p>
    <h2>Repacking with islands</h2>
    <pre><code>git repack -adf --window=250 --depth=50</code></pre>
    <p>The repack reads <code>pack.island</code> config and assigns objects to islands. The resulting pack is slightly larger on disk but dramatically cheaper to serve per fork.</p>
    <h2>Use cases</h2>
    <ul>
      <li>Self-hosted Gitea/GitLab/Forgejo with many forks.</li>
      <li>Internal mirrors that serve multiple internal repos from one underlying store.</li>
      <li>Backups that need to extract per-repo snapshots quickly.</li>
    </ul>
    <h2>Server-only feature</h2>
    <p>Delta islands matter on the server. As a client, you almost never configure them — your packs come pre-deltaified and you decompress what you fetch.</p>
    <h2>Verifying</h2>
    <pre><code>git verify-pack -v .git/objects/pack/pack-*.idx | head
    GIT_TRACE2_PERF=1 git pack-objects --stdout --revs &lt; refs.txt &gt; out.pack</code></pre>
    <h2>Common mistakes</h2>
    <p>Setting islands too coarsely (everything in one island) — no benefit. Setting them too finely (per-PR) — pack size balloons. Forgetting that islands only apply to fresh repacks; existing packs need <code>-f</code> to recompute.</p>
    <h2>Pseudo-merge bitmaps</h2>
    <p>Recent Git pairs delta islands with pseudo-merge bitmaps so that each island can answer reachability queries quickly. See "Reachability bitmaps for fast set operations".</p>
    <h2>Related</h2>
    <p>See "Geometric repacking strategy", "Reachability bitmaps for fast set operations", and "Git internals: packfiles and delta compression".</p>

- title: "Ahead-of-time packfile building with git fast-export"
  section: "Performance"
  difficulty: "Expert"
  git_version: "2.30+"
  weight: 270
  body: |
    <h2>fast-export and fast-import</h2>
    <p><code>git fast-export</code> serializes a repository to a stream of commands; <code>git fast-import</code> reconstructs a repository from one. Together they form Git's data interchange protocol — used by importers (cvs2git, hg-fast-export, p4-fast-export) and by tools like <code>git filter-repo</code> internally.</p>
    <h2>Exporting</h2>
    <pre><code>git fast-export --all &gt; all.fi
    git fast-export --all --signed-tags=strip --tag-of-filtered-object=drop &gt; clean.fi
    git fast-export --reference-excluded-parents main..feature &gt; topic.fi</code></pre>
    <h2>Importing</h2>
    <pre><code>mkdir new-repo &amp;&amp; cd new-repo &amp;&amp; git init
    cat ../all.fi | git fast-import
    git checkout main</code></pre>
    <p>fast-import streams data, never holding the full set in memory — fast even for huge repos.</p>
    <h2>Use case: dehydrated archive</h2>
    <p>For ahead-of-time pack building (e.g., shipping a pre-built CDN clone), generate a deterministic packfile:</p>
    <pre><code>git rev-list --objects --all | \
      git pack-objects --stdout --revs --delta-base-offset \
      &gt; offline.pack</code></pre>
    <h2>Deterministic builds</h2>
    <p>fast-export with <code>--no-data</code> emits a metadata-only stream useful for scripts that build packs in CI:</p>
    <pre><code>git fast-export --all --no-data &gt; metadata-only.fi</code></pre>
    <h2>Anonymizing</h2>
    <p>For bug reports without leaking source:</p>
    <pre><code>git fast-export --all --anonymize &gt; anon.fi</code></pre>
    <p>Authors, file names, and content are replaced with stable opaque tokens, preserving structure for reproduction.</p>
    <h2>Surgery via filter-repo</h2>
    <p><code>git filter-repo</code> uses fast-export internally; that is why it is fast. See "filter-repo: rewriting history safely".</p>
    <h2>Common mistakes</h2>
    <p>Treating fast-export streams as portable archives — they are line-oriented and version-tied to a Git format; older Git may reject newer streams. Forgetting <code>--signed-tags=strip</code> when import would lose signatures. Mixing fast-export with custom tools that emit non-canonical paths; sort or re-export.</p>
    <h2>Performance</h2>
    <p>On a 10GB repo, fast-export streams at 200-500 MB/s on SSD. Pipelining export to import lets you reformat in one pass:</p>
    <pre><code>git fast-export --all | (cd /tmp/new &amp;&amp; git init &amp;&amp; git fast-import)</code></pre>
    <h2>Related</h2>
    <p>See "filter-repo: rewriting history safely" and "Git archive and bundle for distribution".</p>

- title: "Repository size analysis: git count-objects and git sizer"
  section: "Performance"
  difficulty: "Advanced"
  git_version: "2.30+"
  weight: 280
  body: |
    <h2>Knowing your weight</h2>
    <p>Before optimizing, measure. Git ships <code>git count-objects</code> for basic stats; the third-party <code>git-sizer</code> from GitHub gives a deeper analysis with thresholds for trouble. Together they tell you whether your repo needs LFS, partial clone, or rewrite.</p>
    <h2>git count-objects</h2>
    <pre><code>git count-objects -v
    git count-objects -vH               # human-readable
    git count-objects --human-readable</code></pre>
    <p>Output explains: count of loose objects, size, in-pack, packs, garbage, prune-packable. Loose object count over a few thousand triggers auto-gc.</p>
    <h2>git-sizer</h2>
    <p>Install: <code>brew install git-sizer</code> or download a binary. Run from any clone:</p>
    <pre><code>git-sizer
    git-sizer --verbose
    git-sizer --no-progress --threshold 1</code></pre>
    <p>It analyzes commits, trees, blobs, references, and reports sizes plus warnings (e.g., "1 file with 800MB, consider Git LFS").</p>
    <h2>Sample insights</h2>
    <ul>
      <li>Maximum number of files in a tree: warns above 100k.</li>
      <li>Maximum blob size: warns above 50MB.</li>
      <li>Total size of all commits: tracks growth.</li>
      <li>Maximum tag depth: detects pathological tag chains.</li>
      <li>Total reachable objects: indicates clone time.</li>
    </ul>
    <h2>Finding big files</h2>
    <pre><code>git rev-list --objects --all | \
      git cat-file --batch-check='%(objecttype) %(objectname) %(objectsize:disk) %(rest)' | \
      awk '$1=="blob" {print $3, $4}' | sort -rn | head</code></pre>
    <p>This pipeline finds the largest blobs in history. Combine with <code>git log --all --find-object=&lt;sha&gt;</code> to identify when each was introduced.</p>
    <h2>Action items by finding</h2>
    <ul>
      <li>Big blobs: migrate to Git LFS or rewrite history with <code>filter-repo</code>.</li>
      <li>Many small files: enable <code>feature.manyFiles</code>, sparse checkout.</li>
      <li>Many refs: enable protocol v2; consider reftable.</li>
      <li>Slow walks: write commit-graph with Bloom filters.</li>
      <li>Slow lookups: enable MIDX with bitmaps.</li>
    </ul>
    <h2>Common mistakes</h2>
    <p>Looking only at <code>.git</code> size on disk — packed objects share bytes via deltas, so on-disk size can be misleading. Use <code>git-sizer</code>'s logical sizes. Confusing reachable size with total: garbage objects inflate disk but not clone bandwidth.</p>
    <h2>Tracking growth</h2>
    <pre><code>git-sizer --json &gt; sizer-$(date +%Y%m%d).json
    diff &lt;(jq . sizer-old.json) &lt;(jq . sizer-new.json)</code></pre>
    <h2>Related</h2>
    <p>See "Git garbage collection: gc, prune, and pack-refs", "filter-repo: rewriting history safely", and "Recovery and repair of corrupt repositories".</p>

- title: "Configuration playbook for large repositories"
  section: "Performance"
  difficulty: "Advanced"
  git_version: "2.37+"
  weight: 290
  body: |
    <h2>The all-in-one config</h2>
    <p>Putting the pieces together: this is a single configuration that applies the modern Git performance stack. Drop it into <code>.git/config</code> on a fresh clone, run the one-time tasks, and you have the recommended setup for repos with hundreds of thousands of files and active history.</p>
    <h2>The config block</h2>
    <pre><code>[feature]
    manyFiles = true
    [core]
    fsmonitor = true
    untrackedCache = true
    commitGraph = true
    multiPackIndex = true
    preloadIndex = true
    [index]
    version = 4
    sparse = true
    [fetch]
    parallel = 0
    writeCommitGraph = true
    negotiationAlgorithm = skipping
    showForcedUpdates = false
    [gc]
    auto = 0                     # let maintenance handle it
    writeCommitGraph = true
    [maintenance]
    auto = false                 # let scheduler drive it
    [checkout]
    workers = 0
    thresholdForParallelism = 100
    [pack]
    useSparse = true
    writeBitmaps = true
    threads = 0
    windowMemory = 256m
    [commitGraph]
    changedPathsVersion = 2
    [diff]
    algorithm = histogram
    [merge]
    conflictStyle = zdiff3
    [rebase]
    autoSquash = true
    autoStash = true
    updateRefs = true
    [push]
    autoSetupRemote = true
    [protocol]
    version = 2</code></pre>
    <h2>One-time tasks</h2>
    <pre><code># Enable sparse, partial-clone-friendly setup
    git sparse-checkout init --cone --sparse-index
    git sparse-checkout set apps/web libs/shared

    # Build performance artifacts
    git commit-graph write --reachable --changed-paths
    git multi-pack-index write --bitmap
    git update-index --index-version 4
    git pack-refs --all

    # Start background maintenance
    git maintenance start</code></pre>
    <h2>Verification</h2>
    <pre><code>git config --list --show-origin | sort
    git maintenance status
    git fsmonitor--daemon status
    git-sizer --no-progress
    GIT_TRACE2_PERF=1 git status</code></pre>
    <h2>Per-platform notes</h2>
    <ul>
      <li>Linux: raise <code>fs.inotify.max_user_watches</code> to 524288+.</li>
      <li>macOS: nothing extra; FSEvents handles huge trees natively.</li>
      <li>Windows: exclude the working tree from real-time AV scanning.</li>
      <li>WSL2: works correctly; WSL1 does not (no inotify).</li>
    </ul>
    <h2>Per-team notes</h2>
    <p>Document this in the repo's CONTRIBUTING.md. Pin a Git version (2.39+ recommended) so the team gets consistent behavior. Run <code>git maintenance start</code> in onboarding scripts.</p>
    <h2>Common mistakes</h2>
    <p>Applying every setting at once without measuring — some have tradeoffs (e.g., <code>fetch.showForcedUpdates=false</code> hides force-pushes from <code>fetch</code> output). Forgetting the one-time tasks; the config does nothing without them. Using older Git that does not understand half the settings.</p>
    <h2>Related</h2>
    <p>See every Performance page; this playbook is the synthesis. Especially "Why Git performance matters at scale" and "Background maintenance: git maintenance run/start/stop".</p>

- title: "Recovery and repair of corrupt repositories"
  section: "Performance"
  difficulty: "Expert"
  git_version: "2.30+"
  weight: 300
  body: |
    <h2>Diagnosing corruption</h2>
    <p>Repositories corrupt through power loss, disk failure, partial network sync, or buggy non-Git tools touching <code>.git</code>. Symptoms range from "<code>fatal: bad object</code>" to wrong content silently delivered. Diagnosis starts with <code>fsck</code>:</p>
    <pre><code>git fsck --full
    git fsck --full --strict --no-dangling
    git fsck --connectivity-only
    git fsck --lost-found</code></pre>
    <p><code>--lost-found</code> writes orphaned objects to <code>.git/lost-found/</code> for manual inspection.</p>
    <h2>Common failures and fixes</h2>
    <h3>Loose object corrupted</h3>
    <p>If <code>fsck</code> reports <code>broken link from ... to blob &lt;sha&gt;</code>, see if a colleague's clone has the object:</p>
    <pre><code># on healthy clone:
    git cat-file -p &lt;sha&gt; &gt; /tmp/recovered
    # on corrupt clone:
    cd .git/objects/&lt;xx&gt;
    mv &lt;rest-of-sha&gt; &lt;rest-of-sha&gt;.bad
    git hash-object -w /tmp/recovered</code></pre>
    <h3>Pack file corrupted</h3>
    <p>Find the bad pack:</p>
    <pre><code>for p in .git/objects/pack/pack-*.pack; do
      git verify-pack -v "$p" &gt;/dev/null 2&gt;&amp;1 || echo "BAD: $p"
    done</code></pre>
    <p>Then either remove the bad pack and refetch:</p>
    <pre><code>rm .git/objects/pack/pack-&lt;sha&gt;.{pack,idx,bitmap,rev}
    git fetch --all
    git repack -ad</code></pre>
    <h3>Reflog corrupted or missing</h3>
    <p>The reflog is per-clone; cannot recover from upstream. If lost, missing branches must be reconstructed from FETCH_HEAD or by asking colleagues for their tip SHAs.</p>
    <h3>Index corrupted</h3>
    <pre><code>rm .git/index
    git reset                    # rebuilds index from HEAD</code></pre>
    <h3>Refs corrupted</h3>
    <pre><code>git pack-refs --all
    cat .git/packed-refs                  # readable text
    git update-ref refs/heads/main &lt;sha&gt;  # recreate from known SHA</code></pre>
    <h2>Repository-wide recovery from a clone</h2>
    <p>Often the fastest path is to clone fresh from a healthy remote, then copy local-only branches:</p>
    <pre><code>git clone https://example.com/repo.git fresh
    cd corrupt
    git push ../fresh 'refs/heads/local-only:refs/heads/local-only'</code></pre>
    <h2>Prevention</h2>
    <ul>
      <li>Run <code>git fsck</code> regularly; <code>git maintenance</code> can include it.</li>
      <li>Store bare backups: <code>git clone --mirror</code> on a separate disk.</li>
      <li>Avoid editing inside <code>.git/</code> by hand.</li>
      <li>Use ECC RAM and reliable storage on long-lived servers.</li>
    </ul>
    <h2>Common mistakes</h2>
    <p>Running <code>git gc</code> on a corrupt repo — pruning may delete the only copies of recoverable objects. Always backup <code>.git</code> before recovery. Mixing recovered objects from different SHA-1 algorithms; SHA-256 repos cannot accept SHA-1 objects.</p>
    <h2>SHA-1 collision protection</h2>
    <p>Modern Git includes SHAttered hardening, refusing to write objects whose hashes match the known collision pair. Verify your build:</p>
    <pre><code>git --version
    echo "test" | git hash-object --stdin</code></pre>
    <h2>Related</h2>
    <p>See "Git garbage collection: gc, prune, and pack-refs", "Git internals: the object database", and "Repository size analysis: git count-objects and git sizer".</p>
