- title: git init — Create a new Git repository
  section: Commands Reference
  difficulty: Beginner
  git_version: 2.30+
  weight: 10
  body: |
    <h2>Synopsis</h2>
    <pre><code>git init [--bare] [--initial-branch=&lt;name&gt;] [--template=&lt;dir&gt;] [directory]</code></pre>
    <h2>Description</h2>
    <p>The <code>git init</code> command creates a new, empty Git repository or reinitializes an existing one. It is typically the first command you run when you want to start tracking a project with Git. The command creates a hidden <code>.git</code> directory containing all the metadata Git needs: the object database, references, configuration, hooks, and the index. Without this directory, Git has no place to store history.</p>
    <p>Running <code>git init</code> in an existing repository is safe — it will not overwrite existing objects or refs. Instead, it will reinitialize templates and ensure the directory structure is intact. By default, modern Git creates a repository with the branch name configured by <code>init.defaultBranch</code>, which is usually <code>main</code> on new installations.</p>
    <p>Beyond the default behavior, <code>git init</code> respects the <code>core.hooksPath</code> setting if you keep a centralized hooks directory, and the <code>init.templateDir</code> config to copy custom hooks and exclude files into every new repository. On filesystems where case sensitivity matters, <code>core.ignoreCase</code> is set automatically based on detection at init time. Teams that frequently bootstrap new services often script the post-init steps: setting the default branch, adding a license file, configuring the gitignore template, and setting up a remote — all immediately after running <code>git init</code>. Understanding what files <code>.git/</code> contains (HEAD, config, objects/, refs/, hooks/) demystifies later operations and makes recovery from accidents much easier.</p>
        <h2>Common Options</h2>
    <table>
      <thead><tr><th>Option</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>--bare</code></td><td>Create a bare repository with no working tree, suitable for hosting on a server.</td></tr>
        <tr><td><code>--initial-branch=&lt;name&gt;</code> / <code>-b</code></td><td>Set the name of the initial branch (default <code>main</code>).</td></tr>
        <tr><td><code>--template=&lt;dir&gt;</code></td><td>Use a custom template directory for hooks and config.</td></tr>
        <tr><td><code>--shared[=&lt;perms&gt;]</code></td><td>Allow the repository to be shared by a Unix group.</td></tr>
        <tr><td><code>--separate-git-dir=&lt;dir&gt;</code></td><td>Store the actual Git data in a separate directory, leaving a <code>.git</code> file pointing to it.</td></tr>
        <tr><td><code>-q</code>, <code>--quiet</code></td><td>Suppress informational output.</td></tr>
      </tbody>
    </table>
    <h2>Examples</h2>
    <pre><code>git init
    # Initialize a repository in the current directory

    git init my-project
    # Create a new directory and initialize a repo inside it

    git init --bare /srv/git/myproject.git
    # Create a bare repository to host on a server

    git init -b trunk
    # Initialize with the initial branch named "trunk" instead of "main"</code></pre>
    <h2>Common Mistakes</h2>
    <p>A frequent mistake is running <code>git init</code> in your home directory by accident, which turns your entire home folder into a repository. Always check your current directory before running it. Another pitfall is initializing a repo inside an existing repo's working tree — this creates nested repos that can confuse tools and humans alike. If you accidentally created an unwanted repo, simply remove the <code>.git</code> directory to undo it.</p>
    <h2>Related Commands</h2>
    <p><code>git clone</code>, <code>git config</code>, <code>git remote</code></p>
- title: git clone — Copy a repository from a remote source
  section: Commands Reference
  difficulty: Beginner
  git_version: 2.30+
  weight: 20
  body: |
    <h2>Synopsis</h2>
    <pre><code>git clone [--branch &lt;name&gt;] [--depth &lt;n&gt;] [--recurse-submodules] &lt;url&gt; [directory]</code></pre>
    <h2>Description</h2>
    <p>The <code>git clone</code> command copies an existing repository (typically from a remote server) into a new local directory. It performs three actions: it creates a new directory, runs <code>git init</code> inside it, and then fetches all branches and history from the remote. After cloning, the remote is automatically configured as <code>origin</code>, and the default branch is checked out into the working tree.</p>
    <p>Cloning supports multiple protocols: HTTPS (most common, easiest with credential helpers), SSH (preferred for write access using key-based auth), and the legacy <code>git://</code> protocol. For very large repositories, partial clones, shallow clones, and sparse checkouts can dramatically reduce the amount of data transferred.</p>
    <p>Authentication is one of the most common stumbling blocks. With HTTPS, modern Git uses credential helpers (Keychain on macOS, Credential Manager on Windows, libsecret on Linux) to cache tokens or passwords securely. With SSH, your local SSH agent supplies the key — make sure <code>ssh-add</code> has loaded it. After cloning, <code>git config --get remote.origin.url</code> confirms what was actually configured. For monorepo or supercomputer-scale repositories, partial clone (<code>--filter=blob:none</code>) combined with sparse checkout (<code>git sparse-checkout init --cone</code>) lets you work with just a slice of the project, reducing both clone time and on-disk footprint dramatically. CI pipelines benefit further from <code>--depth=1</code> and <code>--no-tags</code> when they don't need history.</p>
        <h2>Common Options</h2>
    <table>
      <thead><tr><th>Option</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>--branch &lt;name&gt;</code> / <code>-b</code></td><td>Check out the named branch or tag instead of the default.</td></tr>
        <tr><td><code>--depth &lt;n&gt;</code></td><td>Create a shallow clone with truncated history.</td></tr>
        <tr><td><code>--single-branch</code></td><td>Clone only the history of a single branch.</td></tr>
        <tr><td><code>--recurse-submodules</code></td><td>Initialize and clone submodules immediately after the main clone.</td></tr>
        <tr><td><code>--filter=blob:none</code></td><td>Create a partial clone without blob content (lazy fetched on demand).</td></tr>
        <tr><td><code>--bare</code></td><td>Make a bare clone with no working tree.</td></tr>
        <tr><td><code>--mirror</code></td><td>Set up a mirror with all refs, suitable for backups.</td></tr>
      </tbody>
    </table>
    <h2>Examples</h2>
    <pre><code>git clone https://github.com/user/project.git
    # Standard clone over HTTPS

    git clone git@github.com:user/project.git my-fork
    # Clone via SSH into a specific directory

    git clone --depth 1 --branch v2.0 https://github.com/user/project.git
    # Shallow clone of a specific tag, useful for CI

    git clone --filter=blob:none https://github.com/torvalds/linux.git
    # Partial clone for huge repos — blobs fetched on demand</code></pre>
    <h2>Common Mistakes</h2>
    <p>Cloning a giant repository without filters can take minutes or hours and consume gigabytes. For exploration or CI builds, prefer <code>--depth 1</code>. Another mistake is cloning over HTTPS when you intend to push changes — without credential setup, every push will prompt for a password. Use SSH or a credential helper for write access. Finally, be aware that <code>--single-branch</code> clones cannot easily access other branches without reconfiguring the remote.</p>
    <h2>Related Commands</h2>
    <p><code>git init</code>, <code>git fetch</code>, <code>git remote</code>, <code>git submodule</code></p>
- title: git add — Stage changes for the next commit
  section: Commands Reference
  difficulty: Beginner
  git_version: 2.30+
  weight: 30
  body: |
    <h2>Synopsis</h2>
    <pre><code>git add [-p] [-A] [-u] [--] [&lt;pathspec&gt;...]</code></pre>
    <h2>Description</h2>
    <p>The <code>git add</code> command moves changes from your working tree into the staging area (also called the index). The staging area is a snapshot of what will go into the next commit. By staging changes explicitly, Git lets you craft commits that contain exactly the work you want to record — even if your working tree has other unrelated edits in progress.</p>
    <p><code>git add</code> can stage entire files, parts of files (with <code>-p</code>), or directories. It does not commit anything; it only updates the index. The most common workflow is: edit, <code>git status</code>, <code>git add</code>, <code>git commit</code>. Mastering <code>git add</code>, especially its interactive modes, is one of the best ways to make your commit history readable and easy to review.</p>
    <p>In day-to-day use, <code>git add</code> integrates closely with shell aliases, editor plugins, and continuous integration. Power users often add aliases that combine flags they always pass, or wrap the command in scripts that enforce team conventions. Output formatting can be customized via Git config — pretty formats, color schemes, and pager behavior are all tunable. When something goes wrong, the first diagnostic step is usually to re-run the command with <code>GIT_TRACE=1</code> in the environment, which reveals the underlying plumbing calls. For unusual situations, the <code>--help</code> output (<code>git add --help</code>) opens the full manual page with details on every option, including those rarely used in casual workflows but essential for debugging or scripting at scale.</p><p>Understanding how <code>git add</code> interacts with the rest of Git's data model — the object database, the index, refs, and the working tree — pays dividends. Each command operates on some subset of these pieces, and knowing which it touches helps predict outcomes and recover from mistakes. Reading the official Git documentation alongside hands-on practice in a throwaway repository is the fastest way to internalize the nuances. Most production issues with Git stem from one of three causes: surprising default behavior, partial network operations, or rewriting history that was already shared. A working mental model of <code>git add</code>'s side effects helps avoid all three.</p>
        <h2>Common Options</h2>
    <table>
      <thead><tr><th>Option</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>-A</code>, <code>--all</code></td><td>Stage all changes in the working tree, including deletions and new files.</td></tr>
        <tr><td><code>-u</code>, <code>--update</code></td><td>Stage modifications and deletions to tracked files only — ignores new files.</td></tr>
        <tr><td><code>-p</code>, <code>--patch</code></td><td>Interactively choose hunks of changes to stage.</td></tr>
        <tr><td><code>-n</code>, <code>--dry-run</code></td><td>Show what would be staged without actually staging.</td></tr>
        <tr><td><code>-f</code>, <code>--force</code></td><td>Add files even if they match <code>.gitignore</code>.</td></tr>
        <tr><td><code>-i</code>, <code>--interactive</code></td><td>Open a menu-driven interface for staging.</td></tr>
        <tr><td><code>--intent-to-add</code> / <code>-N</code></td><td>Record an intent to add a file so its diff appears.</td></tr>
      </tbody>
    </table>
    <h2>Examples</h2>
    <pre><code>git add README.md src/main.c
    # Stage two specific files

    git add -A
    # Stage everything: new, modified, and deleted files

    git add -p
    # Interactively review and stage chunks one by one

    git add 'src/**/*.js'
    # Stage all JavaScript files under src using a pathspec</code></pre>
    <h2>Common Mistakes</h2>
    <p>Running <code>git add .</code> blindly often stages files you didn't intend — log files, build artifacts, secret keys. Use <code>git status</code> first and consider <code>-p</code> for sensitive changes. Another common confusion: <code>git add -u</code> will not pick up new files, while <code>git add .</code> will. After staging, if you change a file again, those subsequent edits are not staged until you re-run <code>git add</code>.</p>
    <h2>Related Commands</h2>
    <p><code>git commit</code>, <code>git status</code>, <code>git restore</code>, <code>git reset</code></p>
- title: git commit — Record staged changes to the repository
  section: Commands Reference
  difficulty: Beginner
  git_version: 2.30+
  weight: 40
  body: |
    <h2>Synopsis</h2>
    <pre><code>git commit [-m &lt;msg&gt;] [-a] [--amend] [--no-verify] [-S]</code></pre>
    <h2>Description</h2>
    <p>The <code>git commit</code> command takes everything currently in the staging area and creates a new commit object in the repository. A commit is an immutable snapshot containing a tree (the file contents), parent pointer(s), author and committer metadata, and a message. Commits are the unit of history in Git: branches are pointers to commits, merges produce commits with multiple parents, and tags label specific commits.</p>
    <p>A good commit message has a short subject line (under 50 characters), a blank line, and an optional body explaining the why. Many teams use conventional commits or other prefix systems. The <code>--amend</code> option modifies the most recent commit, useful for fixing typos in the message or forgetting to stage a file — but never amend a commit that has already been pushed and shared.</p>
    <p>In day-to-day use, <code>git commit</code> integrates closely with shell aliases, editor plugins, and continuous integration. Power users often add aliases that combine flags they always pass, or wrap the command in scripts that enforce team conventions. Output formatting can be customized via Git config — pretty formats, color schemes, and pager behavior are all tunable. When something goes wrong, the first diagnostic step is usually to re-run the command with <code>GIT_TRACE=1</code> in the environment, which reveals the underlying plumbing calls. For unusual situations, the <code>--help</code> output (<code>git commit --help</code>) opens the full manual page with details on every option, including those rarely used in casual workflows but essential for debugging or scripting at scale.</p><p>Understanding how <code>git commit</code> interacts with the rest of Git's data model — the object database, the index, refs, and the working tree — pays dividends. Each command operates on some subset of these pieces, and knowing which it touches helps predict outcomes and recover from mistakes. Reading the official Git documentation alongside hands-on practice in a throwaway repository is the fastest way to internalize the nuances. Most production issues with Git stem from one of three causes: surprising default behavior, partial network operations, or rewriting history that was already shared. A working mental model of <code>git commit</code>'s side effects helps avoid all three.</p>
        <h2>Common Options</h2>
    <table>
      <thead><tr><th>Option</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>-m &lt;msg&gt;</code></td><td>Use the given message instead of opening an editor.</td></tr>
        <tr><td><code>-a</code>, <code>--all</code></td><td>Automatically stage modifications and deletions to tracked files before committing.</td></tr>
        <tr><td><code>--amend</code></td><td>Replace the most recent commit with a new one.</td></tr>
        <tr><td><code>--no-verify</code></td><td>Skip pre-commit and commit-msg hooks.</td></tr>
        <tr><td><code>-S</code>, <code>--gpg-sign</code></td><td>GPG-sign the commit.</td></tr>
        <tr><td><code>--allow-empty</code></td><td>Allow a commit with no changes.</td></tr>
        <tr><td><code>--fixup=&lt;commit&gt;</code></td><td>Create a fixup commit for use with autosquash rebase.</td></tr>
        <tr><td><code>-v</code>, <code>--verbose</code></td><td>Show the diff in the commit message editor.</td></tr>
      </tbody>
    </table>
    <h2>Examples</h2>
    <pre><code>git commit -m "Fix off-by-one error in pagination"
    # Quick commit with a one-line message

    git commit -am "Update README"
    # Stage tracked changes and commit in one step

    git commit --amend -m "Better message"
    # Rewrite the most recent commit's message

    git commit --fixup=abc123
    # Create a fixup commit to be squashed during rebase</code></pre>
    <h2>Common Mistakes</h2>
    <p>Amending a published commit and then force-pushing rewrites history that others may have based work on, causing confusion. Only amend local, unshared commits. Another mistake is committing with <code>-a</code> when untracked files should also be included — <code>-a</code> ignores new files. Finally, never use <code>--no-verify</code> just to bypass failing tests; fix the test or the code instead.</p>
    <h2>Related Commands</h2>
    <p><code>git add</code>, <code>git status</code>, <code>git log</code>, <code>git revert</code></p>
- title: git status — Show the working tree status
  section: Commands Reference
  difficulty: Beginner
  git_version: 2.30+
  weight: 50
  body: |
    <h2>Synopsis</h2>
    <pre><code>git status [-s] [-b] [--porcelain[=&lt;version&gt;]] [--ignored]</code></pre>
    <h2>Description</h2>
    <p>The <code>git status</code> command displays the state of the working tree and the staging area. It shows which files are staged for the next commit, which are modified but not staged, and which are untracked. It also reports the current branch, whether it is ahead or behind the upstream, and any ongoing operations such as merges or rebases.</p>
    <p><code>git status</code> is the most-run Git command — it's safe, fast, and informational. Use it constantly to confirm what state your repository is in before making decisions. The default output is human-friendly with color and hints; the <code>--porcelain</code> output is stable, machine-readable, and meant for scripts.</p>
    <p>In day-to-day use, <code>git status</code> integrates closely with shell aliases, editor plugins, and continuous integration. Power users often add aliases that combine flags they always pass, or wrap the command in scripts that enforce team conventions. Output formatting can be customized via Git config — pretty formats, color schemes, and pager behavior are all tunable. When something goes wrong, the first diagnostic step is usually to re-run the command with <code>GIT_TRACE=1</code> in the environment, which reveals the underlying plumbing calls. For unusual situations, the <code>--help</code> output (<code>git status --help</code>) opens the full manual page with details on every option, including those rarely used in casual workflows but essential for debugging or scripting at scale.</p><p>Understanding how <code>git status</code> interacts with the rest of Git's data model — the object database, the index, refs, and the working tree — pays dividends. Each command operates on some subset of these pieces, and knowing which it touches helps predict outcomes and recover from mistakes. Reading the official Git documentation alongside hands-on practice in a throwaway repository is the fastest way to internalize the nuances. Most production issues with Git stem from one of three causes: surprising default behavior, partial network operations, or rewriting history that was already shared. A working mental model of <code>git status</code>'s side effects helps avoid all three.</p>
        <h2>Common Options</h2>
    <table>
      <thead><tr><th>Option</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>-s</code>, <code>--short</code></td><td>Display in short format with two-character status codes.</td></tr>
        <tr><td><code>-b</code>, <code>--branch</code></td><td>Show branch and tracking info even in short format.</td></tr>
        <tr><td><code>--porcelain</code></td><td>Stable machine-readable output for scripts.</td></tr>
        <tr><td><code>--ignored</code></td><td>Also show ignored files.</td></tr>
        <tr><td><code>-u &lt;mode&gt;</code></td><td>Control how untracked files are reported (<code>no</code>, <code>normal</code>, <code>all</code>).</td></tr>
        <tr><td><code>--ahead-behind</code></td><td>Compute ahead/behind counts vs upstream.</td></tr>
      </tbody>
    </table>
    <h2>Examples</h2>
    <pre><code>git status
    # Full human-readable status

    git status -sb
    # Compact format with branch info

    git status --porcelain=v2 --branch
    # Stable output for shell scripts and editors

    git status --ignored
    # Include files matched by .gitignore</code></pre>
    <h2>Common Mistakes</h2>
    <p>Beginners sometimes panic when <code>git status</code> shows many untracked files in a freshly cloned repo with build artifacts. Add a proper <code>.gitignore</code> to filter them out. Another pitfall is parsing the default output in scripts — the format may change between versions and translations. Always use <code>--porcelain</code> for automation. Finally, large untracked directories can slow status considerably; use <code>-uno</code> to skip them.</p>
    <h2>Related Commands</h2>
    <p><code>git diff</code>, <code>git log</code>, <code>git add</code>, <code>git stash</code></p>
- title: git diff — Show changes between commits, trees, or the working tree
  section: Commands Reference
  difficulty: Beginner
  git_version: 2.30+
  weight: 60
  body: |
    <h2>Synopsis</h2>
    <pre><code>git diff [&lt;options&gt;] [&lt;commit&gt;] [--] [&lt;path&gt;...]</code></pre>
    <h2>Description</h2>
    <p>The <code>git diff</code> command shows differences between two sets of file content. With no arguments, it compares the working tree against the staging area, showing what is unstaged. With <code>--cached</code> (or <code>--staged</code>), it compares the staging area against the latest commit. With one or two commit arguments, it compares those commits.</p>
    <p>Diffs are central to code review, debugging, and understanding history. Git produces unified diffs by default but can also output word-level diffs, color-moved highlighting, and statistics. For binary files, only a "differ" line is shown unless a binary diff driver is configured.</p>
    <p>In day-to-day use, <code>git diff</code> integrates closely with shell aliases, editor plugins, and continuous integration. Power users often add aliases that combine flags they always pass, or wrap the command in scripts that enforce team conventions. Output formatting can be customized via Git config — pretty formats, color schemes, and pager behavior are all tunable. When something goes wrong, the first diagnostic step is usually to re-run the command with <code>GIT_TRACE=1</code> in the environment, which reveals the underlying plumbing calls. For unusual situations, the <code>--help</code> output (<code>git diff --help</code>) opens the full manual page with details on every option, including those rarely used in casual workflows but essential for debugging or scripting at scale.</p><p>Understanding how <code>git diff</code> interacts with the rest of Git's data model — the object database, the index, refs, and the working tree — pays dividends. Each command operates on some subset of these pieces, and knowing which it touches helps predict outcomes and recover from mistakes. Reading the official Git documentation alongside hands-on practice in a throwaway repository is the fastest way to internalize the nuances. Most production issues with Git stem from one of three causes: surprising default behavior, partial network operations, or rewriting history that was already shared. A working mental model of <code>git diff</code>'s side effects helps avoid all three.</p>
        <h2>Common Options</h2>
    <table>
      <thead><tr><th>Option</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>--cached</code> / <code>--staged</code></td><td>Compare the index to HEAD instead of working tree to index.</td></tr>
        <tr><td><code>--stat</code></td><td>Show a summary of insertions/deletions per file.</td></tr>
        <tr><td><code>--name-only</code></td><td>List only the file names that differ.</td></tr>
        <tr><td><code>--word-diff</code></td><td>Highlight changes at the word level.</td></tr>
        <tr><td><code>-w</code>, <code>--ignore-all-space</code></td><td>Ignore whitespace differences.</td></tr>
        <tr><td><code>--color-moved</code></td><td>Highlight blocks of code that were moved.</td></tr>
        <tr><td><code>-U&lt;n&gt;</code></td><td>Show <code>n</code> lines of context (default 3).</td></tr>
      </tbody>
    </table>
    <h2>Examples</h2>
    <pre><code>git diff
    # Unstaged changes in the working tree

    git diff --cached
    # Changes staged for the next commit

    git diff main..feature
    # All differences between two branches

    git diff HEAD~3 HEAD -- src/
    # Last three commits, restricted to src/</code></pre>
    <h2>Common Mistakes</h2>
    <p>Forgetting <code>--cached</code> when reviewing what is about to be committed is a classic confusion. Another is using two-dot vs three-dot range syntax incorrectly: <code>A..B</code> is "differences from A to B," while <code>A...B</code> is "differences from the merge base to B." Massive whitespace-only diffs after editor changes can be tamed with <code>-w</code>.</p>
    <h2>Related Commands</h2>
    <p><code>git status</code>, <code>git log -p</code>, <code>git show</code>, <code>git range-diff</code></p>
- title: git rm — Remove files from the working tree and index
  section: Commands Reference
  difficulty: Beginner
  git_version: 2.30+
  weight: 70
  body: |
    <h2>Synopsis</h2>
    <pre><code>git rm [-f] [-r] [--cached] [--] &lt;file&gt;...</code></pre>
    <h2>Description</h2>
    <p>The <code>git rm</code> command removes files from the working tree and the index in one step, staging the deletion for the next commit. Using <code>git rm</code> is more convenient than removing the file with <code>rm</code> and then running <code>git add</code> — although both approaches produce the same end state.</p>
    <p>The <code>--cached</code> flag is particularly useful: it removes the file from the index without deleting it from the working tree. This is the right tool when you accidentally committed a file (such as a config file with secrets, or a build artifact) and want to stop tracking it but keep it on disk.</p>
    <p>In day-to-day use, <code>git rm</code> integrates closely with shell aliases, editor plugins, and continuous integration. Power users often add aliases that combine flags they always pass, or wrap the command in scripts that enforce team conventions. Output formatting can be customized via Git config — pretty formats, color schemes, and pager behavior are all tunable. When something goes wrong, the first diagnostic step is usually to re-run the command with <code>GIT_TRACE=1</code> in the environment, which reveals the underlying plumbing calls. For unusual situations, the <code>--help</code> output (<code>git rm --help</code>) opens the full manual page with details on every option, including those rarely used in casual workflows but essential for debugging or scripting at scale.</p><p>Understanding how <code>git rm</code> interacts with the rest of Git's data model — the object database, the index, refs, and the working tree — pays dividends. Each command operates on some subset of these pieces, and knowing which it touches helps predict outcomes and recover from mistakes. Reading the official Git documentation alongside hands-on practice in a throwaway repository is the fastest way to internalize the nuances. Most production issues with Git stem from one of three causes: surprising default behavior, partial network operations, or rewriting history that was already shared. A working mental model of <code>git rm</code>'s side effects helps avoid all three.</p>
        <h2>Common Options</h2>
    <table>
      <thead><tr><th>Option</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>-f</code>, <code>--force</code></td><td>Override safety checks if the file has uncommitted changes.</td></tr>
        <tr><td><code>-r</code></td><td>Recursively remove directories.</td></tr>
        <tr><td><code>--cached</code></td><td>Remove from index only; leave the working tree file alone.</td></tr>
        <tr><td><code>-n</code>, <code>--dry-run</code></td><td>Show what would be removed without doing it.</td></tr>
        <tr><td><code>--ignore-unmatch</code></td><td>Exit zero even if no files match.</td></tr>
        <tr><td><code>-q</code>, <code>--quiet</code></td><td>Suppress output.</td></tr>
      </tbody>
    </table>
    <h2>Examples</h2>
    <pre><code>git rm old-file.txt
    # Delete the file and stage the deletion

    git rm -r build/
    # Recursively remove a directory from the repo

    git rm --cached secrets.env
    # Stop tracking a file but keep it locally
    # Then add it to .gitignore!

    git rm -n '*.log'
    # Preview which log files would be removed</code></pre>
    <h2>Common Mistakes</h2>
    <p>The biggest gotcha is forgetting that <code>git rm --cached</code> only stops future tracking — past commits still contain the file. If you need to purge a secret from history, use <code>git filter-repo</code> or BFG. Another mistake is running <code>git rm</code> on a file with unstaged modifications without realizing those changes are lost. Use <code>-n</code> first when in doubt.</p>
    <h2>Related Commands</h2>
    <p><code>git add</code>, <code>git mv</code>, <code>git restore</code>, <code>git filter-repo</code></p>
- title: git mv — Move or rename a tracked file
  section: Commands Reference
  difficulty: Beginner
  git_version: 2.30+
  weight: 80
  body: |
    <h2>Synopsis</h2>
    <pre><code>git mv [-f] [-k] [-n] &lt;source&gt; &lt;destination&gt;</code></pre>
    <h2>Description</h2>
    <p>The <code>git mv</code> command renames or moves a tracked file and stages the change. Internally it is equivalent to running <code>mv</code> followed by <code>git add</code> on the new path and <code>git rm</code> on the old. The convenience is that the rename happens in a single atomic step that is unambiguously staged.</p>
    <p>Note: Git does not actually store renames as first-class operations. Instead, it detects renames by comparing file content similarity at diff and log time. So whether you use <code>git mv</code> or plain <code>mv</code> + <code>git add</code> + <code>git rm</code>, the resulting commit is identical, and rename detection works the same way.</p>
    <p>In day-to-day use, <code>git mv</code> integrates closely with shell aliases, editor plugins, and continuous integration. Power users often add aliases that combine flags they always pass, or wrap the command in scripts that enforce team conventions. Output formatting can be customized via Git config — pretty formats, color schemes, and pager behavior are all tunable. When something goes wrong, the first diagnostic step is usually to re-run the command with <code>GIT_TRACE=1</code> in the environment, which reveals the underlying plumbing calls. For unusual situations, the <code>--help</code> output (<code>git mv --help</code>) opens the full manual page with details on every option, including those rarely used in casual workflows but essential for debugging or scripting at scale.</p><p>Understanding how <code>git mv</code> interacts with the rest of Git's data model — the object database, the index, refs, and the working tree — pays dividends. Each command operates on some subset of these pieces, and knowing which it touches helps predict outcomes and recover from mistakes. Reading the official Git documentation alongside hands-on practice in a throwaway repository is the fastest way to internalize the nuances. Most production issues with Git stem from one of three causes: surprising default behavior, partial network operations, or rewriting history that was already shared. A working mental model of <code>git mv</code>'s side effects helps avoid all three.</p>
        <h2>Common Options</h2>
    <table>
      <thead><tr><th>Option</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>-f</code>, <code>--force</code></td><td>Overwrite the destination if it exists.</td></tr>
        <tr><td><code>-k</code></td><td>Skip move/rename actions that would fail without an error.</td></tr>
        <tr><td><code>-n</code>, <code>--dry-run</code></td><td>Show what would happen without doing it.</td></tr>
        <tr><td><code>-v</code>, <code>--verbose</code></td><td>Report names of files moved.</td></tr>
      </tbody>
    </table>
    <h2>Examples</h2>
    <pre><code>git mv old-name.txt new-name.txt
    # Rename a file in one step

    git mv src/utils.js src/lib/utils.js
    # Move a file into a new directory (it must already exist)

    git mv -n *.md docs/
    # Preview moving all markdown files into docs/

    git mv -f draft.md final.md
    # Force overwrite if final.md already exists</code></pre>
    <h2>Common Mistakes</h2>
    <p>If you rename a file outside of Git (with your editor or <code>mv</code>), Git's rename detection still usually works at diff time — but you must run <code>git add -A</code> to stage both the deletion and the addition. Another issue: case-only renames on case-insensitive filesystems (macOS, Windows) require <code>git mv -f</code> or a two-step rename through a temporary name.</p>
    <h2>Related Commands</h2>
    <p><code>git add</code>, <code>git rm</code>, <code>git log --follow</code></p>
- title: git branch — List, create, or delete branches
  section: Commands Reference
  difficulty: Intermediate
  git_version: 2.30+
  weight: 90
  body: |
    <h2>Synopsis</h2>
    <pre><code>git branch [-a] [-r] [-v] [-d &lt;name&gt;] [-m &lt;old&gt; &lt;new&gt;] [&lt;name&gt; [&lt;start-point&gt;]]</code></pre>
    <h2>Description</h2>
    <p>The <code>git branch</code> command manages branches. With no arguments it lists local branches and marks the current one with an asterisk. Given a name, it creates a new branch pointing at the current HEAD (or at a specified start point). It can also delete, rename, and inspect branches. A branch in Git is a lightweight, movable pointer to a commit — creating one is essentially free, which is why Git workflows encourage many short-lived branches.</p>
    <p>Note: <code>git branch &lt;name&gt;</code> creates a branch but does not switch to it. To create and switch in one step, use <code>git switch -c &lt;name&gt;</code> or <code>git checkout -b &lt;name&gt;</code>. The <code>--track</code> behavior makes a new branch follow a remote branch for push/pull defaults.</p>
    <p>In day-to-day use, <code>git branch</code> integrates closely with shell aliases, editor plugins, and continuous integration. Power users often add aliases that combine flags they always pass, or wrap the command in scripts that enforce team conventions. Output formatting can be customized via Git config — pretty formats, color schemes, and pager behavior are all tunable. When something goes wrong, the first diagnostic step is usually to re-run the command with <code>GIT_TRACE=1</code> in the environment, which reveals the underlying plumbing calls. For unusual situations, the <code>--help</code> output (<code>git branch --help</code>) opens the full manual page with details on every option, including those rarely used in casual workflows but essential for debugging or scripting at scale.</p><p>Understanding how <code>git branch</code> interacts with the rest of Git's data model — the object database, the index, refs, and the working tree — pays dividends. Each command operates on some subset of these pieces, and knowing which it touches helps predict outcomes and recover from mistakes. Reading the official Git documentation alongside hands-on practice in a throwaway repository is the fastest way to internalize the nuances. Most production issues with Git stem from one of three causes: surprising default behavior, partial network operations, or rewriting history that was already shared. A working mental model of <code>git branch</code>'s side effects helps avoid all three.</p>
        <h2>Common Options</h2>
    <table>
      <thead><tr><th>Option</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>-a</code>, <code>--all</code></td><td>List both local and remote-tracking branches.</td></tr>
        <tr><td><code>-r</code>, <code>--remotes</code></td><td>List only remote-tracking branches.</td></tr>
        <tr><td><code>-v</code>, <code>--verbose</code></td><td>Show the latest commit on each branch.</td></tr>
        <tr><td><code>-d &lt;name&gt;</code></td><td>Delete a fully merged branch.</td></tr>
        <tr><td><code>-D &lt;name&gt;</code></td><td>Force-delete a branch even if it isn't merged.</td></tr>
        <tr><td><code>-m &lt;old&gt; &lt;new&gt;</code></td><td>Rename a branch.</td></tr>
        <tr><td><code>--merged</code> / <code>--no-merged</code></td><td>Filter branches that are (not) merged into HEAD.</td></tr>
        <tr><td><code>--set-upstream-to=&lt;remote&gt;/&lt;branch&gt;</code></td><td>Configure tracking for the current branch.</td></tr>
      </tbody>
    </table>
    <h2>Examples</h2>
    <pre><code>git branch
    # List local branches

    git branch feature/login
    # Create a new branch from current HEAD

    git branch -d old-feature
    # Delete a merged branch

    git branch -m main trunk
    # Rename the local branch main to trunk

    git branch -a -v
    # List all branches (local + remote) with last commits</code></pre>
    <h2>Common Mistakes</h2>
    <p>Using <code>-D</code> to force-delete a branch can lose unmerged commits forever (well, until <code>git reflog</code> expires). Always try <code>-d</code> first. Renaming the current branch with <code>-m</code> works without arguments — <code>git branch -m new-name</code> renames whatever you're on. Forgetting to set upstream tracking after creating a branch means <code>git push</code> may need explicit arguments the first time.</p>
    <h2>Related Commands</h2>
    <p><code>git switch</code>, <code>git checkout</code>, <code>git merge</code>, <code>git push</code></p>
- title: git checkout — Switch branches or restore working tree files
  section: Commands Reference
  difficulty: Intermediate
  git_version: 2.30+
  weight: 100
  body: |
    <h2>Synopsis</h2>
    <pre><code>git checkout [&lt;branch&gt;]
    git checkout -b &lt;new-branch&gt; [&lt;start-point&gt;]
    git checkout [&lt;tree-ish&gt;] -- &lt;file&gt;...</code></pre>
    <h2>Description</h2>
    <p>The <code>git checkout</code> command historically does two unrelated things: switching branches and restoring files. Because of this overload, modern Git introduced <code>git switch</code> for branch operations and <code>git restore</code> for file operations. <code>git checkout</code> still works and remains popular, but new users are encouraged to learn the newer split commands.</p>
    <p>When given a branch name, <code>git checkout</code> moves HEAD to that branch and updates the working tree. When given a path, it overwrites the working-tree file with the version from the index (or from a specified commit). The <code>-b</code> flag creates a new branch and switches to it in one step.</p>
    <p>In day-to-day use, <code>git checkout</code> integrates closely with shell aliases, editor plugins, and continuous integration. Power users often add aliases that combine flags they always pass, or wrap the command in scripts that enforce team conventions. Output formatting can be customized via Git config — pretty formats, color schemes, and pager behavior are all tunable. When something goes wrong, the first diagnostic step is usually to re-run the command with <code>GIT_TRACE=1</code> in the environment, which reveals the underlying plumbing calls. For unusual situations, the <code>--help</code> output (<code>git checkout --help</code>) opens the full manual page with details on every option, including those rarely used in casual workflows but essential for debugging or scripting at scale.</p><p>Understanding how <code>git checkout</code> interacts with the rest of Git's data model — the object database, the index, refs, and the working tree — pays dividends. Each command operates on some subset of these pieces, and knowing which it touches helps predict outcomes and recover from mistakes. Reading the official Git documentation alongside hands-on practice in a throwaway repository is the fastest way to internalize the nuances. Most production issues with Git stem from one of three causes: surprising default behavior, partial network operations, or rewriting history that was already shared. A working mental model of <code>git checkout</code>'s side effects helps avoid all three.</p>
        <h2>Common Options</h2>
    <table>
      <thead><tr><th>Option</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>-b &lt;name&gt;</code></td><td>Create and switch to a new branch.</td></tr>
        <tr><td><code>-B &lt;name&gt;</code></td><td>Create or reset a branch and switch to it.</td></tr>
        <tr><td><code>--track</code></td><td>Set up tracking for a remote branch.</td></tr>
        <tr><td><code>--detach</code></td><td>Check out a commit in detached HEAD state.</td></tr>
        <tr><td><code>--</code> &lt;path&gt;</td><td>Treat following arguments as paths, not branches.</td></tr>
        <tr><td><code>-f</code>, <code>--force</code></td><td>Discard local changes when switching.</td></tr>
        <tr><td><code>-p</code>, <code>--patch</code></td><td>Interactively select hunks to restore.</td></tr>
      </tbody>
    </table>
    <h2>Examples</h2>
    <pre><code>git checkout main
    # Switch to the main branch

    git checkout -b feature/api origin/develop
    # Create a new branch tracking origin/develop

    git checkout HEAD -- src/config.js
    # Discard local changes to a single file

    git checkout v1.2.3
    # Detached HEAD at a specific tag</code></pre>
    <h2>Common Mistakes</h2>
    <p>Running <code>git checkout &lt;file&gt;</code> silently overwrites your local edits with no undo. Use <code>git restore</code> instead — it has a clearer name. Detached HEAD state surprises beginners: commits made there belong to no branch and may be lost when you switch away. If you want to keep them, create a branch first.</p>
    <h2>Related Commands</h2>
    <p><code>git switch</code>, <code>git restore</code>, <code>git branch</code>, <code>git reset</code></p>
- title: git switch — Switch branches
  section: Commands Reference
  difficulty: Intermediate
  git_version: 2.30+
  weight: 110
  body: |
    <h2>Synopsis</h2>
    <pre><code>git switch [-c &lt;new-branch&gt;] [--detach] &lt;branch&gt;</code></pre>
    <h2>Description</h2>
    <p>The <code>git switch</code> command, introduced in Git 2.23, is a focused replacement for the branch-switching half of <code>git checkout</code>. It only switches branches (or creates and switches in one step). It refuses to operate on individual files, eliminating the most common source of <code>checkout</code> footguns. If you're learning Git today, prefer <code>git switch</code> for branches and <code>git restore</code> for files.</p>
    <p>Like <code>checkout</code>, <code>switch</code> updates HEAD, the index, and the working tree to match the target branch. It will refuse to switch if doing so would clobber uncommitted changes, unless you pass <code>--force</code>.</p>
    <p>In day-to-day use, <code>git switch</code> integrates closely with shell aliases, editor plugins, and continuous integration. Power users often add aliases that combine flags they always pass, or wrap the command in scripts that enforce team conventions. Output formatting can be customized via Git config — pretty formats, color schemes, and pager behavior are all tunable. When something goes wrong, the first diagnostic step is usually to re-run the command with <code>GIT_TRACE=1</code> in the environment, which reveals the underlying plumbing calls. For unusual situations, the <code>--help</code> output (<code>git switch --help</code>) opens the full manual page with details on every option, including those rarely used in casual workflows but essential for debugging or scripting at scale.</p><p>Understanding how <code>git switch</code> interacts with the rest of Git's data model — the object database, the index, refs, and the working tree — pays dividends. Each command operates on some subset of these pieces, and knowing which it touches helps predict outcomes and recover from mistakes. Reading the official Git documentation alongside hands-on practice in a throwaway repository is the fastest way to internalize the nuances. Most production issues with Git stem from one of three causes: surprising default behavior, partial network operations, or rewriting history that was already shared. A working mental model of <code>git switch</code>'s side effects helps avoid all three.</p>
        <h2>Common Options</h2>
    <table>
      <thead><tr><th>Option</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>-c &lt;name&gt;</code>, <code>--create</code></td><td>Create a new branch and switch to it.</td></tr>
        <tr><td><code>-C &lt;name&gt;</code>, <code>--force-create</code></td><td>Create or reset a branch and switch to it.</td></tr>
        <tr><td><code>--track</code></td><td>Set up tracking with a remote branch.</td></tr>
        <tr><td><code>--detach</code></td><td>Switch to a commit in detached HEAD mode.</td></tr>
        <tr><td><code>-</code></td><td>Switch to the previous branch (like <code>cd -</code>).</td></tr>
        <tr><td><code>--discard-changes</code></td><td>Throw away local changes when switching.</td></tr>
        <tr><td><code>-m</code>, <code>--merge</code></td><td>Three-way merge local changes when switching.</td></tr>
      </tbody>
    </table>
    <h2>Examples</h2>
    <pre><code>git switch main
    # Move to the main branch

    git switch -c feature/search
    # Create and switch to a new branch

    git switch -
    # Toggle back to the previous branch

    git switch --detach v3.0.0
    # Inspect a tag without creating a branch</code></pre>
    <h2>Common Mistakes</h2>
    <p>A common confusion is expecting <code>git switch</code> to operate on files like <code>git checkout</code> does. It won't — use <code>git restore</code> instead. If you have uncommitted work that conflicts with the target branch, switching will fail; either commit, stash, or use <code>--merge</code> to attempt a three-way merge.</p>
    <h2>Related Commands</h2>
    <p><code>git checkout</code>, <code>git restore</code>, <code>git branch</code>, <code>git stash</code></p>
- title: git merge — Join two or more development histories together
  section: Commands Reference
  difficulty: Intermediate
  git_version: 2.30+
  weight: 120
  body: |
    <h2>Synopsis</h2>
    <pre><code>git merge [--no-ff] [--squash] [--abort] [-s &lt;strategy&gt;] [&lt;branch&gt;]</code></pre>
    <h2>Description</h2>
    <p>The <code>git merge</code> command integrates changes from one branch into another. By default it produces a "true merge" commit with two parents, preserving the topology of both histories. If the target branch is a strict ancestor of the source, Git fast-forwards by simply moving the branch pointer; pass <code>--no-ff</code> to always record a merge commit.</p>
    <p>When the same lines are changed on both sides, Git pauses with a conflict marker. You resolve manually, then <code>git add</code> the files and run <code>git commit</code> (or <code>git merge --continue</code>). To bail out of an in-progress merge, use <code>git merge --abort</code>.</p>
    <p>In day-to-day use, <code>git merge</code> integrates closely with shell aliases, editor plugins, and continuous integration. Power users often add aliases that combine flags they always pass, or wrap the command in scripts that enforce team conventions. Output formatting can be customized via Git config — pretty formats, color schemes, and pager behavior are all tunable. When something goes wrong, the first diagnostic step is usually to re-run the command with <code>GIT_TRACE=1</code> in the environment, which reveals the underlying plumbing calls. For unusual situations, the <code>--help</code> output (<code>git merge --help</code>) opens the full manual page with details on every option, including those rarely used in casual workflows but essential for debugging or scripting at scale.</p><p>Understanding how <code>git merge</code> interacts with the rest of Git's data model — the object database, the index, refs, and the working tree — pays dividends. Each command operates on some subset of these pieces, and knowing which it touches helps predict outcomes and recover from mistakes. Reading the official Git documentation alongside hands-on practice in a throwaway repository is the fastest way to internalize the nuances. Most production issues with Git stem from one of three causes: surprising default behavior, partial network operations, or rewriting history that was already shared. A working mental model of <code>git merge</code>'s side effects helps avoid all three.</p>
        <h2>Common Options</h2>
    <table>
      <thead><tr><th>Option</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>--no-ff</code></td><td>Always create a merge commit, even when fast-forward is possible.</td></tr>
        <tr><td><code>--ff-only</code></td><td>Refuse to merge unless fast-forward is possible.</td></tr>
        <tr><td><code>--squash</code></td><td>Combine the merged history into a single commit on the target branch.</td></tr>
        <tr><td><code>--abort</code></td><td>Abandon a merge in progress.</td></tr>
        <tr><td><code>--continue</code></td><td>Resume a merge after resolving conflicts.</td></tr>
        <tr><td><code>-s &lt;strategy&gt;</code></td><td>Choose merge strategy (<code>ort</code>, <code>recursive</code>, <code>resolve</code>, <code>octopus</code>).</td></tr>
        <tr><td><code>-X &lt;option&gt;</code></td><td>Pass strategy-specific option (e.g. <code>ours</code>, <code>theirs</code>).</td></tr>
        <tr><td><code>--no-commit</code></td><td>Stage the merge result but don't commit.</td></tr>
      </tbody>
    </table>
    <h2>Examples</h2>
    <pre><code>git merge feature/login
    # Merge feature branch into current branch

    git merge --no-ff release/1.2
    # Always make a merge commit (preserves topology)

    git merge --abort
    # Cancel a merge after conflicts arise

    git merge -X theirs hotfix
    # Auto-resolve conflicts by preferring "their" side</code></pre>
    <h2>Common Mistakes</h2>
    <p>Resolving conflicts in a hurry and forgetting to remove conflict markers (<code>&lt;&lt;&lt;&lt;&lt;&lt;&lt;</code>) leaves broken code committed. Always run a build or tests after resolving. Another pitfall is fast-forwarding silently when you wanted a merge commit for traceability — use <code>--no-ff</code>. Finally, <code>--squash</code> does NOT create a merge commit, so the source branch isn't recorded as a parent.</p>
    <h2>Related Commands</h2>
    <p><code>git rebase</code>, <code>git mergetool</code>, <code>git pull</code>, <code>git cherry-pick</code></p>
- title: git rebase — Reapply commits on top of another base
  section: Commands Reference
  difficulty: Intermediate
  git_version: 2.30+
  weight: 130
  body: |
    <h2>Synopsis</h2>
    <pre><code>git rebase [-i] [--onto &lt;newbase&gt;] [&lt;upstream&gt; [&lt;branch&gt;]]</code></pre>
    <h2>Description</h2>
    <p>The <code>git rebase</code> command moves a sequence of commits to a new base. It rewrites history by replaying each commit on top of the new base, producing a linear chain rather than a merge commit. Rebasing is invaluable for keeping feature branches up to date, cleaning up local history before pushing, and squashing fixup commits.</p>
    <p>Because rebasing creates new commits with different SHAs, never rebase commits that have been published and pulled by others — they will end up with diverging histories. The interactive mode (<code>-i</code>) lets you reorder, edit, squash, drop, or fix up commits.</p>
    <p>In day-to-day use, <code>git rebase</code> integrates closely with shell aliases, editor plugins, and continuous integration. Power users often add aliases that combine flags they always pass, or wrap the command in scripts that enforce team conventions. Output formatting can be customized via Git config — pretty formats, color schemes, and pager behavior are all tunable. When something goes wrong, the first diagnostic step is usually to re-run the command with <code>GIT_TRACE=1</code> in the environment, which reveals the underlying plumbing calls. For unusual situations, the <code>--help</code> output (<code>git rebase --help</code>) opens the full manual page with details on every option, including those rarely used in casual workflows but essential for debugging or scripting at scale.</p><p>Understanding how <code>git rebase</code> interacts with the rest of Git's data model — the object database, the index, refs, and the working tree — pays dividends. Each command operates on some subset of these pieces, and knowing which it touches helps predict outcomes and recover from mistakes. Reading the official Git documentation alongside hands-on practice in a throwaway repository is the fastest way to internalize the nuances. Most production issues with Git stem from one of three causes: surprising default behavior, partial network operations, or rewriting history that was already shared. A working mental model of <code>git rebase</code>'s side effects helps avoid all three.</p>
        <h2>Common Options</h2>
    <table>
      <thead><tr><th>Option</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>-i</code>, <code>--interactive</code></td><td>Open an editor to manipulate the commit list.</td></tr>
        <tr><td><code>--onto &lt;newbase&gt;</code></td><td>Rebase onto an arbitrary commit, not the upstream.</td></tr>
        <tr><td><code>--continue</code></td><td>Resume after resolving conflicts.</td></tr>
        <tr><td><code>--abort</code></td><td>Cancel the rebase and return to the original state.</td></tr>
        <tr><td><code>--skip</code></td><td>Skip the current patch and continue.</td></tr>
        <tr><td><code>--autosquash</code></td><td>Automatically order fixup/squash commits.</td></tr>
        <tr><td><code>--autostash</code></td><td>Stash local changes before rebasing and pop after.</td></tr>
        <tr><td><code>-r</code>, <code>--rebase-merges</code></td><td>Preserve merge commits during rebase.</td></tr>
      </tbody>
    </table>
    <h2>Examples</h2>
    <pre><code>git rebase main
    # Replay current branch's commits on top of main

    git rebase -i HEAD~5
    # Interactively edit the last 5 commits

    git rebase --onto main feature-base feature-tip
    # Move only commits between feature-base and feature-tip onto main

    git rebase --continue
    # Resume after fixing conflicts</code></pre>
    <h2>Common Mistakes</h2>
    <p>Rebasing public, shared branches breaks every collaborator's history. Reserve rebase for local cleanup. During conflict resolution, beginners often run <code>git commit</code> instead of <code>git rebase --continue</code>, leaving the rebase in a broken state. If you get lost mid-rebase, <code>git rebase --abort</code> always returns you to safety.</p>
    <h2>Related Commands</h2>
    <p><code>git merge</code>, <code>git cherry-pick</code>, <code>git reflog</code>, <code>git pull --rebase</code></p>
- title: git mergetool — Run merge conflict resolution tools
  section: Commands Reference
  difficulty: Intermediate
  git_version: 2.30+
  weight: 140
  body: |
    <h2>Synopsis</h2>
    <pre><code>git mergetool [-t &lt;tool&gt;] [--tool-help] [&lt;file&gt;...]</code></pre>
    <h2>Description</h2>
    <p>The <code>git mergetool</code> command launches an external merge tool to help resolve conflicts after a merge, rebase, or cherry-pick stops with conflicts. Common tools include <code>vimdiff</code>, <code>meld</code>, <code>kdiff3</code>, <code>p4merge</code>, <code>opendiff</code>, and <code>vscode</code>. Once configured via <code>merge.tool</code>, running <code>git mergetool</code> opens each conflicted file in the chosen tool and stages the resolution when you save.</p>
    <p>Most modern editors (VS Code, JetBrains IDEs, Vim with Fugitive) have built-in merge UIs that make <code>git mergetool</code> redundant. Still, on the command line or over SSH, it remains an essential utility for graphical or three-pane conflict resolution.</p>
    <p>In day-to-day use, <code>git mergetool</code> integrates closely with shell aliases, editor plugins, and continuous integration. Power users often add aliases that combine flags they always pass, or wrap the command in scripts that enforce team conventions. Output formatting can be customized via Git config — pretty formats, color schemes, and pager behavior are all tunable. When something goes wrong, the first diagnostic step is usually to re-run the command with <code>GIT_TRACE=1</code> in the environment, which reveals the underlying plumbing calls. For unusual situations, the <code>--help</code> output (<code>git mergetool --help</code>) opens the full manual page with details on every option, including those rarely used in casual workflows but essential for debugging or scripting at scale.</p><p>Understanding how <code>git mergetool</code> interacts with the rest of Git's data model — the object database, the index, refs, and the working tree — pays dividends. Each command operates on some subset of these pieces, and knowing which it touches helps predict outcomes and recover from mistakes. Reading the official Git documentation alongside hands-on practice in a throwaway repository is the fastest way to internalize the nuances. Most production issues with Git stem from one of three causes: surprising default behavior, partial network operations, or rewriting history that was already shared. A working mental model of <code>git mergetool</code>'s side effects helps avoid all three.</p>
        <h2>Common Options</h2>
    <table>
      <thead><tr><th>Option</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>-t &lt;tool&gt;</code>, <code>--tool=&lt;tool&gt;</code></td><td>Use a specific merge tool for this run.</td></tr>
        <tr><td><code>--tool-help</code></td><td>List the merge tools Git knows about.</td></tr>
        <tr><td><code>-y</code>, <code>--no-prompt</code></td><td>Don't prompt before launching the tool.</td></tr>
        <tr><td><code>-g</code>, <code>--gui</code></td><td>Use the GUI tool from <code>merge.guitool</code>.</td></tr>
        <tr><td><code>-O&lt;file&gt;</code></td><td>Process files in the order listed in <code>file</code>.</td></tr>
      </tbody>
    </table>
    <h2>Examples</h2>
    <pre><code>git config --global merge.tool meld
    # Configure meld as the default

    git mergetool
    # Launch the configured tool on each conflicted file

    git mergetool -t vimdiff
    # Use vimdiff just this once

    git mergetool --tool-help
    # See the list of supported tools</code></pre>
    <h2>Common Mistakes</h2>
    <p>After resolving with <code>git mergetool</code>, leftover <code>.orig</code> backup files clutter the directory. Disable them with <code>git config --global mergetool.keepBackup false</code>. Another pitfall: launching a GUI tool over SSH without X forwarding fails silently. Configure a console-friendly tool (like <code>vimdiff</code>) for remote sessions.</p>
    <h2>Related Commands</h2>
    <p><code>git merge</code>, <code>git rebase</code>, <code>git config</code>, <code>git diff</code></p>
- title: git remote — Manage tracked remote repositories
  section: Commands Reference
  difficulty: Intermediate
  git_version: 2.30+
  weight: 150
  body: |
    <h2>Synopsis</h2>
    <pre><code>git remote [-v]
    git remote add &lt;name&gt; &lt;url&gt;
    git remote remove &lt;name&gt;
    git remote set-url &lt;name&gt; &lt;url&gt;</code></pre>
    <h2>Description</h2>
    <p>The <code>git remote</code> command manages the set of repositories ("remotes") whose URLs are stored in your local config. Each remote has a short nickname (commonly <code>origin</code> for the original clone source and <code>upstream</code> for the project you forked from). When you run <code>git fetch origin</code>, <code>git push origin</code>, or similar, the nickname is resolved to the URL.</p>
    <p>Remotes are stored in <code>.git/config</code> and can have separate URLs for fetching and pushing. They also carry refspecs that determine which refs to fetch and into what local namespace. Modern workflows often have only <code>origin</code>, while open-source contributors typically have both <code>origin</code> (their fork) and <code>upstream</code> (the canonical project).</p>
    <p>In day-to-day use, <code>git remote</code> integrates closely with shell aliases, editor plugins, and continuous integration. Power users often add aliases that combine flags they always pass, or wrap the command in scripts that enforce team conventions. Output formatting can be customized via Git config — pretty formats, color schemes, and pager behavior are all tunable. When something goes wrong, the first diagnostic step is usually to re-run the command with <code>GIT_TRACE=1</code> in the environment, which reveals the underlying plumbing calls. For unusual situations, the <code>--help</code> output (<code>git remote --help</code>) opens the full manual page with details on every option, including those rarely used in casual workflows but essential for debugging or scripting at scale.</p><p>Understanding how <code>git remote</code> interacts with the rest of Git's data model — the object database, the index, refs, and the working tree — pays dividends. Each command operates on some subset of these pieces, and knowing which it touches helps predict outcomes and recover from mistakes. Reading the official Git documentation alongside hands-on practice in a throwaway repository is the fastest way to internalize the nuances. Most production issues with Git stem from one of three causes: surprising default behavior, partial network operations, or rewriting history that was already shared. A working mental model of <code>git remote</code>'s side effects helps avoid all three.</p>
        <h2>Common Options</h2>
    <table>
      <thead><tr><th>Option / Subcommand</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>-v</code>, <code>--verbose</code></td><td>Show URLs alongside remote names.</td></tr>
        <tr><td><code>add &lt;name&gt; &lt;url&gt;</code></td><td>Register a new remote.</td></tr>
        <tr><td><code>remove &lt;name&gt;</code></td><td>Drop a remote from config.</td></tr>
        <tr><td><code>rename &lt;old&gt; &lt;new&gt;</code></td><td>Rename a remote.</td></tr>
        <tr><td><code>set-url &lt;name&gt; &lt;url&gt;</code></td><td>Change a remote's URL.</td></tr>
        <tr><td><code>show &lt;name&gt;</code></td><td>Display detailed info about a remote.</td></tr>
        <tr><td><code>prune &lt;name&gt;</code></td><td>Delete stale remote-tracking refs.</td></tr>
      </tbody>
    </table>
    <h2>Examples</h2>
    <pre><code>git remote -v
    # List all remotes with URLs

    git remote add upstream https://github.com/original/project.git
    # Add the upstream repo of a fork

    git remote set-url origin git@github.com:me/project.git
    # Switch from HTTPS to SSH

    git remote prune origin
    # Remove tracking branches that no longer exist on origin</code></pre>
    <h2>Common Mistakes</h2>
    <p>Adding the wrong URL (typo, missing <code>.git</code> suffix on some hosts) leads to confusing fetch errors. Run <code>git remote -v</code> to confirm. After repository renames or fork ownership changes, your remote URLs become stale — fix them with <code>set-url</code>. Don't forget to <code>git remote prune</code> periodically to clean up branches deleted on the server.</p>
    <h2>Related Commands</h2>
    <p><code>git fetch</code>, <code>git push</code>, <code>git pull</code>, <code>git ls-remote</code></p>
- title: git fetch — Download objects and refs from a remote
  section: Commands Reference
  difficulty: Intermediate
  git_version: 2.30+
  weight: 160
  body: |
    <h2>Synopsis</h2>
    <pre><code>git fetch [&lt;options&gt;] [&lt;remote&gt; [&lt;refspec&gt;...]]</code></pre>
    <h2>Description</h2>
    <p>The <code>git fetch</code> command downloads new commits, files, and refs from a remote repository into your local repo, but does NOT merge them into your working branch. After fetching, the remote-tracking refs (like <code>origin/main</code>) are updated, and you can inspect what's new with <code>git log origin/main</code> before deciding to merge or rebase.</p>
    <p>Fetching is safe — it never modifies your working tree or current branch. Many users prefer <code>git fetch</code> followed by an explicit <code>git merge</code> or <code>git rebase</code> over <code>git pull</code>, because it gives a clear preview step. Use <code>--all</code> to fetch from every configured remote.</p>
    <p>In day-to-day use, <code>git fetch</code> integrates closely with shell aliases, editor plugins, and continuous integration. Power users often add aliases that combine flags they always pass, or wrap the command in scripts that enforce team conventions. Output formatting can be customized via Git config — pretty formats, color schemes, and pager behavior are all tunable. When something goes wrong, the first diagnostic step is usually to re-run the command with <code>GIT_TRACE=1</code> in the environment, which reveals the underlying plumbing calls. For unusual situations, the <code>--help</code> output (<code>git fetch --help</code>) opens the full manual page with details on every option, including those rarely used in casual workflows but essential for debugging or scripting at scale.</p><p>Understanding how <code>git fetch</code> interacts with the rest of Git's data model — the object database, the index, refs, and the working tree — pays dividends. Each command operates on some subset of these pieces, and knowing which it touches helps predict outcomes and recover from mistakes. Reading the official Git documentation alongside hands-on practice in a throwaway repository is the fastest way to internalize the nuances. Most production issues with Git stem from one of three causes: surprising default behavior, partial network operations, or rewriting history that was already shared. A working mental model of <code>git fetch</code>'s side effects helps avoid all three.</p>
        <h2>Common Options</h2>
    <table>
      <thead><tr><th>Option</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>--all</code></td><td>Fetch from all configured remotes.</td></tr>
        <tr><td><code>--prune</code> / <code>-p</code></td><td>Remove remote-tracking refs that no longer exist upstream.</td></tr>
        <tr><td><code>--tags</code></td><td>Fetch all tags from the remote.</td></tr>
        <tr><td><code>--depth=&lt;n&gt;</code></td><td>Limit fetched history depth (creates/maintains a shallow clone).</td></tr>
        <tr><td><code>--unshallow</code></td><td>Convert a shallow clone into a full one.</td></tr>
        <tr><td><code>--dry-run</code></td><td>Show what would be fetched.</td></tr>
        <tr><td><code>--force</code> / <code>-f</code></td><td>Allow non-fast-forward updates of refs.</td></tr>
      </tbody>
    </table>
    <h2>Examples</h2>
    <pre><code>git fetch
    # Update remote-tracking refs from origin

    git fetch --all --prune
    # Update from every remote and clean stale branches

    git fetch upstream main
    # Fetch only the main branch from upstream

    git fetch --unshallow
    # Backfill full history into a shallow clone</code></pre>
    <h2>Common Mistakes</h2>
    <p>Confusing <code>git fetch</code> with <code>git pull</code> is common: fetch just downloads, while pull fetches and merges. Forgetting <code>--prune</code> leaves a long list of stale tracking branches over time. Configure <code>fetch.prune = true</code> globally to make pruning automatic.</p>
    <h2>Related Commands</h2>
    <p><code>git pull</code>, <code>git merge</code>, <code>git remote</code>, <code>git ls-remote</code></p>
- title: git pull — Fetch from and integrate with another repository
  section: Commands Reference
  difficulty: Intermediate
  git_version: 2.30+
  weight: 170
  body: |
    <h2>Synopsis</h2>
    <pre><code>git pull [--rebase] [--ff-only] [&lt;remote&gt; [&lt;branch&gt;]]</code></pre>
    <h2>Description</h2>
    <p>The <code>git pull</code> command is shorthand for <code>git fetch</code> followed by an integration step (merge by default, rebase optionally). It updates your current branch to incorporate upstream changes. Many teams prefer to configure <code>pull.rebase = true</code> or use <code>git pull --rebase</code> to keep history linear.</p>
    <p>If your branch and the upstream have diverged, <code>git pull</code> may produce a merge commit. With <code>--ff-only</code>, the pull will fail rather than create a merge — useful when you want to be sure your local branch is just behind, not divergent.</p>
    <p>In day-to-day use, <code>git pull</code> integrates closely with shell aliases, editor plugins, and continuous integration. Power users often add aliases that combine flags they always pass, or wrap the command in scripts that enforce team conventions. Output formatting can be customized via Git config — pretty formats, color schemes, and pager behavior are all tunable. When something goes wrong, the first diagnostic step is usually to re-run the command with <code>GIT_TRACE=1</code> in the environment, which reveals the underlying plumbing calls. For unusual situations, the <code>--help</code> output (<code>git pull --help</code>) opens the full manual page with details on every option, including those rarely used in casual workflows but essential for debugging or scripting at scale.</p><p>Understanding how <code>git pull</code> interacts with the rest of Git's data model — the object database, the index, refs, and the working tree — pays dividends. Each command operates on some subset of these pieces, and knowing which it touches helps predict outcomes and recover from mistakes. Reading the official Git documentation alongside hands-on practice in a throwaway repository is the fastest way to internalize the nuances. Most production issues with Git stem from one of three causes: surprising default behavior, partial network operations, or rewriting history that was already shared. A working mental model of <code>git pull</code>'s side effects helps avoid all three.</p>
        <h2>Common Options</h2>
    <table>
      <thead><tr><th>Option</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>--rebase</code></td><td>Rebase local commits on top of fetched changes.</td></tr>
        <tr><td><code>--ff-only</code></td><td>Only fast-forward; abort if a merge would be needed.</td></tr>
        <tr><td><code>--no-ff</code></td><td>Always create a merge commit.</td></tr>
        <tr><td><code>--all</code></td><td>Fetch from all remotes before integrating.</td></tr>
        <tr><td><code>--autostash</code></td><td>Stash local changes before pulling and pop after.</td></tr>
        <tr><td><code>--prune</code></td><td>Prune stale remote-tracking branches as part of the fetch.</td></tr>
      </tbody>
    </table>
    <h2>Examples</h2>
    <pre><code>git pull
    # Default: fetch and merge from configured upstream

    git pull --rebase origin main
    # Rebase local commits onto the latest origin/main

    git pull --ff-only
    # Refuse to create a merge commit

    git config --global pull.rebase true
    # Make rebase the default for every pull</code></pre>
    <h2>Common Mistakes</h2>
    <p>Pulling with uncommitted changes can cause Git to refuse to merge. Either commit, stash, or use <code>--autostash</code>. Pulling onto a branch that has diverged often produces unexpected merge commits. Use <code>--ff-only</code> as a safety net or rebase explicitly.</p>
    <h2>Related Commands</h2>
    <p><code>git fetch</code>, <code>git merge</code>, <code>git rebase</code>, <code>git push</code></p>
- title: git push — Update remote refs along with associated objects
  section: Commands Reference
  difficulty: Intermediate
  git_version: 2.30+
  weight: 180
  body: |
    <h2>Synopsis</h2>
    <pre><code>git push [&lt;remote&gt; [&lt;refspec&gt;...]] [--force-with-lease] [--tags] [--delete]</code></pre>
    <h2>Description</h2>
    <p>The <code>git push</code> command sends local commits to a remote repository, updating remote branches to match your local ones. The first push of a new branch typically requires <code>-u</code> to set up tracking. By default, push is non-destructive: it refuses to overwrite remote history that you don't have locally. Use <code>--force-with-lease</code> when you genuinely need to rewrite remote history (after a rebase) — never use plain <code>--force</code> on shared branches.</p>
    <p>Push obeys server-side rules: branch protections, required reviews, signed commits, and pre-receive hooks can all reject a push. Read the error message carefully when this happens.</p>
    <p>In day-to-day use, <code>git push</code> integrates closely with shell aliases, editor plugins, and continuous integration. Power users often add aliases that combine flags they always pass, or wrap the command in scripts that enforce team conventions. Output formatting can be customized via Git config — pretty formats, color schemes, and pager behavior are all tunable. When something goes wrong, the first diagnostic step is usually to re-run the command with <code>GIT_TRACE=1</code> in the environment, which reveals the underlying plumbing calls. For unusual situations, the <code>--help</code> output (<code>git push --help</code>) opens the full manual page with details on every option, including those rarely used in casual workflows but essential for debugging or scripting at scale.</p><p>Understanding how <code>git push</code> interacts with the rest of Git's data model — the object database, the index, refs, and the working tree — pays dividends. Each command operates on some subset of these pieces, and knowing which it touches helps predict outcomes and recover from mistakes. Reading the official Git documentation alongside hands-on practice in a throwaway repository is the fastest way to internalize the nuances. Most production issues with Git stem from one of three causes: surprising default behavior, partial network operations, or rewriting history that was already shared. A working mental model of <code>git push</code>'s side effects helps avoid all three.</p>
        <h2>Common Options</h2>
    <table>
      <thead><tr><th>Option</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>-u</code>, <code>--set-upstream</code></td><td>Set upstream for future push/pull defaults.</td></tr>
        <tr><td><code>--force-with-lease</code></td><td>Force push only if remote ref matches your last fetched value.</td></tr>
        <tr><td><code>--force</code> / <code>-f</code></td><td>Force-overwrite remote history (dangerous on shared branches).</td></tr>
        <tr><td><code>--tags</code></td><td>Push all local tags.</td></tr>
        <tr><td><code>--delete</code></td><td>Delete a remote branch.</td></tr>
        <tr><td><code>--dry-run</code></td><td>Show what would be pushed.</td></tr>
        <tr><td><code>--all</code></td><td>Push all branches.</td></tr>
        <tr><td><code>--atomic</code></td><td>All-or-nothing update of multiple refs.</td></tr>
      </tbody>
    </table>
    <h2>Examples</h2>
    <pre><code>git push -u origin feature/login
    # First push of a new branch with tracking

    git push --force-with-lease
    # Safer alternative to --force after rebasing

    git push origin --delete old-feature
    # Delete a remote branch

    git push --tags
    # Publish all local tags</code></pre>
    <h2>Common Mistakes</h2>
    <p>Plain <code>--force</code> can wipe out colleagues' commits. Use <code>--force-with-lease</code> instead. Pushing to <code>main</code> directly bypasses code review on many teams — set up branch protection. Forgetting <code>-u</code> means future <code>git push</code> commands need explicit arguments.</p>
    <h2>Related Commands</h2>
    <p><code>git fetch</code>, <code>git pull</code>, <code>git remote</code>, <code>git tag</code></p>
- title: git ls-remote — List references in a remote repository
  section: Commands Reference
  difficulty: Intermediate
  git_version: 2.30+
  weight: 190
  body: |
    <h2>Synopsis</h2>
    <pre><code>git ls-remote [--heads] [--tags] [&lt;repository&gt; [&lt;refs&gt;...]]</code></pre>
    <h2>Description</h2>
    <p>The <code>git ls-remote</code> command queries a remote (without cloning or fetching) and prints the SHA-1 of each ref alongside the ref name. It is invaluable for scripting, CI pipelines, and quick inspection — for example, finding the latest tag on a remote or checking whether a branch exists. Because it does not download objects, it's lightweight and fast even against very large repositories.</p>
    <p>You can pass a URL directly without configuring a remote first: <code>git ls-remote https://github.com/user/repo.git</code>. This makes it ideal for one-off inspection or build scripts that resolve a "latest" version.</p>
    <p>In day-to-day use, <code>git ls-remote</code> integrates closely with shell aliases, editor plugins, and continuous integration. Power users often add aliases that combine flags they always pass, or wrap the command in scripts that enforce team conventions. Output formatting can be customized via Git config — pretty formats, color schemes, and pager behavior are all tunable. When something goes wrong, the first diagnostic step is usually to re-run the command with <code>GIT_TRACE=1</code> in the environment, which reveals the underlying plumbing calls. For unusual situations, the <code>--help</code> output (<code>git ls-remote --help</code>) opens the full manual page with details on every option, including those rarely used in casual workflows but essential for debugging or scripting at scale.</p><p>Understanding how <code>git ls-remote</code> interacts with the rest of Git's data model — the object database, the index, refs, and the working tree — pays dividends. Each command operates on some subset of these pieces, and knowing which it touches helps predict outcomes and recover from mistakes. Reading the official Git documentation alongside hands-on practice in a throwaway repository is the fastest way to internalize the nuances. Most production issues with Git stem from one of three causes: surprising default behavior, partial network operations, or rewriting history that was already shared. A working mental model of <code>git ls-remote</code>'s side effects helps avoid all three.</p>
        <h2>Common Options</h2>
    <table>
      <thead><tr><th>Option</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>--heads</code> / <code>-h</code></td><td>Limit output to branch refs.</td></tr>
        <tr><td><code>--tags</code> / <code>-t</code></td><td>Limit output to tag refs.</td></tr>
        <tr><td><code>--refs</code></td><td>Filter out the dereferenced peel of annotated tags.</td></tr>
        <tr><td><code>--symref</code></td><td>Show what symbolic refs (like HEAD) point to.</td></tr>
        <tr><td><code>--exit-code</code></td><td>Exit with non-zero if no matching refs found.</td></tr>
        <tr><td><code>--sort=&lt;key&gt;</code></td><td>Sort results by version, refname, etc.</td></tr>
      </tbody>
    </table>
    <h2>Examples</h2>
    <pre><code>git ls-remote --heads origin
    # List all branches on origin with their SHAs

    git ls-remote --tags --refs origin
    # List all tags (skipping ^{} dereferences)

    git ls-remote https://github.com/git/git.git HEAD
    # Show what HEAD on a public repo points to

    git ls-remote --sort=-v:refname --tags origin 'v*' | head -1
    # Find the highest semver tag</code></pre>
    <h2>Common Mistakes</h2>
    <p>Parsing the output without <code>--refs</code> shows annotated tags twice (once as the tag object, once as <code>name^{}</code> for the underlying commit). Use <code>--refs</code> to suppress the peeled lines. Authentication can fail silently against private repos without a credential helper — test interactively first.</p>
    <h2>Related Commands</h2>
    <p><code>git remote</code>, <code>git fetch</code>, <code>git tag</code>, <code>git for-each-ref</code></p>
- title: git log — Show commit history
  section: Commands Reference
  difficulty: Beginner
  git_version: 2.30+
  weight: 200
  body: |
    <h2>Synopsis</h2>
    <pre><code>git log [&lt;options&gt;] [&lt;revision-range&gt;] [[--] &lt;path&gt;...]</code></pre>
    <h2>Description</h2>
    <p>The <code>git log</code> command displays the commit history reachable from one or more refs (defaulting to HEAD). It is one of the most flexible tools in Git, supporting filtering by author, date, message content, file paths, and more. Combined with formatting options, it can produce output suitable for changelogs, audits, and code archaeology.</p>
    <p>Useful idioms include <code>git log --oneline --graph --decorate --all</code> for a compact, visual view of the entire history, and <code>git log -p</code> to see patches inline. Pathspec arguments restrict the log to commits that touched specific files.</p>
    <p>In day-to-day use, <code>git log</code> integrates closely with shell aliases, editor plugins, and continuous integration. Power users often add aliases that combine flags they always pass, or wrap the command in scripts that enforce team conventions. Output formatting can be customized via Git config — pretty formats, color schemes, and pager behavior are all tunable. When something goes wrong, the first diagnostic step is usually to re-run the command with <code>GIT_TRACE=1</code> in the environment, which reveals the underlying plumbing calls. For unusual situations, the <code>--help</code> output (<code>git log --help</code>) opens the full manual page with details on every option, including those rarely used in casual workflows but essential for debugging or scripting at scale.</p><p>Understanding how <code>git log</code> interacts with the rest of Git's data model — the object database, the index, refs, and the working tree — pays dividends. Each command operates on some subset of these pieces, and knowing which it touches helps predict outcomes and recover from mistakes. Reading the official Git documentation alongside hands-on practice in a throwaway repository is the fastest way to internalize the nuances. Most production issues with Git stem from one of three causes: surprising default behavior, partial network operations, or rewriting history that was already shared. A working mental model of <code>git log</code>'s side effects helps avoid all three.</p>
        <h2>Common Options</h2>
    <table>
      <thead><tr><th>Option</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>--oneline</code></td><td>One commit per line, abbreviated SHA + subject.</td></tr>
        <tr><td><code>--graph</code></td><td>ASCII art of branch and merge structure.</td></tr>
        <tr><td><code>--all</code></td><td>Include all refs, not just HEAD.</td></tr>
        <tr><td><code>-p</code>, <code>--patch</code></td><td>Show diffs alongside each commit.</td></tr>
        <tr><td><code>--stat</code></td><td>Show changed-file statistics.</td></tr>
        <tr><td><code>--author=&lt;pattern&gt;</code></td><td>Filter by author.</td></tr>
        <tr><td><code>--since</code> / <code>--until</code></td><td>Filter by date.</td></tr>
        <tr><td><code>-S &lt;string&gt;</code></td><td>Pickaxe: find commits that add/remove this string.</td></tr>
        <tr><td><code>--follow</code></td><td>Track a single file's history across renames.</td></tr>
      </tbody>
    </table>
    <h2>Examples</h2>
    <pre><code>git log --oneline --graph --decorate --all
    # Compact visual history of everything

    git log -p src/auth.py
    # Full diffs of every commit touching auth.py

    git log -S "TODO" --since="2 weeks ago"
    # Find recent commits that added or removed "TODO"

    git log --author="alice" --pretty=format:"%h %s" -n 20
    # Last 20 commits by alice in custom format</code></pre>
    <h2>Common Mistakes</h2>
    <p>Forgetting that <code>git log file.txt</code> only shows commits where <code>file.txt</code> existed — use <code>--follow</code> if it has been renamed. Over-relying on <code>--grep</code> when you really want <code>-S</code> (which searches diffs, not messages). And on huge repos, <code>git log -p</code> without a path can produce gigabytes of output.</p>
    <h2>Related Commands</h2>
    <p><code>git show</code>, <code>git blame</code>, <code>git shortlog</code>, <code>git diff</code></p>
- title: git show — Show various types of objects
  section: Commands Reference
  difficulty: Beginner
  git_version: 2.30+
  weight: 210
  body: |
    <h2>Synopsis</h2>
    <pre><code>git show [&lt;options&gt;] [&lt;object&gt;...]</code></pre>
    <h2>Description</h2>
    <p>The <code>git show</code> command displays information about Git objects: commits (with diff), tags (annotation + tagged object), trees (file listing), or blobs (file contents). Without arguments, it shows the most recent commit. With a path argument, it displays the file as it existed at a specific revision.</p>
    <p><code>git show</code> is the go-to tool for inspecting a single commit in detail. Unlike <code>git log -1 -p</code>, it formats both annotated tags and tree listings naturally, making it useful for examining release tags or extracting historical file contents.</p>
    <p>In day-to-day use, <code>git show</code> integrates closely with shell aliases, editor plugins, and continuous integration. Power users often add aliases that combine flags they always pass, or wrap the command in scripts that enforce team conventions. Output formatting can be customized via Git config — pretty formats, color schemes, and pager behavior are all tunable. When something goes wrong, the first diagnostic step is usually to re-run the command with <code>GIT_TRACE=1</code> in the environment, which reveals the underlying plumbing calls. For unusual situations, the <code>--help</code> output (<code>git show --help</code>) opens the full manual page with details on every option, including those rarely used in casual workflows but essential for debugging or scripting at scale.</p><p>Understanding how <code>git show</code> interacts with the rest of Git's data model — the object database, the index, refs, and the working tree — pays dividends. Each command operates on some subset of these pieces, and knowing which it touches helps predict outcomes and recover from mistakes. Reading the official Git documentation alongside hands-on practice in a throwaway repository is the fastest way to internalize the nuances. Most production issues with Git stem from one of three causes: surprising default behavior, partial network operations, or rewriting history that was already shared. A working mental model of <code>git show</code>'s side effects helps avoid all three.</p>
        <h2>Common Options</h2>
    <table>
      <thead><tr><th>Option</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>--stat</code></td><td>Add a diffstat summary.</td></tr>
        <tr><td><code>--name-only</code></td><td>List only changed file names.</td></tr>
        <tr><td><code>--pretty=&lt;fmt&gt;</code></td><td>Choose format: <code>oneline</code>, <code>short</code>, <code>full</code>, custom.</td></tr>
        <tr><td><code>-s</code>, <code>--no-patch</code></td><td>Suppress the diff.</td></tr>
        <tr><td><code>--show-signature</code></td><td>Verify and display GPG signatures.</td></tr>
        <tr><td><code>--word-diff</code></td><td>Highlight changes at the word level.</td></tr>
      </tbody>
    </table>
    <h2>Examples</h2>
    <pre><code>git show HEAD
    # Latest commit with diff

    git show v2.0.0
    # Show an annotated tag

    git show HEAD:src/main.c
    # Display the file as it was at HEAD

    git show --stat abc123
    # Just the diffstat for a specific commit</code></pre>
    <h2>Common Mistakes</h2>
    <p>Confusing <code>git show HEAD~1</code> (one commit before HEAD) with <code>git show HEAD^1</code> (first parent of HEAD) — they're equivalent on linear history but differ on merges. Also note <code>git show HEAD:file</code> uses a colon, not a space, to specify a file at a revision.</p>
    <h2>Related Commands</h2>
    <p><code>git log</code>, <code>git diff</code>, <code>git cat-file</code>, <code>git blame</code></p>
- title: git blame — Show what revision and author last modified each line
  section: Commands Reference
  difficulty: Beginner
  git_version: 2.30+
  weight: 220
  body: |
    <h2>Synopsis</h2>
    <pre><code>git blame [-L &lt;range&gt;] [-w] [-M] [-C] &lt;file&gt;</code></pre>
    <h2>Description</h2>
    <p>The <code>git blame</code> command annotates each line of a file with the commit, author, and timestamp that last touched it. It is invaluable for understanding why a piece of code looks the way it does, who introduced it, and when. Despite the accusatory name, blame is mostly used as a research tool, not as a means of finger-pointing.</p>
    <p>Blame can follow code as it was moved or copied (with <code>-M</code> and <code>-C</code>), and can ignore whitespace-only or formatting-only commits if you maintain a <code>.git-blame-ignore-revs</code> file referenced via <code>blame.ignoreRevsFile</code>.</p>
    <p>In day-to-day use, <code>git blame</code> integrates closely with shell aliases, editor plugins, and continuous integration. Power users often add aliases that combine flags they always pass, or wrap the command in scripts that enforce team conventions. Output formatting can be customized via Git config — pretty formats, color schemes, and pager behavior are all tunable. When something goes wrong, the first diagnostic step is usually to re-run the command with <code>GIT_TRACE=1</code> in the environment, which reveals the underlying plumbing calls. For unusual situations, the <code>--help</code> output (<code>git blame --help</code>) opens the full manual page with details on every option, including those rarely used in casual workflows but essential for debugging or scripting at scale.</p><p>Understanding how <code>git blame</code> interacts with the rest of Git's data model — the object database, the index, refs, and the working tree — pays dividends. Each command operates on some subset of these pieces, and knowing which it touches helps predict outcomes and recover from mistakes. Reading the official Git documentation alongside hands-on practice in a throwaway repository is the fastest way to internalize the nuances. Most production issues with Git stem from one of three causes: surprising default behavior, partial network operations, or rewriting history that was already shared. A working mental model of <code>git blame</code>'s side effects helps avoid all three.</p>
        <h2>Common Options</h2>
    <table>
      <thead><tr><th>Option</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>-L &lt;start&gt;,&lt;end&gt;</code></td><td>Restrict blame to a line range.</td></tr>
        <tr><td><code>-w</code></td><td>Ignore whitespace changes.</td></tr>
        <tr><td><code>-M</code></td><td>Detect lines moved within a file.</td></tr>
        <tr><td><code>-C</code></td><td>Detect lines copied from other files (repeat for stronger detection).</td></tr>
        <tr><td><code>--since=&lt;date&gt;</code></td><td>Stop annotating earlier than this date.</td></tr>
        <tr><td><code>-e</code>, <code>--show-email</code></td><td>Show author email instead of name.</td></tr>
        <tr><td><code>--ignore-revs-file &lt;file&gt;</code></td><td>Skip listed revisions when assigning blame.</td></tr>
      </tbody>
    </table>
    <h2>Examples</h2>
    <pre><code>git blame src/parser.c
    # Annotate every line

    git blame -L 50,100 src/parser.c
    # Just lines 50 through 100

    git blame -w -M -C README.md
    # Ignore whitespace and detect moves/copies

    git blame --ignore-revs-file .git-blame-ignore-revs file.js
    # Skip noisy formatting commits</code></pre>
    <h2>Common Mistakes</h2>
    <p>Using blame to assign fault rather than to investigate context creates a hostile culture. Pair blame with <code>git log</code> on the offending commit to read the full message and intent. After mass formatting, set up <code>.git-blame-ignore-revs</code> so blame still points to meaningful authors.</p>
    <h2>Related Commands</h2>
    <p><code>git log -L</code>, <code>git log -S</code>, <code>git show</code>, <code>git annotate</code></p>
- title: git bisect — Use binary search to find the commit that introduced a bug
  section: Commands Reference
  difficulty: Intermediate
  git_version: 2.30+
  weight: 230
  body: |
    <h2>Synopsis</h2>
    <pre><code>git bisect start
    git bisect good &lt;commit&gt;
    git bisect bad &lt;commit&gt;
    git bisect run &lt;script&gt;
    git bisect reset</code></pre>
    <h2>Description</h2>
    <p>The <code>git bisect</code> command performs a binary search through commit history to identify exactly which commit introduced a bug. You start by marking a known-bad commit (often HEAD) and a known-good commit (perhaps a release tag), then Git checks out a midpoint and asks you to test. You answer "good" or "bad," Git narrows the range, and you repeat until the offending commit is found.</p>
    <p>If you have an automated test or reproducer, <code>git bisect run</code> automates the entire process — Git invokes your script at each step. Bisecting through a thousand commits typically takes about ten iterations.</p>
    <p>In day-to-day use, <code>git bisect</code> integrates closely with shell aliases, editor plugins, and continuous integration. Power users often add aliases that combine flags they always pass, or wrap the command in scripts that enforce team conventions. Output formatting can be customized via Git config — pretty formats, color schemes, and pager behavior are all tunable. When something goes wrong, the first diagnostic step is usually to re-run the command with <code>GIT_TRACE=1</code> in the environment, which reveals the underlying plumbing calls. For unusual situations, the <code>--help</code> output (<code>git bisect --help</code>) opens the full manual page with details on every option, including those rarely used in casual workflows but essential for debugging or scripting at scale.</p><p>Understanding how <code>git bisect</code> interacts with the rest of Git's data model — the object database, the index, refs, and the working tree — pays dividends. Each command operates on some subset of these pieces, and knowing which it touches helps predict outcomes and recover from mistakes. Reading the official Git documentation alongside hands-on practice in a throwaway repository is the fastest way to internalize the nuances. Most production issues with Git stem from one of three causes: surprising default behavior, partial network operations, or rewriting history that was already shared. A working mental model of <code>git bisect</code>'s side effects helps avoid all three.</p>
        <h2>Common Options</h2>
    <table>
      <thead><tr><th>Subcommand</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>start</code></td><td>Begin a bisect session.</td></tr>
        <tr><td><code>good</code> / <code>bad</code></td><td>Mark the current (or specified) commit.</td></tr>
        <tr><td><code>skip</code></td><td>Mark a commit as untestable.</td></tr>
        <tr><td><code>run &lt;cmd&gt;</code></td><td>Automate by running a command (exit 0 = good, non-zero = bad).</td></tr>
        <tr><td><code>reset</code></td><td>End the session and return to the original branch.</td></tr>
        <tr><td><code>log</code></td><td>Show the bisect log.</td></tr>
        <tr><td><code>visualize</code></td><td>Show remaining suspect commits.</td></tr>
      </tbody>
    </table>
    <h2>Examples</h2>
    <pre><code>git bisect start
    git bisect bad HEAD
    git bisect good v1.5.0
    # Git checks out a midpoint; test it, then:
    git bisect good   # or: git bisect bad

    git bisect run npm test
    # Fully automated: npm test exit codes drive the search

    git bisect reset
    # Return to your original branch</code></pre>
    <h2>Common Mistakes</h2>
    <p>Forgetting to <code>git bisect reset</code> leaves you in a detached HEAD state. Marking a commit "good" when the bug is intermittent leads bisect astray — use <code>skip</code> instead. Make sure your test script returns exit code 125 to signal "skip" if the build itself is broken at that commit.</p>
    <h2>Related Commands</h2>
    <p><code>git log</code>, <code>git blame</code>, <code>git show</code>, <code>git checkout</code></p>
- title: git grep — Search tracked files for a pattern
  section: Commands Reference
  difficulty: Beginner
  git_version: 2.30+
  weight: 240
  body: |
    <h2>Synopsis</h2>
    <pre><code>git grep [&lt;options&gt;] &lt;pattern&gt; [&lt;tree-ish&gt;...]</code></pre>
    <h2>Description</h2>
    <p>The <code>git grep</code> command searches files tracked by Git for a pattern. It is much faster than <code>grep -r</code> on large repositories because it only searches what Git knows about (skipping <code>.git</code>, build outputs, and ignored files) and uses Git's optimized object database. You can also search any historical revision or tree, not just the working copy.</p>
    <p>Patterns can be plain strings, basic regex (default), extended regex (<code>-E</code>), or PCRE (<code>-P</code> if compiled in). Use <code>git grep</code> instead of <code>grep -r</code> in scripts that operate on Git repositories.</p>
    <p>In day-to-day use, <code>git grep</code> integrates closely with shell aliases, editor plugins, and continuous integration. Power users often add aliases that combine flags they always pass, or wrap the command in scripts that enforce team conventions. Output formatting can be customized via Git config — pretty formats, color schemes, and pager behavior are all tunable. When something goes wrong, the first diagnostic step is usually to re-run the command with <code>GIT_TRACE=1</code> in the environment, which reveals the underlying plumbing calls. For unusual situations, the <code>--help</code> output (<code>git grep --help</code>) opens the full manual page with details on every option, including those rarely used in casual workflows but essential for debugging or scripting at scale.</p><p>Understanding how <code>git grep</code> interacts with the rest of Git's data model — the object database, the index, refs, and the working tree — pays dividends. Each command operates on some subset of these pieces, and knowing which it touches helps predict outcomes and recover from mistakes. Reading the official Git documentation alongside hands-on practice in a throwaway repository is the fastest way to internalize the nuances. Most production issues with Git stem from one of three causes: surprising default behavior, partial network operations, or rewriting history that was already shared. A working mental model of <code>git grep</code>'s side effects helps avoid all three.</p>
        <h2>Common Options</h2>
    <table>
      <thead><tr><th>Option</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>-i</code></td><td>Case-insensitive match.</td></tr>
        <tr><td><code>-n</code></td><td>Show line numbers.</td></tr>
        <tr><td><code>-l</code></td><td>List only matching file names.</td></tr>
        <tr><td><code>-E</code></td><td>Extended regular expressions.</td></tr>
        <tr><td><code>-P</code></td><td>Perl-compatible regex.</td></tr>
        <tr><td><code>-w</code></td><td>Match whole words.</td></tr>
        <tr><td><code>--cached</code></td><td>Search the index instead of the working tree.</td></tr>
        <tr><td><code>--untracked</code></td><td>Also search untracked, non-ignored files.</td></tr>
      </tbody>
    </table>
    <h2>Examples</h2>
    <pre><code>git grep "TODO"
    # Find every TODO in tracked files

    git grep -n -i "deprecated" src/
    # Case-insensitive, with line numbers, under src/

    git grep "fooBar" v1.0.0
    # Search the v1.0.0 tag's tree

    git grep -E "^(import|from) " --and -e "json"
    # Combined patterns: lines starting with import/from that mention json</code></pre>
    <h2>Common Mistakes</h2>
    <p>Forgetting that <code>git grep</code> only searches tracked files — newly added files won't appear unless staged or you pass <code>--untracked</code>. PCRE features (<code>\b</code>, lookbehind) require Git built with PCRE support and the <code>-P</code> flag.</p>
    <h2>Related Commands</h2>
    <p><code>git log -S</code>, <code>git log -G</code>, <code>git ls-files</code>, <code>git show</code></p>
- title: git shortlog — Summarize git log output
  section: Commands Reference
  difficulty: Beginner
  git_version: 2.30+
  weight: 250
  body: |
    <h2>Synopsis</h2>
    <pre><code>git shortlog [-n] [-s] [-e] [&lt;revision-range&gt;]</code></pre>
    <h2>Description</h2>
    <p>The <code>git shortlog</code> command groups commits by author, producing concise summaries suitable for release notes, contributor lists, and quick "who did what" overviews. By default it prints each author's name followed by the subject lines of their commits in the given range.</p>
    <p>Common modes include <code>-sn</code> (summary, sorted by count) for "top contributors" lists and <code>--no-merges</code> to ignore merge commits. Combined with a range like <code>v1.0..v2.0</code>, shortlog is the fastest way to draft release-note credits.</p>
    <p>In day-to-day use, <code>git shortlog</code> integrates closely with shell aliases, editor plugins, and continuous integration. Power users often add aliases that combine flags they always pass, or wrap the command in scripts that enforce team conventions. Output formatting can be customized via Git config — pretty formats, color schemes, and pager behavior are all tunable. When something goes wrong, the first diagnostic step is usually to re-run the command with <code>GIT_TRACE=1</code> in the environment, which reveals the underlying plumbing calls. For unusual situations, the <code>--help</code> output (<code>git shortlog --help</code>) opens the full manual page with details on every option, including those rarely used in casual workflows but essential for debugging or scripting at scale.</p><p>Understanding how <code>git shortlog</code> interacts with the rest of Git's data model — the object database, the index, refs, and the working tree — pays dividends. Each command operates on some subset of these pieces, and knowing which it touches helps predict outcomes and recover from mistakes. Reading the official Git documentation alongside hands-on practice in a throwaway repository is the fastest way to internalize the nuances. Most production issues with Git stem from one of three causes: surprising default behavior, partial network operations, or rewriting history that was already shared. A working mental model of <code>git shortlog</code>'s side effects helps avoid all three.</p>
        <h2>Common Options</h2>
    <table>
      <thead><tr><th>Option</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>-s</code>, <code>--summary</code></td><td>Show only counts per author.</td></tr>
        <tr><td><code>-n</code>, <code>--numbered</code></td><td>Sort authors by commit count.</td></tr>
        <tr><td><code>-e</code>, <code>--email</code></td><td>Include author email addresses.</td></tr>
        <tr><td><code>--no-merges</code></td><td>Exclude merge commits.</td></tr>
        <tr><td><code>--group=&lt;type&gt;</code></td><td>Group by author, committer, or trailer.</td></tr>
        <tr><td><code>-w[&lt;width&gt;]</code></td><td>Wrap subject lines.</td></tr>
      </tbody>
    </table>
    <h2>Examples</h2>
    <pre><code>git shortlog -sn
    # Top contributors all-time, with counts

    git shortlog -sne v1.0..v2.0
    # Contributors between two releases, with emails

    git shortlog --no-merges HEAD~50..HEAD
    # Subjects grouped by author for the last 50 commits

    git shortlog --group=trailer:co-authored-by
    # Group by Co-authored-by trailer</code></pre>
    <h2>Common Mistakes</h2>
    <p>Multiple commit identities for the same person (different emails, different name capitalizations) inflate the contributor count. A <code>.mailmap</code> file at the repo root canonicalizes them. Forgetting <code>--no-merges</code> can attribute many merge commits to project maintainers.</p>
    <h2>Related Commands</h2>
    <p><code>git log</code>, <code>git blame</code>, <code>git describe</code>, <code>git tag</code></p>
- title: git describe — Describe a commit using the most recent reachable tag
  section: Commands Reference
  difficulty: Beginner
  git_version: 2.30+
  weight: 260
  body: |
    <h2>Synopsis</h2>
    <pre><code>git describe [--tags] [--always] [--dirty] [&lt;commit&gt;]</code></pre>
    <h2>Description</h2>
    <p>The <code>git describe</code> command produces a human-readable name for a commit based on the most recent reachable tag. The output looks like <code>v1.4.2-13-gabc1234</code>, meaning "13 commits past tag v1.4.2, at SHA abc1234." If the commit is exactly at a tag, only the tag name is printed.</p>
    <p>Build systems use <code>git describe</code> to embed version strings into binaries. With <code>--dirty</code>, the output includes a <code>-dirty</code> suffix when the working tree has uncommitted changes — perfect for marking development builds.</p>
    <p>In day-to-day use, <code>git describe</code> integrates closely with shell aliases, editor plugins, and continuous integration. Power users often add aliases that combine flags they always pass, or wrap the command in scripts that enforce team conventions. Output formatting can be customized via Git config — pretty formats, color schemes, and pager behavior are all tunable. When something goes wrong, the first diagnostic step is usually to re-run the command with <code>GIT_TRACE=1</code> in the environment, which reveals the underlying plumbing calls. For unusual situations, the <code>--help</code> output (<code>git describe --help</code>) opens the full manual page with details on every option, including those rarely used in casual workflows but essential for debugging or scripting at scale.</p><p>Understanding how <code>git describe</code> interacts with the rest of Git's data model — the object database, the index, refs, and the working tree — pays dividends. Each command operates on some subset of these pieces, and knowing which it touches helps predict outcomes and recover from mistakes. Reading the official Git documentation alongside hands-on practice in a throwaway repository is the fastest way to internalize the nuances. Most production issues with Git stem from one of three causes: surprising default behavior, partial network operations, or rewriting history that was already shared. A working mental model of <code>git describe</code>'s side effects helps avoid all three.</p>
        <h2>Common Options</h2>
    <table>
      <thead><tr><th>Option</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>--tags</code></td><td>Use lightweight tags as well as annotated.</td></tr>
        <tr><td><code>--always</code></td><td>Fall back to abbreviated SHA if no tag is reachable.</td></tr>
        <tr><td><code>--dirty[=&lt;mark&gt;]</code></td><td>Append a marker if the working tree is dirty.</td></tr>
        <tr><td><code>--long</code></td><td>Always show the long format, even when at a tag.</td></tr>
        <tr><td><code>--match &lt;pattern&gt;</code></td><td>Only consider tags matching a glob.</td></tr>
        <tr><td><code>--abbrev=&lt;n&gt;</code></td><td>Use <code>n</code> hex digits for the SHA.</td></tr>
        <tr><td><code>--contains</code></td><td>Show the earliest tag that contains the commit.</td></tr>
      </tbody>
    </table>
    <h2>Examples</h2>
    <pre><code>git describe
    # e.g. v2.1.0-3-g1a2b3c4

    git describe --tags --dirty --always
    # Robust version string for build scripts

    git describe --match 'v[0-9]*'
    # Only consider semver-style tags

    git describe --contains abc123
    # Find the first release that includes a commit</code></pre>
    <h2>Common Mistakes</h2>
    <p>If your repo has only lightweight (non-annotated) tags, plain <code>git describe</code> says "fatal: No names found." Use <code>--tags</code>. Shallow clones may have no reachable tags at all — fetch tags explicitly with <code>git fetch --tags</code>.</p>
    <h2>Related Commands</h2>
    <p><code>git tag</code>, <code>git log</code>, <code>git rev-parse</code>, <code>git show</code></p>
- title: git restore — Restore working tree files
  section: Commands Reference
  difficulty: Beginner
  git_version: 2.30+
  weight: 270
  body: |
    <h2>Synopsis</h2>
    <pre><code>git restore [--staged] [--source=&lt;tree&gt;] [-p] &lt;pathspec&gt;...</code></pre>
    <h2>Description</h2>
    <p>The <code>git restore</code> command, introduced in Git 2.23, replaces the file-restoring half of <code>git checkout</code>. It is purpose-built for two cases: discarding unstaged changes in the working tree (default behavior) and unstaging changes from the index (with <code>--staged</code>). The cleaner separation makes the tool less error-prone than <code>git checkout</code>.</p>
    <p>You can restore from any source: another commit, a branch, or a tag. Combined with <code>-p</code>, you can interactively pick which hunks to restore. <code>git restore</code> never modifies branches or HEAD — it only touches files.</p>
    <p>In day-to-day use, <code>git restore</code> integrates closely with shell aliases, editor plugins, and continuous integration. Power users often add aliases that combine flags they always pass, or wrap the command in scripts that enforce team conventions. Output formatting can be customized via Git config — pretty formats, color schemes, and pager behavior are all tunable. When something goes wrong, the first diagnostic step is usually to re-run the command with <code>GIT_TRACE=1</code> in the environment, which reveals the underlying plumbing calls. For unusual situations, the <code>--help</code> output (<code>git restore --help</code>) opens the full manual page with details on every option, including those rarely used in casual workflows but essential for debugging or scripting at scale.</p><p>Understanding how <code>git restore</code> interacts with the rest of Git's data model — the object database, the index, refs, and the working tree — pays dividends. Each command operates on some subset of these pieces, and knowing which it touches helps predict outcomes and recover from mistakes. Reading the official Git documentation alongside hands-on practice in a throwaway repository is the fastest way to internalize the nuances. Most production issues with Git stem from one of three causes: surprising default behavior, partial network operations, or rewriting history that was already shared. A working mental model of <code>git restore</code>'s side effects helps avoid all three.</p>
        <h2>Common Options</h2>
    <table>
      <thead><tr><th>Option</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>--staged</code></td><td>Restore the index instead of the working tree (i.e., unstage).</td></tr>
        <tr><td><code>--worktree</code></td><td>Restore the working tree (default).</td></tr>
        <tr><td><code>--source=&lt;tree&gt;</code> / <code>-s</code></td><td>Restore from a specific commit, branch, or tag.</td></tr>
        <tr><td><code>-p</code>, <code>--patch</code></td><td>Interactively pick hunks to restore.</td></tr>
        <tr><td><code>--ours</code> / <code>--theirs</code></td><td>During a conflict, restore one side.</td></tr>
        <tr><td><code>-q</code>, <code>--quiet</code></td><td>Suppress progress.</td></tr>
      </tbody>
    </table>
    <h2>Examples</h2>
    <pre><code>git restore src/main.c
    # Discard unstaged changes in main.c

    git restore --staged config.yml
    # Unstage a file (keep working-tree changes)

    git restore --source=HEAD~3 README.md
    # Bring back README.md as it was 3 commits ago

    git restore -p
    # Interactively pick hunks to discard</code></pre>
    <h2>Common Mistakes</h2>
    <p><code>git restore</code> on a file with unsaved changes silently overwrites them — there is no confirmation prompt and no easy undo. Stash first if uncertain. Beginners sometimes confuse <code>--staged</code> with <code>git reset --hard</code>; <code>--staged</code> only touches the index, leaving working-tree edits intact.</p>
    <h2>Related Commands</h2>
    <p><code>git reset</code>, <code>git checkout</code>, <code>git stash</code>, <code>git revert</code></p>
- title: git reset — Reset current HEAD to a specified state
  section: Commands Reference
  difficulty: Intermediate
  git_version: 2.30+
  weight: 280
  body: |
    <h2>Synopsis</h2>
    <pre><code>git reset [--soft | --mixed | --hard] [&lt;commit&gt;]
    git reset [&lt;commit&gt;] [--] &lt;pathspec&gt;...</code></pre>
    <h2>Description</h2>
    <p>The <code>git reset</code> command moves the current branch pointer to a specified commit, optionally updating the index and working tree. It has three primary modes: <code>--soft</code> (move HEAD only), <code>--mixed</code> (default; also reset the index), and <code>--hard</code> (also reset the working tree, discarding all changes).</p>
    <p>Reset is one of the most powerful and most dangerous Git commands. <code>git reset --hard</code> can permanently lose work — though <code>git reflog</code> usually allows recovery within the reflog window. With path arguments, reset operates only on the index for those paths and never moves HEAD.</p>
    <p>In day-to-day use, <code>git reset</code> integrates closely with shell aliases, editor plugins, and continuous integration. Power users often add aliases that combine flags they always pass, or wrap the command in scripts that enforce team conventions. Output formatting can be customized via Git config — pretty formats, color schemes, and pager behavior are all tunable. When something goes wrong, the first diagnostic step is usually to re-run the command with <code>GIT_TRACE=1</code> in the environment, which reveals the underlying plumbing calls. For unusual situations, the <code>--help</code> output (<code>git reset --help</code>) opens the full manual page with details on every option, including those rarely used in casual workflows but essential for debugging or scripting at scale.</p><p>Understanding how <code>git reset</code> interacts with the rest of Git's data model — the object database, the index, refs, and the working tree — pays dividends. Each command operates on some subset of these pieces, and knowing which it touches helps predict outcomes and recover from mistakes. Reading the official Git documentation alongside hands-on practice in a throwaway repository is the fastest way to internalize the nuances. Most production issues with Git stem from one of three causes: surprising default behavior, partial network operations, or rewriting history that was already shared. A working mental model of <code>git reset</code>'s side effects helps avoid all three.</p>
        <h2>Common Options</h2>
    <table>
      <thead><tr><th>Option</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>--soft</code></td><td>Move HEAD only; index and working tree unchanged.</td></tr>
        <tr><td><code>--mixed</code> (default)</td><td>Move HEAD and reset the index; working tree unchanged.</td></tr>
        <tr><td><code>--hard</code></td><td>Move HEAD, reset index, and overwrite working tree.</td></tr>
        <tr><td><code>--keep</code></td><td>Like <code>--hard</code>, but abort if local changes would be lost.</td></tr>
        <tr><td><code>--merge</code></td><td>Reset the index and updates files that differ between HEAD and target, keeping local merges.</td></tr>
        <tr><td><code>-p</code></td><td>Interactively select hunks to unstage.</td></tr>
      </tbody>
    </table>
    <h2>Examples</h2>
    <pre><code>git reset HEAD~1
    # Move back one commit; keep changes in working tree

    git reset --soft HEAD~3
    # Combine the last 3 commits into a single staged change

    git reset --hard origin/main
    # Discard ALL local commits and changes (dangerous)

    git reset HEAD config.yml
    # Unstage a single file (older syntax for git restore --staged)</code></pre>
    <h2>Common Mistakes</h2>
    <p><code>git reset --hard</code> on a branch with unpushed commits loses them. Reflog can save you within ~90 days, but only if you know to look. Confusing <code>git reset HEAD file</code> (unstage) with <code>git reset --hard</code> (nuke) is a classic beginner footgun. Modern Git provides <code>git restore --staged</code> as a clearer alternative.</p>
    <h2>Related Commands</h2>
    <p><code>git restore</code>, <code>git revert</code>, <code>git reflog</code>, <code>git stash</code></p>
- title: git revert — Create a new commit that undoes earlier commits
  section: Commands Reference
  difficulty: Intermediate
  git_version: 2.30+
  weight: 290
  body: |
    <h2>Synopsis</h2>
    <pre><code>git revert [-n] [-m &lt;parent&gt;] &lt;commit&gt;...</code></pre>
    <h2>Description</h2>
    <p>The <code>git revert</code> command creates a new commit whose changes are the inverse of an earlier commit's. Unlike <code>git reset</code>, it doesn't rewrite history — it adds a new commit that undoes one or more old ones. This makes revert safe to use on shared branches: collaborators see a clear "undo" commit rather than rewritten history.</p>
    <p>To revert a merge commit, use <code>-m 1</code> (or whichever parent number) to specify the "mainline" — the parent whose perspective should be preserved. Reverting multiple commits in a single command applies them as a series of new commits.</p>
    <p>In day-to-day use, <code>git revert</code> integrates closely with shell aliases, editor plugins, and continuous integration. Power users often add aliases that combine flags they always pass, or wrap the command in scripts that enforce team conventions. Output formatting can be customized via Git config — pretty formats, color schemes, and pager behavior are all tunable. When something goes wrong, the first diagnostic step is usually to re-run the command with <code>GIT_TRACE=1</code> in the environment, which reveals the underlying plumbing calls. For unusual situations, the <code>--help</code> output (<code>git revert --help</code>) opens the full manual page with details on every option, including those rarely used in casual workflows but essential for debugging or scripting at scale.</p><p>Understanding how <code>git revert</code> interacts with the rest of Git's data model — the object database, the index, refs, and the working tree — pays dividends. Each command operates on some subset of these pieces, and knowing which it touches helps predict outcomes and recover from mistakes. Reading the official Git documentation alongside hands-on practice in a throwaway repository is the fastest way to internalize the nuances. Most production issues with Git stem from one of three causes: surprising default behavior, partial network operations, or rewriting history that was already shared. A working mental model of <code>git revert</code>'s side effects helps avoid all three.</p>
        <h2>Common Options</h2>
    <table>
      <thead><tr><th>Option</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>-n</code>, <code>--no-commit</code></td><td>Stage the inverse changes without committing.</td></tr>
        <tr><td><code>-m &lt;parent-number&gt;</code></td><td>Mainline parent for reverting a merge.</td></tr>
        <tr><td><code>--continue</code></td><td>Resume after resolving conflicts.</td></tr>
        <tr><td><code>--abort</code></td><td>Cancel an in-progress revert.</td></tr>
        <tr><td><code>--skip</code></td><td>Skip the current commit and move on.</td></tr>
        <tr><td><code>-e</code>, <code>--edit</code></td><td>Edit the revert commit message.</td></tr>
      </tbody>
    </table>
    <h2>Examples</h2>
    <pre><code>git revert HEAD
    # Undo the most recent commit with a new commit

    git revert abc123..def456
    # Revert a range of commits

    git revert -m 1 merge-sha
    # Revert a merge commit, keeping mainline

    git revert -n HEAD~2
    # Stage an inverse without committing yet</code></pre>
    <h2>Common Mistakes</h2>
    <p>Reverting a merge prevents future re-merging of the same branch unless you also revert the revert. Plan accordingly when reverting feature merges. Conflicts during revert require <code>--continue</code> or <code>--abort</code>, just like rebase.</p>
    <h2>Related Commands</h2>
    <p><code>git reset</code>, <code>git restore</code>, <code>git cherry-pick</code>, <code>git log</code></p>
- title: git clean — Remove untracked files from the working tree
  section: Commands Reference
  difficulty: Beginner
  git_version: 2.30+
  weight: 300
  body: |
    <h2>Synopsis</h2>
    <pre><code>git clean [-d] [-f] [-x | -X] [-n] [-i] [&lt;path&gt;...]</code></pre>
    <h2>Description</h2>
    <p>The <code>git clean</code> command removes untracked files from the working tree. By default it requires <code>-f</code> (or <code>clean.requireForce = false</code>) as a safety measure because deletions are irreversible. With <code>-d</code> it also removes untracked directories, and <code>-x</code> additionally removes files that are normally ignored (build outputs, dependency caches).</p>
    <p>Always run <code>git clean -n</code> first to preview which files will be deleted. The interactive mode (<code>-i</code>) lets you confirm or filter the list. <code>git clean</code> is the right tool for resetting a project to a pristine state, especially before debugging build issues.</p>
    <p>In day-to-day use, <code>git clean</code> integrates closely with shell aliases, editor plugins, and continuous integration. Power users often add aliases that combine flags they always pass, or wrap the command in scripts that enforce team conventions. Output formatting can be customized via Git config — pretty formats, color schemes, and pager behavior are all tunable. When something goes wrong, the first diagnostic step is usually to re-run the command with <code>GIT_TRACE=1</code> in the environment, which reveals the underlying plumbing calls. For unusual situations, the <code>--help</code> output (<code>git clean --help</code>) opens the full manual page with details on every option, including those rarely used in casual workflows but essential for debugging or scripting at scale.</p><p>Understanding how <code>git clean</code> interacts with the rest of Git's data model — the object database, the index, refs, and the working tree — pays dividends. Each command operates on some subset of these pieces, and knowing which it touches helps predict outcomes and recover from mistakes. Reading the official Git documentation alongside hands-on practice in a throwaway repository is the fastest way to internalize the nuances. Most production issues with Git stem from one of three causes: surprising default behavior, partial network operations, or rewriting history that was already shared. A working mental model of <code>git clean</code>'s side effects helps avoid all three.</p>
        <h2>Common Options</h2>
    <table>
      <thead><tr><th>Option</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>-f</code>, <code>--force</code></td><td>Required to actually delete (unless config disables this).</td></tr>
        <tr><td><code>-n</code>, <code>--dry-run</code></td><td>Show what would be deleted, don't delete.</td></tr>
        <tr><td><code>-d</code></td><td>Also remove untracked directories.</td></tr>
        <tr><td><code>-x</code></td><td>Also remove ignored files.</td></tr>
        <tr><td><code>-X</code></td><td>Remove only ignored files.</td></tr>
        <tr><td><code>-i</code>, <code>--interactive</code></td><td>Interactive selection.</td></tr>
        <tr><td><code>-e &lt;pattern&gt;</code></td><td>Exclude files matching pattern.</td></tr>
      </tbody>
    </table>
    <h2>Examples</h2>
    <pre><code>git clean -nd
    # Preview what would be deleted (dirs included)

    git clean -fd
    # Actually delete untracked files and directories

    git clean -fdx
    # Plus ignored files (full reset to pristine)

    git clean -i
    # Interactive: choose what to delete</code></pre>
    <h2>Common Mistakes</h2>
    <p><code>git clean -fdx</code> wipes <code>node_modules</code>, build artifacts, IDE settings, and even <code>.env</code> files if they're gitignored. Always preview with <code>-n</code> first. Be especially careful in submodules — clean operates per-repository.</p>
    <h2>Related Commands</h2>
    <p><code>git status</code>, <code>git stash</code>, <code>git reset</code>, <code>git rm</code></p>
- title: git stash — Save changes for later
  section: Commands Reference
  difficulty: Beginner
  git_version: 2.30+
  weight: 310
  body: |
    <h2>Synopsis</h2>
    <pre><code>git stash [push [-m &lt;msg&gt;] [-u]]
    git stash pop [&lt;stash&gt;]
    git stash list
    git stash drop [&lt;stash&gt;]</code></pre>
    <h2>Description</h2>
    <p>The <code>git stash</code> command shelves uncommitted changes (in both working tree and index) and reverts the working tree to a clean state. The shelved changes are stored on a stack you can re-apply later. Stash is perfect for situations like "I need to switch branches but my work isn't ready to commit."</p>
    <p>By default, untracked files are not stashed; pass <code>-u</code> (or <code>--include-untracked</code>) to include them, and <code>-a</code> to include even ignored files. Each stash entry is a regular commit object, addressable as <code>stash@{0}</code>, <code>stash@{1}</code>, etc.</p>
    <p>In day-to-day use, <code>git stash</code> integrates closely with shell aliases, editor plugins, and continuous integration. Power users often add aliases that combine flags they always pass, or wrap the command in scripts that enforce team conventions. Output formatting can be customized via Git config — pretty formats, color schemes, and pager behavior are all tunable. When something goes wrong, the first diagnostic step is usually to re-run the command with <code>GIT_TRACE=1</code> in the environment, which reveals the underlying plumbing calls. For unusual situations, the <code>--help</code> output (<code>git stash --help</code>) opens the full manual page with details on every option, including those rarely used in casual workflows but essential for debugging or scripting at scale.</p><p>Understanding how <code>git stash</code> interacts with the rest of Git's data model — the object database, the index, refs, and the working tree — pays dividends. Each command operates on some subset of these pieces, and knowing which it touches helps predict outcomes and recover from mistakes. Reading the official Git documentation alongside hands-on practice in a throwaway repository is the fastest way to internalize the nuances. Most production issues with Git stem from one of three causes: surprising default behavior, partial network operations, or rewriting history that was already shared. A working mental model of <code>git stash</code>'s side effects helps avoid all three.</p>
        <h2>Common Options</h2>
    <table>
      <thead><tr><th>Option / Subcommand</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>push -m &lt;msg&gt;</code></td><td>Stash with a descriptive message.</td></tr>
        <tr><td><code>-u</code></td><td>Include untracked files.</td></tr>
        <tr><td><code>-a</code></td><td>Include ignored files too.</td></tr>
        <tr><td><code>list</code></td><td>Show all stash entries.</td></tr>
        <tr><td><code>show [-p] &lt;stash&gt;</code></td><td>Display contents of a stash.</td></tr>
        <tr><td><code>pop</code> / <code>apply</code></td><td>Re-apply a stash; pop also drops it.</td></tr>
        <tr><td><code>drop &lt;stash&gt;</code></td><td>Delete a stash entry.</td></tr>
        <tr><td><code>branch &lt;name&gt;</code></td><td>Create a branch from a stash.</td></tr>
      </tbody>
    </table>
    <h2>Examples</h2>
    <pre><code>git stash push -m "WIP: refactor parser"
    # Save current work with a label

    git stash list
    # stash@{0}: On main: WIP: refactor parser

    git stash pop
    # Re-apply the most recent stash and remove it

    git stash branch temp-branch stash@{1}
    # Create a new branch from a stash that conflicts</code></pre>
    <h2>Common Mistakes</h2>
    <p>Forgetting that stash doesn't include untracked files by default, then losing them when running <code>git clean</code>. Use <code>-u</code>. Popping a stash that conflicts can leave a complicated state — consider <code>apply</code> first so the stash isn't dropped if things go wrong. Long-lived stashes accumulate; review with <code>git stash list</code> regularly.</p>
    <h2>Related Commands</h2>
    <p><code>git commit</code>, <code>git switch</code>, <code>git restore</code>, <code>git clean</code></p>
- title: git apply — Apply a patch to files and/or to the index
  section: Commands Reference
  difficulty: Intermediate
  git_version: 2.30+
  weight: 320
  body: |
    <h2>Synopsis</h2>
    <pre><code>git apply [--check] [--index] [--3way] &lt;patch&gt;...</code></pre>
    <h2>Description</h2>
    <p>The <code>git apply</code> command applies a unified diff (a patch file) to the working tree, the index, or both. Unlike <code>git am</code>, which expects a full mailbox-format patch with author and message metadata, <code>git apply</code> just applies the diff content. It's useful for applying patches received over email, code review tools, or generated by <code>git diff</code>.</p>
    <p>By default, <code>git apply</code> only updates the working tree. Use <code>--index</code> to also update the staging area, and <code>--3way</code> to fall back to a three-way merge when the patch doesn't apply cleanly. To verify a patch without applying, use <code>--check</code>.</p>
    <p>In day-to-day use, <code>git apply</code> integrates closely with shell aliases, editor plugins, and continuous integration. Power users often add aliases that combine flags they always pass, or wrap the command in scripts that enforce team conventions. Output formatting can be customized via Git config — pretty formats, color schemes, and pager behavior are all tunable. When something goes wrong, the first diagnostic step is usually to re-run the command with <code>GIT_TRACE=1</code> in the environment, which reveals the underlying plumbing calls. For unusual situations, the <code>--help</code> output (<code>git apply --help</code>) opens the full manual page with details on every option, including those rarely used in casual workflows but essential for debugging or scripting at scale.</p><p>Understanding how <code>git apply</code> interacts with the rest of Git's data model — the object database, the index, refs, and the working tree — pays dividends. Each command operates on some subset of these pieces, and knowing which it touches helps predict outcomes and recover from mistakes. Reading the official Git documentation alongside hands-on practice in a throwaway repository is the fastest way to internalize the nuances. Most production issues with Git stem from one of three causes: surprising default behavior, partial network operations, or rewriting history that was already shared. A working mental model of <code>git apply</code>'s side effects helps avoid all three.</p>
        <h2>Common Options</h2>
    <table>
      <thead><tr><th>Option</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>--check</code></td><td>Test if the patch applies without modifying anything.</td></tr>
        <tr><td><code>--index</code></td><td>Apply to working tree and index.</td></tr>
        <tr><td><code>--cached</code></td><td>Apply to index only.</td></tr>
        <tr><td><code>--3way</code></td><td>Three-way merge if context doesn't match.</td></tr>
        <tr><td><code>--reverse</code> / <code>-R</code></td><td>Apply in reverse (uncommit a patch).</td></tr>
        <tr><td><code>--whitespace=&lt;action&gt;</code></td><td>Handle whitespace errors (<code>warn</code>, <code>fix</code>, <code>error</code>).</td></tr>
        <tr><td><code>-p&lt;n&gt;</code></td><td>Strip <code>n</code> path components from filenames.</td></tr>
      </tbody>
    </table>
    <h2>Examples</h2>
    <pre><code>git apply changes.patch
    # Apply a patch file to the working tree

    git apply --check feature.patch
    # Verify a patch will apply cleanly

    git apply --index --3way mr.diff
    # Apply with three-way merge fallback, into index too

    curl -L https://example.com/fix.patch | git apply
    # Pipe a patch directly from a URL</code></pre>
    <h2>Common Mistakes</h2>
    <p>If the patch was generated against a different base, plain <code>git apply</code> fails with "patch does not apply." Adding <code>--3way</code> often saves the day by attempting a merge. For patches that include commit metadata (author, message), use <code>git am</code> instead so the commit is recreated faithfully.</p>
    <h2>Related Commands</h2>
    <p><code>git am</code>, <code>git format-patch</code>, <code>git diff</code>, <code>git cherry-pick</code></p>
- title: git tag — Create, list, and verify tags
  section: Commands Reference
  difficulty: Beginner
  git_version: 2.30+
  weight: 330
  body: |
    <h2>Synopsis</h2>
    <pre><code>git tag [-a] [-s] [-m &lt;msg&gt;] &lt;name&gt; [&lt;commit&gt;]
    git tag -l ['&lt;pattern&gt;']
    git tag -d &lt;name&gt;</code></pre>
    <h2>Description</h2>
    <p>The <code>git tag</code> command marks specific commits with a memorable name, typically used for releases. There are two kinds of tags: lightweight (just a named pointer) and annotated (a full Git object with author, date, message, and optional GPG signature). For releases, always create annotated tags — they carry the metadata that release management requires.</p>
    <p>Tags are NOT pushed by default. Use <code>git push origin v1.2.3</code> to publish a single tag, or <code>git push --tags</code> for all of them. Once published, tags are normally immutable; rewriting a published tag breaks consumers and is strongly discouraged.</p>
    <p>In day-to-day use, <code>git tag</code> integrates closely with shell aliases, editor plugins, and continuous integration. Power users often add aliases that combine flags they always pass, or wrap the command in scripts that enforce team conventions. Output formatting can be customized via Git config — pretty formats, color schemes, and pager behavior are all tunable. When something goes wrong, the first diagnostic step is usually to re-run the command with <code>GIT_TRACE=1</code> in the environment, which reveals the underlying plumbing calls. For unusual situations, the <code>--help</code> output (<code>git tag --help</code>) opens the full manual page with details on every option, including those rarely used in casual workflows but essential for debugging or scripting at scale.</p><p>Understanding how <code>git tag</code> interacts with the rest of Git's data model — the object database, the index, refs, and the working tree — pays dividends. Each command operates on some subset of these pieces, and knowing which it touches helps predict outcomes and recover from mistakes. Reading the official Git documentation alongside hands-on practice in a throwaway repository is the fastest way to internalize the nuances. Most production issues with Git stem from one of three causes: surprising default behavior, partial network operations, or rewriting history that was already shared. A working mental model of <code>git tag</code>'s side effects helps avoid all three.</p>
        <h2>Common Options</h2>
    <table>
      <thead><tr><th>Option</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>-a</code></td><td>Create an annotated tag.</td></tr>
        <tr><td><code>-s</code></td><td>Create a GPG-signed annotated tag.</td></tr>
        <tr><td><code>-m &lt;msg&gt;</code></td><td>Set the tag message.</td></tr>
        <tr><td><code>-l '&lt;pattern&gt;'</code></td><td>List tags matching a glob.</td></tr>
        <tr><td><code>-d &lt;name&gt;</code></td><td>Delete a local tag.</td></tr>
        <tr><td><code>-v &lt;name&gt;</code></td><td>Verify a signed tag.</td></tr>
        <tr><td><code>-f</code></td><td>Replace an existing tag (use with caution).</td></tr>
        <tr><td><code>--sort=&lt;key&gt;</code></td><td>Sort listing (e.g. <code>-v:refname</code>).</td></tr>
      </tbody>
    </table>
    <h2>Examples</h2>
    <pre><code>git tag -a v1.0.0 -m "Release 1.0"
    # Create an annotated tag at HEAD

    git tag -s v1.0.1 -m "Patch release" abc123
    # GPG-signed tag at a specific commit

    git tag -l 'v1.*' --sort=-v:refname
    # List 1.x tags newest first

    git push origin v1.0.0
    # Publish a tag</code></pre>
    <h2>Common Mistakes</h2>
    <p>Creating a lightweight tag for a release loses metadata and signing. Use <code>-a</code> or <code>-s</code>. Forgetting <code>git push --tags</code> means colleagues never see your tag. Moving a tag with <code>-f</code> after publication confuses caches and CI systems.</p>
    <h2>Related Commands</h2>
    <p><code>git describe</code>, <code>git show</code>, <code>git push</code>, <code>git verify-tag</code></p>
- title: git describe (versioning) — Use tags as the source of truth for versions
  section: Commands Reference
  difficulty: Intermediate
  git_version: 2.30+
  weight: 340
  body: |
    <h2>Synopsis</h2>
    <pre><code>git describe --tags --dirty --always [--match 'v[0-9]*']</code></pre>
    <h2>Description</h2>
    <p>This page covers <code>git describe</code> from a versioning angle: how to design a tag scheme that drives reproducible build version strings. The output of <code>git describe</code> is widely used by build systems (Make, CMake, Cargo, npm scripts) to generate a version string that includes a base tag plus distance and SHA.</p>
    <p>The recommended pattern: use annotated semver tags like <code>v1.2.3</code>; build scripts call <code>git describe --tags --dirty --always --match 'v[0-9]*'</code>; the resulting string is embedded into binaries via a generated header or constant. This produces deterministic versions that reflect both the latest release and any unreleased work since.</p>
    <p>In day-to-day use, <code>git describe (versioning)</code> integrates closely with shell aliases, editor plugins, and continuous integration. Power users often add aliases that combine flags they always pass, or wrap the command in scripts that enforce team conventions. Output formatting can be customized via Git config — pretty formats, color schemes, and pager behavior are all tunable. When something goes wrong, the first diagnostic step is usually to re-run the command with <code>GIT_TRACE=1</code> in the environment, which reveals the underlying plumbing calls. For unusual situations, the <code>--help</code> output (<code>git describe (versioning) --help</code>) opens the full manual page with details on every option, including those rarely used in casual workflows but essential for debugging or scripting at scale.</p><p>Understanding how <code>git describe (versioning)</code> interacts with the rest of Git's data model — the object database, the index, refs, and the working tree — pays dividends. Each command operates on some subset of these pieces, and knowing which it touches helps predict outcomes and recover from mistakes. Reading the official Git documentation alongside hands-on practice in a throwaway repository is the fastest way to internalize the nuances. Most production issues with Git stem from one of three causes: surprising default behavior, partial network operations, or rewriting history that was already shared. A working mental model of <code>git describe (versioning)</code>'s side effects helps avoid all three.</p>
        <h2>Common Options</h2>
    <table>
      <thead><tr><th>Option</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>--tags</code></td><td>Use lightweight as well as annotated tags.</td></tr>
        <tr><td><code>--dirty[=&lt;mark&gt;]</code></td><td>Append a marker if the tree is dirty.</td></tr>
        <tr><td><code>--always</code></td><td>Fall back to abbreviated SHA when no tag is reachable.</td></tr>
        <tr><td><code>--long</code></td><td>Force long format even at a tag.</td></tr>
        <tr><td><code>--match &lt;pattern&gt;</code></td><td>Restrict to tags matching a pattern (e.g. exclude <code>nightly-*</code>).</td></tr>
        <tr><td><code>--exclude &lt;pattern&gt;</code></td><td>Exclude matching tags.</td></tr>
        <tr><td><code>--abbrev=&lt;n&gt;</code></td><td>Abbrev SHA length.</td></tr>
      </tbody>
    </table>
    <h2>Examples</h2>
    <pre><code># Generate a version string for a build
    VERSION=$(git describe --tags --dirty --always --match 'v[0-9]*')
    echo "${VERSION#v}" > VERSION

    # In a Makefile:
    VERSION := $(shell git describe --tags --dirty --always)
    CFLAGS += -DVERSION="\"$(VERSION)\""

    # In package.json prepublish script:
    node -e "p=require('./package.json'); p.version=process.env.VERSION; require('fs').writeFileSync('package.json', JSON.stringify(p,null,2))"</code></pre>
    <h2>Common Mistakes</h2>
    <p>Using lightweight tags breaks <code>git describe</code> without <code>--tags</code>. Including release candidate or nightly tags in your match pattern produces noisy versions for stable builds. Shallow CI clones may have no tags at all — fetch them explicitly: <code>git fetch --tags --unshallow</code>.</p>
    <h2>Related Commands</h2>
    <p><code>git tag</code>, <code>git rev-parse</code>, <code>git for-each-ref</code>, <code>git log</code></p>
- title: git cherry-pick — Apply changes from existing commits
  section: Commands Reference
  difficulty: Advanced
  git_version: 2.30+
  weight: 350
  body: |
    <h2>Synopsis</h2>
    <pre><code>git cherry-pick [-n] [-x] [--continue] [--abort] &lt;commit&gt;...</code></pre>
    <h2>Description</h2>
    <p>The <code>git cherry-pick</code> command applies the changes introduced by one or more existing commits onto the current branch as new commits. It's the right tool when you need a single fix from another branch without merging the entire branch. Cherry-picks create new commits with new SHAs but preserve the original author and message.</p>
    <p>Cherry-picking can produce conflicts just like a merge. Use <code>--continue</code> after resolving, or <code>--abort</code> to bail. The <code>-x</code> flag adds a "(cherry picked from commit ...)" line to the message — useful for traceability when porting fixes between maintenance branches.</p>
    <p>In day-to-day use, <code>git cherry-pick</code> integrates closely with shell aliases, editor plugins, and continuous integration. Power users often add aliases that combine flags they always pass, or wrap the command in scripts that enforce team conventions. Output formatting can be customized via Git config — pretty formats, color schemes, and pager behavior are all tunable. When something goes wrong, the first diagnostic step is usually to re-run the command with <code>GIT_TRACE=1</code> in the environment, which reveals the underlying plumbing calls. For unusual situations, the <code>--help</code> output (<code>git cherry-pick --help</code>) opens the full manual page with details on every option, including those rarely used in casual workflows but essential for debugging or scripting at scale.</p><p>Understanding how <code>git cherry-pick</code> interacts with the rest of Git's data model — the object database, the index, refs, and the working tree — pays dividends. Each command operates on some subset of these pieces, and knowing which it touches helps predict outcomes and recover from mistakes. Reading the official Git documentation alongside hands-on practice in a throwaway repository is the fastest way to internalize the nuances. Most production issues with Git stem from one of three causes: surprising default behavior, partial network operations, or rewriting history that was already shared. A working mental model of <code>git cherry-pick</code>'s side effects helps avoid all three.</p>
        <h2>Common Options</h2>
    <table>
      <thead><tr><th>Option</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>-n</code>, <code>--no-commit</code></td><td>Apply changes but don't commit yet.</td></tr>
        <tr><td><code>-x</code></td><td>Annotate the commit message with the source SHA.</td></tr>
        <tr><td><code>-e</code>, <code>--edit</code></td><td>Edit the commit message before committing.</td></tr>
        <tr><td><code>--continue</code></td><td>Resume after resolving conflicts.</td></tr>
        <tr><td><code>--abort</code></td><td>Cancel and restore prior state.</td></tr>
        <tr><td><code>--skip</code></td><td>Skip current commit and continue.</td></tr>
        <tr><td><code>-m &lt;parent&gt;</code></td><td>Specify mainline when picking a merge commit.</td></tr>
        <tr><td><code>-S</code></td><td>GPG-sign the resulting commits.</td></tr>
      </tbody>
    </table>
    <h2>Examples</h2>
    <pre><code>git cherry-pick abc123
    # Apply a single commit onto current branch

    git cherry-pick -x abc123 def456
    # Apply two commits with traceability annotations

    git cherry-pick A..B
    # Pick a range (exclusive of A, inclusive of B)

    git cherry-pick --continue
    # Continue after fixing conflicts</code></pre>
    <h2>Common Mistakes</h2>
    <p>Cherry-picking the same change repeatedly can confuse later merges, since identical-looking commits have different SHAs. Use <code>git rerere</code> to remember resolutions. Picking a merge without <code>-m</code> fails. For long sequences, prefer rebase or merge.</p>
    <h2>Related Commands</h2>
    <p><code>git rebase</code>, <code>git revert</code>, <code>git merge</code>, <code>git rerere</code></p>
- title: git rebase -i — Interactive rebase to rewrite local history
  section: Commands Reference
  difficulty: Advanced
  git_version: 2.30+
  weight: 360
  body: |
    <h2>Synopsis</h2>
    <pre><code>git rebase -i &lt;upstream&gt;
    git rebase -i --root</code></pre>
    <h2>Description</h2>
    <p>Interactive rebase opens an editor with the list of commits to be rebased, each prefixed with an action: <code>pick</code>, <code>reword</code>, <code>edit</code>, <code>squash</code>, <code>fixup</code>, <code>drop</code>, <code>exec</code>, or <code>break</code>. By editing this list, you can reorder, combine, split, or remove commits before they go upstream. It's the workhorse of "clean up history before pushing."</p>
    <p>Combined with <code>--autosquash</code>, fixup commits created via <code>git commit --fixup</code> are automatically arranged next to their targets and marked for squashing. The <code>--rebase-merges</code> flag preserves merge commits during interactive rebase.</p>
    <p>In day-to-day use, <code>git rebase -i</code> integrates closely with shell aliases, editor plugins, and continuous integration. Power users often add aliases that combine flags they always pass, or wrap the command in scripts that enforce team conventions. Output formatting can be customized via Git config — pretty formats, color schemes, and pager behavior are all tunable. When something goes wrong, the first diagnostic step is usually to re-run the command with <code>GIT_TRACE=1</code> in the environment, which reveals the underlying plumbing calls. For unusual situations, the <code>--help</code> output (<code>git rebase -i --help</code>) opens the full manual page with details on every option, including those rarely used in casual workflows but essential for debugging or scripting at scale.</p><p>Understanding how <code>git rebase -i</code> interacts with the rest of Git's data model — the object database, the index, refs, and the working tree — pays dividends. Each command operates on some subset of these pieces, and knowing which it touches helps predict outcomes and recover from mistakes. Reading the official Git documentation alongside hands-on practice in a throwaway repository is the fastest way to internalize the nuances. Most production issues with Git stem from one of three causes: surprising default behavior, partial network operations, or rewriting history that was already shared. A working mental model of <code>git rebase -i</code>'s side effects helps avoid all three.</p>
        <h2>Common Options</h2>
    <table>
      <thead><tr><th>Option</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>-i</code></td><td>Interactive editor for rebase plan.</td></tr>
        <tr><td><code>--autosquash</code></td><td>Auto-arrange fixup/squash commits.</td></tr>
        <tr><td><code>--root</code></td><td>Rebase from the very first commit.</td></tr>
        <tr><td><code>-x &lt;cmd&gt;</code></td><td>Run a command between commits (e.g. tests).</td></tr>
        <tr><td><code>-r</code>, <code>--rebase-merges</code></td><td>Preserve merge commits.</td></tr>
        <tr><td><code>--continue</code></td><td>Resume after resolving.</td></tr>
        <tr><td><code>--abort</code></td><td>Cancel completely.</td></tr>
      </tbody>
    </table>
    <h2>Examples</h2>
    <pre><code>git rebase -i HEAD~5
    # Edit the last 5 commits

    git commit --fixup abc123
    git rebase -i --autosquash abc123^
    # Add a fixup, then auto-squash on rebase

    git rebase -i -x "npm test" main
    # Run tests after each commit during rebase

    git rebase -i --root
    # Rewrite history from the first commit</code></pre>
    <h2>Common Mistakes</h2>
    <p>Saving an empty rebase todo list aborts the operation — leave at least one <code>pick</code> line. Marking too many commits as <code>edit</code> creates a tedious sequence of stops; prefer <code>squash</code> or <code>fixup</code> when you just want to combine. Never interactive-rebase commits that are already pushed and shared.</p>
    <h2>Related Commands</h2>
    <p><code>git rebase</code>, <code>git commit --fixup</code>, <code>git cherry-pick</code>, <code>git reflog</code></p>
- title: git filter-repo — Rewrite repository history at scale
  section: Commands Reference
  difficulty: Advanced
  git_version: 2.30+
  weight: 370
  body: |
    <h2>Synopsis</h2>
    <pre><code>git filter-repo --path &lt;path&gt; [--invert-paths]
    git filter-repo --replace-text &lt;file&gt;
    git filter-repo --strip-blobs-bigger-than 10M</code></pre>
    <h2>Description</h2>
    <p>The <code>git filter-repo</code> tool is the modern, recommended way to rewrite Git history. It replaces the deprecated <code>git filter-branch</code>, which is slow and error-prone. <code>filter-repo</code> can purge large files, remove sensitive data (credentials accidentally committed), restructure paths, rewrite authors via a mailmap, or extract subdirectories into their own repository.</p>
    <p>It is distributed separately from core Git (typically via <code>pip install git-filter-repo</code> or your package manager). Operations are destructive — always work on a fresh clone and coordinate with collaborators because every SHA changes.</p>
    <p>In day-to-day use, <code>git filter-repo</code> integrates closely with shell aliases, editor plugins, and continuous integration. Power users often add aliases that combine flags they always pass, or wrap the command in scripts that enforce team conventions. Output formatting can be customized via Git config — pretty formats, color schemes, and pager behavior are all tunable. When something goes wrong, the first diagnostic step is usually to re-run the command with <code>GIT_TRACE=1</code> in the environment, which reveals the underlying plumbing calls. For unusual situations, the <code>--help</code> output (<code>git filter-repo --help</code>) opens the full manual page with details on every option, including those rarely used in casual workflows but essential for debugging or scripting at scale.</p><p>Understanding how <code>git filter-repo</code> interacts with the rest of Git's data model — the object database, the index, refs, and the working tree — pays dividends. Each command operates on some subset of these pieces, and knowing which it touches helps predict outcomes and recover from mistakes. Reading the official Git documentation alongside hands-on practice in a throwaway repository is the fastest way to internalize the nuances. Most production issues with Git stem from one of three causes: surprising default behavior, partial network operations, or rewriting history that was already shared. A working mental model of <code>git filter-repo</code>'s side effects helps avoid all three.</p>
        <h2>Common Options</h2>
    <table>
      <thead><tr><th>Option</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>--path &lt;p&gt;</code></td><td>Keep only the specified path.</td></tr>
        <tr><td><code>--invert-paths</code></td><td>Inverse: remove the specified paths.</td></tr>
        <tr><td><code>--path-glob &lt;g&gt;</code></td><td>Use a glob pattern.</td></tr>
        <tr><td><code>--replace-text &lt;file&gt;</code></td><td>Replace strings throughout history.</td></tr>
        <tr><td><code>--strip-blobs-bigger-than &lt;size&gt;</code></td><td>Drop large blobs.</td></tr>
        <tr><td><code>--mailmap &lt;file&gt;</code></td><td>Rewrite author/committer info.</td></tr>
        <tr><td><code>--analyze</code></td><td>Produce a report on repo size before rewriting.</td></tr>
        <tr><td><code>--force</code></td><td>Override the fresh-clone safety check.</td></tr>
      </tbody>
    </table>
    <h2>Examples</h2>
    <pre><code>git filter-repo --analyze
    # Inspect what's eating space

    git filter-repo --path docs/ --invert-paths
    # Remove docs/ from all history

    git filter-repo --strip-blobs-bigger-than 50M
    # Purge any file over 50 MB

    echo 'API_KEY==&gt;REDACTED' &gt; replacements.txt
    git filter-repo --replace-text replacements.txt
    # Scrub a leaked secret</code></pre>
    <h2>Common Mistakes</h2>
    <p>Running <code>filter-repo</code> in your live repo without a backup risks losing data. Always clone fresh. After rewriting, force-push and have collaborators re-clone — anyone with old SHAs will get conflicts. The tool removes <code>origin</code> by default to prevent accidental pushes; re-add it deliberately.</p>
    <h2>Related Commands</h2>
    <p><code>git filter-branch</code> (deprecated), <code>git gc</code>, <code>git reflog</code>, <code>git push --force-with-lease</code></p>
- title: git worktree — Manage multiple working trees
  section: Commands Reference
  difficulty: Advanced
  git_version: 2.30+
  weight: 380
  body: |
    <h2>Synopsis</h2>
    <pre><code>git worktree add &lt;path&gt; [&lt;branch&gt;]
    git worktree list
    git worktree remove &lt;path&gt;
    git worktree prune</code></pre>
    <h2>Description</h2>
    <p>The <code>git worktree</code> command lets a single repository have multiple working trees checked out simultaneously, each at a different branch. This is faster and cheaper than cloning multiple times: only one object database, but parallel checkouts. Worktrees are perfect for running tests on a release branch while continuing development on main, or for picking up an emergency fix without disturbing in-progress work.</p>
    <p>Each worktree has its own HEAD, index, and working files, but shares the underlying objects and config. Locked worktrees prevent automatic pruning of mounted-elsewhere checkouts.</p>
    <p>In day-to-day use, <code>git worktree</code> integrates closely with shell aliases, editor plugins, and continuous integration. Power users often add aliases that combine flags they always pass, or wrap the command in scripts that enforce team conventions. Output formatting can be customized via Git config — pretty formats, color schemes, and pager behavior are all tunable. When something goes wrong, the first diagnostic step is usually to re-run the command with <code>GIT_TRACE=1</code> in the environment, which reveals the underlying plumbing calls. For unusual situations, the <code>--help</code> output (<code>git worktree --help</code>) opens the full manual page with details on every option, including those rarely used in casual workflows but essential for debugging or scripting at scale.</p><p>Understanding how <code>git worktree</code> interacts with the rest of Git's data model — the object database, the index, refs, and the working tree — pays dividends. Each command operates on some subset of these pieces, and knowing which it touches helps predict outcomes and recover from mistakes. Reading the official Git documentation alongside hands-on practice in a throwaway repository is the fastest way to internalize the nuances. Most production issues with Git stem from one of three causes: surprising default behavior, partial network operations, or rewriting history that was already shared. A working mental model of <code>git worktree</code>'s side effects helps avoid all three.</p>
        <h2>Common Options</h2>
    <table>
      <thead><tr><th>Subcommand</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>add &lt;path&gt; [&lt;branch&gt;]</code></td><td>Create a new worktree.</td></tr>
        <tr><td><code>add -b &lt;new&gt; &lt;path&gt; [&lt;start&gt;]</code></td><td>Create new branch + worktree in one step.</td></tr>
        <tr><td><code>list</code></td><td>Show all worktrees.</td></tr>
        <tr><td><code>remove &lt;path&gt;</code></td><td>Delete a worktree's directory and metadata.</td></tr>
        <tr><td><code>prune</code></td><td>Remove metadata for worktrees whose path is gone.</td></tr>
        <tr><td><code>lock</code> / <code>unlock</code></td><td>Prevent or allow pruning.</td></tr>
        <tr><td><code>move &lt;old&gt; &lt;new&gt;</code></td><td>Relocate a worktree.</td></tr>
      </tbody>
    </table>
    <h2>Examples</h2>
    <pre><code>git worktree add ../project-hotfix release/1.4
    # Check out release/1.4 in a sibling directory

    git worktree add -b experiment ../project-experiment
    # Create a new branch and worktree

    git worktree list
    # Display all worktrees

    git worktree remove ../project-hotfix
    # Tear down when finished</code></pre>
    <h2>Common Mistakes</h2>
    <p>You cannot have the same branch checked out in two worktrees simultaneously — Git refuses. Use <code>--detach</code> if you only need the contents. Forgetting to <code>worktree remove</code> leaves stale metadata; <code>git worktree prune</code> cleans up.</p>
    <h2>Related Commands</h2>
    <p><code>git switch</code>, <code>git branch</code>, <code>git clone</code>, <code>git submodule</code></p>
- title: git submodule — Manage nested Git repositories
  section: Commands Reference
  difficulty: Advanced
  git_version: 2.30+
  weight: 390
  body: |
    <h2>Synopsis</h2>
    <pre><code>git submodule add &lt;url&gt; &lt;path&gt;
    git submodule update --init --recursive
    git submodule foreach &lt;cmd&gt;</code></pre>
    <h2>Description</h2>
    <p>The <code>git submodule</code> command embeds an external Git repository inside another at a fixed commit. The parent repo records the submodule URL and the exact SHA to check out, decoupling parent and child histories. This is useful for vendoring shared libraries or composing multi-repo systems.</p>
    <p>Submodules are powerful but have a reputation for confusion. After cloning a project with submodules, you must run <code>git submodule update --init --recursive</code> to populate them. Updating to a newer submodule commit is a two-step dance: pull inside the submodule, then commit the new SHA in the parent.</p>
    <p>In day-to-day use, <code>git submodule</code> integrates closely with shell aliases, editor plugins, and continuous integration. Power users often add aliases that combine flags they always pass, or wrap the command in scripts that enforce team conventions. Output formatting can be customized via Git config — pretty formats, color schemes, and pager behavior are all tunable. When something goes wrong, the first diagnostic step is usually to re-run the command with <code>GIT_TRACE=1</code> in the environment, which reveals the underlying plumbing calls. For unusual situations, the <code>--help</code> output (<code>git submodule --help</code>) opens the full manual page with details on every option, including those rarely used in casual workflows but essential for debugging or scripting at scale.</p><p>Understanding how <code>git submodule</code> interacts with the rest of Git's data model — the object database, the index, refs, and the working tree — pays dividends. Each command operates on some subset of these pieces, and knowing which it touches helps predict outcomes and recover from mistakes. Reading the official Git documentation alongside hands-on practice in a throwaway repository is the fastest way to internalize the nuances. Most production issues with Git stem from one of three causes: surprising default behavior, partial network operations, or rewriting history that was already shared. A working mental model of <code>git submodule</code>'s side effects helps avoid all three.</p>
        <h2>Common Options</h2>
    <table>
      <thead><tr><th>Subcommand</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>add &lt;url&gt; &lt;path&gt;</code></td><td>Add a new submodule.</td></tr>
        <tr><td><code>init</code></td><td>Register submodule URLs in <code>.git/config</code>.</td></tr>
        <tr><td><code>update --init</code></td><td>Init and check out submodules.</td></tr>
        <tr><td><code>update --recursive</code></td><td>Recurse into nested submodules.</td></tr>
        <tr><td><code>update --remote</code></td><td>Update to the upstream branch tip.</td></tr>
        <tr><td><code>foreach &lt;cmd&gt;</code></td><td>Run a command in every submodule.</td></tr>
        <tr><td><code>deinit &lt;path&gt;</code></td><td>Remove a submodule from the working tree.</td></tr>
      </tbody>
    </table>
    <h2>Examples</h2>
    <pre><code>git submodule add https://github.com/lib/foo.git vendor/foo
    # Add a new submodule at vendor/foo

    git clone --recurse-submodules https://github.com/me/parent.git
    # Clone with submodules in one step

    git submodule update --init --recursive
    # Initialize and populate all submodules

    git submodule foreach 'git pull origin main'
    # Update each submodule to its main branch tip</code></pre>
    <h2>Common Mistakes</h2>
    <p>Forgetting <code>--recurse-submodules</code> on clone leaves empty submodule directories. Pushing the parent repo without first pushing submodule changes leaves a dangling reference for collaborators. Many teams move to <code>git subtree</code> or monorepos to escape submodule complexity.</p>
    <h2>Related Commands</h2>
    <p><code>git subtree</code>, <code>git clone --recurse-submodules</code>, <code>git config submodule</code></p>
- title: git subtree — Merge and split a project as a subdirectory
  section: Commands Reference
  difficulty: Advanced
  git_version: 2.30+
  weight: 400
  body: |
    <h2>Synopsis</h2>
    <pre><code>git subtree add --prefix=&lt;path&gt; &lt;repo&gt; &lt;ref&gt; [--squash]
    git subtree pull --prefix=&lt;path&gt; &lt;repo&gt; &lt;ref&gt;
    git subtree push --prefix=&lt;path&gt; &lt;repo&gt; &lt;ref&gt;
    git subtree split --prefix=&lt;path&gt; -b &lt;new-branch&gt;</code></pre>
    <h2>Description</h2>
    <p>The <code>git subtree</code> command is an alternative to submodules that merges another project's content directly into a subdirectory of your repo. Unlike submodules, subtree consumers don't need any special steps — the files are simply there. The cost is that the foreign history is incorporated into your own.</p>
    <p>The two main operations are <code>add</code> (initial import, often with <code>--squash</code> to flatten history) and <code>pull</code> (bring in upstream changes). To send back changes, <code>git subtree push</code> filters out commits that touch the prefix and pushes them to the upstream repo.</p>
    <p>In day-to-day use, <code>git subtree</code> integrates closely with shell aliases, editor plugins, and continuous integration. Power users often add aliases that combine flags they always pass, or wrap the command in scripts that enforce team conventions. Output formatting can be customized via Git config — pretty formats, color schemes, and pager behavior are all tunable. When something goes wrong, the first diagnostic step is usually to re-run the command with <code>GIT_TRACE=1</code> in the environment, which reveals the underlying plumbing calls. For unusual situations, the <code>--help</code> output (<code>git subtree --help</code>) opens the full manual page with details on every option, including those rarely used in casual workflows but essential for debugging or scripting at scale.</p><p>Understanding how <code>git subtree</code> interacts with the rest of Git's data model — the object database, the index, refs, and the working tree — pays dividends. Each command operates on some subset of these pieces, and knowing which it touches helps predict outcomes and recover from mistakes. Reading the official Git documentation alongside hands-on practice in a throwaway repository is the fastest way to internalize the nuances. Most production issues with Git stem from one of three causes: surprising default behavior, partial network operations, or rewriting history that was already shared. A working mental model of <code>git subtree</code>'s side effects helps avoid all three.</p>
        <h2>Common Options</h2>
    <table>
      <thead><tr><th>Subcommand</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>add</code></td><td>Import an external repo into a subdirectory.</td></tr>
        <tr><td><code>pull</code></td><td>Merge upstream changes for that prefix.</td></tr>
        <tr><td><code>push</code></td><td>Push prefix-only history back upstream.</td></tr>
        <tr><td><code>merge</code></td><td>Merge an arbitrary tree into the prefix.</td></tr>
        <tr><td><code>split</code></td><td>Extract a subdirectory's history as a standalone branch.</td></tr>
        <tr><td><code>--squash</code></td><td>Flatten foreign history into a single commit.</td></tr>
        <tr><td><code>--prefix=&lt;path&gt;</code></td><td>Subdirectory under which to place the subtree.</td></tr>
      </tbody>
    </table>
    <h2>Examples</h2>
    <pre><code>git subtree add --prefix=vendor/foo https://github.com/lib/foo.git main --squash
    # Import foo into vendor/foo, squashing history

    git subtree pull --prefix=vendor/foo https://github.com/lib/foo.git main --squash
    # Pull updates

    git subtree split --prefix=lib -b lib-only
    # Extract lib/ as its own branch for sharing

    git subtree push --prefix=vendor/foo upstream main
    # Send prefix-scoped commits back to upstream</code></pre>
    <h2>Common Mistakes</h2>
    <p>Mixing <code>--squash</code> on some operations and not others creates messy history. Pick one mode and stick with it. Subtree merges produce nontrivial commit graphs that confuse some tooling. <code>git subtree split</code> can be slow on large histories.</p>
    <h2>Related Commands</h2>
    <p><code>git submodule</code>, <code>git merge</code>, <code>git filter-repo</code></p>
- title: git notes — Add or inspect commit notes
  section: Commands Reference
  difficulty: Advanced
  git_version: 2.30+
  weight: 410
  body: |
    <h2>Synopsis</h2>
    <pre><code>git notes add [-m &lt;msg&gt;] [&lt;commit&gt;]
    git notes show [&lt;commit&gt;]
    git notes append [-m &lt;msg&gt;] [&lt;commit&gt;]
    git notes remove [&lt;commit&gt;]</code></pre>
    <h2>Description</h2>
    <p>The <code>git notes</code> command attaches additional metadata to commits without rewriting them. Notes are stored in their own ref namespace (<code>refs/notes/commits</code> by default) and are displayed alongside commits in <code>git log</code>. Use cases include code review comments, build status, ticket links, or sign-offs added after the fact.</p>
    <p>Notes are not pushed by default — you must explicitly <code>git push origin refs/notes/*</code>. Different teams use different namespaces; CI systems often write to <code>refs/notes/ci</code> while reviewers use <code>refs/notes/review</code>.</p>
    <p>In day-to-day use, <code>git notes</code> integrates closely with shell aliases, editor plugins, and continuous integration. Power users often add aliases that combine flags they always pass, or wrap the command in scripts that enforce team conventions. Output formatting can be customized via Git config — pretty formats, color schemes, and pager behavior are all tunable. When something goes wrong, the first diagnostic step is usually to re-run the command with <code>GIT_TRACE=1</code> in the environment, which reveals the underlying plumbing calls. For unusual situations, the <code>--help</code> output (<code>git notes --help</code>) opens the full manual page with details on every option, including those rarely used in casual workflows but essential for debugging or scripting at scale.</p><p>Understanding how <code>git notes</code> interacts with the rest of Git's data model — the object database, the index, refs, and the working tree — pays dividends. Each command operates on some subset of these pieces, and knowing which it touches helps predict outcomes and recover from mistakes. Reading the official Git documentation alongside hands-on practice in a throwaway repository is the fastest way to internalize the nuances. Most production issues with Git stem from one of three causes: surprising default behavior, partial network operations, or rewriting history that was already shared. A working mental model of <code>git notes</code>'s side effects helps avoid all three.</p>
        <h2>Common Options</h2>
    <table>
      <thead><tr><th>Subcommand</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>add</code></td><td>Attach a new note to a commit.</td></tr>
        <tr><td><code>append</code></td><td>Add to an existing note.</td></tr>
        <tr><td><code>edit</code></td><td>Open an editor on the note.</td></tr>
        <tr><td><code>show</code></td><td>Print the note.</td></tr>
        <tr><td><code>remove</code></td><td>Delete the note.</td></tr>
        <tr><td><code>list</code></td><td>List commits that have notes.</td></tr>
        <tr><td><code>--ref &lt;ref&gt;</code></td><td>Use a different notes namespace.</td></tr>
      </tbody>
    </table>
    <h2>Examples</h2>
    <pre><code>git notes add -m "Reviewed by Alice" abc123
    # Attach a review note

    git log --show-notes
    # Show notes inline with log

    git notes --ref=ci add -m "Build #42 passed" HEAD
    # Use a custom namespace

    git push origin 'refs/notes/*'
    # Publish notes to the remote</code></pre>
    <h2>Common Mistakes</h2>
    <p>Forgetting to push and fetch the notes ref makes notes invisible to collaborators. Configure <code>notes.displayRef = refs/notes/*</code> so all namespaces show in <code>git log</code>. Notes don't survive history rewrites unless explicitly migrated.</p>
    <h2>Related Commands</h2>
    <p><code>git log</code>, <code>git commit</code>, <code>git push</code>, <code>git fetch</code></p>
- title: git archive — Create an archive of files from a named tree
  section: Commands Reference
  difficulty: Advanced
  git_version: 2.30+
  weight: 420
  body: |
    <h2>Synopsis</h2>
    <pre><code>git archive [--format=&lt;fmt&gt;] [--prefix=&lt;p&gt;/] [-o &lt;file&gt;] &lt;tree-ish&gt; [&lt;path&gt;...]</code></pre>
    <h2>Description</h2>
    <p>The <code>git archive</code> command creates a tar or zip file containing the contents of any tree (commit, tag, or branch). Unlike a simple <code>tar</code> of the working tree, it includes only tracked files at a specific revision and excludes <code>.git</code> directories. This makes it ideal for producing release tarballs, source distributions, and reproducible snapshots.</p>
    <p>The <code>--prefix</code> option wraps all files under a subdirectory inside the archive — important for releases so that extraction creates a named folder. <code>git archive</code> also supports running over the network from servers that allow it.</p>
    <p>In day-to-day use, <code>git archive</code> integrates closely with shell aliases, editor plugins, and continuous integration. Power users often add aliases that combine flags they always pass, or wrap the command in scripts that enforce team conventions. Output formatting can be customized via Git config — pretty formats, color schemes, and pager behavior are all tunable. When something goes wrong, the first diagnostic step is usually to re-run the command with <code>GIT_TRACE=1</code> in the environment, which reveals the underlying plumbing calls. For unusual situations, the <code>--help</code> output (<code>git archive --help</code>) opens the full manual page with details on every option, including those rarely used in casual workflows but essential for debugging or scripting at scale.</p><p>Understanding how <code>git archive</code> interacts with the rest of Git's data model — the object database, the index, refs, and the working tree — pays dividends. Each command operates on some subset of these pieces, and knowing which it touches helps predict outcomes and recover from mistakes. Reading the official Git documentation alongside hands-on practice in a throwaway repository is the fastest way to internalize the nuances. Most production issues with Git stem from one of three causes: surprising default behavior, partial network operations, or rewriting history that was already shared. A working mental model of <code>git archive</code>'s side effects helps avoid all three.</p>
        <h2>Common Options</h2>
    <table>
      <thead><tr><th>Option</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>--format=&lt;fmt&gt;</code></td><td>tar, tar.gz, zip (default tar).</td></tr>
        <tr><td><code>--prefix=&lt;p&gt;/</code></td><td>Prepend a directory to all archive paths.</td></tr>
        <tr><td><code>-o &lt;file&gt;</code></td><td>Write to file instead of stdout.</td></tr>
        <tr><td><code>--remote=&lt;repo&gt;</code></td><td>Archive from a remote repository.</td></tr>
        <tr><td><code>--worktree-attributes</code></td><td>Honor <code>export-ignore</code> attributes.</td></tr>
        <tr><td><code>-l</code>, <code>--list</code></td><td>List supported formats.</td></tr>
      </tbody>
    </table>
    <h2>Examples</h2>
    <pre><code>git archive --format=tar.gz --prefix=myproj-1.0/ -o myproj-1.0.tar.gz v1.0
    # Release tarball with named top-level directory

    git archive HEAD docs/ | tar -x -C /tmp/docs
    # Extract the docs/ directory at HEAD into /tmp/docs

    git archive --format=zip -o snapshot.zip HEAD
    # ZIP archive of current tree</code></pre>
    <h2>Examples (continued)</h2>
    <pre><code># Use .gitattributes to exclude files from archives:
    echo "tests/ export-ignore" &gt;&gt; .gitattributes
    echo ".github/ export-ignore" &gt;&gt; .gitattributes
    git archive --worktree-attributes -o release.tar.gz HEAD</code></pre>
    <h2>Common Mistakes</h2>
    <p>Forgetting <code>--prefix</code> creates an archive that explodes files into the current directory on extraction. Without <code>export-ignore</code> attributes, your archive may include CI configs, tests, and dev-only files that you didn't intend to ship.</p>
    <h2>Related Commands</h2>
    <p><code>git bundle</code>, <code>git tag</code>, <code>git show</code>, <code>tar</code></p>
- title: git bundle — Move objects and refs by archive
  section: Commands Reference
  difficulty: Advanced
  git_version: 2.30+
  weight: 430
  body: |
    <h2>Synopsis</h2>
    <pre><code>git bundle create &lt;file&gt; &lt;git-rev-list-args&gt;
    git bundle verify &lt;file&gt;
    git bundle list-heads &lt;file&gt;
    git clone &lt;file&gt; &lt;dir&gt;</code></pre>
    <h2>Description</h2>
    <p>The <code>git bundle</code> command packages Git history into a single file that can be transferred without a network — by USB drive, email, or any file transport. The recipient can clone or fetch from the bundle as if it were a remote. This is invaluable for air-gapped systems, slow connections, or as a backup format.</p>
    <p>Bundles support incremental updates: include a base ref so the bundle only contains commits since that ref, then have the recipient apply it on top of an existing repo with <code>git fetch</code>.</p>
    <p>In day-to-day use, <code>git bundle</code> integrates closely with shell aliases, editor plugins, and continuous integration. Power users often add aliases that combine flags they always pass, or wrap the command in scripts that enforce team conventions. Output formatting can be customized via Git config — pretty formats, color schemes, and pager behavior are all tunable. When something goes wrong, the first diagnostic step is usually to re-run the command with <code>GIT_TRACE=1</code> in the environment, which reveals the underlying plumbing calls. For unusual situations, the <code>--help</code> output (<code>git bundle --help</code>) opens the full manual page with details on every option, including those rarely used in casual workflows but essential for debugging or scripting at scale.</p><p>Understanding how <code>git bundle</code> interacts with the rest of Git's data model — the object database, the index, refs, and the working tree — pays dividends. Each command operates on some subset of these pieces, and knowing which it touches helps predict outcomes and recover from mistakes. Reading the official Git documentation alongside hands-on practice in a throwaway repository is the fastest way to internalize the nuances. Most production issues with Git stem from one of three causes: surprising default behavior, partial network operations, or rewriting history that was already shared. A working mental model of <code>git bundle</code>'s side effects helps avoid all three.</p>
        <h2>Common Options</h2>
    <table>
      <thead><tr><th>Subcommand</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>create &lt;file&gt; &lt;refs&gt;</code></td><td>Create a bundle file.</td></tr>
        <tr><td><code>verify &lt;file&gt;</code></td><td>Check that a bundle is valid and applicable.</td></tr>
        <tr><td><code>list-heads &lt;file&gt;</code></td><td>List the refs the bundle contains.</td></tr>
        <tr><td><code>unbundle &lt;file&gt;</code></td><td>Plumbing: emit objects to the repository.</td></tr>
        <tr><td><code>--all</code></td><td>Include all refs.</td></tr>
        <tr><td><code>--progress</code></td><td>Show progress on creation.</td></tr>
      </tbody>
    </table>
    <h2>Examples</h2>
    <pre><code>git bundle create repo.bundle --all
    # Full backup of every ref

    git bundle create incremental.bundle main ^v2.0
    # Just commits on main since v2.0

    git bundle verify repo.bundle
    # Check applicability before fetching

    # On the receiving side:
    git clone repo.bundle myproj
    # or, into an existing repo:
    git fetch ../incremental.bundle main:main</code></pre>
    <h2>Common Mistakes</h2>
    <p>Creating a bundle without specifying a base means the recipient gets the full history every time, even for small updates. Use ranges like <code>--since</code> or <code>^&lt;ref&gt;</code> for incremental bundles. <code>git bundle verify</code> against an empty repo only checks structural validity, not whether the bundle's prerequisites are present.</p>
    <h2>Related Commands</h2>
    <p><code>git archive</code>, <code>git fetch</code>, <code>git clone</code>, <code>git pack-objects</code></p>
- title: git reflog — Manage reference logs
  section: Commands Reference
  difficulty: Advanced
  git_version: 2.30+
  weight: 440
  body: |
    <h2>Synopsis</h2>
    <pre><code>git reflog [show] [&lt;ref&gt;]
    git reflog expire [--expire=&lt;time&gt;] [--all]
    git reflog delete &lt;entry&gt;</code></pre>
    <h2>Description</h2>
    <p>The <code>git reflog</code> command shows the history of where each ref (HEAD, branches) has pointed locally. Every move — commit, checkout, reset, rebase — is logged with a timestamp and reason. The reflog is your safety net: even after a "destructive" operation like <code>git reset --hard</code>, the previous state is recoverable for as long as the reflog entry survives (typically 90 days).</p>
    <p>Refs in the reflog are addressable as <code>HEAD@{2}</code> ("HEAD's value 2 moves ago") or <code>HEAD@{2.hours.ago}</code>. To recover a "lost" branch, find its old SHA in the reflog and create a new branch from it.</p>
    <p>In day-to-day use, <code>git reflog</code> integrates closely with shell aliases, editor plugins, and continuous integration. Power users often add aliases that combine flags they always pass, or wrap the command in scripts that enforce team conventions. Output formatting can be customized via Git config — pretty formats, color schemes, and pager behavior are all tunable. When something goes wrong, the first diagnostic step is usually to re-run the command with <code>GIT_TRACE=1</code> in the environment, which reveals the underlying plumbing calls. For unusual situations, the <code>--help</code> output (<code>git reflog --help</code>) opens the full manual page with details on every option, including those rarely used in casual workflows but essential for debugging or scripting at scale.</p><p>Understanding how <code>git reflog</code> interacts with the rest of Git's data model — the object database, the index, refs, and the working tree — pays dividends. Each command operates on some subset of these pieces, and knowing which it touches helps predict outcomes and recover from mistakes. Reading the official Git documentation alongside hands-on practice in a throwaway repository is the fastest way to internalize the nuances. Most production issues with Git stem from one of three causes: surprising default behavior, partial network operations, or rewriting history that was already shared. A working mental model of <code>git reflog</code>'s side effects helps avoid all three.</p>
        <h2>Common Options</h2>
    <table>
      <thead><tr><th>Option / Subcommand</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>show &lt;ref&gt;</code></td><td>Display reflog for a ref (default HEAD).</td></tr>
        <tr><td><code>expire</code></td><td>Prune old entries.</td></tr>
        <tr><td><code>--expire=&lt;time&gt;</code></td><td>Expire entries older than this.</td></tr>
        <tr><td><code>--expire-unreachable=&lt;time&gt;</code></td><td>For commits unreachable from any ref.</td></tr>
        <tr><td><code>--all</code></td><td>Operate on every ref.</td></tr>
        <tr><td><code>delete &lt;entry&gt;</code></td><td>Remove a single entry.</td></tr>
      </tbody>
    </table>
    <h2>Examples</h2>
    <pre><code>git reflog
    # Recent moves of HEAD

    git reflog show feature/api
    # Just the feature branch's history

    git reset --hard HEAD@{1}
    # Recover from a wrong reset by going back one move

    git reflog expire --expire=30.days --all
    # Trim reflog to last 30 days for every ref</code></pre>
    <h2>Common Mistakes</h2>
    <p>Reflogs are LOCAL only — fetching from a remote does not include their reflog. Reflog entries expire eventually; don't rely on them for long-term recovery. Running <code>git gc --prune=now</code> after expiring the reflog can permanently remove unreachable commits.</p>
    <h2>Related Commands</h2>
    <p><code>git reset</code>, <code>git rebase</code>, <code>git fsck</code>, <code>git gc</code></p>
- title: git rerere — Reuse recorded conflict resolutions
  section: Commands Reference
  difficulty: Advanced
  git_version: 2.30+
  weight: 450
  body: |
    <h2>Synopsis</h2>
    <pre><code>git config --global rerere.enabled true
    git rerere status
    git rerere diff
    git rerere clear</code></pre>
    <h2>Description</h2>
    <p>The <code>git rerere</code> command (Reuse Recorded Resolution) records how you resolve a conflict the first time and replays the same resolution automatically the next time the same conflict appears. It is invaluable when long-lived feature branches are repeatedly merged or rebased onto a moving base — without rerere, you re-resolve the same conflicts every time.</p>
    <p>Rerere is opt-in. Enable it globally with <code>git config --global rerere.enabled true</code>. Once enabled, every conflict resolution gets cached, and Git automatically applies the cached resolution on future encounters of the same conflict pre-image.</p>
    <p>In day-to-day use, <code>git rerere</code> integrates closely with shell aliases, editor plugins, and continuous integration. Power users often add aliases that combine flags they always pass, or wrap the command in scripts that enforce team conventions. Output formatting can be customized via Git config — pretty formats, color schemes, and pager behavior are all tunable. When something goes wrong, the first diagnostic step is usually to re-run the command with <code>GIT_TRACE=1</code> in the environment, which reveals the underlying plumbing calls. For unusual situations, the <code>--help</code> output (<code>git rerere --help</code>) opens the full manual page with details on every option, including those rarely used in casual workflows but essential for debugging or scripting at scale.</p><p>Understanding how <code>git rerere</code> interacts with the rest of Git's data model — the object database, the index, refs, and the working tree — pays dividends. Each command operates on some subset of these pieces, and knowing which it touches helps predict outcomes and recover from mistakes. Reading the official Git documentation alongside hands-on practice in a throwaway repository is the fastest way to internalize the nuances. Most production issues with Git stem from one of three causes: surprising default behavior, partial network operations, or rewriting history that was already shared. A working mental model of <code>git rerere</code>'s side effects helps avoid all three.</p>
        <h2>Common Options</h2>
    <table>
      <thead><tr><th>Subcommand / Config</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>rerere.enabled</code></td><td>Turn on automatic recording.</td></tr>
        <tr><td><code>rerere.autoUpdate</code></td><td>Automatically stage resolved files.</td></tr>
        <tr><td><code>status</code></td><td>Show files with recorded resolutions.</td></tr>
        <tr><td><code>diff</code></td><td>Display the recorded resolution.</td></tr>
        <tr><td><code>remaining</code></td><td>Show conflicts not yet resolved.</td></tr>
        <tr><td><code>clear</code></td><td>Drop all recorded resolutions.</td></tr>
        <tr><td><code>forget &lt;path&gt;</code></td><td>Forget the resolution for a single path.</td></tr>
      </tbody>
    </table>
    <h2>Examples</h2>
    <pre><code>git config --global rerere.enabled true
    git config --global rerere.autoUpdate true
    # Enable for all repos

    # After resolving a conflict during merge or rebase, rerere remembers.
    # Next time the same conflict appears, the resolution is auto-applied.

    git rerere status
    # Show files where a recorded resolution kicked in

    git rerere clear
    # Wipe the recorded set if it gets stale</code></pre>
    <h2>Common Mistakes</h2>
    <p>Rerere only helps with identical conflicts. Slight context changes prevent reuse. If a recorded resolution turns out to be wrong, use <code>git rerere forget &lt;path&gt;</code> to clear it before re-resolving. Rerere data lives in <code>.git/rr-cache/</code> and is local — it isn't shared with collaborators.</p>
    <h2>Related Commands</h2>
    <p><code>git merge</code>, <code>git rebase</code>, <code>git mergetool</code>, <code>git config</code></p>
- title: git range-diff — Compare two commit ranges
  section: Commands Reference
  difficulty: Advanced
  git_version: 2.30+
  weight: 460
  body: |
    <h2>Synopsis</h2>
    <pre><code>git range-diff &lt;range1&gt; &lt;range2&gt;
    git range-diff &lt;base&gt; &lt;rev1&gt; &lt;rev2&gt;</code></pre>
    <h2>Description</h2>
    <p>The <code>git range-diff</code> command compares two sequences of commits (typically a branch before and after a rebase) and shows what changed between them at the patch level. This is far more useful than a regular <code>git diff</code> for reviewing rebases, because it pairs up corresponding commits and highlights only the substantive differences.</p>
    <p>Pair this with <code>--reroll-count</code> on <code>format-patch</code> for upstream patch series, or just use it locally to verify that a force-push only introduced cleanup. Output uses a custom format with <code>=</code> for unchanged commits, <code>!</code> for changed, <code>&lt;</code> and <code>&gt;</code> for missing or added.</p>
    <p>In day-to-day use, <code>git range-diff</code> integrates closely with shell aliases, editor plugins, and continuous integration. Power users often add aliases that combine flags they always pass, or wrap the command in scripts that enforce team conventions. Output formatting can be customized via Git config — pretty formats, color schemes, and pager behavior are all tunable. When something goes wrong, the first diagnostic step is usually to re-run the command with <code>GIT_TRACE=1</code> in the environment, which reveals the underlying plumbing calls. For unusual situations, the <code>--help</code> output (<code>git range-diff --help</code>) opens the full manual page with details on every option, including those rarely used in casual workflows but essential for debugging or scripting at scale.</p><p>Understanding how <code>git range-diff</code> interacts with the rest of Git's data model — the object database, the index, refs, and the working tree — pays dividends. Each command operates on some subset of these pieces, and knowing which it touches helps predict outcomes and recover from mistakes. Reading the official Git documentation alongside hands-on practice in a throwaway repository is the fastest way to internalize the nuances. Most production issues with Git stem from one of three causes: surprising default behavior, partial network operations, or rewriting history that was already shared. A working mental model of <code>git range-diff</code>'s side effects helps avoid all three.</p>
        <h2>Common Options</h2>
    <table>
      <thead><tr><th>Option</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>--no-color</code></td><td>Disable color output.</td></tr>
        <tr><td><code>--creation-factor=&lt;n&gt;</code></td><td>Tunable for matching commits across ranges.</td></tr>
        <tr><td><code>--dual-color</code></td><td>Color both inner and outer diffs.</td></tr>
        <tr><td><code>--no-patch</code></td><td>Show only the matching summary, not patches.</td></tr>
        <tr><td><code>--notes</code></td><td>Include git notes in the comparison.</td></tr>
      </tbody>
    </table>
    <h2>Examples</h2>
    <pre><code>git range-diff main..feature@{1} main..feature
    # Compare branch before and after a rebase

    git range-diff origin/main feature.v1 feature.v2
    # Compare two patch series versions

    git range-diff @{u}..HEAD HEAD@{1}..HEAD
    # Compare current upstream-relative tip with what it was last time</code></pre>
    <h2>Common Mistakes</h2>
    <p>Range-diff matches commits using a heuristic; if you make many small reorderings, the output may pair unexpected commits. Tune <code>--creation-factor</code> if needed. Don't confuse range-diff with <code>git diff A..B</code> — they answer different questions.</p>
    <h2>Related Commands</h2>
    <p><code>git diff</code>, <code>git log</code>, <code>git rebase</code>, <code>git format-patch</code></p>
- title: git stash (advanced) — Power-user stash workflows
  section: Commands Reference
  difficulty: Advanced
  git_version: 2.30+
  weight: 470
  body: |
    <h2>Synopsis</h2>
    <pre><code>git stash push -p -m &lt;msg&gt; -- &lt;pathspec&gt;
    git stash branch &lt;newbranch&gt; [&lt;stash&gt;]
    git stash create
    git stash store -m &lt;msg&gt; &lt;sha&gt;</code></pre>
    <h2>Description</h2>
    <p>Beyond <code>git stash push</code> and <code>git stash pop</code>, the stash machinery offers powerful capabilities for advanced workflows. You can stash specific paths, stash specific hunks with <code>-p</code>, recreate a branch from a stash that conflicts with the current state, or even create a stash object without storing it on the stack (then store it later with a custom message).</p>
    <p>Internally, each stash is a merge commit between WIP-on-branch (the working tree) and index-on-branch (the staged changes), with the parent being the branch tip. This structure is what allows <code>stash branch</code> and <code>stash apply</code> to reconstruct exact state.</p>
    <p>In day-to-day use, <code>git stash (advanced)</code> integrates closely with shell aliases, editor plugins, and continuous integration. Power users often add aliases that combine flags they always pass, or wrap the command in scripts that enforce team conventions. Output formatting can be customized via Git config — pretty formats, color schemes, and pager behavior are all tunable. When something goes wrong, the first diagnostic step is usually to re-run the command with <code>GIT_TRACE=1</code> in the environment, which reveals the underlying plumbing calls. For unusual situations, the <code>--help</code> output (<code>git stash (advanced) --help</code>) opens the full manual page with details on every option, including those rarely used in casual workflows but essential for debugging or scripting at scale.</p><p>Understanding how <code>git stash (advanced)</code> interacts with the rest of Git's data model — the object database, the index, refs, and the working tree — pays dividends. Each command operates on some subset of these pieces, and knowing which it touches helps predict outcomes and recover from mistakes. Reading the official Git documentation alongside hands-on practice in a throwaway repository is the fastest way to internalize the nuances. Most production issues with Git stem from one of three causes: surprising default behavior, partial network operations, or rewriting history that was already shared. A working mental model of <code>git stash (advanced)</code>'s side effects helps avoid all three.</p>
        <h2>Common Options</h2>
    <table>
      <thead><tr><th>Subcommand / Option</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>push -p</code></td><td>Stash interactively chosen hunks.</td></tr>
        <tr><td><code>push -- &lt;pathspec&gt;</code></td><td>Stash only specified paths.</td></tr>
        <tr><td><code>--keep-index</code></td><td>Stash but keep what's already staged.</td></tr>
        <tr><td><code>--no-keep-index</code></td><td>Reset index when stashing (default).</td></tr>
        <tr><td><code>branch &lt;name&gt;</code></td><td>Recreate state on a fresh branch.</td></tr>
        <tr><td><code>create</code></td><td>Make a stash commit but don't store it.</td></tr>
        <tr><td><code>store -m</code></td><td>Place an existing commit on the stack.</td></tr>
      </tbody>
    </table>
    <h2>Examples</h2>
    <pre><code>git stash push -p -m "WIP: only refactor changes" -- src/refactor/
    # Stash only specific paths, interactively

    git stash --keep-index -m "Test pre-staged"
    # Verify that staged changes pass tests, with WIP set aside

    git stash branch fix-from-stash stash@{2}
    # Resurrect a stash that no longer applies cleanly

    SHA=$(git stash create "checkpoint")
    git stash store -m "manual checkpoint" "$SHA"
    # Programmatic stash creation</code></pre>
    <h2>Common Mistakes</h2>
    <p>Stashing during a merge or rebase mixes states and confuses the stack. Avoid. Long-running stashes outlive their context — review periodically. <code>--keep-index</code> is great for verifying staged changes, but the resulting stash includes both staged and unstaged content, which can surprise.</p>
    <h2>Related Commands</h2>
    <p><code>git stash</code>, <code>git commit --fixup</code>, <code>git worktree</code>, <code>git restore</code></p>
- title: git config — Get and set repository or global options
  section: Commands Reference
  difficulty: Intermediate
  git_version: 2.30+
  weight: 480
  body: |
    <h2>Synopsis</h2>
    <pre><code>git config [--global | --system | --local] &lt;key&gt; [&lt;value&gt;]
    git config --list
    git config --edit</code></pre>
    <h2>Description</h2>
    <p>The <code>git config</code> command reads and writes Git configuration. Settings live in three layers: system-wide (<code>/etc/gitconfig</code>), per-user (<code>~/.gitconfig</code> or <code>~/.config/git/config</code>), and per-repository (<code>.git/config</code>). More specific layers override more general ones. Many Git behaviors — default editor, push behavior, merge tools, line-ending handling — are tuned via config.</p>
    <p>For new users, the essentials are <code>user.name</code>, <code>user.email</code>, <code>init.defaultBranch</code>, and <code>core.editor</code>. Power users build extensive aliases, customize colors, and use conditional includes to apply different settings per project directory.</p>
    <p>In day-to-day use, <code>git config</code> integrates closely with shell aliases, editor plugins, and continuous integration. Power users often add aliases that combine flags they always pass, or wrap the command in scripts that enforce team conventions. Output formatting can be customized via Git config — pretty formats, color schemes, and pager behavior are all tunable. When something goes wrong, the first diagnostic step is usually to re-run the command with <code>GIT_TRACE=1</code> in the environment, which reveals the underlying plumbing calls. For unusual situations, the <code>--help</code> output (<code>git config --help</code>) opens the full manual page with details on every option, including those rarely used in casual workflows but essential for debugging or scripting at scale.</p><p>Understanding how <code>git config</code> interacts with the rest of Git's data model — the object database, the index, refs, and the working tree — pays dividends. Each command operates on some subset of these pieces, and knowing which it touches helps predict outcomes and recover from mistakes. Reading the official Git documentation alongside hands-on practice in a throwaway repository is the fastest way to internalize the nuances. Most production issues with Git stem from one of three causes: surprising default behavior, partial network operations, or rewriting history that was already shared. A working mental model of <code>git config</code>'s side effects helps avoid all three.</p>
        <h2>Common Options</h2>
    <table>
      <thead><tr><th>Option</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>--global</code></td><td>Operate on per-user config.</td></tr>
        <tr><td><code>--system</code></td><td>Operate on system-wide config.</td></tr>
        <tr><td><code>--local</code></td><td>Operate on the current repo's config (default if in a repo).</td></tr>
        <tr><td><code>--list</code></td><td>Show all settings.</td></tr>
        <tr><td><code>--edit</code></td><td>Open the chosen config in your editor.</td></tr>
        <tr><td><code>--unset</code></td><td>Remove a setting.</td></tr>
        <tr><td><code>--add</code></td><td>Add a value to a multi-valued key.</td></tr>
        <tr><td><code>--show-origin</code></td><td>Annotate output with the file each setting comes from.</td></tr>
      </tbody>
    </table>
    <h2>Examples</h2>
    <pre><code>git config --global user.name "Jane Smith"
    git config --global user.email "jane@example.com"
    # Identity for every repo

    git config --global init.defaultBranch main
    git config --global pull.rebase true
    git config --global core.editor "code --wait"
    # Sensible modern defaults

    git config --global alias.lg "log --oneline --graph --decorate --all"
    # Custom alias

    git config --list --show-origin
    # Audit where each setting comes from</code></pre>
    <h2>Common Mistakes</h2>
    <p>Setting global config that's meant to be local (or vice versa) leads to confusing behavior. Forgetting to set <code>user.email</code> on a fresh machine causes every commit to be unattributed. Use conditional includes (<code>[includeIf "gitdir:~/work/"]</code>) to swap identities per directory.</p>
    <h2>Related Commands</h2>
    <p><code>git credential</code>, <code>git init</code>, <code>git remote</code></p>
- title: git credential — Manage credentials
  section: Commands Reference
  difficulty: Advanced
  git_version: 2.30+
  weight: 490
  body: |
    <h2>Synopsis</h2>
    <pre><code>git config --global credential.helper &lt;helper&gt;
    git credential fill
    git credential approve
    git credential reject</code></pre>
    <h2>Description</h2>
    <p>The <code>git credential</code> machinery handles authentication for HTTPS remotes. Rather than prompting for a username and password every push, Git delegates to a credential helper that stores credentials securely. Helpers include <code>cache</code> (in-memory for a few minutes), <code>store</code> (plain-text file), <code>osxkeychain</code> (macOS Keychain), <code>manager</code> (Git Credential Manager on Windows/macOS/Linux), and <code>libsecret</code> (Linux GNOME).</p>
    <p>You rarely call <code>git credential</code> directly — you configure a helper once, and Git invokes it transparently. Modern setups (especially with GitHub) use OAuth tokens or 2FA-protected personal access tokens stored in a system keyring.</p>
    <p>In day-to-day use, <code>git credential</code> integrates closely with shell aliases, editor plugins, and continuous integration. Power users often add aliases that combine flags they always pass, or wrap the command in scripts that enforce team conventions. Output formatting can be customized via Git config — pretty formats, color schemes, and pager behavior are all tunable. When something goes wrong, the first diagnostic step is usually to re-run the command with <code>GIT_TRACE=1</code> in the environment, which reveals the underlying plumbing calls. For unusual situations, the <code>--help</code> output (<code>git credential --help</code>) opens the full manual page with details on every option, including those rarely used in casual workflows but essential for debugging or scripting at scale.</p><p>Understanding how <code>git credential</code> interacts with the rest of Git's data model — the object database, the index, refs, and the working tree — pays dividends. Each command operates on some subset of these pieces, and knowing which it touches helps predict outcomes and recover from mistakes. Reading the official Git documentation alongside hands-on practice in a throwaway repository is the fastest way to internalize the nuances. Most production issues with Git stem from one of three causes: surprising default behavior, partial network operations, or rewriting history that was already shared. A working mental model of <code>git credential</code>'s side effects helps avoid all three.</p>
        <h2>Common Options</h2>
    <table>
      <thead><tr><th>Subcommand / Config</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>credential.helper</code></td><td>Set the credential helper to use.</td></tr>
        <tr><td><code>credential.useHttpPath</code></td><td>Include URL path in the lookup key.</td></tr>
        <tr><td><code>fill</code></td><td>Plumbing: ask helpers for credentials.</td></tr>
        <tr><td><code>approve</code> / <code>reject</code></td><td>Tell helpers an attempt succeeded or failed.</td></tr>
        <tr><td><code>credential.&lt;url&gt;.helper</code></td><td>URL-specific helper.</td></tr>
        <tr><td><code>credential.helper "cache --timeout=3600"</code></td><td>Configurable in-memory cache.</td></tr>
      </tbody>
    </table>
    <h2>Examples</h2>
    <pre><code>git config --global credential.helper osxkeychain
    # macOS: store credentials in Keychain

    git config --global credential.helper manager
    # Cross-platform: Git Credential Manager

    git config --global credential.helper "cache --timeout=3600"
    # Cache for one hour in memory

    # Per-host helper:
    git config --global credential.https://github.com.helper "!gh auth git-credential"
    # Use the GitHub CLI as the helper</code></pre>
    <h2>Common Mistakes</h2>
    <p>The <code>store</code> helper writes plain text to <code>~/.git-credentials</code> — fine for throwaway VMs, dangerous on shared machines. Avoid passwords entirely; use personal access tokens or SSH keys for write access. After rotating a token, run <code>git credential reject</code> or clear the cache to force a refresh.</p>
    <h2>Related Commands</h2>
    <p><code>git config</code>, <code>git push</code>, <code>git fetch</code>, <code>ssh-agent</code></p>
- title: git cat-file — Inspect Git objects
  section: Commands Reference
  difficulty: Advanced
  git_version: 2.30+
  weight: 500
  body: |
    <h2>Synopsis</h2>
    <pre><code>git cat-file (-t | -s | -p | -e) &lt;object&gt;
    git cat-file --batch
    git cat-file --batch-check</code></pre>
    <h2>Description</h2>
    <p>The <code>git cat-file</code> command is a plumbing tool that reads raw Git objects from the object database. It can print an object's type (<code>blob</code>, <code>tree</code>, <code>commit</code>, <code>tag</code>), size, and content. The <code>--batch</code> mode lets scripts feed many object names on stdin and receive structured output, which is far faster than invoking <code>cat-file</code> per object.</p>
    <p>In day-to-day use, <code>git cat-file</code> integrates closely with shell aliases, editor plugins, and continuous integration. Power users often add aliases that combine flags they always pass, or wrap the command in scripts that enforce team conventions. Output formatting can be customized via Git config — pretty formats, color schemes, and pager behavior are all tunable. When something goes wrong, the first diagnostic step is usually to re-run the command with <code>GIT_TRACE=1</code> in the environment, which reveals the underlying plumbing calls. For unusual situations, the <code>--help</code> output (<code>git cat-file --help</code>) opens the full manual page with details on every option, including those rarely used in casual workflows but essential for debugging or scripting at scale.</p><p>Understanding how <code>git cat-file</code> interacts with the rest of Git's data model — the object database, the index, refs, and the working tree — pays dividends. Each command operates on some subset of these pieces, and knowing which it touches helps predict outcomes and recover from mistakes. Reading the official Git documentation alongside hands-on practice in a throwaway repository is the fastest way to internalize the nuances. Most production issues with Git stem from one of three causes: surprising default behavior, partial network operations, or rewriting history that was already shared. A working mental model of <code>git cat-file</code>'s side effects helps avoid all three.</p>
        <h2>When to Use</h2>
    <p>Most developers never need <code>git cat-file</code> directly — porcelain commands like <code>git show</code>, <code>git log</code>, and <code>git diff</code> wrap it transparently. Reach for it when writing scripts that walk Git objects, debugging repository corruption, or learning how Git stores data internally.</p>
    <h2>Common Options</h2>
    <table>
      <thead><tr><th>Option</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>-t</code></td><td>Print object type.</td></tr>
        <tr><td><code>-s</code></td><td>Print object size in bytes.</td></tr>
        <tr><td><code>-p</code></td><td>Pretty-print contents in a type-aware way.</td></tr>
        <tr><td><code>-e</code></td><td>Exit zero if the object exists.</td></tr>
        <tr><td><code>--batch</code></td><td>Stream <code>&lt;sha&gt; &lt;type&gt; &lt;size&gt; CRLF &lt;content&gt;</code> for each input.</td></tr>
        <tr><td><code>--batch-check</code></td><td>Like batch, but only header lines.</td></tr>
        <tr><td><code>--filters</code></td><td>Apply smudge filters when printing blobs.</td></tr>
      </tbody>
    </table>
    <h2>Examples</h2>
    <pre><code>git cat-file -t HEAD
    # commit

    git cat-file -p HEAD
    # Show commit message and tree/parent SHAs

    git cat-file -p HEAD:src/main.c
    # Print the file as it was at HEAD

    echo HEAD | git cat-file --batch-check
    # Get type/size/SHA in machine-readable form</code></pre>
    <h2>Common Mistakes</h2>
    <p>Passing a partial SHA that's ambiguous returns an error — disambiguate with more characters. Forgetting <code>-p</code> and using <code>-t</code> doesn't print contents. <code>--batch</code> mode requires careful protocol handling; respect the size header to read the right number of bytes.</p>
    <h2>Related Commands</h2>
    <p><code>git show</code>, <code>git hash-object</code>, <code>git ls-tree</code>, <code>git rev-parse</code></p>
- title: git hash-object — Compute or store a Git object
  section: Commands Reference
  difficulty: Advanced
  git_version: 2.30+
  weight: 510
  body: |
    <h2>Synopsis</h2>
    <pre><code>git hash-object [-t &lt;type&gt;] [-w] [--stdin] [&lt;file&gt;...]</code></pre>
    <h2>Description</h2>
    <p>The <code>git hash-object</code> command computes the SHA-1 (or SHA-256, in modern repos) that Git would assign to a file's contents. With <code>-w</code>, it also writes the object into the object database, returning the SHA. This is the lowest-level mechanism behind <code>git add</code>: that porcelain command essentially calls <code>hash-object -w</code> and then updates the index.</p>
    <p>In day-to-day use, <code>git hash-object</code> integrates closely with shell aliases, editor plugins, and continuous integration. Power users often add aliases that combine flags they always pass, or wrap the command in scripts that enforce team conventions. Output formatting can be customized via Git config — pretty formats, color schemes, and pager behavior are all tunable. When something goes wrong, the first diagnostic step is usually to re-run the command with <code>GIT_TRACE=1</code> in the environment, which reveals the underlying plumbing calls. For unusual situations, the <code>--help</code> output (<code>git hash-object --help</code>) opens the full manual page with details on every option, including those rarely used in casual workflows but essential for debugging or scripting at scale.</p><p>Understanding how <code>git hash-object</code> interacts with the rest of Git's data model — the object database, the index, refs, and the working tree — pays dividends. Each command operates on some subset of these pieces, and knowing which it touches helps predict outcomes and recover from mistakes. Reading the official Git documentation alongside hands-on practice in a throwaway repository is the fastest way to internalize the nuances. Most production issues with Git stem from one of three causes: surprising default behavior, partial network operations, or rewriting history that was already shared. A working mental model of <code>git hash-object</code>'s side effects helps avoid all three.</p>
        <h2>When to Use</h2>
    <p>You almost never need this directly. It is most useful for scripts that synthesize content into the object database (importers, migration tools), for debugging by checking what hash a piece of content would have, or for educational exploration of Git's content-addressable model.</p>
    <h2>Common Options</h2>
    <table>
      <thead><tr><th>Option</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>-t &lt;type&gt;</code></td><td>Object type (default <code>blob</code>).</td></tr>
        <tr><td><code>-w</code></td><td>Write the object to the database.</td></tr>
        <tr><td><code>--stdin</code></td><td>Read content from standard input.</td></tr>
        <tr><td><code>--stdin-paths</code></td><td>Read filenames from stdin.</td></tr>
        <tr><td><code>--no-filters</code></td><td>Skip smudge/clean filters.</td></tr>
        <tr><td><code>--literally</code></td><td>Don't validate content type.</td></tr>
      </tbody>
    </table>
    <h2>Examples</h2>
    <pre><code>git hash-object README.md
    # Print the SHA Git would assign

    echo "hello" | git hash-object --stdin
    # Hash arbitrary content

    git hash-object -w newfile.txt
    # Add the file's content as a blob in the object DB

    find . -name '*.png' | git hash-object --stdin-paths
    # Batch-compute hashes for many files</code></pre>
    <h2>Common Mistakes</h2>
    <p>Using <code>-w</code> creates a dangling blob if you don't reference it from a tree. <code>git gc</code> will eventually prune unreachable objects. Hashing through filters (CRLF normalization) yields different SHAs than raw bytes — pass <code>--no-filters</code> to compare with raw hashes from other tools.</p>
    <h2>Related Commands</h2>
    <p><code>git add</code>, <code>git cat-file</code>, <code>git update-index</code>, <code>git write-tree</code></p>
- title: git ls-tree — List the contents of a tree object
  section: Commands Reference
  difficulty: Advanced
  git_version: 2.30+
  weight: 520
  body: |
    <h2>Synopsis</h2>
    <pre><code>git ls-tree [-r] [-d] [-l] [--name-only] &lt;tree-ish&gt; [&lt;path&gt;...]</code></pre>
    <h2>Description</h2>
    <p>The <code>git ls-tree</code> command lists entries (mode, type, SHA, name) of a tree object. With <code>-r</code> it recurses into subdirectories. It is the plumbing equivalent of <code>ls</code> on a Git tree. Output is one entry per line, suitable for piping into other tools.</p>
    <p>In day-to-day use, <code>git ls-tree</code> integrates closely with shell aliases, editor plugins, and continuous integration. Power users often add aliases that combine flags they always pass, or wrap the command in scripts that enforce team conventions. Output formatting can be customized via Git config — pretty formats, color schemes, and pager behavior are all tunable. When something goes wrong, the first diagnostic step is usually to re-run the command with <code>GIT_TRACE=1</code> in the environment, which reveals the underlying plumbing calls. For unusual situations, the <code>--help</code> output (<code>git ls-tree --help</code>) opens the full manual page with details on every option, including those rarely used in casual workflows but essential for debugging or scripting at scale.</p><p>Understanding how <code>git ls-tree</code> interacts with the rest of Git's data model — the object database, the index, refs, and the working tree — pays dividends. Each command operates on some subset of these pieces, and knowing which it touches helps predict outcomes and recover from mistakes. Reading the official Git documentation alongside hands-on practice in a throwaway repository is the fastest way to internalize the nuances. Most production issues with Git stem from one of three causes: surprising default behavior, partial network operations, or rewriting history that was already shared. A working mental model of <code>git ls-tree</code>'s side effects helps avoid all three.</p>
        <h2>When to Use</h2>
    <p>Most developers reach for <code>git show &lt;rev&gt;:&lt;path&gt;</code> or <code>git ls-files</code> instead. <code>ls-tree</code> shines in scripts that need exact mode/type/SHA information, or when traversing a tree of any commit (not just HEAD's index).</p>
    <h2>Common Options</h2>
    <table>
      <thead><tr><th>Option</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>-r</code></td><td>Recurse into subtrees.</td></tr>
        <tr><td><code>-d</code></td><td>Show only directories (trees).</td></tr>
        <tr><td><code>-l</code></td><td>Include the size of blob entries.</td></tr>
        <tr><td><code>--name-only</code></td><td>Show only file names.</td></tr>
        <tr><td><code>-z</code></td><td>NUL-terminate output for safe parsing.</td></tr>
        <tr><td><code>--full-tree</code></td><td>Don't restrict by current directory.</td></tr>
      </tbody>
    </table>
    <h2>Examples</h2>
    <pre><code>git ls-tree HEAD
    # Top-level entries of HEAD's tree

    git ls-tree -r HEAD --name-only
    # All file paths at HEAD

    git ls-tree -r -l v1.0 src/
    # Sizes and SHAs for every file under src/ at v1.0

    git ls-tree HEAD -- 'docs/*.md'
    # Just markdown files in docs/</code></pre>
    <h2>Common Mistakes</h2>
    <p>Mixing up working-directory-relative versus repo-root-relative paths. Use <code>--full-tree</code> for unambiguous root-relative output. Without <code>-r</code>, only one level is shown — easy to miss nested files.</p>
    <h2>Related Commands</h2>
    <p><code>git ls-files</code>, <code>git show</code>, <code>git cat-file</code>, <code>git diff-tree</code></p>
- title: git ls-files — Show information about files in the index and working tree
  section: Commands Reference
  difficulty: Advanced
  git_version: 2.30+
  weight: 530
  body: |
    <h2>Synopsis</h2>
    <pre><code>git ls-files [-c] [-d] [-m] [-o] [-i] [--exclude-standard]</code></pre>
    <h2>Description</h2>
    <p>The <code>git ls-files</code> command lists files known to Git's index (and optionally the working tree). It supports filters: cached/staged, deleted, modified, others (untracked), ignored, unmerged, and so on. It is faster and more precise than <code>find</code> for "show me all tracked files."</p>
    <p>In day-to-day use, <code>git ls-files</code> integrates closely with shell aliases, editor plugins, and continuous integration. Power users often add aliases that combine flags they always pass, or wrap the command in scripts that enforce team conventions. Output formatting can be customized via Git config — pretty formats, color schemes, and pager behavior are all tunable. When something goes wrong, the first diagnostic step is usually to re-run the command with <code>GIT_TRACE=1</code> in the environment, which reveals the underlying plumbing calls. For unusual situations, the <code>--help</code> output (<code>git ls-files --help</code>) opens the full manual page with details on every option, including those rarely used in casual workflows but essential for debugging or scripting at scale.</p><p>Understanding how <code>git ls-files</code> interacts with the rest of Git's data model — the object database, the index, refs, and the working tree — pays dividends. Each command operates on some subset of these pieces, and knowing which it touches helps predict outcomes and recover from mistakes. Reading the official Git documentation alongside hands-on practice in a throwaway repository is the fastest way to internalize the nuances. Most production issues with Git stem from one of three causes: surprising default behavior, partial network operations, or rewriting history that was already shared. A working mental model of <code>git ls-files</code>'s side effects helps avoid all three.</p>
        <h2>When to Use</h2>
    <p>Most users invoke porcelain like <code>git status</code> or <code>git grep</code> rather than <code>ls-files</code>. Reach for it in scripts that operate on tracked files (lint tools, formatters, sync scripts) where you want a clean, ignore-aware list.</p>
    <h2>Common Options</h2>
    <table>
      <thead><tr><th>Option</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>-c</code>, <code>--cached</code></td><td>Show cached files (default).</td></tr>
        <tr><td><code>-d</code></td><td>Show deleted files.</td></tr>
        <tr><td><code>-m</code></td><td>Show modified files.</td></tr>
        <tr><td><code>-o</code></td><td>Show other (untracked) files.</td></tr>
        <tr><td><code>-i</code></td><td>Show ignored files.</td></tr>
        <tr><td><code>--exclude-standard</code></td><td>Apply standard ignore rules.</td></tr>
        <tr><td><code>-s</code>, <code>--stage</code></td><td>Show stage info (for unmerged paths).</td></tr>
        <tr><td><code>-z</code></td><td>NUL-terminated output.</td></tr>
      </tbody>
    </table>
    <h2>Examples</h2>
    <pre><code>git ls-files
    # Every tracked file

    git ls-files -o --exclude-standard
    # Untracked, non-ignored files

    git ls-files -m
    # Locally modified tracked files

    git ls-files -s
    # Show mode, SHA, and stage number for each entry</code></pre>
    <h2>Common Mistakes</h2>
    <p>Forgetting <code>--exclude-standard</code> when listing untracked files swamps you with ignored junk. Combining filters can be confusing — if you pass both <code>-c</code> and <code>-o</code>, the meaning depends on context.</p>
    <h2>Related Commands</h2>
    <p><code>git status</code>, <code>git ls-tree</code>, <code>git update-index</code>, <code>git grep</code></p>
- title: git rev-parse — Pick out and massage parameters
  section: Commands Reference
  difficulty: Advanced
  git_version: 2.30+
  weight: 540
  body: |
    <h2>Synopsis</h2>
    <pre><code>git rev-parse [&lt;options&gt;] &lt;arg&gt;...</code></pre>
    <h2>Description</h2>
    <p>The <code>git rev-parse</code> command resolves Git references and arguments. It turns symbolic names (branches, tags, <code>HEAD~3</code>, <code>HEAD@{yesterday}</code>) into 40-character SHAs, normalizes options, and answers introspection questions about the current repository (top-level path, Git directory, whether we're in a worktree). It is the Swiss Army knife of Git scripting.</p>
    <p>In day-to-day use, <code>git rev-parse</code> integrates closely with shell aliases, editor plugins, and continuous integration. Power users often add aliases that combine flags they always pass, or wrap the command in scripts that enforce team conventions. Output formatting can be customized via Git config — pretty formats, color schemes, and pager behavior are all tunable. When something goes wrong, the first diagnostic step is usually to re-run the command with <code>GIT_TRACE=1</code> in the environment, which reveals the underlying plumbing calls. For unusual situations, the <code>--help</code> output (<code>git rev-parse --help</code>) opens the full manual page with details on every option, including those rarely used in casual workflows but essential for debugging or scripting at scale.</p><p>Understanding how <code>git rev-parse</code> interacts with the rest of Git's data model — the object database, the index, refs, and the working tree — pays dividends. Each command operates on some subset of these pieces, and knowing which it touches helps predict outcomes and recover from mistakes. Reading the official Git documentation alongside hands-on practice in a throwaway repository is the fastest way to internalize the nuances. Most production issues with Git stem from one of three causes: surprising default behavior, partial network operations, or rewriting history that was already shared. A working mental model of <code>git rev-parse</code>'s side effects helps avoid all three.</p>
        <h2>When to Use</h2>
    <p>You'll see <code>git rev-parse</code> in nearly every shell script that wraps Git: to get the current branch name, the repo root, or to validate that an argument is a valid commit. Most users don't run it directly day-to-day, but knowledge of it dramatically improves Git scripting fluency.</p>
    <h2>Common Options</h2>
    <table>
      <thead><tr><th>Option</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>--abbrev-ref</code></td><td>Print short ref name (e.g. <code>main</code>, not <code>refs/heads/main</code>).</td></tr>
        <tr><td><code>--short</code></td><td>Output abbreviated SHA.</td></tr>
        <tr><td><code>--show-toplevel</code></td><td>Print absolute path of repo root.</td></tr>
        <tr><td><code>--git-dir</code></td><td>Print absolute path of <code>.git</code>.</td></tr>
        <tr><td><code>--is-inside-work-tree</code></td><td>Yes/no script-friendly answer.</td></tr>
        <tr><td><code>--verify</code></td><td>Validate that the argument is a real ref.</td></tr>
        <tr><td><code>--quiet</code></td><td>Suppress error output.</td></tr>
      </tbody>
    </table>
    <h2>Examples</h2>
    <pre><code>git rev-parse HEAD
    # Full SHA of current commit

    git rev-parse --abbrev-ref HEAD
    # Current branch name (or "HEAD" if detached)

    git rev-parse --show-toplevel
    # Path to repo root, useful in scripts

    git rev-parse --verify origin/main &gt;/dev/null && echo OK
    # Test whether a ref exists</code></pre>
    <h2>Common Mistakes</h2>
    <p>Using <code>git rev-parse</code> on user input without <code>--verify</code> can succeed for ambiguous arguments and produce surprising results. In subshells, <code>--show-toplevel</code> is a more reliable anchor than <code>$PWD</code>.</p>
    <h2>Related Commands</h2>
    <p><code>git symbolic-ref</code>, <code>git rev-list</code>, <code>git for-each-ref</code>, <code>git config</code></p>
- title: git rev-list — List commit objects in reverse chronological order
  section: Commands Reference
  difficulty: Advanced
  git_version: 2.30+
  weight: 550
  body: |
    <h2>Synopsis</h2>
    <pre><code>git rev-list [&lt;options&gt;] &lt;commit&gt;...</code></pre>
    <h2>Description</h2>
    <p>The <code>git rev-list</code> command emits the SHAs of commits reachable from one or more starting points, optionally excluding others. It is the workhorse behind <code>git log</code>, <code>git bisect</code>, and many other commands. With its many filters, it can answer "how many commits between A and B," "the SHA of the merge base," "all commits not on main," and so on.</p>
    <p>In day-to-day use, <code>git rev-list</code> integrates closely with shell aliases, editor plugins, and continuous integration. Power users often add aliases that combine flags they always pass, or wrap the command in scripts that enforce team conventions. Output formatting can be customized via Git config — pretty formats, color schemes, and pager behavior are all tunable. When something goes wrong, the first diagnostic step is usually to re-run the command with <code>GIT_TRACE=1</code> in the environment, which reveals the underlying plumbing calls. For unusual situations, the <code>--help</code> output (<code>git rev-list --help</code>) opens the full manual page with details on every option, including those rarely used in casual workflows but essential for debugging or scripting at scale.</p><p>Understanding how <code>git rev-list</code> interacts with the rest of Git's data model — the object database, the index, refs, and the working tree — pays dividends. Each command operates on some subset of these pieces, and knowing which it touches helps predict outcomes and recover from mistakes. Reading the official Git documentation alongside hands-on practice in a throwaway repository is the fastest way to internalize the nuances. Most production issues with Git stem from one of three causes: surprising default behavior, partial network operations, or rewriting history that was already shared. A working mental model of <code>git rev-list</code>'s side effects helps avoid all three.</p>
        <h2>When to Use</h2>
    <p>Power users and toolsmiths use <code>rev-list</code> in scripts. Day-to-day developers use <code>git log</code>, which is built on top of <code>rev-list</code> but produces human-friendly output.</p>
    <h2>Common Options</h2>
    <table>
      <thead><tr><th>Option</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>--count</code></td><td>Print just the number of commits.</td></tr>
        <tr><td><code>--max-count=&lt;n&gt;</code></td><td>Limit how many commits to list.</td></tr>
        <tr><td><code>--reverse</code></td><td>Output oldest first.</td></tr>
        <tr><td><code>--no-merges</code></td><td>Exclude merge commits.</td></tr>
        <tr><td><code>--first-parent</code></td><td>Follow only the first parent of each merge.</td></tr>
        <tr><td><code>--ancestry-path</code></td><td>Restrict to commits between two endpoints.</td></tr>
        <tr><td><code>--all</code></td><td>Include every ref as a starting point.</td></tr>
      </tbody>
    </table>
    <h2>Examples</h2>
    <pre><code>git rev-list --count HEAD
    # Total number of commits reachable from HEAD

    git rev-list main..feature
    # SHAs unique to feature

    git rev-list --no-merges --since="1 month ago" main
    # Non-merge commits in the last month

    git rev-list --max-parents=0 HEAD
    # Find root commits (no parents)</code></pre>
    <h2>Common Mistakes</h2>
    <p>Forgetting that ranges with two dots exclude commits reachable from the left side. <code>--first-parent</code> changes the meaning of "ancestry" significantly. On huge repos, unbounded rev-list can be slow — pair with <code>--max-count</code> or path filters.</p>
    <h2>Related Commands</h2>
    <p><code>git log</code>, <code>git rev-parse</code>, <code>git merge-base</code>, <code>git bisect</code></p>
- title: git for-each-ref — Output information on each ref
  section: Commands Reference
  difficulty: Advanced
  git_version: 2.30+
  weight: 560
  body: |
    <h2>Synopsis</h2>
    <pre><code>git for-each-ref [--format=&lt;fmt&gt;] [--sort=&lt;key&gt;] [&lt;pattern&gt;...]</code></pre>
    <h2>Description</h2>
    <p>The <code>git for-each-ref</code> command iterates over every ref (branches, tags, remotes, notes, stash) and applies a customizable format. It is far more powerful than parsing <code>git branch</code> or <code>git tag</code> output: you can sort by version, by date, or by any field, and produce stable machine-readable output.</p>
    <p>In day-to-day use, <code>git for-each-ref</code> integrates closely with shell aliases, editor plugins, and continuous integration. Power users often add aliases that combine flags they always pass, or wrap the command in scripts that enforce team conventions. Output formatting can be customized via Git config — pretty formats, color schemes, and pager behavior are all tunable. When something goes wrong, the first diagnostic step is usually to re-run the command with <code>GIT_TRACE=1</code> in the environment, which reveals the underlying plumbing calls. For unusual situations, the <code>--help</code> output (<code>git for-each-ref --help</code>) opens the full manual page with details on every option, including those rarely used in casual workflows but essential for debugging or scripting at scale.</p><p>Understanding how <code>git for-each-ref</code> interacts with the rest of Git's data model — the object database, the index, refs, and the working tree — pays dividends. Each command operates on some subset of these pieces, and knowing which it touches helps predict outcomes and recover from mistakes. Reading the official Git documentation alongside hands-on practice in a throwaway repository is the fastest way to internalize the nuances. Most production issues with Git stem from one of three causes: surprising default behavior, partial network operations, or rewriting history that was already shared. A working mental model of <code>git for-each-ref</code>'s side effects helps avoid all three.</p>
        <h2>When to Use</h2>
    <p>Reach for <code>for-each-ref</code> in scripts that need detailed ref metadata: build version selectors, dashboards of branch ages, automated cleanup of stale branches, or release-note generators.</p>
    <h2>Common Options</h2>
    <table>
      <thead><tr><th>Option</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>--format=&lt;fmt&gt;</code></td><td>Format string with field placeholders.</td></tr>
        <tr><td><code>--sort=&lt;key&gt;</code></td><td>Sort by field (prefix <code>-</code> for descending).</td></tr>
        <tr><td><code>--count=&lt;n&gt;</code></td><td>Limit number of entries.</td></tr>
        <tr><td><code>--contains &lt;commit&gt;</code></td><td>Refs containing the given commit.</td></tr>
        <tr><td><code>--merged &lt;commit&gt;</code></td><td>Refs merged into the given commit.</td></tr>
        <tr><td><code>--points-at &lt;commit&gt;</code></td><td>Refs that directly point at a commit.</td></tr>
      </tbody>
    </table>
    <h2>Examples</h2>
    <pre><code>git for-each-ref --format='%(refname:short) %(objectname:short)' refs/heads/
    # Local branch names with abbreviated SHAs

    git for-each-ref --sort=-committerdate --count=10 \
      --format='%(committerdate:short) %(refname:short)' refs/heads/
    # Top 10 most recently updated branches

    git for-each-ref --sort=-v:refname --format='%(refname:short)' refs/tags/ | head -5
    # Five highest semver tags</code></pre>
    <h2>Common Mistakes</h2>
    <p>Forgetting the trailing <code>/</code> on <code>refs/heads/</code> patterns can match unintended refs. Format strings can be tricky — quote field names with parentheses. <code>--sort=v:refname</code> only works on tags that look like versions.</p>
    <h2>Related Commands</h2>
    <p><code>git branch</code>, <code>git tag</code>, <code>git ls-remote</code>, <code>git rev-parse</code></p>
- title: git update-ref — Update the object name stored in a ref safely
  section: Commands Reference
  difficulty: Advanced
  git_version: 2.30+
  weight: 570
  body: |
    <h2>Synopsis</h2>
    <pre><code>git update-ref [-d] [--create-reflog] &lt;ref&gt; &lt;newvalue&gt; [&lt;oldvalue&gt;]</code></pre>
    <h2>Description</h2>
    <p>The <code>git update-ref</code> command writes a new SHA to a ref atomically. With an optional expected old value, it provides compare-and-swap semantics for safety. It is what porcelain commands like <code>git commit</code> and <code>git branch</code> use under the hood, and what scripts that manipulate refs directly should use instead of editing files in <code>.git/refs/</code>.</p>
    <p>In day-to-day use, <code>git update-ref</code> integrates closely with shell aliases, editor plugins, and continuous integration. Power users often add aliases that combine flags they always pass, or wrap the command in scripts that enforce team conventions. Output formatting can be customized via Git config — pretty formats, color schemes, and pager behavior are all tunable. When something goes wrong, the first diagnostic step is usually to re-run the command with <code>GIT_TRACE=1</code> in the environment, which reveals the underlying plumbing calls. For unusual situations, the <code>--help</code> output (<code>git update-ref --help</code>) opens the full manual page with details on every option, including those rarely used in casual workflows but essential for debugging or scripting at scale.</p><p>Understanding how <code>git update-ref</code> interacts with the rest of Git's data model — the object database, the index, refs, and the working tree — pays dividends. Each command operates on some subset of these pieces, and knowing which it touches helps predict outcomes and recover from mistakes. Reading the official Git documentation alongside hands-on practice in a throwaway repository is the fastest way to internalize the nuances. Most production issues with Git stem from one of three causes: surprising default behavior, partial network operations, or rewriting history that was already shared. A working mental model of <code>git update-ref</code>'s side effects helps avoid all three.</p>
        <h2>When to Use</h2>
    <p>Most developers never need this. Use it when writing automation that creates, moves, or deletes refs in custom namespaces (notes, replace, custom systems), or when a porcelain command isn't appropriate (e.g., creating a ref that points at an arbitrary tree).</p>
    <h2>Common Options</h2>
    <table>
      <thead><tr><th>Option</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>-d &lt;ref&gt; [&lt;oldvalue&gt;]</code></td><td>Delete a ref (optionally compare-and-swap).</td></tr>
        <tr><td><code>--no-deref</code></td><td>Don't follow symbolic refs.</td></tr>
        <tr><td><code>--create-reflog</code></td><td>Create a reflog if missing.</td></tr>
        <tr><td><code>-m &lt;reason&gt;</code></td><td>Reflog reason for this update.</td></tr>
        <tr><td><code>--stdin</code></td><td>Read updates from stdin (atomic batch).</td></tr>
      </tbody>
    </table>
    <h2>Examples</h2>
    <pre><code>git update-ref refs/heads/feature abc123
    # Move feature branch to commit abc123

    git update-ref -d refs/heads/old-experiment
    # Delete a branch ref directly

    git update-ref refs/notes/ci HEAD def456
    # Move a custom notes ref atomically

    # Atomic multi-ref update via stdin:
    printf 'update refs/heads/main %s\nupdate refs/heads/dev %s\n' "$NEW1" "$NEW2" | \
      git update-ref --stdin</code></pre>
    <h2>Common Mistakes</h2>
    <p>Bypassing safety by editing <code>.git/refs/</code> files directly can corrupt packed refs or skip reflog entries. Always use <code>update-ref</code>. Forgetting to provide <code>&lt;oldvalue&gt;</code> defeats the compare-and-swap protection — provide it whenever you can.</p>
    <h2>Related Commands</h2>
    <p><code>git symbolic-ref</code>, <code>git pack-refs</code>, <code>git for-each-ref</code>, <code>git branch</code></p>
- title: git symbolic-ref — Read, modify, and delete symbolic refs
  section: Commands Reference
  difficulty: Advanced
  git_version: 2.30+
  weight: 580
  body: |
    <h2>Synopsis</h2>
    <pre><code>git symbolic-ref [--short] &lt;name&gt; [&lt;ref&gt;]
    git symbolic-ref --delete &lt;name&gt;</code></pre>
    <h2>Description</h2>
    <p>The <code>git symbolic-ref</code> command manipulates symbolic refs — refs that point at another ref instead of a commit. The most familiar example is HEAD: when you're on branch <code>main</code>, HEAD is a symbolic ref pointing at <code>refs/heads/main</code>. Other examples include the default branch indicator on remotes (<code>refs/remotes/origin/HEAD</code>).</p>
    <p>In day-to-day use, <code>git symbolic-ref</code> integrates closely with shell aliases, editor plugins, and continuous integration. Power users often add aliases that combine flags they always pass, or wrap the command in scripts that enforce team conventions. Output formatting can be customized via Git config — pretty formats, color schemes, and pager behavior are all tunable. When something goes wrong, the first diagnostic step is usually to re-run the command with <code>GIT_TRACE=1</code> in the environment, which reveals the underlying plumbing calls. For unusual situations, the <code>--help</code> output (<code>git symbolic-ref --help</code>) opens the full manual page with details on every option, including those rarely used in casual workflows but essential for debugging or scripting at scale.</p><p>Understanding how <code>git symbolic-ref</code> interacts with the rest of Git's data model — the object database, the index, refs, and the working tree — pays dividends. Each command operates on some subset of these pieces, and knowing which it touches helps predict outcomes and recover from mistakes. Reading the official Git documentation alongside hands-on practice in a throwaway repository is the fastest way to internalize the nuances. Most production issues with Git stem from one of three causes: surprising default behavior, partial network operations, or rewriting history that was already shared. A working mental model of <code>git symbolic-ref</code>'s side effects helps avoid all three.</p>
        <h2>When to Use</h2>
    <p>Use this when you need to switch HEAD without touching the working tree (e.g., during a custom migration), or when scripting around the default-branch concept. Most users only ever read symbolic refs via <code>git rev-parse --abbrev-ref HEAD</code>.</p>
    <h2>Common Options</h2>
    <table>
      <thead><tr><th>Option</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>--short</code></td><td>Print the short name (e.g. <code>main</code>).</td></tr>
        <tr><td><code>--delete</code></td><td>Delete the symbolic ref.</td></tr>
        <tr><td><code>--quiet</code></td><td>Don't print error if ref is missing.</td></tr>
        <tr><td><code>-m &lt;reason&gt;</code></td><td>Reflog reason for changes.</td></tr>
      </tbody>
    </table>
    <h2>Examples</h2>
    <pre><code>git symbolic-ref HEAD
    # refs/heads/main

    git symbolic-ref --short HEAD
    # main

    git symbolic-ref refs/remotes/origin/HEAD refs/remotes/origin/main
    # Set the default branch indicator on origin

    git symbolic-ref HEAD refs/heads/develop
    # Switch HEAD without touching working tree (advanced!)</code></pre>
    <h2>Common Mistakes</h2>
    <p>Switching HEAD via <code>symbolic-ref</code> doesn't update the working tree — files won't change. Use <code>git switch</code> for the everyday case. Setting <code>origin/HEAD</code> incorrectly confuses tools that look up the default branch.</p>
    <h2>Related Commands</h2>
    <p><code>git update-ref</code>, <code>git switch</code>, <code>git rev-parse</code>, <code>git remote set-head</code></p>
- title: git pack-objects — Create a packed archive of objects
  section: Commands Reference
  difficulty: Advanced
  git_version: 2.30+
  weight: 590
  body: |
    <h2>Synopsis</h2>
    <pre><code>git pack-objects [--stdout] [--all] &lt;base-name&gt; &lt; &lt;object-list&gt;</code></pre>
    <h2>Description</h2>
    <p>The <code>git pack-objects</code> command compresses a set of objects into a single packfile, applying delta compression to similar objects. Packs are how Git stores objects efficiently on disk and over the network — every fetch and push transfers packs.</p>
    <p>In day-to-day use, <code>git pack-objects</code> integrates closely with shell aliases, editor plugins, and continuous integration. Power users often add aliases that combine flags they always pass, or wrap the command in scripts that enforce team conventions. Output formatting can be customized via Git config — pretty formats, color schemes, and pager behavior are all tunable. When something goes wrong, the first diagnostic step is usually to re-run the command with <code>GIT_TRACE=1</code> in the environment, which reveals the underlying plumbing calls. For unusual situations, the <code>--help</code> output (<code>git pack-objects --help</code>) opens the full manual page with details on every option, including those rarely used in casual workflows but essential for debugging or scripting at scale.</p><p>Understanding how <code>git pack-objects</code> interacts with the rest of Git's data model — the object database, the index, refs, and the working tree — pays dividends. Each command operates on some subset of these pieces, and knowing which it touches helps predict outcomes and recover from mistakes. Reading the official Git documentation alongside hands-on practice in a throwaway repository is the fastest way to internalize the nuances. Most production issues with Git stem from one of three causes: surprising default behavior, partial network operations, or rewriting history that was already shared. A working mental model of <code>git pack-objects</code>'s side effects helps avoid all three.</p>
        <h2>When to Use</h2>
    <p>You almost never invoke this directly. <code>git gc</code>, <code>git repack</code>, and the network protocol drive it for you. Reach for it manually when implementing custom transport, optimizing storage, or experimenting with delta strategies.</p>
    <h2>Common Options</h2>
    <table>
      <thead><tr><th>Option</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>--stdout</code></td><td>Write the pack to stdout instead of files.</td></tr>
        <tr><td><code>--all</code></td><td>Pack everything reachable from any ref.</td></tr>
        <tr><td><code>--revs</code></td><td>Read revisions from stdin instead of object SHAs.</td></tr>
        <tr><td><code>--depth=&lt;n&gt;</code></td><td>Maximum delta chain depth.</td></tr>
        <tr><td><code>--window=&lt;n&gt;</code></td><td>Window size for delta search.</td></tr>
        <tr><td><code>--thin</code></td><td>Allow thin packs (deltas against external objects).</td></tr>
        <tr><td><code>--no-reuse-delta</code></td><td>Recompute deltas instead of reusing existing.</td></tr>
      </tbody>
    </table>
    <h2>Examples</h2>
    <pre><code>git rev-list --objects --all | git pack-objects --stdout &gt; everything.pack
    # Build a single pack of every reachable object

    git rev-list --objects HEAD ^origin/main | \
      git pack-objects --thin --stdout &gt; ahead.pack
    # A thin pack of just the commits ahead of origin/main

    git pack-objects --all .git/objects/pack/extra
    # Repack all reachable objects into a new pack named "extra"</code></pre>
    <h2>Common Mistakes</h2>
    <p>Building large packs with <code>--depth</code> and <code>--window</code> set too high consumes lots of memory and CPU. The defaults from <code>git gc</code> are sensible for most repos. Producing thin packs without context (an existing repo to apply them to) is useless.</p>
    <h2>Related Commands</h2>
    <p><code>git unpack-objects</code>, <code>git verify-pack</code>, <code>git gc</code>, <code>git repack</code></p>
- title: git unpack-objects — Unpack objects from a packed archive
  section: Commands Reference
  difficulty: Advanced
  git_version: 2.30+
  weight: 600
  body: |
    <h2>Synopsis</h2>
    <pre><code>git unpack-objects [-r] [-q] &lt; &lt;pack-file&gt;</code></pre>
    <h2>Description</h2>
    <p>The <code>git unpack-objects</code> command reads a packfile from stdin and writes its contents as individual loose objects into the object database. This is the inverse of <code>git pack-objects</code>.</p>
    <p>In day-to-day use, <code>git unpack-objects</code> integrates closely with shell aliases, editor plugins, and continuous integration. Power users often add aliases that combine flags they always pass, or wrap the command in scripts that enforce team conventions. Output formatting can be customized via Git config — pretty formats, color schemes, and pager behavior are all tunable. When something goes wrong, the first diagnostic step is usually to re-run the command with <code>GIT_TRACE=1</code> in the environment, which reveals the underlying plumbing calls. For unusual situations, the <code>--help</code> output (<code>git unpack-objects --help</code>) opens the full manual page with details on every option, including those rarely used in casual workflows but essential for debugging or scripting at scale.</p><p>Understanding how <code>git unpack-objects</code> interacts with the rest of Git's data model — the object database, the index, refs, and the working tree — pays dividends. Each command operates on some subset of these pieces, and knowing which it touches helps predict outcomes and recover from mistakes. Reading the official Git documentation alongside hands-on practice in a throwaway repository is the fastest way to internalize the nuances. Most production issues with Git stem from one of three causes: surprising default behavior, partial network operations, or rewriting history that was already shared. A working mental model of <code>git unpack-objects</code>'s side effects helps avoid all three.</p>
        <h2>When to Use</h2>
    <p>Most developers never need this. It's used for recovering from a corrupt pack (unpack what's salvageable, then re-pack), for testing, or when integrating a small bundle into a repo where the loose-object format is preferable.</p>
    <h2>Common Options</h2>
    <table>
      <thead><tr><th>Option</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>-n</code></td><td>Dry-run: show what would be unpacked.</td></tr>
        <tr><td><code>-q</code></td><td>Quiet, no progress.</td></tr>
        <tr><td><code>-r</code></td><td>Recover what's possible from a damaged pack.</td></tr>
        <tr><td><code>--strict</code></td><td>Refuse to write objects with broken links.</td></tr>
      </tbody>
    </table>
    <h2>Examples</h2>
    <pre><code>git unpack-objects &lt; pack-abc.pack
    # Explode pack into loose objects

    git unpack-objects -r &lt; broken.pack
    # Salvage what we can from a damaged pack

    git unpack-objects -n &lt; somepack.pack
    # Just preview what would be unpacked</code></pre>
    <h2>Common Mistakes</h2>
    <p>Unpacking a huge pack creates many tiny files and slows the filesystem. Almost every operational scenario prefers keeping the pack intact. Pair this with <code>git fsck</code> when troubleshooting corruption. <code>git help unpack-objects</code> opens the full manual page with comprehensive coverage of every option and edge case; it remains the authoritative reference whenever the summary on this page leaves a question unanswered. For team workflows, capturing how your project uses this command in a CONTRIBUTING document avoids repeated onboarding questions and keeps everyone aligned on conventions.</p>
    <h2>Related Commands</h2>
    <p><code>git pack-objects</code>, <code>git verify-pack</code>, <code>git fsck</code>, <code>git gc</code></p>
- title: git verify-pack — Validate packed Git archive files
  section: Commands Reference
  difficulty: Advanced
  git_version: 2.30+
  weight: 610
  body: |
    <h2>Synopsis</h2>
    <pre><code>git verify-pack [-v] [--stat-only] &lt;pack&gt;.idx</code></pre>
    <h2>Description</h2>
    <p>The <code>git verify-pack</code> command checks the integrity of a packfile and its index, verifying SHA-1 checksums and delta chain consistency. With <code>-v</code>, it prints the list of objects in the pack along with type, size, and (for deltas) base information.</p>
    <p>In day-to-day use, <code>git verify-pack</code> integrates closely with shell aliases, editor plugins, and continuous integration. Power users often add aliases that combine flags they always pass, or wrap the command in scripts that enforce team conventions. Output formatting can be customized via Git config — pretty formats, color schemes, and pager behavior are all tunable. When something goes wrong, the first diagnostic step is usually to re-run the command with <code>GIT_TRACE=1</code> in the environment, which reveals the underlying plumbing calls. For unusual situations, the <code>--help</code> output (<code>git verify-pack --help</code>) opens the full manual page with details on every option, including those rarely used in casual workflows but essential for debugging or scripting at scale.</p><p>Understanding how <code>git verify-pack</code> interacts with the rest of Git's data model — the object database, the index, refs, and the working tree — pays dividends. Each command operates on some subset of these pieces, and knowing which it touches helps predict outcomes and recover from mistakes. Reading the official Git documentation alongside hands-on practice in a throwaway repository is the fastest way to internalize the nuances. Most production issues with Git stem from one of three causes: surprising default behavior, partial network operations, or rewriting history that was already shared. A working mental model of <code>git verify-pack</code>'s side effects helps avoid all three.</p>
        <h2>When to Use</h2>
    <p>Most users never run this. It's invaluable for repository forensics — finding which large blobs are eating space, understanding delta chain health, or diagnosing corruption.</p>
    <h2>Common Options</h2>
    <table>
      <thead><tr><th>Option</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>-v</code></td><td>Verbose: list every object.</td></tr>
        <tr><td><code>--stat-only</code></td><td>Show summary statistics only.</td></tr>
        <tr><td><code>-O &lt;file&gt;</code></td><td>Read pack-list from file.</td></tr>
      </tbody>
    </table>
    <h2>Examples</h2>
    <pre><code>git verify-pack -v .git/objects/pack/pack-*.idx
    # Detailed listing of objects in every pack

    # Find the biggest blobs in the repository:
    git verify-pack -v .git/objects/pack/*.idx | \
      sort -k 3 -n | tail -20

    git verify-pack --stat-only .git/objects/pack/pack-*.idx
    # Summary stats per pack</code></pre>
    <h2>Common Mistakes</h2>
    <p>Pointing at a <code>.pack</code> instead of <code>.idx</code> fails — always pass the index. Sorting verify-pack output to find big files works, but don't forget to also examine loose objects with <code>git count-objects -v</code>.</p>
    <h2>Related Commands</h2>
    <p><code>git fsck</code>, <code>git gc</code>, <code>git repack</code>, <code>git count-objects</code></p>
- title: git count-objects — Count unpacked objects and disk usage
  section: Commands Reference
  difficulty: Advanced
  git_version: 2.30+
  weight: 620
  body: |
    <h2>Synopsis</h2>
    <pre><code>git count-objects [-v] [-H]</code></pre>
    <h2>Description</h2>
    <p>The <code>git count-objects</code> command reports how many loose objects and packs the repository has, and how much disk space they consume. With <code>-v</code>, it includes a breakdown of garbage, packs, in-pack objects, and prune-able objects.</p>
    <p>In day-to-day use, <code>git count-objects</code> integrates closely with shell aliases, editor plugins, and continuous integration. Power users often add aliases that combine flags they always pass, or wrap the command in scripts that enforce team conventions. Output formatting can be customized via Git config — pretty formats, color schemes, and pager behavior are all tunable. When something goes wrong, the first diagnostic step is usually to re-run the command with <code>GIT_TRACE=1</code> in the environment, which reveals the underlying plumbing calls. For unusual situations, the <code>--help</code> output (<code>git count-objects --help</code>) opens the full manual page with details on every option, including those rarely used in casual workflows but essential for debugging or scripting at scale.</p><p>Understanding how <code>git count-objects</code> interacts with the rest of Git's data model — the object database, the index, refs, and the working tree — pays dividends. Each command operates on some subset of these pieces, and knowing which it touches helps predict outcomes and recover from mistakes. Reading the official Git documentation alongside hands-on practice in a throwaway repository is the fastest way to internalize the nuances. Most production issues with Git stem from one of three causes: surprising default behavior, partial network operations, or rewriting history that was already shared. A working mental model of <code>git count-objects</code>'s side effects helps avoid all three.</p>
        <h2>When to Use</h2>
    <p>Run <code>git count-objects -v</code> to gauge whether a repo needs <code>git gc</code>: if loose-object count is high or there are many small packs, garbage collection will compact things. CI and ops teams use it for monitoring repo health.</p>
    <h2>Common Options</h2>
    <table>
      <thead><tr><th>Option</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>-v</code></td><td>Verbose breakdown.</td></tr>
        <tr><td><code>-H</code>, <code>--human-readable</code></td><td>Sizes in KiB/MiB/GiB.</td></tr>
      </tbody>
    </table>
    <h2>Examples</h2>
    <pre><code>git count-objects
    # Quick: number of loose objects and their size

    git count-objects -vH
    # Full breakdown with human-readable sizes
    # count: 235 (loose objects)
    # size: 5.2 MiB
    # in-pack: 18234
    # packs: 3
    # size-pack: 142.6 MiB
    # prune-packable: 12
    # garbage: 0</code></pre>
    <h2>Common Mistakes</h2>
    <p>Misreading "garbage" — these are corrupt objects, not just unreachable ones. A non-zero garbage count warrants investigation. <code>prune-packable</code> indicates objects present both loose and in packs; running <code>git gc</code> will resolve them.</p>
    <h2>Related Commands</h2>
    <p><code>git gc</code>, <code>git fsck</code>, <code>git repack</code>, <code>git verify-pack</code></p>
- title: git gc — Cleanup unnecessary files and optimize the local repository
  section: Commands Reference
  difficulty: Intermediate
  git_version: 2.30+
  weight: 630
  body: |
    <h2>Synopsis</h2>
    <pre><code>git gc [--auto] [--aggressive] [--prune=&lt;date&gt;]</code></pre>
    <h2>Description</h2>
    <p>The <code>git gc</code> command runs housekeeping tasks: it packs loose objects, removes unreachable objects past the prune window, packs refs, and updates auxiliary files. Git automatically runs <code>gc --auto</code> after operations that create many loose objects (like a large fetch), so most users never invoke <code>gc</code> manually. Manual invocation is useful after rewriting history, deleting many branches, or to reclaim disk space immediately.</p>
    <p>The <code>--aggressive</code> flag does extra work — recomputing deltas — but is rarely worth the time. Modern Git's default behavior is well-tuned. The <code>--prune</code> argument controls how old unreachable objects must be before they're deleted; the default is two weeks.</p>
    <p>In day-to-day use, <code>git gc</code> integrates closely with shell aliases, editor plugins, and continuous integration. Power users often add aliases that combine flags they always pass, or wrap the command in scripts that enforce team conventions. Output formatting can be customized via Git config — pretty formats, color schemes, and pager behavior are all tunable. When something goes wrong, the first diagnostic step is usually to re-run the command with <code>GIT_TRACE=1</code> in the environment, which reveals the underlying plumbing calls. For unusual situations, the <code>--help</code> output (<code>git gc --help</code>) opens the full manual page with details on every option, including those rarely used in casual workflows but essential for debugging or scripting at scale.</p><p>Understanding how <code>git gc</code> interacts with the rest of Git's data model — the object database, the index, refs, and the working tree — pays dividends. Each command operates on some subset of these pieces, and knowing which it touches helps predict outcomes and recover from mistakes. Reading the official Git documentation alongside hands-on practice in a throwaway repository is the fastest way to internalize the nuances. Most production issues with Git stem from one of three causes: surprising default behavior, partial network operations, or rewriting history that was already shared. A working mental model of <code>git gc</code>'s side effects helps avoid all three.</p>
        <h2>Common Options</h2>
    <table>
      <thead><tr><th>Option</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>--auto</code></td><td>Run only if Git's heuristics say maintenance is needed.</td></tr>
        <tr><td><code>--aggressive</code></td><td>Spend more time finding optimal deltas.</td></tr>
        <tr><td><code>--prune=&lt;date&gt;</code></td><td>Prune unreachable objects older than this.</td></tr>
        <tr><td><code>--no-prune</code></td><td>Skip pruning of loose objects.</td></tr>
        <tr><td><code>--quiet</code></td><td>Suppress progress output.</td></tr>
        <tr><td><code>--force</code></td><td>Run even if another gc is in progress.</td></tr>
      </tbody>
    </table>
    <h2>Examples</h2>
    <pre><code>git gc
    # Routine maintenance

    git gc --auto
    # What Git runs in the background; safe to call manually

    git gc --prune=now
    # Aggressively reclaim space; deletes recent unreachables (use with care)

    git gc --aggressive
    # Slow, exhaustive repacking — rarely worth it</code></pre>
    <h2>Common Mistakes</h2>
    <p><code>--prune=now</code> immediately deletes unreachable objects, possibly including ones still referenced by reflog or stash. Don't use it casually. Disabling automatic gc on a large repo lets loose objects accumulate; configure <code>maintenance</code> instead for newer Git.</p>
    <h2>Related Commands</h2>
    <p><code>git maintenance</code>, <code>git repack</code>, <code>git prune</code>, <code>git fsck</code></p>
- title: git fsck — Verify the connectivity and validity of objects
  section: Commands Reference
  difficulty: Advanced
  git_version: 2.30+
  weight: 640
  body: |
    <h2>Synopsis</h2>
    <pre><code>git fsck [--full] [--unreachable] [--dangling] [--lost-found]</code></pre>
    <h2>Description</h2>
    <p>The <code>git fsck</code> command validates the integrity of the object database: every commit, tree, blob, and tag is checked for correct hash, valid format, and intact references. It identifies dangling objects (no ref points to them, but they aren't unreachable from a reflog) and unreachable objects (truly orphaned).</p>
    <p>This is the tool of choice for diagnosing repository corruption (often after a disk failure or interrupted operation), and for finding "lost" commits in the dangling category that might be recoverable.</p>
    <p>In day-to-day use, <code>git fsck</code> integrates closely with shell aliases, editor plugins, and continuous integration. Power users often add aliases that combine flags they always pass, or wrap the command in scripts that enforce team conventions. Output formatting can be customized via Git config — pretty formats, color schemes, and pager behavior are all tunable. When something goes wrong, the first diagnostic step is usually to re-run the command with <code>GIT_TRACE=1</code> in the environment, which reveals the underlying plumbing calls. For unusual situations, the <code>--help</code> output (<code>git fsck --help</code>) opens the full manual page with details on every option, including those rarely used in casual workflows but essential for debugging or scripting at scale.</p><p>Understanding how <code>git fsck</code> interacts with the rest of Git's data model — the object database, the index, refs, and the working tree — pays dividends. Each command operates on some subset of these pieces, and knowing which it touches helps predict outcomes and recover from mistakes. Reading the official Git documentation alongside hands-on practice in a throwaway repository is the fastest way to internalize the nuances. Most production issues with Git stem from one of three causes: surprising default behavior, partial network operations, or rewriting history that was already shared. A working mental model of <code>git fsck</code>'s side effects helps avoid all three.</p>
        <h2>Common Options</h2>
    <table>
      <thead><tr><th>Option</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>--full</code></td><td>Check every object, including reachable ones.</td></tr>
        <tr><td><code>--unreachable</code></td><td>Report unreachable objects.</td></tr>
        <tr><td><code>--dangling</code></td><td>Report dangling objects (default).</td></tr>
        <tr><td><code>--no-dangling</code></td><td>Suppress dangling listing.</td></tr>
        <tr><td><code>--lost-found</code></td><td>Write dangling objects to <code>.git/lost-found/</code>.</td></tr>
        <tr><td><code>--connectivity-only</code></td><td>Skip blob content verification.</td></tr>
        <tr><td><code>--strict</code></td><td>Report extra warnings.</td></tr>
      </tbody>
    </table>
    <h2>Examples</h2>
    <pre><code>git fsck --full
    # Comprehensive check

    git fsck --lost-found
    # Materialize dangling commits/blobs into recoverable files

    git fsck --unreachable --no-reflogs
    # Find truly orphaned objects (ignoring reflog protection)

    git fsck --connectivity-only
    # Faster check that skips content hashing</code></pre>
    <h2>Common Mistakes</h2>
    <p>Acting on "unreachable" warnings without considering reflog protection can lose recoverable work. <code>fsck</code> is read-only; it never deletes anything itself. Errors found by <code>fsck</code> are often resolved by <code>git gc</code> or by re-cloning a fresh copy.</p>
    <h2>Related Commands</h2>
    <p><code>git gc</code>, <code>git reflog</code>, <code>git verify-pack</code>, <code>git prune</code></p>
- title: git prune — Prune all unreachable objects from the object database
  section: Commands Reference
  difficulty: Advanced
  git_version: 2.30+
  weight: 650
  body: |
    <h2>Synopsis</h2>
    <pre><code>git prune [-n] [--expire=&lt;date&gt;]</code></pre>
    <h2>Description</h2>
    <p>The <code>git prune</code> command deletes loose objects that aren't reachable from any ref. It is normally invoked indirectly by <code>git gc</code>; running it directly bypasses some of <code>gc</code>'s safety checks. The <code>--expire</code> grace period (default 2 weeks) prevents deleting recently created objects that may belong to in-progress operations.</p>
    <p>In day-to-day use, <code>git prune</code> integrates closely with shell aliases, editor plugins, and continuous integration. Power users often add aliases that combine flags they always pass, or wrap the command in scripts that enforce team conventions. Output formatting can be customized via Git config — pretty formats, color schemes, and pager behavior are all tunable. When something goes wrong, the first diagnostic step is usually to re-run the command with <code>GIT_TRACE=1</code> in the environment, which reveals the underlying plumbing calls. For unusual situations, the <code>--help</code> output (<code>git prune --help</code>) opens the full manual page with details on every option, including those rarely used in casual workflows but essential for debugging or scripting at scale.</p><p>Understanding how <code>git prune</code> interacts with the rest of Git's data model — the object database, the index, refs, and the working tree — pays dividends. Each command operates on some subset of these pieces, and knowing which it touches helps predict outcomes and recover from mistakes. Reading the official Git documentation alongside hands-on practice in a throwaway repository is the fastest way to internalize the nuances. Most production issues with Git stem from one of three causes: surprising default behavior, partial network operations, or rewriting history that was already shared. A working mental model of <code>git prune</code>'s side effects helps avoid all three.</p>
        <h2>When to Use</h2>
    <p>Most users never run <code>git prune</code> manually — <code>git gc</code> handles it. Reach for it only when <code>gc</code>'s defaults don't fit, or when you've explicitly purged history with <code>filter-repo</code> and want immediate space reclamation. Even then, <code>git gc --prune=now</code> is the more common path.</p>
    <h2>Common Options</h2>
    <table>
      <thead><tr><th>Option</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>-n</code>, <code>--dry-run</code></td><td>Show what would be deleted without deleting.</td></tr>
        <tr><td><code>--expire=&lt;date&gt;</code></td><td>Only prune objects older than this.</td></tr>
        <tr><td><code>--progress</code></td><td>Show progress.</td></tr>
        <tr><td><code>--verbose</code></td><td>Detail every object pruned.</td></tr>
      </tbody>
    </table>
    <h2>Examples</h2>
    <pre><code>git prune -n
    # Preview prune

    git prune --expire=now
    # Aggressive: delete all unreachables right now

    git prune --expire=2.weeks.ago
    # Default behavior: keep recent unreachables</code></pre>
    <h2>Common Mistakes</h2>
    <p><code>git prune --expire=now</code> can delete objects that are still in the reflog or stash if you've recently expired them. Always run <code>git fsck</code> first to understand what's at risk. On a busy repo, prune while a fetch or rebase is happening can cause issues.</p>
    <h2>Related Commands</h2>
    <p><code>git gc</code>, <code>git fsck</code>, <code>git reflog expire</code>, <code>git repack</code></p>
- title: git repack — Pack unpacked objects in a repository
  section: Commands Reference
  difficulty: Advanced
  git_version: 2.30+
  weight: 660
  body: |
    <h2>Synopsis</h2>
    <pre><code>git repack [-a] [-d] [-l] [--depth=&lt;n&gt;] [--window=&lt;n&gt;]</code></pre>
    <h2>Description</h2>
    <p>The <code>git repack</code> command repackages the repository's objects, combining multiple packs into one and optionally moving loose objects into packs. It's the primary way Git stays compact. <code>git gc</code> calls <code>repack</code> as part of its work; manual <code>repack</code> exposes finer control over delta search parameters.</p>
    <p>In day-to-day use, <code>git repack</code> integrates closely with shell aliases, editor plugins, and continuous integration. Power users often add aliases that combine flags they always pass, or wrap the command in scripts that enforce team conventions. Output formatting can be customized via Git config — pretty formats, color schemes, and pager behavior are all tunable. When something goes wrong, the first diagnostic step is usually to re-run the command with <code>GIT_TRACE=1</code> in the environment, which reveals the underlying plumbing calls. For unusual situations, the <code>--help</code> output (<code>git repack --help</code>) opens the full manual page with details on every option, including those rarely used in casual workflows but essential for debugging or scripting at scale.</p><p>Understanding how <code>git repack</code> interacts with the rest of Git's data model — the object database, the index, refs, and the working tree — pays dividends. Each command operates on some subset of these pieces, and knowing which it touches helps predict outcomes and recover from mistakes. Reading the official Git documentation alongside hands-on practice in a throwaway repository is the fastest way to internalize the nuances. Most production issues with Git stem from one of three causes: surprising default behavior, partial network operations, or rewriting history that was already shared. A working mental model of <code>git repack</code>'s side effects helps avoid all three.</p>
        <h2>When to Use</h2>
    <p>Most users rely on <code>gc</code>. Reach for <code>repack</code> directly when tuning storage on a server (large repos benefit from custom <code>--depth</code>, <code>--window</code>) or when investigating storage layout.</p>
    <h2>Common Options</h2>
    <table>
      <thead><tr><th>Option</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>-a</code></td><td>Pack everything reachable into a single pack.</td></tr>
        <tr><td><code>-A</code></td><td>Like <code>-a</code> but keep unreachables loose.</td></tr>
        <tr><td><code>-d</code></td><td>Delete redundant packs after repacking.</td></tr>
        <tr><td><code>-l</code></td><td>Pass <code>--local</code> to <code>pack-objects</code>.</td></tr>
        <tr><td><code>--depth=&lt;n&gt;</code></td><td>Maximum delta chain depth.</td></tr>
        <tr><td><code>--window=&lt;n&gt;</code></td><td>Window size for delta selection.</td></tr>
        <tr><td><code>-k</code>, <code>--keep-pack=&lt;name&gt;</code></td><td>Keep the named pack untouched.</td></tr>
      </tbody>
    </table>
    <h2>Examples</h2>
    <pre><code>git repack -ad
    # Single pack, drop redundant ones

    git repack -a -d --depth=50 --window=250
    # Tighter packing for storage savings (slower)

    git repack -A -d
    # Keep unreachables loose for safety</code></pre>
    <h2>Common Mistakes</h2>
    <p>Aggressive parameters consume RAM and CPU disproportionate to space saved. Default values are tuned reasonably. Forgetting <code>-d</code> after <code>-a</code> leaves duplicate packs.</p>
    <h2>Related Commands</h2>
    <p><code>git gc</code>, <code>git pack-objects</code>, <code>git verify-pack</code>, <code>git prune</code></p>
- title: git maintenance — Run tasks to optimize Git repository data
  section: Commands Reference
  difficulty: Intermediate
  git_version: 2.30+
  weight: 670
  body: |
    <h2>Synopsis</h2>
    <pre><code>git maintenance start
    git maintenance run [--task=&lt;task&gt;]
    git maintenance stop</code></pre>
    <h2>Description</h2>
    <p>The <code>git maintenance</code> command, introduced in Git 2.29, replaces and extends <code>git gc --auto</code> with scheduled, fine-grained maintenance tasks: prefetch, commit-graph generation, loose-object packing, incremental repack, and pack-refs. Running <code>git maintenance start</code> registers a recurring schedule via cron, launchd, systemd, or Task Scheduler depending on platform.</p>
    <p>For server-side or long-lived clones of large repositories, enabling maintenance dramatically improves day-to-day responsiveness. Operations like <code>git status</code> and <code>git log</code> become faster as the commit-graph and reachable-bitmap data are kept fresh.</p>
    <p>In day-to-day use, <code>git maintenance</code> integrates closely with shell aliases, editor plugins, and continuous integration. Power users often add aliases that combine flags they always pass, or wrap the command in scripts that enforce team conventions. Output formatting can be customized via Git config — pretty formats, color schemes, and pager behavior are all tunable. When something goes wrong, the first diagnostic step is usually to re-run the command with <code>GIT_TRACE=1</code> in the environment, which reveals the underlying plumbing calls. For unusual situations, the <code>--help</code> output (<code>git maintenance --help</code>) opens the full manual page with details on every option, including those rarely used in casual workflows but essential for debugging or scripting at scale.</p><p>Understanding how <code>git maintenance</code> interacts with the rest of Git's data model — the object database, the index, refs, and the working tree — pays dividends. Each command operates on some subset of these pieces, and knowing which it touches helps predict outcomes and recover from mistakes. Reading the official Git documentation alongside hands-on practice in a throwaway repository is the fastest way to internalize the nuances. Most production issues with Git stem from one of three causes: surprising default behavior, partial network operations, or rewriting history that was already shared. A working mental model of <code>git maintenance</code>'s side effects helps avoid all three.</p>
        <h2>Common Options</h2>
    <table>
      <thead><tr><th>Subcommand / Option</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>start</code></td><td>Register a background schedule.</td></tr>
        <tr><td><code>stop</code></td><td>Unregister the schedule.</td></tr>
        <tr><td><code>run</code></td><td>Run tasks immediately.</td></tr>
        <tr><td><code>--task=&lt;task&gt;</code></td><td>Run only this task (commit-graph, prefetch, etc.).</td></tr>
        <tr><td><code>register</code> / <code>unregister</code></td><td>Add or remove repo from the maintenance set.</td></tr>
        <tr><td><code>--schedule=&lt;freq&gt;</code></td><td>Frequency: hourly, daily, weekly.</td></tr>
      </tbody>
    </table>
    <h2>Examples</h2>
    <pre><code>git maintenance start
    # Set up background maintenance for this repo

    git maintenance run --task=commit-graph
    # Update the commit-graph on demand

    git maintenance run --task=prefetch
    # Fetch upstream objects without updating refs

    git maintenance unregister
    # Stop scheduled maintenance for this repo</code></pre>
    <h2>Common Mistakes</h2>
    <p>Forgetting that <code>start</code> registers a system-wide scheduled task. On shared machines, this might not be what you want; use <code>register</code> in a config file instead. Disabling automatic gc but not enabling maintenance leaves the repo to grow unchecked.</p>
    <h2>Related Commands</h2>
    <p><code>git gc</code>, <code>git commit-graph</code>, <code>git fetch --prefetch</code>, <code>git repack</code></p>
- title: git pack-refs — Pack heads and tags for efficient repository access
  section: Commands Reference
  difficulty: Advanced
  git_version: 2.30+
  weight: 680
  body: |
    <h2>Synopsis</h2>
    <pre><code>git pack-refs [--all] [--no-prune]</code></pre>
    <h2>Description</h2>
    <p>The <code>git pack-refs</code> command consolidates many individual ref files (one per branch/tag in <code>.git/refs/</code>) into a single <code>.git/packed-refs</code> file. This is faster on filesystems where opening many small files is slow (older Windows, networked filesystems), and reduces filesystem load for repos with thousands of refs.</p>
    <p>In day-to-day use, <code>git pack-refs</code> integrates closely with shell aliases, editor plugins, and continuous integration. Power users often add aliases that combine flags they always pass, or wrap the command in scripts that enforce team conventions. Output formatting can be customized via Git config — pretty formats, color schemes, and pager behavior are all tunable. When something goes wrong, the first diagnostic step is usually to re-run the command with <code>GIT_TRACE=1</code> in the environment, which reveals the underlying plumbing calls. For unusual situations, the <code>--help</code> output (<code>git pack-refs --help</code>) opens the full manual page with details on every option, including those rarely used in casual workflows but essential for debugging or scripting at scale.</p><p>Understanding how <code>git pack-refs</code> interacts with the rest of Git's data model — the object database, the index, refs, and the working tree — pays dividends. Each command operates on some subset of these pieces, and knowing which it touches helps predict outcomes and recover from mistakes. Reading the official Git documentation alongside hands-on practice in a throwaway repository is the fastest way to internalize the nuances. Most production issues with Git stem from one of three causes: surprising default behavior, partial network operations, or rewriting history that was already shared. A working mental model of <code>git pack-refs</code>'s side effects helps avoid all three.</p>
        <h2>When to Use</h2>
    <p>Most repos don't need manual pack-refs — <code>git gc</code> runs it as part of maintenance. Reach for it directly when scripting performance optimizations on huge ref sets.</p>
    <h2>Common Options</h2>
    <table>
      <thead><tr><th>Option</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>--all</code></td><td>Pack all refs (default packs only branches and tags).</td></tr>
        <tr><td><code>--no-prune</code></td><td>Don't remove individual ref files after packing.</td></tr>
      </tbody>
    </table>
    <h2>Examples</h2>
    <pre><code>git pack-refs --all
    # Pack every ref into packed-refs

    ls .git/refs/heads/ | wc -l
    # After packing, individual files are removed

    git pack-refs
    # Default: pack branches and tags</code></pre>
    <h2>Common Mistakes</h2>
    <p>Editing <code>packed-refs</code> by hand can corrupt the repository — use <code>git update-ref</code>. After <code>pack-refs</code>, scripts that look for individual files in <code>.git/refs/heads/</code> fail. Use <code>git for-each-ref</code> for a portable lookup. <code>git help pack-refs</code> opens the full manual page with comprehensive coverage of every option and edge case; it remains the authoritative reference whenever the summary on this page leaves a question unanswered. For team workflows, capturing how your project uses this command in a CONTRIBUTING document avoids repeated onboarding questions and keeps everyone aligned on conventions.</p>
    <h2>Related Commands</h2>
    <p><code>git gc</code>, <code>git update-ref</code>, <code>git for-each-ref</code>, <code>git maintenance</code></p>
- title: git am — Apply a series of patches from a mailbox
  section: Commands Reference
  difficulty: Advanced
  git_version: 2.30+
  weight: 690
  body: |
    <h2>Synopsis</h2>
    <pre><code>git am [--3way] [--abort] [--continue] [--skip] &lt;mbox&gt;...</code></pre>
    <h2>Description</h2>
    <p>The <code>git am</code> command applies patches from a mailbox file — the kind produced by <code>git format-patch</code> or generated by emailing a diff. Unlike <code>git apply</code>, which only applies the diff content, <code>git am</code> recreates each patch as a commit, preserving the author, date, message, and other metadata embedded in the email.</p>
    <p>This is the foundation of the email-based contribution workflow used by the Linux kernel and other projects: maintainers receive patches via email, save them to a mailbox, and apply them with <code>git am</code>. The result is exactly the same series of commits the author created.</p>
    <p>In day-to-day use, <code>git am</code> integrates closely with shell aliases, editor plugins, and continuous integration. Power users often add aliases that combine flags they always pass, or wrap the command in scripts that enforce team conventions. Output formatting can be customized via Git config — pretty formats, color schemes, and pager behavior are all tunable. When something goes wrong, the first diagnostic step is usually to re-run the command with <code>GIT_TRACE=1</code> in the environment, which reveals the underlying plumbing calls. For unusual situations, the <code>--help</code> output (<code>git am --help</code>) opens the full manual page with details on every option, including those rarely used in casual workflows but essential for debugging or scripting at scale.</p><p>Understanding how <code>git am</code> interacts with the rest of Git's data model — the object database, the index, refs, and the working tree — pays dividends. Each command operates on some subset of these pieces, and knowing which it touches helps predict outcomes and recover from mistakes. Reading the official Git documentation alongside hands-on practice in a throwaway repository is the fastest way to internalize the nuances. Most production issues with Git stem from one of three causes: surprising default behavior, partial network operations, or rewriting history that was already shared. A working mental model of <code>git am</code>'s side effects helps avoid all three.</p>
        <h2>Common Options</h2>
    <table>
      <thead><tr><th>Option</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>--3way</code></td><td>Fall back to three-way merge if patch doesn't apply cleanly.</td></tr>
        <tr><td><code>--abort</code></td><td>Cancel an in-progress am.</td></tr>
        <tr><td><code>--continue</code> / <code>--resolved</code></td><td>Continue after fixing conflicts.</td></tr>
        <tr><td><code>--skip</code></td><td>Skip the current patch.</td></tr>
        <tr><td><code>-s</code>, <code>--signoff</code></td><td>Add Signed-off-by trailer.</td></tr>
        <tr><td><code>-k</code></td><td>Pass <code>-k</code> to <code>mailinfo</code> (keep subject).</td></tr>
        <tr><td><code>--whitespace=&lt;action&gt;</code></td><td>Handle whitespace errors.</td></tr>
      </tbody>
    </table>
    <h2>Examples</h2>
    <pre><code>git am patches/*.patch
    # Apply a series of format-patch outputs

    git am --3way --signoff incoming.mbox
    # Three-way merge fallback, add sign-off lines

    git am --abort
    # Cancel after a hopeless conflict

    curl -L https://lore.kernel.org/.../t.mbox.gz | gunzip | git am --3way
    # Apply patches downloaded from a public list</code></pre>
    <h2>Common Mistakes</h2>
    <p>Forgetting <code>--3way</code> when patches were generated against a slightly different base often causes failures that <code>--3way</code> would handle. After resolving a conflict, run <code>git am --continue</code>, NOT <code>git commit</code>. Plain <code>commit</code> creates a malformed state.</p>
    <h2>Related Commands</h2>
    <p><code>git apply</code>, <code>git format-patch</code>, <code>git send-email</code>, <code>git mailinfo</code></p>
- title: git format-patch — Prepare patches for email submission
  section: Commands Reference
  difficulty: Advanced
  git_version: 2.30+
  weight: 700
  body: |
    <h2>Synopsis</h2>
    <pre><code>git format-patch [&lt;options&gt;] &lt;range&gt;
    git format-patch -1 &lt;commit&gt;</code></pre>
    <h2>Description</h2>
    <p>The <code>git format-patch</code> command produces one mailbox-formatted patch file per commit in a range, ready to be applied with <code>git am</code> or sent with <code>git send-email</code>. Each patch includes the commit message, author, date, and the diff. Patches are numbered (<code>0001-...</code>, <code>0002-...</code>) so they apply in order.</p>
    <p>This is the format the Linux kernel and many open source projects use for code review on mailing lists. Even projects that use pull requests sometimes accept patches via email, and <code>format-patch</code> is the standard producer.</p>
    <p>In day-to-day use, <code>git format-patch</code> integrates closely with shell aliases, editor plugins, and continuous integration. Power users often add aliases that combine flags they always pass, or wrap the command in scripts that enforce team conventions. Output formatting can be customized via Git config — pretty formats, color schemes, and pager behavior are all tunable. When something goes wrong, the first diagnostic step is usually to re-run the command with <code>GIT_TRACE=1</code> in the environment, which reveals the underlying plumbing calls. For unusual situations, the <code>--help</code> output (<code>git format-patch --help</code>) opens the full manual page with details on every option, including those rarely used in casual workflows but essential for debugging or scripting at scale.</p><p>Understanding how <code>git format-patch</code> interacts with the rest of Git's data model — the object database, the index, refs, and the working tree — pays dividends. Each command operates on some subset of these pieces, and knowing which it touches helps predict outcomes and recover from mistakes. Reading the official Git documentation alongside hands-on practice in a throwaway repository is the fastest way to internalize the nuances. Most production issues with Git stem from one of three causes: surprising default behavior, partial network operations, or rewriting history that was already shared. A working mental model of <code>git format-patch</code>'s side effects helps avoid all three.</p>
        <h2>Common Options</h2>
    <table>
      <thead><tr><th>Option</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>-&lt;n&gt;</code></td><td>Generate patches for the last <code>n</code> commits.</td></tr>
        <tr><td><code>-o &lt;dir&gt;</code></td><td>Write patches to a directory.</td></tr>
        <tr><td><code>--cover-letter</code></td><td>Generate a 0000 cover letter for the series.</td></tr>
        <tr><td><code>-v &lt;n&gt;</code>, <code>--reroll-count=&lt;n&gt;</code></td><td>Mark patches as the n-th iteration.</td></tr>
        <tr><td><code>--subject-prefix=&lt;prefix&gt;</code></td><td>Custom subject prefix (default <code>PATCH</code>).</td></tr>
        <tr><td><code>--to=&lt;addr&gt;</code> / <code>--cc=&lt;addr&gt;</code></td><td>Add recipients in headers.</td></tr>
        <tr><td><code>--thread</code></td><td>Add In-Reply-To headers.</td></tr>
      </tbody>
    </table>
    <h2>Examples</h2>
    <pre><code>git format-patch -3
    # Patches for the last 3 commits, in CWD

    git format-patch -o ../patches main..feature
    # Patches from main to feature, into ../patches/

    git format-patch --cover-letter -v2 origin/main
    # Versioned series with a cover letter

    git format-patch --subject-prefix="PATCH myproj" -1 HEAD
    # Custom subject for a project-specific list</code></pre>
    <h2>Common Mistakes</h2>
    <p>Generating patches against the wrong base produces apply failures for reviewers — pick the right upstream. Without <code>--cover-letter</code>, a multi-patch series has no introduction; reviewers appreciate one. Reroll without <code>-v</code> creates ambiguity about which version is being reviewed.</p>
    <h2>Related Commands</h2>
    <p><code>git am</code>, <code>git send-email</code>, <code>git request-pull</code>, <code>git range-diff</code></p>
- title: git request-pull — Generate a summary of pending changes
  section: Commands Reference
  difficulty: Advanced
  git_version: 2.30+
  weight: 710
  body: |
    <h2>Synopsis</h2>
    <pre><code>git request-pull [-p] &lt;start&gt; &lt;url&gt; [&lt;end&gt;]</code></pre>
    <h2>Description</h2>
    <p>The <code>git request-pull</code> command generates a textual summary asking an upstream maintainer to pull changes from your repository. The output includes a list of commits in the range, a diffstat, the URL and ref to pull from, and (if applicable) the SHA of the tagged version. It's the standard way to send a pull request via email on mailing-list-driven projects.</p>
    <p>This is unrelated to GitHub/GitLab pull requests — it predates them. The output is meant to be pasted into an email to the upstream maintainer.</p>
    <p>In day-to-day use, <code>git request-pull</code> integrates closely with shell aliases, editor plugins, and continuous integration. Power users often add aliases that combine flags they always pass, or wrap the command in scripts that enforce team conventions. Output formatting can be customized via Git config — pretty formats, color schemes, and pager behavior are all tunable. When something goes wrong, the first diagnostic step is usually to re-run the command with <code>GIT_TRACE=1</code> in the environment, which reveals the underlying plumbing calls. For unusual situations, the <code>--help</code> output (<code>git request-pull --help</code>) opens the full manual page with details on every option, including those rarely used in casual workflows but essential for debugging or scripting at scale.</p><p>Understanding how <code>git request-pull</code> interacts with the rest of Git's data model — the object database, the index, refs, and the working tree — pays dividends. Each command operates on some subset of these pieces, and knowing which it touches helps predict outcomes and recover from mistakes. Reading the official Git documentation alongside hands-on practice in a throwaway repository is the fastest way to internalize the nuances. Most production issues with Git stem from one of three causes: surprising default behavior, partial network operations, or rewriting history that was already shared. A working mental model of <code>git request-pull</code>'s side effects helps avoid all three.</p>
        <h2>Common Options</h2>
    <table>
      <thead><tr><th>Option</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>-p</code></td><td>Include the full patch in the output.</td></tr>
      </tbody>
    </table>
    <h2>Examples</h2>
    <pre><code>git request-pull v1.0 https://github.com/me/proj.git my-feature
    # Summary asking to pull my-feature from my fork

    git request-pull origin/main https://example.com/me/proj.git HEAD
    # Pull request based on what's ahead of upstream main

    git request-pull -p v2.0 git@my.server:proj.git release-2.1 | mail -s "Pull request" maintainer@example.com
    # Email a pull request with full patch</code></pre>
    <h2>Common Mistakes</h2>
    <p>Specifying the wrong start point makes the diff range nonsensical. Run <code>git log</code> first to confirm the range. The remote URL must be accessible to the maintainer; private URLs produce useless requests.</p>
    <h2>Related Commands</h2>
    <p><code>git format-patch</code>, <code>git send-email</code>, <code>git tag</code>, <code>git log</code></p>
- title: git send-email — Send a collection of patches as emails
  section: Commands Reference
  difficulty: Advanced
  git_version: 2.30+
  weight: 720
  body: |
    <h2>Synopsis</h2>
    <pre><code>git send-email [--to &lt;addr&gt;] [--cc &lt;addr&gt;] [--cover-letter] &lt;patch-or-dir&gt;...</code></pre>
    <h2>Description</h2>
    <p>The <code>git send-email</code> command sends one or more patches via SMTP, each as a properly threaded email. It is the canonical tool for submitting patches to mailing-list-driven projects (Linux kernel, Git itself, U-Boot, etc.). It can read SMTP credentials from your Git config, prompt for them interactively, or use authentication files.</p>
    <p>Patches are sent in order, with <code>In-Reply-To</code> headers connecting them into a single thread. The cover letter (if present) is sent first as the parent of the thread.</p>
    <p>In day-to-day use, <code>git send-email</code> integrates closely with shell aliases, editor plugins, and continuous integration. Power users often add aliases that combine flags they always pass, or wrap the command in scripts that enforce team conventions. Output formatting can be customized via Git config — pretty formats, color schemes, and pager behavior are all tunable. When something goes wrong, the first diagnostic step is usually to re-run the command with <code>GIT_TRACE=1</code> in the environment, which reveals the underlying plumbing calls. For unusual situations, the <code>--help</code> output (<code>git send-email --help</code>) opens the full manual page with details on every option, including those rarely used in casual workflows but essential for debugging or scripting at scale.</p><p>Understanding how <code>git send-email</code> interacts with the rest of Git's data model — the object database, the index, refs, and the working tree — pays dividends. Each command operates on some subset of these pieces, and knowing which it touches helps predict outcomes and recover from mistakes. Reading the official Git documentation alongside hands-on practice in a throwaway repository is the fastest way to internalize the nuances. Most production issues with Git stem from one of three causes: surprising default behavior, partial network operations, or rewriting history that was already shared. A working mental model of <code>git send-email</code>'s side effects helps avoid all three.</p>
        <h2>Common Options</h2>
    <table>
      <thead><tr><th>Option</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>--to=&lt;addr&gt;</code></td><td>Primary recipient.</td></tr>
        <tr><td><code>--cc=&lt;addr&gt;</code></td><td>Carbon copy.</td></tr>
        <tr><td><code>--smtp-server=&lt;host&gt;</code></td><td>SMTP server (or sendmail path).</td></tr>
        <tr><td><code>--smtp-user=&lt;user&gt;</code></td><td>SMTP username.</td></tr>
        <tr><td><code>--annotate</code></td><td>Allow editing each patch before sending.</td></tr>
        <tr><td><code>--dry-run</code></td><td>Show what would be sent.</td></tr>
        <tr><td><code>--in-reply-to=&lt;message-id&gt;</code></td><td>Thread under an existing message.</td></tr>
        <tr><td><code>--confirm=&lt;mode&gt;</code></td><td>Confirmation behavior (always, never, cc).</td></tr>
      </tbody>
    </table>
    <h2>Examples</h2>
    <pre><code>git send-email --to=devs@example.org *.patch
    # Send all patches in CWD to a list

    git send-email --cover-letter --to=git@vger.kernel.org \
      --cc=maintainer@example.com 0001-*.patch
    # Series with cover letter, primary + cc

    git send-email --dry-run --annotate -1 HEAD
    # Preview a single patch without sending

    git config --global sendemail.smtpServer smtp.gmail.com
    git config --global sendemail.smtpServerPort 587
    git config --global sendemail.smtpEncryption tls
    # One-time SMTP configuration</code></pre>
    <h2>Common Mistakes</h2>
    <p>Many corporate SMTP servers block plain SMTP — use TLS or app-specific passwords. Forgetting <code>--cover-letter</code> when sending a multi-patch series leaves reviewers without context. Sending a re-roll without <code>--in-reply-to</code> the original cover letter fragments the discussion.</p>
    <h2>Related Commands</h2>
    <p><code>git format-patch</code>, <code>git am</code>, <code>git request-pull</code>, <code>git config</code></p>
- title: git instaweb — Instantly browse your repository in gitweb
  section: Commands Reference
  difficulty: Intermediate
  git_version: 2.30+
  weight: 730
  body: |
    <h2>Synopsis</h2>
    <pre><code>git instaweb [--httpd=&lt;daemon&gt;] [--port=&lt;n&gt;] [--start | --stop | --restart]</code></pre>
    <h2>Description</h2>
    <p>The <code>git instaweb</code> command spins up a local web server (lighttpd, Apache, webrick, or Python's <code>http.server</code>) hosting the gitweb interface for the current repository. It opens a browser pointing at it, giving you a quick web UI for browsing history, files, and diffs without any setup.</p>
    <p>Despite being a command in core Git, gitweb itself is older Perl-based software and isn't always installed by default on modern distros. Many users now prefer running a local instance of cgit, gitea, or simply browsing on a hosted forge.</p>
    <p>In day-to-day use, <code>git instaweb</code> integrates closely with shell aliases, editor plugins, and continuous integration. Power users often add aliases that combine flags they always pass, or wrap the command in scripts that enforce team conventions. Output formatting can be customized via Git config — pretty formats, color schemes, and pager behavior are all tunable. When something goes wrong, the first diagnostic step is usually to re-run the command with <code>GIT_TRACE=1</code> in the environment, which reveals the underlying plumbing calls. For unusual situations, the <code>--help</code> output (<code>git instaweb --help</code>) opens the full manual page with details on every option, including those rarely used in casual workflows but essential for debugging or scripting at scale.</p><p>Understanding how <code>git instaweb</code> interacts with the rest of Git's data model — the object database, the index, refs, and the working tree — pays dividends. Each command operates on some subset of these pieces, and knowing which it touches helps predict outcomes and recover from mistakes. Reading the official Git documentation alongside hands-on practice in a throwaway repository is the fastest way to internalize the nuances. Most production issues with Git stem from one of three causes: surprising default behavior, partial network operations, or rewriting history that was already shared. A working mental model of <code>git instaweb</code>'s side effects helps avoid all three.</p>
        <h2>Common Options</h2>
    <table>
      <thead><tr><th>Option</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>--httpd=&lt;daemon&gt;</code></td><td>Web server to use.</td></tr>
        <tr><td><code>--port=&lt;n&gt;</code></td><td>Port to listen on (default 1234).</td></tr>
        <tr><td><code>--start</code></td><td>Start the server.</td></tr>
        <tr><td><code>--stop</code></td><td>Stop the server.</td></tr>
        <tr><td><code>--restart</code></td><td>Restart it.</td></tr>
        <tr><td><code>--browser=&lt;cmd&gt;</code></td><td>Browser to open.</td></tr>
      </tbody>
    </table>
    <h2>Examples</h2>
    <pre><code>git instaweb --httpd=webrick
    # Start gitweb backed by Ruby's WEBrick

    git instaweb --port=8080 --start
    # On a custom port

    git instaweb --stop
    # Tear down

    git config --global instaweb.httpd webrick
    # Save default for future invocations</code></pre>
    <h2>Common Mistakes</h2>
    <p>Missing dependencies (Perl modules for gitweb, the chosen httpd) cause cryptic errors. Some distros ship gitweb in a separate package. For modern needs, consider <code>cgit</code> or hosted services.</p>
    <h2>Related Commands</h2>
    <p><code>gitweb</code>, <code>git daemon</code>, <code>git http-backend</code>, <code>git config</code></p>
- title: git add -p — Interactive patch staging
  section: Commands Reference
  difficulty: Intermediate
  git_version: 2.30+
  weight: 740
  body: |
    <h2>Synopsis</h2>
    <pre><code>git add -p [&lt;path&gt;...]
    git add --patch [&lt;path&gt;...]</code></pre>
    <h2>Description</h2>
    <p>The <code>git add -p</code> command launches an interactive interface that walks through each "hunk" of changes in your working tree, asking you to decide for each: stage, skip, split, edit, etc. This is the secret weapon for crafting clean, atomic commits when your working tree contains a mixture of related and unrelated changes.</p>
    <p>The interactive prompt accepts single-letter commands: <code>y</code> (yes, stage this hunk), <code>n</code> (no, skip), <code>s</code> (split into smaller hunks), <code>e</code> (edit the hunk manually), <code>q</code> (quit), <code>?</code> (help), and several others. Mastering <code>add -p</code> is one of the highest-leverage skills for producing reviewable history.</p>
    <p>In day-to-day use, <code>git add -p</code> integrates closely with shell aliases, editor plugins, and continuous integration. Power users often add aliases that combine flags they always pass, or wrap the command in scripts that enforce team conventions. Output formatting can be customized via Git config — pretty formats, color schemes, and pager behavior are all tunable. When something goes wrong, the first diagnostic step is usually to re-run the command with <code>GIT_TRACE=1</code> in the environment, which reveals the underlying plumbing calls. For unusual situations, the <code>--help</code> output (<code>git add -p --help</code>) opens the full manual page with details on every option, including those rarely used in casual workflows but essential for debugging or scripting at scale.</p><p>Understanding how <code>git add -p</code> interacts with the rest of Git's data model — the object database, the index, refs, and the working tree — pays dividends. Each command operates on some subset of these pieces, and knowing which it touches helps predict outcomes and recover from mistakes. Reading the official Git documentation alongside hands-on practice in a throwaway repository is the fastest way to internalize the nuances. Most production issues with Git stem from one of three causes: surprising default behavior, partial network operations, or rewriting history that was already shared. A working mental model of <code>git add -p</code>'s side effects helps avoid all three.</p>
        <h2>Common Options</h2>
    <table>
      <thead><tr><th>Interactive command</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>y</code></td><td>Stage this hunk.</td></tr>
        <tr><td><code>n</code></td><td>Don't stage this hunk.</td></tr>
        <tr><td><code>s</code></td><td>Split into smaller hunks.</td></tr>
        <tr><td><code>e</code></td><td>Manually edit the hunk.</td></tr>
        <tr><td><code>a</code></td><td>Stage this and all remaining hunks in this file.</td></tr>
        <tr><td><code>d</code></td><td>Skip this and all remaining hunks in this file.</td></tr>
        <tr><td><code>q</code></td><td>Quit; don't stage further hunks.</td></tr>
        <tr><td><code>?</code></td><td>Show help.</td></tr>
      </tbody>
    </table>
    <h2>Examples</h2>
    <pre><code>git add -p
    # Walk through every changed file's hunks

    git add -p src/auth.go
    # Restrict to one file

    # Inside the prompt:
    # Press 's' to split a large hunk into smaller ones
    # Press 'e' to manually edit the hunk text
    # Press 'y' or 'n' to accept or skip

    git diff --cached
    # Review what's now staged</code></pre>
    <h2>Common Mistakes</h2>
    <p>Editing a hunk with <code>e</code> requires understanding the unified diff format — adding a line means the new file has it, removing a context line means the new file lacks it. Mistakes here can produce confusing index state. Always verify with <code>git diff --cached</code> after.</p>
    <h2>Related Commands</h2>
    <p><code>git add</code>, <code>git stash -p</code>, <code>git restore -p</code>, <code>git checkout -p</code></p>
- title: git update-index — Register file contents in the working tree to the index
  section: Commands Reference
  difficulty: Advanced
  git_version: 2.30+
  weight: 750
  body: |
    <h2>Synopsis</h2>
    <pre><code>git update-index [--add] [--remove] [--refresh] [--assume-unchanged] &lt;file&gt;...</code></pre>
    <h2>Description</h2>
    <p>The <code>git update-index</code> command is the plumbing behind <code>git add</code>. It records file contents in the index by SHA, manages flags like <code>assume-unchanged</code> and <code>skip-worktree</code>, and updates index timestamps. Most porcelain operations call into it.</p>
    <p>In day-to-day use, <code>git update-index</code> integrates closely with shell aliases, editor plugins, and continuous integration. Power users often add aliases that combine flags they always pass, or wrap the command in scripts that enforce team conventions. Output formatting can be customized via Git config — pretty formats, color schemes, and pager behavior are all tunable. When something goes wrong, the first diagnostic step is usually to re-run the command with <code>GIT_TRACE=1</code> in the environment, which reveals the underlying plumbing calls. For unusual situations, the <code>--help</code> output (<code>git update-index --help</code>) opens the full manual page with details on every option, including those rarely used in casual workflows but essential for debugging or scripting at scale.</p><p>Understanding how <code>git update-index</code> interacts with the rest of Git's data model — the object database, the index, refs, and the working tree — pays dividends. Each command operates on some subset of these pieces, and knowing which it touches helps predict outcomes and recover from mistakes. Reading the official Git documentation alongside hands-on practice in a throwaway repository is the fastest way to internalize the nuances. Most production issues with Git stem from one of three causes: surprising default behavior, partial network operations, or rewriting history that was already shared. A working mental model of <code>git update-index</code>'s side effects helps avoid all three.</p>
        <h2>When to Use</h2>
    <p>Most users never need this directly. Reach for it when you want behaviors not exposed by porcelain: marking a file as <code>assume-unchanged</code> to avoid noisy <code>status</code> output for a config file you intentionally modify locally; or <code>skip-worktree</code> for sparse-checkout-like scenarios.</p>
    <h2>Common Options</h2>
    <table>
      <thead><tr><th>Option</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>--add</code></td><td>Add files not yet in the index.</td></tr>
        <tr><td><code>--remove</code></td><td>Remove files from the index.</td></tr>
        <tr><td><code>--refresh</code></td><td>Refresh stat info without changing content.</td></tr>
        <tr><td><code>--assume-unchanged</code></td><td>Tell Git not to check this file for changes.</td></tr>
        <tr><td><code>--no-assume-unchanged</code></td><td>Reverse the flag.</td></tr>
        <tr><td><code>--skip-worktree</code></td><td>Make Git ignore working-tree changes.</td></tr>
        <tr><td><code>--chmod=(+|-)x</code></td><td>Change executable bit.</td></tr>
        <tr><td><code>--cacheinfo &lt;mode&gt; &lt;sha&gt; &lt;path&gt;</code></td><td>Manually splice an entry into the index.</td></tr>
      </tbody>
    </table>
    <h2>Examples</h2>
    <pre><code>git update-index --assume-unchanged config/local.yml
    # Stop tracking local edits to a config file

    git update-index --no-assume-unchanged config/local.yml
    # Resume normal tracking

    git update-index --chmod=+x scripts/deploy.sh
    # Mark a script executable in the index

    git update-index --refresh
    # Refresh stat info; useful after touching files</code></pre>
    <h2>Common Mistakes</h2>
    <p><code>--assume-unchanged</code> is meant as a performance optimization, not as <code>.gitignore</code> for already-tracked files. If teammates need the file unchanged, use a config-template approach instead. Misuse causes bugs where tracked changes go unnoticed.</p>
    <h2>Related Commands</h2>
    <p><code>git add</code>, <code>git rm</code>, <code>git ls-files</code>, <code>git read-tree</code></p>
- title: git read-tree — Read tree information into the index
  section: Commands Reference
  difficulty: Advanced
  git_version: 2.30+
  weight: 760
  body: |
    <h2>Synopsis</h2>
    <pre><code>git read-tree [-m | -u | --reset] &lt;tree-ish&gt;...</code></pre>
    <h2>Description</h2>
    <p>The <code>git read-tree</code> command loads tree contents into the index. Variants support merging up to three trees (a base, ours, theirs) for use during merges. <code>git checkout</code>, <code>git merge</code>, and <code>git reset</code> all use <code>read-tree</code> internally.</p>
    <p>In day-to-day use, <code>git read-tree</code> integrates closely with shell aliases, editor plugins, and continuous integration. Power users often add aliases that combine flags they always pass, or wrap the command in scripts that enforce team conventions. Output formatting can be customized via Git config — pretty formats, color schemes, and pager behavior are all tunable. When something goes wrong, the first diagnostic step is usually to re-run the command with <code>GIT_TRACE=1</code> in the environment, which reveals the underlying plumbing calls. For unusual situations, the <code>--help</code> output (<code>git read-tree --help</code>) opens the full manual page with details on every option, including those rarely used in casual workflows but essential for debugging or scripting at scale.</p><p>Understanding how <code>git read-tree</code> interacts with the rest of Git's data model — the object database, the index, refs, and the working tree — pays dividends. Each command operates on some subset of these pieces, and knowing which it touches helps predict outcomes and recover from mistakes. Reading the official Git documentation alongside hands-on practice in a throwaway repository is the fastest way to internalize the nuances. Most production issues with Git stem from one of three causes: surprising default behavior, partial network operations, or rewriting history that was already shared. A working mental model of <code>git read-tree</code>'s side effects helps avoid all three.</p>
        <h2>When to Use</h2>
    <p>Most users never need this. It's relevant for implementing custom merge tools, scripts that build the index from arbitrary trees, or for the <code>git read-tree --prefix=&lt;dir&gt;</code> trick to merge a subtree.</p>
    <h2>Common Options</h2>
    <table>
      <thead><tr><th>Option</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>-m</code></td><td>Three-way merge tree mode.</td></tr>
        <tr><td><code>-u</code></td><td>Update working tree to match index.</td></tr>
        <tr><td><code>--reset</code></td><td>Behave like <code>reset --hard</code> for the index.</td></tr>
        <tr><td><code>--prefix=&lt;dir&gt;</code></td><td>Read tree into a subdirectory.</td></tr>
        <tr><td><code>--empty</code></td><td>Empty the index.</td></tr>
        <tr><td><code>-i</code></td><td>Don't update working tree.</td></tr>
      </tbody>
    </table>
    <h2>Examples</h2>
    <pre><code>git read-tree --empty
    # Clear the index

    git read-tree HEAD
    # Re-populate index from HEAD's tree

    git read-tree --prefix=lib/ -u other-branch:src
    # Splice the src/ tree of another branch into lib/

    git read-tree -m HEAD origin/main
    # Merge two trees into the index (low-level merge)</code></pre>
    <h2>Common Mistakes</h2>
    <p>Calling <code>read-tree</code> without <code>-u</code> leaves the working tree out of sync with the index, surprising subsequent operations. Doing this in a busy worktree can cause confusing diffs.</p>
    <h2>Related Commands</h2>
    <p><code>git write-tree</code>, <code>git checkout</code>, <code>git merge</code>, <code>git update-index</code></p>
- title: git write-tree — Create a tree object from the current index
  section: Commands Reference
  difficulty: Advanced
  git_version: 2.30+
  weight: 770
  body: |
    <h2>Synopsis</h2>
    <pre><code>git write-tree [--missing-ok] [--prefix=&lt;dir&gt;]</code></pre>
    <h2>Description</h2>
    <p>The <code>git write-tree</code> command serializes the current index into a tree object in the database, returning the SHA. It is the plumbing inverse of <code>read-tree</code>: that command loads a tree, this one stores one.</p>
    <p>In day-to-day use, <code>git write-tree</code> integrates closely with shell aliases, editor plugins, and continuous integration. Power users often add aliases that combine flags they always pass, or wrap the command in scripts that enforce team conventions. Output formatting can be customized via Git config — pretty formats, color schemes, and pager behavior are all tunable. When something goes wrong, the first diagnostic step is usually to re-run the command with <code>GIT_TRACE=1</code> in the environment, which reveals the underlying plumbing calls. For unusual situations, the <code>--help</code> output (<code>git write-tree --help</code>) opens the full manual page with details on every option, including those rarely used in casual workflows but essential for debugging or scripting at scale.</p><p>Understanding how <code>git write-tree</code> interacts with the rest of Git's data model — the object database, the index, refs, and the working tree — pays dividends. Each command operates on some subset of these pieces, and knowing which it touches helps predict outcomes and recover from mistakes. Reading the official Git documentation alongside hands-on practice in a throwaway repository is the fastest way to internalize the nuances. Most production issues with Git stem from one of three causes: surprising default behavior, partial network operations, or rewriting history that was already shared. A working mental model of <code>git write-tree</code>'s side effects helps avoid all three.</p>
        <h2>When to Use</h2>
    <p>You almost never call this directly. <code>git commit</code> calls <code>write-tree</code> internally to capture the staged state. Reach for it when synthesizing tree objects for custom workflows (generating a tree without a commit, scripting <code>commit-tree</code> pipelines).</p>
    <h2>Common Options</h2>
    <table>
      <thead><tr><th>Option</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>--missing-ok</code></td><td>Don't fail if referenced objects are missing.</td></tr>
        <tr><td><code>--prefix=&lt;dir&gt;</code></td><td>Write a subtree of the index.</td></tr>
      </tbody>
    </table>
    <h2>Examples</h2>
    <pre><code>git write-tree
    # Print SHA of tree representing the current index

    TREE=$(git write-tree)
    COMMIT=$(echo "Snapshot" | git commit-tree "$TREE" -p HEAD)
    git update-ref refs/heads/snapshot "$COMMIT"
    # Manually craft a commit on a new branch

    git write-tree --prefix=docs/
    # Just the docs/ subtree</code></pre>
    <h2>Common Mistakes</h2>
    <p>If the index has unmerged entries, <code>write-tree</code> fails. Resolve conflicts first. Forgetting that <code>write-tree</code> doesn't create a commit — only a tree — leads to dangling objects. <code>git help write-tree</code> opens the full manual page with comprehensive coverage of every option and edge case; it remains the authoritative reference whenever the summary on this page leaves a question unanswered. For team workflows, capturing how your project uses this command in a CONTRIBUTING document avoids repeated onboarding questions and keeps everyone aligned on conventions.</p>
    <h2>Related Commands</h2>
    <p><code>git read-tree</code>, <code>git commit-tree</code>, <code>git ls-tree</code>, <code>git update-index</code></p>
- title: git commit-tree — Create a new commit object
  section: Commands Reference
  difficulty: Advanced
  git_version: 2.30+
  weight: 780
  body: |
    <h2>Synopsis</h2>
    <pre><code>git commit-tree &lt;tree&gt; [-p &lt;parent&gt;]... [-m &lt;msg&gt;] [-S]</code></pre>
    <h2>Description</h2>
    <p>The <code>git commit-tree</code> command builds a commit object from a given tree SHA, an optional list of parent commits, and a message. It outputs the new commit's SHA. Unlike <code>git commit</code>, it does NOT update any ref — the resulting commit is dangling until you point a branch or tag at it.</p>
    <p>In day-to-day use, <code>git commit-tree</code> integrates closely with shell aliases, editor plugins, and continuous integration. Power users often add aliases that combine flags they always pass, or wrap the command in scripts that enforce team conventions. Output formatting can be customized via Git config — pretty formats, color schemes, and pager behavior are all tunable. When something goes wrong, the first diagnostic step is usually to re-run the command with <code>GIT_TRACE=1</code> in the environment, which reveals the underlying plumbing calls. For unusual situations, the <code>--help</code> output (<code>git commit-tree --help</code>) opens the full manual page with details on every option, including those rarely used in casual workflows but essential for debugging or scripting at scale.</p><p>Understanding how <code>git commit-tree</code> interacts with the rest of Git's data model — the object database, the index, refs, and the working tree — pays dividends. Each command operates on some subset of these pieces, and knowing which it touches helps predict outcomes and recover from mistakes. Reading the official Git documentation alongside hands-on practice in a throwaway repository is the fastest way to internalize the nuances. Most production issues with Git stem from one of three causes: surprising default behavior, partial network operations, or rewriting history that was already shared. A working mental model of <code>git commit-tree</code>'s side effects helps avoid all three.</p>
        <h2>When to Use</h2>
    <p>Most developers never use this directly. It's a building block for tools that synthesize commits programmatically: importers, custom merge strategies, history-rewriting tools. <code>filter-repo</code> uses commit-tree internally.</p>
    <h2>Common Options</h2>
    <table>
      <thead><tr><th>Option</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>-p &lt;parent&gt;</code></td><td>Specify a parent commit (repeatable for merges).</td></tr>
        <tr><td><code>-m &lt;msg&gt;</code></td><td>Commit message (or read stdin).</td></tr>
        <tr><td><code>-F &lt;file&gt;</code></td><td>Read message from file.</td></tr>
        <tr><td><code>-S[&lt;keyid&gt;]</code></td><td>GPG-sign the commit.</td></tr>
      </tbody>
    </table>
    <h2>Examples</h2>
    <pre><code>TREE=$(git write-tree)
    COMMIT=$(echo "Initial commit" | git commit-tree "$TREE")
    git update-ref refs/heads/main "$COMMIT"
    # Build a root commit from scratch

    PARENT=$(git rev-parse HEAD)
    TREE=$(git write-tree)
    COMMIT=$(echo "Custom merge" | git commit-tree "$TREE" -p "$PARENT" -p "feature")
    git update-ref refs/heads/main "$COMMIT"
    # Synthesize a custom merge commit</code></pre>
    <h2>Common Mistakes</h2>
    <p>Forgetting to <code>git update-ref</code> leaves the commit dangling — <code>git gc</code> will eventually delete it. Author/committer environment variables (<code>GIT_AUTHOR_NAME</code> etc.) must be set if you want non-default identities.</p>
    <h2>Related Commands</h2>
    <p><code>git write-tree</code>, <code>git update-ref</code>, <code>git commit</code>, <code>git filter-repo</code></p>
- title: git diff-index — Compare a tree to the index or working tree
  section: Commands Reference
  difficulty: Advanced
  git_version: 2.30+
  weight: 790
  body: |
    <h2>Synopsis</h2>
    <pre><code>git diff-index [--cached] [-p] &lt;tree-ish&gt; [&lt;path&gt;...]</code></pre>
    <h2>Description</h2>
    <p>The <code>git diff-index</code> command is the plumbing companion to <code>git diff</code>. It compares a tree object (commit, tag) against the index or working tree. Output is the raw, machine-readable diff format unless <code>-p</code> requests a patch.</p>
    <p>In day-to-day use, <code>git diff-index</code> integrates closely with shell aliases, editor plugins, and continuous integration. Power users often add aliases that combine flags they always pass, or wrap the command in scripts that enforce team conventions. Output formatting can be customized via Git config — pretty formats, color schemes, and pager behavior are all tunable. When something goes wrong, the first diagnostic step is usually to re-run the command with <code>GIT_TRACE=1</code> in the environment, which reveals the underlying plumbing calls. For unusual situations, the <code>--help</code> output (<code>git diff-index --help</code>) opens the full manual page with details on every option, including those rarely used in casual workflows but essential for debugging or scripting at scale.</p><p>Understanding how <code>git diff-index</code> interacts with the rest of Git's data model — the object database, the index, refs, and the working tree — pays dividends. Each command operates on some subset of these pieces, and knowing which it touches helps predict outcomes and recover from mistakes. Reading the official Git documentation alongside hands-on practice in a throwaway repository is the fastest way to internalize the nuances. Most production issues with Git stem from one of three causes: surprising default behavior, partial network operations, or rewriting history that was already shared. A working mental model of <code>git diff-index</code>'s side effects helps avoid all three.</p>
        <h2>When to Use</h2>
    <p>Most users prefer <code>git diff</code>, which is easier to read. Use <code>diff-index</code> in scripts where you need a stable, unambiguous comparison and don't want porcelain conveniences. Hooks (especially <code>pre-commit</code>) often use it for precise checks.</p>
    <h2>Common Options</h2>
    <table>
      <thead><tr><th>Option</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>--cached</code></td><td>Compare tree to index (instead of working tree).</td></tr>
        <tr><td><code>-p</code></td><td>Show patch.</td></tr>
        <tr><td><code>--name-only</code></td><td>List only changed file names.</td></tr>
        <tr><td><code>--name-status</code></td><td>List names with status letters.</td></tr>
        <tr><td><code>--quiet</code></td><td>Exit nonzero if differences exist; produce no output.</td></tr>
        <tr><td><code>-z</code></td><td>NUL-terminated output.</td></tr>
      </tbody>
    </table>
    <h2>Examples</h2>
    <pre><code>git diff-index --cached HEAD
    # Plumbing equivalent of "git diff --staged"

    git diff-index HEAD
    # Working tree vs HEAD

    git diff-index --quiet HEAD || echo "Repo is dirty"
    # Useful test in scripts and hooks

    git diff-index --name-only --diff-filter=A HEAD
    # List newly added files</code></pre>
    <h2>Common Mistakes</h2>
    <p>The default raw output isn't patch text — pass <code>-p</code> for that. <code>--quiet</code> sets the exit code rather than printing, which is the opposite of what users sometimes expect from a "diff" command.</p>
    <h2>Related Commands</h2>
    <p><code>git diff</code>, <code>git diff-tree</code>, <code>git status</code>, <code>git ls-files</code></p>
- title: git checkout-index — Copy files from the index to the working tree
  section: Commands Reference
  difficulty: Advanced
  git_version: 2.30+
  weight: 800
  body: |
    <h2>Synopsis</h2>
    <pre><code>git checkout-index [-a] [-f] [-u] [--prefix=&lt;dir&gt;] [&lt;file&gt;...]</code></pre>
    <h2>Description</h2>
    <p>The <code>git checkout-index</code> command writes file content from the index out to the working tree (or to an arbitrary directory using <code>--prefix</code>). It does not change the index, the current branch, or HEAD — making it safer than <code>git checkout</code> for scripted file extraction.</p>
    <p>In day-to-day use, <code>git checkout-index</code> integrates closely with shell aliases, editor plugins, and continuous integration. Power users often add aliases that combine flags they always pass, or wrap the command in scripts that enforce team conventions. Output formatting can be customized via Git config — pretty formats, color schemes, and pager behavior are all tunable. When something goes wrong, the first diagnostic step is usually to re-run the command with <code>GIT_TRACE=1</code> in the environment, which reveals the underlying plumbing calls. For unusual situations, the <code>--help</code> output (<code>git checkout-index --help</code>) opens the full manual page with details on every option, including those rarely used in casual workflows but essential for debugging or scripting at scale.</p><p>Understanding how <code>git checkout-index</code> interacts with the rest of Git's data model — the object database, the index, refs, and the working tree — pays dividends. Each command operates on some subset of these pieces, and knowing which it touches helps predict outcomes and recover from mistakes. Reading the official Git documentation alongside hands-on practice in a throwaway repository is the fastest way to internalize the nuances. Most production issues with Git stem from one of three causes: surprising default behavior, partial network operations, or rewriting history that was already shared. A working mental model of <code>git checkout-index</code>'s side effects helps avoid all three.</p>
        <h2>When to Use</h2>
    <p>Most users never need this. Use it when scripting deployment from the index, building source tarballs, or exporting a snapshot to a directory other than the working tree.</p>
    <h2>Common Options</h2>
    <table>
      <thead><tr><th>Option</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>-a</code>, <code>--all</code></td><td>Check out every file in the index.</td></tr>
        <tr><td><code>-f</code>, <code>--force</code></td><td>Overwrite existing files.</td></tr>
        <tr><td><code>-u</code></td><td>Update stat information for files written.</td></tr>
        <tr><td><code>--prefix=&lt;dir&gt;</code></td><td>Write into <code>&lt;dir&gt;</code> instead of working tree.</td></tr>
        <tr><td><code>--stage=&lt;n&gt;</code></td><td>Check out a specific stage (1=base, 2=ours, 3=theirs).</td></tr>
        <tr><td><code>-z</code></td><td>NUL-terminated input/output.</td></tr>
        <tr><td><code>--no-create</code></td><td>Don't create files; just update stats.</td></tr>
      </tbody>
    </table>
    <h2>Examples</h2>
    <pre><code>git checkout-index -a -f --prefix=/tmp/snapshot/
    # Export the entire index to /tmp/snapshot/

    git checkout-index --prefix=build/ src/main.c
    # Copy a single file into build/

    git checkout-index --stage=2 -f -- conflicted.txt
    # Pick "ours" version during a conflict

    git ls-files | git checkout-index -f --stdin
    # Restore every tracked file from the index</code></pre>
    <h2>Common Mistakes</h2>
    <p>The <code>--prefix</code> argument must end with a slash, otherwise filenames concatenate awkwardly. Without <code>-f</code>, existing files in the destination cause errors. Picking the wrong <code>--stage</code> during conflict resolution applies a worse version than intended.</p>
    <h2>Related Commands</h2>
    <p><code>git checkout</code>, <code>git restore</code>, <code>git archive</code>, <code>git ls-files</code></p>
